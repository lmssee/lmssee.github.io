    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e整数\u003c/h5\u003e\n\u003cp\u003e不含小数部分的数。有 8、16、32、64 位有符号和无符号了整数类型。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n\u003cp\u003e可以用 .min 、.max 来获取该类型的最大值和最小值。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e浮点数\u003c/h5\u003e\n\u003cp\u003e浮点数分为 Double 、 Float 两种。Double 是 64 位 ， float 是 32 位，优先推荐使用 Double 。\u003c/p\u003e\n\u003ch5\u003e类型安全于类型推断\u003c/h5\u003e\n\u003cp\u003e如果在声明变量或者常量时没有添加类型注解，swift 会自己根据第一次赋值推断数据的类型。\u003c/p\u003e\n\u003ch5\u003e字面量\u003c/h5\u003e\n\u003cp\u003e数值类型的字面量可以包含额外的格式来增加可读性。整数型和浮点都可以：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003elet aLongDoubleNumber = 1_000_000.000_000_1\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n\u003cp\u003e将数值使用类方法可以将其进行类型转换：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003elet PI: Int = Int(3.14) // PI = 3\u003c/span\u003e\n\u003c/code\u003e\n\u003c/div\u003e\n\u003ch5\u003e布尔值\u003c/h5\u003e\n\u003cp\u003etrue  or  false , that is  a question。\u003c/p\u003e\n\u003ch5\u003e元组\u003c/h5\u003e\n\u003cp\u003e一个类似于数组和 map 杂交的东西。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003elet a = (124,\"哈哈哈\")\u003c/span\u003e\n\u003cspan class=\"p\"\u003elet b = (number: 124, string: \"哈哈哈\")\u003c/span\u003e\n\u003cspan class=\"p\"\u003elet (c, _) = a\u003c/span\u003e\n\u003cspan class=\"p\"\u003ea == b // true\u003c/span\u003e\n\u003cspan class=\"p\"\u003ec == b.number // true\u003c/span\u003e\n\u003cspan class=\"p\"\u003e...\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e可选类型\u003c/h5\u003e\n\u003cp\u003e有值还是没有值，这在所有的强类型语言中都是一个问题。方便了类型检查，就失去了自由。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003elet  aNotNumber = Int?(3.14)\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n\u003cp\u003e没有值使用 nil 来指定。各家语言为了显示自己的独特性，就嚯嚯使用的人。直接用 undefined 多好，省的打印日志还得想想是 print 还是 println 还是 console.log 还是 System.out.println 。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e总是有值\u003c/h5\u003e\n\u003cp\u003e变量在使用过程中，会一直判断和解析。如果知道该变量一直有值，应该使用 !  来限定一下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003elet  aString: String? = \"a\"\u003c/span\u003e\n\u003cspan class=\"p\"\u003elet  otherString: String = aString!\u003c/span\u003e\n\u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003cspan class=\"p\"\u003elet  anotherString:String! = \"b\"\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"app ✈︎✈︎ ios ✈︎✈︎ swift","title":"数据类型"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["app","ios","swift","数据类型"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
