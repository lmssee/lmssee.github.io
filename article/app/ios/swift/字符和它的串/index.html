    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e字符\u003c/h5\u003e\n\u003cp\u003e就是一个个字符\u003c/p\u003e\n\u003ch6\u003eUnicode\u003c/h6\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003ch6\u003e可扩展字形群集\u003c/h6\u003e\n\u003cp\u003eCharacter 类代表了可扩展的字形集：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003elet aCharacter: Character = \"\\u{E9}\" // é\u003c/span\u003e\n\u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003c/code\u003e \n\u003ch6\u003e计算字符的数量\u003c/h6\u003e\n\u003cp\u003e使用  count 来计算 Character 的数量。\u003c/p\u003e\n\u003ch5\u003e字符串\u003c/h5\u003e\n\u003cp\u003e就是一个个字符组成的串\u003c/p\u003e\n\u003ch5\u003e多行字符串\u003c/h5\u003e\n\u003cp\u003e使用三个双引号包起来的拥有固定文本顺序的字符集。\u003c/p\u003e\n\u003ch5\u003e字符串插值\u003c/h5\u003e\n\u003cp\u003e使用反斜杠为前缀的圆括号中：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003elet  aNumber: Int = 3\u003c/span\u003e\n\u003cspan class=\"p\"\u003elet  aString: String = \"\\(aNUmber)\"\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e访问字符串\u003c/h5\u003e\n\u003cp\u003e使用索引 Index： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003elet  aString: String = \"a long string in this line\";\u003c/span\u003e\n\u003cspan class=\"p\"\u003eaString[aString.startIndex]  // a\u003c/span\u003e\n\u003cspan class=\"p\"\u003eaString[aString.index(before: aString.endIndex)]  // e\u003c/span\u003e\n\u003cspan class=\"p\"\u003eaString[aString.index(after: aString.startIndex)] // \u003c/span\u003e\n\u003cspan class=\"p\"\u003eaString.index(aString.startIndex ,offsetBy: 9) // r\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eindices 属性包含全部的索引的范围，可用来访问字符串内的单个字符：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003efor i in  aString {\u003c/span\u003e\n\u003cspan class=\"p2\"\u003eprint(\"\\(aString[i])\", terminator: \" \")\u003c/span\u003e\n\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003cspan class=\"p\"\u003e//a\u0026nbsp;\u0026nbsp;l\u0026nbsp;\u0026nbsp;o\u0026nbsp;\u0026nbsp;n....\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e插入和删除\u003c/h5\u003e\n\u003cp\u003e使用 insert(_:  ,at: ) 可以在一个字符串的指定位置插入一个字符。调用 insert(contentsOf: ,at:) 可在指定的字符串索引插入一段字符串。\u003c/p\u003e\n\u003ch5\u003e子字符串\u003c/h5\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003ch5\u003e比较字符串\u003c/h5\u003e\n\u003cp\u003e使用 == 和 != 来比较啊两个字符串。\u003c/p\u003e\n\u003ch6\u003e前缀/后缀相等\u003c/h6\u003e\n\u003cp\u003e调用字符串的 hasPrefix() / hasSuffix() 来检测字符串中是否包含特定的前缀/后缀。\u003c/p\u003e","pageTitle":"app ✈︎✈︎ ios ✈︎✈︎ swift","title":"字符和它的串"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["app","ios","swift","字符和它的串"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
