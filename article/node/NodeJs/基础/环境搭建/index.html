                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e window 环境变量的配置 \u003c/h5\u003e\n\u003ch6\u003e 配置默认安装目录和缓存日志目录 \u003c/h6\u003e\n\u003cp\u003e 这里的环境配置主要配置的是 npm 安装的全局模块所在的路径，以及缓存 cache 的路径，之所以要配置，是因为以后在执行类似： npm install express [-g]\n    （后面的可选参数 -g ， g 代表 global 全局安装的意思）的安装语句时，会将安装的模块安装到【 C:\\Users\\ 用户名 \\AppData\\Roaming\\npm 】路径中，占 C 盘空间。\n\u003c/p\u003e\n\u003cp\u003e 将全模块所在路径和缓存路径放在我 node.js 安装的文件夹中，则在我安装的文件夹【 D:\\Develop\\nodejs 】下创建两个文件夹【 node_global 】及【 node_cache 】。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003enpm config set prefix \"D:\\data\\nodejs\\node_global\" \u003c/span\u003e\u003cspan class=\"p2\"\u003enpm\n        config set cache \"D:\\data\\nodejs\\node_cache\"\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 环境变量配置 \u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e “我的电脑” - 右键 - “属性” - “高级系统设置” - “高级” - “环境变量” \u003c/li\u003e\n    \u003cli\u003e 进入环境变量对话框 \u003c/li\u003e\n    \u003cli\u003e 在【系统变量】下新建【 NODE_PATH 】，输入【 D:\\Develop\\nodejs\\node_global\\node_modules 】，将【用户变量】下的【 Path 】修改为【\n        D:\\Develop\\nodejs\\node_global 】\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e 测试 \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003enpm install express - g# - g 是全局安装的意思 \u003c/span\u003e\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003enpm i 停留在 idealTree:admin: sill idealTree buildDeps ： \u003c/p\u003e\n    \u003cp\u003e 设置淘宝镜像 npm config set registry https://registry.npm.taobao.org\u003c/p\u003e\n    \u003cp\u003e 检验设置是否成功 npm config get registry\u003c/p\u003e\n\u003c/div\u003e","pageTitle":"node ✈︎✈︎ NodeJs ✈︎✈︎ 基础","title":"环境搭建"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["node","NodeJs","基础","环境搭建"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
