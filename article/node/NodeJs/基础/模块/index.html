                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 模块\u003c/h5\u003e\n\u003cp\u003e 编写稍大一点的程序时一般都会将代码模块化。在 Node.js 中，一般将代码合理拆分到不同的JavaScript 文件中。为了让这些文件可以相互调用，Node.js 提供了一个简单的模块系统。模块是Node.js\n    程序的基本组成部分，文件和模块是一一对应的。换言之，每一个文件就是一个模块，文件路径就是模块名。\n\u003c/p\u003e\n\u003cp\u003e 在编写模块时，Node.js 提供了3 个很有用的函数或对象：exports 对象、require() 函数、module 对象。\u003c/p\u003e\n\u003ch5\u003eexports 对象\u003c/h5\u003e\n\u003cp\u003eexports 对象是当前模块的导出对象，用于导出模块的公有方法和属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003eexports.hello = function () { console.log('Hello World!'); };\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003erequire() 函数\u003c/h5\u003e\n\u003cp\u003erequire() 函数用于在当前模块中加载和使用别的模块。它的使用方法是传入一个模块名，返回一个该模块导出的对象或方法。模块名可使用相对路径（以 ./ 开头）或者是绝对路径（以/ 开头）。另外，模块名中的 .js\n    扩展名可以省略。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 以./ 开头的相对路径，表示当前目录\u003c/li\u003e\n    \u003cli\u003e 以../ 开头的相对路径，表示父目录\u003c/li\u003e\n    \u003cli\u003e 以../../ 开头的相对路径，表示父目录的父目录；多个 ../ 开头的相对路径，目录层次依此类推\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e module 对象\u003c/h5\u003e\n\u003cp\u003e module 对象相当于当前文件的上下文，用户通过 module 对象可以访问到当前模块的内容。 module 对象一般与 exports 对象联合使用，导出当前模块的内容。\u003c/p\u003e","pageTitle":"node ✈︎✈︎ NodeJs ✈︎✈︎ 基础","title":"模块"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["node","NodeJs","基础","模块"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
