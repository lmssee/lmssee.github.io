    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003enpm\u003c/h5\u003e\n\u003cp\u003enpm 是 Node.js 的包管理工具，随 Node.js 一起安装，主要提供依赖项管理功能。安装完 Node.js 后，可以使用 npm-v 命令检查 npm 的版本 \u003c/p\u003e\n\u003cp\u003enpm 类似 Java 中的 Maven 、 Python 中的 pip 等，可以方便地管理 Node.js 项目中的依赖项，依赖项在项目中以 package.json 的形式显示。 npm\n    命令用来安装、更新、卸载模块或依赖。\n\u003c/p\u003e\n\u003ch5\u003e 安装 \u003c/h5\u003e\n\u003cp\u003e 使用 npm install 命令安装模块。安装模块有两种模式：全局（ global ）模式和本地（ local ）模式。 \u003c/p\u003e\n\u003ch6\u003e 全局模式 \u003c/h6\u003e\n\u003cp\u003e 在命令行里的 npm install 命令后添加 -g 或者 -global 参数进行全局模式安装，如全局模式安装 Typescript 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003enpm install -g typescript # 或 npm install -global typescript\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 一旦全局模式安装完成后，用户可以在系统的任何地方使用该模块。 \u003c/p\u003e\n\u003cp\u003e查看全局安装：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm list -g\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 本地安装 \u003c/h6\u003e\n\u003cp\u003e 本地模式安装区别于全局模式的地方就是不使用 -g 参数，如安装 Express 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003enpm install express\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 在本地模式安装中，安装模块并将其保存为项目依赖（写入 package.json 文件）有两种场景。 \u003c/p\u003e\n\u003cp\u003e 保存依赖到 dependencies 节点信息中，在命令后添加 --save 参数： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003enpm install express --save\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 保存依赖到 devDependencies 节点信息中，在命令后添加 --save-dev 参数： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003enpm install express --save-dev\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 命令 install 可以简写为小写字母 i ， --save 参数可以简写为 -S （大写字母 S ）， --save dev 参数可以简写为 -D （大写字母 D ）： \u003c/p\u003e\n\u003ch5\u003e 更新模块 \u003c/h5\u003e\n\u003cp\u003e 有时依赖关系会改变，如要添加一个新的模块，但是添加该模块要求其他模块具有较高的版本。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 使用命令 npm update 更新指定模块。如果想要保存结果，还需要参照前面讲的本地模式更新。 package.json 文件也会保存新版本的信息。也可参照全局模式更新，则该命令将更新全局模式安装的模块\n    \u003c/li\u003e\n    \u003cli\u003e 以编辑 package.json 文件，更新其中模块版本的依赖信息，然后执行 npm update 命令。这将更新模块以匹配此文件中的规范 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e 卸载模块 \u003c/h5\u003e\n\u003cp\u003e 执行 npm uninstall 命令卸载指定的模块。卸载模块与更新模块一样，也可以参照更新模块进行卸载。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm uninstall express -g\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 项目中的 npm \u003c/h5\u003e\n\u003ch6\u003enpm init # 初始化项目 \u003c/h6\u003e\n\u003ch6\u003e 启动项目 \u003c/h6\u003e\n\u003cp\u003e 进入项目根目录下，输入如下命令启动 Node.js 项目。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003enode index.js\u003c/span\u003e\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 复制 Node.js 项目时，不要同时复制 node_modules 文件夹，否则会导致不可知的后果。如果要将项目从一台计算机复制到另一台计算机，请先删除 node_modules 文件夹，然后在目标计算机上执行\n        npm\n        install 命令安装 Node.js 模块。\n    \u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e 安装 \u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e 执行 npm install 命令安装指定模块 \u003c/li\u003e\n    \u003cli\u003e 编辑 package.json 文件，然后执行 npm install 命令安装 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e 手动编辑 package.json 文件是安装多个模块时的最佳方式。 \u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 安装时省略版本信息， npm 默认安装它的最新版本 \u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e常用命令\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003enpm help 帮助\u003c/li\u003e\n    \u003cli\u003enpm install -s \u0026lt;package name\u0026gt; 安装并保留插件信息 \u003c/li\u003e\n    \u003cli\u003enpm update -s \u0026lt;package name\u0026gt; 升级插件\u003c/li\u003e\n    \u003cli\u003enpm cache clear 清空本地的缓存\u003c/li\u003e\n    \u003cli\u003enpm unpublish \u0026lt;package name\u0026gt;@\u0026lt;version\u0026gt; 撤销自己发布的版本\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"node ✈︎✈︎ NodeJs ✈︎✈︎ npm","title":"使用"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["node","NodeJs","npm","使用"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
