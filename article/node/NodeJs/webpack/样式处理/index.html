    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e样式隔离\u003c/h5\u003e\n\u003cp\u003e使用 \u003ca href=\"https://www.npmjs.com/package/mini-css-extract-plugin\" target=\"_blank\"\n        rel=\"noopener noreferrer\"\u003emini-css-extract-plugin\u003c/a\u003e 可以将 css 单独出来。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e样式预处理\u003c/h5\u003e\n\u003ch6\u003eSass 和 SCSS\u003c/h6\u003e\n\u003cp\u003esass-loader 搭配 css-loader 和 style-loader ,且 sass 本身需要安装 node-sass 进行编译。\u003c/p\u003e\n\u003ch6\u003eless\u003c/h6\u003e\n\u003cp\u003e\u003ca href=\"https://lesscss.org/usage/#less-options\" target=\"_blank\" rel=\"noopener noreferrer\"\u003eless\u003c/a\u003e 也是一种预编译 css\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm i --save-dev less-loader less\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003ePostCSS\u003c/h5\u003e\n\u003cp\u003ePostCSS 可以更智能化 css：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm i --save-dev postcss-loader\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e自动前缀\u003c/h6\u003e\n\u003cp\u003e与 Autoprefixer 结合，为 css 自动添加厂商前缀。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm i --save-dev autoprefixer\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003estylelint\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm i --save-dev stylelint\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eCSSNext\u003c/h6\u003e\n\u003cp\u003e安装 CSSNext 可以使用 css 新特性：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm i --save-dev postcss-cssnext\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003ecss modules\u003c/h5\u003e\n\u003cp\u003e将 css 模块化：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e每个 CSS 文件中的样式都拥有单独的作用域，不会和外界发生命名冲突\u003c/li\u003e\n    \u003cli\u003e对 CSS 进行依赖管理，可以通过相对路径引入 CSS 文件\u003c/li\u003e\n    \u003cli\u003e可以通过 composes 轻松复用其他 CSS 模块\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e使用CSS Modules不需要额外安装模块，只要开启css-loader中的modules配置项即可。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eloader: 'css-loader',\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eoptions: {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003emodules: true,\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003elocalldenName: '[name]__[local]__[hash:base64:5]'\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"node ✈︎✈︎ NodeJs ✈︎✈︎ webpack","title":"样式处理"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["node","NodeJs","webpack","样式处理"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
