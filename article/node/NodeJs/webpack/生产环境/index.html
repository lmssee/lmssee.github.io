    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e配置封装\u003c/h5\u003e\n\u003cp\u003e生产环境的配置与开发环境有所不同，比如要设置mode、环境变量，为文件名添加chunk hash作为版本号等。\u003c/p\u003e\n\u003ch6\u003e相同变量不同参数\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\"script\" ：{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"dev\" :\"ENV=development webpack-dev-server\",\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"build\": \"ENV=production webpack\"\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e},\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econst EVN = process.evn.EVN;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003emodule.exports = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eoutput: {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efilename : `bundle${ EVN === 'production'? '@[chunkhash]' :''}.js`\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003emode : EVN,\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e独立配置文件\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\"script\": {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"dev\" : \"webpack-dev-serve --config=webpack.development.config.js\",\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\"build\": \"webpack --config=webpack.production.config.js\"\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e开启 production 模式\u003c/h5\u003e\n\u003cp\u003e设置 mode 为 production 。\u003c/p\u003e\n\u003ch5\u003esource map\u003c/h5\u003e\n\u003cp\u003esource map指的是将编译、打包、压缩后的代码映射回源代码的过程。经过Webpack打包压缩后的代码基本上已经不具备可读性，此时若代码抛出了一个错误，要想回溯它的调用栈是非常困难的。而有了source\n    map，再加上浏览器调试工具（dev tools），要做到这一点就非常容易了。同时它对于线上问题的追查也有一定帮助。\u003c/p\u003e\n\u003cp\u003e开启 source map ，仅需在 webpack.cocnfig.js 中添加 devtool ：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003edevtool : 'source-map'\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e对于CSS、SCSS、Less来说，则需要添加额外的source map配置项。\u003c/p\u003e\n    \u003cp\u003e开启 source map 可能不太安全，所以就需要单独的设置不让用户看到\u003c/p\u003e\n\u003c/div\u003e\n\n\u003ch5\u003e资源压缩\u003c/h5\u003e\n\u003ch6\u003ejs 压缩\u003c/h6\u003e\n\u003cp\u003e开启配置项 mode：production 后无需配置资源压缩，而单独配置则需要使用 optinization 配置项，设置 minimize 值为 true\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eoptimization: {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eminimize: true,\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e},\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003ecss 压缩\u003c/h6\u003e\n\u003cp\u003e压缩 CSS 文件的前提是使用 extract-text-webpack-plugin 或 mini-css-extract-plugin 将样式提取出来，接着使用\n    optimize-css-assets-webpack-plugin 来进行压缩，这个插件本质上使用的是压缩器 cssnano。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e之前的 \u003ca href=\"https://www.npmjs.com/package/mini-css-extract-plugin\" target=\"_blank\"\n            rel=\"noopener noreferrer\"\u003emini-css-extract-plugin\u003c/a\u003e 插件有配套插件说明，就是 mini-css-extract-plugin\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e缓存\u003c/h5\u003e\n\u003cp\u003e缓存是指重复利用浏览器已经获取过的资源。合理地使用缓存是提升客户端性能的一个关键因素。\u003c/p\u003e\n\u003ch6\u003e资源 hash\u003c/h6\u003e\n\u003cp\u003e一个常用的方法是在每次打包的过程中对资源的内容计算一次 hash ，并作为版本号存放在文件名中，如 bundle@2e0a691e769edb228e2.js 。 bundle 是文件本身的名字，@后面跟的则是文件内容\n    hash 值，每当代码发生变化时相应的hash也会变化。\n\u003c/p\u003e\n\u003ch6\u003e动态 HTML\u003c/h6\u003e\n\u003cp\u003e使用 html-webpack-plugin\u003c/p\u003e","pageTitle":"node ✈︎✈︎ NodeJs ✈︎✈︎ webpack","title":"生产环境"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["node","NodeJs","webpack","生产环境"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
