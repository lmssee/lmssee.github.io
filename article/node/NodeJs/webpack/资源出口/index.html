  <script id="_next_DATA__"
    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e所有的出口配置在 output 对象中。\u003c/p\u003e\n\u003ch5\u003efilename\u003c/h5\u003e\n\u003cp\u003e资源输出的文件名，为字符串：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.exports = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eentry : './src/index.js',\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eoutput: {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efilename : 'lmssee',\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在多入口中，可以对应每一个入口指定不同的名字：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.exports = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eentry : {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eindex:'./src/index.js',\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003elmssee:'./src/lmssee.js',\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eoutput: { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efilename:'[name].js',\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ctable id=\"Aa\"\u003e\u003c/table\u003e\n\u003cscript\u003e\n    _MiMethod.td('Aa', [\n        ['[name]', '指代 chunk 的名'],\n        ['[hash]', '指代 Webpack 此次打包生成的 hash'],\n        ['[chunkhash]', '指代当前 chunk 内容的 hash'],\n        ['[id]', '指代当前 chunk 的 id'],\n        ['[query]', '指代 filename 配置项中的 query'],\n    ])\n\u003c/script\u003e\n\u003cp\u003e作用：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e当有多个chunk存在时对不同的 chunk 进行区分。如 [name] 、[ chunkhash ]和 [id] ，它们对于每个 chunk 来说都是不同的\u003c/li\u003e\n    \u003cli\u003e控制客户端缓存。表中的 [hash] 和 [chunkhash] 都与 chunk 内容直接相关，在 filename 中使用了这些变量后，当 chunk\n        的内容改变时，可以同时引起资源文件名的更改，从而使用户在下一次请求资源文件时会立即下载新的版本而不会使用本地缓存。 [query] 也可以起到类似的效果，只不过它与 chunk 内容无关，要由开发者手动指定\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e在实际工程中，使用比较多的是 [name] ，它与 chunk 是一一对应的关系，并且可读性较高。如果要控制客户端缓存，最好还要加上[chunkhash]，因为每个 chunk 所产生的 [chunkhash]\n    只与自身内容有关，单个 chunk 内容的改变不会影响其他资源，可以最精确地让客户端缓存得到更新。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.exports = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eentry : {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eindex:'./src/index.js',\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003elmssee:'./src/lmssee.js',\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eoutput: { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efilename:'[name]@[chunkhash].js',\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e更新缓存一般只用在生产环境的配置下，在开发环境中可以不必配置[chunkhash]\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003epath\u003c/h5\u003e\n\u003cp\u003e指定资源输出的位置，值需是绝对路径：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.exports = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eentry : {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eindex:'./src/index.js',\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003elmssee:'./src/lmssee.js',\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eoutput: { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efilename:'[name]@[chunkhash].js',\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003epath:'dist',\u003cspan class=\"r\"\u003e// 默认 dist\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003epublicPath\u003c/h5\u003e\n\u003cp\u003epublicPath是一个非常重要的配置项，并且容易与path相混淆。从功能上来说，path用来指定资源的输出位置，而publicPath则用来指定资源的请求位置。\u003c/p\u003e\n\u003cp\u003e由JS或CSS所请求的间接资源路径。页面中的资源分为两种，一种是由HTML页面直接请求的，比如通过script标签加载的JS；另一种是由JS或CSS请求的，如异步加载的JS、从CSS请求的图片字体等。publicPath的作用就是指定这部分间接资源的请求位置。\n\u003c/p\u003e\n\u003ch6\u003ehtml 有关的\u003c/h6\u003e\n\u003cp\u003e与HTML相关，也就是说我们可以将publicPath指定为HTML的相对路径，在请求这些资源时会以当前页面HTML所在路径加上相对路径，构成实际请求的URL。\u003c/p\u003e\n\u003c!-- \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003c/code\u003e --\u003e\n\u003ch6\u003eHost 相关\u003c/h6\u003e\n\u003cp\u003e若publicPath的值以“/”开始，则代表此时publicPath是以当前页面的host name为基础路径的。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e以当两种前路径为相对路径\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003eCDN 相关\u003c/h6\u003e\n\u003cp\u003e这种情况一般发生于静态资源放在CDN上面时，由于其域名与当前页面域名不一致，需要以绝对路径的形式进行指定。当publicPath以协议头或相对协议的形式开始时，代表当前路径是CDN相关。\u003c/p\u003e","pageTitle":"node ✈︎✈︎ NodeJs ✈︎✈︎ webpack","title":"资源出口"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["node","NodeJs","webpack","资源出口"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
