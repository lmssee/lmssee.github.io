class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>资源入口</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e配置资源入口\u003c/h5\u003e\n\u003cp\u003e Webpack 通过 context 和 entry 这两个配置项来共同决定入口文件的路径。在配置入口时，实际上做了两件事：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e确定入口模块位置，告诉 Webpack 从哪里开始进行打包\u003c/li\u003e\n    \u003cli\u003e定义 chunk name 。如果工程只有一个入口，那么默认其 chunk name 为“ main ”； 如果工程有多个入口，我们需要为每个入口定义 chunk name ，来作为该 chunk 的唯一标识\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003econtext\u003c/h5\u003e\n\u003cp\u003econtext可以理解为资源入口的路径前缀，在配置时要求必须使用绝对路径的形式。\u003c/p\u003e\n\u003cp\u003e配置context的主要目的是让entry的编写更加简洁，尤其是在多入口的情况下。context可以省略，默认值为当前工程的根目录。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.exports = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econtext : path.join(__dirname,'./src'),\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eentry:'./scripts/index.js',\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eentry\u003c/h5\u003e\n\u003cp\u003e与context只能为字符串不同，entry的配置可以有多种形式：字符串、数组、对象、函数。可以根据不同的需求场景来选择。\u003c/p\u003e\n\u003ch6\u003estring\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.exports = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eentry: './src/index.js',\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eoutput: {\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003efilename: 'oo.js',\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003earray\u003c/h6\u003e\n\u003cp\u003e传入数组作用是将多个资源先和合并，在打包时将最后一个元素作为实际的入口文件：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.exports = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eentry: ['importModule','./src/index.js'],\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eobject\u003c/h6\u003e\n\u003cp\u003e定义多入口，则必须使用对象的形式。对象的属性名（ key ）是 chunk name ，属性值（ value ）是入口路径:\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.exports = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eentry:{\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eindex: './src/index.js',\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003elib: './src/lib.js'\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e在使用字符串或数组定义单入口时，并没有办法更改chunk name，只能为默认的“main”。在使用对象来定义多入口时，则必须为每一个入口定义chunk name。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e函数型入口\u003c/h6\u003e\n\u003cp\u003e函数定义入口，返回值为以上符合类型即可。\u003c/p\u003e\n\u003cp\u003e传入一个函数的优点在于我们可以在函数体里添加一些动态的逻辑来获取工程的入口。另外，函数也支持返回一个Promise对象来进行异步操作。\u003c/p\u003e\n\u003ch5\u003esome\u003c/h5\u003e\n\u003ch6\u003e单页面应用\u003c/h6\u003e\n\u003cp\u003e对于单页面应用，传入单一入口即可：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.exports = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eentry: './src/index.js',\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e当一个打包文件大于 250kb 时，就会认为过大，打包时会警示。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e多页应用\u003c/h6\u003e\n\u003cp\u003e使用对象引入方式进行多个引入，互不干扰。\u003c/p\u003e\n\u003ch6\u003e提取公共\u003c/h6\u003e\n\u003cp\u003e可以使用将公共或不经常改变的部分提取出来。\u003c/p\u003e","pageTitle":"node ✈︎✈︎ NodeJs ✈︎✈︎ webpack","title":"资源入口"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["node","NodeJs","webpack","资源入口"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
