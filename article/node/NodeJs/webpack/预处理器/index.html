="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>预处理器</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e一切皆模块。\u003c/p\u003e\n\u003ch5\u003eloader\u003c/h5\u003e\n\u003cp\u003e每个 loader 本质是一个函数，可以是链式的。\u003c/p\u003e\n\u003cp\u003eloader 的字面意思就是装载器。 Webpack 只认识 Javascript ，对于其他的资源需要预先定义一个或多个 loader 进行转义，输出为 Webpack 能够接受的形式再进行。\u003c/p\u003e\n\u003ch6\u003e引入\u003c/h6\u003e\n\u003cp\u003eloader 都是三方的 npm 模块， Webpack 并不包含 loader 。\u003c/p\u003e\n\u003ch5\u003ecss-loader\u003c/h5\u003e\n\u003cp\u003e\u003ca href=\"https://www.npmjs.com/package/css-loader\" target=\"_blank\" rel=\"noopener noreferrer\"\u003ecss loader\u003c/a\u003e 仅是处理\n    CSS 的各种加载方法，要想样式起作用还需要安装 \u003ca href=\"https://www.npmjs.com/package/style-loader\" target=\"_blank\"\n        rel=\"noopener noreferrer\"\u003estyle-loader\u003c/a\u003e 。安装：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm i -s css-loader;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003enpm i -s style-loader;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e配置：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.export = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003emodule: {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003erules: [{\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etest:/\\.css$/i,\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003euse:[''style-loader','css-loader']\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}],\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003etest 可接收一个正则表达式或者一个元素为正则表达式的数组，只有正则匹配上的模块才会使用这条规则。在本例中以/\\.css$/来匹配所有以 .css 结尾的文件\u003c/li\u003e\n    \u003cli\u003euse 可接收一个数组，数组包含该规则所使用的 loader \u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e在 Webpack 打包时是按照数组从后往前的顺序将资源交给loader处理的，因此要把最后生效的放在前面。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003eloader options\u003c/h6\u003e\n\u003cp\u003e具体的 loader 需要查看 \u003ca href=\"https://www.npmjs.com/\" target=\"_blank\" rel=\"noopener noreferrer\"\u003enpm\u003c/a\u003e 说明。\u003c/p\u003e\n\u003ch5\u003e其他配置\u003c/h5\u003e\n\u003ch6\u003eexclude 和 include \u003c/h6\u003e\n\u003cp\u003e exclude 与 include 是用来排除或包含指定目录下的模块，可接收正则表达式或者字符串（文件绝对路径），以及由它们组成的数组。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eexclude: /node_modules/, \u003cspan class=\"r\"\u003e// 排除\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003einclude: /src/, \u003cspan class=\"r\"\u003e// 仅包含\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eexclude 和 include 同时存在时， exclude 的优先级更高。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003eresource 和 issuer\u003c/h6\u003e\n\u003cp\u003eresource 和 issuer 可以更加精准的确定模块规则的作用范围。在 Webpack 中，被加载的是 resource ，加载者是 issuer 。\u003c/p\u003e\n\u003cp\u003e下面是对加载项做限定，仅指定目录下可加载 css ：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.export = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003emodule: {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003erules: [{\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003euse:[''style-loader','css-loader'],\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eresource: {\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003etest : /\\.css$/\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eexclude: /node_modules/,\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eissuer: {\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003etest : /\\.js$/\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003einclude: /src/pages/,\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}],\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e},\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eenforce\u003c/h6\u003e\n\u003cp\u003eenforce 用来制定一个 loader 的种类，只接受 “pre” （在所有正常执行的 loader 之前执行）和 “post”（在所有 loader 之后执行） 两种字符串类型的值。\u003c/p\u003e\n\u003ch5\u003ebabel-loader\u003c/h5\u003e\n\u003cp\u003e\u003ca href=\"https://www.npmjs.com/package/babel-loader\" target=\"_blank\" rel=\"noopener noreferrer\"\u003ebabel-loader\u003c/a\u003e\n    将处理 ES6+ 转化为 ES5：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm i -s babel-loader @babel/core @babel/preset-env\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003ets-loader\u003c/h5\u003e\n\u003cp\u003e\u003ca href=\"https://www.npmjs.com/package/ts-loader\" target=\"_blank\" rel=\"noopener noreferrer\"\u003ets-loader\u003c/a\u003e 用于转化\n    Webpack 和 \u003ca href=\"https://www.npmjs.com/package/typescritp\" target=\"_blank\"\n        rel=\"noopener noreferrer\"\u003eTypescript\u003c/a\u003e 模块，其说明文档在 \u003ca href=\"https://github.com/TypeStrong/ts-loader\"\n        target=\"_blank\" rel=\"noopener noreferrer\"\u003egithub\u003c/a\u003e上。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e旧项目引入 ts ，记得去 webpack.config.js 中修改入口文件。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003ehtml-loader\u003c/h5\u003e\n\u003cp\u003e\u003ca href=\"https://www.npmjs.com/package/html-loader\" target=\"_blank\" rel=\"noopener noreferrer\"\u003ehtml-loader\u003c/a\u003e 用于将\n    HTML 文件转换为字符串并进行格式化，这样就可以把一个 HTML 片段加载进来。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm i --save-dev html-loader\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003ehandlebars-loader\u003c/h5\u003e\n\u003cp\u003e\u003ca href=\"https://www.npmjs.com/package/handlebars-loader\" target=\"_blank\"\n        rel=\"noopener noreferrer\"\u003ehandlebars-loader\u003c/a\u003e 用于处理 handlebars 模版。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm i --save-dev handlebars-loader handlebars\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e实际使用中发现，handlebars 引入不能使用 ES6 的 import 引入，而应该使用 commomJS 的 require 引入。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003efile-loader\u003c/h5\u003e\n\u003cp\u003e\u003ca href=\"https://www.npmjs.com/package/file-loader\" target=\"_blank\" rel=\"noopener noreferrer\"\u003efile-loader\u003c/a\u003e\n    用于打包文件类型的资源，并返回 publicPath。\u003c/p\u003e\n\u003ch5\u003eurl-loader\u003c/h5\u003e\n\u003cp\u003e\u003ca href=\"https://www.npmjs.com/package/url-loader\" target=\"_blank\" rel=\"noopener noreferrer\"\u003eurl-loader\u003c/a\u003e 与\n    file-loader 作用类似，唯一的不同在于用户可以设置一个文件大小的阈值，当大于该阈值时与 file-loader 一样返回 publicPath，而小于该阈值时则返回文件 base64\n    形式编码。\u003c/p\u003e\n\u003ch5\u003evue-loader\u003c/h5\u003e\n\u003cp\u003e\u003ca href=\"https://www.npmjs.com/package/vue-loader\" target=\"_blank\" rel=\"noopener noreferrer\"\u003evue-loader\u003c/a\u003e用于处理\n    vue 模块， \u003ca href=\"https://vue-loader-v14.vuejs.org/zh-cn/\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e说明文档\u003c/a\u003e内有更细的说明。\n\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e自定义 loader\u003c/summary\u003e\n    \u003ch5\u003eloader 初始化\u003c/h5\u003e\n    \u003cp\u003e借助 npm 的如安链功能进行本地调试，\u003c/p\u003e\n    \u003cp\u003e在头部添加 'use strict' 以启动严格模式。\u003c/p\u003e\n\n\u003c/details\u003e","pageTitle":"node ✈︎✈︎ NodeJs ✈︎✈︎ webpack","title":"预处理器"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["node","NodeJs","webpack","预处理器"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
