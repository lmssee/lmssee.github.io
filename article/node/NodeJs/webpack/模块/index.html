class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>模块</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003ecommonJS\u003c/h5\u003e\n\u003cp\u003e2009 年提出的包含模块、文件、IO、控制台在哪的一系列标准。在 Node.js 中实现了采用 CommonJS 标准的一部分。\u003c/p\u003e\n\u003cp\u003e每一个模块有自己单独的作用域。\u003c/p\u003e\n\u003ch6\u003e导出\u003c/h6\u003e\n\u003cp\u003e通过 module.exports 导出模块中的内容：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.exports = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ea:''\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eb:function()\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log(this.a);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003erequire\u003c/h6\u003e\n\u003cp\u003e通过 require 模块进行模块导入，require 模块仅被执行一次。\u003c/p\u003e\n\u003ch5\u003eES6 Module\u003c/h5\u003e\n\u003cp\u003e在 2015 年提出了 Module ，将 import 和 export 作为保留字加入。ES6 Modules 会自动采用严格模式。\u003c/p\u003e\n\u003ch6\u003e导出\u003c/h6\u003e\n\u003cp\u003e导出分为命名导出和默认导出。\u003c/p\u003e\n\u003cp\u003e在声明时导出：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eexport const Pai = 3.1415926 \u003cspan class=\"r\"\u003e// 命名导出\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eexport default 'i am a string of this module default export';\u003cspan class=\"r\"\u003e//\n            默认导出\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e先声明后导出：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econst Pai = 3.1415926;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econst Str = \"i am a feihua\";\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eexport {Pai , Str};\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e与命名导出不一样，默认导出只有一个。\u003c/p\u003e\n\u003ch6\u003e导入\u003c/h6\u003e\n\u003cp\u003e使用 import 进行导入。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e导入命名导出模块时， import 后面要跟一个 {} 将导入的变量名抱起来; \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eimport {a ,b } from 'model';\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/li\u003e\n    \u003cli\u003e还可以通过 as 关键字对导入的变量重命名 \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eimport {a ,b as c } from 'model';\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/li\u003e\n    \u003cli\u003e在导入多个变量可以使用批量导入 \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eimport * as allModel from 'model';\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/li\u003e\n    \u003cli\u003e对于默认导出， import 后直接跟变量名，并且该名可以自由指定： \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eimport {default as a, b} from 'modelA';\u003c/span\u003e\n            \u003cspan class=\"p\"\u003eimport c ,{d} from 'modelC';\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e复合写法\u003c/h5\u003e\n\u003cp\u003e在将一个模块导入后立即导出：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eexport {a,b} from 'modelA';\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e复合写法只针对命名导出，默认导出需要先导入后导出。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003eCommonJS 和 ES6 的区别\u003c/h5\u003e\n\u003ch6\u003e动态与静态\u003c/h6\u003e\n\u003cp\u003eCommonJS 与 ES6 Module\n    最本质的区别在于前者对模块依赖的解决是“动态的”，而后者是“静态的”。在这里“动态”的含义是，模块依赖关系的建立发生在代码运行阶段；而“静态”则是模块依赖关系的建立发生在代码编译阶段。\n\u003c/p\u003e\n\u003cp\u003e require 的模块路径可以动态指定，支持传入一个表达式，我们甚至可以通过 if 语句判断是否加载某个模块。因此，在 CommonJS 模块被执行前，并没有办法确定明确的依赖关系，模块的导入、导出发生在代码的运行阶段。\n\u003c/p\u003e\n\u003cp\u003eES6 Module 的导入、导出语句都是声明式的，它不支持导入的路径是一个表达式，并且导入、导出语句必须位于模块的顶层作用域（比如不能放在 if 语句中）。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e死代码检测和排除。我们可以用静态分析工具检测出哪些模块没有被调用过。比如，在引入工具类库时，工程中往往只用到了其中一部分组件或接口，但有可能会将其代码完整地加载进来。未被调用到的模块代码永远不会被执行，也就成为了死代码。通过静态分析可以在打包时去掉这些未曾使用过的模块，以减小打包资源体积\n    \u003c/li\u003e\n    \u003cli\u003e模块变量类型检查。 JavaScript 属于动态类型语言，不会在代码执行前检查类型错误（比如对一个字符串类型的值进行函数调用）。 ES6 Module 的静态模块结构有助于确保模块之间传递的值或接口类型是正确的\n    \u003c/li\u003e\n    \u003cli\u003e编译器优化。在 CommonJS 等动态模块系统中，无论采用哪种方式，本质上导入的都是一个对象，而 ES6 Module 支持直接导入变量，减少了引用层级，程序效率更高\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e值拷贝与动态映射\u003c/h6\u003e\n\u003cp\u003e在导入一个模块时，对于 CommonJS 来说获取的是一份导出值的拷贝；而在 ES6 Module 中则是值的动态映射，并且这个映射是只读的。\u003c/p\u003e\n\u003cp\u003e简单说，就像简单值和引用值的关系。\u003c/p\u003e\n\u003ch5\u003e非模块化文件\u003c/h5\u003e\n\u003cp\u003e直接导入即可。\u003c/p\u003e\n\u003ch5\u003eAMD\u003c/h5\u003e\n\u003cp\u003eAMD （异步模块）采用 define 函数来定义模块：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003edefine('ID', ['modelA'] , function(a){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereturn function(b,c){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log(`sum: ${modelA.add(b + c)}`);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e});\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在AMD中使用define函数来定义模块，它可以接受3个参数。第1个参数是当前模块的id，相当于模块名；第2个参数是当前模块的依赖，比如上面我们定义的getSum模块需要引入calculator模块作为依赖；第3个参数用来描述模块的导出值，可以是函数或对象。如果是函数则导出的是函数的返回值；如果是对象则直接导出对象本身。\n\u003c/p\u003e\n\u003cp\u003e导入：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003erequire(['ID'],function(ID){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eID(2,3);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e});\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003enpm 模块\u003c/h5\u003e\n\u003cp\u003e使用 npm 导入方法导入：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003enpm i -s {model name};\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"node ✈︎✈︎ NodeJs ✈︎✈︎ webpack","title":"模块"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["node","NodeJs","webpack","模块"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
