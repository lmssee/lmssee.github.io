\u003cspan class=\"p4\"\u003ee.emit('connection'); \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log('over'); \u003c/span\u003e\n\u003c/code\u003e","pageTitle":"node ✈︎✈︎ NodeJs ✈︎✈︎ 语法","title":"事件"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["node","NodeJs","语法","事件"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
