="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>中间件</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e插件\u003c/h5\u003e\n\u003cp\u003e在 express 中使用 app.use 向管道中插入中间件。中间件是封装的、一般有三个参数（req，res，next）的函数。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e路由处理器是特殊的中间件\u003c/li\u003e\n    \u003cli\u003e路由的第一个参数必须是路径\u003c/li\u003e\n    \u003cli\u003e中间件的回调函数一般有 2、3、4 个参数\u003c/li\u003e\n    \u003cli\u003e如果不调用 next()，管道就会终止。若没有给客户端返回值，该请求就会超时\u003c/li\u003e\n    \u003cli\u003e一旦调用了中间件，则应避免多次响应（给客户端返回值），而后续的响应（给客户端的返回值）将会被忽略\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eimport express from express;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ecosnt app = express();\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eqpp.use((req,res,next)=\u003e{ \u003cspan class=\"r\"\u003e// 匹配所有的路由，如果不调用 next()，直接 over\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(req.url);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e})\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eapp.get('/home',(req,res)=\u003e{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eres.send('i am a page , my name is home !');\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e});\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eapp.use((err,req,res,next)=\u003e{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(`未知错误，${err.message}`);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eres.send('你无权访问！！！');\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e});\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eapp.use((req,res)=\u003e{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(`有个家伙访问了为止 api （${req.url}）`);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e});\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e模块可以是导出的函数，而中间件又必须是一个函数。所以，我们可以导出一个符合中间件的模块。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emodule.exprots = function(req,res,next){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar userName = req.session.uerName\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eif( !userName ) return next(); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e常见中间件\u003c/summary\u003e\n    \u003ctable id=\"Aa\"\u003e\n        \u003ctr\u003e\n            \u003cth width=\"20%\"\u003e中间件\u003c/th\u003e\n            \u003cth width=\"20%\"\u003e所属中间件\u003c/th\u003e\n            \u003cth\u003e简介\u003c/th\u003e\n        \u003c/tr\u003e\n    \u003c/table\u003e\n\u003c/details\u003e\n\n\u003cscript\u003e\n    let Aa = [\n        ['connect', '', ''],\n        ['basicAuth', 'connect', '提供简单的访问权限。仅在 https 下才能使用 basic-auth'],\n        ['directory', 'connect', '提供简单的静态文件的目录清单支持'],\n        ['body-parser', '', '只连接 json 和 urlencoded 的便利中间件\u003cbr /\u003e除非有单独的需求需要安装 json 和 urlenceded ，否则使用该包'],\n        ['json', '', '解析 JSON 编码的请求体。大多数的 API 仍然使用 application/w-xxx-form-urlencoded ，这种编码可以被 urlencoded 中间件解析，但 json 可以 让程序更加健壮'],\n        ['urlencoded', '', '解析互联网媒体类型为 application/x-www-form-urlencoded 请求体。这是处理表单和 AJAX 的最常用方式'],\n        ['compress', '', '用 gzip 压缩响应数据。唯一应该出现在 compress 之前的中间件只有 debugging 或 logging'],\n        ['cookie-parser', '', 'cookie 插件，用于给客户端发送 cookie 信息'],\n        ['cookie-session', '', '提供 cookie 储存的绘画支持'],\n        ['express-session', '', '提供会话 ID 的支持。默认储存在内存里，不适合生产环境，并且可以配置为使用为数据库储存'],\n        ['csurf', '', '防范跨域请求伪造（CSRF）攻击。需要使用会话，所以必须放在 expression-session 后面。他等同于 connect.csrf 中间件，单子这个中间件没什么效'],\n        ['errorhandler', '', '提供 favicon ，网站图标'],\n        ['static-favicon', '', '为客户端提供栈追踪和错误的信息，不要再生产环境使用。'],\n        ['morgan', '', '提供自动的日志记录支持，所有请求都被记录'],\n        ['method-override', '', '提供对 x-http-method-override 请求头的支持。允许浏览器 “假装”使用除 get 和 post 之外的 http 方法'],\n        ['query', '', '解析查询字符串，并将请求对象上的 query 属性。（默认存在于 wxpress）'],\n        ['response-time', '', '向响应头中添加 X-Response-Time 请求头，提供以毫秒为单位的响应时间。一般在做性能调优时才需要用'],\n        ['static', '', '提供对静态文案进的支持。这个中间件可以连入多次，并可指定不同的目录'],\n        ['vhost', '', '虚拟主机，使得更好管理子域名'],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"node ✈︎✈︎ NodeJs ✈︎✈︎ express","title":"中间件"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["node","NodeJs","express","中间件"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
