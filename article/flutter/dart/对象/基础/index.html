    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e对象\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e封装：封装是对象和类概念的主要特性。把客观的事务封装成抽象的类，并且把自己的部分属性和方法提供给其他对象使用；\u003c/li\u003e\n    \u003cli\u003e继承：是一种能力：它可使用现有类的功能；\u003c/li\u003e\n    \u003cli\u003e多态：允许将子类的指针赋值给父类的指针，同一个函数掉用会有不同的效果；\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003edart 是一门使用类和单继承的对象语言，所有的对象都是类的实例，并且所有的类都是 Object 的子类。\u003c/p\u003e\n\u003ch5\u003e定义\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eclass PrintSome{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eString name = \"张三\";\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eint age = 22;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evoid printOut(){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eprint(\"${this.name} + ${this.age}\");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e实例化\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eclass PrintSome{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eString name = \"张三\";\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eint age = 22;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evoid printOut(){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eprint(\"${this.name} + ${this.age}\");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePrintSome printSome = new PrintSome();\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e使用\u003c/h5\u003e\n\u003cp\u003e类实例化后就是 js 的对象，可通过调用方式（.）调用。\u003c/p\u003e\n\u003ch5\u003e构造函数\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eclass PrintSome{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eString name = \"张三\";\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eint age = 22;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evoid printOut(){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eprint(\"${this.name} + ${this.age}\");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePrintSome printSome = new PrintSome();\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprintSome.printOut();\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e构造函数\u003c/h5\u003e\n\u003cp\u003e构造函数，类似于 js 中的 class 的 constructor 方法。意思就是实例化的时候可传入（也可以不传入，具体看构造器怎么定义）参数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eclass PrintSome{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ePrintSome(name,age){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.name = name;\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.age = age;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eString name\";\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eint age;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evoid printOut(){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eprint(\"${this.name} + ${this.age}\");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePrintSome tom = new PrintSome('Tom',24);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e若构造函数仅是赋值：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eclass PrintSome{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ePrintSome(this.name,this.age);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eString name\";\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eint age;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evoid printOut(){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eprint(\"${this.name} + ${this.age}\");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePrintSome tom = new PrintSome('Tom',24);\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e构造函数可以写多个，即是下面的命名构造函数。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e命名构造函数\u003c/h5\u003e\n\u003cp\u003e二级构造函数：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eclass PrintSome{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ePrintSome(this.name,this.age);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ePrintSome.time(){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn (new Date.now()).toString();\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eString name\";\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eint age;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evoid printOut(){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eprint(\"${this.name} + ${this.age}\");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePrintSome tom = new PrintSome('Tom',24);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e私有\u003c/h5\u003e\n\u003cp\u003e在属性或方法前加 _ ，且该类是通过 import 引用类；\u003c/p\u003e\n\u003ch5\u003egetter 方法\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eclass SumTwo{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003enum a;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003enum b;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eSumTwo(this.a,this.b);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eget v{\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn this.a + this.b;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(new SumTwo(1 , 2).v); \u003cspan class=\"r\"\u003e // 3\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003esetter\u003c/h5\u003e\n\u003cp\u003e通过 set 设定属性值：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eclass SumTwo{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003enum a;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003enum b;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eSumTwo(this.a,this.b);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eset v(value){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.a = value;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar a = new SumTom(1,2);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ea.v = 6\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(a.a); \u003cspan class=\"r\"\u003e // 6\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e初始化实例化\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eclass SumTwo{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003enum a;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003enum b;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eSumTwo():a = 10, b = 20{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"flutter ✈︎✈︎ dart ✈︎✈︎ 对象","title":"基础"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["flutter","dart","对象","基础"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
