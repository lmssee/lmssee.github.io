    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e算术运算符\u003c/h5\u003e\n\u003cp\u003e+ 、 - 、 * 、 / 、 %（取余） 、 ~/（取整） \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar a = 10 , b = 3;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(a + b) ; \u003cspan class=\"r\"\u003e// 13\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(a - b); \u003cspan class=\"r\"\u003e// 7\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(a \u003e b); \u003cspan class=\"r\"\u003e// true\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(a \u003c b); \u003cspan class=\"r\"\u003e// false\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(); \u003cspan class=\"r\"\u003e// \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e关系运算符\u003c/h5\u003e\n\u003cp\u003e== 、 != 、 \u0026lt; 、 \u0026gt; 、 \u0026lt;= 、 \u0026gt;=\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e不同于 js 中的 == ， dart 中的 == 会判断类型是否相同，也就是说，字符串的 \"1\" 和数值 1 并不相等。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003eprint(\"1\" == 1); \u003cspan class=\"r\"\u003e// false\u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/div\u003e\n\u003ch5\u003e逻辑运算符\u003c/h5\u003e\n\u003cp\u003e! （非） 、 \u0026\u0026 （且）、 || （或）\u003c/p\u003e\n\u003ch5\u003e基础赋值运算符\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e= 赋值\u003c/li\u003e\n    \u003cli\u003e??= 若为空则给值\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003evar str = 'a have value';\u003c/span\u003e\n            \u003cspan class=\"p\"\u003estr ??= 'new value'; \u003cspan class=\"r\"\u003e//str == 'a have value'\u003c/span\u003e \u003c/span\u003e\n            \u003cspan class=\"p\"\u003evar i;\u003c/span\u003e\n            \u003cspan class=\"p\"\u003ei ??= 10; \u003cspan class=\"r\"\u003e// i == 10\u003c/span\u003e\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e复合赋值运算符\u003c/h5\u003e\n\u003cp\u003e+= 、 -= 、 *= 、 /= 、 %= 、 ~/= 、 ++ 、 --\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar a = 1;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(a++); \u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(++a); \u003cspan class=\"r\"\u003e// 3\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e三目运算符\u003c/h5\u003e\n\u003cp\u003e?:\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e 1 \u003e 2 ? \" 1 大于 2 \" : \" 1 不大于 2\" \u003cspan class=\"r\"\u003e// 1 不大于 2\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e神奇（避空）运算符 ??\u003c/h5\u003e\n\u003cp\u003e当 ?? 左侧为 null 时，将右边的值给出。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eint ?a, b = 3;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ea ??= 5;\u003cspan class=\"r\"\u003e// a == 5 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eb ??= 5;\u003cspan class=\"r\"\u003e// b == 3\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e另一种用法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eprint(1 ?? 3);\u003cspan class=\"r\"\u003e// 1\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(null ?? 1);\u003cspan class=\"r\"\u003e// 1\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e感觉有点 js 中 \u0026\u0026 的味道\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e条件属性\u003c/h5\u003e\n\u003cp\u003e在属性调用前添加 ? ，可以使用安全属性调用模式：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003elmObject?.mi; \u003cspan class=\"r\"\u003e// 等同于下面的使用方式\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e(lmObject != null) ? lmObject.mi : null;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e也可以在表达式中连续使用 ?. 以达到安全使用属性的目的。\u003c/p\u003e","pageTitle":"flutter ✈︎✈︎ dart ✈︎✈︎ 基础","title":"运算符"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["flutter","dart","基础","运算符"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
