                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e分类\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003eint 整型\u003c/li\u003e\n    \u003cli\u003edouble 浮点类型\u003c/li\u003e\n    \u003cli\u003eString 字符串类型\u003c/li\u003e\n    \u003cli\u003ebool 布尔类型\u003c/li\u003e\n    \u003cli\u003eList 数组类型\u003c/li\u003e\n    \u003cli\u003eMaps 对象类型\u003c/li\u003e\n    \u003cli\u003eRunes 用不到的类型\u003c/li\u003e\n    \u003cli\u003eSymbols 用不到的类型 ++ \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eString\u003c/h5\u003e\n\u003cp\u003e定义出字符串类型的数据，可同其他编程语言，使用双单引号、双双引号，也可使用三对单引号、三对双引号定义可换行的字符串。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eString str = 'lmssee';\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eString str1 = \"lmssee\";\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eString str2 = ''' lm \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ess\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e ee '''; \u003cspan class=\"r\"\u003e// 三个引号可换行\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e数据拼接\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evoid main(){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eString a = 'a';\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eString b = 'b';\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eprint(\"$a $b\");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eprint(\"$a $b\");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eprint(a + b);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e方法\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003e\n                isEmpty\n            \u003c/summary\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eint\u003c/h5\u003e\n\u003cp\u003e整型数据类型:\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eint numberI = 123;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(numberI); \u003cspan class=\"r\"\u003e// 123\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eint numberII = 123.1; \u003cspan class=\"r\"\u003e// 直接 err\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003edouble\u003c/h5\u003e\n\u003cp\u003e浮点型数据类型：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003edouble numberD = 10, numberE = 10.0; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(numberD); \u003cspan class=\"r\"\u003e// 10.0\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(numberE); \u003cspan class=\"r\"\u003e// 10.0\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003ebool\u003c/h5\u003e\n\u003cp\u003e布尔类型，值仅且包括 true 、 false：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ebool a = true ;\u003c/span\u003e\n\u003c/code\u003e\n\n\u003ch5\u003e类型判断 is\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eif(obj is Map){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eprint('obj is a Map data');\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e} else if(obj is String){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eprint('obj is a Sting data');\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"flutter ✈︎✈︎ dart ✈︎✈︎ 基础","title":"数据类型"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["flutter","dart","基础","数据类型"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
