    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e形参可声明类型\u003c/h5\u003e\n\u003cp\u003e在声明函数的同时，可以对参数进行类型声明。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eint printSome(int a){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereturn a;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e可选参数\u003c/h5\u003e\n\u003cp\u003e可选参数永远在方法参数最后面。如果没有值，默认为 null ，放尾部：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evoid printSome(String name, [int age = 0 ,String sex = '']){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar v =\"姓名： $name\" + (age == 0 ? '' : '；年龄：$age') + (sex == '' ? '' : '；性别：$sex');\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eprint(v);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprintSome('Tom'); \u003cspan class=\"r\"\u003e// 姓名：Tom\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprintSome('Tom' , 20); \u003cspan class=\"r\"\u003e// 姓名：Tom ;年龄：20\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprintSome('Tom' , 20 , '男'); /** 姓名：Tom ;年龄：20 ；性别： 男*/\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e命名参数\u003c/h5\u003e\n\u003cp\u003e给参数命名，类似于可选参数，当你没有给值，依旧是 null：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evoid printSome(String name, {int age = 0 ,String sex = ''}){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar v =\"姓名： $name\" + (age == 0 ? '' : '；年龄：$age') + (sex == '' ? '' : '；性别：$sex');\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eprint(v);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprintSome('Tom'); \u003cspan class=\"r\"\u003e // 姓名：Tom\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprintSome('Tom' , age:20); \u003cspan class=\"r\"\u003e// 姓名：Tom ;年龄：20\u003c/span\u003e\u
