                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e追加元素\u003c/h5\u003e\n\u003cp\u003e不同于 js 的 push ， list 使用 add 方法在数据的尾部追加元素，但无法给 const 定义的 list 、通过 List 的 filled 方法创建的list 追加元素。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar a =\u0026lt;int\u0026gt;[0,1,2];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(a.length); \u003cspan class=\"r\"\u003e// 3\u003c/span\u003e/span\u003e\n        \u003cspan class=\"p\"\u003ea.add(3);\u003c/span\u003e\n        \u003cspan class=\"p\"\u003eprint(a.length); \u003cspan class=\"r\"\u003e// 4\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e追加 list\u003c/h5\u003e\n\u003cp\u003e使用 addAll 来给原 list 一次增加多个元素。类似于 js 中 Array 的 concat 功能，但是会作用域原 list ，且没有返回值，会报错。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar arr = [ 1 , 2 , 3 ];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e// [1 , 2 , 3]\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003earr.addAll([4 ,5 ,6]);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e// [1 , 2 , 3 , 4 , 5 , 6] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e变成 list \u003c/h5\u003e\n\u003cp\u003e使用 toList 方法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar arr = [0 ,1 ,2 ];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr);\u003cspan class=\"r\"\u003e// [0 ,1 ,2 ] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar rra = arr.reversed;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr);\u003cspan class=\"r\"\u003e// [0 ,1 ,2 ] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(rra); \u003cspan class=\"r\"\u003e//(2 ,1 ,0 ) \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e查找 indexOf\u003c/h5\u003e\n\u003cp\u003e查找到参数的元素，返回对应的下标；若查找不到，则返回 -1；\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar arr = [0 , 1 , 2 , 3 ];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr.indexOf(2)); \u003cspan class=\"r\"\u003e // 3 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr.indexOf(4)); \u003cspan class=\"r\"\u003e // -1 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e移除元素 remove\u003c/h5\u003e\n\u003cp\u003eremove 是直接作用于原 list 的元素，参数为元素值。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar arr = [ 1 ,2 ,3];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003earr.remove(2);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e print(arr); \u003cspan class=\"r\"\u003e // [ 1 , 3] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e移除元素 removeAt\u003c/h5\u003e\n\u003cp\u003eremoveAt 是直接作用于原 list 的元素，参数为元素下标。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar arr = [1 ,2 ,3];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003earr.removeAt(2);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e print(arr); \u003cspan class=\"r\"\u003e // [ 1 , 2] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e替换 fillRange\u003c/h5\u003e\n\u003cp\u003e将 list 的区间值改成某一相同值：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar arr = [1 , 2 , 3 , 4 , 5 , 6, 7 ];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e // [1 , 2 , 3 , 4 , 5 , 6 , 7 ] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003earr.fillRange(2,4,0); \u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e // [1 , 2 , 0 , 0 , 5 , 6 , 7 ] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e插入 insert\u003c/h5\u003e\n\u003cp\u003e在指定的下标前插入新的元素：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar arr = [1 , 2 , 3 , 4 , 5 , 6, 7 ];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e // [1 , 2 , 3 , 4 , 5 , 6 , 7 ] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003earr.insert(2,4); \u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e // [1 , 2 , 4 , 3 , 4 , 5 , 6 , 7 ] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e插入多个 insertAll\u003c/h5\u003e\n\u003cp\u003e插入一个新的 list 在指定的下标之前：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar arr = [1 , 2 , 3 , 4 , 5 , 6, 7 ];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e // [1 , 2 , 3 , 4 , 5 , 6 , 7 ] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003earr.insertAll(2 ,[ 9 , 8 , 7 ]); \u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e // [1 , 2 , 9 , 8 , 7 , 3 , 4 , 5 , 6 , 7 ] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e转换成字符串 join\u003c/h5\u003e\n\u003cp\u003e类似于 js 的 array 的 join ：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar arr = [1 , 2 , 3 , 4 , 5 , 6, 7 ];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e // [1 , 2 , 3 , 4 , 5 , 6 , 7 ] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar en = arr.join(\"-\"); \u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e // [1 , 2 , 3 , 4 , 5 , 6 , 7 ] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(en); \u003cspan class=\"r\"\u003e // 1-2-3-4-5-6-7 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e转化为 list split\u003c/h5\u003e\n\u003cp\u003e类似于 js 的 array 的 split ：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar arr =\"1-2-3-4-5-6-7\";\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e // \"1-2-3-4-5-6-7\"\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar en = arr.split(\"-\"); \u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(arr); \u003cspan class=\"r\"\u003e // 1-2-3-4-5-6-7 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprint(en); \u003cspan class=\"r\"\u003e // [1 , 2 , 3 , 4 , 5 , 6 , 7 ] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e遍历\u003c/h5\u003e\n\u003cp\u003eforEach 、 map 、every 、where 、any\u003c/p\u003e","pageTitle":"flutter ✈︎✈︎ dart ✈︎✈︎ list","title":"方法"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["flutter","dart","list","方法"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
