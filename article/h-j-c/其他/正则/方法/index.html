    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 比较各种匹配的方法 \u003c/h5\u003e\n\u003ctable id=\"td_a\"\u003e\n    \u003ccaption\u003e 比较各种模式匹配的方法 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 方法 \u003c/th\u003e\n        \u003cth\u003e 所属对象 \u003c/th\u003e\n        \u003cth\u003e 参数 \u003c/th\u003e\n        \u003cth\u003e 返回值 \u003c/th\u003e\n        \u003cth\u003e 通用性 \u003c/th\u003e\n        \u003cth\u003e 特殊性 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var td_a = [\n        [\"exec \", \"  正则表达式  \", \"  字符串  \", \"  匹配结果的数组，如果没有找到，返回值为  null\", \"  通用强大  \", \"  一次只能匹配一个单元，并提供详细的返回信息  \"],\n        [\"test \", \"  正则表达式  \", \"  字符串  \", \"  布尔值，表示是否匹配  \", \"  快速验证  \", \"  一次只能匹配一个单元，返回信息与  exec()   基本类似  \"],\n        [\"compile\", \"  正则表达式  \", \"  正则表达式  \", \"\", \"  在脚本执行过程中改变或重新编译正则表达式  \", \"\"],\n        [\"search \", \"  字符串  \", \"  正则表达式  \", \"  匹配起始位置，如果没有找到匹配的字符串，则返回  -1\", \"  简单字符定位  \",\n            \"  不执行全局匹配，将忽略标志  g  ，也会忽略正则表达式的  lastIndex  属性  \"\n        ],\n        [\"match \", \"  字符串  \", \"  正则表达式  \", \"  匹配的数组，或者匹配信息的数组  \", \"  常用字符串匹配方法  \", \"  将根据全局标志  g  决定是否全局匹配  \"],\n        [\"replace \", \"  字符串  \", \"  正则表达式，或替代文本  \", \"  返回替代后的新字符串  \", \"  匹配替代操作  \", \"  可以支持替代函数，同时可以获取过呢更多匹配信息  \"],\n        [\"split \", \"  字符串  \", \"  正则表达式   分隔符号  \", \"  返回数组  \", \"  特殊用途  \", \"  把字符串分割为字符串数组  \"]\n    ];\n    _MiMethod.td(\"td_a\")\n\u003c/script\u003e\n\u003ch5\u003eRegExp 对象的方法 \u003c/h5\u003e\n\u003ch6\u003eexec 方法 \u003c/h6\u003e\n\u003cp\u003e 用正则表达式模式在字符串中运行查找，并返回包含该查找结果的一个数组 \u003c/p\u003e\n\u003cp\u003e 语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eRegExp.exec(str)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eRegExp ：必选项。包含正则表达式模式和可用标志的正则表达式对象。 \u003c/p\u003e\n\u003cp\u003estr ：必选项。要在其中执行查找的 String 对象或字符串文字。 \u003c/p\u003e\n\u003cp\u003e 返回值：如果 exec 方法没有找到匹配，则它返回 null 。如果它找到匹配，则 exec 方法返回一个数组，并且更新全局 RegExp 对象的属性，以反映匹配结果。数组的 0 元素包含了完整的匹配，而第 1 到 n\n    个元素中包含的是匹配中出现的任意一个子匹配。这相当于没有设置全局标志（ g ）的 match 方法。 \u003c/p\u003e\n\u003cp\u003e 如果为正，则表达式设置了全局标志， exec 从以 lastIndex 的值指示的位置开始查找。如果没有设置全局标志， exec 忽略 lastIndex 的值，从字符串的起始位置开始搜索。 \u003c/p\u003e\n\u003cp\u003eexec 方法返回的数组有三个属性，分别是 input 、 index 和 lastIndex 。 input 属性包含了整个被查找的字符串。 index 属性中包含了整个被查找字符串中被匹配的子字符串的位置。\n    lastIndex 属性中包含了最后一次匹配中最后一个字符的下一个位置。 \u003c/p\u003e\n\u003cp\u003e 在非全局模式下， exec() 方法返回的数组与 String.match() 返回的值相同。全局模式下，返回结果不同。当调用 exec() 方法时，会为正则表达式对象定义 lastIndex\n    属性，指定执行下次匹配的起始位置，同时返回匹配到的数组，与非全局模式下的数组结构相同，而 String,match() 方法仅返回匹配文本组成的数组，没有附加信息。因此，全局模式下获取完整的匹配信息只能用 exec() 。\n\u003c/p\u003e\n\u003cp\u003e 在 exec() 方法找到了与表达式相匹配的文本后，会重置 lastIndex 属性为匹配文本的最后一个字符下标位置 +1 ，为下次匹配的起始位置。因此，通过反复调用 exec()\n    方法可以遍历字符串，实现全局的匹配操作，如果找不到匹配文本，将返回 null ，并重置 lastIndex 为 0 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript\"; \u003cspan class=\"r\"\u003e// 测试使用的字符串直接量 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        r = /\\w/g; \u003cspan class=\"r\"\u003e// 匹配模式 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ewhile ((a = r.exec(s))) {\n        \u003cspan class=\"r\"\u003e// 循环执行匹配操作 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log(\" 匹配文本 = \" + a[0] + \" a.index = \" + a.index + \" r.lastIndex = \" + r.lastIndex);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 显示每次匹配操作后返回的数组信息 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003etest 方法 \u003c/h6\u003e\n\u003cp\u003e 返回一个 Boolean 值，它指出在被查找的字符串中是否存在模式。 \u003c/p\u003e\n\u003cp\u003e 语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eRegexp.test(str)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eRegexp ：必选项。包含正则表达式模式或可用标志的正则表达式对象。 \u003c/p\u003e\n\u003cp\u003estr ：必选项。要在其上测试查找的字符串。 \u003c/p\u003e\n\u003cp\u003e 返回值： test 方法检查在字符串中是否存在一个模式，如果存在，则返回 true ，否则就返回 false 。全局 RegExp 对象的属性不由 test 方法来修改。 \u003c/p\u003e\n\u003cp\u003e 在全局模式下， test （）等价于 exec （）方法。配合循环语句，它们能够迭代字符串，执行全局匹配操作， test （）返回布尔值， exec （）返回数组或者 null 。虽然， test\n    （）方法返回值是布尔值，但是通过正则表达式对象的属性和 RegExp 静态属性，依然可以获得每次迭代操作的匹配信息。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar s = \"JavaScript\";\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar r = /\\w/g;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewhile(r.test(s)){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(\" 匹配文本 = \" + RegExp.lastMatch + \"r.lastIndex = \" + r.lastIndex);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003ematch 方法 \u003c/h6\u003e\n\u003cp\u003e 使用正则表达式模式对字符串执行查找，并将包含查找的结果作为数组返回 \u003c/p\u003e\n\u003cp\u003e 语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003estringObj.match(RegExp)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003estringObj ：必选项，对其进行查找的 String 对象或字符串文字。 \u003c/p\u003e\n\u003cp\u003eRegExp ：必选项，为包含正则表达式模式和可用标志的正则表达式对象，也可以是包含正则表达式模式和可用标志的变量名或字符串文字。 \u003c/p\u003e\n\u003cp\u003e 返回值：如果 match 方法没有找到匹配，返回 null 。如果找到匹配，返回一个数组并且更新全局 RegExp 对象的属性以反映匹配结果。 \u003c/p\u003e\n\u003cp\u003ematch 方法返回的数组有三个属性： input 、 index 和 lastIndex 。 input 属性包含整个被查找的字符串。 index 属性包含了在整个被查找字符串中被匹配的子字符串的位置。 lastIndex\n    属性包含了最后一次匹配中最后一个字符的下一个位置。 \u003c/p\u003e\n\u003cp\u003e 如果没有设置全局标志（ g ），数组的 0 元素包含整个匹配，而第 1 到 n 个元素包含了匹配中曾出现过的任意一个子匹配。这相当于没有设置全局标志的 exec 方法。如果设置了全局标志，元素 0 到 n 中包含所有匹配。\n\u003c/p\u003e\n\u003ch6\u003esearch 方法 \u003c/h6\u003e\n\u003cp\u003e 返回与正则表达式查找内容匹配的第一个子字符串的位置。 \u003c/p\u003e\n\u003cp\u003e 语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003estringObj.search(RegExp)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003estringObj ：必选项，要在其上进行查找的 String 对象或字符串文字。 \u003c/p\u003e\n\u003cp\u003eRegExp ：必选项，包含正则表达式模式和可用标志的正则表达式对象。 \u003c/p\u003e\n\u003cp\u003e 返回值： search 方法指明是否存在相应的匹配。如果找到一个匹配， search 方法将返回一个整数值，指明这个匹配距离字符串开始的偏移位置。如果没有找到匹配，则返回 -1 。 \u003c/p\u003e\n\u003ch6\u003ereplace 方法 \u003c/h6\u003e\n\u003cp\u003ereplace 方法使用正则表达式模式对字符串执行搜索，并对搜索到的内容用指定的字符串替换，返回一个字符串对象，包含了替换后的内容 \u003c/p\u003e\n\u003cp\u003e 语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ereplace(RegExp.replaceText) \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eRegExp ：搜索时要使用的表达式对象。如果是字符串，不按正则表达式的方式进行模糊搜索，而进行精确搜索。 \u003c/p\u003e\n\u003cp\u003ereplaceText ：用于替换搜索到的内容的字符串，其中可以使用一些特殊的字符组合来表示匹配变量。其中，＄＆是整个表达式模式在被搜索字符串中所匹配的字符串，＄是表达式模式在被搜索字符串中所匹配的字符串左边的所有内容，＄ '\n    是表达式模式在被搜索字符串中所匹配的字符串右边的所有内容，＄＄则是普通意义的 \" ＄ \" 字符。 \u003c/p\u003e\n\u003cp\u003e 说明　＄ 1... ＄ 9 分别是第 1 个到第 9 个子匹配所捕获到的内容，＄ 01... ＄ 99 分别是第 1 个到第 99 个子匹配所捕获到的内容。当＄ n 和＄ nn （ n\n    为正整数）在表达式中没有对应的子匹配时，将被解释成普通字符。 \u003c/p\u003e\n\u003ch6\u003esplit 方法 \u003c/h6\u003e\n\u003cp\u003e 该方法返回按照某种分割标志符将一个字符串拆分为若干个子字符串时所产生的子字符串数组。 \u003c/p\u003e\n\u003cp\u003e 语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003esplit([separator[,limit]]);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eseparator ：分割标志符参数，可以是多个字符或一个正则表达式，并不作为返回数组元素的一部分。 \u003c/p\u003e\n\u003cp\u003elimit ：限制返回元素的个数。 \u003c/p\u003e\n\u003ch6\u003e 再编译 \u003c/h6\u003e\n\u003cp\u003e 使用正则表达式的 compile() 方法，能够重新编译正则表达式。这样就可以在执行过程中动态修改正则表达式的匹配模式。 \u003c/p\u003e\n\u003cp\u003ecompile() 方法与 RegExp （）构造函数的用法相同 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eregexp.compile(regexp,modifier)\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 参数 regexp 便是正则表达式对象，或者匹配模式字符串、当第 1 个参数为匹配模式字符串时，可以设置第 2 个参数 modifier ，使用它的定义的匹配类型，如 \" g \" 、 \" i \" 、 \" gi \" 。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar s = \"JavaScript\";\u003c/span\u003e\u003cspan class=\"p\"\u003evar r = /\\w/g;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003ewhile(r.test(s)){\u003c/span\u003e\u003cspan class=\"p4\"\u003eif(r.lastIndex == 3 ){\u003c/span\u003e\u003cspan\n        class=\"p8\"\u003er.compile(/[A-Z]/g);\u003c/span\u003e\u003cspan class=\"p8\"\u003er.lastIndex = 3;\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(\" 匹配文本 = \" + RegExp.lastMatch + \" r.lastIndex = \" +\n        r.lastIndex);\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在上面代码中， \"r.compile(/[A-Z]/g);\" 可以使用 \"r.compile(\"[A-Z]\",\"g\");\" 。 \u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 在一个字符串中完成一次模式匹配之后，若想再开始检索新的字符串，就必须手动将正则表达式对象的 lastIndex 属性重置为 0 ； \u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e 重新编译后，正则表达式所包含的信息都被恢复到初始位置，如 lastIndex 变成 0 。因此，如果想继续匹配，就必须设置 lastIndex\n    属性，定义继续的匹配位置。反之，当执行正则表达式匹配操作之后，如果想用该正则表达式继续匹配其它字符，不妨利用下面的方法恢复初始状态，而不是用手动重置 lastIndex 属性 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eregexp.compile(regexp);\u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar str1 = \"Every man in the world! Every women on the earth!\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p =\n        /man/g; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar str2 = str1.replace(p, \"person\"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(str2 + \"\u0026lt;br/\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar p = /(wo)?men/g; \u003c/span\u003e\u003cspan class=\"p2\"\u003ep.compile(p); \u003c/span\u003e\u003cspan class=\"p2\"\u003estr2 =\n        str1.replace(p, \"person\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(str2)\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ 正则","title":"方法"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","正则","方法"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
