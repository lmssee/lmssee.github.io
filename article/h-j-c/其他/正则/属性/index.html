    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eRegExp 对象的属性 \u003c/h5\u003e\n\u003cp\u003eRegExp 对象的静态属性包含 index 、 input 、 multiLine 、 lastMatch 、 lastParen 、 leftContext 、 rightContext 以及＄ 1... ＄ 9 等。\n    input 和 multiLine 属性能被预设 。 \u003c/p\u003e\n\u003cp\u003e 可通过 RegExp 直接访问，这组属性记录了当前脚本中最新的正则表达式的详细信息。 \u003c/p\u003e\n\u003ctable id=\"td_a\"\u003e\n    \u003ccaption\u003eRegExp 静态属性 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e 长名 \u003c/th\u003e\n        \u003cth width=\"8%\"\u003e 短名 \u003c/th\u003e\n        \u003cth\u003e 说明 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript,not Javascript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar r =\n        /(Java)Script/gi; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = r.exec(s); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(RegExp.input);\n        \u003cspan class=\"r\"\u003e// \"JavaScript,not Javascript\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(RegExp.leftContext); \u003cspan class=\"r\"\u003e// \"\" \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(RegExp.rightContext); \u003cspan class=\"r\"\u003e// \",not Javascript\" \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(RegExp.lastMatch); \u003cspan class=\"r\"\u003e// \"Javascript\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(RegExp.lastParen); \u003cspan class=\"r\"\u003e// \"java\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 也可以写成： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript,not Javascript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar r =\n        /(Java)Script/gi; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = r.exec(s); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(RegExp.$_); \u003cspan\n            class=\"r\"\u003e// \"JavaScript,not Javascript\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(RegExp[\"$`\"]); \u003cspan class=\"r\"\u003e// \"\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(RegExp[\"$'\"]);\n        \u003cspan class=\"r\"\u003e// \",not Javascript\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(RegExp[\"$\u0026\"]); \u003cspan class=\"r\"\u003e//\n            \"Javascript\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(RegExp[\"$+\"]); \u003cspan class=\"r\"\u003e// \"java\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 还可以两次测试： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript,not Javascript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar r = /Scrip(t)/gi;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = r.exec(s); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(RegExp.$_); \u003cspan class=\"r\"\u003e//\n            \"JavaScript,not Javascript\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(RegExp[\"$`\"]); \u003cspan class=\"r\"\u003e// \"Java\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(RegExp[\"$'\"]);\n        \u003cspan class=\"r\"\u003e// \",not Javascript\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(RegExp[\"$\u0026\"]); \u003cspan class=\"r\"\u003e//\n            \"Script\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(RegExp[\"$+\"]); \u003cspan class=\"r\"\u003e// \"t\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar r = /Jav(a)/gi;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = r.exec(s); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(RegExp.$_); \u003cspan class=\"r\"\u003e//\n            \"JavaScript,not Javascript\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(RegExp[\"$`\"]); \u003cspan class=\"r\"\u003e// \"\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(RegExp[\"$'\"]);\n        \u003cspan class=\"r\"\u003e// \"Script,not Javascript\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(RegExp[\"$\u0026\"]); \u003cspan\n            class=\"r\"\u003e// \"Java\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(RegExp[\"$+\"]); \u003cspan class=\"r\"\u003e// \"a\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eRegExp 的实例有几个只读的属性，其中 global 表示是否为全局匹配， ignoreCase 表示是否忽略大小写， multiLine 表示是否为多行匹配， source 是正则式的源文本，如 /[ab]/g\n    的源文本就是 [ab] 。另外，还有一个可写的属性是 lastIndex ，表示下次执行匹配时的起始位置。 \u003c/p\u003e\n\u003ctable id=\"td_b\"\u003e\n    \u003ccaption\u003eRegExp 对象属性 \u003c/caption\u003e\n\u003c/table\u003e\n\u003cp\u003e 通过这些属性可以全面了解正则表达式的信息，不过实际开发中用得并不多，因为模式声明中包含 这些信息。\n\u003c/p\u003e\n\u003cp\u003elastIndex 还是比较有用，对于具有标志 g 的匹配模式来说，该属性储存了在字符串中下一次的开始检索的位置。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar aa = \"javascript is not a java\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar r = /a/gi; \u003cspan class=\"r\"\u003e//\n            正则表达式直接量 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003er.exec(aa); \u003cspan class=\"r\"\u003e//\n            第一次执行匹配 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(r.lastIndex); \u003cspan class=\"r\"\u003e// 2 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003er.exec(aa); \u003cspan class=\"r\"\u003e// 第二次执行匹配 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(r.lastIndex); \u003cspan\n            class=\"r\"\u003e// 4 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003er.exec(aa); \u003cspan class=\"r\"\u003e// 第三次执行匹配 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(r.lastIndex); \u003cspan class=\"r\"\u003e// 19 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003er.exec(aa); \u003cspan class=\"r\"\u003e// 第四次执行匹配 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(r.lastIndex); \u003cspan\n            class=\"r\"\u003e// 20 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003er.exec(aa); \u003cspan class=\"r\"\u003e// 第五次执行匹配\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(r.lastIndex); \u003cspan class=\"r\"\u003e// 24 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003er.exec(aa); \u003cspan class=\"r\"\u003e// 第六次执行匹配 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(r.lastIndex); \u003cspan\n            class=\"r\"\u003e// 0 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 可以手动更改 lastIndex 的值。 \u003c/p\u003e\n\n\u003cscript\u003e\n    var td_a = [\n        [\"index\", \"\\$_\", \"  是当前表达式模式首次匹配内容的开始位置，从  0  开始计数。其初始值为  -1  。每次成功匹配时，  index  属性值都会随之改变。  \"],\n        [\" input\", \"\", \"  返回当前所作用的字符串，可以简写为＄  _  ，其初始值为空字符串  \\\"\\\"  。  \"],\n        [\"lastIndex\", \"\", \"  是当前表达式模式首次匹配内容中最后一个字符的下一个位置，从  0  开始计数，常被作为继续搜索时的起始位置。其初始值为  -1  ，表示从起始位置开始搜索。每次成功匹配时，  lastIndex  属性值都会随之改变。   \"],\n        [\" lastMatch\", \"\\$\\\u0026\", \"  是当前表达式模式的最后一个匹配字符串，可以简写为＄＆。其初始值为空字符串  \\\"\\\"  。每次成功匹配时，  lastMatch  属性值都会随之改变。  \"],\n        [\" lastParen\", \"\\$+\", \"  如果表达式模式中有括起来的子匹配，是当前表达式模式中最后的子匹配所匹配到的子字符串，可以简写为＄  +  ，其初始值为空字符串  \\\"\\\"  。每次成功匹配时，  lastParen  属性值都会随之改变。   \"],\n        [\"leftContext\", \"\\$\\`\", \"  是当前表达式模式最后一个匹配字符串左边的所有内容，可以简写为＄  '  （其中  \\\"\\'\\\" 为键盘上 \\\"Esc\\\"  键下边的反单引号），其初始值为空字符串  \\\"\\\"  。每次成功匹配时，其属性值都会随之改变。   \"\n        ],\n        [\"rightContext\", \"\\\u0026\\'\", \"  是当前表达式模式最后一个匹配字符串右边的所有内容，可以简写为＄  '  ，其初始值为空字符串  \\\"\\\"  。每次成功匹配时，其属性值都会随之改变。  \"],\n        [\"   ＄  1...  ＄  9\", \"\\$1~\\$9\", \"  这些属性是只读的。如果表达式模式中有括起来的子匹配，＄  1...  ＄  9  属性值分别是第  1  个到第  9  个子匹配所捕获到的内容。如果有超过  9  个以上的子匹配，＄  1...  ＄  9  属性分别对应最后的  9  个子匹配。在一个表达式模式中，可以指定任意多个带括号的子匹配，但  RegExp  对象只能存储最后的  9  个子匹配的结果。在  RegExp  实例对象的一些方法所返回的结果数组中，可以获得所有圆括号内的子匹配结果。   \"]\n    ];\n    var td_b = [\n        [\"global\", \"  只读  \", \"  返回创建  RegExp  对象实例时指定的  global  标志（  g  ）的状态。     默认值为  false  。  \"],\n        [\"ignoreCase\", \"  只读  \", \"  返回创建  RegExp  对象实例时指定的  ignoreCase  标志（  i  ）的状态。     默认值为  false  。  \"],\n        ['unicode', '', '  是否设置了  u  标记  '],\n        ['sticky', '', '  是否设置了  y  标记  '],\n        [\"multiLine\", \"  只读  \", \"  返回创建  RegExp  对象实例时指定的  multiLine  标志（  m  ）的状态。     默认值为  false  。  \"],\n        [\"lastIndex\", \"  可写  \", \"  一个整数，返回或者设置执行下一次匹配的下标位置  \"],\n        ['dotAll', '', '  是否设置了  s  标记  '],\n        [\"source\", \"  只读  \", \"  返回创建  RegExp  对象实例时指定的表达式文本字符串  \"],\n        ['flags', '', '  正则表达式的标记字符串。始终以字面量而非构造函数的字符串模式形式返回（没有前后的斜杠）  '],\n    ];\n    _MiMethod.td(\"td_a\");\n    _MiMethod.td(\"td_b\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ 正则","title":"属性"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","正则","属性"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
