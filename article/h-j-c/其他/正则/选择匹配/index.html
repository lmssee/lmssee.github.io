    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 贪婪匹配与非贪婪匹配 \u003c/h5\u003e\n\u003cp\u003e 默认情况下，正则表达式使用最长匹配原则，即贪婪匹配原则。 \u003c/p\u003e\n\u003cp\u003e 例如，要将 \"book\" 中匹配 \"bo?\" 的部分替换成 \" l \" ，替换后的结果是 \"lok\" ，而不是 \"look\" ；要将 \"book\" 中匹配 \"bo*\" 的部分替换成 \" l \" ，替换后的结果是 \"lk\"\n    ，而不是\n    \"lok\" 或 \"look\" 。 \u003c/p\u003e\n\u003cp\u003e 当解释器将代码中的字符解析成一个个编译器，并在处理代码当前最小语法单元时，编译器会使用一种贪婪匹配算法，也就是说，会尽可能让一个单元包含更多的字符。当字符 \" ? \" 紧跟任何其它限定符（ * 、 + 、 ? 、 {n} 、\n    {n,} 、 {n,m} ）之后时，匹配模式变成使用最短匹配原则，即非贪婪匹配原则。例如，在字符串 \"booook\" 中， \"bo+?\" 只匹配 \"bo\" 部分，而 \"bo+\" 匹配 \"boooo\" 部分。 \u003c/p\u003e\n\u003ch5\u003e 选择匹配符 \u003c/h5\u003e\n\u003cp\u003e 选择匹配符 \" | \" ，用于选择匹配两个选项之中的任意一个，其两个选项是 \" | \" 字符两边尽可能最大的表达式。 \u003c/p\u003e\n\u003cp\u003e 威力避免歧义，尽量为选择操作的多个子匹配符添加小括号。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s1 = \"abc\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar s2 = \"efg\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        s3 = \"123\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar s4 = \"456\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar r =\n        /(abc)|(efg)|(123)|(456)/; \u003cspan class=\"r\"\u003e// 选择多重匹配 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar b1 = r.test(a1); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar b2 =\n        r.test(a2); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar b3 = r.test(a3); \u003cspan class=\"r\"\u003e//\n            true \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar b4 = r.test(a4); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 针对表单中的敏感词过滤，可以设置敏感词列表进行替换。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"a'b?c\u0026\"; \u003cspan class=\"r\"\u003e// 待过滤的表单提交信息 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar r\n        = /\\'|\\\"|\\?|\\\u0026/gi; \u003cspan class=\"r\"\u003e// 过滤敏感字符的正则表达式 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction f() { \u003cspan\n            class=\"r\"\u003e// 替换函数，把敏感字符转换为对应的网页的编码格式 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn \"\u0026#\" + arguments[0].charCodeAt(0) + \"\" \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        a = s.replace(r, f); \u003cspan class=\"r\"\u003e// 执行过滤替换 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(a); \u003cspan\n            class=\"r\"\u003e// 在网页显示正常的字符信息 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(a); \u003cspan class=\"r\"\u003e// 返回字符串 \"a\u0026amp;#39;b\u0026amp;#63;c\u0026amp;#38;\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ 正则","title":"选择匹配"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","正则","选择匹配"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
