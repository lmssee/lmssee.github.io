                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 简介 \u003c/h5\u003e\n\u003cp\u003e 正则表达式（ Regular Expression ）是一个描述字符模式对象，字符模式就是由一系列字符构成的特殊格式字符串，它由普通字符和元字符构成。正则表达式的主要语法就是对各种字符的功能进行描述。 \u003c/p\u003e\n\u003ch5\u003e 模式匹配符 \u003c/h5\u003e\n\u003cp\u003e 对于表达式中的元字符，需要进行转义，使其变成原义字符才能正常显示出来。 \u003c/p\u003e\n\u003ctable id=\"td_a\"\u003e\n    \u003ccaption\u003e 模糊匹配符 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 字符 \u003c/th\u003e\n        \u003cth\u003e 额 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var td_a = [\n        [\"\\\\\", \"  转化为特殊字符  \"],\n        [\"\\^\", \"  最前  \"],\n        [\"\\$\", \"  最末  \"],\n        [\"\\*\", \"0+  个  \"],\n        [\"\\+\", \"1+  个  \"],\n        [\"\\?\", \"0  或  1\"],\n        [\"\\.\", \"  除换行符外所有单字符  \"],\n        [\"\\(x)\", \"  匹配  x  并记录值。匹配字符串能被结果数组中元素  \"],\n        [\"x\\|y\", \"  匹配  x  或  y\"],\n        [\"\\{n}\", \"n  为正整数，匹配前面的  n  个字符  \"],\n        [\"\\{n  ，  }\", \"n  为正整数，匹配至少  n  个   前面的字符  \"],\n        [\"\\{n  ，  m}\", \"  这里的  n  ，  m  都是正整数，匹配至少  n  个   最多  m  个   前面的字符  \"],\n        [\"\\[xyz]\", \"  支付列表，匹配任意字符，也可以用  -   指出一个范围  \"],\n        [\"\\[\\^xyz]\", \"  字符补集，匹配除了列出的字符  \"],\n        [\"\\[\\\\b]\", \"  匹配一个空格  \"],\n        [\"\\\\b\", \"  匹配单词的分界线  \"],\n        [\"\\\\B\", \"  匹配单词的非分界线  \"],\n        [\"\\\\cX\", \"X  是一个控制字符，匹配一个字符串的控制字符  \"],\n        [\"\\\\d\", \"  匹配一个数字  \"],\n        [\"\\\\D\", \"  匹配一个非数字  \"],\n        [\"\\\\f\", \"  匹配一个表单符  \\(  换页符  \\)\"],\n        [\"\\\\n\", \"  匹配一个换行符  \"],\n        [\"\\\\r\", \"  匹配一个回车符  \"],\n        [\"\\\\s\", \"  匹配一个单个  while  空格符，包括空格、  tab  、  form feed  、换行符  \"],\n        [\"\\\\S\", \"  匹配一个制表符  \"],\n        [\"\\\\v\", \"  匹配一个顶头制表符  \"],\n        [\"\\\\t\", \"  匹配一个制表符  \"],\n        [\"\\\\w\", \"  匹配所有的数字和字母以及下划线  \"],\n        [\"\\\\W\", \"  匹配除了数字、字母以及下划线以外的其它字符  \"],\n        [\"\\\\n\", \"  此处  n  是一个正整数，匹配一个正则表达式的最后一个字符串的  n  的值（计数左圆括号）  \"],\n        [\"\\\\ooctal \", \"  这里的  \\\\ooctal  是一个八进制的  escape  值，而  \\\\xhex  是一个十六进制的  escape  值，允许在一个正则表达式中嵌入  ASCII  码  \"],\n        [\"\\\\xhex\", \"   这里的  \\\\ooctal  是一个八进制的  escape  值，而  \\\\xhex  是一个十六进制的  escape  值，允许在一个正则表达式中嵌入  ASCII  码  \"],\n    ];\n    _MiMethod.td(\"td_a\");\n\u003c/script\u003e\n\u003cp class=\"p4\"\u003e 特殊字符转义 \u003c/p\u003e\n\u003cp\u003e 表达式中用到的一些元字符不再表示原来的字面意义，如果要匹配这些有特殊意义的元字符，必须使用 \" \\ \" 将这些字符转义为原义字符。需要进行转义的字符有 \" ＄ \" 、 \" ( \" 、 \" ) \" 、 \" * \" 、 \" +\n    \" 、 \" .\n    \" 、 \" [\n    \" 、 \" ] \" 、 \" ? \" 、 \" \\ \" 、 \" / \" 、 \" ^ \" 、 \" { \" 、 \" } \" 、 \" | \" 。 \u003c/p\u003e\n\u003cp\u003e\" \\ \" 的作用是将下一字符标记为特殊字符、原义字符、反向引用或八进制转义符，所以，要匹配字面意义的 \" \\ \" ，需要使用 \" \\\\ \" 表示。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eRequire: /.+/, \u003cspan class=\"r\"\u003e// 是否为空 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eEmail:\n        /^\\w+([-+.]\\w+)*@\\w+([-.]\\w+)*\\.\\w+([-.]\\w+)*$/, \u003cspan class=\"r\"\u003e// Email \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ePhone:\n        /^(?:(\\(?:\\d{2,3}\\))|(\\d{3}\\-))?(\\(0\\d{2,3}\\)|0\\d{2,3}-)?[1-9]\\d{6-7}(\\-\\d{1,4})?$/, \u003cspan class=\"r\"\u003e// 电话号码\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eMobile: /^(?:(?:\\(\\d{2,3}\\))|(?:\\d{3}\\-))?13\\d{9}$/, \u003cspan class=\"r\"\u003e// 手机号码 Require :\n            /.+/,\u003cspan class=\"r\"\u003e// 是否为空 \u003c/span\u003e\u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eUrl: /^http:\\/\\/[A-Za-z0-9]+\\.[A-Za-z0-9]+[\\/=\\?%\\-\u0026_~`@[\\]\\':+!]*([^\u0026lt;\u0026gt;\\\"\\\"])*$/,\n        \u003cspan class=\"r\"\u003e// 使用 HTTP 协议的网址 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eIdCard: \"this.IsIdCard(value)\", \u003cspan class=\"r\"\u003e// \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eCurrency:\n        /^\\d+(\\.\\d+)?$/, \u003cspan class=\"r\"\u003e// 货币 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eNumber: /^\\d+$/, \u003cspan class=\"r\"\u003e//\n            数字 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eZip: /^[1-9]\\d{5}$/, \u003cspan class=\"r\"\u003e// 邮政编码 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eQQ:\n        /^[1-9]\\d{4,12}$/, \u003cspan class=\"r\"\u003e// QQ 号码 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eInteger: /^[-\\+]?\\d+$/, \u003cspan\n            class=\"r\"\u003e// 整数 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eDouble: /^[-\\+]?\\d+(\\.\\d+)?$/, \u003cspan class=\"r\"\u003e// 实数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eEnglish:\n        /^[A-Za-z]+$/, \u003cspan class=\"r\"\u003e// 英文 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ 正则","title":"匹配"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","正则","匹配"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
