    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e概念\u003c/h5\u003e\n\u003cp\u003e首先需要一个渲染器（Renderer）。传入一个场景（Scene）和摄像机（Camera）到渲染器，然后将摄像机视锥体的三维场景渲染成一个二维图片显示在画布（canvas）上。\u003c/p\u003e\n\u003ch5\u003e场景图\u003c/h5\u003e\n\u003cp\u003e场景图是一个树状结构，包含一个场景（Scene）对象，多个网格（Mesh）对象，光源（Light）对象，群组（Group），三维物体（Object3D）和摄像机（Camera）。\u003c/p\u003e\n\u003ch5\u003e网格\u003c/h5\u003e\n\u003cp\u003e网格（Mesh）对象是一种特殊的材质（Material）来绘制特定的几何体（Geometry）。材质（Material）和几何体（Geometry）可以被多个网格（Mesh）使用。\u003c/p\u003e\n\u003ch5\u003e图元\u003c/h5\u003e\n\u003cp\u003e图元（Geometry）对象代表了一些物体的顶点信息。\u003c/p\u003e\n\u003ch5\u003e材质\u003c/h5\u003e\n\u003cp\u003e材质（Material）对象带遍绘制几何体的表面属性，包括颜色、光亮程度。一种材质可以引入多个问题（Texture）。\u003c/p\u003e\n\u003ch5\u003e纹理\u003c/h5\u003e\n\u003cp\u003e纹理（Texture）对象通常表示一幅图像。可以是外部引入文件、画布生成、另一个渲染器渲染出来的。\u003c/p\u003e\n\u003ch5\u003e光源\u003c/h5\u003e\n\u003cp\u003e光源（Light）对象代表了不同种类的光\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n        \u003cp\u003e材质会收到灯光的影响\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e一个旋转的方块\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e// 构建渲染器 const renderer = new three.WebGLRenderer({ antialias: true });\u003c/span\u003e\u003cspan\n                class=\"p3\"\u003erenderer.setSize(window.innerWidth, window.innerHeight - 80);\u003c/span\u003e\u003cspan class=\"p3\"\u003e//\n                设置摄像头\u003c/span\u003e\u003cspan class=\"p3\"\u003econst camera = new three.PerspectiveCamera(1, window.innerWidth /\n                window.innerHeight, 1, 500);\u003c/span\u003e\u003cspan class=\"p3\"\u003ecamera.position.set(0, 0, 100);\u003c/span\u003e\u003cspan\n                class=\"p3\"\u003ecamera.lookAt(0, 0, 0);\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 创建场景\u003c/span\u003e\u003cspan class=\"p3\"\u003econst scene =\n                new\n                three.Scene();\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 材质可能影响到灯光的效果\u003c/span\u003e\u003cspan class=\"p3\"\u003econst material = new\n
