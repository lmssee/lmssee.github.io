  <script id="_next_DATA__"
    type="application/json">{"props":{"pageProps":{"data":"\u003ca href=\"https://threejs.org/manual/#zh/materials\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\n    \u003ch5\u003e材质\u003c/h5\u003e\n\u003c/a\u003e\n\u003cp\u003e材质有很多。设置材质可以在实例化时设置，也可以在实例化之后设置。\u003c/p\u003e\n\u003cp\u003e不同的材质展现不同的效果，也会占用不同的内存消耗。\u003c/p\u003e\n\u003ch5\u003eMeshBasicMaterial\u003c/h5\u003e\n\u003cp\u003e不受光照影响的材质。\u003c/p\u003e\n\u003ch5\u003eMeshLambertMaterial\u003c/h5\u003e\n\u003cp\u003e只受顶点计算光照的材质。\u003c/p\u003e\n\u003ch5\u003eMeshPhongMaterial\u003c/h5\u003e\n\u003cp\u003e每一个像素计算光照，且支持镜面高光的材质。\u003c/p\u003e\n\u003cp\u003eMeshPhongMaterial 的 shininess 设置决定了光照的光泽度，默认值 30。\u003c/p\u003e\n\u003ch5\u003eMeshToonMaterial\u003c/h5\u003e\n\u003cp\u003e平滑的设置光照着色，而不是渐变图。\u003c/p\u003e\n\u003ch5\u003eMeshStandardMaterial\u003c/h5\u003e\n\u003cp\u003e与 MeshPhongMaterial 类似。MeshPhongMaterial 和 MeshStandardMaterial 最大的区别是它们使用的参数不同。MeshPhongMaterial 有一个参数用来设置 shininess\n    属性。MeshStandardMaterial 有2个参数用来分别设置 roughness 和 metalness 属性。\u003c/p\u003e\n\u003ch5\u003eMeshPhysicalMaterial\u003c/h5\u003e\n\u003cp\u003eMeshPhysicalMaterial 与 MeshStandardMaterial 相同，但它增加了一个clearcoat 参数，该参数从0到1，决定了要涂抹的清漆光亮层的程度，还有一个 clearCoatRoughness\n    参数，指定光泽层的粗糙程度。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e各种标准材质的构建速度从最快到最慢：MeshBasicMaterial ➡ MeshLambertMaterial ➡ MeshPhongMaterial ➡ MeshStandardMaterial ➡\n        MeshPhysicalMaterial。构建速度越慢的材质，做出的场景越逼真，但在低功率或移动设备上，可能需要思考代码的设计，使用构建速度较快的材质。\n    \u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003eMeshNormalMaterial\u003c/h5\u003e\n\u003cp\u003e现实几何体的法线\u003c/p\u003e\n\u003ch5\u003eShaderMaterial\u003c/h5\u003e\n\u003cp\u003e通过 three.js 着色器系统来自定义材质。\u003c/p\u003e\n\u003ch5\u003eRawShaderMaterial\u003c/h5\u003e\n\u003cp\u003e用来制作自定义着色器，不需要 three.js 帮助\u003c/p\u003e\n\u003ch5\u003e公用属性\u003c/h5\u003e\n\u003ch6\u003eflatShading\u003c/h6\u003e\n\u003cp\u003e对象是否平面着色，默认值为 false。\u003c/p\u003e\n\u003ch6\u003eside\u003c/h6\u003e\n\u003cp\u003e显示三角形哪个边。默认值为 three.FrontSide (正面)，还可选 three.BackSide （背面）\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ three","title":"材质"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","three","材质"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
