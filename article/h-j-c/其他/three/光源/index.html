    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e光照\u003c/h5\u003e\n\u003cp\u003e模拟光照着物体上，影响光照与光源、材质有关。\u003c/p\u003e\n\u003ch5\u003e环境光\u003c/h5\u003e\n\u003cp\u003e由 AmbientLight 创建。环境光没有方向，不会产生阴影，场景内的任何一点光照强度都相同。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econst light = new three.AmbientLight(color,intensity)\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ecolor 光照颜色\u003c/li\u003e\n    \u003cli\u003eintensity 光强度，默认为 1\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e半球光\u003c/h5\u003e\n\u003cp\u003e半球光（HemisphereLight）的颜色从天空到地面两个颜色的渐变。可以用在与其他类型的光相结合，或则作为环境光（AmbientLight）的代替。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econst light = new three.HemisphereLight(color,intensity)\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ecolor 光照颜色\u003c/li\u003e\n    \u003cli\u003eintensity 深度\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch5\u003e方向光\u003c/h5\u003e\n\u003cp\u003e方向光由 DirectionalLight 创建，常用来表示光照的效果。\u003c/p\u003e\n\u003cp\u003e由于与环境光（AmbientLight）和半球光（HemisphereLight）不同，展示的位置不同，光效果不同，我们可以设置光的位置。\u003c/p\u003e\n\u003cp\u003e方向光有照射目标点的位置，由光 target 属性配置\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econst light = new three.HemisphereLight(color,intensity);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003elight.position.set(x, y, z);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003elight.target.position.set(x, y, z);\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ecolor 光照颜色\u003c/li\u003e\n    \u003cli\u003eintensity 深度\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch5\u003e点光源\u003c/h5\u003e\n\u003cp\u003e点光源由 PointLight 创建，可模拟太阳光的效果。但是无需设置目标元素的点位。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econst light = new three.PointLight(color,intensity);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003elight.position.set(x, y, z);\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ecolor 光照颜色\u003c/li\u003e\n    \u003cli\u003eintensity 深度\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e点光源不是一个点，而是光源的位置绘制了一个 Mesh 子节点，所以可以使用其他的 Mesh 来代替默认的。\u003c/p\u003e\n\u003ch5\u003e聚光灯\u003c/h5\u003e\n\u003cp\u003e聚光灯由 SpotLight 创建。聚光灯像极了手电筒的光照，聚光灯需要一个目标点。目标点会出现在光照中心点的延长线处。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econst light = new three.SpotLight(color,intensity);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003elight.position.set(x, y, z);\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ecolor 光照颜色\u003c/li\u003e\n    \u003cli\u003eintensity 深度\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e锥形区域光\u003c/h5\u003e\n\u003cp\u003e锥形聚光灯由 RectAreaLight 构建。矩形区域光只能影响 MeshStandardMaterial 和 MeshPhysicalMaterial 材质。\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e这是地月绕太阳旋转的模拟图\u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e// 构建渲染器 const renderer = new three.WebGLRenderer({ antialias: true });\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003erenderer.setSize(window.innerWidth, window.innerHeight - 80);\u003c/span\u003e\u003cspan class=\"p3\"\u003e//\n            设置渲染器分辨率为屏幕分辨率 。不建议\u003c/span\u003e\u003cspan class=\"p3\"\u003e// renderer.setPixelRatio(window.devicePixelRatio);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003e// 设置摄像头\u003c/span\u003e\u003cspan class=\"p3\"\u003econst camera = new three.PerspectiveCamera(50, window.innerWidth\n            / window.innerHeight, 1, 100);\u003c/span\u003e\u003cspan class=\"p3\"\u003ecamera.position.set(0, 10, 20);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003ecamera.up.set(0, 0, 1);\u003c/span\u003e\u003cspan class=\"p3\"\u003ecamera.lookAt(0, 0, 0);\u003c/span\u003e\u003cspan class=\"p3\"\u003e//\n            将生成的视图画到画布上\u003c/span\u003e\u003cspan class=\"p3\"\u003econst canvas = renderer.domElement;\u003c/span\u003e\u003cspan class=\"p3\"\u003ecanvas.id =\n            canvasId;\u003c/span\u003e\u003cspan class=\"p3\"\u003e/** 生成控制器 */\u003c/span\u003e\u003cspan class=\"p3\"\u003econst controls = new\n            OrbitControls(camera, canvas);\u003c/span\u003e\u003cspan class=\"p3\"\u003e/** 设置控制器的位置 */\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003econtrols.target.set(0, 0, 0);\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 更新观察点位置\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003econtrols.update();\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 创建场景\u003c/span\u003e\u003cspan class=\"p3\"\u003econst scene = new\n            three.Scene();\u003c/span\u003e\u003cspan class=\"p3\"\u003e// scene.background = new three.Color('white');\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003econst objects: any = [];\u003c/span\u003e\u003cspan class=\"p3\"\u003econst solarSystem = new\n            three.Object3D();\u003c/span\u003e\u003cspan class=\"p3\"\u003escene.add(solarSystem);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003eobjects.push(solarSystem);\u003c/span\u003e\u003cspan class=\"p3\"\u003econst loader = new\n            three.TextureLoader();\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 准备球体图元\u003c/span\u003e\u003cspan class=\"p3\"\u003econst sphereGeometry = new\n            three.SphereGeometry(1, 50, 10);\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 准备太阳材质\u003c/span\u003e\u003cspan class=\"p3\"\u003econst sunMaterial =\n            new three.MeshBasicMaterial({ map: loader.load('/beian.png') });\u003c/span\u003e\u003cspan class=\"p3\"\u003e//\n            将图元和材质混合\u003c/span\u003e\u003cspan class=\"p3\"\u003econst sunMesh = new three.Mesh(sphereGeometry, sunMaterial);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003e// \u003c/span\u003e\u003cspan class=\"p3\"\u003esunMesh.scale.set(5, 5, 5);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003esolarSystem.add(sunMesh);\u003c/span\u003e\u003cspan class=\"p3\"\u003eobjects.push(sunMesh);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003econst earthOrbit = new three.Object3D();\u003c/span\u003e\u003cspan class=\"p3\"\u003eearthOrbit.position.x =\n            10;\u003c/span\u003e\u003cspan class=\"p3\"\u003esolarSystem.add(earthOrbit);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003eobjects.push(earthOrbit);\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 设置地球材质\u003c/span\u003e\u003cspan class=\"p3\"\u003econst\n            earthMaterial = new three.MeshPhongMaterial({ color: 0x2233ff, emissive: 0x112244 });\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003econst earthMesh = new three.Mesh(sphereGeometry, earthMaterial);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003eearthOrbit.add(earthMesh);\u003c/span\u003e\u003cspan class=\"p3\"\u003eobjects.push(earthMesh);\u003c/span\u003e\u003cspan\n            class=\"p4\"\u003econst moonOrbit = new three.Object3D();\u003c/span\u003e\u003cspan class=\"p3\"\u003emoonOrbit.position.x =\n            2;\u003c/span\u003e\u003cspan class=\"p3\"\u003eearthOrbit.add(moonOrbit);\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 设置月球材质\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003econst moonMaterial = new three.MeshPhongMaterial({ color: 0x8888, emissive: 0x222222\n            });\u003c/span\u003e\u003cspan class=\"p3\"\u003econst moonMesh = new three.Mesh(sphereGeometry, moonMaterial);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003emoonMesh.scale.set(.5, .5, .5);\u003c/span\u003e\u003cspan class=\"p3\"\u003emoonOrbit.add(moonMesh);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003eobjects.push(moonMesh);\u003c/span\u003e\u003cspan class=\"p3\"\u003eclass AxisGridHelper {\u003c/span\u003e\u003cspan\n            class=\"p4\"\u003egrid: three.GridHelper;\u003c/span\u003e\u003cspan class=\"p4\"\u003eaxes: three.AxesHelper;\u003c/span\u003e\u003cspan\n            class=\"p4\"\u003eprivate _visible: any;\u003c/span\u003e\u003cspan class=\"p4\"\u003econstructor(node: any, units = 10) {\u003c/span\u003e\u003cspan\n            class=\"p5\"\u003econst axes = new three.AxesHelper();\u003c/span\u003e\u003cspan class=\"p5\"\u003eaxes.material.depthTest =\n            false;\u003c/span\u003e\u003cspan class=\"p5\"\u003eaxes.renderOrder = 2;\u003c/span\u003e\u003cspan class=\"p5\"\u003enode.add(axes);\u003c/span\u003e\u003cspan\n            class=\"p5\"\u003econst grid = new three.GridHelper(units, units);\u003c/span\u003e\u003cspan class=\"p5\"\u003egrid.material.depthTest =\n            false;\u003c/span\u003e\u003cspan class=\"p5\"\u003egrid.renderOrder = 1;\u003c/span\u003e\u003cspan class=\"p5\"\u003enode.add(grid);\u003c/span\u003e\u003cspan\n            class=\"p5\"\u003ethis.grid = grid;\u003c/span\u003e\u003cspan class=\"p5\"\u003ethis.axes = axes;\u003c/span\u003e\u003cspan class=\"p5\"\u003ethis.visible =\n            false;\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p4\"\u003eget visible() {\u003c/span\u003e\u003cspan class=\"p5\"\u003ereturn\n            this._visible;\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p4\"\u003eset visible(v) {\u003c/span\u003e\u003cspan\n            class=\"p5\"\u003ethis._visible = v\u003c/span\u003e\u003cspan class=\"p5\"\u003ethis.grid.visible = v;\u003c/span\u003e\u003cspan\n            class=\"p5\"\u003ethis.axes.visible = v;\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p3\"\u003e}\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003econst gui = new GUI();\u003c/span\u003e\u003cspan class=\"p3\"\u003efunction makeAxisGrid(node: any, label: any, units:\n            any) {\u003c/span\u003e\u003cspan class=\"p4\"\u003econst helper = new AxisGridHelper(node, units);\u003c/span\u003e\u003cspan\n            class=\"p4\"\u003egui.add(helper, 'visible').name(label);\u003c/span\u003e\u003cspan class=\"p3\"\u003e}\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 生成 gui\n        \u003c/span\u003e\u003cspan class=\"p3\"\u003emakeAxisGrid(solarSystem, 'solarSystem', 25);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003emakeAxisGrid(sunMesh, 'sunMesh', 25);\u003c/span\u003e\u003cspan class=\"p3\"\u003emakeAxisGrid(earthOrbit,\n            'earthOrbit', 25);\u003c/span\u003e\u003cspan class=\"p3\"\u003emakeAxisGrid(earthMesh, 'earthMesh', 25);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003emakeAxisGrid(moonOrbit, 'moonOrbit', 25);\u003c/span\u003e\u003cspan class=\"p3\"\u003emakeAxisGrid(moonMesh,\n            'moonMesh', 25);\u003c/span\u003e\u003cspan class=\"p3\"\u003econst light = new three.PointLight(0xffffff, 3);\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003elight.position.set(0, 0, 0);\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 添加灯光\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003escene.add(light);\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 执行动画\u003c/span\u003e\u003cspan class=\"p3\"\u003efunction render(time:\n            any) {\u003c/span\u003e\u003cspan class=\"p4\"\u003etime *= 0.001;\u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n            (resizeRendererToDisplaySize(renderer)) {\u003c/span\u003e\u003cspan class=\"p5\"\u003ecamera.aspect = canvas.clientWidth /\n            canvas.clientHeight;\u003c/span\u003e\u003cspan class=\"p5\"\u003ecamera.updateProjectionMatrix();\u003c/span\u003e\u003cspan\n            class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p4\"\u003eobjects.forEach((obj: any) =\u0026gt; {\u003c/span\u003e\u003cspan class=\"p5\"\u003eobj.rotation.y\n            = time;\u003c/span\u003e\u003cspan class=\"p4\"\u003e})\u003c/span\u003e\u003cspan class=\"p4\"\u003e// 重新渲染\u003c/span\u003e\u003cspan\n            class=\"p4\"\u003erenderer.render(scene, camera);\u003c/span\u003e\u003cspan class=\"p4\"\u003e// 递归调用自己，执行动画\u003c/span\u003e\u003cspan\n            class=\"p4\"\u003erequestAnimationFrame(render);\u003c/span\u003e\u003cspan class=\"p3\"\u003e}\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003erequestAnimationFrame(render);\u003c/span\u003e\u003cspan class=\"p3\"\u003e// 挂载 canvas\u003c/span\u003e\u003cspan\n            class=\"p3\"\u003edocument.querySelector('#index')!.appendChild(canvas);\u003c/span\u003e\n            \u003c/code\u003e\n\u003c/details\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ three","title":"光源"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","three","光源"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
