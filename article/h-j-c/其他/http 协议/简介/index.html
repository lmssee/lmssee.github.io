    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 协议 \u003c/h5\u003e\n\u003cp\u003eHTTP 协议（ Hypertext Transfer Protocol ，超文本传输协议）是用于从 WWW 服务器传输超文本到本地浏览器的传送协议，最早由万维网的发明者伯纳斯·李（ Berners Lee\n    ）制定，它可以使浏览器更加高效，使网络传输减少。它不仅能保证计算机正确、快速地传输超文本文档，还能确定传输文档中的哪一部分以及哪部分内容首先显示（如文本先于图形）等。 \u003c/p\u003e\n\u003cp\u003e 目前 HTTP 协议由 W3C 维护，有两个稳定的版本： HTTP 1.0 和 HTTP 1.1 。 HTTP 1.0 协议的完全版本从下面的两个网址都可以获得： \u003c/p\u003e\n\u003cp\u003e\u003ca href=\"http://www.ietf.org/rfc/rfc1945.txt\" rel=\"nofollow\"\u003ehttp://www.ietf.org/rfc/rfc1945.txt\u003c/a\u003e 。 \u003c/p\u003e\n\u003cp\u003e\u003ca href=\"http://www.w3.org/Protocols/rfc1945/rfc1945\" rel=\"nofollow\"\u003ehttp://www.w3.org/Protocols/rfc1945/rfc1945\u003c/a\u003e\n    。 \u003c/p\u003e\n\u003cp\u003eHTTP 1.1 协议的完全版本可以从下面的网址获得： \u003c/p\u003e\n\u003cp\u003e\u003ca href=\"http://www.w3.org/Protocols/rfc2616/rfc2616\" rel=\"nofollow\"\u003ehttp://www.w3.org/Protocols/rfc2616/rfc2616\u003c/a\u003e\n    。 \u003c/p\u003e\n\u003cp\u003e\u003ca href=\"http://www.ietf.org/rfc/rfc2817.txt\" rel=\"nofollow\"\u003ehttp://www.ietf.org/rfc/rfc2817.txt\u003c/a\u003e 。 \u003c/p\u003e\n\u003cp\u003eHTTP 是应用层协议，是建立在 TCP 协议基础之上的（ TCP 是一个底层协议）。 HTTP 是一个基于 \" 请求 / 响应 \" 模式的、无状态的协议。 \u003c/p\u003e\n\u003ch5\u003e 了解 HTTP 消息的内容 \u003c/h5\u003e\n\u003cp\u003e 浏览器和 Web 服务器之间会通过 HTTP 在 Internet 上进行数据的发送和接收，这些数据也被称为 HTTP 消息（ Message ）。 HTTP\n    消息可以是客户端到服务器的请求消息，也可以是服务器到客户端的响应消息。 \u003c/p\u003e\n\u003cp\u003e 请求和响应消息都是由开始行（ start-line ）、消息报头（ message header ，可选）、空行（只有 CRLF 的行）和消息正文（ message body ，可选）组成的，如下所示： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emessage = start-line\u003c/span\u003e\u003cspan class=\"p\"\u003e*message-header\u003c/span\u003e\u003cspan class=\"p\"\u003eCRLF\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e[ message-body ]\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 对于请求或者响应，开始行有所不同。对于请求消息，开始行就是请求行（ Request-Line ）；对于响应消息，开始行就是状态行（ Status-Line ）： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003estart-line = Request-Line | Status-Line\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 消息报头就是请求和响应的 HTTP 消息报头；消息正文就是 HTML 文档或者图片等文件，它们之间由一个空行隔开。 \u003c/p\u003e\n\u003ch5\u003e 了解 HTTP 请求的内容 \u003c/h5\u003e\n\u003cp\u003e 客户端通过发送 HTTP 请求向服务器请求对资源的访问，这时， HTTP 请求由下面的内容（ HTTP 消息）组成： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emessage = Request-Line\u003c/span\u003e\u003cspan class=\"p\"\u003e*message-header\u003c/span\u003e\u003cspan class=\"p\"\u003eCRLF\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e[ message-body ]\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 请求行 \u003c/h6\u003e\n\u003cp\u003e 请求行的结构如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eMethod Request-URI HTTP-Version CRLF\u003c/span\u003e\u003c/code\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e 请求参数的意义 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 参数 \u003c/th\u003e\n        \u003cth\u003e 含义 \u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eMethod\u003c/td\u003e\n        \u003ctd\u003e 表示 HTTP 的请求方法，例如 GET,POST 等 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eRequest-URL\u003c/td\u003e\n        \u003ctd\u003e 表示一个统一资源标识符 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eHTTP-Version\u003c/td\u003e\n        \u003ctd\u003e 表示请求的 HTTP 的协议版本 , 一般是 HTTP1.1 或 HTTP1.0\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eCRLF\u003c/td\u003e\n        \u003ctd\u003e 表示回车换行 \u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e 例如前面介绍的请求行的例子： \u003c/p\u003e\n\u003cp\u003eGET \u003ca href=\"http://localhost/index.html\" rel=\"nofollow\"\u003ehttp://localhost/index.html\u003c/a\u003eHTTP/1.1(CRLF) 。 \u003c/p\u003e\n\u003ch6\u003eHTTP 请求的方法 \u003c/h6\u003e\n\u003cp\u003e 常见的 HTTP 请求的方法就是 GET 、 POST 和 HEAD ，也包含其它方法。 \u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eHTTP 请求的方法 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 方法 \u003c/th\u003e\n        \u003cth\u003e 作用 \u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eGET\u003c/td\u003e\n        \u003ctd\u003e 通过请求 URL 的资 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eHEAD\u003c/td\u003e\n        \u003ctd\u003e 类似于 GET ，但是不返回正文信息，用于检查对象是否存在以及得到对象的元数据 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003ePOST\u003c/td\u003e\n        \u003ctd\u003e 用于添加新的内容 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003ePUT\u003c/td\u003e\n        \u003ctd\u003e 用于修改某个内容 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eDELETE\u003c/td\u003e\n        \u003ctd\u003e 用于删除某个内容 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eOPTIONS\u003c/td\u003e\n        \u003ctd\u003e 询问可以执行那些方法 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eTRACE\u003c/td\u003e\n        \u003ctd\u003e 用于远程诊断服务器 \u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e 了解 HTTP 响应的内容 \u003c/h5\u003e\n\u003cp\u003e 服务器对客户端请求做出响应，这时， HTTP 响应由下面的内容（ HTTP 消息）组成： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emessage = Status-Line\u003c/span\u003e\u003cspan class=\"p\"\u003e*message-header\u003c/span\u003e\u003cspan class=\"p\"\u003eCRLF\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e[ message-body ]\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 状态行 \u003c/h6\u003e\n\u003cp\u003e 状态行的结构如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eHTTP-Version Status-Code Reason-Phrase CRLF\u003c/span\u003e\u003c/code\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e 状态行参数的意义 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 参数 \u003c/th\u003e\n        \u003cth\u003e 意义 \u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eHTTO-Version\u003c/td\u003e\n        \u003ctd\u003e 表示服务器 HTTP 协议的版本，一般是 HTTP1.1 或 HTTP1.0\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eStatus-Code\u003c/td\u003e\n        \u003ctd\u003e 表示服务器发回的状态代码 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eReason-Phrase\u003c/td\u003e\n        \u003ctd\u003e 表示状态码的文本描述 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eCRLF\u003c/td\u003e\n        \u003ctd\u003e 表示回车换行 \u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e 例如前面介绍的状态行的例子： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eHTTP/1.1 200 OK\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e 状态代码 \u003c/h6\u003e\n\u003cp\u003e 状态代码（ Status-Code ）由 3 位数字组成，表示请求是否被理解或满足。状态代码的第一个数字定义了响应的类别，后面两位数字没有代表任何具体的分类。 \u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e 状态代码第一个数字的可选值 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 可选值 \u003c/th\u003e\n        \u003cth\u003e 意义 \u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e1xx\u003c/td\u003e\n        \u003ctd\u003e 指示信息，表示请求已接收，继续处理 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e2xx\u003c/td\u003e\n        \u003ctd\u003e 成功，表示请求已被成功接收，并已被处理和接受 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e3xx\u003c/td\u003e\n        \u003ctd\u003e 重定向，必须采取进一步行动以完成情书 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e4xx\u003c/td\u003e\n        \u003ctd\u003e 客户端错误，请求中包含有错误无法或包含不能被完成 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e5xx\u003c/td\u003e\n        \u003ctd\u003e 服务器错误，服务器失败，尽管请求是正确的 \u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch6\u003e 原因短语 \u003c/h6\u003e\n\u003cp\u003e 原因短语（ Reason-Phrase ）使用短语简单地说明了状态代码所要表达的意思。 \u003c/p\u003e\n\u003cp\u003e 见详细 ...\u003c/p\u003e\n\u003ch5\u003e 了解 HTTP 消息报头的内容 \u003c/h5\u003e\n\u003cp\u003eHTTP 消息报头包括普通报头（ general-header ）、请求报头（ request-header ）、响应报头（ response-header ）和实体报头（ entity-header\n    ）。每个报头字段都由下面的格式组成： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e 名字 + \";:\"; + 空格 + 值 \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 并且，消息报头字段的名字是不区分大小写的。 \u003c/p\u003e\n\u003ch6\u003e 普通报头 \u003c/h6\u003e\n\u003cp\u003e 有少数报头字段既可以应用于请求消息，也可以应用于响应消息，但并不用于被传输的实体，这些报头字段只用于传输的消息。 \u003c/p\u003e\n\u003cp\u003e 常用的普通报头包括： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eCache-Control\u003c/span\u003e\u003cspan class=\"p\"\u003eDate\u003c/span\u003e\u003cspan class=\"p\"\u003eConnection\u003c/span\u003e\u003cspan\n        class=\"p\"\u003ePragma\u003c/span\u003e\u003cspan class=\"p\"\u003eTransfer-Encoding\u003c/span\u003e\u003cspan class=\"p\"\u003eUpgrade\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eVia\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 请求报头 \u003c/h6\u003e\n\u003cp\u003e 请求报头允许客户端向服务器端传递该请求的附加信息以及客户端自身的信息，就像是为程序提供附加的参数。 \u003c/p\u003e\n\u003cp\u003e 常用的请求报头包括： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eAccept\u003c/span\u003e\u003cspan class=\"p\"\u003eAccept-Charset\u003c/span\u003e\u003cspan class=\"p\"\u003eAccept-Encoding\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eAccept-Language\u003c/span\u003e\u003cspan class=\"p\"\u003eAuthorization\u003c/span\u003e\u003cspan class=\"p\"\u003eFrom\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eHost\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eIf-Modified-Since\u003c/span\u003e\u003cspan class=\"p\"\u003eIf-Match\u003c/span\u003e\u003cspan class=\"p\"\u003eIf-None-Match\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eIf-Range\u003c/span\u003e\u003cspan class=\"p\"\u003eIf-Unmodified-Since\u003c/span\u003e\u003cspan class=\"p\"\u003eMax-Forwards\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eProxy-Authorization\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eRange\u003c/span\u003e\u003cspan class=\"p\"\u003eReferer\u003c/span\u003e\u003cspan class=\"p\"\u003eUser-Agent\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 响应报头 \u003c/h6\u003e\n\u003cp\u003e 响应报头允许服务器传递不能放在状态行中的附加响应信息以及关于服务器的信息和对 Request-URI 所标识的资源进行下一步访问的信息。 \u003c/p\u003e\n\u003cp\u003e 常用的响应报头包括： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eAge\u003c/span\u003e\u003cspan class=\"p\"\u003eLocation\u003c/span\u003e\u003cspan class=\"p\"\u003eProxy-Authenticate\u003c/span\u003e\u003cspan\n        class=\"p\"\u003ePublic\u003c/span\u003e\u003cspan class=\"p\"\u003eRetry-After\u003c/span\u003e\u003cspan class=\"p\"\u003eServer\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eVary\u003c/span\u003e\u003cspan class=\"p\"\u003eWarning\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eWWW-Authenticate\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 实体报头 \u003c/h6\u003e\n\u003cp\u003e 实体是由实体报头和实体正文组成的。实体正文就是请求消息中的请求正文或者响应消息中的响应正文；实体报头定义了关于实体正文所标识的资源的元数据信息。 \u003c/p\u003e\n\u003cp\u003e 常用的实体报头包括： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eAllow\u003c/span\u003e\u003cspan class=\"p\"\u003eContent-Encoding\u003c/span\u003e\u003cspan class=\"p\"\u003eContent-Language\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eContent-Length\u003c/span\u003e\u003cspan class=\"p\"\u003eContent-Type\u003c/span\u003e\u003cspan class=\"p\"\u003eLast-Modified\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eExpires\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 除了这些字段，实体报头还可以自定义字段。 \u003c/p\u003e\n\u003cp\u003e 技巧与提示。 \u003c/p\u003e\n\u003cp\u003e 由上面的表述也可以看出，如果将 HTTP 消息报头分解，再来看一下请求和响应的详细组成。 \u003c/p\u003e\n\u003cp\u003eHTTP 请求。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eRequest = Request-Line\u003c/span\u003e\u003cspan class=\"p\"\u003e*( general-header\u003c/span\u003e\u003cspan class=\"p\"\u003e|\n        request-header\u003c/span\u003e\u003cspan class=\"p\"\u003e| entity-header )\u003c/span\u003e\u003cspan class=\"p\"\u003eCRLF\u003c/span\u003e\u003cspan class=\"p\"\u003e[\n        message-body ]\u003c/span\u003e\u003cspan class=\"p\"\u003eHTTP 响应 \u003c/span\u003e\n    \u003cspan class=\"p\"\u003eResponse = Status-Line\u003c/span\u003e\u003cspan class=\"p\"\u003e*( general-header\u003c/span\u003e\u003cspan class=\"p\"\u003e|\n        response-header\u003c/span\u003e\u003cspan class=\"p\"\u003e| entity-header )\u003c/span\u003e\u003cspan class=\"p\"\u003eCRLF\u003c/span\u003e\u003cspan class=\"p\"\u003e[\n        message-body ]\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ http 协议","title":"简介"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","http 协议","简介"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
