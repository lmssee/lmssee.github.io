                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 简介 \u003c/h5\u003e\n\u003cp\u003eHTTP/2 （原名 HTTP/2.0 ）即超文本传输协议 2.0 ，是下一代 HTTP 协议，可以说是 SPDY 的升级版（其实原本也是基于 SPDY 设计的）。 \u003c/p\u003e\n\u003ch6\u003eHTTP2.0 和 HTTP1.X 相比的新特性 \u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e 异步连接多路复用 \u003c/li\u003e\n    \u003cli\u003e 头部压缩 \u003c/li\u003e\n    \u003cli\u003e 请求 / 响应管线化 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e HTTP 2.0 ( 草案 ) 相对于 HTTP 1.1 在减少网络延迟而不中断 HTTP 语义方面提出了一系列的改进。 \u003c/p\u003e\n\u003cp\u003e 其中一个重要的改进便是 HTTP 2.0 引入二进制框架，这是 HTTP 1.1\n    所不兼容的。既然是用在浏览器和服务器上，那么对于用户来讲“不可见”也是可以理解的。另一个改进是支持多个并发的 HTTP 请求取代此前仅支持单一请求模式。 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ http 协议","title":"http2"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","http 协议","http2"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
