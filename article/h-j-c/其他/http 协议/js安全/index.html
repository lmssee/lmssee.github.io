="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>js安全</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch4\u003e 跨站脚本攻击（ XSS ） \u003c/h4\u003e\n\u003cp\u003eXSS 指的是恶意攻击者向 Web 页面里插入的恶意脚本代码，当用户浏览该页时，嵌入 Web 里面的脚本代码会被执行，从而达到恶意用户的特殊目的。 \u003c/p\u003e\n\u003cp\u003e 下面来看一个最简单的跨站脚本攻击范例，该代码使用 ASP.NET 接收一个传送的参数，并将其显示出来： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;%@ Page Language=\"C#\"; ResponseEncoding=\"utf-8\" ValidateRequest=\"False\";\n        %\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;%\u003c/span\u003e\u003cspan class=\"p\"\u003estring scriptString =\n        Request.QueryString[0];\u003c/span\u003e\u003cspan class=\"p\"\u003eResponse.Write(scriptString);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e%\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这是一个最简单的动态网页，一般情况下没有问题，但是如果有恶意者使用下面的网址请求： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;a href=\"http://localhost/test.aspx?\u0026lt;script\u0026gt;alert(\"hi!XSS\"\n        rel=\"nofollow\"\u0026gt;http://localhost/test.aspx?\u0026lt;script\u0026gt;alert(\"hi!XSS\u0026lt;/a\u0026gt; is\n        here.\");\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 由于没有对输入的请求进行验证就进行了输出，从而会执行客户端脚本代码。设想一下，如果某个地址是别人 \" 骗你 \" 单击一个链接发起的，并且客户端脚本代码是用来获取你的会话和 Cookie\n    的，那么你的这些信息将会被窃取，并被提交给攻击者的某一 Web 站点，从而可能被非法地恶意利用，这就是众所周知的 XSS （ Cross Site Scripting ，跨站脚本攻击）。 \u003c/p\u003e\n\u003cp\u003e 下面的网址是一个安全厂商做的演示程序，可以帮助读者更详细地了解跨站脚本攻击： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;a href=\"http://www.nsfocus.com/en/1_solution/1_2_8_1.html\"\n        rel=\"nofollow\"\u0026gt;http://www.nsfocus.com/en/1_solution/1_2_8_1.html\u0026lt;/a\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 如何防范跨站脚本攻击 \u003c/h5\u003e\n\u003cp\u003eXSS 攻击主要是因不检查数据造成的，一般情况下，对请求的数据进行转换和过滤就可以有效防范 XSS 攻击。 \u003c/p\u003e\n\u003cp\u003e 数据的转换是可以在接受数据时，进入数据库时及输出数据时进行，因此，对于开发者，应该首先把精力放到对所有用户提交内容进行可靠的输入验证上，这些提交内容包括 URL 、查询关键字、 HTTP 报头、 POST\n    数据等。只接受在所规定长度范围内、采用适当格式及所希望的字符，过滤或者忽略其它内容。 \u003c/p\u003e\n\u003cp\u003e 如果 Web 应用程序必须支持用户提交 HTML 格式内容，那么应用的安全性将大大降低，因此除非必须这样做，否则一定不要提供此功能。但也有一些措施来保护 Web 应用程序，首先就是确认所接收的 HTML\n    内容被妥善地格式化，仅包含最小化的、安全的标签（绝对没有 script 元素），并且去掉任何对远程内容的引用（尤其是样式表和 JavaScript ）。 \u003c/p\u003e\n\u003cp\u003e 下面是安全的、被允许使用的 HTML 标签，用户可以建立一个数组作为检核列表： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar allowedTags = [\"\u0026lt;font\u0026gt;\", \"\u0026lt;span\u0026gt;\",\n        \"\u0026lt;p\u0026gt;\", \"\u0026lt;br\u0026gt;\", \"\u0026lt;div\u0026gt;\", \"\u0026lt;li\u0026gt;\", \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"\u0026lt;u\u0026gt;\",\n        \"\u0026lt;strike\u0026gt;\", \"\u0026lt;strong\u0026gt;\", \"\u0026lt;table\u0026gt;\", \"\u0026lt;tr\u0026gt;\", \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"\u0026lt;td\u0026gt;\", \"\u0026lt;tbody\u0026gt;\", \"\u0026lt;hr\u0026gt;\", \"\u0026lt;blockquote\u0026gt;\", \"\u0026lt;sub\u0026gt;\", \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\"\u0026lt;sup\u0026gt;\", \"\u0026lt;ul\u0026gt;\", \"\u0026lt;ol\u0026gt;\", \"\u0026lt;img\u0026gt;\", \"\u0026lt;b\u0026gt;\", \"\u0026lt;em\u0026gt;\", \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\"\u0026lt;h1\u0026gt;\", \"\u0026lt;h2\u0026gt;\", \"\u0026lt;h3\u0026gt;\", \"\u0026lt;h4\u0026gt;\", \"\u0026lt;h5\u0026gt;\", \"\u0026lt;h6\u0026gt;\"];\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 事件属性也应该被绝对禁用，下面建立一个数组作为检核列表： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar disabledAttrs = [ \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"onabort\",\n        \"onactivate\", \"onafterprint\", \"onafterupdate\", \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"onbeforeactivate\", \"onbeforecopy\",\n        \"onbeforecut\", \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"onbeforedeactivate\", \"onbeforeeditfocus\", \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"onbeforepaste\", \"onbeforeprint\", \"onbeforeunload\", \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"onbeforeupdate\",\n        \"onblur\", \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"onbounce\", \"oncellchange\", \"onchange\", \"onclick\", \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\"oncontextmenu\", \"oncontrolselect\", \"oncopy\", \"oncut\", \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"ondataavaible\", \"ondatasetchanged\", \"ondatasetcomplete\", \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"ondblclick\",\n        \"ondeactivate\", \"ondrag\", \"ondragdrop\", \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"ondragend\", \"ondragenter\", \"ondragleave\",\n        \"ondragover\", \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"ondragstart\", \"ondrop\", \"onerror\", \"onerrorupdate\", \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"onfilterupdate\", \"onfinish\", \"onfocus\", \"onfocusin\", \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"onfocusout\",\n        \"onhelp\", \"onkeydown\", \"onkeypress\", \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"onkeyup\", \"onlayoutcomplete\", \"onload\", \"onlosecapture\", \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"onmousedown\",\n        \"onmouseenter\", \"onmouseleave\", \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"onmousemove\", \"onmoveout\", \"onmouseover\", \"onmouseup\", \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"onmousewheel\", \"onmove\", \"onmoveend\", \"onmovestart\", \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"onpaste\",\n        \"onpropertychange\", \"onreadystatechange\", \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"onreset\", \"onresize\", \"onresizeend\", \"onresizestart\", \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"onrowexit\", \"onrowsdelete\", \"onrowsinserted\", \"onscroll\", \u003c/span\u003e\u003cspan class=\"p2\"\u003e\"onselect\",\n        \"onselectionchange\", \"onselectstart\", \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"start\", \"onstop\", \"onsubmit\", \"onunload\"];\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 此外，仅仅在客户端过滤是不够的，还要在服务器端过滤 \u003c/p\u003e\n\u003ch5\u003e 使用 ASP.NET 的请求验证防范 XSS\u003c/h5\u003e\n\u003cp\u003e 一些应用程序服务器提供了实用功能，可以执行请求验证，这是一个请求过滤的方式，例如 ASP.NET 应用服务器就提供了这种功能 \u003c/p\u003e\n\u003cp\u003e 在 ASP.NET 网页中，。 \u003c/p\u003e 使用 @Page 指令的 ValidateRequest 属性来设置是否开启请求验证，默认是开启的，即 ValidateRequest=\"True\";\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;%@ Page Language=\"C#\"; ValidateRequest=\"True|False\";%\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 使用请求验证可以验证由客户。 提交的数据。 ASP.NET 内置有一个保存潜在危险值的列表，请求验证将用户输入的值与该列表进行对比，如果可以匹配，就会抛出一个异常提醒用户。验证的输入数据包括 QueryString 、\n    Form 和 Cookies\u003c/p\u003e\n\u003cp\u003e 例如创建一个如下的网页： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;%@ P Language=\"C#\"; ValidateRequest=\"True\"; %\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 使用下面的地址请求该网页： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;a href=\"http://localhost/test.aspx?\u0026lt;script\u0026gt\"\n        rel=\"nofollow\"\u0026gt;http://localhost/test.aspx?\u0026lt;script\u0026gt\u0026lt;/a\u0026gt;;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 也可以在配置文件 Web.config 中设置整个应用程序的禁用请求验证，例如下面的配置： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;configuration\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026l stem.web\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;pages\n        validateRequest=\"False\"; /\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/system.web\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/configuration\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这项功能有助于减少对简单网页或 ASP.NET 应用程序进行跨站点脚本攻击和 SQL 注入式攻击的风险。但是，要注意，除了由 ASP.NET\n    执行的请求验证外，还应该在应用程序中显式地检查其使用的所有输入。请求验证功能无法捕捉所有攻击，特别是无法捕捉那些专门针对应用程序逻辑而策划的攻击 \u003c/p\u003e\n\u003cp\u003e 应该仔细地评估应用程序中所有形式的输入，并确保对它们进行了正确地验证和编码，或者确保应用程序在处理数据或将信息发送回客户端之前已退出。除此之外，别无它法 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ http 协议","title":"js安全"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","http 协议","js安全"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
