="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>同源策略</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e 对于 JavaScript 程序，存在相同 Origin 策略的限制。 Origin 中文意为源、起点，因此也被称为 \" 同源策略 \" 限制。 \u003c/p\u003e\n\u003cp\u003e 同源策略阻止从一个 Origin 加载的文档或者脚本访问从另一个 Origin 加载的文档的属性（即 DOM ）。如果协议、端口、主机相同，那么就认为两个文档具有相同的 Origin 。 \u003c/p\u003e\n\u003ch5\u003e 了解 Origin\u003c/h5\u003e\n\u003cp\u003e 一个资源的 Origin 和一个资源的有效脚本 Origin 都是 opaque\n    类型的标识符或者是一个元组。元组由协议、主机地址、端口以及额外的数据构成。额外的数据可能包含加密用的证书（如果使用加密连接），如果证书改变了，那么 origin 也就改变了。 \u003c/p\u003e\n\u003ch5\u003e 放松相同起点限制 \u003c/h5\u003e\n\u003cp\u003e 对于相同 Origin 策略的限制，有一个例外，即脚本可以设置 document.domain 属性值为当前主域的后缀，这意味着删除了子域。通过删除子域，可以改变有效脚本 Origin\n    以允许相同主域上其它子域上的网页彼此访问。 \u003c/p\u003e\n\u003cp\u003e 不同子域也就是不同主机，这就意味着可以允许同一个域上不同主机上的网页可以互相访问其 DOM 。例如存在文档 http://store.company.com/dir/other.html ，执行如下的设置： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.domain = \"company.com\";\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 那么就会使用 http://company.com/dir/page.html 进行相同 Origin 策略检测。 \u003c/p\u003e\n\u003cp\u003e 但是，不能设置为： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.domain = \"othercompany.com\";\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 属性 document.domain 也可以返回当前主域用于安全检测： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.domain[=domain]\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 当使用共享宿主时，不要使用 document.domain 属性，如果一个不受信任的第三方也能在同一个 IP 地址但不同端口上放置 HTTP 服务器，那么相同 Origin 保护规则将会失败，因为在使用\n    document.domain 对比 Origin 时，端口将被忽略。 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ http 协议","title":"同源策略"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","http 协议","同源策略"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
