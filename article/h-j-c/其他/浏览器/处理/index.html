    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 错误处理 \u003c/h5\u003e\n\u003cp\u003e 一个程序通常有 3\n    种类型的异常，分别为 \" 语法异常 \" 、 \" 运行时的异常 \" 和 \" 逻辑异常 \" 。其中， \" 语法异常 \" 通常是在程序员输入一些编译器无法识别的代码后发生的； \" 运行时的异常 \"\n    通常是在运行时碰到一个错误时发生的，它与 \" 语法异常\n    \" 的区别在于，它不一定是\n    JavaScript 语言的错误引发的异常； \" 逻辑异常 \" 往往发生在程序设计时，程序没有按照预先设计的方式运行。 \u003c/p\u003e\n\u003ch5\u003e 使用 try-catch 语句 \u003cbr\u003e\u003c/h5\u003e\n\u003cp\u003eECMA-262 第 3 版引入了 try-catch 语句，作为 JavaScript 处理异常的一种标准方式。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/* 可能会导致的错误的代码 */ \u003c/span\u003e\u003cspan class=\"p2\"\u003e} catch\n        (error) { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/* 在错误发生时怎么处理 */ \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 应把所有可能会抛出错误的代码都放 try 语句块中，而把那些用于错误处理的代码放 catch 中。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003ea + b; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} catch (error) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003elocation.hash += ' 非法的变量 '; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 如果 try 块中的任何代码出现了错误，就会立即退出代码执行过程，然后接着执行 catch 块。此时， catch 块会收到一个包含错误信息的对象。与其它语言不同的是，即使不使用这个错误对象，也要给它起个名。 \u003c/p\u003e\n\u003cp\u003e 错误对象中包含的实际信息因浏览器而异，但都有一个包含错误消息的 message 属性。 \u003c/p\u003e\n\u003cp\u003e\u003csmall\u003emessage 属性是唯一一个能够保证所有浏览器都支持的属性。除此之外， IE 添加了与 message 属性完全一样的 description 属性，还添加了保存着内部数据错误数量的 number 属性；\n        Firefox 添加了 fileName 、 lineNumber 和 stack （包含栈跟踪技术）属性； Safari 添加了 line （表示行号）、 sourceId （表示内部错误代码）和\n        sourceURL 属性。当然，在跨浏览器编程时，仅建议使用 message 属性。 \u003c/small\u003e 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003ea + b; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} catch (error) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(error.message + ' 非法的变量 '); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 当使用 try-catch 语句时候，浏览器默认自己把错误处理的无痕迹，因而不会报错。对于那些不要求用户懂技术，也不需要用户理解错误的 Web 应用程序，这应该说不是个理想的结果。不过 try-catch\n        能够让我们实现自己的错误处理机制。 \u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e 使用 try-catch 最适合处理那些无法控制的错误。假设在使用一个大型 JavaScript 库中的函数，该函数可能会有意无意地抛出一些错误，由于我们不能随便修改这个库的源代码，所以大可以将对该函数的调用放在\n    try-catch 中，万一有什么错误的，也好恰当的处理。 \u003c/p\u003e\n\u003cp\u003e 在明明白白知道自己的代码会发生什么错误时，再使用 try-catch 就有点不合适了。 \u003c/p\u003e\n\u003ch5\u003e 使用 finally\u003c/h5\u003e\n\u003cp\u003e 使用 finally ， finally 是可选的。但，使用就会都执行。无论 try 或 catch 中包含什么代码 --- 甚至 return 语句，都不会阻止 finally 的执行。 \u003csmall\u003e 如果有\n        finally\n        语句， catch 子句就变成可选的 \u003c/small\u003e 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003etry{ \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003esomeStatements; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ecatch(exception e){\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003esomeStatements; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}finally{ \u003c/span\u003e\u003cspan class=\"p6\"\u003esomeStatements; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e\u003csmall\u003eJavaScript 语言与 Java 语言不同， try...catch...finally 语句只能有一个 catch 语句。这是由于在 JavaScript 语言中无法指定出现异常的类型 \u003c/small\u003e\n    。\n\u003c/p\u003e\n\u003cp\u003e 如果提供 finally 语句，则 catch 变成了可选的， IE7 及以前的版本中有一个 bug ：除非有 catch 子句，否则 finally 中代码永不执行。如果考虑兼容之前的 IE 更早的版本，应提供一个\n    catch 子句，哪怕什么也不写，在 IE8 修复了该 bug 。 \u003c/p\u003e\n\u003ch5\u003e 嵌套 try...catch 语句 \u003c/h5\u003e\n\u003cp\u003e 如果在 catch 区域中也发生了异常，可以在 catch 区域中再使用一组 try...catch 语句，即嵌套使用 try...catch 语句。 \u003c/p\u003e\n\u003ch5\u003e 使用 throw \u003c/h5\u003e\n\u003cp\u003e 与 try-catch 搭配的操作符，用于随时抛出自定义错误。抛出错误时，必须给 throw 操作符指定一个值，这个值是什么类型却没有要求。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ethrow 1;\u003c/span\u003e\u003cspan class=\"p\"\u003ethrow \"hi\";\u003c/span\u003e\u003cspan class=\"p\"\u003ethrow\n        true;\u003c/span\u003e\u003cspan class=\"p\"\u003ethrow {name:\"js\"};\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在使用 throw 操作符时，代码会立即停止执行，仅当有 try-catch 语句捕获到抛出的值后，代码才继续执行。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ethrow new Error(\"someStatements\");\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 也可以使用 throw 语句抛出 Error 对象子类的对象。 \u003c/h6\u003e\n\u003cp\u003e 通过使用某种内置的错误类型，可以更真实的模拟浏览器的错误。每种错误类型的构造函数接受一个参数，即实际的错误消息。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ethrow new SyntaxError (\"SyntaxError\");\u003c/span\u003e\u003cspan class=\"p\"\u003ethrow new TypeError\n        (\"TypeError\");\u003c/span\u003e\u003cspan class=\"p\"\u003ethrow new RangeError (\"RangeError\");\u003c/span\u003e\u003cspan class=\"p\"\u003ethrow new\n        EvalError (\"EvalError\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ethrow new URLError (\"URLError\");\u003c/span\u003e\u003cspan class=\"p\"\u003ethrow new ReferenceError\n        (\"ReferenceError\");\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在自定义错误类型时，最常使用的错误类型就是 Error 、 RangeError 、 ReferenceError 和 TypeError 。 \u003c/p\u003e\n\u003cp\u003e 还可以利用原型链通过继承 Error 来创建自定义的错误类型。此时，需要为新创建的错误类型来指定 name 和 message 属性。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction CustomError(message) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.name = 'CustomError';\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.message = message; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eCustomError.prototype = new Error(); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ethrow new CustomError(\"my message\"); \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 浏览器对待继承自 Error 的自定义错误类型，就像对待其它错误类型一样。如果要捕捉自己抛出的错误并把它与浏览器错误区别对待的话，创建自定义错误也是很有用的。 \u003c/p\u003e\n\u003ch6\u003e 案例 \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar num = 1 /\n        0; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (num == \"Infinity\") { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethrow new Error(\" 被除数不可以为 0\");\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} catch (exception) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(exception.message); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 抛出时机 \u003c/h5\u003e\n\u003cp\u003e 针对函数执行失败给出更多的信息，抛出自定义错误是一种很方便的方式。应该出现某种特定的已知错误条件，导致函数无法正常执行抛出异常。 \u003c/p\u003e\n\u003cp\u003e 在开发 JavaScript 中，重点关注函数和可能导致函数执行错误失败的因素。良好的错误机制应该可以确保代码中只发生自己抛出的错误。 \u003c/p\u003e\n\u003cp\u003e 一般来说，应用程序的较低层次中经常会抛出问题，但这个层次并不会影响当前代码的执行，因而错误得不到真正的处理。如果打算编写一个在很多程序中使用的 JavaScript\n    库，甚至只编写一个会在应用程序多个地方使用的辅助函数，建议使用时抛出错误提供更详细的信息。然后，就可以在应用程序中捕获并适当的处理这些错误。 \u003c/p\u003e\n\u003cp\u003e 在程序中，应该捕获那些确切地知道如何处理的错误。捕获错误的目的在于避免浏览器以默认方式处理，而抛出错误的目的是在于提供错误发生具体的原因的消息。 \u003c/p\u003e\n\u003ch5\u003e 触发 onerror 事件处理异常 \u003c/h5\u003e\n\u003cp\u003e 任何没有通过 try-catch 捕捉到的错误都会触发 window 对象的 error 事件。触发 onerror 事件是最早用于处理 JavaScript 异常的机制。页面出现异常时，将触发 onerror\n    事件，该事件在\n    Window 对象上触发。 \u003c/p\u003e\n\u003cp\u003e 在任何 Web 浏览器中， onerror 事件处理程序都不会创建 event 对象，但它可以接受 3 个 参数：错误消息、错误所在的 URL 和行号。多数情况下，只有错误消息有用。多数情况下，只有错误信息有用，因为 URL\n    只是能给文档的位置，而行号所指的就是即能够出自嵌入的 JavaScript 代码，也能够出自外部文件。 \u003c/p\u003e\n\u003cp\u003e 要指定 onerror 事件处理程序，必须使用如下的 DOM 0 级技术，它没有遵循 DOM 2 级事件的标准格式。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow.onerror = function (message,url,line){\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(message)\n        ； \u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 只要发生错误，不管是不是浏览器生成的，都会触发 error 事件，并执行这个事件处理程序。然后，浏览器默认的机制发挥作用，像往常一样显示出错误信息。 \u003c/p\u003e\n\u003cp\u003e 通过返回 false ，这个函数实际上就充当了整个文档中的 try-catch\n    语句，可以捕获所有的无代码处理的运行时错误。这个事件处理程序是避免浏览器报告错误的最后一道防线，理想情况下，只要可能就不应该使用它。只要能够适当的使用 try-catch 语句，就不会有错误误交给浏览器，也就不会触发\n    error 事件。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow.onerror = function(message,url,line){\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(message);\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ereturn false;\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.onerror=function(){\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\" 您调用的函数不存在 \"); \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn true; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 参数 window.onerror 用来触发 onerror 事件 \u003c/h6\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 如果在 onerror 事件处理函数中没有使用 return true 语句，在弹出错误提示对话框后，浏览器的错误报告也会显示出来。为了隐藏此错误报告，函数需要返回 true 。 \u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e 除了 Window 对象可以触发 onerror 事件之外，图像对象也可以触发 onerror 事件。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.images[0].onerror=function(){\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003esomestatements; \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn true; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 参数 document.images[0] 用来表示页面中的第一个图像。 \u003c/p\u003e\n\u003cp\u003e 使用 onerror 事件处理异常除了可以捕捉异常之外，还可以提供如下 3 种信息来确定发生异常的详细信息。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 异常信息：获取异常信息。 \u003c/li\u003e\n    \u003cli\u003eURL ：获取发生异常的文件的绝对路径。 \u003c/li\u003e\n    \u003cli\u003e 行号：给定发生异常文件的行号。 \u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ 浏览器","title":"处理"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","浏览器","处理"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
