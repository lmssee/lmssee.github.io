                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 控制台 \u003c/h5\u003e\n\u003cp\u003econsole.warn() 和 console.error() 是警示级别。 \u003c/p\u003e\n\u003cp\u003e 控制台还有如下一些其它比较有用的函数。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 堆栈函数 console.trace() ，可以查看指定函数的调用关系 \u003c/li\u003e\n    \u003cli\u003eclear() 函数，用来清除控制台中的 log\u003c/li\u003e\n\u003c/ul\u003e\n\u003cul\u003e\n    \u003cli\u003edir() 函数，输出对象中的所有属性，如： dir({test:1,test2:2});\u003c/li\u003e\n    \u003cli\u003evalues() 函数，以数组的形式打印出对象中的所有属性值 \u003c/li\u003e\n    \u003cli\u003ekeys() 与 values() 是一对，会以数组方式打印对象中所有键（名字） \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e 使用控制台 \u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003eerror （ message ） 将错误信息记录到控制台 \u003c/li\u003e\n    \u003cli\u003einfo （ message ） 将信息性信息记录在控制台 \u003c/li\u003e\n    \u003cli\u003elog （ message ） 将一般信息记录在控制台 \u003c/li\u003e\n    \u003cli\u003ewarn （ message ） 将警告信息记录在控制台 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e 不存在一种跨浏览器向 JavaScript 写入信息的机制，但下面的函数可以作为统一的接口 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003efunction log(message) \u003c/span\u003e\u003cspan class=\"p2\"\u003e{ if (typeof console ==\n        'Object') { \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(message); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eelse\n        if (typeof opera == 'Object') { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eopera.postError(message); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else if (typeof java == 'object' \u0026\u0026 typeof\n        java.lang == \"object\") { \u003c/span\u003e\u003cspan class=\"p8\"\u003ejava.lang.System.out.printIn(message); } \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ 浏览器","title":"控制台"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","浏览器","控制台"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
