="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>异常</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 错误分析 \u003c/h5\u003e\n\u003cp\u003e 由于 JavaScript 是松散类型的，不会验证函数的参数，因此错误只会发生在代码运行期间。一般来说： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 转换性错误 \u003c/li\u003e\n    \u003cli\u003e 数据类型错误 \u003c/li\u003e\n    \u003cli\u003e 通信错误 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e 错误类型 \u003c/h5\u003e\n\u003cp\u003eECMA-262 定义了以下 7 种错误类型，简单说明如下。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eError ：普通错误。通常与 throw 语句和 try/catch 语句一起使用。利用属性的 name 可以声明或了解异常的类型，利用 message 属性可以设置和读取设置和读取异常的详细信息 \u003c/li\u003e\n    \u003cli\u003eEvalError : 在不正确使用 eval() 时抛出 \u003c/li\u003e\n    \u003cli\u003eSyntaxError ：抛出语法错误 \u003c/li\u003e\n    \u003cli\u003eRangeError ：在数字超出合法范围时抛出 \u003c/li\u003e\n    \u003cli\u003eReferenceError ：在读取不存在的变量时抛出 \u003c/li\u003e\n    \u003cli\u003eTypeError ： 当一个值的类型错误时抛出 \u003c/li\u003e\n    \u003cli\u003eURLError ： 由 URL 的编码和解码方面抛出 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003eError\u003c/h6\u003e\n\u003cp\u003e 其中， error 是基类，其它错误类型都继承自该类型，因此，所有的错误类型都共享了一组相同的属性，错误对象的方法全是默认的对象方法。 Error\n    类型的错误很少见，如果是浏览器抛出的，这个基类的主要目的是供开发员抛出自定义错误。 \u003c/p\u003e\n\u003ch6\u003eEvalError\u003c/h6\u003e\n\u003cp\u003e 在实践中，浏览器不一定在因该抛出错误时就抛出 EvalError 。而且，在实际开发中很少使用 Eval() ，所以遇见这种错误的可能性非常小。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003enew eval(); \u003cspan class=\"r\"\u003e // 抛出 EvalError \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003eeval =\n        foo; \u003cspan class=\"r\"\u003e // 抛出 EvalError \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eRangeError\u003c/h6\u003e\n\u003cp\u003e 该类型错误是在数值超出相应的范围时抛出， JavaScript 中经常有这种错误。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar item = new Array(-20); \u003cspan class=\"r\"\u003e // 抛出 RangeError \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        item = new Array(Number.MAX_VALUE); \u003cspan class=\"r\"\u003e // 抛出 RangeError \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eReferenceError\u003c/h6\u003e\n\u003cp\u003e 在找不到对象的情况下，会发生 ReferenceError ： \u003c/p\u003e\n\u003cdic class=\"c\"\u003e\u003cspan class=\"p\"\u003evar obj = x;\u003cspan class=\"r\"\u003e// 在 x 未声明的情况下抛出 ReferenceError \u003c/span\u003e\u003c/span\u003e\n\u003c/dic\u003e\n\u003ch6\u003eSyntaxError\u003c/h6\u003e\n\u003cp\u003eSyntaxError 表示语法错误，当把语法错误的 JavaScript 字符串传入 eval() 函数时，就会导致该类错误。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eeval ( \" a ++ b \" ) \u003cspan class=\"r\"\u003e// 抛出 SyntaxError 错误 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 如果语法错误在 eval() 之外，这不太可能使用 SyntaxError ，因为此时的语法错误会导致 JavaScript 立即停止执行。 \u003c/p\u003e\n\u003ch6\u003eTypeError\u003c/h6\u003e\n\u003cp\u003eTypeError 是 JavaScript 中经常遇见的错误类型。在变量保存着以外的类型时，或者访问不存在的方法时，都会导致此类错误发生。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar o = new 10; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(\"name\" in true);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eFunction.prototype.toString.call('name');\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eURLError\u003c/h6\u003e\n\u003cp\u003e 在使用 encodeURL() 或 decodeURL() 时，如果 URL 的格式不正确，就会引起 URLError 错误。这种错误也很少见，因为这两个函数的容错性非常高。 \u003c/p\u003e\n\u003ch5\u003ebug\u003c/h5\u003e\n\u003cp\u003e 如果想知道错误类型，可以按照如下的方法在 try-catch 语句的 catch 语句中使用 instanceof 操作符： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003etest() \u003c/span\u003e\u003cspan class=\"p2\"\u003e} catch (error) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (error instanceof TypeError) { \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* 处理类型错误 */ \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} else if (error instanceof ReferenceError) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e/* 处理引用错误 */ \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* 处理其他错误 */ \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 再跨浏览器的编程中，检查类型错误是确认处理方式的最简方案，包含在 message 属性中的错误消息会因浏览器而不同。 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ 浏览器","title":"异常"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","浏览器","异常"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
