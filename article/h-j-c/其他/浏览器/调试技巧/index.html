="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>调试技巧</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 类别 \u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003ealert 语句 \u003c/li\u003e\n    \u003cli\u003ewrite 语句 \u003c/li\u003e\n    \u003cli\u003e 抛出自定义异常消息进行调试 \u003c/li\u003e\n    \u003cli\u003e 控制台输出 console.log(\"\");\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e 与用户交互 \u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003ealert() 用 alert() 向用户弹出一个信息对话框，但这种模态对话框只是显示一些消息和一个 \" OK \" 按钮。术语 \" 模态 \" （ modal\n        ）意味着脚本暂时停止运行，页面与用户的交互也被暂停，直到用户关闭对话框为止。 alert() 没有返回值 \u003c/li\u003e\n    \u003cli\u003econfirm() ， confirm() 对话框为用户提供了一个选择，可以单击 \" OK \" 或 \" Cancel \" 按钮，而不只是一个 \" OK \" 按钮，根据哪个按钮被单击， confirm()\n        方法会返回不同的值。单击 \" OK \" 按钮返回布尔值 \" 真 \" ，单击 \" Cancel \" 按钮返回布尔值 \" 假 \"\u003c/li\u003e\n    \u003cli\u003eprompt() 它允许用户输入信息\n        \u003cul\u003e\n            \u003cli\u003e 如果用户输入了信息，然后单击 \" OK \" 按钮或按回车键，返回值就是用户输入的字符串 \u003c/li\u003e\n            \u003cli\u003e 如果用户没有在对话框里输入信息就单击 \" OK \" 按钮或按回车键，返回值是调用 prompt() 方法设置的第 2 个可选参数的值（如果有的话） \u003c/li\u003e\n            \u003cli\u003e 如果用户简单关闭了这个对话框（也就是单击 \" Cancel \" 按钮或按 Esc 键），返回值就是 null\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e 性能检测 \u003c/h5\u003e\n\u003cp\u003e 大型的项目对性能的要求是很严格的，尤其是面对移动终端设备时。在调试工具中， Profile 可以精确地检测程序的性能。写法很简单，只要在想统计的代码外层添加 profile 代码即可，如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econsole.profile();\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 要统计的代码 \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// …… \u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.profileEnd();\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 当浏览器遇到 profileEnd() 时，就会将统计结果生成报表显示出来，或者在浏览器中使用 Profile 的 record 特性查看。 \u003c/p\u003e\n\u003cp\u003e 使用控制台函数 console.time() 与 console.timeEnd() ，也可以实现同样的效果，当执行到 console.timeEnd() 时，后台把程序的执行时间（以毫秒为单位）发送到控制台，使用控制台的\n    API ，将结果加入到测试代码中，就可以在整体上把控代码的性能，如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econsole.time(\"times\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 代码段略 \u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.timeEnd(\"timesEnd\");\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ 浏览器","title":"调试技巧"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","浏览器","调试技巧"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
