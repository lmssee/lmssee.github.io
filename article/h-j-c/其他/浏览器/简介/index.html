="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>简介</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 浏览器 \u003c/h5\u003e\n\u003ch6\u003eChrome\u003c/h6\u003e\n\u003cp\u003e “ Chrome ”是化学元素“铬”的英文名称；过去也用 Chrome 称呼浏览器的外框。软件的名称来自又称作“ Chrome ”的网络浏览器图形使用者界面（ GUI ）。 \u003c/p\u003e\n\u003ch5\u003e 内核 \u003c/h5\u003e\n\u003cp\u003e 常见内核包括四种 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eTrident 又称 MSHTML ，微软开发的 JScript 。 IE 、 Maxthon 、 TT 、 The Word 、 360 、搜狗 \u003c/li\u003e\n    \u003cli\u003eGecko 开源引擎， SpiderMonkey （ Rhino ）。 Firefox 、 MozillaSuite/SeaMonkey\u003c/li\u003e\n    \u003cli\u003eWebkit 苹果基于 KHTML 开发，包括 WebCore 和 JavaScriptCore （ SquirrelFish 、 V8 ）。 Safari 和 chrome\u003c/li\u003e\n    \u003cli\u003ePresto 由 Opera 开发。 Opera 7 及以上 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eWeb 浏览器的 JavaScript 引擎 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 浏览器 \u003c/th\u003e\n        \u003cth\u003e 引擎名称 \u003c/th\u003e\n        \u003cth\u003e 说明 \u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eSafari\u003c/td\u003e\n        \u003ctd\u003eNitro （也称 Squirrel Fish Extreme ） \u003c/td\u003e\n        \u003ctd\u003eSafari 4 中发布，在 Safari 5 中提升性能，包括字节码优化和上下文线程的本地编译器 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eChrome\u003c/td\u003e\n        \u003ctd\u003eV8\u003c/td\u003e\n        \u003ctd\u003e 自从 Chrome 2 开始，使用了新一代垃圾回收机制，可确保内存高度可扩展而不会发生中断 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eIE\u003c/td\u003e\n        \u003ctd\u003eChakra\u003c/td\u003e\n        \u003ctd\u003e 注重于后台编译和高效的类型系统，速度比 IE8 快 10 倍 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eFirefox\u003c/td\u003e\n        \u003ctd\u003eJägerMonkey\u003c/td\u003e\n        \u003ctd\u003e 从 3.5 版本优化而来，结合了快速解释和源自追踪树（ trace tree ）的本地编译 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eOpera \u003c/td\u003e\n        \u003ctd\u003eCarakan\u003c/td\u003e\n        \u003ctd\u003e 它采用了基于寄存器的字节码和选择性本地编译的方式，声称效率比 10.50 版本提升了 75%\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e 供应商前缀 \u003c/h5\u003e\n\u003cp\u003e 供应商前缀，比如 \" -webkit \" （用于基于 WebKit 的浏览器，比如 Chrome 和 Safari ）、 \" -moz \" （用于 Mozilla Firefox ）、 \" -ms \" （用于\n    Microsoft\n    Internet Explorer ）和 \" -o \" （用于 Opera ）。 \u003c/p\u003e\n\u003ch6\u003eTrident/Tasman \u003c/h6\u003e\n\u003cp\u003eTrident/Tasman 是微软公司开发的一种排版引擎程序，其分别应用于微软公司开发的 Windows 操作系统和苹果公司开发的 Mac OS X 操作系统中。目前，国内绝大多数第三方 Web\n    浏览器都使用这一排版引擎作为内核，以解析网页代码。 \u003c/p\u003e\n\u003cp\u003e 这种浏览器内核为微软公司开发的 IE 浏览器和 Office 系列软件提供数据解析和排版功能。例如，目前可供调用的 Trident 5.0 内核是 IE 9 所用的内核，而 Trident 6.0 则是 IE 10\n    所用的内核。 \u003c/p\u003e\n\u003ch6\u003eGecko\u003c/h6\u003e\n\u003cp\u003eGecko 是由 Mozilla 基金会主持开发的一款 C++ 编写的开源网页排版引擎，最初主要作为 Netscape 和 Firefox 等浏览器的内核，但是， Firefox\n    浏览器最为常用，因此也被称为火狐内核。现在则可以为多种类型的应用程序提供网页排版支持， Gecko 排版引擎可以运行于多种操作系统上，包括 Windows 、 Linux 和 Mac OS X 等。 \u003c/p\u003e\n\u003ch6\u003eWebKit \u003c/h6\u003e\n\u003cp\u003eWebKit 排版引擎最初是由苹果公司自 Linux 操作系统下的 KHTML 引擎修改而来的，作为 Mac OS X 操作系统的基础排版引擎。 WebKit 与 Gecko 相同，它也是一个开源的排版引擎。 \u003c/p\u003e\n\u003cp\u003eWebKit 是苹果给开源世界的一大贡献，它是目前最热门的浏览器内核，其热门不是说市场份额，而是应用的面积和势头。 WebKit 引擎可以运行于多种操作系统之上，所以它以对 HTML 5 技术的强大支持著称。 \u003c/p\u003e\n\u003cp\u003eWebKit 内核是目前速度最快的渲染引擎，它又被称为高速浏览内核。 Chrome 、 Mobile Chrome 、 Safari 和 Mobile Safari 等浏览器都是使用该引擎作为内核。 \u003c/p\u003e\n\u003ch6\u003ePresto\u003c/h6\u003e\n\u003cp\u003ePresto 排版引擎是由挪威 Opera Software AA 开发的排版引擎，与 Gecko 类似， Presto 本身也是作为一款专用的浏览器内核开发的。 Presto 虽然体积很小，但是，它解析代码的效率非常高。\n\u003c/p\u003e\n\u003cp\u003ePresto 排版引擎在 Windows 、 Linux 和 Mac OS X 等操作系统上应用并不十分广泛，与其它内核相比，它最为封闭。目前， Opera 浏览器就是使用的这种内核。 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ 其他 ✈︎✈︎ 浏览器","title":"简介"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","其他","浏览器","简介"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
