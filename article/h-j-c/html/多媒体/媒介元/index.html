                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定义媒介源\u003c/h5\u003e\n\u003cp\u003e\u0026lt;source\u0026gt; 标签是 HTML 5 中的新标签，该标签允许设置可替换的视频 / 音频文件供浏览器根据它对媒体类型或者编解码器的支持进行选择。\u003c/p\u003e\n\u003cp\u003e如果在 audio 元素和 video 元素中使用了 source 元素，浏览器会按照 source\n    元素的顺序检测指定的音频和视频是否能够播放。可能由于浏览器不支持这些音频或视频数据的格式，或者音频或视频数据不存在等原因而导致不能播放，如果不能播放，换下一个元素进行检测播放。一旦找到能够播放的格式文件后，就播放该文件而忽略随后的其它元素。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003esrc 属性：该属性提供媒体源的 URL 地址，与 video 元素和 audio 元素的 src 一样\u003c/li\u003e\n    \u003cli\u003etype 属性：用于说明 src 属性指定媒体文件的类型，帮助播放器判断要播放的媒体内容的类型。其属性值是一个有效的 MIME 类型字符串，例如 video/mp4 。 type 属性还存在着一个参数 codecs\n        ，这个参数用来指定特定媒体编码解码器，如 mp4.v.20.8\u003c/li\u003e\n    \u003cli\u003emedia 属性：用于说明媒体在不同种介质中使用，不设置时默认为 all ，表示支持所有介质\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e定义媒介外部文本轨道\u003c/h5\u003e\n\u003cp\u003e\u0026lt;track\u0026gt; 标签为诸如 video 元素之类的媒介规定外部文本轨道，用于规定字幕文件或其它包含文本的文件，当媒介播放时，这些文件是可见的。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;video width=\"320\" height=\"240\" controls=\"controls\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;source src=\"forrest_gump.mp4\" type=\"video/mp4\" /\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;source\n        src=\"forrest_gump.ogg\" type=\"video/ogg\" /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;track kind=\"subtitles\" src=\"subs_chi.srt\" srclang=\"zh\" label=\"Chinese\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;track kind=\"subtitles\" src=\"subs_eng.srt\" srclang=\"en\" label=\"English\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;track kind=\"subtitles\" src=\"brave.de.vtt\" srclang=\"de\" label=\"Deutsch\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;/
