="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>解码器</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            }
                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e编解码器（ codec ）\u003c/h5\u003e\n\u003cp\u003e术语多媒体（ multimedia ）包含我们在 Web 页面上看到和听到的一切内容：音频、视频和动画，以及静态图像和文本。\u003c/p\u003e\n\u003ch5\u003e音频编解码器\u003c/h5\u003e\n\u003ch6\u003eAAC \u003c/h6\u003e\n\u003cp\u003eAAC （ Advanced Audio Coding ，高级音频编码）\u003c/p\u003e\n\u003cp\u003e于 1997 年标准化，基于 MPEG-2 的音频编码技术，当时苹果将其作为 iTunes 的默认存储格式，因此而得以举世闻名并广为应用。 AAC 是由 Fraunhofer IIS 、杜比实验室、 AT\u0026T 、 Sony\n    等公司共同开发的，意在取代 MP3 格式。自 2000 年 MPEG-4 标准出现之后， AAC 重新集成了 MPEG-4 的特性，加入了 SBR 技术和 PS 技术，为了与之前的 MPEG-2 AAC 相区别，新一代的\n    AAC 又被称为 MPEG-4 AAC 。 AAC\n    可以按任意比特率进行编码，通常情况下压缩比为 18:1 ，比 MP3 胜出很多。而 MP3 只能将比特率限制在一定范围内，即 320Kbps 之内。 AAC 理论上能够编码高达 48\n    个声道，而且支持自定义多个配置文件，以适应不同配置的计算机和不同速率的网络环境。如果使用高配，则能够在相同比特率下提高音质，但同时意味着编解码会比较费时。 目前，苹果产品（包括 iPod 、 Appler TV 、\n    QuickTime 等）、 Sony Walkman 、任天堂 NDSi 和魅族 M8\n    等 MP3 播放器都支持 AAC 。此外计算机上如果安装过 AAC 解码器，则很多音乐播放软件也都能支持 AAC ，如苹果的 iTunes 。 AAC\n    在移动电话领域的支持度已经很普遍，诺基亚、索尼爱立信、摩托罗拉等品牌均在其中高端产品中支持 AAC 。\u003c/p\u003e\n\u003ch6\u003eMPEG-1 音频层 3 \u003c/h6\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003cp\u003eMP3 于 1991 年标准化，最多支持两个声道，并且可以被编码为不同的比特率，范围为 32Kbps~320Kbps ，典型的比特率介于 128Kbps~320Kbps ，而 CD 上未压缩的音频比特率为 1411.2Kbps\n    。 MP3 可以在文件编码时实现动态改变比特率，即使用\"可变码率\"（ VBR ）技术，在声音变化小的部分使用较小的比特率，声音变化较大的部分使用较大的比特率，方法是将音频切分为比特率不同的帧。 MP3\n    并未规定一个精确的编码规范，却详细地定义了解码算法与文件格式。在这种情况下，尽管编码方式非常多，却都可以使用同一播放器解码。在高比特率编码方面表现比较好并广泛被采用的编码器如\n    LAME ，在低比特率编码上却未必表现良好。 MP3 格式的专利授权被很好地保护起来，主要是在美国和日本，不包括欧盟国家。专利保护限制了一些厂商在相关软件方面对 MP3 格式的支持，例如，微软公司倾向于发展自身的\n    Windows Media 格式，以避免与 MP3 相关的专利授权问题。\u003c/p\u003e\n\u003ch6\u003eOgg Vorbis\u003c/h6\u003e\n\u003cp\u003eOgg Vorbis\u003c/p\u003e\n\u003cp\u003eOgg Vorbis 也简称 Vorbis ， Ogg 是指一种文件格式，或是一种\"容器\"，自由而且开放标准，在其中可以放入各式各样的编解码器。 Ogg Vorbis 指的就是将 Vorbis 编码的音效包含在 Ogg\n    的容器中所形成的格式。后来 Ogg 通常指 Ogg Vorbis 这种音频文件格式，而在之前， .ogg 这一扩展名被用在任何 Ogg 支持格式下的内容，直到 2007 年才决定只留给 Vorbis 使用。 Vorbis\n    没有专利保护，因此得以在众多 Linux 发行版中直接播放。\n    Vorbis 之所以开放源代码而且免专利使用费，就是为了与需要专利使用费的 MP3 和 AAC 一争高下。\n\u003c/p\u003e\n\u003ch5\u003e视频编解码器\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003eH.264\n        \u003cdetails\u003e\n            \u003csummary\u003eH.264\u003c/summary\u003e\n            \u003cp\u003eH.264 （或称\" MPEG-4 第十部分\"、\" MPEG-4 AVC \"、\" MPEG-4 高级视频编码\"）是由联合视频组（ JVT ， Joint Video Team\n                ）提出的高度压缩数字视频编解码器标准，于 2003 年实现标准化，其最初目标为以较低的比特率提供更好的视频质量，同时能够支持一切设备。\u003c/p\u003e\n            \u003cp\u003eH.264 比以前的编解码器更能有效地进行编码，并能够适应不同的网络环境，它最大的优势是具有很高的数据压缩比率。如果图像质量相等， H.264 的压缩比为 MPEG-2 的两倍以上， MPEG-4 的\n                1.5~2 倍。正因为这一特点， H.264 在光盘存储、数字电视、网络电视、通信与多媒体方面都有广泛的应用。例如， YouTube 现在采用 H.264 来对高清晰视频进行编码，然后使用 Flash\n                Player 进行播放。\u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003eVP8\n        \u003cdetails\u003e\n            \u003csummary\u003eVP8\u003c/summary\u003e\n            \u003cp\u003eVP8 由 On2 公司于 2008 年 9 月 13 日推出，目的是取代其前任 VP7 视频编解码器。 2009 年， Google 收购了 On2 公司，并于 2010 年 5 月 19 日宣布将\n                VP8 以 BSD 许可证的形式开源，从此时开始， VP8 便成了一个免版权费用可自由使用的技术，任何使用都不受专利限制。\u003c/p\u003e\n            \u003cp\u003e也就是从 2010 年 5 月 19 日开始， Google 的 WebM 项目启动，目标是构建一个开放且免版权费用的视频文件格式，提供高质量的视频压缩以适应 HTML5 的需要。 WebM 项目采用\n                VP8 视频编解码器和 Vorbis 音频编解码器，其封装格式以 Matroska 格式为基础。 Adobe 已宣布 Adobe Flash Player 将在未来支持 VP8 ，但还没有宣布会支持\n                Vorbis 或 WebM 。\u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003eOgg Theora\n        \u003cdetails\u003e\n            \u003csummary\u003eOgg Theora\u003c/summary\u003e\n            \u003cp\u003eTheora 是一个可变比特率图像压缩格式，其图像流可以存储在任何容器文件格式中，最常用的是与 Vorbis 一起存储到 Ogg 容器。浏览器方面， Mozilla Firefox 3.5 提供了对于\n                Theora 格式的原生支持，即不需要任何插件就能播放 Theora 视频，其它浏览器如 Google Chrome 3.0.182.2 、 Opera 10.50\n                等之后的版本都提供了对该格式的支持。也可以使用相关浏览器插件来播放 Theora 视频，如 Annodex\n                的插件、 Cortado 、 VLC 媒体播放器提供的针对 IE 及 Firefox 的插件等。\u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e浏览器支持\u003c/h5\u003e\n\u003cp\u003e使用 audio 元素的 canPlayType 方法可以检测浏览器支持的格式，该方法采用 Mime 格式编码器参数：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction checkAudio() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar myAudio =\n        document.createElement('audio'); \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (myAudio.canPlayType) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif\n        ('' != myAudio.canPlayType('audio/mpeg')) document.write('您的浏览器不支持 mp3 编码 \u0026lt;br/\u0026gt;');\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif ('' != myAudio.canPlayType('audio/ogg;codecs=\"vorbis\"')) document.write('您的浏览器不支持 ogg 编码\n        \u0026lt;br/\u0026gt;'); \u003c/span\u003e\u003cspan class=\"p6\"\u003eif ('' != myAudio.canPlayType('audio/mp4;codes=\"mp4a.40.5\"'))\n        document.write('您的浏览器不支持 aac 编码') \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.write('您的浏览器不支持要检测编码音频格式');\u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e如果 canPlayType 返回 probably 或 maybe ，则说明支持。\u003c/p\u003e\n\u003cp\u003e同样，测试 video 使用相同的思想：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction checkVideo() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar myVideo =\n        document.createElement('video'); \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (myVideo.canPlayType) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif\n        ('' != myVideo.canPlayType('video/ogg;codes=\"theora\"')) document.write('您的浏览器不支持 theora 编码\n        \u0026lt;br/\u0026gt;'); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif ('' != myVideo.canPlayType('video/ogg;codecs=\"vp8\"')) document.write('您的浏览器不支持 vp8 编码\n        \u0026lt;br/\u0026gt;'); \u003c/span\u003e\u003cspan class=\"p6\"\u003eif ('' != myVideo.canPlayType('video/mp4;codes=\"avc1.64001E\"'))\n        document.write('您的浏览器不支持 h264 编码') \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.write('您的浏览器不支持要检测编码音频格式'); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e对于不支持 html 5 媒体格式的可以这样：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;video src=\"video.ogg\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;object\n        data=\"videoplayer.swf\" type=\"application/x-shorkwave-flash\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;param\n        name=\"movie\" value=\"video.swf\"\u0026gt;\u0026lt;/object\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/video\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 多媒体","title":"解码器"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","多媒体","解码器"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
