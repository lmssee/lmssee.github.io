    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eparam 元素\u003c/h5\u003e\n\u003cp\u003eparam 元素允许为插入 HTML 文档的对象进行 run-time 属性设置，也就是说，此标签可为包含它的 \u0026lt;object\u0026gt; 或者 \u0026lt;applet\u0026gt; 标签提供参数。\u003c/p\u003e\n\u003ch6\u003edevicefont\u003c/h6\u003e\n\u003cp\u003etrue ｜ false\u003c/p\u003e\n\u003cp\u003e（可选）对于未选定\"设备字体\"选项的静态文本对象，指定是否仍使用设备字体进行绘制（如果操作系统提供了所需字体）\u003c/p\u003e\n\u003ch6\u003esrc\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003exxx.swf\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e指定要加载的 SWF 文件的名称。仅适用于 embed\u003c/p\u003e\n\u003ch6\u003emovie \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003exxx.swf \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e指定要加载的 SWF 文件的名称。仅适用于 param\u003c/p\u003e\n\u003ch6\u003eautoplay\u003c/h6\u003e\n\u003cp\u003etrue ｜ false\u003c/p\u003e\n\u003cp\u003e（可选）指定应用程序是否在浏览器中加载时就开始播放。如果您的 Flash 应用程序是交互式的，则可以让用户通过单击按钮或执行某些其它任务来开始播放。在这种情况下，将 play 属性设置为 false\n    可禁止应用程序自动开始播放。如果忽略此属性，默认值为 true\u003c/p\u003e\n\u003ch6\u003eloop\u003c/h6\u003e\n\u003cp\u003etrue ｜ false\u003c/p\u003e\n\u003cp\u003e（可选）指定 Flash 内容在它到达最后一帧后是无限制重复播放还是停止。如果忽略此属性，默认值为 true\u003c/p\u003e\n\u003ch6\u003equality\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003elow ｜ medium ｜ high ｜ autolow ｜ autohigh ｜ best\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e（可选）指定在应用程序回放期间使用的消除锯齿级别。因为消除锯齿需要更快的处理器先对 SWF 文件的每一帧进行平滑处理，然后再将它们呈现到观众屏幕上，所以需要根据要优化速度还是优化外观来选择一个值： \" Low\n    \"使回放速度优先于外观，而且从不使用消除锯齿功能 \" Autolow \"优先考虑速度，但是也会尽可能改善外观。回放开始时，消除锯齿功能处于关闭状态。如果 Flash Player\n    检测到处理器可以处理消除锯齿功能，就会打开该功能 \" Autohigh\n    \"在开始时是回放速度和外观两者并重，但在必要时会牺牲外观来保证回放速度。回放开始时，消除锯齿功能处于打开状态。如果实际帧频降到指定帧频之下，就会关闭消除锯齿功能以提高回放速度。使用此设置可模拟\n    Flash 中的\"消除锯齿\"命令（\"查看\" \u0026gt; \"预览模式\" \u0026gt; \"消除锯齿\"）。 \" Medium \"会应用一些消除锯齿功能，但并不会平滑位图。该设置生成的图像品质要高于\" Low\n    \"设置生成的图像品质，但低于\" High \"设置生成的图像品质。 \" High \"使外观优先于回放速度，它始终应用消除锯齿功能。如果 SWF 文件不包含动画，则会对位图进行平滑处理；如果 SWF\n    文件包含动画，则不会对位图进行平滑处理。 \" Best \"提供最佳的显示品质，而不考虑回放速度。对所有输出都进行消除锯齿处理，并且对所有位图都进行平滑处理。\n    如果忽略 quality 属性，其默认值为 high \u003c/p\u003e\n\u003ch6\u003ebackgroundColor\u003c/h6\u003e\n\u003cp\u003e十六进制 RGB 值\u003c/p\u003e\n\u003cp\u003e（可选）指定应用程序的背景色。使用此属性来覆盖在 Flash SWF 文件中指定的背景色设置。此属性不影响 HTML 页面的背景色\u003c/p\u003e\n\u003ch6\u003escale\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eshowall ｜ noborder ｜ exactfit ｜ noscale \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e（可选）当 width 和 height 值是百分比时，定义应用程序如何放置在浏览器窗口中。 \" Showall \"使整个 Flash\n    内容显示在指定区域中，且不会发生扭曲，同时保持它的原始高宽比。边框可能会出现在应用程序的两侧。 \" Noborder \"对 Flash\n    内容进行缩放以填充指定区域，不会发生扭曲，它会使应用程序保持原始高宽比，但有可能会进行一些裁剪。 \" Exactfit \"使整个 Flash 内容显示在指定区域中，但不尝试保持原始高宽比。可能会发生扭曲。 \" noscale\n    \"使整个 Falsh 内容不缩放，保持原始比例如果忽略此属性（而且 width 和 height 值是百分比），则它的默认值是 showall\u003c/p\u003e\n\u003ch6\u003esalign \u003c/h6\u003e\n\u003cp\u003eL ｜ R ｜ T ｜ B ｜ TL ｜ TR ｜ BL ｜ BR\u003c/p\u003e\n\u003cp\u003e（可选）指定缩放的 Flash SWF 文件在由 width 和 height 设置定义的区域内的位置。有关这些条件的详细信息，请参阅 scale 属性 / 参数。 L 、 R 、 T 和 B\n    让应用程序分别沿着浏览器窗口的左、右、上、下边缘对齐，并根据需要裁剪其余三边。 TL 和 TR 让应用程序分别与浏览器窗口的左上角和右上角对齐，并根据需要裁剪底边和剩余的右侧或左侧边缘。 BL 和 BR\n    让应用程序分别与浏览器窗口的左下角和右下角对齐，并根据需要裁剪顶边和剩余的右侧或左侧边缘。 如果忽略此属性，\n    Flash 内容会在浏览器窗口中居中显示 \u003c/p\u003e\n\u003ch6\u003ebase\u003c/h6\u003e\n\u003cp\u003e基本目录或 URL\u003c/p\u003e\n\u003cp\u003e（可选）指定用于解析 Flash SWF 文件中的所有相对路径语句的基本目录或 URL 。如果 SWF 文件保存在与你的其它文件不同的目录下，这个属性是非常有用的\u003c/p\u003e\n\u003ch6\u003emenu\u003c/h6\u003e\n\u003cp\u003etrue ｜ false\u003c/p\u003e\n\u003cp\u003e（可选）指定当观众在浏览器中右击（ Windows ）或按住 Command 键单击（ Macintosh ）应用程序区域时将显示的菜单类型。 \" true \"显示完整的菜单，让用户使用各种选项增强或控制回放。 \" false\n    \"显示的是一个只包含\"关于 Macromedia Flash Player 6 \"选项和\"设置\"选项的菜单。 如果忽略此属性，默认值为 true \u003c/p\u003e\n]","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 多媒体","title":"param"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","多媒体","param"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
