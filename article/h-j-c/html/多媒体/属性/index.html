    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e音频与视频相关属性\u003c/h5\u003e\n\u003cp\u003eaudio 和 video 拥有相同的属性：\u003c/p\u003e\n\u003ch6\u003eautobuffer--自动缓冲\u003c/h6\u003e\n\u003cp\u003e可读写属性。使用该属性可以使 audio 或 video 元素实现自动缓冲，默认值为 false ，即 audio 或 video 元素默认情况下并不自动缓冲。如果值为 true ，则自动缓冲，但并不播放。如果使用了\n    autoplay 属性，则 autobuffer 属性会被忽略。\u003c/p\u003e\n\u003ch6\u003eautoplay--自动播放\u003c/h6\u003e\n\u003cp\u003e可读写属性。使用该属性可以实现页面加载音频后一旦就绪即开始自动播放，比使用脚本控制音频或视频播放更简便，其值也可以设置为 true 或 false 。如果值为 true 或 autoplay\n    ，则当音频或视频缓冲到足够多时即开始播放。\u003c/p\u003e\n\u003ch6\u003ebuffered--确认浏览器已经缓存媒体文件\u003c/h6\u003e\n\u003cp\u003e只读属性，用于返回一个 TimeRanges 对象，确认浏览器已经缓存媒体文件。\u003c/p\u003e\n\u003ch6\u003econtrols--播放的控制条\u003c/h6\u003e\n\u003cp\u003e可读写属性。该属性为布尔值，可以为媒体文件提供用于播放的控制条，包含播放、暂停、定位、时间显示、音量控制、全屏切换等常用控件。在将来的标准中，有望在播放控件中看到字幕和音轨。开发人员如果不希望使用浏览器默认的控制条，也可以使用脚本来自定义控制条。\n\u003c/p\u003e\n\u003ch6\u003ecurrentSrc--返回媒体数据的 URL 地址\u003c/h6\u003e\n\u003cp\u003e只读属性，无默认值。用于返回媒体数据的 URL 地址，如果媒体 URL 地址未指定，则返回一个空字符串。\u003c/p\u003e\n\u003ch6\u003ecurrentTime--获取或设置当前播放位置\u003c/h6\u003e\n\u003cp\u003e可读写属性，无默认值。用于获取或设置当前播放位置，返回值为时间，单位为秒。\u003c/p\u003e\n\u003ch6\u003edefaultPlaybackRate--获取或设置当前播放速率\u003c/h6\u003e\n\u003cp\u003e可读写属性，无默认值。用于获取或设置当前播放速率，前提是用户没有使用快进或快退控件。\u003c/p\u003e\n\u003ch6\u003eduration--媒体时间\u003c/h6\u003e\n\u003cp\u003e只读属性，无默认值。用于获取当前媒体的持续时间，返回值为时间，单位为秒。\u003c/p\u003e\n\u003ch6\u003eended--是否播放结束\u003c/h6\u003e\n\u003cp\u003e只读属性，无默认值。用于返回一个布尔值，以获悉媒体是否播放结束。\u003c/p\u003e\n\u003ch6\u003eerror--错误状态\u003c/h6\u003e\n\u003cp\u003e只读属性，无默认值。用于返回一个 MediaError 对象以表明当前的错误状态，如果没有出现错误，则\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e返回 null 。错误状态共有 4 个可能值 MEDIA_ERR_ABORTED （数字值为 1 ）：媒体资源获取异常 -- 媒体数据的下载过程因用户操作而终止。\n    \u003c/li\u003e\n    \u003cli\u003eMEDIA_ERR_NETWORK （数字值为 2 ）：网络错误 -- 在媒体数据已经就绪时用户停止了媒体下载资源的过程\u003c/li\u003e\n    \u003cli\u003eMEDIA_ERR_DECODE （数字值为 3 ）：媒体解码错误 -- 在媒体数据已经就绪时解码过程中出现了错误\u003c/li\u003e\n    \u003cli\u003eMEDIA_ERR_SRC_NOT_SUPPORTED （数字值为 4 ）：媒体格式不被支持\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003einitialTime--获取最早的可用于回放的位置\u003c/h6\u003e\n\u003cp\u003e只读属性，无默认值。用于获取最早的可用于回放的位置，返回值为时间，单位为秒。\u003c/p\u003e\n\u003ch6\u003eloop--重新播放\u003c/h6\u003e\n\u003cp\u003e可读写属性。用于获取或设置当媒体文件播放结束时是否再重新开始播放。\u003c/p\u003e\n\u003ch6\u003emuted--是否开启静音\u003c/h6\u003e\n\u003cp\u003e可读写属性，无默认值。 muted 属性为布尔值，用于获取或设置当前媒体播放是否开启静音， true 为开启静音， false 为未开启静音。如果对其赋值，则可以设置播放时是否静音。\u003c/p\u003e\n\u003ch6\u003enetworkState--返回媒体的网络状态\u003c/h6\u003e\n\u003cp\u003e只读属性。用于返回媒体的网络状态，共有 4 个可能值 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eNETWORK_EMPTY （数字值为 0 ）：元素尚未初始化\u003c/li\u003e\n    \u003cli\u003eNETWORK_IDLE （数字值为 1 ）：加载完成，网络空闲\u003c/li\u003e\n    \u003cli\u003eNETWORK_LOADING （数字值为 2 ）：媒体数据加载中\u003c/li\u003e\n    \u003cli\u003eNETWORK_NO_SOURCE （数字值为 3 ）：因为不存在支持的编码格式，加载失败\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003epaused--是否暂停播放\u003c/h6\u003e\n\u003cp\u003e只读属性，无默认值。用于返回一个布尔值，表示媒体是否暂停播放， true 表示暂停， false 表示正在播放。\u003c/p\u003e\n\u003ch6\u003eplaybackRate--读取或设置媒体资源播放的当前速率\u003c/h6\u003e\n\u003cp\u003e可读写属性，无默认值。用于读取或设置媒体资源播放的当前速率。\u003c/p\u003e\n\u003ch6\u003eplayed--标明媒体资源在浏览器中已播放的时间范围\u003c/h6\u003e\n\u003cp\u003e只读属性，无默认值。用于返回一个 TimeRanges 对象，标明媒体资源在浏览器中已播放的时间范围。 TimeRanges 对象的 length 属性为已播放部分的时间段，该对象有两个方法， end\n    方法用于返回已播放时间段的结束时间， start 方法用于返回已播放时间段的开始时间。\u003c/p\u003e\n\u003ch6\u003epreload--定义视频是否预加载\u003c/h6\u003e\n\u003cp\u003e可读写属性，无默认值。用于定义视频是否预加载，该属性有 3 个可选值： none 、 metadata 和 auto 。如果不用该属性，则默认为 auto\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enone ：不进行预加载。当页面制作人员认为用户不希望播放此视频，或者减少 HTTP 请求时可用该值\u003c/li\u003e\n    \u003cli\u003emetadata ：部分预加载。使用此属性值，代表页面制作者认为用户不希望播放此视频，但为用户提供一些元数据（包括尺寸、第一帧、曲目列表和持续时间等）\u003c/li\u003e\n    \u003cli\u003eauto ：全部预加载\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003ereadyState--返回媒体当前播放位置的就绪状态\u003c/h6\u003e\n\u003cp\u003e只读属性，无默认值。用于返回媒体当前播放位置的就绪状态，共有以下 5 个可能值 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eHAVE_NOTHING （数字值为 0 ）：当前播放位置没有有效的媒体资源。\u003c/li\u003e\n    \u003cli\u003eHAVE_METADATA （数字值为 1 ）：媒体资源确认存在且加载中，但当前位置没有能够加载到有效的媒体数据以进行播放\u003c/li\u003e\n    \u003cli\u003eHAVE_CURRENT_DATA （数字值为 2 ）：已获取到当前播放数据，但没有足够的数据进行播放\u003c/li\u003e\n    \u003cli\u003eHAVE_FUTURE_DATA （数字值为 3 ）：在当前位置已获取到后续播放媒体数据，可以进行播放\u003c/li\u003e\n    \u003cli\u003eHAVE_ENOUGH_DATA （数字值为 4 ）：媒体数据可以进行播放，且浏览器确认媒体数据正以某一种速率进行加载并有足够的后续数据以继续进行播放，而不会使浏览器的播放进度赶上加载数据的末端\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003eseekable--对当前媒体资源进行请求\u003c/h6\u003e\n\u003cp\u003e只读属性，无默认值。用于返回一个 TimeRanges 对象，表明可以对当前媒体资源进行请求。\u003c/p\u003e\n\u003ch6\u003eseeking--是否正在请求某一播放位置的媒体数据\u003c/h6\u003e\n\u003cp\u003e只读属性，无默认值。用于返回一个布尔值，表示浏览器是否正在请求某一播放位置的媒体数据， true 表示浏览器正在请求数据，而 false 表示浏览器已经停止请求数据。\u003c/p\u003e\n\u003ch6\u003esrc--指定媒体资源的 URL 地址\u003c/h6\u003e\n\u003cp\u003e可读写属性，无默认值。用于指定媒体资源的 URL 地址，与 \u0026lt;img\u0026gt; 标签类似，可与 poster 属性连用。 poster 属性用于指定一张替换图片，如果当前媒体数据无效，则显示该图片。\u003c/p\u003e\n\u003ch6\u003evolume--获取或设置媒体资源的播放音量\u003c/h6\u003e\n\u003cp\u003e可读写属性，无默认值。用于获取或设置媒体资源的播放音量，范围为 0.0~1.0 ， 0.0 为静音， 1.0 为最大音量。注意音量大小并非是线性变化的，如果同时使用了 muted 属性，则此属性会被忽略。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 多媒体","title":"属性"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","多媒体","属性"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
