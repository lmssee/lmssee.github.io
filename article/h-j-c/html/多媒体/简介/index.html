    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e为音频和视频播放使用纯 HTML5 代码\u003c/h5\u003e\n\u003cp\u003eHTML5 包含一些与生俱来的元素用于播放音频和视频。在这种情况下，\"与生俱来的\"（ native\n    ）是指浏览器无需外部插件即可播放多媒体文件的能力，并且所有平台（包括移动平台）上的所有主流的浏览器都支持这些元素。这将是往后播放音频和视频的首选方法。\u003c/p\u003e\n\u003ch5\u003e嵌入多媒体文件\u003c/h5\u003e\n\u003cp\u003eHTML 长时间以来都包含一个标准的 \u0026lt;object\u0026gt; 元素，用于在 Web\n    页面中嵌入多媒体文件。这个元素在桌面和移动浏览器中受到广泛支持，用于代表将会在浏览器中查看或播放\u003cmark\u003e但是要使用外部插件的资源类型\u003c/mark\u003e。\u003c/p\u003e\n\u003cp\u003e除了 width 、 height 限定宽高外，有另外两个属性是显示合适的视频文件所必需的，它们是 data 属性和 type 属性，其中前者的值是想要播放的文件名（或者文件的 URL\n    ），后者则用于标识要播放的媒体的类型。在这里，文件是 Windows Media Video （ WMV ）文件，通过 MIME 类型指定。 MIME 类型（ MIME type ）是一个标识符，用于独特地标识\n    Internet 上的媒体对象的不同类型。 MIME 代表多用途网际邮件扩展（ Multipurpose\n    Internet Mail Extension ），并且这个名称来自于以下事实： MIME 类型最初用于标识电子邮件附件。这些 MIME 类型应该在 \u0026lt;object\u0026gt; 元素的 type 属性中使用，用于标识\n    data 属性所引用的多媒体对象的类型。\u003c/p\u003e\n\u003cp\u003e下面列出了你可能希望在 Web 页面中使用的几种流行的声音和视频格式的 MIME 类型。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eWAV Audio ： audio/vnd.wave\u003c/li\u003e\n    \u003cli\u003eMP3 Audio ： audio/mpeg\u003c/li\u003e\n    \u003cli\u003eMP4 Audio ： audio/mp4\u003c/li\u003e\n    \u003cli\u003eWMV ： video/x-ms-wmv\u003c/li\u003e\n    \u003cli\u003eMPEG Video ： video/mpeg\u003c/li\u003e\n    \u003cli\u003eMPEG4 Video ： video/mp4\u003c/li\u003e\n    \u003cli\u003eQuickTime ： video/q\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 多媒体","title":"简介"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","多媒体","简介"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
