="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>Sockets</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eSockets\u003c/h5\u003e\n\u003cp\u003eWeb 应用中的 HTTP 决定了客户端和服务端的连接是短连接，即客户端 Request ，服务端 Response\n    ，连接断开。如果要想实现客户端和服务端实时通信，只能通过客户端轮询来实现。服务端推送数据也并不是字面意思上的直接推，其实还是客户端自己取。 WebSockets 是 HTML 5\n    规范新引入的功能，用于解决浏览器与后台服务器双向通信的问题，使用 WebSockets 技术后台可以随时向前端推送消息，以保证前后台状态统一。\u003c/p\u003e\n\u003cp\u003eWeb Sockets 实现了浏览器与服务器的双向通信， Web Sockets API 是下一代客户端 - 服务器的异步通信方法，该通信取代了单个的 TCP 套接字，使用 ws 或者 wss\n    协议，可用于任意的客户端和服务器程序。\u003c/p\u003e\n\u003cp\u003eWeb Sockets API 最伟大之处在于服务器和客户端可以在给定时间范围内的任意时段相互推送信息。 Web Sockets 并不限于以 AJAX 或者 XHR 方式通信，这是因为 AJAX 技术需要客户端发起请求，而\n    Web Sockets 服务器和客户端可以彼此相互推送信息； XHR 受到域的限制，而 Web Sockets 允许跨域通信。\u003c/p\u003e\n\u003ch5\u003e使用 Web Sockets API\u003c/h5\u003e\n\u003cp\u003e检测浏览器是否支持 WebSocket 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar sockets = window.WebSocket; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif\n        (!sockets){ \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"WebSocket not supported by this browser\"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}else{ \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"WebSocket supported by this browser\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eWebSocket 的构造函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003eWebSocket WebSocket(in DOMString url, in optional DOMString\n        protocols); \u003c/span\u003e\u003cspan class=\"p4\"\u003eWebSocket WebSocket(in DOMString url, in optional DOMString[]\n        protocols);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在上述两个构造函数中， WebSocket() 实例化时需要传入两个参数，第一个参数是请求地址，该地址指向服务器，其实例化时的格式依次是 ws 或者 wss 、主机名称、端口号以及 WebSocket Server\n    。第二个参数是一个可选参数，表示协议名，它可以是一个，也可以是一个数组。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar mySocket = new\n        WebSocket(\"http://www.example.com/socketserver\", \u003c/span\u003e\u003cspan class=\"p4\"\u003e\"my-custom-protocol\"); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar mySocket = new WebSocket(\"http://www.example.com/socketserver\", \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e[\"protocol1\", \"protocol2\"]);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eWebSocket 的基本事件\u003c/h5\u003e\n\u003cp\u003eonopen ：连接打开时会触发的事件。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003emySocket.onopen = function(){ \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"\n        连接已经打开 \"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eonmessage ：接收服务器端所发送的事件，在该事件中提供了一个 data 属性，它可以包含消息的 Body 部分，消息的 Body 部分必须是一个字符串，可以进行序列化 / 反序列化操作，以便于传递更多的数据。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003emySocket.onmessage = function(event){ \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        message = event.data; \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.getElementById(\"showMessage\").innerHTML = message;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eonclose ：连接关闭时会触发该事件。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003emySocket.onclose = function(){ \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"\n        连接已经关闭 \"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003esend() 方法发送数据。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003emySocket.send(\"Test Message!\"); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003emySocket.send(JSON.stringify({action: \"node.remove\", id: \"001\"}));\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e．连接状态 客户端与服务器端建立连接的过程中， WebSocket 对象的 readyState 属性会记录连接的状态，这个属性有 4 种状态，状态值分别使用数字 0 、 1 、 2 和 3 表示。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e表示没有与服务器端建立连接\u003c/li\u003e\n    \u003cli\u003e1 ： WebSocket 的连接已经建立，可以进行与服务器端的通信\u003c/li\u003e\n    \u003cli\u003e2 ：连接正在关闭\u003c/li\u003e\n    \u003cli\u003e3 ：连接已经关闭或者不可\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e\u003c/h5\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 消息","title":"Sockets"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","消息","Sockets"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
