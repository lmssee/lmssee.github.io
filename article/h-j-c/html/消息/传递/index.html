    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e跨域获取传递消息\u003c/h5\u003e\n\u003cp\u003epostMessage() 方法的目标源页面必须填写（即第二个参数，第一个参数则提交数据），这个目标源页面必须与 iframe 对象所在的域匹配。如果不匹配，将会抛出一个安全性错误，阻止脚本继续执行。\u003c/p\u003e\n\u003cp\u003eevt 对象常用的属性有 data 、 origin 和 source 三个\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003edata 属性：包含传入的消息，一般会将传递的数据转化为字符串\u003c/li\u003e\n    \u003cli\u003eorigin 属性：返回消息来自的域，可能根据它来判断是否是处理消息，是非常基本的层级上的策略控制\u003c/li\u003e\n    \u003cli\u003esource 属性：相当于 window.opener ，这样就可以实现基本的消息互通了\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e服务器推送技术使用事件来实现，英文全称是 Server-Sent Event 。客户端使用 EventSource 对象实现，服务端也有相应的要求。\u003c/p\u003e\n\u003ch5\u003e使用 Server-Sent Event 入门\u003c/h5\u003e\n\u003cp\u003e下面首先创建一个 HTML 网页，在该网页中使用服务器推送技术：\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e例\u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;!doctype html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"UTF-8\"\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt; 范例 \u0026lt;/title\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar source; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/** \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003e* 该函数在文档完成加载后执行\u003c/span\u003e\u003cspan class=\"p4\"\u003e* @return void \u003c/span\u003e\u003cspan class=\"p4\"\u003e*/ \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003efunction init() { \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003evar url = \"\u0026lt;a href=\\\"http:\\/\\/localhost/eventsource/server.php\\\"\n            rel=\\\"nofollow\\\"\u0026gt;http:\\/\\/localhost/eventsource/server.php\u0026lt;/a\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p6\"\u003etry {\n        \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 建立连接，并监听各种事件\u003c/span\u003e\n        \u003cspan class=\"p8\"\u003esource = new EventSource(url); \u003c/span\u003e\u003cspan class=\"p8\"\u003esource.onopen = function(event) {\n        \u003c/span\u003e\u003cspan class=\"p10\"\u003elog(\" 连接已经建立： \" + this.readyState); \u003c/span\u003e\u003cspan class=\"p8\"\u003e}; \u003c/span\u003e\u003cspan\n            class=\"p8\"\u003esource.onmessage = function(event) { \u003c/span\u003e\n        \u003cspan class=\"p10\"\u003elog(\"\u0026lt;b\u0026gt; 接收到的数据： \" + event.data + \"\u0026lt;/b\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p8\"\u003e};\n        \u003c/span\u003e\u003cspan class=\"p8\"\u003esource.onerror = function(event) { \u003c/span\u003e\u003cspan class=\"p10\"\u003elog(\" 出错，信息是： \" +\n            this.readyState); \u003c/span\u003e\n        \u003cspan class=\"p8\"\u003e}; \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003e} catch (err) { \u003c/span\u003e\u003cspan class=\"p8\"\u003elog(err.message); \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e/** \u003c/span\u003e\u003cspan class=\"p4\"\u003e* 该函数用于关闭 EventSource\n            连接\u003c/span\u003e\u003cspan class=\"p4\"\u003e* @return void \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction quit() { \u003c/span\u003e\u003cspan class=\"p6\"\u003elog(\" 已经退出\n            ############################ ！ \"); \u003c/span\u003e\u003cspan class=\"p6\"\u003esource.close(); \u003c/span\u003e\u003cspan class=\"p6\"\u003esource =\n            null; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e/** \u003c/span\u003e\u003cspan class=\"p4\"\u003e* 该函数用于将信息写入 div 元素，呈现在网页上\u003c/span\u003e\u003cspan class=\"p4\"\u003e* @param\n            String msg 定义写入的消息\u003c/span\u003e\u003cspan class=\"p4\"\u003e* @return void \u003c/span\u003e\u003cspan class=\"p4\"\u003e*/ \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003efunction log(msg) { \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003edocument.getElementById(\"log\").innerHTML += \"\u0026lt;br /\u0026gt;\" + msg; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u0026lt;body onload=\"init()\"\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;button onclick=\"quit()\"\u0026gt; 退出 \u0026lt;/button\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"log\"\n            style=\"border:1px dashed #c3c3c3;\"\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt; \u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;/html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e然后创建一个服务端网页，这里创建一个名为 server.php 的 PHP 网页，放置在 Web\n            服务器根目录下的 eventsource 子目录下：\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;?php \u003c/span\u003e\u003cspan class=\"p6\"\u003eerror_reporting(E_ALL);\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 发送报头定义 MIME 类型\u003c/span\u003e\n        \u003cspan class=\"p6\"\u003eheader(\"Content-Type: text/event-stream\\n\\n\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e$dateTime = new\n            DateTime(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e$now = $dateTime-\u0026gt;format( ' c ' ); \u003c/span\u003e\u003cspan class=\"p6\"\u003e//\n            发送服务器当前时间，注意以 data: 为前缀\u003c/span\u003e\n        \u003cspan class=\"p6\"\u003eecho ' data: ' . $now . \"\\n\"; \u003c/span\u003e\u003cspan class=\"p6\"\u003e?\u0026gt;\u003c/span\u003e\n    \u003c/div\u003e\n\u003c/details\u003e\n\u003ch5\u003e服务器要求\u003c/h5\u003e\n\u003cp\u003eServer-Sent Event 对服务端技术有一定的要求，主要包括以下两点：\u003c/p\u003e\n\u003cp\u003e(1) 要求网页的 MIME 类型为 text/event-stream ，该 MIME 类型定义了事件框架格式。例如，在前面的范例中，在 PHP 网页中定义 MIME 类型：\u003c/p\u003e\n\u003cp\u003e// 发送报头定义 MIME 类型。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eheader( \" Content-Type: text/event-stream\\n\\n \" );\u003c/span\u003e\u003c/code\u003e\n    \u003cp\u003e其它的动态服务器技术也可以定义 MIME 类型：\u003c/p\u003e\n    \u003cp\u003eASP 代码。\u003c/p\u003e\n    \u003ccodeclass=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;%\u003c/span\u003e\u003cspan class=\"p\"\u003eResponse.Addheader \" Content-type \" , \" text/event-stream\n            \"\u003c/span\u003e\u003cspan class=\"p\"\u003e%\u0026gt;\u003c/span\u003e\n        \u003c/code\u003e\n        \u003cp\u003eJSP 代码。\u003c/p\u003e\n        \u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;%\u003c/span\u003e\u003cspan class=\"p\"\u003eresponse.addHeader( \" Content-type \" , \"\n        text/event-stream \" );\u003c/span\u003e\u003cspan class=\"p\"\u003e%\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n        \u003cp\u003eASP.NET 代码（ C# 、 VB 适用，注意在 C# 中以分号结尾）。\u003c/p\u003e\n        \u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;%\u003c/span\u003e\u003cspan class=\"p\"\u003eresponse.AppendHeader( \" Content-type \" , \"\n        text/event-stream \" )\u003c/span\u003e\u003cspan class=\"p\"\u003e%\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n        \u003cp\u003e(2) text/event-stream 有一定的格式，数据流由一个或多个注释行及字段行组成。注释行是由冒号开始的行；字段行由字段名和字段值组成，字段名和字段值也是由冒号分隔。多个事件之用空行分隔。例如：\u003c/p\u003e\n        \u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e: 这是注释\u003c/span\u003e\u003cspan class=\"p\"\u003edata: 这是第 1 条数据\u003c/span\u003e\u003cspan class=\"p\"\u003edata: 这是第 2\n        条数据，数据包含\u003c/span\u003e\u003cspan class=\"p\"\u003edata: 两行\u003c/span\u003e\u003cspan class=\"p\"\u003edata: 这是第 3 条数据\u003c/span\u003e\n\u003c/code\u003e\n        \u003cp\u003e例如，在前面的范例中，在 PHP 网页中的每个响应中包含一个字段行：\u003c/p\u003e\n        \u003cp\u003e// 发送服务器当前时间，注意以 data: 为前缀。\u003c/p\u003e\n        \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eecho ' data: ' . $now . \" \\n \" ;\u003c/span\u003e\u003c/code\u003e\n        \u003cp\u003e下面的代码仅仅是发送了注释：\u003c/p\u003e\n        \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eecho ' : ' . $now . \" \\n \" ;\u003c/span\u003e\u003c/code\u003e\n        \u003cp\u003e另外需要注意的是， Server-Sent Event 通信数据的编码总是 UTF-8 格式的。\u003c/p\u003e\n        \u003ch5\u003e使用 EventSource 对象\u003c/h5\u003e\n        \u003cp\u003eEventSource 对象是客户端浏览器用于实现 Server-Sent Event 的关键，它代表接收事件终端点。可以使用构造方法创建该对象：\u003c/p\u003e\n        \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar source = new EventSource(url);\u003c/span\u003e\u003c/code\u003e\n        \u003cp\u003e参数 url 就是要推送数据的服务器技术的 URL 地址。当调用构造方法创建对象时，将自动建立与该 URL 的连接。\u003c/p\u003e\n        \u003cp\u003e客户端浏览器通过创建 EventSource 对象来打开一个事件流。当事件流被打开时，浏览器会发送如下 HTTP 请求：\u003c/p\u003e\n        \u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eGET /eventsource/server.php HTTP/1.1\u003c/span\u003e\u003cspan class=\"p\"\u003eHost:\n        localhost\u003c/span\u003e\u003cspan class=\"p\"\u003eReferer: \u0026lt;a href=\"http://localhost/eventsource/client.html\"\n        rel=\"nofollow\"\u0026gt;http://localhost/eventsource/client.html\u0026lt;/a\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eCache-Control: max-age=0\u003c/span\u003e\u003cspan class=\"p\"\u003eAccept: text/event-stream\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eUser-Agent: Mozilla/5.0 (Windows; U; Windows NT 5.1; en-US) AppleWebKit/534.3 (KHTML, like\n        Gecko)\u003c/span\u003e\u003cspan class=\"p\"\u003eChrome/6.0.472.63 Safari/534.3\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eAccept-Encoding: gzip,deflate,sdch\u003c/span\u003e\u003cspan class=\"p\"\u003eAccept-Language:\n        zh-CN,zh;q=0.8\u003c/span\u003e\u003cspan class=\"p\"\u003eAccept-Charset: GBK,utf-8;q=0.7,*;q=0.3\u003c/span\u003e\n\u003c/code\u003e\n        \u003cp\u003e注意，请求不会被缓存，因为定义了 Cache-Control 报头。\u003c/p\u003e\n        \u003cp\u003e下面是服务器做出的响应（注意 Content-Type 报头）：\u003c/p\u003e\n        \u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eHTTP/1.1 200 OK\u003c/span\u003e\u003cspan class=\"p\"\u003eDate: Mon, 18 Oct 2010 10:03:58 GMT\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eServer: Apache/2.2.2 (Win32) PHP/5.2.0\u003c/span\u003e\u003cspan class=\"p\"\u003eX-Powered-By: PHP/5.2.0\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eContent-Length: 32\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eContent-Type: text/event-stream\u003c/span\u003e\u003cspan class=\"p\"\u003edata: 2010-10-18T10:03:58+00:00\u003c/span\u003e\n\u003c/code\u003e\n        \u003cp\u003e一旦创建了 EventSource 对象，就可以定义事件监听函数来处理各种事件，主要有以下 3 个事件：\u003c/p\u003e\n        \u003cli\u003eopen 事件：当连接打开时触发该事件\u003c/li\u003e\n        \u003cli\u003emessage 事件：当收到信息时触发该事件\u003c/li\u003e\n        \u003cli\u003eclose 事件：当连接关闭时触发该事件\u003c/li\u003e\n        \u003cp\u003e在事件处理函数中，也可以使用 readyState 属性检测连接状态，主要有 3 种状态，可以使用常量表示。\u003c/p\u003e\n        \u003cp\u003e例如，可以通过下面的代码来检查状态：\u003c/p\u003e\n        \u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003esource = new EventSource(url);\u003c/span\u003e\u003cspan class=\"p\"\u003eswitch (source.readyState)\n        {\u003c/span\u003e\u003cspan class=\"p2\"\u003ecase source.CONNECTING: // CONNECTING == 0\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert( '\n        CONNECTING ' );\u003c/span\u003e\u003cspan class=\"p2\"\u003ebreak;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ecase source.OPEN: // OPEN == 1\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert( ' OPEN ' );\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ebreak;\u003c/span\u003e\u003cspan class=\"p2\"\u003ecase source.CLOSED: // CLOSED == 2\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert ( '\n        CLOSED ' );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebreak;\u003c/span\u003e\u003cspan class=\"p2\"\u003edefault:\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert ( '未知状态！' );\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ebreak;\u003c/span\u003e\u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n        \u003ch5\u003e在 Web Workers 中使用 EventSource 对象\u003c/h5\u003e\n        \u003cp\u003eEventSource 对象是一个不间歇运行的程序，时间一长就会导致运行缓慢，甚至导致浏览器崩溃， Web Workers 对这一部分的执行能够起到优化的效果。下面就来看一下怎样使用 WebWorkers 来实现优化。\n        \u003c/p\u003e\n        \u003cp\u003e(1) 首先建立一个 JavaScript 文件，包含复杂的运算。下面创建一个名为 worker.js 的文件：\u003c/p\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003e例\u003c/summary\u003e\n            \u003ccode class=\"c\"\u003e\n                \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e/** \u003c/span\u003e\u003cspan class=\"p2\"\u003e* 该函数用于监听消息\u003c/span\u003e\u003cspan class=\"p2\"\u003e*\n                    @param\n                    evt Event 事件对象\u003c/span\u003e\u003cspan class=\"p2\"\u003e* @return void \u003c/span\u003e\u003cspan class=\"p2\"\u003e*/\n                \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction messageHandler(evt) { \u003c/span\u003e\n                \u003cspan class=\"p4\"\u003evar url = \" \u0026lt; a href = \"http://localhost/eventsource/server.php\"\" \u003c/span\u003e\u003cspan\n                    class=\"p4\"\u003erel = \"nofollow\" \u0026gt; http: //localhost/eventsource/server.php\"\u0026lt;/a\u0026gt;;; \u003c/span\u003e\u003cspan\n                    class=\"p6\"\u003evar source; \u003c/span\u003e\n                \u003cspan class=\"p4\"\u003e// 如果发送的是 true ，则建立连接，否则关闭连接\u003c/span\u003e\n                \u003cspan class=\"p4\"\u003eif (evt.data) { \u003c/span\u003e\u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan class=\"p8\"\u003esource = new\n                    EventSource(url); \u003c/span\u003e\u003cspan class=\"p8\"\u003esource.onopen = function(event) { \u003c/span\u003e\n                \u003cspan class=\"p10\"\u003epostMessage( \"连接已经建立：\" + this.readyState); \u003c/span\u003e\u003cspan class=\"p8\"\u003e}; \u003c/span\u003e\u003cspan\n                    class=\"p8\"\u003esource.onmessage = function(event) { \u003c/span\u003e\u003cspan class=\"p10\"\u003epostMessage( \" \u0026lt; b \u0026gt;\n                    接收到的数据：\" + event.data + \" \u0026lt; /b\u0026gt; \" ); \u003c/span\u003e\n                \u003cspan class=\"p10\"\u003e}; \u003c/span\u003e\n                \u003cspan class=\"p10\"\u003esource.onerror = function(event) { \u003c/span\u003e\u003cspan class=\"p12\"\u003epostMessage( \"出错， 信息是：\" +\n                    this.readyState); \u003c/span\u003e\u003cspan class=\"p10\"\u003e}; \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan\n                    class=\"p8\"\u003ecatch\n                    (err) { \u003c/span\u003e\n                \u003cspan class=\"p10\"\u003epostMessage(err.message); \u003c/span\u003e\n                \u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p8\"\u003epostMessage( \"已经退出\n                    ############################ ！\" ); \u003c/span\u003e\u003cspan class=\"p8\"\u003esource.close(); \u003c/span\u003e\u003cspan\n                    class=\"p8\"\u003esource =\n                    null; \u003c/span\u003e\n                \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n                \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n                \u003cspan class=\"p4\"\u003eself.addEventListener( ' message ' , messageHandler, false);\u003c/span\u003e\n                \u003c/code\u003e\n        \u003c/details\u003e\n        \u003cp\u003e网页向 Worker 传递消息时，会判断是创建连接还是断开连接，然后将适当的消息使用 postMessage() 方法发送给网页。\u003c/p\u003e\n        \u003cp\u003e(2) 在 HTML 网页中创建 Worker ，向 Worker 发送参数 true ，要求连接服务端网页，并接收返回的消息，然后将消息写在网页的 div 元素中。代码如下：\u003c/p\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003e例\u003c/summary\u003e\n            \u003ccode class=\"c\"\u003e\n                \u003cspan class=\"p\"\u003e\u0026lt;!doctype html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;html\u0026gt; \u003c/span\u003e\u003cspan\n                    class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"UTF-8\"\u0026gt;\n                \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt; 范例 \u0026lt;/title\u0026gt; \u003c/span\u003e\n                \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar worker; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/**\n                \u003c/span\u003e\u003cspan class=\"p4\"\u003e* 该函数在文档完成加载后执行\u003c/span\u003e\u003cspan class=\"p4\"\u003e* @return void \u003c/span\u003e\u003cspan class=\"p4\"\u003e*/\n                \u003c/span\u003e\n                \u003cspan class=\"p4\"\u003efunction init() { \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 创建 Worker \u003c/span\u003e\u003cspan class=\"p6\"\u003eif\n                    (window.Worker) { \u003c/span\u003e\u003cspan class=\"p8\"\u003eworker = new Worker('worker.js'); \u003c/span\u003e\u003cspan\n                    class=\"p8\"\u003eworker.onmessage = function(event) { \u003c/span\u003e\n                \u003cspan class=\"p10\"\u003elog(event.data); \u003c/span\u003e\u003cspan class=\"p8\"\u003e}; \u003c/span\u003e\u003cspan\n                    class=\"p8\"\u003eworker.postMessage(true);\n                \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p8\"\u003ealert(\"\n                    浏览器不支持 Web Workers!\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n                \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n                \u003cspan class=\"p4\"\u003e/** \u003c/span\u003e\n                \u003cspan class=\"p4\"\u003e* 该函数用于关闭 EventSource 连接\u003c/span\u003e\u003cspan class=\"p4\"\u003e* @return void \u003c/span\u003e\u003cspan\n                    class=\"p4\"\u003e*/\n                \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction quit() { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (worker == null) { \u003c/span\u003e\u003cspan\n                    class=\"p8\"\u003ereturn; \u003c/span\u003e\n                \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n                \u003cspan class=\"p6\"\u003eworker.postMessage(false); \u003c/span\u003e\u003cspan class=\"p6\"\u003eworker.terminate(); \u003c/span\u003e\u003cspan\n                    class=\"p6\"\u003eworker = null; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e/** \u003c/span\u003e\u003cspan\n                    class=\"p4\"\u003e*\n                    该函数用于将信息写入 div 元素，呈现在网页上\u003c/span\u003e\n                \u003cspan class=\"p4\"\u003e* @param String msg 定义写入的消息\u003c/span\u003e\u003cspan class=\"p4\"\u003e* @return void \u003c/span\u003e\u003cspan\n                    class=\"p4\"\u003e*/\n                \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction log(msg) { \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.getElementById(\"log\n                    \").innerHTML +=\n                    \" \u0026lt; br / \u0026gt; \" + msg; \u003c/span\u003e\n                \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt;\n                \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body onload=\"init()\"\u0026gt; \u003c/span\u003e\u003cspan\n                    class=\"p2\"\u003e\u0026lt;button\n                    onclick=\"quit()\"\u0026gt; 退出 \u0026lt;/button\u0026gt; \u003c/span\u003e\n                \u003cspan class=\"p2\"\u003e\u0026lt;div id=\"log\" style=\"border:1px dashed #c3c3c3;\"\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan\n                    class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n            \u003c/code\u003e\n        \u003c/details\u003e\n        \u003cp\u003e在浏览器中执行该网页，再应用 EventSource 对象的 JavaScript 程序代码运行在客户端操作系统线程中，速度非常快，不会再导致浏览器崩溃，并可以长时间运行。\u003c/p\u003e\n        \u003ch6\u003e技巧与提示\u003c/h6\u003e\n        \u003cp\u003e通常情况下，浏览器会限制每个服务器的连接的数量。如果网页包含多个 EventSource 对象，且连接到同一个 URL ，那么这些连接可能会超出浏览器连接数量限制。为了解决该问题，可以使用共享 Web Workers\n            来共享一个 EventSource 的实例。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 消息","title":"传递"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","消息","传递"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
