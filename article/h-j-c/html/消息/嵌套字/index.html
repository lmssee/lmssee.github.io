    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003eWeb Socket 可使客户端 Web 应用程序与服务端进程实现双向通信，而 Server-Sent Event 仅能实现单向通信。\u003c/p\u003e\n\u003cp\u003e下面首先创建一个 HTML 网页，在该网页中使用 Web Socket 实现双向通信：\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e例\u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;!doctype html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"UTF-8\"\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt; 范例 \u0026lt;/title\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar socket; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/** \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003e* 该函数在文档完成加载后执行\u003c/span\u003e\u003cspan class=\"p4\"\u003e* @return void \u003c/span\u003e\u003cspan class=\"p4\"\u003e*/ \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003efunction init() { \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003evar host = \"ws: //localhost:12345/\"; \u003c/span\u003e\u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan class=\"p8\"\u003e//\n            建立连接，并监听各种事件\u003c/span\u003e\u003cspan class=\"p8\"\u003esocket = new WebSocket(host); \u003c/span\u003e\u003cspan class=\"p8\"\u003esocket.onopen =\n            function(event) { \u003c/span\u003e\n        \u003cspan class=\"p10\"\u003elog(\" 连接已经建立： \" + this.readyState); \u003c/span\u003e\n        \u003cspan class=\"p8\"\u003e}; \u003c/span\u003e\u003cspan class=\"p8\"\u003esocket.onmessage = function(event) { \u003c/span\u003e\u003cspan class=\"p10\"\u003elog(\"\n            \u0026lt; b \u0026gt;接收到的数据： \" + event.data + \"\u0026lt;/b\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p8\"\u003e};\n        \u003c/span\u003e\u003cspan class=\"p8\"\u003esocket.onclose = function(event) { \u003c/span\u003e\n        \u003cspan class=\"p10\"\u003elog(\" 断开， 信息是： \" + this.readyState); \u003c/span\u003e\u003cspan class=\"p8\"\u003e}; \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n            catch (err) { \u003c/span\u003e\u003cspan class=\"p8\"\u003elog(err.message); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003edocument.getElementById(\"msg \").focus(); \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e/** \u003c/span\u003e\u003cspan class=\"p4\"\u003e* 该函数用于关闭 WebSocket 连接\u003c/span\u003e\u003cspan\n            class=\"p4\"\u003e* @return void \u003c/span\u003e\u003cspan class=\"p4\"\u003e*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction quit() {\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003elog(\" 已经退出 ############################ ！ \"); \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003esocket.close(); \u003c/span\u003e\u003cspan class=\"p6\"\u003esocket = null; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003e/** \u003c/span\u003e\u003cspan class=\"p4\"\u003e* 该函数用于通过 WebSocket 发送消息\u003c/span\u003e\u003cspan class=\"p4\"\u003e*\n            @return void \u003c/span\u003e\u003cspan class=\"p4\"\u003e*/ \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003efunction send() { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar txt = document.getElementById(\"msg \");\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003evar msg = txt.value; \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (!msg) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ealert(\"\n            不能发送空内容！ \"); \u003c/span\u003e\n        \u003cspan class=\"p8\"\u003ereturn; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003etxt.value = \"; \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003etxt.focus(); \u003c/span\u003e\u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan class=\"p8\"\u003esocket.send(msg);\n        \u003c/span\u003e\u003cspan class=\"p8\"\u003elog('Sent: ' + msg); \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003e} catch (err) { \u003c/span\u003e\u003cspan class=\"p8\"\u003elog(err.message); \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e/** \u003c/span\u003e\u003cspan class=\"p4\"\u003e* 该函数用于将信息写入 div\n            元素，呈现在网页上\u003c/span\u003e\u003cspan class=\"p4\"\u003e* @param String msg 定义写入的消息\u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e* @return void \u003c/span\u003e\u003cspan class=\"p4\"\u003e*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction log(msg) {\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.getElementById(\"log \").innerHTML += \"\u0026lt;br /\u0026gt;\" + msg; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003e} \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u0026lt;body onload=\"init()\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"log\" style=\"border:1px dashed\n            #c3c3c3; min-height:100px;\"\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;input id=\"msg\" type=\"text\" /\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;button\n            onclick=\"send();\"\u0026gt; 发送 \u0026lt;/button\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;button onclick=\"quit();\"\u0026gt; 退出\n            \u0026lt;/button\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/details\u003e\n\u003cp\u003e然后创建一个 PHP 网页实现 Web Socket ，命名为 server.php ，该网页是基于开源程序 http://code.google.com/p/phpwebsocket/ 改写的，源代码位于 CDROM\n    上，用户可以使用命令行工具执行 PHP 网页。例如：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eC:\\php5\\php.exe -q server.php\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e关于 Web Socket 通信协议\u003c/h5\u003e\n\u003cp\u003eWeb Socket 通信协议由 IETF 制定，用户可以从网页 http://tools.ietf.org/html/draft-hixiethewebsocketprotocol-76 查看该协议的详细描述。\u003c/p\u003e\n\u003cp\u003eWeb Socket 通信协议很简单，包含握手和传输数据两部分。\u003c/p\u003e\n\u003cp\u003e下面是一个客户端握手请求的基本通信格式：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eGET /demo HTTP/1.1\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eHost: example.com\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eConnection: Upgrade\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eSec-WebSocket-Key2: 12998 5 Y3 1 .P00\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eSec-WebSocket-Protocol: sample\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eUpgrade: WebSocket\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eSec-WebSocket-Key1: 4 @1 46546xW%0l 1 5\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eOrigin: \u003ca href=\"http://example.com\" rel=\"nofollow\"\u003ehttp://example.com\u003c/a\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e^n:ds[4U\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e下面是一个服务端握手请求的数据格式：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eHTTP/1.1 101 WebSocket Protocol Handshake\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eUpgrade: WebSocket\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eConnection: Upgrade\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eSec-WebSocket-Origin: \u003ca href=\"http://example.com\" rel=\"nofollow\"\u003ehttp://example.com\u003c/a\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eSec-WebSocket-Location: ws://example.com/demo\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eSec-WebSocket-Protocol: sample\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e8jKS ' y:G*Co,Wxa-\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这类似于 HTTP 报头信息，同样每行都是以\" \\r\\n \"结尾。客户端握手无需用户构造， WebSocket 对象会自动发送，对客户端是透明的；服务端必需由用户编写，例如，可以在 PHP 中定义如下代码来实现：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e$upgrade = \" HTTP/1.1 101 Web Socket Protocol Handshake\\r\\n \" .\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\" Upgrade: WebSocket\\r\\n \" .\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\" Connection: Upgrade\\r\\n \" .\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\" WebSocket-Origin: \" . $origin . \" \\r\\n \" .\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\" WebSocket-Location: ws:// \" . $host . $resource . \" \\r\\n \" .\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\" \\r\\n \" ;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003esocket_write($user-\u0026gt;socket,\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e$upgrade.chr(0),\u003c/span\u003e\n    \u003cspan class=\"p\"\u003estrlen($upgrade.chr(0)));\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eWeb Socket 通信协议的握手部分类似于 HTTP 协议，所不同的是， HTTP 协议每次都会包含这些报头，而 Web Socket 通信只会执行一次这个过程，之后的信息传输较简洁。这也是 WebSocket 通信与\n    HTTP 通信最大的不同之处。对于聊天程序，一次数据发送可能仅仅包含几个或几十个文字，如果使用 HTTP 协议，在这几十个文字上加上报头，会使数据量成倍增加。而 Web Socket 通信则可以避免这种情况。\u003c/p\u003e\n\u003cp\u003eWeb Socket 协议使用 ws: 架构或者 wss: 架构，后者表示加密的通信，就像 http: 和 https: 的区别。\u003c/p\u003e\n\u003cp\u003e另外需要注意的是， WebSocket 通信数据的编码总是 UTF-8 格式的。\u003c/p\u003e\n\u003ch5\u003e使用 WebSocket 对象\u003c/h5\u003e\n\u003cp\u003e以使用构造方法创建 WebSocket 对象：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar socket = new WebSocket(url[, protocol]);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cp\u003e参数 url 指 Web Socket 地址。当调用构造方法创建对象时，将自动建立与该 Web Socket 的连接。 url 以 ws 或 wss 开头，以 ws 开头的是普通的 WebSocket 连接；以 wss\n    开头的是安全的 WebSocket 连接（类似 https ）。\u003c/p\u003e\n\u003cp\u003e参数 protocol 可选，定义一个子协议，服务端必须支持该子协议才能建立连接。通常省略该参数。\u003c/p\u003e\n\u003cp\u003e客户端在握手成功后，会触发 WebSocket 对象的 open 事件，告诉客户端连接已经成功建立了。\u003c/p\u003e\n\u003cp\u003eWebSocket 对象一共绑定了 3 个事件，用户可以定义事件监听函数来处理各种事件：\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003eopen 事件：当连接打开时触发该事件\u003c/li\u003e\n    \u003cli\u003emessage 事件：当收到信息时触发该事件\u003c/li\u003e\n    \u003cli\u003eclose 事件：当连接关闭时触发该事件\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e在事件处理函数中，也可以使用 readyState 属性检测连接状态，这与使用 EventSource 对象时相同。\u003c/p\u003e\n\u003cp\u003e当 Web Socket 连接建立后，浏览器首先会把 readyState 的属性值改为 OPEN ，然后触发 open 事件。\u003c/p\u003e\n\u003cp\u003e例如，可以通过下面的代码来检查状态：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003esocket = new WebSocket(url[, protocol]);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eswitch (socket.readyState) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ecase socket.CONNECTING: // CONNECTING == 0\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert( ' CONNECTING ' );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebreak;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ecase socket.OPEN: // OPEN == 1\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert( ' OPEN ' );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebreak;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ecase socket.CLOSED: // CLOSED == 2\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert ( ' CLOSED ' );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebreak;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edefault:\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert ( '未知状态！' );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebreak;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e另外，也可以使用 URL 属性返回 WebSocket 对象构造方法的 url 参数值。\u003c/p\u003e\n\u003cp\u003e使用 send() 方法可以发送消息，如果 readyState 属性值为 CONNECTING ，调用该方法会抛出 INVALID_STATE_ERR 异常；使用 close() 方法可以关闭 WebSocket\n    连接，并改变 readyState 属性值为 CLOSED 常量；使用 bufferedAmount 属性可以返回尚没有发送、保存在缓存中的数据的量，以 byte 为单位。如果连接已关闭，该属性不会重置到 0 ，而是会随每个\n    send() 方法的调用增加。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 消息","title":"嵌套字"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","消息","嵌套字"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
