    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e在成功时所调用的 success_callback 函数中会带有一个参数，这个参数是一个获取地理位置详细数据信息的 Position 对象参数。 Position 有两个属性 coords 和 timestamp 属性。\n    timestamp 属性表示获取地理位置的时间， coords 属性的值 。\n\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003ecoords 的属性值\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"30%\"\u003e属性\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003eerror_callback\u003c/h5\u003e\n\u003cp\u003eerror_callback 和 success_callback 函数一样带有一个参数，该对象有 message 和 code 两个属性，前者表示错误信息，后者表示错误代码。\u003c/p\u003e\n\u003cp\u003e其中，错误代码（ error.code ）的值有 4 个，说明如下。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e0 （ UNKNOW_ERROR ）：描述未知的错误信息，表示不包括在其它错误代码中的错误，可以在 message 属性中查找错误信息\u003c/li\u003e\n    \u003cli\u003e1 （ PERMISSION_DENIED ）：用户拒绝了浏览器定位服务的请求\u003c/li\u003e\n    \u003cli\u003e2 （ POSITION_UNAVALIABLE ）：没有正确获取或者获取不到地理位置信息\u003c/li\u003e\n    \u003cli\u003e3 （ TIMEOUT ）：获取地理位置时操作过时，必须在 positionOptions 参数中指定了 timeout 值才有可能发生这种错误\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003epositionOptions\u003c/h5\u003e\n\u003cp\u003epositionOptions 的数据格式为 JSON ，它有三个可选择的属性，说明如下。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003eenableHighAcuracy ：它的值是一个布尔类型，表示是否启用高精确度模式，如果启用这种模式，浏览器在获取位置信息时可能需要耗费更多的时间\u003c/li\u003e\n    \u003cli\u003etimeout ：它的值是一个整数，表示浏览器需要在指定的时间内获取位置信息，否则触发 error_callback 函数中的错误\u003c/li\u003e\n    \u003cli\u003emaximumAge ：它是一个整数或者常量，表示浏览器重新获取位置信息的时间间隔\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch5\u003ewatchCurrentPosition() 方法\u003c/h5\u003e\n\u003cp\u003ewatchCurrentPosition() 方法可以实时获取或者检测用户的地理位置信息，它能像追踪器一样时刻监视用户的位置，只要发生变化，浏览器就会触发 watchCurrentPosition() 方法中的回调函数。\n\u003c/p\u003e\n\u003cp\u003ewatchCurrentPosition() 方法中同样包含三个参数，这三个参数的说明与 getCurrentPosition() 完全一样。不同的地方就是返回值，它类似于内置的延迟函数 setTimeout() 或者间隔函数\n    setInterval() ，返回一个 watchID ，可以被清除掉。\n\u003c/p\u003e\n\u003cp\u003eclearWatch() 方法会接收一个 watchPosition 返回的 watchId ，清除对用户位置的循环监视。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003enavigator.geolocation.clearWatch(watchId);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003ewatchId 参数并不是必需的，如果不向该方法中传递参数，则表示清除所有的 watchPosition 对象。\u003c/p\u003e\n\u003cp\u003e经纬度坐标可以用以下两种方式表示：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e十进制格式，如 39.172 22\u003c/li\u003e\n    \u003cli\u003eDMS 角度格式，如 39°20'\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['accuracy', '当前地理位置的精确度',],\n        ['latitude', '当前地理位置的纬度',],\n        ['longitude', '当前地理位置的经度',],\n        ['altitude', '当前地理位置的海拔高度',],\n        ['altitudeAccurancy', '当前地理位置的海拔精确度（单位： m ）',],\n        ['heading', '设置当前的前进方向，用正北方向的顺时针旋转角度来表示。无法获取时返回 null',],\n        ['speed', '当前设置的前进速度，以 m/s 为单位，无法获取时返回值为 null',],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 定位","title":"方法"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","定位","方法"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
