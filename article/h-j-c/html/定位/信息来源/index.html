="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>信息来源</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e位置信息来源\u003c/h5\u003e\n\u003cp\u003eHTML5 Geolocation API 不指定设备使用哪种底层技术来定位应用程序的用户。相反，它只是用于检索信息的 API ，而且通过该 API 检索到的数据只具有某种程度的准确性。它并不能保证设备返回的实际位置是精确的。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eIP 地址\u003c/li\u003e\n    \u003cli\u003e三维坐标\u003c/li\u003e\n    \u003cli\u003eGPS 全球定位系统\u003c/li\u003e\n    \u003cli\u003e从 RFID 、 Wi-Fi 和蓝牙到 Wi-Fi 的 MAC 地址\u003c/li\u003e\n    \u003cli\u003eGSM 或 CDMA 手机的 ID\u003c/li\u003e\n    \u003cli\u003e用户自定义数据\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eIP 定位\u003c/h5\u003e\n\u003cp\u003e在 HTML5 Geolocation API 之前，基于 IP 地址的地理定位方法是获得位置信息的唯一方式，但其返回的位置信息通常并不靠谱，基于 IP 地址的地理定位的实现方式是，自动查找用户的 IP\n    地址，然后检索其注册的物理地址。因此，如果用户的 IP 地址是 ISP 提供的，其位置往往就由服务供应商的物理地址决定，该地址可能距离用户数千米。\n\u003c/p\u003e\n\u003cp\u003e优点：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e任何地方都可用\u003c/li\u003e\n    \u003cli\u003e在服务器端处理\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e缺点：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e不精确，一般精确到城市级\u003c/li\u003e\n    \u003cli\u003e运算代价大，并经常出错\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eGPS 定位\u003c/h5\u003e\n\u003cp\u003eGPS 定位是通过收集运行在地球周围的多个 GPS 卫星的信号实现的，但 GPS 定位时间可能较长，因此它不适合需要快速响应的应用程序。因为获取 GPS 定位数据需要时间可能较长，所以开发人员可能需要异步查询用户位置。\u003c/p\u003e\n\u003cp\u003e优点：比较精确。\u003c/p\u003e\n\u003cp\u003e缺点：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e定位时间长，耗电量大\u003c/li\u003e\n    \u003cli\u003e室内效果不好\u003c/li\u003e\n    \u003cli\u003e需要硬件设备支持\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eWi-Fi 定位\u003c/h5\u003e\n\u003cp\u003e基于 Wi-Fi 的地理定位信息是通过三角距离计算得出的，这个三角距离指的是用户当前位置到已知的多个 Wi-Fi 接入点的距离。不同于 GPS ， Wi-Fi 定位在室内也非常准确。\u003c/p\u003e\n\u003cp\u003e优点：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e精确\u003c/li\u003e\n    \u003cli\u003e可在室内便用\u003c/li\u003e\n    \u003cli\u003e可以简单、快捷地定位\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e缺点：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e适合在大城市，在乡村等无接入点或者接入点较少的地区效果不好\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e手机定位\u003c/h5\u003e\n\u003cp\u003e基于手机的地理定位信息是通过用户到一些基站的三角距离确定的。这种方法可提供相当准确的位置结果。这种方法通常同基于 Wi-Fi 和基于 GPS 的地理定位信息结合使用。\u003c/p\u003e\n\u003cp\u003e优点：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e相当准确\u003c/li\u003e\n    \u003cli\u003e可在室内使用\u003c/li\u003e\n    \u003cli\u003e可以简单、快捷地定位\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e缺点：在基站较少的偏远地区效果不好。\u003c/p\u003e\n\u003ch5\u003e自定义定位\u003c/h5\u003e\n\u003cp\u003e除了通过编程计算出用户的位置外，也可以允许用户自定义其位置。应用程序可能允许用户输入它们的地址、邮政编码和其它一些详细信息。应用程序可以利用这些信息来提供位置感知服务。\u003c/p\u003e\n\u003cp\u003e优点：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e可以获得比程序定位服务更准确的位置数据\u003c/li\u003e\n    \u003cli\u003e允许地理定位服务的结果作为备用位置信息\u003c/li\u003e\n    \u003cli\u003e用户自行输入可能比自动检测更快\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e缺点：可能不准确，特别是当用户位置变更后。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 定位","title":"信息来源"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","定位","信息来源"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
