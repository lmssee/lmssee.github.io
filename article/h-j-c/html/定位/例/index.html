class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>例</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e使用 Google 地图\u003c/h5\u003e\n\u003cp\u003e要在页面中使用 Google 地图，需要用到 Google Map API 。\u003c/p\u003e\n\u003cp\u003e在页面中导入 Google Map API 的脚本文件，导入方法如下所示。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003c/code\u003e\n\u003c!-- \u003ca href=\"http://maps.google.com/maps/api/js?sensor=false\"\u003ehttp://maps.google.com/maps/api/js?sensor=false\u003c/a\u003e --\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction init() { \u003c/span\u003e\u003cspan class=\"p4\"\u003e//\n        取得当前地理位置\u003c/span\u003e\u003cspan class=\"p4\"\u003enavigator.geolocation.getCurrentPosition(function(position) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003evar coords = position.coords; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e// 设定地图参数，将用户的当前位置的纬度、经度设定为地图的中心点\u003c/span\u003e\u003cspan class=\"p6\"\u003evar latlng = new\n        google.maps.LatLng(coords.latitude, coords.longitude); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar myOptions = {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003ezoom: 14, \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ecenter: latlng, \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003emapTypeId: google.maps.MapTypeId.ROADMAP \u003c/span\u003e\u003cspan class=\"p6\"\u003e}; \u003c/span\u003e\u003cspan class=\"p6\"\u003e//\n        创建地图并在 \"map\" 的 div 中显示\u003c/span\u003e\u003cspan class=\"p6\"\u003evar map1; \u003c/span\u003e\u003cspan class=\"p6\"\u003emap1 = new\n        google.maps.Map(document.getElementById( \"map\"), myOptions); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e// 在地图上创建标记\u003c/span\u003e\u003cspan class=\"p6\"\u003evar marker = new google.maps.Marker({ \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003eposition: latlng, \u003c/span\u003e\u003cspan class=\"p8\"\u003emap: map1 \u003c/span\u003e\u003cspan class=\"p6\"\u003e}); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e// 设定标注窗口，并指定该窗口中的注释文字\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar infowindow = new google.maps.InfoWindow({ \u003c/span\u003e\u003cspan class=\"p8\"\u003econtent: \" 当前位置 !\"\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e}); \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 打开标注窗口\u003c/span\u003e\u003cspan class=\"p6\"\u003einfowindow.open(map1,\n        marker); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body onload=\"init()\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"map\" style=\"width:400px; height:400px\"\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e跟踪行走速度\u003c/h5\u003e\n\u003cp\u003e使用 watchPosition() 函数，每当有新的位置返回，就将其与最后保存的位置进行比较以计算距离。所有缓存位置数据的生命周期都不能大于 205 。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e创建示例程序的 HTML\n        显示代码。这里重点介绍处理数据的脚本，并把所有最新的数据以简单的表格形式展示，分行显示纬度、经度、准确度和以毫秒为单位的时间。此外，显示走过距离的概要情况，还会显示一些文本类统计信息，以便用户能够看到走过距离的概况。\n    \u003c/li\u003e\n    \u003cli\u003e处理 Geolocation 数据。在 Geolocation 数据处理部分，第一段 JavaScript 代码会检测浏览器是否支持 HTML5 Geolocation\n        ，然后将检测结果显示在页面上。最后，代码会请求监测用户位置。\n    \u003c/li\u003e\n    \u003cli\u003e对于距离跟踪器而言，这些出错处理已经足够了，它将检查收到的所有错误编号，并更新页面上的状态信\u003c/li\u003e\n    \u003cli\u003e大部分工作都将在 updateLocation() 函数中实现，此函数中将使用最新数据来更新页面并计算路程\u003c/li\u003e\n    \u003cli\u003e计算移动的距离。假设前面已经收到了一个准确的位置，将更新移动的总距离并将其显示给用户，同时还将储存当前值以备后面做比较。为了使界面不太乱，在计算数值时可采用四舍五入或截断的方式\u003c/li\u003e\n\u003c/ol\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"utf-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;\u0026lt;/title\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body onload=\"loadDemo()\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;h2\u0026gt; 当前位置\n        :\u0026lt;/h2\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;table border=\"1\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;tr\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;th width=\"40\" scope=\"col\"\u0026gt; 纬度 \u0026lt;/th\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;td width=\"114\" id=\"latitude\"\u0026gt;?\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/tr\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;td\u0026gt;经度 \u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;td\n        id=\"longitude\"\u0026gt;?\u0026lt;/td\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;/tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;td\u0026gt; 准确性\n        \u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;td id=\"accuracy\"\u0026gt;?\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/tr\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;tr\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;td\u0026gt; 最后时间 \u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;td id=\"timestamp\"\u0026gt;?\u0026lt;/td\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/table\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;h4\n        id=\"currDist\"\u0026gt; 当前行驶距离 : 0.0 km\u0026lt;/h4\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;h4 id=\"totalDist\"\u0026gt; 总距离 : 0.0 km\u0026lt;/h4\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar totalDistance = 0.0; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar lastLat; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        lastLong; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eNumber.prototype.toRadians = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn this * Math.PI / 180;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction distance(latitude1, longitude1, latitude2,\n        longitude2) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar R = 6371; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar deltaLatitude = (latitude2 - latitude1).toRadians();\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar deltaLongitude = (longitude2 - longitude1).toRadians(); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003elatitude1 = latitude1.toRadians(), latitude2 = latitude2.toRadians(); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar a = Math.sin(deltaLatitude / 2) * \u003c/span\u003e\u003cspan class=\"p8\"\u003eMath.sin(deltaLatitude / 2) +\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003eMath.cos(latitude1) * \u003c/span\u003e\u003cspan class=\"p8\"\u003eMath.cos(latitude2) * \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003eMath.sin(deltaLongitude / 2) * \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eMath.sin(deltaLongitude / 2); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar c = 2 * Math.atan2(Math.sqrt(a),\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003eMath.sqrt(1 - a)); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar d = R * c; \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        d; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction updateStatus(message) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.getElementById(\"status\").innerHTML = message; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efunction loadDemo() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (navigator.geolocation) { \u003c/span\u003e\u003cspan class=\"p8\"\u003eupdateStatus(\"HTML5 Geolocation is\n        supported in your browser.\"); \u003c/span\u003e\u003cspan class=\"p8\"\u003enavigator.geolocation.watchPosition(updateLocation,\n    \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003ehandleLocationError, { \u003c/span\u003e\u003cspan class=\"p12\"\u003emaximumAge: 20000 \u003c/span\u003e\u003cspan class=\"p10\"\u003e});\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction updateLocation(position) {\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar latitude = position.coords.latitude; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar longitude =\n        position.coords.longitude;; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar accuracy = position.coords.accuracy; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003evar timestamp = position.timestamp; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.getElementById(\"latitude\").innerHTML = latitude; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.getElementById(\"longitude\").innerHTML = longitude; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.getElementById(\"accuracy\").innerHTML = accuracy; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.getElementById(\"timestamp\").innerHTML = timestamp; \u003c/span\u003e\u003cspan class=\"p6\"\u003eif\n        (accuracy \u0026gt;= 500) { \u003c/span\u003e\u003cspan class=\"p8\"\u003eupdateStatus(\"Need more accurate values to calculate\n        distance.\"); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ereturn; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003eif ((lastLat != null) \u0026\u0026 (lastLong !=\n        null)) { \u003c/span\u003e\u003cspan class=\"p8\"\u003evar currentDistance = distance(latitude, longitude, lastLat, lastLong);\n    \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003edocument.getElementById(\"currDist\").innerHTML = \u003c/span\u003e\u003cspan class=\"p10\"\u003e\"Current distance\n        traveled: \" + currentDistance.toFixed(4) + \" km\" \u003c/span\u003e\u003cspan class=\"p8\"\u003etotalDistance += currentDistance;\n    \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003edocument.getElementById(\"totalDist\").innerHTML = \u003c/span\u003e\u003cspan class=\"p10\"\u003e\"Total distance\n        traveled: \" + currentDistance.toFixed(4) + \" km\" \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003elastLat = latitude; \u003c/span\u003e\u003cspan class=\"p6\"\u003elastLong = longitude; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eupdateStatus(\"Location successfully updated.\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efunction handleLocationError(error) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eswitch (error.code) {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003ecase 0: \u003c/span\u003e\u003cspan class=\"p10\"\u003eupdateStatus(\"There was an error while retrieving your\n        location: \" + error.message); \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003ebreak; \u003c/span\u003e\u003cspan class=\"p8\"\u003ecase 1: \u003c/span\u003e\u003cspan class=\"p10\"\u003eupdateStatus(\"The user\n        prevented this page from retrieving a location.\"); \u003c/span\u003e\u003cspan class=\"p10\"\u003ebreak; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ecase 2: \u003c/span\u003e\u003cspan class=\"p10\"\u003eupdateStatus(\"The browser was unable to determine your\n        location: \" + error.message); \u003c/span\u003e\u003cspan class=\"p10\"\u003ebreak; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ecase 3: \u003c/span\u003e\u003cspan class=\"p10\"\u003eupdateStatus(\"The browser timed out before retrieving the\n        location.\"); \u003c/span\u003e\u003cspan class=\"p10\"\u003ebreak; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 定位","title":"例"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","定位","例"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
