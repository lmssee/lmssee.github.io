class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>处理</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e处理位置信息\u003c/h5\u003e\n\u003cp\u003e因为位置数据属于敏感信息，所以接收到之后，必须小心地处理、存储和重传。如果用户没有授权存储这些数据，那么应用程序应该在相应任务完成后立即删除它。如果要重传位置数据，建议先对其进行加密。在收集地理定位数据时，应用程序应该着重提示用户以下内容：\n    。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e会收集位置数据\u003c/li\u003e\n    \u003cli\u003e为什么收集位置数据\u003c/li\u003e\n    \u003cli\u003e位置数据将保存多久\u003c/li\u003e\n    \u003cli\u003e怎样保证数据的安全\u003c/li\u003e\n    \u003cli\u003e位置数据怎样共享，如果同意则共享\u003c/li\u003e\n    \u003cli\u003e用户怎样检查和更新它们的位置数据\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e使用 position 对象\u003c/h5\u003e\n\u003cp\u003e如果获取地理位置信息成功，则可以在获取成功后的回调函数中通过访问 position 对象的属性来得到这些地理位置信息。 position 对象具有以下这些属性。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003elatitude ：当前地理位置的纬度\u003c/li\u003e\n    \u003cli\u003elongitude ：当前地理位置的经度\u003c/li\u003e\n    \u003cli\u003ealtitude ：当前地理位置的海拔高度（不能获取时为 null ）\u003c/li\u003e\n    \u003cli\u003eaccuracy ：获取到的纬度或经度的精度（以米为单位）\u003c/li\u003e\n    \u003cli\u003ealtitudeAccurancy ：获取到的海拔高度的精度（以米为单位）\u003c/li\u003e\n    \u003cli\u003eheading ：设备的前进方向。用面朝正北方向的顺时针旋转角度来表示（不能获取时为 null ）\u003c/li\u003e\n    \u003cli\u003espeed ：设备的前进速度（以米 / 秒为单位，不能获取时为 null ）\u003c/li\u003e\n    \u003cli\u003etimestamp ：获取地理位置信息时的时间\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e使用 navigator 对象\u003c/h5\u003e\n\u003cp\u003eHTML 5 Geolocation （地理定位）用于定位用户的位置，鉴于该特性可能侵犯用户的隐私，除非用户同意，否则用户位置信息是不可用的。在访问位置信息前，浏览器都会询问用户是否共享其位置信息。\u003c/p\u003e\n\u003cp\u003e位置服务用于估计当前用户所在位置的本地网络信息： WiFi 接入点的信息（包括信号强度）、有关本地路由器的信息、计算机的 IP 地址。位置服务的准确度和覆盖范围因位置不同而异。\u003c/p\u003e\n\u003cp\u003e总的来说，在 PC 的浏览器中 HTML 5 的地理位置功能获取的位置精度不够高，如果借助 HTML 5 这个特性做一个城市天气预报是绰绰有余，但如果是做一个地图应用，那误差还是不能忽略。不过，如果是移动设备上的 HTML 5\n    应用，可以通过设置 enableHighAcuracy 参数为 true ，调用设备的 GPS 定位来获取高精度的地理位置信息。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction showObject(obj, k) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (!obj) return; \u003c/span\u003e\u003cspan class=\"p4\"\u003efor\n        (let i in obj) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (typeof(obj[i]) != 'object' || obj[i] == null) {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003efor (let j = 0; j \u0026lt; k; j++) { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003edocument.write('\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;') \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003edocument.write(i + \" : \" + obj[i] + '\u0026lt;br/\u0026gt;'); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003edocument.write(i + \" : \" + \"\u0026lt;br/\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eshowObject(obj[i], k + 1); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e function get_location() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (navigator.geolocation) { \u003c/span\u003e\u003cspan class=\"p6\"\u003enavigator.geolocation.getCurrentPosition(show_map,\n        handle_error, { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eenableHeightAccuracy: true, \u003c/span\u003e\u003cspan class=\"p8\"\u003emaximumAge: 1000 \u003c/span\u003e\u003cspan class=\"p6\"\u003e})\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewindow.location.hash += '您的浏览器不支持/您拒绝了定位'; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e function handle_error(err) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eswitch\n        (err.code) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecase 1: \u003c/span\u003e\u003cspan class=\"p8\"\u003ewindow.location.hash += '位置服务被拒绝';\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003ebreak; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ecase 2: \u003c/span\u003e\u003cspan class=\"p8\"\u003ewindow.location.hash += '暂时无法获取位置信息'; \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ebreak; \u003c/span\u003e\u003cspan class=\"p6\"\u003ecase 3: \u003c/span\u003e\u003cspan class=\"p8\"\u003ewindow.location.hash += '获取信息超时';\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003ebreak; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edefault: \u003c/span\u003e\u003cspan class=\"p8\"\u003ewindow.location.hash += '未知错误'; \u003c/span\u003e\u003cspan class=\"p8\"\u003ebreak;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e function show_map(position) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003elet l = position.coords.latitude; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003elet g = position.coords.longitude; \u003c/span\u003e\u003cspan class=\"p4\"\u003eshowObject(position, 0) \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eget_location();\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e同设备，edge 、Safari 正确显示信息，Firefox 显示 \"暂时无法获取位置信息\" ，Chrome 白屏。。。\u003c/p\u003e\n\u003c/div\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 定位","title":"处理"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","定位","处理"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
