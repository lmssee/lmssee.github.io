="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>链接</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介\u003c/h5\u003e\n\u003cp\u003e属性（ attribute ）是一份与标签关联的额外信息，用于提供关于标签的进一步的详细信息。例如， \u0026lt;a\u0026gt; 标签的 href 属性用于确定你将链接到的页面的地址。\u003c/p\u003e\n\u003cp\u003e相对地址（ relative address ）描述了从一个 Web 页面到另一个 Web 页面的路径，而不是完整的（或绝对的 [absolute] ） Internet 地址。\u003c/p\u003e\n\u003ch5\u003e链接的类型\u003c/h5\u003e\n\u003cp\u003e根据目标端点的内容，可将链接分成以下 5 种类型。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e内部链接\u003c/li\u003e\n    \u003cli\u003e外部链接\u003c/li\u003e\n    \u003cli\u003e书签（锚点）链接\u003c/li\u003e\n    \u003cli\u003e脚本链接\u003c/li\u003e\n    \u003cli\u003e文件下载链接\u003c/li\u003e\n\u003c/ol\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e常用 URL 格式\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003eURL 格式\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003ehttp://\u003c/td\u003e\n        \u003ctd\u003e接入万维网\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003emailto:\u003c/td\u003e\n        \u003ctd\u003e启用邮件发送系统\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eftp://\u003c/td\u003e\n        \u003ctd\u003e进去文件传输服务器\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003etelnet://\u003c/td\u003e\n        \u003ctd\u003e启动远程登陆方式\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003enews\u003c/td\u003e\n        \u003ctd\u003e启动新闻讨论组\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003eanchor 页面内\u003c/h5\u003e\n\u003cp\u003e\u0026lt;a\u0026gt; 标签通常使用 href 属性来指定超链接的目标。 \u0026lt;a href\u0026gt; 就是你单击的位置， \u0026lt;a id\u0026gt; 则是你单击时所转到的位置。\u003c/p\u003e\n\u003ch5\u003e链接到外部\u003c/h5\u003e\n\u003cp\u003e链接到自己站点内的页面与链接到外部内容之间的唯一区别是，当链接到站点外部的内容时，将需要包括该内容的完整地址。完整的地址包括：\" http:// \"、域名和文件的完整路径名（如 HTML 文件、图像文件、多媒体文件等）。\n\u003c/p\u003e\n\u003ch5\u003e链接到电子邮件地址\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003escheme://host[:post]/path/filename\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e其中， scheme 指的是 http 、 ftp 、 file 、 mailto 、 news 、 gopher 、 telnet 等 7 种协议； host 指的是 IP 地址或计算机名称； post 指的是服务器端口；\n    path 指的是文件路径； filename 指的是文件名。\u003c/p\u003e\n\u003cp\u003e基本结构： mailto ： + 邮件地址 +?+subject=+ 邮件主题。\u003c/p\u003e\n\u003cp\u003e邮件链接设置基本语法如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;a href=\"mailto: 邮址 1?subject=content\u0026cc= 邮址 2\u0026bcc= 邮址 3\"\u0026gt; 文本 / 图片\n        \u0026lt;/a\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e语法说明：邮址 1 代表收件人邮箱地址， subject 属性用于设置邮件主题， cc 属性用于设置抄送邮箱地址， bcc 属性用于设置暗抄送邮箱地址。注意：\" ? \"和\" \u0026 \"两个符号后面都不能包含空格。\u003c/p\u003e\n\u003ch5\u003e设定浏览环境\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e_self ：当前窗口打开新页面，是默认目标的打开方式\u003c/li\u003e\n    \u003cli\u003e_blank ：创建新窗口打开新页面，浏览器总在一个新打开、未命名的窗口中载入目标文档\u003c/li\u003e\n    \u003cli\u003e_top ：在浏览器的整个窗口打开，将会忽略所有的框架结构\u003c/li\u003e\n    \u003cli\u003e_parent ：在上一级窗口打开，如果这个引用是在窗口或者在顶级框架中，那么它与目标 _self 等效\u003c/li\u003e\n    \u003cli\u003eframeName ：在指定的框架中打开被链接文档\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e其方法是在 mailto 链接中添加 subject 和 body 变量，利用问号（ ? ）把变量与电子邮件地址分隔开，然后利用\"与\"符号（ \u0026 ）把每个变量 / 值对分隔开。\u003c/p\u003e\n\u003cp\u003e一个小技巧即可挫败许多（但是并非全部）垃圾邮件发送者。这个技巧涉及使用字符实体编码电子邮件地址，它可以迷惑试图从 Web 页面中获取电子邮件地址的 scraper 程序。例如，考虑电子邮件地址\n    jcmeloni@gmail.com 。如果利用对应的字符实体替换地址中的字母，将使一些电子邮件获取程序不知所措。小写的 ASCII 字符实体开始于\" \u0026#97; \"，用于字母\" a \"，然后按字母表的顺序递增。例如，字母\"\n    j \"是\" \u0026#106 \"， c 是\" \u0026#99 \"，依此类推。\u003c/p\u003e\n\u003ch5\u003e在新的浏览器窗口中打开链接\u003c/h5\u003e\n\u003cp\u003e通过 target 属性指定新打开的页面的打开方式。\u003c/p\u003e\n\u003ch5\u003ebase\u003c/h5\u003e\n\u003cp\u003e\u0026lt;base\u0026gt; 中设置的 URL 可以是引用文件路径前面部分的任意内容。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;base href=\"...\" target=\"...\"/\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e脚本链接\u003c/h5\u003e\n\u003cp\u003e脚本链接，指的是使用脚本作链接目标端点的链接。通过脚本可以实现 HTML 语言完成不了的功能。\u003c/p\u003e\n\u003ch5\u003e文件下载链接\u003c/h5\u003e\n\u003cp\u003e当链接的目标文档类型属于 .doc 、 .mp3 、 .rar 、 .zip 、 .exe\n    等时，可以获得文件下载链接。要创建文件下载，只要在链接地址处输入前述类型的文件路径即可。当用户单击链接后，浏览器会自动判断文件类型，做出不同情况的处理。\u003c/p\u003e\n\u003ch5\u003e图像映射\u003c/h5\u003e\n\u003cp\u003e图像映射是指源端点为图片热区的链接。一幅图像可以被切分成不同的区域，每一个区域可以链接到不同的地址，这些区域称为图像的热区。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e\u0026lt;img\u0026gt; 标签中的 use map 属性用于激活映射\u003c/li\u003e\n    \u003cli\u003e\u0026lt;map\u0026gt; 标签用于定义图像映射中包含热点的映\u003c/li\u003e\n    \u003cli\u003e\u0026lt;area\u0026gt; 标签用于在图像映射中定义一个热区，其包含了 3 个必须设置的属性： href 、 shape 和 coords \u003c/li\u003e\n    \u003cli\u003ehref 属性用于设置每个热区的链接路径\u003c/li\u003e\n    \u003cli\u003eshape 属性设置热区形状。图像映射包括 3 种形状的热区：矩形、圆形和多边形\u003c/li\u003e\n    \u003cli\u003ecoords 属性设置热区坐标，热区形状决定了 coords 的取值\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch5\u003e图像热点\u003c/h5\u003e\n\u003cp\u003e区域定义链接。定义图像热点，需要用到 \u0026lt;map\u0026gt; 和 \u0026lt;area\u0026gt; 配合。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e\u0026lt;map\u0026gt; 定义热点区域，定义热点区域的 ID ，或者定义可选的 name 属性。也可以作为一个句柄，与热点图像进行绑定\n        \u003cbr\u003e\u0026lt;img\u0026gt; 的 usemap 属性可以引用 \u0026lt;map\u0026gt; 中的 id 或 name 属性（根据浏览器），所以应同时向 \u0026lt;map\u0026gt; 添加 id 和 name\n        属性，并设置为相同的值\n    \u003c/li\u003e\n    \u003cli\u003e\u0026lt;area\u0026gt; 定义图像映射中的区域， area 元素必须嵌套在 map 中。该标签必须包含一个设有属性的 alt ，定义热点区域的替代文本，该标签还包含多个可选属性\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003e\u0026lt;area\u0026gt; 标签属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性\u003c/th\u003e\n        \u003cth\u003e值\u003c/th\u003e\n        \u003cth\u003e嗯\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['coords', '坐标值', '定义可点击区域（对鼠标敏感的区域）的坐标',],\n        ['href', 'URL', '定义该区域的目标 URL',],\n        ['nohref', 'nohref', '从图像映射排除某个区域',],\n        ['shape', 'default 、 rect （矩形）、 circ （圆形）、 poly （多变形）', '定义区域形状',],\n        ['target', '_blank 、 _parent 、 _self 、 _top', '规定在何处打开 href 属性的指定目标的 URL',],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 基础","title":"链接"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","基础","链接"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
