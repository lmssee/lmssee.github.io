                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e标题\u003c/h5\u003e\n\u003cp\u003e通过 \u0026lt;h[\\m]\u0026gt; … \u0026lt;/h[\\m]\u0026gt; 标签进行定义的，其中 n 的值是从 1 到 6 ，分别表示六级标题。\u003c/p\u003e\n\u003ch5\u003e斜体 和 粗体\u003c/h5\u003e\n\u003cp\u003e粗体（ boldface ）和斜体（ italic ）文本在所有纸面交流中都变成了社交礼节所要求的。\u003c/p\u003e\n\u003cp\u003e给文本添加粗体和斜体格式化效果的老派方法——这里将简要讨论，因为如果你选择查看源代码，那么将不可避免地会在许多 Web 站点的源代码中看到它，包括 \u0026lt;b\u0026gt;\u0026lt;/b\u0026gt; 和\n    \u0026lt;i\u0026gt;\u0026lt;/i\u0026gt; 标签对。对于粗体文本，将用 \u0026lt;b\u0026gt; 和 \u0026lt;/b\u0026gt; 标签包围文本。类似地，要使任何文本以斜体显示，将在 \u0026lt;i\u0026gt; 和 \u0026lt;/i\u0026gt;\n    标签内封闭它。尽管这种方法在浏览器中仍然会工作得很好，但它不像用于文本格式化的 CSS 样式规则那样灵活或强大，应该\n    \u003cmark\u003e避免使用\u003c/mark\u003e。\n\u003c/p\u003e\n\u003cp\u003e\u0026lt;strong\u0026gt; 和 \u0026lt;em\u0026gt; 标签被认为是 \u0026lt;b\u0026gt; 和 \u0026lt;i\u0026gt; 之上的改进，因为它们只暗示文本应该接受特殊的强调。它们没有明确规定应该如何实现这种效果。换句话说，浏览器不必把\n    \u0026lt;strong\u0026gt; 解释为意指粗体或者把 \u0026lt;em\u0026gt; 解释为意指斜体。这使 \u0026lt;strong\u0026gt; 和 \u0026lt;em\u0026gt; 更适合于 HTML5\n    ，因为它们给文本添加了含义，并且会影响文本的显示方式。\u003c/p\u003e\n\u003ch5\u003e段落\u003c/h5\u003e\n\u003cp\u003e其中 p 是 Paragraph （段落）的缩写，使用 \u0026lt;p\u0026gt; ～ \u0026lt;/p\u0026gt; 可以用来包裹文章的段落的主体内容。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性\u003c/th\u003e\n        \u003cth\u003e作用\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e常见\u003c/h5\u003e\n\u003cul id=\"Ba\"\u003e\n\u003c/ul\u003e\n\u003ch6\u003edel ins\u003c/h6\u003e\n\u003cp\u003edel 和 ins 有两个重要是的属性：cite 、 datetime。 cite 属性不同于 cite 元素，用于提供一个 URL ，指向说明编辑原因的页面。datetime\n    属性提供编辑的时间，浏览器不会显示，不过可以提供一些背景信息。\u003c/p\u003e\n\u003ch6\u003emeter\u003c/h6\u003e\n\u003cp\u003e很像 progress ，可以用 meter 表示分数值或已知范围的测量结果。属性如下：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003evalue 值，唯一必须包含的属性\u003c/li\u003e\n    \u003cli\u003emin 最小\u003c/li\u003e\n    \u003cli\u003emax 最大\u003c/li\u003e\n    \u003cli\u003elow 下限\u003c/li\u003e\n    \u003cli\u003ehigh 上限\u003c/li\u003e\n    \u003cli\u003eoptimum 设置最佳值\u003c/li\u003e\n    \u003cli\u003eform 所属表单\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e引用它处内容\u003c/h6\u003e\n\u003cp\u003e\u0026lt;blockquote\u0026gt; 与 \u0026lt;/blockquote\u0026gt; 之间的所有文本都会从常规文本中分离出来，经常会在左、右两边进行缩进（增加外边距），而且有时会使用斜体。也就是说，块引用拥有它们自己的空间。\n\u003c/p\u003e\n\u003ch5\u003e文字的滚动\u003c/h5\u003e\n\u003cp\u003e使用 marquee 元素可以实现文字的滚动。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;marquee style=\"width:xx;height: xx;\" scrollamount=\"2\" direction=\"up\"\n        align=\"right\"\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ebg color 属性设定活动字幕的背景颜色，背景颜色可用 RGB 、 16 进制值的格式或颜色名称来设定\u003c/li\u003e\n    \u003cli\u003ewidth 用于设置滚动文本框的宽度，输入一个数值后从后面的单选框选择 in Pixels （按像素）或是 in Percent （按百分比）\u003c/li\u003e\n    \u003cli\u003eheight 用于设置滚动文本框的高度，输入一个数值后从后面的单选框选择 in Pixels （按像素）或是 in Percent （按百分比）\u003c/li\u003e\n    \u003cli\u003eloop 属性设定滚动的次数，当 loop=-1 表示一直滚动下去，默认为 -1\u003c/li\u003e\n    \u003cli\u003ehspace 、 vspace 设定活动字幕里所在的位置距离父容器垂直边框、竖屏的距离\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e设定 \u0026lt;marquee\u0026gt; 标签内容的对齐方式可选参数如下。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eabsbottom ：绝对底部对齐（与 g 、 p 等字母的最下端对齐）\u003c/li\u003e\n    \u003cli\u003eabsmiddle ：绝对中央对齐\u003c/li\u003e\n    \u003cli\u003ebaseline ：底线对齐\u003c/li\u003e\n    \u003cli\u003ebottom ：底部对齐（默认）\u003c/li\u003e\n    \u003cli\u003eleft ：左对齐\u003c/li\u003e\n    \u003cli\u003emiddle ：中间对齐\u003c/li\u003e\n    \u003cli\u003eright ：右对齐\u003c/li\u003e\n    \u003cli\u003etexttop ：顶线对齐\u003c/li\u003e\n    \u003cli\u003etop ：顶部对齐\u003c/li\u003e\n\u003c/ul\u003e\n\u003cmarquee behavior=\"alternate\" direction=\"up\"\n    style=\"width: 12rem;background: chartreuse;height: 2rem;text-align: center;\" scrollamount=\"2\" align=\"center\"\u003e\n    \u003cp\u003e........ 。\u003c/p\u003e\n    \u003cp\u003e....... 。\u003c/p\u003e\n    \u003cp\u003e...... 。\u003c/p\u003e\n    \u003cp\u003e..... 。\u003c/p\u003e\n    \u003cp\u003e.... 。\u003c/p\u003e\n    \u003cp\u003e... 。\u003c/p\u003e\n    \u003cp\u003e.. 。\u003c/p\u003e\n    \u003cp\u003e. 。\u003c/p\u003e\n\u003c/marquee\u003e\n\u003cp\u003ebehavior 属性设置 marquee 的滚动的方式 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003escroll ：循环滚动\u003c/li\u003e\n    \u003cli\u003eslide ：单次滚动\u003c/li\u003e\n    \u003cli\u003ealternate ：来回滚动\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['class=class ', ' 设置类属性 ',],\n        ['id=id ', ' 设置 ID 属性 ',],\n        ['style=style ', ' 设置行内样式 ',],\n        ['title=title ', ' 设置标题 ',],\n        ['dir=dir ', ' 设置段落文字的显示方向 ',],\n        ['lang=lang ', ' 设置语言种类 ',],\n        ['accesskey=key ', ' 设置快捷键 ',],\n        ['tabindex=n ', ' 设置 Tab 键在控件中的移动顺序 ',],\n        ['contenteditable=bool ', ' 设置元素是否可编辑 ',],\n        ['contextmenu=id ', ' 指定 context menu ',],\n        ['draggable=bool ', ' 设置是否可拖拽 ',],\n        ['dropzone=value ', ' 设置是否可拖放 ',],\n        ['hidden ', ' 设置隐藏元素 ',],\n        ['spellcheck=bool ', ' 检查语法拼写 ',],\n        ['IE 扩展属性 ', ' 用于设定 IE 扩展属性 ',],\n    ];\n    _MiMethod.td('Aa', Aa);\n    var Ba = ['\u0026lt;abbr\u003e、\u0026lt;/abbr\u003e表示缩写 ', '\u0026lt;address\u003e地址 ', '\u0026lt;bdi\u003e文档方向 ( 不受父级影响 )', '\u0026lt;br\u003e换行 ', '\u0026lt;bro\u003e文档方向 包含 dir 属性，取值包括 ltr （由左向右）和 rtl （由右向左） ', '\u0026lt;cite\u003e引用其它作品标题 ', '\u0026lt;code\u003e、 \u0026lt;var\u003e、 \u0026lt;samp\u003e、 \u0026lt;kbd\u003e：表示输入和输出 ', '\u0026lt;del\u003e已删除的内容 ', '\u0026lt;dfn\u003e、\u0026lt;/dfn\u003e定义术语 ', '\u0026lt;em\u003e、\u0026lt;/em\u003e：强调的（斜体）文本。 ', '\u0026lt;hr\u003e主题分割线 ', '\u0026lt;ins\u003e已添加的内容 ', '\u0026lt;mark\u003e突出显示 ', '\u0026lt;meter\u003e代表投票结果。与 progress 类似，包含 value 、 min 、 max 、 low 、 high 、 optimum 、 form 属性 ', '\u0026lt;pre\u003e、\u0026lt;/pre\u003e：预先格式化的（通常是等宽的）文本，保留空格和换行符。 ', '\u0026lt;progress\u003e完成度，表水一个进度条，支持 max 、 value 、 form 属性 ', '\u0026lt;q\u003e、\u0026lt;/q\u003e定义短的引用 ', '\u0026lt;ruby\u003e、\u0026lt;rt\u003e、\u0026lt;rp\u003e、\u0026lt;/rp\u003e、\u0026lt;rp \u003e、\u0026lt;/rp\u003e、\u0026lt;/rt\u003e、\u0026lt;/ruby\u003e注释 ', '\u0026lt;small\u003e、\u0026lt;/small\u003e添加小号文本 ', '\u0026lt;strong\u003e、\u0026lt;/strong\u003e：醒目的（粗体）文本。 ', '\u0026lt;sup\u003e、\u0026lt;/sup\u003e：上标文本。 ', '\u0026lt;sub\u003e、\u0026lt;/sub\u003e：下标文本。 ', '\u0026lt;span\u003e段中元素 ', '\u0026lt;time\u003e表示时间和日期，可包含 datetime 属性，来告诉浏览器时间 ', '\u0026lt;u\u003e、\u0026lt;/u\u003e: 下划线 ', '\u0026lt;wbr\u003e智能换行 ',]\n    _MiMethod.li('Ba', Ba);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 基础","title":"文本"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","基础","文本"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
