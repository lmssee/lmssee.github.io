="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>技巧</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e方便自己，方便别人。\u003c/p\u003e\n\u003ch5\u003e利用注释记录代码\u003c/h5\u003e\n\u003cp\u003e无论何时开发 HTML 页面或 CSS 代码段，都要记住你或者其它人几乎肯定需要在某一天修改它。简单的文本 Web 页面通常容易阅读和修改，但是带有图形、表格和其它布局技巧的复杂页面可能相当难以解释。\u003c/p\u003e\n\u003ch5\u003e缩进代码以使之更清晰\u003c/h5\u003e\n\u003cp\u003e在涉及使 HTML 代码更容易理解和维护时，一致的缩进甚至可能比注释更重要。\u003c/p\u003e\n\u003ch5\u003e版本控制\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e提交（ commit ） / 签入（ check in ）和签出（ check out\n        ）：当把一个对象放入代码库中时，就在提交那个文件；在签出一个文件时，就在从代码库中获取它（其中存储了所有当前的和历史的版本）并对其进行处理，直到准备好再次提交或签入文件为止\u003c/li\u003e\n    \u003cli\u003e分枝（ branch ）：置于版本控制之下的文件在任何时刻都可以分枝或分支（ fork\n        ），从而创建两条或更多的开发路径。假设你想试验一些新的显示布局或者表单交互性，但是不希望以任何方式修改现有的站点。你可能开始于一组主文件，但是后来把这组文件进行了分支以用于新的站点，并继续独立地开发它们。如果继续开发原始的文件集，则处理的将是主干（\n        trunk ）\u003c/li\u003e\n    \u003cli\u003e更改（ change ） / 差异（ diff ）：这只是版本控制下的修改的术语（可以称之为更改或差异）。你可能也听过把差异用作一个动词，比如\"我比较了文件的差异\"，用于指比较一个对象的两个版本的动作（有一个底层的\n        UNIX 命令称为 diff ）\u003c/li\u003e\n    \u003cli\u003e分支（ fork ）：当找到一种开源 GitHub\n        代码库时，你可能想要把它用作自己工作的基础（或者想要为它做贡献），就可以分支该代码库，然后创建它的一个副本，以便可以按自己的进度继续处理它。从分支的代码库中，可以把提交推送（ push\n        ）到自己的版本，从原始代码库中提取（ fetch ）更改，如果你想要把自己的更改贡献给所分支的原始代码库，还可以给原始代码库的所有者发出拉取请求（ pull request ）\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e使用 HTML 和 CSS 框架\u003c/h5\u003e\n\u003ch5\u003e网页自动关闭\u003c/h5\u003e\n\u003cp\u003e设置网页自动关闭的方法是在一定的时间调用全局 window.close() 方法，关闭当前窗口。\u003c/p\u003e\n\u003ch5\u003e网页不能另存\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;body oncontextmenu=self.event.returnValue=false onselectstart=\"return\n        false\"\u0026gt;\u0026lt;/body\u0026gt;\u003c/span\u003e\n    \u003c/cod\u003e\n    \u003cp\u003e另一种禁用右键的方法如下。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body oncontextmenu=\"return false\"\u0026gt;\u0026lt;/body\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;!-- 禁用右键 : --\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003efunction\n            stop() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn false; \u003cspan class=\"r\"\u003e// 返回 false\n                ，表示禁用\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.oncontextmenu = stop; \u003cspan class=\"r\"\u003e// 监听 oncontextmenu\n                方法\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n        \u003c/code\u003e\n\u003cp\u003e禁止\"另存为\"命令需要在目标网页末尾\" \u0026lt;/body\u0026gt;\u0026lt;/html\u0026gt; \"的标签前面加上如下代码，可以使\"另存为\"命令不能顺利执行。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;noscript\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;iframe scr=\"*.htm\"\u0026gt;\u0026lt;/iframe\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/noscript\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e同理，取消选取、防止复制方法如下： oncopy=\"return false;\" oncut=\"return false;\" 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e// 禁用右键菜单\u003c/span\u003e\u003cspan class=\"p\"\u003eoncontextmenu='return false'\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e// 禁用拖拽\u003c/span\u003e\u003cspan class=\"p\"\u003eondragstart='return false' \u003c/span\u003e\u003cspan class=\"p\"\u003e//\n        禁用选取\u003c/span\u003e\u003cspan class=\"p\"\u003eonselectstart ='return false' \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 禁用选取\u003c/span\u003e\u003cspan class=\"p\"\u003eonselect='document.selection.empty()' \u003c/span\u003e\u003cspan class=\"p\"\u003e//\n        禁用复制\u003c/span\u003e\u003cspan class=\"p\"\u003eoncopy='document.selection.empty()' \u003c/span\u003e\u003cspan class=\"p\"\u003e// 禁用复制\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eonbeforecopy='return false' \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 禁用鼠标\u003c/span\u003e\u003cspan class=\"p\"\u003eonmouseup='document.selection.empty()'\u003c/span\u003e\n    \u003c/code\u003e\n\u003ch5\u003e禁止查看网页源代码\u003c/h5\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e采用 js\u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (window.Event)\n            document.captureEvents(Event.MOUSEUP); \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction nocontextmenu() { \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003eevent.cancelBubble = true \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003eevent.returnValue = false; \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn false; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction norightclick(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (window.Event) { \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003eif (e.which == 2 || e.which == 3) return false; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e} else if (event.button == 2 || event.button == 3) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eevent.cancelBubble\n            = true \u003c/span\u003e\u003cspan class=\"p6\"\u003eevent.returnValue = false; \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn false;\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.oncontextmenu = nocontextmenu; \u003cspan class=\"r\"\u003e// for\n                IE5+ \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.onmousedown = norightclick; \u003cspan class=\"r\"\u003e// for all\n                others \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n                \u003c/code\u003e\n\u003c/details\u003e\n\u003ch5\u003e网页不出现滚动条\u003c/h5\u003e\n\u003ch5\u003e设定打开网页的大小\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.open('page.html',\n        'newWindow', 'height=300, width = 400, top = 0, left = 0, toolbar = no,\n        menubar = no ,scrollbars = no, resizable = no, location = no,status = no '); \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n    \u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 基础","title":"技巧"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","基础","技巧"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
