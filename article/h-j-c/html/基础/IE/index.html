    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e注释\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003elte ：即 Less than or equal to 的简写，也就是小于或等于的意思\u003c/li\u003e\n    \u003cli\u003elt ：即 Less than 的简写，也就是小于的意思\u003c/li\u003e\n    \u003cli\u003egte ：即 Greater than or equal to 的简写，也就是大于或等于的意思\u003c/li\u003e\n    \u003cli\u003egt ：即 Greater than 的简写，也就是大于的意思\u003c/li\u003e\n    \u003cli\u003e! ：即不等于的意思，跟 JavaScript 里的不等于判断符相同\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e让 IE 支持 HTML 5 标签\u003c/h5\u003e\n\u003cdetails\u003e\n    \u003csummary\u003ejs 办法\u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;!--[if IE]\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;script\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.createElement(\"header\"); \u003cspan class=\"r\"\u003e// 创建 header 节点\u003c/span\u003e\u003c/span\u003e\u003cspan\n            class=\"p6\"\u003edocument.createElement(\"footer\"); \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003edocument.createElement(\"nav\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.createElement(\"article\");\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.createElement(\"section\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;/script\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;![endif]--\u0026gt;\u003c/span\u003e\n    \u003c/code\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;!--[if IE]\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003e(function(){if(!/*@cc_on!@*/0)return;var e = \"abbr,article,aside,audio,bb,canvas,\n        \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003edatagrid,datalist,details,dialog,eventsource,figure,footer,header,hgroup,mark,menu,meter,nav\n        \u003c/span\u003e\n        \u003cspan\n            class=\"p2\"\u003e,output,progress,section,time,video\".split(','),i=e.length;while(i--){document.createElement(e[i]\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003e)}})() \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u0026lt;![endif]--\u0026gt;\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/details\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;!- – [if It IE 9]--\u0026gt;\u0026lt;script src=\"\n        http://html5shiv.googlecode.com/svn/trunk/html5.js \"\u0026gt;\u0026lt;/script \u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eE 浏览器窗口扩展\u003c/h5\u003e\n\u003ch6\u003e模式窗口\u003c/h6\u003e\n\u003cp\u003e模式窗口很像一个标准的对话框。模式窗口会屏蔽主窗口，直到将其关闭。其基本语法为：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.showModalDialog( 对话框 URL ，参数，特征 )\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e对话框 URL ：指要显示的文档的 URL 地址;\u003c/p\u003e\n\u003cp\u003e参数：指要传递给模式对话框的对象或值;\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!-- \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ewindow.showModalDialog(\"index.htm\", window,\n        \"dialogHeight:150px;dialogWidth:300px;center:yes;help:no;resizable:no;status:no;\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e//--\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e无模式窗口\u003c/h6\u003e\n\u003cp\u003e无模式窗口与模式窗口完全不同。模式窗口永远停留在原窗口的上层，即使原窗口获得焦点，仍然如此。通常用无模式窗口显示帮助信息或其它上下文相关信息。其基本语法结构为：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!-- \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ewindow = window.showModelessDialog(\"index.htm\", window,\n        \"dialogHeight:150px;dialogWidth:300px;center:yes;help:no;resizable:no;status:no;\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e//--\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e弹出窗口\u003c/h6\u003e\n\u003cp\u003e创建一个弹出窗口很简单，利用 Window 对象的 showModalDialog 方法即可。该方法用于弹出网页（模式）对话框。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evariant=window.showModalDialog(sURL[,vArguments[,sFeatures]])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003esURL ：指定 URL 文件地址。\u003c/p\u003e\n\u003cp\u003evArguments ：用于向网页对话框传递参数。传递参数的类型不限制。对于字符串类型，最大为 4 096 字符，但也可以传递对象，例如 index.htm 。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003esFeatures 的可选参数及说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e可选参数\u003c/th\u003e\n        \u003cth\u003e嗯\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e事件\u003c/h5\u003e\n\u003cp\u003eIE 下注册多个事件监听器与移除监听器。\u003c/p\u003e\n\u003cp\u003eIE 浏览器中， HTML 元素有个 attachEvent 方法，允许外界注册该元素多个事件监听器，例如。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eelement.attachEvent('onclick',observer);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e注意　在 IE 7 中注册多个事件时，后加入的函数先被调用。\u003c/p\u003e\n\u003cp\u003e如果要移除先前注册的事件监听器，调用 element 的 detachEvent 方法即可，参数相同，例如。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eelement.detachEvent('onclick',observer);\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e区分 IE 及非 IE 浏览器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eif (!+[1, ]) { //IE 11 不支持\u003c/span\u003e\u003cspan class=\"p4\"\u003ealert( \" 这是\n        IE 浏览器 \"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert( \" 这不是 IE 浏览器 \"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e非 IE 浏览器下将类数组对象\" arguments \"转为数组：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eArray.prototype.slice.call(arguments);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003earguments 不是 Array 的实例，因此不是真正的数组，也就没有 slice() ，那为什么使用\" Array.prototype.slice \"而不是\" Array().slice \"或\" [].slice\n    \"呢？因为这两种方法效率比较低，故使用代码中的写法访问 Array 的内置函数。\u003c/p\u003e\n\u003ch5\u003e判断 IE 版本\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.navigator.appVersion\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e上述代码返回一个字符串，表示所使用浏览器的版本号。它可能只包含一个数字，比如 5.0 ，还可能包含一些其它的相关信息。\u003c/p\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['dialogWidth:number', '可选项，用于设置对话框的宽度',],\n        ['dialogTop:number', '可选项，用于设置对话框窗口相对于桌面左上角的 top 位置',],\n        ['dialogLeft:number', '可选项，用于设置对话框窗口相对于桌面左侧的 left 位置',],\n        ['center:{yes | no | 1 | 0}', '可选项，用于指定是否将对话框在桌面上居中',],\n        ['Help ： {yes | no | 1 | 0}', '可选项，用于指定对话框窗口中是否显示上下文敏感的帮助 v 图标',],\n        ['scroll:{yes | no | 1 | 0}', '可选项，用于指定对话框窗口是否显示滚动条',],\n        ['resizable ： {yes | no | 1 | 0}', '可选项，用于设置对话框窗口大小是否可变',],\n        ['status:{yes | no | 1 | 0}', '可选项，用于指定对话框窗口是否显示状态条',],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 基础","title":"IE"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","基础","IE"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
