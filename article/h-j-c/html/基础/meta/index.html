="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>meta</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简述\u003c/h5\u003e\n\u003cp\u003emeta 是 meta-information （元信息）的缩写。 meta 元素可提供有关页面的元信息，例如针对搜索引擎和更新频度的描述和关键词。 meta 的定义有两种方式：第一种是 \u0026lt;meta\n    name=\"name\" content=\"content\"\u0026gt; ，这种形式可以设定传递给浏览器和搜索引擎的元信息；第二种是 \u0026lt;meta http-equiv=\"name\" content=\"content\"\u0026gt;\n    ，这种形式类似于 HTTP 的头部协议，它传递给浏览器一些有用的信息，以帮助浏览器正确和精确地显示网页内容。\n\u003c/p\u003e\n\u003cp\u003e有些元数据信息不能被 title 、 base 、 link 、 style 或 script 元素描述（例如文档内容的字符编码），这个时候就可以使用 meta 元素。每个 meta\n    元素只能有一个用途，如果想要多种用途，就需要添加多个 meta 元素。 meta 元素总共有 4 个属性，分别是 charset 、 name 、 http-equiv 和 content 。\u003c/p\u003e\n\u003ch6\u003echarset\u003c/h6\u003e\n\u003cp\u003echarset 属性是 HTML5 新增的属性，可用来表示 HTML 文档中的内容所用的字符编码（推荐使用 UTF-8 编码），定义的属性值不区分大小写。\u003c/p\u003e\n\u003ch6\u003ename\u003c/h6\u003e\n\u003cp\u003emeta 元素可以用 name 属性表示文档级元数据，定义的属性值同样不区分大小写，每个 name 属性值对应特定的 content 属性值。 name 属性主要服务于计算机（如搜索引擎等），让计算机能更好地理解当前文档。\n\u003c/p\u003e\n\u003ctable id=\"aa\"\u003e\n    \u003ccaption\u003ename 属性中的关键字\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"35%\"\u003e关键字\u003c/th\u003e\n        \u003cth\u003e嗯\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch6\u003ehttp-equiv\u003c/h6\u003e\n\u003cp\u003ehttp-equiv 属性提供了一些程序指令，用于模拟 HTTP 首部，每个 http-equiv 属性值同样对应特定的 content 属性值。在 http-equiv 属性中包含三个关键字，分别是 content-type\n    、 default-style 和 refresh 。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003econtent-type ：定义 MIME 类型与字符编码，对应实体首部的 Content-Type ，这个关键字已经不推荐使用\u003c/li\u003e\n    \u003cli\u003edefault-style ：指定首选样式表，定义的名称要与 link 或 style 元素中的 title 值匹配\u003c/li\u003e\n    \u003cli\u003erefresh ：指定一个以秒为单位的时间间隔，执行重载或重定向。如果做重载，只需定义秒数；如果要做重定向，需要定义秒数和 URL ，可以是绝对或相对的 URL\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003etitle\u003c/h5\u003e\n\u003cp\u003etitle 元素是必须的，且 title 中不能包含任何格式、 HTML 、图像、和指向其它页面的链接。\u003c/p\u003e\n\u003ch5\u003e定义页面关键字\u003c/h5\u003e\n\u003cp\u003e页面关键字的定义方式与 meta 的标准格式一致，遵循以 name 、 content 属性来定义键值对的规则。 name 为属性名称，这里是 keywords ，也就是设置网页的关键字属性， keywords\n    提供的网页关键词通常是为搜索引擎分类网页使用的，而在 content 中则定义具体的关键字。\u003c/p\u003e\n\u003ch5\u003e设置页面描述\u003c/h5\u003e\n\u003cp\u003ename 属性取值为 description ，用于定义网页简短描述， content 属性提供网页的简短描述。\u003c/p\u003e\n\u003ch5\u003e设定作者信息\u003c/h5\u003e\n\u003cp\u003e将 meta 元素的属性名设置为 author ， content 属性值即为具体的作者信息。\u003c/p\u003e\n\u003ch5\u003e限制搜索方式\u003c/h5\u003e\n\u003cp\u003e搜索引擎的定期搜索方式，就是每隔一段时间，搜索引擎主动对一定 IP 地址范围内的互联网网站进行检索，一旦发现新的网站，它会自动提取网站的信息和网址加入自己的数据库。搜索引擎的搜索机器人，沿着网页上的链接（如 http 和\n    src 链接），不断地检索资料建立自己的数据库。有没有办法限制自己的网站不被搜索引擎的搜索机器人设定为检索目标呢？ 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;meta name=\"robots\" content=\" noindex, nofollow \"\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e设置 meta 属性 name 值为 robots ，属性 content 可取值有 index 、 noindex 、 follow 、 nofollow 等。 index 为允许搜索引擎索引此网页、 noindex\n    设置为搜索引擎不索引此网页、 follow 为允许搜索引擎继续通过此网页的链接索引搜索其它的网页、 nofollow 为搜索引擎不继续通过此网页的链接索引搜索其它的网页。根据排列组合，有 4 种组合。 index 和\n    follow 组合也可写为 all ， noindex\n    和 nofollow 等价于 none 。\u003c/p\u003e\n\u003ch5\u003e网页语言与文字\u003c/h5\u003e\n\u003cp\u003e通过 meta\n    可设定页面使用的字符集，用以说明页面所使用的文字使用语言，浏览器会根据此来调用相应的字符集显示页面内容，同时搜索引擎知道该页面使用的是什么语言，对浏览器和搜索引擎都有帮助。字符集是一组具有共同特征抽象字符的集合，例如常见的字符集有英文字符集、\n    ISO8859 、 CJK 、繁体字字符集、简体字字符集、日文汉字字符集、日文假名字符 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;meta http-equiv=\"content-language\" content=\"zh-CN\" /\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eprimary-code 为两个字母组成常用的有：\n\u003c/p\u003e\n\u003cul id=\"ba\"\u003e\n\u003c/ul\u003e\n\u003cp\u003e此外，通过 Content Type 可以用于定义文件的类型和网页的编码。编码是字符和二进制内码的对应码表，例如常见的编码类型有 ASCII 、 ISO8859-1 、 GB2312 、 GBK 、 UTF-8 、\n    UTF-16 等。\u003c/p\u003e\n\u003ch5\u003e定时跳转页面\u003c/h5\u003e\n\u003cp\u003e设定页面定时调整不一定要通过 JavaScript 脚本代码来实现，也可以通过 meta 标签来实现。例如自动跳转到其它页面，可以设定 10 秒后跳转到指定的 URL 。\u003c/p\u003e\n\u003cp\u003e设置 meta 的 name 取值为 refresh ，即刷新与跳转（重定向）页面。 refresh 用于刷新与跳转 ( 重定向 ) 页面。 refresh 为 http-equiv 属性的值，使用 content\n    属性表示刷新或跳转的开始时间与跳转的网址 。\u003c/p\u003e\n\u003ch5\u003e定义文档视口\u003c/h5\u003e\n\u003cp\u003e视口（ viewport ）即浏览器的显示页面内容的屏幕区域。一般移动设备在浏览器默认设置一个 \u0026lt;meta name=\"viewport\"\u0026gt; 标签，定义一个布局视口。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003econtent=\"width=device-width, \u003cspan class=\"r\"\u003e// 窗口宽度 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003einitial-scale=1.0; \u003cspan class=\"r\"\u003e// 定义初始缩放值 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003emaximum-scale=1;\n        \u003cspan class=\"r\"\u003e// 定义最小比例 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003euse-scalable=no\" \u003cspan class=\"r\"\u003e// 是否允许手动缩放 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ctable id=\"ab\"\u003e\n    \u003ccaption\u003e\u0026lt;meta name=\"viewport\"\u0026gt 标签的设置说明\u003c/caption\u003e\n\u003c/table\u003e\n\u003ch5\u003e设定网页缓存过期时间\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;meta http-equiv=\"expires\" content=\" 这里是具体的时间值 \" /\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e将 meta 元素的 http-equiv 取值为 expires 属性值，即设置网页缓存过期时间。 expires 为 http-equiv 属性的值，并使用 content 属性表示页面缓存的过期时间。\u003c/p\u003e\n\u003ch5\u003e禁止从缓存中调用\u003c/h5\u003e\n\u003cp\u003e网页缓存由 HTTP 消息报头中的 Cache-control 控制， Cache-Control 指定请求和响应遵循的缓存机制。在请求消息或响应消息中设置 Cache-Control\n    并不会修改另一个消息处理过程中的缓存处理过程。请求时的缓存指令包括 no-cache 、 no-store 、 max-age 、 max-stale 、 min-fresh 、 only-if-cached\n    ，响应消息中的指令包括 public 、 private 、 no-cache 、 no-store\n    、 no-transform 、 must-revalidate 、 proxy-revalidate 、 max-age 。各个消息中的指令含义如下所述。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ePublic 指示响应可被任何缓存区缓存\u003c/li\u003e\n    \u003cli\u003ePrivate 指示对于单个用户的整个或部分响应消息，不能被共享缓存处理。这允许服务器仅仅描述当用户的部分响应消息，此响应消息对于其它用户的请求无效\u003c/li\u003e\n    \u003cli\u003eno-cache 指示请求或响应消息不能缓存\u003c/li\u003e\n    \u003cli\u003eno-store 用于防止重要的信息被无意的发布。在请求消息中发送将使得请求和响应消息都不使用缓存\u003c/li\u003e\n    \u003cli\u003emax-age 指示客户机可以接收生存期不大于指定时间（以秒为单位）的响应\u003c/li\u003e\n    \u003cli\u003emin-fresh 指示客户机可以接收响应时间小于当前时间加上指定时间的响应\u003c/li\u003e\n    \u003cli\u003emax-stale 指示客户机可以接收超出超时期间的响应消息。如果指定 max-stale 消息的值，那么客户机可以接收超出超时期指定值之内的响应消息\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eCache-control 不同取值的作用根据用户不同的重新浏览方式，可以将其分为以下几种情况。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e打开新窗口 Cache-control 值为 private 、 no-cache 、 must-revalidate ，那么打开新窗口访问时都会重新访问服务器。而如果指定了 max-age 值，那么在\n        max-age 值内的时间里就不会重新访问服务器，\u003c/li\u003e\n    \u003cli\u003e在地址栏回车 Cache-control 值为 private 或 must-revalidate 则只有第一次访问时会访问服务器，以后就不再访问；值为 no-cache ，那么每次都会访问；值为 max-age\n        ，则在过期之前不会重复访问。\u003c/li\u003e\n    \u003cli\u003e按后退按钮 Cache-control 值为 private 、 must-revalidate 、 max-age ，则不会重复访问；值为 no-cache ，则每次都重复访问\u003c/li\u003e\n    \u003cli\u003e按刷新按钮 无论为何值，都会重复访问\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e删除过期的 Cookie\u003c/h5\u003e\n\u003cp\u003e在没有单独设置 cookie\n    的调用方式与过期时间的情况下，默认情况下浏览器访问某个页面时会将它存在缓存中，再次访问时就可从缓存中读取，以提高速度。假设当你希望用户每次访问页面时都可以刷新广告的图标，或每次都刷新你的计数器，就可以采用禁用缓存了。\u003c/p\u003e\n\u003cp\u003e删除过期的 Cookie 的原理是，如果网页过期，那么存盘的 cookie 将被删除，示例代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"Set-Cookie\" \u003c/span\u003e\u003cspan class=\"p2\"\u003eContent=\"cookievalue=xxx;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eexpires=Wednesday, Sunday 26 October 2015 01:00 GMT; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003epath=/\"\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e设置网页的过渡效果\u003c/h5\u003e\n\u003cp\u003e网页的过渡效果是指当用户进入或离开网页时，页面呈现的不同的效果，例如渐变、卷动收起、百叶窗等效果。这样网页看起来会更具有动感，不过也要注意适可而止，否则太花哨的动画效果容易产生喧宾夺主的效果，也容易引起用户的不适感。\u003c/p\u003e\n\n\u003cscript\u003e\n    var aa = [\n        ['application-name', 'Web 应用程序的名称 '],\n        ['author', ' 文档的作者 '],\n        ['description', ' 对文档内容的描述 '],\n        ['generator', ' 标识生成页面的工具，有些内容是管理里系统可以自动生成的 '],\n        ['keywords', ' 定义关键字，多个关键字可以用逗号分开 '],\n        ['robots', ' 规定搜索引擎不操作该文档。例如 noindex 、  noarchive'],\n        ['viewport', ' 主要用于移动端设备，可设置浏览器窗口（  viewport ）'],\n    ];\n    _MiMethod.td('aa', aa);\n    aa = null;\n    let ab = [\n        ['width', ' 正整数或 device-width ', ' 定义文档视口的宽度，单位为像素 '],\n        ['height', ' 正整数或 deice-height', ' 定义文档视口的高度，单位为像素，一般不用 '],\n        ['initial-scale', '[0.0-10.0]', ' 定义初始缩放值 '],\n        ['minimum-scale', '[0.0-10.0]', ' 定义缩小最小比例，它必须小于或等于 maximum-scale 设置 '],\n        ['maximum-scale', '[0.0-10.0]', ' 定义缩小最小比例，它必须小于或等于 minimum-scale 设置 '],\n        ['user-scalable', 'yes/no', ' 定义是否允许用户手动缩放页面，默认为 yes'],\n    ];\n    _MiMethod.td(\"ab\");\n    ab = null;\n    let ba = ['zh （  Chinese ）中国 ', 'fr （  French ）法国 ', 'de （  German ）德国 ', 'it （  Italian ）意大利 ', 'nl （  Dutch ）荷兰 ',\n        'el （  Greek ）希腊 ', 'es （  Spanish ）西班牙 ', 'pt （  Portuguese ）葡萄牙 ', 'ar （  Arabic ）阿拉伯 ',\n        'ru （  Russian ）俄罗斯 ', 'ja （  Japanese ）日本 ',\n    ];\n    _MiMethod.li('ba', ba);\n    ba = null;\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 基础","title":"meta"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","基础","meta"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
