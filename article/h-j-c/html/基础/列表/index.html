                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cul\u003e\n    \u003cli\u003e有序列表：一种在每个列表项前具有数字或字母的缩进列表。有序列表开始于 \u0026lt;ol\u0026gt; ，结束于 \u0026lt;/ol\u0026gt; 封闭标签。列表项封闭在 \u0026lt;li\u0026gt;\u0026lt;/li\u0026gt; 标签对内，并且在每个\n        \u0026lt;li\u0026gt; 开始标签处会自动出现换行符。整个列表是缩进的\u003c/li\u003e\n    \u003cli\u003e无序列表：一种在每个列表项前具有项目符号或其它符号的缩进列表。无序列表开始于 \u0026lt;ul\u0026gt; 标签，并且结束于 \u0026lt;/ul\u0026gt; 。与有序列表一样，它的列表项封闭在\n        \u0026lt;li\u0026gt;\u0026lt;/li\u0026gt; 标签对内。换行符和符号出现在每个 \u0026lt;li\u0026gt; 开始标签处，并且整个列表是缩进的\u003c/li\u003e\n    \u003cli\u003e定义列表：术语及其意义的列表。这类列表在每个列表项前没有特殊的数字、字母或符号，它开始于 \u0026lt;dl\u0026gt; ，并结束于 \u0026lt;/dl\u0026gt; 。 \u0026lt;dt\u0026gt;\u0026lt;/dt\u0026gt;\n        标签对封闭每个列表项， \u0026lt;dd\u0026gt;\u0026lt;/dd\u0026gt; 标签对则封闭每个定义\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e有序列表\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003eol 一个有序列表\u003c/li\u003e\n    \u003cli\u003eli 列表项\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e无序列表\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003eul 一个无序列表\u003c/li\u003e\n    \u003cli\u003eli 列表项\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e定义列表\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003edl 定义一个定义列表\u003c/li\u003e\n    \u003cli\u003edt 定义术语 , 作为定义列表的一部分\u003c/li\u003e\n    \u003cli\u003edd 定义术语对应的一部分 , 作为定义列表的一部分\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e属性\u003c/h5\u003e\n\u003cp\u003e定义样式 , 详见 css 。\u003c/p\u003e\n\u003ch5\u003e项目标号\u003c/h5\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e\u0026lt;ol\u0026gt; 标签属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性\u003c/th\u003e\n        \u003cth width=\"40%\"\u003e值\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003ereversed\u003c/td\u003e\n        \u003ctd\u003ereversed\u003c/td\u003e\n        \u003ctd\u003e定义列表顺序为降序\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003estart\u003c/td\u003e\n        \u003ctd\u003enumber\u003c/td\u003e\n        \u003ctd\u003e定义有序列表的起始值\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003etype\u003c/td\u003e\n        \u003ctd\u003e1 、 A 、 a 、 I 、 i\u003c/td\u003e\n        \u003ctd\u003e定义在列表中使用的标记符号\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e菜单列表\u003c/h5\u003e\n\u003cp\u003e\u0026lt;menu\u0026gt; 标签可以包括 \u0026lt;command\u0026gt; 、 \u0026lt;menuitem\u0026gt; 标签，用于定义命令和项目。\u003c/p\u003e\n\u003ctable id=\"Ab\"\u003e\n    \u003ccaption\u003e\u0026lt;command\u0026gt; 标签属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性\u003c/th\u003e\n        \u003cth\u003e值\u003c/th\u003e\n        \u003cth\u003e嗯\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e\u0026lt;menu\u0026gt; 标签有两个专用的属性\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003elabel 定义菜单的可见标签\u003c/li\u003e\n    \u003cli\u003etype 定义要显示哪种菜单类型\n        \u003cul\u003e\n            \u003cli\u003elist 定义列表菜单。一个用户可执行或激活的命令菜单\u003c/li\u003e\n            \u003cli\u003econtext 定义上下文菜单。该菜单必须在用户能够与命令交互前激活\u003c/li\u003e\n            \u003cli\u003etoolbar 定义工具栏菜单。活动式命令，允许用户立即与命令进行交互\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e快捷菜单\u003c/h5\u003e\n\u003cp\u003emenuitem 标签用来定义菜单项目，这些菜单仅用于弹出菜单命令，方便用户快捷调用。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003e\u0026lt;menuitem\u0026gt; 标签属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性\u003c/th\u003e\n        \u003cth width=\"25%\"\u003e值\u003c/th\u003e\n        \u003cth\u003e嗯\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cdiv contextmenu=\"my\"\u003e上下文菜单\n    \u003cmenuitem label=\" 微信分享 \"\u003e\n    \u003c/menuitem\u003e\n    \u003cmenuitem label=\" 微博分享 \"\u003e\n    \u003c/menuitem\u003e\n    \u003cp\u003e仅有 Firefox 支持。试了下，好像 Firefox 也不支持。\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;div contextmenu=\"my\"\u0026gt; 上下文菜单\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;menuitem label=\" 微信分享\n        \"\u0026gt;\u0026lt;/menuitem\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;menuitem label=\" 微博分享 \"\u0026gt;\u0026lt;/menuitem\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;p\u0026gt; 仅有 Firefox 支持 \u0026lt;/p\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\n\u003c/code\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['checked', 'checked', '定义在页面中加载后选中菜单 / 命令项目。仅用于 type=\"radio\" 或 type=\"checkbox\"',],\n        ['default', 'default', '把命令 / 菜单项设置为默认命令',],\n        ['disabled', 'disabled', '定义命令 / 菜单项是否应该被禁用',],\n        ['icon', 'URL', '定义菜单 / 命令的图标',],\n        ['open', 'open', '定义 details 是否可见',],\n        ['label', 'text', '必须。定义命令 / 菜单的名称，以向用户显示',],\n        ['radiogroup', 'group name', '定义命令组名称，命令组会在命令 / 菜单项本身被切换时切换。仅适用于 type=\"radio\"',],\n        ['type', 'checkbox 、 command 、 radio', '定义该 command 的类型，默认为 command',],\n    ];\n    _MiMethod.td('Aa', Aa);\n    var Ab = [\n        ['checked', 'checked', '定义是否被选中，仅用于 radio 和 checkbox',],\n        ['disabled', 'disabled', '定义 command 是否可用',],\n        ['icon', 'URL', '定义用作 command 的图像的 URL',],\n        ['label', 'text', '为 command 定义可见的 label',],\n        ['radiogroup', 'groupName', '定义 command 所属的组名，仅在类型为 radio 时可用',],\n        ['type', 'checkbox 、 command 、 radio', '定义该 command 的类型，默认为 command',],\n    ];\n    _MiMethod.td('Ab', Ab);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 基础","title":"列表"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","基础","列表"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
