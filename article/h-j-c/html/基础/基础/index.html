="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>基础</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eHTML 特性\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e使用 HTMl 语言标识文本。例如，定义标题文本、段落文本、列表文本和预定义文本等\u003c/li\u003e\n    \u003cli\u003e使用 HTML 语言建立超链接，通过超链接可以访问互联网上的所有信息，当使用鼠标单击超链接时，会自动跳转到链接页\u003c/li\u003e\n    \u003cli\u003e使用 HTML 语言创建列表，把信息有序组织在一起，以方便浏览\u003c/li\u003e\n    \u003cli\u003e使用 HTMl 语言在网页中显示图像、声音、视频、动画等多媒体信息，把网页设计得更富冲击力\u003c/li\u003e\n    \u003cli\u003e使用 HTML 语言可以制作表格，以便显示大量数据\u003c/li\u003e\n    \u003cli\u003e使用 HTML 语言制作表单，允许在网页内输入文本信息，执行其它用户操作，方便信息互动\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e索引\u003c/h5\u003e\n\u003cp\u003eindex.html 文件（或者采用它通常的叫法即索引文件（ index file ））是你给一个页面提供的名称，当人们导航到你的 Web 站点中的特定目录时，你希望它们把该页面视为默认的文件。\n\u003c/p\u003e\n\u003cp\u003e 索引文件的另一个作用是，访问你的站点上的某个目录的用户将具有一个索引页面，但是没有指定该页面仍将登录到用于站点的那个区域（或者用于站点本身）的主页上。\u003c/p\u003e\n\u003ch5\u003e基本结构\u003c/h5\u003e\n\u003cp\u003e第一行代码是文档类型声明；在 HTML5 中，它非常简单，如：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt; !DOCTYPE html\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003e许多 HTML 标签具有两个部分：开始标签（ opening tag ）和封闭标签（ closing tag ）\u003c/li\u003e\n    \u003cli\u003e另一类标签是空标签（ empty tag ）\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e浏览器窗口的最上方显示页面标题文本，它是位于 \u0026lt;title\u0026gt; 与 \u0026lt;/title\u0026gt; 之间的任何文本。页面标题文本还会在浏览器的 Bookmarks （书签）或 Favorites\n    （收藏夹）菜单上标识页面，这依赖于你使用的是哪种浏览器。为页面提供页面标题很重要，以便页面的访问者可以正确地给它们建立书签以便将来引用，搜索引擎也使用页面标题来提供指向搜索结果的链接。\u003c/p\u003e\n\u003cp\u003e在页面内，有一个头部区域和一个主体区域。每个区域分别通过 \u0026lt;head\u0026gt; 和 \u0026lt;body\u0026gt; 标签标识。其思想是：页面头部中的信息以某种方式描述页面，但实际上不会被 Web\n    浏览器显示出来。不过，放在主体中的信息会被 Web 浏览器显示。 \u0026lt;head\u0026gt; 标签总是出现在页面的 HTML 代码开始处附近，仅仅位于 \u0026lt;html\u0026gt; 开始标签之后。\u003c/p\u003e\n\u003cp\u003e\u0026lt;title\u0026gt; 标签对用于标识出现在页面头部内的页面标题，这意味着它将放在 \u0026lt;head\u0026gt; 开始标签之后和 \u0026lt;/head\u0026gt; 封闭标签之前。\u003c/p\u003e\n\u003ch5\u003ediv\u003c/h5\u003e\n\u003cp\u003ediv 的全称是 division ， div 元素是用来为 HTML 文档内块级内容提供结构化的。 div 的起始标签和结束标签之间的所有内容都是用来构成该块级元素的，其中所包含元素的特性由 div\n    标签的属性来控制，或者是通过使用样式表格式化该块级元素来进行控制。 div 标签又可称为区隔标记，其作用是设定字、画、表格等的摆放位置。\u003c/p\u003e\n\u003cp\u003e\u0026lt;div\u0026gt; 标签可以把文档分割为独立的、不同的部分。它可以用作严格的组织工具，并且不使用任何格式与其关联。如果用 id 或 class 来标记 \u0026lt;div\u0026gt; ，那么该标签的作用会变得更加有效。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 基础","title":"基础"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","基础","基础"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
