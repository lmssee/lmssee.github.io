    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e基本标签\u003c/h5\u003e\n\u003cp\u003e文档类型：使用工具时，可加入 SYSTEM 识别符，声明为：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;!DOCTYPE HTML SYSTEM \"about:legacy-compat\"\u0026gt; \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e字符编码：推荐 UTF-8 。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e不允许写结束符的元素： area 、 base 、 br 、 col 、 command 、 embed 、 hr 、 img 、 input 、 keygen 、 link 、 meta 、 param 、\n        source 、 track 、 wbr\u003c/li\u003e\n    \u003cli\u003e可省略结束符： li 、 dt 、 dd 、 p 、 rt 、 rp 、 optgroup 、 option 、 colgroup 、 thead 、 tbody 、 tfoot 、 tr 、 tf 、 th\n    \u003c/li\u003e\n    \u003cli\u003e可全部省略： html 、 head 、 body 、 colgroup 、 tbody\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e分类\u003c/h5\u003e\n\u003cp\u003e元素被分为六大类：\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e内嵌： audio 、 video 、 canvas 、 iframe\u003c/li\u003e\n    \u003cli\u003e流： form 、 h1 、 small\u003c/li\u003e\n    \u003cli\u003e标题： h1-h6 、 hgroup\u003c/li\u003e\n    \u003cli\u003e交互： button 、 textarea 、音频和视频的控件\u003c/li\u003e\n    \u003cli\u003e元数据： head 中的 script 、 style 、 title 、 link 等\u003c/li\u003e\n    \u003cli\u003e短语： mark 、 kbd 、 sup 、 sub 等\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e结构元素： header 、 footer 、 section 、 article 、 aside 、 nav 、 main 、 figure 。\u003c/p\u003e\n\u003cp\u003e功能元素： hgroup 、 video 、 audio 、 embed （嵌入多媒体，如：： Midi 、 Wav 、 AIFF 、 AU 、 MP3 ）、 mark 、 dialog 、 bdi 、 figcaption\n    （ figure 的标题）、 time 、 canvas 、 output 、 source 、 menu 、 ruby 、 rt 、 rp 、 wbr 、 command 、 details 、 summary 、\n    datalist 、 datagrid 、 keygen\n    、 meter 、 track （定义媒体播放器的文本轨道）。\u003c/p\u003e\n\u003cp\u003e表单元素： tel 、 search 、 url 、 email 、 datetime\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eShadow DOM 是浏览器的一种功能，能够自动添加子元素，例如 audio 元素 在网页中能使用进度条、音量控制等功能，这些相关元素都由浏览器自动生成。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003efigure\u003c/h5\u003e\n\u003cp\u003efigure 用于对元素进行组合，它表示一段独立的流内容，一般表示文档主体流内容中的一个独立单元，将其从网页上移除后不会对网页上的其它内容产生任何影响。\u003c/p\u003e\n\u003cp\u003e可以为 figure 元素添加标题，添加标题时都是结合 figcaption 元素被使用的。 figcaption 元素从属于 figure 元素，因此，它必须书写在 figure 元素内部。将 figcaption 元素放在\n    figure 元素内的其它从属元素的前面或后面，一个 figure 元素内最多只允许放一个 figcaption 元素，但是可以放置多个其它元素。\u003c/p\u003e\n\u003ch5\u003edialog\u003c/h5\u003e\n\u003cp\u003edialog 元素用来表示几个人之间的对话，它通常与 dt 和 dd 元素结合使用，其中 dt 元素表示讲话者，而 dd 元素可以表示讲话内容。\u003c/p\u003e\n\u003ch5\u003e引用它处内容\u003c/h5\u003e\n\u003cp\u003e\u0026lt;blockquote\u0026gt; 与 \u0026lt;/blockquote\u0026gt; 之间的所有文本都会从常规文本中分离出来，经常会在左、右两边进行缩进（增加外边距），而且有时会使用斜体。也就是说，块引用拥有它们自己的空间。\n\u003c/p\u003e\n\u003ch5\u003e添加发布日期\u003c/h5\u003e\n\u003cp\u003epubdate 属性是一个可选的布尔值属性，可用在 article 元素中的 time 元素上，意思是 time 元素代表了文章（ artilce 元素的内容）或整个网页的发布日期。\u003c/p\u003e\n\u003cp\u003e由于 time 元素不仅仅表示发布时间，而且还可以表示其它用途的时间，如通知、约会等。为了避免引擎误解发布日期，使用 pubdate 属性可以显式地告诉引擎文章中哪个是真正的发布时间。\u003c/p\u003e\n\u003ch5\u003emeter\u003c/h5\u003e\n\u003cp\u003emeter 元素定义度量（单位），仅用于已知最大值和最小值的度量。 meter 元素规定范围内的数量值，例如磁盘使用量、投票人数和文档等级评分等。该元素可以在 text 中，也可以在 max 和 min 属性中定义。\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003emeter 元素的常用属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性名称\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003emin\u003c/td\u003e\n        \u003ctd\u003e定义允许范围内的最小值，默认值为 0 。其值不能小于 0\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003emax\u003c/td\u003e\n        \u003ctd\u003e定义允许范围内的最大值，默认值为 1 。如果该值小于 min ，则将 min 作为最大值\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003evalue\u003c/td\u003e\n        \u003ctd\u003e定义需要显示在 min 和 max 之间的值。默认值为 0\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003elow\u003c/td\u003e\n        \u003ctd\u003e定义范围内的下限值，必须小于或等于 high 属性的值。如果该值小于 min ，则使用 min 作为 low 属性的值\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003ehigh\u003c/td\u003e\n        \u003ctd\u003e定义范围内的上限值，如果该属性值小于 low ，则使用 low 作为 high 的值。如果该值大于 max ，则使用 max 作为 high 属性的值\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eoptimum\u003c/td\u003e\n        \u003ctd\u003e定义范围内的最佳值，范围可以在 max 和 min 之间，并且可以处于高值区\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e显示为 20% 的 进度条\u003cmeter id=\"meter\" min=\"0\" max=\"100\" value=\"20%\"\u003e20\u003c/meter\u003e\u003c/p\u003e\n\u003ch5\u003eprogress\u003c/h5\u003e\n\u003cp\u003eprogress 元素表示一个任务的完成进度，这个进度可以是不确定的，只是表示进度正在运行，但是不清楚还有多少工作量没有完成，也可以用 0 到某个最大数字（如 100 ）之间的数字来表示准确的进度完成情况（如进度百分比）。\n\u003c/p\u003e\n\u003cp\u003eprogress 元素常用的属性有三个，它们分别是 max 、 min 和 value 。 max 属性表示进度条的最大值，即总共有多少少作量； min 属性则表示进度条的最小值； value\n    属性则表示当前的进度值，即已经完成了多个工作量。\u003c/p\u003e\n\u003csection\u003e\n    \u003cp\u003e百分比：\u003cprogress id=\"prog\" max=\"100\"\u003e\u003cspan\u003e0\u003c/span\u003e%\u003c/progress\u003e。\u003c/p\u003e\n    \u003cinput type=\"button\" onclick=\"c1()\" value=\"  进度 \"\u003e\n    \u003cscript\u003e\n        function c1() {\n            var prog = document.getElementById('prog');\n            prog.getElementsByTagName('span')[0].textContent = '0';\n            for (var i = 0; i \u003c= 100; i++) {\n                setTimeout(() =\u003e {\n                    up(i);\n                }, 5000);\n            }\n        } function up(a) {\n            var prog = document.getElementById('prog');\n            prog.value = a;\n            prog.getElementsByTagName('span')[0].textContent = a;\n        }\n    \u003c/script\u003e\n\u003c/section\u003e\n\u003ch5\u003edetails\u003c/h5\u003e\n\u003cp\u003edetails 元素提供了一种替代 JavaScript 的方法，它主要是提供了一个快捷、简化的方案，将页面上的部分区域进行展开或收缩。换句话说， details 元素用来描述文档或文档某个部分的细节。\u003c/p\u003e\n\u003cp\u003edetails 元素中包含 open 属性，该属性定义 details 是否可见，它的值是一个布尔类型。默认情况下， open 属性的值为 false 。如果设计人员希望一打开页面时就显示 details\n    元素的隐藏内容，那么则直接将 open 属性的值设置为 true 即可。\u003c/p\u003e\n\u003ch5\u003emenu\u003c/h5\u003e\n\u003cp\u003emenu 元素用来定义菜单列表，适用于菜单、工具栏以及弹出菜单。该元素在 HTML 2 时就已经存在，在 HTML 4 时被废弃，但是，在 HTML 5 中又将该元素启用并且赋予了新的功能和含义。 menu 元素经常和 li\n    列表元素结合使用，用来定义一个列表式的菜单。\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003emenu 元素的常用属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性名称\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eautoSubmit\u003c/td\u003e\n        \u003ctd\u003e如果该值为 true ，表示当表单控件改变时会自动提交\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003elabel\u003c/td\u003e\n        \u003ctd\u003e为菜单定义一个可见的标注\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003etype\u003c/td\u003e\n        \u003ctd\u003e定义显示哪种类型的菜单，属性值包括 list （默认值）、 context 和 toolbar\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003ecommand\u003c/h5\u003e\n\u003cp\u003e只有当 command 元素位于 menu 元素时该元素才是可见的，否则不会显示这个元素，但是可以用它来规定键盘快捷键。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003ecommand 元素的常用属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性名称\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003edatagrid\u003c/h5\u003e\n\u003cp\u003edatagrid 元素提供一个网格控件，可以用它来显示树、列表和表格，用户和脚本可以更新这些界面元素。\u003c/p\u003e\n\u003cp\u003edatagrid 元素与常规表格的区别在于，用户可以选择行、列和单元格；把行、列和单元格折叠起来；编辑单元格；删除行、列和单元格；对网格排序；在客户端浏览器中直接进行其它数据操作；以及用 JavaScript\n    脚本代码监视更新等。\u003c/p\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        [' radiogroup', '定义 command 所属的组名，仅在类型为 radio 时使用',],\n        ['checked ', '定义是否被选中，仅用于 radio 或 checkbox 类型',],\n        [' disabled', '定义 command 是否可用',],\n        [' icon', '定义作为 command 来显示的图像 url',],\n        [' label', '为 command 定义可见的 label',],\n        [' type ', '定义该 command 元素的类型，它的值包括 checkbox 、 command （默认值）和 radio',],\n        ['radiogroup', '定义 command 所属的组名，仅在类型为 radio 时使用',],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 基础","title":"标签"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","基础","标签"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
