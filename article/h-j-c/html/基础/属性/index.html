="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>属性</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介\u003c/h5\u003e\n\u003cp\u003e公共属性大致可分为基本属性、语言属性、键盘属性、内容属性和延伸属性等类型。\u003c/p\u003e\n\u003cp\u003e属性（ attribute ）提供了与 HTML 标签相关的额外信息，它们是在 HTML 标签内使用的特殊代码字，用于精确控制标签所做的事情。甚至在最简单的 Web 内容中，它们也非常重要，因此熟练地使用它们就是很重要的。\n\u003c/p\u003e\n\u003ch5\u003e基本属性\u003c/h5\u003e\n\u003cp\u003e属性涉及使用将应用于特定标签的样式、类或 ID 。\u003c/p\u003e\n\u003cp\u003e以下标签不拥有基本属性\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ehtml 、 head 文档和头部基本结构\u003c/li\u003e\n    \u003cli\u003etitle 网页标题\u003c/li\u003e\n    \u003cli\u003ebase 网页基准信息\u003c/li\u003e\n    \u003cli\u003emeta 网页元信息\u003c/li\u003e\n    \u003cli\u003eparam 元素参数信息\u003c/li\u003e\n    \u003cli\u003escript 、 style 网页的脚本和样式\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e元素属性\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003eid，元素在文档中的唯一标识符\u003c/li\u003e\n    \u003cli\u003etitle，包含元素的额外信息，通常以提示条形式展示\u003c/li\u003e\n    \u003cli\u003elang，元素内容的语言代码\u003c/li\u003e\n    \u003cli\u003edir，语言的书写方向（\"ltr\"表示从左到右，\"rtl\"表示从右到左，同样很少用）\u003c/li\u003e\n    \u003cli\u003eclassName，相当于 class 属性，用于指定元素的 CSS 类（因为 class 是 ECMAScript 关键字， 所以不能直接用这个名字）\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e语言属性\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003elang 定义元素的语言代码或编码\u003c/li\u003e\n    \u003cli\u003edir 定义文本的方向，包括 ltr 和 rtl 取值，分别表示从左向右和从右向左\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e下列元素不拥有语言属性\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eframeset 、 frame 、 iframe 网页框架结构\u003c/li\u003e\n    \u003cli\u003ebr 换行标识\u003c/li\u003e\n    \u003cli\u003ehr 结构装饰线\u003c/li\u003e\n    \u003cli\u003ebase 网页基准信息\u003c/li\u003e\n    \u003cli\u003eparam 元素参数信息\u003c/li\u003e\n    \u003cli\u003escript 网页的脚本\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e键盘属性\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003eaccesskey 定义访问某元素的键盘快捷键\u003c/li\u003e\n    \u003cli\u003etabindex 定义元素的 Tab 键索引编号\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e使用 accesskey 属性可以使用快捷键（ Alt+ 字母）访问指定 URL ，但是浏览器不能很好地支持，在 IE 中仅激活超链接，需要配合 Enter 键确定，而在 Firefox 中没有反应。\u003c/p\u003e\n\u003ch5\u003e内容属性\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003ealt 定义元素的替换文本\u003c/li\u003e\n    \u003cli\u003etitle 定义元素的提示文本\u003c/li\u003e\n    \u003cli\u003elongdesc 定义元素包含内容的大段描述信息\u003c/li\u003e\n    \u003cli\u003ecite 定义元素包含内容的引用信息\u003c/li\u003e\n    \u003cli\u003edatetime 定义元素包含内容的日期和时间\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003etitle 属性可以使用在除了 base 、 basefont 、 head 、 html 、 meta 、 param 、 script 、 title 之外的所有标签中。\u003c/p\u003e\n\u003cp\u003ealt 和 title 是两个常用的属性，分别定义元素的替换文本和提示文本，但是很多设计师习惯于混用这两个属性，没有刻意去区分它们的语义性。实际上，除了 IE 浏览器，其它标准浏览器都不会支持它们的混用，但是由于 IE\n    浏览器的纵容，才导致了很多设计师误以为 alt 属性就是设置提示文本的。\u003c/p\u003e\n\u003cp\u003e替换文本（ Alternate Text ）并不是用来做提示（ Tool Tip ）的，或者更加确切地说，它并不是为图像提供额外说明信息的。相反， title 属性才负责为元素提供额外说明信息。\u003c/p\u003e\n\u003cp\u003e如果要为元素定义更长的描述信息，则应该使用 longdesc 属性。 longdesc 属性可以用来提供链接到一个包含图片描述信息的单独页面或者长段描述信息。\u003c/p\u003e\n\u003cp\u003ecite 一般用来定义引用信息的 URL 。\u003c/p\u003e\n\u003cp\u003edatetime 属性定义包含文本的时间，这个时间表示信息的发布时间，也可能是更新时间。\u003c/p\u003e\n\u003ch5\u003etitle\u003c/h5\u003e\n\u003cp\u003e可以利用 title 属性为文档中的任何部分加上提示性标签。加上后更利于屏幕阅读器为用户朗读 文本。\u003c/p\u003e\n\u003ch5\u003erole\u003c/h5\u003e\n\u003cp\u003erole 是新增属性，作用是告诉 Accessibility 类应用当前元素所扮演的角色，主要供残疾人使用。使用 role 可以提高文本的可读性和语义性。\u003c/p\u003e\n\u003cp\u003erole 主要用于文档结构和表单中。\u003c/p\u003e\n\u003cp\u003e已下是常用： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003erole=\"banner\"( 横幅 ) 添加在页面级的 header 元素，每个页面只能用一次\u003c/span\u003e\u003cspan class=\"p\"\u003erole=\"navigation\"(\n        导航 ) 与 nav 对应，并添加到 nav 元素\u003c/span\u003e\u003cspan class=\"p\"\u003erole=\"main\"( 主体 ) 与 main\n        对应，也可以添加到其它元素，但，每个页面仅能使用一次\u003c/span\u003e\u003cspan class=\"p\"\u003erole=\"complementary\"( 补充性内容 ) 与 aside 对应，也可以添加到 div\n        上\u003c/span\u003e\n    \u003cspan class=\"p\"\u003erole=\"contentinfo\"( 内容信息 ) 添加到页脚之上\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 基础","title":"属性"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","基础","属性"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
