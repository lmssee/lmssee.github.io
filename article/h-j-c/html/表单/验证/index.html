                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e使用 HTML5 表单验证\u003c/h5\u003e\n\u003cp\u003eHTML5 默认会验证表单，除非在 \u0026lt;form\u0026gt; 元素中使用 novalidate 属性。\u003c/p\u003e\n\u003cp\u003e可以使用 \u0026lt;input /\u0026gt; 字段的 pattern 属性指定你自己的模式匹配要求。 pattern 属性使用正则表达式。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003e输入验证\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e验证属性\u003c/th\u003e\n        \u003cth\u003e针对的元素\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e验证用户是否输入\u003c/h5\u003e\n\u003ch5\u003e显式验证\u003c/h5\u003e\n\u003cp\u003eHTML 5 新增 checkValidity （） 方法调用该方法，可以显式的对表单内所有的元素内容或单个元素内容进行有效的验证。该方法返回布尔值，以提示验证是否通过。\u003c/p\u003e\n\u003cp\u003e在 HTMl 5 中， form 和 input 都有一个 validity 属性，该属性返回一个 ValidityState 对象。该对象具有许多属性，最简单的、重要的就是 valid\n    属性，它表示单个所有的元素内容是否有效或单个的 input 元素是否有效。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;form action=\"\" id=\"testform\" onsubmit=\"\n        return check()\" novalidate\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;label for=\"email\"\u0026gt;Email\u0026lt;/label\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;input type=\"email\" id=\"email\" name=\"email\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;br\u0026gt; \u0026lt;input type=\"submit\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/form\u0026gt;\u0026lt;/body\u0026gt;\n        \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction check() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar email =\n        document.querySelector('#email'); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (email.value == '' || !email.checkValidity) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ealert('请输入 Email 地址'); \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn false \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else\n        alert('您的输入有效'); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt; \u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e禁止输入\u003c/h5\u003e\n\u003cp\u003edisabled 属性规定禁用 input 元素，第 02 行和第 03 行是两种写法。\u003c/p\u003e\n\u003cp\u003edisabled 属性无法与 \u0026lt;input type=\"hidden\"\u0026gt; 一起使用。\u003c/p\u003e\n\u003cp\u003e被禁用的 input 元素既不可用，也不可单击。可以设置 disabled 属性，直到满足某些其它条件（比如选择了一个复选框等），然后再通过 JavaScript 来删除 disabled 值，将 input\n    元素的值切换为可用。\u003c/p\u003e\n\u003cp\u003e代码第 04 行应用了 readonly 。 readonly 属性规定输入字段为只读，只读字段是不能修改的。不过，用户仍然可以使用 Tab 键切换到该字段，还可以选中或复制其中的文本。\u003c/p\u003e\n\u003cp\u003ereadonly 属性可与 \u0026lt;input type=\"text\"\u0026gt; 或 \u0026lt;input type=\"password\"\u0026gt; 配合使用。\u003c/p\u003e\n\u003ch6\u003e通过事件来控制文本输入或控制焦点。\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e_inhibitingInput.blur();\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e_inhibitingInput.value = \"\";\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e关闭输入法\u003c/h5\u003e\n\u003ch6\u003e植入 CSS 特殊属性\u003c/h6\u003e\n\u003cp\u003e植入 CSS 特殊属性这种方案有一个弊端，就是不支持 Chrome 浏览器，但是其它主流浏览器（如 IE 、 FireFox 等）都支持。创建一个函数 banInputMethod() ，添加为指定元素增加 CSS\n    特殊属性的业务逻辑。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction banInputMethod(_elementArr) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar arr =\n        _elementArr, \u003cspan class=\"r\"\u003e// 待处理的所有节点元素\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003eself = this; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 判断元素是否为数组，如果不是数组将其变成数组\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (!(_elementArr instanceof Array)) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003earr = [_elementArr]; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i = 0, arrLen\n        = arr.length; i \u0026lt; arrLen; i++) { \u003cspan class=\"r\"\u003e// 遍历元素节点\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003evar arrI =\n        arr[i]; \u003c/span\u003e\u003cspan class=\"p6\"\u003earrI.onfocus = function() { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u003cspan class=\"r\"\u003e// 样式方案，只兼容除了 Chrome 浏览器之外的浏览器\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003ethis.style.imeMode\n        = 'disabled'; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e事件文本过滤\u003c/h5\u003e\n\u003cp\u003e为了修复 Chrome 的不兼容性，可以利用 JavaScript 中的事件来禁止输入中文，模拟关闭输入法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar arr = [ \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n            创建节点数组\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.getElementById(\"banInputMethodgoogle\"), \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.getElementById( \"banInputMethod\") \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e], \u003c/span\u003e\u003cspan class=\"p4\"\u003eself = this; \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i = 0, arrLen =\n        arr.length; i \u0026lt; arrLen; i++) { \u003cspan class=\"r\"\u003e// 遍历待处理的节点对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar arrI =\n        arr[i]; \u003c/span\u003e\u003cspan class=\"p4\"\u003earrI.onfocus = function() { \u003cspan class=\"r\"\u003e// 获取焦点事件\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ethis.style.imeMode = 'disabled'; \u003cspan class=\"r\"\u003e// 样式方案，只兼容除了谷歌浏览器之外的浏览器\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class
