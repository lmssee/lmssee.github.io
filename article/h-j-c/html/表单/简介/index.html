    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介\u003c/h5\u003e\n\u003cp\u003eHTML 表单是 Web 页面的一部分，它们包括一些区域，用户可以在其中输入信息，然后把它发回给你，或者发送到你指定的另一个电子邮件地址、你管理的数据库，或者完全发送到另一个系统。\u003c/p\u003e\n\u003cp\u003e表单包括一个按钮，可以让用户提交表单，这个按钮可以是你自己创建的一幅图像，或者是一个标准的 HTML 表单按钮，它是在创建表单的 \u0026lt;input\u0026gt; 标签时创建的，并给 type 赋值为 submit\n    。当某个人单击表单提交按钮时，将把在表单中输入的所有信息都发送到在 \u0026lt;form\u0026gt; 标签的 action 属性中指定的 URL 。该 URL\n    应该指向一个将处理表单的特定脚本，然后通过电子邮件发送表单内容，或者执行交互式过程中的另一个步骤（比如从搜索引擎请求结果，或者把物品放入在线购物车中）。\n\u003c/p\u003e\n\u003cp\u003e完整地实现表单功能，需要涉及两部分：一是用于描述表单对象的 HTML 源代码；二是客户端的脚本或者服务器端用于处理用户所填写信息的程序。\u003c/p\u003e\n\u003cp\u003e真正处理表单的数据脚本或程序在 action 属性里，这个值可以是程序或者脚本的一个完整 URL 。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003e表单组成标签\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e标签\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e关闭输入法\u003c/h5\u003e\n\u003cp\u003e有些表单中输入内容只允许是数字或英文，例如身份证号或邮箱地址等。为了防止用户非法输入，除了使用正则表达式外，还可以关闭操作系统的输入法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;input id=\"textname\" style=\"ime-mode:disabled\"\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eime 是 Input Method Editor\n    的简称。它是一种专门的应用程序，用来输入代表东亚地区书面语言文字的不同字符。使用此种输入法，不需要特殊的键盘（对应各种语言的键盘）即可输入东亚诸国（如中文、日文、韩文、俄文等）的各种文字。日本 IME\n    ，是可以输入表音文字（かな）与変换表意文字（汉字）的一种输入法，而且它具有人工智慧，可以将一般较常使用的表意语句置于输入法的词库中。\u003c/p\u003e\n\u003cp\u003eWindows 系统下汉字输入法实际上是将输入的标准 ASCII 字符串按照一定的编码规则转换为汉字或汉字串，进入到目的地。由于应用程序各不相同，用户不可能自己去设计转换程序，因此，汉字输入自然而然落到 WINDOWS\n    系统管理中。 IME 文件是输入法的后缀名，直接可以用的， WINABC.IME 是智能 ABC 输入法， PINTLGNT.IME 是微软拼音输入法， WINGB.IME 是内码输入法， WINPY.IME 是全拼输入法，\n    WINSP.IME 是双拼输入法， WINZM.IME\n    是郑码输入法。\n\u003c/p\u003e\n\u003cp\u003eime-mode 的语法如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eime-mode : auto | active | inactive | disabled\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eAuto ：默认值。不影响 IME 的状态。与不指定 ime-mode 属性时相同\u003c/li\u003e\n    \u003cli\u003eActive ：指定所有使用 IME 输入的字符。即激活本地语言输入法。用户仍可以撤销激活 IME\u003c/li\u003e\n    \u003cli\u003eInactive ：指定所有不使用 IME 输入的字符。即激活非本地语言。用户仍可以撤销激活 IME\u003c/li\u003e\n    \u003cli\u003eDisabled ：完全禁用 IME 。对于有焦点的控件（如输入框），用户不可以激活 IME\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e按回车键跳转至下一个输入框\u003c/h5\u003e\n\u003cp\u003e使用回车键跳转至下一个输入框的原理是箭头输入框的键盘事件，根据 keyCode 判断是否是回车键，是回车键则取消默认的提交行为，设置焦点于下一个输入框中，并设置其选中状态。\u003c/p\u003e\n\u003ch5\u003e显示进度\u003c/h5\u003e\n\u003cp\u003e\u0026lt;progress\u0026gt; 标签定义运行中的进度（进程）。\u003c/p\u003e\n\u003ch5\u003e输出结果\u003c/h5\u003e\n\u003cp\u003eoutput 元素用于在浏览器显示计算结果或脚本输出。\u003c/p\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['\u0026lt;form\u0026gt;', '定义表单区域及附带的信息',],\n        ['input', '定义输入表单元素',],\n        ['select', '定义列表元素',],\n        ['option', '定义表单元素中项目',],\n        ['textarea', '定义表单文本域元素',],\n        ['label', '定义输入元素的标签',],\n        ['button', '定义各种类型的按钮',],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 表单","title":"简介"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","表单","简介"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
