                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定制 input 元素\u003c/h5\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003einput 的 type 属性取值\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e类型名\u003c/th\u003e\n        \u003cth\u003e类型作用\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cul\u003e\n    \u003cli\u003etype=\"email\" ：显示为常规的文本框，但是当使用表单验证时，内置的验证器将会检查它是否是形式有效的电子邮件地址。一些移动设备默认会显示相关的按键（例如， @ 符号），而不需要额外的用户交互\u003c/li\u003e\n    \u003cli\u003etype=\"file\" ：打开一个对话框，使你能够在计算机上搜索一个要上传的文件\u003c/li\u003e\n    \u003cli\u003etype=\"number\" ：这种类型将不会利用 \u0026lt;option\u0026gt; 标签为每个数字创建一个 \u0026lt;select\u0026gt; 列表，而是使你能够指定一个 min 和 max 值，以及数字之间的 step\n        （步长），以在浏览器端自动生成一个列表。在程序清单 22.1 中可以看到它的使用\u003c/li\u003e\n    \u003cli\u003etype=\"range\" ：与刚才介绍的 number 类型非常相似，这种类型使你能够指定一个 min 和 max 值，以及数字之间的步长，但是在这种情况下，它将显示为水平滑块\u003c/li\u003e\n    \u003cli\u003etype=\"search\" ：显示为常规的文本框，但是具有额外的控件，有时用于允许用户使用\" x \"或类似的字符清除搜索框\u003c/li\u003e\n    \u003cli\u003etype=\"url\" ：显示为常规的文本框，但是在使用表单验证时，内置的验证器将检查它是否是形式有效的 URL 。一些移动设备默认会显示相关的按键（例如， .com 虚拟按键），而不需要额外的用户交互\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e日期时间型文本框\u003c/h6\u003e\n\u003ctable id=\"Ab\"\u003e\n    \u003ccaption\u003e日期选择器类型\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"30% \"\u003e输入类型\u003c/th\u003e\n        \u003cth\u003e功能与说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e禁用单个 input 元素\u003c/h5\u003e\n\u003cp\u003e禁用可以通过设置 disabled 属性来实现。\u003c/p\u003e\n\u003cp\u003ereadonly 只针对 input(text/password) 和 textarea 有效，而 disabled 对于所有的表单元素都有效，包括 select, radio, checkbox, button\n    等。但是表单元素在使用了 disabled 后，当我们将表单以 POST 或 GET 的方式提交的话，这个元素的值不会被传递出去，而 readonly 会将该值传递出去。\u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p2 \"\u003e\u0026lt;form action=\"# \"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2 \"\u003e t\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2 \"\u003e\u0026lt;fieldset\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\n                \"\u003e\u0026lt;legend\u0026gt;日期时间型文本框\u0026lt;/legend\u0026gt; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e\u0026lt;label for=\"time\n        \"\u0026gt;time\u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4 \"\u003e\u0026lt;input type=\"time \" name=\"time \" id=\"time \" /\u0026gt; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e\u0026lt;label\n        for=\"date \"\u0026gt;date\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e\u0026lt;input type=\"date \" name=\"date \" id=\"date\n        \" /\u0026gt; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e\u0026lt;label for=\"month \"\u0026gt;month\u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4 \"\u003e\u0026lt;input type=\"month \" name=\"month \" id=\"month \" /\u0026gt; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e\u0026lt;label\n        for=\"week \"\u0026gt;week\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e\u0026lt;input type=\"week \" name=\"week \" id=\"week\n        \" /\u0026gt; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e\u0026lt;label for=\"datetime \"\u0026gt;datetime\u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4 \"\u003e\u0026lt;input type=\"datetime \" name=\"datetime \" id=\"datetime \" /\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4 \"\u003e\u0026lt;label for=\"datetime-local \"\u0026gt;datetime-local\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e\u0026lt;input\n        type=\"datetime-local \" name=\"datetime-local\n        \" id=\"datetime-local \" /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2 \"\u003e\u0026lt;/fieldset\u0026gt; \u003c/span\u003e\u003cspan class=\"p2 \"\u003e\u0026lt;input type=\"submit \" value=\"提 交 \" /\u0026gt;\n        \u0026lt;/form\u0026gt;\u003c/span\u003e\n\u003c/div\u
