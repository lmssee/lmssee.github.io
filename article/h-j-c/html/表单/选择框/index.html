                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e选择列表\u003c/h5\u003e\n\u003cp\u003e滚动列表（ scrolling list ）和下拉选择列表（ pull-down pick list ）都是利用 \u0026lt;select\u0026gt; 标签创建的。可以结合使用这个标签与 \u0026lt;option\u0026gt; 标签。\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e\u0026lt;select\u0026gt; 标签的专属属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003ctd\u003esize\u003c/td\u003e\n        \u003ctd\u003e定义列表框可显示的项目数， \u0026lt;optgroup\u0026gt; 也算在其中\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003emultiple\u003c/td\u003e\n        \u003ctd\u003e定义列表可以多选\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e包括 multiple 属性将使用户能够一次选择多个选项； selected 属性用于使选项默认最初是选择的。在提交表单时，在用于每个选项的 value 属性中指定的文本将伴随所选的选项。\u003c/p\u003e\n\u003cp\u003e\u003csmall\u003e如果省略 size 属性或者指定 size=\"1\" ，那么列表将创建一个简单的下拉选择列表。选择列表不允许进行多项选择，它们逻辑上等价于单选按钮组。下面的示例显示了为一个问题选择 yes 或 no\n        的另一种方式：\u003c/small\u003e。\u003c/p\u003e\n\u003cp\u003e除了 \u0026lt;option\u0026gt; 和 \u0026lt;/option\u0026gt; 之外，不应当有其它的 HTML 标签出现在 \u0026lt;select\u0026gt; 和 \u0026lt;/select\u0026gt; 标签之间，而\n    \u0026lt;optgroup\u0026gt; 标签例外。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt;姓名：\u0026lt;input type=\"text\" value=\"\"\n        /\u0026gt;\u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt;所在城市： \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;select name=\"city\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;optgroup label=\"山东省\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;option value=\"潍坊\"\u0026gt;潍坊\u0026lt;/option\u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;option value=\"青岛\"\n        selected=\"selected\"\u0026gt;青岛\u0026lt;/option\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;/optgroup\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u0026lt;optgroup label=\"山西省\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;option value=\"太原\"\u0026gt;太原\u0026lt;/option\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;option value=\"榆次\"\u0026gt;榆次\u0026lt;/option\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;/optgroup\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/select\u0026gt;\u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt;\u0026lt;input type=\"submit\"\n        value=\"提交\"/\u0026gt;\u0026lt;/p\u0026gt; \u0026lt;/form\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 表单","title":"选择框"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","表单","选择框"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
