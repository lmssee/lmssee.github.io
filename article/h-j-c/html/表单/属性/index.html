                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e名称和值\u003c/h5\u003e\n\u003cp\u003e每一个表单都应该设置唯一的名称（ name ），该属性有两个作用：一是服务器可以根据 name 获取对应的控件提交的值；二是在 JavaScript 中直接使用点语法访问对应的控件对象。\u003c/p\u003e\n\u003cp\u003e如果要在 css 、 dom 或与 \u0026lt;label\u0026gt; 标签绑定，还应该设置 id 属性。\u003c/p\u003e\n\u003cp\u003e如果表单数据要提交到服务器，则还应该设置 value 属性值，该值会被提交到服务器。\u003c/p\u003e\n\u003ch5\u003e布尔属性值\u003c/h5\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003e布尔属性\u003c/caption\u003e\n\u003c/table\u003e\n\u003ch5\u003e一些属性\u003c/h5\u003e\n\u003ch6\u003eform 属性\u003c/h6\u003e\n\u003cp\u003eform 设置表单控件的归属表单。\u003c/p\u003e\n\u003ch6\u003e高和宽\u003c/h6\u003e\n\u003cp\u003ewidth 和 height 仅适用于设置 \u0026lt;input type=\"image\"\u0026gt; 标签的图像高度和宽度。\u003c/p\u003e\n\u003ch6\u003e最大值、最小值、步长\u003c/h6\u003e\n\u003cp\u003emax 、 min 、 step 用于包含数字和日期的 input 输入类型的设置限制，适用于 detepickers 、 number 、 range 等类型的 \u0026lt;input\u0026gt; 标签。\u003c/p\u003e\n\u003ch5\u003e表单重写\u003c/h5\u003e\n\u003cp\u003e该类属性是新增属性，仅适用于 submit 和 input 元素。\u003c/p\u003e\n\u003ch5\u003e匹配模式\u003c/h5\u003e\n\u003cp\u003epattern 属性用于验证 \u0026lt;input\u0026gt; 的模式。模式就是 JavaScript 的正则表达式，通过自定义的正则表达式匹配用户的输入。\u003c/p\u003e\n\u003ch5\u003e替代文本\u003c/h5\u003e\n\u003cp\u003eplaceholder 是用于 input 类型的文本提示。\u003c/p\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['readonly', '只读',],\n        ['disabled', '禁用',],\n        ['require', '必填',],\n        ['checked', '选中',],\n        ['selected', '选择',],\n        ['autufocuse', '自动获取焦点',],\n        ['multiple', '多选',],\n        ['novalidate', '要求提交不被验证',],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 表单","title":"属性"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","表单","属性"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
