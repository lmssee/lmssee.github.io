    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e文本框、文本区和其它输入类型\u003c/h5\u003e\n\u003cp\u003e可以使用 \u0026lt;textarea\u0026gt; 和 \u0026lt;/textarea\u0026gt; 标签创建一个文本区，而不仅仅是一个文本框。包括在这两个标签之间的任何文本都将显示为那个框中的默认条目。\u003c/p\u003e\n\u003ch5\u003e文本输入\u003c/h5\u003e属性，一旦浏览器呈现表单， autofocus 属性就会自动把用户的光标聚焦在这个文本框中。一个表单只能有一个 autofocus 字段。 placeholder 属性使\n\u003cp\u003etype 属性指示要显示的是什么类型的表单元素，在这里是一个简单的单行文本输入框，。在这个示例中，注意 placeholder 、 required 和 autofocus\n    属性的使用。\u003c/p\u003e\n\u003cp\u003esize 属性指示文本输入框的宽度应该能够容纳大约多少个字符。如果使用一种比例间隔字体，那么输入的宽度将因用户输入的内容而异。如果输入太长而在框中放不下，大多数 Web 浏览器将自动把文本滚动到左边。\u003c/p\u003e\n\u003cp\u003emaxlength 属性确定允许用户在文本框中输入的字符数。如果用户尝试输入超过指定长度的内容，那么额外的字符将不会出现。你可以指定一个更长、更短或者与文本框的物理大小相同的长度。 size 和 maxlength\n    属性只用于那些打算用于文本值的输入字段，比如 type=\"text\" 、 type=\"email\" 、 type=\"URL\" 和 type=\"tel\" ，而不适用于复选框和单选按钮，因为它们具有固定的大小。\u003c/p\u003e\n\u003ch5\u003e密码框\u003c/h5\u003e\n\u003cp\u003e密码框是一种特殊的文本框，专门用于输入密码。通过 type=\"password\" 定义。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;label for=\"password\"\u0026gt;密码\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;input\n        type=\"password\" id=\"password\" name=\"password\" /\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e多行文本域\u003c/h5\u003e\n\u003cp\u003erows 属性用于设置可见行数，当文本内容超出这个值时将显示垂直滚动条， cols 属性用于设置一行可输入多少个字符。标签对之间可以输入文本，也可以不输入，如果输入将作为默认文本显示在文本域中。另外， rows 和 cols\n    属性都可以不设置，而改用 CSS 的 width 和 height 属性设置。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form method=\"post\" action=\"\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;fieldset\n        class=\"base_info\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;legend\u0026gt;用户信息\u0026lt;/legend\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u0026lt;label for=\"userName\"\u0026gt;用户名\u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;input type=\"text\" value=\"\" id=\"userName\" /\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;label\n        for=\"email\"\u0026gt;电子邮件\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;input type=\"text\" value=\"\" id=\"email\" /\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/fieldset\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;fieldset class=\"feedback_content\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;legend\u0026gt;反馈信息\u0026lt;/legend\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;label\n        for=\"msg\"\u0026gt;具体内容\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;textarea rows=\"8\" cols=\"50\" id=\"msg\"\n        placeholder=\"请填写详实的反馈意见。\"\u0026gt;\u0026lt;/textarea\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;label for=\"up_file\"\u0026gt;附件\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;input type=\"file\"\n        id=\"up_file\" /\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;p class=\"tips\"\u0026gt;附件仅支持.jpg、.gif、.png图片。\u0026lt;/p\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/fieldset\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;button type=\"submit\"\u0026gt;提交\u0026lt;/button\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;button\n        type=\"reset\"\u0026gt;重置\u0026lt;/button\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/form\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eTextArea 自适应文字行数\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewindow.onload = function(){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar autoRow = document.getElementById(\"autoRow\");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eautoRow.style.overflowY = \"hidden\"; \u003cspan class=\"r\"\u003e//Y 轴是否超过隐藏\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eautoRow.onkeyup= function(){ \u003cspan class=\"r\"\u003e// 键盘事件\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eautoRow.style.height = autoRow.scrollHeight;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e};\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 表单","title":"文字"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","表单","文字"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
