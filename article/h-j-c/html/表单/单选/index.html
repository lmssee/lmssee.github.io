    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e单选框\u003c/h5\u003e\n\u003cp\u003e单选框，用于在一组选项中进行单项（即互斥）选择，每个单选框用一个圆框表示。当 type 属性取值为\" radio \"时， input 控件将创建一个单选框。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;input type=\"radio\"; name=\"; 域名称 \"; value=\"; 域值 \"; checked=\"checked\";\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;input type=\"radio\" name=\"field_name\" checked value=\"value\"\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003echecked ：表示此项为默认选中。\u003c/p\u003e\n\u003cp\u003evalue ：表示选中项目后传送到服务器端的值。\u003c/p\u003e\n\u003cp\u003etype 的属性值必须设置为\" radio \"； name 属性用于设置单选框的名称，处理程序使用该名称获取域的数据，属于同一组单选框的 name 属性必须设置为相同的值，否则无法在一组选项中实现互斥选择； value\n    属性用于设置单选框选中后传到服务器端的值； checked 属性用于表示此项被默认选中，如果不设置默认选中状态，则不需要使用 checked 属性。默认情况下，单选框没有被选中。对于单选框， type 、 name 和\n    value 三个属性一般都需要设置。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003e选择列表标签常用属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e标签\u003c/th\u003e\n        \u003cth\u003e属性\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e单选按钮\u003c/h5\u003e\n\u003cp\u003e单选按钮（ radio button ）指一次只能选择其中一个选项，其实现方式与复选框几乎同样简单。单选按钮的最简单的应用是用于\"是 / 否\"问题，或者当只能选择一个候选人时用于投票表决。\u003c/p\u003e\n\u003cp\u003e为组中的所有单选按钮使用相同的 name ，但是不要使用在创建复选框时使用的\" [ ] \"，因为不必容纳多个答案。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form action=\"#\" method=\"get\" id=\"form1\" name=\"form1\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt;会员：\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;input name=\"user\" id=\"user\" type=\"text\" /\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt;密码： \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;input name=\"password\" id=\"password\" type=\"text\" /\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/p\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;fieldset\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;legend\u0026gt;类型\u0026lt;/legend\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;input type=\"radio\" name=\"grade\" value=\"1\" \u003c/span\u003e\n    \u003cspan class=\"p16\"\u003echecked=\"checked\" /\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e普通会员\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;label\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;input type=\"radio\" name=\"grade\" value=\"2\" /\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eVIP会员\u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;input type=\"radio\" name=\"grade\" value=\"3\" /\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e管理员\u0026lt;/label\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/fieldset\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;input\n        type=\"submit\" value=\"登录\"/\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/p\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e判断单选框是否选中\u003c/h5\u003e\n\u003cdetails\u003e\n    \u003csummary\u003ebiu\u003c/summary\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eype = \"text/javascript\"; \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.onload =\n        function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar sexMan = document.getElementById( \"sexMan\"), \u003cspan class=\"r\"\u003e//\n            获取元素的节点对象\u003c/span\u003e\u003c/
