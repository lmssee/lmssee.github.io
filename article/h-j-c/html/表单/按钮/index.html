    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e提交表单数据\u003c/h5\u003e\n\u003cp\u003e表单通常包括一个按钮，用于把表单数据提交给服务器上的脚本或者调用一个 JavaScript 动作。可以利用 value 属性把你喜欢的任何标签放在 Submit （提交）按钮上：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;input type=\"submit\" value=\"Place My Order Now ！ \" /\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003ebutton 相关的属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性名\u003c/th\u003e\n        \u003cth\u003e属性作用\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e普通按钮\u003c/h5\u003e\n\u003cp\u003e在网页中按钮也很常见，在提交页面、恢复选项时常常用到。普通按钮一般情况下要配合脚本来进行表单处理。具体语法如下：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;input type=\"button\" name=\"field_name\" value=\"button_text\"\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003efield_name ：普通按钮的名称。\u003c/p\u003e\n\u003cp\u003ebutton_text ：按钮上显示的文字。\u003c/p\u003e\n\u003ch5\u003e提交按钮 submit \u003c/h5\u003e\n\u003cp\u003e提交按钮是一种特殊的按钮，在单击该类按钮时可以实现表单内容的提交。具体语法如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;input type=\"submit\" name=\"field_name\" value=\"submit_text\"\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003efield_name ：提交按钮的名称。\u003c/p\u003e\n\u003cp\u003esubmit_text ：按钮上显示的文字。\u003c/p\u003e\n\u003ch5\u003e重置按钮 reset\u003c/h5\u003e\n\u003cp\u003e单击重置按钮后，可以清除表单的内容，恢复默认的表单内容设定。具体语法如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;input type=\"reset\" name=\"field_name\" value=\"reset_text\"\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003efield_name ：重置按钮的名称。\u003c/p\u003e\n\u003cp\u003ereset_text ：按钮上显示的文字。\u003c/p\u003e\n\u003ch5\u003e图像域 image \u003c/h5\u003e\n\u003cp\u003e图像域是指可以用在提交按钮位置上的图片，这幅图片具有按钮的功能。如果网页使用了较为丰富的色彩，或稍微复杂的设计，再使用表单默认的按钮形式甚至会破坏整体的美感。这时，可以使用图像域，创建和网页整体效果相统一的图片按钮。具体语法如下：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;input type=\"image\" name=\"field_name\" src=\"image_url\"\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003efield_name ：图像域的名称。 \u003c/p\u003e\n\u003cp\u003eimage_url ：图片的路径。\u003c/p\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['form', ' 指定按钮关联的表单 '],\n        ['formaction', ' 覆盖 form 元素的 action 属性，重新指定表单提交的 URL'],\n        ['formenctype', ' 覆盖 form 元素的 enctype 属性，重新指定表单的编码方式 '],\n        ['formmethod', ' 覆盖 form 元素的 method 属性，重新指定表单提交的方式 '],\n        ['formtarget', ' 覆盖 form 元素的 target 属性，重新指定目标窗口 '],\n        ['formnovalidate', ' 覆盖 form 元素的 novalidate 属性，设置是否执行客户端数据有效性检测 '],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 表单","title":"按钮"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","表单","按钮"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
