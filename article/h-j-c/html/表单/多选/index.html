                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e复选框\u003c/h5\u003e\n\u003cp\u003e除了文本框之外，最简单的输入类型之一就是复选框（ check box ），它显示了一个小正方形。用户可以单击复选框，以选择或取消选择组中的一个或多个项目。\u003c/p\u003e\n\u003cp\u003ename 属性中的方括号（ [ ] ）的使用指示后端脚本将把一系列值放入这一个变量中，而不是只使用一个值（如果用户只选择一个复选框，那么它可能就只是一个值）。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;input type=\"checkbox\" name=\"field_name\" checked value=\"value\"\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003echecked ：表示此项为默认选中。\u003c/p\u003e\n\u003cp\u003evalue ：表示选中项目后传送到服务器端的值。\u003c/p\u003e\n\u003ch5\u003e多项选择列表\u003c/h5\u003e\n\u003cp\u003e多项选择列表是指一次可以选择多个列表选项，且一次可以显示 1 个以上选项的选择列表。\u003c/p\u003e\n\u003cp\u003eselect\u0026gt; 标签中的 size 属性取值大于或等于 1 ，通常会大于 1 ，否则用户体验很差。在 HTML5 中， multiple 属性可以不用设置值，即直接在标签中添加 multiple 属性即可。当标签中包含了\n    multiple 属性后，按住\" Shift \"或\" Ctrl \"键时，列表可实现多项选择；如果没有 multiple 属性则只能单项选择。 selected 属性用于设置选项是否是默认选中项。在 HTML5 中，\n    selected 属性和 multiple 属性一样，可以在标签中只写属性名。当列表可多项选择时，可以在一到多个\n    \u0026lt;option\u0026gt; 标签中设置 selected 属性，否则最多只能有一个 \u0026lt;option\u0026gt; 标签设置该属性。 value 属性可选，如果没有设置，将提交选项的文本标签。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt;学员ID：\u0026lt;input type=\"text\" value=\"\"\n        /\u0026gt;\u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;fieldset\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;legend\u0026gt;选学技术\u0026lt;/legend\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;label\u0026gt;\u0026lt;input name=\"web\"\n        type=\"checkbox\" value=\"html\" /\u0026gt; HTML5\u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;label\u0026gt;\u0026lt;input name=\"web\" type=\"checkbox\" value=\"css\" /\u0026gt;CSS3\u0026lt;/label\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;label\u0026gt;\u0026lt;input name=\"web\" type=\"checkbox\" value=\"js\" /\u0026gt;\n        JavaScript\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/fieldset\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt;\u0026lt;input type=\"submit\" value=\"提交\"/\u0026gt;\u0026lt;/p\u0026gt; \u0026lt;/form\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e限制复选框最多选择几项\u003c/h5\u003e\n\u003cdetails\u003e\n    \u003csummary\u003een\u003c/summary\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.onload = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        _forbidcheckSelects = document.getElementsByName( \"forbidcheckSelects\"), \u003c/span\u003e\u003cspan class=\"p6\"\u003ebanNums =\n        3; \u003cspan class=\"r\"\u003e// 限制复选框最多选择 3 项\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efor (var i in _forbidcheckSelects) { \u003cspan class=\"r\"\u003e// 遍历所有元素\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e_forbidcheckSelects[i].onclick = function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003evar __forbidcheckSelects =\n        document.getElementsByName( \"forbidcheckSelects\"), \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003eselectNum = 0; \u003cspan class=\"r\"\u003e// 初始化选择的数目为 0 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003efor (var i in\n        __forbidcheckSelects) { \u003c/span\u003e\u003cspan class=\"p10\"\u003eif (i == \"length\") break; \u003c/span\u003e\u003cspan class=\"p10\"\u003eif\n        (__forbidcheckSelects[i].checked) { \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003e\u003cspan class=\"r\"\u003e// 如果选中 ++ \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p12\"\u003eselectNum++; \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u003cspan\n            class=\"r\"\u003e// 如果选中的复选项超过限制的最大数，将当前选项设置为未选中\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003eif (selectNum \u0026gt;\n        banNums) { \u003c/span\u003e\u003cspan class=\"p10\"\u003ethis.checked = false; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/details\u003e\n\u003ch5\u003e复选框全选、取消全选、反选\u003c/h5\u003e\n\u003cdetails\u003e\n    \u003csummary\u003een\u003c/summary\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script ;\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.onload = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        targets = document.getElementsByName( \"actionSelects\"), \u003cspan class=\"r\"\u003e//\n            获取目标元素\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003etargetsLen = targets.length, \u003cspan class=\"r\"\u003e//\n            目标元素的个数\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ei = 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.getElementById( \"allSelect\").onclick = function() {\n        \u003cspan class=\"r\"\u003e// 绑定单击事件，全选\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003efor (i = 0; i \u0026lt; targetsLen; i++) {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003etargets[i].checked = true; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.getElementById(\n        \"canelallSelect\").onclick = function() { \u003cspan class=\"r\"\u003e// 绑定单击事件，取消\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003efor (i =\n        0; i \u0026lt; targetsLen; i++) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003etargets[i].checked = false; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.getElementById( \"_select\").onclick\n        = function() { \u003cspan class=\"r\"\u003e// 绑定单击事件，反选\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003efor (i = 0; i \u0026lt; targetsLen;\n        i++) { \u003c/span\u003e\u003cspan class=\"p8\"\u003etargets[i].checked = !targets[i].checked; \u003cspan class=\"r\"\u003e//\n            选择取反即可\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/details\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 表单","title":"多选"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","表单","多选"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
