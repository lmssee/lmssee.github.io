class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>form</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e创建表单\u003c/h5\u003e\n\u003cp\u003e每个表单都必须开始于一个 \u0026lt;form\u0026gt; 标签，它可以位于 HTML 文档主体内的任何位置。 \u0026lt;form\u0026gt; 标签通常具有 3 个属性： name 、 method 和 action 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eform action=\"url\" method=\"get/post\" enctype=\"mime\"\n        target=\"xx\"\u0026gt;\u0026lt;/form\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eaction=\"url\" ：指定处理提交表单的格式，它可以是一个 URL 地址（提交给程式）或一个电子邮件地址\u003c/li\u003e\n    \u003cli\u003ename: 这一属性非必须属性，但是为了防止表单提交到后台时出现混乱，一般要设置与表单能符合的名称\u003c/li\u003e\n    \u003cli\u003emethod=\"get/post\" ：指明提交表单的 HTTP 方法。 post —— POST 方法在表单的主干包含\"名称 / 值\"对并且无须包含于 action 特性的 URL 中； get ——不赞成， get\n        方法把名称 / 值对加在 action 的 URL 后面并且把新的 URL 送至服务器，这是往前兼容的默认值，这个值由于国际化的原因不赞成使用\u003c/li\u003e\n    \u003cli\u003eenctype=\"cdata\" ：指定表单数据在发送的服务器之前如何编码，特别注意的是，当含有上传域时要设置编码方式为 enctype=\"multipart/form-data\"\n        ，否则后台无法获取到浏览器发送的文件数据。是设置表单的 MIME 编码。默认情况，这个编码格式是 application/x-www-form-urlencoded ，不能用于文件上传；只有使用了\n        multipart/form-data ， form 里面的 input 的值以 2 进制的方式传过去，才能完整地传递文件数据。\n        FTP 上传大文件的时候，也有个选项是以二进制方式上传\u003c/li\u003e\n    \u003cli\u003etarget=\"...\" ：指定提交的结果文档显示的位置。\n        \u003cul\u003e\n            \u003cli\u003e_blank ——在一个新的、无名浏览器窗口调入指定的文档；\u003c/li\u003e\n            \u003cli\u003e _self 在指向这个目标的元素的相同的框架中调入文档；\u003c/li\u003e\n            \u003cli\u003e _parent 把文档调入当前框的直接的父 FRAMESET 框中；这个值在当前框没有父框时等价于 _self ；\u003c/li\u003e\n            \u003cli\u003e_top 把文档调入原来的最顶部的浏览器窗口中（因此取消所有其它框架）；这个值等价于当前框没有框时的 _self\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e最常见的 method 是 post ，它把表单输入结果作为文档进行发送。在一些情况下，需要使用 method=\"get\" ，它代之以把结果作为 URL 查询字符串的一部分进行提交。例如，当从 Web\n    表单把查询提交给搜索引擎时，有时就会使用 get 。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e可以输入 Web 服务器上的表单处理程序或脚本的位置，然后将把表单数据发送给那个程序。这是迄今为止最常见的方案\u003c/li\u003e\n    \u003cli\u003e可以输入\" mailto\n        ：\"，其后接着你的电子邮件地址，无论何时某个人填写了表单，这将把表单数据直接发送给你。不过，这种方法完全依赖于用户的计算机正确地配置了电子邮件客户。通过未安装电子邮件客户的公共计算机访问你的站点的用户将被冷落\n    \u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 表单","title":"form"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","表单","form"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
