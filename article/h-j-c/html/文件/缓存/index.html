="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>缓存</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e缓存对象\u003c/h5\u003e\n\u003cp\u003e在 HTML 5 之前， JavaScript 操作二进制文件比较弱，各种方法效率低下，且容易产生错误。为此 HTML 5 新增了两种对象： ArrayBuffer 和 ArrayBufferView 。\u003c/p\u003e\n\u003ch6\u003e使用 ArrayBuffer 对象\u003c/h6\u003e\n\u003cp\u003eArrayBuffer 对象表示一个固定长度的二进制数据的缓存区。用户不能直接存取 ArrayBuffer 缓存区内容，必须通过 ArrayBufferView 对象来读写 ArrayBuffer 缓存区的内容。\u003c/p\u003e\n\u003cp\u003e创建方法如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar buffer = new ArrayBuffer(32);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数为一个无符号长整型的整数，用于设置缓存区的长度，，单位为 byte 。 ArrayBuffer 缓存区创建成功后，该缓存区内的初始数据初始化为 0 。\u003c/p\u003e\n\u003cp\u003eArrayBuffer 对象中包含 length 属性，该属性表示缓存区的长度。\u003c/p\u003e\n\u003ch5\u003e使用 ArrayBufferView 对象\u003c/h5\u003e\n\u003cp\u003eHTML 5 使用 ArrayBufferView 对象以一种准确的格式来表示 ArrayBuffer 缓存区的数据。 HTML 5 不允许直接使用 ArrayBufferView 对象，而是使用\n    ArrayBufferView 的子类实例来读取 ArrayBuffer 缓存区的数据。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eArrayBufferView 的子类\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e类型\u003c/th\u003e\n        \u003cth\u003e字节长度\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e上表中， Unit8ClampedArray 子类用于定义一种特殊的 8 位无符号整数数组，该数组的作用：代替 CanvasPixelArray 数组用于 Canvas API 中。该数组与普通的 8\n        位无符号整数数组的区别是，将 ArrayBuffer 缓存区的数值进行转换，内部使用箱位（ clamping ）算符，而不是模数（ modulo ）算法。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003eArrayBufferView 数组的作用，可以根据同一个 ArrayBuffer 对象创建各种不同数字类型的数组。\u003c/p\u003e\n\u003cp\u003e在创建 ArrayBufferView 对象时，除了要指定 ArrayBuffer 缓存区外，还可以使用两个可选参数：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ebyteOffset ：为无符号长整数数值，设置开始引用位置与 ArrayBuffer 缓存区第一个字节之间的偏离值，单位为字节。提示，属性值必须为数组中单个元素的长度的倍数，省略该参数时， ArrayBuffer\n        对象将从 ArrayBuffer 缓存区第一个字节开始引用\u003c/li\u003e\n    \u003cli\u003elength ： 为无符号长整数型数值，设置数组中元素的个数。如果省略该参数，将根据缓存区长度、 ArrayBufferView 对象开始引用的位置、每一个字符的字节长度自动计数元素个数\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e如果设置了 byteOffset 和 length 参数值，数组从 byteOffset 参数值指定的开始位置开始，【长度】 = 【 length 参数值所指定的元素个数】 * 【每个元素的字节长度】 。\u003c/p\u003e\n\u003cp\u003e如果忽略了 byteOffset 和 length 参数值，数组将跨越整个 ArrayBuffer 缓存区。\u003c/p\u003e\n\u003cp\u003e如果省略 length 参数值，数组将从 byteOffset 参数值指定的开始位置到 ArrayBuffer 缓存区的结束位置。\u003c/p\u003e\n\u003cp\u003eArrayBufferView 对象包含 3 个属性∶\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ebuffer ∶ 只读属性，表示 ArrayBuffer 对象，返回 ArrayBufferView 对象引用的 ArrayBuffer 缓存区\u003c/li\u003e\n    \u003cli\u003ebyteOffset ∶ 只读属性，表示一个无符号长整型数值，返回 ArrayBufferView 对象开始引用的位 置与 ArrayBuffer 缓存区的第一个字节之间的偏离值，单位为字节\u003c/li\u003e\n    \u003cli\u003elength ∶ 只读属性，表示一个无符号长整型数值，返回数组中元素的个数\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e使用 DataView 对象\u003c/h5\u003e\n\u003cp\u003e除了使用 ArrayBufferView 子类外，也可以使用 DataView 类存取 ArrayBuffer 缓存区的数据。\u003c/p\u003e\n\u003cp\u003eDataView 继承于， ArrayBufferView 类，提供了一些直接存取 ArrayBuffer 缓存区中数据的方法。\u003c/p\u003e\n\u003cp\u003e创建 DataView 对象的方法如下∶\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar view = new DataView(buffer,byteOffset,byteLength);\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ebuffer ∶ 为 ArrayBuffer 对象，表示一个 ArrayBuffer 缓存区\u003c/li\u003e\n    \u003cli\u003ebyteOffset ∶ 可选参数，为无符号长整型数值，表示 DataView 对象开始引用的位置与 ArrayBuffer 缓存区第一个字节之间的偏离值，单位为字节。如果忽略该参数值，将从 ArrayBuffer\n        缓存区的第一个字节开始引用\u003c/li\u003e\n    \u003cli\u003ebyteLength ∶ 可选参数，为无符号长整型数值，表示 DataView 对象的总字节长度\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e如果设置了 byteOffset 和 byteLength 参数值， DataView 对象从 byteOffset 参数值所指定的开始位置开始，长度为 byteLength 参数值所指定的总字节长度。\u003c/p\u003e\n\u003cp\u003e如果忽略了 byteOffset 和 byteLength 参数值， DataView 对象跨越整个 ArrayBuffer 缓存区。如果省略 byteLength 参数值， DataView 对象将从 byteOffset\n    参数所指定的开始位置到 ArrayBuffer 缓存区的结束位置。\u003c/p\u003e\n\u003ctable id=\"Ab\"\u003e\n    \u003ccaption\u003eDataView 对象方法\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e方法\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cul\u003e\n    \u003cli\u003ebyteOffset ： 为一个无符号长整型整数，表示设置或读取整数所在位置与 DataView 对象对 ArrayBuffer 缓存区的开始引用位置之间间隔多少个字节\u003c/li\u003e\n    \u003cli\u003evalue ：位无符号对应的类型的数值，表示在指定位置进行设定的整数类型\u003c/li\u003e\n    \u003cli\u003elittleEndian ： 可选参数，为布尔型，判断该整数型数值的字节序。当值为 true 时，表示以 little-endian 方式设置或读取该整数数值（低地址存放有效字节）；当参数值为 false\n        或者忽略该参数值时，表示 big-endian 方式读取该整数数值（低地址存放最高有效字节）\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.onload = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        result = document.getElementById(\"result\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar file =\n        document.getElementById(\"file\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (typeof FileReader == 'undefined') { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eresult.innerHTML = \"\u0026lt;h1\u0026gt; 当前浏览器不支持 FileReader 对象 \u0026lt;/h1\u0026gt;\"; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003efile.setAttribute('disabled', 'disabled'); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction file_onchange() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar file = document.getElementById(\"file\").files[0]; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (!/image\\/\\w+/.test(file.type)) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\" 请选择一个图像文件！ \"); \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar slice = file.slice(0, 4); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar reader = new FileReader(); \u003c/span\u003e\u003cspan class=\"p4\"\u003ereader.readAsArrayBuffer(slice);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar type; \u003c/span\u003e\u003cspan class=\"p4\"\u003ereader.onload = function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar\n        buffer = this.result; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar view = new DataView(buffer); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar magic = view.getInt32(0, false);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (magic \u0026lt; 0) \u003c/span\u003e\u003cspan class=\"p8\"\u003emagic = magic + 0x100000000; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003emagic = magic.toString(16).toUpperCase(); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (magic.indexOf('FFD8FF') \u0026gt;= 0) \u003c/span\u003e\u003cspan class=\"p8\"\u003etype = \"jpg 文件 \"; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eif (magic.indexOf('89504E47') \u0026gt;= 0) \u003c/span\u003e\u003cspan class=\"p8\"\u003etype = \"png 文件 \"; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eif (magic.indexOf('47494638') \u0026gt;= 0) \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003etype = \"gif 文件 \"; \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (magic.indexOf('49492A00') \u0026gt;= 0) \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003etype = \"tif 文件 \"; \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (magic.indexOf('424D') \u0026gt;= 0) \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003etype = \"bmp 文件 \"; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.getElementById(\"result\").innerHTML = ' 文件类型为： ' + type; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        [\"Int8Array\", \"1\", \"8 位整数数组 \"],\n        [\"Unit8Array\", \"1\", \"8 位无符号整数数组 \"],\n        [\"Unit8ClampedArray\", \"1\", \"8 位无符号整数数组 \"],\n        [\"Int16Array\", \"2\", \"16 位整数数组 \"],\n        [\"Unit16Array\", \"2\", \"16 位无符号整数数组 \"],\n        [\"Int32Array\", \"4\", \"32 位整数数组 \"],\n        [\"Unit32Array\", \"4\", \"32 位无符号整数数组 \"],\n        [\"Float32Array\", \"4\", \"32 位 IEEE 浮点数数组 \"],\n        [\"Float64Array\", \"8\", \"32 位 IEEE 浮点数数组 \"],\n    ];\n    _MiMethod.td(\"Aa\");\n    var Ab = [\n        [\"getInt8(byteOffset)\", \" 获取指定位置的一个 8 位整数值 \"],\n        [\"getUnit8(byteOffset)\", \" 获取指定位置的一个 8 位无符号整数值 \"],\n        [\"getInt16(byteOffset,littleEndian)\", \" 获取指定位置的一个 16 位整数值 \"],\n        [\"getUnit16(byteOffset,littleEndian)\", \" 获取指定位置的一个 16 位无符号整数值 \"],\n        [\"getUnit32(byteOffset,littleEndian)\", \" 获取指定位置的一个 32 位无符号整数值 \"],\n        [\"getFloat32(byteOffset,littleEndian)\", \" 获取指定位置的一个 32 位浮点数值 \"],\n        [\"setFloat64(byteOffset,littleEndian)\", \" 获取指定位置的一个 64 位浮点数值 \"],\n        [\"setInt8(byteOffset,value)\", \" 获取指定位置的一个 8 位整数值 \"],\n        [\"setUnit8(byteOffset,value)\", \" 设置指定位置的一个 8 位无符号整数值 \"],\n        [\"setInt16(byteOffset,value,littleEndian)\", \" 设置指定位置的一个 16 位整数值 \"],\n        [\"setUnit16(byteOffset,value,littleEndian)\", \" 设置指定位置的一个 16 位无符号整数值 \"],\n        [\"setUnit32(byteOffset,value,littleEndian)\", \" 设置指定位置的一个 32 位无符号整数值 \"],\n        [\"setFloat32(byteOffset,value,littleEndian)\", \" 设置指定位置的一个 32 位浮点数值 \"],\n        [\"setFloat64(byteOffset,value,littleEndian)\", \" 设置指定位置的一个 64 位浮点数值 \"],\n    ];\n    _MiMethod.td(\"Ab\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 文件","title":"缓存"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","文件","缓存"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
