                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e读取文件\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e认识 FileReader 接口\n        \u003cdetails\u003e\n            \u003csummary\u003e认识 FileReader 接口\u003c/summary\u003e\n            \u003cul\u003e\n                \u003cli\u003e判断浏览器是否支持 FileReader\n                    \u003cdetails\u003e\n                        \u003csummary\u003e实例化\u003c/summary\u003e\n                        \u003cp\u003e判断浏览器是否支持 FileReader ，如果浏览器支持 FileReader 接口，那么该浏览器有一个位于 Windows 对象下的 FileReader\n                            构造函数，如果这个构造函数存在，那么就可以通过 new 实例化一个 FileReader 来使用。\u003c/p\u003e\n                    \u003c/details\u003e\n                \u003c/li\u003e\n                \u003cli\u003eFileReader 接口的方法\n                    \u003cdetails\u003e\n                        \u003csummary\u003eFileReader 接口的方法\u003c/summary\u003e\n                        \u003ctable\u003e\n                            \u003ccaption\u003eFileReader 接口的方法\u003c/caption\u003e\n                            \u003ctr\u003e\n                                \u003cth\u003e方法名称\u003c/th\u003e\n                                \u003cth\u003e说明\u003c/th\u003e\n                            \u003c/tr\u003e\n                            \u003ctr\u003e\n                                \u003ctd\u003eabort()\u003c/td\u003e\n                                \u003ctd\u003e中断读取当前操作。需要传入参数 none\u003c/td\u003e\n                            \u003c/tr\u003e\n                            \u003ctr\u003e\n                                \u003ctd\u003ereadAsBinaryString()\u003c/td\u003e\n                                \u003ctd\u003e使用二进制格式读取文件。需要传入参数 file\u003c/td\u003e\n                            \u003c/tr\u003e\n                            \u003ctr\u003e\n                                \u003ctd\u003ereadAsDataURL()\u003c/td\u003e\n                                \u003ctd\u003e使用 URL 格式读取文件。需要传入参数 file\u003c/td\u003e\n                            \u003c/tr\u003e\n                            \u003ctr\u003e\n                                \u003ctd\u003ereadAsText\u003c/td\u003e\n                                \u003ctd\u003e使用文本格式读取文件。需要传入参数 file,[encoding]\u003c/td\u003e\n                            \u003c/tr\u003e\n                        \u003c/table\u003e\n                    \u003c/details\u003e\n                \u003c/li\u003e\n                \u003cli\u003eFileReader 接口的事件\n                    \u003cdetails\u003e\n                        \u003csummary\u003eFileReader 接口的事件\u003c/summary\u003e\n                        \u003ctable\u003e\n                            \u003ccaption\u003eFileReader 接口的事件\u003c/caption\u003e\n                            \u003ctr\u003e\n                                \u003cth\u003e事件\u003c/th\u003e\n                                \u003cth\u003e额\u003c/th\u003e\n                            \u003c/tr\u003e\n                            \u003ctr\u003e\n                                \u003ctd\u003eonabort\u003c/td\u003e\n                                \u003ctd\u003e当读取数据中断时触发\u003c/td\u003e\n                            \u003c/tr\u003e\n                            \u003ctr\u003e\n                                \u003ctd\u003eonerror\u003c/td\u003e\n                                \u003ctd\u003e\n                                    当读取数据出错时触发\u003c/td\u003e\n                            \u003c/tr\u003e\n                            \u003ctr\u003e\n                                \u003ctd\u003eonloadstart\u003c/td\u003e\n                                \u003ctd\u003e当读取数据开始时触发\u003c/td\u003e\n                            \u003c/tr\u003e\n                            \u003ctr\u003e\n                                \u003ctd\u003eonload\u003c/td\u003e\n                                \u003ctd\u003e当读取数据成功时触发\u003c/td\u003e\n                            \u003c/tr\u003e\n                            \u003ctr\u003e\n                                \u003ctd\u003eonloadend\u003c/td\u003e\n                                \u003ctd\u003e当读取操作完成时触发。无论成功或者失败\u003c/td\u003e\n                            \u003c/tr\u003e\n                            \u003ctr\u003e\n                                \u003ctd\u003eonprogress\u003c/td\u003e\n                                \u003ctd\u003e正在读取数据时触发\u003c/td\u003e\n                            \u003c/tr\u003e\n                        \u003c/table\u003e\n                    \u003c/details\u003e\n                \u003c/li\u003e\n            \u003c/ul\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003e读取二进制文件\n        \u003cdetails\u003e\n            \u003csummary\u003eFileReader 接口所提供的 readAsBinaryString() 方法是将文件读取为二进制字符串，通常是将它传送到后端，后端可以通过这段字符串存储文件。\u003c/summary\u003e\n            \u003cp\u003ereadAsBinaryString() 方法的使用很简单，只要将一个要读取的文件 file 作为参数传入即可，这样读取的结果将保存到 result 属性中。\u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003e显示预览图像\n        \u003cdetails\u003e\n            \u003csummary\u003eFileReader 接口所提供的 readAsDataURL() 方法将文件读取为一段以 data 开头的字符串，这段字符串实质上就是 DataURL\n                ，即一种将小文件直接嵌入文档的方案，小文件通常是指图像与 html 等格式的文件。\u003c/summary\u003e\n            \u003cp\u003e调用 FileReader 接口的 readAsDataURL() 方法，不通过后台而即时实现图片预览的功能。\u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e使用 FileReader 对象\u003c/h5\u003e\n\u003ch6\u003e读取并显示文件\u003c/h6\u003e\n\u003cp\u003eFileReader 对象包括 5 个方法，其中 4 个是读取文件，另一个用来中断读取操作：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ereadAsText(Blob,type) ： 将 Blob 对象或文件中的数据以文本读取。默认 type 为 UTF-8\u003c/li\u003e\n    \u003cli\u003ereadAsBinaryString(Blob) ： 将 Blob 对象或文件的数据读取为二进制字符串。通常调用该方法将文件提交到服务器，服务器可以通过这段文字储存文件\u003c/li\u003e\n    \u003cli\u003ereadAsDataURL(Blob) ： 将 Blob 对象或文件中的数据读取为 DataURL 字符串。该方法就是将数据以一种特殊的格式的 URL 地址形式读入\u003c/li\u003e\n    \u003cli\u003ereadAsArrayBuffer(Blob) ： 将 Blob 的对象或文件中的数据读取为一个 ArrayBuffer 对象\u003c/li\u003e\n    \u003cli\u003eabort() ：不包含参数，中断读取操作\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e上述四个方法都包含一个 BLob 对象或 file 对象参数，无论是读取成功与否或失败，都不返回读取结果，读取结果被包含于 result 属性中。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ewindow.onload = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar result =\n        document.getElementById(\"result\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar file = document.getElementById(\"file\");\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (typeof FileReader == 'undefined') { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eresult.innerHTML = \"\u0026lt;h1\u0026gt;当前浏览器不支持FileReader对象\u0026lt;/h1\u0026gt;\"; \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003efile.setAttribute('disabled', 'disabled'); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 将文件以Data URL形式进行读入页面 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efunction readAsDataURL() { \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 检查是否为图像文件\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar file = document.getElementById(\"file\").files[0]; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (!/image\\/\\w+/.test(file.type)) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ealert(\"提交文件不是图像类型\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn false; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar reader = new FileReader(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 将文件以Data\n            URL形式进行读入页面 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereader.readAsDataURL(file); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereader.onload = function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eresult.innerHTML = '\u0026lt;img src=\"' +\n        this.result + '\" alt=\"\"/\u0026gt;' \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan\n            class=\"r\"\u003e// 将文件以二进制形式进行读入页面 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efunction readAsBinaryString() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar file =\n        document.getElementById(\"file\").files[0]; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar reader = new FileReader();\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 将文件以二进制形式进行读入页面 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereader.readAsBinaryString(file); \u003c/span\u003e\u003cspan class=\"p4\"\u003ereader.onload = function(f) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eresult.innerHTML = this.result; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 将文件以文本形式进行读入页面 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction readAsText() {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar file = document.getElementById(\"file\").files[0]; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar reader\n        = new FileReader(); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 将文件以文本形式进行读入页面 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ereader.readAsText(file);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ereader.onload = function(f) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eresult.innerHTML = this.result;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上面的示例，也可以不读取而直接发给服务器。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003efileReader 对象读取的数据都保存在 result 中。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e监控读取操作\u003c/h6\u003e\n\u003cp\u003eFileReader 对象提供 6 个事件，用于监控文件读取状态，简单说明如下：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eonabort ：数据读取中断时触发\u003c/li\u003e\n    \u003cli\u003eonprogress ：数据读取中触发\u003c/li\u003e\n    \u003cli\u003eonerror ：数据读取出错时触发\u003c/li\u003e\n    \u003cli\u003eonload ：数据读取成功时触发\u003c/li\u003e\n    \u003cli\u003eonloadstart ：数据开始读取时触发\u003c/li\u003e\n    \u003cli\u003eonloadend ：数据读取完成（无论成功与否）时触发\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ewindow.onload = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar result =\n        document.getElementById(\"result\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar file = document.getElementById(\"file\");\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (typeof FileReader == 'undefined') { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eresult.innerHTML = \"\u0026lt;h1\u0026gt;当前浏览器不支持FileReader对象\u0026lt;/h1\u0026gt;\"; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003efile.setAttribute('disabled', 'disabled'); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction readFile() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar file = document.getElementById(\"file\").files[0]; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar reader = new\n        FileReader(); \u003c/span\u003e\u003cspan class=\"p4\"\u003ereader.onload = function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eresult.innerHTML\n        = '\u0026lt;img src=\"' + this.result + '\" alt=\"\"/\u0026gt;' \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log(\"load\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereader.onprogress =\n        function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log(\"progress\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ereader.onabort = function(e) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log(\"abort\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereader.onerror =\n        function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log(\"error\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ereader.onloadstart = function(e) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log(\"loadstart\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereader.onloadend =\n        function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log(\"loadend\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ereader.readAsDataURL(file); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 文件","title":"FileReader"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","文件","FileReader"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
