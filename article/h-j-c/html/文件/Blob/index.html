    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e文件域\u003c/h5\u003e\n\u003cp\u003e为了方便用户在脚本中访问将要提交的文件， HTML 5 新增了 FileList 和 file 对象\u003c/p\u003e表\n\u003cul\u003e件\n    \u003cli\u003eFileList ： 表示用户选择的文件列表 \u003c/li\u003e\n    \u003cli\u003efile ： 表示 file 控件内的每一个被选择的文件对象。 FIleList 对象为这些 file 对象的列表，代表用户选择的所有文件 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003efile 对象包括两个属性： name （文件名）、 lastModifiedDate （最后修改时间）。 \u003c/p\u003e\n\u003ch5\u003e使用 Blob \u003c/h5\u003e\n\u003cp\u003eHTML 5 新增的 Blob 对象，他代表着原始二进制数据。不过与 MySQL 的 BLOB 类型在概念上有点区别， MySQL 中的 BLOB 类型只是二进制数据容器，而 HTML 5 中的 Blob\n    对象除了二进制数据外，还可以设置 MIME 数据，这相当于文件的储存，其他很多二进制对象也是从这个对象继承的 \u003c/p\u003e\n\u003ch6\u003e在文件域访问 Blob\u003c/h6\u003e\n\u003cp\u003efile 对象继承于 Blob 对象，因此可以在文件域访问 Blob 对象。 Blob 对象含有两个属性：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003esize ：该属性表示一个 Blob 对象的字节长度 \u003c/li\u003e\n    \u003cli\u003etype ： 该属性表示 Blob 的 MIME 类型，如果类型未知，则返回一个空字符串 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e对于图像类型的文件， Blob 对象的 type 属性都是以 \" image/ \" 开头，后面是图像类型。 HTML 5 为 file 控件增加了 accept 属性，设置 file 控件只能接受某种类型的文件\n    \u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction fileUpload() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar file; \u003c/span\u003e\u003cspan class=\"p4\"\u003efor\n        (var i = 0; i \u0026lt;script document.getElementById(\"file\").files.length; i++) { \u003c/span\u003e\u003cspan class=\"p6\"\u003efile =\n        document.getElementById(\"file\").files[i]; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (!/image\\/\\w+/.test(file.type)) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ealert(file.name + \"不是图像文件！\");\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003econtinue; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u003cspan class=\"r\"\u003e//\n            此处可加入文件上传的代码 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ealert(file.name + \"文件已上传\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e创建 Blob 文件\u003c/h6\u003e\n\u003cp\u003eHTML 5 直接使用 new 创建 Blob 对象\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar Blob = new Blob(blobParts , type);\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eblobParts ： 可选参数，数组类型，其中可以存放任何类型的对象，这些对象中所携带的数据将被追加到 Blob 中\n        \u003cul\u003e\n            \u003cli\u003eArrayBuffer 对象 \u003c/li\u003e\n            \u003cli\u003eArrayBufferView 对象 \u003c/li\u003e\n            \u003cli\u003eBlob 对象 \u003c/li\u003e\n            \u003cli\u003estring 对象 \u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003etype : 可选参数，字符串类型，设置被创建的 Blob 对象的 type 属性，即定义 Blob 对象的 MIME 类型。默认为空字符串，表示未知类型 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eHTML 5 支持 URL 对象，通过该对象的 createObjectURL() 方法可以根据一个 Blob 对象的二进制数据创建一个 URL 地址，并返回该地址，当用户访问该地址时，可以直接下载原始二进制数据\n    \u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction test() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar text =\n        document.getElementById(\"textarea\").value; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar result =\n        document.getElementById(\"result\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 创建Blob对象 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (!window.Blob) \u003c/span\u003e\u003cspan class=\"p6\"\u003eresult.innerHTML = \"浏览器不支持Blob对象。\"; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eelse \u003c/span\u003e\u003cspan class=\"p6\"\u003evar blob = new Blob([text]); \u003cspan class=\"r\"\u003e//\n            Blob中数据为文字时默认使用utf8格式\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 通过createObjectURL方法创建文字链接\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (window.URL) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eresult.innerHTML = '\u0026lt;a download href=\"' +\n        window.URL.createObjectURL(blob) + '\" target=\"_blank\"\u0026gt;Blob对象文件下载\u0026lt;/a\u0026gt;'; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e截取 Blob 对象 \u003c/h6\u003e\n\u003cp\u003eBlob() 含有 slice() 方法，它可以从 Blob 对象截取一部分数据，然后把这些数据创建成新的 Blob 数据返回 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar newBlob = blob.slice(start,end,contentType);\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003estart ∶ 可选参数，整数值，设置起始位置\n        \u003cul\u003e\n            \u003cli\u003e如果值为 0 时，表示从第一个字节开始复制数据 \u003c/li\u003e\n            \u003cli\u003e如果值为负数，且 Blob 对象的 size 属性值 +start 参数值大于等于 0 ，则起始位置为 Blob 对象的 size 属性值 +start 参数值 \u003c/li\u003e\n            \u003cli\u003e如果值为负数，且 Blob 对象的 size 属性值 +start 参数值小于 0 ，则起始位置为 Blob 对象的起点 位置 \u003c/li\u003e\n            \u003cli\u003e如果值为正数，且大于等于 Blob 对象的 size 属性值，则起始位置为 Blob 对象的 size 属性值 \u003c/li\u003e\n            \u003cli\u003e如果值为正数，且小于 Blob 对象的 size 属性值，则起始位置为 start 参数值 \u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003eend ∶ 可选参数，整数值，设置终点位置\n        \u003cul\u003e\n            \u003cli\u003e如果忽略该参数，则终点位置为 Blob 对象的结束位置 \u003c/li\u003e\n            \u003cli\u003e如果值为负数，且 Blob 对象的 size 属性值 +end 参数值大于等于 0 ，则终点位置为 Blob 对象的 size 属性值 + end 参数值 \u003c/li\u003e\n            \u003cli\u003e如果值为负数，且 Blob 对象的 size 属性值 +start 参数值小于 0 ，则终点位置为 Blob 对象的起点位置 \u003c/li\u003e\n            \u003cli\u003e如果值为正数，且大于等于 Blob 对象的 size 属性值，则种植位置为 Blob 对象的 size 属性值 \u003c/li\u003e\n            \u003cli\u003e如果值为正数，且小于 Blob 对象的 size 属性值，则终止位置为 end 参数值 \u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003econtentType 可选参数，字符串值，制定新的 Blob 对象的 MIME 类型 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e如果 slice 三个参数都省略，这说明是把一个 Blob 对象复制出来 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar file = document.getElementById(\"file\").files[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif\n        (file) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar file1 = file.slice(); \u003cspan class=\"r\"\u003e// 复制 file 对象\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar file2 = file.slice(0, file.size); \u003cspan class=\"r\"\u003e// 复制 file 对象\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 复制 file 对象的后半部分\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar file3 =\n        file.slice(-(Math.round(file.size / 2))); \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 复制 file\n            对象的前半部分\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar file4 = file.slice(0, Math.round(file.size / 2)); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 复制 file 对象，从开始处复制到结束处之前的 150 个字节处，并设置 MIME 类型\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        file5 = file.slice(0, -150, \"application/plain\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e保存 Blob 对象\u003c/h6\u003e\n\u003cp\u003eHTML 5 支持在 indexedDB 数据库中保存 Blob 对象 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ewindow.indexedDB = window.indexedDB || window.webkitIndexedDB || window.mozIndexedDB\n        || window.msIndexedDB; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.IDBTransaction = window.IDBTransaction ||\n        window.webkitIDBTransaction || window.msIDBTransaction; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ewindow.IDBKeyRange = window.IDBKeyRange || window.webkitIDBKeyRange || window.msIDBKeyRange;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.IDBCursor = window.IDBCursor || window.webkitIDBCursor || window.msIDBCursor;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar dbName = 'test'; \u003cspan class=\"r\"\u003e// 数据库名\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar dbVersion = 20170202; \u003cspan class=\"r\"\u003e// 版本号\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar idb;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar dbConnect = indexedDB.open(dbName, dbVersion); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edbConnect.onsuccess = function(e) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eidb = e.target.result; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003edbConnect.onerror = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert('\n        数据库连接失败 '); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003edbConnect.onupgradeneeded = function(e) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eidb = e.target.result; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eidb.createObjectStore('files'); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        saveFile() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar file = document.getElementById(\"file\").files[0]; \u003cspan class=\"r\"\u003e//\n            得到用户选择的第一个文件\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar tx = idb.transaction(['files'], \"readwrite\"); \u003cspan class=\"r\"\u003e// 开启事务\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar store = tx.objectStore('files'); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar req = store.put(file, 'blob');\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ereq.onsuccess = function(e) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ealert(\" 文件保存成功 \"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan class=\"p4\"\u003ereq.onerror = function(e)\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\" 文件保存失败 \"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 文件","title":"Blob"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","文件","Blob"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
