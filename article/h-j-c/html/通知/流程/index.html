    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e步骤\u003c/h5\u003e\n\u003ch6\u003e检查支持\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eif (window.Notification) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.location.hash += '浏览器支持通知\n        API'; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.location.hash += '浏览器不支持通知 API';\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e检查权限\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003ewindow.Notification.requestPermission(); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003erequestPermission() 只在用户显式触发事件，如单击按钮、点击鼠标或按下右键。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eif (window.Notification) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (window.Notification.permission == 'granted') { \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e // 获取权限 \u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (window.Notification.permission == 'default') { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ewindow.Notification.requestPermission(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e }\n        else { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.location.hash += '浏览器不支持通知 API'; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eNotification 对象的 permission 属性包括 3 个值：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003edefault : 用户处理结果未知，因此浏览器将视为用户拒绝弹出通知\u003c/li\u003e\n    \u003cli\u003edenied ： 用户拒绝弹出消息\u003c/li\u003e\n    \u003cli\u003egranted ： 用户允许弹出消息\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eif (window.Notification) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (window.Notification.permission == 'granted') { \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e // 获取权限 \u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (window.Notification.permission == 'default') { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ewindow.Notification.requestPermission(); \u003cspan class=\"r\"\u003e // 申请权限 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar notification = new Notification(title, option); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.location.hash += '浏览器不支持通知 API'; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e创建消息\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar notification = new Notification(title, option); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e该构造函数包括两个参数：第一个为通知的标题；第二个参数为一个对象，用于指定通知可以使用的各个选项，该对象可使用属性及属性值如下：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003edir : 设置通知中的文字反向，包括 ltr （从左到右）或 rtl （从右到左），默认值为 ltr\u003c/li\u003e\n    \u003cli\u003elang ： 设置通知的语言，属性值必须是有效的 BCP 47 语言标识\u003c/li\u003e\n    \u003cli\u003ebody ： 设置通知中所显示的内容\u003c/li\u003e\n    \u003cli\u003etag ： 通知的 ID 。即唯一的标识符，以区别于其他的通知，开发者通过 tag 标识符，获取、修改或删除该通知\u003c/li\u003e\n    \u003cli\u003eicon ： 设置通知图标，为图片的 URL 地址\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003esetTimeout(() =\u0026gt; { \u003c/span\u003e\u003cspan class=\"p4\"\u003eNotification.requestPermission(function(status) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e if ('granted' !=\n        status) return; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar notification = new Notification('好消息', { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003edir: 'rtl', \u003c/span\u003e\u003cspan class=\"p8\"\u003elang: 'zh-CN', \u003c/span\u003e\u003cspan class=\"p8\"\u003eicon:\n        'image/eessml.jpg', \u003c/span\u003e\u003cspan class=\"p8\"\u003ebody: '本站站长终于会 HTML 5 通知了', \u003c/span\u003e\u003cspan class=\"p6\"\u003e}) \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, 2000);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e监测和管理\u003c/h6\u003e\n\u003cp\u003eNotification 对象提供 4 个事件类型，用于检测通知。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eshow ：当通知被显示\u003c/li\u003e\n    \u003cli\u003eclose ： 当通知被关闭\u003c/li\u003e\n    \u003cli\u003eclick ： 当通知被点击\u003c/li\u003e\n    \u003cli\u003eerror ： 当通知出错\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003esetTimeout(() =\u0026gt; { \u003c/span\u003e\u003cspan class=\"p4\"\u003eNotification.requestPermission(function(status) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eif ('granted' !=\n        status) return; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar notification = new Notification('好消息', { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003edir: 'rtl', \u003c/span\u003e\u003cspan class=\"p8\"\u003elang: 'zh-CN', \u003c/span\u003e\u003cspan class=\"p8\"\u003eicon:\n        'image/eessml.jpg', \u003c/span\u003e\u003cspan class=\"p8\"\u003ebody: '本站站长终于会 HTML 5 通知了', \u003c/span\u003e\u003cspan class=\"p6\"\u003e});\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003enotification.onshow = function() { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003elocation.hash = '来新的消息了'; \u003c/span\u003e\u003cspan class=\"p6\"\u003e}; \u003c/span\u003e\u003cspan class=\"p6\"\u003enotification.onclose =\n        function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003elocation.hash = '信息被关闭啦';\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003esetTimeout(() =\u0026gt; { \u003c/span\u003e\u003cspan class=\"p10\"\u003elocation.hash = ''; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e}, 500); \u003c/span\u003e\u003cspan class=\"p6\"\u003e}; \u003c/span\u003e\u003cspan class=\"p6\"\
