    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e销毁线程\u003c/h5\u003e\n\u003cp\u003e在线程内容中可以调用 close() 方法销毁自己的线程，在线程外部的主线程中，使用线程实例的 terminate() 方法销毁线程。\u003c/p\u003e\n\u003cp\u003eWeb Worker 主要有两部分： Web 主线程和 Worker 工作线程（也可以叫新线程或者子线程）。 index.html 是 Web 主线程，在主线程中执行以下操作。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e通过\" worker = new Worker(url) \"加载一个 JS 文件来创建一个 worker ，同时返回一个 worker 实例\u003c/li\u003e\n    \u003cli\u003e通过 worker.postMessage() 方法来向 worker 发送数据\u003c/li\u003e\n    \u003cli\u003e绑定 worker.onmessage 事件来接收 worker 工作线程发送过来的数据\u003c/li\u003e\n    \u003cli\u003e可以使用 work.terminate() 方法终止一个 worker 的执行\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003ework.js 作为子线程，在子线程中执行以下操作\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e通过 postMessage() 方法来向主线程发送数据\u003c/li\u003e\n    \u003cli\u003e绑定 onmessage 事件来接收主线程发送过来的数据\u003c/li\u003e\n\u003c/ol\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 线程","title":"销毁"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","线程","销毁"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
