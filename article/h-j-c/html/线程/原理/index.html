="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>原理</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e使用 Web Workers 的基本原理如下：\u003c/p\u003e\n\u003cp\u003e在使用 Web Workers 时，必须建立一个 Worker 实例，并使用要被执行的 JavaScript 文件所在 URL 作为参数，而且必须把 Worker 要执行的 Javascript 程序写在如下的文件中：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar worker = new Worker(\"worker.js\");\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e这样， worker.js 中的程序代码便开始运行了。每一个运行在客户端操作系统线程中的 JavaScript 程序代码称为一个 Worker ， worker.js 中的程序代码便是一个 Worker 。\u003c/p\u003e\n\u003cp\u003e主页面与 Worker 之间，只通过 postMessage() 方法与 onmessage 事件来沟通。 Worker 中的 postMessage() 方法用来向页面传送讯息，页面收到讯息时，则使用 onmessage\n    事件处理函数来处理。 onmessage 事件处理函数的参数中有一个 data 属性，用于携带传送的数据。\u003c/p\u003e\n\u003cp\u003eWeb Workers 发生错误时，会触发 error 事件，使用 error 事件处理函数可以处理。\u003c/p\u003e\n\u003cp\u003e另外， Worker 对象还有一个方法叫做 terminate() ，可以强制结束其执行。\u003c/p\u003e\n\u003ch5\u003e使用 Web Workers 入门\u003c/h5\u003e\n\u003cp\u003e下面来看一下如何使用 Web Workers 实现求素数的复杂运算。往往包含以下两个步骤。\u003c/p\u003e\n\u003ch6\u003e首先建立一个 JavaScript 文件 \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eonmessage = function(e) { \u003c/span\u003e\u003cspan class=\"p2\"\u003evar n = e.data * 100; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003epostMessage(n); }\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e在 HTML 网页中创建 Worker ，并接收消息 \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt;Prime found: \u0026lt;span id=\"state\"\n        style=\"background-color:#09F\"\u0026gt;0\u0026lt;/span\u0026gt; \u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script \u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar state = document.getElementById(\"state\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (window.Worker) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar worker = new Worker(\"213.js\"); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eworker.postMessage(2); \u003c/span\u003e\u003cspan class=\"p6\"\u003eworker.onmessage = function(event) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003estate.textContent = event.data; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\" 浏览器不支持 Web Workers!\");\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在浏览器中执行这个网页，现在求素数的 JavaScript 程序代码运行在客户端操作系统线程中。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 线程","title":"原理"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","线程","原理"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
