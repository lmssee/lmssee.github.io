                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e熟悉 Web Workers 成员\u003c/h5\u003e\n\u003cp\u003eWeb Workers 的使用方法非常简单，只需创建一个 Web Workers 对象，并传入希望执行的 JavaScript 文件即可。然后在页面中设置一个事件监听器，用来监听由 Web Workers\n    对象发来的消息和错误信息。如果想要在页面与 Web Workers 之间建立通信，数据需通过 postMessage() 函数传递。对于 Web Workers JavaScript\n    文件中的代码也是如此，必须通过设置事件处理程序来处理发来的消息和错误信息，通过调用 postMessage()\n    函数实现与页面的数据交互。\n\u003c/p\u003e\n\u003cp\u003e在线程调用的 JavaScript 脚本文件中所有可用的变量、函数与类 。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eself ： self 关键值用来表示本线程范围内的作用域\u003c/li\u003e\n    \u003cli\u003epostMessage(message) ：向创建线程的源窗口发送消息\u003c/li\u003e\n    \u003cli\u003eonmessage ：获取接收消息的事件句柄\u003c/li\u003e\n\u003c/ul\u003e\n\u003cul\u003e\n    \u003cli\u003eimportScripts(urls) ：导入其它 JavaScript 脚本文件。参数为该脚本文件的 URL 地址，可以导入多个脚本文件。导入的脚本文件必须与使用该线程文件的页面在同一个域中，并在同一个端口中\n    \u003c/li\u003e\n    \u003cli\u003enavigator 对象：与 window.navigator 对象类似，具有 appName 、 platform 、 userAgent 和 appVersion 属性。它们可以用来标识浏览器的字符\u003c/li\u003e\n    \u003cli\u003esessionStorage/localStorage ：在线程中可以使用 Web Storage\u003c/li\u003e\n    \u003cli\u003eXMLHttpRequest ：在线程中可以处理 Ajax 请求\u003c/li\u003e\n    \u003cli\u003eWeb Workers ：在线程中可以嵌套线程\u003c/li\u003e\n    \u003cli\u003esetTimeout()/setInterval() ：在线程中可以实现定时处理\u003c/li\u003e\n    \u003cli\u003eclose ：结束本线程\u003c/li\u003e\n    \u003cli\u003eeval() 、 isNaN() 、 escape() 等：可以使用所有 JavaScript 核心函数\u003c/li\u003e\n    \u003cli\u003eobject ：可以创建和使用本地对象\u003c/li\u003e\n    \u003cli\u003eWebSockets ：可以使用 Web Sockets API 向服务器发送和接收信息\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 线程","title":"方法"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","线程","方法"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
