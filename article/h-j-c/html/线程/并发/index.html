    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e多任务并发处理\u003c/h5\u003e\n\u003cp\u003e使用后台线程不能访问页面和窗口对象，但是后台线程可以和页面之间进行数据交互。一个工作线程还可以包含其它的工作线程，即线程之间可以进行嵌套 。\u003c/p\u003e\n\u003cp\u003e利用线程可以嵌套的特性，可以在 Web 应用中实现多个任务并发处理，这样能够提高 Web 应用程序的执行效率和反应速度。同时通过线程嵌套把一个较大的后台任务切分成几个子线程，在每个子线程中各自完成相对独立的一部分工作。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e在主页面中定义一个线程。设计不向该线程发送数据，在 onmessage 事件回调函数中进行后期数据处理，并把返回的数据显示在页面中\u003c/li\u003e\n    \u003cli\u003e在后台主线程文件 script.js 中，随机生成由 200 个整数构成的数组，然后把这个数组提交到子线程，在子线程中把可以被 3 整除的数字挑选出来，然后送回主线程，主线程再把挑选结果送回页面进行显示\u003c/li\u003e\n    \u003cli\u003e设计子线程的任务处理代码。下面是子线程代码，子线程在接收到的随机数组中挑选能被 3 整除的数字，然后拼接成字符串并返回\u003c/li\u003e\n    \u003cli\u003e主页面的主线程回调函数中处理后台线程返回的数据，并将这些数据显示在页面中\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch6\u003e主页面\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (window.Worker) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar\n        worker = new Worker(\"213.js\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003eworker.postMessage(''); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eworker.onmessage = function(event) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eif (event.data != '') { \u003c/span\u003e\u003cspan class=\"p10\"\u003evar j, k, tr, td; \u003c/span\u003e\u003cspan class=\"p10\"\u003evar\n        r = event.data.split(''); \u003c/span\u003e\u003cspan class=\"p10\"\u003evar t = document.querySelector('#table'); \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003efor (let i = 0, n = r.length; i \u0026lt; n; i++) { \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003ej = parseInt(i / 10, 0); \u003c/span\u003e\u003cspan class=\"p12\"\u003ek = i % 10; \u003c/span\u003e\u003cspan class=\"p12\"\u003eif (k\n        == 0) { \u003c/span\u003e\u003cspan class=\"p14\"\u003etr = document.createElement('tr'); \u003c/span\u003e\u003cspan class=\"p14\"\u003etr.id = 'tr' +\n        j; \u003c/span\u003e\u003cspan class=\"p14\"\u003et.appendChild(tr); \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p14\"\u003etr = document.getElementById('tr' + j); \u003c/span\u003e\u003cspan\n        class=\"p12\"\u003e} \u003c/span\u003e\u003cspan class=\"p12\"\u003etd = document.createElement('td'); \u003c/span\u003e\u003cspan\n        class=\"p12\"\u003etr.appendChild(td); \u003c/span\u003e\u003cspan class=\"p12\"\u003etd.innerHTML = r[j * 10 + k]; \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e}; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\" 浏览器不支持 Web Workers!\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;table id=\"table\"\u0026gt;\u0026lt;/table\u0026gt; \u0026lt;/body\u0026gt; \u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e主线程\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eonmessage = function(e) { \u003c/span\u003e\u003cspan class=\"p2\"\u003evar intArray = new Array(200);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (let i = 0; i \u0026lt; 200; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eintArray[i] =\n        parseInt(Math.random() * 200); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar worker; \u003c/span\u003e\u003cspan class=\"p2\"\u003eworker = new Worker('413.js'); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eworker.postMessage(JSON.stringify(intArray)); \u003c/span\u003e\u003cspan class=\"p2\"\u003eworker.onmessage =\n        function(event) { \u003c/span\u003e\u003cspan class=\"p4\"\u003epostMessage(event.data); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} }\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e子线程\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eonmessage = function(event) { \u003c/span\u003e\u003cspan class=\"p2\"\u003evar intArray =\n        JSON.parse(event.data); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar r = ''; \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (let i = 0, n =\n        intArray.length; i \u0026lt; n; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (parseInt(intArray[i]) % 3 == 0) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (r != '') { \u003c/span\u003e\u003cspan class=\"p8\"\u003er += \"\"; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003er\n        += intArray[i]; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003epostMessage(r);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eclose(); }\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 线程","title":"并发"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","线程","并发"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
