    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eCSS 表格属性\u003c/h5\u003e\n\u003cp\u003etext-align 因为可继承，所以它可以在 \u0026lt;table\u0026gt; 、 \u0026lt;tr\u0026gt; 或 \u0026lt;td\u0026gt; 这 3 个标签中任意一个中设置，对单元格中内容的作用都是一样的；但 vertical-align\n    属性则不能从 \u0026lt;table\u0026gt; 标签中继承，但可以从 \u0026lt;tr\u0026gt; 标签中继承，所以只能出现在 \u0026lt;tr\u0026gt; 标签和 \u0026lt;td\u0026gt; 标签中。\u003c/p\u003e\n\u003cp\u003evertical-align 属性用于设置单元格中内容的垂直对齐方式，跟网页中插入的图像的垂直对齐设置很类似，但单元格的垂直对齐方式没有图像的那么多。\u003c/p\u003e\n\u003ch5\u003e单元格属性\u003c/h5\u003e\n\u003ch6\u003e让表格没有凹凸感\u003c/h6\u003e\n\u003cp\u003ecellspacing 就是 td 和 td 之间的间距， cellpadding 属性用来指定单元格内容与单元格边界之间的空白距离的大小。\u003c/p\u003e\n\u003ch6\u003e控制表格大小\u003c/h6\u003e\n\u003cp\u003e当没有指定表格宽度时，表格的大小及其各个单元格将会自动扩展，以适应放入其中的数据。不过，可以通过为 \u0026lt;table\u0026gt; 元素定义 CSS width 属性，来控制整个表格的宽度。也可以通过给 \u0026lt;td\u0026gt;\n    元素的 CSS width 属性，定义每个单元格的宽度。可以把 width 属性指定为像素、\"字母 m 的宽度\"（ em ）或百分比。\u003c/p\u003e\n\u003ch6\u003e表格内的对齐\u003c/h6\u003e\n\u003cp\u003e表格垂直对齐 vertical-align 样式属性值： top 、 middle 、 bottom 、 text-top 、 text-bottom 和 baseline （用于文本）。\u003c/p\u003e\n\u003ch6\u003e制作不规则的表格\u003c/h6\u003e\n\u003cp\u003e跨越（ spanning ）是强制一个单元格横跨表格的多行或多列的过程。 colspan 属性导致单元格横跨多列； rowspan 属性则对行产生相同的效果。\u003c/p\u003e\n\u003ch6\u003e设置表格边框\u003c/h6\u003e\n\u003cp\u003e通过 table 的 border 属性可以规定表格单元周围是否显示边框。 border 值为 1 表示应该显示边框，且表格不用于设计目的。\u003c/p\u003e\n\u003ch6\u003e跨单元格显示\u003c/h6\u003e\n\u003cp\u003ecolspan 和 rowspan 属性分别用来定义单元格可跨行或跨列显示。\u003c/p\u003e\n\u003ch6\u003e表头单元格\u003c/h6\u003e\n\u003cp\u003e使用 scope 属性可以将单元格与表头单元格联系起来\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003erow 把该行所有的单元格与表头单元格联系起来\u003c/li\u003e\n    \u003cli\u003ecol 将当列所有的单元格与表头联系起来\u003c/li\u003e\n    \u003cli\u003erowgroup 将单元格所在的行组（由 \u0026lt;thead\u0026gt;\u0026lt;tbody\u0026gt;\u0026lt;tfoot\u0026gt; 标签定义）和表头绑定起来\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;table border=\"1\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;tr\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u0026lt;th\u0026gt;\u0026lt;/th\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;th scope=\"col\"\u0026gt;月份\u0026lt;/th\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u0026lt;th scope=\"col\"\u0026gt;金额\u0026lt;/th\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;/tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;td\n        scope=\"row\"\u0026gt;1\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;td\u0026gt;9\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u0026lt;td\u0026gt;100.02\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/tr\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;td scope=\"row\"\u0026gt;\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u0026lt;td\u0026gt;4\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;td\u0026gt;10.25\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;/tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/table\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e绑定表头\u003c/h6\u003e\n\u003cp\u003e使用 header 属性可以为单元格指定表头，该属性是一个表头名称的字符串。这些名称用 id 属性定义的不同的表头单元格的名称。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;table border=\"1\" width=\"100%\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;tr\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;th id=\"name\"\u0026gt;姓名\u0026lt;/th\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;th\n        id=\"Email\"\u0026gt;电子邮箱\u0026lt;/th\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;th id=\"Phone\"\u0026gt;电话\u0026lt;/th\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;th id=\"Address\"\u0026gt;地址\u0026lt;/th\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/tr\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;td headers=\"name\"\u0026gt;张三\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;td headers=\"Email\"\u0026gt;zhangsan@163.com\u0026lt;/td\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;td headers=\"Phone\"\u0026gt;13522228888\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;td\n        headers=\"Address\"\u0026gt;北京长安街38号\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/tr\u0026gt; \u0026lt;/table\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e单元格分类\u003c/h6\u003e\n\u003cp\u003e使用 axis 属性对单元格进行分类，用于相关信息进行的组合。在一个大型的数据表中往往塞满了数据，通过使用 axis 分类，浏览器可快速检索特定信息。\u003c/p\u003e\n\u003ch6\u003e信息缩写\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;table border=\"1\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;tr\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;th\u0026gt;名称\u0026lt;/th\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;th\u0026gt;说明\u0026lt;/th\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;tr\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;td abbr=\"HTML\"\u0026gt;HyperText Markup Language\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;td\u0026gt;超级文本标记语言\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;tr\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;td abbr=\"CSS\"\u0026gt;Cascading Style Sheets\u0026lt;/td\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;td\u0026gt;层叠样式表\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/tr\u0026gt; \u0026lt;/table\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e表格各元素的 display 属性值\u003c/h5\u003e\n\u003cp\u003edisplay 属性可以设置标签作为一个盒子的类型。从盒子类型的角度来说，表格是一个特殊的对象，因为其中包含的每个标签对应不同类型的盒子。标签的 display 属性取不同的值，决定了盒子具有不同的类型。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003e表格各个标签的 display 属性设置\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003ccolgroup width=\"25%\"\u003e\u003c/colgroup\u003e\n        \u003ccolgroup\u003e\u003c/colgroup\u003e\n        \u003ccolgroup\u003e\u003c/colgroup\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003edisplay:table-caption 和 display:table-cell 这两个属性比较特殊，在于它们都能触发标签的 BFC 。\u003c/p\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        [' 标签 ', 'display 属性设置 ', ' 描述 '],\n        ['\u0026lt;table\u003e', 'display: table', ' 块级表格显示，   表格前后带有换行符 '],\n        ['\u0026lt;caption\u003e', 'display: table - caption', ' 表格标题显示 '],\n        ['\u0026lt;thead\u003e', 'display: table - header - group', ' 分组 '],\n        ['\u0026lt;tbody\u003e', 'display: table - row - group', ' 分组 '],\n        ['\u0026lt;tfoot\u003e', 'display: table - footer - group', ' 分组 '],\n        ['\u0026lt;tr\u003e', 'display: table - row', ' 表格行显示 '],\n        ['\u0026lt;th\u003e、\u0026lt;td\u003e', 'display: table - cell', ' 单元格 '],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 表格","title":"属性"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","表格","属性"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
