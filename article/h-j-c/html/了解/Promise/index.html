class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>Promise</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eJavaScript Promise\u003c/h5\u003e\n\u003cp\u003ePromise 指一种抽象的异步处理工作，其核心概念为 “确保在一件事完成之后，再做另一件事”。\u003c/p\u003e\n\u003ch5\u003e基础\u003c/h5\u003e\n\u003cp\u003ePromise 规范的内容不多，简单描述如下：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e一个 promise 有三种状态：等待（pending）、已完成（fulfilled）、已拒绝（rejected）。\u003c/li\u003e\n    \u003cli\u003e一个 promise 对象只能从“等待”转到“完成”或者“拒绝”状态，不能逆转，同时“完成”和“拒绝状态不能相互转换”。\u003c/li\u003e\n    \u003cli\u003epromise 必须使用 then() 方法。 then() 方法是 promise 的核心，而且 then 必须返回一个 promise 。同时，一个 promise 的 then\n        可以调用多次，并且回调函数的执行顺序和他们被定义时是一样的。\u003c/li\u003e\n    \u003cli\u003ethen() 方法接受两个参数， 1 个是成功的回调；另一个是失败的回调。同时， then 接受一个 promise 的传入，也接受一个 “类 then ”的对象和方法，即 thenable 对象。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e创建 promise 对象\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar promise = new Promise(function(resolve, reject) { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*\n        做一些事情 */ \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (true) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eresolve('一切正常'); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n        else { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereject(Error(\"处理失败\")); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e});\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003ePromise 类的构造函数有一个参数，参数作为回调函数。该参数又有两个参数，参数值为两个回调函数。\u003c/p\u003e\n\u003cp\u003e跟传统的 throw 一样，在调用 reject 时使用一个 Error 对象的这种方法只是习惯，而非必须。使用 Error 对象的好处就是他可以捕捉到一个错误堆栈，从而使调试工具变得更加有利。\u003c/p\u003e\n\u003cp\u003epromise 有一个 then() 方法（这字眼好像在哪见过...）...：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e/* 只指定成功 */ \u003c/span\u003e\u003cspan class=\"p2\"\u003epromise.then(function(result) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003elocation.hash += result; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e/* 只指定失败 */\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003epromise.then(function(error) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003elocation.hash += err; \u003c/span\u003e\u003cspan class=\"p2\"\u003e});\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e使用 then\u003c/h5\u003e\n\u003cp\u003ethen 是可以链式使用，连续运行附加的异步操作：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction CreateXMLHTTP() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (window.ActiveXObject) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar objXmlHttp = new ActiveXObject(\"Microsoft.XMLHTTP\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (window.XMLHttpRequest) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar objXmlHttp = new XMLHttpRequest(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ealert(\"不能够初始化XMLHTTP对象！\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ereturn objXmlHttp; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e function read() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar fileName = \"user.json\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        promise = new Promise(function(resolve, reject) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar objXmlHttp =\n        CreateXMLHTTP(); \u003c/span\u003e\u003cspan class=\"p6\"\u003eobjXmlHttp.open(\"GET\", fileName, true); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eobjXmlHttp.onreadystatechange = function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (objXmlHttp.readyState\n        == 4) { \u003c/span\u003e\u003cspan class=\"p10\"\u003eif (objXmlHttp.status == 200) { \u003c/span\u003e\u003cspan\n        class=\"p12\"\u003eresolve(objXmlHttp.responseText); \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003e} else \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003ereject(); \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eobjXmlHttp.send(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003epromise.then(function(response) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn JSON.parse(response); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}, \u003c/span\u003e\u003cspan class=\"p6\"\u003efunction() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ealert(\"读取失败\"); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e}).then(function(obj) { \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.getElementById(\"user\").value = obj.user;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.getElementById(\"password\").value = obj.password; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e列对化异步操作\u003c/h6\u003e\n\u003cp\u003e通过链式操作，调用 promise 对象的 then 方法可以实现列队的异步操作。当一个 then 方法的回调函数参数返回时，如果是一个值，下一个 then 则被立即调用，并且返回该值。然而，如果 then()\n    方法的回调参数返回一个 promise 对象，下一个 then() 方法将会对其等待，直到这个 promise 函数参数的处理结果确定后才被调用：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction CreateXMLHTTP() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (window.ActiveXObject) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar objXmlHttp = new ActiveXObject(\"Microsoft.XMLHTTP\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (window.XMLHttpRequest) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar objXmlHttp = new XMLHttpRequest(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ealert(\"不能够初始化XMLHTTP对象！\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ereturn objXmlHttp; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e function getData(fileName) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn new Promise(function(resolve,\n        reject) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar objXmlHttp = CreateXMLHTTP(); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eobjXmlHttp.open(\"GET\", fileName, true); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eobjXmlHttp.onreadystatechange = function() { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eif (objXmlHttp.readyState == 4) { \u003c/span\u003e\u003cspan class=\"p10\"\u003eif (objXmlHttp.status == 200) {\n    \u003c/span\u003e\u003cspan class=\"p12\"\u003eallData += objXmlHttp.responseText + \"\u0026lt;br/\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p12\"\u003eresolve();\n    \u003c/span\u003e\u003cspan class=\"p10\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003ealert(\"读取文件失败\"); \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eobjXmlHttp.send(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e function read() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eallData = \"\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003egetData(\"1.txt\").then(function() { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ereturn getData(\"2.txt\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}).then(function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        getData(\"3.txt\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}).then(function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar result = document.getElementById(\"result\");\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eresult.innerHTML = allData; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e异常处理\u003c/h5\u003e\n\u003cp\u003e可以使用 catch() 来捕捉 Promise 构造函数的参数值中抛出的异常。\u003c/p\u003e\n\u003cp\u003e针对 then(func1,func2) 来说，只会出发其中一个回调函数，而 then(func1).catch(func2) 来说，两个都会被调用。\u003c/p\u003e\n\u003cp\u003epromise 对象的否定回调函数可以通过 promise.reject() 方法显式调用，也可以被 Promise 构造函数的参数值回调函数中抛出的异常错误隐式调用。\u003c/p\u003e\n\u003ch5\u003e创建序列\u003c/h5\u003e\n\u003cp\u003e在使用 promise 对象序列时，需要用到 Promise 类的静态方法 resole() 。该方法最多可以拥有一个参数，当参数值为 promise 时，resolve() 方法传入的 promise 对象复制一个新的\n    promise 对象；如果传入其他的任何值，resolve() 方法将创建一个以这个值为肯定结果的 promise 对象；如果不指定参数值，将创建一个以 undefined 为肯结果的 promise 对象。\u003c/p\u003e\n\u003cp\u003ePromise 类存在一个最多可使用一个参数的 resolve() 静态方法，该方法创建一个 promise() 对象，该对象使用传入参数作为否定结果。如果不指定参数值，则创建一个 undefined 为否定的 promise\n    对象：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar result = document.getElementById(\"result\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar file =\n        document.getElementById(\"file\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar allData = \"\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003e function\n        getData(file) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn new Promise(function(resolve, reject) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar reader = new FileReader(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e // 将文件以文本形式进行读入页面\n        \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p6\"\u003ereader.readAsText(file); \u003c/span\u003e\u003cspan class=\"p6\"\u003ereader.onload = function(f)\n        { \u003c/span\u003e\u003cspan class=\"p8\"\u003eallData += this.result + \"\u0026lt;br/\u0026gt;\"; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eresolve(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003ereader.onerror = function() {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003ereject(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e function get(file) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn getData(file).catch(function(err) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\"读取文件失败\");\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ethrow err; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\n        function getSequence() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar files = []; \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i = 0; i \u0026lt;\n        document.getElementById(\"file\").files.length; i++) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003efiles.push(document.getElementById(\"file\").files[i]); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar sequence = Promise.resolve(); \u003c/span\u003e\u003cspan class=\"p4\"\u003efiles.forEach(function(file) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003esequence = sequence.then(function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn get(file);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e}); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn sequence; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u003cspan class=\"r\"\u003e // 将文件以文本形式进行读入页面 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction read() { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ePromise.resolve().then(function() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn getSequence(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}).then(function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar\n        result = document.getElementById(\"result\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003eresult.innerHTML = allData; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e}).catch(function() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log(\"读取文件发生错误\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e并行处理\u003c/h5\u003e\n\u003cp\u003epromise 的 all() 方法可以实现多个异步处理：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ePromise.all(arrayOfPromise).then(function(arrayOfRequests) { /* some code */ });\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e例\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction CreateXMLHTTP() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (window.ActiveXObject) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar objXmlHttp = new ActiveXObject(\"Microsoft.XMLHTTP\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (window.XMLHttpRequest) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar objXmlHttp = new XMLHttpRequest(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ealert(\"Can't intialize XMLHTTP object！\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn objXmlHttp; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e function getData(fileName) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn new\n        Promise(function(resolve, reject) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar objXmlHttp = CreateXMLHTTP(); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eobjXmlHttp.open(\"GET\", fileName, true); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eobjXmlHttp.onreadystatechange = function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (objXmlHttp.readyState\n        == 4) { \u003c/span\u003e\u003cspan class=\"p10\"\u003eif (objXmlHttp.status == 200) { \u003c/span\u003e\u003cspan\n        class=\"p12\"\u003eresolve(objXmlHttp.responseText); \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003ereject(); \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eobjXmlHttp.send(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e function read() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ePromise.all([getData(\"1.txt\"), getData(\"2.txt\"), getData(\"3.txt\")]) \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e.then(function(responses) { \u003c/span\u003e\u003cspan class=\"p8\"\u003evar result =\n        document.getElementById(\"result\"); \u003c/span\u003e\u003cspan class=\"p8\"\u003eresponses.forEach(function(response) { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003eresult.innerHTML += response + \"\u0026lt;br/\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p8\"\u003e}); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e}, function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ealert(\"读取文件失败\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e}); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在 getData 函数中创建返回的 Promise 对象。如果其中有任何一个对象返回否定的结果，那么都将触发 error 。 \u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e HTML 5 还提供了一个 Promise.race() 方法，该方法同样以一个 Promise 对象数组作为参数，但是数组中任何元素返回肯定结果时，Promise.race() 方法立即返回\n        肯定结果；或全部返回否定结果时，立即返回否定结果。\u003c/p\u003e\n\u003c/div\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 了解","title":"Promise"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","了解","Promise"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
