    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e到目前为止，在鼠标指针锁定 API 时，需要在锁定目标之前，首先将目标元素设定为全屏模式，将来可能会取消这个限制。\u003c/p\u003e\n\u003ch5\u003e锁定鼠标指针 API \u003c/h5\u003e\n\u003cp\u003e鼠标锁定 API 新增了一个 requestPointerLock() 方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ee.WebkitRequestPointerLock(); \u003c/span\u003e\u003cspan class=\"p2\"\u003ee.mozRequestPointerLock();\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e锁定鼠标指针 API 处理是一种异步处理方法，鼠标指针锁定 API 通过 pointerlockchange 和 pointerlockerror 事件来通知脚本程序锁定鼠标指针的请求是否成功。\u003c/p\u003e\n\u003cp\u003e鼠标指针锁定 API 同时扩展了 DOcument 接口，新增了 document 对象的 pointerLockElement 属性和 exitPointerLock() 方法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eif (document.mozPointerLockElement === pointerlockElement || \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edocument.WebkitPointerLockElement === pointerlockElement) { \u003c/span\u003e\u003cspan class=\"p4\"\u003elocation.hash\n        += '鼠标已锁定' \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003elocation.hash += '鼠标可自由活动' \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e元素的 exitPointerLock() 可以取消鼠标的锁定，因为是一种异步方法，取消成功将触发 pointerlockchange 事件，取消锁定失败将触发 pointerlockerror 事件：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar pointerLockElement; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar result =\n        document.getElementById(\"result\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.addEventListener(\"mousemove\",\n        function(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar movementX = e.movementX || e.mozMovementX || e.webkitMovementX ||\n        0; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar movementY = e.movementY || e.mozMovementY || e.webkitMovementY || 0; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u003cspan class=\"r\"\u003e // 输出鼠标指针移动信息 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(\"movementX=\" +\n        movementX + \"，movementY=\" + movementY); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}, false); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e function fullscreenChange() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (document.webkitFullscreenElement ===\n        pointerLockElement || \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.mozFullscreenElement === pointerLockElement ||\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.mozFullScreenElement === pointerLockElement) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e // 元素已处于全屏状态，现在我们可以请求锁定鼠标指针 \u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003epointerLockElement.requestPointerLock = pointerLockElement.requestPointerLock || \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003epointerLockElement.mozRequestPointerLock || \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003epointerLockElement.webkitRequestPointerLock; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003epointerLockElement.requestPointerLock(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.addEventListener('fullscreenchange', fullscreenChange, false); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.addEventListener('mozfullscreenchange', fullscreenChange, false); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.addEventListener('webkitfullscreenchange', fullscreenChange, false); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e function pointerLockChange() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (document.mozPointerLockElement === pointerLockElement || \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.webkitPointerLockElement === pointerLockElement) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003econsole.log(\"成功锁定鼠标指针\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log(\"鼠标指针已被停止锁定\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.addEventListener('pointerlockchange', pointerLockChange, false); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.addEventListener('mozpointerlockchange', pointerLockChange, false); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.addEventListener('webkitpointerlockchange', pointerLockChange, false); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e function pointerLockError() { \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(\"鼠标指针定时出现错误\"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.addEventListener('pointerlockerror', pointerLockError, false); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.addEventListener('mozpointerlockerror', pointerLockError, false); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.addEventListener('webkitpointerlockerror', pointerLockError, false); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e function lockPointer() { \u003c/span\u003e\u003cspan class=\"p4\"\u003epointerLockElement =\n        document.getElementById(\"pointer-lock-element\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e //\n            将id为pointer-lock-element的元素设为全屏状态 \u003c/span\u003e \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e // 目前为止在针对某个元素锁定鼠标指针之前首先要将该元素设为全屏状态 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan\n            class=\"r\"\u003e // 未来可能会取消该限定 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003epointerLockElement.requestFullscreen =\n        p
