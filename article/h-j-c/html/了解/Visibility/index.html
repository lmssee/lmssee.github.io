    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003ePAge Visibility API\u003c/h5\u003e\n\u003cp\u003eHTML 5 新增了 Page Visibility API ,即页面的可见性 API 。应用该 API 后，在浏览器只有当前激活的页面处于工作状态，其他隐藏的页面暂停工作，以避免不必要的计算，耗费系统资源。\u003c/p\u003e\n\u003ch5\u003e基础\u003c/h5\u003e\n\u003cp\u003ePage Visibility API 是一个简单的 API ，它包含两个属性和一个事件：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003edocument.hidden ： 布尔值，表示页面是否隐藏\u003c/li\u003e\n    \u003cli\u003edocument.visibilityState ： 表示当前页面可见状态：\n        \u003cul\u003e\n            \u003cli\u003ehidden ： 页面在后台标签页中，或者浏览器最小化\u003c/li\u003e\n            \u003cli\u003evisible ： 页面在前台标签中\u003c/li\u003e\n            \u003cli\u003eprerender ： 页面在屏幕外执行渲染处理，document.hidden 的值为 true\u003c/li\u003e\n            \u003cli\u003eunloaded ； 页面正在从内存中卸载\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003evisibilitychange 事件 ： 当文档的可见发生改变\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e监听 visibilitychange 事件\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003edocument.addEventListener('visibilitychange', function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003elet\n        isHidden = document.hidden; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (isHidden) { \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.title = 'i\n        am hidden'; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e // 动画停止 \u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e // 服务器轮询停止 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.title = 'i am alive'; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e // 动画开始 \u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e // 服务器轮询开始 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u
