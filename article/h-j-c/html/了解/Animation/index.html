                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003erequestAnimation API\u003c/h5\u003e\n\u003cp\u003ewindow.requestAnimationFrame() 方法用来页面重绘之前，通知浏览器调用指定的函数，以满足开发者的需求。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e如果想得到连贯的逐帧动画，函数中必须重新调用 requestAnimationFrame() 。\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003erequestID = window.requestAnimationFrame(callback); \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*\n        Firefox 23 / IE 10 / Chrome / Safari */ \u003c/span\u003e\u003cspan class=\"p2\"\u003erequestID =\n        window.mozRequestAnimationFrame(callback); \u003c/span\u003e\u003cspan class=\"p2\"\u003e/* Firefox \u0026lt; 23 */ \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003erequestID = window.webkitRequestAnimationFrame(callback); \u003c/span\u003e\u003cspan class=\"p2\"\u003e/* Old\n        versions Chromes / webkit */\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003ecallback : 每次重新绘制，都会调用这个回调函数。这个回调函数会收到一个参数，这个 DOMHighResTimeStamp 类型的参数指示当前时间距离开始触发 requestAnimationFrame de\n    回调函数的时间。\u003c/p\u003e\n\u003cp\u003e返回值 requestId 是一个长整型的非零数值。作为一个唯一的标识符，可以将该值传递给 window.cancelAnimationFrame() 来取消这个回调函数。\u003c/p\u003e\n\u003ch6\u003e优势\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e经过浏览器优化，动画更流畅\u003c/li\u003e\n    \u003cli\u003e窗口没激活时，动画将停止，节省计算资源\u003c/li\u003e\n    \u003cli\u003e更省电，尤其对移动端\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction animation() { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/* some any code */ \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003erequestAnimationFrame(animation); \u003c/span\u003e\u003cspan class=\"p4\"\u003e/* some animation code */ \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/* request animation */ \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003erequestAnimationFrame(animation);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e有时候需要控制，就需要句柄：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet globalID; \u003c/span\u003e\u003cspan class=\"p2\"\u003e function animation() { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*\n        some any code */ \u003c/span\u003e\u003cspan class=\"p4\"\u003eglobalID = requestAnimationFrame(animation);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e/* some animation code */ \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/* request animation */ \u003c/span\u003e\u003cspan class=\"p2\"\u003eglobalID =\n        requestAnimationFrame(animation); \u003c/span\u003e\u003cspan class=\"p2\"\u003e/* stop */ \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ecancelAnimationFrame(globalID);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e例 1\u003c/h6\u003e\n\u003cp\u003e初始 div 宽度为 1 px，在 step() 函数中将进度加 1 ，然后更新到 div 宽度上，在进度达到 100 之前，一直重复这个过程：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ewindow.requestAnimationFrame = window.requestAnimationFrame || \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ewindow.mozRequestAnimationFrame || \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.webkitRequestAnimationFrame ||\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.msRequestAnimationFrame; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar start = null; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar ele = document.getElementById(\"test\");\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar progress = 0; \u003c/span\u003e\u003cspan class=\"p2\"\u003e function step(timestamp) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eprogress += 1; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eele.style.width = progress + \"%\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eele.innerHTML = progress + \"%\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (progress \u0026lt; 100) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003erequestAnimationFrame(step); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003erequestAnimationFrame(step); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.getElementById(\"run\").addEventListener(\"click\", function() { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eele.style.width = \"1px\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003eprogress = 0; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003erequestAnimationFrame(step); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}, false);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e例 2\u003c/h6\u003e\n\u003cp\u003e首先在页面中插入一个 \u0026lt;canvas id=\"motion\"\u0026gt; 标签；然后设计一块画布，在画布上随机生成一个圆点，颜色、运动方向随机；接着从画布中央随机向四周运动，同时逐步增大半径；最后调用\n    requestAnimationFrame() 方法，传递回调函数生成 animate() ，从而设计随机粒子放射运动的效果。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e(function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003e'use strict'; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        vendors = ['webkit', 'moz']; \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i = 0; i \u0026lt; vendors.length \u0026\u0026\n        !window.requestAnimationFrame; ++i) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar vp = vendors[i]; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ewindow.requestAnimationFrame = window[vp + 'RequestAnimationFrame']; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ewindow.cancelAnimationFrame = (window[vp + 'CancelAnimationFrame'] || \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ewindow[vp + 'CancelRequestAnimationFrame']); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (/iP(ad|hone|od).*OS 6/.test(window.navigator.userAgent) \u003cs
