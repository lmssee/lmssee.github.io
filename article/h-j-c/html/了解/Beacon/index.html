    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eBeacon API\u003c/h5\u003e\n\u003cp\u003eBeacon API 主要用于发送不需要服务器回应的 HTTP 请求，或强制浏览器发送请求。\u003c/p\u003e\n\u003cp\u003eBeacon API 为 navigator 对象提供了一个 sendBeacon()\n    方法，该方法将数据放入一个列队中，当前页面如果被关闭将立即发送数据，这个数据发送动作不会减慢页面的跳转速度。当数据放入列队成功后，该方法返回 true ，否则返回 false 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003enavigator.sendBeacon(url,data);\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eurl ： 接收数据的服务器地址\u003c/li\u003e\n    \u003cli\u003edata ： 被发送的数据，可以是一个 ArrayBufferView 对象、一个 Blob 、一个 FormData 对象或一个字符串。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e其他\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003esendBeacon 只能用 post 请求发来的信息\u003c/li\u003e\n    \u003cli\u003eSendBeacon 的第 2 个参数是可选的。如果提供的话，参数类型可以是 ArrayBufferView、Blob、DOMString、FormData\u003c/li\u003e\n    \u003cli\u003esendBeacon 所收到的 HTTP 回应应被无视\u003c/li\u003e\n    \u003cli\u003esendBeacon 是有返回值的，类型为 bool。如果返回值为 true ，表示浏览器已经将这个请求纳入列队，稍后处理；如果返回值是 false ，表示浏览器无法完成这个请求，其原因不详，不过通常来说就是\n        HTTP 请求列队已满。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ewindow.addEventListener('unload', logData, false); \u003c/span\u003e\u003cspan class=\"p2\"\u003e function\n        logData() { \u003c/span\u003e\u003cspan class=\"p4\"\u003enavigation.sendBeacon('/log', analyticsData); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 了解","title":"Beacon"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","了解","Beacon"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
