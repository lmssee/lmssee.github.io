class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>Mutation</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eMutation Observer\u003c/h5\u003e\n\u003cp\u003eMutation Observer 表示变动观察器，监视 DOM 变化的接口。当 DOM 对象树发生变化时，Mutation Observer 会接到通知。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e事件是同步触发的，也就是说 DOM 发生变动会立即触发相应的事件\u003c/li\u003e\n    \u003cli\u003eMutation Observer 是异步触发的，DOM 触发后，必不会马上触发而是要等到当前所有的 DOM 操作完毕才会触发。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eMutation Observer 具有以下特点：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e等待所有的脚本任务完毕后，才会运动，而且只触发一次\u003c/li\u003e\n    \u003cli\u003e把 DOM 变动记录成一个数组，而不是一条条的个别处理 DOM 变动\u003c/li\u003e\n    \u003cli\u003e可以观察发生在 DOM 节点的变动，也可以观察某一类变动\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e支持检测\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar MutationObserver = window.MutationObserver || \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ewindow.WebkitMutationObserver || \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidow.MozMutationObserver; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003evar MutationObserverSupport = !!MutationObserver;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e使用步骤\u003c/h5\u003e\n\u003ch6\u003e创建实例\u003c/h6\u003e\n\u003cp\u003e使用 MutationObserver() 构造函数，新建一个实例，同时指定这个实例的回调函数：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar observer = new MutationObserver(callback); \u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e指定观测对象\u003c/h6\u003e\n\u003cp\u003e使用 observe() 方法指定要观察的 DOM 元素，以及要观察的特定待动：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar article = document.querySelector('article'); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar options\n        = { \u003c/span\u003e\u003cspan class=\"p4\"\u003e'childList': true, \u003c/span\u003e\u003cspan class=\"p4\"\u003e'attributes': true \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eobserver.observer(article, options);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eMutationObserver 所观察的 DOM 变动，包含下列类型，设置为布尔型：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003echildList　：子元素的变化\u003c/li\u003e\n    \u003cli\u003eattributes ： 属性的变动\u003c/li\u003e\n    \u003cli\u003echaracterData ：节点内容或节点文本的变动\u003c/li\u003e\n    \u003cli\u003eattributeOldValue ： 若设置为 true ，则表示需要记录变动前的属性值\u003c/li\u003e\n    \u003cli\u003echaracterDataOldValue ： 如果设置为 true ，则表示需要记录变动前的数据值值\u003c/li\u003e\n    \u003cli\u003eattributeFilter ： 值为一个数组，表示要观察的特定属性，如 ['class','str']\u003c/li\u003e\n    \u003cli\u003esubtree ： 所有下属节点（包括子节点和子节点的子节点）的变动\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e停止观察\u003c/h6\u003e\n\u003cp\u003e使用 disconnect() 方法停止观察：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eobserve.disconnect()\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e清除记录\u003c/h6\u003e\n\u003cp\u003e使用 takeRecord() 方法清除变动记录，即不再处理未变动的变动。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eDOM 每一次变动，就会产生一个变动记录。该记录对应一个 MutationRecord 对象，该对象包含了与变动相关的所有信息。Mutation Observer 进行处理的一个个变动对象所组成的数组。\u003c/p\u003e\n\u003c/div\u003e\n\u003cul\u003e\n    \u003cli\u003etype ： 观察变动的类型，如 ： attribute、characterData 、childList\u003c/li\u003e\n    \u003cli\u003etarget ： 发生变动的 DOM 对象\u003c/li\u003e\n    \u003cli\u003eaddedNodes ： 新增的 DOM 节点\u003c/li\u003e\n    \u003cli\u003eremoveNodes ： 删除的 DOM 节点\u003c/li\u003e\n    \u003cli\u003epreviousSibling ： 前一个同级 DOM 对象，如果没有则返回 null \u003c/li\u003e\n    \u003cli\u003enextSibling ：下一个同级的 DOM 对象，如果没有则返回 null \u003c/li\u003e\n    \u003cli\u003eattributeName ： 发生变动的属性。如果设置了 attributeFilter ，则只返回指定的属性\u003c/li\u003e\n    \u003cli\u003eoldValue ： 变动前的值。这个属性只对 attribute 和 characterData 变动有效；如果发生 childList 变动，则返回 null 。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e触发事件\u003c/h6\u003e\n\u003cp\u003e使用 MutationObserver 对象时可能触发的各种事件必须设定 MutationObserver 选项值说明：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eDOMAttrModified : attributes : true ( , attributeOldValue : true )(, attributeFilter:[\"attributeName\"])\u003c/li\u003e\n    \u003cli\u003eDOMAttributeNameChanged : attributes : true (, attributeOldValue : true)(, attributeFilter :\n        [\"attributeName\"])\u003c/li\u003e\n    \u003cli\u003eDOMCharacterDataModified : characterData : true (,characterDataOldValue : rue)\u003c/li\u003e\n    \u003cli\u003eDOMNodeInserted : childList : true( , subtree : true)\u003c/li\u003e\n    \u003cli\u003eDOMNodeInsertedInfoDocument : childList : true( , subtree : true)\u003c/li\u003e\n    \u003cli\u003eDOMNodeRemoved : childList :true (,subtree : true)\u003c/li\u003e\n    \u003cli\u003eDOMNodeRemovedFormDocument : childList : true( , subtree : true)\u003c/li\u003e\n    \u003cli\u003eDOMSubtreeModified : childList : true, subtree : true\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e案例 1\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;div id=\"div\" style=\"height:\n        100px;width:100%;background-color:pink;\"\u0026gt;\u0026lt;/div\u0026gt; \u0026lt;input type=\"button\" value=\"插入span元素\"\n        onclick=\"changeDiv();\"\u0026gt; \u0026lt;script type=\"text/javascript\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        onchange(mutationRecords, mutationObserver) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ealert(\"检测到DOM变化\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(mutationRecords); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econsole.log(mutationObserver); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar div =\n        document.getElementById('div'); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar mo = new window.MutationObserver(onchange), \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eoptions = { \u003c/span\u003e\u003cspan class=\"p6\"\u003echildList: true \u003c/span\u003e\u003cspan class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003emo.observe(div, options); \u003c/span\u003e\u003cspan class=\"p2\"\u003e function changeDiv() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        span = document.createElement(\"span\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003espan.innerHTML = \"我是一个span元素\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003ediv.appendChild(span); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e案例2\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;a id=\"a1\" href=\"#a\"\u0026gt;链接1\u0026lt;/a\u0026gt; \u0026lt;a id=\"a2\" href=\"#b\"\u0026gt;链接2\u0026lt;/a\u0026gt;\n        \u0026lt;input type=\"button\" value=\"修改a元素\" onclick=\"changeA();\"\u0026gt; \u0026lt;script type=\"text/javascript\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction onchange(mutationRecords, mutationObserver) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efor (var i = 0; i \u0026lt; mutationRecords.length; i++) \u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log(\"修改前的\"\n        + mutationRecords[i].attributeName + \"属性为：\" + mutationRecords[i].oldValue); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a1El = document.getElementById('a1'); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar a2El = document.getElementById('a2'); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar attr = [\"href\"];\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar mo = new window.MutationObserver(onchange), \u003c/span\u003e\u003cspan class=\"p4\"\u003eoptions = {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eattributes: true, \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eattributeFilter: attr, \u003c/span\u003e\u003cspan class=\"p6\"\u003eattributeOldValue: true \u003c/span\u003e\u003cspan class=\"p4\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003emo.observe(a1El, options); \u003c/span\u003e\u003cspan class=\"p2\"\u003emo.observe(a2El,\n        options); \u003c/span\u003e\u003cspan class=\"p2\"\u003e function changeA() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ea1El.setAttribute(\"href\", \"http://www.baidu.com\"); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ea2El.setAttribute(\"href\", \"http://www.weibo.com\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n        \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 了解","title":"Mutation"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","了解","Mutation"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
