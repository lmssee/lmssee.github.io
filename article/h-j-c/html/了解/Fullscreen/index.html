    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eFullscreen API\u003c/h5\u003e\n\u003cp\u003eHTML 5 新增了一个 Fullscreen API，即全屏显示。\u003c/p\u003e\n\u003ch6\u003e基础\u003c/h6\u003e\n\u003cp\u003eFullscreen API 可以通过编程的交互向用户请求全屏显示。如果交互完成，随时可以退出全屏模式。用户可以通过 DOM 的根节点（ document.documentElement ）或某个元素的\n    requestFullscreen() 方法请求 Fullscreen API。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction launchFullscreen(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn e.requestFullscreen \u0026\u0026\n        e.requestFullscreen || \u003c/span\u003e\u003cspan class=\"p6\"\u003ee.mozRequestFullscreen \u0026\u0026 e.mozRequestFullscreen ||\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ee.msRequestFullscreen \u0026\u0026 e.msRequestFullscreen || \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ee.WebkitRequestFullscreen　 \u0026\u0026 e.WebkitRequestFullscreen; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用时，可以针对某个元素，也可以是整个页面:\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elaunchFullscreen(document.documentElement); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003elaunchFullscreen(document.querySelector('#id'));\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e取消全屏\u003c/h6\u003e\n\u003cp\u003e使用 exitFullscreen() 或 CanvelFullScreen() 方法可以取消 全屏：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction exitFullscreen() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn document.exitFullscreen\n        \u0026\u0026 document.exitFullscreen() || \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.msExitFullscreen \u0026\u0026\n        document.msExitFullscreen() || \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.mozCancelFullscreen \u0026\u0026\n        document.mozCancelFullscreen() || \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.WebkitExitFullscreen \u0026\u0026 document.WebkitExitFullscreen(); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e属性\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003edocument.fullscreenElement ： 返回正在处于全屏的元素\u003c/li\u003e\n    \u003cli\u003edocument.fullscreenEnabled : 返回一个布尔值，表示当前是否处于全屏\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet fsEn = document.fullscreenEnabled || \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.mozFullScreenEnabled ||\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.WebkitFullscreenEnabled ||\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.msFullscreenEnabled; \u003c/span\u003e\u003cspan class=\"p2\"\u003elet fsEl =\n        document.fullscreenElement || \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003edocument.mozFullScreenElement || \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.WebkitFullscreenElement;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003ecss \u003c/h6\u003e\n\u003cp\u003e在全屏模式下，大多数浏览器都支持 :full-screen 伪类，而 IE 11 支持 :fullscreen 伪类。使用这个伪类，可以对全屏状态下设置单独的 CSS 样式：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e*:-webkit-full-screen { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: auto; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e *:-moz-full-screen { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: auto; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e *:-ms-fullscreen { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ewidth: auto; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e *:fullscreen { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ewidth: auto; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e :-webkit-full-screen {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 100%; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eheight: 100%; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e事件\u003c/h6\u003e\n\u003cp\u003e当退出或是进入全屏，会触发 fullscreenchange 事件。利用该事件可以监控全屏状态的变化，以便及时做出各种页面的响应：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003edocument.addEventListener('fullscreenchange', function() { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efsState.innerHTML = (document.fullscreen) ? '全屏？' : '非全屏'; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebtnFS.value =\n        (document.fullscreen) ? '退出' : '全屏'; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}, false); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.addEventListener('mozfullscreenchange', function()\n        { \u003c/span\u003e\u003cspan class=\"p4\"\u003efsState.innerHTML = (document.mozFullscreen) ? '全屏？' : '非全屏'; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ebtnFS.value = (document.mozFullscreen) ? '退出' : '全屏'; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}, false); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.addEventListener('Webkitfullscreenchange',\n        function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003efsState.innerHTML = (document.WebkitIsFullScreen) ? '全屏？' : '非全屏';\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ebtnFS.value = (document.WebkitIsFullScreen) ? '退出' : '全屏'; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}, false);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e案例 1 \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ehtml:-moz-full-screen { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ebackground-color: #0ff; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e\n        html:-webkit-full-screen { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: #a0f; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e html:fullscreen { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: #0f0;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e div { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 100%; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u0026lt;/style\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;input type=\"button\" id=\"btnFullScreen\" value=\"全屏\" onclick=\"toggleFullscreen();\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"fullscreenState\"\u0026gt;非全屏显示\u0026lt;/div\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;script\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003elet dEl = document.documentElement; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003elet fsState = document.querySelector('#fullscreenState'); \u003c/span\u003e\u003cspan class=\"p2\"\u003elet btnFS =\n        document.querySelector('#btnFullScreen'); \u003c/span\u003e\u003cspan class=\"p2\"\u003efsState.style.height = dEl.clientHeight +\n        'px'; \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.addEventListener('fullscreenchange', function() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efsState.innerHTML = (document.fullscreen) ? '全屏？' : '非全屏'; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebtnFS.value\n        = (document.fullscreen) ? '退出' : '全屏'; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.addEventListener('mozfullscreenchange', function() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efsState.innerHTML = (document.mozFullscreen) ? '全屏？' : '非全屏'; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebtnFS.value =\n        (document.mozFullscreen) ? '退出' : '全屏'; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.addEventListener('Webkitfullscreenchange', function() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efsState.innerHTML = (document.WebkitIsFullScreen) ? '全屏？' : '非全屏'; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ebtnFS.value = (document.WebkitIsFullScreen) ? '退出' : '全屏'; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e function toggleFullscreen() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (btnFS.value == '全屏') { \u003c/span\u003e\u003cspan class=\"p6\"\u003edEl.requestFullscreen \u0026\u0026\n        dEl.requestFullscreen() || \u003c/span\u003e\u003cspan class=\"p8\"\u003edEl.mozRequestFullscreen \u0026\u0026 dEl.mozRequestFullscreen() ||\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003edEl.msRequestFullscreen \u0026\u0026 dEl.msRequestFullscreen() || \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003edEl.WebkitRequestFullscreen　 \u0026\u0026 dEl.WebkitRequestFullscreen(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.exitFullscreen \u0026\u0026 document.exitFullscreen() || \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003edocument.msExitFullscreen \u0026\u0026 document.msExitFullscreen() || \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003edocument.mozCancelFullscreen \u0026\u0026 document.mozCancelFullscreen() || \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003edocument.WebkitCancelFullscreen \u0026\u0026 document.WebkitCancelFullscreen(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e经检测：在 Edge、Chrome、Firefox、IE 能够进入全屏，Edge、Chrome、Firefox 能够按钮退出，IE 只能通过按 Esc 键退出， Safari 手机端和平板不能点击按钮进入全屏。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e例 2\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;video id=\"videoElement\" autoplay controls width=\"480\"\n        height=\"270\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;source src=\"video/chrome.webm\" type=\"video/webm\" /\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;source src=\"video/chrome.ogv\" type=\"video/ogg\" /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;source src=\"video/chrome.mp4\" type=\"video/mp4; codecs='avc1.42E01E, mp4a.40.2'\" /\u0026gt;\n        \u0026lt;/video\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar videoElement =\n        document.getElementById(\"videoElement\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e function toggleFullScreen() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (!document.mozFullScreen \u0026\u0026 !document.webkitFullScreen) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif\n        (videoElement.mozRequestFullScreen) { \u003c/span\u003e\u003cspan class=\"p8\"\u003evideoElement.mozRequestFullScreen();\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evideoElement.webkitRequestFullScreen(Element.ALLOW_KEYBOARD_INPUT); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (document.mozCancelFullScreen) {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003edocument.mozCancelFullScreen(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003edocument.webkitCancelFullScreen(); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.addEventListener(\"keydown\", function(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (e.keyCode == 13) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003etoggleFullScreen(); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false); \u0026lt;/script\u0026gt; \u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ 了解","title":"Fullscreen"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","了解","Fullscreen"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
