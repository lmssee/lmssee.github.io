class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>API</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                             td{
                              border: .5px dotted  var(--mi-uni-background-color);
                            }
                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e\u003csmall\u003e浏览器可以有很多不同大小限制的缓存数据（有些浏览器允许 5M 的缓存数据）\u003c/small\u003e。\u003c/p\u003e\n\u003ch5\u003eJavaScript 接口实现\u003c/h5\u003e\n\u003cp\u003eApplicationCache API 是一个操作应用缓存的接口，新的 window.applicationCache 对象可触发一系列与缓存状态相关的事件。该对象有一个数值型属性\n    window.applicationCache.status ，它代表了缓存的状态。缓存状态共有 6 种。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eapplicationCache 对象的状态值\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003eStatus 值\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e目前，互联网上大部分的页面都没有指定缓存清单，所以这些页面的状态就是 UNCACHED （未缓存）。 IDLE\n    （空闲）是带有缓存清单的应用程序的典型状态。处于空闲状态说明应用程序的所有资源都已被浏览器缓存，当前不需要更新。如果缓存曾经有效，但现在 manifest 文件丢失，则缓存进入 OBSOLETE\n    （过期）状态。对于上述各种状态， API 包含了与之对应的事件和回调特性。\u003c/p\u003e\n\u003ctable id=\"Ab\"\u003e\n    \u003ccaption\u003e缓存事件说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e事件\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e此外，没有可用更新或者发生错误时，还有一些表示更新状态的事件： onerror 、 onnoupdate 和 onprogress 。\u003c/p\u003e\n\u003cp\u003ewindow.applicationCache 有一个 update() 方法，调用 update() 方法会请求浏览器更新缓存。包括检查新版本的 manifest\n    文件并下载必要的新资源。如果没有缓存或者缓存已过期，则会抛出错误。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 返回应用于当前 window 对象文档的 ApplicationCache\n            对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ecache = window.applicationCache \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            返回应用于当前 shared worker 的 ApplicationCache 对象 [shared worker] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ecache = self.applicationCache \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 返回当前应用的缓存状态， status 有 6 种无符号短整型值的状态，说明如表 8.2 所示\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ecache.status \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 调用当前应用资源下载过程\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ecache.update() \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            更新到最新的缓存，该方法不会使之前加载的资源突然被重新加载\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ecache.swapCache()\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e调用 swapCache() 方法，图片不会重新加载，样式和脚本也不会重新渲染或解析，唯一的变化是在此之后发出请求页面的资源是最新的， applicationCache 对象和缓存宿主的关系是一一对应的， window 对象的\n    applicationCache 属性会返回关联 window 对象的活动文档的 applicationCache 对象。在获取 status 属性时，它返回当前 applicationCache\n    的状态，它的值有以下几种状态。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eUNCACHED(0) ： ApplicationCache 对象的缓存宿主与应用缓存无关联\u003c/li\u003e\n    \u003cli\u003eIDLE(1) ：应用缓存已经是最新的，并且没有标记为 obsolete\u003c/li\u003e\n    \u003cli\u003eCHECKING(2) ： ApplicationCache 对象的缓存宿主已经和一个应用缓存关联，并且该缓存的更新状态是 checking\u003c/li\u003e\n    \u003cli\u003eDOWNLOADING(3) ： ApplicationCache 对象的缓存宿主已经和一个应用缓存关联，并且该缓存的更新状态是 downloading\u003c/li\u003e\n    \u003cli\u003eUPDATEREADY(4) ： ApplicationCache 对象的缓存宿主已经和一个应用缓存关联，并且该缓存的更新状态是 idle ，并且没有标记为 obsolete ，但是缓存不是最新的\u003c/li\u003e\n    \u003cli\u003eOBSOLETE(5) ： ApplicationCache 对象的缓存宿主已经和一个应用缓存关联，并且该缓存的更新状态是 obsolete\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e如果 update 方法被调用了，浏览器就必须在后台调用应用缓存下载过程；如果 swapCache 方法被调用了，浏览器会执行以下步骤。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e检查 ApplicationCache 的缓存宿主是否与应用缓存关联\u003c/li\u003e\n    \u003cli\u003e让 cache 成为 ApplicationCache 对象的缓存宿主关联的应用缓存\u003c/li\u003e\n    \u003cli\u003e如果 cache 的应用缓存组被标记为 obsolete ，那么就取消 cache 与 ApplicationCache 对象的缓存宿主的关联并取消这些步骤，此时所有资源都会从网络中下载而不是从缓存中读取\u003c/li\u003e\n    \u003cli\u003e检查在同一个缓存组中是否存在完成标志为\"完成\"的应用缓存，并且版本比 cache 更新\u003c/li\u003e\n    \u003cli\u003e让完成标志为\"完成\"的新 cache 成为最新的应用缓存\u003c/li\u003e\n    \u003cli\u003e取消 cache 与 ApplicationCache 对象的缓存宿主的关联并用新 cache 代替关联\u003c/li\u003e\n\u003c/ol\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e通过下面的代码可以来检查当前页面缓存的状态\u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar appCache = window.applicationCache; \u003c/span\u003e\u003cspan class=\"p2\"\u003eswitch\n            (appCache.status) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecase appCache.UNCACHED: \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan\n                class=\"r\"\u003e//UNCACHED == 0 \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p6\"\u003ealert('UNCACHED'); \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003ebreak; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecase appCache.IDLE: \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan\n                class=\"r\"\u003e//IDLE == 1 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ealert('IDLE'); \u003c/span\u003e\u003cspan class=\"p6\"\u003ebreak;\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003ecase appCache.CHECKING: \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e//CHECKING == 2 \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\" p6 \"\u003ealert('CHECKING'); \u003c/span\u003e\u003cspan class=\"p6 \"\u003ebreak; \u003c/span\u003e\u003cspan class=\"p4 \"\u003ecase\n            appCache.DOWNLOADING: \u003c/span\u003e\u003cspan class=\"p6 \"\u003e\u003cspan class=\"r\"\u003e//DOWNLOADING == 3 \u003c/span\u003e\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert('DOWNLOADING'); \u003c/span\u003e\u003cspan class=\"p6\"\u003ebreak; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003ecase appCache.UPDATEREADY: \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e//UPDATEREADY == 4 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ealert('UPDATEREADY');\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003ebreak; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecase appCache.OBSOLETE: \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan\n                class=\"r\"\u003e//OBSOLETE == 5 \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p6\"\u003ealert('OBSOLETE'); \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003ebreak; \u003c/span\u003e\u003cspan class=\"p4\"\u003edefault: \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert('UKNOWN CACHE\n            STATUS'); \u003c/span\u003e\u003cspan class=\"p6\"\u003ebreak; \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\u003c/span\u003e\n    \u003c/div\u003e\n\u003c/details\u003e\n\u003cp\u003e在支持 HTML5 离线存储的浏览器中， window 对象有一个 applicationcache 属性，通过 windowapplicationcache 可以获得一个 DOMApplicationCache 对象。\n\u003c/p\u003e\n\u003cp\u003e首先获取 DOMApplicationCache 对象。\u003c/p\u003e\n\u003cspan\u003evar cache = window.applicationcache; \u003c/span\u003e\n\u003cp\u003e接着触发 cache 对象的一些事件来检测缓存是否成功。\u003c/p\u003e\n \u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e/*oncached 事件表示：当更新已经处理完成，并且存储\u003c/span\u003e\u003cspan class=\"p2\"\u003e*\n        如果一切正常，这里 cache 的状态应该是 4 \u003c/span\u003e\u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\u003cspan class=\"p2\"\u003ecache.addEventListener('cached',\n        function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log('Cached,Status:' + cache.status); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}, false); \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*onchecking\n        事件表示：当更新已经开始进行，但资源还没有开始下载，即刚刚获取到最新的资源\u003c/span\u003e\u003cspan class=\"p2\"\u003e* 如果一切正常，这里 cache 的状态应该是 2 \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e*/ \u003c/span\u003e\u003cspan class=\"p2\"\u003ecache.addEventListener('checking', function() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log('Checking,Status:' + cache.status); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e/*ondownloading 事件表示：开始下载最新的资源\u003c/span\u003e\u003cspan class=\"p2\"\u003e* 如果一切正常，这里 cache 的状态应该是 3 \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e*/ \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ecache.addEventListener('downloading', function() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log('Downloading,Status:' + cache.status); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*onerror 事件表示：有错误发生， manifest 文件找不到或服务端有错误或资源找不到都会触发 onerror 事件\u003c/span\u003e\u003cspan class=\"p2\"\u003e*\n        如果一切正常，这里 cache 的状态应该是 0 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ecache.addEventListener('error', function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log('Error,Status:' +\n        cache.status); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false); \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*onnoupdate 事件表示：更新已经处理完成，但是 manifest\n        文件还未改变，处理闲置状态\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e* 如果一切正常，这里 cache 的状态应该是 1 \u003c/span\u003e\u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ecache.addEventListener('noupdate', function() { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econsole.log('Noupdate,Status:' + cache.status); \u003c/span\u003e\u003cspan class=\"p4\"\u003ecache.swapCache();\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}, false);\u003c/span\u003e\n\u003c/code\u003e\n    \u003cp\u003e只有当 DOMApplicationCache 对象触发了 updateready 事件时，才真正更新了缓存文件。\u003c/p\u003e\n    \u003ch5\u003e事件执行顺序\u003c/h5\u003e\n    \u003cp\u003eapplicationCache 对象是 window 的子对象，该对象中可以包含属性、方法和事件。\u003c/p\u003e\n    \u003ctable id=\"Ac\"\u003e\n        \u003ccaption\u003eapplicationCache 对象的常用事件\u003c/caption\u003e\n        \u003ctr\u003e\n            \u003cth\u003e事件\u003c/th\u003e\n            \u003cth\u003e额\u003c/th\u003e\n        \u003c/tr\u003e\n    \u003c/table\u003e\n    \u003cp\u003e任何与本地缓存有关的事件处理发生错误都会引发 onerror 事件。\u003c/p\u003e\n    \u003cul\u003e\n        \u003cli\u003e开始更新本地缓存时缓存名单被再次更改\u003c/li\u003e\n        \u003cli\u003e缓存名单中返回一个 404 错误（页面未找到）或者 410 错误（永久消失）\u003c/li\u003e\n        \u003cli\u003e缓存名单被找到且更改，但浏览器不能下载某个缓存名单中的资源\u003c/li\u003e\n        \u003cli\u003e缓存名单被找到且没有更改，但引用缓存名单中的 HTML 页面不能正确下载\u003c/li\u003e\n    \u003c/ul\u003e\n\n    \u003cscript\u003e\n        var Aa = [\n            [\"0\", \" UNCACHED （未缓存）  \"],\n            [\"1\", \"IDLE （空闲）  \"],\n            [\"2\", \" CHECKING （检查中）  \"],\n            [\" 3\", \"DOWNLOADING （下载中）  \"],\n            [\"4\", \" UPDATEREADY （更新就绪）  \"],\n            [\"5\", \"OBSOLETE （过期）  \"],\n        ];\n        _MiMethod.td(\"Aa\");\n        var Ab = [\n            [\"oncached\", \"IDLE （空闲）  \"],\n            [\"onchecking\", \"CHECKING （检查中）  \"],\n            [\"ondownloading\", \"DOWNLOADING （下载中）  \"],\n            [\"onupdateready\", \"UPDATEREADY （更新就绪）  \"],\n            [\"onobsolete\", \"OBSOLETE （过期）  \"],\n        ];\n        _MiMethod.td(\"Ab\");\n        var Ac = [\n            [\"onchecking\", \" 当更新已经开始进行，但资源还没有开始下载。如果一切正常，缓存状态是 2\"],\n            [\"oncached\", \"manifest 中列举的资源已经下载完成，并且已经缓存。如果一切正常，缓存状态是 4\"],\n            [\" ondownloading\", \" 开始下载最新的资源文件。如果一切正常，缓存状态是 3\"],\n            [\"onerror\", \" 有错误发生时触发该事件。如果一切正常，缓存状态是 0\"],\n            [\"onnoupdate\", \" 更新已经处理完成，但是 manifest 文件还没有改变，处于闲置状态。如果一切正常，缓存状态是 1\"],\n            [\"onupdateready\", \"  更新已经处理完毕，新的缓存可以使用。如果一切正常，缓存状态是 4\"],\n            [\"onprogress\", \" 下载完毕，资源被缓存之后触发该事件 \"],\n            [\" onobsolete\", \" 没有找到资源文件或者文件被删除时触发该事件 \"],\n        ];\n        _MiMethod.td(\"Ac\");\n    \u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ cache","title":"API"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","cache","API"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
