                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e使用 HTML 5 离线应用程序缓存事件\n\u003c/h5\u003e\n\u003cp\u003e随着浏览器缓存文件、建立本地缓存，触发了一系列事件，以下应用程序缓存事件是可用的\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003echecking ：更新检查或第一次试图下载缓存清单，是第一个事件序列\n    \u003c/li\u003e\n    \u003cli\u003enoupdate ：缓存清单没有改变\n    \u003c/li\u003e\n    \u003cli\u003edownloading ：浏览器已经开始下载缓存清单或第一次检测到缓存清单发生变化\n    \u003c/li\u003e\n    \u003cli\u003eprogress ：浏览器下载并缓存了资源，每一次文件下载 ( 包括当前页面的缓存 ) 完成都会触发\n    \u003c/li\u003e\n    \u003cli\u003ecached ：清单中列出的资源已经完全下载，并在本地应用程序中缓存\n    \u003c/li\u003e\n    \u003cli\u003eupdateready ：重新下载清单中列出的资源，并可以使用 swapCache() 脚本来切换到新的缓存\n    \u003c/li\u003e\n    \u003cli\u003eobsolete ：不能找到缓存清单文件，表明缓存不再需要。应用程序缓存将被删除\n    \u003c/li\u003e\n    \u003cli\u003eerror ：发生错误，这可能是由很多种原因造成的。这永远是最后一个事件序列\n    \u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ cache","title":"方法"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","cache","方法"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
