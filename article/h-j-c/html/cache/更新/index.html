class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>更新</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e离线缓存更新实现\u003c/h5\u003e\n\u003cp\u003e一旦文件被缓存，浏览器将会持续地显示缓存版本内容。为了让浏览器更新缓存，你需要修改 manifest 文件。\u003c/p\u003e\n\u003cp\u003e更新 HTML5 离线缓存有 3 种方法\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e清除离线存储的数据。这个不一定就是清理浏览器历史记录就可以做到的，因为不同浏览器管理离线存储的方式不同。例如，在 Firefox 中需要选择【选项】 | 【高级】 | 【网络】 |\n        【脱机存储】命令，然后在其中清除离线存储数据\u003c/li\u003e\n    \u003cli\u003e修改 manifest 文件。修改了 manifest 文件里所罗列的文件也不会更新缓存，而是要更新 manifest 文件\u003c/li\u003e\n    \u003cli\u003e使用 JavaScript 编写更新程序\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e一个更新的实现过程大概是这样的：首先调用 applicationCache.update() 使得浏览器开始尝试更新，前提是 manifest 文件是更新过的（如修改 manifest 版本号）；在\n    applicationCache.status 为 UPDATEREADY 状态时就可以调用 applicationCache.swapCache() 来将旧的缓存更新为新的。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar appCache = window.applicationCache; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eappCache.update();\u003cspan class=\"r\"\u003e// 开始更新\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eif (appCache.status ==\n        window.applicationCache.UPDATEREADY) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eappCache.swapCache(); \u003cspan class=\"r\"\u003e// 得到最新版本缓存列表，并且成功下载资源，更新缓存到最新\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e更新过程也可以很简单，但是一个好的应用少不了容错处理，如 Ajax 技术一样，需要对更新过程进行监控，处理各种异常或提示等待状态来使 Web 应用更强壮、用户体验更好，因此需要了解 applicationCache\n    的更新过程所触发的事件，主要包括 onchecking 、 onerror 、 onnoupdate 、 ondownloading 、 onprogress 、 onupdateready 、 oncached 和\n    onobsolete 。\u003c/p\u003e\n\u003cp\u003e简单地说只需要 3 步 。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e配置服务器 manifest 文件的 MIME 类型\u003c/li\u003e\n    \u003cli\u003e编写 manifest 文件\u003c/li\u003e\n    \u003cli\u003e在页面的 html 元素的 manifest 属性中引用 manifest 文件\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch5\u003e更新缓存文件\u003c/h5\u003e\n\u003cp\u003e更新缓存资源主要有两种方法，即通过修改配置文件的版本号或调用 JavaScript 完成更新。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e使用 JavaScript 更新方法\u003c/li\u003e\n    \u003cli\u003e当 manifest 文件列表并没有变化的时候，我们通常通过修改 manifest 注释的方式来改变文件，从而实现更新， manifest 注释改变就是指配置文件的版本号\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eif (window.applicationCache.status == window.applicationCache.UPDATEREADY) {\n        window.applicationCache.update(); }\n    \u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ cache","title":"更新"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","cache","更新"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
