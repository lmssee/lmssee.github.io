="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>监听</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e离线存储事件监听\u003c/h5\u003e\n\u003cp\u003e如果 Web 应用程序仅仅是一些静态页面的组合，那么通过 Cache Manifest 缓存资源文件以后就可以支持离线访问了。但是随着互联网技术的快速发展，特别是 Web 2.0\n    概念流行以来，用户提交的数据渐渐成为互联网的主流。\u003c/p\u003e\n\u003cp\u003e在开发支持离线的 Web 应用时，就不能仅满足于静态页面的展现，还必须考虑如何让用户在离线状态下也可以操作数据。离线状态时把数据存储在本地；在线状态以后再把数据同步到服务器上。为了做到这一点，开发者首先必须知道浏览器是否在线。\n\u003c/p\u003e\n\u003ch5\u003enavigator.onLine\u003c/h5\u003e\n\u003cp\u003enavigator.onLine 属性表示当前是否在线，它的值是一个布尔类型。值为 true 时表示在线；值为 false 时表示离线。当网络状态发生变化时， navigator.onLine\n    的值也随之变化，因此开发者可以通过读取它的值获取网络状态。\u003c/p\u003e\n\u003cp\u003e当然， onLine 值为 true 并不能保证 Web 应用程序在用户的机器上一定能访问到相应的服务器。而当其值为 false 时，不管浏览器是否真正联网，应用程序都不会尝试进行网络连接。\u003c/p\u003e\n\u003cp\u003e查看页面状态是在线还是离线的代码如下\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003e\u003cspan class=\"r\"\u003e// 当页面加载时，设置状态为 online 或者 offline\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003efunction loadDemo() { \u003c/span\u003e\u003cspan class=\"p10\"\u003eif(navigator.onLine) {\n    \u003c/span\u003e\u003cspan class=\"p12\"\u003elog(\"Online\"); \u003c/span\u003e\u003cspan class=\"p10\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003elog(\"Offline\"); \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u003cspan\n            class=\"r\"\u003e// 增加事件监听，当在线状态发生变化时，将触发响应\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003ewindow.addEventListener(\"online\",\n        function(e) { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003elog(\"Online\"); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e}, true); \u003c/span\u003e\u003cspan class=\"p8\"\u003ewindow.addEventListener(\"offline\", function(e) { \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003elog(\"Offline\"); \u003c/span\u003e\u003cspan class=\"p8\"\u003e}, true);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eonline/offline\u003c/h5\u003e\n\u003cp\u003e开发离线应用时通过 navigator.onLine 获取网络状态通常是不够的，开发者还需要在网络状态发生变化时立刻得到通知， HTML 5 提供了 online 和 offline 事件。\u003c/p\u003e\n\u003cp\u003e当在线或离线状态切换时，所对应的 online 或 offline 事件将触发在 body 元素上，并且沿着 document.body 、 document 和 window 的顺序冒泡。因此，开发者可以通过监听它们的\n    online 事件和 offline 事件来获取网络状态。\u003c/p\u003e\n\u003cp\u003e不同的浏览器检测在线还是离线状态时的表现并不是一致的。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eIE 6+ 和 Safari 5+ 能够正确地检测到网络已断开，并将 navigator.onLine 设置为 false\u003c/li\u003e\n    \u003cli\u003eFirefox 3+ 和 Opera 10.6+ 也支持 navigator.onLine 属性，但是需要手动将浏览器设置为脱机模式才能让浏览器正常工作\u003c/li\u003e\n    \u003cli\u003eChrome 11 及以上版本始终都会将 navigator.onLine 属性设置为 true\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e在支持 HTML 5 的浏览器中， window 对象有一个 applicationcache 属性，通过 window.applicationcache 可以获得一个 DOMApplicationCache\n    对象，这个对象来自 DOMApplicationCache 类，这个类有一些列方法和属性。\u003c/p\u003e\n\u003cp\u003e首先，获取对象：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar cache = window.applicationcache;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e然后，监听\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar cache = window.applicationcache;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*oncached 事件表示：当更新已经处理完成，并且存储\u003c/span\u003e\u003cspan class=\"p2\"\u003e* 如果一切正常，这里 cache 的状态应该是 4\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ecache.addEventListener('cached', function() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log('Cached,Status:' + cache.status); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e/*onchecking 事件表示：当更新已经开始进行，但资源还没有开始下载，意思就是说：刚刚获取到最新的资源\u003c/span\u003e\u003cspan class=\"p2\"\u003e* 如果一切正常，这里 cache\n        的状态应该是 2 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ecache.addEventListener('checking', function() { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econsole.log('Checking,Status:' + cache.status); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e/*ondownloading 事件表示：开始下载最新的资源\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e* 如果一切正常，这里 cache 的状态应该是 3 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\u003cspan class=\"p2\"\u003ecache.addEventListener('downloading', function() { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econsole.log('Downloading,Status:' + cache.status); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*onerror 事件表示：有错误发生， manifest 文件找不到或服务端有错误发错或资源找不到都会触发 onerror 事件\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e* 如果一切正常，这里 cache 的状态应该是 0 \u003c/span\u003e\u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ecache.addEventListener('error', function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log('Error,Status:'\n        + cache.status); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e/*onnoupdate 事件表示：更新已经处理完成，但是 manifest 文件还未改变，处理闲置状态\u003c/span\u003e\u003cspan class=\"p2\"\u003e* 如果一切正常，这里 cache\n        的状态应该是 1 \u003c/span\u003e\u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\u003cspan class=\"p2\"\u003ecache.addEventListener('noupdate', function() {\n    \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log('Noupdate,Status:' + cache.status); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}, false); \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*onupdateready 事件表示：更新已经处理完成，新的缓存可以使用\u003c/span\u003e\u003cspan class=\"p2\"\u003e*\n        如果一切正常，这里 cache 的状态应该是 4 \u003c/span\u003e\u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ecache.addEventListener('updateready', function() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log('Updateready,Status:' + cache.status); \u003c/span\u003e\u003cspan class=\"p4\"\u003ecache.swapCache();\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, false); \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ cache","title":"监听"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","cache","监听"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
