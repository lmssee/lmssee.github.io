class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>使用</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e解析 manifest 文件\u003c/h5\u003e\n\u003cp\u003e离线应用包含一个 manifest 清单文件，此文件中列出了浏览器为离线应用缓存的所有资源。实际上， manifest 文件是一个文本文件，它罗列了离线访问应用时所需缓存的文件清单。\u003c/p\u003e\n\u003cp\u003e引用 manifest 文件的页面，不管有没有罗列清单，都会被缓存。\u003c/p\u003e\n\u003cp\u003e如需启用应用程序缓存，请在文档的 \u0026lt;html\u0026gt; 标签中包含 manifest 属性。每个指定了 manifest 的页面在用户对其访问时都会被缓存。如果未指定 manifest 属性，则页面不会被缓存（除非在\n    manifest 文件中直接指定了该页面）。\u003c/p\u003e\n\u003cp\u003e当然，这个 manifest 的文件路径用绝对路径和相对路径都可以，甚至可以引用其它服务器上的 manifest 文件。该文件所对应的 mime-type 应该是 text/cache-manifest\n    ，所以需要配置服务器来发送对应的 MIME 类型信息。\u003c/p\u003e\n\u003cp\u003emanifest 文件的 MIME 类型是 text/cache-manifest 。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ePython 标准库中的 SimpleHTTPServer 模块对扩展名为 .manifest 的文件能配以头部信息 Content-type:text/cache-manifest ，配置方法是打开\n        PYTHON_HOME/Lib/mimetypes.py 文件并添加一行代码 '. manifest': 'text/cache-manifest manifest';\u003c/li\u003e\n    \u003cli\u003e配置 Apache HTTP 服务器，开发人员需要将下面一行代码添加到 Apache Software Foundation\\Apache2.2\\conf 文件夹的 mime.types 文件中\n        text/cache-manifest manifest\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eManifest 文件内容的基本格式要求\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e第一行必须以 CACHE MANIFEST 开头，紧接着是文件的路径或注释\u003c/li\u003e\n    \u003cli\u003e注释必须以\" # \"开头\u003c/li\u003e\n    \u003cli\u003e必须声明一个白名单，这个白名单指定的文件将在用户连接因特网后访问，它必须在 NETWORK: 的下一行。 NETWORK 部分罗列的资源，无论缓存中存在与否，均从网络获取\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e先写 CACHE MANIFEST ，然后换行，每行单列资源文件，每行的换行符可以是 CR 、 LF 或者 CRLF ，格式很灵活，但文本编码格式必须是 UTF-8 。 UTF-8 是多数文本编辑器经常输出的编码格式。\u003c/p\u003e\n\u003ch5\u003e使用 cache manifest 创建页面缓存\u003c/h5\u003e\n\u003cp\u003emanifest 文件是简单的文本文件，它告知浏览器被缓存的内容（以及不缓存的内容）。 manifest 文件可分为 3 个部分。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eCACHE MANIFEST ：在此标题下列出的文件将在首次下载后进行缓存\u003c/li\u003e\n    \u003cli\u003eNETWORK ：在此标题下列出的文件需要与服务器连接，且不会被缓存\u003c/li\u003e\n    \u003cli\u003eFALLBACK ：在此标题下列出的文件规定当页面无法访问时的回退页面（比如 404 页面）\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e其中以 \"#\" 开头的是注释行。应用的缓存会在其 manifest 文件更改时被更新。如果编辑了一幅图片，或者修改了 JavaScript\n    函数，这些改变都不会被重新缓存。更新注释行中的日期和版本号也是一种使浏览器重新缓存文件的办法。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 浏览器对缓存数据的容量限制可能不太一样（某些浏览器设置的限制是每个站点 5MB ） \u003c/p\u003e\n\u003c/div\u003e\n\n\u003cul\u003e\n    \u003cli\u003e创建一个以 manifest 为扩展名的文件，命名为 cacheData.manifest ，在这个文件中将指定一些文件的路径，如 HTML 、 CSS 、 JavaScript 、 Images\n        \u003cul\u003e\n            \u003cli\u003e第一行中的 CACHE MANIFEST 是必需的，每个站点都有 5MB 的空间来存储这些数据，如果 manifest\n                文件或文件里所列的文件无法加载，整个缓存更新过程将无法进行，浏览器会使用最后一次成功的缓存\u003c/li\u003e\n            \u003cli\u003e如果没有指定标题，默认就是 CACHE MANIFEST 部分\u003c/li\u003e\n            \u003cli\u003e添加到 CACHE MANIFEST 区块中的文件，无论应用程序是否在线，浏览器都会从应用程序缓存中获取该文件\u003c/li\u003e\n            \u003cli\u003e没有必要在这里列出应用程序的主 HTML 资源，因为最初指向 manifest 文件的 HTML 文档会被隐含包含进来\u003c/li\u003e\n            \u003cli\u003e如果希望缓存多个 HTML 文件，或者希望将多个 HTML 文件作为支持缓存的应用程序的可选入口，则需将这些文件都列在 CACHE MANIFEST 中\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e如果需要，用户还可以添加以下内容\n        \u003cul\u003e\n            \u003cli\u003e在进入因特网后，增加一个缓存内容，这些文件的路径必须在 CACHE: 的下一行\u003c/li\u003e\n            \u003cli\u003e增加备份，这些文件的路径必须在 FALLBACK: 的下一行\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003eFALLBACK 部分提供了获取不到缓存资源时的备选资源路径。第一个文件的路径和第二个文件的路径中间有一个空格，这个 FALLBACK: 的作用是：当第一个文件缓存不成功时，或无法找到时，它会缓存第二个文件\u003c/li\u003e\n    \u003cli\u003e# 表示注释行标识符，但它还有一个小作用。 Web 应用的缓存只有在 manifest 文件被修改的情况下才会被更新，所以如果只是修改了被缓存的文件，那么用户本地的缓存还是不会被更新的，但是可以通过修改\n        manifest 文件来告诉浏览器需要更新缓存。利用这点，可以更新注释\n        \u003cul\u003e\n            \u003cli\u003eCACHE 这个是 manifest 文件的默认入口，在此入口之后罗列的文件，或直接写在 CACHE MANIFEST 后的文件，在它们下载到本地后会被缓存起来\u003c/li\u003e\n            \u003cli\u003eNETWORK 可选的，在此节后面所罗列的文件是需要访问网络的，即使用户离线访问，也会直接跳过缓存而访问服务器\u003c/li\u003e\n            \u003cli\u003eFALLBACK 可选的，用来指定资源无法访问时的回调页面。每一行包括两个 URL ，第一个是资源文件 URL ，第二个是回调页面 URL\u003c/li\u003e\n        \u003c/ul\u003e\n        \u003cul\u003e\n            \u003cli style=\"list-style-type: none;\"\u003e3 个好处\u003c/li\u003e\n            \u003cli\u003e可以很明确地了解离线 Web 应用的版本\u003c/li\u003e\n            \u003cli\u003e通过简单地修改版本号就可以轻易地通知浏览器进行更新\u003c/li\u003e\n            \u003cli\u003e可以配合 JavaScript 程序来完成缓存更新\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ cache","title":"使用"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","cache","使用"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
