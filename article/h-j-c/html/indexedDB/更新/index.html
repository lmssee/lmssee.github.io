003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003edbConnect.onupgradeneeded = function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eidb\n        = e.target.result; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar t = e.target.transaction; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar o =\n        e.oldVersion; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar n = e.newVersion; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log('数据库版本已更新成功，旧版本号为' + o + '新版本号为' + n); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ indexedDB","title":"更新"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","indexedDB","更新"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
