                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e连接数据库\u003c/h5\u003e\n\u003cp\u003e使用 indexedDB 数据库的时候，首先需要预定义 indexedDB 数据库、该数据库所用的事务、IDBKey 对象和游标对象。定义如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ewindow.indexedDB = window.indexedDB || window.webkitIndexedDB || window.mozIndexedDB\n        || window.msIndexedDB; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.IDBTransaction = window.IDBTransaction ||\n        window.webkitIDBTransaction || window.msIDBTransaction; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ewindow.IDBKeyRange = window.IDBKeyRange || window.webkitIDBKeyRange || window.msIDBKeyRange;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.IDBCursor = window.IDBCursor || window.webkitIDBCursor ||\n        window.msIDBCursor;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用库之前，先连接库：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ewindow.indexedDB = window.indexedDB || window.webkitIndexedDB || window.mozIndexedDB\n        || window.msIndexedDB; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.IDBTransaction = window.IDBTransaction ||\n        window.webkitIDBTransaction || window.msIDBTransaction; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ewindow.IDBKeyRange = window.IDBKeyRange || window.webkitIDBKeyRange || window.msIDBKeyRange;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.IDBCursor = window.IDBCursor || window.webkitIDBCursor || window.msIDBCursor;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction connectDatabase() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar dbName = 'indexedDBTest'; \u003cspan class=\"r\"\u003e// 数据库名 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        dbVersion = 20220430; \u003cspan class=\"r\"\u003e// 版本号 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar idb; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        dbConnect = indexedDB.open(dbName, dbVersion); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003edbConnect.onsuccess = function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eidb = e.target.result; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003econsole.log('数据库连接成功'); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003edbConnect.onerror =\n        function(e) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log('连接 indexedDB 数据库失败') \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eindexedDB.open() 会返回一个 IDBOpenRequest 对象，代表一个请求连接数据库的请求对象。\u003c/p\u003e\n\u003cp\u003e连接成功时，会取得事件对象的 event.target.result 属性值，该属性值为一个 IDBDatabase 对象，代表连接成功的数据库对象。\u003c/p\u003e\n\u003ch6\u003e关闭数据库连接\u003c/h6\u003e\n\u003cp\u003e在 API 中，使用 close() 关闭数据库连接。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eidb.close()\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e数据库关闭后，不能再做其它对数据库的操作，否则会导致浏览器抛出异常。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ indexedDB","title":"连接"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","indexedDB","连接"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
