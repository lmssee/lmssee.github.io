    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e创建对象仓库\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ewindow.indexedDB = window.indexedDB || window.webkitIndexedDB || window.mozIndexedDB\n        || window.msIndexedDB; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.IDBTransaction = window.IDBTransaction ||\n        window.webkitIDBTransaction || window.msIDBTransaction; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ewindow.IDBKeyRange = window.IDBKeyRange || window.webkitIDBKeyRange || window.msIDBKeyRange;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.IDBCursor = window.IDBCursor || window.webkitIDBCursor || window.msIDBCursor;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction createObjectStore() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar dbName = 'indexedDBTest'; \u003cspan class=\"r\"\u003e// 数据库名 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        dbVersion = 20220430; \u003cspan class=\"r\"\u003e// 版本号 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar idb; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        dbConnect = indexedDB.open(dbName, dbVersion); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003edbConnect.onsuccess = function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eidb = e.target.result; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003econsole.log('数据库连接成功'); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003edbConnect.onerror =\n        function(e) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log('连接 indexedDB 数据库失败') \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003edbConnect.onupgradeneeded = function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eidb\n        = e.target.result; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar t = e.target.transaction; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar n =\n        'users'; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar o = { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ekeyPath: 'userID', \u003c/span\u003e\u003cspan class=\"p8\"\u003eautoIncrement: false \u003c/span\u003e\u003cspan class=\"p6\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar store = idb.createObjectStore(n, o); \u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log('数据库创建成功');\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在上面代码中，监听数据库连接的请求对象的 onupgradeneeded 事件，并且指定在该事件触发用数据库对象的 createObjectStore（）方法创建对象仓库。 \u003c/p\u003e\n\u003cp\u003ecreateObjectStore（）方法包含两个参数∶ 第一个参数值为一个字符串，代表对象仓库名;第二个参数为可选参数 optionalParameters，参数值为一个 JavaScript 对象，该对象的 keyPath\n    属性值用于指定对象库中的每一条记录使用哪个属性值来作为该记录的主键值。 一条记录的主键为数据仓库中该记录的唯一标识符，在一个对象仓库中，只能有一个主键，但是键值可以重复，相当于关系型数据库中数据表的 id\n    字段为数据表的主键，多条记录的 id字段值可以重除非将主键指定为唯一主键。\u003c/p\u003e\n\u003cp\u003e在 indexedDB API中，对象仓库中的每一条记录均为具有一个或多个属性值的一个对象，而keyP属性值用于指定每一条记录使用哪个属性值作为该记录的主键值。例如，在这里将数据记录的userID\n    届值作为每条记录的主键值，相当于在关系型数据库中将每条记录的 userID 字段值指定为该记录的主键。\u003c/p\u003e\n\u003cp\u003e在这种情况下，因为主键存在于每条记录内部，所以被称为内联主键，如果在这里不指定 keyP属性值，或将其指定为 nulI，每条记录的主键将通过其它的途径被另行指定，这时因为数据记录的主键存在于每条记录之外，所以被称为外部主键。\n\u003c/p\u003e\n\u003cp\u003eo 对象的 autoIncrement 属性值为 true，相当于在关系型数据库中将主键指定为自增主键，如果添加数据记录时不指定主键值，则在数据仓库内部将自动指定该主键值为既存的最大主键值 + 1\n    。也可以在添加数据记录时显式地指定主键值。如果将 optionalParameters 对象的 autoIncrement 属性值指定为 false ，则必须在添加数据记录时显式地指定主键值。\u003c/p\u003e\n\u003cp\u003ecreateObjectStore（）方法返回一个IDBObjectStore 对象，该对象代表被创建成功的对象仓库。\u003c/p\u003e\n\u003ch5\u003e创建索引\u003c/h5\u003e\n\u003cp\u003eindexedDB 数据库中的索引类似与关系数据库中的索引，需要在数据记录对象的某个属性值来创建。在 indexedDB 数据库创建索引后，可以提高对数据库中的所有数据记录进行检索时的性能。\u003c/p\u003e\n\u003cp\u003e在关系型数据中，可以针对非索引字段进行检索，而在 indexedDB 数据库中，只能针对被设为索引的属性值索引。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ewindow.indexedDB = window.indexedDB || window.webkitIndexedDB || window.mozIndexedDB\n        || window.msIndexedDB; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.IDBTransaction = window.IDBTransaction ||\n        window.webkitIDBTransaction || window.msIDBTransaction; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ewindow.IDBKeyRange = window.IDBKeyRange || window.webkitIDBKeyRange || window.msIDBKeyRange;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.IDBCursor = window.IDBCursor || window.webkitIDBCursor || window.msIDBCursor;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction createObjectStore() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar dbName = 'indexedDBTest'; \u003cspan class=\"r\"\u003e// 数据库名 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        dbVersion = 20220430; \u003cspan class=\"r\"\u003e// 版本号 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar idb; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        dbConnect = indexedDB.open(dbName, dbVersion); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003edbConnect.onsuccess = function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eidb = e.target.result; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003econsole.log('数据库连接成功'); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003edbConnect.onerror =\n        function(e) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log('连接 indexedDB 数据库失败') \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003edbConnect.onupgradeneeded = function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eidb\n        = e.target.result; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar t = e.target.transaction; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar n =\n        'users'; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar o = { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ekeyPath: 'userID', \u003c/span\u003e\u003cspan class=\"p8\"\u003eautoIncrement: false \u003c/span\u003e\u003cspan class=\"p6\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar store = idb.createObjectStore(n, o); \u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log('数据库创建成功');\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar a = 'userNameIndex'; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar k = 'userName'; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar o = { \u003c/span\u003e\u003cspan class=\"p8\"\u003eunique: false,\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003emultiEntry: false \u003c/span\u003e\u003cspan class=\"p6\"\u003e}; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar idx =\n        store.createIndex(n, k, o); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log('创建索引成功'); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在数据库的版本更新事务中，在对象仓库创建成功后，调用对象仓库的 createIndex（0方法创建该方法包含 3 个参数∶\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e第 1个参数值为一个字符串，代表索引名\u003c/li\u003e\n    \u003cli\u003e第 2 个参数值代表使用数据仓库中数据记录对象的哪个属性来创建索引。在本示例代码中，虽引名与用于创建索引的属性名不同，但是实际上此处索引名与属性名也可以相同，例如，此处可以将索引名字定义为 userName\u003c/li\u003e\n    \u003cli\u003e第3个参数 optional Parameters 为可选参数，参数值为一个JavaScript 对象，该对象的 unique属性值的作用相当于关系型数据库中索引的unique 属性值的作用。属性值为\n        true，代表同一个对象仓库中两条数据记录的索引属性值（即 userName 属性值）不能相同，否则在向数据仓库中添加第二条数据记录时将导致添加失败\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eoptionalParameters 对象的 multiEntry 属性值为 true，代表当数据记录的索引属性值为一个数组时可以将数组中的每一个元素添加在索引中;multiEntry 属性值为\n    false，代表只能将该数组整体添加在索引中。 createIndex（）方法返回一个 IDBIndex 对象，代表创建索引成功。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ indexedDB","title":"建库"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","indexedDB","建库"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
