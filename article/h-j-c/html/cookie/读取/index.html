turn null;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar end = document.cookie.indexOf(\"\", len); \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (end == -1) end =\n        document.cookie.length; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn unescape(document.cookie.substring(len, end)); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ cookie","title":"读取"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","cookie","读取"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
