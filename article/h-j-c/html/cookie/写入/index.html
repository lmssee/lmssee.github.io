    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eCookie 的形式\u003c/h5\u003e\n\u003cp\u003eCookie 是由 name=value 形式成对存在的。一个 Cookie 字符串最多可以存储 20 对 name=value 。 Cookie 字符串必须以分号作为结束符。 Cookie 除了 name\n    属性之外，还存在其它 4 个相关属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eset-Cookie:name=value;[expirse=date];[path=dir];[domain=domainname];[secure]\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eCookie 的设置\u003c/h5\u003e\n\u003cp\u003e使用 Cookie 可以使网页更具有人性化，它能够存储访客的相关信息等，但使用 Cookie 也会相应带来一些安全隐患。如果用户不喜欢使用 Cookie ，可以在 IE 浏 览器将 Cookie 删除，也可以在浏览器中禁止\n    Cookie 的使用。\u003c/p\u003e\n\u003ch5\u003e如何对 Cookie 进行读写\u003c/h5\u003e\n\u003ch6\u003eCookie 的写入 \u003c/h6\u003e\n\u003cp\u003eCookie 存储在 Document 对象的 cookie 属性中。它实际上是一个字符串，当页面载入时自动生成。 Cookie 的一组信息由分号和一个空格隔开，每个信息都由 Cookie 名称和 Cookie 值组成。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ename1=value1;name2=value2;name3=value3;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eCookie 的写入首 先将 Cookie 的名称和 Cookie 值放入一个变量中。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar cookiename=\"name4\";\u003c/span\u003e\u003cspan class=\"p\"\u003evar cookievalue=\"value4\";\u003c/span\u003e\u003cspan cl ass=\"p\"\u003evar\n        totalcookie=cookiename+\"=\"+cookievalue;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003ecookiename ： Cookie 名称。\u003c/p\u003e\n\u003cp\u003ecookievalue ： Cookie 值。\u003c/p\u003e\n\u003cp\u003e然后将该变量赋给 Document 对象的 cookie 属性即可。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.cookie=totalcookie\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e当用户将 Cookie 写入后，新的 Cookie 字符串并不覆盖原来的字符串，而是自动添加到原来 Cookie 字符串的后面。例如。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ename1=value1;name2=value2;name3=value3;name4=value4\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e一般情况下， Cookie 本身不能包括分号、逗号或空格等专用字符。但是对于这些字符，可以使用编码的形式进行传输，也就是将文本字符串中的专用字符使用转换成对应的十六进制 ASCII 值。在 JavaScript 中，可以使用\n    encodeURI 函数将文本字符串编辑为一个有效的 URI 。要读取编辑后的字符串，需要使用 decodeURI 函数进行解码操作。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction setCookie(name, value, expires, path, domain, secure) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar today\n        = new Date(); \u003c/span\u003e\u003cspan class=\"p4\"\u003etoday.setTime(today.getTime()); \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (expires) {\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eexpires = expires * 1000 * 60 * 60 * 24; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003evar expires_date = new Date(today.getTime() + (expires));\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.cookie = name + \"=\" + escape(value) + \u003c/span\u003e\u003cspan class=\"p6\"\u003e((expires) ?\n        \";expires=\" + expires_date.toGMTString() : \"\") + \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e((path) ? \";path=\" + path : \"\") + \u003c/span\u003e\u003cspan class=\"p6\"\u003e((domain) ? \";domain=\" + domain : \"\")\n        + \u003c/span\u003e\u003cspan class=\"p6\"\u003e((secure) ? \";secure\" : \"\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ cookie","title":"写入"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","cookie","写入"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
