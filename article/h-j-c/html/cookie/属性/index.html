class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>属性</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eCookie 的常用属性 \u003c/h5\u003e\n\u003cp\u003eCookie 主要包括 name 、 expires 、 path 、 domain 和 secure 等 5 个属性，其中 name 属性是必选属性，而其余 4 个属性为可选属性。下面简要介绍这 5 个属性。 \u003c/p\u003e\n\u003cp\u003ename 属性： Cookie 属性中唯一必须设置的属性为 name 属性，表示 Cookie 的名称。 \u003c/p\u003e\n\u003cp\u003eexpires 属性： Cookie 的 expires 属性指定 Cookie 在删除之前要在客户机上保持多长时间。如果不使用 expires 属性， Cookie 只对当前浏览器会话有用，当用户关闭当前浏览时，\n    Cookie 就会自动消失。 \u003c/p\u003e\n\u003cp\u003epath 属性： path 属性决定 Cookie 对于服务器上的其他网页的可用性。在一般情况下， Cookie 对于同一目录下的所有页面都可用。当设置 path 属性后， Cookie\n    只对指定路径以及子路径下的所有网页有效。 \u003c/p\u003e\n\u003cp\u003edomain 属性：许多服务器都由多台服务器组成， domain 属性主要设置相同域的多台服务器共享一个 Cookie 。例如，如果 Web 服务器 a1 需要与 Web 服务器 a2 共享 Cookie ，那么需要将 a1\n    的 Cookie 的 domain 属性设置为 a2 ，这样 a1 创建的 Cookie 就可以应用于 a2 和 a2 域的其他 Web 服务器。 \u003c/p\u003e\n\u003cp\u003esecure 属性： Internet 连接本身是不安全的。为了保证 Internet 上的数据安全，会使用 SSL 协议加密数据并使用安全连接传输数据。一般支持 SSL 的网站以 HTTPS 开头。 Cookie 的\n    secure 属性表示 Cookie 只能通过使用 HTTPS 或其他安全协议的 Internet 连接来传输。如果 secure 属性不出现，就意味着 Cookie 在网络上未加密发送。 \u003c/p\u003e\n\u003ch6\u003eexpires 属性 \u003c/h6\u003e\n\u003cp\u003eCookie 中的 expires 属性写入 Cookie 的方式是 expires=date ，其中 name=value 和 expires=date 之间以分号和空格隔开。例如。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p  \"\u003evar date=new Date();\u003c/span\u003e \u003cspan class=\"p \"\u003ename=value; \u003c/span\u003e\u003cspan class=\"p\"\u003e\n        expires=date.toUTCString();\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e不要使用 encodeURI 函数来编辑 expires 属性， JavaScript 不能识别 URI 中的编码格式。如果使用 encodeURI 函数来编辑 expires 属性， JavaScript 不能正确设置\n    Cookie 的过期时间。 \u003c/p\u003e\n\u003cp\u003eDate 对象的每个部分，包括星期、月份、年份、时、分、秒都可以通过相应的函数来获取，例如取星期使用 getDate 方法。这些函数包括对应的 setXXX 函数与 getXXX 函数。如果需要获取下一星期的时间，可以通过\n    setDate 与 getDate 取得，例如。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar date=new Date();\u003c/span\u003e \u003cspan class=\"p\"\u003edate.setDate(date.getDate()+7);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e如果要写入一个名称为 test ，过期时间为一个星期的 Cookie ，需要使用如下代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar date=new Date();\u003c/span\u003e \u003cspan class=\"p\"\u003edate.setDate(date.getDate()+7);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.cookie=encodeURI(\"test=value\")+\"expires=\"+date.toUTCString();\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003epath 属性 \u003c/h6\u003e\n\u003cp\u003e使用 path 属性指定 Cookie 作用的范围。例如使名称为 test 的 Cookie 可用于 test 路径及其子路径下，可以使用如下代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.cookie=\"test=value\"+\"path=/test\";\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e在开发 Cookie 的 JavaScript 程序中，如果目录中还存在其他设置 Cookie 的程序，则 JavaScript 程序不能正常运行，这时需要设置 path 属性使 Cookie 在某一个范围内有效。 \u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e如果设置 path=/ ，可以设置 cookie 信息与其服务器根目录及其子目录相关联，从而实现整个网站共享 cookie 信息；如果只想在 study 目录下使用，则可以设置 path=/bbs 即可 \u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003edomain 属性 \u003c/h5\u003e\n\u003cp\u003e在 Cookie 的写入过程中，同样可以使用 domain 属性设置相同域共享同一个 Cookie 。如果 Web 服务器的域名在 9 个顶级域名之内，那么在设置 domain 属性时需要使用两个句点的域名，例如，\n    .test*.com 。如果 Web 服务器的域名不在 9 个顶级域名之内，那么需要使用 3 个句点的域名。下面的代码用于实现名称为 test ，域名为 test*.test*.com 的 Web 服务器的 Cookie\n    共享于域为 test*.com 的所有 Web 服务器。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.cookie=\"test=value;domain=test*.com\";\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003esecure 属性 \u003c/h6\u003e\n\u003cp\u003e在使用 JavaScript 客户端时， secure 属性一般都会被忽略。如果需要使用这个属性，取值包括 secure 和空字符串的 secure 属性。如果一个名称 test 用 Cookie 的 secure\n    属性激活，可以使用如下代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.cookie=\"test=value;secure=true\"\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e默认下的 secure 的属性值为空，就是说 cookie 在不安全的 HTTP 连接传递数据。如果一个 cookie 设置了 true ，那么 cookie 在用户和服务器之间进行传递时，就通过 HTTPS\n    或者其他的安全协议进行传递。 \u003c/p\u003e\n\u003ch5\u003e封装 \u003c/h5\u003e\n\u003cp\u003e可以将 Cookie 的写入操作封装在一个 JavaScript 函数中，例如。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction setCookie(name, value, expires, path, domain, secure) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar t =\n        new Date(); \u003c/span\u003e\u003cspan class=\"p4\"\u003et.setTime(t.getTime()); \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (expires) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eexpires = expires * 1000 * 60 * 0 * 24 \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003evar t_ = new Date(t.getTime() + t_); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edocument.cookie = name + \"=\" + \u003c/span\u003e\u003cspan class=\"p6\"\u003eencodeURI(value) + ((expires) ?\n        \";expires=\" + t_.toGMTString() : \"\") + \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e((path) ? \";path=\" + path : \"\") + \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e((domain) ? \"domain=\" + domain : \"\") + \u003c/span\u003e\u003cspan class=\"p6\"\u003e((secure) ? \"secure\" : \"\");\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上述函数中共有 6 个参数，分别设置 Cookie 中的 5 个属性，其中参数 value 为 name 属性的值。除了必须设置的 name 属性之外，其他属性的值都使用三目运算符进行设置。如果 value\n    参数值为空，则不进行此参数的设置；如果 value 参数值不为空，则需要对 Cookie 的相应属性进行设置。 \u003c/p\u003e\n\u003cp\u003e所以，比较完善的 cookie 应该是这样的： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ecookie 信息字符串，包含一个名 / 值对，默认为空 \u003c/li\u003e\n    \u003cli\u003ecookie 有效期，包含一个 GMT 格式的字符串，默认为当前会话时间，既没有设置，当关闭浏览器时， cookie 信息就会过期而被清除 \u003c/li\u003e\n    \u003cli\u003ecookie 有效路径，默认 cookie 为说在页面及其子目录 \u003c/li\u003e\n    \u003cli\u003ecookie 有效域，默认为设置 cookie 的页面所在域 \u003c/li\u003e\n    \u003cli\u003ecookie 安全性，默认不采取安全措施 \u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ cookie","title":"属性"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","cookie","属性"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
