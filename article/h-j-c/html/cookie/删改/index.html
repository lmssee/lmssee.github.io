    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e更改 cookie \u003c/h5\u003e\n\u003cp\u003e想要改变一个 cookie 值，只需要使用相同的名称和新值重新设置该 cookie 值即可。 \u003c/p\u003e\n\u003ch5\u003e删除不用的 Cookie\u003c/h5\u003e\n\u003cp\u003eCookie 除了可以在浏览器中存储信息之外，还可以使用代码进行删除。可以根据 Cookie 的名称删除指定的 Cookie ，例如。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction deleteCookie(name){\u003c/span\u003e \u003cspan class=\"p2\"\u003evar date=new Date();\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edate.setTime(date.getTime()-10000);\u003cspan class=\"r\"\u003e// 删除一个 Cookie\n            ，就是将其过期时间设定为一个过去的时间\u003c/span\u003e\u003c/span\u003e \u003cspan class=\"p2\"\u003edocument.cookie=name+\"= 删除\n        \"+\"expires=\"+date.toGMTString();\u003c/span\u003e \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e首先使用自定义 setCookie 函数创建一个 Cookie ，使用 alert 语句将 Cookie 值弹出，然后调用 deleteCookie 函数删除指定的 Cookie 值。其实，删除 Cookie 操作实际上就是将\n    Cookie 的 expires 属性重新设置一个时间，该时间为当前时间的过去时间。这样再次使用 alert 语句将 Cookie 值弹出时，对话框中的值将为空值。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction deleteCookie(name, path, domain) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (getCookie(name)) document.cookie = name + \"=\" + \u003cspan class=\"r\"\u003e // 如果存在 , 则清空\u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e((path) ? \"?path=\" + path : \"\") + \u003cspan class=\"r\"\u003e // 如果存在路径，则加上\u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e((domain) ? \";domain=\" + domain : \"\") + \u003cspan class=\"r\"\u003e // 如果存在域，则加上\u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\";expires=Thu,01-Jan-1970 00: 00:01 GMT\"; \u003cspan class=\"r\"\u003e // 过期式删除\u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e附加 cookie 信息 \u003c/h5\u003e\n\u003cp\u003e浏览器对 cookie 信息都有个数限制，为了避免超出限制，可以把多条信息都保存在一个 cookie 中，而不是为每条信息都建议一个 cookie 。由于 cookie 可储存的字符串最大长度为 4KB （即 4096\n    个字符），在实际应用中，这个字符串长度完全满足各种用户信息的储存。 \u003c/p\u003e\n\u003cp\u003e实现方法：在每一个名值对，再嵌套一组名 / 值对。子名 / 值对之间的分隔符，约定类于对象直接量。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003esubName1:subValue1,subName2:subValue2,subName3:subValue3 \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e然后把组名 / 值对作为值传递给 cookie 的名称。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003ename=subName1:subValue1,subName2:subValue2,subName3:subValue3 \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e为了确保名 / 值对不引起歧义，建议使用 escape() 方法对其进行编码，读取时再使用 unescape() 方法转码即可。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar d = new Date(); \u003c/span\u003e\u003cspan class=\"p2\"\u003ed.setMonth(d.getMonth() + 1);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ed = d.toGMString(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = \"name:a,age:20,addr:beijing\"; \u003cspan\n            class=\"r\"\u003e // 子 / 名值串\u003c/span\u003e \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar c = \"user=\" + escape(a); \u003cspan class=\"r\"\u003e // 组合 cookie 字符串\u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003ec\n        += \"\" + \"expires\" + d; \u003cspan class=\"r\"\u003e // 设置有效期为 1 个月\u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.cookie = c;\n        \u003cspan class=\"r\"\u003e // 写入 cookie 信息\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e当读取 cookie 信息时，首先需要获取 cookie 值，然后调用 unescape() 方法对 cookie 值进行解码，最后访问再访问每一个 cookie 值 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction getSubCookie() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar a = document.cookie.split(\"\");\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar o = {}; \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i = 0; i \u0026lt; a.length; i++) { \u003cspan class=\"r\"\u003e\n            // 遍历数组信息\u003c/span\u003e \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ea[i] \u0026\u0026 (a[i] = a[i].replace(/^\\s+|\\s+$/, \"\")); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar b =\n        a[i].split(\"=\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar c = b[1]; \u003c/span\u003e\u003cspan class=\"p6\"\u003ec \u0026\u0026 (c =\n        c.replace(/^\\s+|\\s+$/), \"\"); \u003cspan class=\"r\"\u003e // 清空\u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p6\"\u003ec = unescape(c); \u003cspan\n            class=\"r\"\u003e // 解码\u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (!/\\,/gi.test(c)) { \u003cspan class=\"r\"\u003e // 若无则写\u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003eo[b[0]] = b[1] \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar d = c.split(\",\"); \u003cspan class=\"r\"\u003e // 劈开 cookie 值\u003c/span\u003e \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003efor (var j = 0; j \u0026lt; d.length; j++) { \u003cspan class=\"r\"\u003e // 遍历 cookie 数组\u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003evar e = d[j].split(\":\"); \u003cspan class=\"r\"\u003e // 劈开名 / 值对\u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p10\"\u003eo[e[0]] =\n        e[1]; \u003cspan class=\"r\"\u003e // 写入 cookie \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn o; \u003cspan class=\"r\"\u003e // 返回 cookie \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e检测支持 \u003c/h5\u003e\n\u003cp\u003e有个别浏览器不支持 cookie 或者被禁用，在使用前可以先判断； \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eif (navigator.cookieEnabled) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eset
