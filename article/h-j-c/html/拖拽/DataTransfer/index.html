    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e使用 DataTransfer 对象\u003c/h5\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eDataTransfer 对象的属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"20%\"\u003e属性/方法\u003c/th\u003e\n        \u003cth width=\"20%\"\u003e类型\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e正确使用 DataTransfer 对象的属性和方法，可以实现拖放图标，或者定义只支持特定的拖放，如复制、移动等，甚至是更复杂的拖放操作。\u003c/p\u003e\n\u003cp\u003edropEffect 和 effectAllowed 属性结合可以设置拖放时的视觉效果。effectAllowed 属性表示当一个元素被拖动时允许的视觉效果，一般在 dragstart 事件中定义。\u003c/p\u003e\n\u003ctable id=\"Ab\"\u003e\n    \u003ccaption\u003eeffectAllowed 属性值说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"30%\"\u003e属性值\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003eDataTransfer 对象的 dropEffect 属性表示实际拖放时的视觉效果，一般在 dragover 事件中指定，允许设置值为 none、copy、link、move。dropEffect\n    属性所表示的实际视觉效果必须与 effectAllowed 属性值所允许的操作相匹配，规则如下：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e如果 effectAllowed 属性值设置为 none ，则不允许拖放元素\u003c/li\u003e\n    \u003cli\u003e如果 dropEffect 属性设置为 none，则不允许被拖放到目标元素\u003c/li\u003e\n    \u003cli\u003e如果 effectAllowed 属性值设置为 all 或不设置，则 dropEffect 属性允许被设置为任何值\u003c/li\u003e\n    \u003cli\u003e如果 effectAllowed 属性设置为具体操作，而 dropEffect 也设置了具体的视觉效果，则 dropEffect 属性值必须与 effectAllowed\n        属性值相匹配，否则不允许被拖放的元素放置到目标元素内\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ee(source, 'dragstart', function(event) { \u003c/span\u003e\u003cspan class=\"p6\"\u003elet d =\n        event.dataTransfer; \u003c/span\u003e\u003cspan class=\"p6\"\u003ed.effectAllowed = 'copy'; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ed.setData('text/plain', this.innerHTML); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ee(dest, 'dragover', function(event) { \u003c/span\u003e\u003cspan class=\"p6\"\u003elet t = event.dataTransfer;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003et.dropEffect = 'copy'; \u003c/span\u003e\u003cspan class=\"p4\"\u003e});\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eDataTransfer 对象的 setDragImage() 包括三个参数：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e第 1 个参数设置拖放图标的图标元素\u003c/li\u003e\n    \u003cli\u003e第 2 个参数设施拖放图标离鼠标指针的 x 轴方向的位移偏量\u003c/li\u003e\n    \u003cli\u003e第 3 个参数设置拖放图标离鼠标指针的 y 轴方向的位移偏量\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e#drag { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 200px;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 200px; \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground-color: #f0f; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eborder-radius: 12px; \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-align: center; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eline-height: 200px; \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #ff0; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e #target { \u003c/span\u003e\u003cspan class=\"p6\"\u003eposition: relative; \u003c/span\u003e\u003cspan class=\"p6\"\u003eleft: 1000px;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003etop: 100; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ewidth: 400px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 400px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eborder: 1px dotted\n        #00f; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: -100px 12px 12px; \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* float: right; */\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eoverflow: auto; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003epadding: 2rem 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e
