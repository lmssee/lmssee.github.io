class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>属性</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eHTML5 增加及废除的属性\u003c/h5\u003e\n\u003cp\u003e增加的属性。\u003c/p\u003e\n\u003ch6\u003e表单属性\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e为 input （ type=text ）、 select 、 textarea 与 button 元素新增加 autofocus 属性。它以指定属性的方式让元素在画面打开时自动获得焦点\u003c/li\u003e\n    \u003cli\u003e为 input 元素（ type=text ）与 textarea 元素新增加 placeholder 属性，它会对用户的输入进行提示，提示用户可以输入的内容\u003c/li\u003e\n    \u003cli\u003e为 input 、 output 、 select 、 textarea 、 button 与 fieldset 新增加 form 属性，声明它属于哪个表单，然后将其放置在页面上任何位置，而不是表单之内\u003c/li\u003e\n    \u003cli\u003e为 input 元素（ type=text ）与 textarea 元素新增加 required 属性。该属性表示在用户提交的时候进行检查，检查该元素内一定要有输入内容\u003c/li\u003e\n    \u003cli\u003e为 input 元素增加 autocomplete 、 min 、 max 、 multiple 、 pattern 和 step 属性。同时还有一个新的 list 元素与 datalist 元素配合使用。\n        datalist 元素与 autocomplete 属性配合使用\u003c/li\u003e\n    \u003cli\u003emultiple 属性允许在上传文件时一次上传多个文件\u003c/li\u003e\n    \u003cli\u003e为 input 元素与 button 元素增加了新属性 formaction 、 formenctype 、 formmethod 、 formnovalidate 与 formtarget ，它们可以重载 form\n        元素的 action 、 enctype 、 method 、 novalidate 与 target 属性。为 fieldset 元素增加了 disabled 属性，可以把它的子元素设为 disabled\n        （无效）状态\u003c/li\u003e\n    \u003cli\u003e为 input 元素、 button 元素和 form 元素增加了 novalidate 属性，该属性可以取消提交时进行的有关检查，表单可以被无条件地提交\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e链接属性\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e为 a 元素与 area 元素增加了 media 属性，该属性规定目标 URL 是为哪种类型的媒介或设备进行优化的，只能在 href 属性存在时使用\u003c/li\u003e\n    \u003cli\u003e为 area 元素增加了 hreflang 属性与 rel 属性，以保持与 a 元素、 link 元素的一致\u003c/li\u003e\n    \u003cli\u003e为 link 元素增加了新属性 sizes 。该属性可以与 icon 元素结合使用（通过 rel 属性），用于指定关联图标（ icon 元素）的大小\u003c/li\u003e\n    \u003cli\u003e为 base 元素增加了 target 属性，主要目的是保持与 a 元素的一致性\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e其它属性\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e为 ol 元素增加 reversed 属性，用于指定列表倒序显示\u003c/li\u003e\n    \u003cli\u003e为 meta 元素增加 charset 属性，因为这个属性已经被广泛支持了，而且为文档的字符编码的指定提供了一种比较良好的方式\u003c/li\u003e\n    \u003cli\u003e为 menu 元素增加了两个新的属性 --type 与 label 。 label 属性为菜单定义一个可见的标注， type 属性让菜单可以以上下文菜单、工具条或列表菜单这 3 种形式出现\u003c/li\u003e\n    \u003cli\u003e为 style 元素增加 scoped 属性，用来规定样式的作用范围，譬如只对页面上某个树起作用\u003c/li\u003e\n    \u003cli\u003e为 script 元素增加 async 属性，用于定义脚本是否异步执行\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eHTML5 全局属性\u003c/h5\u003e\n\u003cp\u003eHTML 5 新增 8 个全局属性，所谓全局属性，就是指所有的元素都可以使用的属性。\u003c/p\u003e\n\u003ch6\u003econtentEditable 属性\u003c/h6\u003e\n\u003cp\u003econtentEditable 属性的主要功能是允许用户在线编辑元素中的内容。 contentEditable 是一个布尔值属性，可以被指定为 true 或 false 。此外，该属性还有个隐藏的 inherit\n    （继承）状态，属性值为 true 时，元素被指定为允许编辑；属性值为 false 时，元素被指定为不允许编辑；未指定 true 或 false 时，则由 inherit\n    状态来决定，如果元素的父元素是可编辑的，则该元素就是可编辑的。\u003c/p\u003e\n\u003cp\u003econtentEditable 属性支持的元素包括： defaults 、 A 、 ABBR 、 ACRONYM 、 ADDRESS 、 B 、 BDO 、 BIG 、 BLOCKQUOTE 、 BODY 、 BUTTON 、\n    CENTER 、 CITE 、 CODE 、 CUSTOM 、 DD 、 DEL 、 DFN 、 DIR 、 DIV 、 DL 、 DT 、 EM 、 FIELDSET 、 FONT 、 FORM 、 hn 、 I 、\n    INPUT type=button 、 INPUT\n    type=password 、 INPUT type=radio 、 INPUT type=reset 、 INPUT type=submit 、 INPUT type=text 、 INS 、 ISINDEX 、 KBD\n    和 LABEL 。\u003c/p\u003e\n\u003ch6\u003econtextmenu\u003c/h6\u003e\n\u003cp\u003econtextmenu 属性用于 div 上下文菜单。在用户点击该元素区域时显现。\u003c/p\u003e\n\u003ch6\u003edata-* 属性\u003c/h6\u003e\n\u003cp\u003e使用 data-* 属性自定义用户数据。\u003c/p\u003e\n\u003ch6\u003edesignMode 属性\u003c/h6\u003e\n\u003cp\u003edesignMode 属性用来指定整个页面是否可编辑，当页面可编辑时，页面中任何支持上文所述的 contentEditable 属性的元素都变成了可编辑状态。 designMode 属性只能在 JavaScript\n    脚本里被编辑修改。该属性有两个值： on 与 off 。属性被指定为 on 时，页面可编辑；被指定为 off 时，页面不可编辑。\u003c/p\u003e\n\u003ch6\u003edraggable 属性\u003c/h6\u003e\n\u003cp\u003edraggable 属性用于定义元素是否可拖动。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003etrue 定义元素可拖动\u003c/li\u003e\n    \u003cli\u003efalse 定义元素不可拖动\u003c/li\u003e\n    \u003cli\u003eauto 定义使用浏览器的默认行为\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003edropZone 属性\u003c/h6\u003e\n\u003cp\u003edropZone 属性用于定义在元素上拖动时，是否复制、移动或链接被拖动数据。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ecopy 拖动数据会产生被拖动数据的副本\u003c/li\u003e\n    \u003cli\u003emove 拖动数据会导致被拖动数据移动到新的位置\u003c/li\u003e\n    \u003cli\u003elink 拖动数据会产生原始数据的链接\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003ehidden 属性\u003c/h6\u003e\n\u003cp\u003e在 HTML5 中，所有的元素都允许使用一个 hidden 属性。该属性类似于 input 元素中的 hidden\n    元素，功能是通知浏览器不渲染该元素，使该元素处于不可见状态。但是元素中的内容还是浏览器创建的，也就是说页面装载后允许使用 JavaScript 脚本将该属性取消，取消后该元素变为可见状态，同时元素中的内容也即时显示出来。\n    hidden 属性是一个布尔值的属性，当设为 true 时，元素处于不可见状态；当设为 false 时，元素处于可见状态。\u003c/p\u003e\n\u003ch6\u003espellcheck 属性\u003c/h6\u003e\n\u003cp\u003espellcheck 属性是 HTML5 针对 input 元素（ type=text ）与 textarea 这两个文本输入框提供的一个新属性，它的功能为对用户输入的文本内容进行拼写和语法检查。 spellcheck\n    属性是一个布尔值的属性，具有 true 和 false 两种值，但是书写时有一个特殊的地方，就是必须明确声明属性值为 true 或 false 。\u003c/p\u003e\n\u003ch6\u003etabindex 属性\u003c/h6\u003e\n\u003cp\u003etabindex 是开发中的一个基本概念，当不断按 Tab 键让窗口或页面中的控件获得焦点，对窗口或页面中的所有控件进行遍历的时候，每一个控件的 tabindex 表示该控件是第几个被访问到的。\u003c/p\u003e\n\u003ch6\u003etranslate\u003c/h6\u003e\n\u003cp\u003e定义是否翻译该元素 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ html 5","title":"属性"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","html 5","属性"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
