    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eform\u003c/h5\u003e\n\u003ch5\u003e新增的 form 元素\u003c/h5\u003e\n\u003ch6\u003edatalist 元素\u003c/h6\u003e\n\u003cp\u003edatalist 元素用于为输入框提供一个可选的列表，用户可以直接选择列表中的某一预设的项，从而免去输入的麻烦。该列表由 datalist 中的 option 元素创建。\u003c/p\u003e\n\u003ch6\u003ekeygen 元素\u003c/h6\u003e\n\u003cp\u003ekeygen 元素是密钥对生成器（ key-pair generator ），能够使用户验证更为可靠。用户提交表单时会生成两个键，一个私钥，一个公钥，其中私钥（ private key ）会被存储在客户端，而公钥（\n    public key ）则会被发送到服务器。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003ekeygen 元素的常用属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性名称\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch6\u003eoutput 元素\u003c/h6\u003e\n\u003cp\u003eoutput 元素用于在浏览器中显示计算结果或脚本输出，包含完整的开始和结束标签。\u003c/p\u003e\n\u003ch6\u003eoptgroup\u003c/h6\u003e\n\u003cp\u003eoptgroup 元素在 HTML 4 中已经存在， HTML 5 中对其进行了扩展。该元素定义选项组，使用该元素允许用户组合选项。当使用一个长的选项列表时，对相关的选项进行组合会使处理更加容易。\u003c/p\u003e\n\u003cp\u003e使用 optgroup 元素可以将 select 元素中的选项进行逻辑分组， optgroup 元素必须在 select 元素中直接定义，而且不允许嵌套，这就意味着不能进行二级分组。 optgroup\n    元素有两个常用的属性，它们分别是 disabled 属性和 label 属性。其中，前者表示首次加载时是否禁用该选项组，而后者则用来定义分组显示的标签名，但是标签名并不能被当作选择项。\u003c/p\u003e\n\u003ch5\u003e新增的 form 属性\u003c/h5\u003e\n\u003ch6\u003eautocomplete 属性\u003c/h6\u003e\n\u003cp\u003eform 元素的 autocomplete 属性用于规定 form 中所有元素都拥有自动完成功能。\u003c/p\u003e\n\u003ch6\u003enovalidate 属性\u003c/h6\u003e\n\u003cp\u003eform 元素的 novalidate 属性用于在提交表单时取消整个表单的验证，即关闭对表单内所有元素的有效性检查。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form action=\"#\" class=\"form1\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;fieldset\n        class=\"fld1\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;legend\u0026gt;个人信息\u0026lt;/legend\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;p\u0026gt;\u0026lt;label for=\"name\"\u0026gt;姓名\u0026lt;/label\u0026gt;\u0026lt;input id=\"name\"\u0026gt;\u0026lt;/p\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;p\u0026gt;\u0026lt;label for=\"address\"\u0026gt;地址\u0026lt;/label\u0026gt;\u0026lt;input id=\"address\"\u0026gt;\u0026lt;/p\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;p\u0026gt;\u0026lt;label for=\"sex\"\u0026gt;性别\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;select\n        id=\"sex\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;option value=\"female\"\u0026gt;女\u0026lt;/option\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;option value=\"male\"\u0026gt;男\u0026lt;/option\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;/select\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/fieldset\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;hr\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;fieldset class=\"fld2\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;legend\u0026gt;其它信息\u0026lt;/legend\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;p\u0026gt;\u0026lt;fieldset\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;legend\u0026gt;你喜欢什么运动?\u0026lt;/legend\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;label\n        for=\"football\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;input id=\"football\" name=\"yundong\"\n        type=\"checkbox\"\u0026gt;足球\u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;label for=\"basketball\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;input id=\"basketball\" name=\"yundong\"\n        type=\"checkbox\"\u0026gt;篮球\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;label for=\"ping\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e\u0026lt;input id=\"ping\" name=\"yundong\" type=\"checkbox\"\u0026gt;乒乓球\u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;/fieldset\u0026gt;\u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;p\u0026gt;\u0026lt;fieldset\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u0026lt;legend\u0026gt;请写下你的建议? \u0026lt;/legend\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;label for=\"comments\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;textarea id=\"comments\" rows=\"7\" cols=\"25\"\u0026gt;\u0026lt;/textarea\u0026gt;\u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;/fieldset\u0026gt;\u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/fieldset\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;input value=\"提交个人信息\" type=\"submit\"\u0026gt; \u0026lt;/form\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003einput\u003c/h5\u003e\n\u003ch5\u003e新增的 input 属性\u003c/h5\u003e\n\u003cp\u003e用于指定输入类型的行为和限制，这些属性分别是 autocomplete 、 autofocus 、 form 、 form overrides 、 placeholder 、 height 和 width 、 min 和\n    max 、 step 、 list 、 pattern 以及 required 。\u003c/p\u003e\n\u003ch6\u003eautocomplete 属性\u003c/h6\u003e\n\u003cp\u003e新增的 autocomplete 属性可以帮助用户在 input 类型的输入框中实现自动完成内容输入，这些 input 类型包括： text 、 search 、 url 、 telephone 、 email 、\n    password 、 ?? 、 range 以及 color 。不过，在某些浏览器中，可能需要首先启用浏览器本身的自动完成功能，才能使 autocomplete 属性起作用。\u003c/p\u003e\n\u003cp\u003eautocomplete 属性有 3 种值： on 、 off 和空值。\u003c/p\u003e\n\u003ch6\u003eautofocus 属性\u003c/h6\u003e\n\u003cp\u003e页面中的文字输入框会自动获得光标焦点，以方便输入搜索关键词。\u003c/p\u003e\n\u003ch6\u003eform 属性\u003c/h6\u003e\n\u003cp\u003eform 属性，可以把表单内的从属元素写在页面中的任一位置，然后只需要为这个元素指定 form 属性并设置属性值为该表单的 id 。\u003c/p\u003e\n\u003ch6\u003e表单重写属性\u003c/h6\u003e\n\u003cp\u003e表单重写（ form override ）属性\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eformaction ：用于重写表单的 action 属性\u003c/li\u003e\n    \u003cli\u003eformenctype ：用于重写表单的 enctype 属性\u003c/li\u003e\n    \u003cli\u003eformmethod ：用于重写表单的 method 属性\u003c/li\u003e\n    \u003cli\u003eformnovalidate ：用于重写表单的 novalidate 属性\u003c/li\u003e\n    \u003cli\u003eformtarget ：用于重写表单的 target 属性\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003eheight 与 width 属性\u003c/h6\u003e\n\u003cp\u003eheight 和 width 属性规定用于 image 类型的 input 标签的图像高度和宽度，这两个属性只适用于 image 类型的 \u0026lt;input\u0026gt; 标签。\u003c/p\u003e\n\u003ch6\u003elist 属性\u003c/h6\u003e\n\u003cp\u003eHTML5 中新增了一个 datalist 元素，可以实现数据列表的下拉效果，其外观类似 autocomplete ，用户可从列表中选择，也可自行输入。而 list 属性用于指定输入框所绑定的 datalist\n    元素，其值是某个 datalist 的 id 。\u003c/p\u003e\n\u003ch6\u003emin 、 max 和 step 属性\u003c/h6\u003e\n\u003cp\u003emin 、 max 和 step 属性用于为包含数字或日期的 input 输入类型规定限值，也就是给这些类型的输入框加一个数值的约束，适用于 date 、 pickers 、 number 和 range 标签。\u003c/p\u003e\n\u003ch6\u003emultiple 属性\u003c/h6\u003e\n\u003cp\u003emultiple 属性支持一次性选择多个文件，并且该属性同样支持新增的 email 类型。\u003c/p\u003e\n\u003ch6\u003epattern 属性\u003c/h6\u003e\n\u003cp\u003epattern 属性用于验证 input 类型输入框中用户输入的内容是否与自定义的正则表达式相匹配，该属性适用于以下类型的 \u0026lt;input*gt; 标签： text 、 search 、 url 、 telephone 、\n    email 、 password 。其实许多 input 输入类型本身就是 HTML5 \"内建\"的正则表达式，如 email 、 number 、 tel 、 url\n    等，使用这些输入类型，浏览器便能够检查用户的输入是否合乎既定的规则。\u003c/p\u003e\n\u003ch6\u003eplaceholder 属性\u003c/h6\u003e\n\u003cp\u003eplaceholder 属性用于为 input 类型的输入框提供一种提示（ hint ），这些提示可以描述输入框期待用户输入何种内容，在输入框为空时显式出现，而当输入框获得焦点时则会消失。 placeholder\n    属性适用于以下类型的 \u0026lt;input\u0026gt; 标签： text 、 search 、 url 、 telephone 、 email 和 password 。\u003c/p\u003e\n\u003ch6\u003erequired 属性\u003c/h6\u003e\n\u003cp\u003e新增的 required 属性用于规定输入框填写的内容不能为空，否则不允许用户提交表单。该属性适用于以下 input 输入类型： text 、 search 、 url 、 telephone 、 email 、\n    password 、 date pickers 、 number 、 checkbox 、 radio 和 file 。\u003c/p\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['challenge', '如果使用该属性，将 keygen 的值设置为在提交时会给出提示',],\n        ['disabled', '禁用 keygen 字段',],\n        ['form', '定义该 keygen 字段所属的一个或多个表单',],\n        ['keyType', '定义生成密钥的算法，默认值为 rsa',],\n        [' name', '定义 keygen 元素的唯一名称。用于在提交表单时获取字段的值',],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ html 5","title":"表单"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","html 5","表单"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
