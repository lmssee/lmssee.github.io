  <script id="__NEXT_DATA__"
    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eh5 语义元素 / 结构元素\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e\u0026lt;header\u0026gt;\u0026lt;/header\u0026gt; ：这似乎是违反直觉的，但是可以在单个页面内使用多个 \u0026lt;header\u0026gt; 标签。 \u0026lt;header\u0026gt;\n        标签应该用作介绍性信息的容器，因此在页面中只可能出现一次（很可能位于顶部），但是如果把页面内容分成多个区域，那么也可能多次使用它。任何容器元素都可以具有一个 \u0026lt;header\u0026gt;\n        元素，只需确保使用它包括关于其中包含的元素的介绍性信息即可\u003c/li\u003e\n    \u003cli\u003e\u0026lt;footer\u0026gt;\u0026lt;/footer\u0026gt; ： \u0026lt;footer\u0026gt; 标签用于包含关于其包含元素（页面或区域）的额外信息，比如版权和作者信息，或者指向相关资源的链接。\u003c/li\u003e\n    \u003cli\u003e\u0026lt;nav\u0026gt;\u0026lt;/nav\u0026gt; ：如果站点具有导航元素，比如指向站点内或者甚至页面自身内的其它区域的链接，这些链接将位于 \u0026lt;nav\u0026gt; 标签内。通常可以在 \u0026lt;header\u0026gt;\n        标签的第一个实例中发现 \u0026lt;nav\u0026gt; 标签，这只是因为人们倾向于把导航系统放在顶部，并将其视作介绍性信息，但是并非必须如此。你可以把 \u0026lt;nav\u0026gt;\n        元素放在任意位置（只要它包括导航系统即可），并且可以根据需要在页面上具有许多 \u0026lt;nav\u0026gt; 元素（通常不超过两个，但是你可能另有所图）。\n    \u003c/li\u003e\n    \u003cli\u003e\u0026lt;section\u0026gt;\u0026lt;/section\u0026gt; ： \u0026lt;section\u0026gt; 标签包含主题上相关的任何内容，它还可以包含一个用于介绍性信息的 \u0026lt;header\u0026gt;\n        标签，并且可能包含一个用于其它相关信息的 \u0026lt;footer\u0026gt; 标签。可以把 \u0026lt;section\u0026gt; 视作携带有比标准的 \u0026lt;p\u0026gt; （段落）或 \u0026lt;div\u0026gt;\n        （分区）标签更多的含义，后面两个标签通常根本不会传达任何含义，使用 \u0026lt;section\u0026gt;\n        可以传达它所包含的内容元素之间的关系。\n    \u003c/li\u003e\n    \u003cli\u003e\u0026lt;article\u0026gt;\u0026lt;/article\u0026gt; ： \u0026lt;article\u0026gt; 标签就像是 \u0026lt;section\u0026gt; 标签，这是由于它可以包含 \u0026lt;header\u0026gt; 、\n        \u0026lt;footer\u0026gt; 以及其它的容器元素，比如段落和分区。但是利用 \u0026lt;article\u0026gt;\n        标签携带的额外含义是它就像报纸或其它出版物中的文章一样。在发表的博客、新闻文章、评论及其它适合这种描述的项目周围可以使用这个标签。 \u0026lt;article\u0026gt; 与 \u0026lt;section\u0026gt;\n        之间的一个关键区别是 \u0026lt;article\u0026gt; 是一个独立的作品体系，而 \u0026lt;section\u0026gt; 则是一个主题信息组\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eheader\u003c/h5\u003e\n\u003cp\u003e在最基本的层面上， \u0026lt;header\u0026gt; 元素包含介绍性信息。该信息可能采用实际的 \u0026lt;h1\u0026gt; （或其它级别）元素的形式，或者它可能只是 \u0026lt;p\u0026gt; 或 \u0026lt;div\u0026gt;\n    元素内包含的标志图像或文本。内容的含义本质上应该是介绍性的，以保证它包括在 \u0026lt;header\u0026gt;\u0026lt;/header\u0026gt; 标签对内。\u003c/p\u003e\n\u003cp\u003e\u0026lt;header\u0026gt; 内所允许内容的唯一例外是： \u0026lt;header\u0026gt; 元素不能包含其它 \u0026lt;header\u0026gt; 元素，也不能包含 \u0026lt;footer\u0026gt; 元素。类似地，\n    \u0026lt;header\u0026gt; 元素不能被包含在 \u0026lt;address\u0026gt; 或 \u0026lt;footer\u0026gt; 元素内。\u003c/p\u003e\n\u003ch5\u003esection\u003c/h5\u003e\n\u003cp\u003e由于 \u0026lt;section\u0026gt; 元素可以包含任何其它的流式内容元素，并且可以被包含在其它任何流式内容元素内（ \u0026lt;address\u0026gt; 元素除外），很容易明白的是，对于 \u0026lt;section\u0026gt;\n    元素的使用，如果具有通用的指导原则但是没有其它的限制，那么有时会误解它。\u003c/p\u003e\n\u003cp\u003e在使用 section 元素时应该注意以下几个问题。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e不要将 section 元素当做设置样式的页面容器，对于此类操作应该使用 div 元素实现\u003c/li\u003e\n    \u003cli\u003e如果 article 元素、 aside 元素或 nav 元素更符合使用条件，不要使用 section 元素\u003c/li\u003e\n    \u003cli\u003e不要为没有标题的内容区块使用 section 元素\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003earticle\u003c/h5\u003e\n\u003cp\u003e文档、页面、应用程序或站点中的一个完整或自含式的作品，在理论上讲，它是可独立分发或重用的。\u003c/p\u003e\n\u003ch5\u003enav\u003c/h5\u003e\n\u003cp\u003enav 意为导航。在 html 5 中 ，一般使用 ul 或 ol 对连接进行结构化，让后在外部包裹一个 nav 。\u003c/p\u003e\n\u003ch5\u003easide\u003c/h5\u003e\n\u003cp\u003e\u0026lt;aside\u0026gt; 意指包含与它周围的内容只有稍微有些关联的任何内容——额外的解释、指向相关资源的链接、醒目引文、帮助文本等。\u003c/p\u003e\n\u003ch5\u003efooter\u003c/h5\u003e\n\u003cp\u003e与 \u0026lt;header\u0026gt; 元素类似， \u0026lt;footer\u0026gt; 元素可以包含流式内容类别中的其它任何元素（其它 \u0026lt;footer\u0026gt; 或 \u0026lt;header\u0026gt; 元素除外），并且它也是其中一员。此外，\n    \u0026lt;footer\u0026gt; 元素不能包含在 \u0026lt;address\u0026gt; 元素内，但是 \u0026lt;footer\u0026gt; 元素可以包含 \u0026lt;address\u0026gt; 元素。事实上， \u0026lt;footer\u0026gt; 元素是存放\n    \u0026lt;address\u0026gt; 元素的常见位置。\n\u003c/p\u003e\n\u003cp\u003e在 \u0026lt;footer\u0026gt; 元素内放置有用的 \u0026lt;address\u0026gt; 内容是 \u0026lt;footer\u0026gt; 元素的最有效的应用之一（更不要说 \u0026lt;address\u0026gt;\n    元素了），因为它提供了关于它所引用的页面或页面区域的特定上下文信息。\u003c/p\u003e\n\u003ch5\u003ediv\u003c/h5\u003e\n\u003cp\u003ediv 并不是语义元素，但却是相当重要的结构性元素。\u003c/p\u003e\n\u003cp\u003ediv 是无语义的块级容器， span 是无语义的内联短语内容。两个在实际开发中用的最多。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ html 5","title":"语义元素"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","html 5","语义元素"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
