="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>H5基础</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e判断浏览器是否支持 HTML 5\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e!!navigator.geolocation;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e在 HTML 5 中， navigator.geolocation 可以获取设备的当前位置，通过双\" ! \"就可以判断是否支持此 API ，即是否支持 HTML 5 。\u003c/p\u003e\n\u003ch5\u003e判断浏览器是否支持 Canvas\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction isCanvas () {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereturn !!document.createElement('canvas').getContext;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eHTML5 语法\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e内容类型 HTML5 的文件扩展名与内容类型保持不变。也就是说，扩展名仍然为 .html 或 .htm ，内容类型仍然为 text/html \u003c/li\u003e\n    \u003cli\u003e文档类型声明 根据 HTML5 设计化繁为简的准则，文档类型和字符说明都进行了简化\u003c/li\u003e\n    \u003cli\u003e字符编码\u003c/li\u003e\n    \u003cli\u003e版本兼容性\n        \u003cul\u003e\n            \u003cli\u003e不允许写结束标记的元素有： area 、 base 、 br 、 col 、 command 、 embed 、 hr 、 img 、 input 、 keygen 、 link 、 meta 、\n                param 、 source 、 track 和 wbr\u003c/li\u003e\n            \u003cli\u003e可以省略结束标记的元素有： li 、 dt 、 dd 、 p 、 rt 、 rp 、 optgroup 、 option 、 colgroup 、 thead 、 tbody 、 tfoot 、 tr\n                、 td 和 th\u003c/li\u003e\n            \u003cli\u003e可以省略全部标记的元素有： html 、 head 、 body 、 colgroup 和 tbody\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e布尔值\u003c/h6\u003e\n\u003cp\u003e对于使用 boolean 值的属性，如 disabled 或 readonly 等，当只写属性而不指定属性值时，表示属性值为 true ；如果想将属性值设置为 false ，可以不设置该属性。另外，要想将属性值设定为 true\n    ，也可以将属性名设定为属性值，或将空字符串设定为属性值。\u003c/p\u003e\n\u003ch6\u003e属性值\u003c/h6\u003e\n\u003cp\u003e属性值两边既可以用双引号，也可以使用单引号。当属性值不包括空字符串、 \u0026lt; 、 \u0026gt; 、 = 、单引号、双引号等字符时，也可以省略属性值两边的引号。\u003c/p\u003e\n\u003ch5\u003eHTML5 元素\u003c/h5\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eHTML5 的内容类型\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e内容类型\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003eHTML5 其它功能\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003eSelectors API\u003c/summary\u003e\n            \u003cp\u003eHTML5 引入了一种用于查找页面 DOM 元素的快捷方式。在传统方法中主要使用 JavaScript 脚本来实现。例如，使用 getElementById() 函数根据指定的 ID\n                值查找并返回元素，使用 getElementsByName() 函数返回所有 name 指定值的元素， getElementsByTagName() 函数返回所有标签名称与指定值相匹配的元素。\u003c/p\u003e\n            \u003cp\u003e有了新的 Selectors API 之后，可以用更精确的方式来指定希望获取的元素，而不必再用标准 DOM 方式循环遍历。 Selectors API 与现在 CSS\n                中使用的选择规则一样，通过它可以查找页面中的一个或多个元素。例如， CSS 已经可以基于嵌套、兄弟和子模式等关系进行元素选择。 CSS\n                的最新版除添加了更多对伪类的支持，如判断一个对象是否被启用、禁用或者被选择等，还支持对属性和层次的随意组合叠加。使用如表 2.4 所示的函数就能按照 CSS 规则来选取\n                DOM 中的元素。\n            \u003c/p\u003e\n            \u003ctable\u003e\n                \u003ccaption\u003eQuerySelector 新方法\u003c/caption\u003e\n                \u003ctr\u003e\n                    \u003cth\u003e函数\u003c/th\u003e\n                    \u003cth\u003e说明\u003c/th\u003e\n                    \u003cth\u003e实例\u003c/th\u003e\n                    \u003cth\u003e返回值\u003c/th\u003e\n                \u003c/tr\u003e\n                \u003ctr\u003e\n                    \u003ctd\u003equerySelector()\u003c/td\u003e\n                    \u003ctd\u003e根据指定的选择规则，返回在页面中找到的第一个匹配元素\u003c/td\u003e\n                    \u003ctd\u003equerySelector (\"input.error\");\u003c/td\u003e\n                    \u003ctd\u003e返回第一个 CSS 类名为\" error \"的文本输入框\u003c/td\u003e\n                \u003c/tr\u003e\n                \u003ctr\u003e\n                    \u003ctd\u003equerySelectorAll()\u003c/td\u003e\n                    \u003ctd\u003e根据指定规则返回页面中所有相匹配的元素\u003c/td\u003e\n                    \u003ctd\u003equerySelectorAll (\"#results td\");\u003c/td\u003e\n                    \u003ctd\u003e返回 id 值为 results 的元素下所有的单元格\u003c/td\u003e\n                \u003c/tr\u003e\n            \u003c/table\u003e\n            \u003cp\u003e对于 querySelector() 来说，选择的是满足规则中任意条件的第一个元素。对于 querySelectorAll()\n                来说，页面中的元素只要满足规则中的任何一个条件，都会被返回，多条规则是用逗号分隔的。\u003c/p\u003e\n            \u003cdiv class=\"note\"\u003e\n                \u003cp\u003e Selectors API 不仅仅是方便，在遍历 DOM 的时候， Selectors API 通常会比以前的子节点搜索 API 更快。为了实现快速样式表，浏览器对选择器匹配进行了高度优化\n                \u003c/p\u003e\n            \u003c/div\u003e\n\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003eJavaScript 日志和调试\u003c/summary\u003e\n            \u003cp\u003e从技术上讲 JavaScript 日志和浏览器内调试虽然不属于 HTML5 的功能，但在过去的几年里，相关工具的发展出现了质的飞跃。第一个可以用来分析 Web 页面及其所运行脚本的强大工具是一款名为\n                Firebug 的 Firefox 插件。现在，相同的功能在其它浏览器的内嵌开发工具中也可以找到。例如， Safari 的 Web Inspector 、 Google 的 Chrome 开发者工具（\n                Developer Tools ）、 IE 的开发者工具（ Developer\n                Tools ），以及 Opera 的 Dragonfly 。很多调试工具支持设置断点来暂停代码执行、分析程序状态以及查看变量的当前值。\u003c/p\u003e\n            \u003cp\u003e\n                console.log API 已经成为 JavaScript 开发人员记录日志的事实标准。为了便于开发人员查看记录到控制台的信息，很多浏览器提供了分栏窗格的视图。 console.log API\n                要比 alert() 好用很多，因为它不会阻塞脚本的执行。\u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003ewindow.JSON\u003c/summary\u003e\n            \u003cp\u003eJSON 是一种相对来说比较新并且正在日益流行的数据交换格式。作为 JavaScript 语法的一个子集，它将数据表示为对象字面量。由于其语法简单和在 JavaScript 编程中与生俱来的兼容性，\n                JSON 变成了 HTML5 应用内部数据交换的事实标准。典型的 JSON API 包含两个函数： parse() 和 stringify() （分别用于将字符串序列化成 DOM 对象和将 DOM\n                对象转换成字符串）。\u003c/p\u003e\n            \u003cp\u003e如果在旧的浏览器中使用 JSON ，需要 JavaScript 库（有些可以从 http://json.org 上找到）。在 JavaScript\n                中执行解析和序列化效率往往不高，所以为了提高执行速度，新的浏览器原生扩展了对 JSON 的支持，可以直接通过 JavaScript 来调用 JSON 了。这种本地化的 JSON 对象被纳入了\n                ECMAScript 5 标准，成为了下一代 JavaScript 语言的一部分。它也是 ECMAScript 5 标准中首批被浏览器支持的功能之一。所有新的浏览器都支持\n                window.JSON ，将来 JSON 必将大量应用于 HTML5 中。\u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003eDOM Level 3\u003c/summary\u003e\n            \u003cp\u003e事件处理是目前 Web 应用开发中最麻烦的部分。除了 IE 以外，绝大多数浏览器都支持处理事件和元素的标准 API 。早期 IE 实现的是与最终标准不同的事件模型，而 IE9 开始支持 DOM\n                Level 2 和 DOM Level 3 的特性。如此，在所有支持 HTML5 的浏览器中，用户终于可以使用相同的代码来实现 DOM 操作和事件处理了，包括非常重要的\n                addEventListener() 和 dispatchEvent() 方法。\u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003eMonkeys 、 ?? 和其它 JavaScript 引擎\u003c/summary\u003e\n            \u003cp\u003e最新版本的主流浏览器不仅大量增加了新的 HTML5 标签和 API 。同时主流浏览器中 JavaScript/ECMAScript 引擎升级幅度也非常大。新的 API\n                提供了很多上一代浏览器无法实现的功能，因而脚本引擎整体执行效率的提升，不论对现有的，还是使用了最新 HTML5 特性的 Web 应用都有好处。 开发出更快的 JavaScript\n                引擎是目前主流浏览器竞争的核心。过去的 JavaScript 纯粹是被解释执行，而最新的引擎则直接将脚本编译成原生机器代码，相比\n                2005 年前后的浏览器，速度的提升已经不在一个数量级上了。\n            \u003c/p\u003e\n            \u003cp\u003e2006 年 Adobe 将其 JIT 编译引擎和代号为 Tamarin 的 ECMAScript 虚拟机捐赠给 Mozilla 基金会，从此 JavaScript 引擎的竞争序幕就拉开了。尽管新版的\n                Mozilla 中 Tamarin 技术已经所剩无几，但 Tamarin 的捐赠促进了各家浏览器对新脚本引擎的研发，而这些引擎的名字就如同它们声称的性能一样有意思。总之，得益于浏览器厂商间的良性竞争，\n                JavaScript 的执行性能越来越接近于本地桌面应用程序了。\n            \u003c/p\u003e\n            \u003ctable id=\"Ab\"\u003e\n                \u003ccaption\u003eWeb 浏览器的 JavaScript 引擎\u003c/caption\u003e\n                \u003ctr\u003e\n                    \u003cth\u003e浏览器\u003c/th\u003e\n                    \u003cth\u003e引擎名称\u003c/th\u003e\n                    \u003cth\u003e说明\u003c/th\u003e\n                \u003c/tr\u003e\n            \u003c/table\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eh5 结构\u003c/h5\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e有点长\u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;!DOCTYPE html\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;!-- 声明文档结构类型 --\u0026gt;\u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u0026lt;html lang=zh-cn\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;!-- 声明文档文字区域 --\u0026gt;\u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域 --\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=utf-8\u0026gt;\u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域中元数据区的字符集定义， utf-8 表示国际通用的字符集编码格式 --\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!--[if\n            IE]\u0026gt;\u0026lt;![endif]--\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域的兼容性写法 --\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt; 文档标题\n            \u0026lt;/title\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域的标题。 title 内容对于 SEO 来说极其重要 --\u0026gt;\u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e\u0026lt;!--[if IE 9]\u0026gt;\u0026lt;meta name=ie content=9\u0026gt;\u0026lt;![endif]--\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域的兼容性写法 --\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!--[if IE 8]\u0026gt;\u0026lt;meta name=ie\n            content=8 \u0026gt;\u0026lt;![endif]--\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域的兼容性写法 --\u0026gt;\u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e\u0026lt;meta name=description content= 文档描述信息 \u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域元数据区关于文档描述的定义 --\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=author content=\n            文档作者 \u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域元数据区关于开发人员姓名的定义 --\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n            name=copyright content= 版权信息 \u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域元数据区关于版权的定义 --\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;link rel=shortcut icon\n            href=favicon.ico\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域的兼容性写法 --\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;link\n            rel=apple-touch-icon href=custom_icon.png\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域的 apple 设备的图标的引用 --\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=viewport\n            content=width=device-width, user-scalable=no\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域对于不同接口设备的特殊声明。宽 =\n            设备宽，用户不能自行缩放 --\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;link rel=stylesheet href=main.css\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域的样式文件引用\n            --\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!--[if IE]\u0026gt;\u0026lt;link rel=stylesheet\n            href=win-ie-all.css\u0026gt;\u0026lt;![endif]--\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域的兼容性样式文件引用写法 --\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!--[if IE 7]\u0026gt;\u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u0026lt;link rel=stylesheet type=text/css href=win-ie7.css\u0026gt;\u0026lt;![endif]--\u0026gt;\u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域的 IE7 浏览器的兼容性写法 --\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;!--[if lt IE 8]\u0026gt;\u0026lt;script src=http://ie7-js.googlecode.com \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e/svn/version/2.0(beta3)/IE8.js\u0026gt;\u0026lt;/script\u0026gt;\u0026lt;![endif]--\u0026gt;\u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域的关于让 IE8 也兼容 HTML5 的 JavaScript 脚本 --\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;script src=script.js\u0026gt;\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!-- 文档的头部区域的\n            JavaScript 脚本文件调用 --\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u0026lt;body\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;header\u0026gt;HTML5 文档的头部区域 \u0026lt;/header\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;nav\u0026gt;HTML5\n            文档的导航区域 \u0026lt;/nav\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;section\u0026gt;HTML5 文档的主要内容区域\u003c/span\u003e\u003cspan\n            class=\"p4\"\u003e\u0026lt;aside\u0026gt; HTML5 文档的主要内容区域的侧边导航或菜单区 \u0026lt;/aside\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e\u0026lt;article\u0026gt; HTML5 文档的主要内容区域的内容区\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;section\u0026gt; 以下是一个 section 和\n            article 的嵌套\u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;aside\u0026gt; \u0026lt;/aside\u0026gt;\u003c/span\u003e\u003cspan\n            class=\"p8\"\u003e\u0026lt;article\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p10\"\u003e\u0026lt;header\u0026gt; \u003c/span\u003e\u003cspan class=\"p12\"\u003eHTML5 文档的嵌套区域，可以对某个 article 区域进行头部和脚部的定义。\n            这样做，可以有非常清晰和严谨的文档目录结构关系\u003c/span\u003e\u003cspan class=\"p12\"\u003e\u0026lt;footer\u0026gt;\u003c/span\u003e\u003cspan\n            class=\"p8\"\u003e\u0026lt;/article\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p6\"\u003e\u0026lt;/section\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/article\u0026gt;\u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e\u0026lt;/section\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;footer\u0026gt;HTML5 文档的脚部区域\n            \u0026lt;/footer\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n        \u003c/code\u003e\n\u003c/details\u003e\n\u003ch5\u003e设计微格式\u003c/h5\u003e\n\u003cp\u003e微格式是一种利用 HTML 的 class 属性来对网页添加附加信息的方法，附加信息如新闻事件发生的日期和时间、个人电话号码、企业邮箱等。微格式并不是在 HTML5 之后才有的，在 HTML5 之前它就和 HTML\n    结合使用了，但是在使用过程中发现在日期和时间的机器编码上出现了一些问题，编码过程中会产生一些歧义。 HTML5 增加了一种新的元素来无歧义地、明确地对机器的日期和时间进行编码，并且以让人易读的方式来展现它。这个元素就是\n    time 元素。\u003c/p\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['内嵌', '在文档中添加其它类型的内容，如 audio 、 video 、 canvas 和 iframe 等',],\n        ['流', '在文档和应用的 body 中使用的元素，如 form 、 h1 和 small 等',],\n        ['标题', '段落标题，如 h1 、 h2 和 hgroup 等',],\n        ['交互', '与用户交互的内容，如音频和视频的控件、 button 和 textarea 等',],\n        ['元数据', '通常出现在页面的 head 中，设置页面其它部分的表现和行为，如 script 、 style 和 title 等',],\n        ['短语', '文本和文本标记元素，如 mark 、 kbd 、 sub 和 sup 等',],\n    ];\n    _MiMethod.td('Aa', Aa);\n    var Ab = [\n        ['Safari', ' Nitro （也称 Squirrel Fish Extreme ）', ' Safari 4 中发布，在 Safari 5 中提升性能，包括字节码优化和上下文线程的本地编译器',],\n        ['Chrome', ' V8', '自从 Chrome 2 开始，使用了新一代垃圾回收机制，可确保内存高度可扩展而不会发生中断',],\n        [' IE', '??', '注重于后台编译和高效的类型系统，速度比 IE8 快 10 倍',],\n        ['Firefox', 'JägerMonkey', '从 3.5 版本优化而来，结合了快速解释和源自追踪树（ trace tree ）的本地编译',],\n        [' Opera ', 'Carakan', '它采用了基于寄存器的字节码和选择性本地编译的方式，声称效率比 10.50 版本提升了 75%',],\n        [' nohref', 'area', '多余属性，被省略',],\n    ];\n    _MiMethod.td('Ab', Ab)\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ html 5","title":"H5基础"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","html 5","H5基础"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
