    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e检查 HTML 5 存储支持\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003efunction supportLocalStorage() { \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        test = 'test'; \u003c/span\u003e\u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 尝试使用 setltem 方法设置本地存储\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003elocalStorage.setltem(test, test); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// 如果 setltem 方法成功，则使用 removeltem 方法移除名为 test 的值\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003elocalStorage.removeltem(test); \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn true; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n        catch (e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn false; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e对于很多 API 来说，特定的浏览器可能只支持其部分功能，但是因为 Web Storage API 非常小，所以它已经得到了相当广泛的支持，不过出于安全考虑，即使浏览器本身支持 Web Storage\n    ，用户仍然可自行选择是否将其关闭。\u003c/p\u003e\n\u003cp\u003e从安全性考虑，所有浏览器下的 session 数据都是不允许跨域访问的，跨子域也是不允许的。其它方面主流浏览器中的实现较为一致。\u003c/p\u003e\n\u003ch5\u003elocalStorage 的常用方法\u003c/h5\u003e\n\u003cp\u003elocalStorage 和 sessionStorage 对象拥有相同的属性和方法，也具有相同的操作：\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003elocalStorage 对象的常用方法\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e方法\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n        \u003cth\u003e例\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e设置和获取数据\u003c/h5\u003e\n\u003cspan class=\"p\"\u003ewindow.sessionStorage.setItem('myFirstKey', 'myFirstValue');\u003c/span\u003e\n\u003cp\u003e需要注意以下 3 点\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e实现 Web Storage 的对象是 window 对象的子对象，因此 window.sessionStorage 包含了开发人员需要调用的函数\u003c/li\u003e\n    \u003cli\u003esetItem 方法需要一个字符串类型的键和一个字符串类型的值来作为参数。虽然 Web Storage 支持传递非字符数据，但是目前浏览器可能还不支待其它数据类型\u003c/li\u003e\n    \u003cli\u003e调用的结果是将字符串 myFirstKey 设置到 sessionStorage 中，这些数据随后可以通过键 myFirstKey 获取\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e获取数据\u003c/h6\u003e\n\u003cp\u003e获取数据需要调用 get Item 函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ealert(window.sessionStorage.get Item('myFirstKey'));\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e可以使用点语法设置数据，使用这种方法，可完全避免调用 setItem 和 getItem ，而只是根据键值的配对关系，直接在 sessionStorage 对象上设置和获取数据。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow.sessionStorage.myFirstKey = 'myFirstValue'\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(window.sessionStorage.myFirstKey);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eJavaScript 允许开发人员设置和获取几乎任何对象的属性，那么为什么还要引入 sessionStorage\n    对象？其实，二者之间最大的区别在于作用。只要网页是同源的（包括规则、主机和端口），基于相同的键，就都能够在其它网页中获得设置在 sessionStorage\n    上的数据。在对同一页面后续多次加载的情况下也是如此。大部分开发者对页面重新加载时经常会丢失脚本数据，但通过 Web Storage 保存的数据不再如此了，重新加载页面后这些数据仍然存在。\u003c/p\u003e\n\u003cp\u003e有时候，一个应用程序会用到多个标签页或窗口中的数据，或多个视图共享的数据。在这种情况下，比较恰当的做法是使用 HTML5 Web Storage 的另一种实现方式 localStorage 。 localStorage 与\n    sessionStorage 用法相同，唯一的区别是访问它们的名称不同，分别通过 localStorage 和 sessionStorage 对象来访问。二者在行为上的差异主要是数据的保存时长及其共享方式。\u003c/p\u003e\n\u003cp\u003elocalStorage 数据的生命周期要比浏览器和窗口的生命周期长，同时被同源的多个窗口或者标签页共享；而 sessionStorage 数据的生命周期只在构建它们的窗口或者标签页中可见。\u003c/p\u003e\n\u003ch5\u003e获取或更新\u003c/h5\u003e\n\u003cp\u003e使用 length 属性获取 key/value 对的数量后，可以使用 key() 方法根据索引号获取键名，该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eojb_Storage.key(index)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 index 用来指定索引号，其值为 0 〜 ojb_Storage.length-1 之间的一个数字。如果索引号超出范围，那么将抛出\"不适合的参数\"异常。\u003c/p\u003e\n\u003cp\u003e该方法的返回值是一个字符串，表示该索引位置的键名，也可以是空字符串。\u003c/p\u003e\n\u003cp\u003e注意，新增加键后，键的索引位置会发生变化。\u003c/p\u003e\n\u003cp\u003e在获取键后，使用 getItem() 方法可以获取键对应的值，该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eojb_Storage.getItem(sKey)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 sKey 是一个字符串，用于指定要获取的键，也可以是空字符串。该方法返回一个字符串，如果指定的键不存在，那么返回 null 。例如下面的代码用于遍历所有键：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar oStorage; \u003c/span\u003e\u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003e//\n        获取存储区域\u003c/span\u003e\u003cspan class=\"p4\"\u003eoStorage = window.localStorage ? window.localStorage :\n        window.globalStorage[strDomain]; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efor (var i = 0; i \u0026lt; oStorage.length; i++) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar strKey =\n        oStorage.key(i); \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.writeln(strKey + \"=\" + \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003eoStorage.getItem(strKey)); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} catch (err) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(err.message ? err.message : err.toString());\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e注意，不能从不安全 URL 环境（ HTTP ）中读取和写入安全环境（ HTTPS ）内定义的键。\u003c/p\u003e\n\u003ch5\u003e清除文件\u003c/h5\u003e\n\u003cp\u003e使用 clear() 方法可以清除所有 key/value 对。\u003c/p\u003e\n\u003cp\u003esessionStorage 存储将会被立即删除， localStorage 存储也将会被从内存中立即删除，分配给它的存储空间也将被清除。\u003c/p\u003e\n\u003cp\u003e例如下面的代码演示了删除前后存储空间的变化：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e// 定义当前域\u003c/span\u003e\u003cspan class=\"p2\"\u003evar oStorage; \u003c/span\u003e\u003cspan class=\"p2\"\u003etry {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 获取存储区域\u003c/span\u003e\u003cspan class=\"p4\"\u003eoStorage = window.localStorage;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(oStorage.remainingSpace); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eoStorage.clear(); \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(oStorage.remainingSpace); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n        catch (err) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(err.message ? err.message : err.toString());\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e该范例仅可以在 IE 浏览器中执行，因为它使用了 IE 特有的属性 remainingSpace ，该属性不是 W3C 规范所规定的，其它浏览器不支持。\u003c/p\u003e\n\u003ch6\u003e清除指定的键\u003c/h6\u003e\n\u003cp\u003e使用 removeItem() 方法可以删除指定的键 / 值对，该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eojb_Storage.removeItem(sKey)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 sKey 是一个字符串，用于指定要删除的键，也可以是空字符串。\u003c/p\u003e\n\u003cp\u003e下面的代码也可以清除所有键 / 值对：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar oStorage; \u003c/span\u003e\u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003e//\n        获取存储区域\u003c/span\u003e\u003cspan class=\"p4\"\u003eoStorage = window.localStorage ? window.localStorage :\n        window.globalStorage[strDomain]; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// 遍历所有键，根据键删除所有键 / 值对\u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i = 0; i \u0026lt; oStorage.length; i++) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar strKey = oStorage.key(i); \u003c/span\u003e\u003cspan class=\"p6\"\u003eoStorage.removeItem(strKey);\n    \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} catch (err) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ealert(err.message ? err.message : err.toString()); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e添加新键和更新键值\u003c/h6\u003e\n\u003cp\u003e使用 setItem() 方法可以添加新键和更新键值，该方法首先检查指定的键是否存在，如果存在就更新键值；如果不存在就增加一个新键。\u003c/p\u003e\n\u003cp\u003e该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eojb_Storage.setItem(sKey, sValue)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cp\u003e参数 sKey 是一个字符串，用于指定要添加或更新的键，也可以是空字符串。\u003c/p\u003e\n\u003cp\u003e参数 sValue 是一个字符串，用于指定键值。\u003c/p\u003e\n\u003cp\u003e该方法在 JavaScript 中也可以被实现为数组或对象，因此使用数组或对象语法也可以完成同样的目标。例如下面的语法是完全相同的：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.sessionStorage.setItem(\"myKey\", \"... \"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ewindow.sessionStorage[' myKey '] = \" \" \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.sessionStorage.myKey = \"\n        \"\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e注意，不能从不安全 URL 环境（ HTTP ）中读取和写入安全环境（ HTTPS ）内定义的键。\u003c/p\u003e\n\u003cp\u003e如果键值的大小超出了存储区域允许的大小，那么就会抛出 Out of memory 异常，因此在应用该方法之前最好使用 remainingSpace 属性检测存储空间。 remainingSpace 属性是 IE\n    特有的属性，不是 W3C 规范所规定的。\u003c/p\u003e\n\u003cp\u003eWeb Storage 不但支持使用 setItem() 、 getItem() 等方法执行存取操作外，也支持使用点号或字符串数组 [] 的方式进行存储数据。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar storage = window.locationStorage; \u003c/span\u003e\u003cspan class=\"p2\"\u003estorage.key1 =\n        'hello'; \u003c/span\u003e\u003cspan class=\"p2\"\u003estorage['key2'] = 'world'; \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(storage.key1);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(storage['key2']);\u003c/span\u003e\n\u003c/code\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        [\"setItem()\", \" 用来保存数据。需要传入两个参数，分别是字符串类型的 key 和 value\", \"setItem(key,value)\"],\n        [\"getItem()\", \" 用来读取数据。需要将 setItem() 方法中用于保存的字符串 key 传入 \", \"getItem(key)\"],\n        [\"removeItem()\", \"  删除单个指定的数据。需要将 key 传入该方法 \", \"removeItem(key)\"],\n        [\" clear()\", \"  直接调用该方法清空所有的数据 \", \"clear()\"],\n        [\" key()\", \" 获取指定下标的键的名称（如同 Array ） \", \"localStorage(key)\"]\n    ];\n    _MiMethod.td(\"Aa\")\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ storage","title":"基本"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","storage","基本"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
