class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>使用</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e利用 localStorage 进行本地存储\u003c/h5\u003e\n\u003cp\u003eStorage 存储机制是通过字符串形式的 key/value 对来存储的，因此，其基本语法可以定义为：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e// 设置 key 值\u003c/span\u003e\u003cspan class=\"p\"\u003eojb_Storage.key = value;\u003c/span\u003e\u003cspan class=\"p\"\u003e//\n        获取 key 值\u003c/span\u003e\u003cspan class=\"p\"\u003evalue = ojb_Storage.key;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e它还有一些方法和属性用来实现更加强大的功能。\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e例\u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;!DOCTYPE HTML\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"UTF-8\"\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt; 范例 \u0026lt;/title\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;button onclick=\"javascript:setItem('user',\n            'zhang-yafei');\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e设置 user 键\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;/button\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;button onclick=\"javascript:getItem('user');\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e显示 user\n            键的值\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/button\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;button\n            onclick=\"javascript:removeItem('user');\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e删除 user 键\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;/button\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"myDiv\"\n            style=\"background:#EEE;width:315px;min-height:50px; padding:10px;border:2px #ccc dashed;\"\u0026gt;\n            \u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e// \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 定义事件函数，监听存储区域变化\u003c/span\u003e\u003cspan class=\"p4\"\u003efunction\n            storageHandler(event) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar myDiv = document.getElementById(\"myDiv\"); \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003emyDiv.innerHTML = \" 存储发生了变化： \u0026lt;br /\u0026gt;\u0026lt;b\u0026gt; \" + \u003c/span\u003e\u003cspan class=\"p8\"\u003eevent.key +\n            \"\u0026lt;/b\u0026gt;键改变了 \u0026lt;br /\u0026gt; 旧值 \u0026lt;b\u0026gt; \" + \u003c/span\u003e\u003cspan class=\"p8\"\u003eevent.oldValue +\n            \"\u0026lt;/b\u0026gt;被改变为为新值 \u0026lt;b\u0026gt; \" + \u003c/span\u003e\n        \u003cspan class=\"p8\"\u003eevent.newValue + \"\u0026lt;/b\u0026gt; \u0026lt;br /\u0026gt; 发生更改所在的网址： \u0026lt;b\u0026gt; \" + \u003c/span\u003e\n        \u003cspan class=\"p8\"\u003eevent.url + \"\u0026lt;/b\u0026gt; \" \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.onstorage =\n            storageHandler; \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 定义当前域\u003c/span\u003e\n        \u003cspan class=\"p4\"\u003evar strDomain = \"127.0.0.1\" \u003c/span\u003e\u003cspan class=\"p4\"\u003evar oStorage; \u003c/span\u003e\u003cspan class=\"p4\"\u003etry {\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 获取存储区域\u003c/span\u003e\u003cspan class=\"p6\"\u003eoStorage = window.localStorage\n            ? window.localStorage : window.globalStorage[strDomain]; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e} catch (err) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(err.message ? err.message : err.toString());\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 定义 3 个函数，分别用来执行创建键、显示键值和删除键操作\u003c/span\u003e\u003cspan\n            class=\"p4\"\u003efunction setItem(key, value) { \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003eoStorage.setItem(key, value); \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\"DOM Storage:\" + key + \" = \" +\n            value); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction getItem(key) { \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003evar myDiv = document.getElementById(\"myDiv\"); \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003emyDiv.innerHTML = oStorage.getItem(key); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003efunction removeItem(key) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eoStorage.removeItem(key) \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003ealert(\" 键 \" + key + \" 被删除了 \"); \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt; \u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/details\u003e\n\u003cp\u003e存储数据的方法就是直接给 window.localStorage 添加一个属性，例如： window.localStorage.a 或者 window.localStorage[\"a\"]\n    。它的读取、写、删除操作方法很简单，是以键值对的方式存在的。\u003c/p\u003e\n\u003cp\u003e使用 getltem() 和 setltem() ，如需清除键值对时可使用 removeltem() ，如需一次性清除所有的键值对，可以使用 clear() 。另外， HTML 5 还提供了一个 key()\n    方法，可以在不知道有哪些键值的时候使用。\u003c/p\u003e\n\u003cp\u003eAPI 测试方法包括 setItem(key,value) 、 removeItem(key) 、 getItem(key) 、 clear() 和 key(index) ，属性包括 length 和\n    remainingSpace （非标准）。不过存储数据时可以简单地使用 localStorage.key=value 的方式。\u003c/p\u003e\n\u003ch5\u003eWeb Storage 的其它用法\u003c/h5\u003e\n\u003cp\u003e在使用 sessionStorage 或 localStorage 对象的文档中，可以通过 window 对象来获取它们。除了名字和数据的生命周期外，它们的功能完全相同。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003einterface Storage { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereadonly\n        attribute unsigned long length; \u003c/span\u003e\u003cspan class=\"p6\"\u003egetter DOMString key(in unsigned long index);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003egetter any getItem(in DOMString key); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003esetter creator void setItem(in DOMString key, in any data); \u003c/span\u003e\u003cspan class=\"p6\"\u003edelete void\n        removeItem(in DOMString key); \u003c/span\u003e\u003cspan class=\"p6\"\u003evoid clear(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e具体说明\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e与 getItem(key) 函数类似， setItem(key, value)\n        函数能够将数据存入指定键对应的位置。如果值已存在，则替换原值。需要注意的是设置数据时可能会出错。如果用户已关闭了网站的存储，或者存储已达到其最大容量，那么此时设置数据将会抛出错误。因此，在需要设置数据的场合，务必保证应用程序能够处理此类异常\n    \u003c/li\u003e\n    \u003cli\u003e使用 length 属性获取目前 Storage 对象中存储的键值对的数量。注意， Storage 对象是同源的，这意味着 Storage 对象的长度只反映同源情况下的长度\u003c/li\u003e\n    \u003cli\u003ekey(index) 方法允许获取一个指定位置的键。一般情况下，最有用的是遍历特定 Storage 对象的所有健。键的索引从 0 开始，即第一个键的索引是 0 ，最后一个键的索引是 index(length-1)\n        。获取到键后，就可以用它来获取其相应的数据。除非键本身或者它前面的键被删除，否则其索引值会在给定 Storage 对象的生命周期内一直保留\u003c/li\u003e\n    \u003cli\u003egetItem(key) 函数是根据给定的键返回相应数据的一种方式，另一种方式是将 Storage 对象当做数组，而将键作为数组的索引。在这种情况下，如果 Storage 中不存在指定键，则返回 null 。\n    \u003c/li\u003e\n    \u003cli\u003eremoveItem(key) 函数的作用是删除数据项，如果数据存储在键参数下，则调用此函数会将相应的数据项删除。如果键参数没有对应数据，则不执行任何操作\u003c/li\u003e\n    \u003cli\u003eclear() 函数能删除存储列表中的所有数据。空的 Storage 对象调用 clear() 方法也是安全的，此时调用不执行任何操作\u003c/li\u003e\n    \u003cli\u003e与某些数据集或数据框架不同，删除数据项时不会将原有数据作为结果返回。在删除操作前请确保已经存储相应数据的副本\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ storage","title":"使用"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","storage","使用"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
