class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>操作</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e创建数据库\u003c/h5\u003e\n\u003cp\u003e创建和打开数据库时必须使用 openDatabase() 方法进行创建。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eDatabase openDatabase( \u003c/span\u003e\u003cspan class=\"p4\"\u003ein DOMString name, \u003cspan class=\"r\"\u003e//\n            数据库名 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ein DOMString version,\u003cspan class=\"r\"\u003e// 版本号 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ein DOMString displayName,\u003cspan class=\"r\"\u003e// 描述 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ein unsignes long estimatedSize, \u003cspan class=\"r\"\u003e// 数据库大小 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ein\n        optional DatabaseCallback creationCallback \u003cspan class=\"r\"\u003e// 回调函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e调用 openDatabase() 方法可以返回创建后的数据库访问对象，如果该数据库不存在，则会创建该数据库。使用 openDatabase() 方法时需要传递 4\n    个参数。它们分别表示数据库名称、数据库版本号、数据库说明以及数据库大小。除了这 4 个参数外，还有一个可选参数，这个参数是创建数据库时的回调函数，在数据库创建后会执行回调函数。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e连接失败可能是多因素引起的，例如：浏览器安全原因拒绝访问、设备储存有限。面对活跃而快速进化的浏览器，对用户机器、软件及其功能等做出假设都是不理智的行为。所以，使用前应先判断。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e访问和操作数据库\u003c/h5\u003e\n\u003cp\u003e使用事务处理，可以防止在对数据库进行访问及执行有关操作的时候受到外界打扰。因为在 Web\n    上，同时会有许多用户都在对页面进行访问。如果在访问数据库的过程中，正在操作的数据被别的用户修改了，会引起很多意想不到的后果。因此，可以使用事务来达到在操作完成之前，阻止其它用户访问数据库的目的。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etransaction(callbackFun,errorCallbackFun,successCallbackFun);\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ecallbackFun ：回调函数，在该函数中执行访问数据库的 SQL 语句操作\u003c/li\u003e\n    \u003cli\u003eerrorCallbackFun ：发生错误时调用的回调函数\u003c/li\u003e\n    \u003cli\u003esuccessCallbackFun ：执行成功时的回调函数\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e一般情况下，使用 transaction() 时传入一个类型事务的函数参数 tx 最为常用，它可以创建表或者执行操作语句。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003edb.transaction(function(tx){ \u003c/span\u003e\u003cspan class=\"p6\"\u003etx.executeSql(\"CREATE\n        TABLE IF NOT EXISTS User (id unique, text)\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e})\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003etransaction() 中需要传入一个事件参数 tx ，该参数具有一个 executeSql() 方法，调用该方法可以创建数据库表，也可以执行增加、删除和修改等数据操作。\u003c/p\u003e\n\u003cp\u003e使用 executeSql() 方法时需要传入 4 个参数 \u003c/p\u003e\n\u003ch6\u003esqlString \u003c/h6\u003e\n\u003cp\u003esqlString ：表示要查询的字符串，即要执行的 SQL 语句。如果包含参数，则需要使用\" ? \"代替，然后依次将这些参数组成数组放到第二个参数中\u003c/p\u003e\n\u003ch6\u003e[] \u003c/h6\u003e\n\u003cp\u003e执行 SQL 语句时需要传入的参数，即 sqlString 语句中使用\" ? \"时所在处的字符串数据\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003etransaction.executeSql(\"UPDATE User set text=? where id=?\", [\" 陈洋 \", 1]);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003edataHandler\u003c/h6\u003e\n\u003cp\u003e执行成功时的回调函数。可以向该回调函数中传递两个参数，第一个参数表示 transaction 对象，第二个参数表示执行查询操作时返回的查询到的结果数据集对象\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003efunction dataHandler(transaction, results){ \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 执行\n        SQL 语句成功时的处理\u003c/span\u003e\u003cspan class=\"p6\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eerrorHandler \u003c/h6\u003e\n\u003cp\u003e执行失败时的回调函数。与成功时的回调函数一样，也可以向该函数中传递两个参数，第一个参数表示 transaction 对象，第二个参数表示执行发生错误时的错误信息文字\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003efunction errorHandler(transaction, err_msg){ \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 执行\n        SQL 语句出错时的处理\u003c/span\u003e\u003cspan class=\"p6\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e数据的简单操作\u003c/h5\u003e\n\u003cp\u003e当执行查询操作时，如果要把查询到的结果数据集中所获取的数据依次取出到页面上来，可以使用 for 语句进行循环。数据集对象中有一个 rows 属性，它保存了查询到的每条记录，记录的条数可以使用 rows.length 来获取。在\n    for 语句中，一般情况下都使用 rows.item(index) 的形式依次获取出每条记录。\u003c/p\u003e\n\u003cp\u003e创建新的网页并进行设计，在合适位置添加一个表格。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;tbody id=\"contactListBody\"\u0026gt;\u0026lt;/tbody\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e在 JavaScript 脚本中创建名为 UserMobileManager 的数据库，指定该数据库的版本是 2.0 ，并且空间大小是 2MB 。然后在页面中调用 Init() 函数， Init() 函数中首先使用\n    transaction() 添加事务处理，然后调用 executeSql() 创建名称是 UserMobile 的数据库表，并且向该表中添加 4 个联系人记录，最后调用 GetObjectList()\n    函数向页面显示所有的联系人列表。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar db = openDatabase(\"UserMobileManager\", \"2.0\", \"A List of UserMobile\", 2 * 1024 *\n        1024); \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.onload = Init; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction Init() { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eif (db) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edb.transaction(function(tx) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003etx.executeSql(\"CREATE TABLE UserMobile(username unique, user phone text,usergroup text)\");\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003etx.executeSql(\"INSERT INTO UserMobile Values(?,?,?)\", [\" 乐乐 \", \"13838256695\", \" 朋友 \"]);\n    \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003etx.executeSql(\"INSERT INTO UserMobile Values(?,?,?)\", [\" 妈妈 \", \"15514527995\", \" 家人 \"]); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003etx.executeSql(\"INSERT INTO UserMobile Values(?,?,?)\", [\" 老爸 \", \"15037012998\", \" 家人 \"]);\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003etx.executeSql(\"INSERT INTO UserMobile Values(?,?,?)\", [\" 思远 \", \"13852445014\", \" 朋友 \"]);\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eGetObjectList(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\"Failed to\n        connect to database.\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上述代码调用 executeSql() 方法创建 UserMobile 时，向该表中添加了三个字段列，第一个字段列是 username ，其中 unique\n    表示主键列；第二个和第三个字段分别表示联系电话和联系人分组，它们都是字符类型。\u003c/p\u003e\n\u003cp\u003eGetObjectList() 函数用来获取所有的联系人列表，并且将这些联系人的信息显示到页面中。在 GetObjectList() 函数中，首先会在事务处理中通过 executeSql()\n    方法执行一个查询语句，该语句用来获取数据库表 UserMobile 的所有联系人记录，如果执行成功则访问成功回调函数中的内容，并且向成功回调函数中传入两个分别表示 transaction 对象和执行结果数据集的参数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction GetObjectList() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (db) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edb.transaction(function(tx) { \u003c/span\u003e\u003cspan class=\"p8\"\u003etx.executeSql(\"select * FROM UserMobile\",\n        [], function(tx, results) { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003evar totalcount = results.rows.length; \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003evar strHTML = \"\u0026lt;tbody\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p10\"\u003efor (var i = 0; i \u0026lt; totalcount;\n        i++) { \u003c/span\u003e\u003cspan class=\"p12\"\u003estrHTML += \"\u0026lt;tr\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p12\"\u003estrHTML += \"\u0026lt;td\n        style=\\\"width:200px\\\"\u0026gt;\" + results.rows.item(i).username + \"\u0026lt;/td\u0026gt;\"; \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003estrHTML += \"\u0026lt;td style=\\\"width:180px\\\"\u0026gt;\" + results.rows.item(i).userphone +\n        \"\u0026lt;/td\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p12\"\u003estrHTML += \"\u0026lt;td\u0026gt;\" + results.rows.item(i).usergroup +\n        \"\u0026lt;/td\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p12\"\u003estrHTML += \"\u0026lt;td\u0026gt;\u0026lt;a href= \\\"javascript:DelObject(\" +\n        results.rows.item(i).username + \")\\\"\u0026gt; 删除 \u0026lt;/a\u0026gt;\"; \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003estrHTML += \"\u0026lt;/tr\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p10\"\u003estrHTML +=\n        \"\u0026lt;/tbody\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p10\"\u003edocument.getElementById(\"contactListBody\").innerHTML = strHTML;\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e}); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e）单击每条记录后的【删除】链接时会调用 JavaScript 脚本中的 DelObject() 函数，该函数中需要传入一个参数，这里传入每条记录的联系人姓名。在 DelObject()\n    函数代码中，执行删除数据操作的查询语句，如果执行成功则返回成功的回调函数，在该函数中重新调用 GetObjectList() 函数加载显示联系人列表；如果执行失败则弹出提示。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction DelObject(objName) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (db) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edb.transaction(function(tx) { \u003c/span\u003e\u003cspan class=\"p8\"\u003etx.executeSql(\"DELETE FROM UserMobile WHERE\n        username=?\", [objName], function() { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003eGetObjectList(); \u003c/span\u003e\u003cspan class=\"p8\"\u003e}, function(tx, ex) { \u003c/span\u003e\u003cspan class=\"p10\"\u003ealert(\"\n        删除过程中出现了错误,其错误原因是: \" + ex.message); \u003c/span\u003e\u003cspan class=\"p8\"\u003e}) \u003c/span\u003e\u003cspan class=\"p6\"\u003e}); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e关系数据库是目前各类数据库中最重要、最流行的数据库，也是数据存储的最主要应用。与关系数据库对应的是 SQL 语言，全称是结构化查询语言（ Structured Query Language ）。\u003c/p\u003e\n\u003cp\u003e使用本地存储和会话存储可以实现简单的对象持久化，它们可以对简单的键 / 值对（如应用程序设置）或对象（如应用程序状态）进行存储，但是，在对稍微复杂的关系数据进行处理时，就力所不及了，这正是 HTML5 的 Web SQL\n    Database 存在的原因。\u003c/p\u003e\n\u003cp\u003e因为关系数据库存储需要使用结构化查询语言 SQL ，因此，也被称为 Web SQL Database 。\u003c/p\u003e\n\u003cp\u003e每个支持 Web SQL Database 功能的浏览器都将内嵌一个本地的 SQL 数据库，并且都有一个版本号。不可能同时存在一个数据库的多个版本。\u003c/p\u003e\n\u003cp\u003e每种浏览器嵌入的数据库可能不同，例如当前 Chrome 、 Safari 、 Firefox 和 Opera 都内嵌了 SQLite 数据库，而 Internet Explorer\n    嵌入何种数据库目前尚不明朗。但是，不管是何种数据库，都可以使用相同的 API 来查询和操作。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ webSQl","title":"操作"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","webSQl","操作"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
