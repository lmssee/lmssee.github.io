  <script id="__NEXT_DATA__"
    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e数据库版本管理\u003c/h5\u003e\n\u003cp\u003e每个本地的 SQL 数据库都仅能存在唯一的数据库名，并且都有唯一的一个版本号，不可能同时存在一个数据库的多个版本。\u003c/p\u003e\n\u003cp\u003e使用 DatabaseSync.version 属性可以返回数据库的版本号，使用 DatabaseSync.changeVersion() 方法可以改变数据库的版本号，该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eDatabaseSync.changeVersion(oldVersion, newVersion[, callback]);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cp\u003e参数 oldVersion 定义数据库当前的版本号，一般都应设置为 DatabaseSync.version 属性值。\u003c/p\u003e\n\u003cp\u003e参数 newVersion 定义数据库新的版本号，版本号是字符串类型。\u003c/p\u003e\n\u003cp\u003e参数 callback 可选，定义一个要执行的函数，该函数内执行的 SQL 操作都是事务的，要么全部成功，要么全部失败。该回调函数有一个参数，参数是 SQLTransactionSync 对象，使用该对象定义的方法可以执行\n    SQL 操作，代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efunction callback(oSQLTransactionSync){\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e该方法经常和 openDatabaseSync() 方法最后一个参数配合使用。而且，在改变版本时，使用 DatabaseSync.changeVersion() 方法可以同时执行事务操作，代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction callback(tx){\u003c/span\u003e\u003cspan class=\"p2\"\u003e// 可以执行 tx.executeSql() 操作\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003efunction creationCallback(database){\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edatabase.changeVersion(database.version, \"1.0\";,\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ecallback);\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar db = openDatabaseSync('mydb',\n        \";,\u003c/span\u003e\u003cspan class=\"p\"\u003e' 我的第一个客户端数据库 ',\u003c/span\u003e\u003cspan class=\"p\"\u003e2 * 1024 * 1024,\u003c/span\u003e\u003cspan\n        class=\"p\"\u003ecreationCallback);\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ webSQl","title":"版本管理"},"_
