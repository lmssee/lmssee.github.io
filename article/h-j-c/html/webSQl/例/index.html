    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e第 1 个 Web SQL Database 应用\u003c/h5\u003e\n\u003cp\u003e使用 window 对象的 openDatabase() 方法，可以在网页内创建和使用 Web SQL Database ，示例代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction queryResult(tx, result) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan class=\"p8\"\u003evar rowList = result.rows; \u003c/span\u003e\u003cspan class=\"p8\"\u003efor\n        (var i = 0; i \u0026lt; rowList.length; i++) { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003evar row = rowList.item(i); \u003c/span\u003e\u003cspan class=\"p10\"\u003efor (var j in row) { \u003c/span\u003e\u003cspan\n        class=\"p12\"\u003edocument.writeln(j + \"= \" + row[j] + \"; \u0026lt;br /\u0026gt; \"); \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} catch (err) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ealert(err.message ? err.message : err.toString()); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction queryError(tx, err) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(err.message ?\n        err.message : err.toString()); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction callback(tx) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar sql; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003esql = \"CREATE TABLE employees(firstName TEXT, lastName TEXT, EmpType TEXT, age INTEGER)\";\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003etx.executeSql(sql); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003esql = \"INSERT INTO employees(firstName, lastName, EmpType, age) VALUES(' myFirst ', ' myLast ',\n       class=\"p6\"\u003etx.executeSql('INSERT INTO LOGS (id, log) VALUES (2, \"logmsg\")'); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003emsg = '\u0026lt;p\u0026gt; 完成消息创建和插入行操作。 \u0026lt;/p\u0026gt;'; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.querySelector('#status').innerHTML = msg; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edb.transaction(function(tx) { \u003c/span\u003e\u003cspan class=\"p6\"\u003etx.executeSql('select * FROM LOGS', [],\n        function(tx, results) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar len = results.rows.length, \u003c/span\u003e\u003cspan class=\"p10\"\u003ei; \u003c/span\u003e\u003cspan class=\"p8\"\u003emsg =\n        \"\u0026lt;p\u0026gt; 查询行数 : \" + len + \"\u0026lt;/p\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p8\"\u003edocument.querySelector('#status').innerHTML +=\n        msg; \u003c/span\u003e\u003cspan class=\"p8\"\u003efor (i = 0; i \u0026lt;\n        len; i++) { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003emsg = \"\u0026lt;p\u0026gt;\u0026lt;b\u0026gt;\" + results.rows.item(i).log + \"\u0026lt;/b\u0026gt;\u0026lt;/p\u0026gt;\"; \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003edocument.querySelector('#status').innerHTML += msg; \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e}, null); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"utf-8\"\u0026gt; \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"status\" name=\"status\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt;\n        \u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e批量\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"utf-8\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;title\u0026gt;\u0026lt;/title\u0026gt; \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;table\n        id=\"racers\" border=\"1\" cellspacing=\"0\" style=\"width:100%\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;th\u0026gt;Id\u0026lt;/th\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;th\u0026gt;Name\u0026lt;/th\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/table\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n            根据名称 name 打开数据库\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar db = openDatabase('db', '1.0', 'my first database', 2 * 1024 * 1024); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efunction log(id, name) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar row = document.createElement(\"tr\");\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar idCell = document.createElement(\"td\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar nameCell =\n        document.createElement(\"td\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eidCell.textContent = id; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003enameCell.textContent = name; \u003c/span\u003e\u003cspan class=\"p6\"\u003erow.appendChild(idCell); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003erow.appendChild(nameCell); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.getElementById(\"racers\").appendChild(row); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efunction doQuery() { \u003c/span\u003e\u003cspan class=\"p6\"\u003edb.transaction(function(tx) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003etx.executeSql('select * from mytable', [], function(tx, result) { \u003c/span\u003e\u003cspan class=\"p10\"\u003e\u003cspan\n            class=\"r\"\u003e// 显示查询的记录集\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p10\"\u003efor (var i = 0; i \u0026lt; result.rows.length; i++) { \u003c/span\u003e\u003cspan class=\"p12\"\u003evar item =\n        result.rows.item(i); \u003c/span\u003e\u003cspan class=\"p12\"\u003elog(item.id, item.name); \u003c/span\u003e\u003cspan class=\"p10\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e}); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction initDatabase() { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar names = [\" 张三\n        \", \" 李四 \", \" 王五 \", \" 赵六 \", \" 侯七 \", \"abc\", \"def\"]; \u003c/span\u003e\u003cspan class=\"p6\"\u003edb.transaction(function(tx) {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003etx.executeSql('CREATE TABLE IF NOT EXISTS mytable(id integer primary key autoincrement,\n        name)'); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003efor (var i = 0; i \u0026lt; names.length; i++) { \u003c/span\u003e\u003cspan class=\"p10\"\u003etx.executeSql('INSERT INTO\n        mytable (name) VALUES (?)', [names[i]]); \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003edoQuery();\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003einitDatabase(); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt;\n        \u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ webSQl","title":"例"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","webSQl","例"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFal
