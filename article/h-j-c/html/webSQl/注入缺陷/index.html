="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>注入缺陷</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003eSQL 注入缺陷是大多数动态网页所面临的共同问题，所有的 SQL 注入都是从用户的请求开始的，当一个动态网页程序（例如 ASP 、 JSP 等）中存在一个 SQL 查询，并且该 SQL\n        查询使用用户的请求数据作为参数时，用户可以提交一些数据作为 SQL 查询的参数（一般是在浏览器地址栏或者在 HTTP 消息报头中进行，它们都是通过正常的 WWW\n        端口访问），通常这些数据是非法字符，然后根据程序返回的结果，获得某些它想得知的数据，这就是所谓的 SQLInjection （即 SQL 注入）。\n\u003c/p\u003e\n\u003cp\u003eSQL Injection 构造符合条件的 SQL 语句绕过条件查询或者构造恶意的其它应用，例如使用下面的 URL 地址再次请求前面的网页：\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"http://localhost/test.asp?Age=300\" rel=\"nofollow\"\u003ehttp://localhost/test.asp?Age=300 OR '1'='1'\u003c/a\u003e。\u003c/p\u003e\n\u003cp\u003e这意味着构成了如下的 SQL 语句：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eselect * FROM employees WHERE Age =300 OR '1'='1'\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e因为 '1'='1' 肯定成立，所以可以通过任何条件子句，并返回结果，而不会出现错误信息。\u003c/p\u003e\n\u003cp\u003e设想一下，如果 SQL 语句是用来进行用户验证的，例如下面的语句：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003esql = \"select * FROM table WHERE id= ' + yourID + \";' AND passwd='\";\n                +yourPassword+\";'\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e如果把\" 'OR '1'='1 \"作为 yourPassword 查询变量的值传入进来，构造如下的一个查询字符串：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eyourURL?yourName=anyString\u0026yourPassword=anyString 'OR '1'='1\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e这将会形成如下的 SQL 语句，从而轻松通过用户验证：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003eselect * FROM table WHERE id= 'anyString' AND passwd='anyString' or '1' = '1'\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e更有甚者，把\" ';DROP TABLE tb_name;' \"作为 yourPassword 传入进来，则会形成如下的 SQL 语句，可能会删除数据库表：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003eselect * FROM table WHERE id= 'anyString' AND passwd=\"DROP TABLE tb_name;'\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用参数化查询可以防止恶意 SQL 注入。参数化查询为数据库访问应用程序开发提供了一种安全、封装性的方法，它可以将输入交由数据库进行预处理。\u003c/p\u003e\n\u003cp\u003e参数化查询指定 SQL 语句使用问号（？）作为参数占位符，例如下面的 SQL 语句：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003esql = \"select * FROM employees WHERE Age = ?\";\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e然后使用 executeSql() 方法的第 2 个参数为参数化查询中的问号赋值（问号将被第 2 个参数数组中对应的项替代），代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etx.executeSql(sql, [40]);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e如果存在多个问号，那么顺次与数组中的项对应，代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003esql = \"INSERT INTO employees (firstName,lastName,EmpType,age) VALUES\n                (?,?,?,?)\";\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etx.executeSql(sql, ['myFirst','myLast','myEmpType',40]);\u003c/span\u003e\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ webSQl","title":"注入缺陷"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","webSQl","注入缺陷"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
