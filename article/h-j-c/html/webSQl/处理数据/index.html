="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>处理数据</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e执行数据库事务\u003c/h5\u003e\n\u003cp\u003e一旦成功创建了数据库或者成功连接到了数据库创建了 DatabaseSync 对象，就可以执行数据库操作了。数据库操作都是事务的，有下面两个方法可用：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eDatabaseSync.transaction(callback);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eDatabaseSync.readTransaction(callback); \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这两个方法的区别在于，前一个方法允许执行读写操作，而后一个方法仅允许执行读操作。例如后一个方法不能执行 SQL INSERT 操作。\u003c/p\u003e\n\u003cp\u003e参数 callback 定义一个事务操作要执行的函数，该函数内执行的 SQL 操作都是事务的，要么全部成功，要么全部失败。该函数有一个参数，参数是 SQLTransactionSync 对象，使用该对象定义的方法可以执行\n    SQL 操作，代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efunction callback(oSQLTransactionSync){ }\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e例如下面的代码，位于 worker.js 文件内，演示了如何使用 transaction() 方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e// 事务操作\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efunction callback(tx) { \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 在事务中执行 SQL 操作，并返回结果\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar result = tx.executeSql(\"select * FROM employees\", []); \u003c/span\u003e\u003cspan class=\"p4\"\u003etry {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 获取所有记录行\u003c/span\u003e\u003cspan class=\"p6\"\u003evar rowList = result.rows; \u003c/span\u003e\u003cspan class=\"p6\"\u003e//\n        获取每个记录行\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003efor (var i = 0; i \u0026lt; script rowList.length; i++) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar row = rowList.item(i); \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 获取每个记录行的内容：列名和值\u003c/span\u003e\u003cspan class=\"p8\"\u003efor\n        (var j in row) { \u003c/span\u003e\u003cspan class=\"p10\"\u003epostMessage(j + \"=\" + row[j]); \u003cspan class=\"r\"\u003e//\n            将结果发回页面\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} catch (err) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethrow new Error(err.message ? err.message :\n        err.toString()); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 创建数据库或建立连接\u003c/span\u003e\u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar db =\n        openDatabaseSync('mydb2', '1.0', ' 我的第一个客户端数据库 ', 2 * 1024 * 1024); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} catch (err) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ethrow new Error(err.message ? err.message : err.toString()); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (!db) throw new Error(\" 不能连接到数据库！ \"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e//\n        执行事务\u003c/span\u003e\u003cspan class=\"p2\"\u003edb.transaction(callback); \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在 HTML 网页中创建 Worker 并接收消息， 代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (window.Worker) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 使用构造方法创建 Worker ，构造方法的参数是要执行的 JavaScript 文件 URL \u003c/span\u003e\u003cspan class=\"p4\"\u003evar worker =\n        new Worker('worker.js'); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// 注册 error 事件监听 Worker 出错\u003c/span\u003e\u003cspan class=\"p4\"\u003eworker.onerror = function(e) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ealert(\" 于第 [\" + e.lineno + \"] 行发生错误 : \" + e.message); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e// 注册 message 事件监听 Worker 返回的数据，如果有数据返回就写到网页上\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eworker.onmessage = function(event) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar result = event.data;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.writeln(result + \"\u0026lt;br /\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ealert(\" 浏览器不支持 Web Workers!\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e成功使用 executeSql() 方法执行的 SQL 语句可以返回一个执行结果，该执行结果作为 executeSql() 方法的一个参数返回，是一个 SQLResultSet 对象，由 SQLResultSet\n    接口定义，代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003einterface SQLResultSet {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereadonly attribute long insertId;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereadonly attribute long rowsAffected;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereadonly attribute SQLResultSetRowList rows;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eSQLResultSet 对象包含记录行，每一行表示一个结果。该结果包含分配给它的一组值，表示该特定结果的数据库中的每一列的值。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e属性 insertId 返回记录行的行 ID ，每个 SQL INSERT 插入操作都会自动插入一个行 ID ，这与我们过去所认识的数据库操作不同。如果插入多行记录，那么该属性就会返回最后一个行 ID\n        ；如果不存在记录行，那么调用该属性将会抛出 INVALID_ACCESS_ERR 异常\u003c/li\u003e\n    \u003cli\u003e属性 rowsAffected 返回 SQL 语句所改变的记录的行数。如果没有任何改变，那么该属性返回 0 。对于 select 查询语句，因为它肯定没有改变任何行，所以返回 0\u003c/li\u003e\n    \u003cli\u003e属性 rows 返回一个 SQLResultSetRowList 对象，表示返回的所有记录行。结果按照数据库中的序列排列，如果没有数据，那么就会返回空对象，即 SQLResultSetRowList. length\n        属性值为 0\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSQLResultSetRowList 对象由 SQLResultSetRowList 接口定义，代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003einterface SQLResultSetRowList {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereadonly attribute unsigned long length;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003egetter any item(in unsigned long index);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e属性 length 表示行的总数量。\u003c/p\u003e\n\u003cp\u003e用户也可以使用 item() 方法根据索引号获取一个指定的行。如果不存在指定的索引号，那么该方法返回 null 。\u003c/p\u003e\n\u003cp\u003e一个行就是一个 JavaScript Object 类型的对象，行的每个列就相当于对象的属性，然后可以使用对象语法获取每个值。\u003c/p\u003e\n\u003cp\u003e例如下面的代码用于遍历数据库查询结果。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 获取所有记录行\u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        rowList = result.rows; \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 获取每个记录行\u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i = 0; i \u0026lt;\n        rowList.length; i++) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar row = rowList.item(i); \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 获取每个记录行的内容：列名和值\u003c/span\u003e\u003cspan class=\"p6\"\u003efor\n        (var j in row) { \u003c/span\u003e\u003cspan class=\"p8\"\u003edocument.writeln(j + \";=\"; + row[j] + \";\u0026lt;br\n        /\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} catch (err) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(err.message ? err.message : err.toString());\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ html ✈︎✈︎ webSQl","title":"处理数据"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","html","webSQl","处理数据"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
