    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e添加指令和规则\u003c/h5\u003e\n\u003cp\u003e用户可以在样式表中添加，或添加@import指令和规则。\u003c/p\u003e\n\u003ch6\u003e添加@import指令\u003c/h6\u003e\n\u003cp\u003e一旦获得对某个styleSheet对象的引用，就可以使用addImport()方法向该样式表中添加一个@import指令，语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eiIndex = styleSheet.addImport(sURL [, iIndexRequest])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cp\u003e参数sURL是要导入样式表的URL地址。\u003c/p\u003e\n\u003cp\u003e参数iIndexRequest是可选的，为一个整数，用来定义添加的@import指令在styleSheet.imports列表中的索引位置。如果忽略该参数，那么@import指令就被追加到列表的末尾。\u003c/p\u003e\n\u003cp\u003e该方法的返回值是添加的@import指令在styleSheet.imports列表中实际的索引位置。\u003c/p\u003e\n\u003cp\u003e使用索引号，还可以使用removeImport()方法从styleSheet.imports列表中删除一个@import指令，该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003estyleSheet.removeImport(iIndex)\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e添加规则\u003c/h6\u003e\n\u003cp\u003e向样式表中添加一个规则可以使用addRule()方法，该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eiIndex = styleSheet.addRule(sSelector,sStyle[,iIndexRequest])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cp\u003e参数sSelector是一个字符串，用来定义新规则的选择符。\u003c/p\u003e\n\u003cp\u003e参数sStyle用来定义样式，它是一个字符串，而非style对象。可以像为对象定义内联样式那样定义该参数，例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar iIndex = styleSheet.addRule(\"div\",\"color:#FF0000;font-weight:bold;\");\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e返回值是新增样式规则的索引号。\u003c/p\u003e\n\u003cp\u003e参数iIndexRequest是可选的，默认值为-1。\u003c/p\u003e\n\u003cp\u003e使用索引号，还可以使用removeRule()方法从styleSheet.imports列表中删除一个规则，该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003estyleSheet.removeRule([iIndex])\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e样式表相关对象\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003edocument.styleSheets列表可以访问styleSheet对象\u003c/li\u003e\n    \u003cli\u003estyleSheet.rules列表可以访问ruleList象注意imports列表有些变化）\u003c/li\u003e\n    \u003cli\u003erule.style对象可以访问样式，或者，元素对象的style属性也可以获得style对象\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e为不同介质定义样式\u003c/h6\u003e\n\u003cp\u003e使用styleSheet对象的media属性，可以获取某个样式表所指定要用于的介质，也可以使用该属性将样式表指定给要使用的介质。该属性有3个值可供选择：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003escreen，该字符串表示的介质类型是计算机屏幕\u003c/li\u003e\n    \u003cli\u003eprint，该字符串表示的介质类型是打印机\u003c/li\u003e\n    \u003cli\u003eall，该字符串表示适用于所有介质，这也是默认值\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e例如下面的代码，首先获取样式表，而后设置该样式表适用的介质是计算机屏幕：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar oStyleSheet=document.styleSheets[0]; \u003cspan class=\"r\"\u003e//\n            获取style元素定义的样式表\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eoStyleSheet.media=\"screen\";\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e关于处理@page规则。\u003c/h6\u003e\n\u003cp\u003e@page规则用来定义页面的样式，要处理该样式，可以使用styleSheet对象的pages属性返回该样式表中所有的@page规则定义。这是一个列表，对象中每个元素就是一个@page规则，每个@page规则使用page对象来描述。\n\u003c/p\u003e\n\u003cp\u003epage对象有两个属性成员可用：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003epage.selector属性用来获取@page规则中定义的选择符名称\u003c/li\u003e\n    \u003cli\u003epage.pseudoClass属性用来获取@page规则中定义的伪类选择符名称，包括:first、:left和:right\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e不过，对于每个选择符中定义的规则，用户不可以获取，也就不能访问样式。如果要访问样式，可以使用styleSheet对象的cssText属性获得该样式表中规则和样式的文本表述，也可以使用该属性改变样式表中的规则和样式。例如下面的代码：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e@page\n        :left { \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin-left: 4cm; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin-right: 3cm; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e@page :right { \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin-left: 4cm; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin-right:\n        3cm; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt;\n    \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar oStyleSheet = document.styleSheets[0]; \u003cspan\n            class=\"r\"\u003e//获取style元素定义的样式表\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(oStyleSheet.cssText); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ CSS","title":"DOM处理CSS"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","CSS","DOM处理CSS"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
