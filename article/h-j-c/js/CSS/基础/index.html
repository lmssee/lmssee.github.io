    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e注意事项\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e由于 float 是JavaScript 保留字，禁止使用，因此使用 cssFloat 表示 float 属性的脚本名称\u003c/li\u003e\n    \u003cli\u003e在 JavaScript 中，所有的 CSS 都是字符串，必须加上引号，以表示字符串数据\u003c/li\u003e\n    \u003cli\u003eCSS 结尾的分号不能作为属性值的一部分被引用，JavaScript 脚本中的分号只是 JavaScript 语法规则的一部分\u003c/li\u003e\n    \u003cli\u003e声明中的属性和值必须作为值的一部分，完整的传给 CSS 脚本属性，省略单位则摄制无效\u003c/li\u003e\n    \u003cli\u003e在脚本中可以动态设置属性值，但最终传给属性的值应该是字符串\u003c/li\u003e\n    \u003cli\u003e如果没有为 HTML 设置 style 值，那么 style 对象中可能会包含一些属性的默认值，但这些值并不能准确的反应该元素的样式信息\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e嵌入式\u003c/h5\u003e\n\u003cp\u003e使用HTML的style元素，可以在HTML网页内定义CSS样式，这也就是嵌入式的CSS定义。style元素的定义位于HTML文档头部，即位于head元素内。\u003c/p\u003e\n\u003cp\u003eCSS样式定义内容位于style元素之间，其type属性必须被定义为text/css，以表明这里定义的是CSS。例如下面的HTML代码片段：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;style type=\"text/css\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003eh1\n        { color: red }\u003c/span\u003e\u003cspan class=\"p\"\u003ep { color: blue }\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/style\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/head\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e外部引用式\u003c/h5\u003e\n\u003cp\u003e外部引用指HTML文档本身不含有CSS样式定义，而是通过动态引用外部CSS文件来定义HTML文档的表现形式，有以下几种方式。\u003c/p\u003e\n\u003ch6\u003e使用样式表的处理指令语句\u003c/h6\u003e\n\u003cp\u003e在HTML文档的开头部分写一个关于样式表的处理指令语句，如下所示：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;?xml-stylesheet type=\"text/css\" href=\"mystyle.css\" ?\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;html\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e…\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e按照这条声明语句的指令，该文档在浏览器上的表现方式由CSS样式文件mystyle.css所决定。CSS样式文件mystyle.css将会被导入当前HTML文档，最终形成内嵌的模式，就像在该文档中定义的一样。\u003c/p\u003e\n\u003cp\u003e不过只有使用XML语法格式编写的HTML文档才支持使用处理指令，并且大多数浏览器仅当该文档被保存为XHTML或XML格式时才会有效，并且，JavaScript不能处理这样的CSS样式表。所以不推荐使用处理指令引用外部样式表。\n\u003c/p\u003e\n\u003ch6\u003e使用@import指令\u003c/h6\u003e\n\u003cp\u003e也可以在style元素之间使用@import指令导入外部的CSS样式表文件，例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;style type=\"text/css\"\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;!–下面两行代码的效果是相同的\u003c/span\u003e\u003cspan class=\"p\"\u003e@import \"mystyle.css\";\u003c/span\u003e\u003cspan class=\"p\"\u003e@import\n        url(\"mystyle.css\");\u003c/span\u003e\u003cspan class=\"p\"\u003e–\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/style\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e任何@import规则必须出现在样式表中所有规则之前。@import指令的参数是一个CSS样式表文件的URL地址，表示URL地址的字符串也可以包含在url()函数内。上述代码中两个@import规则实现的效果是相同的。\u003c/p\u003e\n\u003cp\u003e在一个单独的CSS样式表文件中，也可以使用@import指令将另一个CSS样式文件导入当前文件中。\u003c/p\u003e\n\u003ch6\u003e使用link元素\u003c/h6\u003e\n\u003cp\u003e在HTML代码中使用link元素也可以引用外部样式表，可使用href属性指定样式表文件所在的URL，并且指定rel=\"stylesheet\" type=\"text/css\"，前者表示引用的是样式表，后者表示引。\u003c/p\u003e\n\u003cp\u003e用的是CSS样式表。例如：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;link href=\"mystyle.css\" rel=\"stylesheet\"\n        type=\"text/css\" /\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e使用HTTP消息报头链接到样式表\u003c/h6\u003e\n\u003cp\u003e可以使用HTTP消息报头的link字段链接一个外部样式表，link字段的功能和HTML link元素的功能相同，有相同的属性设置，例如下面的字段：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003elink: \u0026lt;mystyle.css\u0026gt;; rel=stylesheet\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e等同于：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;link href=\"mystyle.css\" rel=\"stylesheet\" type=\"text/css\" /\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eHTTP报头中可以使用多个link字段，从而可以使用link字段链接多个外部样式表。并且，HTTP报头中的link字段比HTML文档中的link元素具有优先级。\u003c/p\u003e\n\u003ch5\u003e内联式\u003c/h5\u003e\n\u003cp\u003e每一个HTML元素都包含有一个style属性，使用该属性可以直接指定样式，当然，该样式仅能用于该元素的内容，对于另一个同名的元素则不起作用。\u003c/p\u003e\n\u003cp\u003e例如下面的HTML代码片断：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;p style=\"color:#FF0000;font-weight:bold;\"\u0026gt;请点击\u0026lt;a\n        href=\"page.html\"\u0026gt;网站链接\u0026lt;/a\u0026gt;\u0026lt;/p\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e处理style和link元素定义的样式表\u003c/h5\u003e\n\u003cp\u003e当使用link元素链入外部样式表或者使用style元素来定义嵌入式样式表时，可以使用document的styleSheets属性获取文档中所有的link和style元素，而后通过访问列表中的元素获取每个元素对象，每个元素对象（style元素或者link元素）被描述为一个styleSheet对象，每个styleSheet对象中包含很多的规则，进而可以获取规则中的样式数据。\n\u003c/p\u003e\n\u003cp\u003e例如下面的代码定义了一个嵌入式样式表，又定义了link元素链入一个外部样式表：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;link href=\"myStyle.css\" rel=\"stylesheet\"\n        type=\"text/css\" /\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;style type=\"text/css\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003ediv {\n        color:#FF0000;font-weight:bold; }\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ep { color:#FFFFFF;font-size:14px; }\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/style\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/head\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e那么，通过以下3个步骤即可以处理其中定义的样式信息：\u003c/p\u003e\n\u003ch6\u003e首先使用document.styleSheets属性获取外部和嵌入式样式表。该列表返回的是一个数组对象，使用数组语法可以访问其中的样式表：\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003edocument.styleSheets[0] \u003cspan class=\"r\"\u003e// link元素链入的外部样式表\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003edocument.styleSheets[1] \u003cspan class=\"r\"\u003e// style元素定义的嵌入式样式表\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003edocument.styleSheets[0]和document.styleSheets[1]都是styleSheet对象，其中包含了规则的定义，也包含了@import指令导入的样式表。\u003c/p\u003e\n\u003ch6\u003e使用styleSheet.rules属性获取规则，该属性返回一个数组对象，数组中的每个元素就是一条规则，使用数组语法可以访问这些规则。例如下面的代码访问style元素中定义的第2条规则：\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar oStyleSheet = document.styleSheets[1];\u003c/span\u003e\u003cspan class=\"p\"\u003evar oRule =\n        oStyleSheet.rules[1];\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e即：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ep { color:#FFFFFF;font-size:14px; }\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e获得规则（这是一个rule对象）后，使用rule对象的style属性返回一个style对象（rule.style），该对象代表了这个规则中定义的所有样式。例如下面的代码：\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"utf-8\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;JavaScript Sample\u0026lt;/title\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor:\n        #FF0000; \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-weight: bold; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ep {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #FF0000; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003efont-size: 14px; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;div id=\"oDiv\"\u0026gt;请点击\u0026lt;a href=\"page.html\"\u0026gt;网站链接\u0026lt;/a\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar oStyleSheet = document.styleSheets[0]; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar oRule = oStyleSheet.rules[0]; \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(oRule.style.color); //\n        访问规则中定义的样式属性color \u003c/span\u003e\u003cspan class=\"p4\"\u003eoRule.style.color = \"green\"; // 改变规则中定义的样式属性color \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eoRule.style.fontSize = \"13 px\"; // 在规则中新增样式属性fontSize \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ealert(oRule.style.color); // 访问改变后的样式属性color \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e处理导入的样式表\u003c/h5\u003e\n\u003cp\u003e对于使用@import指令导入的样式表，可以使用styleSheet.imports属性获取每个@import指令导入的样式表，这些样式表构成了一个列表。该列表中每个元素就是一个styleSheet对象。然后，就可以使用styleSheet.rules属性获取其中定义的规则，进而获取每条规则定义的style对象，从而访问该规则定义的样式。\n\u003c/p\u003e\n\u003cp\u003e例如下面的代码，定义了一个名为myStyle.css的样式表，该样式表中包含了两条规则：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ediv { color:#FF0000;font-weight:bold; }\u003c/span\u003e\u003cspan class=\"p\"\u003ep {\n        color:#00FF00;font-size:14px; }\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e然后在网页文档中使用@import指令导入该样式表，并访问其中的规则：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e@import\n        myStyle.css; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;div id=\"oDiv\"\u0026gt;请点击\u0026lt;a href=\"page.html\"\u0026gt;网站链接\u0026lt;/a\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar oStyleSheet = document.styleSheets[0]; \u003cspan class=\"r\"\u003e//\n            获取style元素定义的样式表\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar oImport = oStyleSheet.imports[0]; \u003cspan class=\"r\"\u003e// 获取其中第一个@import指令\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\" p4 \"\u003eoRule = oImport.rules[0]; \u003cspan class=\"r\"\u003e// 获取样式表中的第一个规则\u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(oRule.style.color); // 下面就是访问规则\u003c/span\u003e\u003cspan class=\"p4\"\u003eoRule.style.color =\n        \"green\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003eoRule.style.fontSize = \"13 px\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ealert(oRule.style.color); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e可以看到这与前面范例有相同的效果。\u003c/p\u003e\n\u003cp\u003e另一种可能的情况是导入的样式表中也定义有@import指令，例如下面的名为anotherStyle.css的样式表，其中定义了@import指令导入myStyle.css样式表：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e@import myStyle.css;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e然后，在网页文档中导入这个anotherStyle.css样式表：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e@import\n        anotherStyle.css; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"oDiv\"\u0026gt;请点击\u0026lt;a\n        href=\"page.html\"\u0026gt;网站链接\u0026lt;/a\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar oStyleSheet = document.styleSheets[0]; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar oImport = oStyleSheet.imports[0]; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// 获取anotherStyle中第一个@import指令\u003c/span\u003e\u003cspan class=\"p4\"\u003evar oImport2 = oImport.imports[0];\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eoRule = oImport2.rules[0]; \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(oRule.style.color);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eoRule.style.color = \"green\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eoRule.style.fontSize = \"13 px\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(oRule.style.color); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这时，要访问样式信息，就必须首先获得对anotherStyle.css样式表的引用，这是一个styleSheet对象，然后通过该styleSheet对象的imports属性获取对myStyle.css样式表的引用，从而访问其中的规则，进而访问样式。\n\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ CSS","title":"基础"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","CSS","基础"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
