    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e窗口位置\u003c/h5\u003e\n\u003cp\u003eCSS 的 left 和 top 属性不能真实反映元素相对页面和其它对象的精准定位，不过每个元素都拥有 offsetLeft 和 offsetTop 属性，它们描述了元素的偏移位置。\u003c/p\u003e\n\u003cp\u003eIE 会以父元素为参照，而支持 DOM 标准的浏览器会以最近定位元素为参照对象进行定位。\u003c/p\u003e\n\u003cp\u003e但，对于任何浏览器来说 ， offsetParent 都能识别当前元素偏移的参照对象。所以不用担心 offsetParent 指代的元素是谁。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 200px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 100px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: solid 1px\n        #f00; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e#wrap { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eposition: relative; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder-width: 20px; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n        \u0026lt;/style\u0026gt; \u0026lt;div id=\"wrap\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"sup\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;div id=\"box\"\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u0026lt;/div\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e不用为包含元素定义边框，因为不同浏览器对边框的处理不同。例如，IE 浏览器总会忽略所有包含元素的边框，因为所有元素都是参照物，且以参照物对象的边框内壁作为边线来计算。 Firefox 和 Safari\n        会把静态元素的边框当作实际距离来计算，因为对它们来说，静态元素不作为参照物。而对 Opera 浏览器来说，它根据非静态元素边框的外壁作为边线进行计算，所以各个浏览器的取值不同。\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction getPoint(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar x = y = 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewhile\n        (e.offsetParent) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ex += e.offsetLeft; \u003c/span\u003e\u003cspan class=\"p6\"\u003ey +=\n        e.offsetTop; \u003c/span\u003e\u003cspan class=\"p6\"\u003ee = e.offsetParent; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn { \u003c/span\u003e\u003cspan class=\"p6\"\u003e\"x\": x, \u003c/span\u003e\u003cspan class=\"p6\"\u003e\"y\":\n        y \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e相对定位\u003c/h5\u003e\n\u003cp\u003e要想获得绝对定位，就必须知道元素与父元素之间的距离。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction getP(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (e.parentNode == e.offsetParent) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar x = e.offsetLeft; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar y = e.offsetTop; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n        else { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar o = getPoint(e); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar p = getPoint(e.patentNode); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar x = o.x - p.x; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003evar y = o.y - p.y; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\"x\": x, \u003c/span\u003e\u003cspan class=\"p6\"\u003e\"y\": y \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e定位位置\u003c/h5\u003e\n\u003cp\u003e定位包含框就是定位元素参照的包含框对象。一般为距离当前元素最近的上级定位元素。获取定位元素相对包含框的位置就是直接读取 CSS 中的 left 和 top 属性。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction getB(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn { \u003c/span\u003e\u003cspan class=\"p6\"\u003e\"x\":\n        (parseInt(getStyle(e, \"left\")) || 0), \u003c/span\u003e\u003cspan class=\"p6\"\u003e\"y\": (parseInt(getStyle(e, \"top\")) || 0)\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e设置偏移位置\u003c/h5\u003e\n\u003cp\u003e与获取元素位置相比，设置元素的偏移位置比较容易。可以直接使用 CSS 进行设置，也可以封装函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction setP(e, o) { \u003c/span\u003e\u003cspan class=\"p4\"\u003e(e.style.position) ||\n        (e.style.position == \"absolute\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003ee.style.left = o.x + \"px\"; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ee.style.top = o.y + \"px\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e设置相对位置\u003c/h5\u003e\n\u003cp\u003e偏移位置是重新定位元素的位置。不考虑元素可能存在的定位值。但是，在动画设计中，经常需要设置元素当前位置为起点进行偏移。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction offsetP(e, o) { \u003c/span\u003e\u003cspan class=\"p4\"\u003e(e.style.position) ||\n        (e.style.position == \"absolute\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003ee.style.left = getB(e).x + o.x + \"px\";\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ee.style.top = getB(e).y + o.y + \"px\"; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e鼠标指针绝对位置\u003c/h5\u003e\n\u003cp\u003e要获取鼠标指针的页面位置，就必须捕获当前事件对象，然后读取对象中包含的位置信息。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction getMP(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = e || window.event; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ereturn { \u003c/span\u003e\u003cspan class=\"p6\"\u003ex: e.pageX || e.clientX + (document.documentElement.scrollLeft\n        || document.body.scrollLeft), \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ey: w.pageY || e.clientY + (document.documentElement.scrollTop || document.body.scrollTop)\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e鼠标指针相对位置\u003c/h5\u003e\n\u003cp\u003e除了考虑鼠标在页面的相对位置之外，还需要考虑指指针在元素内位置。这需要用到事件对象的 offsetX/offsetY 或 layerX/layerY 属性对。由于早期的 Mozilla 不支持 offsetX 和\n    offsetY 属性，可以考虑使用 layerX 和 layerY 属性对。但是这两属性是以定位包含框为参照物，而不是元素本身的左顶角，因此还需要减去该元素的 offsetLeft 和 offsetTop 值。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction getME(e, o) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = e || window.event;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn { \u003c/span\u003e\u003cspan class=\"p6\"\u003ex: e.offsetX || (e.layerX - o.offsetLeft), \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ey: e.offsetY || (e.layerY - o.offsetTop) \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e修改后的，兼容 Mozilla 和 Safari。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction getME(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = e || window.event; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        bl = parseInt(getStyle(o, \"borderLeftWidth\")) || ((o.style.borderLeftStyle \u0026\u0026\n        o.style.borderLeftStyle != \"none\") ? 3 : 0); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar bt = parseInt(getStyle(o, \"borderTopWidth\")) || ((o.style.borderTopStyle \u0026\u0026\n        o.style.borderTopStyle != \"none\") ? 3 : 0); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar x = e.offsetX || (e.layerX -\n        o.offsetLeft - bl); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar y = e.offsetY || (e.layerY - o.offsetTop - bt); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar u = navigator.userAgent; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif ((u.indexOf(\"KHTML\") \u0026gt; -1) ||\n        (u.indexOf(\"Konqueror\") \u0026gt; -1) || (u.indexOf(\"AppleWebkit\") \u0026gt; -1)) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ex -= bl;\n        \u003cspan class=\"r\"\u003e// 为 Safari 浏览器减去边框影响\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ey -= bt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn { \u003c/span\u003e\u003cspan class=\"p6\"\u003ex:\n        x, \u003c/span\u003e\u003cspan class=\"p6\"\u003ey: y \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e滚动条位置\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction getPS() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar h = document.documentElement;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar x = self.pageXOffset || (h \u0026\u0026 h.scrollLeft)|| document.body.scrollLeft; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar y = self.pageYOffset || (h \u0026\u0026 h.scrollTop) || document.body.scrollTop; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn { \u003c/span\u003e\u003cspan class=\"p6\"\u003ex: x, \u003c/span\u003e\u003cspan class=\"p6\"\u003ey: y \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e设置滚动条位置\u003c/h5\u003e\n\u003cp\u003eWindow 对象定义了 scrollTo(x,y) 方法，该方法能够根据传递的参数值定位滚动条的位置，其中参数 x 可以宋伟页面内容在 x 轴方向的偏移量，二参数 y 可以定位页面中 y 轴方向上的偏移量。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction setPS(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.scrollTo(getPoint(e).x,\n        getPoint(e).y); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ CSS","title":"位置偏移"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","CSS","位置偏移"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":fals
