    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e对于每个CSS样式表，使用CSSStyleSheet接口可以访问样式表中的规则集列表，并且可以使用方法修改列表。最通用的接口是CSSStyleRule，它表示一个样式规则集，通过它可以访问选择符和样式的声明。样式声明由CSSStyleDeclaration接口定义，然后就可以直接访问样式属性。\n\u003c/p\u003e\n\u003ch5\u003eCSSStyleSheet接口\u003c/h5\u003e\n\u003cp\u003eCSSStyleSheet接口继承自DOM\n    StyleSheets定义的StyleSheet接口。一个CSSStyleSheet接口就是一个样式表，IE的styleSheet对象基本等同于该接口的定义，它包含在document.styleSheets列表中。\u003c/p\u003e\n\u003cp\u003e除了定义有StyleSheet接口中的成员外，CSSStyleSheet接口还定义了其它成员。\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eCSSStyleSheet接口定义的属性\u003c/caption\u003e\n    \u003ctbody\u003e\n        \u003ctr\u003e\n            \u003cth\u003e属性名\u003c/th\u003e\n            \u003cth\u003e描述\u003c/th\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003exssRules\u003c/td\u003e\n            \u003ctd\u003e等同与StyleSheet.rules，不适用于IE8\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eownerRule\u003c/td\u003e\n            \u003ctd\u003e等同于StyleSheet.imports属性，不适用于IE8\u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eCSSStyleSheet接口定义的方法\u003c/caption\u003e\n    \u003ctbody\u003e\n        \u003ctr\u003e\n            \u003cth\u003e方法名\u003c/th\u003e\n            \u003cth\u003e描述\u003c/th\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003edeleteRule()\u003c/td\u003e\n            \u003ctd\u003e等同于StyleSheet.addRules()方法，不适用于IE8\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003einsertRule()\u003c/td\u003e\n            \u003ctd\u003e等同于StyleSheet.removeRule()方法，不适用于IE8\u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch5\u003eCSSRuleList接口\u003c/h5\u003e\n\u003cp\u003eCSSRuleList接口是W3C DOM规范所定义的，它包含一系列CSSRule对象，是一个列表，基本等同于数组语法，使用CSSStyleSheet.cssRules属性可返回该列表。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;table\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;caption\u0026gt;CSSRuleList接口定义的属性\u0026lt;/caption\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;tr\u0026gt;\u0026lt;th\u0026gt;属性名\u0026lt;/th\u0026gt;\u0026lt;th\u0026gt;描述\u0026lt;/th\u0026gt;\u0026lt;/tr\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;tr\u0026gt;\u0026lt;td\u0026gt;length\u0026lt;/td\u0026gt;\u0026lt;td\u0026gt;返回CSSRule对象的数量\u0026lt;/td\u0026gt;\u0026lt;/tr\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/table\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eCSSRuleList接口定义的方法\u003c/caption\u003e\n    \u003ctbody\u003e\n        \u003ctr\u003e\n            \u003cth\u003e方法名\u003c/th\u003e\n            \u003cth\u003e描述\u003c/th\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eitem()\u003c/td\u003e\n            \u003ctd\u003e使用索引号获取CSSRule对象，也可以使用数组方法\u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch5\u003eCSSRule接口\u003c/h5\u003e\n\u003cp\u003eCSSRule接口是所有规则的基接口，包括@规则和规则集。它定义了通用的属性和方法。CSSRuleList列表中的规则会有不同的规则类型，这些类型可以由CSSRule接口中定义的常量表示。当使用CSSRuleList.item()方法访问一个列表时，它直接返回不同类型的规则，例如直接返回一个CSSStyleRule对象。\n\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eCSSRule接口定义的属性\u003c/caption\u003e\n    \u003ctbody\u003e\n        \u003ctr\u003e\n            \u003cth\u003e属性名\u003c/th\u003e\n            \u003cth\u003e描述\u003c/th\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003ecssText\u003c/td\u003e\n            \u003ctd\u003e当前CSS文本字符串的表示形式，IE8+\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eparentRule\u003c/td\u003e\n            \u003ctd\u003e当前CSS规则的父规则，不适用于IE8\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eparentStyleSheet\u003c/td\u003e\n            \u003ctd\u003e包含该规则的CSSStyleSheet对象，IE7+\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003etype\u003c/td\u003e\n            \u003ctd\u003e当前CSS规则的类型，不适用于IE8\u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eCSSRule接口定义的常量\u003c/caption\u003e\n    \u003ctbody\u003e\n        \u003ctr\u003e\n            \u003cth\u003e属性名\u003c/th\u003e\n            \u003cth\u003e对应接口类型\u003c/th\u003e\n            \u003cth\u003e数据类型\u003c/th\u003e\n            \u003cth\u003e常量值\u003c/th\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eUNKNOWN_RULE\u003c/td\u003e\n            \u003ctd\u003eCSSUnknownRule\u003c/td\u003e\n            \u003ctd rowspan=\"7\"\u003eint\u003c/td\u003e\n            \u003ctd\u003e0\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eSTYLE_RULE\u003c/td\u003e\n            \u003ctd\u003eCSSStyleRule\u003c/td\u003e\n            \u003ctd\u003e1\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eCHARSET_RULE\u003c/td\u003e\n            \u003ctd\u003eCSSCharsetRule\u003c/td\u003e\n            \u003ctd\u003e2\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eIMPORT_RULE\u003c/td\u003e\n            \u003ctd\u003eCSSImportRule\u003c/td\u003e\n            \u003ctd\u003e3\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eMEDIA_RULE\u003c/td\u003e\n            \u003ctd\u003eCSSMediaRule\u003c/td\u003e\n            \u003ctd\u003e4\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eFONT_FACE_RULE\u003c/td\u003e\n            \u003ctd\u003eCSSFontFaceRule\u003c/td\u003e\n            \u003ctd\u003e5\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003ePAGE_RULE\u003c/td\u003e\n            \u003ctd\u003eCSSPageRule\u003c/td\u003e\n            \u003ctd\u003e6\u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch5\u003eCSSImportRule接口\u003c/h5\u003e\n\u003cp\u003eCSSImportRule接口继承自CSSRule接口，代表一个导入的CSS规则集，可以使用CSSStyleSheet.ownerRule属性返回，如果不是CSSImportRule对象，那么CSSStyleSheet.ownerRule属性返回null。\n\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eCSSImportRule接口定义的属性\u003c/caption\u003e\n    \u003ctbody\u003e\n        \u003ctr\u003e\n            \u003cth\u003e属性名\u003c/th\u003e\n            \u003cth\u003e描述\u003c/th\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003ehref\u003c/td\u003e\n            \u003ctd\u003e导入css样式表的URL，不适用于旧版IE8\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003emedia\u003c/td\u003e\n            \u003ctd\u003e导入CSS样式表的介质，不适用于旧版IE8\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003estyleSheet\u003c/td\u003e\n            \u003ctd\u003e返回一个CSSStyleSheet对象代表导入的样式表，不适用于旧版IE8\u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch5\u003eCSSStyleRule接口\u003c/h5\u003e\n\u003cp\u003eCSSStyleRule接口继承自CSSRule接口，一个CSSStyleRule对象用来表示一个样式规则集，可以从oStyleSheet.rules或CSSStyleSheet.cssRules属性返回的列表中获取该对象。IE的rule对象基本等同于该接口。\n\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eCSSStyleRule接口定义的属性\u003c/caption\u003e\n    \u003ctbody\u003e\n        \u003ctr\u003e\n            \u003cth\u003e属性名\u003c/th\u003e\n            \u003cth\u003e描述\u003c/th\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eselectorText\u003c/td\u003e\n            \u003ctd\u003e获取规则集的选择符\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003estyle\u003c/td\u003e\n            \u003ctd\u003e获取规则集中的样式表\u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch5\u003eCSSStyleDeclaration接口\u003c/h5\u003e\n\u003cp\u003eCSSStyleDeclaration接口表示一个样式规则块，基本等同于IE的style对象。\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eCSSStyleDeclaration接口定义的属性\u003c/caption\u003e\n    \u003ctbody\u003e\n        \u003ctr\u003e\n            \u003cth\u003e属性名\u003c/th\u003e\n            \u003cth\u003e描述\u003c/th\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003exssText\u003c/td\u003e\n            \u003ctd\u003e返回当前样式规则块的文本字符串的样式，IE8+\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eparentRule\u003c/td\u003e\n            \u003ctd\u003e返回当前样式规则块中规则集，不适用于IE\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003elength\u003c/td\u003e\n            \u003ctd\u003e返回样式属性的数量，不适用于IE\u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eCSSStyleDeclaration接口定义的方法\u003c/caption\u003e\n    \u003ctbody\u003e\n        \u003ctr\u003e\n            \u003cth\u003e方法名\u003c/th\u003e\n            \u003cth\u003e描述\u003c/th\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003egetPropertyValue()\u003c/td\u003e\n            \u003ctd\u003e根据属性名获取属性值\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003egetPropertyCSSValue()\u003c/td\u003e\n            \u003ctd\u003e根据属性名获取属性值的CSSValue表达方式\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eremoveProperty()\u003c/td\u003e\n            \u003ctd\u003e根据属性名删除属性\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003egetPropertyPriority()\u003c/td\u003e\n            \u003ctd\u003e根据属性名获取优先权定义，如important\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eitem()\u003c/td\u003e\n            \u003ctd\u003e根据索引号获取样式属性名\u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ CSS","title":"CSS规范"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","CSS","CSS规范"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
