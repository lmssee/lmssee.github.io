    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003eDOM样式（DOM Style）规范也是由W3C制定的，目前包含两个部分：DOM StyleSheets和DOM CSS。IE8及以前的版本不支持DOM Style规范，IE9支持该规范。\u003c/p\u003e\n\u003cp\u003e为兼容主流浏览器，在使用前应该先检测用户了浏览器的类型，以便调用不同的对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar cssRule = document.styleSheet[0].cssRules || document.styleSheets[0].rules;\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e#box { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 700px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 500px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: #0ff; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eborder: 2px dotted #00f; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u0026lt;/style\u0026gt; \u0026lt;div id=\"box\"\u0026gt;\u0026lt;/div\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        box = document.querySelector(\"#box\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar cssRules =\n        document.styleSheets[0].cssRules || document.styleSheets[0].rules; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebox.innerHTML = \"\u0026lt;h3\u0026gt;盒子样式\u0026lt;/h3\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003ebox.innerHTML +=\n        \"\u0026lt;br\u0026gt;宽度：\" + cssRules[0].style.width; \u003c/span\u003e\u003cspan class=\"p2\"\u003ebox.innerHTML += \"\u0026lt;br\u0026gt;高度：\" +\n        cssRules[0].style.height; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebox.innerHTML += \"\u0026lt;br\u0026gt;边框：\" + cssRules[0].style.border; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebox.innerHTML += \"\u0026lt;br\u0026gt;背景颜色：\" + cssRules[0].style.backgroundColor; \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003estylesheets 包括文档所有的样式表，每个数组元素代表一个样式表，数组的索引位置根据样式在文档中的位置决定的。\u003c/p\u003e\n\u003cp\u003estyleSheet[1] 代表文档中第二个 style 元素内容。而 cssRules[0] 就代表了该样式表中的第一条规则。cssRules[0].style.color 就代表该规则下的颜色设置。\u003c/p\u003e\n\u003ch5\u003eselectorText 对象\u003c/h5\u003e\n\u003cp\u003e使用 styleSheets 和 cssRules 可以获取文档样式表中的任意样式。另外，每个 CSS 样式包含 selectorText 属性，使用该属性可以获取样式的选择符。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 700px;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e.d { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: #0ff;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e#box { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eheight: 500px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 2px dotted #00f; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n        \u0026lt;/style\u0026gt; \u0026lt;div id=\"box\" class=\"d\"\u0026gt;\u0026lt;/div\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar box =\n        document.querySelector(\"#box\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar cssRules = document.styleSheets[0].cssRules || document.styleSheets[0].rules; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebox.innerHTML = \"第一个样式表中的第三个样式选择符 = \" + cssRules[2].selectorText; \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e编辑样式\u003c/h5\u003e\n\u003cp\u003ecssRules 不仅可以访问属性，还可以设置属性值。\u003c/p\u003e\n\u003cp class=\"no\"\u003e上述方法修改样式表中的类样式，会影响其它对象或其它文档样式对当前表的引用，因此在使用时应当谨慎。\u003c/p\u003e\n\u003ch5\u003e添加样式\u003c/h5\u003e\n\u003cp\u003e使用 addRule() 可以为样式表增加一个样式。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003estylesheet.addRule(selector, style [,index]); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eFirefox 浏览器不支持 addRule() 方法，但是支持 insertRule()　方法添加样式。insertRule() 方法添加样式。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003estyleSheet.inertRule(rule[, index]); \u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e#box { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor: #088;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e.red { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor: #f00; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e.blue { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ecolor: #00f; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/style\u0026gt; \u0026lt;p\u0026gt;一段废话\u0026lt;/p\u0026gt; \u0026lt;script\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar styleSheets = document.styleSheets[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar index =\n        styleSheets.length; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eif (styleSheets.insertRule) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003estyleSheets.insertRule(\"p{background-color:#f00;color:#f0f;padding:1rem;}\", index);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003estyleSheets.addRule(\"P\",\n        \"background-color:#f00;color:#f0f;padding:1rem\", index); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e访问计算样式\u003c/h5\u003e\n\u003cp\u003eCSS 样式能够重叠，这会导致当一个对象被定义许多样式后，显示的效果未必都是某个样式所设计的效果。\u003c/p\u003e\n\u003ch6\u003eIE 浏览器\u003c/h6\u003e\n\u003cp\u003eIE 浏览器定义了一个 currentStyle 对象，该对象是一个只读对象。 currentStyle 对象包含了文档所有的 style 对象定义的属性，以及未被覆盖的 CSS 规则的 style 属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;Document\u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e#p { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #088; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e.red\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #f00; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e.blue { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #00f; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\n        class=\" blue red\" id=\"p\"\u0026gt;一段废话\u0026lt;/p\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar styleSheets = document.styleSheets[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar index =\n        styleSheets.length; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (styleSheets.insertRule) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003estyleSheets.insertRule(\"p{background-color:#f00;color:#f0f;padding:1rem;}\", index); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003estyleSheets.addRule(\"P\",\n        \"background-color:#f00;color:#f0f;padding:1rem\", index); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p\n        = document.querySelector(\"p\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003ep.innerHTML = \"背景色：\" +\n        p.currentStyle.backgroundColor + \"\u0026lt;br\u0026gt;字体颜色：\" + p.currentStyle.color; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(p); \u0026lt;/script\u0026gt; \u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"no\"\u003e想哭，用 chrome 测试半天没响应。。\u003c/p\u003e\n\u003ch6\u003e非 IE 浏览器\u003c/h6\u003e\n\u003cp\u003eDOM 中定义了一个 getComputedStyle() 方法，该方法可以获取目标对象的样式，但是它需要使用 document.defaultView 对象进行访问。\u003c/p\u003e\n\u003cp\u003egetComputedStyle() 方法包含两个参数：第 1 个参数表示元素，用来获取样式的对象；第 2 个参数表示伪类字符串，定义显示的位置，一般可省略。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;Document\u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e#p { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #fff; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e.red\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #f00; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e.blue { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #00f; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\n        class=\" blue red\" id=\"p\"\u0026gt;一段废话\u0026lt;/p\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar styleSheets = document.styleSheets[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar index =\n        styleSheets.length; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (styleSheets.insertRule) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003estyleSheets.insertRule(\"p{background-color:#a008;color:#0ff;padding:1rem;}\", index); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003estyleSheets.addRule(\"P\",\n        \"background-color:#a008;color:#0ff;padding:1rem\", index); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        p = document.querySelector(\"p\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (document.defaultView \u0026\u0026\n        document.defaultView.getComputedStyle) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ep.innerHTML = \"背景色：\" + document.defaultView.getComputedStyle(p, null).backgroundColor +\n        \"\u0026lt;br\u0026gt;字体颜色：\" + document.defaultView.getComputedStyle(p, null).color \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else if\n        (p.currentStyle) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ep.innerHTML = \"背景色：\" + document.currentStyle.backgroundColor + \"\u0026lt;br\u0026gt;字体颜色：\" +\n        document.currentStyle.color; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003ep.innerHTML =\n        \"当前浏览器无法获取最终样式\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e嗯\u003c/h5\u003e\n\u003cp\u003eDOM StyleSheets定义了几个基础接口，用于标示HTML或XML文档中的样式定义，包括StyleSheet、StyleSheetList和MediaList接口。这些接口不仅仅用于CSS样式，还可以用于XSL样式。\n\u003c/p\u003e\n\u003ch5\u003eStyleSheet接口\u003c/h5\u003e\n\u003cp\u003eStyleSheet接口是HTML文档中link元素和style元素的抽象表示，它为DOM CSS规范中的CSSStyleSheet接口提供基接口。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eStyleSheet接口定义的成员\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性名\u003c/th\u003e\n        \u003cth\u003e数据类型\u003c/th\u003e\n        \u003cth\u003e只读\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003eStyleSheetList接口\u003c/h5\u003e\n\u003cp\u003eStyleSheetList表示一系列StyleSheet对象组成的列表，使用document.styleSheets属性可以返回一个StyleSheetList，其中包含了一系列StyleSheet对象，然后可以使用StyleSheetList接口定义的方法和属性获取列表中的StyleSheet对象。\n\u003c/p\u003e\n\u003ctable id=\"Ab\"\u003e\n    \u003ccaption\u003eStyleSheetList接口的属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性名\u003c/th\u003e\n        \u003cth\u003e数据类型\u003c/th\u003e\n        \u003cth\u003e可读\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ctable id=\"Ac\"\u003e\n    \u003ccaption\u003eStyleSheetList接口的方法\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e方法名\u003c/th\u003e\n        \u003cth\u003e数据类型\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003eitem()方法有3种等同效果的语法格式：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003estyleSheetList.item(0)\u003c/li\u003e\n    \u003cli\u003estyleSheetList[0]\u003c/li\u003e\n    \u003cli\u003estyleSheetList(0)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eMediaList接口\u003c/h5\u003e\n\u003cp\u003eMediaList表示StyleSheet所应用的介质组成的列表，StyleSheet.media属性可以返回一个MediaList，其中包含了一系列介质字符串，然后可以使用MediaList接口定义的方法和属性操作介质。\n\u003c/p\u003e\n\u003ctable id=\"Ad\"\u003e\n    \u003ccaption\u003eMediaList接口的属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性名\u003c/th\u003e\n        \u003cth\u003e数据类型\u003c/th\u003e\n        \u003cth\u003e只读\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ctable id=\"Ae\"\u003e\n    \u003ccaption\u003eMediaList接口的方法\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e方法名\u003c/th\u003e\n        \u003cth\u003e数据类型\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e默认情况下，StyleSheet.media属性会返回空列表，因为没有定义media属性（这时其实是定义介质为all）。\u003c/p\u003e\n\u003cp\u003e其中，item()方法也有3种等同效果的语法格式：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003estyleSheetList.item(0)\u003c/span\u003e\u003cspan class=\"p\"\u003estyleSheetList[0]\u003c/span\u003e\u003cspan\n        class=\"p\"\u003estyleSheetList(0)\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eLinkStyle接口\u003c/h5\u003e\n\u003cp\u003e通过LinkStyle接口定义的属性可以从定义样式表的元素直接获取样式表。例如link和style元素都可以定义样式表，这两个元素分别为HTMLLinkElement和HTMLStyleElement，通过对这两个元素节点应用sheet属性就可以返回StyleSheet对象：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar oStyleSheet = oHTMLLinkElement.sheet;\u003c/span\u003e\u003cspan class=\"p\"\u003evar oStyleSheet =\n        oHTMLStyleElement.sheet;\u003c/span\u003e\n\u003c/code\u003e\n\u003ctable id=\"Af\"\u003e\n    \u003ccaption\u003eLinkStyle接口的Sheet属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性名\u003c/th\u003e\n        \u003cth\u003e数据类型\u003c/th\u003e\n        \u003cth\u003e只读\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003eDocumentStyle接口\u003c/h5\u003e\n\u003cp\u003e通过DocumentStyle接口定义的属性可以从定义文档直接获取样式表，这是最常用的方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar styleSheetList = document.styleSheets;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar oStyleSheet = styleSheetList[0];\u003c/span\u003e\n\u003c/code\u003e\n\u003ctable id=\"Ag\"\u003e\n    \u003ccaption\u003eDocumentStyle接口的属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性名\u003c/th\u003e\n        \u003cth\u003e数据类型\u003c/th\u003e\n        \u003cth\u003e只读\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        [\"type\", \"DOMString\", \"Y\", \"link或style元素的type属性\"],\n        [\"disabled\", \"boolean\", \"返回或设置当前文档是否应用该样式表\"],\n        [\"ownerNode\", \"Node\", \"Y\", \"样式表\"],\n        [\"parentStyleSheet\", \"StyleSheet\", \"Y\", \"样式表的父级，例如，@import包含在另一个样式表中，如果不存在，则返回null\"],\n        [\"href\", \"DOMString\", \"Y\", \"link或ste的href属性\"],\n        [\"title\", \"DOMString\", \"Y\", \"link或style的title属性\"],\n        [\"media\", \"MediaList\", \"Y\", \"link或style的media属性\"]\n    ];\n    var Ab = [\n        [\"length\", \"int\", \"Y\", \"返回列表中StyleSheet对象是数量，适合的子杰点索引范围为0~stylesheetList列表中的styleSheet对象\"]\n    ];\n    var Ac = [\n        [\"item()\", \"Node\", \"根据索引获取stylesheet列表中的stylesheet对象\"]\n    ];\n    var Ad = [\n        [\"length\", \"int\", \"Y\", \"返回列表中介质描述符的数量，适合的索引值为0～mediaListLength-1\"],\n        [\"mediaText\", \"DOMString\", \"使用逗号分割的介质描述符的字符串\"]\n    ];\n    var Ae = [\n        [\"deleteMedium()\", \"void\", \"删除一个介质描述符\"],\n        [\"appendMedium()\", \"void\", \"添加一个介质描述符\"],\n        [\"item()\", \"Node\", \"根据索引获取MediaList列表用的介质描述符\"]\n    ];\n    var Af = [\n        [\"Sheet\", \"StyleSheet\", \"N\", \"返回link或style定义的样式表\"]\n    ];\n    var Ag = [\n        [\"StyleSheets\", \"StyleSheetList\", \"N\", \"返回文档中损友StyleSheet对象组成的列表\"]\n    ];\n    _MiMethod.td(\"Aa\");\n    _MiMethod.td(\"Ab\");\n    _MiMethod.td(\"Ac\");\n    _MiMethod.td(\"Ad\");\n    _MiMethod.td(\"Ae\");\n    _MiMethod.td(\"Af\");\n    _MiMethod.td(\"Ag\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ CSS","title":"DOM样式表"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","CSS","DOM样式表"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
