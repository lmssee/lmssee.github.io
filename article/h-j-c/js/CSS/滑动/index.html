    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e滑动\u003c/h5\u003e\n\u003cp\u003e在 JavaScript 中，主要利用循环和定时器（setTimeout 和 setInterval ）来实现。动画设计思路：通过循环改变某个元素的 CSS\n    样式属性，从而达到动态效果。为了达到更加逼真的效果，则通过高频率小步伐快速修改样式属性值。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e.block { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 20px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eposition: absolute; \u003c/span\u003e\u003cspan class=\"p4\"\u003eleft:\n        20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003etop: 200xp; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ebackground-color: #f00; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/style\u0026gt; \u0026lt;div class=\"block\"\n        id=\"block\"\u0026gt;\u0026lt;/div\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar temp = document.querySelector(\"div\");\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eslide(temp, 400, 400, 60); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efunction slide(e, x, y, t) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar t = t || 100; \u003cspan class=\"r\"\u003e//\n            初始化步数\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar o = getB(e); \u003cspan class=\"r\"\u003e// 当前元素的绝对位置\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar xo = o.x; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar yo = o.y; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar stepX = Math.round((x - xo) / t); \u003cspan class=\"r\"\u003e// 计算 x 轴步长\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        stepY = Math.round((y - yo) / t); \u003cspan class=\"r\"\u003e// 计算 y 轴步长\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar out =\n        setInterval(function() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar o = getB(e); \u003cspan class=\"r\"\u003e// 每次移动后的绝对位置\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003evar xo = o.x;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar yo = o.y; \u003c/span\u003e\u003cspan class=\"p6\"\u003ee.style[\"left\"] = (xo + stepX) + \"px\";\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ee.style[\"top\"] = (yo + stepY) + \"px\"; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (Math.abs(x - xo) \u0026lt;= Math.abs(stepX) || Math.abs(y - yo) \u0026lt;= Math.abs(stepY)) {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003ee.style[\"left\"] = x + \"px\"; \u003c/span\u003e\u003cspan class=\"p8\"\u003ee.style[\"top\"] = y + \"px\";\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003eclearTimeout(out); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}, 2) \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        getB(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn { \u003c/span\u003e\u003cspan class=\"p6\"\u003e\"x\": (parseInt(getStyle(e, \"left\")) ||\n        0), \u003c/span\u003e\u003cspan class=\"p6\"\u003e\"y\": (parseInt(getStyle(e, \"top\")) || 0) \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction getStyle(e, n) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eif (e.style[n]) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn e.style[n]; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if\n        (e.currentStyle) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn e.currentStyle[n]; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (document.defaultView \u0026\u0026\n        document.defaultView.getComputedStyle) { \u003c/span\u003e\u003cspan class=\"p6\"\u003en = n.replace(/([A-Z])/g, \"-$1\");\n    \u003c/span\u003e\u003c
