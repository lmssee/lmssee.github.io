="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>数据类型</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e基本类型 \u003c/h5\u003e\n\u003cp\u003e每一种计算机语言都有自己所支持的数据类型。 JavaScript\n    脚本语言中采用的是弱类型的方式，即一个数据（变量或常量）不必首先做声明，可在使用或赋值时才确定其数据的类型。当然也可以先声明该数据的类型，即通过在赋值时自动说明其数据类型。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enull 空值，当为对象赋值为 null 时，表示删除该属性 \u003c/li\u003e\n    \u003cli\u003eundefined 未定义 \u003c/li\u003e\n    \u003cli\u003enumber 数值 \u003c/li\u003e\n    \u003cli\u003estring 字符串 \u003c/li\u003e\n    \u003cli\u003eBoolean 布尔值 \u003c/li\u003e\n    \u003cli\u003e\"symbol\" 表示值为符号 \u003c/li\u003e\n    \u003cli\u003ebigint 大整数\u003c/li\u003e\n    \u003cli\u003eobject 对象 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e在JavaScript中，基本数据类型变量分配在栈内存中，其中存放了变量的值，对其是按值来访问的；而对象类型的变量则同时会分配栈内存和堆内存，其中栈内存存放的是地址。堆内存存放的是引用类型的值，栈内存存放的地址指向堆内存中存放的值。对该变量的访问是按引用来访问的，即首先读取到栈内存存放的地址，然后按该地址找到堆内存读取其中存放的值。\n    \u003c/p\u003e\n    \u003cp\u003eJavaScript之所以按变量的不同数据类型来分配内存，主要原因是栈内存比堆内存小，而且栈内存的大小是固定的，而堆内存大小可以动态变化。基本数据类型的值的大小固定，对象类型\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e数值 \u003c/h5\u003e\n\u003cp\u003e见详细。 \u003c/p\u003e\n\u003ch5\u003e字符串 \u003c/h5\u003e\n\u003cp\u003e见详细。 \u003c/p\u003e\n\u003ch5\u003e布尔型 \u003c/h5\u003e\n\u003cp\u003e仅包含两个固定值 true 和 false 。 \u003c/p\u003e\n\u003cp\u003e还有另外一种使用方式： JavaScript 把非 0 值当作 true 来处理，把 0 值当作 false 来处理。下面这些值在 JavaScript 里都当作 false 处理： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e布尔值 false\u003c/li\u003e\n    \u003cli\u003e未定义（ undefined ） \u003c/li\u003e\n    \u003cli\u003enull\u003c/li\u003e\n    \u003cli\u003e0\u003c/li\u003e\n    \u003cli\u003eNaN\u003c/li\u003e\n    \u003cli\u003e\"\" （空字符串） \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e一个值转换为布尔型的最简单方式 \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e!!'demo'; \u003cspan class=\"r\"\u003e//true\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e!!\";\n        //false\u003c/span\u003e\u003cspan class=\"p\"\u003e!!'0'; \u003cspan class=\"r\"\u003e//true\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e!!'1'; \u003cspan\n            class=\"r\"\u003e//true\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e!!{}; \u003cspan class=\"r\"\u003e//true\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e!!true; \u003cspan class=\"r\"\u003e//true\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用 \" ! \"操作符两次，可以把一个值转换为布尔型。 \u003c/p\u003e\n\u003ch6\u003eBoolean 对象的属性 \u003c/h6\u003e\n\u003cp\u003econstructor 属性用于对当前对象的函数的引用。 \u003c/p\u003e\n\u003cp\u003eprototype 属性可以对对象添加属性和方法。 \u003c/p\u003e\n\u003ch6\u003eBoolean 对象的方法 \u003c/h6\u003e\n\u003cp\u003etoString 方法。 \u003c/p\u003e\n\u003cp\u003e该方法用于将 Boolean 值转换成字符串 BooleanObject.toString() 。 \u003c/p\u003e\n\u003cp\u003evalueOf 方法用于返回 Boolean 对象的原始值 BooleanObject.valueOf() 。 \u003c/p\u003e\n\u003cp\u003e快速检测出初始化。 \u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\n    \u003cspan class=\"p \"\u003evar b;\u003c/span\u003e\n    \u003cspan class=\"p \"\u003eb = b ? b : \"OK \";\u003c/span\u003e\n    \u003cspan class=\"p \"\u003ealert(b);\u003c/span\u003e\n\u003c/div\u003e\n\u003ch5\u003enull\u003c/h5\u003e\n\u003cp\u003eNull 类型的数据只有一个值，那就是 null 。逻辑上讲， null 值表示一个空对象指针，这也是给 typeof 传一个 null 会返回 \"object \" 的原因。 \u003c/p\u003e\n\u003cp\u003e当一个变量值为 null 时， JavaScript 会自动回收它，已避免占用无效空间。 \u003c/p\u003e\n\u003cp\u003eundefined 值是由 null 值派生而来的，因此 ECMA-262 将它们定义为表面上相等 \u003c/p\u003e\n\u003cdiv class=\"note \"\u003e\n    \u003cp\u003e原理是这样的，不同的对象在底层都表示为二进制，在 JavaScript 中二进制前三位都为 0 的话会被判 断为 object 类型， null 的二进制表示是全 0 ，自然前三位也是 0 ，所以执行 typeof\n        时会返回 \" object \"。 \u003c/p\u003e\n    \u003cp\u003enull是JavaScript的关键字，表示没有对象，用于定义空的或不存在的引用。null参与算术运算时其值会自动转换为0\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003eUndefined\u003c/h5\u003e\n\u003cp\u003eundefined 是 Undefined 类型的唯一值，表示未定义的值。当声明变量未赋值时，或者定义属性未设置值时，默认它们的值为 undefined 。 \u003c/p\u003e\n\u003cp\u003enull 和 undefined 都是假值，可以相等： \u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003ealert(null == undefined );\u003cspan class=\"r\"\u003e// 返回 true\u003c/span\u003e\n    \u003c/span\u003e\n\u003c/div\u003e\n\u003cp\u003e但是， null 和 undefined 是不同类型的数据，使用全等运算符（ === ）或 typeof 运算符可以区分检测。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ealert(null === undefined); \u003cspan class=\"r\"\u003e// 返回 false\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(typeof null); \u003cspan class=\"r\"\u003e// 返回 'object'\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(typeof undefined);\u003cspan class=\"r\"\u003e// 返回 'undefined'\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eundefined参与算术运算时转换为NaN（Not a Number，即不是一个数字，属于数字类型）\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e检测 \u003c/h5\u003e\n\u003cp\u003e检测一个变量是否被初始化，可以借助 undefined 值进行快速检测。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar a;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(a);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e(a == undefined) \u0026\u0026 (a = 0);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(a);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e也可以用 typeof 运算符检测变量是否初始化。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e( typeof a == \"undefined\") \u0026\u0026 (a = 0 );\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e当声明了 a ，却没有声明 b 时，然后用 typeof 运算符检测它们的类型，返回的值都是字符串 \"undefined\" 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar a;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(typeof a);\u003cspan class=\"r\"\u003e// 返回 undefined\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(typeof b);\u003cspan class=\"r\"\u003e// 返回 undefined\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e对于未声明的变量 b 来说，如果直接在表达式中使用，会引发异常。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ealert ( b == undefined ); 提示未定义的错误信息 \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e对于函数来说，如果没有明确的返回值则默认返回值都为 undefined 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction f() {\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert (f()) ;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e与 null 不同的是， undefined 还不是 JavaScript 的保留字，在 ECMAScript v3 标准中才定义 undefined 为全局变量，初始值为 undefined 。因此，在使用\n    undefined 时，应注意早期的浏览器可能不支持。 \u003c/p\u003e\n\u003ch5\u003e类型检测 \u003c/h5\u003e\n\u003ch6\u003e使用 typeof 检测类型 \u003c/h6\u003e\n\u003cscript\u003e\n    document.write(\"\u003cp\u003e\u003cbr\u003e\");\n    document.write('document.write(typeof \\\"a\"\\) ----\u0026gt;\u003cmark\u003e' + type(\"a\") + \"\u003c/mark\u003e\u003cbr\u003e\");\n    document.write('document.write(typeof 1) ----\u0026gt;\u003cmark\u003e' + type(1) + \"\u003c/mark\u003e\u003cbr\u003e\");\n    document.write('document.write(typeof true) ----\u0026gt;\u003cmark\u003e' + type(true) + \"\u003c/mark\u003e\u003cbr\u003e\");\n    document.write('document.write(typeof {}) ----\u0026gt;\u003cmark\u003e' + type({}) + \"\u003c/mark\u003e\u003cbr\u003e\");\n    document.write('document.write(typeof []) ----\u0026gt;\u003cmark\u003e' + type([]) + \"\u003c/mark\u003e\u003cbr\u003e\");\n    document.write('document.write(typeof function(){}) ----\u0026gt;\u003cmark\u003e' + type(function () { }) + \"\u003c/mark\u003e\u003cbr\u003e\");\n    document.write('document.write(typeof undefined) ----\u0026gt;\u003cmark\u003e' + type(undefined) + \"\u003c/mark\u003e\u003cbr\u003e\");\n    document.write('document.write(typeof null) ----\u0026gt;\u003cmark\u003e' + type(null) + \"\u003c/mark\u003e\u003csmall\u003e已对  typeof 函数进行处理 \u003c/small\u003e\u003cbr\u003e\");\n    document.write('document.write(typeof NaN) ----\u0026gt;\u003cmark\u003e' + type(NaN) + \"\u003c/mark\u003e\u003cbr\u003e\");\n    document.write(\"\u003c/p\u003e\");\n\u003c/script\u003e\n\u003cp\u003e由于 null 值返回类型为 object ，可以定义一个检测简单数据类型的一般方法。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction type(o){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereturn (o === null ) ? \"null\" : (typeof o);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e使用 constructor\u003c/h6\u003e\n\u003cp\u003econstructor 是 Object 类型的原型，它能够返回当前对象的构造器（类型函数）。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar o = {};\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar a = [];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(o.constructor == Object); \u003cspan class=\"r\"\u003e// 返回 true\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(a.constructor == Array); \u003cspan class=\"r\"\u003e// 返回 true\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ctable id=\"td_a\"\u003e\n    \u003ccaption\u003e数据类型的检测 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e值 \u003c/th\u003e\n        \u003cth\u003etypeof value\u003c/th\u003e\n        \u003cth\u003evalue.constructor\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e对于 null 、 undefined ，不能够使用 constructor ，且数值直接量也无法使用。如果结合 typeof 运算符 和 constructor 属性，基本上可以确定数据的类型的检测。 \u003c/p\u003e\n\u003ch6\u003e封装类检查 toString （） \u003c/h6\u003e\n\u003cp\u003e使用 toString() 方法可以设计一种更安全的检测 JavaScript 数据类型的方法。 \u003c/p\u003e\n\u003cp\u003e由 Object 对象定义的 toString() 方法返回的字符串总是。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[object class]\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e其中 object 表示对象的通用类型， class 表示内部类型，内部类型总与该对象的构造函数名对应。例如： Array 对象的 class 为 \"Array\" ； Function 对象的 class 为\n    \"Function\" ； Date 对象的 class 为 \"Date\" ；内部 MAth 对象的 class 为 \"Math\" ；所有 Error 对象的 class 为 \"Error\" 。 \u003c/p\u003e\n\u003cp\u003e客户端的 JavaScript 的对象和由 JavaScript 实现定义的其它所有对象都具有特定的 class 值，如 \"window\" 、 \"Document\" 和 \"Form\" 等。我们自定义的对象的 class 为\n    \"Object\" 。 \u003c/p\u003e\n\u003cp\u003eclass 值提供的信息与对象的 constructor 属性值相似 , 但是 class 值是以字符串的形式提供这些信息 , 者在特定的环境下非常有用。如果使用 typeof 运算符来检测，则所有的对象的 class 值都为\n    \"Object\" 或 \"Function\" 。即不能提供有效信息。 \u003c/p\u003e\n\u003cp\u003e但是，要获取对象的 class 值唯一的方法是必须调用 Object 的原型方法 toString() ，因为许多对象都会重置 Object 的 toString() 方法，所以不能直接用对象的 toString （）方法。\n\u003c/p\u003e\n\u003cp\u003e调用 Object 的 toString() 原型方法，可以通过调用 Object.prototype.toString() 对象的默认 toString() 函数，再调用该函数的 apply()\n    方法在想要检测的对象上执行即可。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e// 安全检测 Javascript 基本数据类型 和 内置对象 \u003c/span\u003e\u003cspan class=\"p\"\u003e// 参数： o 表示检查值 \u003c/span\u003e\u003cspan class=\"p\"\u003e//\n        返回的值：返回字符串 \"undefined\" 、 \"number\" 、 \"boolean\" 、 \"string\" 、 \"function\" 、 \"regexp\" 、 \"array\" 、\n        \"date\" 、 \"error\" 、 \"object\" 、 \"null\" \u003c/span\u003e\n    \u003cspan class=\"p\"\u003efunction typeOf(o) { \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar l_toString = Object.prototype.toString; \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 获取对象的 toString()\n        方法的调用 \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 列举基本数据类型 和 内置对象类型 \u003c/span\u003e\u003cspan class=\"p2\"\u003evar l_type = { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\"undefined\": \"undefined\", \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\"number\": \"number\", \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\"boolean\": \"boolean\", \u003c/span\u003e\u003cspan class=\"p4\"\u003e\"string\": \"string\", \u003c/span\u003e\u003cspan class=\"p4\"\u003e\"[object\n        Function]\": \"function\", \u003c/span\u003e\u003cspan class=\"p4\"\u003e\"[object RegExp]\": \"regexp\",\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\"[object Array]\": \"array\", \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\"[object Date]\": \"date\", \u003c/span\u003e\u003cspan class=\"p4\"\u003e\"[object Error]\": \"error\" \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn l_type[typeof o] || l_type[l_toString.call(o)] || (o ? \"object\"\n        : \"null\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 通过把值转换成字符串，然后匹配返回字符串中是否含有特定的字符进行检测 \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上述方法仅适用于 JavaScript 基本数据类型和内置对象，但是对于自定义对象是无效的。因为自定义对象被转换为字符串后，返回的值没有规律，且不同的浏览器返回的值也不相同。因此，检测非内置对象，只能使用\n    constructor 属性和 instanceof 运算符来实现。 \u003c/p\u003e\n\u003ch5\u003eBigInt\u003c/h5\u003e\n\u003cp\u003eBigInt是在 2019年 9月被正式纳入 ECMAScript标准中的特性。虽然 BigInt不是频繁使用的特性，但其特殊性在于它是一种新的原始数据类型，同时又属于数值类型的一种。由于 BigInt类型的加入，\n    JavaScript中共支持两种数值类型，即 Number类型和 BigInt类型。\n\u003c/p\u003e\n\u003ch6\u003e创建 BigInt \u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e使用 BigInt字面量 \u003c/li\u003e\n    \u003cli\u003e使用 BigInt()函数 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBigInt字面量的语法是在一个整数后面添加一个小写字母“ n”。字母“ n”必须紧随数字之后，两者之间不允许存在空白字符。 \u003c/p\u003e\n\u003cp\u003e\n    使用 BigInt()函数也能够创建 BigInt类型的值。 BigInt()函数会尝试将传入的参数转换为 BigInt，最基本的使用场景是将一个整数转换为 BigInt类型的值。\n\u003c/p\u003e\n\u003ch6\u003eBigInt与 Number\u003c/h6\u003e\n\u003cp\u003eBigInt类型的值能够与 Number类型的值进行大小及相等关系的比较。在进行严格相等比较时， BigInt类型的值与 Number类型的值永远不相等。在进行非严格相等比较及大小关系比较时， BigInt类型的值与\n    Number类型的值将进行数学意义上的比较。\n\u003c/p\u003e\n\u003cp\u003e虽然 BigInt类型的值可以与 Number类型的值进行比较，但是 BigInt类型的值不允许与 Number类型的值一起进行混合数学运算。 \u003c/p\u003e\n\u003cp\u003e通过内置的 Number()函数能够将 BigInt类型的值转换为 Number类型的值。但要注意，在 BigInt类型与 Number类型之间进行强制类型转换时有可能损失精度。 \u003c/p\u003e\n\n\u003cscript\u003e\n    var td_a = [\n        [\"var value = 1\", \"\\\"number\\\"\", \"Number\"],\n        [\"var value = \\\"a\\\"\", \"\\\"string\\\"\", \"String\"],\n        [\"var value = true\", \"\\\"boolean\\\"\", \"Boolean\"],\n        [\"var value = {}\", \"\\\"object\\\"\", \"Object\"],\n        [\"var value = new Object()\", \"\\\"object\\\"\", \"Object\"],\n        [\"var value = []\", \"\\\"object\\\"\", \"Array\"],\n        [\"var value = newArray()\", \"\\\"object\\\"\", \"Array\"],\n        [\"var value = function(){}\", \"\\\"function\\\"\", \"Function\"],\n        [\"function className(){}; \u003cbr\u003evar value = new className();\", \"\\\"object\\\"\", \"className\"],\n    ];\n    _MiMethod.td(\"td_a\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 基础","title":"数据类型"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","基础","数据类型"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
