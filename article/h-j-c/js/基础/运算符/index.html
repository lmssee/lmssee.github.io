    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e概述 \u003c/h5\u003e\n\u003cp\u003eJavaScript 有 51 个运算符 。\n\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003eJavaScript 运算符 \u003c/summary\u003e\n    \u003ctable id=\"this_ul_o\"\u003e\n        \u003ccaption\u003eJavaScript 运算符 \u003c/caption\u003e\n        \u003ctr\u003e\n            \u003cth\u003e运算符 \u003c/th\u003e\n            \u003cth\u003e说明 \u003c/th\u003e\n            \u003cth\u003e优先级 \u003c/th\u003e\n            \u003cth\u003e操作类型 \u003c/th\u003e\n            \u003cth\u003e运算顺序 \u003c/th\u003e\n        \u003c/tr\u003e\n    \u003c/table\u003e\n\u003c/details\u003e\n\u003cp\u003e一般来说 , 运算符与运算数配合才能使用。其中运算符指定执行运算的方式，运算数明确运算符要操作的对象。 \u003c/p\u003e\n\u003cp\u003e根据操作运算数的数量，运算符可以可以分为以下三类。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e一元运算符 \u003c/p\u003e\n\u003cp\u003e1 个运算符只对 1 个运算数进行某种运算，如值取反、位移、获取值类型、删除属性定义。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e二元运算符 \u003c/p\u003e\n\u003cp\u003e1 个运算符必须包含 2 个运算数。例如，相加，比大小 。大部分运算都是对两个运算数执行运算。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e三元运算 \u003c/p\u003e\n\u003cp\u003e1 个运算符必须包含三个运算数。 JavaScript 仅有一个三元运算符（？： 运算符），该运算符就是条件运算符，它是 if 语句的简化版。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ealert(n = 5 - 2 * 2);\u003cspan class=\"r\"\u003e// 返回 1\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ealert(n = (\n        5 - 2 ) * 2);\u003cspan class=\"r\"\u003e// 返回 6\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ealert((n = 5 - 2) * 2);\u003cspan class=\"r\"\u003e//\n            返回 6\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ealert((1 + n = 5 - 2) * 2);\u003cspan class=\"r\"\u003e// 报错 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(typeof typeof 5);\u003cspan class=\"r\"\u003e// 返回 string\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ealert(\"10\" -\n        \"20\");\u003cspan class=\"r\"\u003e// 返回 -10\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ealert(0 ? 1 : 2);\u003cspan class=\"r\"\u003e// 返回\n            2\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ealert(3 \u0026gt; \"5\");\u003cspan class=\"r\"\u003e// 返回 false\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(3 \u0026gt; \"2\");\u003cspan class=\"r\"\u003e// 返回 true\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ealert(\"string\" \u0026gt;\n        5);\u003cspan class=\"r\"\u003e// 返回 false\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ealert(10 + 20);\u003cspan class=\"r\"\u003e// 返回\n            30\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ealert(\"10\" + \"20\");\u003cspan class=\"r\"\u003e// 返回 \"1020\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(true * 5);\u003cspan class=\"r\"\u003e// 返回 5\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e运算符只能在操作特定类型的数据，运算返回的也是特定类型的数据。 \u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e运算符一般不会对运算数本身产生影响，如算术运算符、比较运算符、条件运算符、取逆运算符、位与运算符。 \u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e算数运算符 \u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e加法运算 +\u003c/li\u003e\n    \u003cli\u003e减法运算 -\u003c/li\u003e\n    \u003cli\u003e乘法运算 *\u003c/li\u003e\n    \u003cli\u003e除法运算 /\u003c/li\u003e\n    \u003cli\u003e余数运算 %\u003c/li\u003e\n    \u003cli\u003e取反运算 -\u003c/li\u003e\n    \u003cli\u003e递增 ++\u003c/li\u003e\n    \u003cli\u003e递减 --\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e详细 \u003c/summary\u003e\n    \u003ch6\u003e+\u003c/h6\u003e\n    \u003cp\u003e根据操作数的数据类型，进行判断是相加还是相连操作。 \u003c/p\u003e\n    \u003ctable id=\"this_l_t\" class=\"c\"\u003e\u003c/table\u003e\n    \u003ch6\u003e-\u003c/h6\u003e\n    \u003cp\u003e在减法中，如果数字为字符串，先尝试转化为数值，再进行计算。如果有一个操作值不是数字，则返回 NaN 。 \u003c/p\u003e\n    \u003cp\u003e使用值减去 0 ，可快速转化为数值类型。 \u003c/p\u003e\n    \u003cp\u003e对于布尔值来说， parseFloat() 方法可以将 true 转化为 1 ，把 false 转化为 0 ，二减号将其视为 NaN 。 \u003c/p\u003e\n    \u003ctable id=\"this_l_o\" class=\"c\"\u003e\u003c/table\u003e\n    \u003ch6\u003e*\u003c/h6\u003e\n    \u003ctable class=\"c\" id=\"this_l_th\"\u003e\n        \u003ccaption\u003e特殊转化 \u003c/caption\u003e\n    \u003c/table\u003e\n    \u003ch6\u003e/\u003c/h6\u003e\n    \u003ctable class=\"c\" id=\"this_l_f\"\u003e\n        \u003ccaption\u003e特殊的除法 \u003c/caption\u003e\n    \u003c/table\u003e\n    \u003ch6\u003e%\u003c/h6\u003e\n    \u003ctable class=\"c\" id=\"this_l_fi\"\u003e\n        \u003ccaption\u003e特殊的取余 \u003c/caption\u003e\n    \u003c/table\u003e\n\u003c/details\u003e\n\u003ch5\u003e逻辑运算 \u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e逻辑与 \u0026\u0026\u003c/li\u003e\n    \u003cli\u003e逻辑或 ||\u003c/li\u003e\n    \u003cli\u003e逻辑非 ！ \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e关系运算符 \u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e大小比较\n        \u003cul\u003e\n            \u003cli\u003e\u0026lt;\u003c/li\u003e\n            \u003cli\u003e\u0026gt;\u003c/li\u003e\n            \u003cli\u003e\u0026lt;=\u003c/li\u003e\n            \u003cli\u003e\u0026gt;=\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e包含检测 \u003c/li\u003e\n    \u003cli\u003e等值检测 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003ein\u003c/h6\u003e\n\u003cp\u003e归属检查， in 运算符能够检测左侧的数是否为右边操作数的成员。其中左侧操作数是一个字符串，或是可转化为字符串的表达式 , 右侧是一个对象或数组。 \u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e如果，左侧的操作数不是对象，或右侧不是类型函数，则返回 false ，如果右侧不是 \u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e赋值运算 \u003c/h5\u003e\n\u003cp\u003e赋值时一种运算，但习惯上，把赋值独立成行，故称之为赋值语句。 \u003c/p\u003e\n\u003cp\u003e赋值运算符的左侧运算符必须是变量、对象属性、数组元素。 \u003c/p\u003e\n\u003cp\u003e简单的赋值运算符，就是把右侧的运算数的值直接赋值给左侧的变量。附加的赋值运算符，就是赋值之前还要对右侧的运算数执行某种操作，然后再赋值。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar a; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a = 6 \u0026\u0026 (b = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn a;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e})() \u003c/span\u003e\u003cspan class=\"p2\"\u003e); \u003cspan class=\"r\"\u003e// 返回\n            undefined\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在上例中，逻辑与左侧的运算数是一个赋值表达式，右侧的运算数也是赋值表达式。但是左侧仅是一个简单的数字赋值，而右侧把一个函数的对象赋值给了变量 b 。在逻辑运算中，左侧赋值并没有真正的赋值给变量 a\n    ，当逻辑与运算执行右侧的表达式时，该表达式把一个函数赋值给变量 b ，然后利用小括号运算符调用这个函数，返回变量 a 的值，结果并没有返回变量 a 的值为 6 ，而是 undefined 。 \u003c/p\u003e\n\u003cp\u003e由于赋值运算作为表达式会产生副作用，即它能够改变变量的值，因此在使用时慎重，确保不引发潜在的危险。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar a = 6; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn a\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a \u0026\u0026 b()) \u003cspan class=\"r\"\u003e// 返回\n            6\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e对象操作符运算符 \u003c/h5\u003e\n\u003ch6\u003enew\u003c/h6\u003e\n\u003cp\u003enew 运算符可以构造一个新的对象 , 并初始化该对象。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003enew constructor (arguments);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003econstructor 必须是一个构造函数表达式，其后面跟着利用小括号包含的参数列表，参数可有可无，参数之间通过逗号分开。如函数调用没有参数，可以省略小括号。 \u003c/p\u003e\n\u003cp\u003enew 运算符在被执行时，首先创造一个新对象，接着 new 运算符调用指定的构造函数（类）。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar a = new Array;\u003cspan class=\"r\"\u003e\n            // 创建数组结构的对象，省略小括号 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar b = new Array();\u003cspan class=\"r\"\u003e\n            // 创建数组对象的结构 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar c = new\n        Array(1,2,3);\u003cspan class=\"r\"\u003e// 创建新的数组，并初始化 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(c[2]);\u003cspan class=\"r\"\u003e// 3\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e对于自定义的类，只能够通过 new 运算符进行实例化。 \u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e例 \u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003evar a = function (){\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ethis.x = 1;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ethis.y = 2;\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n        \u003cspan class=\"p\"\u003evar b = new a;\u003c/span\u003e\n        \u003cspan class=\"p\"\u003ealert(b.x);\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e// 返回 1\u003c/span\u003e\n    \u003c/code\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003evar a = function () {\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ethis.x = 1;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ethis.y = 2;\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n        \u003cspan class=\"p\"\u003evar b = a;\u003c/span\u003e\n        \u003cspan class=\"p\"\u003ealert(b.x);\u003cspan class=\"r\"\u003e// 返回\n                undefined\u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003evar a ={\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ex : 1,\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ey : 2\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n        \u003cspan class=\"p\"\u003evar b = a;\u003c/span\u003e\n        \u003cspan class=\"p\"\u003ealert (b.x); \u003cspan class=\"r\"\u003e// 返回\n                1\u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/details\u003e\n\u003ch6\u003edelete \u003c/h6\u003e\n\u003cp\u003edelete 能够删除指定的对象的属性、数组元素、变量。 \u003c/p\u003e\n\u003cp\u003e不是所有的对象成员或变量可以删除，某些内置对象的预定义成员和客户端成员，以及使用 var 语句声明的变量都不可被删除。 \u003c/p\u003e\n\u003cp\u003e在删除不存在的对象成员时，或者非对象成员、数组元素、变量时，也会返回 true ，应与成功删除相区分。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003edelete 只能删除值类型数据 , 不影响变量、属性、数组元素储存的原引用对象 \u003c/li\u003e\n    \u003cli\u003edelete 运算符的删除不是清空值，而是释放空间 \u003c/li\u003e\n    \u003cli\u003eJavaScript 中有内置专门收垃圾的程序，所以不需要手动释放对象所占的空间 \u003c/li\u003e\n    \u003cli\u003e灵活使用 delete 和 in ，可方便的操作对象的检查、删除、更新 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e（）和 . \u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e中括号 不仅能储存数组元素的值，还可以存取对象的属性值 \u003c/li\u003e\n    \u003cli\u003e点号 可存取对象的属性值，比中括号要灵活、方便 \u003c/li\u003e\n    \u003cli\u003e中括号可以通过变量和字符串表达式来传递特定值，而 点号 不可以 \u003c/li\u003e\n    \u003cli\u003e中括号可以对第 2 个元素的值执行运算 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003etypeof\u003c/h5\u003e\n\u003cp\u003etypeof 运算符返回它的操作数当前所容纳的数据的类型，这对于判断一个变量是否已被定义特别有用。 \u003c/p\u003e\n\u003ch5\u003einstanceof 运算符 \u003c/h5\u003e\n\u003cp\u003einstanceof 运算符用来检测表达式是否是指定类的实例。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar myBlog = new String(\"lmssee.cn\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(myBlog instanceof String); \u003cspan class=\"r\"\u003e// 返回 true\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e因为 Object 是一切类的基类，所以，任何对象都是 Object 的实例： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar myBlog = new String(\"lmssee.cn\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(myBlog instanceof Object); // 返回 true\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e全等与逻辑全等 \u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e数字和逻辑值按值进行比较，如果它们具有相同的值，则视为相等 \u003c/li\u003e\n    \u003cli\u003e如果字符串表达式具有相同的字符数，而且这些字符都相同，则这些字符串表达式相等 \u003c/li\u003e\n    \u003cli\u003e表示对象、数组和函数的变量按引用进行比较。如果两个变量引用同一个对象、数组或函数，则它们相等。而两个单独的数组即使具有相同数量的元素，也永远不会被视为相等 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e三元条件运算符 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e(expr1) ? (expr2) : (expr3);\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e逗号运算符 \u003c/h5\u003e\n\u003cp\u003e逗号运算符是二元运算符，它能够先执行运算符左侧的运算数，然后再执行右侧的运算数，最后仅把右侧的运算值作为结果返回。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ea = (b = 1, c = 2);\u003c/span\u003e\u003cspan class=\"p\"\u003ealert(a);\u003cspan class=\"r\"\u003e// 2\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003ealert(b);\u003cspan class=\"r\"\u003e// 1\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(c);\u003cspan class=\"r\"\u003e// 2\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ea = b = 1, c = 2;\u003c/span\u003e\u003cspan class=\"p\"\u003ealert(a);\u003cspan class=\"r\"\u003e// 1\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003ealert(b);\u003cspan class=\"r\"\u003e// 1\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(c);\u003cspan class=\"r\"\u003e// 2\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003evoid 运算符 \u003c/h5\u003e\n\u003cp\u003evoid 运算符计算表达式，然后放弃其值，返回 undefined 。 \u003c/p\u003e\n\u003cp\u003evoid 多用于 URL 中执行 Javascript 表达式，但不需要表达式的计算结果。 \u003c/p\u003e\n\u003ch5\u003e把命令转化为表达式 \u003c/h5\u003e\n\u003cp\u003e表达式运算本质上是值运算，即求值运算。任何复杂的对象（如： object 、 Function 、 Array\n    ）等，从运算的角度来分析，其实就是系统对值的一种理解。由于运算值产生值，因此可以把所有的命令式语句来转化为表达式，并求值。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar i = 1; \u003c/span\u003e\u003cspan class=\"p2\"\u003e(function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.write(i +\n        \"\u0026lt;br\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e(i++ \u0026lt; 100) \u0026\u0026 arguments.callee();\n        \u003cspan class=\"r\"\u003e// 逻辑判断并递归 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e})()\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e使用函数来转换循环结构，会存在内存溢出的风险，这是一种低效策略。由于函数递归运算每次都需要为每次函数调用保留私有空间，因此会耗费大量的系统资源。不过尾递归可以避免此类问题。 \u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e不用循环和分支结构，其它语句也就没有价值，如流程控制的子句 return 和 continue\n    ，以及标签语句等。同时，函数式语言可以不使用寄存器，只需要值声明，而不需要变量声明，所以在函数式语言中，变量声明语句中也是不需要的。总之，在函数式语言中，除了值声明和函数中的返回子句外，其它语句都可以省略。 \u003c/p\u003e\n\u003ch5\u003e表达式中的函数 \u003c/h5\u003e\n\u003cp\u003e在表达式运算中，求值是运算的核心。函数作为表达式中的一个运算元，也具有值的含义。不管函数内部结构多么复杂，最终返回的只是一个值。 \u003c/p\u003e\n\u003cp\u003e应当养成良好的编程习惯，良好的结构和代码组织能够降低代码的复杂度。对于函数式编程来说，实现代码的良好组织，使用函数应该是最有效的方法之一。 \u003c/p\u003e\n\u003cp\u003e对于长表达式，特别是逻辑结构非常明显的表达式，应该对其进行格式化。从语义上分析，函数的调用实际上是表达式求值的过程。从这一点来说，在函数式编程中，函数是一种高效的连续运算的工具。对于循环结构来说，使用函数递归运算会存在很大的系统消耗，但是如果把循环语句封装在函数结构中，然后把函数当成值参与表达式的运算，实际上也是高效实现循环结构表达式。\n\u003c/p\u003e\n\u003ch5\u003e位运算符 \u003c/h5\u003e\n\u003cp\u003e接下来要介绍的操作符用于数值的底层操作，也就是操作内存中表示数据的比特（位）。 ECMAScript 中的所有数值都以 IEEE 754 64 位格式存储，但位操作并不直接应用到 64 位表示，而是先把值转换为 32\n    位整数，再进行位操作，之后再把结果转换为 64 位。对开发者而言，就好像只有 32 位整数一样，因 为 64 位整数存储格式是不可见的。既然知道了这些，就只需要考虑 32 位整数即可。 \u003c/p\u003e\n\u003cp\u003e有符号整数使用 32 位的前 31 位表示整数值。第 32 位表示数值的符号，如 0 表示正， 1 表示负。这 一位称为符号位（ sign bit ），它的值决定了数值其余部分的格式。正值以真正的二进制格式存储，即 31\n    位中的每一位都代表 2 的幂。第一位（称为第 0 位）表示 20 ，第二位表示 21 ，依此类推。\n\u003c/p\u003e\n\u003cp\u003e负值以一种称为二补数（或补码）的二进制编码存储。 \u003c/p\u003e\n\u003cp\u003e一个数值的二补数通过如下 3 个步骤计算 得到： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e确定绝对值的二进制表示 \u003c/li\u003e\n    \u003cli\u003e找到数值的一补数（或反码），换句话说，就是每个 0 都变成 1 ，每个 1 都变成 0\u003c/li\u003e\n    \u003cli\u003e结果加 1\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e按位非 \u003c/h6\u003e\n\u003cp\u003e按位非操作符用波浪符（ ~ ）表示，它的作用是返回数值的一补数。按位非是 ECMAScript 中为数 不多的几个二进制数学操作符之一。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet num1 = 25; \u003cspan class=\"r\"\u003e// 二进制 00000000000000000000000000011001\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet num2 = ~num1; \u003cspan class=\"r\"\u003e// 二进制 11111111111111111111111111100110\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(num2); \u003cspan class=\"r\"\u003e// -26 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这里，按位非操作符作用到了数值 25 ，得到的结果是 26 。由此可以看出，按位非的最终效果是对 数值取反并减 1 ，就像执行如下操作的结果一样： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet num1 = 25; \u003c/span\u003e\u003cspan class=\"p2\"\u003elet num2 = -num1 - 1; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(num2); \u003cspan class=\"r\"\u003e// \"-26\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e实际上，尽管两者返回的结果一样，但位操作的速度快得多。这是因为位操作是在数值的底层表示 上完成的。\n\u003c/p\u003e\n\u003ch6\u003e按位与 \u003c/h6\u003e\n\u003cp\u003e按位与操作符用和号（ \u0026 ）表示，有两个操作数。本质上，按位与就是将两个数的每一个位对齐， 然后基于真值表中的规则，对每一位执行相应的与操作。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet result = 25 \u0026 3; \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(result); \u003cspan class=\"r\"\u003e//\n            1 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e按位或 \u003c/h6\u003e\n\u003cp\u003e按位或操作符用管道符（ | ）表示，同样有两个操作数。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet result = 25 | 3; \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(result); \u003cspan class=\"r\"\u003e//\n            27 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e按位异或 \u003c/h6\u003e\n\u003cp\u003e按位异或用脱字符（ ^ ）表示，同样有两个操作数。按位异或与按位或的区别是，它只在一位上是 1 的时候返回 1 （两位都是 1 或 0 ，则返回 0 ）。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet result = 25 ^ 3; \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(result); \u003cspan class=\"r\"\u003e//\n            26 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e左移 \u003c/h6\u003e\n\u003cp\u003e左移操作符用两个小于号（ \u0026lt;\u0026lt; ）表示，会按照指定的位数将数值的所有位向左移动。比如，如果数 值 2 （二进制 10 ）向左移 5 位，就会得到 64 （二进制 1000000 ）。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet oldValue = 2; \u003cspan class=\"r\"\u003e// 等于二进制 10 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet\n        newValue = oldValue \u0026lt;\u0026lt; 5; \u003cspan class=\"r\"\u003e// 等于二进制 1000000 ，即十进制 64 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e左移会保留它所操作数值的符号。比如，如果 2 左移 5 位，将得到负 64 ，而不是正 64 。 \u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e有符号右移 \u003c/h6\u003e\n\u003cp\u003e有符号右移由两个大于号（ \u0026gt;\u0026gt; ）表示，会将数值的所有 32 位都向右移，同时保留符号（正或负）。 有符号右移实际上是左移的逆运算。比如，如果将 64 右移 5 位，那就是 2 。 \u003c/p\u003e\n\u003ch6\u003e无符号右移 \u003c/h6\u003e\n\u003cp\u003e无符号右移用 3 个大于号表示（ \u0026gt;\u0026gt;\u0026gt; ），会将数值的所有 32 位都向右移。对于正数，无符号右移与 有符号右移结果相同。仍然以前面有符号右移的例子为例， 64 向右移动 5 位，会变成 2 。 \u003c/p\u003e\n\u003cp\u003e但对负数来说，结果就差太多了。无符号右移操作符将负数的二进制表示当成正数的二进制表示来处理。因为负数是其绝对值的二补数，所以右移之后结果变 得非常之大。\n\u003c/p\u003e\n\u003ch5\u003e可选链运算符 \u003c/h5\u003e\n\u003cp\u003e当尝试访问对象属性时，如果对象的值为 undefined 或 null ，那么属性访问将产生错误。为了提高程序的健壮性，在访问对象属性时通常需要检查对象是否已经初始化，只有当对象不为 undefined 和 null\n    时才去访问对象的属性。可选链运算符旨在帮助开发者省去冗长的 undefined 值和 null 值检查代码，增强了代码的表达能力。 \u003c/p\u003e\n\u003ch6\u003e基础语法 \u003c/h6\u003e\n\u003cp\u003e可选链运算符由一个问号和一个点号组成，即“ ?.”。可选链运算符有以下三种语法形式： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e可选的静态属性访问 \u003c/li\u003e\n    \u003cli\u003e可选的计算属性访问 \u003c/li\u003e\n    \u003cli\u003e可选的函数调用或方法调用。 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"p4\"\u003eobj?.prop\u003c/p\u003e\n\u003cp\u003e在该语法中，如果 obj的值为 undefined或 null，那么表达式的求值结果为 undefined；否则，表达式的求值结果为 obj.prop。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003eobj?.[expr]\u003c/p\u003e\n\u003cp\u003e在该语法中，如果 obj的值为 undefined或 null，那么表达式的求值结果为 undefined；否则，表达式的求值结果为 obj[expr]。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003efn?.()\u003c/p\u003e\n\u003cp\u003e在该语法中，如果 fn的值为 undefined或 null，那么表达式的求值结果为 undefined；否则，表达式的求值结果为 fn()。 \u003c/p\u003e\n\u003ch6\u003e短路求值 \u003c/h6\u003e\n\u003cp\u003e如果可选链运算符左侧操作数的求值结果为 undefined或 null，那么右侧的操作数不会再被求值，我们将这种行为称作短路求值。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet x = 0; \u003c/span\u003e\u003cspan class=\"p2\"\u003elet a = undefined; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea ?\n        .[++x]; \u003cspan class=\"r\"\u003e // undefined \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003ex; \u003cspan class=\"r\"\u003e // 0\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e空值合并运算符 \u003c/h5\u003e\n\u003cp\u003e空值合并运算符是一个新的二元逻辑运算符，它使用两个问号“ ??”作为标识。空值合并运算符的语法如下所示： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ea ?? b\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e该语法中，当且仅当“ ??”运算符左侧操作数 a的值为 undefined或 null时，返回右侧操作数 b；否则，返回左侧操作数 a。 \u003c/p\u003e\n\u003cp\u003e空值合并运算符与可选链运算符一样都具有短路求值的特性。当空值合并运算符左侧操作数的值不为 undefined和 null时，右侧操作数不会被求值，而是直接返回左侧操作数。 \u003c/p\u003e\n\n\u003cscript\u003e\n    var ltr = \" 从左到右  \";\n    var rtl = \" 从右到左  \";\n    var sz = \" 数字  \";\n    var zs = \" 整数  \";\n    var ry = \" 任意  \";\n    var ll = \" 变量、对象的属性、数组的元素  \";\n    var this_ul_o = [\n        [\"\\. ( 点号  )\", \" 读写对象的属性  \", 15, \" 对象  . 标识符  \", ltr],\n        [\"[] ( 中括号  )\", \" 数组下标  \", 15, \" 数组  [ 整数  ]\", ltr],\n        [\"() ( 小括号  )\", \" 调用函数  \", 15, \" 函数  ( 参数  )\", ltr],\n        [\"new\", \" 创建新对象  \", \"15\", \" 构造函数调用  \", rtl],\n        [\"++ ( 连加  )\", \" 先递增或后递增  \", 14, ll, rtl],\n        [\"-- ( 连减  )\", \" 先递减或后递减运算  \", 14, ll, rtl],\n        [\"- ( 减号  )\", \" 一元减法运算  (  或取负、取反  )\", 14, sz, rtl],\n        [\"+ ( 加号  )\", \" 一元加法运算  \", 14, sz, rtl],\n        [\"~ ( 否定号  )\", \" 按位取反操作  \", 14, \" 整数  \", rtl],\n        [\"\\! ( 叹号  )\", \" 逻辑取反操作  \", 14, \" 布尔值  \", rtl],\n        [\"delete\", \" 删除对象的一个自定义属性  \", 14, ll, rtl],\n        [\"typeof\", \" 返回数据类型  \", 14, ry, rtl],\n        [\"\\void\", \" 返回未定义的值  \", 14, ry, rtl],\n        [\"\\* ( 星号  )\", \" 乘法运算  \", 13, sz, ltr],\n        ['\\*\\*', ' 指数运算符  ', 13, sz, ltr],\n        [\"\\/ ( 斜杠  )\", \" 除法运算  \", 13, sz, ltr],\n        [\"\\% ( 百分号  )\", \" 取余  \", 13, sz, ltr],\n        [\"\\+ ( 加号  )\", \" 加法运算  \", 12, sz, ltr],\n        [\"\\- ( 减号  )\", \" 减法运算  \", 12, sz, ltr],\n        [\"+ ( 加号  )\", \" 连接字符串操作  \", 12, \" 字符串  \", ltr],\n        [\"\u003c\u003c\", \" 左移  \", 11, zs, ltr],\n        [\"\u003e\u003e\", \" 带符号右移  \", 11, zs, ltr],\n        [\"\u003c\u003c\", \" 不带符号右移  \", 11, zs, ltr],\n        [\"\u003c\", \" 小于  \", 10, sz + \" 、字符串  \", ltr],\n        [\"\u003c=\", \" 小于等于  \", 10, sz + \" 、字符串  \", ltr],\n        [\"\u003e\", \" 大于  \", 10, sz + \" 、字符串  \", ltr],\n        [\"\u003e=\", \" 大于等于  \", 10, \" 数字、字符串  \", ltr],\n        [\"instanceof\", \" 检查对象类型  \", 10, \" 对象  构造函数  \", ltr],\n        [\"in\", \" 检查一个属性是否存在  \", 10, \" 字符串  in 对象  \", ltr],\n        [\"==\", \" 比较是否相等  \", 9, ry, ltr],\n        [\"!=\", \" 比较是否不相等  \", 9, ry, ltr],\n        [\"===\", \" 比较是否等同  ( 同值同类  )\", 9, ry, ltr],\n        [\"!==\", \" 比较是否不全等  ( 不同值同类  )\", 9, ry, ltr],\n        [\"\u0026 ( 连字符  )\", \" 按位与操作  \", 8, zs, ltr],\n        [\"^ ( 顶角符号  )\", \" 按位异或操作  \", 7, zs, ltr],\n        [\"| ( 竖线符号  )\", \" 按位或操作  \", 6, zs, ltr],\n        [\"\u0026\u0026\", \" 逻辑与操作  \", 5, zs, ltr],\n        [\"||\", \" 逻辑或操作  \", 4, zs, ltr],\n        [\"?:\", \" 条件运算符  ( 包含三个运算数  )\", 3, \" 布尔值  ?  任意  : 任意  ;\", rtl],\n        [\"= ( 等号  )\", \" 赋值运算  \", 2, ll + \"=  任意  \", rtl],\n        [\"*=\", \" 附带乘法操作的赋值运算  \", 2, ll + \" *=  任意  \", rtl],\n        [\"/=\", \" 附带除法操作的赋值运算  \", 2, ll + \" /=  任意  \", rtl],\n        [\"%=\", \" 附带取余的赋值操作  \", 2, ll + \" %=  任意  \", rtl],\n        [\"+=\", \" 附带加法的赋值操作  \", 2, ll + \" +=  任意  \", rtl],\n        [\"-=\", \" 附带减法的赋值操作  \", 2, ll + \" -=  任意  \", rtl],\n        [\"\u003c\u003c=\", \" 附带左移操作的赋值操作  \", 2, ll + \" \u003c\u003c=  任意  \", rtl],\n        [\"\u003e\u003e=\", \" 附带带符号的右移操作的赋值操作  \", 2, ll + \" \u003e\u003e=  任意  \", rtl],\n        [\"\u003e\u003e\u003e=\", \" 附带不带符号的右移操作的赋值操作  \", 2, ll + \" \u003e\u003e\u003e=  任意  \", rtl],\n        [\"\u0026=\", \" 附带按位与操作的赋值操作  \", 2, ll + \" \u0026=  任意  \", rtl],\n        [\"^=\", \" 附带按位与操作的赋值操作  \", 2, ll + \" ^=  任意  \", rtl],\n        [\"|=\", \" 附带按位或操作的赋值操作  \", 2, ll + \" |=  任意  \", rtl],\n        [\". ( 逗号  )\", \" 多重计算操作  \", 1, ry, ltr]\n    ];\n    _MiMethod.td(\"this_ul_o\");\n    var this_l_t = [\n        [\"NaN + 5\", \"NaN\"],\n        [\"Infinity + Infinity\", \"Infinity\"],\n        [\"Infinity + 5\", \"Infinity\"],\n        [\"-Infinity + -Infinity\", \"-Infinity\"],\n        [\"-Infinity + Infinity\", \"NaN\"],\n        [\"1 + 1\", \"2\"],\n        [\"1 + \\\"1\\\"\", \"\\\"11\\\"\"],\n        [\"\\\"1\\\" + \\\"1\\\"\", \"\\\"11\\\"\"],\n        [\"3.0 + 4.3 +\\\"\\\"\", 3.0 + 4.3 + \"\"],\n        [\"3.0 + \\\"\\\" + 4.3\", 3.0 + \"\" + 4.3]\n    ];\n    _MiMethod.td(\"this_l_t\");\n    var this_l_o = [\n        [\"NaN - 5\", NaN - 5],\n        [\"Infinity - 5\", Infinity - 5],\n        [\"Infinity - Infinity\", Infinity - Infinity],\n        [\"-Infinity - -Infinity\", -Infinity - -Infinity],\n        [\"-Infinity -Infinity\", -Infinity - Infinity],\n        [\"2 - \\\"1\\\"\", 2 - \"1\"],\n        [\"2 - \\\"a\\\"\", 2 - \"a\"]\n    ];\n    _MiMethod.td(\"this_l_o\");\n    var this_l_th = [\n        [\"value\", \"n\"],\n        [\"NaN * n\", \"NaN\"],\n        [\"Infinity * n\", \"Infinity\"],\n        [\"infinity*(-n)\", \"-Infinity\"],\n        [\"infinity*0\", \"NaN\"],\n        [\"Infinity*Infinity\", \"infinity\"]\n    ];\n    _MiMethod.td(\"this_l_th\");\n    var this_l_fi = [\n        [\"value\", \"n\"],\n        [\"infinity % n\", \"NaN\"],\n        [\"infinity % infinity\", \"NaN\"],\n        [\"n % infinity\", \"n\"],\n        [\"0 % n\", \"0\"],\n        [\"0 % infinity\", \"0\"],\n        [\"n % 0\", \"NaN\"],\n        [\"infinity % 0\", \"NaN\"]\n    ];\n    _MiMethod.td(\"this_l_fi\");\n    var this_l_f = [\n        [\"value\", \"n\"],\n        [\"NaN / n\", \"NaN\"],\n        [\"infinity / n\", \"Infinity || -Infinity\"],\n        [\"infinity / Infinity\", \"NaN\"],\n        [\"n / 0\", \"infinity || -Infinity\"],\n        [\"n / -0\", \"-Infinity || infinity\"]\n    ];\n    _MiMethod.td(\"this_l_f\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 基础","title":"运算符"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","基础","运算符"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
