class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>css</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e每个 DOM 节点都有一个 style 属性，这个属性本身也是个对象，包含了应用于节点的 CSS 样式信息。 \u003c/p\u003e\n\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e遗憾的是，虽然这种方式在用于内联样式时很正常，但如果是在页面 \u0026lt;head\u0026gt; 部分里使用 \u0026lt;style\u0026gt; 元素，或是使用外部样式表来设置页面元素的样式， DOM 的 style\n        对象就不能访问它们了 \u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e\u003csmall\u003eCSS 的很多属性名称包含连字符，比如 background-color 、 font-size 、 text-align 等。但 JavaScript\n        不允许在属性或方法名称里使用连字符，因此需要调整这些名称的书写方式。方法是删除其中的连字符，并且把连字符后面的字母大写，于是 font-size 变成 fontSize ， text-align 变成\n        textAlign ，以此类推 \u003c/small\u003e。 \u003c/p\u003e\n\u003ch5\u003e用 className 访问类 \u003c/h5\u003e\n\u003cp\u003e利用元素的 className 属性，可以通过修改 class 属性的值来调整应用于元素的样式。 \u003c/p\u003e\n\u003ch5\u003eDOM 的 styleSheets 对象 \u003c/h5\u003e\n\u003cp\u003edocument 对象的 styleSheets 属性是一个数组，包含了页面上全部样式表（无论样式表是包含在外部文件中，还是在页面 \u0026lt;head\u0026gt; 部分里用 \u0026lt;style\u0026gt; 和\n    \u0026lt;/style\u0026gt; 标签声明）。 styleSheets 数组里的项目以数值索引，第一个出现的样式表索引为 0 。 \u003c/p\u003e\n\u003cp\u003e启用、禁用和切换样式表\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e数组里的每个样式表都有一个属性 disabled ，其值为布尔值 true 或 false 。它是可读写的，可以在 JavaScript 里方便地启用或禁用某个样式表 \u003c/li\u003e\n    \u003cli\u003e虽然样式表具有数值索引，但并不便于进行选择。如果给样式表设置标题，并且编写一个函数，根据 title 属性进行选择，就会容易得多 \u003c/li\u003e\n    \u003cli\u003e\u003c/li\u003e\n    \u003cli\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003egetComputedStyle()\u003c/h5\u003e\n\u003cp\u003e目前，几乎所有浏览器都支持 DOM getComputedStyle()\n    方法。该方法可以访问一个元素的最终（也就是计算后的）样式。最终样式，指的是浏览器（以适当的顺序）应用了与该元素相关的所有样式规则之后，最终显示该元素的样式。 \u003c/p\u003e\n\u003cp\u003egetComputedStyle() 方法返回一个对象，该对象有各种方法，包括 getPropertyValue(property) ——该方法返回给定的 CSS 属性名称的当前值。 \u003c/p\u003e\n\u003ch5\u003e大小 \u003c/h5\u003e\n\u003ch6\u003e使用 offsetWidth 和 offsetHeight\u003c/h6\u003e\n\u003cp\u003e使用 offsetWidth 和 offsetHeight 两个属性可以获取元素的尺寸，其中 offsetWidth 标识元素在页面的总宽度， offsetHeight 表示元素在页面的总高度。 \u003c/p\u003e\n\u003ch6\u003escrollLeft 和 scrollTop\u003c/h6\u003e\n\u003cp\u003e使用 scrollLeft 和 scrollTop 可以读写移除可视区域外面的宽度和高度。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003escrollLeft : 读写元素左侧已滚动的距离，即位于元素左侧边界与元素当前可见区域最左侧的距离 \u003c/li\u003e\n    \u003cli\u003escrollTop : 读写元素顶部已滚动的距离，即位于元素顶部边界与元素当前可见区域最顶部的距离 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e使用这两个属性可读写滚动条的位置，或者获取滚动区域外的尺寸。 \u003c/p\u003e\n\u003ch6\u003e获取元素大小 \u003c/h6\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e与尺寸元素相关的属性 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"20%\"\u003e元素尺寸属性 \u003c/th\u003e\n        \u003cth\u003e说 \u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eclientWidth\u003c/td\u003e\n        \u003ctd\u003e获取元素的可视部分的宽度，即 CSS 的 width 和 padding 属性值之和，元素边框和滚动条不包括在内，也不包括任何可能的滚动区域 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eclientHeight\u003c/td\u003e\n        \u003ctd\u003e获取元素的可视部分的高度，即 CSS 的 height 和 padding 属性值之和，元素边框和滚动条不包括在内，也不包括任何可能的滚动区域 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eoffsetWidth\u003c/td\u003e\n        \u003ctd\u003e元素在页面中占据的宽度的总和，包括 width 、 padding 、 border 以及滚动条的宽度 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eoffsetHeight\u003c/td\u003e\n        \u003ctd\u003e元素在页面中占据的高度的总和，包括 height 、 padding 、 border 以及滚动条的高度 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003escrollWidth\u003c/td\u003e\n        \u003ctd\u003e当元素设置了 overflow ： visible 样式属性时，元素的总宽度，也称滚动宽度。在默认状态下，如果该元素值大于 clientWidth 属性值，则元素会显示滚动条，以便能够翻阅被隐藏的区域\n        \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003escrollHeight\u003c/td\u003e\n        \u003ctd\u003e当元素设置了 overflow ： visible 样式属性时，元素的总高度，也称滚动高度。在默认状态下，如果该元素值大于 clientHeight 属性值，则元素会显示滚动条，以便能够翻阅被隐藏的区域\n        \u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cul\u003e\n    \u003cli\u003e\u003cmark\u003eclientHeight\u003c/mark\u003e= \u003cmark\u003epadding-top\u003c/mark\u003e+ \u003cmark\u003eheight\u003c/mark\u003e+ \u003cmark\u003eborder-bottom-width\u003c/mark\u003e-\n        \u003cmark\u003e滚动条的宽度 \u003c/mark\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\u003cmark\u003eoffsetHeight\u003c/mark\u003e= \u003cmark\u003eborder-top-width\u003c/mark\u003e+ \u003cmark\u003epadding-top\u003c/mark\u003e+ \u003cmark\u003eheight\u003c/mark\u003e+\n        \u003cmark\u003epadding-bottom\u003c/mark\u003e+ \u003cmark\u003eborder-bottom-width\u003c/mark\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\u003cmark\u003escrollHeight\u003c/mark\u003e= \u003cmark\u003epadding-top\u003c/mark\u003e+ \u003cmark\u003e包含内容的完全高度 \u003c/mark\u003e+ \u003cmark\u003epadding-bottom\u003c/mark\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e获取窗口大小 \u003c/h6\u003e\n\u003cp\u003e获取 \u0026lt;html\u0026gt; 标签的 clientWidth 和 clientHeight 属性，既可以知道浏览器窗口的可视宽度和高度，而 \u0026lt;html\u0026gt; 标签在脚本中表示为\n    document.documentElement 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar w = document.documentElement.clientWidth;\u003c/span\u003e\u003cspan class=\"p\"\u003evar h =\n        document.document.clientHeight;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在怪异模式下， body 是最顶成的可视元素，而 html 元素保持隐藏。只有通过 \u0026lt;body\u0026gt; 标签的 clientWidth 和 clientHeight 属性才可以知道浏览器窗口的可视宽度和高度，而\n    \u0026lt;body\u0026gt; 标签在脚本中表示为 document.body 。 \u003c/p\u003e\n\u003ch5\u003e位置 \u003c/h5\u003e\n\u003ch6\u003e使用 offsetLeft 和 offsetTop\u003c/h6\u003e\n\u003cp\u003eoffsetLeft 和 offsetTop 属性返回当前元素的偏移位置， IE 的怪异模式以父元素为参照物进行偏移的位置， DOM 标准模式以最近定位元素为参照进行偏移的位置。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;style type=\"text/css\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003ediv {\u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth:\n        200px;\u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 100px;\u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: solid 1px\n        red;\u003c/span\u003e\u003cspan class=\"p4\"\u003epadding: 50px;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e#wrap {\u003c/span\u003e\u003cspan class=\"p4\"\u003eposition:\n        relative;\u003c/span\u003e\u003cspan class=\"p4\"\u003eborder-width: 20px;\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/style\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div\n        id=\"wrap\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div id=\"sub\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;div\n        id=\"box\"\u0026gt;\u0026lt;/div\u0026gt;\u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/div\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar box = document.getElementById(\"box\");\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econsole.log(box.offsetLeft);\u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(box.offsetParent.id);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e使用 offsetParent\u003c/h6\u003e\n\u003cp\u003eoffsetParent 属性表示最近的上级定位的元素。要获取相对相应的父级元素的位置，可以先判断 offsetParent 属性是否指向父元素，如果是，则直接使用 offsetLeft 和 offsetTop\n    属性获取元素相对于父元素的距离，否则分别获取当前元素和父元素距离窗口的坐标，然后求差 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 基础","title":"css"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","基础","css"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
