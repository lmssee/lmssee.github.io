    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003ewindow 对象包括 4 个定时器专用方法。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003esetInterval() 按照指定的周期（以毫秒计）来调用或计算表达式 \u003c/li\u003e\n    \u003cli\u003esetTimeout() 在指定的毫秒数后调用函数或计算表达式 \u003c/li\u003e\n    \u003cli\u003eclearInterval() 取消由 setInterval() 设置的定时器对象 \u003c/li\u003e\n    \u003cli\u003eclearTimeout() 取消由 setTimeout() 设置的定时器对象 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003esetTimeout()\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003esetTimeout(code,delay);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 code 表示延迟执行的代码字符串，该字符串可以在 window 下可以执行，若包含多个语句，应该用分号隔开。 delay 表示延迟的时间，以毫秒计。该方法返回值为一个 Time Id ，该 ID\n    编号指向延迟的代码控制句柄。该句柄可传递给 clearTimeout() 方法，则会取消延迟执行。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt; 段落文本 \u0026lt;/p\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p =\n        document.getElementsByTagName(\"p\")[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003ep.onmouseover = function(i) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003esetTimeout(function() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ealert(p.tagName); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}), 500 \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003esetTimeout() 第一个参数时字符串，但是我们也可以将 JavaScript 代码封装在一个函数体内，然后把函数作为参数引用给 setTimeout() 方法，等待延迟调用，这样就避免了字符串的疏忽和麻烦。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt; 段落文本 \u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;ul\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;li\u0026gt;1\u0026lt;/li\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;li\u0026gt;3\u0026lt;/li\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;li\u0026gt;2\u0026lt;/li\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/ul\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;span\u0026gt;123\u0026lt;/span\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;p\u0026gt;123\u0026lt;/p\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar o =\n        document.getElementsByTagName(\"body\")[0].childNodes; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efor (var i = 0; i \u0026lt; o.length; i++) { \u003cspan class=\"r\"\u003e// 遍历元素集合 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eo[i].onmouseover = function(i) { \u003cspan class=\"r\"\u003e// 注册鼠标经过事件的处理函数 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ereturn function() { \u003cspan class=\"r\"\u003e// 返回闭包函数 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ef(o[i]) \u003cspan class=\"r\"\u003e// 调用函数 f ，并传递当前对象的引用 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e}(i) \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction f(o) { \u003cspan class=\"r\"\u003e//\n            延迟处理函数 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar out = setTimeout(function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log(o.tagName) \u003cspan class=\"r\"\u003e//\n            显示当前元素的名称 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e}, 500); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n        \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003esetTimeout() 只执行一次。若要执行多次，则需要调用自己。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;input type=\"text\"\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar t =\n        document.getElementsByTagName(\"input\")[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar i = 0; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        f() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar out = setTimeout( \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003efunction() { \u003c/span\u003e\u003cspan class=\"p8\"\u003et.value = i++; \u003c/span\u003e\u003cspan class=\"p8\"\u003ef() \u003cspan class=\"r\"\u003e//\n            调用包含 setTimeout() 的方法的函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e}, 1000 \u003cspan class=\"r\"\u003e//\n            设置每秒执行一次 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (i \u0026gt; 10) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eclearTimeout(out); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ef() \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003esetInterval() 方法 \u003c/h5\u003e\n\u003cp\u003e使用 setInterval 可以循环执行指定代码。 \u003cbr\u003esetInterval(code , interval) 。 \u003cbr\u003e该方法同样返回一个 ID ，供 clearInterval() 使用。 \u003c/p\u003e\n\u003cp\u003esetInterval() 方法的第一个参数是一个函数时，则 setInterval() 方法接受多个参数，这些参数将做个该函数的参数使用。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar o = setInterval(function,interval[,arg1,arg2,...argn]);\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e使用 setInterval() 和 clearInterval() 方法实现间隔调用 \u003c/h5\u003e\n\u003cp\u003e如果需要停止，可以调用 clearInterval() 方法取消。这两个方法一般配合使用，它们的语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar intervalID = window.setInterval(func [,delay [,arguments … ]]);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewindow.clearInterval(intervalID);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e参数说明： \u003c/p\u003e\n\u003cp\u003e参数 func 是要执行的函数的名称。该参数不要包括引号或圆括号，并且不要指定要调用的函数的参数， \u003cmark\u003e仅仅是函数名 \u003c/mark\u003e。例如下面的应用，每 5 秒钟就调用一次函数 someFunction ： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.setInterval(someFunction, 5000);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e而不是： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.setInterval( \" someFunction \" , 5000);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e但是可以这样使用（引号或圆括号都包含）： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.setInterval( \" someFunction() \" , 5000);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e\u003cmark\u003e不过这种方式不是很标准，所以不推荐使用 \u003c/mark\u003e。 \u003c/p\u003e\n\u003cp\u003e参数 delay 指要调用的事件间隔，以毫秒为单位。可选，默认值为 1000 。 \u003c/p\u003e\n\u003cp\u003e参数 arguments …可选，用于定义要传递给函数的参数，可以是任意数量的参数。 \u003c/p\u003e\n\u003cp\u003e如果打算使用 clearInterval() 方法取消 setInterval 调用，就必须将 setInterval 调用赋给一个变量， clearInterval() 方法稍后将引用该变量，清除间隔调用。 \u003c/p\u003e\n\u003ch5\u003e使用 setTimeout() 和 clearTimeout() 方法实现延迟调用 \u003c/h5\u003e\n\u003cp\u003esetTimeout() 和 clearTimeout() 方法配合使用可以完成延迟调用，它们是指在指定的延迟（以毫秒为单位）后运行指定的函数，而不会重复执行。其语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar iTimerID = setTimeout(func [,delay [,arguments … ]]);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewindow.clearTimeout(iTimerID);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e例如下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction myFunction(){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar newDate = new Date();\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(newDate.getMilliseconds()); \u003cspan class=\"r\"\u003e// 获取当前毫秒数 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar iTimeId = setTimeout(myFunction, 1000);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar myDate = new Date();\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(myDate.getMilliseconds()); \u003cspan class=\"r\"\u003e// 获取当前毫秒数 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上述代码设置 myFunction 延迟 1000 毫秒执行，那么 document.write() 方法将先于 window.alert() 方法执行，虽然前者位于程序中较后的位置。 \u003c/p\u003e\n\u003ch5\u003e强制清除 \u003c/h5\u003e\n\u003cp\u003e目前没有一个内建的方法可以将所有 setInterval() 或 setTimeout() 方法一次性清除，因此要清除所有的 setInterval() 或 setTimeout()\n    方法，就必须使用一个循环语句进行强制清除。例如下面的代码强制清除所有 setTimeout() 方法： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efor(var i = 1; i \u0026lt; 1000; i++) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eclearTimeout(i);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 基础","title":"定时器"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","基础","定时器"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
