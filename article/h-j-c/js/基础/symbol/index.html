    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eSymbol 类型 \u003c/h5\u003e\n\u003cp\u003eSymbol （符号）是 ECMAScript 6 新增的数据类型。符号是原始值，且符号实例是唯一、不可变的。 符号的用途是确保对象属性使用唯一标识符，不会发生属性冲突的危险\n\u003c/p\u003e\n\u003cp\u003e调用 Symbol() 函数时，可以传入一个字符串参数作为对符号的描述（ description ），将来可以通 过这个字符串来调试代码。但是，这个字符串参数与符号定义或标识完全无关：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet genericSymbol = Symbol(); \u003c/span\u003e\u003cspan class=\"p2\"\u003elet otherGenericSymbol =\n        Symbol(); \u003c/span\u003e\u003cspan class=\"p2\"\u003elet fooSymbol = Symbol('foo'); \u003c/span\u003e\u003cspan class=\"p2\"\u003elet otherFooSymbol\n        = Symbol('foo'); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(genericSymbol == otherGenericSymbol); \u003cspan class=\"r\"\u003e//\n            false \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(fooSymbol == otherFooSymbol); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e符号没有字面量语法，这也是它们发挥作用的关键。按照规范，你只要创建 Symbol() 实例并将其 用作对象的新属性，就可以保证它不会覆盖已有的对象属性，无论是符号属性还是字符串属性。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet genericSymbol = Symbol(); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(genericSymbol);\n        \u003cspan class=\"r\"\u003e// Symbol() \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet fooSymbol = Symbol('foo'); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(fooSymbol); \u003cspan class=\"r\"\u003e// Symbol(foo); \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e最重要的是， Symbol() 函数不能与 new 关键字一起作为构造函数使用。这样做是为了避免创建符 号包装对象，像使用 Boolean 、 String 或 Number 那样，它们都支持构造函数且可用于初始化包含原\n    始值的包装对象：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet myBoolean = new Boolean(); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(typeof\n        myBoolean); \u003cspan class=\"r\"\u003e// \"object\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet myString = new String();\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(typeof myString); \u003cspan class=\"r\"\u003e// \"object\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003elet myNumber = new Number(); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(typeof myNumber); \u003cspan\n            class=\"r\"\u003e// \"object\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet mySymbol = new Symbol(); \u003cspan class=\"r\"\u003e//\n            TypeError: Symbol is not a constructor \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eSymbol.for() 对每个字符串键都执行幂等操作。第一次使用某个字符串调用时，它会检查全局运 行时注册表，发现不存在对应的符号，于是就会生成一个新符号实例并添加到注册表中。后续使用相同\n    字符串的调用同样会检查注册表，发现存在与该字符串对应的符号，然后就会返回该符号实例。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet fooGlobalSymbol = Symbol.for('foo'); \u003cspan class=\"r\"\u003e// 创建新符号\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet otherFooGlobalSymbol = Symbol.for('foo'); \u003cspan class=\"r\"\u003e// 重用已有符号\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(fooGlobalSymbol === otherFooGlobalSymbol); \u003cspan class=\"r\"\u003e//\n            true \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e可以使用 Symbol.keyFor() 来查询全局注册表，这个方法接收符号，返回该全局符号对应的字 符串键。如果查询的不是全局符号，则返回 undefined 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 创建全局符号 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet s = Symbol.for('foo');\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(Symbol.keyFor(s)); \u003cspan class=\"r\"\u003e// foo \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan\n            class=\"r\"\u003e// 创建普通符号 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003elet s2 = Symbol('bar'); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(Symbol.keyFor(s2)); \u003cspan class=\"r\"\u003e//\n            undefined \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e/* 如果传给 Symbol.keyFor() 的不是符号，则该方法抛出 TypeError ：\n        */ \u003c/span\u003e\u003cspan class=\"p2\"\u003eSymbol.keyFor(123); \u003cspan class=\"r\"\u003e// TypeError: 123 is not a sy \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e使用符号作为属性 \u003c/h6\u003e\n\u003cp\u003e凡是可以使用字符串或数值作为属性的地方，都可以使用符号。这就包括了对象字面量属性和 Object.defineProperty()/Object.defineProperties() 定义的属性。对象字面量只能在计算属\n    性语法中使用符号作为属性。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet s1 = Symbol('foo'), \u003c/span\u003e\u003cspan class=\"p4\"\u003es2 = Symbol('bar'), \u003c/span\u003e\u003cspan class=\"p4\"\u003es3 =\n        Symbol('baz'), \u003c/span\u003e\u003cspan class=\"p4\"\u003es4 = Symbol('qux'); \u003c/span\u003e\u003cspan class=\"p2\"\u003elet o = {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e[s1]: 'foo val' \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 这样也可以： o[s1] = 'foo val';\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(o); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// {Symbol(foo): foo val}\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eObject.defineProperty(o, s2, { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evalue: 'bar val' \u003c/span\u003e\u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(o);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// {Symbol(foo): foo val, Symbol(bar): bar val} \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eObject.defineProperties(o, { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e[s3]: { \u003c/span\u003e\u003cspan class=\"p6\"\u003evalue: 'baz val' \u003c/span\u003e\u003cspan class=\"p4\"\u003e}, \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e[s4]: { \u003c/span\u003e\u003cspan class=\"p6\"\u003evalue: 'qux val' \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(o); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// {Symbol(foo): foo val, Symbol(bar): bar val, \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// Symbol(baz): baz val, Symbol(qux): qux val} \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e类似于 Object.getOwnPropertyNames() 返回对象实例的常规属性数组， Object.getOwnProperty\u0002Symbols() 返回对象实例的符号属性数组。这两个方法的返回值彼此互斥。\n    Object.getOwnProperty\u0002Descriptors() 会返回同时包含常规和符号属性描述符的对象。 Reflect.ownKeys() 会返回两种类型 的键：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet s1 = Symbol('foo'), \u003c/span\u003e\u003cspan class=\"p4\"\u003es2 = Symbol('bar'); \u003c/span\u003e\u003cspan class=\"p2\"\u003elet o =\n        { \u003c/span\u003e\u003cspan class=\"p4\"\u003e[s1]: 'foo val', \u003c/span\u003e\u003cspan class=\"p4\"\u003e[s2]: 'bar val',\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ebaz: 'baz val', \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003equx: 'qux val' \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(Object.getOwnPropertySymbols(o)); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            [Symbol(foo), Symbol(bar)] \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(Object.getOwnPropertyNames(o));\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// [\"baz\", \"qux\"] \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(Object.getOwnPropertyDescriptors(o)); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            {baz: {...}, qux: {...}, Symbol(foo): {...}, Symbol(bar): {...}} \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(Reflect.ownKeys(o)); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// [\"baz\", \"qux\",\n            Symbol(foo), Symbol(bar)] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e常用内置符号 \u003c/h6\u003e\n\u003cp\u003eECMAScript 6 也引入了一批常用内置符号（ well-known symbol ），用于暴露语言内部行为，开发者 可以直接访问、重写或模拟这些行为。这些内置符号都以 Symbol 工厂函数字符串属性的形式存在。\n    这些内置符号最重要的用途之一是重新定义它们，从而改变原生结构的行为。比如，我们知道 for-of 循环会在相关对象上使用 Symbol.iterator 属性，那么就可以通过在自定义对象上重新定义\n    Symbol.iterator 的值，来改变 for-of 在迭代该对象时的行为。\n\u003c/p\u003e\n\u003cp\u003e这些内置符号也没有什么特别之处，它们就是全局函数 Symbol 的普通字符串属性，指向一个符号 的实例。所有内置符号属性都是不可写、不可枚举、不可配置的。\n\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e在提到 ECMAScript 规范时，经常会引用符号在规范中的名称，前缀为 @@ 。比如， @@iterator 指的就是 Symbol.iterator\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003eSymbol.asyncIterator\u003c/h6\u003e\n\u003cp\u003e根据 ECMAScript 规范，这个符号作为一个属性表示 \"一个方法，该方法返回对象默认的 AsyncIterator 。 由 for-await-of 语句使用 \"。换句话说，这个符号表示实现异步迭代器 API 的函数。\n\u003c/p\u003e\n\u003cp\u003efor-await-of 循环会利用这个函数执行异步迭代操作。循环时，它们会调用以 Symbol.asyncIterator 为键的函数，并期望这个函数会返回一个实现迭代器 API 的对象。很多时候，返回的对象是实现该 API\n    的 AsyncGenerator 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eclass Foo { \u003c/span\u003e\u003cspan class=\"p4\"\u003easync * [Symbol.asyncIterator]() {} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003elet f = new Foo(); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(f[Symbol.asyncIterator]());\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// AsyncGenerator\n            {\u0026lt;suspended\u0026gt;} \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e技术上，这个由 Symbol.asyncIterator 函数生成的对象应该通过其 next() 方法陆续返回 Promise 实例。可以通过显式地调用 next() 方法返回，也可以隐式地通过异步生成器函数返回。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eclass Emitter { \u003c/span\u003e\u003cspan class=\"p4\"\u003econstructor(max) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.max = max;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.asyncIdx = 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003easync *\n        [Symbol.asyncIterator]() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ewhile (this.asyncIdx \u0026lt; this.max) { \u003c/span\u003e\u003cspan class=\"p8\"\u003eyield new Promise((resolve) =\u0026gt;\n        resolve(this.asyncIdx++)); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003easync function asyncCount() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003elet emitter = new Emitter(5); \u003c/span\u003e\u003cspan class=\"p4\"\u003efor await (const x of emitter) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log(x); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003easyncCount(); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 0 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 2 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 3 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 4 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eSymbol.asyncIterator 是 ES2018 规范定义的，因此只有版本非常新的浏览器 支持它。 \u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003eSymbol.hasInstance\u003c/h6\u003e\n\u003cp\u003e根据 ECMAScript 规范，这个符号作为一个属性表示 \"一个方法，该方法决定一个构造器对象是否认可一个对象是它的实例。由 instanceof 操作符使用 \"。 instanceof 操作符可以用来确定一个对象\n    实例的原型链上是否有原型。\n\u003c/p\u003e\n\u003cp\u003eES6 中， instanceof 操作符会使用 Symbol.hasInstance 函数来确定关系。以 Symbol. hasInstance 为键的函数会执行同样的操作，只是操作数对调了一下。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction Foo() {} \u003c/span\u003e\u003cspan class=\"p2\"\u003elet f = new Foo(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(Foo[Symbol.hasInstance](f)); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eclass\n        Bar {} \u003c/span\u003e\u003cspan class=\"p2\"\u003elet b = new Bar(); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(Bar[Symbol.hasInstance](b)); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这个属性定义在 Function 的原型上，因此默认在所有函数和类上都可以调用。由于 instanceof 操作符会在原型链上寻找这个属性定义，就跟在原型链上寻找其它属性一样，因此可以在继承的类上通 过静态方法重新定义这个函数\n    。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eclass Bar {} \u003c/span\u003e\u003cspan class=\"p2\"\u003eclass Baz extends Bar { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003estatic[Symbol.hasInstance]() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn false; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003elet b = new Baz(); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(Bar[Symbol.hasInstance](b)); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(b instanceof Bar); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(Baz[Symbol.hasInstance](b)); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(b instanceof Baz); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eSymbol.isConcatSpreadable\u003c/h6\u003e\n\u003cp\u003e根据 ECMAScript 规范，这个符号作为一个属性表示 \"一个布尔值，如果是 true ，则意味着对象应 该用 Array.prototype.concat() 打平其数组元素 \"。 ES6 中的\n    Array.prototype.concat() 方法会 根据接收到的对象类型选择如何将一个类数组对象拼接成数组实例。覆盖 Symbol.isConcat\u0002Spreadable 的值可以修改这个行为。 \u003c/p\u003e\n\u003cp\u003e数组对象默认情况下会被打平到已有的数组， false 或假值会导致整个对象被追加到数组末尾。类 数组对象默认情况下会被追加到数组末尾， true 或真值会导致这个类数组对象被打平到数组实例。其 它不是类数组对象的对象在\n    Symbol.isConcatSpreadable 被设置为 true 的情况下将被忽略。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet initial = ['foo']; \u003c/span\u003e\u003cspan class=\"p2\"\u003elet array = ['bar']; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(array[Symbol.isConcatSpreadable]); \u003cspan class=\"r\"\u003e// undefined \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(initial.concat(array)); \u003cspan class=\"r\"\u003e// ['foo', 'bar'] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003earray[Symbol.isConcatSpreadable] = false; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(initial.concat(array)); \u003cspan class=\"r\"\u003e// ['foo', Array(1)] \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003elet arrayLikeObject = { \u003c/span\u003e\u003cspan class=\"p4\"\u003elength: 1, \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e0: 'baz' \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(arrayLikeObject[Symbol.isConcatSpreadable]); \u003cspan class=\"r\"\u003e// undefined\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(initial.concat(arrayLikeObject)); \u003cspan class=\"r\"\u003e// ['foo',\n            {...}] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003earrayLikeObject[Symbol.isConcatSpreadable] = true; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(initial.concat(arrayLikeObject)); \u003cspan class=\"r\"\u003e// ['foo', 'baz']\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet otherObject = new Set().add('qux'); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(otherObject[Symbol.isConcatSpreadable]); \u003cspan class=\"r\"\u003e// undefined\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(initial.concat(otherObject)); \u003cspan class=\"r\"\u003e// ['foo', Set(1)]\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eotherObject[Symbol.isConcatSpreadable] = true; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(initial.concat(otherObject)); \u003cspan class=\"r\"\u003e// ['foo'] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eSymbol.iterator\u003c/h6\u003e\n\u003cp\u003e根据 ECMAScript 规范，这个符号作为一个属性表示 \"一个方法，该方法返回对象默认的迭代器。 由 for-of 语句使用 \"。换句话说，这个符号表示实现迭代器 API 的函数。 for-of\n    循环这样的语言结构会利用这个函数执行迭代操作。循环时，它们会调用以 Symbol.iterator 为键的函数，并默认这个函数会返回一个实现迭代器 API 的对象。很多时候，返回的对象是实现该 API 的 Generator\n    。 \u003c/p\u003e\n\u003cp\u003e技术上，这个由 Symbol.iterator 函数生成的对象应该通过其 next() 方法陆续返回值。可以通 过显式地调用 next() 方法返回，也可以隐式地通过生成器函数返回。 \u003c/p\u003e\n\u003ch6\u003eSymbol.match\u003c/h6\u003e\n\u003cp\u003e根据 ECMAScript 规范，这个符号作为一个属性表示 \"一个正则表达式方法，该方法用正则表达式 去匹配字符串。由 String.prototype.match() 方法使用 \"。\n    String.prototype.match() 方法会使 用以 Symbol.match 为键的函数来对正则表达式求值。正则表达式的原型上默认有这个函数的定义， 因此所有正则表达式实例默认是这个 String\n    方法的有效参数。 \u003c/p\u003e\n\u003cp\u003e给这个方法传入非正则表达式值会导致该值被转换为 RegExp 对象。如果想改变这种行为，让方法 直接使用参数，则可以重新定义 Symbol.match 函数以取代默认对正则表达式求值的行为，从而让 match()\n    方法使用非正则表达式实例。 Symbol.match 函数接收一个参数，就是调用 match() 方法的 字符串实例。但，返回的值没有限制 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(RegExp.prototype[Symbol.match]); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            ƒ [Symbol.match]() { [native code] } \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log('foobar'.match(/bar/));\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// [\"bar\", index: 3,\n            input: \"foobar\", groups: undefined]class FooMatcher { \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003estatic[Symbol.match](target) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn target.includes('foo');\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log('foobar'.match(FooMatcher));\n        \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log('barbaz'.match(FooMatcher)); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eclass StringMatcher { \u003c/span\u003e\u003cspan class=\"p4\"\u003econstructor(str) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ethis.str\n        = str; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e[Symbol.match](target) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn\n        target.includes(this.str); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log('foobar'.match(new StringMatcher('foo'))); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log('barbaz'.match(new StringMatcher('qux'))); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eSymbol.replace\u003c/h6\u003e\n\u003cp\u003e根据 ECMAScript 规范，这个符号作为一个属性表示 \"一个正则表达式方法，该方法替换一个字符 串中匹配的子串。由 String.prototype.replace() 方法使用 \"。\n    String.prototype.replace() 方法会使用以 Symbol.replace 为键的函数来对正则表达式求值。正则表达式的原型上默认有这个函 数的定义，因此所有正则表达式实例默认是这个 String\n    方法的有效参数。 \u003c/p\u003e\n\u003cp\u003e给这个方法传入非正则表达式值会导致该值被转换为 RegExp 对象。如果想改变这种行为，让方法 直接使用参数，可以重新定义 Symbol.replace 函数以取代默认对正则表达式求值的行为，从而让 replace()\n    方法使用非正则表达式实例。 Symbol.replace 函数接收两个参数，即调用 replace() 方 法的字符串实例和替换字符串。但，返回的值没有限制 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eclass FooReplacer { \u003c/span\u003e\u003cspan class=\"p4\"\u003estatic[Symbol.replace](target,\n        replacement) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn target.split('foo').join(replacement); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log('barfoobaz'.replace(FooReplacer,\n        'qux')); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// \"barquxbaz\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eclass StringReplacer {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003econstructor(str) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ethis.str = str; \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e[Symbol.replace](target, replacement) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ereturn target.split(this.str).join(replacement); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log('barfoobaz'.replace(new StringReplacer('foo'), 'qux'));\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// \"barquxbaz\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eSymbol.search\u003c/h6\u003e\n\u003cp\u003e根据 ECMAScript 规范，这个符号作为一个属性表示 \"一个正则表达式方法，该方法返回字符串中 匹配正则表达式的索引。由 String.prototype.search() 方法使用 \"。\n    String.prototype.search() 方法会使用以 Symbol.search 为键的函数来对正则表达式求值。正则表达式的原型上默认有这个函数 的定义，因此所有正则表达式实例默认是这个 String\n    方法的有效参数。 \u003c/p\u003e\n\u003cp\u003e给这个方法传入非正则表达式值会导致该值被转换为 RegExp 对象。如果想改变这种行为，让方法 直接使用参数，可以重新定义 Symbol.search 函数以取代默认对正则表达式求值的行为，从而让 search()\n    方法使用非正则表达式实例。 Symbol.search 函数接收一个参数，就是调用 match() 方法 的字符串实例。但，返回的值没有限制 。 \u003c/p\u003e\n\u003ch6\u003eSymbol.species\u003c/h6\u003e\n\u003cp\u003e根据 ECMAScript 规范，这个符号作为一个属性表示 \"一个函数值，该函数作为创建派生对象的构 造函数 \"。这个属性在内置类型中最常用，用于对内置类型实例方法的返回值暴露实例化派生对象的方 法。用\n    Symbol.species 定义静态的获取器（ getter ）方法，可以覆盖新创建实例的原型定义。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eclass Bar extends Array {} \u003c/span\u003e\u003cspan class=\"p2\"\u003eclass Baz extends Array {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003estatic get[Symbol.species]() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn Array; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003elet bar = new Bar(); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(bar instanceof Array); \u003cspan class=\"r\"\u003e//\n            true \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(bar instanceof Bar); \u003cspan class=\"r\"\u003e//\n            true \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ebar = bar.concat('bar'); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(bar instanceof Array); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(bar instanceof Bar); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet baz =\n        new Baz(); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(baz instanceof Array); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(baz instanceof Baz); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ebaz =\n        baz.concat('baz'); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(baz instanceof Array); \u003cspan class=\"r\"\u003e// true\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(baz instanceof Baz); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eSymbol.split\u003c/h6\u003e\n\u003cp\u003e根据 ECMAScript 规范，这个符号作为一个属性表示 \"一个正则表达式方法，该方法在匹配正则表 达式的索引位置拆分字符串。由 String.prototype.split() 方法使用 \"。\n    String.prototype. split() 方法会使用以 Symbol.split 为键的函数来对正则表达式求值。正则表达式的原型上默认有 这个函数的定义，因此所有正则表达式实例默认是这个 String\n    方法的有效参数。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(RegExp.prototype[Symbol.split]); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            ƒ [Symbol.split]() { [native code] } \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log('foobarbaz'.split(/bar/));\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// ['foo', 'baz']\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e给这个方法传入非正则表达式值会导致该值被转换为 RegExp 对象。如果想改变这种行为，让方法 直接使用参数，可以重新定义 Symbol.split 函数以取代默认对正则表达式求值的行为，从而让 split()\n    方法使用非正则表达式实例。 Symbol.split 函数接收一个参数，就是调用 match() 方法的字符串实 例。返回的值没有限制。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eclass FooSplitter { \u003c/span\u003e\u003cspan class=\"p4\"\u003estatic[Symbol.split](target) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn target.split('foo'); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log('barfoobaz'.split(FooSplitter)); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// [\"bar\", \"baz\"] \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eclass StringSplitter {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003econstructor(str) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ethis.str = str; \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e[Symbol.split](target) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ereturn target.split(this.str); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log('barfoobaz'.split(new StringSplitter('foo'))); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            [\"bar\", \"baz\"] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eSymbol.toPrimitive\u003c/h6\u003e\n\u003cp\u003e根据 ECMAScript 规范，这个符号作为一个属性表示 \"一个方法，该方法将对象转换为相应的原始 值。由 ToPrimitive 抽象操作使用 \"。很多内置操作都会尝试强制将对象转换为原始值，包括字符串、\n    数值和未指定的原始类型。对于一个自定义对象实例，通过在这个实例的 Symbol.toPrimitive 属性 上定义一个函数可以改变默认行为。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eclass Foo {} \u003c/span\u003e\u003cspan class=\"p2\"\u003elet foo = new Foo(); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(3 +\n        foo); \u003cspan class=\"r\"\u003e// \"3[object Object]\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(3 - foo); \u003cspan\n            class=\"r\"\u003e// NaN \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(String(foo)); \u003cspan class=\"r\"\u003e// \"[object Object]\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eclass\n        Bar { \u003c/span\u003e\u003cspan class=\"p4\"\u003econstructor() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethis[Symbol.toPrimitive] = function(hint)\n        { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eswitch (hint) { \u003c/span\u003e\u003cspan class=\"p10\"\u003ecase 'number': \u003c/span\u003e\u003cspan class=\"p12\"\u003ereturn 3;\n    \u003c/span\u003e\u003cspan class=\"p10\"\u003ecase 'string': \u003c/span\u003e\u003cspan class=\"p12\"\u003ereturn 'string bar'; \u003c/span\u003e\u003cspan class=\"p10\"\u003ecase\n        'default': \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003edefault: \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003ereturn 'default bar'; \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003elet bar = new Bar(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(3 + bar); \u003cspan class=\"r\"\u003e// \"3default bar\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(3 - bar); \u003cspan class=\"r\"\u003e// 0 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(String(bar));\n        \u003cspan class=\"r\"\u003e// \"string bar\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eSymbol.toStringTag\u003c/h6\u003e\n\u003cp\u003e根据 ECMAScript 规范，这个符号作为一个属性表示 \"一个字符串，该字符串用于创建对象的默认 字符串描述。由内置方法 Object.prototype.toString() 使用 \"。 通过 toString()\n    方法获取对象标识时，会检索由 Symbol.toStringTag 指定的实例标识符，默 认为 \"Object\" 。内置类型已经指定了这个值，但自定义类实例还需要明确定义 。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet s = new Set(); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(s); \u003cspan class=\"r\"\u003e// Set(0)\n            {} \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(s.toString()); \u003cspan class=\"r\"\u003e// [object Set]\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(s[Symbol.toStringTag]); \u003cspan class=\"r\"\u003e// Set \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eclass Foo {} \u003c/span\u003e\u003cspan class=\"p2\"\u003elet foo = new Foo(); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(foo);\n        \u003cspan class=\"r\"\u003e// Foo {} \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(foo.toString()); \u003cspan class=\"r\"\u003e// [object\n            Object] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(foo[Symbol.toStringTag]); \u003cspan class=\"r\"\u003e// undefined \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eclass Bar { \u003c/span\u003e\u003cspan class=\"p4\"\u003econstructor() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethis[Symbol.toStringTag]\n        = 'Bar'; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003elet bar = new Bar(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(bar); \u003cspan class=\"r\"\u003e// Bar {} \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(bar.toString()); \u003cspan class=\"r\"\u003e// [object Bar] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(bar[Symbol.toStringTag]); \u003cspan class=\"r\"\u003e// Bar \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eSymbol.unscopables\u003c/h6\u003e\n\u003cp\u003e这个符号作为一个属性表示 \"一个对象，该对象所有的以及继承的属性， 都会从关联对象的 with 环境绑定中排除 \"。设置这个符号并让其映射对应属性的键值为 true ，就可以 阻止该属性出现在 with 环境绑定中。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet o = { \u003c/span\u003e\u003cspan class=\"p4\"\u003efoo: 'bar' \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ewith(o) { \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(foo); \u003cspan class=\"r\"\u003e// bar \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eo[Symbol.unscopables] = { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efoo: true \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewith(o) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econsole.log(foo); \u003cspan class=\"r\"\u003e// ReferenceError \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e不推荐使用 with ，因此也不推荐使用 Symbol.unscopables 。 \u003c/p\u003e\n\u003c/div\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 基础","title":"symbol"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","基础","symbol"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
