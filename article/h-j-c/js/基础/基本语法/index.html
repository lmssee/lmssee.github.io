="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>基本语法</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e字符编码 \u003c/h5\u003e\n\u003cp\u003eJavaScript 程序使用 Unicode 字符编码，有两个字节。意味着用户可以使用中文来命名变量。 \u003cstrong\u003e但，不建议如此骚操作 \u003c/strong\u003e。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet 谁 = '张三 '; \u003c/span\u003e\u003cspan class=\"p2\"\u003e function 睡觉 (哪位 , 在哪 ) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(哪位 +\n        '在 ' + 在哪 + '睡大觉 '); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e睡觉 (谁 ,\n        '床上 ');\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e切换 中英文 很麻烦，除非设定中文输入时输入英文字符。再者，为了考虑 JavaScript 的兼容性和开发习惯。 \u003c/p\u003e\n    \u003cp\u003e由于 JavaScript 脚本一般都寄存在网页中，并由浏览器来解释，因此在考虑 JavaScript 语言编译时，还要顾及嵌入页面的字符编码，以及浏览器支持的字符编码。一般建议保持页面的字符编码与\n        JavaScript 编码一致，以免出现乱码。 \u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e区分大小写 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;div\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;DIv\u0026gt;\u0026lt;/DIv\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;DIV\u0026gt;\u0026lt;/DIV\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ealert(document.querySelectorAll('div').length); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e/* 在早期的浏览器可能会弹出 1 */ \u003c/span\u003e\u003cspan class=\"p4\"\u003e/* 新版浏览器会忽略大小写，弹出 3 */ \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e标识符 \u003c/h5\u003e\n\u003cp\u003e标识符（ identifier ）表示名称。 JavaScript 标识符主要包括变量名、函数名、参数名 和 属性名 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e第一个字符必须是 字母、下划线 或 美元符号（ $ ） \u003c/li\u003e\n    \u003cli\u003e除第一个字符，其它可使用字母、数字、下划线、美元符号 \u003c/li\u003e\n    \u003cli\u003e标识符不能与 JavaScript 关键字和保留字同名 \u003c/li\u003e\n    \u003cli\u003e在 ES3 中，可以使用 Unicode 转义序列 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e直接量 \u003c/h5\u003e\n\u003cp\u003e直接量指在程序中直接显示的量，如：字符串、数值、布尔值、正则表达式、对象初始化、数组初始化。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e'字符串直接量 ' \u003cspan class=\"r\"\u003e // 字符串直接量 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003e123456 \u003cspan class=\"r\"\u003e //\n            数值直接量 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003etrue \u003cspan class=\"r\"\u003e // 布尔值直接量 \u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e/^ab.*/g \u003cspan class=\"r\"\u003e // 正则表达式直接量 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003enull \u003cspan class=\"r\"\u003e //\n            特殊值直接量 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003e{a:1,b:2}\u003cspan class=\"r\"\u003e // 对象初始化直接量 \u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e[1,2] \u003cspan class=\"r\"\u003e // 数组直接量 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e关键字和保留字 \u003c/h5\u003e\n\u003cp\u003e具有一定用途关键字 \u003c/p\u003e\n\u003cp class=\"p4\"\u003eECMAScript 全部关键字 \u003c/p\u003e\n\u003cul class=\"line5\" id=\"Ba\"\u003e\n\u003c/ul\u003e\n\u003cp\u003eECMAScript 5 保留的关键字： class 、 const 、 enum 、 export 、 extends 、 import 、 super 。 \u003c/p\u003e\n\u003cp\u003e严格模式保留字： implements 、 let 、 private 、 public 、 yield 、 interface 、 package 、 protected 、 static 。 \u003c/p\u003e\n\u003cp\u003e严格模式下，禁止使用以下关键字作为变量名、函数名、参数名： arguments 、 eval 。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003eECMAScript 3 中保留字 \u003c/p\u003e\n\u003cul class=\"line5\" id=\"Bb\"\u003e\n\u003c/ul\u003e\n\u003cp class=\"p4\"\u003eJavaScript 预定义全局变量和函数 \u003c/p\u003e\n\u003cul class=\"line5\" id=\"Bc\"\u003e\n\u003c/ul\u003e\n\u003ch5\u003e分隔符 \u003c/h5\u003e\n\u003cp\u003e空格、制表符、换行符、换页符。在解析时， JavaScript 会忽略。 \u003c/p\u003e\n\u003cp\u003e最长行原则：在一行内如果能够正常解析，那么久在一行内解析；否则会读取下一行，直到能够被正常解析。 \u003c/p\u003e\n\u003ch5\u003e注释 \u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e// 单行注释 \u003c/li\u003e\n    \u003cli\u003e/* */ 多行注释 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e转义序列 \u003c/h5\u003e\n\u003cp\u003e使用 6 个 ASCII 字符来代替 16 位的 Unicode 内码。这些 Unicode 转义序列均以 \\u 开头，后跟 4 个 16\n    进制的字符。这种表示可在字符串直接量、正则表达式直接量、标识符中， \u003cstrong\u003e关键字除外 \u003c/strong\u003e。 \u003c/p\u003e\n\n\u003cscript\u003e\n    let Ba = ['break ', 'delete ', 'function ', 'return ', 'typeof ', 'case ', 'do ', 'if ', 'switch ', 'var ', 'catch ', 'else ', 'in ', 'this ', 'void ', 'continue ', 'false ', 'instanceof ', 'throw ', 'while ', 'debugger ', 'finally ', 'new ', 'true ', 'with ', 'default ', 'for ', 'null ', 'try ',];\n    _MiMethod.li('Ba', Ba);\n    let Bb = [' abstract ', 'double ', 'goto ', 'native ', 'static ', 'boolean ', 'enum ', 'implements ', 'package ', 'super ', 'bype ', 'export ', 'int ', 'protected ', 'import ', 'private ', 'synchronized ', 'char ', 'extends ', 'throws ', 'class ', 'final ', 'interface ', 'public ', 'transient ', 'const ', 'float ', 'long ', 'short ', 'volatile ',];\n    _MiMethod.li('Bb', Bb);\n    let Bc = ['arguments', 'encodeURL', 'Infinity', 'Number', 'RegExp', 'Array', 'encodeURLComponent', 'isFinite', 'Object', 'String', 'boolean', 'Error', 'isNaN', 'parseFloat', 'SyntaxError', 'Date', 'eval', 'JSON', 'parseInt', 'TypeError', 'decodeURL', 'EvalError', 'Math', 'RangeError', 'undefined', 'decodeURLComponent', 'Function', 'NaN', 'ReferenceError', 'URlError',]\n    _MiMethod.li('Bc', Bc);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 基础","title":"基本语法"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","基础","基本语法"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
