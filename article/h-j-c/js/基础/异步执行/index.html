    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e异步执行脚本 \u003c/h5\u003e\n\u003cp\u003e由于 JavaScript 语言的执行环境是 \"单线程 \"（ single thread\n    ）的，即一次只能完成一件任务，如果有多个任务时就必须排队，前面一个任务完成，再执行后面的一个任务。因此，如果队伍很长，就会出现等待时间过长的现象。为了解决这个问题， JavaScript 语言将任务的执行模式分成两种：同步（\n    Synchronous ）和异步（ Asynchronous ）。 \u003c/p\u003e\n\u003cp\u003e广义上讲， JavaScript 异步执行脚本实际效果就是延时执行脚本。严格来说， JavaScript 中的异步编程能力都是由 BOM 与 DOM 提供的，如 setTimeout 、 XMLHttpRequest ，还有\n    DOM 的事件机制，还有 HTML 5 新增加的 webwork 、 postMessage 等。这些方法都有一个共同的特点，就是都有一个回调函数，便于实现控制。 \u003c/p\u003e\n\u003cp\u003e实现异步模式执行脚本有 4 种方法，分别是使用回调函数、事件监听、观察者模式、 Promise 对象。 \u003c/p\u003e\n\u003ch5\u003e回调函数 \u003c/h5\u003e\n\u003cp\u003e是异步编程最基本的方法。前文提到的 setTimeout 、 XMLHttpRequest 、 webwork 、 postMessage 等方法，都有一个回调函数，都可归属于使用回调函数实现异步编程的方法。 \u003c/p\u003e\n\u003cp\u003e回调函数简单、容易理解和部署。但是，回调函数的缺点是不利于代码的阅读和维护，各个部分之间高度耦合，流程会很混乱，而且每个任务只能指定一个回调函数。因此，需要了解其它模式的异步编程思想。 \u003c/p\u003e\n\u003ch5\u003e监听 \u003c/h5\u003e\n\u003cp\u003e第二种异步脚本执行的方法是基于事件监听的方法。基于事件监听的异步脚本执行的思路是基于事件的触发，而不依赖脚本的顺序。 \u003c/p\u003e\n\u003cp\u003e事件监听使得程序进度基于事件的编程逻辑。 \u003c/p\u003e\n\u003ch5\u003e采取惰性载入的方案提高函数代码的性能 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction addEvents(type, element, fun) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (element.addEventListener) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eelement.addEventListener(type, fun,\n        false); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (element.attachEvent) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eelement.attachEvent( 'on' + type, fun); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eelement[ 'on' + type] = fun; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e所谓惰性载入就是在第一次执行代码后，用函数代码内部的方法覆盖原有代码，代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar addEvents = (function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (document.addEventListener) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn function(type, element, fun) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003eelement.addEventListener(type, fun, false); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (document.attachEvent) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        function(type, element, fun) { \u003c/span\u003e\u003cspan class=\"p8\"\u003eelement.attachEvent( 'on' + type, fun); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn function(type, element, fun) { \u003c/span\u003e\u003cspan class=\"p8\"\u003eelement[ 'on' + type] = fun;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e})();\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 基础","title":"异步执行"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","基础","异步执行"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
