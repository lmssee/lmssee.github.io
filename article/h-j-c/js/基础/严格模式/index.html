    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介 \u003c/h5\u003e\n\u003cp\u003eECMAScript 5 新增严格运行模式。严格模式定义的目的。 \u003c/p\u003e\n\u003cul\u003e\n        \u003cli\u003e消除 JavaScript 语法的一些不合理、不严谨之处，减少一些怪异行为 \u003c/li\u003e\n        \u003cli\u003e消除代码运行的一些不安全之处，保证代码运行安全 \u003c/li\u003e\n        \u003cli\u003e提高编译器效率，增加运行速度 \u003c/li\u003e\n        \u003cli\u003e为未来的新版本 JavaScript 做铺垫 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e同样的代码，在严格模式下，可能会有不一样的运行结果。一些在正常模式可以运行的语句，在严格模式下将不能运行。掌握这些知识，有助于更细致的深入了解 JavaScript 。 \u003c/p\u003e\n\u003ch5\u003e启用 \u003c/h5\u003e\n\u003cp\u003e\"use strict\" 即可开启严格模式。不支持严格模式的浏览器把它当成一个普通字符串，加以忽略。 \u003cstrong\u003e该声明必须放在首部，其前不得出现代码、空格，但可以加注释 \u003c/strong\u003e。 \u003c/p\u003e\n\u003cul\u003e\n        \u003cli\u003e全局模式 \u003c/li\u003e\n        \u003cli\u003e局部模式 \u003c/li\u003e\n        \u003cli\u003e模块模式 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e全局模式 \u003c/h6\u003e\n\u003cp\u003e将 \"use strict\" 放在脚本文件的第一行，则整个脚本都将以严格模式运行。如果该语句不在第一行，则无效。 \u003c/p\u003e\n\u003cp\u003e严格地说，只要前面不是产生实际运行结果的语句， \"use strict\" 可以不在第一行。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(\"\n                这是严格模式。 \");\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e局部模式 \u003c/h6\u003e\n\u003cp\u003e将 \"use strict\" 放在函数内的第一行，则该函数将以严格模式运行。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003efunction strict(){\u003c/span\u003e\u003cspan class=\"p2\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn\n                \" 这是严格模式。 \";\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003efunction notStrict(){\u003c/span\u003e\u003cspan\n                class=\"p2\"\u003ereturn \" 这是正常模式。 \";\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e模块模式 \u003c/h6\u003e\n\u003cp\u003e由于全局模式不利于文件的合并，所以更好的做法是，借用局部模式的方法，将整个脚本放到一个立即执行的匿名函数中。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e( function (){\u003c/span\u003e\u003cspan class=\"p2\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p2\"\u003e// 这里编写\n                JavaScript 代码 \u003c/span\u003e\u003cspan class=\"p\"\u003e})();\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e严格模式的执行限制 \u003c/h5\u003e\n\u003ch6\u003e显式声明变量 \u003c/h6\u003e\n\u003cp\u003eJavaScript 是弱类型语言，不使用 var 声明的变量默认会转化为全局变量。但是在严格模式下将不允许，会报语法错误。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003ev = 1; \u003cspan class=\"r\"\u003e// 报错， v\n                        未声明 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003efor(i = 0; i \u0026lt; 2; i++){ \u003cspan class=\"r\"\u003e// 报错， i\n                        未声明 \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e因此，在严格模式下，变量必须先用 var 命令声明，然后再使用。 \u003c/p\u003e\n\u003ch6\u003e静态绑定 \u003c/h6\u003e\n\u003cp\u003e在正常模式下， JavaScript 允许动态绑定，即某些属性和方法到底属于哪个对象，不是还在编译时确定的，而是在运行时确定的。 \u003c/p\u003e\n\u003cp\u003e严格模式对动态绑定做了一些限制。某些情况下，只允许静态绑定。也即是说，属性和方法到底归属哪个对象，在编译阶段就确定。这样有利于编译效率的提高，是的代码更容易阅读，避免出现意外。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e禁止使用 with \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003evar v = 1;\u003c/span\u003e\u003cspan class=\"p\"\u003ewith\n                (o){\u003c/span\u003e\u003cspan class=\"p2\"\u003ev = 2;\u003cspan class=\"r\"\u003e// 语法错误 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e创建 eval 作用域 \u003c/p\u003e\n\u003cp\u003e在正常模式下， JavaScript 有两种变量作用域：全局作用域和函数作用域。严格模式创造了第三种： eval 作用域。 \u003c/p\u003e\n\u003cp\u003e在正常模式下， eval 语句的作用域，取决于是处于全局作用域，还是函数作用域。而在严格模式下， eval 本身就是一个作用域，不能够生成全局变量了，它生成的变量只能用于 eval 内部。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003evar x = 2;\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.info(eval(\"var x =\n                5; x\")); \u003cspan class=\"r\"\u003e//5\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.info(x);\u003cspan\n                        class=\"r\"\u003e//2\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e另外，任何使用 'eval' 的操作都会被禁止，例如，一下用法都是违法的。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e'use strict'\u003c/span\u003e\u003cspan class=\"p\"\u003evar obj = { }\u003c/span\u003e\u003cspan class=\"p\"\u003evar eval =\n                3\u003c/span\u003e\u003cspan class=\"p\"\u003eobj.eval = 1\u003c/span\u003e\u003cspan class=\"p\"\u003eobj.a = eval\u003c/span\u003e\u003cspan class=\"p\"\u003efor (var\n                eval\n                in obj) { }\u003c/span\u003e\u003cspan class=\"p\"\u003efunction eval () {}\u003c/span\u003e\n        \u003cspan class=\"p\"\u003efunction func(eval){}\u003c/span\u003e\u003cspan class=\"p\"\u003evar func = new Function('eval')\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e增强安全措施 \u003c/h6\u003e\n\u003cp class=\"p4\"\u003e禁止 this 关键字指向全局 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003efunction f(){\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn !this;\u003c/span\u003e\u003cspan class=\"p\"\u003e} \u003cspan class=\"r\"\u003e// 返回\n                        false, 因为 \"this\" 指向全局对象， \"!this\" 就是 false\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003efunction\n                f(){\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\"use strict\"\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ereturn !this;\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003cspan class=\"r\"\u003e// 返回 true ，因为在严格模式下， this 的值为\n                        undefined ，\n                        所以 !this 就是 true\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用构造函数时，如果忘加了 new 语句， this 不再指向全局，而是报错。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003efunction f(){\u003c/span\u003e\u003cspan class=\"P2\"\u003e\"use strict\";\u003c/span\u003e\u003cspan class=\"P2\"\u003ethis.a\n                =\n                1;\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003ef();\u003cspan class=\"r\"\u003e// 报错， this\n                        未定义 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e禁止在函数内遍历调用栈 \u003c/p\u003e\n\u003cp\u003ecaller 、 callee 、 arguments 的调用行为都被禁止。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003efunction f1(){\u003c/span\u003e\u003cspan class=\"p2\"\u003e\"use strict\";\u003c/span\u003e\u003cspan class=\"p2\"\u003ef1.caller;\u003cspan\n                        class=\"r\"\u003e// 报错 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ef1.arguments;\u003cspan class=\"r\"\u003e//\n                        报错 \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003ef1();\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e禁止删除变量 \u003c/h6\u003e\n\u003cp\u003e在严格模式下无法删除变量。只有在 configurable 设置为 true 时，可删除。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003evar x;\u003c/span\u003e\u003cspan class=\"p\"\u003edelete x; \u003cspan class=\"r\"\u003e//\n                        语法错误 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003evar o =\n                Object.create(null,'x',{\u003c/span\u003e\u003cspan class=\"p2\"\u003evalue : 1,\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003econfigurable : true\u003c/span\u003e\u003cspan class=\"p\"\u003e)};\u003c/span\u003e\u003cspan class=\"p\"\u003edelete o.x;\u003cspan\n                        class=\"r\"\u003e// 成功 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e显示报错 \u003c/h6\u003e\n\u003cp\u003e在正常模式下，对一个对象的只读属性进行赋值，不会报错，只会默默的失败。在严格模式下，将报错。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003evar o = {};\u003c/span\u003e\u003cspan class=\"p\"\u003eObject.defineProperty ( o ,\n                \"v\" ,{ value : 1, writable : false});\u003c/span\u003e\u003cspan class=\"p\"\u003eo.v;\u003cspan class=\"r\"\u003e// 报错 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e在严格模式下，对一个使用 getter 方法读取的属性进行赋值，将报错 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003evar o = {\u003c/span\u003e\u003cspan class=\"p\"\u003eget v () {\n                return\n                1 }\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003eo.v = 2 ; \u003cspan class=\"r\"\u003e// 报错 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e严格模式下，对禁止扩展的对象添加属性，将报错 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003evar o = { };\u003c/span\u003e\u003cspan\n                class=\"p\"\u003eObject.preventExtensions(o);\u003c/span\u003e\u003cspan class=\"p\"\u003eo.v = 1 ; \u003cspan class=\"r\"\u003e//\n                        报错 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e删除一个不可删除的属性，将报错 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003edelete Object.prototype; \u003cspan class=\"r\"\u003e//\n                        报错 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e重名错误 \u003c/h6\u003e\n\u003cp\u003e严格模式新增了一些语法错误。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e对象不能有重名的属性 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003evar o = {\u003c/span\u003e\u003cspan class=\"p2\"\u003ep:\n                1,\u003c/span\u003e\u003cspan class=\"p\"\u003ep: 2\u003c/span\u003e\u003cspan class=\"p\"\u003e}; \u003cspan class=\"r\"\u003e// 语法错误 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e函数不能有重名的参数 \u003c/p\u003e\n\u003cp\u003e在正常模式下，如果函数有多个重复名的参数，可以用 arguments[i] 读取。在严格模式下，这属于语法错误。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003efunction f(a ,a , b){ \u003cspan class=\"r\"\u003e//\n                        语法错误 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn ;\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e禁止八进制表示 \u003c/h6\u003e\n\u003cp\u003e正常模式下，整数的第一位如果是零，表示这是八进制，如 0100 等于十进制的 64 。在严格模式下禁止这种写法，整数第一位如果是零，则报错。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003evar n = 0100 ; \u003cspan class=\"r\"\u003e//\n                        将报错，语法错误 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003earguments 对象的限制限制 \u003c/h6\u003e\n\u003cp\u003earguments 是函数的参数对象，严格模式下对它的使用进行限制。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e不允许对 arguments 赋值 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003earguments++; \u003cspan class=\"r\"\u003e//\n                        语法错误 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003evar obj = { set p(arguments){}}; \u003cspan class=\"r\"\u003e//\n                        语法错误 \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003etry{ } catch (arguments) {} \u003cspan class=\"r\"\u003e// 语法错误 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003efunction\n                arguments(){} \u003cspan class=\"r\"\u003e// 语法错误 \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003evar f = new Function( \"arguments\" ,\"'use strict';return 17;\"); \u003cspan class=\"r\"\u003e//\n                        语法错误 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\" p4 \"\u003earguments 不再追踪参数的变化。 \u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p2 \"\u003efunction f(a) { \u003c/span\u003e\u003cspan class=\"p4 \"\u003ea = 2; \u003c/span\u003e\u003cspan class=\"p4 \"\u003ereturn\n                [a, arguments[0]]; \u003c/span\u003e\u003cspan class=\"p2 \"\u003e} \u003c/span\u003e\u003cspan class=\"p2 \"\u003ef(1); \u003cspan class=\"r\n                \"\u003e // 正常模式 [2,2] \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2 \"\u003e function f(a) { \u003c/span\u003e\n        \u003cspan class=\"p4 \"\u003e\"use strict \" \u003c/span\u003e\u003cspan class=\"p4 \"\u003ea = 2; \u003c/span\u003e\u003cspan class=\"p4 \"\u003ereturn [a,\n                arguments[0]]; \u003c/span\u003e\u003cspan class=\"p2 \"\u003e} \u003c/span\u003e\u003cspan class=\"p2 \"\u003ef(1); \u003cspan class=\"r \"\u003e //\n                        严格模式 [2,1]\n                \u003c/span\u003e\u003c/span\u003e\n\u003c/div\u003e\n\u003ch6\u003e禁止使用 arguments.callee\u003c/h6\u003e\n\u003cp\u003e这就意味着无法在匿名函数内部调用自身了。 \u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003e\"use strict \"\u003c/span\u003e\u003cspan class=\"p \"\u003evar f = function () { return\n                arguments.callee;}\u003c/span\u003e\u003cspan class=\"p \"\u003ef(); \u003cspan class=\"r\"\u003e// 报错 \u003c/span\u003e\n        \u003c/span\u003e\n\u003c/div\u003e\n\u003ch6\u003e函数声明必须在顶层 \u003c/h6\u003e\n\u003cp\u003e将来 JavaScript 的新版本将引入块级作用域。为了与新版本接轨，严格模式只允许在全局作用域或函数作用域的顶层声明函数。也就是说，不允许再非函数的代码内声明函数。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003eif (true) {\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n                f() {}\n                \u003cspan class=\"r\"\u003e// 语法错误 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003efor (var i = 0; i\n                \u0026lt; 5 ;i++ )\n                {\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003efunction f2 () {} \u003cspan class=\"r\"\u003e// 语法错误 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e保留字 \u003c/h6\u003e\n\u003cp\u003e为了向未来 JavaScript 过渡，新增 一些保留字： implement 、 interface 、 let 、 package 、 private 、 protected 、 public 、 static 、\n        yield 。使用这些名词作为变量名会报错。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003efunction package(protected){ \u003cspan class=\"r\"\u003e// 语法错误 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\"use\n                strict\"\u003c/span\u003e\u003cspan class=\"p2\"\u003evar implements; \u003cspan class=\"r\"\u003e//\n                        语法错误 \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e动态绑定 \u003c/h6\u003e\n\u003cp class=\"p4\"\u003ecall 、 apply 的第一个参数直接传入，不包装为对象 \u003c/p\u003e\n\u003cp\u003e下面的代码，输出以次为 \"string\" 、 \"number\" 。而非严格模式中 call 、 apply 将对值类型的 \"abcd\" 包装成对象后传入，即两次输出都为 \"object\" 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\"use strict\"\u003c/span\u003e\u003cspan class=\"p\"\u003efunction func () {\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(typeof\n                this)\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003efunc.call('abcd');\n                \u003cspan class=\"r\"\u003e//string\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003efunc.apply(1); \u003cspan class=\"r\"\u003e//number\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003ecall 、 apply 的第一个参数为 null 、 undefined 时， this 为 null 、 undefined \u003c/p\u003e\n\u003cp\u003e以下代码输出以此为 undefined 、 null ，而在正常模式中宿主对象（浏览器里是 window ， node.js 环境是 global ）。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e'use strict'\u003c/span\u003e\u003cspan class=\"p\"\u003efunction func () {\u003c/span\u003e\u003cspan\n                class=\"p2\"\u003econsole.log(this)\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003efunc.call(undefined);\n                \u003cspan class=\"r\"\u003e// undefined\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003efunc.call(null); \u003cspan class=\"r\"\u003e// null\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003ebind 的第一个参数为 null 、 undefined 时， this 为 null/undefined \u003c/p\u003e\n\u003cp\u003ebind 是 ECMAScript 5 给 Function.prototype 新增的一个方法，它与 call 、 apply 一样在 function 上直接调用。它返回一个指定上下文和参数的函数。它的第一个参数为\n        null 、 undefined 时， this 也为 null 、 undefined 。 \u003c/p\u003e\n\u003cp\u003e以下代码在非严格模式输出都为 window （或是 global ）。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e'use strict'\u003c/span\u003e\u003cspan class=\"p\"\u003efunction func(){\u003c/span\u003e\u003cspan\n                class=\"p2\"\u003econsole.log(this)\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar f1 =\n                func.bind(null);\u003c/span\u003e\u003cspan class=\"p\"\u003evar f2 = func.bind(undefined);\u003c/span\u003e\n        \u003cspan class=\"p\"\u003ef1(); \u003cspan class=\"r\"\u003e//null\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ef2(); \u003cspan\n                        class=\"r\"\u003e//undefined\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 基础","title":"严格模式"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","基础","严格模式"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
