                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 定义构造函数\u003c/h5\u003e\n\u003cp\u003e 建议构造函数的名称首字母大写。构造函数有两个显著特点：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 函数体内使用 this ，引用要生成的实例对象\u003c/li\u003e\n    \u003cli\u003e 必须使用 new 命令调用，生成实例\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e 调用构造函数\u003c/h5\u003e\n\u003cp\u003e 使用 new 命令调用构造函数，创建实例，并返回这个对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction Point(x, y) { \u003cspan class=\"r\"\u003e// 构造函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (!(this instanceof Point)) return new Point(x, y); \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x = x; \u003cspan class=\"r\"\u003e//\n            私有属性 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.y = y; \u003cspan class=\"r\"\u003e// 私有属性 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.sum = function() { \u003cspan class=\"r\"\u003e// 方法 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn this.x +\n        this.y; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p1 = Point(100,\n        200); \u003cspan class=\"r\"\u003e// 实例化对象1 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar p2 = new Point(300, 400); \u003cspan class=\"r\"\u003e// 实例化对象2 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(p1.x); \u003cspan class=\"r\"\u003e// 100 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(p2.x); \u003cspan\n            class=\"r\"\u003e// 300 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(p1.sum()); \u003cspan class=\"r\"\u003e// 300 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(p2.sum());\n        \u003cspan class=\"r\"\u003e// 700 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 若果不使用 new ，直接使用小括号调用构造函数，这时的构造函数就是普通的函数，this 指向调用函数的对象，即客户端指代全局的 window 。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e 构造函数返回值\u003c/h5\u003e\n\u003cp\u003e 构造函数允许返回值，如果返回值为简单值，者被忽略，直接返回 this 指代的实例对象；如果返回值为对象，这回覆盖 this 指代的实例，返回 return 后面的对象。\u003c/p\u003e\n\u003cp\u003e 这与 new 的解析过程有关：\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e 当使用 new 命令调用构造函数，先创建一个空对象，作为势力返回\u003c/li\u003e\n    \u003cli\u003e 设置实例的原型，指向构造函数的 prototype 属性\u003c/li\u003e\n    \u003cli\u003e 设置构造函数体内的 this ，让它指向实例\u003c/li\u003e\n    \u003cli\u003e 开始执行实例内部代码\u003c/li\u003e\n    \u003cli\u003e 如果构造函数内部有 return 语句，而且 return 后面跟着一个对象，会返回 return 语句指定的对象。否则，会忽略 return 返回值，直接返回 this 对象。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction Point(x, y) { \u003cspan class=\"r\"\u003e// 构造函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x\n        = x; \u003cspan class=\"r\"\u003e// 私有属性 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.y = y; \u003cspan class=\"r\"\u003e// 私有属性\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ex: true, \u003c/span\u003e\u003cspan class=\"p6\"\u003ey: false \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p1 = new Point(100, 200); \u003cspan class=\"r\"\u003e// 实例化对象1 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(p1.x); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(p1.y); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 引用构造函数\u003c/h5\u003e\n\u003cp\u003e 在普通函数内，可以通过 arguments.callee 引用自身。若果在严格模式下，不允许使用 arguments.callee 引用函数。这时需要用 new.target 来访问构造器。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction Point(x, y) { \u003cspan class=\"r\"\u003e// 构造函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e'use\n        strict'; \u003cspan class=\"r\"\u003e// 启用严格模式 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003eif (!(this instanceof new.target)) return\n        new new.target(x, y); \u003cspan class=\"r\"\u003e// 检测this 是否为实例对象 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.x = x; \u003cspan class=\"r\"\u003e// 私有属性 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.y = y; \u003cspan class=\"r\"\u003e//\n            私有属性 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.sum = function() { \u003cspan class=\"r\"\u003e// 方法\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn this.x + this.y; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003evar p1 = new Point(100, 200); \u003cspan\n            class=\"r\"\u003e// 实例化对象1 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(p1.x); \u003cspan class=\"r\"\u003e// 100\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(p1.sum()); \u003cspan class=\"r\"\u003e// 300 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 原型","title":"构造函数"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","原型","构造函数"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
