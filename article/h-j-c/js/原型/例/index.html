                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 设计工厂模式\u003c/h5\u003e\n\u003cp\u003e 将每个对象都共享的函数放置到外部，放到函数之前，可解决重复创建对象的问题。\u003c/p\u003e\n\u003ch5\u003e 设计类继承\u003c/h5\u003e\n\u003cp\u003e 需要考虑以下三点：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 在构造函数 B 的结构内部，使用函数 call （）调用构造函数 A ，把 B 的参数传递给调用函数，让 B 能够继承 A 的所有属性和方法\u003c/li\u003e\n    \u003cli\u003e 在构造函数 A 和 B 之间建立原型链，即 B.prototype = new A();\u003c/li\u003e\n    \u003cli\u003e 恢复 B 的原型对象的构造函数，即 B.prototype.constructor = B; 语句行\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e 设计原型模式\u003c/h5\u003e\n\u003cp\u003e 原型模式存在两个问题：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 由于构造函数事先声明，而原型属性在类结构声明后才被定于，因此无法通过构造函数参数向属性动态传递值\u003c/li\u003e\n    \u003cli\u003e 当原型属性的值为引用类型的数据时，如果在一个对象实例中修改该属性值，则将影响所有的实例\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e 设计动态原型模式\u003c/h5\u003e\n\u003ch5\u003e 使用 prototype 定义方法和属性\u003c/h5\u003e\n\u003cp\u003e 每个类都有 prototype 属性，该属性是一个静态属性，因此无需实例化，只需使用类引用该属性即可。\u003c/p\u003e\n\u003cp\u003e 要为一个类定义方法，只需将该方法赋给类的 prototype 属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Person(myName, myAge) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ethis.nickName = myName;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ethis.age = myAge;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePerson.prototype.showInfo = function() {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereturn (\"$1 ！我的名字是 \"; + this.nickName +\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"; ，我现在 \"; + this.age + \"$1 了。 \");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 使用 prototype 定义属性\u003c/h5\u003e\n\u003cp\u003e 也可以使用 prototype 为类定义属性，但那样将会失去为构造器定义参数的功能。例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Person(myName, myAge) {}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePerson.prototype.nickName = null;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePerson.prototype.age = null;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePerson.prototype.showInfo = function() {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereturn (\"$1 ！我的名字是 \"; + this.nickName +\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\"; ，我现在 \"; + this.age + \"$1 了。 \");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 显然，这里构造器参数没什么作用。\u003c/p\u003e\n\u003cp\u003eprototype 的另一个重要作用是为类添加新的成员，例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction showHistory() {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereturn \"10 年开发体验 \";\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePerson.prototype.showHistory = showHistory;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar person_1 = new Person(\"JOHN\", 32);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(person_1.showHistory()); \u003cspan class=\"r\"\u003e// 输出 \"10 年开发体验 \"\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这里，定义了一个函数 showHistory() 封装一段逻辑代码运算，然后将该函数赋给 Person 类原型的 showHistory 成员，这样 showHistory 成员便作为 Person\n    类一个新的方法存在，并且该方法拥有函数 showHistory() 封装的逻辑代码。\u003c/p\u003e\n\u003ch5\u003e 使用 Object 类为实例定义方法和属性\u003c/h5\u003e\n\u003cp\u003e 可以使用 Object 类直接定义一个实例，并为该对象赋属性和方法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar person_1 = {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003enickName : \"john\";,\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eage : 15,\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eshowInfo : function(){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn (\"$1 ！我的名字是 \"; + this.nickName +\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\"; ，我现在 \"; + this.age + \"$1 了。 \");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(person_1.showInfo());\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(\"$1 性 nickName 的值为： \";+person_1.nickName);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eperson_1 本身就是一个实例，所以无需实例化就可以调用其方法和属性，不过这种定义其实是利用对象命名键的形式，所以不推荐使用。\u003c/p\u003e\n\u003ch6\u003e 使用 return 语句定义方法和属性\u003c/h6\u003e\n\u003cp\u003e 可以使用 return 语句定义方法和属性。只需为构造方法定义返回值，在 return 语句中声明一个对象，该对象即可以利用对象命名键定义方法和属性。\u003c/p\u003e\n\u003ch6\u003e 使用 prototype 和 Object 配合为类定义方法和属性\u003c/h6\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 原型","title":"例"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","原型","例"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
