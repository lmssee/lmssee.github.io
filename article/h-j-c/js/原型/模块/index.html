    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e 模块就是提供一个接口，却隐藏状态与实现的函数或对象。一般在开发中使用闭包来构建模块，摒弃全局变量的滥用，规避 Javascript 缺陷。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 为Function 增加method 原型方法 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eFunction.prototype.method\n        = typeof Function.prototype.method === \"function\" ? \u003c/span\u003e\u003cspan class=\"p4\"\u003eFunction.prototype.method : \u003cspan\n            class=\"r\"\u003e// 先检测是否已经存在该方法，否则定义函数 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efunction(name, func) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (!this.prototype[name]) { \u003cspan class=\"r\"\u003e//\n            检测当前类型中是否存在指定名称的原型 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003ethis.prototype[name] = func; \u003cspan class=\"r\"\u003e// 绑定原型方法\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn this; \u003cspan class=\"r\"\u003e// 返回类型 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eString.method('toHTML', function() { \u003cspan class=\"r\"\u003e//\n            为String 增加toHTML 原型方法 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar entity = { \u003cspan class=\"r\"\u003e// 过滤的转义字符实体\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003equot: '\"', \u003c/span\u003e\u003cspan class=\"p6\"\u003elt: '\u0026lt;', \u003c/span\u003e\u003cspan class=\"p6\"\u003egt: '\u0026gt;' \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn function() { \u003cspan class=\"r\"\u003e// 返回方法的函数体 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ereturn this.replace(/\u0026([^\u0026;]+);/g, function(a, b) { \u003cspan class=\"r\"\u003e// 匹配字符串中HTML 转义字符\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar r = entity[b]; \u003cspan class=\"r\"\u003e// 映射转义字符实体 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn typeof r\n        === 'string' ? r : a; \u003cspan class=\"r\"\u003e// 替换并返回 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e}); \u003c/span\u003e\u003cspan class=\"p4\"\u003e};\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}()); \u003cspan class=\"r\"\u003e// 生成闭包体 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edocument.writeln('\u0026lt;\u0026quot;\u0026gt;'.toHTML()); \u003cspan class=\"r\"\u003e// \u0026lt;\"\u0026gt; \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log('\u0026lt;\u0026quot;\u0026gt;'); \u003cspan class=\"r\"\u003e// \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log('\u0026lt;\u0026quot;\u0026gt;'.toHTML()); \u003cspan class=\"r\"\u003e// \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 模块利用函数作用域和闭包来创建对象和私有属性的关系。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 模块模式通常结合实例使用。JavaScript\n        的实例就是用对象字面量表示法创建的，对象的属性值可以是数值或函数，并且属性值在该对象的生命周期中不会发生变化。模块模式通常作为工具为程序其它部分提供功能支持。通过这种方法可以创建比较安全的对象。\u003c/p\u003e\n\u003c/div\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 原型","title":"模块"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","原型","模块"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
