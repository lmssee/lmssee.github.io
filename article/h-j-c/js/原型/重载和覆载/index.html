    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 方法的重载（ overLoad ） \u003c/h5\u003e\n\u003cp\u003e 如果一个类中有两个方法，这两个方法具有相同的方法名，并且具有相同的参数（参数的数量和数据类型完全相同），那么就称它们具有相同的方法签名。一个类中不允许存在方法签名完全相同的两个方法。 \u003c/p\u003e\n\u003cp\u003e 如果一个类中有两个方法具有相同的方法名，但是具有不同的参数列表，那么就称一个方法是另一个方法的重载，在目前流行的大多数程序语言（例如 Java 、 C# ）中，不同的参数列表包括不同的参数数量和参数的数据类型，因为\n    JavaScript 是无类型的，所以不同的参数列表仅仅是表现为不同的参数数量。 \u003c/p\u003e\n\u003cp\u003e 例如前面介绍的 Date.UTC() 方法，可以有多种形式： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eDate.UTC(year, month)\u003c/span\u003e\u003cspan class=\"p\"\u003eDate.UTC(year, month, day)\u003c/span\u003e\u003cspan\n        class=\"p\"\u003eDate.UTC(year, month, day, hours)\u003c/span\u003e\u003cspan class=\"p\"\u003eDate.UTC(year, month, day, hours,\n        minutes)\u003c/span\u003e\u003cspan class=\"p\"\u003eDate.UTC(year, month, day, hours, minutes, seconds)\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eDate.UTC(year, month, day, hours, minutes, seconds, millisecond)\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这些都是方法的重载。 \u003c/p\u003e\n\u003cp\u003e 例如下面的两行代码演示了如何重载： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ethis.myMethod = function(arg_1, arg_2){}\u003c/span\u003e\u003cspan class=\"p\"\u003ethis.myMethod =\n        function(arg_1, arg_2, arg_3){}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在第二种情况下，成员方法 myMethod() 接受 3 个整形变量作为它的参数，解释器根据调用时的不同参数来决定该调用哪一种成员方法，假如把两个整数提供给成员方法，就调用第一个成员方法。 \u003c/p\u003e\n\u003ch6\u003e 重载参数列表的数量 \u003c/h6\u003e\n\u003cp\u003eJavaScript 不支持直接定义多个方法来实现重载，因为它不允许存在同名的两个方法。用户可以利用变参数来实现重载功能，例如下面的代码定义了一个类，实现了一个名为 myMethod() 的方法： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction OverLoadTest() {} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eOverLoadTest.prototype.myMethod = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar len =\n        arguments.length; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (len == 2) { \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.write(\"$1\n        在调用的是两参数方法 \u0026lt;br\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} else if (len == 3) { \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.write(\"$1 在调用的是三参数方法 \u0026lt;br\u0026gt;\");\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethrow new Error(\"$1 数数量不对 \"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 该方法通过自行判断参数的数量实现重载，用户可以使用下面的方法实现调用： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003etry{\u003c/span\u003e\u003cspan class=\"p2\"\u003evar oOverLoadTest = new OverLoadTest();\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eoOverLoadTest.myMethod(1,2);\u003c/span\u003e\u003cspan class=\"p2\"\u003eoOverLoadTest.myMethod(1,2,3);\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}catch(err){\u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(err.message);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 返回的结果如下所示： \u003c/p\u003e\n\u003cp\u003e 正在调用的是两参数方。 \u003c/p\u003e\n\u003cp\u003e 正在调用的是三参数方法。 \u003c/p\u003e\n\u003cp\u003e 如果调用不当，将会抛出。 如下面的代码，参数数量不正确： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003et\u003c/span\u003e\u003cspan class=\"p2\"\u003evar oOverLoadTest = new OverLoadTest();\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eoOverLoadTest.myMethod(1,2,3,4);\u003c/span\u003e\u003cspan class=\"p\"\u003e}catch(err){\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(err.message);\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 重载参数列表的数据类型 \u003c/h5\u003e\n\u003cp\u003e 使用相似的方法，也可以实现数据类型的重载，例如我们要实现下面的 3 种重载形式，前一种的参数必须是数字类型，后两种的参数必须是字符串类型： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ethis.myMethod = function(Number_1, Number_2){}\u003c/span\u003e\u003cspan class=\"p\"\u003ethis.myMethod =\n        function(String_1, String_2){}\u003c/span\u003e\u003cspan class=\"p\"\u003ethis.myMethod = function(String_1, String_2,\n        String_3){}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 那么就可以使用如下的代码来实现重载： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction OverLoadTest() {} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eOverLoadTest.prototype.myMethod = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar len =\n        arguments.length; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (len == 2) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (typeof(arguments[0]) == \"number\"; \u0026amp; \u0026amp; typeof(arguments[1]) == \"number\") { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003edocument.write(\"s 在调用的是两 number 参数方法 \u0026lt;br\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else if\n        (typeof(arguments[0]) == \"string\"; \u0026amp; \u0026amp; typeof(arguments[1]) == \"string\") { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003edocument.write(\"s 在调用的是两 string 参数方法 \u0026lt;br\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p8\"\u003ethrow new Error(\"s 参数类型不对 \u0026lt;br\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (len == 3) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (typeof(arguments[0])\n        == \"string\"; \u0026amp; \u0026amp; typeof(arguments[1]) == \"string\"; \u0026amp; \u0026amp; typeof(arguments[2]) == \"string\") {\n    \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003edocument.write(\"s 在调用的是三 string 参数方法 \u0026lt;br\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003ethrow new Error(\"s 参数类型不对 \u0026lt;br\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n        else { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ethrow new Error(\"$1 数数量不对 \u0026lt;br\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 该方法通过自行判断参数的数量和类型来实现重载，首先判断参数的数量，然后判断参数的类型，参数的类型可以使用 typeof 来获取 \u003c/p\u003e\n\u003cp\u003e 用户可以使用下面的方法调用来检测重载的效果： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar oOverLoadTest = new\n        OverLoadTest(); \u003c/span\u003e\u003cspan class=\"p4\"\u003eoOverLoadTest.myMethod(1, 2); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eoOverLoadTest.myMethod(\"1\",\"; 2 \"); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eoOverLoadTest.myMethod(\"1\",\"; 2 \",\"3\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}catch(err){ \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(err.message); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这将返回下面的结果： \u003c/p\u003e\n\u003cp\u003e 正在调用的是两 number 参数方法 \u003c/p\u003e\n\u003cp\u003e 正在调用的是两 string 参数方法 \u003c/p\u003e\n\u003cp\u003e 正在调用的是三 string 参数方法 \u003c/p\u003e\n\u003cp\u003e 再看下面的访问方法，由于参数的类型不正确，所以会抛出异常： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\" p \"\u003etry{\u003c/span\u003e\u003cspan class=\"p2 \"\u003evar oOverLoadTest = new OverLoadTest();\u003c/span\u003e\u003cspan\n        class=\"p2 \"\u003eoOverLoadTest.myMethod(\"1 \";,2);\u003c/span\u003e\u003cspan class=\"p \"\u003e}catch(err){\u003c/span\u003e\u003cspan class=\"p2\n        \"\u003edocument.write(err.message);\u003c/span\u003e\u003cspan class=\"p \"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 技巧与提示 \u003c/p\u003e\n\u003cp\u003e 注意，不可能存在具有相同的方法签名。 值类型不同的方法。因为很明显，假定存在这样的方法，程序也不知道用户的方法调用应该使用哪个方法定义 \u003c/p\u003e\n\u003ch5\u003e 方法的覆载（ overRide ） \u003c/h5\u003e\n\u003cp\u003e 从基类中继承功能时，子类可以继承基类的所有方法和属性。但是\n    能会发现，在基类中编写的一些方法仅能完成子类所需的部分功能。要执行所需的全部功能，可以在新类中覆盖基类的方法，而无需使用新的名称创建一个全新的方法，这被称为方法的覆载（ overRide ）或者重写、覆写、覆盖 \u003c/p\u003e\n\u003cp\u003eJavaScript 完成覆载功能非常简单，只需为子类新定义一个同名的方法成员即可。例如下面的代码重写了 showInfo() 方法： \u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003e\u003c/span\u003e\u003cspan class=\"p2 \"\u003efunction Person(myName, myAge) { \u003c/span\u003e\u003cspan\n        class=\"p4 \"\u003ethis.nickName = myName; \u003c/span\u003e\u003cspan class=\"p4 \"\u003ethis.age = myAge; \u003c/span\u003e\u003cspan class=\"p2 \"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\n        \"\u003ePerson.prototype.showInfo = function() { \u003c/span\u003e\u003cspan class=\"p4 \"\u003ereturn (\" 嗨！我的名字是 \" + this.nickName +\n    \u003c/span\u003e\u003cspan class=\"p6 \"\u003e\" ，我现在 \" + this.age + \" 岁了。 \"); \u003c/span\u003e\u003cspan class=\"p2 \"\u003e}; \u003c/span\u003e\n    \u003cspan class=\"p2\n        \"\u003efunction Child(myName, myAge) { \u003c/span\u003e\u003cspan class=\"p4 \"\u003ethis.$super = Person; \u003c/span\u003e\u003cspan\n        class=\"p4 \"\u003ethis.$super(myName, myAge); \u003c/span\u003e\u003cspan class=\"p4 \"\u003e// 下面覆盖 showInfo() 方法 \u003c/span\u003e\u003cspan\n        class=\"p4 \"\u003ethis.showInfo = function() { \u003c/span\u003e\n    \u003cspan class=\"p6 \"\u003ereturn (\" 嗨！我是一个小孩，我的名字是 \" + this.nickName + \u003c/span\u003e\u003cspan class=\"p8 \"\u003e\" ，我现在 \" + this.age + \"\n        岁了。 \"); \u003c/span\u003e\u003cspan class=\"p4 \"\u003e}; \u003c/span\u003e\u003cspan class=\"p2 \"\u003e} \u003c/span\u003e\u003cspan class=\"p2 \"\u003eChild.prototype =\n        new Person(); \u003c/span\u003e\n    \u003cspan class=\"p2 \"\u003evar child_1 = new Child(\"Jane \", 8); \u003c/span\u003e\n    \u003cspan class=\"p2 \"\u003edocument.write(child_1.showInfo());\u003c/span\u003e\n\u003c/div\u003e\n\u003ch6\u003e 技巧与提示 \u003c/h6\u003e\n\u003cp\u003e 静态方法和属性不能继承，也不能覆载 \u003c/p\u003e\n\u003cp\u003e 方法覆载（ overRide ）和方法重载（ overLoad\n    ）是两个不同的概念。重载是指当一个类的两个或者两个以上的方法拥有相同的名字，但是具有不同的参数列表（也称为方法签名）；覆载是指子类利用完全相同的方法名、返回类型和参数列表重新编写方法逻辑，实现基类中某一方法的功能。这\n    都被称为多态 \u003c/p\u003e\n\u003ch5\u003e 属性的覆载 \u003c/h5\u003e\n\u003cp\u003e 如果基类使用 get 和 set 存取器方法定义属性，那么该属性可以被覆载。但是，使用 this 和 prototype 来定义的属性则不能覆盖 \u003c/p\u003e\n\u003cp\u003e 要想覆载 get 和 set 存取器方法，就像覆载普通的方法一样，只需为子类新定义一个同名的 get 和 set 方法成员即可 \u003c/p\u003e\n\u003cp\u003e 例如下面的代码覆载基类 Person 属性： \u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003e\u003c/span\u003e\u003cspan class=\"p2 \"\u003efunction Person() { \u003c/span\u003e\u003cspan class=\"p4 \"\u003evar _sex =\n        \"default \"; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e 。 .getSex = function() { \u003c/span\u003e\u003cspan class=\"p6 \"\u003ereturn _sex;\n    \u003c/span\u003e\u003cspan class=\"p4\n        \"\u003e}; \u003c/span\u003e\u003cspan class=\"p4 \"\u003ethis.setSex = function(newName) { \u003c/span\u003e\u003cspan class=\"p6 \"\u003e_sex = newName;\n    \u003c/span\u003e\u003cspan class=\"p4 \"\u003e}; \u003c/span\u003e\u003cspan class=\"p2 \"\u003e} \u003c/span\u003e\u003cspan class=\"p2 \"\u003efunction Child() { \u003c/span\u003e\u003cspan\n        class=\"p4 \"\u003evar _sex = \"default\n        \"; \u003c/span\u003e\u003cspan class=\"p4 \"\u003ethis.getSex = function() { \u003c/span\u003e\n    \u003cspan class=\"p6 \"\u003ereturn _sex; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e}; \u003c/span\u003e\u003cspan class=\"p4 \"\u003ethis.setSex =\n        function(newName) { \u003c/span\u003e\u003cspan class=\"p6 \"\u003e_sex = newName; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p2 \"\u003e} \u003c/span\u003e\u003cspan class=\"p2 \"\u003eChild.prototype = new Person();\u003c/span\u003e\n\u003c/div\u003e\n\u003cp\u003e 但一般情况下是无需覆载属性的 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 原型","title":"重载和覆载"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","原型","重载和覆载"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
