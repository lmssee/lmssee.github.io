    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 定义原型\u003c/h5\u003e\n\u003cp\u003e 原型（ prototype ），是 JavaScript 特有的一个概念。通过使用原型， JavaScript 可以建立其传统面向对象语言中的继承，从而体现对象的层次关系。 JavaScript\n    本身是基于原型的，每个对象都有一个 prototype 的属性，这个 prototype 本身也是一个对象，因此它本身也可以有自己的原型，这样就构成了一个链结构。\u003c/p\u003e\n\u003cp\u003e 访问一个属性的时候，解析器需要从下向上的遍历这个链结构，直到遇到该属性，则返回属性对应的值，或者遇到原型为 null 的对象（ JavaScript 的基对象 Object 的构造器的默认 prototype 有一个\n    null\n    原型），如果此对象仍没有该属性，则返回 undefined 。\u003c/p\u003e\n\u003cp\u003e 由于遍历原型链的时候，是由下而上的，所以最先遇到的属性值最先返回。通过这种机制可以完成继承及重载等传统的面向对象机制。\u003c/p\u003e\n\u003cp\u003e 原型就是数据集合，即普通对象，继承于 Object 类，由 JavaScript 自动创建并依附于每个构造函数。\u003c/p\u003e\n\u003cp\u003e 使用点语法，用户可通过 function.prototype 方式定义原型，从而影响所有实例。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction p(x) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x = x \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ep.prototype.x = 1; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p1 = new p(10); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ep.prototype.x = p1.x; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(p.prototype.x)\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 访问原型\u003c/h6\u003e\n\u003cp\u003e 原型实际上就是一个普通对象，继承了 Object 类，由 JavaScript 自动创建并依附在每一个函数身上。访问原型对象 3 种方法：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eobj.__proto__\u003c/li\u003e\n    \u003cli\u003eobj.constructor.prototype\u003c/li\u003e\n    \u003cli\u003eObject.getPrototypeOf(obj)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e 每个构造器方法都有一个 prototype 属性，该属性是在定义构造器方法时自动创建的。 prototype 属性代表用该函数创建的类的默认属性值。如果将方法分配给类的 prototype\n    属性，则该类的任何新创建的实例都可以使用这些方法。\u003c/p\u003e\n\u003cp\u003e 类的每个新实例也都有一个 __proto__ 属性（注意前后两个下划线），用于引用创建它的构造器方法的 prototype 属性。\u003c/p\u003e\n\u003cp\u003e 可以使用 prototype 和 __proto__ 属性扩展类，这样可以以面向对象的方式重新使用代码。\u003c/p\u003e\n\u003cp\u003e 最好将方法分配给构造器方法的 prototype 属性，因为它只存在于一个位置，并且由该类的新实例引用。 __proto__ 属性最终还是要经过对 prototype 属性的引用才能实现其功能。并且， IE 不支持使用\n    __proto__ 属性，所以不建议使用该属性。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e__proto__ 是私有属性，存在浏览器兼容问题，以及缺乏非浏览器环境的支持。使用 obj.constructor.prototype 也有一定的风险，如果 obj 的 constructor 属性值被覆盖，则\n        obj.constructor.prototype 将会失效。因此，最靠谱的就是 Object.getPrototypeOf(obj) 。\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar F = function() {}; \u003cspan class=\"r\"\u003e// 构造函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        obj = new F(); \u003cspan class=\"r\"\u003e// 实例化 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar proto1 =\n        Object.getPrototypeOf(obj); \u003cspan class=\"r\"\u003e// 引用原型 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar proto2 = obj.__proto__; \u003cspan class=\"r\"\u003e// 引用原型，注意，IE 暂不支持 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        proto3 = obj.constructor.prototype; \u003cspan class=\"r\"\u003e// 引用原型 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar proto4 =\n        F.prototype; \u003cspan class=\"r\"\u003e// 引用原型 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(proto1 === proto2); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(proto1 === proto3); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(proto1 === proto4); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(proto2 === proto3); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(proto2 === proto4); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(proto3 === proto4); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 设置原型\u003c/h6\u003e\n\u003cp\u003e 原型有三种设置方法， IE 仅支持第三种：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eobj.__proto__=prototypeObj\u003c/li\u003e\n    \u003cli\u003eObject.setPrototypeOf(obj,prototypeObj)\u003c/li\u003e\n    \u003cli\u003eObject.create(prototypeObj)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar proto = { \u003c/span\u003e\u003cspan class=\"p4\"\u003ename: \"prototype\" \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar obj1 = {}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eobj1.__proto__ = proto; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(obj1.name); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar obj2 = {}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eObject.setPrototypeOf(obj2, proto); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(obj2.name); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar obj3 = Object.create(proto); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(obj3.name);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 检测原型\u003c/h6\u003e\n\u003cp\u003e 使用 isPrototypeOf() 方法可以判断该对象是否为参数对象的原型。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar F = function() {}; \u003cspan class=\"r\"\u003e// 构造函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        obj = new F(); \u003cspan class=\"r\"\u003e// 实例化 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar proto1 =\n        Object.getPrototypeOf(obj); \u003cspan class=\"r\"\u003e// 引用原型 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(proto1.isPrototypeOf(obj)); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        proto = Object.prototype; \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(proto.isPrototypeOf({})); \u003cspan class=\"r\"\u003e// true\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(proto.isPrototypeOf([])); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(proto.isPrototypeOf(/ /)); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(proto.isPrototypeOf(function() {})); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(proto.isPrototypeOf(null)); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 应用原型\u003c/h6\u003e\n\u003cp\u003e 原型属性可以被所有实例访问，而私有属性只能被当前实例访问。\u003c/p\u003e\n\u003ch5\u003e 比较原型属性和本地属性\u003c/h5\u003e\n\u003cp\u003e 如果给构造函数定义了与原型属性同名的本地属性，则本地属性将覆盖原型属性。如果 delete 删除本地属性，则原型属性依旧可访问。\u003c/p\u003e\n\u003cp\u003e 本地属性的修改，不影响其它实例；原型属性的修改则会影响所有的实例。\u003c/p\u003e\n\u003cp\u003eprototype 属性属于构造函数，则必须由点号来调用 prototype 属性，再通过 prototype 属性来访问原型对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction p(x, y, z) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x = x; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.y\n        = y; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.z = z; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ep.prototype.del =\n        function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i in this) delete this[i] \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ep.prototype = new p(1, 2, 3); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p1 = new\n        p(10, 20, 30); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(p1.x); \u003cspan class=\"r\"\u003e// 10 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(p1.y); \u003cspan class=\"r\"\u003e// 20 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(p1.z); \u003cspan class=\"r\"\u003e// 30 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ep1.del(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(p1.x); \u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(p1.y); \u003cspan class=\"r\"\u003e//\n            2 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(p1.z) \u003cspan class=\"r\"\u003e// 3 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 利用原型为对象设置默认值\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction p(x) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (x) this.x = x \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ep.prototype.x = 0; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p1 = new p(); \u003cspan class=\"r\"\u003e// 0\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(p1.x); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar p2 = new p(1); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(p2.x) \u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 利用本地对象是实现本地数据备份\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction p(x) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x = x \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ep.prototype.backup = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i in this)\n        p.prototype[i] = this[i] \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar p1 = new p(1); \u003c/span\u003e\u003cspan class=\"p2\"\u003ep1.backup(); \u003c/span\u003e\u003cspan class=\"p2\"\u003ep1.x = 10;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(p1.x); \u003cspan class=\"r\"\u003e// 10 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ep1 = p.prototype;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(p1.x); \u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 利用原型将对象属性设置为只读\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction p(x, y) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (x) this.x = x; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (y) this.y = y; \u003c/span\u003e\u003cspan class=\"p4\"\u003ep.prototype.x = p.prototype.y = 0 \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efunction l(a, b) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar a = a; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar b = b; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar w = function() {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn Math.abs(a.x - b.x) \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003evar h =\n        function() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn Math.abs(a.y - b.y) \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.length = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        Math.sqrt(w() * w() + h() * h()) \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.d = function() {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn a \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.e = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn b \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p1 = new p(50, 2); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p2 = new p(10, 20);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar ll = new l(p1, p2); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(ll.length()); \u003cspan class=\"r\"\u003e// 20.12461179749811 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ell.d().x =\n        50; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(ll.length()); \u003cspan class=\"r\"\u003e// 43.86342439892262\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在上例，发现，当无意改动了 l.d() 方法下的值，会影响计算结果。所以，将 d() 和 e() 方法改为对原始数据的值传递，而非引用。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction p(x, y) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (x) this.x = x; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (y) this.y = y; \u003c/span\u003e\u003cspan class=\"p4\"\u003ep.prototype.x = p.prototype.y = 0 \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efunction l(a, b) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar a = a; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar b = b; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar w = function() {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn Math.abs(a.x - b.x) \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003evar h =\n        function() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn Math.abs(a.y - b.y) \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.length = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        Math.sqrt(w() * w() + h() * h()) \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.d = function() {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003efunction temp() {}; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etemp.prototype = a; \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn new temp() \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.e = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003efunction temp() {}; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etemp.prototype = b; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn new temp() \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        p1 = new p(1, 2); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p2 = new p(10, 20); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        ll = new l(p1, p2); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(ll.length()); \u003cspan class=\"r\"\u003e// 20.12461179749811 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ell.d().x =\n        50; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(ll.length()); \u003cspan class=\"r\"\u003e// 20.12461179749811\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 也可以在给私有属性 w 和 h 赋值时，直接调用函数计算出结果，就不再受后续的相关属性值的影响。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction p(x, y) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (x) this.x = x; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (y) this.y = y; \u003c/span\u003e\u003cspan class=\"p4\"\u003ep.prototype.x = p.prototype.y = 0 \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efunction l(a, b) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar a = a; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar b = b; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar w = function() {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn Math.abs(a.x - b.x) \u003c/span\u003e\u003cspan class=\"p4\"\u003e}(); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar h =\n        function() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn Math.abs(a.y - b.y) \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}(); \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.length = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        Math.sqrt(w * w + h * h) \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.d = function() {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn a \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.e = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn b \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p1 = new p(1, 2); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p2 = new p(10, 20);\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar ll = new l(p1, p2); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(ll.length()); \u003cspan class=\"r\"\u003e// 20.12461179749811 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ell.d().x =\n        50; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(ll.length()); \u003cspan class=\"r\"\u003e// 20.12461179749811\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 原型域和原型域链\u003c/h5\u003e\n\u003cp\u003e 在 JavaScript 中，实例对象在读取属性时，总是先检查自身域的属性，如果存在，则返回本地属性，否则将向上检索 prototype 原型域，如找到同名属性，则返回该属性。若未找到，则 JavaScript\n    利用引用关系，继续向外查找 prototype 原型域所指向的 prototype 原型域，知道查找到对象的 prototype 域是它自身，或者出现循环为止。\u003c/p\u003e\n\u003cp\u003e 每个对象实例都有属性成员用于指向它的构造函数的原型（ Prototype ），可以把这种层层指向父原型的关系称为原型域链。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction a(x) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x = x \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ea.prototype.x = 0; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction b(x) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x =\n        x \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eb.prototype = new a(1); \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction c(x) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x\n        = x \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ec.prototype = new b(2); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar d\n        = new c(3); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(d.x) \u003cspan class=\"r\"\u003e// 3 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003edelete d.x; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(d.x); \u003cspan class=\"r\"\u003e// 2 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003edelete c.prototype.x;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(d.x); \u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edelete b.prototype.x; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(d.x); \u003cspan class=\"r\"\u003e// 0 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003edelete a.prototype.x;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(d.x) \u003cspan class=\"r\"\u003e// undefined \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在 JavaScript 中，一切都是对象，函数是第一型。 Function 和 Object 都是函数的实例，构造函数的父原型指向 Function 的原型， Function.prototype 的父原型是 Object\n    的原型， Object 也指向 Function 的原型， Object.prototype 是所有的父原型的顶层。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eFunction.prototype.a = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"FUnction\")\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eObject.prototype.a = function() { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ealert(\"Object\") \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efunction f() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.a = \"a\" \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ef.prototype = { \u003c/span\u003e\u003cspan class=\"p4\"\u003ew: function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\"w\")\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(f instanceof Function); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(f.prototype instanceof Object); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(Function instanceof Object); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(Function.prototype instanceof Object); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(Object.prototype instanceof Function); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 原型继承\u003c/h5\u003e\n\u003cp\u003e 原型继承是一种简单化的继承机制，也是 JavaScript\n    主要支持的一种继承方式。在原型继承中，类和实例化的概念被淡化了，一切钭从对象的角度出发。原型继承不再需要使用类的定义对象的结构，直接定义对象，并被其它对象引用，这样形成了继承关系，其中引用的对象被称为原型对象（\n    Prototype Object ）。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction A(x) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x1 = x; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.get1 =\n        function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn this.x1 \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction B(x) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.x2 = x \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.get2 = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        this.x2 + this.x2 \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eB.prototype =\n        new A(1); \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction C(x) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.x3 = x; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.get3 = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        this.x3 * this.x3 \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eC.prototype =\n        new B(2); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = new B(2); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar c = new C(3); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(b.x1); \u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(c.x1); \u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(c.get3()); \u003cspan class=\"r\"\u003e//\n            9 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(c.get2()) \u003cspan class=\"r\"\u003e// 4 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 基于原型的编程是面向对象编程的一种特定形式。在这种编程模型中，不需要声明静态类，而是通过复制已经存在的原型对象来实现继承关系的，因此，基于原型没有类的概念，原型链继承中的类仅是一个模型，或者说是沿用面向对象编程的概念。\n\u003c/p\u003e\n\u003cp\u003e 原型继承显得很简单，优点是结构简练，不需要每次构造都调用父类的构造函数，且不需要通过复制属性的方式就能快速实现继承。但有以下几个缺点 。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 每个类型只有一个原型，所以它不直接支持多重继承\u003c/li\u003e\n    \u003cli\u003e 不能很好的支持多参数或者动态参数的父类\u003c/li\u003e\n    \u003cli\u003e 使用不够灵活。需要在原型的声明阶段实例化父类对象，并把它当作当前类型的原型，这样就限制了父类实例化的灵活性，很多时候无法确定父类对象实例化的时机和场所\u003c/li\u003e\n    \u003cli\u003eprototype 属性固有的副作用\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e 扩展原型方法\u003c/h5\u003e\n\u003cp\u003eJavaScript 允许为基本的数据类型定义方法。通过 Object.prototype 添加原型方法，可使得该方法对所有的对象可用。这样的方式对函数、数组、字符串、数字、正则表达式和布尔值都适用。\u003c/p\u003e\n\u003cp\u003e 下例中，使用 Object.prototype 添加一个添加方法的方法 method 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eFunction.prototype.method = function(name, func) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.prototype[name] =\n        func \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn this \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 下例将 JavaScript 的 Number 添加一个提取整数的方法 integer 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eNumber.method(\"integer\", function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn Math[this \u0026lt;\n        0 ? \"ceil\" : \"floor\"](this); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.writeln((-10 /\n        3).integer());\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 基本类型的原型都是公共结构，为防止在扩展基类时将其覆盖掉。一个保险的方法就是再确定没有该方法时才增加。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eFunction.prototype.method = function(name, func) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (!this.prototype[name]) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.prototype[name] = func; \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        this \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 原型","title":"原型"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","原型","原型"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
