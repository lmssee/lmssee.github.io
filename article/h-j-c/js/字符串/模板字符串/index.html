    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 模板字符串 \u003c/h5\u003e\n\u003cp\u003e 模板字符串有助于构建字符串，其功能类似于 Perl 或 Python\n    等其它语言中的字符串插值。模板字符串必须包含在两个反单引号（ ' ）而不是标准的单引号之间。这一要求带来的一个方便的副作用是，可以在字符串中使用引号而不需要再进行转义。 \u003c/p\u003e\n\u003cp\u003e 模板字符串另一个很酷的作用是，它们能够扩展到多行。 \u003c/p\u003e\n\u003cp\u003e 这些就是应用正则表达式的范例，在这两个范例中，它们匹配的字符串文本其实就是文件名。只要是字符串文本，就可以使用正则表达式进行匹配，并且快捷、高效。目前，正则表达式已经在很多软件中得到广泛的应用，包括 JavaScript 。\n\u003c/p\u003e\n\u003ch6\u003e 字符串插值 \u003c/h6\u003e\n\u003cp\u003e 模板字面量最常用的一个特性是支持字符串插值，也就是可以在一个连续定义中插入一个或多个 值。技术上讲，模板字面量不是字符串，而是一种特殊的 JavaScript 句法表达式，只不过求值后得到的\n    是字符串。模板字面量在定义时立即求值并转换为字符串实例，任何插入的变量也会从它们最接近的作 用域中取值。\n\u003c/p\u003e\n\u003cp\u003e 字符串插值通过在 ${} 中使用一个 JavaScript 表达式实现。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet value = 5; \u003c/span\u003e\u003cspan class=\"p2\"\u003elet exponent = 'second'; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan\n            class=\"r\"\u003e// 以前，字符串插值是这样实现的： \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet interpolatedString =\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evalue + ' to the ' + exponent + ' power is ' + (value * value); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 现在，可以用模板字面量这样实现： \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet\n        interpolatedTemplateLiteral = \u003c/span\u003e\u003cspan class=\"p4\"\u003e`${ value } to the ${ exponent } power is ${ value *\n        value }`; \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(interpolatedString); \u003cspan class=\"r\"\u003e// 5 to the second power\n            is 25 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(interpolatedTemplateLiteral); \u003cspan class=\"r\"\u003e// 5 to the second power is 25\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 模板可以插入自己之前的值 :\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet value = ''; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction append() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evalue =\n        `${value}abc` \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(value); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eappend(); \u003cspan class=\"r\"\u003e// abc \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eappend(); \u003cspan class=\"r\"\u003e// abcabc \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eappend(); \u003cspan class=\"r\"\u003e//\n            abcabcabc \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 模板字面量标签函数 \u003c/h5\u003e\n\u003cp\u003e 模板字面量也支持定义标签函数（ tag function ），而通过标签函数可以自定义插值行为。标签函数 会接收被插值记号分隔后的模板和对每个表达式求值的结果。\n\u003c/p\u003e\n\u003cp\u003e 标签函数本身是一个常规函数，通过前缀到模板字面量来应用自定义行为，标签函数 接收到的参数依次是原始字符串数组和对每个表达式求值的结果。这个函数的返回值是对模板字面量求 值得到的字符串。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet a = 6; \u003c/span\u003e\u003cspan class=\"p2\"\u003elet b = 9; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        simpleTag(strings, ...expressions) { \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(strings); \u003c/span\u003e\u003cspan class=\"p4\"\u003efor\n        (const expression of expressions) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log(expression); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn 'foobar';\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003elet taggedResult = simpleTag `${ a } + ${ b } = ${ a + b }`;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// [\"\", \" + \", \" = \", \"\"] \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 6 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 9 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 15 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(taggedResult); \u003cspan class=\"r\"\u003e//\n            \"foobar\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 也可以 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet a = 6; \u003c/span\u003e\u003cspan class=\"p2\"\u003elet b = 9; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        zipTag(strings, ...expressions) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn strings[0] + \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eexpressions.map((e, i) =\u0026gt; `${e}${strings[i + 1]}`) \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e.join(''); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003elet untaggedResult = `${ a } + ${\n        b } = ${ a + b }`; \u003c/span\u003e\u003cspan class=\"p2\"\u003elet taggedResult = zipTag `${ a } + ${ b } = ${ a + b }`;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(untaggedResult); \u003cspan class=\"r\"\u003e// \"6 + 9 = 15\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(taggedResult); \u003cspan class=\"r\"\u003e// \"6 + 9 = 15\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 原始字符串 \u003c/h5\u003e\n\u003cp\u003e 使用模板字面量也可以直接获取原始的模板字面量内容（如换行符或 Unicode 字符），而不是被转 换后的字符表示。为此，可以使用默认的 String.raw 标签函数 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// Unicode 示例 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            \\u00A9 是版权符号 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(`\\u00A9`); \u003cspan class=\"r\"\u003e// ©\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(String.raw `\\u00A9`); \u003cspan class=\"r\"\u003e// \\u00A9 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 换行符示例 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(`first line\\nsecond line`);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// first line \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// second\n            line \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(String.raw `first line\\nsecond line`); \u003cspan class=\"r\"\u003e// \"first line\\nsecond line\"\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 字符串","title":"模板字符串"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","字符串","模板字符串"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
