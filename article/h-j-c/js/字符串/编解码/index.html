    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 字符串的编解码 \u003c/h5\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eJavaScript 编码和解码方法 \u003c/caption\u003e\n    \u003ccolgroup width=\"30%\"\u003e\u003c/colgroup\u003e\n    \u003ccolgroup\u003e\u003c/colgroup\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var Aa = [\n        [\"escape()\", \"  使用转义序列替换某些字符来进行字符串的编码  \"],\n        [\"unescape()\", \"  对使用  escape()   方法编码的字符串进行解码  \"],\n        [\"encodeURL()\", \"  通过转义某些字符对  URL  进行编码  \"],\n        [\"decodeURL()\", \"  对使用  encodeURL()   编码的字符串进行解码  \"],\n        [\"encodeURLComponent()\", \"  通过转义某些字符对  URL  的组件进行编码  \"],\n        [\"decodeURLComponent()\", \"  对使用  encodeURLComponent()   编码的字符串进行解码  \"]\n    ];\n    _MiMethod.td(\"Aa\");\n\u003c/script\u003e\n\u003ch6\u003eescape() 和 unescape() 方法 \u003c/h6\u003e\n\u003cp\u003eescape() 是不完全编码的方法，它能够将字符串中某些字符替换为十六进制的转义序列。具体地说就是将除 ASCII 字母、数字、标点符号（如 @ 、 * 、——、 + 、 - 、 - 、 / ）之外，所有字符都转化为 %xx\n    和 %uxxxx 的转义序列。从 \\u0000 到 \\u00ff 的都用 转义序列 %xx 代替，其它的 Unicode 字符用 %uxxxx 序列代替。 \u003c/p\u003e\n\u003cp\u003e 编码 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"javascript 中国 \"; \u003c/span\u003e\u003cspan class=\"p2\"\u003es = escape(s); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s);\n        \u003cspan class=\"r\"\u003e// \"javascript%20%u4E2D%u56FD\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 解码 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"javascript 中国 \"; \u003c/span\u003e\u003cspan class=\"p2\"\u003es = escape(s); \u003cspan class=\"r\"\u003e//\n            编码 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s); \u003cspan class=\"r\"\u003e// \"javascript%20%u4E2D%u56FD\"\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003es = unescape(s); \u003cspan class=\"r\"\u003e// 解码 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(s); \u003cspan class=\"r\"\u003e// \"javascript 中国 \" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eencodeURl() 和 decodeURL() 方法 \u003c/h6\u003e\n\u003cp\u003e 虽然 ECMAScript 1.0 标准化了 escape() 和 unescape() 方法，但是 ECMAScript 3.0 却反对使用它们，提倡使用 encodeURL() 和\n    encodeURLComponent()\n    代替 escape() 方法，使用 decodeURL() 和 decodeURLComponent() 代替 unescape() 方法。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"javascript 中国 \"; \u003c/span\u003e\u003cspan class=\"p2\"\u003es = encodeURI(s); \u003cspan class=\"r\"\u003e//\n            编码 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s); \u003cspan class=\"r\"\u003e//\n            \"javascript%20%E4%B8%AD%E5%9B%BD\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 通过结果可以发现， encodeURL() 方法与 escape() 方法编码的结果不同。但是，与 escape() 方法相同的是，将除 ASCII 字母、数字、标点符号（如 @ 、 * 、——、 + 、 - 、 - 、 /\n    ）之外，所有字符都转化为 %xx 和 %uxxxx 的转义序列。从 \\u0000 到 \\u00ff 的都用 转义序列 %xx 代替，其它的 Unicode 字符用 %uxxxx 序列代替。 \u003c/p\u003e\n\u003cp\u003e 相对来说， encodeURL() 方法更加安全。它能够将字符准换位 UTF-8 编码字符，然后用十六进制的转义序列（形式 %xx ）对生成的 1 个、 2 个或者 3 个字节的字符编码。在这种模式下， ASCII\n    字符由一个\n    %xx 转义字符替代，在 \\u0080 到 \\u07ff 之间编码的字符用两个序列替代，其它的 16 位 Unicode 字符由三个转义序列替代。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"javascript 中国 \"; \u003c/span\u003e\u003cspan class=\"p2\"\u003es = encodeURI(s); \u003cspan class=\"r\"\u003e//\n            编码 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s); \u003cspan class=\"r\"\u003e//\n            \"javascript%20%E4%B8%AD%E5%9B%BD\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003es = decodeURI(s); \u003cspan class=\"r\"\u003e//\n            解码 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(s); \u003cspan class=\"r\"\u003e// \"javascript 中国 \" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在 ECMAScript 3.0 之前，完全可以使用 escape() 和 unescape() 方法进行编码和解码。 \u003c/p\u003e\n\u003ch6\u003eencodeURLComponent() 和 decodeURLComponent() 方法 \u003c/h6\u003e\n\u003cp\u003eencodeURL() 仅是一种简单的编码方法，如果使用该方法编码 URL 字符串，必须保证组件（如查询字符串）中不包含 URL 分隔符。如果组件中包含这些分隔符，则必须使用 encodeURLComponent() 和\n    decodeURLComponent() 方法继续编解码。 \u003c/p\u003e\n\u003cp\u003eencodeURLComponent() 方法和 encodeURL() 方法不同。它们的只要区别在于。 encodeURLComponent() 　方法假定参数是 URL\n    的一部分，例如，协议、主机名、路径或查询字符串。因此，它将转义用于分割 URL 各个部分的标点符号。而 encodeURL() 　方法仅把它们当成普通的 ASCII 字符，并没有转换。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"https://lmssee.cn/l/study.php?keyword=URL\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003es =\n        escape(s); \u003cspan class=\"r\"\u003e// 编码 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s); \u003cspan class=\"r\"\u003e//\n            \"https%3A//lmssee.cn/l/study.php%3Fkeyword%3DURL\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003es = unescape(s); \u003cspan class=\"r\"\u003e// 解码 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s); \u003cspan class=\"r\"\u003e//\n            \"https://lmssee.cn/l/study.php?keyword=URL\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003es =\n        encodeURI(s); \u003cspan class=\"r\"\u003e// 编码 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(s); \u003cspan class=\"r\"\u003e// \"https://lmssee.cn/l/study.php?keyword=URL\" \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003es = decodeURI(s); \u003cspan class=\"r\"\u003e// 解码 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s); \u003cspan class=\"r\"\u003e//\n            \"https://lmssee.cn/l/study.php?keyword=URL\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003es = encodeURIComponent(s); \u003cspan class=\"r\"\u003e// 编码 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s); \u003cspan\n            class=\"r\"\u003e// \"https%3A%2F%2Flmssee.cn%2Fl%2Fstudy.php%3Fkeyword%3DURL\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003es\n        = decodeURIComponent(s); \u003cspan class=\"r\"\u003e// 解码 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(s); \u003cspan class=\"r\"\u003e// \"https://lmssee.cn/l/study.php?keyword=URL\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 同 encodeURL() 一样， encodeURLComponent() 方法对于 ASCII 的字母、数字、标点符号（如 _ 、 - 、 . 、！、 ~ 、 * 、 ' 、（、））不编码。而对其它字符（如 / 、：、\n    #\n    ） 这样的用于分割 URL 各个组件的标点符号，都由一个或多个十六进制的转义系列替换。 \u003c/p\u003e\n\u003ch5\u003eBase 64 编码和解码 \u003c/h5\u003e\n\u003cp\u003eBase 64 是一种编码方式，可以将任意字符（包括二进制流）转换为打印字符。 JavaScript 定义了两个与 Base 64 有关的全局方法。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ebtoa() 字符串或二进制转化为 Base64 编码 \u003c/li\u003e\n    \u003cli\u003eatob() 把 Base() 转化为原来的字码 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction b64Encode(str) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        btoa(encodeURIComponent(str)); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction b64Decode(str) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn decodeURIComponent(atob(str)); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = b64Encode('JavaScript 从入门到精通 '); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        a\n        = b64Decode(b); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(b); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(a);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eUnicode 编码和解码 \u003c/h5\u003e\n\u003cp\u003e 所谓 Unicode 编码就是根据字符在 Unicode 字符表中的编号对字符进行简单的编码，从而实现对信息的加密。例如，字符 \" 中 \" 的 Unicode 编码为 20013 ，如果在网页中使用 Unicode\n    编码显示，则可以输入 \"\u0026amp;#20013;\" 。因此，把文本转化为 Unicode 编码之后在网页显示，能够起到加密信息的效果。 \u003c/p\u003e\n\u003cp\u003estring 类型提供了 chaCodeAt() 方法，可以把指定的字符串转化为 Unicode 编码。所以，设计思路就是，利用 replace() 方法逐字符的进行匹配、编码转换，最后进行编码格式化 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar toUnicode = String.prototype.toUnicode = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        _this = arguments[0] || this; \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction f() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn \"\u0026#\" +\n        arguments[0].charCodeAt(0) + \"\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn _this.replace(/[^\\u0-\\uFF]|\\w/gmi, f); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003etoUnicode 是全局静态方法，同时也是 String 类型的方法，为此在函数体内首先判断方法的参数值，以决定执行操作的方式。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar toUnicode = String.prototype.toUnicode = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        _this = arguments[0] || this; \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction f() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn \"\u0026#\" +\n        arguments[0].charCodeAt(0) + \"\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn _this.replace(/[^\\u0-\\uFF]|\\w/gmi, f); \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar s = \"javascript 中国 \"; \u003c/span\u003e\u003cspan class=\"p2\"\u003es = toUnicode(s);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s); \u003cspan class=\"r\"\u003e//\n            \u0026#106;\u0026#97;\u0026#118;\u0026#97;\u0026#115;\u0026#99;\u0026#114;\u0026#105;\u0026#112;\u0026#116;\u0026#32;\u0026#20013;\u0026#22269; \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(s); \u003cspan class=\"r\"\u003e// \"javascript 中国 \" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 下面是用 fromCharCode() 定义一个解码函数： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar formUnicode = String.prototype.formUnicode = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar _this =\n        arguments[0] || this; \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction f() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        String.fromCharCode(arguments[1]); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn _this.replace(/\u0026#(\\d*);/igm, f); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar toUnicode = String.prototype.toUnicode = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        _this = arguments[0] || this; \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction f() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn \"\u0026#\" +\n        arguments[0].charCodeAt(0) + \"\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn _this.replace(/[^\\u0-\\uFF]|\\w/gmi, f); \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar formUnicode = String.prototype.formUnicode = function() {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar _this = arguments[0] || this; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efunction f() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn String.fromCharCode(arguments[1]); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn _this.replace(/\u0026#(\\d*);/igm, f); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar s = \"javascript 中国 \"; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003es = toUnicode(s); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s); \u003c
