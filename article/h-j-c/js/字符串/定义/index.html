  <script id="_next_DATA__"
    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 定义字符串 \u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e 字符串直接量，使用双引号或单引号包含任意长度的文本 \u003c/li\u003e\n    \u003cli\u003e 构造字符串，使用 String() 构造函数可以构造字符串 \u003c/li\u003e\n    \u003cli\u003e 使用字符编码，使用 formCharCode() 方法可以将字符编码转换为字符串 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e 字符串直接量 \u003c/h6\u003e\n\u003cp\u003e 字符串由 Unicode 字符、数字、各种符号组合而成。字符串必须包裹在引号内。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 双引号内可包括单引号，单引号内可包括双引号 \u003c/li\u003e\n    \u003cli\u003e 字符串应在一行显示，禁止换行 \u003c/li\u003e\n    \u003cli\u003e 字符串中加特殊字符，需要加转义符号 \u003c/li\u003e\n    \u003cli\u003e 字符串中每个字符都有固定位置，类似于数组 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e 在 JavaScript 程序语言中，把对字符串的运算封装成 String 类。 String 类是字符串初始数据类型的封装器，它允许用户使用 String 类的方法和属性操作初始的字符串类型值。使用内建的全局函数\n    String() ，可以把其它类型的值转换为字符串。 \u003c/p\u003e\n\u003cp\u003eString 类的所有方法，除 concat 、 fromCharCode 、 slice 和 substr 之外，都是通用方法。这意味着在执行运算前，方法可以自己调用 this.toString ，用户也可以和其它非\n    String 类一起使用这些方法。 \u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 除此之外，还可以使用 RegExp\n        类对字符串进行正则表达式运算。正则表达式是一种语言，它是用于进行字符串文本匹配的工具，其出现为解决与字符串文本处理有关的许多常见任务提供了有效而简捷的方式。例如，用户可能经常使用搜索工具搜索硬盘上的所有 MP3\n        文件，就可以使用这样的字符串： \u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e(.*)\\.mp3\u003c/span\u003e\u003c/code\u003e\n    \u003cp\u003e 这将返回所有的 MP3 文件。用户也可能使用下面的字符串搜索文件： \u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eChapter?.doc\u003c/span\u003e\u003c/code\u003e\n    \u003cp\u003e 一般这将返回诸如 Chapter5.doc 、 Chapter8.doc 、 ChapterN.doc 、 ChapterX.doc 的文件。 \u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e 构造字符串 \u003c/h6\u003e\n\u003cp\u003e 使用 string() 也可以构造字符串，该函数可以接受一个参数，并把它作为初始值来初始化字符串。 \u003c/p\u003e\n\u003cp\u003e 通过 String() 构造函数构造的字符串和字符串直接量的类型是不同的。前者是引用型对象，后者是值类型的字符串。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s1 = new String(1); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar s2 = 1; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(typeof\n        s1); \u003cspan class=\"r\"\u003e// object \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(typeof s2);\n        \u003cspan class=\"r\"\u003e// string \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 使用字符编码 \u003c/h6\u003e\n\u003cp\u003e 使用 formCharCode() 方法可以将字符编码转化为字符串。该方法包括多个整数参数，每个参数代表字符的 Unicode 编码，返回值为字符编码的字符串表示。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar a = [35835, 32773, 24744, 22909], \u003c/span\u003e\u003cspan class=\"p4\"\u003eb = []; \u003c/span\u003e\u003cspan class=\"p2\"\u003efor\n        (var i in a) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eb.push(String.fromCharCode(a[i])) \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(b.join(\"\"))\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 也可以把所有字符按照顺序传递给 fromCharCode() 方法。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar b = String.fromCharCode(35835, 32773, 24744, 22909); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(b)\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 也可以使用 apply() 方法 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar var a = [35835, 32773, 24744, 22909]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b =\n        String.fromCharCode.apply(null, a); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(b);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 字符串的特殊 \u003c/h5\u003e\n\u003cp\u003eECMAScript 中的字符串是不可变的（ immutable ），意思是一旦创建，它们的值就不能变了。要修改 某个变量中的字符串值，必须先销毁原始的字符串，然后将包含新值的另一个字符串保存到该变量\n\u003c/p\u003e\n\u003cp\u003etoString() 方法可见于数值、布尔值、对象和字符串值。没错，字符串值也有 toString() 方法， 该方法只是简单地返回自身的一个副本。 null 和 undefined 值没有 toString() 方法。\n\u003c/p\u003e\n\u003cp\u003e 多数情况下， toString() 不接收任何参数。不过，在对数值调用这个方法时， toString() 可以接收一个底数参数，即以什么底数来输出数值的字符串表示。默认情况下， toString() 返回数值的十\n    进制字符串表示。而通过传入参数，可以得到数值的二进制、八进制、十六进制，或者其它任何有效基 数的字符串表示 。 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 字符串","title":"定义"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","字符串","定义"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
