    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 字符串大小写转换 \u003c/h5\u003e\n\u003cp\u003etoLowerCase() 方法可将字符串转化为小写， toUpperCase() 方法可将字符串转化为大写。 toLocaleLowerCase() 和 toLocaleUpperCase()\n    方法是本地化原型，它们能够按照本地的方式进行转化大、小写字母，由于只有极个别（如土耳其语）具有本地特有的大、小写映射，所以通常与 toLowerCase() 和 toUpperCase() 返回的值一样。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s.toUpperCase()); \u003cspan class=\"r\"\u003e//\n            JAVASCRIPT \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 字符串比较 \u003c/h5\u003e\n\u003cp\u003ejavascript 能够根据字符的 Unicode 编码大小就行比较字符串 。 \u003c/p\u003e\n\u003cp\u003e 使用字符串的 localeCompare() 方法，可以根据本地约定的顺序进行比较两个字符串的大小。 localeCompare （）方法包括一个参数，指定要比较的目标字符串，如果当前字符串小于要比较的字符串，则但会小于 0\n    的数；如果大于参数字符串，返回大于 0 的数。如果相等，或根据本地排序约定没有区别，则返回 0 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ealert(\"a\" \u0026gt; \"A\"); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 如果为 localeCompare() 方法指定的字符小于参数字符，则 localeCompare() 返回小于 0 的数，如果为该方法指定的字符大于参数字符，则返回大于 0\n    的数，如果两个字符串相等，或根据本地排序规则没有区别，则返回 0 。对于一般的计算机来说，默认的排序约定都是按照字符编码来实现的。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = s.split(\"\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar s1 =\n        a.sort(function(a, b) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn a.localeCompare(b); \u003c/span\u003e\u003cspan class=\"p2\"\u003e});\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ea = s1.join(\"\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(a); \u003cspan class=\"r\"\u003e// \"aaciJprStv\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 字符串与数组转化 \u003c/h5\u003e\n\u003cp\u003e 使用字符串的 split() 方法可以根据指定的分隔符将字符串转化为数组。 \u003c/p\u003e\n\u003cp\u003e 如果使用数组的 join() 方法，可以把数组链接为支付串。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 如果是空字符串，则 split() 能够将单个字符进行分割 \u003c/li\u003e\n    \u003cli\u003e 如果是正则表达式，则 split() 方法能够以匹配文本作为字符串进行分割 \u003c/li\u003e\n    \u003cli\u003esplit() 支持第二个参数，该参数为可选参数，用来指定返回数组的最大长度。如果设置了这个参数，则返回的数组长度不会大于这个参数的指定值。如果没有该参数，整个字符串都会被分割，而不考虑长度 \u003c/li\u003e\n    \u003cli\u003e 如果返回的数组包含分隔符或分隔符的一个或多个部分，可以使用带有子表达式的正则表达式来实现 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003esplit 方法 \u003c/h6\u003e\n\u003cp\u003esplit() 方法将一个字符串分割为子字符串，然后将结果作为字符串数组返回。在 oString 中每个出现 separator 的位置都要进行分解，但 separator 本身不作为任何数组元素的部分返回。其语法格式如下：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoString.split([separator[,limit]])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 参数说明： \u003c/p\u003e\n\u003cp\u003e 参数 separator 是可选项，值是一个字符串或者正则表达式对象，它标识了分隔字符串时使用的是一个还是多个字符。如果忽略该选项，返回包含整个字符串的单一元素数组。 \u003c/p\u003e\n\u003cp\u003e 参数 limit 也是可选项，参数值是整数，用来限制返回数组中的元素个数。 \u003c/p\u003e\n\u003cp\u003e 例如下面的代码，将使用空白分割字符串： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar oString = \"ECMAScript version 5.0 provides many new features.\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        RegExp = /\\s/g; \u003cspan class=\"r\"\u003e// 定义正则表达式模式文字 , 这里是匹配空白 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        oArray = oString.split(re); \u003cspan class=\"r\"\u003e// 用空白分割字符串 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 写出结果 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(oArray.toString());\u003cspan\n            class=\"r\"\u003e//\"ECMAScript,version,5.0,provides,many,new,features.\"\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这将会返回如下的结果： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eECMAScript,version,5.0,provides,many,new,features.\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 如果将前面的 split 应用改为如下的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 用空白分割字符串，但仅返回前 5 个结果 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p \"\u003evar oArray = oString.split(re,5);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 将会返回如下的结果： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eECMAScript,version,5.0,provides,many\u003c/span\u003e\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 参数为空字符串 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = s.split(\"\"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(s.length); \u003cspan class=\"r\"\u003e// 10 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a.length); \u003cspan\n            class=\"r\"\u003e// 10 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 参数为空 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = s.split(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(s.length); \u003cspan class=\"r\"\u003e// 10 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a.length); \u003cspan\n            class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 参数为正则表达式 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"a2b3c4d5e678f12gt\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = s.split(/\\d+/);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a); \u003cspan class=\"r\"\u003e// \"a,b,c,d,e,f,gt\" \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(a.length); \u003cspan class=\"r\"\u003e// 7 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 设置第二参数，且小于截取后结果长度 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = s.split(\"\", 4); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(s.length); \u003cspan class=\"r\"\u003e// 10 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a.length); \u003cspan\n            class=\"r\"\u003e// 4 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a); \u003cspan class=\"r\"\u003e// J,a,v,a \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 清空两侧空字符 \u003c/h5\u003e\n\u003cp\u003etrim() 为新增的原型方法，用于清空前导空字符、尾随空字符和行终止符。 \u003c/p\u003e\n\u003ch5\u003e 全局方法 \u003c/h5\u003e\n\u003cp\u003etoString() 方法将一个数字作为字符串返回 .toString() 方法可以可选地接受一个参数（这是 2 和 36 之间的一个整数），将其作为数制的基数值使用。随后，字符串转换过程也会基于这个基数来转换数字。 \u003c/p\u003e\n\u003cp\u003etoFixed() 方法也返回一个字符串，但数字是按照指定的小数位数的形式出现的。 \u003c/p\u003e\n\u003cp\u003etoExponential() 方法数字将会进行舍入并且用指数表示法来表示。传递给该方法的参数指定了转换之后小数点后面的字符数字。 \u003c/p\u003e\n\u003ch5\u003e 字符串方法 \u003c/h5\u003e\n\u003ctable id=\"td_a\"\u003e\n    \u003ccaption\u003estring 对象的一些常用方法 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"20%\"\u003e 方法 \u003c/th\u003e\n        \u003cth width=\"20%\"\u003e 使用 \u003c/th\u003e\n        \u003cth\u003e 描述 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e 在 JavaScript 中，字符串是不可变的（ immutable ），换句话说，不能修改它们。所做的这一切，都是基于已有字符串的副本来生成一个新的字符串。不可变性不仅适用于字符串， JavaScript\n    中的数字也是不可变的。 \u003c/p\u003e\n\u003ch5\u003e 字符连接 \u003c/h5\u003e\n\u003cp\u003e 使用字符串的加号运算符，或是运用 字符串的 concat() 方法将多个参数添加到指定字符串的结尾。在特定的操作环境，也可以借助 join() 方法链接字符串。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s1 = \"abc\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar s2 = \"def\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s1\n        + s2); \u003cspan class=\"r\"\u003e// \"abcdef\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 也可以使用 concat() 方法进行连接： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s1 = \"abc\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar s2 = s1.concat(\"d\", \"e\", \"f\");\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s2); \u003cspan class=\"r\"\u003e// \"abcdef\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在实际开发中，建议直接使用加号进行连接。当操作的字符串容量较大时，如 HTML 字符串输出，还可以考虑使用数组来实现。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript\", \u003c/span\u003e\u003cspan class=\"p4\"\u003ea = []; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar d\n        = new Date(), \u003c/span\u003e\u003cspan class=\"p4\"\u003eb = d.getMilliseconds(); \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i = 0; i\n        \u0026lt; 10000; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ea.push(s); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar str = a.join(\"\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003ea = null; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003evar d = new Date(), \u003c/span\u003e\u003cspan class=\"p4\"\u003ec = d.getMilliseconds(); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(c\n        - b); \u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 一些方法 \u003c/h6\u003e\n\u003cp\u003e 另外，还要注意字符串文字和 String 对象的比较问题，可以参考前面关于全等运算符的介绍。 \u003c/p\u003e\n\u003ctable id=\"td_b\"\u003e\n    \u003ccaption\u003eString 类的方法和说明 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 方法 \u003c/th\u003e\n        \u003cth\u003e 嗯 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e 除了这些方法外， String 类还有一个属性，虽然只有一个，但是非常重要，这就是 length 属性，该属性用来返回字符串中字符的数量（中文字符虽然是双字节，也算是一个单字符）。 \u003c/p\u003e\n\u003ch5\u003e 字符串包含方法 \u003c/h5\u003e\n\u003cp\u003eECMAScript 6 增加了 3 个用于判断字符串中是否包含另一个字符串的方法： startsWith() 、 endsWith() 和 includes()\n    。这些方法都会从字符串中搜索传入的字符串，并返回一个表示是否包含 的布尔值。它们的区别在于， startsWith() 检查开始于索引 0 的匹配项， endsWith() 检查开始于索 引 (string.length -\n    substring.length) 的匹配项，而 includes() 检查整个字符串 .\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet message = \"foobarbaz\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(message.startsWith(\"foo\")); \u003cspan\n            class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(message.startsWith(\"bar\")); \u003cspan class=\"r\"\u003e//\n            false \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(message.endsWith(\"baz\")); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(message.endsWith(\"bar\")); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(message.includes(\"bar\")); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(message.includes(\"qux\")); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003estartsWith() 和 includes() 方法接收可选的第二个参数，表示开始搜索的位置。如果传入第二 个参数，则意味着这两个方法会从指定位置向着字符串末尾搜索，忽略该位置之前的所有字符。\n\u003c/p\u003e\n\u003ch5\u003erepeat() 方法 \u003c/h5\u003e\n\u003cp\u003eECMAScript 在所有字符串上都提供了 repeat() 方法。这个方法接收一个整数参数，表示要将字 符串复制多少次，然后返回拼接所有副本后的结果。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet stringValue = \"ni \"; \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(stringValue.repeat(16)\n        + \"shi pig\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// ni ni ni ni ni ni ni ni ni ni ni ni ni ni ni ni shi\n            pig \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003epadStart() 和 padEnd() 方法 \u003c/h5\u003e\n\u003cp\u003epadStart() 和 padEnd() 方法会复制字符串，如果小于指定长度，则在相应一边填充字符，直至 满足长度条件。这两个方法的第一个参数是长度，第二个参数是可选的填充字符串，默认为空格 （ U+0020 ）。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet stringValue = \"pig\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(stringValue.padStart(6));\n        \u003cspan class=\"r\"\u003e// \"pig\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(stringValue.padStart(9, \".\")); \u003cspan\n            class=\"r\"\u003e// \"......pig\" \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(stringValue.padEnd(6)); \u003cspan class=\"r\"\u003e// \"pig\" \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(stringValue.padEnd(9, \".\")); \u003cspan class=\"r\"\u003e// \"pig......\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 字符串迭代与解构 \u003c/h6\u003e\n\u003cp\u003e 字符串的原型上暴露了一个 @@iterator 方法，表示可以迭代字符串的每个字符。可以像下面这样 手动使用迭代器。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet message = \"abc\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003elet stringIterator =\n        message[Symbol.iterator](); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(stringIterator.next()); \u003cspan class=\"r\"\u003e//\n            {value: \"a\", done: false} \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(stringIterator.next()); \u003cspan\n            class=\"r\"\u003e// {value: \"b\", done: false} \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(stringIterator.next()); \u003cspan class=\"r\"\u003e// {value: \"c\", done: false}\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(stringIterator.next()); \u003cspan class=\"r\"\u003e// {value: undefined,\n            done: true} \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 在 for-of 循环中可以通过这个迭代器按序访问每个字符： \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efor (const c\n        of\n        \"abcde\") { \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(c); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan\n            class=\"r\"\u003e// a \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// b \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// c \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// d \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// e \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eeval()\u003c/h5\u003e\n\u003cp\u003e 通过 eval() 定义的任何变量和函数都不会被提升，这是因为在解析代码的时候，它们是被包含在 一个字符串中的。它们只是在 eval() 执行的时候才会被创建。 \u003c/p\u003e\n\n\u003cscript\u003e\n    var td_a = [\n        [\"concat\", \"str1.concat(str2);\", \"  连接字符串  \"],\n        [\"indexOf\", \"str1.indexOf(k)\", \"  返回指定值在字符串出现的第一个位置  \"],\n        [\"lastIndexOf\", \"\", \"  返回指定值在字符串出现的最后的位置  \"],\n        [\"replace\", \"\", \"  在一个字符串里搜索指定的字符串  ,  并且新的字符串代替  \"],\n        [\"split\", \"\", \"  把字符串分解成一系列子串  ,  保存在数组里  ;  返回一个新数组  \"],\n        [\"substr\", \"\", \"  从指定位置  ,  提取指定数量的字符组成字符串  \"],\n        [\"toLowerCase\", \"\", \"  把字符串转化成小写  \"],\n        [\"toUpperCase\", \"\", \"  把字符串转化成大写字符  \"],\n    ];\n    var td_b = [\n        [\"charAt()\", \"  返回字符串中指定索引位置处第一个字符  \"],\n        [\"charCodeAt()\", \"  返回给定索引号处的  Unicode  代码点值，该值介于  0-65535  之间的整数。该方法是  formCodeAt()  的相反方法，  \"],\n        [\"concat()\", \"  组合两个字符串文本，并返回新的字符串  \"],\n        [\"fromCodeAt()\", \"  返回一个由参数指定的  Unicode  代码点值代表的字符  \"],\n        [\"indexOf()\", \"  查找字符串并返回参数中指定的索引，如果出现多次，则返回第一次出现位置，若未找到，返回  -1\"],\n        [\"lastIndexOf()\", \"  返回子字符串在字符串中指定开始位置前最后一次出现索引的位置，如果找不到返回  -1\"],\n        [\"localeCompare()\", \"  比较两个或更多字符串的排列顺序，并返回整数形式的结果  \"],\n        [\"slice()\", \"  提取字符串中一部分，并作为新字符串返回  \"],\n        [\"split()\", \"  通过把字符串分割成子字符串，把字符串对象分割成子字符串组成的数组  \"],\n        [\"substring()\", \"  返回参数中指定两个索引值之间的字符串  \"],\n        [\"toJSON()\", \"  序列转化为  JSON  格式字符串返回，等同于  JSON.stringify()  方法  \"],\n        [\"toString()\", \"  返回  Strong  对象的初始值  \"],\n        [\"trim()\", \"  删除字符串两端的空白  \"],\n        [\"valueOf()\", \"  返回字符串的初始值  \"]\n    ];\n    _MiMethod.td(\"td_a\");\n    _MiMethod.td(\"td_b\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 字符串","title":"方法"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","字符串","方法"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
