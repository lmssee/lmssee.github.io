="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>查找</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            }
                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 字符串查找 \u003c/h5\u003e\n\u003ch6\u003e 使用 String 类处理字符串 \u003c/h6\u003e\n\u003cp\u003e 使用构造方法 new String （ value ）或文字字符串值，可以调用 String 类的所有成员。如果指定字符串文字， JavaScript 解释引擎会自动将其转换成临时 String\n    对象，然后调用其方法，最后清除临时 String 对象。用户也可以使用字符串文字的 String.length 属性。 \u003c/p\u003e\n\u003cp\u003e 不要混淆字符串文字和 String 实例，这是很重要的。在下面的代码中，代码的第一行创建了一个字符串文字 s1 ，代码的第二行创建了一个 String 实例 s2 ： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar s1 = \"foo\";\u003c/span\u003e\u003cspan class=\"p\"\u003evar s2 = new String(\"foo\");\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 除非确实需要使用 String 对象（因为 String 对象可以有反常规的行为），否则建议使用字符串文字。例如下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar s1 = \"; + 2\"; // 设置一个字符串文字 \u003c/span\u003e\u003cspan class=\"p\"\u003evar s2 = new String(\"2 + 2\");\n        \u003cspan class=\"r\"\u003e// 设置一个 String 对象 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003eeval(s1); \u003cspan class=\"r\"\u003e// 返回数字\n            4\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003eeval(s2); \u003cspan class=\"r\"\u003e// 返回字符串 \"2 + 2\";\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 对于 U+0000~U+FFFF 范围内的字符， length 、 charAt() 、 charCodeAt() 和 fromCharCode() 返回的结果都跟预期是一样的。这是因为在这个范围内，每个字符都是用 16\n    位表示的，而这几个方法 也都基于 16 位码元完成操作。只要字符编码大小与码元大小一一对应，这些方法就能如期工作。 \u003c/p\u003e\n\u003cp\u003e 这个对应关系在扩展到 Unicode 增补字符平面时就不成立了。问题很简单，即 16 位只能唯一表示 65 536 个字符。这对于大多数语言字符集是足够了，在 Unicode 中称为基本多语言平面（ BMP ）。为了\n    表示更多的字符， Unicode 采用了一个策略，即每个字符使用另外 16 位去选择一个增补平面。这种每个 字符使用两个 16 位码元的策略称为代理对。 \u003c/p\u003e\n\u003ch6\u003e 字符串查找 \u003c/h6\u003e\n\u003ctable id=\"td_c\"\u003e\n    \u003ccaption\u003eString() 类型的查找字符串的方法 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 字符串方法 \u003c/th\u003e\n        \u003cth\u003e 说明 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp class=\"p4\"\u003e 扩展原型，将字符串转换为数组，将每一个字符变成数组元素 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eString.prototype.toArray = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar l = this.length,\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ea = []; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (l) { \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (var i = 0; i \u0026lt;\n        l; i++) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ea.push(this.charAt(i)); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn a; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003echarCodeAt() 和 charAt() 方法操作类似，不过它返回的是指定位置的字符编码。如果指定位置下标值为负数，或者大于等于字符串长度，则返回 NaN ，而不是 0 。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e 查找字符串的位置 \u003c/p\u003e\n\u003cp\u003echarAt() 和 charCodeAt() 是按照数组下标查找字符，而 indexOf() 和 lastIndexOf() 是按照字符串查找下标。 \u003c/p\u003e\n\u003cp\u003eindexOf() 有两个参数，第一个为查找的子字符串，第二个参数为查找的起始位置。取值在 0 ~ length-1 ，对于该方法。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"javascript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar i = s.indexOf(\"a\", -10);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(i); \u003cspan class=\"r\"\u003e// 返回 1 ，即第二个字符 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003elastIndexOf() 方法的查找顺序是从右到左，但是其参数和返回值都是根据字符串的下标从左到右的顺序来计算的。 \u003c/p\u003e\n\u003c/div\u003e\n\u003cp class=\"p4\"\u003e 匹配字符串 \u003c/p\u003e\n\u003cp\u003esearch() 方法和 indexOf() 方法相似，查找字符串第一次出现的位置。但它仅有一个参数，即指代的匹配模式，没有 lastIndexOf() 的方向匹配功能，不支持全局模式。用法不如 lastIndexOf()\n    灵活。 \u003c/p\u003e\n\u003cp\u003esearch() 方法指明是否存在相应的匹配。如果找到一个匹配，那么返回一个整数值，指明这个匹配距离字符串开始的索引位置；如果没有找到匹配，则返回 -1 。其语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoString.search(re)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 参数 re 既可以是包含正则表达式模式或正则表达式对象，也可以是 String 对象或文字。如果 re 不是正则表达式对象，它将被转换为字符串，并进行精确的查找。如果参数是正则表达式或正则表达式对象，该方法将忽略全局标示（\n    g\n    ），并忽略此正则表达式的 lastIndex 属性（保持其值不变）。 \u003c/p\u003e\n\u003cp\u003e 例如下面的代码，将搜索字符串中的空白： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar oString = \"ECMAScript version 5.0 provides many new features.\";\u003c/span\u003e\u003cspan class=\"p\"\u003evar re =\n        /\\s/g; \u003cspan class=\"r\"\u003e// 定义正则表达式模式文字，这里是匹配空白 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003evar index =\n        oString.search(re); \u003cspan class=\"r\"\u003e// 搜索空白，返回第一个索引位置 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 写出结果 \u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(index);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这将会返回如下的结果： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e10\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003ematch() 方法能够找到所有的匹配的子字符串，并储存在数组中返回。 \u003c/p\u003e\n\u003cp\u003ematch() 方法使用正则表达式模式对字符串执行查找，并将包含查找的结果作为数组返回。其语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoString.match(re)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 参数说明： \u003c/p\u003e\n\u003cp\u003e 参数 oString 指对其进行查找的 String 对象或字符串文字。 \u003c/p\u003e\n\u003cp\u003e 参数 re 是一个 RegExp 对象，也可以是包含正则表达式模式和可用标志的变量名或字符串文字。 \u003c/p\u003e\n\u003cp\u003e 如果 match() 方法没有找到匹配，则返回 null ；如果找到匹配，则返回一个数组并且更新 RegExp 对象的属性以反映匹配结果。 \u003c/p\u003e\n\u003cp\u003ematch() 方法返回的数组包含： input 和 index 两个属性，并可以使用数组元素访问运算符和保存的结果。 \u003c/p\u003e\n\u003cp\u003e 如果没有设置全局标志（ g ），数组的 0 索引元素包含整个匹配，而第 1~n 元素包含了匹配中曾出现过的任一个子匹配。这相当于没有设置全局标志的 exec() 方法。如果设置了全局标志，元素 0~n 中包含所有匹配。\n\u003c/p\u003e\n\u003cp\u003e 例如下面的代码进行匹配，并将结果保存在数组中： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar oString = \"ECMAScript version 5.0 provides many new features.\";\u003c/span\u003e\u003cspan class=\"p\"\u003evar re =\n        /\\w+/g; \u003cspan class=\"r\"\u003e// 定义正则表达式模式文字 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003evar oArray =\n        oString.match(re); \u003cspan class=\"r\"\u003e// 进行匹配测试，数组用来保存匹配的结果 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 写出结果 \u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(oArray.toString());\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这将会返回如下的结果： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eECMAScript,version,5,0,provides,many,new,features\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 如果不使用全局标志（ g ），那么实际仅返回第一个匹配。例如下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar oString =\u003c/span\u003e\u003cspan class=\"p\"\u003e\"ECMAScript version 5.0 provides many new\n        features.\";\u003c/span\u003e\u003cspan class=\"p\"\u003evar re = /\\w+/; \u003cspan class=\"r\"\u003e// 定义正则表达式模式文字 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003evar oArray = oString.match(re); \u003cspan class=\"r\"\u003e// 进行匹配测试，数组用来保存匹配的结果 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 写出结果 \u003c/span\u003e\u003cspan class=\"p\"\u003edocument.write(oArray.toString());\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这将会返回如下的结果： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eECMAScript\u003c/span\u003e\u003c/code\u003e\n\n\u003cscript\u003e\n    var td_c = [\n        [\"charAt()\", \"  返回字符串的第  n  个字符  \"],\n        [\"charCodeAt()\", \"  返回字符串的第  n  个字符的代码  \"],\n        [\"indexOf()\", \"  检索字符串  \"],\n        [\"lastIndexOf()\", \"  从后向前检索一个字符串  \"],\n        [\"match()\", \"  找到一个或多个正则表达式的匹配  \"],\n        [\"search()\", \"  检索与正则表达式相匹的子串  \"]\n    ];\n    _MiMethod.td(\"td_c\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 字符串","title":"查找"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","字符串","查找"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
