    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 字符串的截取 \u003c/h5\u003e\n\u003ch6\u003e 截取指定长度字符串 \u003c/h6\u003e\n\u003cp\u003esubstr() 方法能够根据指定的长度来截取子字符串。它包含两个参数，第一个表示开始截取的下标，第二个参数表示截取的长度。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"https: // lmssee.cn/index.html\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a =\n        s.substr(s.lastIndexOf(\".\") + 1, 4); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a); \u003cspan class=\"r\"\u003e// html\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003e 如果省略第二个参数，则表示从起始位置截取到尾部的所有字符 \u003c/li\u003e\n    \u003cli\u003e 如果第一个参数是负数，则从后向前数 \u003c/li\u003e\n    \u003cli\u003e 但是， ECMAScript 不推荐使用该方法，详细见 slice() 和 substring() 方法 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e 截取起止下标位置字符串 \u003c/h6\u003e\n\u003cp\u003eslice() 和 substring() 方法都是根据指定的位置来截取子字符串。它们都包含两个参数，第一个为起始位置，第二个为终止位置。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"https: // www.lmssee.cn/index.html\";\u003c/span\u003e\u003cspan class=\"p2\"\u003evar a =\n        s.indexOf(\"www\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = s.indexOf(\"\\/\", a); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar c =\n        s.substring(a, b); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar d = s.slice(a, b); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(c); \u003cspan class=\"r\"\u003e// www.lmssee.cn\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(d); \u003cspan class=\"r\"\u003e// www.lmssee.cn \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(c\n        == d); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003e 截取的字符串包括第一个参数指定的字符，不包含第二个参数的字符串 \u003c/li\u003e\n    \u003cli\u003e 第二个参数如果省略，则截取到尾部 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"p4\"\u003e 如果第二个参数值比第一个还小，则 substring() 会先交换两个参数，而对于 slice() 来说，就是无效的，返回空的字符串 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"https: // www.lmssee.cn/index.html\";\u003c/span\u003e\u003cspan class=\"p2\"\u003evar a =\n        s.indexOf(\"www\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = s.indexOf(\"\\/\", a); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar c =\n        s.substring(b, a); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar d = s.slice(b, a); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(c); \u003cspan class=\"r\"\u003e// www.lmssee.cn\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(d); \u003cspan class=\"r\"\u003e// \"\" \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(c == d);\n        \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 如果参数值为负值， slice() 会把负号解释为从右侧开始定位，这与 Array 中的 slice() 方法是相同的但是 substring() 将其视为无效，并返回空的字符串。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"https: // www.lmssee.cn/index.html\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a =\n        s.indexOf(\"www\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = s.indexOf(\"\\/\", a); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar c =\n        s.substring(-b, -a); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar d = s.slice(-b, -a); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(c); \u003cspan class=\"r\"\u003e// \"\"\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(d); \u003cspan class=\"r\"\u003e// .lmssee.cn/in \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(c\n        == d); \u003cspan class=\"r\"\u003e// false \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 使用 replace() 方法 \u003c/h5\u003e\n\u003cp\u003ereplace （）的第二个参数是一个函数， replace （）方法给其传递多个实参，这些参数包含一定的意义 。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 第一个参数表示匹配模式匹配的文本 \u003c/li\u003e\n    \u003cli\u003e 其后的参数是匹配中子表达式相匹配的字符串，参数个数不限，根据子表达式而定 \u003c/li\u003e\n    \u003cli\u003e 后面的参数是一个整数，表示匹配文本在字符串中的下标位置 \u003c/li\u003e\n    \u003cli\u003e 最后一个参数表示字符串本身 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e 也就是说，如果不是函数传递形参，直接调用函数的 arguments 属性，同样可以读取到正则表达式中相关匹配的文本信息。 \u003c/p\u003e\n\u003cp\u003ereplace() 方法可以替换指定的子字符串，它包含两个参数，第一个表示执行的正则表达式，第二个表示准备替换掉的子字符串。 \u003c/p\u003e\n\u003cp\u003ereplace() 方法根据正则表达式进行文字替换，然后返回替换后的字符串的副本，其语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoString.replace(re,replaceText)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 参数说明： \u003c/p\u003e\n\u003cp\u003e 参数 RegExp 既可以是包含正则表达式模式或可用标志的正则表达式对象，也可以是 String 对象或文字。如果 RegExp 不是正则表达式对象，它将被转换为字符串，并进行精确的查找。 \u003c/p\u003e\n\u003cp\u003e 参数 replaceText 是一个 String 对象或字符串文字，对于 oString 中每个匹配 RegExp 中的位置都用该对象所包含的文字加以替换。该参数也可以是返回文本数据的函数。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar b = s.replace(\"html\", \"htm\"); \u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"https:\\/\\/lmssee.cn/index.html\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction f(x) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn x.substring(x.lastIndexOf(\".\") + 1, x.length - 1); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = s.replace(/(html)/, f(s)); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(b); \u003cspan class=\"r\"\u003e// \"https:\\/\\/lmssee.cn/index.htm\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 重复 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = s.replace(/.*/, \"$\u0026$\u0026\"); \u003cspan class=\"r\"\u003e//\n            JavaScriptJavaScript \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 左侧文本复用 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = s.replace(/script/i, \"$\u0026 !=\n        $`\"); \u003cspan class=\"r\"\u003e// JavaScript != Java \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 右侧文本复用 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = s.replace(/java/i, \"$\u0026$' is\n        \"); \u003cspan class=\"r\"\u003e// JavaScript is Script \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 使用 $ 替换变量 \u003c/h5\u003e\n\u003cp\u003e 在需要动态决定替换字符串的文本时可以使用匹配变量，它们都能用来识别最新的匹配以及找出匹配的字符串。 \u003c/p\u003e\n\u003ctable id=\"td_a\"\u003e\n    \u003ccaption\u003eRegExp 静态属性 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"20%\"\u003e 长名 \u003c/th\u003e\n        \u003cth width=\"25%\"\u003e 短名 \u003c/th\u003e\n        \u003cth\u003e 说明 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var td_a = [\n        [\"index\", \"\\$_\", \"  是当前表达式模式首次匹配内容的开始位置，从  0  开始计数。其初始值为  -1  。每次成功匹配时，   index  属性值都会随之改变。  \"],\n        [\" input\", \"\", \"  返回当前所作用的字符串，可以简写为＄   _  ，其初始值为空字符串  \\\"\\\"  。  \"],\n        [\"lastIndex\", \"\", \"  是当前表达式模式首次匹配内容中最后一个字符的下一个位置，从  0  开始计数，常被作为继续搜索时的起始位置。其初始值为  -1  ，表示从起始位置开始搜索。每次成功匹配时，   lastIndex  属性值都会随之改变。   \"],\n        [\" lastMatch\", \"\\$\\\u0026\", \"  是当前表达式模式的最后一个匹配字符串，可以简写为＄＆。其初始值为空字符串  \\\"\\\"  。每次成功匹配时，   lastMatch  属性值都会随之改变。  \"],\n        [\" lastParen\", \"\\$+\", \"  如果表达式模式中有括起来的子匹配，是当前表达式模式中最后的子匹配所匹配到的子字符串，可以简写为＄  +  ，其初始值为空字符串  \\\"\\\"  。每次成功匹配时，   lastParen  属性值都会随之改变。   \"],\n        [\"leftContext\", \"\\$\\`\", \"  是当前表达式模式最后一个匹配字符串左边的所有内容，可以简写为＄  '  （其中  \\\"\\'\\\" 为键盘上 \\\"Esc\\\"  键下边的反单引号），其初始值为空字符串  \\\"\\\"  。每次成功匹配时，其属性值都会随之改变。   \"],\n        [\"rightContext\", \"\\\u0026\\'\", \"  是当前表达式模式最后一个匹配字符串右边的所有内容，可以简写为＄  '  ，其初始值为空字符串  \\\"\\\"  。每次成功匹配时，其属性值都会随之改变。  \"],\n        [\"   ＄   1...  ＄   9\", \"\\$1~\\$9\", \"  这些属性是只读的。如果表达式模式中有括起来的子匹配，＄   1...  ＄   9  属性值分别是第  1  个到第  9  个子匹配所捕获到的内容。如果有超过  9  个以上的子匹配，＄   1...  ＄   9  属性分别对应最后的  9  个子匹配。在一个表达式模式中，可以指定任意多个带括号的子匹配，但  RegExp  对象只能存储最后的  9  个子匹配的结果。在  RegExp  实例对象的一些方法所返回的结果数组中，可以获得所有圆括号内的子匹配结果。   \"],\n        [\"$$\", \"$$\", \"  表示  $\"]\n    ];\n    _MiMethod.td(\"td_a\");\n\u003c/script\u003e\n\u003cp\u003e 例如下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar oString = \"flip-flop\";\u003c/span\u003e\u003cspan class=\"p\"\u003evar RegExp = /(\\w+)-(\\w+)/g; \u003cspan class=\"r\"\u003e//\n            定义正则表达式模式文字 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003eoString =\n        oString.replace(re,\";$1-$2\");\u003c/span\u003e\u003cspan class=\"p\"\u003e// $1 表示第一个 \\w+ ， $2 表示第二个 \\w+ ，第一个 \\w+ 匹配 flip ，第二个 \\w+\n        匹配 flop ， \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 所以 $1-$2 相当于 flip-flop\u003c/span\u003e\u003cspan class=\"p\"\u003e// 写出结果 \u003c/span\u003e\u003cspan\n        class=\"p\"\u003edocument.write(oString);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这将会返回如下的结果： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eflip-flop\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 如果改变参数 replaceText 的值，例如下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eoString = oString.replace(re,\";$1-$1\");\u003c/span\u003e\u003cspan class=\"p\"\u003e// $1-$1 等同于\n        flip-flip\u003c/span\u003e\u003cspan class=\"p\"\u003eoString = oString.replace(re,\";$2-$2\");\u003c/span\u003e\u003cspan class=\"p\"\u003e// $2-$2 等同于\n        flop-flop\u003c/span\u003e\u003cspan class=\"p\"\u003e 再来看下面的代码，这将会把带有空格的字符串倒置： \u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar oString = \"flip flop\";\u003c/span\u003e\u003cspan class=\"p\"\u003e// 定义正则表达式模式文字，注意区分大小写 \u003c/span\u003e\u003cspan class=\"p\"\u003evar\n        RegExp = /(\\S+)(\\s+)(\\S+)/g;\u003c/span\u003e\u003cspan class=\"p\"\u003eoString =\n        oString.replace(re,\";$3$2$1\");\u003c/span\u003e\u003cspan class=\"p\"\u003e// $1 表示第一个 \\S+ ， $3 表示第二个 \\S+ ， $2 表示 \\s+\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 所以 $3$2$1 相当于 flop flip\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 写出结果 \u003c/span\u003e\u003cspan class=\" p\"\u003edocument.write(oString); \u003cspan class=\"r\"\u003e// 返回 flop\n            flip\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在 replace （）方法中约定一个特殊的字符（ $ ），这个美元符号如果附加一个序号就表示对正则表达式中匹配的子表达式储存的字符串的引用。 \u003c/p\u003e\n\u003cp\u003e 例如下面的代码，将使用连字符替换字符串中的空白： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar oString =\u003c/span\u003e\u003cspan class=\"p\"\u003e\"ECMAScript version 5.0 provides many new\n        features.\";\u003c/span\u003e\u003cspan class=\"p\"\u003evar RegExp = /\\s/g; \u003cspan class=\"r\"\u003e//\n            定义正则表达式模式文字，这里是匹配空白 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003eoString = oString.replace(re, \";-\"); \u003cspan class=\"r\"\u003e//\n            用 - 替换空白，返回替换后的字符串 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 写出结果 \u003c/span\u003e\u003cspan class=\"p\"\u003edocument.write(oString);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这将会返回如下的结果： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eECMAScript-version-5.0-provides-many-new-features.\u003c/span\u003e\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 字符串","title":"替换"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","字符串","替换"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
