调用一次 \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction type() { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (count \u0026lt;= typingText.length)\n        {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 这里使用了 String.substring() 方法，目的是每次多获取一个字符 \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e// 注意变量 count 每次都是增加的，然后将这个值赋给 div 元素作为内容 \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 所以，每次都显示多一个字符 \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003eoBlock.innerHTML = typingText.substring(0, count); \u003c/span\u003e\u003cspan class=\"p8\"\u003ecount++; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e// 如果已经 type 完，那么就清除 200 毫秒的间隔调用 \u003c/span\u003e\u003cspan class=\"p8\"\u003ewindow.clearInterval(intervalID);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 每 200 毫秒调用一次 type()\n        函数 \u003c/span\u003e\u003cspan class=\"p4\"\u003evar intervalID = window.setInterval(type, 200); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cscript\u003e\n    var typing = '  打字机效果是最常见的动态效果，如果不使用程序来实现，那么工作量将会非常大，使用程序中  String  类可以非常轻松地实现这种效果。  ';\n    var count = 0;\n    var oBlock = document.getElementById('thisP'); function type_() {\n        if (count \u003c= typing.length) {\n            thisP.innerHTML = typing.substring(0, count);\n            count++;\n        } else {\n            window.clearInterval(this_T);\n        }\n    }\n    var this_T = window.setInterval(type_, 500);\n\u003c/script\u003e\n\u003cp\u003e 该范例主要是利用了间隔调用函数和 String.substring() 方法，每次调用 type() 函数，就使用 String.substring() 方法多读取一个字符，然后更新 div\n    元素内的文本。实际上不是每次
