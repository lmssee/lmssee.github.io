    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 字符串的值 \u003c/h5\u003e\n\u003cp\u003e 使用字符串的 toString() 方法可以返回字符串的值。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar s = \"JavaScript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = s.toSting(); \u003cspan class=\"r\"\u003e//\n            返回字符串 \"JavaScript\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 同样，可以使用 valueOf() 方法返回字符串的值。 \u003c/p\u003e\n\u003ch5\u003e 字符串的长度 \u003c/h5\u003e\n\u003cp\u003eJavaScript 字符串由 16 位码元（ code unit ）组成。对多数字符来说，每 16 位码元对应一个字符。换 句话说，字符串的 length 属性表示字符串包含多少 16 位码元 \u003c/p\u003e\n\u003cp\u003e 使用字符串的 length 可以读取字符串的长度，以字符个数计算。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar s = \"JavaScript\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(s.length);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 字符分单字节字符和双字节字符，所以可以扩展方法进行判断。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eString.prototype.lengthB = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar b = 0,\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003el = this.length; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (l) { \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (var i =\n        0; i \u0026lt; 1; i++) { \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (this.charCodeAt(i) \u0026gt; 255) { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003eb += 2 \u003c/span\u003e\u003cspan class=\"p8\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p10\"\u003eb++ \u003c/span\u003e\u003cspan class=\"p8\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn b \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ereturn 0 \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 检测单双字节，也可以使用正则表达式的方式进行验证。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efor (var i = 0; i \u0026lt; 1; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar c = this.charAt(i);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (/^[\\u0000-\\u00ff]/.test(c)) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eb++ \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n        else { \u003c/span\u003e\u003cspan class=\"p6\"\u003eb += 2 \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 字符串的 length 属性是只读属性，与数组的 length 不同，字符串可以使用位置下标来定位字符在字符串中的位置，其中第一个字符的下标是 0 ，最后一个字符的下标位置为 length - 1\n    。但是，双字节中的字符是不能被 for/in 语句枚举的。运算符 delete 也不能算出字符串的指定下标位置的字符。 \u003c/p\u003e\n\u003ch5\u003e 字符串连接 \u003c/h5\u003e\n\u003cp\u003e 连接字符串最简单的就是使用加号运算符，或使用 concat() 方法把多个参数连接起来，并返回新的字符串。 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 字符串","title":"值和长度"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","字符串","值和长度"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
