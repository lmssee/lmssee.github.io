    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 引用对象\u003c/h5\u003e\n\u003cp\u003e 在创建对象之后，可以把对象的地址赋值给变量，实现变量对对象的引用。当把变量赋值给其它的变量时，就可以实现多个变量引用同一对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eo = { \u003c/span\u003e\u003cspan class=\"p4\"\u003ex: 1, \u003c/span\u003e\u003cspan class=\"p4\"\u003ey: true \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eol = o; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(delete o); \u003cspan class=\"r\"\u003e// 返回\n            true ，说明删除成功\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(ol.x); \u003cspan class=\"r\"\u003e// 读取对象，显示 1\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(o.x); \u003cspan class=\"r\"\u003e// 使用 o 读取失败\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 但使用 var 声明 o 时，将不会被 delete 方法删除。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e 复制对象\u003c/h5\u003e\n\u003cp\u003e 就是利用 for/in 遍历对象，然后把对象每一个对象成员赋值给另一个对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction F(x, y) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x = x; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.y =\n        y; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.add = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn this.x\n        + this.y \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eF.prototype.mul = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn this.x * this.y \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar f = new F(2, 3); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar o = {}; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efor (var i in f) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eo[i] = f[i] \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(o.x); \u003cspan class=\"r\"\u003e//2\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(o.y);\n        \u003cspan class=\"r\"\u003e// 3\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(o.add()); \u003cspan class=\"r\"\u003e//\n            5 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(o.mul()) \u003cspan class=\"r\"\u003e// 6\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 对于上述的方法，还可以封装：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eFunction.prototype.extend = function(o) { \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i in o) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.constructor.prototype[i] = o[i]; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 复制对象实际上是通过反射机制复制对象的所有可枚举属性和方法来模拟继承。这种方法能够实现模拟多重继承。不过，它的缺点也很明显：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 由于是反射机制，复制法不能继承非枚举类型的所有的方法，对于系统核心对象的只读属性和方法也无法继承\u003c/li\u003e\n    \u003cli\u003e 通过反射机制来复制对象成员的执行效率会非常差。当对象结构庞大时，这种低效就越明显\u003c/li\u003e\n    \u003cli\u003e 如果包含同名成员，则有可能被动态复制覆盖掉\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e 克隆对象\u003c/h5\u003e\n\u003cp\u003e 克隆对象就是赋值，但是执行效率要高一些。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eFunction.prototype.clone = function(o) { \u003cspan class=\"r\"\u003e// 对象克隆方法\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efunction Temp() {}; \u003cspan class=\"r\"\u003e// 新建空构造函数\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003eTemp.prototype = o;\n        \u003cspan class=\"r\"\u003e// 把参数对象赋值给该构造函数的原型对象\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn new Temp() \u003cspan class=\"r\"\u003e// 返回实例化后的对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 调用 工具函数 clone() 。首先，为 Function 对象扩展一个方法，该方法能够把参数对象赋值给一个空的构造函数的原型对象，然后实例化构造函数，并返回实例对象，这样就把该对象拥有函数包含的所有成员。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar o = Function.clone(new F(2, 3)); \u003cspan class=\"r\"\u003e// 调用 Function\n            的克隆方法\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(o.x); \u003cspan class=\"r\"\u003e// 返回 2 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(o.y); \u003cspan class=\"r\"\u003e// 返回 3 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(o.add()); \u003cspan class=\"r\"\u003e// 返回 5 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(o.mul()) \u003cspan\n            class=\"r\"\u003e// 返回 6 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 然后，调用这个方法克隆对象。克隆方法返回的是一个空对象，不过它储存了指向给定对象的原型对象指针。这样既可以利用原型链来访问它们，从而在不同的对象之间实现继承。\u003c/p\u003e\n\u003ch5\u003e 销毁对象\u003c/h5\u003e\n\u003cp\u003eJavaScript 中有一套垃圾处理机制，能够自动回收无用的储存单元。当对象没有任何变量引用时， JavaScript 就会自动侦测，并运行垃圾回收程序把这些对象注销。以释放内存。\u003c/p\u003e\n\u003cp\u003e 每当对象执行完毕，垃圾回收机制就会自动被运行，释放函数所占用的资源，并释放局部变量。另外，将函数处于一种不可预知的状态时，也会被回收处理。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar o = { \u003cspan class=\"r\"\u003e// 创建对象，并引用该对象给变量 o \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ex: 1, \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ey: true \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eo = null; \u003cspan class=\"r\"\u003e// 定义对象引用变量为\n            null ，即废除对象\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ealert(o.x); \u003cspan class=\"r\"\u003e// 提示系统报错，找不到对象\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在设计中，对于不用的对象，应该把其引用变量都设置为 null ，以释放内存空间。这是一种很好的设计习惯，即节约了系统开支，又可以预防错误。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 对象","title":"操作对象"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","对象","操作对象"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
