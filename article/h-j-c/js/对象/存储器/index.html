class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>存储器</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 使用 get 和 set 存取器方法定义属性\u003c/h5\u003e\n\u003cp\u003e 一些属性，可以设置它们是否仅允许读取或仅允许设置，仅允许读取的属性称为只读属性，仅允许设置的属性称为只写属性，既允许读取又允许设置的属性称为读写属性。\u003c/p\u003e\n\u003cp\u003e 使用 this 或 prototype 定义的属性都是读写属性，要想实现单独的控制，就必须使用 get 和 set 存取器， get 和 set 存取器方法还分别被称为 getter 和 setter 。\u003c/p\u003e\n\u003ch6\u003e 基本的方法一般包含两个步骤：\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e 使用 var 关键字定义一个私有属性作为中间变量，外部不能访问该属性，但并不是必须的，仅适用于读写都定义的时候\u003c/li\u003e\n    \u003cli\u003e 使用 get 和 set 存取器方法定义读写权限\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Person(){\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.getSex = function(){\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        \"$1\";\u003c/span\u003e\u003cspan class=\"p2\"\u003e};\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这时，就仅可以读取属性 sex ，而不能将其写入，例如下面的访问将会出错：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar tom = new Person();\u003c/span\u003e\u003cspan class=\"p\"\u003edocument.write(tom.getSex()); \u003cspan class=\"r\"\u003e//\n            读取属性\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003etom.setSex(\"$1\"); \u003cspan class=\"r\"\u003e//\n            这里设置属性值，执行就会出错，一般会提示这是只读属性\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eget 存取器方法用来定义属性的读取，其基本形式是在 function 关键字和方法名之间加入 get 关键字，中间使用空白隔开。这时，方法名就是属性名。一般， get 存取器方法必须是公共方法。\u003c/p\u003e\n\u003ch6\u003e 只写属性\u003c/h6\u003e\n\u003cp\u003e 例如，改变 Person 类的定义，定义一个名为 sex 的只写属性，只写属性意味着仅定义 set 存取器方法，代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Person(){\u003c/span\u003e\u003cspan class=\"p2\"\u003evar _sex = \"default\";\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.setSex =\n        function(newValue){\u003c/span\u003e\u003cspan class=\"p4\"\u003e_sex = newValue;\u003c/span\u003e\u003cspan class=\"p2\"\u003e};\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这时，就仅可以设置属性 sex 的值，而不能读取该属性，例如下面的访问将会出错：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar tom = new Person();\u003c/span\u003e\u003cspan class=\"p\"\u003etom.setSex(\"$1\"); \u003cspan class=\"r\"\u003e//\n            设置属性值\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003edocument.write(tom.getSex()); \u003cspan class=\"r\"\u003e//\n            这里读取属性，执行就会出错，一般会提示未定义该属性\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eset 存取器方法用来定义属性的设置，其基本形式就是在 function 关键字和方法名之间加入 set 关键字，中间使用空白隔开。这时，方法名就是属性名。一般， set 存取器方法必须是公共方法。\u003c/p\u003e\n\u003cp\u003e 与 get 存取器方法不同的是， set 存取器方法有一个参数。\u003c/p\u003e\n\u003ch6\u003e 读写属性\u003c/h6\u003e\n\u003cp\u003e 如果想让属性既可以读取也可以设置，那么就可以同时定义 get 和 set 存取器方法，为了能让 get 和 set 存取器方法配合起来，需要定义一个中间变量在两个方法间传递值，例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Person(){\u003c/span\u003e\u003cspan class=\"p2\"\u003evar _sex = \"default\";\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.getSex =\n        function(){\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn _sex;\u003c/span\u003e\u003cspan class=\"p2\"\u003e};\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.setSex =\n        function(newName){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e_sex = newName;\u003c/span\u003e\u003cspan class=\"p2\"\u003e};\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这时， sex 属性就是一个可读写的属性。注意中间变量 _sex 是一个私有属性，在类定义的外面不能被访问到。\u003c/p\u003e\n\u003cp\u003e 虽然中间变量的变量名可以任选，但好的编程习惯一般都是使用属性名前加一个下划线作为中间变量的变量名。\u003c/p\u003e\n\u003ch6\u003eget 和 set 存取器方法的优点\u003c/h6\u003e\n\u003cp\u003eget 和 set 存取器方法的使用为创建的类提供了易于使用的编程接口，并遵循了信息隐藏和封装的编程原则，具体来说有两个优点：\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e 使用它们可以实现属性的读写设置\u003c/li\u003e\n    \u003cli\u003e 使用它们可以覆盖从基类继承来的属性（使用 this 来定义的属性则不能覆盖）。因为可以重写从基类继承的 get 和 set 存取器方法\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch5\u003e 技巧与提示\u003c/h5\u003e\n\u003cp\u003e 在一些语言中，也会把使用 var 关键字直接定义的变量称为字段，而把使用 get 和 set\n    存取器方法定义的变量称为属性。一个显著的区别是：字段只是类所公开的简单公共变量，而属性可以控制是否允许读取和设置。但是，从应用程序使用的角度来看，字段和属性没有什么区别，只不过字段完全允许读取和设置。\u003c/p\u003e\n\u003cp\u003e 在 return 语句中定义 get 和 set 存取器方法。\u003c/p\u003e\n\u003cp\u003e 在 return 语句中也可以定义 get 和 set 存取器方法，例如下面的代码定义读写属性：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Person(){\u003c/span\u003e\u003cspan class=\"p2\"\u003evar _sex = \"default\";\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn\n        {\u003c/span\u003e\u003cspan class=\"p4\"\u003egetSex : function(){\u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        _sex;\u003c/span\u003e\u003cspan class=\"p4\"\u003e},\u003c/span\u003e\u003cspan class=\"p4\"\u003esetSex : function(newValue){\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e_sex = newValue;\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 可以使用下面的代码测试：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar person_1 = new Person(\"Jane\";, 28);\u003c/span\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eperson_1.setSex(\"$1\");\u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.write(\"$1 性 sex 的值为： \";+ person_1.getSex());\u003c/span\u003e\u003c/code\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 对象","title":"存储器"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","对象","存储器"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
