    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 操作属性\u003c/h5\u003e\n\u003cp\u003e 属性包括名和值，属性名可以包括空字符串在内的任意字符串，但对象中不能存在两个同名的属性。值可以是任意的 JavaScript 值。除了明和值以外，每个属性还有一些相关的值，称之为属性特性。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 可写 :(writable attribute) 表明是否可以设置该属性的值\u003c/li\u003e\n    \u003cli\u003e 可枚举 :(enumerable attribute) 表明是否可以通过 for/in 循环返回该属性\u003c/li\u003e\n    \u003cli\u003e 可配置 :(configurable attribute) 表明是否可以删除或是修改该属性\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"note\"\u003e\n    \u003cp\u003e 即便属性是 configurable:false ，我们还是可以 把 writable 的状态由 true 改为 false ，但是无法由 false 改为 true 。\u003c/p\u003e\n\u003c/code\u003e\n\u003ch5\u003e 定义属性\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e 直接冒号定义\u003c/li\u003e\n    \u003cli\u003e 对象外用 点 运算符构造\u003c/li\u003e\n    \u003cli\u003e 通过构造函数构造\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e 在声明变量时可以使用 var ，但是在声明对象属性时不能使用 var 语句。\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e 扩展 —— -- 新增静态函数 Object.defineProperty 和 Object.defineProperties \u003c/summary\u003e\n    \u003cp\u003eECMAScript 5 新增两个静态函数 , 来指定对象定义的属性。\u003c/p\u003e\n    \u003cp class=\"p4\"\u003eObject.defineProperty \u003c/p\u003e\n    \u003cp\u003e 将属性添加到对象（在对象未指明的属性名称时） , 或者修改现有属性（在对象指明属性名称时）。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eObject.defineProperty(object, propertyname, descriptors)\u003c/span\u003e\u003c/code\u003e\n    \u003cul\u003e\n        \u003cli\u003eobject 必须参数 , 指定要添加或修改的属性的对象\u003c/li\u003e\n        \u003cli\u003epropertyname 必须参数 , 表示一个包含属性名称的字符串\u003c/li\u003e\n        \u003cli\u003edescriptors 必须参数 , 定义属性的描述 , 它可以针对属性和访问器属性\u003c/li\u003e\n    \u003c/ul\u003e\n    \u003cp\u003eObject.defineProperty 返回值为已修改的对象 (writeable\u003csmall\u003e\u003cmark\u003e 是否可写\u003c/mark\u003e\u003c/small\u003e 、\n        enumerable\u003csmall\u003e\u003cmark\u003e 是否可枚举\u003c/mark\u003e\u003c/small\u003e 、 configurable\u003csmall\u003e\u003cmark\u003e 是否可修改\u003c/mark\u003e\u003c/small\u003e) 。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p2\"\u003evar obj = {}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eObject.defineProperty(obj, \"newDataProperty\", {\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003evalue: 101, \u003c/span\u003e\u003cspan class=\"p4\"\u003ewritable: true, \u003c/span\u003e\u003cspan class=\"p4\"\u003eenumerable:\n            true, \u003c/span\u003e\u003cspan class=\"p4\"\u003econfigurable: true \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003eobj.newDataProperty = 102; \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003edocument.write(obj.newDataProperty) \u003cspan class=\"r\"\u003e// 102\u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p2\"\u003evar obj = {}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eObject.defineProperty(obj,\n            \"newAccessorProperty\", { \u003c/span\u003e\u003cspan class=\"p4\"\u003eset: function(x) { \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003ethis.newaccpropvalue = x * x; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}, \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003eget: function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn \"\u0026lt;h1\u0026gt;\" + this.newaccpropvalue +\n            \"\u0026lt;/h1\u0026gt;\" \u003c/span\u003e\u003cspan class=\"p4\"\u003e}, \u003c/span\u003e\u003cspan class=\"p4\"\u003eenumerable: true, \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003econfigurable: true \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eobj.newAccessorProperty = 30; \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(obj.newAccessorProperty)\n            \u003cspan class=\"r\"\u003e// \u0026lt;h1\u0026gt;900\u0026lt;/h1\u0026gt;\n            \u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n    \u003cp\u003e 上例中，使用 Object.defineProperty 函数将访问器将属性添加到用户定义对象 obj 。定义当前为对象的 newAccessorProperty\n        属性添加新值，设置其值为赋值的平方，而读取该属性时，会以一级标题的形式显示，即输出值为 HTML 字符串。\u003c/p\u003e\n    \u003cp class=\"p4\"\u003eObject.defineProperties \u003c/p\u003e\n    \u003cp\u003e 添加多个或修改多个属性。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eObject.defineProperties(object,descriptors)\u003c/span\u003e\u003c/code\u003e\n    \u003cul\u003e\n        \u003cli\u003eobject 必须参数，对其添加或修改属性的对象，可以是本地对象或 DOM 对象\u003c/li\u003e\n        \u003cli\u003edescriptors 必须参数，包含一个或多个描述对象。每个描述对象描述一个数据属性或访问器属性\u003c/li\u003e\n    \u003c/ul\u003e\n    \u003ccode class=\"note\"\u003e\n        \u003cp\u003e\u003csmall\u003e 该参数为一 , 需要用 {} 括起来\u003c/small\u003e 。\u003c/p\u003e\n    \u003c/code\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p2\"\u003evar obj = {}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eObject.defineProperties(obj, {\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003enewDataProperty: { \u003c/span\u003e\u003cspan class=\"p6\"\u003evalue: 101, \u003c/span\u003e\u003cspan class=\"p6\"\u003ewritable:\n            true, \u003c/span\u003e\u003cspan class=\"p6\"\u003econfigurable: true, \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003eenumerable: true \u003c/span\u003e\u003cspan class=\"p4\"\u003e}, \u003c/span\u003e\u003cspan class=\"p4\"\u003enewAccessorProperty: {\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003eset: function(x) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ethis.newAccessorPropValue = x\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003e}, \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003eget: function() { \u003c/span\u003e\n        \u003cspan class=\"p8\"\u003ereturn this.newAccessorPropValue \u003c/span\u003e\u003cspan class=\"p6\"\u003e}, \u003c/span\u003e\u003cspan class=\"p6\"\u003eenumerable:\n            true, \u003c/span\u003e\u003cspan class=\"p6\"\u003econfigurable: true \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003eobj.newAccessorPropValue = 10; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003edocument.write(obj.newAccessorPropValue) \u003cspan class=\"r\"\u003e// 10 \u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n    \u003cp\u003e 上例中，使用 Object.defineProperties 函数将数据属性和访问器添加到用户指定的对象上。使用对象文本创建了 newDataProperty 和 newAccessorPropValue\n        描述符对象的\n        descriptors 对象。\u003c/p\u003e\n\u003c/details\u003e\n\u003ch5\u003e 访问属性\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e 点号 访问 —— -- 点运算符左侧是对象引用的变量，右侧是属性名，属性名必须是一个标识符，而不是一个字符串\u003c/li\u003e\n    \u003cli\u003e 中括号访问 —— -- 以中括号（数组形式）访问属性时，应以字符串形式指定属性名，而不是\u003c/li\u003e\n    \u003cli\u003efor/in 遍历\u003c/li\u003e\n    \u003cli class=\"noList indent2\"\u003e 由于属性没有固定顺序 , 同时也只能枚举自定义属性 . 如果遇到不存在属性 , 返回 undefined\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e 扩展—— --ECMAScript 5 新增 4 个函数来访问对象属性\u003c/summary\u003e\n    \u003cp\u003eECMAScript 新增了四个 函数来访问对象属性。\u003c/p\u003e\n    \u003cul\u003e\n        \u003cli\u003eObject.getPrototypeOf(object) 返回指定对象的原型\u003c/li\u003e\n        \u003cli\u003eObject.getOwnPropertyNames(object) 返回私有属性的名称\u003c/li\u003e\n        \u003cli\u003eObject.keys(object) 返回指定对象可枚举的属性和方法的名称\u003c/li\u003e\n        \u003cli\u003eObject.getOwnPropertyDescriptor(object, propertyname) 获取指定对象的私有属性的描述\u003c/li\u003e\n    \u003c/ul\u003e\n    \u003cp class=\"p4\"\u003eObject.getPrototypeOf \u003c/p\u003e\n    \u003cp\u003eObject.getPrototypeOf 可以返回指定对象的原型。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eObject.getPrototypeOf(object);\u003c/span\u003e\u003c/code\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p2\"\u003efunction Pasta(grain, width) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.grain = grain; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003ethis.width = width \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar spaghetti = new\n            Pasta(\"wheat\", 0.2); \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003evar proto = Object.getPrototypeOf(spaghetti); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(proto\n            === Pasta.prototype) \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n    \u003cp class=\"p4\"\u003eObject.getOwnPropertyNames \u003c/p\u003e\n    \u003cp\u003eObject.getOwnPropertyNames 可以返回指定对象私有属性的名称。私有属性是指直接对该属性定义的属性，而不是从该对象与那行继承的属性。具体用法如下。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eObject.getOwnPropertyNames(object)\u003c/span\u003e\u003c/code\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p2\"\u003efunction Pasta(grain, width, shape) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.grain =\n            grain; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.width = width; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.shape = shape;\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.toString = function() { \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003ereturn (this.grain + \", \" + this.width + \", \" + this.shape) \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar spaghetti = new Pasta(\"wheat\", 0.2, \"circle\");\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003evar arr = Object.getOwnPropertyNames(spaghetti); \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003edocument.write(arr) \u003cspan class=\"r\"\u003e// rain,width,shape,toString \u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n    \u003cp class=\"p4\"\u003eObject.keys \u003c/p\u003e\n    \u003cp\u003eObject.keys 与 Object.getOwnPropertyNames 类似，但是， Object.Keys 仅能返回指定可枚举属性和方法的名称。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eObject.keys(object)\u003c/span\u003e\u003c/code\u003e\n    \u003cp\u003e 参数 object 表示指定的属性，可以是创建的对象或现有 DOM 对象。返回值是一个数组。其中包含可枚举属性和方法的名称。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p2\"\u003efunction Pasta(grain, width, shape) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.grain = grain;\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.width = width; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.shape = shape; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003ethis.toString = function() { \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003ereturn (this.grain + \", \" + this.width + \", \" + this.shape) \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar spaghetti = new Pasta(\"wheat\", 0.2, \"circle\");\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003evar arr = Object.keys(spaghetti); \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003earr.forEach(k =\u0026gt; { \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.write(k + \" _ _ _ \") \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e}); \u003cspan class=\"r\"\u003e// grain _ _ _ width _ _ _ shape _ _ _ toString _ _ _ \u003c/span\u003e\u003c/span\u003e\u003cspan\n            class=\"p2\"\u003edocument.write(\"\u0026lt;br/\u0026gt;\"); \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003efor (var i in arr) { \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.write(\" 这是第 \" + (1 + Number(i)) + \"\n            属性，名称： \" + arr[i] + \"\u0026lt;br/\u0026gt;\") \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n                这是第 1 属性，名称： grain \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 这是第 2 属性，名称： width \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 这是第\n                3 属性，名称： shape \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 这是第 4 属性，名称： toString\n            \u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n    \u003cp class=\"p4\"\u003eObject.getOwnPropertyDescriptor \u003c/p\u003e\n    \u003cp\u003eObject.getOwnPropertyDescriptor 能够获得指定对象的私有属性的描述。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eObject.getOwnPropertyDescriptor(object,propertyname)\u003c/span\u003e\u003c/code\u003e\n    \u003cp\u003e 参数 object 表示指定的对象， propertyname 表示属性的名称。返回值为属性的描述对象。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p2\"\u003evar obj = {}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eobj.newDataProperty = \"abc\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n            descriptor = Object.getOwnPropertyDescriptor(obj, \"newDataProperty\"); \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003edescriptor.writable = false; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eObject.defineProperty(obj, \"newDataProperty\", descriptor); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n            desc2 = Object.getOwnPropertyDescriptor(obj, \"newDataProperty\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var prop\n            in desc2) { \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003edocument.write(prop + \": \" + desc2[prop]); \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003edocument.write(\"\u0026lt;br/\u0026gt;\") \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan\n                class=\"r\"\u003e// value: abc \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// writable: false\n            \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// enumerable: true \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// configurable: true \u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/details\u003e\n\u003ch5\u003e 赋值属性\u003c/h5\u003e\n\u003cp\u003e 与读取对象值操作相同，设置对象属性的值也可以使用使用点运算符和数组操作方法来实现。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar o = { \u003cspan class=\"r\"\u003e// 定义对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ex: 1, \u003c/span\u003e\u003cspan class=\"p4\"\u003ey: 2\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.x = 2; \u003cspan class=\"r\"\u003e//\n            设置属性的新值，覆盖原值\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eo[\"y\"] = 1; \u003cspan class=\"r\"\u003e// 设置属性的新值，覆盖原值\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(o[\"x\"]); \u003cspan class=\"r\"\u003e// 返回 2 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(o.y) \u003cspan class=\"r\"\u003e//\n            返回 1 \u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n\u003ch5\u003e 删除属性\u003c/h5\u003e\n\u003cp\u003e 删除属性 delete 运算符直接删除属性 , 枚举失效。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar o = { \u003c/span\u003e\u003cspan class=\"p6\"\u003ex: 1 \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003cspan class=\"r\"\u003e//\n            定义对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003edelete o.x; \u003cspan class=\"r\"\u003e// 删除对象的属性 x \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(o.x); \u003cspan class=\"r\"\u003e// 返回 undefined \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 当删除对象属性之后，不是将该属性值设置为 undefined ，而是从对象中彻底清除属性。如果使用 for/in 语句枚举对象属性，只能枚举属性值为 undefined 的属性，但是不会枚举已删除的属性。\u003c/p\u003e\n\u003ch5\u003e 使用方法\u003c/h5\u003e\n\u003cp\u003e 在 JavaScript 中，方法 （ Method ）就是对象属性的一种特殊形式，即值为函数的属性。从功能角度分析，方法就是对象执行特定行为的逻辑块，是与外界交互的动作。\u003c/p\u003e\n\u003cp\u003e 由于函数是一类数据，所以可以赋值给对象属性，于是该属性就是对象的一个方法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar o = { \u003c/span\u003e\u003cspan class=\"p4\"\u003ex: function() { \u003cspan class=\"r\"\u003e//\n            定义对象方法\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\"Method\") \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 也可以这样定义方法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar o = {}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.x = function() { \u003cspan class=\"r\"\u003e//\n            定义对象方法\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"Method\") \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 使用小括号运算符可以调用对象的方法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eo.x(); \u003cspan class=\"r\"\u003e// 调用对象的方法\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 对象内有一个 this 关键字，它总是指向引用调用该方法的对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar o = { \u003c/span\u003e\u003cspan class=\"p4\"\u003ex: function() { \u003cspan class=\"r\"\u003e//\n            定义对象的方法\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(this.y) \u003cspan class=\"r\"\u003e// 访问当前对象的属性 y 的值\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eo.x(); \u003cspan class=\"r\"\u003e// undefined \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar f = o; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ef.y = 2; \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.x(); \u003cspan class=\"r\"\u003e// 2 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 方法和普通函数一样，可以传入参数，可以设置返回值。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar o = {}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.x = function(a) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn a\n        * 10; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar f = o.x(5); \u003cspan class=\"r\"\u003e// 调用方法，设置参数值 5\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(f) \u003cspan class=\"r\"\u003e// 返回值 50\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"note\"\u003e\n        \u003cp\u003e 构造函数是一类特殊的函数，它能够初始化对象，利用参数初始化 this 关键字所引用对象的 x 和 y 属性值。因此，构造函数就相当于对象的结构模板，利用它可以实例化包含相同属性但属性值不同的对象。\u003c/p\u003e\n    \u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction f() { \u003cspan class=\"r\"\u003e// 定义方法\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn this.x +\n        this.y \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction MyClass(x, y) { \u003cspan class=\"r\"\u003e//\n            定义类\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x = x; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.y = y; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.add = f; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n            将方法封装在类中，这样每一个实例都拥有该方法\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar o = new MyClass(10,\n        20); \u003cspan class=\"r\"\u003e// 实例化类，并初始化参数值\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(o.add()); \u003cspan class=\"r\"\u003e// 调用方法，返回值 30 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction f() { \u003cspan class=\"r\"\u003e// 定义方法\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn this.x +\n        this.y \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction MyClass() { \u003cspan class=\"r\"\u003e//\n            定义类\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x = arguments[0]; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.y = arguments[1]; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.add = f; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan\n            class=\"r\"\u003e// 将方法封装在类中，这样每一个实例都拥有该方法\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar o = new\n        MyClass(10, 20); \u003cspan class=\"r\"\u003e// 实例化类，并初始化参数值\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(o.add()); \u003cspan class=\"r\"\u003e// 调用方法，返回值 30 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 配置特性\u003c/h5\u003e\n\u003cp\u003eECMAScript 5 新增 3 个函数用来设置对象属性的特性： Object.seal 、 Object.freeze 和 Object.preventExtensions 。这 3\n    个函数用来保护指定属性，防止修改现有属性，或阻止添加新属性。但是，作用略有不同。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eObject.seal(object); \u003c/span\u003e\u003cspan class=\"p2\"\u003eObject.freeze(object); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eObject.preventExtensions(object)\u003c/span\u003e\n\u003c/code\u003e\n\u003ctable id=\"this_1\"\u003e\u003c/table\u003e\n\u003cscript\u003e\n    var this_1 = [\n        [\"  函数 \", \"  不可添加新属性 \", \"  不可设置特性 \", \"  不可修改属性值 \"],\n        [\"Object.preventExtensions\", Y, N, N],\n        [\"Object.seal\", Y, Y, N],\n        [\"Object.freeze\", Y, Y, Y]\n    ];\n    _MiMethod.td(\"this_1\");\n\u003c/script\u003e\n\u003cp\u003e 在上述 3 个函数用法相同，都有一个参数，用来指定要限制的对象。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eObject.freeze 能够阻止修改现有的属性的特性和值，并阻止添加新值\u003c/li\u003e\n    \u003cli\u003eObject.seal 能够阻止修改现有属性的特性，并阻止添加新属性。但是对属性值不进行保护\u003c/li\u003e\n    \u003cli\u003eObject.preventExtensions 能够阻止向对象添加新属性。但是对属性的值和特性不进行保护\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar obj = { \u003c/span\u003e\u003cspan class=\"p4\"\u003epasta: \"spaghetti\", \u003c/span\u003e\u003cspan class=\"p4\"\u003elength:\n        10 \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eObject.preventExtensions(obj);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eobj.newProp = 50; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eobj.pasta = 50; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(obj.newProp); \u003cspan class=\"r\"\u003e// undefined \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(obj.pasta) \u003cspan class=\"r\"\u003e// 50 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 上例，使用 Object.preventExtensions 函数阻止 obj 添加新的属性。下例，将函数由 Object.preventExtensions 改为 Object.freeze 将阻止修改属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar obj = { \u003c/span\u003e\u003cspan class=\"p4\"\u003epasta: \"spaghetti\", \u003c/span\u003e\u003cspan class=\"p4\"\u003elength:\n        10 \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eObject.freeze(obj); \u003c/span\u003e\u003cspan class=\"p2\"\u003eobj.newProp =\n        50; \u003c/span\u003e\u003cspan class=\"p2\"\u003eobj.pasta = 50; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(obj.newProp); \u003cspan class=\"r\"\u003e// undefined \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(obj.pasta) \u003cspan class=\"r\"\u003e// spaghetti \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 检测特性\u003c/h5\u003e\n\u003cp\u003e 为确定属性的特性， ECMAScript 5 新增了 3 个函数来检测，即 Object.isSealed 、 Object.isFrozen 和 Object.Extensible 。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eObject.isSealed() ：如果无法在对象中修改现有属性的特性，且无法向属性添加新属性，则返回 true\u003c/li\u003e\n    \u003cli\u003eObject.isFrozen() ：如果无法在对象中修改现有属性的特性和值，且无法添加新属性，则返回 true\u003c/li\u003e\n    \u003cli\u003eObject.isExtensible() ：如果对象是可扩展的（这表示可向对象添加新属性），则为 true ，否则为 false\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar obj = { \u003c/span\u003e\u003cspan class=\"p4\"\u003epasta: \"spaghetti\", \u003c/span\u003e\u003cspan class=\"p4\"\u003elength: 10\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (!Object.isFrozen(obj)) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eobj.pasta\n        = 50; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eObject.freeze(obj); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(obj.pasta) \u003cspan class=\"r\"\u003e// 50\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar obj = { \u003c/span\u003e\u003cspan class=\"p4\"\u003epasta: \"spaghetti\", \u003c/span\u003e\u003cspan class=\"p4\"\u003elength:\n        10 \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eObject.freeze(obj); \u003c/span\u003e\u003cspan class=\"p2\"\u003eif\n        (!Object.isFrozen(obj)) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eobj.pasta = 50; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(obj.pasta) \u003cspan class=\"r\"\u003e// spaghetti \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 对象","title":"属性"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","对象","属性"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
