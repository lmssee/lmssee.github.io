="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>创建</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 创建对象\u003c/h5\u003e\n\u003cp\u003e 创建对有 3 中方法。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 构造函数\u003c/li\u003e\n    \u003cli\u003e 对象直接量\u003c/li\u003e\n    \u003cli\u003eObject.create() 方法\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e 使用对象直接量创建对象\u003c/h6\u003e\n\u003cp\u003e 使用对象直接量来定义对象类似于函数直接量定义匿名函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar objectName = { \u003c/span\u003e\u003cspan class=\"p4\"\u003e 属性名 : 值 , \u003c/span\u003e\u003cspan class=\"p4\"\u003e 属性名 :\n        值\n        , \u003c/span\u003e\u003cspan class=\"p4\"\u003e... \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003e 属性名和属性值之间用 冒号 分隔\u003c/li\u003e\n    \u003cli\u003e 属性值可以是任何数据类型\u003c/li\u003e\n    \u003cli\u003e 如果属性值是函数，则该属性就成为该对象的方法\u003c/li\u003e\n    \u003cli\u003e 如果属性值是对象，则会成为嵌套结构的对象\u003c/li\u003e\n    \u003cli\u003e 属性名可以是 JavaScript 标识符 , 也可以任何形式的字符串\u003c/li\u003e\n    \u003cli\u003e 属性与属性之间通过逗号分隔 , 最后一个属性末尾不必须逗号\u003c/li\u003e\n    \u003cli\u003e 使用对象直接量是创建对象的最高效、最简便的方法\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e使用直接量的方式创建大量相同的对象时，每次都需要写大量相同的属性和方法。产生大量的冗余代码！\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e工厂模式创建对象\u003c/h5\u003e\n\u003cp\u003e工厂模式创建对象的基本思想是：把创建对象的代码封装为一个函数，并使函数返回所创建的对象。\u003c/p\u003e\n\u003cp\u003e工厂模式确实解决了创建多个相似对象时出现大量冗余代码的问题,所创建的对象全部都是Object对象，而不能对对象进行具体类型的识别。为解决这个问题，又出现了构造函数创建对象的方式。\u003c/p\u003e\n\u003ch5\u003e 使用构造函数创建对象\u003c/h5\u003e\n\u003cp\u003e 使用 new 运算符调用函数，可以构造一个实例对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar objectName = new functionName(args);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 简单说明如下：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eobjectName 表示构造的实例对象\u003c/li\u003e\n    \u003cli\u003efunctionName 表示一个构造函数，构造函数与普通函数没有本质区别。一般情况下，构造函数不需要返回值，构造函数体内使用 this 指代 objectName 实例对象\u003c/li\u003e\n    \u003cli\u003eargs 表示参数列表\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar o = new Object(); \u003cspan class=\"r\"\u003e// 创建一个空对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar o\n        = new Array(); \u003cspan class=\"r\"\u003e// 创建一个空的数组对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar o = new MyClass(); \u003cspan\n            class=\"r\"\u003e// 创建一个自定义的对象\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 在 JavaScript 中， Object 、 Array 、 Function 、 RegExp 、 String 等内置对象都是构造函数，使用 new 运算符可以调用它们，并初始化为一个一个对象实例。\u003c/p\u003e\n\u003c/div\u003e\n\u003cul\u003e\n    \u003cli\u003e 使用 new 调用 , 或是小括号调用 , 但返回值不一样\u003c/li\u003e\n    \u003cli\u003e 构造函数内部通过 this 关键字指代实例化对象 , 或者指向调用对象\u003c/li\u003e\n    \u003cli\u003e 构造函数内通过点运算符声明本地成员\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e 类名首字母大写（非强制），主要与普通函数进行区别。\u003c/p\u003e\n\u003cp\u003e 构造函数没有返回值，这是它与普通函数最大的区别。它们只是初始化由 this 关键字传递进来的对象，并且什么都没有返回。但是，构造函数返回一个对象值，如果这样，被返回的对象就成了 new 表达式的值。在这种情况下， this\n    值所引用的对象就被丢弃了。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction Box(x, y) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.x = x; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.y\n        = y; \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn this \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(Box(4, 5).x);\n        \u003cspan class=\"r\"\u003e// 返回参数 4 ，此时的构造函数为普通函数\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar Box1 = new Box(4, 5); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(Box1.x) \u003cspan class=\"r\"\u003e// 调用对象的属性\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e工厂模式确实解决了创建多个相似对象时出现大量冗余代码的问题，但是它却和前面两种方式一样，所创建的对象全部都是Object对象，而不能对对象进行具体类型的识别。为解决这个问题，又出现了构造函数创建对象的方式。\u003c/p\u003e\n    \u003cp\u003e解决的方式就是原型，通过创建原型，避免了每次实例化相同的属性和方法，占用内存。\u003c/p\u003e\n    \u003cp\u003e结合构造函数和原型的方法可以创建很有用的对象：首先定义构造函数，然后在构造函数下面定义原型属性和方法，接着创建对象。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e 使用 create() 方法创建对象\u003c/h5\u003e\n\u003cp\u003eECMAScript 5 为 Object 新增一个静态方法 Object.create() ，直接调用该方法可以快速创建一个对象。 Object.create() 能够创建一个具有指定原型且可选择的包含指定属性的对象。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eObject.create(prototype, descriptors)\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eprototype : 必须的参数 , 要用原型的对象 , 可以是 null\u003c/li\u003e\n    \u003cli\u003edescriptors : 可选参数 , 包含一个或多个属性描述符的 JavaScript 对象\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 在 descriptors 中，数据属性是可获取且设置值的属性。数据属性描述符包含 value 特性，以及 writable （是否可修改属性值）、 enumerable （是否可枚举）、 configurable\n        （设置是否可修改属性特性和删除属性）特性。如果未指定最后三个特性，则默认为 false 。只要检索或设置该值，访问器属性就会调用用户提供的函数。访问器属性描述符包含 set （设置属性值的函数）特性和 get\n        （返回属性值的函数）特性。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e 下例使用 Object.create() 创建一个对象。它继承自 null ，即把 null 作为原型。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar newObj = Object.create(null, { \u003c/span\u003e\u003cspan class=\"p4\"\u003esize: { \u003c/span\u003e\u003cspan class=\"p6\"\u003evalue:\n        \"large\", \u003c/span\u003e\u003cspan class=\"p6\"\u003eenumerable: false \u003c/span\u003e\u003cspan class=\"p4\"\u003e}, \u003c/span\u003e\u003cspan class=\"p4\"\u003eshape: {\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evalue: \"round\", \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eenumerable: true \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(newObj.size + \"\u0026lt;br/\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(newObj.shape\n        + \"\u0026lt;br/\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(Object.getPrototypeOf(newObj));\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 下例使用 Object.create() 创建一个与 Object 对象具有相同原型的对象。该对象具有跟使用对象直接量创建的对象相同的原型。 Object.getPrototypeOf\n    函数可获取原始对象的原型。如果要获取对象的属性描述符，可以使用 Object.getOwnPropertyDescriptor 函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar firstLine = { \u003c/span\u003e\u003cspan class=\"p4\"\u003ex: undefined, \u003c/span\u003e\u003cspan class=\"p4\"\u003ey:\n        undefined \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar secondLine =\n        Object.create(Object.prototype, { \u003c/span\u003e\u003cspan class=\"p4\"\u003ex: { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evalue: undefined, \u003c/span\u003e\u003cspan class=\"p6\"\u003ewritable: true, \u003c/span\u003e\u003cspan class=\"p6\"\u003econfigurable:\n        true, \u003c/span\u003e\u003cspan class=\"p6\"\u003eenumerable: true \u003c/span\u003e\u003cspan class=\"p4\"\u003e}, \u003c/span\u003e\u003cspan class=\"p4\"\u003ey: {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evalue: undefined, \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ewritable: true, \u003c/span\u003e\u003cspan class=\"p6\"\u003econfigurable: true, \u003c/span\u003e\u003cspan class=\"p6\"\u003eenumerable:\n        true \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(\"first\n        line prototype = \" + Object.getPrototypeOf(firstLine)); \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003cspan class=\"r\"\u003e// first line prototype = [Object Object]\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\"\u0026lt;br/\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(\"second line prototype =\"\n        + Object.getPrototypeOf(secondLine));\u003c/span\u003e\u003cspan class=\"p\"\u003e\u003cspan class=\"r\"\u003e// second line prototype =\n            [Object Object]\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 下例创建一个对象，该对象继承自 shape 对象，即把 shape 对象作为 Square 的对象原型。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar Shape = { \u003c/span\u003e\u003cspan class=\"p4\"\u003etwoDimensional: true, \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor:\n        undefined, \u003c/span\u003e\u003cspan class=\"p4\"\u003ehasLineSegments: undefined \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar Square = Object.create(Shape); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(Square.twoDimensional)\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e使用类创建对象\u003c/h5\u003e\n\u003cp\u003eES 6 中添加了类这个概念，作为对象的模板。\u003c/p\u003e\n\u003cp\u003e详见类。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 对象","title":"创建"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","对象","创建"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
