class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>访问控制</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003eJavaScript 的访问方式允许限制对类成员的访问，有了成员访问方式，才能开发一个可靠的面向对象的应用程序，才能可靠地构建可重用的面向对象类库。 \u003c/p\u003e\n\u003cp\u003e 在某些情况下，可能需要保护类的数据和方法，不允许在类外访问。这时，需要将这些成员指定为私有成员：只有声明这些成员的类才能访问它们。 \u003c/p\u003e\n\u003cp\u003e 使用 this 或 prototype 定义的属性和方法都是公共成员。在 function 内使用普通的变量或者函数定义就可以声明私有成员。 \u003c/p\u003e\n\u003cp\u003e 类的实例及该类的子类的实例都不能访问声明为私有成员的属性和方法（因此导致的另一个结果是不能继承私有成员）。也就是说，私有成员只能在类定义中访问，而不能在实例级别上访问。 \u003c/p\u003e\n\u003ch5\u003epublic 成员（公共成员） \u003c/h5\u003e\n\u003cp\u003e 使用 this 关键字定义的类的成员允许在任何地方被访问，例如前面定义的 Person 类： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Person(myName, myAge) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ethis.age = myName;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ethis.nickName = myAge;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ethis.showInfo = function () {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn (\"$1 ！我的名字是 \" + this.nickName +\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\" ，我现在 \" + this.age + \"$1 了。 \");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 两个属性和 showInfo() 方法都是使用 this 关键字定义，这表示这些属性和方法可以在外面任何地方被访问： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar tom = new Person(\"Tom\", 22);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar info = tom.showInfo(); \u003cspan class=\"r\"\u003e// 访问方法 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(info);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(tom.nickName); \u003cspan class=\"r\"\u003e// 访问属性 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(tom.age); \u003cspan class=\"r\"\u003e// 访问属性 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 使用 prototype 定义的属性和方法也都是公共成员，例如下面的代码定义了两个属性和 showInfo() 方法为公共成员： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Person() {\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePerson.prototype.nickName = \"\";\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePerson.prototype.age = 0;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ePerson.prototype.showInfo = function() {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereturn (\"$1 ！我的名字是 \" + this.nickName +\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\" ，我现在 \" + this.age + \"$1 了。 \");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这些属性和方法可以在外面任何地方被访问： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar tom = new Person();\u003c/span\u003e\n    \u003cspan class=\"p\"\u003etom.nickName = \"Tom\"; // 访问属性 \u003c/span\u003e\n    \u003cspan class=\"p\"\u003etom.age = 22; \u003cspan class=\"r\"\u003e// 访问属 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar info = tom.showInfo(); \u003cspan class=\"r\"\u003e// 访问方法 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(info);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eprivate 成员（私有成员） \u003c/h5\u003e\n\u003cp\u003e 如果不想类的成员在外部被访问到，那么就可以使用 var 关键字，例如修改 Person 类的定义，将 age 属性使用 var 关键字定义： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Person(myName, myAge) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar age = myName;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ethis.nickName = myAge;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ethis.showInfo = function () {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn (\"$1 ！我的名字是 \" + this.nickName +\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\" ，我现在 \" + age + \"$1 了。 \");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 那么 nickName 属性和 showInfo() 方法可以在类定义的外部访问到，但如果要访问 age 属性就会导致出错（因为没有这个定义，所以会返回 undefined ）： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar tom = new Person(\"Tom\", 22);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar info = tom.showInfo(); \u003cspan class=\"r\"\u003e// 访问方法 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(info);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(tom.nickName); \u003cspan class=\"r\"\u003e// 访问属性 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(tom.age); \u003cspan class=\"r\"\u003e// 访问私有属性，返回 undefined\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 但是也注意到，在类内仍可以使用这个属性，例如在 showInfo 方法体内用到了私有属性 age 。在类内使用私有成员时不能使用 this 关键字限定。 \u003c/p\u003e\n\u003cp\u003e 另外，也可以使用方括号运算符访问类的成员，当使用方括号运算符访问类的私有成员时，也会导致运行时出错（因为没有这个定义，所以会返回 undefined ）： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003edocument.write(tom[\"age\"]); \u003cspan class=\"r\"\u003e// 访问私有属性，返回 undefined\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eprivate 方法可以使用匿名函数定义，也可以使用命名函数定义。例如下面的代码，实现的功能相同： \u003c/span\u003e\n    \u003cspan class=\"p\"\u003efunction Person() {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar showInfo = function() {}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 或者。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Person() {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efunction showInfo() {}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 定义 private 成员的目的在于有助于封装数据， private 成员（包括属性和方法等）只能由定义这些成员的类访问，不能在一个 private\n    成员定义所在的类方法之外改变或读取其值。即使是该类的子类，也不能访问声明为私有成员的属性和方法。 \u003c/p\u003e\n\u003cp\u003eprivate 的使用使私有成员可以隐藏在一个类内部而不被类外部的代码接触到。同时它们还有助于实现松散的耦合，如果数据结构外的代码不能直接访问内部属性，那么就不会产生一个隐性的关联性。 \u003c/p\u003e\n\u003ch6\u003e 技巧与提示 \u003c/h6\u003e\n\u003cp\u003e 在继承时，声明一个与基类的 private 成员同名的成员将简单地在当前类中建立一个与原来不同的成员。因此，在技术上不能覆写一个 private 成员，因为基类方法在子类中不可见。 \u003c/p\u003e\n\u003cp\u003e 因为 JavaScript 类都是动态类，所以访问包内属性不会导致运行出错，若要访问动态类的成员，它会自动添加一个公共的成员，即使该成员不存在，也不过是返回 undefined 。 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 对象","title":"访问控制"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","对象","访问控制"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
