                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e克隆数组\u003c/h5\u003e\n\u003cp\u003e克隆就是创建副本，副本具有与原数组相同的值。Array类中没有克隆数组的方法，但用户可以使用变通的方法来实现克隆。\u003c/p\u003e\n\u003ch6\u003e浅表克隆\u003c/h6\u003e\n\u003cp\u003e通过调用concat()或slice()方法，可以创建数组的浅表副本。在浅表副本中，如果原始数组的元素是复杂数据类型，则元素值指向对象的引用而非对象本身，与原始数组一样，浅表副本的元素值也指向对象的引用，对对象所做的任何更改都会在两个数组中反映出来。例如下面的代码，演示了如何实现浅表克隆：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar person = new Object(); \u003cspan class=\"r\"\u003e//\n            创建一个复杂数据类型作为数组元素\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eperson.sex = \"male\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003eperson.age =\n        28; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oArray = [ \"tom\", person]; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar newArray = oArray.concat(); \u003cspan class=\"r\"\u003e// 克隆\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(oArray[1].age); \u003cspan class=\"r\"\u003e// 返回28 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(newArray[1].age); \u003cspan class=\"r\"\u003e// 返回28 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 现在改变指向的对象，那么将同时影响两个数组\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eperson.age = 29; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(oArray[1].age); \u003cspan class=\"r\"\u003e// 返回29 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(newArray[1].age); \u003cspan class=\"r\"\u003e// 返回29 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e//\n        也可以这样改变指向的对象\u003c/span\u003e\u003cspan class=\"p2\"\u003eoArray[1].age = 30; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(newArray[1].age); \u003cspan class=\"r\"\u003e// 返回30 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\" p2 \"\u003edocument.write(person.age); \u003cspan class=\"r\"\u003e// 返回30\u003c/span\u003e\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e深度克隆\u003c/h6\u003e\n\u003cp\u003e深度克隆是相对于浅表克隆而言的，在克隆的深度副本中，不断复制索引，还将复制原始数组中的所有对象，从而使新数组和原始数组指向不同的对象。\u003c/p\u003e\n\u003cp\u003e在JavaScript中，实现深度克隆的方法是：将原始数组中的引用类型数据读出来然后重新填充新数组。\u003c/p\u003e\n\u003cp\u003e下面来创建一个实用函数，该函数根据参数deep的值确定是将参数_array定义的数组克隆为浅表副本还是深度副本，实现如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e/** \u003c/span\u003e\u003cspan class=\"p2\"\u003e* 该函数用于克隆数组，创建浅表副本或者深度副本\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e* \u003c/span\u003e\u003cspan class=\"p2\"\u003e* @author zhang-yafei.com \u003c/span\u003e\u003cspan class=\"p2\"\u003e* @version 1.0.0.128\n        2008/10/20 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e* @since js1.5 \u003c/span\u003e\u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\u003cspan class=\"p2\"\u003e/** \u003c/span\u003e\u003cspan class=\"p2\"\u003e*\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e* @param _array 被克隆的数组\u003c/span\u003e\u003cspan class=\"p2\"\u003e* @param deep 定义是否深度克隆\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e* @return Array 返回克隆的数组\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e* @throws Error 参数数量不正确\u003c/span\u003e\u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        cloneArray(_array, deep) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (arguments.length == 1) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar\n        isdeep = false; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (arguments.length == 2) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar isdeep = deep; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethrow new Error(\n        \"参数数量不正确\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003evar newArray =\n        _array instanceof Array ? [] : {}; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (isdeep) { \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (var i in _array) { \u003c/span\u003e\u003cspan class=\"p8\"\u003evar prop\n        = _array[i]; \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (typeof prop == 'object') { \u003c/span\u003e\u003cspan class=\"p10\"\u003eif (prop\n        instanceof Array) { \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003enewArray[i] = []; \u003c/span\u003e\u003cspan class=\"p12\"\u003efor (var j = 0; j \u0026lt; prop.length; j++) {\n    \u003c/span\u003e\u003cspan class=\"p14\"\u003eif (typeof prop[j] != 'object') { \u003c/span\u003e\u003cspan class=\"p16\"\u003enewArray[i].push(prop[j]);\n    \u003c/span\u003e\u003cspan class=\"p14\"\u003e} else { \u003c/span\u003e\n    \u003cspan class=\"p16\"\u003enewArray[i].push(cloneArray(prop[j]), true); \u003c/span\u003e\u003cspan class=\"p14\"\u003e} \u003c/span\u003e\u003cspan class=\"p12\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p10\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p12\"\u003enewArray[i] = cloneArray(prop,\n        true); \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p10\"\u003enewArray[i] = prop; \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p8\"\u003enewArray = _array.concat(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn newArray; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e该函数有以下3种使用方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar newArray=cloneArray(oArray); \u003cspan class=\"r\"\u003e// 浅表克隆\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar newArray=cloneArray(oArray,false); \u003cspan class=\"r\"\u003e// 浅表克隆\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar newArray=cloneArray(oArray,true); \u003cspan class=\"r\"\u003e// 深度克隆\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e下面验证一下该函数：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar person = new Object(); \u003cspan class=\"r\"\u003e//\n            创建一个复杂数据类型作为数组元素\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eperson.sex = \"male\" \u003c/span\u003e\u003cspan class=\"p2\"\u003eperson.age =\n        28; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oArray = [ \"tom\", person]; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// ===== 克隆\u003c/span\u003e\u003cspan class=\"p2\"\u003ecloneArray(oArray, true); \u003c/span\u003e\u003cspan class=\"p2\"\u003e// =====\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(oArray[1].age); \u003cspan class=\"r\"\u003e// 返回28 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(newArray[1].age); \u003cspan class=\"r\"\u003e// 返回28 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 现在改变指向的对象，那么仅影响原始数组，而不影响克隆的数组\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eperson.age = 29; \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(oArray[1].age); \u003cspan class=\"r\"\u003e// 返回29\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(newArray[1].age); \u003cspan class=\"r\"\u003e// 返回28\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 数组","title":"克隆"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","数组","克隆"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
