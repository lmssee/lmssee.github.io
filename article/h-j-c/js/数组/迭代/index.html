class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>迭代</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e迭代\u003c/h5\u003e\n\u003cp\u003e数组迭代是一项很重要的操作，在 ECMAScript 5 之前主要用 for 语句实现，这种方式不是很方便，为此ECMAScript 5 新增了 5 个与迭代有关的方法。\u003c/p\u003e\n\u003ch5\u003efor/in\u003c/h5\u003e\n\u003cp\u003e使用for/in 和 for 都可以迭代数组。for 语句需要配合数组下标 length 属性和数组下标来实现，执行效率不如for/in,另外，for/in 会体跳过空元素。\u003c/p\u003e\n\u003ch5\u003eforEach\u003c/h5\u003e\n\u003cp\u003eforEach()方法对数组中的每一项执行回调函数，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoArray.forEach(callbackFunction[,thisObject])\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ecallbackfn： 必须函数，最多可接受三个函数，对每一个元素都会调用一次\u003c/li\u003e\n    \u003cli\u003ethisAry： 可选参数，callbackfn 函数中的 this关键字可引用的对象。如果省略 thisAry ，则 undefined 将用作 this \u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eforEach 方法不用于修改原始数组，但回调函数会修改它\u003c/p\u003e\n    \u003cp\u003e除了数组对象外，forEach 方法还可以用于具有 length 属性的具有已按数字编制索引的属性名的任何对象，如关联数组、Arguments 等\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e回调函数语法如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efunction callbackFunction(value,index,array){}\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e参数callbackFunction定义对数组中的每一元素进行匹配运算的函数。该函数可以包含3个参数，即元素值、元素索引和Array对象：\u003c/li\u003e\n    \u003cli\u003e函数可以包含简单的比较操作或者更复杂的操作，函数没有返回值。\u003c/li\u003e\n    \u003cli\u003e参数thisObject定义函数的this对象。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e该方法对数组中的每一元素执行回调函数，在该函数中可以处理每个元素。\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e回调函数修改数组的影响\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003eforEach 启动后的条件\u003c/th\u003e\n        \u003cth\u003e元素是否传递给回调函数\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e在数组的原始长度之外添加长度\u003c/td\u003e\n        \u003ctd\u003e否\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e添加元素以填充数组中缺少的元素\u003c/td\u003e\n        \u003ctd\u003e是，如果该索引尚未传递给回调函数\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e元素已更改\u003c/td\u003e\n        \u003ctd\u003e是，如果该元素尚未传递给回调函数\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e从数组中删除元素\u003c/td\u003e\n        \u003ctd\u003e否，除非改善元素已传递给回调函数\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e下面的代码遍历所有元素：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar A_Team = new Array(\"Tom\",\"Tommy\",\"John\");\u003c/span\u003e\u003cspan class=\"p\"\u003efunction\n        getAllFn(value,index,array){\u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(index + \"===\" + value);\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003eA_Team.forEach(getAllFn);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e输出结果如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e0===Tom\u003c/span\u003e\u003cspan class=\"p\"\u003e1===Tommy\u003c/span\u003e\u003cspan class=\"p\"\u003e2===John\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e下例使用 forEach 迭代 numbers，然后计算数组元素的和并输出。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar number = [10, 11, 12]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar sum = 0; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003enumber.forEach(function addNumber(value) { \u003c/span\u003e\u003cspan class=\"p4\"\u003esum += value \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(sum); \u003cspan class=\"r\"\u003e// 返回 33\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e下例演示如何使用 thisArg 参数，该参数指定可对引用 this 关键字的对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar obj = { \u003c/span\u003e\u003cspan class=\"p4\"\u003eshowResults: function(value, index)\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar squared = this.calcSquare(value); \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.write(\"value\" +\n        value); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.write(\" index \" + index); \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.write(\" squared \" +\n        squared); \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.write(\"\u0026lt;br/\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}, \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ecalcSquare: function(x) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn x * x \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        numbers = [5, 6]; \u003c/span\u003e\u003cspan class=\"p2\"\u003enumbers.forEach(obj.showResults, obj); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003enumbers.forEach(function(value, index) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ethis.showResults(value, index) \u003c/span\u003e\u003cspan class=\"p2\"\u003e}, obj);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e迭代器方法\u003c/h5\u003e\n\u003cp\u003eES6 中，Array 的原型上暴露了 3 个用于检索数组内容的方法：keys()、values()和 entries()。keys()返回数组索引的迭代器，values()返回数组元素的迭代器，而 entries()返回\n    索引/值对的迭代器：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003econst a = [\"foo\", \"bar\", \"baz\", \"qux\"]; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            因为这些方法都返回迭代器，所以可以将它们的内容\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 通过\n            Array.from()直接转换为数组实例\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econst aKeys = Array.from(a.keys()); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econst aValues = Array.from(a.values()); \u003c/span\u003e\u003cspan class=\"p2\"\u003econst aEntries =\n        Array.from(a.entries()); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(aKeys); \u003cspan class=\"r\"\u003e// [0, 1, 2, 3]\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(aValues); \u003cspan class=\"r\"\u003e// [\"foo\", \"bar\", \"baz\", \"qux\"]\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(aEntries); \u003cspan class=\"r\"\u003e// [[0, \"foo\"], [1, \"bar\"], [2, \"baz\"], [3, \"qux\"]]\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003econst a = [\"foo\", \"bar\", \"baz\", \"qux\"]; \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (const [idx,\n        element] of a.entries()) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(idx); \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(element);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 0 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// foo \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// bar \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 2 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// baz \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 3 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// qux \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eevery\u003c/h5\u003e\n\u003cp\u003eevery()方法对数组中的每一项执行测试函数，直到获得对指定的函数返回false的项，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoArray.every(callbackFunction [,thisObject])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e如果 callbackfn 函数为所有的数组元素返回 true ，则返回值为 true ；否则返回值为 false 。如果数组没有元素，则 every 返回 true 。\u003c/p\u003e\n\u003cp\u003eevery 按照升序对每一个数组元素调用一次 callbackfn 函数，直到 callbackfn 返回 false。如果找到导致 callbackfn 返回 false 的元素，则 every 方法立即返回 false\n    。否则，every 返回 true。every 不为数组中缺少的元素调用该回调函数。\u003c/p\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cp\u003e参数callbackFunction定义对数组中的每一元素进行匹配运算的函数。该函数可以包含3个参数，即元素值、元素索引和Array对象，格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efunction callbackFunction(value,index,array){}\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e函数可以包含简单的比较操作或者更复杂的操作，函数的返回值为true或false。\u003c/p\u003e\n\u003cp\u003e参数thisObject定义函数的this对象。\u003c/p\u003e\n\u003cp\u003e数组对象可由回调函数修改。\u003c/p\u003e\n\u003cp\u003e例如下面的代码，演示了如何使用该方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar A_Team = new Array(\"Tom\",\"Tommy\",\"John\");\u003c/span\u003e\u003cspan class=\"p\"\u003efunction\n        getItemsFn(value,index,array){\u003c/span\u003e\u003cspan class=\"p2\"\u003eif(value.length\u0026gt;4){\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        false;\u003c/span\u003e\u003cspan class=\"p2\"\u003e} else {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003edocument.writeln(index + \"===\" + value);\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar N_Team = A_Team.every(getItemsFn);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上述代码返回如下结果，因为到第2个元素就返回了false，所以，即使第3个元素也满足小于等于4个字符，也不会进行测试了：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e0===Tom\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e下例判断数组是否全为偶数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction CheckIfEven(value, index, arr) { \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.write(value +\n        \" \"); \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (value % 2 == 0) return true;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eelse return false; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar numbers = [2, 4, 5, 6, 8]; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (numbers.every(CheckIfEven))\n        document.write(\"都是偶数\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003eelse document.write(\"不全是偶数\");\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e下例检测数组元素是否在指定的范围内。范围通过一个对象直接量 obj 来设置。用此例来演示 thisArg 参数的用法，该参数指定对其引用 this 关键字。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar checkNumericRange = function(value) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (typeof value !==\n        \"number\") return false; \u003c/span\u003e\u003cspan class=\"p4\"\u003eelse return value \u0026gt;= this.minimum \u0026\u0026 value \u0026lt;=\n        this.maximum \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar numbers = [10, 15, 19]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar obj = { \u003c/span\u003e\u003cspan class=\"p4\"\u003eminimum:\n        10, \u003c/span\u003e\u003cspan class=\"p4\"\u003emaximum: 20 \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif\n        (numbers.every(checkNumericRange, obj)) document.write(\"都在指定范围内\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eelse document.write(\"部分不在范围内\")\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003esome()方法\u003c/h5\u003e\n\u003cp\u003esome()方法对数组中的每一项执行测试函数，直到获得返回true的项，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoArray.some(callbackFunction[,thisObject])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003earray: 必须参数，一个数组对象\u003c/li\u003e\n    \u003cli\u003ecallbackfn: 必须参数，一个接收最多 3 个参数的函数。 some 方法会为 array 中每一个元素调用 callbackfn 函数，直到返回 true，或直到到达数组的结尾\u003c/li\u003e\n    \u003cli\u003ethisArg：可选参数，可在 callbackfn 函数中为其引用 this 关键字的对象。如果省略 thisArg ，则 undefined 作为 this 的值\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003esome 会按照升序索引顺序对每一个数组元素调用 callbackfn 函数，直到 callbackfn 函数返回 true 。如果找到导致 callbackfn 返回 true 的元素，则 some 返回 true\n    。如果回调不对任何元素返回 true ，则会返回 false 。\u003c/p\u003e\n\u003cp\u003esome 不为数组中缺少的元素调用该回调函数。除了数组对象之外，如果 some 方法可由length 属性且具有已按数字编制索引的属性名的任何对象使用，如关联数组、Arguments 等。\u003c/p\u003e\n\u003cp\u003e例如下面的代码，演示了如何使用该方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction CheckIfEven(value, index, arr) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (value % 2 ==\n        0) return true \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar numbers = [1, 15, 4, 10, 11, 22];\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar evens = number.some(CheckIfEven); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eif (evens) document.write(\"不全是奇数。\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003eelse\n        document.write(\"全是奇数。\")\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003emap()方法\u003c/h5\u003e\n\u003cp\u003emap 对数组的每一个元素调用回调函数并返回包含结果。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003earray.map( callbackfn [, thisArg}] )\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003earray: 必须参数，一个数组对象\u003c/li\u003e\n    \u003cli\u003ecallbackfn: 必须参数，一个接收最多 3 个参数的函数。 map 方法会为 array 中每一个元素调用 callbackfn 函数\u003c/li\u003e\n    \u003cli\u003ethisArg：可选参数，可在 callbackfn 函数中为其引用 this 关键字的对象。如果省略 thisArg ，则 undefined 作为 this 的值\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003emap 方法返回一个新数组，其中每个元素均为关联的原始数组元素的回调函数返回值。对于数组中每个元素，map 都会调用一次 callbackfn 函数一次（采用升序索引顺序）。将不会为数组中缺少的元素调用回调函数。\u003c/p\u003e\n\u003cp\u003e除了数组对象以外，map 方法可由具有 length 属性，且具有已按数字编制索引的属性名的对象使用，如 Arguments 参数对象。\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e回调函数修改数组的影响\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003eMap 启动后的条件\u003c/th\u003e\n        \u003cth\u003e元素是否传递给回调函数\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e在数组的原始长度之外添加长度\u003c/td\u003e\n        \u003ctd\u003e否\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e添加元素以填充数组中缺少的元素\u003c/td\u003e\n        \u003ctd\u003e是，如果该索引尚未传递给回调函数\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e元素已更改\u003c/td\u003e\n        \u003ctd\u003e是，如果该元素尚未传递给回调函数\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e从数组中删除元素\u003c/td\u003e\n        \u003ctd\u003e否，除非改善元素已传递给回调函数\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction AreaOfCircle(radius){\u003c/span\u003e\u003cspan class=\"p2\"\u003evar area = Math.PI * (radius *\n        radius)\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn area.toFixed(0);\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar\n        radii = [10 , 20 , 30];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar areas = radii.map(AreaOfCircle);\u003c/span\u003e\u003cspan class=\"p\"\u003edocument.write(area); \u003cspan class=\"r\"\u003e//\n            314 ，1257 ，2827\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e下例演示 map 方法映射数组 number ，把数组中每个元素的值除以 divisor 的值，然后返回这个新的数组。其中回调函数和 divisor 都作为对象 obj 的属性处在、、存在，通过这种方法演示如何在 map\n    中使用 thisArg 参数：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar obj = {\u003c/span\u003e\u003cspan class=\"p2\"\u003edivisor: 10,\u003c/span\u003e\u003cspan class=\"p2\"\u003eremainder:\n        function (value) {\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn value % this.divisor;\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar numbers = [6, 12, 25, 30];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar result = number.map(obj.remainder , obj);\u003c/span\u003e\u003cspan class=\"p\"\u003edocument.write(result);\n        \u003cspan class=\"r\"\u003e// 6, 2 ,5 ,0\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e该方法对数组中的每一元素执行测试函数，根据测试返回一个值，该值将会被作为新数组的元素。\u003c/p\u003e\n\u003cp\u003e例如下面的代码，演示了如何使用该方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar A_Team = new Array(\"Tom\",\"Tommy\",\"John\");\u003c/span\u003e\u003cspan class=\"p\"\u003efunction\n        getItemsFn(value,index,array){\u003c/span\u003e\u003cspan class=\"p2\"\u003eif(value.length\u0026gt;=4){\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        value;\u003c/span\u003e\u003cspan class=\"p2\"\u003e}else{\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn \"small\"; // 如果字符数小于4，那么就返回这个值\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan\n        class=\"p\"\u003evar N_Team = A_Team.map(getItemsFn);\u003c/span\u003e\u003cspan class=\"p\"\u003edocument.writeln(N_Team); \u003cspan\n            class=\"r\"\u003e// 输出small,Tommy,John\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003efilter\u003c/h5\u003e\n\u003cp\u003e返回数组中的满足回调函数中指定的条件的元素。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003earray.filter(callbackfn[,thisArg])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e使用方法类似于 map 。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ecallbackfn：必须参数，一个接受最多三个参数的函数。对于数组中的每个元素，filter方法都会调用callback 函数一次\u003c/li\u003e\n    \u003cli\u003ethisArg：可选参数，可在 callback 函数中为其引用 this 关键字的对象。如果省略thisArg ，则undefined将作为 this 的值\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e返回值是一个包含回调函数为返回true的所有值的新数组。\u003c/p\u003e\n\u003cp\u003efilter()方法对数组中的每一项执行测试函数，根据函数结果构造一个新数组，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoArray.filter(callbackFunction[,thisObject])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数含义同every()方法。\u003c/p\u003e\n\u003cp\u003e该方法对数组中的每一元素执行测试函数，并构造一个新数组，其中的所有元素都对指定的函数返回true。如果某项返回false，则新数组中将不包含此元素。\u003c/p\u003e\n\u003cp\u003e下面的代码用于找出元素字符串中字符数大于等于4的项：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar A_Team = new Array(\"Tom\",\"Tommy\",\"John\");\u003c/span\u003e\u003cspan class=\"p\"\u003efunction\n        filterFn(value,index,array){\u003c/span\u003e\u003cspan class=\"p2\"\u003eif (value.length \u0026lt; 4) return false;\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eif (value.length \u0026gt;= 4) return true;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e// 按照自定义函数进行匹配，自定义函数是根据元素字符串长度进行对比的\u003c/span\u003e\u003cspan class=\"p\"\u003evar N_Team =\n        A_Team.filter(filterFn);\u003c/span\u003e\u003cspan class=\"p\"\u003edocument.write(N_Team); \u003cspan class=\"r\"\u003e//\n            输出Tommy,John\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e通过下面的运算，可以找出数组元素字符串中字符数最多的项：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar A_Team = new Array( \"Tom\", \"Tommy\", \"John\"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efunction filterFn(value, index, array) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (index \u0026lt; array.length - 1\n        \u0026amp; \u0026amp; index \u0026gt; 0) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (value.length \u0026lt; array[index + 1].length) return false; \u003c/span\u003e\u003cspan class=\"p6\"\u003eif\n        (value.length \u0026gt;= array[index + 1].length) return true; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (index == array.length) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (value.length \u0026lt; array[index - 1].length) return false; \u003c/span\u003e\u003cspan class=\"p6\"\u003eif\n        (value.length \u0026gt;= array[index - 1].length) return true; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (index == 0) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (value.length \u0026lt; array[index + 1].length) return false; \u003c/span\u003e\u003cspan class=\"p6\"\u003eif\n        (value.length \u0026gt;= array[index + 1].length) return true; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 按照自定义函数进行排序，自定义函数是根据元素字符串长度进行对比的\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar N_Team = A_Team.filter(filterFn); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(N_Team); \u003cspan\n            class=\"r\"\u003e// 输出Tommy\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e通过下面使用 filter（）方法过滤掉字符串中每个单词的首字母。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction f(value,index,ar){\u003c/span\u003e\u003cspan class=\"p2\"\u003eif(index == 0 ) return true; \u003cspan\n            class=\"r\"\u003e//第一个字母直接选择\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eelse return ar[index - 1] === \" \" //\n        如果前面是空字符串，则返回这个字符\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar a = \"The quick brown fox jumps over the\n        lazy dog.\"\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar submit = [].filter.call(a,f)\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(submit);\n        //T、q、b、f、j、o、t、l、d\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e使用 keys 迭代数组\u003c/h5\u003e\n\u003cp\u003ekeys()是Object的静态对象，专门用来遍历对象获取键名。Object.keys()函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar o = [a:\"A\",b:\"B\",c:\"C\"]\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(Object.keys(o)); \u003cspan\n            class=\"r\"\u003e//返回[\"a\",\"b\",\"c\"]\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003evar a = [\"A\",\"B\",\"C\"]\u003c/span\u003e\u003cspan\n        class=\"p\"\u003econsole.log(Object.keys(a));\u003cspan class=\"r\"\u003e//返回[\"0\",\"1\",\"2\"]\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003ekeys()功能单一，应用范围比较窄，但是执行效率比较高。\u003c/p\u003e\n\u003cp\u003e除了获取键名集合外，还可以间接获取对象的长度。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar o = [a:\"A\",b:\"B\",c:\"C\"]\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(Object.keys(o).length);\n        \u003cspan class=\"r\"\u003e//返回3\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003evar a = [\"A\",\"B\",\"C\"]\u003c/span\u003e\u003cspan\n        class=\"p\"\u003econsole.log(Object.keys(a).length);\u003cspan class=\"r\"\u003e//返回3\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 数组","title":"迭代"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","数组","迭代"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
