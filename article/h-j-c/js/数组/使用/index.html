    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e使用数组\u003c/h5\u003e\n\u003ch6\u003e存储数组元素\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e在 JavaScript 中长度是弹性的\u003c/li\u003e\n    \u003cli\u003e数值下标 0 开头\u003c/li\u003e\n    \u003cli\u003e数组下标必须大于 0 ，且不超过 2\u003csup\u003e32\u003c/sup\u003e-1 的值\u003c/li\u003e\n    \u003cli\u003e数组元素可以添加到对象中，方便非法的标识符读取属性值\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e数组长度 length 是动态值\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet a = []; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[2] = 1; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[100] = 2;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (let i in a) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(a[i]); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e对象和数组\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e对象是包含已命名的值的集合类型；数组是一种包含已编码值的集合类型\u003c/li\u003e\n    \u003cli\u003e调用标志符是本身，对象调用使用 '.' 或 '[]' ；数组则使用 '[]'\u003c/li\u003e\n    \u003cli\u003e用 '.' 读取对象属性时,是采用标识符,而 '[]' 是采用字符串,所以可以动态生成\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e使用点运算符存取属性时，属性名是标识符；而使用中括号运算符存取属性时，属性名是字符串。\u003c/p\u003e\n\u003c/div\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e关联数组是一种数据结构，它允许用户动态的将任意值和任意字符串关联起来。实际上，JavaScript 对象就是使用关联数组实现的。这样有助于在设计中将对象和数组作为单独的类型来处理。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e如果数组的下值太大、为负数、浮点数、布尔值、对象、其它值，Javascript 会自动将其转化成字符串，从而生成与字符串相关的关联数组，即对象属性的名字，而不再是数组的下标。\u003c/p\u003e\n\u003ctable id=\"this_l_o\"\u003e\n    \u003ccolgroup width=\"25%\"\u003e\u003c/colgroup\u003e\n    \u003ccolgroup width=\"25%\"\u003e\u003c/colgroup\u003e\n    \u003ctr\u003e\n        \u003cth\u003e数据集合\u003c/th\u003e\n        \u003cth\u003ee\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_l_o = [\n        [\"数组 \", \"Array\", \"固定大小的有序集合\"],\n        [\"数组列表 \", \"ArrayList\", \"对象的动态数组类型\"],\n        [\"列表 \", \"List\", \"可通过索引访问的对象的强类型列表\"],\n        [\"字典 \", \"Dictionary\", \"表示键和值的集合\"],\n        [\"有序列表 \", \"SortedList\", \"与哈希表类似\"],\n        [\"哈希表 \", \"HashTable\", \"名/值对,类似字典,比数组更强大\"],\n        [\"栈 \", \"Stack \", \"后进先出栈集合\"],\n        [\"列队 \", \"Queue\", \"先进先出栈集合\"]\n    ];\n    _MiMethod.td(\"this_l_o\");\n\u003c/script\u003e\n\u003cp class=\"p4\"\u003e哈希表\u003c/p\u003e\n\u003cp\u003e伪数组（关联数组），类似于其它语言的非数字索引数组。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar a = []; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[\"张三\"] = 1; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[\"李四\"] =\n        2; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[\"王五\"] = 3; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a[\"李四\"])\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e定义多维数组\u003c/h6\u003e\n\u003cp\u003eJavaScript 不支持多维数组，但是多维数组在实际开发中非常有用，所以可以套娃。\u003c/p\u003e\n\u003ch5\u003e数组的长度\u003c/h5\u003e\n\u003cp\u003e在 Javascript 中，数组的长度是灵活的，不需要考虑数组的元素是否超出，或者下标是否保持连续。\u003c/p\u003e\n\u003ch5\u003e数组下标\u003c/h5\u003e\n\u003cp\u003e数组下标必须是大于 0 的整数，当然，也可以是任何类型数据。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar a = []; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[true] = 1; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[false] =\n        0; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[-1] = 2; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a.length); \u003cspan class=\"r\"\u003e// 0\n            ，说明数组长度并没有增加\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a[true]); \u003cspan class=\"r\"\u003e// 1\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(a[false]); \u003cspan class=\"r\"\u003e// 0\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(a[1]); \u003cspan class=\"r\"\u003e// undefined\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a[0]); \u003cspan\n            class=\"r\"\u003e// undefined\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a[-1]); \u003cspan class=\"r\"\u003e//\n            2\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(a[\"-1\"]) \u003cspan class=\"r\"\u003e// 2\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e虽然 JavaScript 可以将 true 和 false 转化为 1 和 0，但是将其当作对象来处理。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar a = []; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[0, 0] = 1; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[0, 1] =\n        2; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[1, 0] = 3; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea[1, 1] = 4; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(a.length + \"\u0026lt;br/\u0026gt;\"); \u003cspan class=\"r\"\u003e// 2\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(a[0] + \"\u0026lt;br/\u0026gt;\"); \u003cspan class=\"r\"\u003e// 3\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(a[1]) \u003cspan class=\"r\"\u003e// 4\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上述写法不会报错，但是前两行代码会被后两行覆盖掉。数组的值以下标计算后为准。\u003c/p\u003e\n\u003ch5\u003e多维数组\u003c/h5\u003e\n\u003cp\u003eJavaScript中，虽然不可以直接声明多维数组，但是可以将数组实现为嵌套数组，其实质上是数组的数组。嵌套数组也可以视作多维数组，可以看作是矩阵或网格。\u003c/p\u003e\n\u003cp\u003e例如下面的代码就实现了一个多维数组：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar twoDArray = new Array(new Array(\"one\", \"two\"),\u003c/span\u003e\n    \u003cspan class=\"p\"\u003enew Array(\"three\", \"four\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(twoDArray); \u003cspan class=\"r\"\u003e// 输出one,two,three,four\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e数组twoDArray包含2个元素，每个元素都是一个包含两个元素的数组，twoDArray是包含2个嵌套数组的主数组，从而可以看作是一个两行两列的二维数组。\u003c/p\u003e\n\u003cp\u003e要检索多维数组的元素，可以在顶层数组的名称之后使用多个数组访问运算符([])。第一个\"[]\"指向顶层数组的索引，随后的数组访问运算符指向嵌套数组的元素。例如，可以使用下面的方法访问前面定义的二维数组：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003edocument.write(twoDArray[0][0]); \u003cspan class=\"r\"\u003e// 输出one\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(twoDArray[1][1]); \u003cspan class=\"r\"\u003e// 输出four\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e也可以使用循环语句遍历多维数组，例如下面的程序代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar twoDArray = new Array(new Array( \"one\", \"two\"), \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003enew Array( \"three\", \"four\")); \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 这里用到了Array类的属性length \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar outerArrayLength = twoDArray.length; // 主数组的长度\u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i = 0; i\n        \u0026lt; outerArrayLength; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 嵌套数组的长度\u003c/span\u003e\u003cspan class=\"p4\"\u003evar innerArrayLength\n        = twoDArray[i].length; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efor (var j = 0; j \u0026lt; innerArrayLength; j++) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.write(twoDArray[i][j] + \"\u0026lt;br\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 数组","title":"使用"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","数组","使用"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
