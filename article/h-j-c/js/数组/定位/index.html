="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>定位</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定位\u003c/h5\u003e\n\u003cp\u003e定位数组用 indexOf() 和 lastIndexOf() 。它们用来检索数组元素，返回指定的元素的索引位置。JavaScript 最早在 String 中定义了 index() 和 lastIndexOf()\n    方法，ECMAScript 5 模仿在 Array 中也加入了这两个部分。\u003c/p\u003e\n\u003ch5\u003eindexOf()\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003earray.indexOf(searchElements[,formIndex])\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003esearchElements : 必须参数，要定位的值\u003c/li\u003e\n    \u003cli\u003eformIndex : 可选参数，用于开始的索引\n        \u003cul\u003e\n            \u003cli\u003e不选。默认 0\u003c/li\u003e\n            \u003cli\u003e大于 length ，返回 -1\u003c/li\u003e\n            \u003cli\u003e小于 0 ，倒着来\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eindexOf() 方法是按升序索引顺序执行搜索，即从左到右进行检索。检索时，会对数组元素与 searchElement 参数值进行全等比较（ === ）。\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar ar = ['ab', 'cd', 'ef', 'ab', 'cd']; \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(qr.indexOf('cd') +\n        '\u0026lt;br/\u0026gt;'); \u003cspan class=\"r\"\u003e // 1 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(qr.indexOf(cd, 2) +\n        '\u0026lt;br/\u0026gt;'); \u003cspan class=\"r\"\u003e // 4 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(qr.indexOf('gh') +\n        '\u0026lt;br/\u0026gt;'); \u003cspan class=\"r\"\u003e // -1 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(qr.indexOf('ab', -2) +\n        '\u0026lt;br/\u0026gt;'); \u003cspan class=\"r\"\u003e // 3 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003elastIndexOf()方法\u003c/h5\u003e\n\u003cp\u003elastIndexOf()方法使用全等运算符\"===\"搜索数组中的项（从最后一项开始向前搜索），并返回匹配项的索引位置，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoArray.lastIndexOf(searchElement[,fromIndex])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e参数searchElement定义要在数组中查找的项。如果未找到，则返回值为-1。\u003c/li\u003e\n    \u003cli\u003e参数fromIndex定义查找的起始索引位置，从该位置开始搜索指定项，如果不定义该值，则表示从oArray.length-1开始。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e例如下面的代码，演示了如何使用该方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar A_Team = new Array(\"MarCaller\",\"Mary\", \"Jody\",\"Judy\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003cspan class=\"r\"\u003e // 注意与indexOf方法的结果对比\u003c/span\u003e\n        \u003cspan class=\"p\"\u003evar temp_int = A_Team.lastIndexOf(\"Jody\",3); \u003cspan class=\"r\"\u003e// 从索引3向前\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003edocument.write(temp_int); \u003cspan class=\"r\"\u003e// 返回2\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003etemp_int = A_Team.indexOf(\"Jody\",3); \u003cspan class=\"r\"\u003e// 从索引3向后\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003edocument.write(temp_int); \u003cspan class=\"r\"\u003e// 返回-1\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e断言函数\u003c/h5\u003e\n\u003cp\u003e断言函数接收 3 个参数：元素、索引和数组本身。其中元素是数组中当前搜索的元素，索引是当前 元素的索引，而数组就是正在搜索的数组。断言函数返回真值，表示是否匹配。\n\u003c/p\u003e\n\u003cp\u003efind()和 findIndex()方法使用了断言函数。这两个方法都从数组的最小索引开始。find()返回 第一个匹配的元素，findIndex()返回第一个匹配元素的索引。这两个方法也都接收第二个可选的参数，\n    用于指定断言函数内部 this 的值。\u003c/p\u003e\n\u003ch5\u003e归并方法\u003c/h5\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 数组","title":"定位"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","数组","定位"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
