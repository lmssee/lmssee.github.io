    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003ereduce()方法\u003c/h5\u003e\n\u003cp\u003e使用reduce方法可对数组中所有的元素调用指定的回调函数。该回调函数是返回值的累计结果，并且此返回值在下一次调用该回调函数时作为参考提供。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003earray.reduce(callbackfn[,initialValue])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ecallbackfn 对于数组中的每个元素，reduce 方法都调用callbackfn 一次\u003c/li\u003e\n    \u003cli\u003einitialValue 可选参数，如果指定initialValue,则它将作为初始值自动累积，第一次调用 callbackfn 会将此值作为参数而非数组值提供\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e如果提供了参数 initialValue ，则reduce 方法会对每一个数组中的每一个元素调用一次 callbackfn 函数（按升序索引顺序）。如果未提供 initialValue\n    ，则reduce方法会将第二个元素开始的每一个元素调用callbackfn 函数。\u003c/p\u003e\n\u003cp\u003e回调函数语法如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efunction callbackfn(previousValue, currentValue, currentIndex, array)\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003epreviousValue 通过上一次回调函数获得的值，如果向 reduce 方法提供 initialValue ，则在首次使用函数时，previousValue 为 initialValue\u003c/li\u003e\n    \u003cli\u003ecurrentValue 当前数组元素的值\u003c/li\u003e\n    \u003cli\u003ecurrentIndex 当前数组元素的数字索引\u003c/li\u003e\n    \u003cli\u003earray 包含该元素的数组对象\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ereduce()方法从左到右，使用函数对比数组中的两个值，将这两个值删除一个，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoArray.reduce(callbackFunction[,initialValue])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cp\u003e参数callbackFunction定义对数组中的每一元素进行匹配运算的函数。该函数可以包含4个参数，即前一个元素值、当前元素值、当前元素索引和Array对象，格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efunction callbackFunction(previous,current,index,array){}\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数initialValue定义第一次调用callbackFunction函数时的previous参数，如果定义该参数，当前值是第一个元素值；如果不定义initialValue，第一次调用callbackFunction函数时，前一个值是第一个元素值，当前值是第二个元素值。\n\u003c/p\u003e\n\u003cp\u003e该方法对数组中的每两个元素执行测试函数，每执行一次就减去一个元素，并将返回值作为当前元素，依次类推。\u003c/p\u003e\n\u003cp\u003e例如下面的代码，演示了如何使用该方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar A_Team = [0, 1, 2, 3];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003efunction getItemsFn(previous,current,index,array){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereturn previous + current; \u003cspan class=\"r\"\u003e// 所有元素相加\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar temp_int = A_Team.reduce(getItemsFn);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.writeln(temp_int); // 返回6\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e下面是调用的过程：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e// 第一次调用，当前值是倒数第二个元素\u003c/span\u003e\n    \u003cspan class=\"p\"\u003epreviousValue = 0, currentValue = 1, index = 1\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 第二次调用\u003c/span\u003e\n    \u003cspan class=\"p\"\u003epreviousValue = 1, currentValue = 2, index = 2\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 第三次调用\u003c/span\u003e\n    \u003cspan class=\"p\"\u003epreviousValue = 3, currentValue = 3, index = 3\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e下例演示。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction appendCurrent(previousValue, currentValue) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        previousValue + \"::\" + currentValue \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar elements = [\"abc\",\n        \"def\", 123, 456]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar result = elements.reduce(appendCurrent); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(result); \u003cspan class=\"r\"\u003e// abc::def::123::456\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e下例向数组中添加元值。currentIndex 和 array 参数用于回调函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction addDigitValue(previousValue, currentDigit, currentIndex, array) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar exponent = (array.length - 1) - currentIndex; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar digitValue\n        = currentDigit * Math.pow(10, exponent); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar digits = [4, 1, 2, 5]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar result =\n        digits.reduce(addDigitValue, 0); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(result) \u003cspan class=\"r\"\u003e//\n            4125\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e下例获取一个数组，该数组包含另一个数组中介于 1 和 10 之间值，，提供给 reduce 方法的初始值的一个空数组。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction Process(previousArray, currentValue) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar nextArray;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (currentValue \u0026gt;= 1 \u0026\u0026 currentValue \u0026lt;= 10) nextArray =\n        previousArray.concat(currentValue); \u003c/span\u003e\u003cspan class=\"p4\"\u003eelse nextArray = previousArray; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn nextArray \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar numbers = [20, 1, -5, 6,\n        50, 3]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar emptyArray = new Array(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar resultArray =\n        numbers.reduce(Process, emptyArray); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(resultArray); \u003cspan class=\"r\"\u003e// 1,6,3\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003ereduceRight()方法\u003c/h5\u003e\n\u003cp\u003ereduceRight()方法从右到左 ，该回调函数的返回值为累计结果，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoArray.reduceRight(callbackFunction[,initialValue])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cp\u003e参数callbackFunction定义对数组中的每一元素进行匹配运算的函数。该函数可以包含4个参数，即前一个元素值、当前元素值、当前元素索引和Array对象，格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efunction callbackFunction(previous,current,index,array){}\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数initialValue定义第一次调用callbackFunction函数时的previous参数，如果定义该参数，当前值是最后一个元素值；如果不定义initialValue，第一次调用callbackFunction函数时，前一个值是最后一个元素值，当前值是倒数第二个元素值。\n\u003c/p\u003e\n\u003cp\u003e该方法对数组中的每两个元素执行测试函数，每执行一次就减去一个元素，并将返回值作为当前元素，依次类推。\u003c/p\u003e\n\u003cp\u003e例如下面的代码，演示了如何使用该方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar A_Team = [0, 1, 2, 3]; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        getItemsFn(previous, current, index, array) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn previous + current; \u003cspan\n            class=\"r\"\u003e// 所有元素相加\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar temp_int = A_Team.reduceRight(getItemsFn); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.writeln(temp_int);\n        // 返回6\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e下面是调用的过程：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e// 第一次调用，当前值是倒数第二个元素\u003c/span\u003e\n    \u003cspan class=\"p\"\u003epreviousValue = 3, currentValue = 2, index = 2\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 第二次调用\u003c/span\u003e\n    \u003cspan class=\"p\"\u003epreviousValue = 5, currentValue = 1, index = 1\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e// 第三次调用\u003c/span\u003e\n    \u003cspan class=\"p\"\u003epreviousValue = 6, currentValue = 0, index = 0\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 数组","title":"汇总"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","数组","汇总"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
