                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eArray推知\u003c/h5\u003e\n\u003cp\u003eArray推知是产生器的一个用法，它提供了可以执行数组初始化的一个便利方法。例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction range(begin, end) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efor (let i = begin; i \u0026lt; end; ++i) {\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eyield i;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003erange函数包含yield语句，因此是一个产生器，它返回begin和end之间的所有值，可以这样使用该产生器：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar ten_squares = [i * i for each (i in range(0, 10))];\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e这会产生一个数组并初始化，包含了0~9这几个数字的二次方值，在初始化数组时也可以使用条件语句，例如下面的代码仅包含0~20之间的偶数：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar evens = [i \u003c/span\u003e\u003cspan class=\"p4\"\u003efor each(i in range(0, 21)) if (i\n        % 2 == 0) \u003c/span\u003e\u003cspan class=\"p2\"\u003e]; \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 在JavaScript 1.7 之前， 要实现这样的功能，\n        必须使用下面的语法：\u003c/span\u003e\u003cspan class=\"p2\"\u003evar evens = []; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efor (var i = 0; i \u0026lt;= 20; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (i % 2 == 0) \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eevens.push(i); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e对比一下就可以看出，使用数组推知可使代码更加简洁。\u003c/p\u003e\n\u003cp\u003e注意，数组推知的方括号构成一个作用范围，其中的变量不具有全局作用范围。\u003c/p\u003e\n\n\u003cscript\u003e\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 数组","title":"推知"},"__N_SSG":true},"page
