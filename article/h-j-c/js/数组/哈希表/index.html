    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e哈希表\u003c/h5\u003e\n\u003cp\u003e了解数据结构的人应该都听说过哈希表这种数据结构，它是一种典型的利用键值来存储并检索数据的一种非线性结构，又称散列表或杂凑法。\u003c/p\u003e\n\u003cp\u003e哈希表使用键值对进行数据的存储，在数据的存储位置和它的关键字之间建立了一一对应的关系，从而使每个关键字和结构中的一个唯一的存储位置相对应，所以在检索数据时，只需要根据这个对应关系便可快速定位到要查找的数据。\u003c/p\u003e\n\u003cp\u003e这与复合数组的存储完全相同，但事实上，用户通常并不关心数据是如何存储的，而关心在使用数据的时候是否方便，例如对数据进行排序、查找、替换等操作，由于这种操作是贯穿在整个应用程序始终的，因此对效率的要求较高。\u003c/p\u003e\n\u003ch5\u003e实现哈希表\u003c/h5\u003e\n\u003cp\u003eJavaScript本身并没有直接提供类似于哈希表的结构，不过可以从数组出发，按照哈希表的原理自己打造一个脚本语言专有的哈希表数据结构，例如下面的实现：\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003een \u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p2\"\u003efunction HashTable() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis._hash = {}; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003ethis._count = 0; /** * 添加或更新key */ \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.put = function(key, value) {\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (this._hash.hasOwnProperty(key)) { \u003c/span\u003e\n        \u003cspan class=\"p8\"\u003ethis._hash[key] = value; \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn true; \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n            else { \u003c/span\u003e\u003cspan class=\"p8\"\u003ethis._hash[key] = value; \u003c/span\u003e\u003cspan class=\"p8\"\u003ethis._count++;\n        \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn true; \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e} /** * 获取key指定的值 */ \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.get = function(key) { \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003eif (this.containsKey(key)) return this._hash[key]; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} /** * 获取元素个数 */\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.size = function() { \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003ereturn this._count; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} /** * 检查是否为空 */ \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003ethis.isEmpty = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (this._count \u0026 lt; = 0) \u003c/span\u003e\u003cspan\n            class=\"p8\"\u003ereturn true; \u003c/span\u003e\u003cspan class=\"p6\"\u003eelse return false; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e} /** * 检查是否包含指定的key */ \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.containsKey = function(key) {\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn this._hash.hasOwnProperty(key); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} /** *\n            检查是否包含指定的value */ \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.containsValue = function(value) { \u003c/span\u003e\n        \u003cspan class=\"p8\"\u003efor (var strKey in this._hash) { \u003c/span\u003e\u003cspan class=\"p10\"\u003eif (this._hash[strKey] == value)\n            return true; \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn false; \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003e/** * 删除一个key */ \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003ethis.remove = function(key) { \u003c/span\u003e\u003cspan class=\"p8\"\u003edelete this._hash[key]; \u003c/span\u003e\u003cspan\n            class=\"p8\"\u003ethis._count; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e/** * 清除所有key */ \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003ethis.clear = function() { \u003c/span\u003e\n        \u003cspan class=\"p8\"\u003ethis._hash = {}; \u003c/span\u003e\u003cspan class=\"p8\"\u003ethis._count = 0; \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003e/** * 从HashTable中获取key的集合，以数组形式返回 */ \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.keySet =\n            function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar arrKeySet = new Array(); \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003evar index = 0; \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (var strKey in this._hash) { \u003c/span\u003e\u003cspan\n            class=\"p8\"\u003earrKeySet[index++] = strKey; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n            (arrKeySet.length == 0) ? null : arrKeySet; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e} /** * 从HashTable中获取value的集合，以数组形式返回 */ \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.values = function() {\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003evar arrValues = new Array(); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar index = 0; \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003efor (var strKey in this._hash) { \u003c/span\u003e\n        \u003cspan class=\"p8\"\u003earrValues[index++] = this._hash[strKey]; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003ereturn (arrValues.length == 0) ? null : arrValues; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e}\u003c/span\u003e\n            \u003c/code\u003e\n\u003c/details\u003e\n\u003cp\u003e上述代码实现起来很简单，在函数中定义了一个_hash对象，实现一个复合数组，该对象有一个属性key，可以给这个属性赋值。hasOwnProperty()方法用于返回指定的对象中是否包含某个属性。\u003c/p\u003e\n\u003cp\u003e同时，在该函数中还定义了一个_count对象，用于记录哈希表中的数据个数，因为不希望每次获取哈希表中的数据个数时都要通过一个内置的循环来计数，这样开销会小一些。\u003c/p\u003e\n\u003ch5\u003e添加和获取元素\u003c/h5\u003e\n\u003cp\u003e使用HashTable.put()方法可以向HashTable对象添加键和元素值对，也就是一个元素。该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoHashTable.put(key, value)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e如果key已经存在，则会更新与键相关联的元素值。\u003c/p\u003e\n\u003cp\u003e使用HashTable.get()方法可以从HashTable对象获取指定键对应的元素值，该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoHashTable.get(key)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar d = new HashTable();\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ed.put(\"a\", \"Microsoft\"); \u003cspan class=\"r\"\u003e// 添加键和元素值\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ealert(d.get(\"a\")); \u003cspan class=\"r\"\u003e// 获取元素值，显示Microsoft\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e删除元素\u003c/h5\u003e\n\u003cp\u003e使用HashTable.remove()方法可以从HashTable对象中删除指定键，由于元素总是和某个键相关联，所以可以删除该键指向的元素。该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoHashTable.remove(key)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e使用HashTable.clear()方法可以删除HashTable对象中的所有元素，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoHashTable.clear()\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e下面的代码说明了如何使用remove()和clear()方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar d = new HashTable(); \u003cspan class=\"r\"\u003e// 创建一个实例\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ed.put(\"a\", \"Microsoft\"); \u003cspan class=\"r\"\u003e// 添加键和元素值对\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ed.put(\"b\", \"IBM\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ed.put(\"c\", \"Oracle\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ed.remove(\"b\"); \u003cspan class=\"r\"\u003e// 删除第二个元素\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ed.clear(); \u003cspan class=\"r\"\u003e// 删除所有元素\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e检查键或元素是否存在\u003c/h5\u003e\n\u003cp\u003e可以使用containsKey()方法检查HashTable对象中是否已经存在指定的键。如果存在，containsKey()方法返回true；如果不存在，则返回false。\u003c/p\u003e\n\u003cp\u003e该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoHashTable.containsKey(key)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e也可以使用containsValue()方法检查HashTable对象中是否已经存在指定的元素值，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoHashTable.containsValue(value)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e下面的代码说明了如何使用containsKey()和containsValue()方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar d = new HashTable(); \u003cspan class=\"r\"\u003e// 创建一个实例\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ed.put( \"a\", \"Microsoft\"); \u003cspan class=\"r\"\u003e// 添加键和元素对\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ed.put( \"b\",\n        \"IBM\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ed.put( \"c\", \"Oracle\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (d.containsKey( \"c\")) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ealert( \"指定的键存在。\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert( \"指定的键不存在。\");\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (d.containsValue( \"IBM\")) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\n        \"指定的元素存在。\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert( \"指定的元素不存在。\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e获取元素数量\u003c/h5\u003e\n\u003cp\u003e使用HashTable.size()方法可以返回一个HashTable对象包含的元素总数，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoHashTable.size()\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e也可以使用HashTable.isEmpty()方法检查HashTable中是否存在元素，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoHashTable.isEmpty()\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e迭代元素\u003c/h5\u003e\n\u003cp\u003e使用HashTable.keySet()方法可以返回一个数组，该数组中包含了HashTable中的所有键，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar keys = oHashTable.keySet()\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e使用HashTable.values()方法可以返回一个数组，该数组中包含了HashTable中的所有值，其语法格式如下：\u003c/p\u003e\n\u003cp\u003evar values = oHashTable.values()。\u003c/p\u003e\n\u003cp\u003e例如，下面的代码说明了如何使用迭代元素值、键：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar d = new HashTable(); \u003c/span\u003e\u003cspan class=\"p2\"\u003ed.put( \"a\",\n        \"Microsoft\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003ed.put( \"b\", \"IBM\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003ed.put( \"c\", \"Oracle\");\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write( \"\u0026lt;b\u0026gt;遍历HashTable的key值\u0026lt;/b\u0026gt;\u0026lt;br\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        keys = d.keySet(); \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i in keys) { \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.write(keys[i]\n        + \"\u0026lt;br\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write( \"\u0026lt;b\u0026gt;遍历HashTable的value值\u0026lt;/b\u0026gt;\u0026lt;br\u0026gt;\");\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar values = d.values(); \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i in values) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edocument.write(values[i] + \"\u0026lt;br\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 数组","title":"哈希表"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","数组","哈希表"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
