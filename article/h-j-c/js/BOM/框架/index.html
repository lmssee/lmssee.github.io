                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e使用框架集\u003c/h5\u003e\n\u003cp\u003eHTML允许使用 frameset 和 frame 标签创建框架集页面。另外，也可以在文档中使用 iframe 标签创建浮动框架。这两种类型的框架性质是相同的。\u003c/p\u003e\n\u003cp\u003e每一个框架都有自己的 window 对象，并且保存在 frames 集合中。在集合中，可以通过数字索引从左至右、由上到下访问每一个 window 对象。每一个 window 对象都有一个 name 属性，其中包含了框架的名称。\n\u003c/p\u003e\n\u003cp\u003e在每一个框架中， window 都指向哪一个框架实例，而非最高层的框架； top 对象始终指向最高层框架，也就是浏览器窗口； parent 始终指向当前框架的上一层。\u003c/p\u003e\n\u003ctable id=\"this_o\"\u003e\n    \u003ccaption\u003ewindow 对象属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003eself 对象，它是终极 window 属性，始终会指向 window。实际上， self 和 window 就 是同一个对象。之所以还要暴露 self，就是为了和 top、 parent 保持一致。\u003c/p\u003e\n\u003cp\u003e这些属性都是 window 对象的属性，因此访问 window.parent、 window.top 和 window.self 都可以。这意味着可以把访问多个窗口的 window 对象串联起来，比如\n    window.parent.parent。\u003c/p\u003e\n\n\u003cscript\u003e\n    var this_o = [\n        [\"top\", \"如果是当前框架，就是对包含这个框架的顶级框架窗口的 window对象的引用。注意，对于嵌套在其它框架中的框架， top 未必等于 parent\"],\n        [\"parent\", \"如果当前窗口是框架，它就是对窗口中包含这个框架的父级框架引用 \"],\n        [\"window\", \"自引用，是对当前 window对象的引用，与 self属性同义 \"],\n        [\"self\", \"只引用，是对当前 window对象的引用，与 window属性相同 \"],\n        [\"frames\\[\\]\", \"window 对象集合，代表窗口中的各个框架 \"],\n        [\"name\", \"窗口的名称，可被 HTML标签的 \u0026lt;a\u0026gt;属性使用 \"],\n        [\"opener\", \"对打开当前窗口的 window对象的引用 \"]\n    ];\n    _MiMethod.td(\"this_o\")\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ BOM","title":"框架"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","BOM","框架"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
