class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>document</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003edocument 代表当前的文档，使用 window 对象的 document 属性访问。\u003c/p\u003e\n\u003ch5\u003e访问文档对象\u003c/h5\u003e\n\u003cp\u003e当浏览器加载后，会自动构建文档对象模型，把文档中每一个元素都映射到一个数据集合中，然后以 document 访问。 document 对象和它说包含的节点构成了早期的文档对象模型。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e本 document 非 DOM 中的 document 。本 document 是早期的、非标准的、但被浏览器广泛支持的文档结构范文模式。而 DOM 是 W3C\n        组织制定的，标准化的文档结构类型，也获得了浏览器的广泛支持。两者共存于浏览器中，并出现了部分功能重叠。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e这些集合就像是 HTMLCollection 对象，为访问文档常用对现象提供了快捷的方式，简单说明：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003edocument.anchors 返回文档中所有的 Anchor 对象，及所有带 name 属性的 \u0026lt;a\u0026gt;标签的\u003c/li\u003e\n    \u003cli\u003edocument.applets 返回文档中所有的 Applets 对象，及所有的 \u0026lt;applet\u0026gt; 标签的，不在推荐使用\u003c/li\u003e\n    \u003cli\u003edocument.forms 返回文档中所有 From 对象，与 document.getElementsByTagName(\"form\") 得到的结果相同\u003c/li\u003e\n    \u003cli\u003edocument.images 返回文档中所有的 Image 对象，与 document.getElementsByTagName(\"image\") 得到的结果相同\u003c/li\u003e\n    \u003cli\u003edocument.links 返回文档中所有 Area 和 Link 对象，及所有的带 href 特性的 \u0026lt;a\u0026gt;\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e使用 name 访问文档元素\u003c/h6\u003e\n\u003cp\u003e如果与 From 对象、 Image 对象或 Applet 对象对应的 HTML 标签中设置了 name 属性，那么还可以使用 name 属性值引用这些对象。浏览器在解析文档时，会自动把这些元素的 name 属性值定义为\n    document 对象的属性名，用来引用相关的对象。该方法仅适用于上述三种对象，其它对象需要使用数组名来访问。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;img name=\"img\" src=\"bg.gif\" /\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;form name=\"form\" method=\"post\"\n        action=\"https://lmssee.cn/\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/form\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(document.img.src);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.log(document.form.action);\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e使用文档对象集合快速检索\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;img src=\"bg.gif\" alt=\"bg\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;form action=\"https://lmssee.cn\"\n        method=\"post\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/form\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003econsole.log(document.images[0].src);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.log(document.forms[0].action);\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e如果设置了 name 属性 ，也可以使用关联数组引用对应的元素对象\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;img src=\"bg.gif\" alt=\"bg\" name=\"img\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;form\n        action=\"https://lmssee.cn\" method=\"post\" name=\"form\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/form\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(document.images[\"img\"].src);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.log(document.forms[\"form\"].action);\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e动态生成文档内容\u003c/h6\u003e\n\u003cp\u003edocument 对象的 write() 和 writeIn() 方法可动态生成文档内容。\u003c/p\u003e\n\u003cp\u003ewriteIn() 和 write() 的使用方法是一样的，只不过在输出的参数后面天界了换行符。但 html 本身是忽略换行符的，所以很少使用。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e只能在当前文档解析时才能使用 write() 方法在文档中输出 HTML 代码，即在 \u0026lt;script\u0026gt; 中调用 write方法，因为这些脚本的执行是文档解析的一部分。如果是从事件处理函数中调用\n        write() 函数，那么 write() 方法动态输出的结果就是覆盖当前文档，包括它的时间函数，而不是将文本添加到其中。所以，使用时小心，且不可在事件处理函数中使用。\u003c/p\u003e\n\u003c/div\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ BOM","title":"document"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","BOM","document"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
