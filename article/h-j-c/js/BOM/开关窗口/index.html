="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>开关窗口</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e通过 open方法打开新窗口\u003c/h5\u003e\n\u003cp\u003e打开窗口可以使用 JavaScript的\n    open方法打开浏览器对话框。作为一名程序开发人员，可以基于特定的条件创建带有被装入其中的特定文档的新对话框，也可以指定新对话框的大小以及对话框中可用的选项，并且可以为引用的对话框指派名字。\u003c/p\u003e\n\u003cp\u003e利用 open方法可以打开一个新的窗口，并在窗口中装载指定 URL地址的网页。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eWindowVar=window.open(url,windowName,features,replace); \u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eWindowVar：当前打开窗口的句柄。如果 open方法成功，则 WindowVar的值为一个 Window对象的句柄，否则 WindowVar的值是一个空值。\u003c/li\u003e\n    \u003cli\u003eurl：目标窗口的 URL。如果 URL是一个空字符串，则浏览器将打开一个空白窗口，允许用 write方法创建动态 HTML。\u003c/li\u003e\n    \u003cli\u003ewindowName： Window对象的名称。该名称可以作为属性值在 \u0026lt;a\u0026gt;和 \u0026lt;form\u0026gt;标记的\n        target属性中出现。如果指定的名称是一个已经存在的窗口名称，则返回对该窗口的引用，而不会再新打开一个窗口。\u003c/li\u003e\n    \u003cli\u003efeatures: 可选字符串，声明了新窗口要显示的标准浏览器的特征。如果省略，新窗口将具有所有的标准特性\u003c/li\u003e\n    \u003cli\u003ereplace： 可选布尔值。规定了装载窗口的 URL是在窗口的浏览历史创建新条目，还是替换浏览器历史中的当前条目\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable id=\"this_o\"\u003e\n    \u003ccaption\u003elocation的可选参数及说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e参数值\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e例如，打开一个新窗口 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.open(\"new.htm\",\"new\"); \u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar ha = window.open(\"https:\\/\\/lmssee.cn\", \"a033\",\n        \"channelmode=yes,directories=no,fullscreen=yes,location=no,menubar=no,resizable=no,scrollbars=no,status=no,titlebar=no,toolbar=no,width=424px,left=0px,top=0px,width=525px\",\n        true);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e例如，打开一个指定大小的窗口 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.open(\"new.htm\",\"new\",\"height=141,width=693\"); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e例如，打开一个指定位置的窗口 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.open(\"new.htm\",\"new\",\"height=141,width=693\"); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e例如，打开一个带滚动条的固定窗口 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.open(\"new.htm\",\"new\",\"scrollbars,resizable\"); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e例如，打开一个新的浏览器对话框，在该对话框中显示 bookinfo.htm文件，设置打开对话框的名称为 \"bookinfo\"，并设置对话框的宽度和高度 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar win=window.open(\"hi.htm\",\"hi\",\"width=400,height=300\"\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e在使用 open方法时，需要注意以下几点：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e通常浏览器窗口中，总有一个文档是打开的，因而不需要为输出建立一个新文档\u003c/li\u003e\n    \u003cli\u003e在完成对 Web文档的写操作后，要使用或调用 close方法来实现对输出流的关闭\u003c/li\u003e\n    \u003cli\u003e在使用 open方法来打开一个新流时，可为文档指定一个有效的文档类型。有效文档类型包括 text/HTML、 text/gif、 text/xim、 text/plugin等\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e创建的 window 对象具有一个 opener 属性，引用打开它的原始窗口对象。 opener 只在弹出窗口的最外层 window 对象（ top）中定义，而且指向调用 window.open（）方法的窗口或框架。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003emyWindow = window.open(\"223. html\"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003emyWindow.document.write(\"\u0026lt;h1\u0026gt;这是新打开的窗口 \u0026lt;/h1\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003emyWindow.focus();\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003emyWindow.opener.document.write(\"\u0026lt;h1\u0026gt;我是旧窗口\n        \u0026lt;/h1\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(myWindow.opener == window);\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar url = \"https://lmssee.cn/\"\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar features = \"height = 500, width = 800 ,top = 100 ,left = 100 ,toolbar = no, menubar = no ,\n        scrollbars = no, resizable = no,location = no, status = no\"\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write('\u0026lt;a href=\"https://lmssee.art.blog\" target=\"newW\" \u0026gt;去它妈的博客\n        \u0026lt;/a\u0026gt;');\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar me = window.open (url ,\"newW\" ,features);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003esetTimeout(function(){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eif(me.closed){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log(\"创建的窗口已关闭。 \")\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}else{\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eme.close();\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e},500);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e有些浏览器的窗口中有一个指针（ opener）指向打开它的原始窗口，但原始窗口并没有这样的指针指向弹出窗口。窗口并不跟踪已打开的窗口，因此需要手动实现跟踪。\u003c/p\u003e\n\u003cp\u003e将 opener 属性设置为 null 时，这样建立的新标签页就无法与打开它的标签页通信。标签页之间的通信一旦切断，就再也无法恢复。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar error = false; \u003c/span\u003e\u003cspan class=\"p2\"\u003etry { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar w =\n        window.open(\"https:/\\/lmssee.cn\", \"_blank\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (w == null) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eerror = true; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} catch (ex) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eerror = true \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eif (error) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"浏览器禁止弹出窗口 \") \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e弹窗屏蔽程序\u003c/h6\u003e\n\u003cp\u003e所有现代浏览器都内置了屏蔽弹窗的程序，因此大多数意料之外的弹窗都会被屏蔽。在浏览器屏蔽 弹窗时，可能会发生一些事。如果浏览器内置的弹窗屏蔽程序阻止了弹窗，那么 window.open()很可 能会返回\n    null。此时，只要检查这个方法的返回值就可以知道弹窗是否被屏蔽了。在浏览器扩展或其它程序屏蔽弹窗时， window.open()通常会抛出错误。因此要准确检测弹窗是 否被屏蔽，除了检测\n    window.open()的返回值，还要把它用 try/catch 包装起来。\u003c/p\u003e\n\u003ch5\u003e通过 close 方法关闭窗口\u003c/h5\u003e\n\u003ch6\u003e关闭当前窗口\u003c/h6\u003e\n\u003cp\u003e利用 Window对象的 close方法可以实现关闭当前窗口。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.close();\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e例如，关闭当前窗口，可以用下面的任何一种语句实现。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow. close();\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eclose();\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ethis. close();\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e\u003csmall\u003e\u003csmall\u003e\u003cmark\u003e如果窗口不是由其它窗口打开的，那么这个属性在 Netscape中返回 null，在 IE中返回\"未定义\"（ undefined）。 undefined在一定程度上等于\n                null。需要说明的是， undefined不是 JavaScript常数；如果读者企图使用 undefined，那就真的返回\"未定义\"了\u003c/mark\u003e\u003c/small\u003e\u003c/small\u003e。\u003c/p\u003e\n\u003ch6\u003e关闭子窗口\u003c/h6\u003e\n\u003cp\u003e通过 close方法，用户可以关闭以前动态创建的窗口，也可以在窗口创建时，将窗口句柄以变量的形式进行保存，然后通过 close方法关闭创建窗口。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindowName.close();\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 windowName表示已打开窗口的句柄。\u003c/p\u003e\n\n\u003cscript\u003e\n    var this_o = [\n        [\"channelmode=yew|no|1|0\", \"是否剧院模式显示窗口，默认 no\"],\n        [\"directories=yes|no|1|0\", \"是否添加目录按钮，默认 yes\"],\n        [\"fullecreen=yes|no|1|0\", \"是否全屏显示窗口，默认 no。处于全屏必须同时处于剧院 \"],\n        [\"height\", \"对话框的高度 \"],\n        [\"left\", \"窗口左端离开屏幕左端的像素数 \"],\n        [\"location=yes|no|1|0\", \"是否显示地址字段，默认 yes\"],\n        [\"menubar=yes|no|1|0\", \"是否显示工具栏，默认 yes\"],\n        [\"resizes\", \"设定对话框大小是否固定 \"],\n        [\"scrollbars\", \"是否显示滚动条，默认 yes\"],\n        [\"status=yes|no|1|0\", \"是否显示状态栏，默认 yes\"],\n        [\"titlebar=yes|no|1|0\", \"是否显示标题栏，默认 yes\"],\n        [\"toolbar\", \"浏览器工具条，包括后退及前进按钮等 \"],\n        [\"top\", \"窗口顶部离开屏幕顶部的像素数 \"],\n        [\"width\", \"对话框的宽度 \"]\n    ];\n    _MiMethod.td(\"this_o\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ BOM","title":"开关窗口"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","BOM","开关窗口"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
