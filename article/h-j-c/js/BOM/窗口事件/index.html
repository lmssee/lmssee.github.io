    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e通用窗口事件\u003c/h5\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e通用窗口事件\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e事件\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonfocus\u003c/td\u003e\n        \u003ctd\u003e当浏览器窗口获得焦点时触发\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonblur\u003c/td\u003e\n        \u003ctd\u003e当浏览器窗口失去焦点时触发\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonload\u003c/td\u003e\n        \u003ctd\u003e当文档完全载入时触发，但需注意，事件并非总是完全同步的\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonunload\u003c/td\u003e\n        \u003ctd\u003e当文档未载入时触发\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonresize\u003c/td\u003e\n        \u003ctd\u003e当用户改变窗口大小时触发\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonerror\u003c/td\u003e\n        \u003ctd\u003e当出现 JavaScript错误时，触发一个错误处理事件\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e可以在设置 \u0026lt;body\u0026gt;元素的 HTML事件属性时添加事件处理器\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;body onload=\"alert('entering Window');\"onunload=\"alert('leaving\n        Window')\"\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e扩展窗口事件\u003c/h5\u003e\n\u003cp\u003eIE浏览器和 Netscape浏览器为 Window对象增加了很多事件。\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e常见的扩展窗口事件\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e事件\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonafterprint\u003c/td\u003e\n        \u003ctd\u003e窗口被后触发\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonbeforeprint\u003c/td\u003e\n        \u003ctd\u003e当窗口被打印或被打印预览之前触发\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonbeforeunload\u003c/td\u003e\n        \u003ctd\u003e窗口被载入之前触发，发生于 onunload之前\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eondragdrop\u003c/td\u003e\n        \u003ctd\u003e文档被拖到窗口上时触发\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonhelp\u003c/td\u003e\n        \u003ctd\u003e当帮助键（通常是 F1键）被按下时触发\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonresizestart\u003c/td\u003e\n        \u003ctd\u003e调整大小的进程开始时触发。通常是用户开始拖拽浏览器窗口边角时触发\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eonscroll\u003c/td\u003e\n        \u003ctd\u003e滚动条往任意方向滚动时触发\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ BOM","title":"窗口事件"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","BOM","窗口事件"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
