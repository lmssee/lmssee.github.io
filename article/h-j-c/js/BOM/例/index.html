="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>例</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e使用远程脚本\u003c/h5\u003e\n\u003cp\u003e远程脚本（ Remote\n    Scripting）是远程函数的调用，通过远程函数调用实现异步通信。所谓异步通信，就是在不刷新页面的情况下，允许客户端与服务器进行不连续的通信。这样用户不需要等待，网页浏览与信息互不干扰，信息传输不再是传整个页面。\u003c/p\u003e\n\u003cp\u003e设计思路：创建一个隐藏的框架，使用它载入服务器指定的文件，此时被载入的服务器文件包含的远程脚本就会被激活，被激活的脚本就会把服务器需要传递的信息通过框架页响应给用户，从而实现客户端与服务器的异步通信的目的。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e所谓的隐藏框架，就是设置框架高度为 0，以达到隐藏框架的目的。隐藏框架常用来加载一些外部链接和导入一些扩展的服务。使用最多的就是使用隐藏框架导入广告。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp class=\"p4\"\u003e新建一个框架集，其中第一个为默认加载的客户前端的交互界面，第二个是加载的空白页面\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt;\u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;Document\u0026lt;/title\u0026gt; \u0026lt;/head\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;frameset\n        row=\"50%,50%\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;frame src=\"main.htm\" name=\"main\" /\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;frame src=\"blank.htm\" name=\"server\" /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/frameset\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e设计空白页面\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;Document\u0026lt;/title\u0026gt; \u0026lt;/head\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;h1\u0026gt;空白页 \u0026lt;/h1\u0026gt; \u0026lt;/body\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e在客户端页面（ main.htm）添加一个简单的交互按钮，当点击按钮时将为底部框架加载服务器端的请求页面\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;与客户端交互页面 \u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efunction request() { \u003c/span\u003e\u003cspan class=\"p6\"\u003eparent.frames[1].location.href = \"server.htm\";\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ewindow.onload = function() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar b = document.getElementsByTagName(\"input\")[0]; \u003c/span\u003e\u003cspan class=\"p6\"\u003eb.onclick = request;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;h1\u0026gt;与客户端交互页面 \u0026lt;/h1\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;input type=\"button\" name=\"submit\" value=\"向服务器发送请求 \" id=\"submit\"\u0026gt; \u0026lt;/body\u0026gt;\n        \u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e在服务器响应页面\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;服务器响应页面 \u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ewindow.onload = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e//\n            页面加载完毕后，动态改变用户交互页面的信息\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eparent.frames[0].document.write(\"\u0026lt;h1\u0026gt;hi,大家好，我是远道而来的信息 \u0026lt;/h1\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;h1\u0026gt;服务器响应页面 \u0026lt;/h1\u0026gt; \u0026lt;/body\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e远程交互\u003c/h5\u003e\n\u003cp\u003e隐藏框架只是交互的实体，它只负责传输信息，而交互的核心是由一种信息处理机制，这种机制就是回调函数。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e回调函数就是指客户端页面的一个普通函数，但是该函数是在服务器端被调用，并负责处理服务器的响应信息。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e在异步交互的过程中，经常需要信息的双向交互，而不仅仅是接受服务器的信息。\u003c/p\u003e\n\u003cp class=\"p4\"\u003e设置框架集\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt;\u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;Document\u0026lt;/title\u0026gt; \u0026lt;/head\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;frameset\n        row=\"50%,50%\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;frame src=\"main.htm\" name=\"main\" /\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;frame src=\"blank.htm\" name=\"server\" /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/frameset\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;noframes\u0026gt;您的浏览器不支持框架集，请升级您的浏览器版本或更换其它品牌的浏览器\n        \u0026lt;/noframes\u0026gt; \u0026lt;/body\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e默认情况下，第一个框架加载用户的交互页面，第二个框架加载空白页面\u003c/p\u003e\n\u003cp\u003e第一个框架主要包含两个函数：一个是响应客户端操作的回调函数，另一个是向服务器发送请求的事件处理函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;与客户端交互页面 \u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ebody { \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground-color: #099; \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-align:\n        center; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eh1 { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003epadding-top: 5rem; \u003c/span\u003e\u003cspan class=\"p6\"\u003epadding-bottom: 8rem; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin-left: -4rem; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003elabel { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ewidth: 4rem; \u003c/span\u003e\u003cspan class=\"p6\"\u003edisplay: inline-block; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003einput[id=\"submit\"] { \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin-top: 3rem; \u003c/span\u003e\u003cspan class=\"p6\"\u003e/*\n        margin-left: 4rem; */ \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efunction request() { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar user = document.getElementById(\"user\");\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar pass = document.getElementById(\"pass\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar s = \"user=\" + user.value + \"\u0026pass=\" + pass.value; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eparent.frames[1].location.href = \"server.htm?\" + s; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efunction callback(b, n) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (b) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar e = document.getElementsByTagName(\"body\")[0]; \u003c/span\u003e\u003cspan class=\"p8\"\u003ee.innerHTML =\n        \"\u0026lt;h1\u0026gt;\" + n + \"\u0026lt;/h1\u0026gt;\u0026lt;p\u0026gt;您好，欢迎登陆 \u0026lt;/p\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ealert(\"您输入的密码或用户名错误，请重新输入 \"); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar user = parent.frames[0].document.getElementById(\"user\"); \u003c/span\u003e\u003cspan class=\"p8\"\u003evar pass =\n        parent.frames[0].document.getElementById(\"pass\"); \u003c/span\u003e\u003cspan class=\"p8\"\u003euser.value = \"\"; \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003epass.value = \"\"; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.onload = function() { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003evar b = document.getElementsByTagName(\"input\")[0]; \u003c/span\u003e\u003cspan class=\"p6\"\u003eb.onclick = request;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u0026lt;/head\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;h1\u0026gt;登录界面 \u0026lt;/h1\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;form action=\"js:void('')\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u0026lt;label class=\"\" for=\"user\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e用户名\u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;input type=\"text\"\n        name=\"user\" id=\"user\" placeholder=\"请输入用户名 \" autocomplete=\"false\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/div\u0026gt;\n    \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;div\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;label class=\"\" for=\"pass\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e密码\u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;input type=\"password\"\n        name=\"pass\" id=\"pass\" placeholder=\"请输入密码 \"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;input type=\"button\" name=\"submit\" value=\"提交 \"\n        id=\"submit\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;input type=\"reset\" value=\"清除 \"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/form\u0026gt; \u0026lt;/body\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e由于回调函数是在服务器端文件中调用，所有对象的作用于范围就发生变化，此时应该明确它的框架集和序号，否则在页面操作中就找不到指定的元素。\u003c/p\u003e\n\u003cp class=\"p4\"\u003e在服务器端文件中处理函数该函数分解 HTTP 传递过来的 URL 信息，获取查询字符串，并根据查询字符串中的用户名和密码，判断当前输入的信息是否正确，并确定具体的响应信息\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;服务器端响应和处理界面 \u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ewindow.onload = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar query = location.search.substring(1);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar a = query.slit(\"\u0026\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar o = {}; \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (var i = 0; i \u0026lt; a.length; i++) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003evar pos = a[i].indexOf(\"=\"); \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (pos == -1) continue; \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003evar name = a[i].substring(0, pos); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar value = a[i].substring(pos + 1); \u003c/span\u003e\u003cspan class=\"p8\"\u003eo[name] = unescape(value);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003evar n, b; \u003c/span\u003e\u003cspan class=\"p6\"\u003e((o[\"user\"]) \u0026\u0026 o[\"user\"] ==\n        \"admin\") ? (n = o[\"user\"]) : (n = null); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e((o[\"pass\"]) \u0026\u0026 o[\"pass\"] === \"123456\") ? (b = true) : (b = false); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eparent.frames[0].callback(b, n); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt;\n        \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;h1\u0026gt;服务器响应页面和处理页面 \u0026lt;/h1\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e实际开发中，用 php 也好， jsp 也好， asp 也好，我都不会。所以，实际文件啥样也不知道。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e使用浮动框架\u003c/h5\u003e\n\u003cp\u003e框架集需要多个网页配合，结构不符合标准，也不利于代码优化，缺乏灵活性。所以可以使用浮动框架。\u003c/p\u003e\n\u003cp class=\"p4\"\u003e异步通信\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e/*创建浮动框架\u003c/span\u003e\u003cspan class=\"p2\"\u003e*参数： url 表示请求的服务器文件路径\u003c/span\u003e\u003cspan class=\"p2\"\u003e*返回值：无\n        */ \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction hideIframe(url) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar hideFrame = null;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ehideFrame = document.createElement(\"iframe\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ehideFrame.name = \"hideFrame\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003ehideFrame.id = \"hideFrame\"; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ehideFrame.style.height = \"0px\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003ehideFrame.style.width = \"0px\";\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.body.appendChild(hideFrame); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003esetTimeout(function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003eframes[\"hideFrame\"].location.href = url;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e}, 10); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e如果页面存在多处调用请求，则建议定义一个全局变量，专门用来储存浮动框架对象。这样就避免每一次都创建新的 iframe 框架。\u003c/p\u003e\n\u003cp class=\"p4\"\u003e修改客户端交互页面的 request() 页面，直接调用 hideIframe() 函数，并传递 URL 信息\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction request() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar user =\n        document.getElementById('user'); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar pass = document.getElementById('pass');\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar s = \"iframe_server.html?user=\" + user.value + \"\u0026pass=\" + pass.value; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ehideFrame(s); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e由于浮动框架和框架集是属于不同级别的作用域，浮动窗口是被包含在当前窗口的，所以应当是 parent ，而不是 parent.frames[0] 调用回调函数，或者在回调函数中读取文档中的元素。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction callback(b, n) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (b \u0026\u0026 n) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar e =\n        document.getElementsByTagName(\"body\")[0]; \u003c/span\u003e\u003cspan class=\"p6\"\u003ee.innerHTML =\n        \"\u0026lt;h1\u0026gt;\" + n + \"\u0026lt;/h1\u0026gt;\u0026lt;p\u0026gt;您好，欢迎登录站点 \u0026lt;/p\u0026gt;\" \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\"您输入有误，请重新输入 \"); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar user =\n        parent.document.getElementById(\"user\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar pass =\n        parent.document.getElementById(\"pass\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003euser.value = \"\"; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003epass.value = \"\" \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e封装用户代理检测\u003c/h5\u003e\n\u003cp\u003e用户代理 (User Agent) 字符串用来标识自身信息的一串字符串 ,一般包含浏览器品牌、版本、内核、操作系统环境等信息。用户检测是通过检测 User Agent 字符串来确定实际使用的浏览器及内核的相关信息。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar client = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n            内部检测代码\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e}();\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar client = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar engine = { \u003c/span\u003e\u003cspan class=\"p8\"\u003etrident:\n        0, \u003c/span\u003e\u003cspan class=\"p8\"\u003egecko: 0, \u003c/span\u003e\u003cspan class=\"p8\"\u003ewebkit: 0, \u003c/span\u003e\u003cspan class=\"p8\"\u003ekhtml: 0,\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003epresto: 0, \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ever: null \u003cspan class=\"r\"\u003e// 具体型号\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan\n            class=\"r\"\u003e// 内部检测代码\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn { \u003c/span\u003e\u003cspan class=\"p6\"\u003eengine: engine \u003cspan\n            class=\"r\"\u003e// 包含用户浏览器引擎信息\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}();\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e识别 Webkit 和 Opera\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar client = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar engine = { \u003c/span\u003e\u003cspan class=\"p8\"\u003etrident:\n        0, \u003c/span\u003e\u003cspan class=\"p8\"\u003egecko: 0, \u003c/span\u003e\u003cspan class=\"p8\"\u003ewebkit: 0, \u003c/span\u003e\u003cspan class=\"p8\"\u003ekhtml: 0,\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003epresto: 0, \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ever: null \u003cspan class=\"r\"\u003e// 具体型号\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan\n            class=\"r\"\u003e// 内部检测代码\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn { \u003c/span\u003e\u003cspan class=\"p6\"\u003eengine: engine \u003cspan\n            class=\"r\"\u003e// 包含用户浏览器引擎信息\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar ua = navigator.userAgent;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (/AppleWebKit\\/(\\S+)/.test(ua)) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eengine.ver = Regexp[\"$1\"];\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eengine.webkit = parseFloat(engine.ver); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (/OPR\\/(S+)/.test(ua)) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ebrowser.ver = RegExp[\"$1\"]; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ebrowser.opera = parseFloat(browser.ver); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if\n        (/Chrome\\/(\\S+)/.test(ua)) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ebrowser.ver = RegExp[\"$1\"]; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ebrowser.chrome = parseFloat(browser.ver); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if\n        (/Version\\/(\\S+)/.test(ua)) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ebrowser.ver = RegExp[\"$1\"]; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ebrowser.Safari = parseFloat(browser.ver); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar SafariVersion = engine.webkit \u0026lt; 100 ? 1 : \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003eengine.webkit \u0026lt; 312 ? 1.2 : \u003c/span\u003e\u003cspan class=\"p8\"\u003eengine.webkit \u0026lt; 412 ? 1.3 : 2;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ebrowser.safari = browser.ver = SafariVersion; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else if (window.opera) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eengine.ver =\n        browser.ver = window.opera.version(); \u003c/span\u003e\u003cspan class=\"p4\"\u003eengine.presto = browser.opera =\n        parseFloat(engine.ver); \
