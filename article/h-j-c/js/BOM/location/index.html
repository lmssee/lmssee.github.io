    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003elocation对象包含当前加载页面的 URL信息。\u003c/p\u003e\n\u003cp\u003e页面的 URL是由多个部分组成的：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[协议 ]//[主机名 ]:[端口 ]/[路径 ][搜索 ][hash]\u003c/span\u003e\u003c/code\u003e\n\u003ctable id=\"this_o\"\u003e\n    \u003ccaption\u003elocation对象的一系列属性包含了 URL各个部分的数据\u003c/caption\u003e\n    \u003ccolgroup width=\"20%\"\u003e\u003c/colgroup\u003e\n    \u003ccolgroup\u003e\u003c/colgroup\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_o = [\n        [\"location.href\", \"声明当前的显示文档的完整 URl ，与其它属性不同，把该属性设置为新的 URl ，将会显示新的内容 \"],\n        [\"location.protocol\", \" 协议，包括冒号 —— --⊱⊱⊱⊱⊱   https:\"],\n        [\"location.host\", \" 主机名（域名加端口）—— --⊱⊱⊱⊱⊱  lmssee.cn:80\"],\n        [\"location.hostname\", \" 主机名（不加端口）—— --⊱⊱⊱⊱⊱  lmssee.cn\"],\n        [\"location.port\", \" 端口号 —— --⊱⊱⊱⊱⊱  80\"],\n        [\"location.pathname\", \" 相对路径 —— --⊱⊱⊱⊱⊱  l/study/BOM/\"],\n        [\"location.search\", \" 搜索 —— --⊱⊱⊱⊱⊱  ?id=\"],\n        [\"location.hash\", \" hash，锚点之后的内容 \"]\n    ];\n    _MiMethod.td(\"this_o\")\n\u003c/script\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar queryString = function() { \u003cspan class=\"r\"\u003e// 获取\n            URL查询字符串参数的调用函数\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar q = location.search.substring(1); \u003cspan class=\"r\"\u003e//\n            获取字符串\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar a = q.split(\"\u0026\"); \u003cspan class=\"r\"\u003e// 以 \u0026\n            为界将查询字符串分割成数组\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar o = {}; \u003cspan class=\"r\"\u003e// 定义临时数组\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i = 0; i \u0026lt;\n        a.length; i++) { \u003cspan class=\"r\"\u003e// 遍历对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003evar n = a[i].indexOf(\"=\"); \u003cspan\n            class=\"r\"\u003e// 获取每一个参数中等号的小标位置\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (n == -1) { \u003cspan class=\"r\"\u003e// 如果没有发现这调到下一次循环继续\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003econtinue\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003evar v1 = a[i].substring(0, n); \u003cspan class=\"r\"\u003e//\n            截取等号前的参数值\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar v2 = a[i].substring(n + 1); \u003cspan class=\"r\"\u003e// 截取等号后的参数值\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003eo[v1] =\n        unescape(v2); \u003cspan class=\"r\"\u003e// 以名值对形式储存在对象中\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn o; \u003cspan class=\"r\"\u003e// 返回对象\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e使用 location 导航\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e直接设置对象的 href 用这种方法把用户转移到新页面时，原始页面还保留在浏览器的历史记录里，用户可以利用浏览器的\" Back\"按钮方便地返回到以前的页面\u003c/li\u003e\n    \u003cli\u003e使用 location 的 replace（）方法 新的 URL直接替换当前页面，即把当前页面从历史记录列表里删除\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e可以通过修改 location 对象修改浏览器的地址。首先，最常见的是使用 assign()方法并传入一 个 URL。如果给 location.href 或 window.location 设置一个 URL，也会以同一个\n    URL 值调用 assign()方法。\u003c/p\u003e\n\u003cp\u003e除了 hash 之外，只要修改 location 的一个属性，就会导致页面重新加载新 URL。\u003c/p\u003e\n\u003ch5\u003e刷新页面\u003c/h5\u003e\n\u003cp\u003e如果要在浏览器里重新加载当前页面，也就是相当于用户单击\" reload\"按钮，可以用 reload()方法：如果要在浏览器里重新加载当前页面，也就是相当于用户单击\" reload\"按钮，可以用 reload()方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003elocation.reload();\u003c/span\u003e\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e如果用没有参数的 reload()方法，当浏览器的缓存中保存了当前页面时，就会加载缓存的内容。为了避免发生这种情况，确保从服务器获得页面数据，可以在调用 reload()方法时添加参数 true：\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.reload(true);\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e跳转至新页面，并且保证浏览器不会再回退\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003elocation.replace(\" https://lmssee.art.blog\" ); //跳转至 blog \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003elocation的 replace()方法可以用一个新的文档替换当前文档，并且该方法还会覆盖 History对象中的记录。\u003c/p\u003e\n\u003ch5\u003e几秒钟之后返回上一页\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;meta http-equiv=\"refresh\"; content=\"3;\n        url=javascript:window.history.go(-1);\";\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e其中 content为设置的时间。\u003c/p\u003e\n\u003ch5\u003e在打开的子窗口中刷新父窗口\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.opener.location.reload() ;\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e解析地址\u003c/h5\u003e\n\u003cp\u003elocation对象描述的是某一个窗口对象所打开的 URL地址。使用 window.location可以返回一个 location对象（也可以直接使用 location调用方法和属性，因为 window可以省略）。\u003c/p\u003e\n\u003cp\u003e要表示当前窗口的地址，只需要使用 location即可；若要表示某一个窗口的地址，就要使用\" window.location\"。例如下面的代码：\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003ewindow.location 和 document.location 不同，前者引用 location 对象，后者只是一个只读的字符串，与 documentURL 同义。但是，但服务器存在重定向时。\n        document.location 包含的是已经装载的 URL ，而 location.href 包含的是原始请求的文档的 URL。\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar newWindow = window.open(\"\u0026lt;a href=\"http://localhost/JavaScript\"\n        rel=\"nofollow\"\u0026gt;http://localhost/JavaScript\"\u0026lt;/a\u0026gt;,\" _blank\" );\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(newWindow.location);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这将返回打开的新窗口的 location：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;a href=\"http://localhost/JavaScript\"\n        rel=\"nofollow\"\u0026gt;http://localhost/JavaScript\u0026lt;/a\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e注意，属于不同协议或不同主机的两个地址之间不能互相引用对方的 location对象，这是出于安全性的需要。\u003c/p\u003e\n\u003cp\u003e例如，当前窗口打开的是 www.abc.com主机上的某个网页，另外一个窗口（对象名为 newWindow）打开的是 www.xyz.com主机上的某个网页。那么，如果在当前窗口使用\n    newWindow.location就会弹出错误信息：拒绝访问。\u003c/p\u003e\n\u003cp\u003e例如下面的代码演示了如何访问这些属性：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\" 书签名称：\" +location.hash +\" \u0026lt;br\u0026gt;\" );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\" 主机全称：\" +location.host +\" \u0026lt;br\u0026gt;\" );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\" 主机名称：\" +location.hostname +\" \u0026lt;br\u0026gt;\" );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\" 路径 ：\" +location.pathname+\" \u0026lt;br\u0026gt;\" );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\" 连接端口：\" +location.port +\" \u0026lt;br\u0026gt;\" );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\" 通讯协议：\" +location.protocol +\" \u0026lt;br\u0026gt;\" );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\"查询字符串：\" +location.search +\" \u0026lt;br\u0026gt;\" );\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003elocation对象的方法\u003c/h5\u003e\n\u003ctable\u003e\n    \u003ccaption\u003elocation对象的方法\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e方法\u003c/th\u003e\n        \u003cth\u003e嗯\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eassign\u003c/td\u003e\n        \u003ctd\u003e加载一个新的 html文档\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003ereload()\u003c/td\u003e\n        \u003ctd\u003e刷新当前网页\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003ereplace()\u003c/td\u003e\n        \u003ctd\u003e打开另一个 URL并取代历史对象中当前位置的地址，用该方法打开的地址无法返回上一个\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eresolveURL()\u003c/td\u003e\n        \u003ctd\u003e将相对地址转换成绝对地址\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003elocation对象方法的使用方法都很简单，语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003elocation.assign(sURL)\u003c/span\u003e\n    \u003cspan class=\"p\"\u003elocation.reload([bReloadSource])\u003c/span\u003e\n    \u003cspan class=\"p\"\u003elocation.replace(sURL)\u003c/span\u003e\n    \u003cspan class=\"p\"\u003elocation.resolveURL(sURL)\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e参数 sURL表示要加载或者取代的 URL；参数 bReloadSource是一个逻辑值，是可选的参数，默认值是 false，表示从浏览器缓存中重新加载， true表示从网站重新加载。\u003c/p\u003e\n\u003cp\u003e注意，用 location.replace()方法打开一个 URL后，单击浏览器中的\"后退\"按钮将不能返回到刚才的页面，这与 location.assign()方法不同。\u003c/p\u003e\n\u003ch5\u003e获取文件扩展名\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar c = p.substring(p.lastIndexOf(\".\")+1);\u003c/span\u003e\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ BOM","title":"location"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","BOM","location"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
