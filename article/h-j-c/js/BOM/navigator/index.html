返回浏览器安装的插件数组。在 IE 中，这个数组包含页面中所有\u003cembed\u003e元素 '],\n        ['product ', '返回产品名称（通常是 \"Gecko\"） '],\n        ['productSub ', '返回产品的额外信息（通常是 Gecko 的版本） '],\n        ['registerProtocolHandler()', '将一个网站注册为特定协议的处理程序 '],\n        ['requestMediaKeySystemAccess()', '返回一个期约，解决为 MediaKeySystemAccess 对象 '],\n        ['sendBeacon()', '异步传输一些小数据 '],\n        ['serviceWorker ', '返回用来与 ServiceWorker 实例交互的 ServiceWorkerContainer'],\n        ['share()', '返回当前平台的原生共享机制 '],\n        ['storage ', '返回暴露 Storage API 的 StorageManager 对象 '],\n        [\"systemLanguage\", \"返回 OS 使用的默认语言 \"],\n        [\"userAgent\", \"返回由客户机发送到服务器的 user-agent 头部的值 \"],\n        ['vendor ', ' 返回浏览器的厂商名称 '],\n        ['vendorSub', ' 返回浏览器厂商的更多信息 '],\n        ['vibrate()', ' 触发设备振动 '],\n        ['webdriver', ' 返回浏览器当前是否被自动化程序控制 '],\n        [\"userLanguage\", \"返回 OS 的自然语言 \"]\n    ];\n    _MiMethod.td(\"this_f\");\n    document.write(\"\u003ctable style=\\\"color: #880088\\\"\u003e\");\n    document.write(\"\u003ccaption\u003e本浏览器信息\u003c/caption\u003e\");\n    document.write(\"\u003ctr\u003e\u003ctd\u003eappName\u003c/td\u003e\u003ctd\u003e\" + navigator.appName + \"\u003c/td\u003e\u003c/tr\u003e\");\n    document.write(\"\u003ctr\u003e\u003ctd\u003eappCodeName\u003c/td\u003e\u003ctd\u003e\" + navigator.appCodeName + \"\u003c/td\u003e\u003c/tr\u003e\");\n    document.write(\"\u003ctr\u003e\u003ctd\u003eappVersion\u003c/td\u003e\u003ctd\u003e\" + navigator.appVersion + \"\u003c/td\u003e\u003c/tr\u003e\");\n    document.write(\"\u003ctr\u003e\u003ctd\u003elanguage\u003c/td\u003e\u003ctd\u003e\" + navigator.language + \"\u003c/td\u003e\u003c/tr\u003e\");\n    document.write(\"\u003ctr\u003e\u003ctd\u003ecookieEnabled\u003c/td\u003e\u003ctd\u003e\" + navigator.cookieEnabled + \"\u003c/td\u003e\u003c/tr\u003e\");\n    document.write(\"\u003ctr\u003e\u003ctd\u003ecpuClass\u003c/td\u003e\u003ctd\u003e\" + navigator.cpuClass + \"\u003c/td\u003e\u003c/tr\u003e\");\n    document.write(\"\u003ctr\u003e\u003ctd\u003eonLine\u003c/td\u003e\u003ctd\u003e\" + navigator.onLine + \"\u003c/td\u003e\u003c/tr\u003e\");\n    document.write(\"\u003ctr\u003e\u003ctd\u003eplatform\u003c/td\u003e\u003ctd\u003e\" + navigator.platform + \"\u003c/td\u003e\u003c/tr\u003e\");\n    document.write(\"\u003ctr\u003e\u003ctd\u003eNo of Plugins\u003c/td\u003e\u003ctd\u003e\" + navigator.plugins.length + \"\u003c/td\u003e\u003c/tr\u003e\");\n    document.write(\"\u003c/table\u003e\");\n\u003c/script\u003e\n\u003cp\u003e使用 window.navigator属性可以返回一个 navigator对象，该对象包含了一些方法、属性和集合等成员，使用下面的 for… in循环代码可以检测这些成员，并查看它们的值：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efor (i in window.navigator){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003edocument.write(i + \" ===\" + window.navigator[i] + \" \u0026lt;br /\u0026gt;\" );\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e检测浏览器类型\u003c/h5\u003e\n\u003cp\u003e类型，从而可以做出不同的兼容性处理。一般可以使用下面的代码检测浏览器的类型，根据检测结果做出不同的回应：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar appVersion = window.navigator.appVersion; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        isIE = (appVersion.indexOf(\" MSIE\" ) != -1) ? true : false; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar isWin\n        = \u003c/span\u003e\u003cspan class=\"p4\"\u003e(appVersion.toLowerCase().indexOf(\" win\" ) != -1) ? true : false; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar isOpera = \u003c/span\u003e\u003cspan class=\"p4\"\u003e(navigator.userAgent.indexOf(\" Opera\" ) != -1) ? true :\n        false; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (isIE \u0026amp; \u0026amp; isWin \u0026amp; \u0026amp; !isOpera) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ewindow.alert(\"这是 IE浏览器！\" ); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} else if (isOpera) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ewindow.alert(\"这是 Opera浏览器！\" ); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ewindow.alert(\"这是 FireFox浏览器或者网景浏览器！\" ); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这里用到了 navigator.appVersion属性，该属性返回一个字符串，其中包含了关于浏览器版本的信息。\u003c/p\u003e\n\u003cp\u003e下面是一些经常使用的判断代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar ua = navigator.userAgent.toLowerCase(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        clientInfo = { \u003c/span\u003e\u003cspan class=\"p4\"\u003eisStrict: document.compatMode == ' CSS1Compat' , \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eisOpera: ua.indexOf(' opera' ) \u0026gt; -1, \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eisIE: ua.indexOf(' msie' ) \u0026gt; -1, \u003c/span\u003e\u003cspan class=\"p4\"\u003eisIE7: ua.indexOf(' msie 7' ) \u0026gt;\n        -1, \u003c/span\u003e\u003cspan class=\"p4\"\u003eisIE8: ua.indexOf(' msie 8' ) \u0026gt; -1, \u003c/span\u003e\u003cspan class=\"p4\"\u003eisIE9:\n        ua.indexOf(' msie 9' ) \u0026gt; -1, \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eisSafari: /webkit|khtml/.test(ua), \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eisWindows: ua.indexOf(' windows' ) != -1 || \u003c/span\u003e\u003cspan class=\"p6\"\u003eua.indexOf(' win32' ) !=\n        -1, \u003c/span\u003e\u003cspan class=\"p4\"\u003eisMac: ua.indexOf(' macintosh' ) != -1 || \u003c/span\u003e\u003cspan class=\"p6\"\u003eua.indexOf('\n        mac os x' ) != -1, \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eisLinux: ua.indexOf(' linux' ) != -1 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eclientInfo.isBorderBox = \u003c/span\u003e\u003cspan class=\"p4\"\u003eclientInfo.isIE\n        \u0026amp; \u0026amp; \u003c/span\u003e\u003cspan class=\"p2\"\u003e!clientInfo.isStrict; \u003c/span\u003e\u003cspan class=\"p2\"\u003eclientInfo.isSafari3 =\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eclientInfo.isSafari \u0026amp; \u0026amp; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e!!(document.evaluate); \u003c/span\u003e\u003cspan class=\"p2\"\u003eclientInfo.isGecko = \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eua.indexOf(' gecko' ) != -1 \u0026amp; \u0026amp; \u003c/span\u003e\u003cspan class=\"p2\"\u003e!clientInfo.isSafari;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e/** \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e* 是否正在用 IE6 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e*/ \u003c/span\u003e\u003cspan class=\"p2\"\u003evar isIE6 = \u003c/span\u003e\u003cspan class=\"p4\"\u003eclientInfo.isIE \u0026amp; \u0026amp;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e!clientInfo.isIE7 \u0026amp; \u0026amp; \u003c/span\u003e\u003cspan class=\"p2\"\u003e!clientInfo.isIE8 \u0026amp; \u0026amp;\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e!clientInfo.isIE9;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e自定义架构处理\u003c/h5\u003e\n\u003cp\u003e使用 window.navigator.registerProtocolHandler()方法可以将自己注册为特定架构（通信协议）的处理者。目前仅 Firefox浏览器支持该方法。\u003c/p\u003e\n\u003cp\u003e该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.navigator.registerProtocolHandler(scheme, url, title)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cp\u003e参数 scheme是想要处理的架构的名称，用字符串表示。\u003c/p\u003e\n\u003cp\u003e参数 url是要给处理器处理的 URL地址字符串。可以在字符串里用\" %s\"来代表一个占位符，用于表示将被处理的内容的 URL地址。\u003c/p\u003e\n\u003cp\u003e参数 title是处理器的标题，会以字符串的形式呈现给使用者。\u003c/p\u003e\n\u003cp\u003e例如，下面的代码将建立一个处理器，它允许 mailto的链接将使用者带到一个自定义的邮件地址，将链接中指定的 E-mail地址插入到 URL：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;a href=\"mailto:letmiseesee@gmail.com\"\u0026gt;给我发邮件\n        \u0026lt;/a\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ewindow.navigator.registerProtocolHandler(\" mailto\" , \" \u0026lt; a href =\n        \"http://localhost/?mail=%s\"\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003erel = \"nofollow\" \u0026gt; http: //localhost/?mail=%s\"\u0026lt;/a\u0026gt;;, \u003c/span\u003e\u003cspan class=\"p6\"\u003e\" MyMail\"\n        ); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e自定义内容类型处理\u003c/h6\u003e\n\u003cp\u003e使用 registerContentHandler()方法可以为特定 MIME类型的内容自定义处理器，例如 Firefox浏览器能够添加 RSS类型的内容给自定义的处理器处理。目前尚无浏览器支持该方法。\u003c/p\u003e\n\u003cp\u003e该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.navigator.registerContentHandler(mimeType, url, title)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 mimeType是想要处理的 MIME类型的名称，用字符串表示。\u003c/p\u003e\n\u003cp\u003e参数 url是要给处理器处理的 URL地址字符串。可以在字符串里用\" %s\"来代表一个占位符，用于表示将被处理的内容的 URL地址。\u003c/p\u003e\n\u003cp\u003e参数 title是处理器的标题，会以字符串的形式呈现给使用者。\u003c/p\u003e\n\u003cp\u003e例如，下面的代码将会建立一个处理器，它允许打开 Excel文件：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow.navigator.registerContentHandler(\" application/excel\" ,\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\" \u0026lt;a\n        href=\"http://localhost/?url=%s\"rel=\"nofollow\"\u0026gt;http://localhost/?url=%s\"\u0026lt;/a\u0026gt;;,\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e手动处理 storage独占访问权\u003c/h6\u003e\n\u003cp\u003e如果脚本代码使用了 document.cookie或者 localStorage，在一个脚本完成执行之前，浏览器就会阻止其它脚本代码访问 cookie或 storage。\u003c/p\u003e\n\u003cp\u003e使用 navigator.yieldForStorageUpdates()方法可以通知浏览器解除这种阻止。在调用该方法后， cookie或 storage就可以被修改，尽管另一个脚本还未完成执行。\u003c/p\u003e\n\u003cp\u003e该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.navigator.yieldForStorageUpdates()\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e目前尚无浏览器支持该方法。\u003c/p\u003e\n\u003ch5\u003e检测脱机模式\u003c/h5\u003e\n\u003cp\u003e可以使用 window.navigator.onLine属性检测浏览器是否处于脱机模式，该属性是一个只读的逻辑值。\u003c/p\u003e\n\u003cp\u003e例如下面的代码就可以检测系统是否处于脱机模式：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\"当前模式：\" + (navigator.onLine ? \"在线\" : \"脱机\" ));\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e当用户在浏览器中选择脱机工作的状态后，系统就进入了脱机状态，内容将从缓存进行读取。除此之外，当用户由联机状态进入脱机状态时，就会触发 window对象的 offline事件。同样，当用户由脱机状态进入联机状态时，就会触发\n    window对象的 online事件。\u003c/p\u003e\n\u003cp\u003e可以使用下面的 3种方式之一来声明事件：\u003c/p\u003e\n\u003cp class=\"p4\"\u003e对 window、 document或 document.body使用 addEventListener()方法注册监听函数，例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow.addEventListener(\" offline\" , func_offline, false);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewindow.addEventListener(\" online\" , func_online, false);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e对 document或 document.body使用 ononline或 onoffline属性指定监听函数，例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003edocument.body.onoffline = func_offline;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.body.ononline = func_online;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e但是，不能使用 window.ononline和 window.onoffline属性来设置监听函数。\u003c/p\u003e\n\u003cp class=\"p4\"\u003e在 body元素的 ononline和 onoffline属性值中调用指定的事件处理函数\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e技巧与提示。\u003c/p\u003e\n    \u003cp\u003e目前仅 Firefox浏览器支持上述 3种事件处理方法，大部分浏览器仅支持对 window对象使用 addEventListener()方法注册 offline和 online监听函数。\u003c/p\u003e\n    \u003cp\u003eW3C规定也可以使用 window.ononline和 window.onoffline属性来设置监听函数，但浏览器都没有实现。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e下面的代码演示了如何使用这些 API：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;!doctype html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;title\u0026gt;Sample\u0026lt;/title\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003ediv.online { \u003c/span\u003e\u003cspan class=\"p6\"\u003e/*\n        在线时显示为绿色 */ \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #090; \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-weight: bold; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ediv.offline { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e/* 离线时显示为红色 */ \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #F00; \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-weight: bold;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 该函数用来检测浏览器状态——离线或者在线\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efunction updateOnlineStatus() { \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 获取离线或者在线\u003c/span\u003e\u003cspan class=\"p6\"\u003evar\n        condition = navigator.onLine ? \"online\" : \"offline\"; \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 根据结果设置显示的内容\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003evar status = document.getElementById(\"status\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003estatus.setAttribute(\"class\", condition); \u003c/span\u003e\u003cspan class=\"p6\"\u003estatus.innerHTML = condition;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 当文档加载完成后调用该函数\u003c/span\u003e\u003cspan class=\"p4\"\u003efunction loaded() {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 首先调用函数 updateOnlineStatus()检查一次状态\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eupdateOnlineStatus(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 定义离线监听事件，如果触发就调用函数 updateOnlineStatus()\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ewindow.addEventListener(\"offline\", function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003eupdateOnlineStatus()\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e}, false); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e// 定义在线监听事件，如果触发就调用函数 updateOnlineStatus() \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ewindow.addEventListener(\"online\", function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003eupdateOnlineStatus()\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e}, false); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;body onload=\"loaded()\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"status\"\u0026gt;\u0026lt;/div\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e浏览器的检测方法\u003c/h5\u003e\n\u003cp\u003e浏览器检测的常用方法有两种：特征检测和字符串检测。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar ua = navigator.userAgent.toLowerCase(); \u003cspan class=\"r\"\u003e// 获取用户端信息\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar info = { //\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eie:/msie/.test(ua)\u0026\u0026!/opera/.test(ua), \u003cspan class=\"r\"\u003e//匹配 IE浏览器\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eop:/opera/.test(ua), \u003cspan class=\"r\"\u003e//匹配 Opera浏览器\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003esa:/version.*safari/.test(ua), \u003cspan class=\"r\"\u003e//匹配 SaFari 浏览器\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ech:/chrome/.test(ua), \u003cspan class=\"r\"\u003e//匹配 Chrome浏览器\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eff:/gecko/.test(ua) \u0026\u0026 !/webkit/.test(ua) \u003cspan class=\"r\"\u003e//匹配 FireFox浏览器\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e获取浏览器插件的数目\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003enavigator.plugins.length;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003enavigator用来检测浏览器的版本、所支持的 MIME类型、已安装的外挂程序（ plugin）。\u003c/p\u003e\n\u003ch5\u003e实现对 Windows、 Mac、 Linux、 UNIX操作系统的判断\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar osType = \"\",\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewindows = (navigator.userAgent.indexOf(\"Windows\",0) != -1)?1:0,\u003c/span\u003e\n    \u003cspan class=\"p\"\u003emac = (navigator.userAgent.toLowerCase().indexOf(\"mac\",0) != -1)?1:0,\u003c/span\u003e\n    \u003cspan class=\"p\"\u003elinux = (navigator.userAgent.indexOf(\"Linux\",0) != -1)?1:0,\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eunix = (navigator.userAgent.indexOf(\"X11\",0) != -1)?1:0;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e%%\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eif (windows) osType = \"Windows\";\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eelse if (mac) osType = \"Mac\";\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eelse if (linux) osType = \"Lunix\";\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eelse if (unix) osType = \"Unix\";\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.log(osType);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003enavigator.userAgent表示用户代理。\u003c/p\u003e\n\u003ch5\u003e使用原生 JavaScript判断是否是移动设备浏览器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar mobileReg = /iphone|ipod|android.*mobile|windows.*phone|blackberry.*mobile/i;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eif((mobileReg.test(window.navigator.userAgent.toLowerCase()))){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(\"移动设备！ \");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}else{\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(\"非移动设备！ \");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在 HTML中， JavaScript的一些特殊规则可以正确解析，但 XHTML并不识别，按照 XHTML的解析规则，\" \u0026lt;\"号被认为是开始标记，后边不能跟空格。\u003c/p\u003e\n\u003cp\u003e解决方案之一就是将\" \u0026lt;\"替换为\" \u0026amp;lt;\"，但这只是解决燃眉之急的方法。另一种方案就是利用特殊注解的方案，\" //\u0026lt;![CDATA[\"与\" //]]\u0026gt;\"的组合。\u003c/p\u003e\n\u003cp\u003e谈到 \u0026lt;script\u0026gt;，就不得不提及它的同胞兄弟 \u0026lt;noscript\u0026gt;。 \u0026lt;noscript\u0026gt;在浏览器不支持或禁用客户端脚本时很有用。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ BOM","title":"navigator"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","BOM","navigator"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
