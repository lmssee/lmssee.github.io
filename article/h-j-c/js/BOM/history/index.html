class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>history</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e访问窗口历史\u003c/h5\u003e\n\u003cp\u003e利用 History对象实现访问窗口历史， History对象是一个只读的 URL字符串数组。该对象主要用来存储一个最近所访问网页的 URL地址的列表。\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eHistory对象的常用属性和说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003elength\u003c/td\u003e\n        \u003ctd\u003e历史列表的长度，用于判断列表中的入口数目\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003ecurrent\u003c/td\u003e\n        \u003ctd\u003e当前文档的 URL\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003enext\u003c/td\u003e\n        \u003ctd\u003e历史列表的下一个 URL\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eprevious\u003c/td\u003e\n        \u003ctd\u003e历史列表中的前一个 URL\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eHistory对象的常用方法和说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e方法\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eback()\u003c/td\u003e\n        \u003ctd\u003e退回前一页\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eforward（）\u003c/td\u003e\n        \u003ctd\u003e重新进入下一页\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003ego()\u003c/td\u003e\n        \u003ctd\u003e进入指定的页面\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e例如，利用 History对象中的 back方法和 forward方法来引导用户在页面中跳转 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;a href=\"javascript:window.history.forward();\"\u0026gt;forward\u0026lt;/a\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;a\n        href=\"javascript:window.history.back();\"\u0026gt;back\u0026lt;/a\u0026gt; \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e还可以使用 history.go方法指定要访问的历史记录。若参数为正数，则向前移动；若参数为负数，则向后移动 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;a href=\"javascript:window.history.go(-1);\"\u0026gt;向后退一次 \u0026lt;/a\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;a\n        href=\"javascript:window.history.back(2);\"\u0026gt;向后前进两次 /a\u0026gt; \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用 history.length属性能够访问 history数组的长度，可以很容易地转移到列表的末尾 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;a href=\"javascript:window.history.go(window.historylength-1);\"\u0026gt;末尾\n        \u0026lt;/a\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003ehistory对象的方法和属性\u003c/h5\u003e\n\u003cp\u003e一般，浏览器会记住用户打开网址的历史，并且会在顶部的导航按钮中使用\"前进\"和\"后退\"按钮导航历史网址。并且，这个功能也对 JavaScript开放 API，使用 JavaScript的\n    window.history()方法可以返回一个 history对象（也可以直接使用 history()调用方法和属性，因为 window可以省略）。\u003c/p\u003e\n\u003cp\u003ehistory（历史）对象指浏览器的浏览历史，使用该对象的方法和属性，就可以自定义前进和后退功能。鉴于安全性的需要，该对象的使用受到很多限制，现在仅定义了下列属性和方法。\u003c/p\u003e\n\u003ch6\u003elength属性，表示历史的项数。\n\u003c/h6\u003e\n\u003cp\u003eJavaScript所能管理的历史被限制在用浏览器的\"前进\"和\"后退\"按钮可以前往的范围。本属性返回的值是\"前进\"和\"后退\"两个按钮之下包含的地址数的总和。\u003c/p\u003e\n\u003ch6\u003eback()方法\n\u003c/h6\u003e\n\u003cp\u003e表示后退，与单击\"后退\"按钮是等效的。其语法格式如下：\u003c/p\u003e\n\u003cspan class=\"p\"\u003ehistory.back([num])\u003c/span\u003e\n\u003cp\u003e参数 num是一个整数，表示后退的地址步数。该参数是可选的，如果省略，表示向后倒退一步。\u003c/p\u003e\n\u003ch6\u003eforward()方法\n\u003c/h6\u003e\n\u003cp\u003e表示前进，与单击\"前进\"按钮是等效的。该方法没有参数，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ehistory.forward()\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003ego()方法\n\u003c/h6\u003e\n\u003cp\u003e可以跳转到特定的一个地址，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ehistory.go([location])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 location可以是一个整数也可以是一个 URL字符串。如果是一个整数，则表示相对于当前浏览的前进（正数）或后退（负数）的步数；如果是一个字符串，则表示历史列表中的某个 URL。\u003c/p\u003e\n\u003cp\u003e如果 location为 0，则刷新当前打开的网页，这与 location.reload()是等效的；如果 location为 1，则等同于调用 history.forward()。\u003c/p\u003e\n\u003cp\u003e例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;input type=\" button\" value=\"后退\"\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eonclick=\" javascript:history.back(-1);\" \u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;input type=\" button\" value=\"前进\"\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eonclick=\" javascript:history.forward();\" \u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;input type=\" button\" value=\"刷新\"\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eonclick=\" javascript:history.go(0);\" \u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e技巧与提示\u003c/h6\u003e\n\u003cp\u003e以上 history对象的方法，如果找不到要到访的地址也不会出错，只是保持在当前网页。\u003c/p\u003e\n\u003ch5\u003eHTML5BOM新增功能\u003c/h5\u003e\n\u003cp\u003eHTML5BOM定义了两个新方法和一个新属性，用来添加和替换历史项。 pushState()方法添加新的浏览历史项； replaceState()方法更新当前浏览历史项；\n    state属性用于返回这两个方法添加的信息。这两个方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow.history.pushState(data, title [,url])\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewindow.history.replaceState(data, title [,url])\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e参数 data定义历史记录的数据；参数 title定义历史记录标题；参数 url可选，定义历史记录的 URL地址。\u003c/p\u003e\n\u003cp\u003e这两个方法的执行还会触发 popstate事件，可以使用下面的代码捕捉：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow.onpopstate = function(event) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(event.state); \u003cspan class=\"r\"\u003e// state属性用于返回这两个方法添加的信息\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e目前这两个方法浏览器尚不支持，事件也不支持。\u003c/p\u003e\n\u003cp\u003e当使用\"前进\"、\"后退\"按钮切换网页时，还会触发 pageshow事件（当网页成为当前网页时）和 pagehide事件（当网页从当前网页改变为历史网页时），可以使用下面的代码捕捉：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow.onpageshow = function(event) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(event.persisted); \u003cspan class=\"r\"\u003e// state属性用于返回这两个方法添加的信息\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewindow.onpagehide = function(event) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(event.persisted); \u003cspan class=\"r\"\u003e// state属性用于返回这两个方法添加的信息\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这两个事件对象包含一个名为 persisted的属性，如果一个网页是新加载的就返回 false；否则，返回 true。\u003c/p\u003e\n\u003ch5\u003e历史状态管理\u003c/h5\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e使用 HTML5 状态管理时，要确保通过 pushState()创建的每个\"假\" URL 背后 都对应着服务器上一个真实的物理 URL。否则，单击\"刷新\"按钮会导致 404 错误。所有 单页应用程序（ SPA，\n        Single Page Application）框架都必须通过服务器或客户端的某些配 置解决这个问题。\n    \u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003ehashchange 会在页面 URL 的散列变化时被触发，开发者可以在此时执行某些操作。而状态管理 API 则可以让开发者改变浏览器 URL 而不会加载新页面。为此，可以使用 history.pushState()方\n    法。这个方法接收 3 个参数：一个 state 对象、一个新状态的标题和一个（可选的）相对 URL。\u003c/p\u003e\n\u003cp\u003epushState()方法执行后，状态信息就会被推到历史记录中，浏览器地址栏也会改变以反映新的相 对 URL。除了这些变化之外，即使 location.href\n    返回的是地址栏中的内容，浏览器页不会向服务器发送请求。第二个参数并未被当前实现所使用，因此既可以传一个空字符串也可以传一个短标题。第一\n    个参数应该包含正确初始化页面状态所必需的信息。为防止滥用，这个状态的对象大小是有限制的，通 常在 500KB～ 1MB 以内。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet stateObject = { \u003c/span\u003e\u003cspan class=\"p4\"\u003efoo: \"bar\" \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ehistory.pushState(stateObject, \"My title\", \"baz.html\");\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e因为 pushState()会创建新的历史记录，所以也会相应地启用\"后退\"按钮。此时单击\"后退\" 按钮，就会触发 window 对象上的 popstate 事件。 popstate 事件的事件对象有一个 state 属性，其\n    中包含通过 pushState()第一个参数传入的 state 对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ewindow.addEventListener(\"popstate\", (event) =\u0026gt; { \u003c/span\u003e\u003cspan class=\"p4\"\u003elet\n        state = event.state; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (state) { \u003cspan class=\"r\"\u003e// 第一个页面加载时状态是 null\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003eprocessState(state); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e});\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e可以通过 history.state 获取当前的状态对象，也可以使用 replaceState()并传入与 pushState()同样的前两个参数来更新状态。更新状态不会创建新历史记录，只会覆盖当前状态。\n\u003c/p\u003e\n\u003cp\u003e传给 pushState()和 replaceState()的 state 对象应该只包含可以被序列化的信息。因此， DOM 元素之类并不适合放到状态对象里保存。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ BOM","title":"history"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","BOM","history"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
