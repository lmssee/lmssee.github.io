    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e获取窗口位置\u003c/h5\u003e\n\u003cp\u003e使用 window 对象的 screenLeft 和 screenTop 属性可以读取或设置窗口的位置，即相对屏幕左侧和上边的位置。 IE、 Safari、 Opera 和 Chrome 都支持这两个属性， Firefox\n    支持使用 window 对象的 screenX 和 screenY 两个属性， Safari 和 Chrome 同时支持这两个属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar LeftPos = (typeof window.screenLeft == \"number\") ? window.screenLeft :\n        window.screenX; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar TopPos = (typeof window.screenTOp == \"number\") ?\n        window.screenTop : window.screenY;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e不同的浏览器读取位置偏差不同，用户无法在跨浏览器的情况下获取精确的位置。\u003c/p\u003e\n\u003ch5\u003e移动窗口\u003c/h5\u003e\n\u003cp\u003emoveTo() 和 moveBy() 两个方法都容易被浏览器禁用。同时，这两个方法不适用于框架，仅适用于最外层的 window 对象。\u003c/p\u003e\n\u003ch6\u003emoveTo方法\u003c/h6\u003e\n\u003cp\u003e利用 moveTo方法可以将窗口移动到指定坐标（ x， y）处。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.moveTo(x,y) \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003ex：窗口左上角的 x坐标。\u003c/p\u003e\n\u003cp\u003ey：窗口左上角的 y坐标。\u003c/p\u003e\n\u003cp\u003e例如，将窗口移动到指定的坐标（ 300， 300）处，代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.moveTo(300,300) \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003emoveTo方法是 Navigator和 IE都支持的方法，它不属于 W3C标准的 DOM。\u003c/p\u003e\n\u003ch6\u003eresizeTo方法\u003c/h6\u003e\n\u003cp\u003e利用 resizeTo方法可以将当前窗口变成（ x， y）大小， x、 y分别为宽度和高度。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.resizeTo(x,y) \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003ex：窗口的水平宽度。\u003c/p\u003e\n\u003cp\u003ey：窗口的垂直高度。\u003c/p\u003e\n\u003cp\u003e例如，将当前窗口改变成（ 300， 200）大小，代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.moveTo(300,200)\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003eScreen对象\u003c/h6\u003e\n\u003cp\u003eScreen对象是 JavaScript中的屏幕对象，反映了当前用户的屏幕设置。\u003c/p\u003e\n\u003ctable id=\"this_t\"\u003e\n    \u003ccaption\u003eScreen 对象的常用属性及说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_t = [\n        [\"width\", \"用户整个屏幕的水平尺寸，以像素为单位 \"],\n        [\"height\", \"用户整个屏幕的垂直的尺寸，以像素为单位 \"],\n        [\"pixelDepth\", \"显示器的每一个像素的位数 \"],\n        [\"colorDepth\", \"返回当前颜色设置所用的位数， 1代表黑白， 8代表 256色， 16代表增强色 24/32代表真彩色。 8位颜色支持 256种颜色， 16位颜色（通常为\\\"增强色\\\"\\）支持大概 64000 种颜色， 而 24 位颜色（ 通常为\\\"真彩色\\\"）支持大概 1600万种颜色 \"],\n        [\"availHeight\", \"返回窗口内容区域的垂直尺寸，以像素为单位 \"],\n        [\"availWidth\", \"返回窗口内容区域的水平尺寸，以像素为单位 \"]\n    ];\n    _MiMethod.td(\"this_t\")\n\u003c/script\u003e\n\u003cp\u003e例如，使用 Screen对象设置屏幕属性，代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow.screen.width\u003cspan class=\"r\"\u003e//屏幕宽度\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ewindow.screen.height\u003cspan\n            class=\"r\"\u003e//屏幕高度\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ewindow.screen.colorDepth\u003cspan\n            class=\"r\"\u003e//屏幕色深\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003ewindow.screen.availWidth\u003cspan class=\"r\"\u003e//可用宽度\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewindow.screen.availHeight\n        \u003cspan class=\"r\"\u003e//可用高度 (除去任务栏的高度 )\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e控制窗口大小\u003c/h5\u003e\n\u003cp\u003e使用 window 对象的 innerWidth 、 innerHeight 、 outWidth 、 outHeight 这四个属性可以确定浏览器窗口的大小。\u003c/p\u003e\n\u003cp\u003e在不同浏览器中确定浏览器窗口大小没有想象中那么容易。所有现代浏览器都支持 4 个属性： innerWidth、 innerHeight、 outerWidth 和 outerHeight。 outerWidth 和\n    outerHeight 返回浏 览器窗口自身的大小（不管是在最外层 window 上使用，还是在窗格 \u0026lt;frame\u0026gt;中使用）。 innerWidth 和 innerHeight\n    返回浏览器窗口中页面视口的大小（不包含浏览器边框和工具栏）。\u003c/p\u003e\n\u003cdiv class=\" c \"\u003e\u003cspan class=\"p2 \"\u003evar pageWidth = window.innerWidth, \u003c/span\u003e\u003cspan class=\"p4 \"\u003epageHeight =\n        window.innerHeight; \u003c/span\u003e\u003cspan class=\"p2 \"\u003eif (typeof pageWidth != \"number \") { \u003c/span\u003e\u003cspan class=\"p4 \"\u003eif\n        (document.compatMode == \"CSS1Compat \") { \u003c/span\u003e\n    \u003cspan class=\"p6 \"\u003epageWidth = document.documentElement.clientWidth; \u003c/span\u003e\u003cspan class=\"p6 \"\u003epageHeight =\n        document.documentElement.clientHeight; \u003c/span\u003e\u003cspan class=\"p4 \"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6 \"\u003epageWidth\n        = document.body.clientWidth; \u003c/span\u003e\n    \u003cspan class=\"p6 \"\u003epageHeight = document.body.clientHeight; \u003c/span\u003e\n    \u003cspan class=\"p4 \"\u003e} \u003c/span\u003e\u003cspan class=\"p2 \"\u003e};\u003c/span\u003e\n\u003c/div\u003e\n\u003cp\u003e在移动设备上， window.innerWidth 和 window.innerHeight 返回视口的大小，也就是屏幕上 页面可视区域的大小。 Mobile Internet Explorer 支持这些属性，但在\n    document.documentElement. clientWidth 和 document.documentElement.clientHeight 中提供了相同的信息。在放大或缩小 页面时，这些值也会相应变化。\n\u003c/p\u003e\n\u003cp\u003e在其它移动浏览器中， document.documentElement.clientWidth 和 document.documentElement. clientHeight\n    返回的布局视口的大小，即渲染页面的实际大小。布局视口是相对于可见视口的概念， 可见视口只能显示整个页面的一小部分。 Mobile Internet Explorer 把布局视口的信息保存在\n    document.body.clientWidth 和 document.body.clientHeight 中。在放大或缩小页面时，这些\n    值也会相应变化。 因为桌面浏览器的差异，所以需要先确定用户是不是在使用移动设备，然后再决定使用哪个属性。\n\u003c/p\u003e\n\u003ch5\u003e改变窗口大小\u003c/h5\u003e\n\u003cp\u003e可以使用 resizeTo()和 resizeBy()方法调整窗口大小。这两个方法都接收两个参数， resizeTo() 接收新的宽度和高度值，而 resizeBy()接收宽度和高度各要缩放多少。\u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003ewindow.resizeBy(x,y) \u003c/span\u003e\u003c/div\u003e\n\u003cp\u003ex：放大或缩小的水平宽度。\u003c/p\u003e\n\u003cp\u003ey：放大或缩小的垂直高度。\u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p2 \"\u003e\u003cspan class=\"r \"\u003e// 缩放到 100×100 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2 \"\u003ewindow.resizeTo(100,\n        100); \u003c/span\u003e\u003cspan class=\"p2 \"\u003e\u003cspan class=\"r \"\u003e// 缩放到 200×150\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\n                \"\u003ewindow.resizeBy(100, 50); \u003c/span\u003e\u003cspan class=\"p2 \"\u003e\u003cspan class=\"r \"\u003e// 缩放到 300×300 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2 \"\u003ewindow.resizeTo(300, 300);\u003c/span\u003e\n\u003c/div\u003e\n\u003ch5\u003e窗口滚动\u003c/h5\u003e\n\u003cp\u003e利用 Window对象的 scroll方法可以指定窗口的当前位置，从而实现窗口滚动效果。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003escroll(x,y); \u003c/span\u003e\u003c/div\u003e\n\u003cp\u003ex：屏幕的横向坐标。\u003c/p\u003e\n\u003cp\u003ey：屏幕的纵向坐标。\u003c/p\u003e\n\u003cp\u003eWindow对象中有 3种方法可以用来滚动窗口中的文档。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ewindow.scroll(x,y) \u003c/li\u003e\n    \u003cli\u003ewindow.scrollTo(x,y) \u003c/li\u003e\n    \u003cli\u003ewindow.scrollBy(x,y) \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e以上 3种方法的具体解释如下。\u003c/p\u003e\n\u003cp\u003escroll：该方法可以将窗口中显示的文档滚动到指定的绝对位置。滚动的位置由参数 x和 y决定，其中 x为要滚动的横向坐标， y为要滚动的纵向坐标。两个坐标都是相对文档的左上角而言的，即文档的左上角坐标为（ 0， 0）。\n\u003c/p\u003e\n\u003cp\u003escrollTo：该方法的作用与 scroll方法完全相同。 scroll方法是 JavaScript 1.1中所规定的，而 scrollTo方法是 JavaScript 1.2中所规定的。建议使用 scrollTo方法。\n\u003c/p\u003e\n\u003cp\u003escrollBy：该方法可以将文档滚动到指定的相对位置上，参数 x和 y是相对当前文档位置的坐标。如果参数 x的值为正数，则向右滚动文档；如果参数 x的值为负数，则向左滚动文档。与此类似，如果参数\n    y的值为正数，则向下滚动文档；如果参数 y的值为负数，则向上滚动文档。\u003c/p\u003e\n\u003cp\u003e这几个方法也都接收一个 ScrollToOptions 字典，除了提供偏移值，还可以通过 behavior 属性 告诉浏览器是否平滑滚动。\n\u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p2 \"\u003e\u003cspan class=\"r \"\u003e// 正常滚动\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2 \"\u003ewindow.scrollTo({\n    \u003c/span\u003e\u003cspan class=\"p4 \"\u003eleft: 100, \u003c/span\u003e\u003cspan class=\"p4 \"\u003etop: 100, \u003c/span\u003e\u003cspan class=\"p4 \"\u003ebehavior: 'auto'\n    \u003c/span\u003e\u003cspan class=\"p2\n                \"\u003e}); \u003c/span\u003e\u003cspan class=\"p2 \"\u003e\u003cspan class=\"r \"\u003e// 平滑滚动\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2 \"\u003ewindow.scrollTo({ \u003c/span\u003e\u003cspan class=\"p4 \"\u003eleft: 100, \u003c/span\u003e\u003cspan class=\"p4 \"\u003etop: 100,\n    \u003c/span\u003e\u003cspan class=\"p4 \"\u003ebehavior: 'smooth' \u003c/span\u003e\u003cspan class=\"p2 \"\u003e});\u003c/span\u003e\n\u003c/div\u003e\n\u003ch5\u003e控制窗口状态栏\u003c/h5\u003e\n\u003ch6\u003estatus方法\u003c/h6\u003e\n\u003cp\u003e改变状态栏中的文字可以通过 Window对象的 status方法实现。 status方法的主要功能是设置或给出浏览器窗口中状态栏的当前显示信息。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003ewindow.status=str \u003c/span\u003e\u003c/div\u003e\n\u003ch6\u003edefault status方法\u003c/h6\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003ewindow.defaultstatus=str \u003c/span\u003e\u003c/div\u003e\n\u003cp\u003estatus方法与 defaultStatus方法的区别在于信息显示时间的长短。 defaultStatus方法的值会在任何时间显示，而 status方法的值只在某个事件发生的瞬间显示。\u003c/p\u003e\n\u003ch5\u003e窗口时间与超时设定\u003c/h5\u003e\n\u003cp\u003e可以设置一个窗口在某段时间后执行何种操作，称为设置超时。本小节给出一个设置超时的实例，可以在一定时间后关闭浏览器，也可取消超时设置。主要使用了 Window对象的 setTimeout方法和\n    clearTimeout方法，其主要功能和用法如下。\u003c/p\u003e\n\u003cp\u003eWindow对象的 setTimeout方法用于设置一个超时，以便在将来的某个时间触发某段代码的运行。基本语法是\" timerId=setTimeout（要执行的代码，以毫秒为单位的时间） ; \"。其中，\"要执行的代码\n    \"可以是一个函数，也可以是其它 JavaScript语句；\"以毫秒为单位的时间 \"指代码执行前需要等待的时间，即超时时间。\u003c/p\u003e\n\u003cp\u003e可以在超时事件执行前中止该超时设置，使用 Window对象的 clearTimeout方法实现。其语法为 \"clearTimeout(timerId) \"。\u003c/p\u003e\n\u003ch5\u003e像素比\u003c/h5\u003e\n\u003cp\u003eCSS 像素是 Web 开发中使用的统一像素单位。这个单位的背后其实是一个角度： 0.0213°。如果屏 幕距离人眼是一臂长，则以这个角度计算的 CSS 像素大小约为 1/96 英寸。这样定义像素大小是为了在\n    不同设备上统一标准。比如，低分辨率平板设备上 12 像素（ CSS 像素）的文字应该与高清 4K 屏幕下 12 像素（ CSS 像素）的文字具有相同大小。这就带来了一个问题，不同像素密度的屏幕下就会有不同的\n    缩放系数，以便把物理像素（屏幕实际的分辨率）转换为 CSS 像素（浏览器报告的虚拟分辨率）。\n\u003c/p\u003e\n\u003cp\u003e举个例子，手机屏幕的物理分辨率可能是 1920×1080，但因为其像素可能非常小，所以浏览器就需 要将其分辨率降为较低的逻辑分辨率，比如 640×320。这个物理像素与 CSS 像素之间的转换比率由\n    window.devicePixelRatio 属性提供。对于分辨率从 1920×1080 转换为 640×320 的设备， window. devicePixelRatio 的值就是 3。这样一来， 12 像素（ CSS\n    像素）的文字实际上就会用 36 像素的物理 像素来显示。\n\u003c/p\u003e\n\u003cp\u003ewindow.devicePixelRatio 实际上与每英寸像素数（ DPI， dots per inch）是对应的。 DPI 表示单 位像素密度，而 window.devicePixelRatio\n    表示物理像素与逻辑像素之间的缩放系数。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ BOM","title":"控制窗口"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","BOM","控制窗口"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
