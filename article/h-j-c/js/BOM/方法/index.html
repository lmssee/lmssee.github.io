                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ctable id=\"this_o\"\u003e\n    \u003ccaption\u003eWindow对象的方法和说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e方法\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_o = [\n        [\"alert()\", \"弹出对话框 \"],\n        [\"confirm（） \", \"在确认的对话框中显示指定的字符串 \"],\n        [\"prompt()\", \"弹出一个提示对话框 \"],\n        [\"open()\", \"打开浏览器对话框并且显示由 URL或名字引用的文档，并设置创建对话框的属性 \"],\n        [\"close()\", \"关闭被引用的对话框 \"],\n        [\"focus()\", \"将被引用的对话框放在所有打开对话框的前面 \"],\n        [\"blur()\", \"将被引用的对话框放在所有打开对话框的后面 \"],\n        [\"scrollTo(x,y)\", \"把对话框滚动到指定的坐标 \"],\n        [\"scrollBy(offestx,offsety)\", \"按照指定的位移量滚动对话框 \"],\n        [\"setTimeout(timer)\", \"在指定的毫秒数之后，对传递的表达式求值 \"],\n        [\"setInterval(interval)\", \"指定的周期性执行代码 \"],\n        [\"moveTo(x,y)\", \"将对话框移到指定的坐标处 \"],\n        [\"moveBy(offsetx,offsety)\", \"将对话框移到指定的位移量处 \"],\n        [\"resizeTo(x,y)\", \"设置对话框的大小 \"],\n        [\"resizeBy(offsetx,offsety)\", \"按照指定的位移量设置对话框的大小 \"],\n        [\"print()\", \"相当于浏览器工具栏中的\\\"打印\\\"按钮 \"],\n        [\"navigate(URL)\", \"使用对话框显示 URL指定的页面 \"],\n        [\"status()\", \"状态条， 位于对话框下部的信息条 \"],\n        [\"defaultStatus()\", \"状态条， 位于对话框下部的信息条 \"],\n    ];\n    _MiMethod.td(\"this_o\");\n\u003c/script\u003e\n\u003ch5\u003e取消文档加载\u003c/h5\u003e\n\u003cp\u003e当文档正在加载时，使用 window.stop()方法可以取消加载。该方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.stop()\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e获取窗口引用\u003c/h5\u003e\n\u003ch5\u003e调整窗口的焦点\u003c/h5\u003e\n\u003cp\u003eblur()方法使窗口失去焦点并触发 window.onblur事件，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.blur()\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e当窗口失去焦点时，它将隐藏在其它打开的窗口之后。如果当前打开的仅仅是一个窗口，那么该方法不起作用。与 blur()方法对应，使用\n    window.focus()方法可以使另一个不是当前窗口的窗口获取焦点，并成为当前窗口，其语法格式如下：\u003c/p\u003e\n\u003cp\u003ewindow.focus()。\u003c/p\u003e\n\u003cp\u003e使用 open()方法打开一个新窗口时，新窗口便成为当前窗口，且获得焦点。但是，某些情况下，当打开新窗口时，我们并不想把焦点从当前窗口转移到新窗口，那么就可以使用下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.open(\"\" ,\" _blank\" );\u003c/span\u003e\u003cspan class=\"p\"\u003ewindow.focus();\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e前一个语句打开新窗口，后一个语句使用 focus()方法将焦点重新转移到之前打开的窗口。\u003c/p\u003e\n\u003ch5\u003e网页和浏览器交互\u003c/h5\u003e\n\u003cp\u003eHTML5规定了几个属性用于实现网页和浏览器交互：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.locationbar.visible\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e返回地址栏是否可见，如果可见返回 true；反之，返回 false。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.menubar.visible\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e返回菜单栏是否可见，如果可见返回 true；反之，返回 false。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.personalbar.visible\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e返回个人栏是否可见，如果可见返回 true；反之，返回 false。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.scrollbars.visible\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e返回滚动栏是否可见，如果可见返回 true；反之，返回 false。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.statusbar.visible\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e返回状态栏是否可见，如果可见返回 true；反之，返回 false。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.toolbar.visible\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e返回主工具栏是否可见，如果可见返回 true；反之，返回 false。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ BOM","title":"方法"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","BOM","方法"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
