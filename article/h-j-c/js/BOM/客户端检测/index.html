="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>客户端检测</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e客户端检测\u003c/h5\u003e\n\u003ch6\u003e能力检测\u003c/h6\u003e\n\u003cp\u003e能力检测（又称特性检测）即在 JavaScript 运行时中使用一套简单的检测逻辑，测试浏览器是否支 持某种特性。这种方式不要求事先知道特定浏览器的信息，只需检测自己关心的能力是否存在即可。能 力检测的基本模式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eif (object.propertyInQuestion) { \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 使用\n            object.propertyInQuestion \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e测试最常用的方案可以优化代 码执行，这是因为在多数情况下都可以避免无谓检测。 其次是必须检测切实需要的特性。某个能力存在并不代表别的能力也存在。\u003c/p\u003e\n\u003ch6\u003e安全能力检测\u003c/h6\u003e\n\u003cp\u003e进行能力检测时应该尽量使用 typeof 操作符，但光有它还不够。尤其是某些宿主对象并不保证对 typeof 测试返回合理的值。最有名的例子就是 Internet Explorer（ IE）。\u003c/p\u003e\n\u003ch6\u003e基于能力检测进行浏览器分析\u003c/h6\u003e\n\u003cp class=\"p4\"\u003e检测特性\u003c/p\u003e\n\u003cp\u003e可以按照能力将浏览器归类。如果你的应用程序需要使用特定的浏览器能力，那么最好集中检测所 有能力，而不是等到用的时候再重复检测。\u003c/p\u003e\n\u003cp class=\" p4\"\u003e检测浏览器\u003c/p\u003e\n\u003cp\u003e可以根据对浏览器特性的检测并与已知特性对比，确认用户使用的是什么浏览器。这样可以获得比 用户代码嗅探（稍后讨论）更准确的结果。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eclass BrowserDetector { \u003c/span\u003e\u003cspan class=\"p4\"\u003econstructor() { \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan\n            class=\"r\"\u003e// 测试条件编译\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// IE6~10\n            支持\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.isIE_Gte6Lte10 = /*@cc_on!@*/ false; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// 测试 documentMode \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// IE7~11\n            支持\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.isIE_Gte7Lte11 = !!document.documentMode; \u003cspan class=\"r\"\u003e// 测试\n            StyleMedia 构造函数\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// Edge 20 及以上版本支持\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ethis.isEdge_Gte20 = !!window.StyleMedia; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// 测试 Firefox\n            专有扩展安装 API \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// 所有版本的 Firefox 都支持\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ethis.isFirefox_Gte1 = typeof InstallTrigger !== 'undefined'; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// 测试 chrome 对象及其 webstore 属性\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e//\n            Opera 的某些版本有 window.chrome，但没有 window.chrome.webstore \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e//\n            所有版本的 Chrome 都支持\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ethis.isChrome_Gte1 = !!window.chrome \u0026\u0026 !!window.chrome.webstore; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan\n            class=\"r\"\u003e// Safari 早期版本会给构造函数的标签符追加 \"Constructor\"字样，如：\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e//\n            window.Element.toString(); \u003cspan class=\"r\"\u003e// [object ElementConstructor] \u003c/span\u003e\u003c/span\u003e\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// Safari 3~9.1 支持\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.isSafari_Gte3Lte9_1 =\n        /constructor/i.test(window.Element); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// 推送通知 API 暴露在 window 对象上\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e//\n            使用默认参数值以避免对 undefined 调用 toString() \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// Safari 7.1\n            及以上版本支持\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ethis.isSafari_Gte7_1 = \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e(({ \u003c/span\u003e\u003cspan class=\"p12\"\u003epushNotification = {} \u003c/span\u003e\u003cspan class=\"p10\"\u003e} = {}) =\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p10\"\u003epushNotification.toString() == '[object SafariRemoteNotification]' \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e)(window.safari); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// 测试 addons 属性\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// Opera 20\n            及以上版本支持\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.isOpera_Gte20 = !!window.opr \u0026\u0026 !!window.opr.addons;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eisIE() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn this.isIE_Gte6Lte10 || this.isIE_Gte7Lte11; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eisEdge() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn this.isEdge_Gte20 \u0026\u0026 !this.isIE(); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eisFirefox() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn this.isFirefox_Gte1; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eisChrome() {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn this.isChrome_Gte1; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eisSafari()\n        { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn this.isSafari_Gte3Lte9_1 || this.isSafari_Gte7_1; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eisOpera() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn this.isOpera_Gte20; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这个类暴露的通用浏览器检测方法使用了检测浏览器范围的能力测试。随着浏览器的变迁及发展， 可以不断调整底层检测逻辑，但主要的 API 可以保持不变。\u003c/p\u003e\n\u003cp class=\"p4\"\u003e能力检测的局限\u003c/p\u003e\n\u003cp\u003e通过检测一种或一组能力，并不总能确定使用的是哪种浏览器。\u003c/p\u003e\n\u003ch5\u003e用户代理检测\u003c/h5\u003e\n\u003cp\u003e用户代理检测通过浏览器的用户代理字符串确定使用的是什么浏览器。用户代理字符串包含在每个 HTTP 请求的头部，在 JavaScript 中可以通过 navigator.userAgent 访问。在服务器端，常见的做法\n    是根据接收到的用户代理字符串确定浏览器并执行相应操作。而在客户端，用户代理检测被认为是不可 靠的，只应该在没有其它选项时再考虑。\u003c/p\u003e\n\u003ch5\u003e软件与硬件检测\u003c/h5\u003e\n\u003ch6\u003e识别浏览器与操作系统\u003c/h6\u003e\n\u003ch5\u003e浏览器元数据\u003c/h5\u003e\n\u003cp\u003enavigator 对象暴露出一些 API，可以提供浏览器和操作系统的状态信息。\u003c/p\u003e\n\u003ch6\u003eGeolocation API\u003c/h6\u003e\n\u003cp\u003enavigator.geolocation 属性暴露了 Geolocation API，可以让浏览器脚本感知当前设备的地理位 置。这个 API 只在安全执行环境（通过 HTTPS 获取的脚本）中可用。\u003c/p\u003e\n\u003cp\u003e这个 API 可以查询宿主系统并尽可能精确地返回设备的位置信息。根据宿主系统的硬件和配置，返回结果的精度可能不一样。手机 GPS 的坐标系统可能具有极高的精度，而 IP 地址的精度就要差很多。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e浏览器也可能会利用 Google Location Service（ Chrome 和 Firefox）等服务确定位置。 有时候，你可能会发现自己并没有 GPS，但浏览器给出的坐标却非常精确。浏览器会收集\n        所有可用的无线网络，包括 Wi-Fi 和蜂窝信号。拿到这些信息后，再去查询网络数据库。 这样就可以精确地报告出你的设备位置。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e要获取浏览器当前的位置，可以使用 getCurrentPosition()方法。这个方法返回一个\u003c/p\u003e\n\u003cp\u003eCoordinates 对象，其中包含的信息不一定完全依赖宿主系统的能力：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e// getCurrentPosition()会以 position 对象为参数调用传入的回调函数\u003c/span\u003e\n    \u003cspan class=\"p\"\u003enavigator.geolocation.getCurrentPosition((position) =\u0026gt; p = position); \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这个 position 对象中有一个表示查询时间的时间戳，以及包含坐标信息的 Coordinates 对象：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econsole.log(p.timestamp); \u003cspan class=\"r\"\u003e// 1525364883361 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.log(p.coords); \u003cspan class=\"r\"\u003e// Coordinates {...} \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eCoordinates 对象中包含标准格式的经度和纬度，以及以米为单位的精度。精度同样以确定设备位置的机制来判定。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econsole.log(p.coords.latitude, p.coords.longitude); \u003cspan class=\"r\"\u003e// 37.4854409, -122.2325506\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.log(p.coords.accuracy); \u003cspan class=\"r\"\u003e// 58 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eCoordinates 对象包含一个 altitude（海拔高度）属性，是相对于 1984 世界大地坐标系（ World Geodetic System， 1984）地球表面的以米为单位的距离。此外也有一个\n    altitudeAccuracy 属性，这 个精度值单位也是米。为了取得 Coordinates 中包含的这些信息，当前设备必须具备相应的能力（比 如 GPS\n    或高度计）。很多设备因为没有能力测量高度，所以这两个值经常有一个或两个是空的。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econsole.log(p.coords.altitude); \u003cspan class=\"r\"\u003e// -8.800000190734863 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.log(p.coords.altitudeAccuracy); \u003cspan class=\"r\"\u003e// 200 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eCoordinates 对象包含一个 speed 属性，表示设备每秒移动的速度。还有一个 heading（朝向） 属性，表示相对于正北方向移动的角度（ 0 ≤ heading 360）。为获取这些信息，当前设备必须具备相\n    应的能力（比如加速计或指南针）。很多设备因为没有能力测量高度，所以这两个值经常有一个是空的， 或者两个都是空的。\u003c/p\u003e\n\u003cp\u003e获取浏览器地理位置并不能保证成功。因此 getCurrentPosition()方法也接收失败回调函数作 为第二个参数，这个函数会收到一个 PositionError 对象。在失败的情况下， PositionError 对象\n    中会包含一个 code 属性和一个 message 属性，后者包含对错误的简短描述。 code 属性是一个整数， 表示以下 3 种错误。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ePERMISSION_DENIED：浏览器未被允许访问设备位置。页面第一次尝试访问 Geolocation API 时，浏览器会弹出确认对话框取得用户授权（每个域分别获取）。如果返回了这个错误码，则要\n        么是用户不同意授权，要么是在不安全的环境下访问了 Geolocation API。 message 属性还会提 供额外信息。\n    \u003c/li\u003e\n    \u003cli\u003ePOSITION_UNAVAILABLE：系统无法返回任何位置信息。这个错误码可能代表各种失败原因， 但相对来说并不常见，因为只要设备能上网，就至少可以根据 IP 地址返回一个低精度的坐标\u003c/li\u003e\n    \u003cli\u003eTIMEOUT：系统不能在超时时间内返回位置信息\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 浏览器会弹出确认对话框请用户允许访问 Geolocation API \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan\n            class=\"r\"\u003e// 这个例子显示了用户拒绝之后的结果\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003enavigator.geolocation.getCurrentPosition(\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e() =\u0026gt; {}, \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e(e) =\u0026gt; { \u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log(e.code); \u003cspan class=\"r\"\u003e// 1\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log(e.message); \u003cspan class=\"r\"\u003e// User denied Geolocation\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 这个例子展示了在不安全的上下文中执行代码的结果\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003enavigator.geolocation.getCurrentPosition( \u003c/span\u003e\u003cspan class=\"p4\"\u003e() =\u0026gt; {}, \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e(e) =\u0026gt; { \u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log(e.code); \u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econsole.log(e.message); \u003cspan class=\"r\"\u003e// Only secure origins are allowed \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eGeolocation API 位置请求可以使用 PositionOptions 对象来配置，作为第三个参数提供。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eenableHighAccuracy：布尔值， true 表示返回的值应该尽量精确，默认值为 false。默认情 况下，设备通常会选择最快、最省电的方式返回坐标。这通常意味着返回的是不够精确的坐标。\n        比如，在移动设备上，默认位置查询通常只会采用 Wi-Fi 和蜂窝网络的定位信息。而在 enableHighAccuracy 为 true 的情况下，则会使用设备的 GPS 确定设备位置，并返回这些值 的混合结果。使用\n        GPS 会更耗时、耗电，因此在使用 enableHighAccuracy\n        配置时要仔细权 衡一下。\n    \u003c/li\u003e\n    \u003cli\u003etimeout：毫秒，表示在以 TIMEOUT 状态调用错误回调函数之前等待的最长时间。默认值是 0xFFFFFFFF（ 232 – 1）。 0 表示完全跳过系统调用而立即以 TIMEOUT 调用错误回调函数\n    \u003c/li\u003e\n    \u003cli\u003emaximumAge：毫秒，表示返回坐标的最长有效期，默认值为 0。因为查询设备位置会消耗资源， 所以系统通常会缓存坐标并在下次返回缓存的值（遵从位置缓存失效策略）。系统会计算缓存期， 如果 Geolocation\n        API 请求的配置要求比缓存的结果更新，则系统会重新查询并返回值。 0 表示强 制系统忽略缓存的值，每次都重新查询。而 Infinity 会阻止系统重新查询，只会返回缓存的 值。 JavaScript 可以通过检查\n        Position 对象的 timestamp 属性值是否重复来判断返回的是不\n        是缓存值。\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eConnection State 和 NetworkInformation API\u003c/h5\u003e\n\u003cp\u003e浏览器会跟踪网络连接状态并以两种方式暴露这些信息：连接事件和 navigator.onLine 属性。 在设备连接到网络时，浏览器会记录这个事实并在 window 对象上触发 online\n    事件。相应地，当设备断开网络连接后，浏览器会在 window 对象上触发 offline 事件。任何时候，都可以通过 navigator. onLine\n    属性来确定浏览器的联网状态。这个属性返回一个布尔值，表示浏览器是否联网。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003econst connectionStateChange = () =\u0026gt; console.log(navigator.onLine); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ewindow.addEventListener('online', connectionStateChange); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ewindow.addEventListener('offline', connectionStateChange); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 设备联网时：\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// true\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 设备断网时：\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            false \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e以下是 NetworkInformation API 暴露的属性。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003edownlink：整数，表示当前设备的带宽（以 Mbit/s 为单位），舍入到最接近的 25kbit/s。这个值 可能会根据历史网络吞吐量计算，也可能根据连接技术的能力来计算。\n    \u003c/li\u003e\n    \u003cli\u003edownlinkMax：整数，表示当前设备最大的下行带宽（以 Mbit/s 为单位），根据网络的第一跳来 确定。因为第一跳不一定反映端到端的网络速度，所以这个值只能用作粗略的上限值。\n    \u003c/li\u003e\n    \u003cli\u003eeffectiveType：字符串枚举值，表示连接速度和质量。这些值对应不同的蜂窝数据网络连接 技术，但也用于分类无线网络。这个值有以下 4 种可能\n        \u003cul\u003e\n            \u003cli\u003eslow-2g\n                \u003cul\u003e\n                    \u003cli\u003e往返时间 ＞ 2000ms \u003c/li\u003e\n                    \u003cli\u003e下行带宽 ＜ 50kbit/s \u003c/li\u003e\n                \u003c/ul\u003e\n            \u003c/li\u003e\n            \u003cli\u003e2g\n                \u003cul\u003e\n                    \u003cli\u003e2000ms ＞ 往返时间 ≥ 1400ms \u003c/li\u003e\n                    \u003cli\u003e70kbit/s ＞ 下行带宽 ≥ 50kbit/s \u003c/li\u003e\n                \u003c/ul\u003e\n            \u003c/li\u003e\n            \u003cli\u003e3g\n                \u003cul\u003e\n                    \u003cli\u003e1400ms ＞ 往返时间 ≥ 270ms \u003c/li\u003e\n                    \u003cli\u003e700kbit/s ＞ 下行带宽 ≥ 70kbit/s \u003c/li\u003e\n                \u003c/ul\u003e\n            \u003c/li\u003e\n            \u003cli\u003e4g\n                \u003cul\u003e\n                    \u003cli\u003e270ms ＞ 往返时间 ≥ 0ms \u003c/li\u003e\n                    \u003cli\u003e下行带宽 ≥ 700kbit/s\u003c/li\u003e\n                \u003c/ul\u003e\n            \u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003ertt：毫秒，表示当前网络实际的往返时间，舍入为最接近的 25 毫秒。这个值可能根据历史网 络吞吐量计算，也可能根据连接技术的能力来计算。\n    \u003c/li\u003e\n    \u003cli\u003etype：字符串枚举值，表示网络连接技术。这个值可能为下列值之一。\n        \u003cul\u003e\n            \u003cli\u003ebluetooth：蓝牙\u003c/li\u003e\n            \u003cli\u003ecellular：蜂窝\u003c/li\u003e\n            \u003cli\u003eethernet：以太网\u003c/li\u003e\n            \u003cli\u003enone：无网络连接。相当于 navigator.onLine === false\u003c/li\u003e\n            \u003cli\u003emixed：多种网络混合\u003c/li\u003e\n            \u003cli\u003eother：其它\u003c/li\u003e\n            \u003cli\u003eunknown：不确定\u003c/li\u003e\n            \u003cli\u003ewifi： Wi-Fi\u003c/li\u003e\n            \u003cli\u003ewimax： WiMAX\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003esaveData：布尔值，表示用户设备是否启用了\"节流\"（ reduced data）模式。\n    \u003c/li\u003e\n    \u003cli\u003eonchange：事件处理程序，会在任何连接状态变化时激发一个 change 事件。可以通过 navigator.\n        connection.addEventListener('change',changeHandler)或 navigator.connection. onchange = changeHandler 等方式使用\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eBattery Status API\u003c/h5\u003e\n\u003cp\u003e浏览器可以访问设备电池及充电状态的信息。 navigator.getBattery()方法会返回一个期约实 例，解决为一个 BatteryManager 对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003enavigator.getBattery().then((b) =\u0026gt; console.log(b)); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            BatteryManager { ... } \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eBatteryManager 包含 4 个只读属性，提供了设备电池的相关信息\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003echarging：布尔值，表示设备当前是否正接入电源充电。如果设备没有电池，则返回 true \u003c/li\u003e\n    \u003cli\u003echargingTime：整数，表示预计离电池充满还有多少秒。如果电池已充满或设备没有电池，则 返回 0\u003c/li\u003e\n    \u003cli\u003edischargingTime：整数，表示预计离电量耗尽还有多少秒。如果设备没有电池，则返回 Infinity\u003c/li\u003e\n    \u003cli\u003elevel：浮点数，表示电量百分比。电量完全耗尽返回 0.0，电池充满返回 1.0。如果设备没有电 池，则返回 1.0\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e这个 API 还提供了 4 个事件属性，可用于设置在相应的电池事件发生时调用的回调函数。可以通过 给 BatteryManager 添加事件监听器，也可以通过给事件属性赋值来使用这些属性。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eonchargingchange\u003c/li\u003e\n    \u003cli\u003eonchargingtimechange\n    \u003c/li\u003e\n    \u003cli\u003eondischargingtimechange\u003c/li\u003e\n    \u003cli\u003eonlevelchange\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003enavigator.getBattery().then((battery) =\u0026gt; { \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n            添加充电状态变化时的处理程序\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003econst chargingChangeHandler = () =\u0026gt;\n        console.log('chargingchange'); \u003c/span\u003e\u003cspan class=\"p4\"\u003ebattery.onchargingchange = chargingChangeHandler;\n    \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 或\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ebattery.addEventListener('chargingchange',\n        chargingChangeHandler); \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 添加充电时间变化时的处理程序\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econst chargingTimeChangeHandler = () =\u0026gt; console.log('chargingtimechange'); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ebattery.onchargingtimechange = chargingTimeChangeHandler; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan\n            class=\"r\"\u003e// 或\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ebattery.addEventListener('chargingtimechange',\n        chargingTimeChangeHandler); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 添加放电时间变化时的处理程序\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003econst\n        dischargingTimeChangeHandler = () =\u0026gt; console.log('dischargingtimechange'); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ebattery.ondischargingtimechange = dischargingTimeChangeHandler; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 或\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ebattery.addEventListener('dischargingtimechange', dischargingTimeChangeHandler); \u003cspan class=\"r\"\u003e//\n            添加电量百分比变化时的处理程序\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003econst levelChangeHandler = () =\u0026gt;\n        console.log('levelchange'); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ebattery.onlevelchange = levelChangeHandler; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n            或\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ebattery.addEventListener('levelchange', levelChangeHandler);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e});\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ BOM","title":"客户端检测"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","BOM","客户端检测"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
