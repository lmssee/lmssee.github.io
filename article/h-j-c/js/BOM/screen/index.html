                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003escreen对象\u003c/h5\u003e\n\u003ctable id=\"this_o\"\u003e\n    \u003ccaption\u003escreen对象属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_o = [\n        [\"availHeight\", \"返回显示屏幕的高度（除 Windows 任务栏外） \"],\n        [\"availWidth\", \"返回显示屏幕的宽度（除 Window）任务栏外 \"],\n        [\"bufferDepth\", \"设置或返回调色板的比特深度 \"],\n        [\"colorDepth\", \"返回目标设备的或缓冲器上的调色板的比特深度 \"],\n        [\"deviceXDPI\", \"返回显示屏的每英寸水平点数 \"],\n        [\"deviceYDPI\", \"返回显示屏的每英寸垂直点数 \"],\n        [\"fontSmoothingEnabled\", \"返回用户是否在控制面板中启用了字体平滑 \"],\n        [\"height\", \"返回显示屏幕的高度 \"],\n        [\"logicalXDPI\", \"返回显示屏幕的水平方向的常规点数 \"],\n        [\"logicalYDPI\", \"返回显示屏幕的垂直方向的常规点数 \"],\n        [\"pixelDepth\", \"返回显示屏屏幕的颜色分辨率（比特每像素） \"],\n        [\"updateInterval\", \"设置或返回屏幕的分辨率 \"],\n        [\"width\", \"返回显示屏的宽度 \"]\n    ];\n    _MiMethod.td(\"this_o\")\n\u003c/script\u003e\n\u003cp\u003escreen对象表示用户的屏幕，它提供了屏幕大小、分辨率和颜色深度等信息，使用 window.screen属性可以返回 screen对象。\u003c/p\u003e\n\u003cp\u003e也可以使用 screen对象直接访问其成员，例如下面的代码访问 height属性：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003escreen.height\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e或者使用对象连用，这也是所有浏览器都可以使用的方式：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.screen.height;\u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction center(){ \u003cspan class=\"r\"\u003e//窗口剧中\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar w = screen.availWidth / 2 //获取客户端屏幕一半的宽度\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar h = screen.availHeight / 2 //获取客户端屏幕一半的高度\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar t = (screen.availHeight - h ) / 2 // 计算居中位置的顶部坐标\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar l = (screen.availWidth - w ) / 2 //计算居中位置的左侧坐标\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar p = \"top = \" + t + \",left = \" + l + \",width = \" + w + \",height = \" + h; //设计坐标参数字符串\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar win = window.open(url,\"url\",p); \u003cspan class=\"r\"\u003e//打开指定的窗口\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ewin.focus(); \u003cspan class=\"r\"\u003e//获取窗口焦点\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ecenter(\"https:\u003cspan class=\"r\"\u003e//lmssee.cn/\"); \u003cspan class=\"r\"\u003e// 函数调用\u003c/span\u003e\u003c/span\u003e\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction center(url) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar w = screen.availWidth / 2;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar h = screen.availHeight / 2; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar t = screen.availHeight / 4;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar l = screen.availWidth / 4; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar p = \"top = \" + t + \",left = \" + l + \"width = \" + w + \"height=\" + h; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        win = window.open(url, \"url\", p); \u003c/span\u003e\u003cspan class=\"p4\"\u003ewin.focus(); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ecenter(\"https:\u003cspan class=\"r\"\u003e// lmssee.cn\")\n            //弹出页面被禁了，位置设置也被禁了\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eclipboardData对象\u003c/h6\u003e\n\u003cp\u003eclipboardData对象是 IE特有的，它提供了对预定义的剪贴板格式数据的访问，这些数据可以在编辑操作中使用。\u003c/p\u003e\n\u003cp\u003e使用 window.clipboardData就可以访问 clipboardData对象，该对象共有 3个方法可供使用，其语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eclipboardData.clearData([sDataFormat]);\u003cspan class=\"r\"\u003e//从剪贴板删除一种或多种数据格式\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003esRetrieveData = clipboardData.getData(sDataFormat);\u003cspan class=\"r\"\u003e//从剪贴板获取指定格式的数据\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ebSuccess = clipboardData.setData(sDataFormat, sData);\u003cspan\n            class=\"r\"\u003e//指定格式给剪贴板赋数据，并返回是否成功的消息\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e参数说明：\u003c/p\u003e\n\u003cp\u003e参数 sData用来定义要赋给剪贴板的数据。\u003c/p\u003e\n\u003cp\u003e参数 sDataFormat用来定义要将剪贴板中的数据转换成何种格式， getData()和 setData()方法适用的值包括 Text和 URL；对于\n    clearData()方法，该参数是可选的，而且如果定义该参数，有更多的值可供选择，。\u003c/p\u003e\n\u003cp\u003e例如下面的代码将网页上的一个文本字符串剪切下来，然后粘贴到另一个地方：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div class=\"clsSource\" id=\"oSource\"\n        onbeforecut=\"fnBeforeCut()\" oncut=\"fnCut()\"\u0026gt;选择并要剪切的文本 \u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div\n        class=\"clsTarget\" id=\"oTarget\" onbeforepaste=\"fnBeforePaste()\" onpaste=\"fnPaste()\"\u0026gt;把文本粘贴到这里 \u0026lt;/div\u0026gt;\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e//当鼠标指针位于 div元素上时激活右键菜单中的 \"剪切 \"命令，默认没有激活\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efunction fnBeforeCut() { \u003c/span\u003e\u003cspan class=\"p6\"\u003eevent.returnValue = false; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e//当选择 \"剪切 \"命令时，就删除文本，并将文本复制到剪贴板\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efunction fnCut() { \u003c/span\u003e\u003cspan class=\"p6\"\u003eevent.returnValue = false; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ewindow.clipboardData.setData(\"Text\", oSource.innerText); \u003c/span\u003e\u003cspan class=\"p6\"\u003eoSource.innerText =\n        \"\"; //\"删除 \" \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e//当鼠标指针位于 div元素上时激活右键菜单中的 \"粘贴 \"命令，默认没有激活\u003c/span\u003e\u003cspan class=\"p4\"\u003efunction fnBeforePaste() {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eevent.returnValue = false; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e//当选择 \"粘贴\n        \"命令时，就将文本从剪贴板中复制到该 div元素\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efunction fnPaste() { \u003c/span\u003e\u003cspan class=\"p6\"\u003eevent.returnValue = false; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eoTarget.innerText = window.clipboardData.getData(\"Text\"); \u003cspan class=\"r\"\u003e//\"粘贴 \"\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ BOM","title":"screen"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","BOM","screen"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
