    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介\u003c/h5\u003e\n\u003cp\u003eAjax(Asynchronous JavaScript and XML，异步通信 Javascript 和 XML) 是利用 JavaScript 脚本和 XML 数据实现客户端和服务端进行异步通信的一种方法。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e基于标准的 HTML 和 CSS \u003c/li\u003e\n    \u003cli\u003e通过 DOM 实现动态显示和交互\u003c/li\u003e\n    \u003cli\u003e通过 XML 进行数据交互和处理\u003c/li\u003e\n    \u003cli\u003e使用 XMLHttpRequest 插件进行异步通信\u003c/li\u003e\n    \u003cli\u003e使用 Javascript 实施逻辑控制，以便整合上述技术\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e头部信息\u003c/h5\u003e\n\u003cp\u003eHTTP(HyperText Transfer Protocol，超文本传输协议)是一种应用层协议，负责超文本传输。如文本、图像、多媒体等。HTTP 由两部分组成：请求（Request）和响应（Response）。\u003c/p\u003e\n\u003ch6\u003e请求\u003c/h6\u003e\n\u003cp\u003eHTTP 由三部分组成：请求头、消息报头、请求正文。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;request-line\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;headers\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;blank\n        line\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e[\u0026lt;request-body\u0026gt;]\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e请求头以一个方法符号开头，以空格隔开。后面跟着请求的 URL 和协议的版本号。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003emethod Requset-URI HTTP-Version CRLF \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e各部分说明如下：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eMethod∶表示请求方法，请求方法以大写形式显示，如 POST、GET 等。HTTP 定义了大量的 请求类型，不过 Web 开发常用 GET 和 POST请求。只要在 Web 浏览器上输入一个\n        URL，浏览器就将基于该URL 向服务器发送一个 GET 请求，以告诉服务器获取并返回什么资源\u003c/li\u003e\n    \u003cli\u003eRequest-URI∶ 表示统一资源标识符\u003c/li\u003e\n    \u003cli\u003eHTTP-Version∶ 表示请求的 HTTP 协议版本\u003c/li\u003e\n    \u003cli\u003eCRLF∶表示回车和换行，除了作为结尾的 CRLF外，不允许出现单独的 CR 或LF 字符。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e请求行后是消息报头部分，用来说明服务器需要调用的附加信息。 在消息报头后是一个空行，然后才是请求正文部分，即主体部分（body），该部分可以添加任意的其它数据。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eGET / HTTP / 1.1 \u003c/span\u003e\u003cspan class=\"p2\"\u003eHOST: www.baidu.com \u003c/span\u003e\u003cspan class=\"p2\"\u003eUser - Agent:\n        Mozilla / 5.0(Window; U; Window NT 5.1; zh - CN; rv: 1.9 .0 .8) \u003c/span\u003e\u003cspan class=\"p2\"\u003eGecko / 2021040629\n        Chrome /91.0.4464.4 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eConnection:keep-Alive\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003e请求行的第1部分说明了该请求是 GET 请求。该行的第 2 部分是一个斜杠（/），用来说明请轴是百度域名的根目录。该行的最后一部分说明使用的是HTTP1.1版本，另一个可选项是HTTP1.0\u003c/li\u003e\n    \u003cli\u003e第2行是请求的第一个消息报头，HOST 头部指出请求的域名。结合 HOST头部和上一行中的统资源标识符（即斜杠），就可以确定请求服务器的具体地址\u003c/li\u003e\n    \u003cli\u003e第3行包含的是 User-Agent 头部，服务器端和客户端脚本都能够访问它，该头部包含的信息由浏览器来定义，并且在每个请求中将会自动发送。JavaScript 和服务器通过 User-Agent\n        头部信息，可以了解客户端的本地情况\u003c/li\u003e\n    \u003cli\u003e最后一行是 Connection头部，通常将浏览器操作设置为 Keep-Alive，在最后一个头部后有一个空行（即使不存在请求主体）\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e如果在 GET 请求中附带参数，则必须将这些附带信息加在 URL 后，这个信息别称为查询字符串（Query String），发送时被附加在请求行中。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eGET /bbs/?user=css8%20 HTTP / 1.1 \u003c/span\u003e\u003cspan class=\"p2\"\u003eHOST: lmssee.cn\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eUser - Agent: Mozilla / 5.0(Window; U; Window NT 5.1; zh - CN; rv: 1.9 .0 .8)\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eGecko / 2021040629 Chrome /91.0.4464.4 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eConnection:keep-Alive\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在 POST 请求中，被要求服务器就收附在请求后面数据，常用于提交表单\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ePOST /form.asp HTTP/(CRLE) \u003c/span\u003e\u003cspan class=\"p2\"\u003eHOST:www.lmssee.cn(CRLE)\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eUser-Agent:Mozilla/5.0 (Window;U;Windows NT 5.1;zh-CN;rv:1.9.0.8) \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eGecko/2021040612 Chrome/91.0.4464.4 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eContent-Type:application/x-www-from/urlencoded \u003c/span\u003e\u003cspan class=\"p2\"\u003eContent-Length:22(CRLE)\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eConnection:Keep-Alive(CRLE) \u003c/span\u003e\u003cspan class=\"p2\"\u003eCAche-Control:no-cache(CRLE)\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e(CRLE) \u003cspan class=\"r\"\u003e// 改 CRLE 行表示消息报头已经结束，在此之前为消息报头\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003euser=css8\u0026pwd=111111 \u003cspan class=\"r\"\u003e// 此行为提交的数据\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003ePOST 请求与 GET请求之间略有区别。首先，请求行开始处的 GET变为 POST，在后面有两个新其中 Content-Type 说明了请求主体的内容是如何编码的。浏览器始终以\n    application/x-www-from-urlencoded 的编码格式来传送数据，这是针对简单 URL 编码的 MIME 类型。\u003c/p\u003e\n\u003cp\u003eContent-Length 说明了请求主体的字节数。在 Connection 后是一个空行，再后面就是请求主体。大多数浏览器的\n    POST请求一样，都以\"名称/值\"对的形式表示的。POST方法与GET方法的数据传形式几乎是一样的。\u003c/p\u003e\n\u003ch6\u003e响应\u003c/h6\u003e\n\u003cp\u003eHTTP 响应也是三部分组成：状态行、消息报头、响应正文。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;status-line\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;headers\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;blank\n        line\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e[\u0026lt;response-body\u0026gt;]\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e状态行内容如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003eHTTP-Version Status-Code Reason-Phrase CRLE \u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eHTTP-Version∶ 表示服务器 HTTP 协议的版本\u003c/li\u003e\n    \u003cli\u003eStatus-Code∶ 表示服务器发回的响应状态代码\u003c/li\u003e\n    \u003cli\u003eReason-Phrase∶ 表示状态代码的文本描述\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e状态代码有3位数字组成，第一个数字定义了响应的类别，且有如下5种可能的取值。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e1xx∶指示信息。表示请求已接收，继续处理\u003c/li\u003e\n    \u003cli\u003e2xx∶ 成功。表示请求已被成功接收、理解或接收\u003c/li\u003e\n    \u003cli\u003e3xx∶ 重定向。要完成请求必须进行更进一步的操作\u003c/li\u003e\n    \u003cli\u003e4xx∶ 客户端错误。请求有语法错误，或者请求无法实现\u003c/li\u003e\n    \u003cli\u003e5xx∶ 服务器端错误。服务器未能实现合法的请求\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e200 oK \u003cspan class=\"r\"\u003e// 客户端请求成功\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e400 Bad\n        Request \u003cspan class=\"r\"\u003e// 客户端请求有语法错误，不能被服务器所理解\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e401\n        Unauthorized \u003cspan class=\"r\"\u003e// 请求未经授权，这个状态代码必须和 wwW-Authenticate 报头域一起使用\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e403 Forbidden \u003cspan class=\"r\"\u003e// 服务器收到请求，但是拒绝提供服务\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e404 Not\n        Found\u003cspan class=\"r\"\u003e// 请求资源不存在，例如，输入了错误的 UR工\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e500 Internal Server Error \u003cspan\n            class=\"r\"\u003e// 服务器发生不可预期的错误\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e503 Server Unavailable \u003cspan class=\"r\"\u003e// 服务器当前不能处理客户端的请求，一段时间后，可能恢复正常\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在状态行之后是消息头。 一般服务器会返回一个名为 Data 的信息， 用来说明响应生成的日期和时间。 接下来就是与POST请求中一样的 Content - Type和Content - Length。\n    响应主体所包含的就是所请求资源的 HTML 源文件。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eHTTP/1.1 200 OK \u003c/span\u003e\u003cspan class=\"p2\"\u003eDate: Wed,08 Apr 2021 12:55:50 GMT\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eContent-Type: text/html;charset=gb2312 \u003c/span\u003e\u003cspan class=\"p2\"\u003eContent-Length: 1700\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;html\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;百度一下，你就知道\u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!-- body --\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e转换串行化字符串\u003c/h5\u003e\n\u003cp\u003eGET 和 POST 都是以名值对字符串的形式发送数据。\u003c/p\u003e\n\u003ch6\u003e传输名/值对信息\u003c/h6\u003e\n\u003cp\u003e与 JavaScript 对象结构类似，多在 GET 请求中使用。\u003c/p\u003e\n\u003ch6\u003e传输有序数据列表\u003c/h6\u003e\n\u003cp\u003e与 JavaScript 数组结构类似，多在一系列文本框中提交表单信息时使用，它与上一种方式不同，说提交的数据按顺序排列，不可以随意组合。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction toString(data) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar a = []; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (data.constructor == Array) { \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (var i = 0; i \u0026lt; script\n        data.length; i++) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ea.push(data[i].name + \"=\" + encodeURIComponent(data[i].value));\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (var i in data) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ea.push(i + \"=\" + encodeURIComponent(data[i])); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn a.join(\"\u0026\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e跟踪状态\u003c/h5\u003e\n\u003cp\u003eXMLHttpRequest 对象通过 readyState 属性实时跟踪异步状态。一旦当该属性发生变化，皆会触发 readystatechange 事件，调用该事件绑定的回调函数。\u003c/p\u003e\n\u003ctable id=\"Ac\"\u003e\n    \u003ccaption\u003ereadyState 属性值\u003c/caption\u003e\n    \u003ccolgroup width=\"20%\"\u003e\u003c/colgroup\u003e\n    \u003ccolgroup\u003e\u003c/colgroup\u003e\n\u003c/table\u003e\n\u003cp\u003e如果 readyState 属性值是 4 ，这说明相应完毕，那么可以安全的读取数据。另外，还需要监控 HTTP 状态码，只有当 HTTP 状态码为 200 时，才表示 HTTP 响应顺利完成。\u003c/p\u003e\n\u003cp\u003e在 XMLHttpRequest 中使用 states 属性获取当前的 HTTP 状态码。如果是 readyState 属性值为 4，且 state （状态码）属性值为 200，那么说明 HTTP 请求过程顺利完成。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 定义XMLHttpRequest对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            参数：无\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            返回值：XMLHttpRequest对象实例\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction createXMLHTTPObject() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar XMLHttpFactories = [ \u003cspan class=\"r\"\u003e// 兼容不同浏览器和版本的创建函数数组\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003efunction() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn new XMLHttpRequest() \u003c/span\u003e\u003cspan class=\"p6\"\u003e},\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003efunction() { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ereturn new ActiveXObject(\"Msxml2.XMLHTTP\") \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}, \u003c/span\u003e\u003cspan class=\"p6\"\u003efunction() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn new\n        ActiveXObject(\"Msxml3.XMLHTTP\") \u003c/span\u003e\u003cspan class=\"p6\"\u003e}, \u003c/span\u003e\u003cspan class=\"p6\"\u003efunction() { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ereturn new ActiveXObject(\"Microsoft.XMLHTTP\") \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}, \u003c/span\u003e\u003cspan class=\"p4\"\u003e]; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar xmlhttp = false; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efor (var i = 0; i \u0026lt; XMLHttpFactories.length; i++) { \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e//\n            尝试调用匿名函数，如果成功则返回XMLHttpRequest对象，否则继续调用下一个\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan class=\"p8\"\u003exmlhttp = XMLHttpFactories[i](); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} catch\n        (e) { \u003c/span\u003e\u003cspan class=\"p8\"\u003econtinue; \u003cspan class=\"r\"\u003e// 如果发生异常，则继续下一个函数调用\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ebreak; \u003cspan class=\"r\"\u003e// 如果成功，则中止循环\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        xmlhttp; \u003cspan class=\"r\"\u003e// 返回对象实例\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar xmlHttp =\n        createXMLHTTPObject(); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efunction request(url) { \u003c/span\u003e\u003cspan class=\"p4\"\u003exmlHttp.open(\"GET\", url, false); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003exmlHttp.onreadystatechange = handleStateChange; \u003c/span\u003e\u003cspan class=\"p4\"\u003exmlHttp.send(null);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efunction handleStateChange() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (xmlHttp.readyState == 4) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (xmlHttp.status == 200 || xmlHttp.status == 0) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ealert(xmlHttp.responseText); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e终止请求\u003c/h5\u003e\n\u003cp\u003e使用 abort() 方法可以终止正在进行的异步请求。在使用 abort() 方法前，应先清除 onreadystatechange 事件处理函数，因为 IE 和 Mozilla 在请求中止后也会激活这个处理函数，如果给\n    onreadystatechange 属性设置为 null ，则 IE 会发生异常，所以可以设置一个空函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003exmlhttp.onreadystatechange = function(){}; \u003c/span\u003e\u003cspan class=\"p2\"\u003exmlhttp.abort();\u003c/span\u003e\n\u003c/code\u003e\n\n\u003cscript\u003e\n    var Ac = [\n        [\"返回值\", \"嗯\"],\n        [\"0\", \"未初始化。表明对象已经建立，但是未初始化，尚未调用 open() 方法\"],\n        [\"1\", \"初始化。表明对象已经建立，尚未调用 send() 方法\"],\n        [\"2\", \"发送数据。表示 send() 方法已经调用，但是当前的状态以及 HTTP 头未知\"],\n        [\"3\", \"数据传送中。已经结束部分数据，因为响应及 HTTP 不全，这时通过 responseBody 和 responseText 获取部分数据会出现错误。\"],\n        [\"4\", \"完毕。数据加载完毕，此时可以通过responseBody 和 responseText 获取完整的响应数据\"]\n    ];\n    _MiMethod.td(\"Ac\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ ajax","title":"Ajax"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","ajax","Ajax"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
