\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e创建 XML DOM 对象\u003c/h5\u003e\n\u003cp\u003e使用 ActiveXObject() 构造函数可以创建 XML DOM 对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar xmlDOM = new ActiveXObject(\"Microsoft.XmlDom\"); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数表示要实例化 ActiveX 对象的字符串。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction XmlDom() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar a = [ \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\"MSXML2.DOMDocument.5.0\", \u003c/span\u003e\u003cspan class=\"p6\"\u003e\"MSXML2.DOMDocument.4.0\", \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\"MSXML2.DOMDocument.3.0\", \u003c/span\u003e\u003cspan class=\"p6\"\u003e\"MSXML2.DOMDocument\", \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\"Microsoft.XmlDom\" \u003c/span\u003e\u003cspan class=\"p4\"\u003e]; \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i in a) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan class=\"p8\"\u003evar o = new ActiveXObject(a[i]); \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ereturn o \u003c/span\u003e\u003cspan class=\"p6\"\u003e} catch (e) {} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ethrow new Error(\" 浏览器不支持 MSXML 组件\") \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在符合标准的现代浏览器中，可以通过 document 的 Implementation 属性，使用该对象的 createDocument 方法创建 XML DOM 对象。该方法包括这么三个参数。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e文档所使用命名空间 URL 的字符串\u003c/li\u003e\n    \u003cli\u003e文档根元素名称的字符串\u003c/li\u003e\n    \u003cli\u003e要创建的文档类型\u003c/li\u003e\n\u003c/ol\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar xmlDOM = document.implementation.createDocument(\"\",\"\",null); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e如果要创建包含文档元素的 XML DOM ，那么第二个参数中指定根元素名称。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar xmlDOM = document.implementation.createDocument(\"\", \"root\", null); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e若是要带有命名空间的 DOM ，可以在第一个参数中指定。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar xmlDOM = document.implementation.createDocument(\"https://lmssee.cn/\", \"root\",\n        null); \u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e加载 XML 数据\u003c/h5\u003e\n\u003cp\u003eIE 使用 loadXML() 和 load() 加载 XML 数据。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar o = xmlDom(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar s =\n        \"\u0026lt;recordset\u0026gt;\u0026lt;record\u0026gt;\u0026lt;ProductID\u0026gt;1\u0026lt;/ProductID\u0026gt;\u0026lt;ProductName\u0026gt;\n        苹果汁\u0026lt;/ProductName\u0026gt;\u0026lt;/record\u0026gt;\u0026lt;/rexordset\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.loadXML(s);\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar o = xmlDom(); \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.load(\"test.xml\");\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e为了安全考虑，load() 不能够跨域访问 XML 文件。load() 方法在加载数据时有两种模式：同步加载和异步加载。\u003c/p\u003e\n\u003ch6\u003e设置加载模式\u003c/h6\u003e\n\u003cp\u003eload() 方法默认加载模式为异步加载，也可以使用 async 属性来设置加载模式，该属性是布尔值，取值为 false 时为同步加载，取值为 true 为异步加载。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar o = xmlDom(); \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.async = false; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eo.load(\"test.xml\");\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e跟踪异步加载状态\u003c/h6\u003e\n\u003cp\u003e与 XMLHttpRequest 对象通信相同，XML DOM 对象使用 readyStatue 属性跟踪进程。readyStatue 属性取值有 5 个。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003ereadyStatue 属性的取值\u003c/caption\u003e\n\u003c/table\u003e\n\u003cp\u003e同时， XML DOM 对象定义了 onreadystatechange() 属性，每当 readyState 属性值发生变化时，就会触发 readystatechange 事件，激活 onreadystatechange\n    处理函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction callback(o) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif\n        (o.readyState == 4) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ealert(\"XML 文件加载完毕\") \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar 哦 = xmlDom(); \u003cspan class=\"r\"\u003e// 创建实例\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eo.async = true; \u003cspan\n            class=\"r\"\u003e// 定义异步加载，因为默认是异步加载，所以可以省略\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eo.onreadystatechange = callback(o);\n        \u003cspan class=\"r\"\u003e// 定义状态响应事件处理函数\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eo.load(\"test.xml\"); \u003cspan class=\"r\"\u003e// 开始执行异步加载事件\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在回调函数中，不能使用 this ，因为 javascript 中的 Active 对象比较特殊，this 可能会指代错误，一般直接引用 XML DOM 的实例名称。\u003c/p\u003e\n\u003ch5\u003e显示 XML 数据\u003c/h5\u003e\n\u003cp\u003eXML 有着严格的 DOM 2 标准，可以使用 documentElement 属性获取根元素，使用 childNodes 、firstChild 、lastChild 、nextSibling 、nodeName\n    、nodeType 、ownerDocument 、parentNode 、perviousSibling 来遍历节点。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction text(o) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar s = \"\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003efor\n        (var i = 0; i \u0026lt; o.childNodes; i++) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (o.childNodes.hasChildNodes()) {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003es += text(o.childNodes[i]); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p8\"\u003es +=
