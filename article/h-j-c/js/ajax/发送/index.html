    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e建立 XMLHttpRequest 连接\u003c/h5\u003e\n\u003cp\u003e创建 XMLHttpRequest 对象后，接可以使用该对象的 open() 方法建立一个 HTTP 请求。 open() 方法用法如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eXMLHttpRequest.open(bstrMethod, bstrURl, varAsync, bstrUser, bstrPassword); \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e该方法包含 5 个参数，其中前 2 个参数是必须的。简单说明如下:\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ebstrMethod ∶ HTTP 方法字符串，如 POST 、GET 等，不区分大小写\u003c/li\u003e\n    \u003cli\u003ebstrUrl ∶ 请求的 URL 地址字符串，可以为绝对地址或相对地址\u003c/li\u003e\n    \u003cli\u003evarAsync ∶ 布尔值，可选参数，指定请求是否为异步方式，默认为 true 。如果为 true （真），当 状态改变时会调用 onreadystatechange 属性指定的回调函数\u003c/li\u003e\n    \u003cli\u003ebstrUser ∶ 可选参数，如果服务器需要验证，该参数指定用户名，如果未指定，当服务器需要验 证时，会弹出验证窗口\u003c/li\u003e\n    \u003cli\u003ebstrPassword ∶ 可选参数，验证信息中的密码部分，如果用户名为空，则此值将被忽略\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e建立连接之后，就可以使用 send （）方法发送请求到服务器端，并接收服务器的响应，send() 方法的用法如下\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eXMLHttpRequest.send (varBody);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数varBody 表示将通过该请求发送的数据，如果不传递信息，可以设置参数为 null1 。\u003c/p\u003e\n\u003cp\u003e该方法的同步或异步方式取决于open 方法中的varAsync 参数，如果 varAsync = False ，此方法将会等待请求完成或者超时才会返回，如果 varAsync = True ，此方法将立即返回。\u003c/p\u003e\n\u003cp\u003e使用 XMLHttpRequest 对象的 responseBody 、responseStream 、responseText 、responseXML 属性可以接收响应数据。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar this_o_o = addAjax(); \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis_o_o.open(\"GET\",\n        \"https://lmssee.cn/l/study/AJAX/ajax.asp\", false); \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis_o_o.send(null); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ealert(this_o_o.responseText); \u003cspan class=\"r\" id=\"hello\"\u003e// 点我，点我\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e发送 GEt 请求\u003c/h5\u003e\n\u003cp\u003e发送 GET 请求时，只需将查询字符串的 URL 传入 open() 方法，设置第一个参数为 GET 就可以了。服务器能够在 URL 尾部的查询字符串中接收用户传来的信息。\u003c/p\u003e\n\u003cp\u003e使用 GET 请求很简单，也很方便，它适合传递一些简单的信息，不易传输较大容量和加密信息。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!doctype html\u0026gt; \u0026lt;html\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;\u0026lt;/title\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 定义XMLHttpRequest\n            对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 参数：无\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 返回值：XMLHttpRequest 对象实例\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003efunction\n        createXMLHTTPObject() { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar XMLHttpFactories = [ \u003cspan class=\"r\"\u003e//\n            兼容不同浏览器和版本的创建函数数组\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003efunction() { \u003c/span\u003e\u003cspan class=\"p10\"\u003ereturn new XMLHttpRequest() \u003c/span\u003e\u003cspan class=\"p8\"\u003e},\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003efunction() { \u003c/span\u003e\u003cspan class=\"p10\"\u003ereturn new ActiveXObject(\"Msxml2.XMLHTTP\")\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e}, \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003efunction() { \u003c/span\u003e\u003cspan class=\"p10\"\u003ereturn new ActiveXObject(\"Msxml3.XMLHTTP\") \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e}, \u003c/span\u003e\u003cspan class=\"p8\"\u003efunction() { \u003c/span\u003e\u003cspan class=\"p10\"\u003ereturn new\n        ActiveXObject(\"Microsoft.XMLHTTP\") \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e}, \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e]; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar xmlhttp = false; \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (var i = 0; i \u0026lt;\n        XMLHttpFactories.length; i++) { \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u003cspan class=\"r\"\u003e// 尝试调用匿名函数，如果成功则返回XMLHttpRequest\n            对象，否则继续调用下一个\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003etry { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003exmlhttp = XMLHttpFactories[i](); \u003c/span\u003e\u003cspan class=\"p8\"\u003e} catch (e) { \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003econtinue; \u003cspan class=\"r\"\u003e// 如果发生异常，则继续下一个函数调用\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ebreak; \u003cspan class=\"r\"\u003e// 如果成功，则中止循环\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn xmlhttp; \u003cspan class=\"r\"\u003e// 返回对象实例\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar xmlHttp = createXMLHTTPObject(); \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction\n        request(url) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003exmlHttp.open(\"GET\", url, false); \u003c/span\u003e\u003cspan class=\"p6\"\u003exmlHttp.send(null); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ealert(xmlHttp.responseText); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.onload =\n        function() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar b = document.getElementsByTagName(\"input\")[0]; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eb.onclick = function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003evar url = \"server.asp?callback=functionName\"\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003erequest(url); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"utf-8\"\u0026gt; \u0026lt;/head\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;h1\u0026gt;Ajax\n        异步数据传输\u0026lt;/h1\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input name=\"submit\" type=\"button\" id=\"submit\" value=\"\n        向服务器发出请求\"\u0026gt; \u0026lt;/body\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e查询字符串通过 ？ 前缀附加在 URL 的尾部，发送数据是以 \u0026 连接的一个或多个名/ 值对。每一个名值对都必须在编码后才能出现在 URL 中，用户使用 Javascript 的\n        encodeURLComponent() 函数对其进行编码，服务器接收后也会使用 decodeURLComponent() 函数对其进行解码。URL 的最长为 2048 字符（2KB ）。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e发送 POST 请求\u003c/h5\u003e\n\u003cp\u003ePOST 请求支持发送任何格式、任意长度的数据，一般多用于表单提交。与 GET 发送的数据格式相似，POSS 发送的请求也必须进行编码。并用 \u0026 进行分割。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003esend(\"name1=value1\u0026name2=value2...\") \u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction request(url) { \u003c/span\u003e\u003cspan class=\"p6\"\u003exmlHttp.open(\"POST\", url, false);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003exmlHttp.setRequestHeader('Content-type', 'application/x-www-form-urlencoded');\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003exmlHttp.send(\"callback=functionName\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ealert(xmlHttp.responseText); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在 open() 方法中，设置第一个参数为 POST ，然后使用 setRequestHeader 方法设置请求消息的内容类型为 \"application/x-www-form-urlencoded\" ,\n    它表示传递的是表单值，一般使用 POST 发送请求时都必须设置该项，否则服务器无法识别传递过来的数据。\u003c/p\u003e\n\u003cp\u003esetRequestHeader() 方法的用法如下:\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003exmlhttp.setRequestHeader(\"Header-name\",\"value\");\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e一般设置头部信息中User-Agent 首部为XMLHTTP ，以便服务端器能够辨别出 XMLHtRequest 异步请求和其它客户端普通请求。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003exmlhttp.setRequestHeader(\"User-Agent\",\"XMLHTTP\")\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e这样就可以在服务器端编写脚本分别为现代标准浏览器和不支持 JavaScript 的浏览器呈现不同的文档，以提高可访问性的手段。\u003c/p\u003e\n\u003cp\u003e如果使用 POST 方法传递数据，还必须设置另一个头部信息。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003exmlhttp.setRequestHeader(\"Content-type \",\" application/ x-www-form-urlencoded\n        \");\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e然后，在 send （）方法中附加要传递的值，该值是一个或多个\" 名/ 值\" 对，多个\" 名/ 值\" 对之间使用\"\u0026\" 分隔符进行分隔。在\" 名/ 值\" 对中，\" 名\" 可以为表单域的名称（与表单域相对应），\" 值\"\n    可以是固定的值，也可以是一个变量。\u003c/p\u003e\n\u003cp\u003e设置第 3 个参数值为 false ，关闭异步通信。\u003c/p\u003e\n\u003cp\u003e用于发送 POST 请求的数据类型（Content Type ）通常是 application/x-www-form-urlencoded ，这意味还可以以tex/xml 或application/xml\n    类型给服务器直接发送XML 数据，甚至以application/json 类型发送 JavaScript 对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction request(url) { \u003c/span\u003e\u003cspan class=\"p6\"\u003exmlHttp.open(\"POST\", url, false);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003exmlHttp.setRequestHeader('Content-type', 'text/xml'); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003exmlHttp.send(\"\u0026lt;bookstore\u0026gt;\u0026lt;book id='1'\u0026gt; 书名1\u0026lt;/book\u0026gt;\u0026lt;book id='2'\u0026gt;\n        书名2\u0026lt;/book\u0026gt;\u0026lt;/bookstore\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ealert(xmlHttp.responseText); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e由于使用 GET 发送请求的信息量十分有限，所以在传输文件、大容量数据、传输安全信息、XML 格式数据时，应使用 POST 方式发送。其传递的信息是不限字符数的，且不受编码形式的限制，还可以传入二进制信息。\u003c/p\u003e\n\u003c/div\u003e\n\n\u003cscript\u003e\n    var this_click = document.querySelector(\"#hello\");\n    var this_o_o = addAjax();\n    this_o_o.open(\"GET\", \"https://lmssee.cn/l/study/AJAX/ajax.asp\", false);\n    this_o_o.send(null);\n    this_click.onclick = function () {\n        alert(this_o_o.responseText);\n    }\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ ajax","title":"发送"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","ajax","发送"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
