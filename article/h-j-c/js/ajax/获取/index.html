class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>获取</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                              border: .5px dotted  var(--mi-uni-background-color);
                            }
                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e获取 XML 数据\u003c/h5\u003e\n\u003cp\u003eXMLHttpRequest 对象通过 responseBody 、responseStream 、responseText 、responseXML 属性获取响应信息，它们都是只读属性。\u003c/p\u003e\n\u003ctable id=\"Ad\"\u003e\n    \u003ccaption\u003eXMLHtRequest 对象响应信息属性\u003c/caption\u003e\n    \u003ccolgroup width=\"25%\"\u003e\u003c/colgroup\u003e\n    \u003ccolgroup\u003e\u003c/colgroup\u003e\n\u003c/table\u003e\n\u003cp\u003e实际应用中，，一般原则设置为 XML 、HTML 、JSON 或其它纯文本格式。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e如果向页面添加大量的大块数据时，选择 HTML 格式会比较方便\u003c/li\u003e\n    \u003cli\u003e如果要协作开发，且项目庞杂，选择 XML 格式会比较更通用\u003c/li\u003e\n    \u003cli\u003e如果要检索复杂的数据，且结构复杂。那么选择 JSON 格式比较便捷\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eXML 是使用比较多的数据格式，因为 XML 文档可以被许多的编程语言支持，而且开发人员可以使用计较熟悉的 DOM 模型来解析数据，其缺点是就是服务器响应和解析 XML\n    数据的脚本可能会变得相当冗长，查找数据不得不遍历所有的节点。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar x = createXMLHTTPObject(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar url = \"XML_server.xml\";\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.open(\"GET\", url, true); \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.onreadystatechange = function() {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (x.readyState == 4 \u0026\u0026 x.status == 200) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar info = x.responseXML; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ealert(info.getElementsByTagName(\"the\")[0].firstChild.data); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.send(null);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e对于 XML 来说，第一行必须是 \u0026lt;?xml version=\"1.0\" encoding=\"gb2312\"?\u0026gt; ，该行命令表示输出的数据格式为 XML 格式文档，同时标识了 XML\n    文档的版本和字符编码。为了能够兼容 IE 异类等浏览器，能让不同浏览器能够识别 XML 文档，还应该为响应信息定义 XML 文本类型。最后根据 XML 语法规则编写文档的信息结构。\u003c/p\u003e\n\u003ch5\u003e获取 HTML 文本\u003c/h5\u003e\n\u003cp\u003e响应信息为 HTML 字符串是一种常用的方法，这样在客户端就可以使用 innerHTML 属性把获取的字符串插入到网页。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar x = createXMLHTTPObject(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar url = \"HTML_server.html\";\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.open(\"GET\", url, true); \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.onreadystatechange = function() {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (x.readyState == 4 \u0026\u0026 x.status == 200) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar o = document.getElementById(\"grid\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003eo.innerHTML = x.responseText;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.send(null);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在某些情况下，使用 HTML 字符串可能为客户端解析响应信息节省了 JavaScript 脚本，但是，也会有其它问题：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e响应信息中的大量无用字符，响应数据变得臃肿。因为 HTML 表示不含有信息，完全可以在客户端脚本生成\u003c/li\u003e\n    \u003cli\u003e响应信息中的 HTML 结构无法被利用，在看客户端的 JavaScript 中，它们仅是字符串穿在，无法使用 DOM 进行调整\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e获取 JavaScript 脚本\u003c/h5\u003e\n\u003cp\u003e可以响应信息为 JavaScript 代码，这里的代码与 JSON 不同，它是可以执行的命令或脚本。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar x = createXMLHTTPObject(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar url = \"code_server.js\";\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.open(\"GET\", url, true); \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.onreadystatechange = function() {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (x.readyState == 4 \u0026\u0026 x.status == 200) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar info = x.responseText; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar o = eval(\"(\" + info + \")\" + \"()\");\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(o); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ex.send(null);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在转换时加上小括号，并使用 eval 来执行响应代码代码。但是不常用，因为它无法传递更丰富的信息，同时极易容易引起安全隐患。\u003c/p\u003e\n\u003ch5\u003e获取 JSON 数据\u003c/h5\u003e\n\u003cp\u003e通过 XMLHttpRequest 对象的 responseText 属性获取返回的 JSON 数据字符串，然后可以使用 eval() 方法将其解析为本地的 JavaScript 对象，从该对象中获取想要的。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar x = createXMLHTTPObject(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar url = \"JSON_server.js\";\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.open(\"GET\", url, true); \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.onreadystatechange = function() {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (x.readyState == 4 \u0026\u0026 x.status == 200) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar info = x.responseText; \u003c/span\u003e\u003cspan class=\"p6\"\u003evar o = eval(\"(\" + info + \")\"); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ealert(info); \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(o.name); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ex.send(null);\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e使用一种有效识别 JSON 语法的解析程序，当解析一旦匹配到 JSON 字符串中包含不规范的对象，会直接中断或者不执行其中的恶意代码。可以访问\u003ca\n            href=\"http://www.json.org/json2.js\"\u003ehttp://www.json.org/josn2.js\u003c/a\u003e免费下载 JavaScript\n        版本的解析程序。不过在确信代码没有恶意时，可以直接使用 eval() 方法解析 json 字符串。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e获取纯文本\u003c/h5\u003e\n\u003cp\u003e对于简短的信息，有必要使用纯文本格式来进行响应。但是纯文本信息在响应时很容易丢失，且没有办法检测信息的完整性。因为缺少元数据，元数据都以数据包的形式发送，不容易丢失。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar x = createXMLHTTPObject(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar url = \"Text_server.txt\";\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.open(\"GET\", url, true); \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.onreadystatechange = function() {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (x.readyState == 4 \u0026\u0026 x.status == 200) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar info = x.responseText; \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (info == \"true\") alert(\" 文本信息传输完整\");\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eelse alert(\" 文本信息可能存在丢失\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.send(null);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e获取头部信息\u003c/h5\u003e\n\u003cp\u003e每个 HTTP 请求和响应的头部都包含一组消息，对于开发人员来说，获取这些消息有很必要的重要性。XMLHttpRequest 对象有两个方法获取或设置头部响应。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003egetAllResponseHeaders() 获取响应头部的所有 HTTP 头信息\u003c/li\u003e\n    \u003cli\u003egetResponseHeader() 从响应头中获取指定的 HTTP 信息\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar x = createXMLHTTPObject(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar url = \"server.txt\";\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.open(\"GET\", url, true); \u003c/span\u003e\u003cspan class=\"p2\"\u003ex.onreadystatechange = function() {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (x.readyState == 4 \u0026\u0026 x.status == 200) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar info = document.getElementById(\"info\") \u003c/span\u003e\u003cspan class=\"p6\"\u003einfo.innerHTML =\n        x.getAllResponseHeaders(); \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(x.getAllResponseHeaders()); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ex.send(null);\u003c/span\u003e\n\u003c/code\u003e\n\n\u003cscript\u003e\n    var Ad = [\n        [\" 响应信息\", \" 说明\"],\n        [\"responseBody\", \" 将相应信息正文以 Unsigned Byte 数字形式返回\"],\n        [\"responseStream\", \" 以 ADO Stream 对象的形式返回响应信息\"],\n        [\"responseText\", \" 以字符串的形式返回响应信息\"],\n        [\"responseXML\", \" 以 XML 数据形式返回响应信息\"]\n    ];\n    _MiMethod.td(\"Ad\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ ajax","title":"获取"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","ajax","获取"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
