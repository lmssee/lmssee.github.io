="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>定义</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定义 XMLHttpRequest 对象\u003c/h5\u003e\n\u003cp\u003eXMLHttpRequest 对象提供了与服务器进行通信的协议，浏览器可以通过 XMLHttpRequest 对象向服务器发送请求，并使用 JavaScript 处理响应信息，然后在 DOM 中显示数据。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eXMLHttpRequest 对象属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性\u003c/th\u003e\n        \u003cth\u003e嗯\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ctable id=\"Ab\"\u003e\n    \u003ccaption\u003eXMLHttpRequest 对象方法\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e方法\u003c/th\u003e\n        \u003cth\u003e嗯\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e使用 XMLHttpRequest 对象实现异步通信的几个步骤：\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e定义 XMLHttpRequest 实力对象\u003c/li\u003e\n    \u003cli\u003e调用 XMLHttpRequest 对象的 open() 方法打开服务器端的 URL 地址\u003c/li\u003e\n    \u003cli\u003e注册 onreadystatechange 事件处理函数，准备接受响应数据，并处理\u003c/li\u003e\n    \u003cli\u003e调用 XMLHttpRequest 对象的 send() 方法发送请求\u003c/li\u003e\n\u003c/ol\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar xmlHttp; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (window.XMLHttpRequest) { \u003c/span\u003e\u003cspan class=\"p4\"\u003exmlHttp =\n        new XMLHttpRequest(); \u003cspan class=\"r\"\u003e// 兼容现代浏览器\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e} else\n        if (window.ActiveXObject) { \u003cspan class=\"r\"\u003e// 兼容 IE \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003etry { \u003c/span\u003e\u003cspan class=\"p6\"\u003exmlHttp = new ActiveXObject(\"Msxml2.XMLHTTP\"); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} catch (e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan class=\"p8\"\u003exmlHttp = new\n        ActiveXObject(\"Microsoft.XMLHTTP\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} catch (e) {} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eIE 在 5.0 版本就开始以 ActiveX 组件支持定义 XMLHttpRequest 对象，在 7.0 版本中就开始支持标准化的 XMLHttpRequest 对象，允许通过 window\n    对象进行访问。现在所有浏览器都支持 XMLHttpRequest 对象，且提供了相同的的属性和方法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 定义XMLHttpRequest 对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            参数：无\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 返回值：XMLHttpRequest\n            对象实例\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction createXMLHTTPObject() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar XMLHttpFactories = [ \u003cspan class=\"r\"\u003e// 兼容不同浏览器和版本的创建函数数组\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003efunction() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn new XMLHttpRequest() \u003c/span\u003e\u003cspan class=\"p6\"\u003e},\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003efunction() { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ereturn new ActiveXObject(\"Msxml2.XMLHTTP\") \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}, \u003c/span\u003e\u003cspan class=\"p6\"\u003efunction() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn new\n        ActiveXObject(\"Msxml3.XMLHTTP\") \u003c/span\u003e\u003cspan class=\"p6\"\u003e}, \u003c/span\u003e\u003cspan class=\"p6\"\u003efunction() { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ereturn new ActiveXObject(\"Microsoft.XMLHTTP\") \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}, \u003c/span\u003e\u003cspan class=\"p4\"\u003e]; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar xmlhttp = false; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efor (var i = 0; i \u0026lt; XMLHttpFactories.length; i++) { \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e//\n            尝试调用匿名函数，如果成功则返回XMLHttpRequest 对象，否则继续调用下一个\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan class=\"p8\"\u003exmlhttp = XMLHttpFactories[i](); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} catch\n        (e) { \u003c/span\u003e\u003cspan class=\"p8\"\u003econtinue; \u003cspan class=\"r\"\u003e// 如果发生异常，则继续下一个函数调用\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ebreak; \u003cspan class=\"r\"\u003e// 如果成功，则中止循环\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        xmlhttp; \u003cspan class=\"r\"\u003e// 返回对象实例\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上面的函数首先创建一个数组，数组元素为各种创建 XMLHttpRequest 对象的匿名函数。第一个元素是创建一个本地对象，而其它元素将针对 IE 浏览器的不同版本尝试创建 ActiveX 对象。然后设置变量 xmlhttp\n    为 false ，表示不支持 Ajax 。接着遍历工厂内所有函数并尝试执行它们，为了避免发生异常，把所有调用函数放在 try 子句中执行，如果发生错误，则在 catch 子句中捕获异常，并执行 continue\n    命令，返回继续执行，而不是抛出异常。如果创建成功，则中止循环，返回创建的XMLHttpRequest\n    对象实例。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar XHR = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar standard = { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecreateXHR:\n        function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn new XMLHttpRequest(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar newActionXObject = { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecreateXHR: function() { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ereturn new ActionXObject(\"Msxml2.XMLHTTP\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar oldActionXObject = { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ecreateXHR: function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn new ActionXObject(\"Microsoft.XMLHTTP\");\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (standard.createXHR()) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn standard; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan class=\"p8\"\u003enewActionXObject.createXHR();\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn newActionXObject; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} catch (o) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003eoldActionXObject.createXHR(); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ereturn oldActionXObject; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}();\u003c/span\u003e\n\u003c/code\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        [\"onreadystatechange\", \" 指定当 readyState 属性改变时的事件处理句柄\"],\n        [\"readyState\", \" 返回请求的状态\"],\n        [\"status\", \" 返回请求的 HTTP 状态码\"],\n        [\"statusText\", \" 返回当前请求的响应行状态\"],\n        [\"responseBody\", \" 返回正文信息\"],\n        [\"responseStream\", \" 以文本流的形式返回响应信息\"],\n        [\"responseText\", \" 以字符串的形式返回响应信息\"],\n        [\"responseXML\", \" 以 XML 数据形式返回响应信息\"]\n    ];\n    _MiMethod.td(\"Aa\");\n    var Ab = [\n        [\"open()\", \" 创建一个新的 HTTP 请求，并指定此请求的方法、URL 、以及验证信息\"],\n        [\"send\", \" 发送请求到 HTTP 服务器并接收回应\"],\n        [\"getAllResponseHeaders()\", \" 获取响应的全部 HTTP 头信息\"],\n        [\"getResponseHeader()\", \" 从响应信息中获取某个指定的 HTTP 头信息\"],\n        [\"setRequestHeader()\", \" 单独指定某个请求的某个 HTTP 头信息\"],\n        [\"abort()\", \" 取消当前请求\"]\n    ];\n    _MiMethod.td(\"Ab\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ ajax","title":"定义"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","ajax","定义"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
