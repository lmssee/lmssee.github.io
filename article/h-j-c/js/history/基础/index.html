    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eHistory 基础\u003c/h5\u003e\n\u003cp\u003e在 HTML 5 中，新增了如下：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e允许用户在浏览器历史记录中添加项目\u003c/li\u003e\n    \u003cli\u003e在不刷新页面的前提下，允许显示改变浏览器地址栏的 URL 地址\u003c/li\u003e\n    \u003cli\u003e新添了一个当激活的历史记录发生改变时的触发事件，如前进或后退浏览器浏览页面\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eHistory API 处理方式\u003c/h5\u003e\n\u003cp\u003eURL 是 Universal Resource Locator 的首字母缩写，中文表示为统一资源定位符，俗称网页糊 ;于定位浏览器中显示的网页资源。可以在页面上或 Email中显示一个 URL地址链接，也可以将某个\n    u地址标记为一个书签，当用户单击某个 URL地址链接时，浏览器将定位到某个网页资源。\u003c/p\u003e\n\u003cp\u003e在 HTML5之前，使用 JavasScript 实现在浏览器地址栏中切换 URL地址，都会触发一个页面刷新过程，这个过程将耗费大量时间和资源。在很多情况下，这种刷新是没有必要的，导致重复加载。\u003c/p\u003e\n\u003cp\u003eHTML 5 的 History API 允许在不刷新页面的前提下，通过 JavaScript 方式更新页面内容。 History API 执行过程如下。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e通过 Ajax 向服务器端请求页面需要更新的信息\u003c/li\u003e\n    \u003cli\u003e使用 JavaScript加载并显示更新的页面信息\u003c/li\u003e\n    \u003cli\u003e通过 History API在不刷新页面的前提下，更新浏览器地址栏中的 URL 地址\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e在整个处理过程中，页面信息得到更新，浏览器的地址栏也发生了变化，但是页面并没有被删新实际上， History API的诞生，主要任务就是为了解决 Ajax技术与浏览器历史记录之间存在的冲突\u003c/p\u003e\n\u003cp\u003e完善 Ajax 与 History API 融合，需要注意两个问题\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e将 Ajax 请求的地址嵌入到 \u0026lt;a\u0026gt; 标记的 href 属性中\u003c/li\u003e\n    \u003cli\u003e确保在 JavaScript 的 click 事件处理程序中返回 true，这样当用户使用中键单击或命令单击时不会影序被意外覆盖\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e浏览器的兼容和扩展\u003c/h5\u003e\n\u003cp\u003eHistory API最王要的功能是不重新加载页面，之前用户只能通过改变 window.location的值来修改当前页面的 URL，不过这会导致整个页面被重新加载。\u003c/p\u003e\n\u003cp\u003e目前， IE 10+、 Firefox 4+、 Chrome 8+、 Safari 5+、 Opera 11+等主流版本浏览器支持 HTML5 中的 History API。\u003c/p\u003e\n\u003cp\u003e如果只修改 URL 中的 hash，则不会导致页面被刷新。使用传统的 hashbang 方法可以改变页面的 URL，但不刷新页面。 Twitter 网站就使用这种方法，不过这种方法广受诟病，毕竟 hash 在 location\n    中并不被作为一个真正的资源来对待。 2012 年 Twitter 抛弃了 hashbang 方法，推出 pushstate()方法，随后各浏览器支持了这个规范。\u003c/p\u003e\n\u003cp\u003e如果想大范围地使用 History API 技术，可以考虑使用一些专有的工具，如\u003ca href=\"https∶ /github.com/defunkt/jquery-pjax\" target=\"_blank\"\n        rel=\"noopener noreferrer\"\u003epjax（ https∶ /github.com/defunkt/jquery-pjax）\u003c/a\u003e，它是一个 jQuery 插件，使用它可以大大提高用户同时使用\n    Ajax和 pushState（）方法进行开发的速度，不过它只支持那些使用\n    History API 接口的现代浏览器。\u003c/p\u003e\n\u003cp\u003e对于不支持 History API接口的浏览器，可以使用 history.js 进行兼容，它使用旧的 URL hash 的方式来实现同样的功能。下载地址\n    \u003ca href=\" https∶ /github.com/browserstate/history.js/\" target=\"_blank\" rel=\"noopener noreferrer\"\u003ehttps∶\n        /github.com/browserstate/history.js/\u003c/a\u003e。\n\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ history","title":"基础"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","history","基础"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
