                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eNumber 对象\u003c/h5\u003e\n\u003cp\u003eJavaScript 用 Number 对象来表示各种数值类型，包括整数和浮点数。通常，我们不需要操心自己创建 Number 对象，因为 JavaScript 会将数值转换为 Number 类的一个实例。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eNumber.isNaN() \u003c/li\u003e\n    \u003cli\u003eNumber.parseFloat( ) 函数用于解析字符串并返回一个浮点数\u003c/li\u003e\n    \u003cli\u003eNumber. parseInt() 函数的功能与 Number. parseFloat() 相类似，但其返回的值是整数或 NaN 。该函数还可以有第 2\n        个可选参数，用于指定数值的基，从而返回二进制、八进制或其它进制的数值所对应的十进制数值\u003c/li\u003e\n    \u003cli\u003e 超过 JavaScript 能够表示的最大数值，就是无穷大（ Infinity ）。在大多数 JavaScript 版本中，最大的数值是正或负的 253 ，虽然它并不是真正的无穷大，但也相当大了\u003c/li\u003e\n    \u003cli\u003eisFinite() 函数可以判断一个数值是否无穷大。它会把参数转换为数值，如果得到的结果是 NaN 、正无穷大（ Infinity ）或负无穷大（ -Infinity ），函数返回 false （假），其它情况返回\n        true （真）\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eNumber 对象的属性\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003eMAX_VALUE 该属性用于返回 Number 对象的最大可能值\u003c/li\u003e\n    \u003cli\u003eMIN_VALUE 该属性用于返回 Number 对象的最小可能值\u003c/li\u003e\n    \u003cli\u003eNEGATIVE_INFINITY 该属性用于返回 Number 对象的负无穷大的值\u003c/li\u003e\n    \u003cli\u003ePOSITIVE_INFINITY 该属性用于返回 Number 对象的正无穷大的值\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eNumber 对象的方法\u003c/h5\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eNumber 对象的方法\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e 嗯\u003c/th\u003e\n        \u003cth\u003e 说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003eNumber() 函数\u003c/h5\u003e\n\u003cp\u003e 在给 Number() 传递某个值作为一个参数时，该函数将尽全力返回一个对等的数值。如果它不能返回数值，将返回 NaN 。\u003c/p\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['isInteger()', '  判断是否是整数 '],\n        ['toString', '  该方法可以把 Number  对象转换成一个字符串，并返回结果 '],\n        ['toLocaleString', '  该方法可以把 Number  对象转换为本地格式的字符串 ,  返回值为数字的字符串表示，根据本地的规范进行格式化，可能影响到小数点或千分位分隔符采用的标点符号 '],\n        ['toFixed', '  该方法将 Number  对象四舍五入为指定小数位数的数字，然后转换成字符串 .num  ：必选项。规定小数的位数，是 0  ～ 20  之间的值（包括 0  和 20  ），有些实现可以支持更大的数值范围。如果省略该参数，用 0  代替 '],\n        ['toExponential', '  该方法利用指数计数法计算 Number  对象的值，然后将其转换成字符串 .num  ：必选项。规定指数计数法中的小数位数，是 0  ～ 20  之间的值（包括 0  和 20  ），有些实现可以支持更大的数值范围。如果省略该参数，将使用尽可能多的数字。    返回值：数字的字符串表示，采用指数计数法，即小数点之前有一位数字，小数点之后有 num  位数字，该数字的小数部分将被舍入，必要时用 0  补足，以便它达到指定的长度 '],\n        ['toPrecision', '  该方法将 Number  对象转换成字符串，并根据不同的情况选择定点计数法或指数计数法 num  ：必选项。规定指数计数法中的小数位数，是 0  ～ 20  之间的值（包括 0  和 20  ），有些实现可以支持更大的数值范围。如果省略该参数，将使用尽可能多的数字。    返回值：数字的字符串表示，包含 num  个有效数字。如果 num  足够大，能够包括整数部分的所有数字，那么返回的字符串将采用定点计数法。否则，采用指数计数法，即小数点前有一位数字，小数点后有 num-1  位数字。必要时，该数字会被舍入或用 0  补足。'],\n    ];\n    _MiMethod.td(\"Aa\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 数值","title":"对象"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","数值","对象"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
