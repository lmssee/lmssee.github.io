    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 浮点数\u003c/h5\u003e\n\u003cp\u003e 与整数不同的是，浮点数虽然有小数部分，但小数部分可以为 0 。浮点数的表示形式可以是传统方式的，比如 3.14159 ；也可以是指数形式的，比如 35.4e5 。\u003c/p\u003e\n\u003cp\u003e 因为存储浮点值使用的内存空间是存储整数值的两倍，所以 ECMAScript 总是想方设法把值转换为 整数。在小数点后面没有数字的情况下，数值就会变成整数。类似地，如果数值本身就是整数，只是小 数点后面跟着 0 （如 1.0\n    ），那它也会被转换为整数。\u003c/p\u003e\n\u003cp\u003e 对于非常大或非常小的数值，浮点值可以用科学记数法来表示。科学记数法用于表示一个应该乘以 10 的给定次幂的数值。 ECMAScript 中科学记数法的格式要求是一个数值（整数或浮点数）后跟一个大 写或小写的字母 e\n    ，再加上一个要乘的 10 的多少次幂。\u003c/p\u003e\n\u003cp\u003e 浮点值的精确度最高可达 17 位小数，但在算术计算中远不如整数精确。例如， 0.1 加 0.2 得到的不 是 0.3 ，而是 0.300 000 000 000 000 04 。\u003c/p\u003e\n\u003cp\u003e 使用 JavaScript 进行数值计算时，要防止浮点数溢出。例如：二进制的浮点数不能正确的处理十进制的小数，因此 0.1 + 0.2 不等于 0.3 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\n        \u003cscript\u003e\n            document.write('0.1 + 0.2 = ' + (0.1 + 0.2));\n        \u003c/script\u003e\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这是 JavaScript 中最常见的 Bug ，并且这是遵循二进制浮点计算标准的（ IEEE 754 ）而导致的结果。这个标准适合很多地方，但违背了数值基本常识。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 数值","title":"浮点数"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","数值","浮点数"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
