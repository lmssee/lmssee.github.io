                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003eECMAScript 可以表示的最小 数值保存在 Number.MIN_VALUE 中，这个值在多数浏览器中是 5e  324 ；可以表示的最大数值保存在 Number.MAX_VALUE 中，这个值在多数浏览器中是\n    1.797 693 134 862 315 7e+308 。如果某个计算得到的 数值结果超出了 JavaScript 可以表示的范围，那么这个数值会被自动转换为一个特殊的 Infinity （无 穷）值。任何无法表示的负数以\n    -Infinity （负无穷大）表示，任何无法表示的正数以\n    Infinity （正 无穷大）表示。\n\u003c/p\u003e\n\u003ch5\u003e 特殊数值\u003c/h5\u003e\n\u003ctable\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eInfinity \u003c/td\u003e\n        \u003ctd\u003e 无穷大\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eNaN \u003c/td\u003e\n        \u003ctd\u003e 非数值\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eNumber.MAX_VALUE \u003c/td\u003e\n        \u003ctd\u003e 表示最大数值\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eNumber.MIN_VALUE \u003c/td\u003e\n        \u003ctd\u003e 表示最小数值 , 一个接近 0 的数\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eNumber.NaN \u003c/td\u003e\n        \u003ctd\u003e 非数值 , 与 NaN 相同\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eNumber.POSITIVE_INFINITY \u003c/td\u003e\n        \u003ctd\u003e 表示正无穷大\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eNumber.NEGATIVE_INFINITY \u003c/td\u003e\n        \u003ctd\u003e 表示负无穷大\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003eNaN (Not a Number) 是在 IEEE754 中定义的一个特殊的数值。它不表示一个数。尽管。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003etypeof NaN === 'Number' \u003cspan class=\"r\"\u003e//true\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在试图将非数字形式的字符串转化为数字时都会产生 NaN ，例如。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e+ '0' \u003cspan class=\"r\"\u003e//0\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e+ 'oops' \u003cspan class=\"r\"\u003e//NaN\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eNaN 不等于它自己。\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eNaN !== NaN \u003cspan class=\"r\"\u003e//true\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 自定义一个检测数字函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar isNumber = function isNumber(value){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ereturn typeof value === 'number' \u0026\u0026 isFinite(value)\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 数值","title":"特殊值"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","数值","特殊值"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
