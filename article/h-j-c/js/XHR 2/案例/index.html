{\u003c/span\u003e\u003cspan class=\"p4\"\u003eyzm1.innerHTML=\"\u0026lt;font color=green\u0026gt;\n        输入正确 \u0026lt;/font\u0026gt;\"\u003c/span\u003e\u003cspan class=\"p2\"\u003e}}\u003c/span\u003e\u003cspan class=\"p\"\u003efunction yzm(form){\u003cspan class=\"r\"\u003e//\n            生成验证码 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar num1=Math.round(Math.random()*10000000);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar num=num1.toString().substr(0,4);\u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(\"\u0026lt;img\n        name=codeimg src='yzm.php?num=\"+num+\"'\u0026gt;\");\u003c/span\u003e\u003cspan class=\"p2\"\u003eform.yzm2.value=num;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003efunction code(form){\u003cspan class=\"r\"\u003e// 重置验证码 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003evar num1=Math.round(Math.random()*10000000);\u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        num=num1.toString().substr(0,4);\u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.codeimg.src=\"yzm.php?num=\"+num;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eform.yzm2.value=num;\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在 reg_chk.php 文件中，对 POST 方法提交的用户名和密码进行验证，并输出验证结果。其代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;?php \u003c/span\u003e\u003cspan class=\"p2\"\u003esession_start();\u003cspan class=\"r\"\u003e// 初始化 session\n            变量 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eheader('Content-type:text/html;charset=gb2312'); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e$sql=\"select*from tb_user where name='\".$_POST['user'].\"'and password='\".md5 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e($_POST['pass']).\"'\"\u003cspan class=\"r\"\u003e// 定义 SQL 语句 \u003c/span\u003e\u003c/span\u003e\u003cspan\n
