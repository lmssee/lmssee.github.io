="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>跨域</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e 当在 Web 浏览器中请求一个网页，而网页中又使用 XMLHttpRequest 发送请求时，只能请求位于同一超域中任意服务器上的资源，这就是 \" 超域匹配 \" 规则，它可以避免网页中的 XMLHttpRequest\n    从其它人的服务器上下载信息。此限制是出于安全性的考虑。 \u003c/p\u003e\n\u003cp\u003e 例如，下面的代码位于网页 http://localhost/myPage.html 内，而请求的 XMLHttpRequest 网址却是 http://myhost/employees.xml ，不在同一个超域内： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar oXMLHttpRequest = new XMLHttpRequest(); \u003c/span\u003e\u003cspan class=\"p2\"\u003etry {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eoXMLHttpRequest.open( \"GET \", \" \u0026lt; a href =\n        \"http://myhost/employees.xml\"\" \u003c/span\u003e\u003cspan class=\"p6\"\u003erel = \"nofollow\" \u0026gt; http:\n        //myhost/employees.xml\"\u0026lt;/a\u0026gt;;, \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etrue); \u003c/span\u003e\u003cspan class=\"p4\"\u003eoXMLHttpRequest.send(null); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} catch\n        (err) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(err.message ? err.message : err.toString()); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 使用代理实现跨域请求 \u003c/h5\u003e\n\u003cp\u003e 在某些特殊的情况下，用户恰恰需要实现跨域请求，这可以通过在服务器端创建一个代理来实现，而代理一般使用服务端动态脚本来实现，如下所示： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eproxy.asp \u0026lt;%@ LANGUAGE=VBScript%\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;% \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eResponse.Buffer=True \u003c/span\u003e\u003cspan class=\"p2\"\u003eDim oConn, strURL \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 指定 URL\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003estrURL = \"\u0026lt;a href=\\\"http://myhost/employees.xml\"\\\"\n        rel=\\\"nofollow\\\"\u0026gt;http://myhost/employees.xml\"\u0026lt;/a\u0026gt;\"; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eSet oConn = Server.CreateObject(\"Microsoft.XMLHTTP\") \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 连接到 URL\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eoConn.Open \"GET\", strURL, False \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 发送请求 \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eoConn.Send \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eresultData = oConn.responseText \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 设置内容类型 \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eResponse.ContentType = _ \u003c/span\u003e\u003cspan class=\"p2\"\u003eoConn.getResponseHeader(\"Content-Type\")\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eResponse.Write (resultData) \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eSet oConn = Nothing \u003c/span\u003e\u003cspan class=\"p2\"\u003eResponse.End \u003c/span\u003e\u003cspan class=\"p2\"\u003e%\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 将 proxy.asp 放置到本域服务器，然后直接请求 proxy.asp ，让它作为代理调用另一个域内的资源，并将资源返回即可： \u003c/p\u003e\n\u003ch5\u003e 使用 XDomainRequest\u003c/h5\u003e\n\u003cp\u003e 使用 XDomainRequest 的方法和属性来向服务器发送请求和从服务器获取响应，类似于 XMLHttpRequest 。但是， XDomainRequest 可以实现跨域访问，该类是 IE 独有的。 \u003c/p\u003e\n\u003cp\u003eXDomainRequest 的方法和属性与 XMLHttpRequest 基本相同，仅仅新增了 3 个事件属性，而不需要再检测响应状态。现在，一个完整的 AJAX 程序就如下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction onError() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.status =\n        \" 出错！ \"; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction onLoad() { \u003c/span\u003e\u003cspan class=\"p4\"\u003e//\n        处理返回的结果 \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.write( \" 数据 == \u0026lt; xmp \u0026gt;\"+ \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eoXDomainRequest.responseText + \" \u0026lt; /xmp\u0026gt; \"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efunction onProgress() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewindow.status = \" 正在加载， 请稍等！ \"; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efunction onTimeout() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewindow.status = \" 超时！ \"; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar oXDomainRequest = new XDomainRequest(); \u003c/span\u003e\u003cspan class=\"p4\"\u003eoXDomainRequest.onerror\n        = onError; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eoXDomainRequest.onload = onLoad; \u003c/span\u003e\u003cspan class=\"p4\"\u003eoXDomainRequest.onprogress =\n        onProgress; \u003c/span\u003e\u003cspan class=\"p4\"\u003eoXDomainRequest.ontimeout = onTimeout; \u003c/span\u003e\u003cspan class=\"p4\"\u003etry {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eoXDomainRequest.open( \"GET \", \" \u0026lt; a href = \"http://127.0.0.1/employees.xml\"\" \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003erel = \"nofollow\" \u0026gt; http: //127.0.0.1/employees.xml\"\u0026lt;/a\u0026gt;;); \u003c/span\u003e\u003cspan class=\"p8\"\u003e//\n        设置请求超时时间，这里设一个较低值用于测试 \u003c/span\u003e\u003cspan class=\"p8\"\u003eoXDomainRequest.timeout = 1; oXDomainRequest.send(null);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ecatch (err) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ealert(err.message ? err.message : err.toString()); \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eXDomainRequest 实例可以通过 window 对象的 XDomainRequest 属性获得，也可以使用 new 关键字实例化一个 XDomainRequest 对象： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar oXDomainRequest = window.XDomainRequest;\u003c/span\u003e\u003cspan class=\"p\"\u003evar\n        oXDomainRequest = new XDomainRequest();\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eXDomainRequest 跨域访问控制 \u003c/h5\u003e\n\u003cp\u003eXDomainRequest 使用 W3C 跨域访问控制的规范来实现跨域访问的权限。它将会发送名为 Origin 的 HTTP 报头，而服务器必须返回 Access-Control-Allow-Origin 的 HTTP\n    报头，目前仅能设置值为 \"* \" ，这样， IE8 才能允许解析返回的值，同时这也表明服务器允许跨域访问。 \u003c/p\u003e\n\u003cp\u003e 不过根据 W3C 跨域访问控制的规范，也可以指定允许访问的域，相信未来 IE8 会增加这一功能。用户可以通过网址 http://www.w3.org/TR/access-control/\n    了解跨域访问控制规范。有多种方式可以定义 Access-Control-Allow-Origin 报头，下面进行简单介绍。 \u003c/p\u003e\n\u003ch6\u003e 通过 Web 服务器设置 \u003c/h6\u003e\n\u003cp\u003e 如果要将整个站点设置为可以跨域访问，那么为该站点添加一个自定义报头。 \u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e 打开 \"Internet 信息服务 \" 管理控制台，选择 \" 默认网站 \" 选项，在右键快捷菜单中选择 \" 属性 \" 命令，就会弹出 \" 网站属性 \" 对话框，选择 \"HTTP 头 \" 选项卡 \u003c/li\u003e\n    \u003cli\u003e 单击 \" 添加 \" 按钮就可以打开 \" 添加 / 编辑自定义 HTTP 头 \" 对话框，分别输入 Access-Control-Allow-Origin 和 *\u003c/li\u003e\n    \u003cli\u003e 单击 \" 确定 \" 按钮关闭对话框，可以看到新增的 HTTP 响应报头 \u003c/li\u003e\n\u003c/ol\u003e\n\u003ch6\u003e 通过动态脚本语言定义 \u003c/h6\u003e\n\u003cp\u003e 一些动态脚本语言（如 ASP 、 ASP.NET 、 JSP 、 PHP 等）都可以动态创建 HTTP 响应报头，下面的分别是它们创建默认内容类型的代码。 \u003c/p\u003e\n\u003cp\u003eASP 代码。 \u003c/p\u003e\n\u003cp\u003e\u0026lt;% 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eResponse.Addheader \"Access-Control-Allow-Origin \", \"* \"\u003c/span\u003e\u003cspan class=\"p\"\u003e%\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eJSP 代码。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;%\u003c/span\u003e\u003cspan class=\"p2\"\u003eresponse.addHeader( \"Access-Control-Allow-Origin \", \"*\n        \");\u003c/span\u003e\u003cspan class=\"p\"\u003e%\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003ePHP 代码。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;?php\u003c/span\u003e\u003cspan class=\"p2\"\u003eheader( \"Access-Control-Allow-Origin: *\n        \");\u003c/span\u003e\u003cspan class=\"p\"\u003e?\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eASP.NET 代码（ C# 和 VB 适用， C# 注意以分号结尾）。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;%\u003c/span\u003e\u003cspan class=\"p2\"\u003eresponse.AppendHeader( \"Access-Control-Allow-Origin \",\n        \"* \")\u003c/span\u003e\u003cspan class=\"p\"\u003e%\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eFirefox 3.1 及更新版本也可以使用 XMLHttpRequest 来发送 Origin 报头，只要服务器返回 Access-Control-Allow-Origin 报头，那么也可以实现跨域访问。 \u003c/p\u003e\n\u003ch5\u003eJSONP\u003c/h5\u003e\n\u003cp\u003e古老的跨域解决方案。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ XHR 2","title":"跨域"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","XHR 2","跨域"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
