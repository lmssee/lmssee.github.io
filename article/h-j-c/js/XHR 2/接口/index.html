class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>接口</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003eXMLHttpRequest 是 AJAX 中最核心的技术。它是一个具有应用程序接口的 JavaScript 对象，能够使用超文本传输协议（ HTTP ）连接一个服务器，是微软公司为了满足开发者的需要，于 1999 年在 IE\n    5.0\n    浏览器中率先推出的。现在许多浏览器都对其提供了支持，不过实现方式与 IE 有所不同。使用 XMLHttpRequest 对象， AJAX\n    可以像桌面应用程序一样只与服务器进行数据层面的交换，而不用每次都刷新页面，也不用每次都将数据处理的工作交给服务器来做，这样既减轻了服务器负担，又加快了响应速度、缩短了用户等待的时间。 \u003c/p\u003e\n\u003ch5\u003e 初始化 XMLHttpRequest 对象 \u003c/h5\u003e\n\u003cp\u003e 在使用 XMLHttpRequest 对象发送请求和处理响应之前，首先需要初始化该对象。由于 XMLHttpRequest 不是一个 W3C\n    标准，所以对于不同的浏览器，初始化的方法也是不同的。通常情况下，初始化 XMLHttpRequest 对象只需要考虑两种情况，一种是 IE 浏览器，另一种是非 IE 浏览器。下面分别进行介绍。 \u003c/p\u003e\n\u003ch6\u003eIE 浏览器 \u003c/h6\u003e\n\u003cp\u003eIE 浏览器把 XMLHttpRequest 实例化为一个 ActiveX 对象，具体方法如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar http_request=new ActiveXObject(\"Msxml2.XMLHTTP\");\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 或者。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar http_request=new ActiveXObject(\"Microsoft.XMLHTTP\");\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 在上面的语法中， Msxml2.XMLHTTP 和 Microsoft.XMLHTTP 是针对 IE 浏览器的不同版本而进行设置的，目前比较常用的是这两种。 \u003c/p\u003e\n\u003ch6\u003e2. 非 IE 浏览器 \u003c/h6\u003e\n\u003cp\u003e 非 IE 浏览器（如 Firefox 、 Opera 、 Mozilla 、 Safari ）把 XMLHttpRequest 对象实例化为一个本地 JavaScript 对象。具体方法如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar http_request=new XMLHttpRequest();\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 为了提高程序的兼容性，可以创建一个跨浏览器的 XMLHttpRequest 对象。创建一个跨浏览器的 XMLHttpRequest 对象其实很简单，只需要判断一下不同浏览器的实现方式，如果浏览器提供了\n    XMLHttpRequest\n    类，则直接创建一个该类的实例，否则实例化一个 ActiveX 对象。具体代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eif(window.XMLHttpRequest){// 非 IE 浏览器 \u003c/span\u003e\u003cspan class=\"p2\"\u003ehttp_request=new\n        XMLHttpRequest();\u003c/span\u003e\u003cspan class=\"p\"\u003e}else if(window.ActiveXObject){//IE 浏览器 \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003etry{\u003c/span\u003e\u003cspan class=\"p6\"\u003ehttp_request=new ActiveXObject(\"Msxml2.XMLHTTP\");\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}catch(e){\u003c/span\u003e\u003cspan class=\"p6\"\u003etry{\u003c/span\u003e\u003cspan class=\"p8\"\u003ehttp_request=new\n        ActiveXObject(\"Microsoft.XMLHTTP\");\u003c/span\u003e\u003cspan class=\"p6\"\u003e}catch(e){}\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在上面的代码中，调用 window.ActiveXObject 将返回一个对象，或是 null ，在 if 语句中，会把返回值看作 true 或 false （如果返回的是一个对象，则为 true ，否则返回 null\n    ，则为\n    false\n    ）。 \u003c/p\u003e\n\u003cp\u003e 说明　由于 JavaScript 具有动态类型特性，而且 XMLHttpRequest 对象在不同浏览器上的实例是兼容的，所以可以用同样的方式访问 XMLHttpRequest\n    实例的属性的方法，不需要考虑创建该实例的方法是什么。\n\u003c/p\u003e\n\u003ch5\u003eXMLHttpRequest 对象的常用属性 \u003c/h5\u003e\n\u003cp\u003eXMLHttpRequest 对象提供了一些常用属性。通过这些属性，可以获取服务器的响应状态及响应内容等。下面将对 XMLHttpRequest 对象的常用属性进行介绍。 \u003c/p\u003e\n\u003ch6\u003e 指定状态改变时所触发的事件处理器的属性 \u003c/h6\u003e\n\u003cp\u003eXMLHttpRequest 对象提供了用于指定状态改变时所触发的事件处理器的属性 onreadystatechange 。在 AJAX 中，每个状态改变时都会触发这个事件处理器，通常会调用一个 JavaScript 函数。\n\u003c/p\u003e\n\u003cp\u003e 通过下面的代码可以实现当指定状态改变时所要触发的 JavaScript 函数，这里为 getResult 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ehttp_request.onreadystatechange=getResult;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 注意　在指定所触发的事件处理器时，所调用的 JavaScript 函数不能添加小括号及指定参数名。不过这里可以使用匿名函数。例如，要调用带参数的函数 getResult ，可以使用下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ehttp_request.onreadystatechange=function(){\u003c/span\u003e\u003cspan class=\"p2\"\u003egetResult(\"$1\n        加的参数 \");\u003cspan class=\"r\"\u003e// 调用带参数的函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e};\u003cspan class=\"r\"\u003e//\n            通过匿名函数指定要带参数的函数 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 获取请求状态的属性 \u003c/h6\u003e\n\u003cp\u003eXMLHttpRequest 对象提供了用于获取请求状态的属性 readyState 。 \u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003ereadyState 属性的属性值 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 值 \u003c/th\u003e\n        \u003cth\u003e 额 \u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e0\u003c/td\u003e\n        \u003ctd\u003e 未初始化 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e1\u003c/td\u003e\n        \u003ctd\u003e 正在加载 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e2\u003c/td\u003e\n        \u003ctd\u003e 已加载 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e3\u003c/td\u003e\n        \u003ctd\u003e 交互中 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e4\u003c/td\u003e\n        \u003ctd\u003e 完成 \u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e 在实际应用中，该属性经常用于判断请求状态，当请求状态等于 4 ，也就是为完成时，再判断请求是否成功，如果成功，将开始处理返回结果。 \u003c/p\u003e\n\u003ch5\u003e 获取服务器的字符串响应的属性 \u003c/h5\u003e\n\u003cp\u003eXMLHttpRequest 对象提供了用于获取服务器响应的属性 responseText ，表示为字符串。例如，获取服务器返回的字符串响应，并赋值给变量 h 可以使用下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar h=http_request.responseText;\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e 获取服务器的 XML 响应的属性 \u003c/h5\u003e\n\u003cp\u003eXMLHttpRequest 对象提供了用于获取服务器响应的属性 responseXML ，表示为 XML 。这个对象可以解析为一个 DOM 对象。例如，获取服务器返回的 XML 响应，并赋值给变量 xmldoc\n    可以使用下面的代码：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar xmldoc=http_request.responseXML;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 在上面的代码中， http_request 为 XMLHttpRequest 对象。 \u003c/p\u003e\n\u003ch5\u003e 返回服务器的 HTTP 状态码的属性 \u003c/h5\u003e\n\u003cp\u003eXMLHttpRequest 对象提供了用于返回服务器的 HTTP 状态码的属性 status 。该属性的语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ehttp_request.status\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003ehttp_request ： XMLHttpRequest 对象。 \u003c/p\u003e\n\u003cp\u003e 返回值：长整型的数值，代表服务器的 HTTP 状态码。 \u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003estatus 属性的状态码 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 值 \u003c/th\u003e\n        \u003cth\u003e 额 \u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e100\u003c/td\u003e\n        \u003ctd\u003e 继续发送请求 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e200\u003c/td\u003e\n        \u003ctd\u003e 请求已成功 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e202\u003c/td\u003e\n        \u003ctd\u003e 请求被接受，到尚未成功 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e400\u003c/td\u003e\n        \u003ctd\u003e 错误的请求 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e404\u003c/td\u003e\n        \u003ctd\u003e 请求未找到 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e408\u003c/td\u003e\n        \u003ctd\u003e 请求超时 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e500\u003c/td\u003e\n        \u003ctd\u003e 内部服务器错误 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e501\u003c/td\u003e\n        \u003ctd\u003e 服务器不支持当前请求的某一个功能 \u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003estatus 属性只能在 send 方法返回成功时才有效。 \u003c/p\u003e\n\u003cp\u003estatus 属性常用于当请求状态为完成时，判断当前的服务器状态是否成功。例如，当请求完成时，判断请求是否成功的代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eif(http_request.readyState==4){\u003cspan class=\"r\"\u003e// 当请求状态为完成时 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eif(http_request.status==200){\u003cspan class=\"r\"\u003e// 请求成功，开始处理返回结果 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ealert(\"$1 求成功！ \");\u003c/span\u003e\u003cspan class=\"p2\"\u003e}else{\u003cspan class=\"r\"\u003e// 请求未成功 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ealert(\"$1 求未成功！ \");\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eXMLHttpRequest 对象的常用方法 \u003c/h5\u003e\n\u003cp\u003eXMLHttpRequest 对象提供了一些常用的方法，通过这些方法可以对请求进行操作。 \u003c/p\u003e\n\u003ch6\u003e 创建新请求的方法 \u003c/h6\u003e\n\u003cp\u003eopen 方法用于设置进行异步请求目标的 URL 、请求方法以及其它参数信息。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eopen(\"method\",\"URL\"[,asyncFlag[,\"userName\"[,\"password\"]]])\u003c/span\u003e\u003c/code\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eopen 方法的参数说明 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e 参数名称 \u003c/th\u003e\n        \u003cth\u003e 额 \u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003emethod\u003c/td\u003e\n        \u003ctd\u003e 请求的类型，有 GET/POST\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eURL\u003c/td\u003e\n        \u003ctd\u003e 请求的地址，可传递查询字符串 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003easyncFlag\u003c/td\u003e\n        \u003ctd\u003e 可选参数，请求方式，异步请求为 true, 同步请求为 false, ，默认为 true\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003euserName\u003c/td\u003e\n        \u003ctd\u003e 可选参数，用于指定用户名，没有时可省略 \u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003epassWord\u003c/td\u003e\n        \u003ctd\u003e 可选参数，用于请求的密码，没有时可省略 \u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e 设置异步请求目标为 deal.jsp ，请求方法为 GET ，请求方式为异步的代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ehttp_request.open(\"GET\",\"deal.jsp\",true);\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e 向服务器发送请求的方法 \u003c/h6\u003e\n\u003cp\u003esend 方法用于向服务器发送请求。如果请求声明为异步，该方法将立即返回，否则将等到接收到响应为止。 send 方法的语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003esend(content)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 参数 content 用于指定发送的数据，可以是 DOM 对象的实例、输入流或字符串。如果没有参数需要传递，可以设置为 null 。 \u003c/p\u003e\n\u003cp\u003e 例如，向服务器发送一个不包含任何参数的请求，可以使用下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ehttp_request.send(null);\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e 设置请求的 HTTP 头的方法 \u003c/h6\u003e\n\u003cp\u003esetRequestHeader 方法用于为请求的 HTTP 头设置值。 setRequestHeader 方法的具体语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003esetRequestHeader(\"header\",\"value\")\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eheader ：用于指定 HTTP 头。 \u003c/p\u003e\n\u003cp\u003evalue ：用于为指定的 HTTP 头设置值。 \u003c/p\u003e\n\u003cp\u003e 说明　 setRequestHeader 方法必须在调用 open 方法之后才能调用。 \u003c/p\u003e\n\u003cp\u003e 例如，在发送 POST 请求时，需要设置 Content-Type 请求头的值为 \"application/x-www-form-urlencoded\" ，这时就可以通过 setRequestHeader\n    方法进行设置，具体代码如下：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ehttp_request.setRequestHeader(\"Content-Type\",\"application/x-www-form-urlencoded\");\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 停止或放弃当前异步请求的方法 \u003c/h6\u003e\n\u003cp\u003eabort 方法用于停止或放弃当前异步请求。其语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eabort()\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 例如，要停止当前异步请求可以使用下面的语句： \u003c/p\u003e\n\u003ch6\u003ehttp_request.abort()\u003c/h6\u003e\n\u003cp\u003e 返回 HTTP 头信息的方法。 \u003c/p\u003e\n\u003cp\u003eXMLHttpRequest 对象提供了两种返回 HTTP 头信息的方法，分别是 getResponseHeader 和 getAllResponseHeaders 方法。下面分别进行介绍。 \u003c/p\u003e\n\u003ch6\u003egetResponseHeader 方法 \u003c/h6\u003e\n\u003cp\u003egetResponseHeader 方法用于以字符串形式返回指定的 HTTP 头信息。其语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003egetResponseHeader(\"headerLabel\")\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 参数 headerLabel 用于指定 HTTP 头，包括 Server 、 Content-Type 和 Date 等。 \u003c/p\u003e\n\u003cp\u003e 例如，要获取 HTTP 头 Content-Type 的值，可以使用以下代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ehttp_request.getResponseHeader(\"Content-Type\")\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 上面的代码将获取到以下内容： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etext/html;charset=GBK\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003egetAllResponseHeaders 方法 \u003c/h6\u003e\n\u003cp\u003egetAllResponseHeaders 方法用于以字符串形式返回完整的 HTTP 头信息，其中包括 Server 、 Date 、 Content-Type 和 Content-Length\n    。 getAllResponseHeaders 方法的语法格式如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003egetAllResponseHeaders()\u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ealert(http_request.getAllResponseHeaders());\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eXMLHttpRequest 对象和 XMLHTTP 组件很相似，有很多相似的方法和属性，所以后来人们干脆将 XMLHttpRequest 对象和 XMLHTTP 组件统称为 XMLHttpRequest ，或简称为 XHR\n    。 \u003c/p\u003e\n\u003cp\u003eXMLHttpRequest 对象的主要功用是使用 XML 格式数据发送异步调用请求，它模拟了标准的 HTTP 请求，但是却使用 XML 格式将请求数据发送给服务器。 \u003c/p\u003e\n\u003ch5\u003e 一个标准的 AJAX 应用所应具备的步骤 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"utf-8\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;title\u0026gt;JavaScript Sample\u0026lt;/title\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 处理返回的结果 function \u003c/span\u003e\u003cspan class=\"p4\"\u003egetResult() {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003ealert(oXMLHttpRequest.status); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eif (oXMLHttpRequest.status == 200) { \u003c/span\u003e\u003cspan class=\"p10\"\u003etry { \u003c/span\u003e\u003cspan\n        class=\"p12\"\u003edocument.write(\" 数据 == \u0026lt; xmp \u0026gt; \" + \u003c/span\u003e\u003cspan class=\"p14\"\u003eoXMLHttpRequest.responseText +\n        \" \u0026lt; /xmp\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003e} catch (err) { \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003ealert(err.message); \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e} else if\n        (oXMLHttpRequest.status == 404) { \u003c/span\u003e\u003cspan class=\"p10\"\u003edocument.write(\" 没有发现请求的文档！ \"); \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e} else if (oXMLHttpRequest.status == 500) { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003edocument.write(\" 服务器内部错误！ \"); \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e// 响应状态变化 \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction theReadyStateChange() { \u003c/span\u003e\u003cspan class=\"p6\"\u003e//\n        根据 HTTP 请求的状态码确定当前请求处于什么状态 \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (oXMLHttpRequest.readyState == 0) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e// 对象尚未初始化，这是最初的状态，这时 open 方法尚未被调用 \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 可以编写一段业务逻辑处理这个状态 \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e} else if (oXMLHttpRequest.readyState == 1) { \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 对象已创建，这时还未调用 send\n        方法 \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e// 可以给用户一段提示信息，例如正在加载、请稍等等 \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} else if (oXMLHttpRequest.readyState == 2) { \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 已经调用 send\n        方法，但响应主体还未到达 \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else if (oXMLHttpRequest.readyState == 3) { \u003c/span\u003e\u003cspan class=\"p8\"\u003e//\n        与服务器交互过程中，部分数据已经到达，但还不可以访问 \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} else if (oXMLHttpRequest.readyState == 4) { \u003c/span\u003e\u003cspan class=\"p8\"\u003e//\n        全部数据已经到达，数据和报头都可以访问了 \u003c/span\u003e\u003cspan class=\"p8\"\u003egetResult(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e//alert(oXMLHttpRequest.readyState); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 首先创建一个 XMLHttpRequest 对象 \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        oXMLHttpRequest\n        = new XMLHttpRequest(); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// 接着设置一个函数响应状态变化，这是一个回调函数 \u003c/span\u003e\u003cspan class=\"p4\"\u003eoXMLHttpRequest.onreadystatechange =\n        theReadyStateChange; \u003c/span\u003e \u003cspan class=\"p4\"\u003e// 打开连接，发送数据，并在这个过程中捕捉错误 \u003c/span\u003e\u003cspan class=\"p4\"\u003etry { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eoXMLHttpRequest.open(\"GET\", \" \u0026lt; a href = \" \u003c/span\u003e\u003cspan class=\"p10\"\u003ehttp:\n        \\/\\/localhost/employees.xml \u0026amp; #8221\" \u003c/span\u003e\u003cspan class=\"p8\"\u003erel = \"nofollow\" \u0026gt; http:\n        \\/\\/localhost/employees.xml \"\u0026lt;/a\u0026gt;;, \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003etrue); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eoXMLHttpRequest.send(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} catch (err) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ealert(err.message); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 下面是 XMLHttpRequest 发送的 HTTP 请求和服务器的响应报头。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003eGET /employees.xml HTTP/1.1 \u003c/span\u003e\u003cspan class=\"p6\"\u003eAccept:\n        */* \u003c/span\u003e\u003cspan class=\"p6\"\u003eReferer: \u0026lt;a href=\"http://localhost/go.html\"\n        rel=\"nofollow\"\u0026gt;http://localhost/go.html\u0026lt;/a\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eAccept-Encoding: gzip, deflate \u003c/span\u003e\u003cspan class=\"p6\"\u003eUser-Agent: Mozilla/4.0 (compatible;\n        MSIE 6.0; Windows NT 5.1; SV1) \u003c/span\u003e\u003cspan class=\"p6\"\u003eHost: localhost \u003c/span\u003e\u003cspan class=\"p6\"\u003eConnection:\n        Keep-Alive \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eHTTP/1.1 200 OK \u003c/span\u003e\u003cspan class=\"p6\"\u003eServer: Microsoft-IIS/5.1 \u003c/span\u003e\u003cspan class=\"p6\"\u003eDate:\n        Sat, 27 Oct 2007 10:16:41 GMT \u003c/span\u003e\u003cspan class=\"p6\"\u003eContent-Type: text/xml \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eAccept-Ranges: bytes \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eLast-Modified: Sun, 15 Apr 2007 16:56:29 GMT \u003c/span\u003e\u003cspan class=\"p6\"\u003eETag: \"80582c37f7fc71:aad\n        \"\u003c/span\u003e\u003cspan class=\"p6\"\u003eContent-Length: 537\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eXMLHttpRequest 发送的是标准的 HTTP 请求，使用其方法和属性也可以对返回的 HTTP 响应做出合适的处理。 \u003c/p\u003e\n\u003ch5\u003eXMLHttpRequest 的方法和属性 \u003c/h5\u003e\n\u003cp\u003eXMLHttpRequest 的方法和属性用来向服务器发送请求和从服务器获取响应。 \u003c/p\u003e\n\u003ch6\u003e 发送请求 \u003c/h6\u003e\n\u003cp\u003eXMLHttpRequest 对象的一些方法用来构建一个 HTTP 请求，并向服务器发送。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eopen() 方法\n        \u003cdetails\u003e\n            \u003csummary\u003eopen() 方法用来创建一个新的 HTTP 请求，在该方法中，可以定义请求的方法、 URL 地址以及验证信息，但创建的请求并未发送，直到调用 send() 方法。 \u003c/summary\u003e\n            \u003cp\u003eopen() 方法的语法格式如下： \u003c/p\u003e\n            \u003ccode class=\"c\"\u003e\n                \u003cspan class=\"p\"\u003eoXMLHttpRequest.open(method,URL[,asyncFlag[,userName[,password]]])\n                    \u0026lt;/p\u0026gt;\u003c/span\u003e\n            \u003c/div\u003e\n            \u003cp\u003e 参数说明： \u003c/p\u003e\n            \u003cul\u003e\n                \u003cli\u003e 参数 method 用来定义 HTTP 请求所使用的方法，包括 POST 、 GET 、 PUT 及 PROPFIND 等，该参数无须区分大小写 \u003c/li\u003e\n                \u003cli\u003e 参数 URL 为请求的 URL 地址，可以为绝对地址也可以为相对地址 \u003c/li\u003e\n                \u003cli\u003e 参数 asyncFlag 用来定义创建的请求是否为异步方式，默认值为 true ，意味着使用异步方式发送请求，并不立即返回数据。如果值为 false ，则意味着立即返回数据。当该参数值设置为\n                    true\n                    时，那么状态改变时会调用 onreadystatechange 属性指定的回调函数 \u003c/li\u003e\n                \u003cli\u003e 参数 userName 和 password 分别用来定义用户名和密码，用于通过服务器基本验证。如果未定义这两个参数或用户名和密码不正确，那么服务器需要基本验证时，会弹出请求验证的对话框\n                \u003c/li\u003e\n            \u003c/ul\u003e\n            \u003cp\u003e 后 3 个参数都是可选的。 \u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003esend()\n        \u003cdetails\u003e\n            \u003csummary\u003e 使用 open() 方法创建的 HTTP 请求并未被发送，直到调用 send() 方法才能被发送。 \u003c/summary\u003e\n            \u003cp\u003e 该方法的语法格式如下： \u003c/p\u003e\n            \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoXMLHttpRequest.send([content]) \u003c/span\u003e\u003c/code\u003e\n            \u003cp\u003e 该方法发送 HTTP 请求并接收服务器的响应。参数 content 是可选的，用来定义发送请求的正文。 \u003c/p\u003e\n            \u003cp\u003e 此方法的同步或异步方式取决于 open() 方法中的 asyncFlag 参数。 \u003c/p\u003e\n            \u003cp\u003e 注意，如果要定义发送的内容，那么最好使用字符串格式，并且使用 setRequestHeader() 方法定义请求报头的内容类型，必须包括 charset 以设置编码方式。 \u003c/p\u003e\n            \u003cp\u003e 虽然微软的 XMLHTTP 比较强大，可以发送很多类型的数据，但是其它浏览器以及 W3C 都定义仅仅可以发送字符串或者 DOM Document ，鉴于 Document\n                也必须序列化为字符串，建议读者最好直接使用字符串（ Document 使用 Document.xml 自己序列化后作为参数）。 \u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003esetRequestHeader() 方法\n        \u003cdetails\u003e\n            \u003csummary\u003e 在发送请求之前，还可以为请求增加新的报头，使用 setRequestHeader() 方法就可以完成这个操作 \u003c/summary\u003e\n            \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoXMLHttpRequest.setRequestHeader(header, value);\u003c/span\u003e\u003c/code\u003e\n            \u003cp\u003e 这将和请求一起发送到服务端。如果已经存在同名的 HTTP 请求报头则覆盖之，并且该方法应该在 open() 方法之后、 send() 方法之前调用。 \u003c/p\u003e\n            \u003cp\u003e 参数 header 和 value 分别用来定义报头字段和值。例如下面的代码： \u003c/p\u003e\n            \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoXMLHttpRequest.setRequestHeader( \"myHeader \", \"myValue \")\u003c/span\u003e\u003c/code\u003e\n            \u003cp\u003e 这增加一个新的报头： \u003c/p\u003e\n            \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003emyHeader:myValue\u003c/span\u003e\u003c/code\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003eabort() 方法\n        \u003cdetails\u003e\n            \u003csummary\u003e 发送请求后，如果想中止这个请求，那么就可以调用 abort() 方法 \u003c/summary\u003e\n            \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoXMLHttpRequest.abort()\u003c/span\u003e\u003c/code\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e 获取响应 \u003c/h6\u003e\n\u003cp\u003eXMLHttpRequest 对象的一些方法和属性用来获取从服务器返回的响应，包括 HTTP 报头和响应正文。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003egetAllResponseHeaders() 方法\n        \u003cdetails\u003e\n            \u003csummary\u003e 当请求获得服务器的响应后，也即 send() 方法执行成功后，使用 getAllResponseHeaders() 方法可以获得所有的响应报头 \u003c/summary\u003e\n            \u003cp\u003e 该方法的语法格式如下： \u003c/p\u003e\n            \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003estrHeaders = oXMLHttpRequest.getAllResponseHeaders()\u003c/span\u003e\u003c/code\u003e\n            \u003cp\u003e 该方法返回一个字符串类型值，因此显得有些不好处理，如果想返回其中某个特定的字段值，建议使用 getResponseHeader() 方法。 \u003c/p\u003e\n            \u003cp\u003e 就像前面介绍的那样，每个 HTTP 报头名称和值用冒号分隔，并以 \\r\\n 结束。 \u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003egetResponseHeader() 方法\n        \u003cdetails\u003e\n            \u003csummary\u003e 如果想获得响应中某个特定的字段值，那么就可以使用 getResponseHeader() 方法 \u003c/summary\u003e\n            \u003cp\u003e 该方法的语法格式如下： \u003c/p\u003e\n            \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003estrValue = oXMLHttpRequest.getResponseHeader( \"header \")\u003c/span\u003e\u003c/code\u003e\n            \u003cp\u003e 参数 header 是一个 HTTP 响应的字段名。 \u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003eresponseText 和 responseXML 属性\n        \u003cdetails\u003e\n            \u003csummary\u003eresponseText 和 responseXML 属性都是只读属性，用来返回服务器响应中的正文。 \u003c/summary\u003e\n            \u003cp\u003eresponseText 和 responseXML 属性都是只读属性，用来返回服务器响应中的正文。 \u003c/p\u003e\n            \u003cp\u003eresponseText 属性的值是服务器响应正文数据的纯文本版本，而 responseXML 属性则表示服务器响应正文数据被解析成 DOM 后的版本，是一个文档对象。可以使用 DOM\n                接口处理其中的数据。\n            \u003c/p\u003e\n            \u003cp\u003e 如果响应数据不是有效的 XML 文档，而使用了 responseXML 属性，那么就会出现解析错误，但是该属性本身不返回 XMLDOMParseError ，可以通过处理 responseXML\n                属性的值获取错误信息。 \u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003ereadyState 属性 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e 设置状态改变事件 \u003c/h6\u003e\n\u003cp\u003e 使用 onreadystatechange 属性可以指定一个函数，当状态改变时就调用该函数。调用的这个函数被称为回调函数。该函数经常和 readyState 、 status 及 statusText\n    属性来确定响应的具体状态。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction theReadyStateChange() { \u003c/span\u003e\u003cspan class=\"p4\"\u003e//\n        根据 HTTP 请求的状态码确定当前请求处于什么状态 \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (oXMLHttpRequest.readyState == 0) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e// 对象尚未初始化，这是最初的状态，此时尚未调用 open() 方法 \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e// 可以编写一段业务逻辑处理这个状态 \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (oXMLHttpRequest.readyState == 1) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 对象已创建，此时还未调用 send() 方法 \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 这时可以给用户一段提示信息，例如正在加载、请稍等等\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (oXMLHttpRequest.readyState == 2) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e// 已经调用 send() 方法，但响应主体还未到达 \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (oXMLHttpRequest.readyState == 3)\n        {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 与服务器交互过程中，部分数据已经到达，但还不可以访问 \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if\n        (oXMLHttpRequest.readyState == 4) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e// 全部数据已经到达，数据和报头都可以访问了 \u003c/span\u003e\u003cspan class=\"p6\"\u003egetResult(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e//alert(oXMLHttpRequest.readyState); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003c/code\u003e\n\u003ch5\u003e 一个标准的同步调用所应具备的步骤 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e// 处理返回的结果 \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction getResult() {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(oXMLHttpRequest.status); \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (oXMLHttpRequest.status ==\n        200) { \u003c/span\u003e\u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003edocument.write( \" 数据 == \u0026lt; xmp \u0026gt; \"+ \u003c/span\u003e\u003cspan class=\"p10\"\u003eoXMLHttpRequest.responseText\n        +\" \u0026lt; /xmp\u0026gt; \"); \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ecatch (err) { \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003ealert(err.message); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else if (oXMLHttpRequest.status == 404) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003edocument.write( \" 没有发现请求的文档！ \"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else if (oXMLHttpRequest.status ==\n        500)\n        { \u003c/span\u003e\u003cspan class=\"p8\"\u003edocument.write( \" 服务器内部错误！ \"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003evar oXMLHttpRequest = new ActiveXObject(\n        \"Msxml2.XMLHTTP \"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 无需定义 oXMLHttpRequest.onreadystatechange \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003etry { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eoXMLHttpRequest.open( \"GET \", \" \u0026lt; a href = \"http://localhost/employees.xml\u0026amp;#8221\"\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003erel = \"nofollow\" \u0026gt; http: //localhost/employees.xml\u0026amp;#8221\u0026lt;/a\u0026gt;;, \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003efalse); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eoXMLHttpRequest.send(); \u003cspan class=\"r\"\u003e// 顺序执行，直到返回结果才会执行下面一行程序 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003egetResult(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} catch (err) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(err.message);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 编码混乱问题的解决 \u003c/h5\u003e\n\u003cp\u003e 在应用 XMLHttpRequest 时会发现接收到的响应会产生乱码，这是由于不当的 HTTP 内容类型报头造成的，有多种方法可以处理乱码问题。 \u003c/p\u003e\n\u003ch6\u003e 通过 Web 服务器设置 \u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e 选择 \" 开始 \" → \" 控制面板 \" 命令，打开控制面板，双击 \" 管理工具 \" 程序组图标，打开 \" 管理工具 \" 窗口，双击 \"Internet 信息服务 \" 图标，就会弹出 \"Internet 信息服务\n        \" 管理控制台\n    \u003c/li\u003e\n    \u003cli\u003e 右击要作为数据源的文件，在快捷菜单中选择 \" 属性 \" 命令，就会弹出 \" 文件属性 \" 对话框，选择 \"HTTP 头 \" 选项卡。单击 \" 添加 \" 按钮就可以打开 \" 添加 / 编辑自定义 HTTP 头 \"\n        对话框，分别在\n        \" 自定义 HTTP\n        头名 \" 和 \" 自定义 HTTP 头值 \" 文本框中输入 Content-type 和 text/xml;charset=utf-8 。然后单击 \" 确定 \" 按钮关闭对话框，可以看到新增的 HTTP 响应报头\n    \u003c/li\u003e\n    \u003cli\u003e 单击 \" 确定 \" 按钮保存更改，重启 Web 服务器就可以使新设置生效 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e 通过动态脚本语言解决 \u003c/h6\u003e\n\u003cp\u003e 一些动态脚本语言，例如 ASP 、 ASP.NET 、 JSP 、 PHP 等都可以动态创建 HTTP 响应报头，下面分别是它们创建默认内容类型的代码。 \u003c/p\u003e\n\u003cp\u003eASP 代码。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;%\u003c/span\u003e\u003cspan class=\"p2\"\u003eResponse.Addheader \"Content-type \",\n        \"text/xml;charset=utf-8 \"\u003c/span\u003e\u003cspan class=\"p\"\u003e%\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eJSP 代码。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;%\u003c/span\u003e\u003cspan class=\"p2\"\u003eresponse.addHeader( \"Content-type \",\n        \"text/xml;charset=utf-8 \");\u003c/span\u003e\u003cspan class=\"p\"\u003e%\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003ePHP 代码。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;?php\u003c/span\u003e\u003cspan class=\"p2\"\u003eheader( \"Content-type: text/xml;charset=utf-8\n        \");\u003c/span\u003e\u003cspan class=\"p\"\u003e?\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eASP.NET 代码（ C# 和 VB 适用）。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;%\u003c/span\u003e\u003cspan class=\"p2\"\u003eresponse.AppendHeader( \"Content-type \",\n        \"text/xml;charset=utf-8 \")\u003c/span\u003e\u003cspan class=\"p\"\u003e%\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 跨浏览器兼容 \u003c/h5\u003e\n\u003ch6\u003e 跨浏览器实现 XMLHttpRequest\u003c/h6\u003e\n\u003cp\u003e 较旧版本的 IE 允许用户使用 MSXML 的 XMLHTTP 类发送和接收 XML 数据，该类通过调用下面的构造器方法进行实例化（还可以指定版本）。 \u003c/p\u003ediv.c?\u003cspan class=\"p\"\u003enew\n    ActiveXObject( \"Msxml2.XMLHTTP \") \u003c/span\u003e\u003cspan class=\"p2\"\u003enew ActiveXObject( \"Msxml2.XMLHTTP.3.0 \") \u003c/span\u003e\u003cspan\n    class=\"p2\"\u003enew ActiveXObject( \"Msxml2.XMLHTTP.4.0 \") \u003c/span\u003e\n\u003cspan class=\"p2\"\u003enew ActiveXObject( \"Msxml2.XMLHTTP.5.0 \")\u003c/span\u003e\n\u003cp\u003e 或者使用下面的方法。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003enew ActiveXObject( \"Microsoft.XMLHTTP \") \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 而 Mozilla 以及其它的浏览器在全局的 XMLHttpRequest 类中提供了相同的功能。因此，可以使用下面的代码返回一个 XMLHttpRequest 实例。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar oXMLHttpRequest; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif\n        (window.XMLHttpRequest) { // Mozilla 、 Safari 、 IE7 、 Opera 等适用 \u003c/span\u003e\u003cspan class=\"p4\"\u003eoXMLHttpRequest =\n        new\n        XMLHttpRequest(); \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (oXMLHttpRequest.overrideMimeType) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eoXMLHttpRequest.overrideMimeType( 'text / xml '); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} else if (window.ActiveXObject) { //IE7 以前的浏览器适用，并且有两种不同的版本 \u003c/span\u003e\u003cspan class=\"p4\"\u003evar progIDs\n        =\n        [\"Msxml2.XMLHTTP .5 .0\", \"Msxml2.XMLHTTP .4 .0\", \"MSXML2.XMLHTTP .3 .0\", \"MSXML2.XMLHTTP\",\n        \"Microsoft.XMLHTTP\"]; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efor (var i = 0; i \u0026lt; progIDs.length; ++i) { \u003c/span\u003e\u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003eoXMLHttpRequest = new ActiveXObject(progIDs[i]); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} catch (err) {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003etry { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003eoXMLHttpRequest = new ActiveXObject(\"Microsoft.XMLHTTP\"); \u003c/span\u003e\u003cspan class=\"p8\"\u003e} catch\n        (err) {} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eif (!oXMLHttpRequest) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ealert(' 不存在适用的 XMLHttpRequest'); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 跨浏览器实现 XML 解析 \u003c/h6\u003e\n\u003cp\u003e 数据被加载后，可以使用下面的方法解析数据为一个 W3C DOM 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 该函数用来跨浏览器解析 XML 数据 \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        parse(xml) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar doc; \u003c/span\u003e\u003cspan class=\"p4\"\u003etry { \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 较旧的 IE\n        支持的方法 \u003c/span\u003e\u003cspan class=\"p6\"\u003edoc = new ActiveXObject(\"Microsoft.XMLDOM\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edoc.async = false; \u003c/span\u003e\u003cspan class=\"p6\"\u003edoc.loadXML(xml); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} catch\n        (err) { \u003c/span\u003e\u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 其它浏览器支持的方法 \u003c/span\u003e\u003cspan class=\"p8\"\u003evar\n        parser = new DOMParser(); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003edoc = parser.parseFromString(xml, \"text / xml\"); \u003c/span\u003e\u003cspan class=\"p8\"\u003edelete parser;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} catch (err2) { \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (debug) \u003c/span\u003e\u003cspan class=\"p10\"\u003ealert(\"XML\n        parsing is not supported.\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn doc; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eAJAX 的特点 \u003c/h5\u003e\n\u003cp\u003eAJAX 解决方案不能单独应用，这是首先要清楚的一点，只有将 JavaScript 嵌入到网页中， AJAX 和 DHTML 解决方案相互配合才可使它具有一些引人注目的特点。 \u003c/p\u003e\n\u003cp\u003eJavaScript 负责交互和处理数据，而 XMLHttpRequest 对象负责构建合法的 HTTP 请求和获取 HTTP 响应。由于 AJAX 和 DHTML 的配合，它们有很多独特的特点。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 减轻了 Web 服务器的负担。因为局部视点数据的更新仅仅是获取部分数据，并且不包含数据结构，所以，它最大可能地减少了数据冗余，从而减轻了 Web 服务器的负担 \u003c/li\u003e\n    \u003cli\u003e 由于 JavaScript 在客户端可以完成部分业务逻辑运算，所以也减轻了应用程序服务器的负担 \u003c/li\u003e\n    \u003cli\u003e 可以改变页面局部视点，而无需更新整个页面，在减轻服务器负担的同时，也减少了数据通信量，从而缩短用户等待的时间 \u003c/li\u003e\n    \u003cli\u003e 由于 DHTML 的配合，使得可以在单个网页中构建交互性的 GUI 界面实现与用户的交互，所以，网页有更好的用户体验 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e 解决请求被浏览器缓存问题 \u003c/h5\u003e\n\u003cp\u003e 在使用 XMLHttpRequest 时，要注意的一个问题是要加载的内容可能被浏览器缓存，这时，可以对 URL 参数稍作变化以避免此问题，一个常用的方法是加上一个随机数作为查询参数，例如下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eoXMLHttpRequest.open( \"GET \",\u003c/span\u003e\u003cspan class=\"p\"\u003e\"\u0026lt;a\n        href=\"http://localhost/employees.xml?time=\u0026amp;#8221\"\n        rel=\"nofollow\"\u0026gt;http://localhost/employees.xml?time=\u0026amp;#8221\u0026lt;/a\u0026gt;; +\u003c/span\u003e\u003cspan class=\"p\"\u003e(new\n        Date()).getTime(), true);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这样，每次请求的地址都不相同，也就不会被浏览器缓存了。 \u003c/p\u003e\n\u003cp\u003e 由于 JavaScript 目前是浏览器广泛支持的客户端技术，不需要插件，所以有利于标准化和跨浏览器实现。 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ XHR 2","title":"接口"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","XHR 2","接口"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
