    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003eAJAX 的实现主要依赖于 XMLHttpRequest 对象，但是在调用其进行异步数据传输时，由于 XMLHttpRequest\n    对象的实例在处理事件完成后就会被销毁，所以如果不对该对象进行封装处理，在下次需要调用它时就得重新构建，而且每次调用都需要写一大段的代码，使用起来很不方便。虽然，现在很多开源的 AJAX\n    框架都提供了对 XMLHttpRequest 对象的封装方案，但是如果应用这些框架，通常需要加载很多额外的资源，这势必会浪费很多服务器资源。不过 JavaScript 脚本语言支持 OO\n    编码风格，通过它可以将 AJAX 所必需的功能封装在对象中。 \u003c/p\u003e\n\u003ch5\u003eAJAX 重构的步骤 \u003c/h5\u003e\n\u003cp\u003eAJAX 重构大致可以分为以下 3 个步骤。 \u003c/p\u003e\n\u003ch6\u003e 首先，打开冰箱 \u003c/h6\u003e\n\u003cp\u003e 创建一个单独的 JS 文件，名称为 AjaxRequest.js ，并且在该文件中编写重构 AJAX 所需的代码 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar net = new Object(); \u003cspan class=\"r\"\u003e//\n            定义一个全局的变量 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e// 编写构造函数 \u003c/span\u003e\u003cspan class=\"p4\"\u003enet.AjaxRequest =\n        function(url,\n        onload, onerror, method, params) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ethis.req = null; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ethis.onload = onload; \u003c/span\u003e\u003cspan class=\"p8\"\u003ethis.onerror = (onerror) ? onerror :\n        this.defaultError; \u003c/span\u003e\u003cspan class=\"p8\"\u003ethis.loadDate(url, method, params); \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 编写用于初始化 XMLHttpRequest 对象并指定处理函数，最后发送 HTTP 请求的方法 \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003enet.AjaxRequest.prototype.loadDate = function(url, method, params) { \u003c/span\u003e\u003cspan class=\"p8\"\u003eif\n        (!method) { \u003c/span\u003e\u003cspan class=\"p10\"\u003emethod = \"GET\"; // 设置默认的请求方式为 GET \u003c/span\u003e\u003cspan class=\"p8\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (window.XMLHttpRequest) { // 非 IE 浏览器 \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003ethis.req = new XMLHttpRequest(); \u003cspan class=\"r\"\u003e// 创建 XMLHttpRequest 对象 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e} else if (window.ActiveXObject) { //IE 浏览器 \u003c/span\u003e\u003cspan class=\"p10\"\u003etry { \u003c/span\u003e\u003cspan\n        class=\"p12\"\u003ethis.req = new ActiveXObject(\"Microsoft.XMLHTTP\"); \u003cspan class=\"r\"\u003e// 创建 XMLHttpRequest\n            对象 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p10\"\u003e} catch (e) { \u003c/span\u003e\u003cspan class=\"p12\"\u003etry { \u003c/span\u003e\u003cspan class=\"p14\"\u003ethis.req = new\n        ActiveXObject(\"Msxml2.XMLHTTP\"); \u003cspan class=\"r\"\u003e// 创建 XMLHttpRequest 对象 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p12\"\u003e}\n        catch (e) {} \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (this.req) { \u003c/span\u003e\u003cspan class=\"p10\"\u003etry { \u003c/span\u003e\u003cspan\n        class=\"p12\"\u003evar loader = this; \u003c/span\u003e\u003cspan class=\"p12\"\u003ethis.req.onreadystatechange = function() {\n    \u003c/span\u003e\u003cspan class=\"p14\"\u003enet.AjaxRequest.onReadyState.call(loader); \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003e} \u003c/span\u003e\u003cspan class=\"p12\"\u003ethis.req.open(method, url, true); \u003cspan class=\"r\"\u003e//\n            建立对服务器的调用 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p12\"\u003eif (method == \"POST\") { // 如果提交方式为 POST \u003c/span\u003e\u003cspan\n        class=\"p14\"\u003ethis.req.setRequestHeader(\"Content-Type\", \"application/x-www-form-urlencoded\"); \u003cspan class=\"r\"\u003e//\n            设置请求的内容类型 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p14\"\u003ethis.req.setRequestHeader(\"x-requested-with\", \"ajax\"); \u003cspan class=\"r\"\u003e//\n            设置请求的发出者 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p12\"\u003e} \u003c/span\u003e\u003cspan class=\"p12\"\u003ethis.req.send(params); \u003cspan\n            class=\"r\"\u003e// 发送请求 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p10\"\u003e} catch (err) { \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003ethis.onerror.call(this); \u003cspan class=\"r\"\u003e// 调用错误处理函数 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\" p10 \"\u003e} \u003c/span\u003e\u003cspan class=\"p8 \"\u003e} \u003c/span\u003e\u003cspan class=\"p6 \"\u003e} \u003c/span\u003e\u003cspan class=\"p6 \"\u003e//\n        重构回调函数 \u003c/span\u003e\u003cspan class=\"p4 \"\u003enet.AjaxRequest.onReadyState = function() { \u003c/span\u003e\u003cspan class=\"p8 \"\u003evar req\n        = this.req; \u003c/span\u003e\n    \u003cspan class=\"p8 \"\u003evar ready = req.readyState; // 获取请求状态 \u003c/span\u003e\u003cspan class=\"p8 \"\u003eif (ready == 4) { //\n        请求完成 \u003c/span\u003e\u003cspan class=\"p10 \"\u003eif (req.status == 200) { // 请求成功 \u003c/span\u003e\u003cspan\n        class=\"p12 \"\u003ethis.onload.call(this); \u003c/span\u003e\n    \u003cspan class=\"p10 \"\u003e} else { \u003c/span\u003e\u003cspan class=\"p12 \"\u003ethis.onerror.call(this); \u003cspan class=\"r\"\u003e//\n            调用错误处理函数 \u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e//\n        重构默认的错误处理函数 \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003enet.AjaxRequest.prototype.defaultError = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\" 错误数据 \\n\\n\n        回调状态 :\" + this.req.readyState + \"\\n 状态 :\" + this.req.status); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 把大象塞进去 \u003c/h6\u003e\n\u003cp\u003e 在需要应用 AJAX 的页面中应用以下语句，包括步骤 1 中创建的 JS 文件 \u003c/p\u003e\n\u003ch6\u003e 关上冰箱门 \u003c/h6\u003e\n\u003cp\u003e 在应用 AJAX 的页面中编写错误处理的方法、实例化 AJAX 对象的方法和回调函数 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e/****************** 错误处理的方法 **************************************/ \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        onerror() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ealert(\" 您的操作有误！ \"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/******************\n        实例化 Ajax 对象的方法 *******************************/ \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction getInfo() { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar loader = new net.AjaxRequest(\"check.php?nocache=\" + new Date().getTime(), deal_getInfo,\n        onerror, \"GET\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/************************ 回调函数\n        **************************************/\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction deal_getInfo() { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edocument.getElementById(\"showInfo\").innerHTML = this.req.responseText; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 实时显示商城公告 \u003c/h5\u003e\n\u003col\u003e\n    \u003cli\u003e 编写 AjaxRequest.js 文件，并将其保存到 JS 文件夹中 \u003c/li\u003e\n    \u003cli\u003e 编写 index.php 文件，并在该文件中包含 AjaxRequest.js 文件 \u003cbr /\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003es\u003c/summary\u003e\n            \u003ccode class=\"c\"\u003e\n                \u003cspan class=\"p\"\u003e\u0026lt;script src=\"JS/AjaxRequest.js\"\u0026gt;\u0026lt;/script\u0026gt;\n                \u003c/span\u003e\n            \u003c/code\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003e 在 index.php 页面中编写错误处理的函数、实例化 AJAX 对象的方法和回调函数 \u003cbr /\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003e 额 \u003c/summary\u003e\n            \u003ccode class=\"c\"\u003e\n                \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;script \u0026gt; \u003c/span\u003e\u003cspan\n                    class=\"p10\"\u003e/************************* 错误处理的方法 *******************************/ \u003c/span\u003e\u003cspan\n                    class=\"p10\"\u003efunction onerror() { \u003c/span\u003e\u003cspan class=\"p12\"\u003ealert(\" 您的操作有误！ \"); \u003c/span\u003e\n                \u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p10\"\u003e/****************** 实例化 Ajax\n                    对象的方法 *******************************/ \u003c/span\u003e\u003cspan class=\"p10\"\u003efunction getInfo() {\n                \u003c/span\u003e\u003cspan class=\"p12\"\u003evar loader = new net.AjaxRequest(\"check.php?nocache=\" + new\n                    Date().getTime(),\n                    deal_getInfo, onerror, \"GET\"); \u003c/span\u003e\n                \u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p10\"\u003e/************************\n                    回调函数 **************************************/ \u003c/span\u003e\u003cspan class=\"p10\"\u003efunction deal_getInfo() {\n                \u003c/span\u003e\u003cspan class=\"p12\"\u003edocument.getElementById(\"showInfo\").innerHTML = this.req.responseText;\n                \u003c/span\u003e\n                \u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\n            \u003c/code\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003e 在 index.php 文件的合适位置添加一个 \u0026lt;div\u0026gt; 标记，并且将该标记的 id 属性设置为 showInfo 。在本实例中，由于要实现滚动显示商城公告，所以还添加了\n        \u0026lt;marquee\u0026gt;\n        标记。 \u003cbr /\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003e 额 \u003c/summary\u003e\n            \u003ccode class=\"c\"\u003e\n                \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div style=\"border:1px\n                    solid;height:50px;width:200px;padding:5px;\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;marquee\n                    direction=\"up\" scrollamount=\"3\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;div\n                    id=\"showInfo\"\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\n                \u003cspan class=\"p4\"\u003e\u0026lt;/marquee\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\n                    \u003c/code\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003e 编写 check.php 文件。在该文件中，编写从数据库中获取商城公告并显示的代码。 \u003cbr /\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003e 额 \u003c/summary\u003e\n            \u003ccode class=\"c\"\u003e\n                \u003cspan class=\"p\"\u003e\u0026lt;?php \u003c/span\u003e\u003cspan class=\"p\"\u003eheader(\"Content-type:text/html;charset=gb2312\");\n                \u003c/span\u003e\u003cspan class=\"p\"\u003einclude(\"conn.php\"); \u003c/span\u003e\u003cspan class=\"p\"\u003e$query=\"select*from tb_news\";\n                \u003c/span\u003e\u003cspan class=\"p\"\u003e$res=mysql_query($query); \u003c/span\u003e\n                \u003cspan class=\"p\"\u003ewhile($row=mysql_fetch_array($res)){ \u003c/span\u003e\u003cspan class=\"p2\"\u003eecho$row['news'];\n                \u003c/span\u003e\u003cspan class=\"p2\"\u003eecho\"\u0026lt;br\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p\"\u003e} \u003c/span\u003e\u003cspan class=\"p\"\u003e?\u0026gt;\u003c/span\u003e\n            \u003c/code\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003e 为了实现实时获取商城公告，还需要在 index.php 文件中添加以下 JavaScript 代码，从而实现当页面载入完毕后，先调用 getInfo 方法获取商城公告，再设置每隔 10 分钟获取一次商城公告\n        \u003cbr /\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003e 额 \u003c/summary\u003e\n            \u003ccode class=\"c\"\u003e\n                \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.onload=function(){ \u003c/span\u003e\u003cspan\n                    class=\"p2\"\u003egetInfo();\u003cspan class=\"r\"\u003e// 调用 getInfo 方法获取商城公告 \u003c/span\u003e\u003c/span\u003e\u003cspan\n                    class=\"p2\"\u003ewindow.setInterval(\"getInfo()\",600000);\u003cspan class=\"r\"\u003e// 每隔 10 分钟调用一次 getInfo\n                        方法 \u003c/span\u003e\u003c/span\u003e\n                \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n                    \u003c/code\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n\u003c/ol\u003e\n\u003ch5\u003e 多级联动下拉列表 \u003c/h5\u003e\n\u003cp\u003e 多级联动下拉列表是指一组相互关联的下拉列表。在这组下拉列表中，相邻的两个下拉列表是父子关系，改变父下拉列表的值，子下拉列表也随之改变。这样的多级联动下拉列表可以辅助用户快速选择自己所需项目，方便用户操作。在 Tomcat\n    服务器下运行程序，在页面中将显示一个三级联动下拉列表，用于选择用户的居住地。 \u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e 创建一个 XML 文件，名称为 zone.xml ，用于保存省市信息。 \u003cbr /\u003e\n        \u003cdetails\u003e\n            \u003csummary\u003e 额 \u003c/summary\u003e\n            \u003ccode class=\"c\"\u003e\n                \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;?xml version=\"1.0\" encoding=\"UTF-8\"?\u0026gt;\n                \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;country name=\" 中国 \"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;province id=\"00000\"\n                    name=\" 北京市 \"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;city id=\"00001\" name=\" 北京 \" area=\" 东城区 , 西城区 , 崇文区\n                    ,\n                    宣武区 , 朝阳区 , 丰台区 , 石景山区 , 海淀区 , 门头沟区 , 房山区 , 通州区 , 顺义区 , 冒平区 , 大兴区 , 怀柔区 , 平谷区 , 密云区 , 延庆县 \"\u0026gt;\n                \u003c/span\u003e\n                \u003cspan class=\"p2\"\u003e\u0026lt;/city\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/province\u0026gt; \u003c/span\u003e\u003cspan\n                    class=\"p2\"\u003e\u0026lt;province id=\"05000\" name=\" 吉林省 \"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;city id=\"05001\"\n                    name=\" 长春 \" area=\" 双阳区 , 德惠市 , 九台市 , 农安县 , 榆树市 , 南关区 , 宽城区 , 朝阳区 , 二道区 , 绿园区 , 经济技术开发区 , 高新区\n                    \"\u0026gt; \u003c/span\u003e\n                \u003cspan class=\"p2\"\u003e\u0026lt;/city\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;city id=\"05002\" name=\" 延边朝鲜族自治州 \" area=\"\n                    延吉市 , 图们市 , 敦化市 , 珲春市 \"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/city\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;city\n                    id=\"05003\" name=\" 吉林 \" area=\" 船营区 , 冒邑区 , 龙潭区 , 丰满区 , 蛟河市 , 桦甸市 \"\u0026gt; \u003c/span\u003e\n                \u003cspan class=\"p2\"\u003e\u0026lt;/city\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;city id=\"05004\" name=\" 白山 \" area=\" 八道江区 ,\n                    江源区 , 临江区 , 抚松县 , 靖宇县 \"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/city\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;city\n                    id=\"05005\" name=\" 白城 \" area=\" 洮北区 , 洮南区 , 大安市 , 镇赉县 , 通榆县 , 其它 \"\u0026gt; \u003c/span\u003e\n                \u003cspan class=\"p2\"\u003e\u0026lt;/city\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;city id=\"05006\" name=\" 四平 \" area=\" 梨树县 ,\n                    伊通满族自治县 , 公主岭市 , 双辽市 \"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/city\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;city\n                    id=\"05007\" name=\" 松原 \" area=\" 宁江区 , 长岭县 , 乾安县 , 扶余县 , 前郭 \"\u0026gt; \u003c/span\u003e\n                \u003cspan class=\"p2\"\u003e\u0026lt;/city\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;city id=\"05008\" name=\" 辽源 \" area=\" 龙山区 ,\n                    西安区 , 东丰县 , 东辽县 , 其它 \"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/city\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;city\n                    id=\"05009\" name=\" 通化 \" area=\" 东冒区 , 二道江区 , 梅河口市 , 集安市 , 通化县 \"\u0026gt; \u003c/span\u003e\n                \u003cspan class=\"p2\"\u003e\u0026lt;/city\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/province\u0026gt; \u003c/span\u003e\u003cspan\n                    class=\"p2\"\u003e......\u0026lt;!-- 省略了其它节点 --\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/country\u0026gt;\u003c/span\u003e\n                    \u003c/code\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n\u003c/ol\u003e\n\u003cscript\u003e\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ XHR 2","title":"重构"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","XHR 2","重构"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
