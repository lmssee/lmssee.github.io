    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 使用 XMLHttpRequest 对象 \u003c/h5\u003e\n\u003cp\u003eXMLHttpRequest 常简称 XMR ，中文可以理解为可扩展超文本传输请求。 XMLHttpRequest 对象可以在不向服务器提交整个页面的情况下，实现局部更新。 \u003c/p\u003e\n\u003cp\u003eXMLHttpRequest 对象老版本缺陷 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 只支持文本的传输，无法用来读取和上传二进制文件 \u003c/li\u003e\n    \u003cli\u003e 传送和接受文本时，没有进度信息，只能提示有木有完成 \u003c/li\u003e\n    \u003cli\u003e 受到同域限制，只能向同一域名的服务器请求数据 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eXHR 2 的新版功能： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 可以设置 HTTP 请求的时限 \u003c/li\u003e\n    \u003cli\u003e 可以上传文件 \u003c/li\u003e\n    \u003cli\u003e 可以请求不同的域名下的数据 \u003c/li\u003e\n    \u003cli\u003e 可以使用 FormData 对象管理表单数据 \u003c/li\u003e\n    \u003cli\u003e 可以获取服务器的二进制文件 \u003c/li\u003e\n    \u003cli\u003e 可以获取数据传输的进度信息 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003eHTTP 请求时限 \u003c/h6\u003e\n\u003cp\u003e 新版本的 XMLHttpRequest 对象增加 timeout 属性，可以设置 HTTP 请求时限。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003exhr.timeout = int || function();\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 目前， Opera 、 Firefox 支持该属性， Chrome 、 Safari 不支持。 \u003c/p\u003e\n\u003ch6\u003e 使用 FormData 对象 \u003c/h6\u003e\n\u003cp\u003e 为了方便表单处理， HTML 5 新增了一个 FormData 对象，可以模拟表单。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e 新建表单 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar formData = new FormData();\u003c/span\u003e\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 为 FormData 对象添加表单项 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eformData.append('username',' 王五 '); \u003c/span\u003e\u003cspan class=\"p2\"\u003eformData.append('id',123456);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e 直接传送这个 FormData 对象这与提交网页表单一个效果。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003exhr.send(formData);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eFormData 也可以获取网页表单的值： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar form = mi(\"#myform\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar formData = new FormData(form);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eformData.append('secret', '123456'); \u003cspan class=\"r\"\u003e// 添加表单项 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003exhr.open('POST', form.action); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003exhr.send(formData);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 上传文件 \u003c/h6\u003e\n\u003cp\u003e 将 input[type='file'] 元素装入 FormData 对象： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar formData = new FormData(); \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (let i = 0; i \u0026lt;\n        file.length; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eformData.append('file[]', files[i]); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 然后，发送这个 FormData 对象： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003exhr.send(formData);\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e 跨域访问 \u003c/h6\u003e\n\u003cp\u003e 新版本的 XMLHttpRequest 对象，可以跨域向服务器发送 HTTP 请求，也称为跨域资源共享（ Cross-Origin Resource Sharing,CORS ）。 \u003c/p\u003e\n\u003ch6\u003e 响应数据 \u003c/h6\u003e\n\u003cp\u003e 在 HTML 5 之前，当使用 XMLHttpRequest 对象从服务器端获取二进制数据时，通常需要 XMLHttpRequest 对象的 overrideMimeType() 方法重载 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar xhr = new XMLHttpRequest(); \u003c/span\u003e\u003cspan class=\"p2\"\u003exhr.open('GET', 'test.png',\n        true); \u003c/span\u003e\u003cspan class=\"p2\"\u003exhr.overrideMimeType('text/plain;charset=x-user-defined'); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003exhr.onreadystatechange = function(e) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (this.readyState == 4 \u0026\u0026 this.status == 200) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar binStr =\n        this.responseText; \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (let i = 0; len = binStr.length; i++) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003evar c = binStr.charCodeAt(i); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar byte = c \u0026 0xff; \u003cspan class=\"r\"\u003e// type at offset i \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 上述方法可以获取二进制数据，但是 XMLHttpRequest 对象的 responseText 属性值的返回值并不是原始的二进制数据，而是由这些数据所组成的和字符串。 \u003c/p\u003e\n\u003cp\u003eHTML 5 为 XMLHttpRequest 新增属性 responseType 和 response 。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eresponseType ： 用于指定服务器返回数据的数据类型，可用值 text 、 arraybuffer 、 json 、 XMLHttpRequest 或 document\n        。如果该属性值指定为空字符串或不适用该属性值，则默认为 text\u003c/li\u003e\n    \u003cli\u003eresponse ： 如果想服务器请求成功，真返回响应数据\n        \u003cul\u003e\n            \u003cli\u003e 如果 responseType 为 text 时，则 response 返回值为一串字符串 \u003c/li\u003e\n            \u003cli\u003e 如果 responseType 为 arraybuffer 时，则 response 返回值为一个 ArrayBuffer 对象 \u003c/li\u003e\n            \u003cli\u003e 如果 responseType 为 blob 时，则 response 返回值为一个 Blob 对象 \u003c/li\u003e\n            \u003cli\u003e 如果 responseType 为 json 时，则 response 返回值为一个 JSON 对象 \u003c/li\u003e\n            \u003cli\u003e 如果 responseType 为 document 时，则 response 返回值为一个 Document 对象 \u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e 接受二进制数据 \u003c/h6\u003e\n\u003cp\u003e 老版本的 XMLHttpRequest 对象只能从服务器接受文本数据，新版可以接收二进制数据。 \u003c/p\u003e\n\u003cp\u003e 传统方法实现是将改写数据的 MIME Type ，将服务器返回的二进制数据伪装成文本数据，并且告诉浏览器这是用户自定义的字符集。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003exhr.overrideMimeType('text/plain;charset=x-user-defined')\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 然后，用 responseText 属性接收服务器返回的二进制数据。再一个字节一个字节翻译回来： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar binStr = this.responseText; \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (let i = 0; len =\n        binStr.length; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar c = binStr.charCodeAt(i); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar byte\n        = c \u0026 0xff; \u003cspan class=\"r\"\u003e// type at offset \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 最后一行的位运算符 'c \u0026 0xff' ，表示每一个字符的两个字节中，只保留最后一个字节，将钱一个字节扔掉。原因是浏览器解读字符的时候，会把字符自动解读成 Unicode 的 OxF700 ~ 0xF7ff 区段。\n\u003c/p\u003e\n\u003cp\u003e 在新的浏览器中，使用 responseType 属性，定义为 blob ，即为二进制数据。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar xhr = new XMLHttpRequest(); \u003c/span\u003e\u003cspan class=\"p2\"\u003exhr.open('GET',\n        '/path/to/image.png'); \u003c/span\u003e\u003cspan class=\"p2\"\u003exhr.responseType = 'blob';\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 接收数据时，使用浏览器自带的 Blob 对象即可： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar blob = new Blob([xhr.response],{type:'image/png'});\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 可以将 responseType 设置为 arraybuffer ，把二进制装进一个数组中： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar xhr = new XMLHttpRequest(); \u003c/span\u003e\u003cspan class=\"p2\"\u003exhr.open('GET',\n        'path/to/image.png'); \u003c/span\u003e\u003cspan class=\"p2\"\u003exhr.responseType = 'ArrayBuffer';\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 接收数据时，需要遍历数组： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar arrayBuffer = xhr.response; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (arrayBuffer) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar byteArray = new Unit8Array(arrayBuffer); \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (let i = 0; i\n        \u0026lt; byteArray.length; i++) { \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 显示进度信息\n\u003c/h6\u003e\n\u003cp\u003e 新版本的 XMLHttpRequest 对象，传输数据时，有一个 progress 事件，用来返回进度信息。它分为上传和下载两种情况。下载的 progress 事件属于 XMLHttpRequest 对象，上传的\n    progress 属于 XMLHttpRequest.upload 事件。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003exhr.onprogress = updateProgress; \u003c/span\u003e\u003cspan class=\"p2\"\u003exhr.update.onprogress =\n        updateProgress;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 在回调函数，使用这些属性： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction update(event){ \u003c/span\u003e\u003cspan class=\"p4\"\u003eif(event.lengthComputable){\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar percentComplete = event.loaded / event.total; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eevent.total 是需要传输的字节， event.loaded 是已经传输的字节。如果 event.lengthComputable 不为真，则 event.total 等于 0 ； \u003c/p\u003e\n\u003cp\u003e 与 progress 相关的其他 5 个事件，可以分别指定回调函数： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eload 传输成功完成 \u003c/li\u003e\n    \u003cli\u003eabort 传输被用户取消 \u003c/li\u003e\n    \u003cli\u003eerror 传输错误 \u003c/li\u003e\n    \u003cli\u003eloadstart 传输开始 \u003c/li\u003e\n    \u003cli\u003eloadEnd 传输结束，但是不知道成功还是失败 \u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ XHR 2","title":"基础"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","XHR 2","基础"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
