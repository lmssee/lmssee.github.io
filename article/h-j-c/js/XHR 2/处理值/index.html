    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e 使用 responseText 和 responseXML 属性都可以获取返回的值，如果响应数据不是有效的 XML 文档，而使用了 responseXML 属性，那么就会出现解析错误，不同的浏览器对 responseXML\n    属性解析错误的响应不同。 \u003c/p\u003e\n\u003cp\u003eXMLHttpRequest 将响应信息解码为 Unicode 字符串，默认将响应数据的编码视为 UTF-8 ，但如果发现响应数据包含其它 Unicode 标示字节（ UCS-2 或者 UCS-4\n    ），那么也可以正确解码其中的数据。\n\u003c/p\u003e\n\u003cp\u003e 注意，如果服务器返回的是 XML 格式文档， responseText 属性并不处理 XML 文档中的编码声明，这时需要使用 responseXML 属性来处理。 \u003c/p\u003e\n\u003ch5\u003e 一旦返回的数据被解析为 XML DOM ，就可以使用标准的核心 DOM 方法处理该文档。处理解析错误 \u003c/h5\u003e\n\u003cp\u003e 在使用 responseXML 属性时，如果出现解析错误，那么浏览器将会做如下响应： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eChrome 和 Safari 将该属性值的设置为 null\u003c/li\u003e\n    \u003cli\u003eIE 、 Firefox 和 Opera 会将该属性值返回一个 Document 对象，但是该 Document 对象具有不同的值 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eOpera 仅仅包含有一个 XML 声明，如下所示： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;?xml version= \"1.0 ″ ?\u0026gt; Firefox 返回具有如下内容的 Document 对象： \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;?xml\n        version= \"1.0 ″ encoding= \"uft-8 ″ ?\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;parsererror xmlns=\n        \"\u0026lt; href=\"http://www.mozilla.org/newlayout/xml/parsererror\"\n        rel=\"nofollow\"\u0026gt;http://www.mozilla.org/newlayout/xml/parsererror\u0026lt;/a\u0026gt;. xml \"\u0026gt;XML 解析错误：未组织好\n        位置： http://localhost/employees.xml 行： 2 ，列： 2 ： \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;sourcetext\u0026gt;m \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;employee\u0026gt;m -^ \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/sourcetext\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/parsererror\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eIE 则返回更为复杂的 Document 对象，该 Document 对象具有一个名为 parseError 的对象，该对象包含有错误代码，通过该对象可以获取出错的详细信息。 \u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003eparse Error 对象的属性 \u003c/caption\u003e\n    \u003ctbody\u003e\n        \u003ctr\u003e\n            \u003cth\u003e 属性 \u003c/th\u003e\n            \u003cth\u003e 描述 \u003c/th\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eerrorCode\u003c/td\u003e\n            \u003ctd\u003e 返回一个长整型错误码 \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003ereason\u003c/td\u003e\n            \u003ctd\u003e 返回包含错误原因的字符串 \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eline\u003c/td\u003e\n            \u003ctd\u003e 返回表示错误行号的长整型 \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003elinepos\u003c/td\u003e\n            \u003ctd\u003e 返回表示错误的行位置的长整型 \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003esrcText\u003c/td\u003e\n            \u003ctd\u003e 返回包含引起错误的行的字符串 \u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003eurl\u003c/td\u003e\n            \u003ctd\u003e 返回指向被加载文档的 URL\u003c/td\u003e\n        \u003c/tr\u003e\n        \u003ctr\u003e\n            \u003ctd\u003efilepos\u003c/td\u003e\n            \u003ctd\u003e 返回错误的一个长整型的文件位置 \u003c/td\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003e 如果 errorCode 属性的值为 0 ，那么就表示没有出现解析错误，此时，可以使用 IE 专用的 xml 属性将 Document 对象转换为 XML 字符串或者对 Document 对象进行操作。 \u003c/p\u003e\n\u003cp\u003e 注意， parseError 对象不属于 W3CDOM 标准，而是 IE 专有的。 \u003c/p\u003e\n\u003cp\u003e 综合不同浏览器的不同响应结果，可以使用下面的代码进行处理。 \u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e 例 \u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 状态码显示返回了结果，下面处理结果 \u003c/span\u003e\u003cspan class=\"p2\"\u003eif\n            (oXMLHttpRequest.status == 200) { \u003c/span\u003e\u003cspan class=\"p4\"\u003etry { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar\n            doc = oXMLHttpRequest.responseXML; \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003e// 检查 doc 是否为 null ，如果不是 null ， IE 、 FireFox 和 Opera 分别做出响应 \u003c/span\u003e\u003cspan class=\"p6\"\u003eif\n            (doc) {\n        \u003c/span\u003e\u003cspan class=\"p8\"\u003e// IE \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (doc.parseError) { \u003c/span\u003e\u003cspan class=\"p10\"\u003evar\n            parseError = doc.parseError; \u003c/span\u003e\n        \u003cspan class=\"p10\"\u003eif (parseError.errorCode != 0) { \u003c/span\u003e\u003cspan class=\"p12\"\u003evar err = \" 解析出现错误！ \\ n \";\n        \u003c/span\u003e\u003cspan class=\"p12\"\u003eerr += \"errorCode =\"+parseError.errorCode + \"\\n \"; \u003c/span\u003e\u003cspan class=\"p12\"\u003eerr +=\n            \"filepos =\"+parseError.filepos + \"\\n \"; \u003c/span\u003e\n        \u003cspan class=\"p12\"\u003eerr += \"line =\"+parseError.line + \"\\n \"; \u003c/span\u003e\u003cspan class=\"p12\"\u003eerr += \"linepos\n            =\"+parseError.linepos + \"\\n \"; \u003c/span\u003e\u003cspan class=\"p12\"\u003eerr += \"reason =\"+parseError.reason + \"\\n \";\n        \u003c/span\u003e\u003cspan class=\"p12\"\u003eerr += \"srcText =\"+parseError.srcText + \"\\n \"; \u003c/span\u003e\n        \u003cspan class=\"p12\"\u003eerr += \"url =\"+parseError.url + \"\\n \"; \u003c/span\u003e\u003cspan class=\"p12\"\u003ealert(err); // IE\n            解析出错 \u003c/span\u003e\u003cspan class=\"p12\"\u003ereturn; \u003c/span\u003e\u003cspan class=\"p10\"\u003e} else { \u003c/span\u003e\u003cspan\n            class=\"p12\"\u003edocument.write(doc.xml); \u003cspan class=\"r\"\u003e// IE 正确解析 \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p10\"\u003e} \u003c/span\u003e\n        \u003cspan class=\"p10\"\u003e// Firefox 、 Opera \u003c/span\u003e\u003cspan class=\"p8\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p10\"\u003e// Firefox\n        \u003c/span\u003e\u003cspan class=\"p10\"\u003eif (doc.documentElement) { \u003c/span\u003e\u003cspan class=\"p12\"\u003eif\n            (doc.documentElement.nodeName ==\"parsererror \") { \u003c/span\u003e\n        \u003cspan class=\"p14\"\u003ealert( \" 解析出现错误！ \"); \u003cspan class=\"r\"\u003e// Firefox 解析出错 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p14\"\u003ereturn;\n        \u003c/span\u003e\u003cspan class=\"p12\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p14\"\u003edocument.write(doc); \u003cspan class=\"r\"\u003e//\n                其它浏览器正确解析 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p12\"\u003e} \u003c/span\u003e\n        \u003cspan class=\"p12\"\u003e// Opera \u003c/span\u003e\n        \u003cspan class=\"p10\"\u003e} else { \u003c/span\u003e\n        \u003cspan class=\"p12\"\u003ealert( \" 解析出现错误！ \"); \u003cspan class=\"r\"\u003e// Opera 解析出错 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p12\"\u003ereturn;\n        \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e// Chrome 、 Safari \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003e} else { \u003c/span\u003e\n        \u003cspan class=\"p8\"\u003ealert( \" 解析出现错误！ \"); \u003cspan class=\"r\"\u003e// Chrome 、 Safari 解析出错 \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\" p8 \"\u003ereturn; \u003c/span\u003e\u003cspan class=\"p6 \"\u003e} \u003c/span\u003e\u003cspan class=\"p4 \"\u003e} catch (err) { \u003c/span\u003e\u003cspan\n            class=\"p6 \"\u003ealert(err.message); \u003c/span\u003e\u003cspan class=\"p4 \"\u003e} \u003c/span\u003e\u003cspan class=\"p2 \"\u003e} \u003c/span\u003e\u003cspan\n            class=\"p \"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n    \u003c/div\u003e\n\u003c/details\u003e\n\u003cp\u003e 可以看到，处理 responseXML 属性还是相当麻烦，推荐使用 responseText 属性，这是一个 XML 格式的字符串。 \u003c/p\u003e\n\u003cp\u003e 对于 XML 字符串和 DOM 之间的转换，目前，浏览器广泛支持 DOMParser 和 XMLSerializer 对象。 \u003c/p\u003e\n\u003ch5\u003eDOMParser\u003c/h5\u003e\n\u003cp\u003eDOMParser 可以解析 XML 文本并返回一个 Document 对象。要使用 DOMParser ，先要使用不带参数的构造函数来实例化它，然后调用其 parseFromString() 方法，例如下面的代码： \u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003e\u003c/span\u003e\u003cspan class=\"p2 \"\u003evar parser = new DOMParser(); \u003c/span\u003e\u003cspan class=\"p2 \"\u003evar\n        doc = parser.parseFromString(aStr, \"text / xml \"); \u003c/span\u003e\u003cspan class=\"p2 \"\u003eparseFromString()\n        方法的语法格式如下： \u003c/span\u003e\u003cspan class=\"p2 \"\u003eparseFromString(text, contentType)\u003c/span\u003e\u003c/div\u003e\n\u003cp\u003e 参数说明： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 参数 text 是要解析的 XML 文本 \u003c/li\u003e\n    \u003cli\u003e 参数 contentType 定义参数 text 的内容类型。可选值包括 text/xml 、 application/xml 和 application/xhtml+xml 。注意，不支持 text/html\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e 该方法的返回值是一个 Document 对象。 \u003c/p\u003e\n\u003cp\u003eIE9 和其它主流浏览器都支持 DOMParser 对象，但 IE8 及以下版本不支持该对象，可以使用 MSXML 的 Document.loadXML() 进行 XML 解析。例如下面的代码是一个浏览器兼容性的做法。\n\u003c/p\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003e\u003c/span\u003e\u003cspan class=\"p2 \"\u003eif (oXMLHttpRequest.status == 200) { \u003c/span\u003e\u003cspan\n        class=\"p4 \"\u003etry { \u003c/span\u003e\u003cspan class=\"p6 \"\u003evar str = oXMLHttpRequest.responseText; \u003c/span\u003e\u003cspan class=\"p6\n                        \"\u003eif (window.DOMParser) { \u003c/span\u003e\u003cspan class=\"p8 \"\u003evar parser = new DOMParser(); \u003c/span\u003e\n    \u003cspan class=\"p8 \"\u003evar doc = parser.parseFromString(str, \"text / xml \"); \u003c/span\u003e\u003cspan class=\"p6 \"\u003e} else {\n    \u003c/span\u003e\u003cspan class=\"p8 \"\u003evar doc = new ActiveXObject( \"Microsoft.XMLDOM \"); \u003c/span\u003e\u003cspan class=\"p8 \"\u003edoc.async\n        =\"false\n        \"; \u003c/span\u003e\u003cspan class=\"p8 \"\u003edoc.loadXML(str); \u003c/span\u003e\n    \u003cspan class=\"p6 \"\u003e} \u003c/span\u003e\u003cspan class=\"p4 \"\u003e} catch (err) { \u003c/span\u003e\u003cspan class=\"p6 \"\u003ealert(err.message);\n    \u003c/span\u003e\u003cspan class=\"p4 \"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n    \u003cp\u003e 注意， XMLHttpRequest 对象也可以解析 XML 文档。可以参考 XMLHttpRequest 的 responseXML 属性。 \u003c/p\u003e\n    \u003ch5\u003eXMLSerializer\u003c/h5\u003e\n    \u003cp\u003e 使用 XMLSerializer 对象可将一个 XML 文档或 Node 对象序列化为一个 XML 格式的字符串。 \u003c/p\u003e\n    \u003cp\u003e 要使用 XMLSerializer ，首先使用不带参数的构造函数实例化它，然后调用其 serializeToString() 方法。 \u003c/p\u003e\n    \u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003evar serializer = new XMLSerializer();\u003c/span\u003e\u003c/div\u003e\n    \u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003evar xmlString = serializer.serializeToString(doc);\u003c/span\u003e\u003c/div\u003e\n    \u003cp\u003eserializeToString() 方法的语法格式如下： \u003c/p\u003e\n    \u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003eserializeToString(node) \u003c/span\u003e\u003c/div\u003e\n    \u003cp\u003e 参数 node 是要序列化的 XML 节点，可能是文档中的一个 Document 对象或者任何 Element 。 \u003c/p\u003e\n    \u003cp\u003eIE9 和其它主流浏览器都支持 XMLSerializer 对象，但 IE8 及以下版本不支持该对象。可以使用 MSXML 的 Node 对象的 xml 属性使 XML 变为字符串。例如下面的代码是一个浏览器兼容性的做法。\n    \u003c/p\u003e\n    \u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003e\u003c/span\u003e\u003cspan class=\"p2 \"\u003evar doc = oXMLHttpRequest.responseXML; \u003c/span\u003e\u003cspan\n            class=\"p2 \"\u003eif (window.XMLSerializer) { \u003c/span\u003e\u003cspan class=\"p4 \"\u003evar serializer = new XMLSerializer();\n        \u003c/span\u003e\u003cspan class=\"p4 \"\u003evar xmlString = serializer.serializeToString(doc); \u003c/span\u003e\n        \u003cspan class=\"p2 \"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4 \"\u003evar xmlString = doc.xml; \u003c/span\u003e\u003cspan class=\"p2 \"\u003e}\u003c/span\u003e\n    \u003c/div\u003e\n    \u003ch5\u003eDOMImplementation\u003c/h5\u003e\n    \u003cp\u003e 在浏览器中，要创建一个 Document 对象，可以使用 DOMParser ，也可以使用 DOMImplementation ， DOMImplementation 使用 document.implementation\n        属性返回，然后使用 DOMImplementation 对象的 createDocument() 方法就可以创建 Document 对象。 \u003c/p\u003e\n    \u003cp\u003ecreateDocument() 方法的语法格式如下： \u003c/p\u003e\n    \u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003ecreateDocument(namespaceURI, qualifiedName, doctype)\u003c/span\u003e\u003c/div\u003e\n    \u003cp\u003e 参数说明： \u003c/p\u003e\n    \u003cul\u003e\n        \u003cli\u003e 参数 namespaceURI 表示 Document 对象所使用的命名空间 URI 字符串 \u003c/li\u003e\n        \u003cli\u003e 参数 qualifiedName 表示文档根元素的名称 \u003c/li\u003e\n        \u003cli\u003e 参数 doctype 表示要创建的文档的类型。目前，浏览器中的 JavaScript 解析器并不支持文档类型，所以该参数总是为 null\u003c/li\u003e\n    \u003c/ul\u003e\n    \u003cp\u003e 例如下面的代码创建一个新的空 Document 对象。 \u003c/p\u003e\n    \u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003evar oDOMImpl = document.implementation;\u003c/span\u003e\u003cspan class=\"p \"\u003evar doc =\n            oDOMImpl.createDocument( \" \", \" \", null);\u003c/span\u003e\u003c/div\u003e\n    \u003cp\u003e 再看下面的代码，这将创建一个 XHTML1.0 文档。 \u003c/p\u003e\n    \u003cdiv class=\"c \"\u003e\u003cspan class=\"p \"\u003evar oDOMImpl = document.implementation;\u003c/span\u003e\u003cspan class=\"p \"\u003evar doc =\n            oDOMImpl.createDocument( \"\u0026lt; href=\"http://www.w3.org/1999/xhtml\" \" rel=\"nofollow\n            \"\u0026gt;http://www.w3.org/1999/xhtml\"\u0026lt;/a\u0026gt;;, \"html \",\n            null);\u003c/span\u003e\n        \u003cspan class=\"p\"\u003ealert((new XMLSerializer()).serializeToString(doc));\u003c/span\u003e\n    \u003c/div\u003e\n    \u003cp\u003e 一旦创建了 Document 对象，就可以使用标准的核心 DOM 方法操作文档了，例如下面的代码： \u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oDOMImpl =\n        document.implementation; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar doc = oDOMImpl.createDocument( \" \u0026lt; href =\n        \"http://www.zhang-yafei.com/w3/\"\" \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003erel = \"nofollow\" \u0026gt; http: //www.zhang-yafei.com/w3/\"\u0026lt;/a\u0026gt;;, \u003c/span\u003e\u003cspan class=\"p4\"\u003e\"book \",\n        null); \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 返回根元素，然后就可以使用前面介绍的标准 DOM 接口处理文档了 \u003c/span\u003e\u003cspan class=\"p2\"\u003evar root =\n        doc.documentElement; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 创建一个 p 元素节点 \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oElementNode = doc.createElement( \"p \"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 创建一个文本节点 \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oTextNode = doc.createTextNode( \"JavaScript 权威指南 \");\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 追加节点 \u003c/span\u003e\u003cspan class=\"p2\"\u003eoElementNode.appendChild(oTextNode); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eroot.appendChild(oElementNode); \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 查看内容 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert((new XMLSerializer()).serializeToString(doc)); \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n    \u003cp\u003eDOMImplementation.createDocument() 方法在 IE8 及以下版本浏览器上无法执行，所以考虑到浏览器兼容性问题，下面是一个兼容性做法。 \u003c/p\u003e\n    \u003cdetails\u003e\n        \u003csummary\u003e 例 \u003c/summary\u003e\n        \u003c class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar oDOMImpl = document.implementation; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif\n                (oDOMImpl.createDocument) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar doc = oDOMImpl.createDocument(str,\n                \"html \", null); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else if (window.DOMParser) { \u003c/span\u003e\n            \u003cspan class=\"p4\"\u003evar parser = new DOMParser(); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar doc = parser.parseFromString(\n                'xmlstr ', \"text / xml \"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar doc = new\n                ActiveXObject( \"Microsoft.XMLDOM \"); \u003c/span\u003e\n            \u003cspan class=\"p4\"\u003edoc.async = \"false \"; \u003c/span\u003e\u003cspan class=\"p4\"\u003edoc.loadXML( 'xmlstr '); \u003c/span\u003e\u003cspan\n                class=\"p2\"\u003e}\u003c/span\u003e\n        \u003c/\u003e\n    \u003c/details\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ XHR 2","title":"处理值"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","XHR 2","处理值"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
