                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e文本节点由 Text 类型表示，包含纯文本内容，或转义以后的 HTML 字符，但不能包含 HTML 代码。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enodeType 值为3 \u003c/li\u003e\n    \u003cli\u003enodeName 值为 \"#text\"\u003c/li\u003e\n    \u003cli\u003enodeValue 值为节点所包含的文本\u003c/li\u003e\n    \u003cli\u003eparentNode 值为一个 Element 节点\u003c/li\u003e\n    \u003cli\u003e不包含子节点\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e访问文本节点\u003c/h5\u003e\n\u003cp\u003e使用 nodeValue 或 data 属性可访问文本节点包含的文本。使用 length 属性可以获取文本的长度，利用该属性可以遍历文本节点的每一个字符。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e使用 innerText 属性可以更直接的读取元素文本，但 innerText 不是标准用法，需要考虑浏览器的兼容性。\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e//获取指定元素包含的文本\u003c/span\u003e\u003cspan class=\"p\"\u003e//参数：e表示指定的元素\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e//返回值：返回包含的所有文本，包括子元素包含的文本\u003c/span\u003e\u003cspan class=\"p\"\u003efunction text(e){\u003c/span\u003e\u003cspan class=\"p2\"\u003evar s =\n        \"\";\u003c/span\u003e\u003cspan class=\"p2\"\u003evar e = e.childNodes || e;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efor (var i = 0 ;i \u0026lt; e.length; i++){\u003c/span\u003e\u003cspan class=\"p4\"\u003es += e[i].nodeType != 1 ?\n        e[i].nodeValue : text(e[i].childNodes);\u003c/span\u003e\u003cspan class=\"p4\"\u003e// 通过递归遍历所有的子节点\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003ereturn s;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e创建文本节点\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.createTextNode(data);\u003c/span\u003e\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e由于 DOM 操作 的原因，可能出现文本节点不含文本，或者出现两个文本节点的情况。为了避免这种情况，一般在父元素上使用 normalize() 方法，删除空的文本节点，合并相邻的文本节点 。\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar element = document.createElement(\"div\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar textNode =\n        document.createTextNode(\"hello\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003eelement.appendChild(textNode); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003evar anotherTextNode = document.createTextNode(\" world!\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eelement.appendChild(anotherTextNode); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.body.appendChild(element);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(element.childNodes.length);\n        \u003cspan class=\"r\"\u003e// 2 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eelement.normalize(); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(element.childNodes.length); \u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(element.firstChild.nodeValue); \u003cspan class=\"r\"\u003e// 返回 \"hello World\" \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e操作文本节点\u003c/h5\u003e\n\u003cp\u003e使用下列方法操作文本节点\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eappendData(string)\u003c/li\u003e\n    \u003cli\u003edeleteData(start,length)\u003c/li\u003e\n    \u003cli\u003einsertData(start,string)\u003c/li\u003e\n    \u003cli\u003ereplaceData(start,length,string)\u003c/li\u003e\n    \u003cli\u003esplitText(offset) 在 offset 下标位置把一个Text 节点分割成两个节点\u003c/li\u003e\n    \u003cli\u003esubstringData(start,length) 从 start 开始位置开始提取 length 个字符\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e在默认情况下，每个可以包含内容的元素最多只能有一个文本节点，而且必须有内容存在。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e读取HTML 字符串\u003c/h5\u003e\n\u003cp\u003e使用 innerHTML 属性可以返回调用的元素包含的所有子节点对应的HTML 标记字符串。最初，是 IE 特有属性，但是，后来得到了 HTML 5的规范，并得到所有浏览器支持。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e早期 Mozilla 浏览器的 innerHTML 属性返回值不包含 style 元素。早期 IE 浏览器会被全部使用大写的形式返回元素的字符名称。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e插入HTML字符串\u003c/h5\u003e\n\u003ch6\u003einnerHTML 属性\u003c/h6\u003e\n\u003cp\u003e使用 innerHTML 属性可以根据传入的字符串创建 DOM 片段。然后用这个片段完全代替调用的所有的子节点。设置 innerHTML 属性后，可以像访问文档其它节点一样访问新建的节点。\u003c/p\u003e\n\u003cp\u003e通过 document.createElement() 和 document.createTextNode() 方法创建表格，代码会非常的长，在一定的情况下，使用 innerHTML 执行更快。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction tableInnerHTML() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar i, h\n        = ['\u0026lt;table border=\"1\" width=\"100%\"\u0026gt;']; \u003c/span\u003e\u003cspan class=\"p4\"\u003eh.push('\u0026lt;thead\u0026gt;'); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eh.push('\u0026lt;tr\u0026gt;\u0026lt;th\u0026gt;id\u0026lt;\\/th\u0026gt;\u0026lt;th\u0026gt;yes?\u0026lt;\\/th\u0026gt;\u0026lt;th\u0026gt;name\u0026lt;\\/th\u0026gt;\u0026lt;th\u0026gt;url\u0026lt;\\/th\u0026gt;\u0026lt;th\u0026gt;action\u0026lt;\\/th\u0026gt;\u0026lt;\\/tr\u0026gt;');\n    \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eh.push('\u0026lt;\\/thead\u0026gt;'); \u003c/span\u003e\u003cspan class=\"p4\"\u003eh.push('\u0026lt;tbody\u0026gt;'); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efor (var i = 1; i \u0026lt;= 100; i++) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eh.push('\u0026lt;tr\u0026gt;\u0026lt;td\u0026gt;');\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eh.push(i); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eh.push('\u0026lt;\\/td\u0026gt;\u0026lt;td\u0026gt;') \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eh.push('And the answer ... is ' + (i % 2 ? 'yes' : 'no')); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eh.push('\u0026lt;\\/td\u0026gt;\u0026lt;td\u0026gt;'); \u003c/span\u003e\u003cspan class=\"p6\"\u003eh.push('My name is #' + i);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eh.push('\u0026lt;\\/td\u0026gt;\u0026lt;td\u0026gt;'); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eh.push('\u0026lt;a href=\"https:/\\/exmple.org/' + i + '.html\"\u0026gt;https:/\\/example.org' + i +\n        '.html\u0026lt;\\/a\u0026gt;'); \u003c/span\u003e\u003cspan class=\"p6\"\u003eh.push('\u0026lt;\\/td\u0026gt;\u0026lt;td\u0026gt;'); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eh.push('\u0026lt;ul\u0026gt;'); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eh.push('\u0026lt;li\u0026gt;\u0026lt;a href=\"edit.php?id=\"' + i + '\"\u0026gt;edit\u0026lt;\\/a\u0026gt;\u0026lt;\\\u003cspan class=\"r\"\u003e//\n            li\u0026gt;'); \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003eh.push('\u0026lt;li\u0026gt;\u0026lt;a href=\"delete.php?id=\"\u0026gt;' + i +\n        '-id001\"\u0026gt;delete\u0026lt;\\/a\u0026gt;\u0026lt;\\/li\u0026gt;'); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eh.push('\u0026lt;\\/ul\u0026gt;'); \u003c/span\u003e\u003cspan class=\"p6\"\u003eh.push('\u0026lt;\\/td\u0026gt;'); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eh.push('\u0026lt;\\/tr\u0026gt;'); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eh.push('\u0026lt;\\/tbody\u0026gt;'); \u003c/span\u003e\u003cspan class=\"p4\"\u003eh.push('\u0026lt;\\table\u0026gt;'); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edocument.getElementById(\"here\").innerHTML = h.join(''); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}; \u0026lt;/script\u0026gt; \u0026lt;div id=\"here\"\u0026gt;\u0026lt;/div\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003etableInnerHTML(); \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e使用 innerHTML() 也有很大的限制。例如，在很多浏览器中，通过 innerHTML() 插入的 \u0026lt;script\u0026gt; 标记后，并不会执行其中的代码。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e实际返回的文本内容会因浏览器而不同。IE 和 Opera 会把所有元素标签转换为大写，而 Safari、 Chrome 和 Firefox 则会按照文档源代码的格式返回，包含空格和缩进。因此不要指望不同浏览器的\n    innerHTML 会返回完全一样的值。\u003c/p\u003e\n\u003ch6\u003einsertAdjacentHTML() 方法\u003c/h6\u003e\n\u003cp\u003e插入 HTML 标记另一种方法就是 insertAdjacentHTML() 方法。这个方法也是最早在 IE 中出现，后来被 HTML 5 采用。\u003c/p\u003e\n\u003cp\u003einsertAdjacentHTML() 方法有两个参数，第一个是设置插入的位置，第二个参数传入要插入的 HTML 代码。第一个参数必须是下列的值:\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e\"beforebegin\" 在当前元素之前插入一个紧邻的同辈元素\u003c/li\u003e\n    \u003cli\u003e\"afterbegin\" 在当前元素之下插入一个新的子元素，或在第一个子元素之前插入新的子元素\u003c/li\u003e\n    \u003cli\u003e\"beforeend\" 在当前元素之下插入一个新的子元素，或在最后一个子元素之后再插入一个新的子元素\u003c/li\u003e\n    \u003cli\u003e\"afterend\" 在当前元素之后插入一个紧邻的同辈元素\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p6\"\u003eborder: solid\n        1px red; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 6px; \u003c/span\u003e\u003cspan class=\"p6\"\u003epadding: 6px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003eh2 { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003emargin: 6px; \u003c/span\u003e\u003cspan class=\"p6\"\u003epadding: 0; \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-size: 16px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"box1\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;h2\u0026gt;insertAdjacentHTML(\u0026quot;beforebegin\u0026quot;,\n        \u0026quot;\u0026lt;p\u0026gt;beforebegin\u0026lt;/p\u0026gt;\u0026quot;)\u0026lt;/h2\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"box2\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;h2\u0026gt;insertAdjacentHTML(\u0026quot;afterbegin\u0026quot;,\n        \u0026quot;\u0026lt;p\u0026gt;afterbegin\u0026lt;/p\u0026gt;\u0026quot;)\u0026lt;/h2\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;div id=\"box3\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;h2\u0026gt;insertAdjacentHTML(\u0026quot;beforeend\u0026quot;,\n        \u0026quot;\u0026lt;p\u0026gt;beforeend\u0026lt;/p\u0026gt;\u0026quot;)\u0026lt;/h2\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;div id=\"box4\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;h2\u0026gt;insertAdjacentHTML(\u0026quot;afterend\u0026quot;,\n        \u0026quot;\u0026lt;p\u0026gt;afterend\u0026lt;/p\u0026gt;\u0026quot;)\u0026lt;/h2\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edocument.getElementById(\"box1\").insertAdjacentHTML(\"beforebegin\",\n        \"\u0026lt;p\u0026gt;beforebegin\u0026lt;/p\u0026gt;\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003edocument.getElementById(\"box2\").insertAdjacentHTML(\"afterbegin\",\n        \"\u0026lt;p\u0026gt;afterbegin\u0026lt;/p\u0026gt;\"); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edocument.getElementById(\"box3\").insertAdjacentHTML(\"beforeend\", \"\u0026lt;p\u0026gt;beforeend\u0026lt;/p\u0026gt;\");\n    \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003edocument.getElementById(\"box4\").insertAdjacentHTML(\"afterend\", \"\u0026lt;p\u0026gt;afterend\u0026lt;/p\u0026gt;\");\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e替换 HTML 字符串\u003c/h5\u003e\n\u003cp\u003eoutHTML 也是 IE 私有属性，后来被HTML5 规范，与 innerHTML 一样，但是它会包含元素自身。在读入模式下，outerHTML 返回调用它的元素及所有的子节点的 HTML 标签；在写入模式下，outHTML\n    会根据指定的 HTML 字符串创建新的 DOM子树，然后用这个 DOM 子树完全替代调用元素。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;Document\u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eli { \u003c/span\u003e\u003cspan class=\"p6\"\u003eborder: soild 1px red; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 12px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eh2 { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eborder-bottom: double 3px blue; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt;\n        \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;h1\u0026gt;单击回答问题\u0026lt;/h1\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;ul\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;li\u0026gt;你叫什么？\u0026lt;/li\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;li\u0026gt;你喜欢 JS 么？\u0026lt;/li\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/ul\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar ul = document.getElementsByTagName(\"ul\")[0];\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar lis = ul.getElementsByTagName(\"li\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003elis[0].onclick = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.innerHTML =\n        \"\u0026lt;h2\u0026gt;我是一个学者\u0026lt;\\/h2\u0026gt;\" \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003elis[1].onclick = function()\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.outerHTML = \"\u0026lt;h2\u0026gt;当然喜欢\u0026lt;\\/h2\u0026gt;\" \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u0026lt;/body\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在使用 innerHTML 和 outHTML 同时，应删除被替换元素的所有事件处理程序和 javaScript 对象属性。\u003c/p\u003e\n\u003ch5\u003e插入文本\u003c/h5\u003e\n\u003cp\u003einnerText 和 outerText 也是 IE 的私有属性，尚未被 HTML 5 纳入规范，但是却很实用。\u003c/p\u003e\n\u003ch6\u003einnerText 属性\u003c/h6\u003e\n\u003cp\u003einnerText 在指定的元素中插入文本，如果文本中包含 HTML 字符串，将被编码显示。也可以使用该属性读取指定元素包含的全部嵌套信息的文本信息。\u003c/p\u003e\n\u003cp\u003eFirefox 不支持 innerText ，但支持功能类似的 textContent 属性。 textContent 是 DOM Level 3 规定的一个属性，支持 textContent 属性的浏览器还有 IE9+\n    、Safari 3+ 、Opera 10+ 、chrome。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction getInnerText(element) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn (typeof\n        element.textContent === \"string\") ? element.textContent : element.innerText; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction setInnerText(element, text) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (typeof element.textContent == \"string\") { \u003c/span\u003e\u003cspan class=\"p6\"\u003eelement.textContent =\n        text; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003eelement.innerText = text; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eouterText\u003c/h6\u003e\n\u003cp\u003eouterText 功能与 innerText 类似，但是它覆盖原有元素。\u003c/p\u003e\n\u003ch5\u003e读写文本\u003c/h5\u003e\n\u003cp\u003einnerText 和 outText 也是 IE 的私有属性，但尚未被 HTML5 所纳入规范。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ DOM","title":"文本节点"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","DOM","文本节点"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
