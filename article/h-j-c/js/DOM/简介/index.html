    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e当一个HTML网页被加载到浏览器中时，浏览器会首先解析该网页文档，将其解析为文档对象模型（Document Object Model, DOM）。\u003c/p\u003e\n\u003cp\u003eDOM是W3C制定的一个规范，是独立于平台和语言的一系列接口定义，应用程序通过实现这些接口，使用户可以通过固定的方式访问和修改文档的内容、结构和样式，而不论使用哪种语言编写应用程序，也不论在哪个平台上运行应用程序。这有利于不同软件之间的相互兼容，从而有利于降低开发和创作成本。例如，如果所有的浏览器都支持使用DOM接口定义的方法来处理HTML文档中的内容、结构和样式，那么对于网页创作者来说，就可以大大降低因为考虑浏览器兼容性所花费的时间和成本。\n\u003c/p\u003e\n\u003cp\u003e对于HTML网页，文档对象模型是HTML文档在内存中的表示形式，它是一个应用程序接口，定义了该文档的逻辑结构以及一套访问和处理文档的方法。例如，客户端浏览器是一个处理HTML文档的应用程序，它必须将HTML文档解析成DOM才能够以编程方式读取、操作和呈现HTML文档。\n\u003c/p\u003e\n\u003ch5\u003e了解DOM\u003c/h5\u003e\n\u003cp\u003eDOM（文档对象模型）既可以用于处理HTML文档，也可以用于处理XML文档。并且，DOM有多个版本：Level1、Level2和Level3，每个版本都是对前一版本的提高，最早的Level1仅包含DOM HTML和DOM\n    Core，而DOM Level2规范簇包含如下6个规范：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eDocument Object Model Level 2 Core\u003c/li\u003e\n    \u003cli\u003eDocument Object Model Level 2 Views\u003c/li\u003e\n    \u003cli\u003eDocument Object Model Level 2 Events\u003c/li\u003e\n    \u003cli\u003eDocument Object Model Level 2 Style\u003c/li\u003e\n    \u003cli\u003eDocument Object Model Level 2 Traversal and Range\u003c/li\u003e\n    \u003cli\u003eDocument Object Model Level 2 HTML\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e目前，大部分浏览器软件都可以部分或全部实现DOM Level2规范簇，HTML5DOM API也都是大量基于DOM Level2规范簇的，这也是本书为何介绍DOM Level2的原因。\u003c/p\u003e\n\u003cp\u003eDOM是文档在内存中的表示形式，它是一个应用程序接口，定义了该文档的逻辑结构以及一套访问和处理文档的方法。例如，客户端浏览器是一个处理HTML和XML文档的应用程序，它必须将HTML或XML文档解析成DOM才能够以编程方式读取、操作和呈现HTML或XML。\n\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e访问\u003ca href=\"http:www.w3.org/2003/02/06-dom-support.html\" target=\"_blank\"\n            rel=\"noopener noreferrer\"\u003ehttp:www.w3.org/2003/02/06-dom-support.html\u003c/a\u003e页面,会自动显示当前浏览器对 DOM的支持情况。在于符合标准的\n        DOM 合作方面，IE （早期版本）的怪异模式是最差的，仅支持 HTML 1.0 模块。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003eDOM基于节点树的表现形式\u003c/h5\u003e\n\u003cp\u003eDOM文档中的逻辑结构可以用节点树的形式进行表述，通过对HTML文件的解析处理，HTML文件中的元素便转化为DOM文档中的节点对象，而DOM文档中的树形结构也被称为HTML文档树。\u003c/p\u003e\n\u003cp\u003eDOM的文档节点有Document、Element、Comment、Type、Text等类型，其中，每一个DOM文档必须有一个Document节点，作为节点树的根节点。html元素就是根节点，它可以有子节点或者属性节点，如Text、Comment类型的节点等。任何格式良好的HTML文件中的每一个元素均有DOM文档中的一个节点类型与之对应。\n\u003c/p\u003e\n\u003cp\u003eDOM基于节点的浏览使用与HTML文档对象模型相同的格式描绘HTML文档对象（DOM），实际上，一个HTML文档对象就代表一个DOM对象。\u003c/p\u003e\n\u003ch6\u003e使用DOM查看器\u003c/h6\u003e\n\u003cp\u003e在DOM基于节点的浏览中，文档包含了节点层级树：每一节点包含一个DOM节点类型、一个节点名和一个节点值。节点类型包括元素、注释、文字等。DOM将文档对象和它包含的每一个元素构造进多个不同类型的节点，并提供了可视化的文档结构图。使用Firefox浏览器提供的\"DOM查看器\"窗口，可以清楚地查看HTML文档的DOM信息。\n\u003c/p\u003e\n\u003ch6\u003e关于节点类型\u003c/h6\u003e\n\u003cp\u003e注意，节点中有很多空白字符构成的文本节点（名为#text），在使用DOM方法处理文档时需要注意这些节点，主要是对节点类型做出判断。\u003c/p\u003e\n\u003cul class=\"line4\" id=\"this_o\"\u003e\n\u003c/ul\u003e\n\u003cscript\u003e\n    var this_o = [\"DOCTYPE: html\", \"html\", \"head\", \"#text:\", \"title\", \"#text: Sample page\", \"#text:\", \"#text:\", \"body\", \"#text:\", \"h1\", \"#text: Sample page\", \"#text:\", \"li\", \"#text: This is a\", \"a href =\\\"demo.html \\\"\", \"#text: simple\", \"#text: sample.\", \"#text:\", \"#comment: this is a comment\", \"#text:\"];\n    _MiMethod.li(\"this_o\");\n\u003c/script\u003e\n\u003ch5\u003eHTML DOM\u003c/h5\u003e\n\u003cp\u003e核心DOM也是W3C制定的规范，但HTML DOM定义了用于操作HTML文档的专用API，是对核心DOM的扩展。目前主流的浏览器都支持HTML DOM，这也是实现跨浏览器操作的关键。相对于核心DOM，制定HTML\n    DOM的主要目的在于：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e指定和添加特用于HTML文档和元素的API\u003c/li\u003e\n    \u003cli\u003e实现与DOM Level 0的兼容\u003c/li\u003e\n    \u003cli\u003e提供一种便利的机制，适于对HTML文档的一般性操作\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e这里提到的DOM Level 0没有特定的规范，一般是指对Netscape Navigator version 3.0和Microsoft Internet Explorer version\n    3.0所提供的动态操控HTML文档功能的一种混合的称呼。直到目前为止，为了和DOM Level 0兼容，很多属性和方法仍被采用，而且大多数浏览器都支持这些方法和属性。\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e扩展 ——--⊱⊱⊱⊱⊱ 详细\u003c/summary\u003e\n    \u003ch5\u003eHTML DOM和核心DOM的区别与联系\u003c/h5\u003e\n    \u003cp\u003eHTML DOM和核心DOM的不同之处在于：HTML DOM提供了大量便利的方法和属性，这些方法和属性与现有的程序模型一致，更便于脚本编写者控制。\u003c/p\u003e\n    \u003cp\u003eHTML\n        DOM的很多对象模型来自于核心DOM，例如，HTMLDocument接口继承自核心DOM的Document接口，但HTMLDocument包含有专用于HTML文档操作的方法和属性，window.document对象是接口的实现；HTMLElement接口继承自核心DOM的Element接口，但HTMLElement包含有专用于HTML元素操作的方法和属性，使用这些方法和属性可以便利地获取和修改HTML元素。\n    \u003c/p\u003e\n    \u003cp\u003e在HTML DOM中，使用特殊的字符串表示一些基本数据类型。\u003c/p\u003e\n    \u003ch5\u003e什么是接口\u003c/h5\u003e\n    \u003cp\u003e信息技术领域内的接口（Interface）是标准和规范在程序开发中的一个表达形式。\u003c/p\u003e\n    \u003cp\u003e在软件领域内，最常看到的接口定义是面向对象开发语言中使用interface关键字所定义的接口，它经常与使用class关键字定义的类联系在一起，但是要记住的是，接口是规范，类是实现。\u003c/p\u003e\n    \u003cp\u003e之所以在面向对象开发领域中定义interface，是为了更便于表达规范，从而使开发者更容易理解。例如HTMLDocument接口就是一个接口定义，所有的开发者都可以清楚地理解该接口所定义的成员，从而根据该接口定义实现。在面向对象开发的语言中，接口的实现也就是类，或者说类是接口的实现。\n    \u003c/p\u003e\n    \u003cp\u003e在硬件领域中，接口经常表现为一种物理形态，例如USB接口、PS2接口、打印机接口等，虽然这些接口的物理形态各不相同，但是作为一个开发人员，应该认识到，这些物理形态是为了便于非专业人员使用而制造的，接口本质上还是为软件开发者编写驱动而定义的规范。\n    \u003c/p\u003e\n    \u003cp\u003e每个HTML元素都使用一个接口来描述，接口中定义了该元素可以使用程序代码动态控制的方法、属性和事件，例如下面是Object元素接口的定义：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003einterface HTMLObjectElement : HTMLElement {\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eattribute DOMString data;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eattribute DOMString type;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eattribute DOMString name;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eattribute DOMString useMap;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ereadonly attribute HTMLFormElement form;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eattribute DOMString width;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eattribute DOMString height;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ereadonly attribute Document contentDocument;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ereadonly attribute WindowProxy contentWindow;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ereadonly attribute boolean willValidate;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ereadonly attribute ValidityState validity;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ereadonly attribute DOMString validationMessage;\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eboolean checkValidity();\u003c/span\u003e\n        \u003cspan class=\"p2\"\u003evoid setCustomValidity(in DOMString error);\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n    \u003c/code\u003e\n    \u003cp\u003e该接口继承HTMLElement接口，HTMLElement接口是所有HTML元素的基接口。HTML元素接口的命名有些规则可循（元素名首字母大写）：\u003c/p\u003e\n    \u003cp\u003eHTML元素名Element。\u003c/p\u003e\n    \u003cp\u003e接口中属性定义使用attribute标示，紧跟其后的是该属性值的数据类型，例如data就是一个属性，属性值的数据类型是DOMString：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eattribute DOMString data;\u003c/span\u003e\u003c/code\u003e\n    \u003cp\u003e事件定义使用attribute标示，但紧跟其后的是Function关键字，例如onabort事件的定义如下：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eattribute Function onabort;\u003c/span\u003e\u003c/code\u003e\n    \u003cp\u003e方法定义不使用attribute标示，表示为返回值和方法签名，如果该方法没有返回值，那么就使用void关键字来标示。例如下面就是一个方法定义：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evoid setCustomValidity(in DOMString error);\u003c/span\u003e\u003c/code\u003e\n    \u003ch5\u003e文档对象类型\u003c/h5\u003e\n    \u003cp\u003e文档对象类型(Document Object Model,DOM)是针对 XML 但经过扩展应用于 HTML 的应用程序编程序接口(API)。\u003c/p\u003e\n    \u003cp\u003e借助 DOM 提供的API，开发人员可以自如地添加、删除、替换、修改任何节点 。\u003c/p\u003e\n    \u003cul\u003e\n        \u003cli\u003eDOM 视图（DOM Views）：定义跟踪不同文档视图接口\u003c/li\u003e\n        \u003cli\u003eDOM 事件（DOM Events）：定义了事件和事件的处理接口\u003c/li\u003e\n        \u003cli\u003eDOM 样式（DOM Style）：定义基于CSS为元素的应用样式接口\u003c/li\u003e\n        \u003cli\u003eDOM 遍历和范围（DOM Traversal and Range）：定义遍历和操作文档树的接口\u003c/li\u003e\n    \u003c/ul\u003e\n    \u003cp\u003e除了DOM核心和DOM HTML 接口之外，另外几种语言还发布了针对自己的DOM接口 。\u003c/p\u003e\n    \u003cul\u003e\n        \u003cli\u003eSVG 可伸缩矢量图\u003c/li\u003e\n        \u003cli\u003eMathematical Markup Language 数学标记语言\u003c/li\u003e\n        \u003cli\u003eSMIL 同步多媒体集成语言\u003c/li\u003e\n    \u003c/ul\u003e\n    \u003cp\u003eDocument对象代表浏览器窗口中的文档。该对象是Window对象的子对象。由于Window对象是DOM对象模型中的默认对象，因此Window对象中的方法和子对象不需要使用Window来引用。通过Document对象可以访问HTML文档中包含的任何HTML标记，并可以动态地改变HTML标记中的内容，如表单、图像、表格和超链接等。\n    \u003c/p\u003e\n    \u003cp\u003e\"文档对象模型\"（Document Object Model，DOM）是对文档及其内容的抽象表示。\u003c/p\u003e\n    \u003cp\u003eDocument（文档）对象是浏览器Window（窗口）对象的一个主要部分。它包含了网页显示的各个元素对象，是最常用的对象之一。\u003c/p\u003e\n    \u003cp\u003e每次浏览器要加载和显示页面时，都需要解释（更专业的术语是\"解析\"）构成页面的HTML源代码。在解析过程中，浏览器建立一个内部模型来表示文档里的内容，这个模型就是DOM。在浏览器渲染页面的可见内容时，就会引用这个模型。可以使用JavaScript来访问和编辑这个DOM的各个部分，从而改变页面的显示内容和用户交互的方式。\n    \u003c/p\u003e\n    \u003cp\u003e只有当页面完成加载之后，DOM才是可用的。在这之前不要执行关于DOM的语句，否则很可能导致错误。\u003c/p\u003e\n    \u003ch5\u003ewindow和document对象\u003c/h5\u003e\n    \u003cp\u003e中window对象的其它子对象还有location（包含着当前页面URL的详细信息）、history（包含浏览器以前访问的页面地址）和navigator（包含浏览器类型、版本和兼容的信息）。\u003c/p\u003e\n    \u003ch5\u003edocument 对象\u003c/h5\u003e\n    \u003cp\u003e使用window.document属性可以返回一个document对象，它代表当前window或指定window对象内加载的文档。\u003c/p\u003e\n    \u003cp\u003e用户可以使用下面的语法格式访问一个窗口内的document对象：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etheWindow.document\u003c/span\u003e\u003c/code\u003e\n    \u003cp\u003e其中，theWindow是一个窗口的名称，对于当前窗口，可以使用下面的语法访问document对象：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewindow.document\u003c/span\u003e\u003c/code\u003e\n    \u003cp\u003e由于window可以省略，所以经常用document就可以直接访问当前文档的document对象。\u003c/p\u003e\n\u003c/details\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ DOM","title":"简介"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","DOM","简介"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
