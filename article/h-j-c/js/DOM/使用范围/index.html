    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e创建范围\u003c/h5\u003e\n\u003cp\u003edocument 对象定义了 createRange() 方法，使该方法可以创建使用范围。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar range = document.createRange() \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e创建了范围之后，就可以使用它之后在后台选择文档中的特定的部分。当设置了范围的位置之后，还可以针对范围的内容执行各种操作，从而实现对 DOM 结构更精细的控制。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e每个范围都有两个边界点，一个是开始点，一个是结束点。每个边界点由一个节点元素和该节点的偏移量指定。该节点通常是 Element 节点、Document 节点、或 Text 节点。对于 Element\n        节点，偏移量是指该节点的子节点。例如，偏移量为 0 ，说明边界点位于该边界点的第一个字边界点之前；偏移量为 1 ，说明边界点位于该该边界点的第一个子节点之后，第二个子节点之前。如果边界点是 Text\n        节点，偏移量是指文本的两个字符之间的位置。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e范围实际上就是 Range 类型的对象实例，它拥有许多属性和方法。\u003c/p\u003e\n\u003ctable id=\"this_a\"\u003e\n    \u003ccaption\u003e范围的属性列表\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ctable id=\"this_b\"\u003e\n    \u003ccaption\u003e范围的方法\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e方法\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e选择范围\u003c/h5\u003e\n\u003cp\u003e创建范围之后，可以使用范围来选择文档中的一部分。其中最简单的就是 selectNode() 或 selectNodeContents。这两个方法都接受一个参数，即一个 DOM\n    节点，然后再使用该节点中的信息来填充范围。用法如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eselectNode(refNode); \u003c/span\u003e\u003cspan class=\"p2\"\u003eselectNodeContents(refNodes);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e参数 refNode 为 DOM 节点。selectNOde() 方法将把范围的内容设置在指定的 refNode 节点，也就是选中那个节点和它的子孙节点；但是， selectNodeContents()\n    方法\"选中\"的范围不包含 refNode 节点，仅包含 refNode 的子节点。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;Document\u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edl { \u003c/span\u003e\u003cspan class=\"p6\"\u003efloat: left; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 4px 20px; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eborder: solid 1px blue; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003epadding: 12px; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003edl span { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ecolor: #f00; \u003c/span\u003e\u003cspan class=\"p6\"\u003efloat: right; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003edd { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 360px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003efooter { \u003c/span\u003e\u003cspan class=\"p6\"\u003edisplay: none; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction\n        createrange() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar range1 = document.createRange(); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar range2 =\n        document.createRange(); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar main = document.getElementById(\"main\"); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003erange1.selectNode(main); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003erange2.selectNodeContents(main); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar footer = document.getElementsByTagName(\"footer\")[0]; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003efooter.style.display = \"block\"; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.getElementById(\"txtStartContainer1\").textContent = range1.startContainer.tagName;\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.getElementById(\"txtStartOffset1\").textContent = range1.startOffset; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.getElementById(\"txtEndContainer1\").textContent = range1.endContainer.tagName;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.getElementById(\"txtEndOffset1\").textContent = range1.endOffset; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.getElementById(\"txtCommonAncestor1\").textContent =\n        range1.commonAncestorContainer.tagName; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.getElementById(\"txtStartContainer2\").textContent = range2.startContainer.tagName;\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.getElementById(\"txtStartOffset2\").textContent = range2.startOffset; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003edocument.getElementById(\"txtEndContainer2\").textContent = range2.endContainer.tagName;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.getElementById(\"txtEndOffset2\").textContent = range2.endOffset; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.getElementById(\"txtCommonAncestor2\").textContent =\n        range2.commonAncestorContainer.tagName; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt;\n        \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;section id=\"wrap\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;article id=\"main\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;h1\u0026gt;游子吟\u0026lt;/h1\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u0026lt;h2\u0026gt;孟郊\u0026lt;/h2\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;p\u0026gt;慈母手中线，游子身上衣；临行密密行，意恐迟迟归。\u0026lt;/p\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/article\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;header\u0026gt;\u0026lt;input type=\"button\" value=\"创建范围\" onclick=\"createrange()\" /\u0026gt;\u0026lt;/header\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;footer\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;dl\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e\u0026lt;dd\u0026gt;范围1\u0026lt;/dd\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;dd\u0026gt;Start Container(开始点的父节点)：\u0026lt;span id=\"txtStartContainer1\"\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/dd\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;dd\u0026gt;start Offset(开始点的偏移量)：\u0026lt;span\n        id=\"txtStartOffset1\"\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/dd\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;dd\u0026gt;End Container（结束点的父节点）：\u0026lt;span id=\"txtEndContainer1\"\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/dd\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;dd\u0026gt;End Offset（结束点的偏移量）：\u0026lt;span id=\"txtEndOffset1\"\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/dd\u0026gt;\n    \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;dd\u0026gt;Common Ancestor（共同祖先节点）：\u0026lt;span id=\"txtCommonAncestor1\"\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/dd\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;/dl\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;dl\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e\u0026lt;dd\u0026gt;范围2\u0026lt;/dd\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;dd\u0026gt;Start Container(开始点的父节点)：\u0026lt;span id=\"txtStartContainer2\"\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/dd\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;dd\u0026gt;start Offset(开始点的偏移量)：\u0026lt;span\n        id=\"txtStartOffset2\"\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/dd\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;dd\u0026gt;End Container（结束点的父节点）：\u0026lt;span id=\"txtEndContainer2\"\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/dd\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;dd\u0026gt;End Offset（结束点的偏移量）：\u0026lt;span id=\"txtEndOffset2\"\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/dd\u0026gt;\n    \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;dd\u0026gt;Common Ancestor（共同祖先节点）：\u0026lt;span id=\"txtCommonAncestor2\"\u0026gt;\u0026lt;/span\u0026gt;\u0026lt;/dd\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;/dl\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/footer\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/section\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003csection id=\"wrap\"\u003e\n    \u003carticle id=\"main\"\u003e\n        \u003ch1\u003e游子吟\u003c/h1\u003e\n        \u003ch2\u003e孟郊\u003c/h2\u003e\n        \u003cp\u003e慈母手中线，游子身上衣；临行密密行，意恐迟迟归。\u003c/p\u003e\n    \u003c/article\u003e\n    \u003cheader\u003e\u003cinput type=\"button\" value=\"创建范围\" /\u003e\u003c/header\u003e\n    \u003cfooter\u003e\n        \u003cdl\u003e\n            \u003cdd\u003e范围1\u003c/dd\u003e\n            \u003cdd\u003eStart Container(开始点的父节点)：\u003cspan\u003eSECTION\u003c/span\u003e\u003c/dd\u003e\n            \u003cdd\u003estart Offset(开始点的偏移量)：\u003cspan\u003e1\u003c/span\u003e\u003c/dd\u003e\n            \u003cdd\u003eEnd Container（结束点的父节点）：\u003cspan\u003eSECTION\u003c/span\u003e\u003c/dd\u003e\n            \u003cdd\u003eEnd Offset（结束点的偏移量）：\u003cspan\u003e2\u003c/span\u003e\u003c/dd\u003e\n            \u003cdd\u003eCommon Ancestor（共同祖先节点）：\u003cspan\u003eSECTION\u003c/span\u003e\u003c/dd\u003e\n        \u003c/dl\u003e\n        \u003cdl\u003e\n            \u003cdd\u003e范围2\u003c/dd\u003e\n            \u003cdd\u003eStart Container(开始点的父节点)：\u003cspan\u003eARTICLE\u003c/span\u003e\u003c/dd\u003e\n            \u003cdd\u003estart Offset(开始点的偏移量)：\u003cspan\u003e0\u003c/span\u003e\u003c/dd\u003e\n            \u003cdd\u003eEnd Container（结束点的父节点）：\u003cspan\u003eARTICLE\u003c/span\u003e\u003c/dd\u003e\n            \u003cdd\u003eEnd Offset（结束点的偏移量）：\u003cspan\u003e7\u003c/span\u003e\u003c/dd\u003e\n            \u003cdd\u003eCommon Ancestor（共同祖先节点）：\u003cspan\u003eARTICLE\u003c/span\u003e\u003c/dd\u003e\n        \u003c/dl\u003e\n    \u003c/footer\u003e\n\u003c/section\u003e\n\u003ch5\u003e设置范围\u003c/h5\u003e\n\u003cp\u003e创建复杂的范围一般使用 setStart() 和 setEnd() 方法。这两种方法都接受两个参数：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003esetStart(refNode, offset); \u003c/span\u003e\u003cspan class=\"p2\"\u003esetEnd(refNode, offset);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e操作范围内容\u003c/h5\u003e\n\u003ch5\u003e插入范围内容\u003c/h5\u003e\n\u003ch5\u003e折叠范围\u003c/h5\u003e\n\u003ch5\u003e比较范围\u003c/h5\u003e\n\u003ch5\u003e复制和清除范围\u003c/h5\u003e\n\u003cp\u003e使用 cloneRange() 方法可以复制范围，新创建的范围与原来的范围包含相同的属性，而修改它的边界不会影响原来的范围。\u003c/p\u003e\n\u003cp\u003e使用完范围后，最好是使用 detach() 方法把范围从文档中分离出来，然后就可以放心的解除范围的引用，从而使垃圾回收机制回收其内存。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003erange.detach(); \u003c/span\u003e\u003cspan class=\"p2\"\u003erange = null;\u003c/span\u003e\u003c/code\u003e\n\n\u003cscript\u003e\n    var this_a = [\n        [\"collapsed\", \"如果范围是开始点和结束点在文档的同一位置，则为 true ，即范围是空的，则折叠的，则为 false\"],\n        [\"commonAncestorContainer\", \"范围开始点和结束点的（即它们的祖先节点）、嵌套最深的 Document 节点\"],\n        [\"endContainer\", \"包含范围的结束点的 Document 节点\"],\n        [\"endOffset\", \"endContainer 中的结束点位置\"],\n        [\"startContainer\", \"包含范围的开始点的 Document 节点\"],\n        [\"startOffset\", \"startContainer 中的开始点位置\"]\n    ];\n    _MiMethod.td(\"this_a\");\n    var this_b = [\n        [\"cloneContainer()\", \"返回新的 DocumentFragment 对象，它包含该范围表示的文档区域的副本\"],\n        [\"cloneRange()\", \"创建一个新的 Range 对象，表示当前的 Range 对象相同的文档区域\"],\n        [\"collapse()\", \"折叠该范围，使它与边界点重合\"],\n        [\"compareBoundaryPoints()\", \"比较指定范围的边界点和当前范围的边界点，根据它们的顺序返回 -1、0和 1。比较哪个边界由它的第一个参数指定，它的值必须是范围的常量之一\"],\n        [\"deleteContents()\", \"删除当前 Range 对象表示的文档区域\"],\n        [\"detach()\", \"通知实现不再使用当前的范围，可以停止跟踪。如果调用了范围的这个方法，那么接下来调用的该范围任何办法都会抛出代码为 INVALID_STRATE_ERR 的 DOMException 异常\"],\n        [\"extractContents()\", \"删除当前范围表示的文档区域，并且以 DocumentFragment 对象的形式返回该区域的内容，该方法和 cloneContents() 方法与 deleteContents() 方法的结合很相似\"],\n        [\"insertNote()\", \"把指定的节点插入到文档范围的开始点\"],\n        [\"selectNode()\", \"设置该范围的边界点，使它包含的指定节点和它的所有子孙节点\"],\n        [\"selectNodeContents()\", \"设置该范围的边界点，使它包含指定节点的子孙节点，但不包含指定的节点本身\"],\n        [\"serEnd()\", \"把该范围的结束点设置为指定节点和偏移量\"],\n        [\"setEndAfter()\", \"把该范围的结束点设置为紧邻指定节点的结点之后\"],\n        [\"setEndBefore()\", \"把该范围的结束点设置为紧邻指定节点之前\"],\n        [\"setStart()\", \"把该范围的开始点设置为指定节点中的偏移量\"],\n        [\"setStartAfter()\", \"把该范围的开始点设置为紧邻指定节点之后\"],\n        [\"setStartBefore()\", \"把该范围的开始点设置为紧邻指定节点之前\"],\n        [\"surroundContents()\", \"把指定的节点插入文档范围的开始点，然后重订范围中的所有节点的父节点，使它们成为新的插入的节点的子孙节点\"],\n        [\"toString()\", \"返回该节点表示的文档区域的纯文本内容\"]\n    ];\n    _MiMethod.td(\"this_b\")\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ DOM","title":"使用范围"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","DOM","使用范围"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
