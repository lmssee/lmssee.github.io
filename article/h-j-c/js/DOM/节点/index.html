class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>节点</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e节点类型\u003c/h5\u003e\n\u003cp\u003e从存在方式来看，文本节点总是包含在元素节点中，但不是每个元素节点都包含文本节点。 还有其它一些类型的节点，分别代表元素属性、HTML注释及其它一些与页面相关的信息。很多类型的节点都能够包含其它节点作为子节点。\n    每种节点类型都有一个关联的数值，保存在属性nodeType里。\u003c/p\u003e\n\u003cp\u003e节点类型1、2和3 最常用的节点。类型是1、2和3，也就是页面元素、它们的属性和包含的文本。\u003c/p\u003e\n\u003ctable id=\"this_t\"\u003e\n    \u003ccaption\u003eDOM 节点类型说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e节点类型\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n        \u003cth\u003e可包含的子节点的类型\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ctable id=\"this_o\"\u003e\n    \u003ccaption\u003enode Type\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003enodeType 值\u003c/th\u003e\n        \u003cth\u003enodeType\u003c/th\u003e\n        \u003cth\u003e节点类型\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_o = [\n        [\"1\", \"element\", \"元素\"],\n        [\"2\", \"Attr\", \"属性 \"],\n        [\"3\", \"text\", \"文本（包括空白）\"],\n        [\"4\", \"CDATASection\", \"CDATA 区域\"],\n        [\"5\", \"EntityReference\", \"实体引用\"],\n        [\"6\", \"Entity\", \"实体\"],\n        [\"7\", \"ProcessingInstruction\", \"执行指令\"],\n        [\"8\", \"Comment\", \"HTML 注释\"],\n        [\"9\", \"Document\", \"文档\"],\n        [\"10\", \"DocumentType\", \"文档类型（DTD）\"],\n        [\"11\", \"DocumentFragment\", \"文档片段\"],\n        [\"12\", \"Notation\", \"标签\"]\n    ];\n    var this_t = [\n        [\"Document\", \"表示整个文档，DOM 树的根节点\", \"Element、processingInstruction、Comment、DocumentType\"],\n        [\"DocumentFragment\", \"文档片段，轻量级的 Document，仅包含部分文档\", \"processingInstruction、Comment、Text、CDATASection、EntityReference\"],\n        [\"DocumentType\", \"为文档定义的实体提供接口\", \"无\"],\n        [\"ProcessingInstruction\", \"表示处理命令\", \"无\"],\n        [\"EntityReference\", \"表示实体引用元素\", \"ProcessingInstruction、Comment、Text、CDATASection、EntityReference\"],\n        [\"Element\", \"表示元素\", \"ProcessingInstruction、Comment、CDATASection、EntityReference\"],\n        [\"Attr\", \"表示属性\", \"Text、EntityReference\"],\n        [\"Text\", \"表示元素或属性的文本\", \"无\"],\n        [\"CDATASection\", \"表示文档中的 CDATA 片段，还包含文本不会被解析器解析部分\", \"无\"],\n        [\"Comment\", \"表示注释\", \"无\"],\n        [\"Entity\", \"表示实体\", \"ProcessingInstruction、Comment、Text、CDATASection、EntityReference\"],\n        [\"Notation\", \"表示在 DTD 中声明的符号\", \"无\"]\n    ];\n    _MiMethod.td(\"this_o\");\n    _MiMethod.td(\"this_t\");\n\u003c/script\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction count(n) { \u003cspan class=\"r\"\u003e//\n            定义统计函数\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar num = 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (n.nodeType == 1) num++;\n        \u003cspan class=\"r\"\u003e// 检测是否是元素节点\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar son = n.childNodes; \u003cspan class=\"r\"\u003e// 获取所有的子节点\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i =\n        0; i \u0026lt; son.length; i++) { \u003c/span\u003e\u003cspan class=\"p6\"\u003enum += count(son[i]) \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn num; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(\"当前文档包含\" + count(document) + \"个元素\") \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003echildNodes属性\u003c/h5\u003e\n\u003cp\u003e每个节点都有一个childNodes属性。这个类似数组的属性包含了当前节点全部直接子节点的集合，可供用户访问这些子节点的信息。\u003c/p\u003e\n\u003cp\u003echildNodes集合称为\"节点列表\"（NodeList），其中的项目以数值进行索引。集合（在大多数情况下）的表现类似于数组。我们可以像访问数组元素一样访问集合里的项目，还可以像对待数组一样遍历集合的内容，但有些数组方法是不能用的，比如push()和pop()。\n\u003c/p\u003e\n\u003cp\u003e节点列表是一个动态集合，这表示集合的任何改变都会立即反映到列表。\u003c/p\u003e\n\u003cp\u003e\u003cmark\u003e小心空白\u003c/mark\u003e当浏览器加载页面时，HTML代码里的空白（比如空格和制表符）一般是被忽略的。但是，对于页面元素里存在的空白，比如有序列表\n    \u0026lt;ol\u0026gt;里的空白，大多数浏览器都会创建文本类型的子节点（nodeType==3）。这样一来，仅使用childNodes.length未必能得到期望的结果。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003efirstChild和lastChild\u003c/li\u003e\n    \u003cli\u003eparentNode 父级节点\u003c/li\u003e\n    \u003cli\u003enextSibling 下一个兄弟节点，不存在则返回 null\u003c/li\u003e\n    \u003cli\u003epreviousSibling 上一个兄弟节点，不存在返回 null\u003c/li\u003e\n    \u003cli\u003enodeValue 返回保存在节点里的值，常用于返回文本节点里的内容\u003c/li\u003e\n    \u003cli\u003enodeName 以字符串形式返回节点的名称。这个属性是只读的，不能修改它的值\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e节点名称和值\u003c/h5\u003e\n\u003cp\u003e使用节点的 nodeName、nodeValue 属性可以读取节点的名称和值。\u003c/p\u003e\n\u003ctable id=\"this_c\"\u003e\n    \u003ccaption\u003e节点的 nodeName 和 nodeValue 属性说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e节点类型\u003c/th\u003e\n        \u003cth\u003enodeName 返回值\u003c/th\u003e\n        \u003cth\u003enodeValue 返回值\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_c = [\n        [\"Document\", \"#document\", \"null\"],\n        [\"DocumentFragment\", \"#document-fragment\", \"null\"],\n        [\"DocumentType\", \"doctype 名称\", \"null\"],\n        [\"EntityReference\", \"实体引用发名称\", \"null\"],\n        [\"Element\", \"元素的名称（标签名称）\", \"null\"],\n        [\"Attr\", \"属性的名称\", \"属性的值\"],\n        [\"ProcessingInstruction\", \"target\", \"节点的内容\"],\n        [\"Comment\", \"#comment\", \"注释的内容\"],\n        [\"Text\", \"#text\", \"节点的内容\"],\n        [\"CDATASection\", \"#cada-section\", \"节点的内容\"],\n        [\"Entity\", \"实体名称\", \"null\"],\n        [\"Notation\", \"符号名称\", \"null\"]\n    ];\n    _MiMethod.td(\"this_c\")\n\u003c/script\u003e\n\u003ch5\u003e节点的关系\u003c/h5\u003e\n\u003cp\u003e节点之间的关系包括：上下级父子关系，相邻级别的兄弟关系。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e在节点树，最顶端节点为根节点\u003c/li\u003e\n    \u003cli\u003e除了根节点，每个节点都有一个父节点\u003c/li\u003e\n    \u003cli\u003e节点可以包括任何数量的子节点\u003c/li\u003e\n    \u003cli\u003e叶子没有字节点\u003c/li\u003e\n    \u003cli\u003e同级节点拥有同父节点\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e访问节点\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003eownerDocument 返回当前节点的根节点\u003c/li\u003e\n    \u003cli\u003eparentNode 返回当前节点的父节点，所有的节点都仅有一个父节点\u003c/li\u003e\n    \u003cli\u003echildNode 返回当前节点的所有子节点的节点列表\u003c/li\u003e\n    \u003cli\u003efirstNode 返回当前节点的第一个子节点\u003c/li\u003e\n    \u003cli\u003elastNode 返回档期那节点的最后一个节点\u003c/li\u003e\n    \u003cli\u003enextNode 返回当前节点的下一个节点\u003c/li\u003e\n    \u003cli\u003epreviousSibling 返回当前节点之前的所有同级别的节点\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003echildNodes\u003c/h6\u003e\n\u003cp\u003e所有节点都有一个 childNodes 属性，该属性保存着一个 nodeList 对象，它包含所有子节点的列表。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;ul\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;li\u0026gt;1\u0026lt;/li\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;li\u0026gt;2\u0026lt;/li\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;li\u0026gt;3\u0026lt;/li\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;li\u0026gt;4\u0026lt;/li\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;li\u0026gt;5\u0026lt;/li\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/ul\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;script\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar tag = document.getElementsByTagName(\"ul\")[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a =\n        tag.childNodes; \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(a[0].nodeType); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(a.item(1).innerHTML); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(a.length);\n        \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用Array.prototype.slice 方法可以把 nideList 转化为数字，这样就可以调用数组的方法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar tag = document.getElementsByTagName(\"ul\")[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a =\n        Array.prototype.slice.call(tag.childNodes, 0); \u003cspan class=\"r\"\u003e// 把 nodeList 转换成数组\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ea.reverse(); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(a[0].nodeType); \u003cspan class=\"r\"\u003e// 返回第一个节点类型，返回值\n            3 ，显示为文本节点\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(a[1].innerHTML); \u003cspan class=\"r\"\u003e// 显示第二个节点所包含的文本\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(a.length); \u003cspan class=\"r\"\u003e// 包含子节点个数。nodeList 长度\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e文本节点和属性节点都不包含子节点，所以它们的 childNodes 属性永远返回一个空的 nodeList 。如果判断一个节点是否含有子节点，可以使用 hasChildNodes() 方法直接快速判断，或者使用\n        childNodes.length 值是否为 0 判断。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e对于 IE 8 以前的版本，则需要另类方法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction convertToArray(nodes) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar array = null;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003etry { \u003c/span\u003e\u003cspan class=\"p6\"\u003earray = Array.prototype.slice.call(nodes, 0); \u003cspan\n            class=\"r\"\u003e// 非 IE 或者 IE 9+ \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} catch (ex) { \u003c/span\u003e\u003cspan class=\"p6\"\u003earray = new Array(); \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (var i\n        = 0, len = nodes.length; i \u0026lt; len; i++) { \u003c/span\u003e\u003cspan class=\"p8\"\u003earray.push(nodes[i]); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn array \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eparentNode\u003c/h6\u003e\n\u003cp\u003e每一个节点都有一个 parentNode 属性，该属性指向文档树中的父节点。包含在 childNodes 列表中的所有节点都具有的父节点，因此它们的 parentNode 的属性都指向同一个父节点。\u003c/p\u003e\n\u003cp\u003eparentNode 返回节点永远是一个元素节点，因为只有元素节点才可能包含子节点。不过，document 没有父节点，document 节点的parentNode 属性将返回 null。\u003c/p\u003e\n\u003ch6\u003eownerDocument\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;Document\u0026lt;/title\u0026gt; \u0026lt;/head\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;span\n        class=\"p c\"\u0026gt;span\u0026lt;/span\u0026gt; \u0026lt;/body\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e获取 body 元素：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar b = document.documentElement.lastChild; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b =\n        document.documentElement.firstChild.nextSibling.nextSibling;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e可以这样获取 span 元素所包含的文本。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar text = document.documentElement.lastChild.firstChild.firstChild.nodeValue;\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e操作节点\u003c/h5\u003e\n\u003ctable id=\"this_d\"\u003e\n    \u003ccaption\u003eNode 类型原型方法\u003c/caption\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_d = [\n        [\"appendChild()\", \"向节点的子节点列表的结尾添加新的子节点\"],\n        [\"cloneChild()\", \"复制节点\"],\n        [\"hasChildNodes()\", \"判断节点是否拥有子节点\"],\n        [\"insertBefore()\", \"在指定的子节点前添加新的子节点\"],\n        [\"normalize()\", \"合并相邻的 Text 节点并删除空的 Text 节点\"],\n        [\"removeChild()\", \"删除(并返回)当前节点的指定节点\"],\n        [\"replaceChild()\", \"用新节点替换旧节点\"]\n    ];\n    _MiMethod.td(\"this_d\");\n\u003c/script\u003e\n\u003cp\u003ecloneNode() 用于克隆节点\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003enode.cloneNode(include_all);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 include_all 是布尔值，如果是 true ，则将克隆节点，并复制所有的子节点；为 false 时，仅复制节点本身。复制后返回节点的副本属于文档所有，但并没有为它指定父节点，需要通过\n    appendChild()、insertBefore()、replaceChild() 方法将它添加到文档。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003ecloneNode() 方法不会复制添加到 DOM 节点的 JavaScript 属性，如事件处理程序。但是，IE 会复制事件处理程序！！！\u003c/p\u003e\n\u003c/div\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ DOM","title":"节点"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","DOM","节点"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
