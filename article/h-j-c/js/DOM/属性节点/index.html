class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>属性节点</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e属性节点由 Attr 类型表示，在文档树中被称为元素的特性，习惯称为标签的属性\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enodeType 值为 11\u003c/li\u003e\n    \u003cli\u003enodeName 值为特性的名称\u003c/li\u003e\n    \u003cli\u003enodeValue 值为特性的值\u003c/li\u003e\n    \u003cli\u003eparentNode 值为 null\u003c/li\u003e\n    \u003cli\u003e在 HTML 中不包含子节点\u003c/li\u003e\n    \u003cli\u003e在 XML 中子节点可以是 Text、EntityReference\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e尽管属性也是节点，但是不被认为是 DOM 树的一部分，DOM 中没有提供关系指针，很少直接引用属性节点。\u003c/p\u003e\n\u003ch5\u003e访问属性节点\u003c/h5\u003e\n\u003cp\u003eAttr 是Element 的属性，作为一种节点类型，它继承了 Node 类型的属性和方法。不过 Attr 没有父节点，同时属性不被认为是元素的子节点，对于很多 Node 的属性返回都将返回 null 。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ename 表示属性名，等同于 nodeName\u003c/li\u003e\n    \u003cli\u003evalue 表示属性值，等同于 nodeValue\u003c/li\u003e\n    \u003cli\u003especified 如果属性值是在代码中使用的，则返回 false ，如果默认值，则为 true\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e为了将新创建的属性添加到元素，必须使用元素的 setAttributeNode() 方法。添加属性之后，可以通过下列方式访问该属性：attributes 属性、getAttributeNode()\n    方法、getAttribute() 方法。\u003c/p\u003e\n\u003cp\u003e其中，attributes 属性、getAttributeNode() 方法将返回对应属性的 Attr 节点，而 getAttribute() 方法直接返回属性的值。不建议使用 attribute[]\n    数组方式读取某个位置上的属性节点，因为不同浏览器对其支持存在差异。\u003c/p\u003e\n\u003cp\u003e在传统的 DOM 中，常用点语法直接访问 HTML 属性，如 img.src、 a.href 。虽然不标准，但获得了所有浏览器的支持。\u003c/p\u003e\n\u003ch5\u003e读取属性值\u003c/h5\u003e\n\u003cp\u003e使用元素的 getAttribute() 方法可以快速读取指定元素的属性值，传递的参数是一个字符串形式的表示的元素属性的名称。\u003c/p\u003e\n\u003cp\u003e在传统的 DOM 中，常用点语法直接访问 HTML 属性，如 img.src、 a.href 。使用点语法比较方便，也获得所有的浏览器支持。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e对于 class 属性，则必须使用 className 属性名，因为 class 是 javascript 语言的保留字；对于 for 属性，则必须使用 htmlFor 属性名，这与 CSS 中的 float 和\n        text 属性被改为 cssFloat 和 cssText 是一个道理。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e创建属性节点\u003c/h5\u003e\n\u003cp\u003e使用 document 的 createAttribute() 方法可创建属性节点。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.createAttribute(name)\u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;div id=\"box\"\u0026gt;document.createAttribute(name)\u0026lt;/div\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003evar element = document.getElementById(\"box\");\u003c/span\u003e\u003cspan\n        class=\"p\"\u003evar attr = document.createAttribute(\"align\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eattr.value = \"center\";\u003c/span\u003e\u003cspan class=\"p\"\u003eelement.setAttributeNode(attr);\u003c/span\u003e\u003cspan\n        class=\"p\"\u003econsole.log(element.attributes[\"align\"].value);\u003c/span\u003e\u003cspan\n        class=\"p\"\u003econsole.log(element.getAttributeNode(\"align\").value)\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.log(element.getAttribute(\"align));\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e直接采用 className 添加类会覆盖掉原有的样式.这时就需要采用叠加的方式进行添加。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;div\u0026gt; id=\"c\"\u0026gt;代码显示眼样式\u0026lt;/div\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003evar c = document.getElementById(\"c\");\u003c/span\u003e\u003cspan class=\"p\"\u003ered.className = \"c\";\u003c/span\u003e\u003cspan\n        class=\"p\"\u003ered.className += \"p\";\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用叠加容易产生重复类,所以应当先判断,再添加 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003efunction hasClass(element, className)\n        {\u003c/span\u003e\u003cspan class=\"p2\"\u003evar reg = new RegExp('\\\\s|^' + className + '\\\\s|$');\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn\n        reg.test(element.className);\u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003efunction addClass(element, className)\n        {\u003c/span\u003e\u003cspan class=\"p2\"\u003eif (!hasClass(element, className)) {\u003c/span\u003e\u003cspan class=\"p4\"\u003eelement.className += ''\n        + className;\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;div\n        id=\"c\"\u0026gt;代码区\u0026lt;/div\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003evar c =\n        document.getElementById('c');\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eaddClass(c, \"c\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eaddClass(c, \"p\");\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e设置属性值\u003c/h5\u003e\n\u003cp\u003e使用元素的 setAttribute() 方法可以设置元素的属性，用法如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003esetAttribute(name, value); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003ename 和 value 参数分别表示属性的名称和属性值。属性名和属性值必须以字符串的形式传递。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;img id=\"img_1\" alt=\"\" src=\"\" /\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003evar img = document.getElementById(\"img_1\");\u003c/span\u003e\u003cspan class=\"p\"\u003eimg.setAttribute(\"src\",\n        \"https://lmssee.cn/image/lmssee.jpg\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eimg.src = \"https://lmssee.cn/image/lmssee.jpg\";\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e删除属性\u003c/h5\u003e\n\u003cp\u003e使用 removeAttribute() 方法可以删除特定的属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eremoveAttribute(name)\u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.onload = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        table = document.getElementsByTagName(\"table\")[0]; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar del =\n        document.getElementById(\"del\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar reset = document.getElementById(\"reset\");\n    \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003edel.onclick = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003etable.removeAttribute(\"border\") \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereset.onclick = function() { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etable.setAttribute(\"border\", \"2\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt; \u0026lt;table width=\"100%\" border=\"2\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;tr\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;td\u0026gt;数据表格\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/tr\u0026gt; \u0026lt;/table\u0026gt; \u0026lt;button\n        id=\"del\"\u0026gt;删除\u0026lt;/button\u0026gt; \u0026lt;button id=\"reset\"\u0026gt;恢复\u0026lt;/button\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eattributes 属性\u003c/h5\u003e\n\u003cp\u003eElement 类型是唯一使用 attributes 属性的 DOM 节点类型。attributes 属性包含一个 NamedNodeMap 实例，是一个类似 NodeList 的\"实时\"集合。元素的每个属性都表示为一个\n    Attr 节 点，并保存在这个 NamedNodeMap 对象中。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003egetNamedItem(name)，返回 nodeName 属性等于 name 的节点\u003c/li\u003e\n    \u003cli\u003eremoveNamedItem(name)，删除 nodeName 属性等于 name 的节点\u003c/li\u003e\n    \u003cli\u003esetNamedItem(node)，向列表中添加 node 节点，以其 nodeName 为索引\u003c/li\u003e\n    \u003cli\u003eitem(pos)，返回索引位置 pos 处的节点\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eremoveNamedItem()方法与元素上的 removeAttribute()方法类似，也是删除指定名字的属性。\n    下面的例子展示了这两个方法唯一的不同之处，就是removeNamedItem()返回表示被删除属性的Attr 节点 。\n\u003c/p\u003e\n\u003ch5\u003e使用类选择器\u003c/h5\u003e\n\u003cp\u003eHTML5 为 document 对象和 HTML 增加了getElementsByClassName() 方法，使用该方法可以直接选择指定的类名的元素。getElementsByName()\n    方法可接受一个字符串，包含一个或多个类名，类名用空格分割，不分前后顺序，方法返回指定类的所有的元素的 NodeList 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;div id=\"box\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div class=\"red blue\n        green\"\u0026gt;456\u0026lt;/div\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/div\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;div class=\"blue red\n        black\"\u0026gt;123\u0026lt;/div\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar divs = document.getElementById(\"box\").getElementsByTagName(\"blue red\");\u003c/span\u003e\u003cspan\n        class=\"p\"\u003efor (var i = 0; i \u0026lt; divs.length; i++) {\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(divs[i],\n        innerHTML);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e自定义属性\u003c/h5\u003e\n\u003cp\u003eHTML 5 允许用户自定义属性，就是需要加前缀 data- 目的是为元素提供与渲染无关的附加信息，或者提供寓意。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;div id=\"box\" data-myId=\"2468\" data-myName=\"随笔记\"\n        data-myPass=\"g123\"\u0026gt;自定义属性\u0026lt;/div\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e添加自定义属性后，可通过 元素的 datalist 属性访问自定义属性。datalist 的属性值是一个 DOMStringMap 实例，也就是一个名值对的映射。在这个映射中，每个 data-name\n    形式的属性都会有一个对应的属性，只不过属性名没有 data- 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar div = document.getElementById('box');\u003c/span\u003e\u003cspan class=\"p\"\u003evar id =\n        div.dataset.myid;\u003c/span\u003e\u003cspan class=\"p\"\u003evar name = div.dataset.myname;\u003c/span\u003e\u003cspan class=\"p\"\u003evar pass =\n        div.dataset.pass;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ediv.dataset.myid = \"2468\";\u003c/span\u003e\u003cspan class=\"p\"\u003ediv.dataset.myname = \"随笔记\";\u003c/span\u003e\u003cspan\n        class=\"p\"\u003ediv.dataset.pass = \"g123\";\u003c/span\u003e\u003cspan class=\"p\"\u003eif (div.dataset.myname) {\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(div.dataset.myname);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e} \u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eDocument对象的常用属性\u003c/h5\u003e\n\u003ctable id=\"this_a\"\u003e\n    \u003ccaption\u003eDocument对象的常用属性及说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_a = [\n        [\"alinkColor\", \"链接颜色，对应\u0026lt;body\u0026gt;标记中的alink属性\"],\n        [\"all[]\", \"储存HTML标记的一个数组（该属性本身也是一个对象）\"],\n        [\"anchors[]\", \"储存锚点的一个数组（该属性本身也是一个对象）\"],\n        [\"bgColor\", \"文档的背景颜色，对应\u0026lt;body\u0026gt;标记中的bgColor属性\"],\n        [\"cookie\", \"表示cookie的值\"],\n        [\"fgColor\", \"文档的文本颜色（不包含超链接的文字），对应\u0026lt;body\u0026gt;标记中的text属性\"],\n        [\"form[]\", \"储存窗体对象的一个数组（该属性本身也是一个对象）\"],\n        [\"fileCreatedDate\", \"创建文档的日期\"],\n        [\"fileModifiedDate\", \"文档的最后修改日期\"],\n        [\"fileSize\", \"文档的大小\"],\n        [\"lastModified\", \"文档的最后的修改的时间\"],\n        [\"images[]\", \"储存图像对象的一个数组（该属性本身也是一个对象）\"],\n        [\"linkColor\", \"未访问的链接文字的颜色，对应\u0026lt;body\u0026gt;中的link属性\"],\n        [\"links[]\", \"储存link对象的一个数组（该属性本身也是一个对象）\"],\n        [\"vlinkColor\", \"表示已访问的链接文字的颜色，对应\u0026lt;body\u0026gt;标记的vlink属性\"],\n        [\"title\", \"当前文档标题对象\"],\n        [\"body\", \"当前文档的主体对象\"],\n        [\"readyState\", \"获取某个对象的当前状态\"],\n        [\"URL\", \"获取和设置URL\"]\n    ];\n    _MiMethod.td(\"this_a\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ DOM","title":"属性节点"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","DOM","属性节点"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
