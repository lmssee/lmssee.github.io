    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003eDocument 文本节点特征：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enodeType 值为 9\u003c/li\u003e\n    \u003cli\u003enodeName 值为 \"#document\"\u003c/li\u003e\n    \u003cli\u003enodeValue 值为 \"null\"\u003c/li\u003e\n    \u003cli\u003eparentNode 值为 null\u003c/li\u003e\n    \u003cli\u003eownerDocument 值为 null\u003c/li\u003e\n    \u003cli\u003e其子节点可能是：DocumentType（最多一个）、Element（最多一个）、ProcessingInstruction 或 Comment\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e访问文档子节点\u003c/h5\u003e\n\u003cp\u003e访问文档子节点方法有两种：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e使用 documentElement 属性，该属性始终指向 HTML 文档中的 html 元素\u003c/li\u003e\n    \u003cli\u003e使用 childNodes 列表访问文档元素\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar html = document.documentElement; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar html =\n        document.childNodes[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar html = document.firstChild;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003edocument 有一个 body 属性，使用它可以访问 body 元素。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar body = document.body; \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e\u0026lt;!DOCTYPE\u0026gt;标签是一个与文档标签主体不同的实体，可以通过 doctype 属性访问它\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar doctype = document.doctype; \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e由于浏览器对 document.doctype 的支持不统一，所以很少用到。\u003c/p\u003e\n\u003cp\u003e在 html 元素之外的注释也是文档的节点，但是不同的浏览器处理它们时存在较大的差异，在实际应用中也没什么用处。\u003c/p\u003e\n\u003ch5\u003e访问文档信息\u003c/h5\u003e\n\u003cp\u003eHTMLDocument 的实例对象包含 document 许多属性，用来访问文档信息，简单说明如下：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003etitle 设置或返回 \u0026lt;title\u0026gt; 包含的文本信息；\u003c/li\u003e\n    \u003cli\u003elastModified 返回文档最后的修改日期\u003c/li\u003e\n    \u003cli\u003eURl 返回当前文档完整的 URL ，即地址栏显示的信息\u003c/li\u003e\n    \u003cli\u003edomain 返回当前文档的域名\u003c/li\u003e\n    \u003cli\u003ereferrer 返回链接到当前页面的那个页面的 URL 。在没有来源的情况下，referrer 属性中可能包含空字符串\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e实际上，这些信息都包含在 请求的 http 请求头中，但通过这些属性更方便。\u003c/p\u003e\n\u003ch5\u003e访问文档属元素\u003c/h5\u003e\n\u003cp\u003edocument 对象包含多个访问文档内元素的；\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003egetElementById() \u003c/li\u003e\n    \u003cli\u003egetElementsByTagName()\u003c/li\u003e\n    \u003cli\u003egetElementsByName() 访问所有含有 name 属性的元素节点\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003egetElementsByTagName() 方法将返回一个 HTMLCollection 对象，与 nodeList 对象类似，可以使用方括号语法或者 item() 方法访问 HTMLCollection\n        对象中的元素，并通过 length 属性获取这个对象中元素的数量。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003eHTMLCollection 还包含一个 namedItem() 方法，该方法可以通过元素的 name 特性取得集合中的项目。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;img src=\"i.gif\" alt=\"1\"\u0026gt; \u0026lt;img src=\"2.gif\" alt=\"2\" name=\"news\"\u0026gt;\n        \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar images = document.getElementsByTagName(\"img\"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003evar news = images.namedItem(\"name\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用 参数 \"*\" 可以获取所有的元素。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar allElements = document.getElementsByTagName(\"*\"); \u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e访问文档集合\u003c/h5\u003e\n\u003cp\u003e除了属性和方法，document 对象还定义了一些特殊的集合。这些集合都是 HTMLCollection 对象，为访问文档常用对象提供了快捷方式：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003edocument.anchors 返回文档中所有的Anchor 对象，及所有带 name 属性的 \u0026lt;a\u0026gt;标签的\u003c/li\u003e\n    \u003cli\u003edocument.applets 返回文档中所有的 Applets 对象，及所有的 \u0026lt;applet\u0026gt; 标签的，不在推荐使用\u003c/li\u003e\n    \u003cli\u003edocument.forms 返回文档中所有 From 对象，与 document.getElementsByTagName(\"form\") 得到的结果相同\u003c/li\u003e\n    \u003cli\u003edocument.images 返回文档中所有的 Image 对象，与 document.getElementsByTagName(\"image\") 得到的结果相同\u003c/li\u003e\n    \u003cli\u003edocument.links 返回文档中所有 Area 和 Link 对象，及所有的带 href 特性的 \u0026lt;a\u0026gt;\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e使用 HTML 5 Document\u003c/h5\u003e\n\u003cp\u003eHTML 5 Document 扩展了 HTMLDocument 很多新功能。\u003c/p\u003e\n\u003ch6\u003ereadyState\u003c/h6\u003e\n\u003cp\u003edocument 的 readyState 属性包含两个可能的值\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eloading 正在加载的文档\u003c/li\u003e\n    \u003cli\u003ecomplete 已经加载完的文档\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eif (document.readyState == \"complete\"){ \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003ecompatMode\u003c/h6\u003e\n\u003cp\u003edocument.compatMode 返回文档的渲染模式：标准模式（\"CSS1Compar\"）和怪异模式（\"BackCompar\"）\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eif (document.compatMode == \"CSS1Compat\") { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"标准模式\")\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"怪异模式\") \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003ehead\u003c/h6\u003e\n\u003cp\u003edocument.body 引用文档中的 body 元素，document.head 类似，取文档的 head 元素。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar head = document.head || document.getElementsByTagName(\"head\")[0]; \u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003echarset\u003c/h6\u003e\n\u003cp\u003edocument.charset 表示文档中实际使用的字符集，也可以在指定的新字符集。默认值为 \"UTF-8\" ，可以通过\u0026lt;meta\u0026gt; 元素、HTTP 头部或直接设置 charset 的属性值。\u003c/p\u003e\n\u003ch6\u003edefaultCharset\u003c/h6\u003e\n\u003cp\u003edocument.defaultCharset 表示根据默认浏览器及操作系统的设置，当前文档默认的字符集应该是什么。如果文档没有默认的字符集，那么 charset 和 defaultCharset 的值可能不一样。\u003c/p\u003e\n\n\u003cscript\u003e\n    // alert(document.lastModified)\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ DOM","title":"文档节点"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","DOM","文档节点"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
