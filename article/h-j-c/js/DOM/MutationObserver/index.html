    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eMutationObserver\u003c/h5\u003e\n\u003cp\u003e的 MutationObserver 接口，可以在 DOM 被修改时异步执行回调。使 用 MutationObserver 可以观察整个文档、DOM\n    树的一部分，或某个元素。此外还可以观察元素属性、子节点、文本，或者前三者任意组合的变化。\u003c/p\u003e\n\u003ch5\u003e基本用法\u003c/h5\u003e\n\u003cp\u003eMutationObserver 的实例要通过调用 MutationObserver 构造函数并传入一个回调函数来创建:\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet observer = new MutationObserver(() =\u0026gt; console.log('DOM was\n        mutated!'));\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eobserve()方法\u003c/h6\u003e\n\u003cp\u003e新创建的 MutationObserver 实例不会关联 DOM 的任何部分。要把这个 observer 与 DOM 关 联起来，需要使用 observe()方法。这个方法接收两个必需的参数：要观察其变化的 DOM 节点，以及\n    一个 MutationObserverInit 对象。 MutationObserverInit 对象用于控制观察哪些方面的变化，是一个键/值对形式配置选项的字典。\n    例如，下面的代码会创建一个观察者（observer）并配置它观察 \u0026lt;body\u0026gt;元素上的属性变化\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet observer = new MutationObserver(() =\u0026gt; console.log('\u0026lt;body\u0026gt; attributes\n        changed')); \u003c/span\u003e\u003cspan class=\"p2\"\u003eobserver.observe(document.body, { \u003c/span\u003e\u003cspan class=\"p4\"\u003eattributes:\n        true \u003c/span\u003e\u003cspan class=\"p2\"\u003e});\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e回调与 MutationRecord\u003c/h6\u003e\n\u003cp\u003e每个回调都会收到一个 MutationRecord 实例的数组。MutationRecord 实例包含的信息包括发 生了什么变化，以及 DOM 的哪一部分受到了影响。因为回调执行之前可能同时发生多个满足观察条件\n    的事件，所以每次执行回调都会传入一个包含按顺序入队的 MutationRecord 实例的数组。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet observer = new MutationObserver( \u003c/span\u003e\u003cspan class=\"p4\"\u003e(mutationRecords) =\u0026gt;\n        console.log(mutationRecords)); \u003c/span\u003e\u003cspan class=\"p2\"\u003eobserver.observe(document.body, { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eattributes: true \u003c/span\u003e\u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.body.className = 'foo'; \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.body.className = 'bar';\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.body.className = 'baz'; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            [MutationRecord, MutationRecord, MutationRecord] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003e了 MutationRecord 实例的属性\u003c/caption\u003e\n    \u003ccolgroup width=\"25%\"\u003e\u003c/colgroup\u003e\n\u003c/table\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet observer = new MutationObserver( \u003c/span\u003e\u003cspan class=\"p4\"\u003e(mutationRecords,\n        mutationObserver) =\u0026gt; console.log(mutationRecords, \u003c/span\u003e\u003cspan class=\"p6\"\u003emutationObserver));\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eobserver.observe(document.body, { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eattributes: true \u003c/span\u003e\u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.body.className =\n        'foo'; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// [MutationRecord], MutationObserver \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003edisconnect()方法\u003c/h6\u003e\n\u003cp\u003e默认情况下，只要被观察的元素不被垃圾回收，MutationObserver 的回调就会响应 DOM 变化事 件，从而被执行。要提前终止执行回调，可以调用 disconnect()方法。下面的例子演示了同步调用\n    disconnect()之后，不仅会停止此后变化事件的回调，也会抛弃已经加入任务队列要异步执行的回调 。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet observer = new MutationObserver(() =\u0026gt; console.log('\u0026lt;body\u0026gt; attributes\n        changed')); \u003c/span\u003e\u003cspan class=\"p2\"\u003eobserver.observe(document.body, { \u003c/span\u003e\u003cspan class=\"p4\"\u003eattributes:\n        true \u003c/span\u003e\u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.body.className = 'foo'; \u003c/span\u003e\u003cspan class=\"p2\"\u003eobserver.disconnect(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.body.className = 'bar'; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            （没有日志输出）\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e复用 MutationObserver\u003c/h6\u003e\n\u003cp\u003e多次调用 observe()方法，可以复用一个 MutationObserver 对象观察多个不同的目标节点。此 时，MutationRecord 的 target 属性可以标识发生变化事件的目标节点。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet observer = new MutationObserver( \u003c/span\u003e\u003cspan class=\"p4\"\u003e(mutationRecords) =\u0026gt;\n        console.log(mutationRecords.map((x) =\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003ex.target))); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan\n            class=\"r\"\u003e// 向页面主体添加两个子节点\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003elet childA = document.createElement('div'), \u003c/span\u003e\u003cspan class=\"p4\"\u003echildB =\n        document.createElement('span'); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.body.appendChild(childA); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.body.appendChild(childB); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 观察两个子节点\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eobserver.observe(childA, {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eattributes: true \u003c/span\u003e\u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eobserver.observe(childB, { \u003c/span\u003e\u003cspan class=\"p4\"\u003eattributes: true \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 修改两个子节点的属性\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003echildA.setAttribute('foo', 'bar'); \u003c/span\u003e\u003cspan class=\"p2\"\u003echildB.setAttribute('foo', 'bar');\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// [\u0026lt;div\u0026gt;, \u0026lt;span\u0026gt;] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e重用 MutationObserver\u003c/h6\u003e\n\u003cp\u003e调用 disconnect()并不会结束 MutationObserver 的生命。还可以重新使用这个观察者，再将 它关联到新的目标节点。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet observer = new MutationObserver(() =\u0026gt; console.log('\u0026lt;body\u0026gt; attributes\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003echanged ')); \u003c/span\u003e\u003cspan class=\"p8\"\u003eobserver.observe(document.body, { \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003eattributes: true \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e}); \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u003cspan class=\"r\"\u003e// 这行代码会触发变化事件\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p8\"\u003edocument.body.setAttribute('foo', 'bar'); setTimeout(() =\u0026gt; { \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003eobserver.disconnect(); \u003c/span\u003e\u003cspan class=\"p10\"\u003e\u003cspan class=\"r\"\u003e// 这行代码不会触发变化事件\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p10\"\u003edocument.body.setAttribute('bar', 'baz'); \u003c/span\u003e\u003cspan class=\"p8\"\u003e}, 0); setTimeout(() =\u0026gt; {\n    \u003c/span\u003e\u003cspan class=\"p10\"\u003e\u003cspan class=\"r\"\u003e// Reattach \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p10\"\u003eobserver.observe(document.body,\n        { \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003eattributes: true \u003c/span\u003e\u003cspan class=\"p10\"\u003e}); \u003c/span\u003e\u003cspan class=\"p10\"\u003e\u003cspan class=\"r\"\u003e//\n            这行代码会触发变化事件\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p10\"\u003edocument.body.setAttribute('baz', 'qux'); \u00
