    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003eDocumentFragment 类型节点在文档书没有对应的标记。DOM 允许用户操作 JavaScript 文档片段中的节点，但不会在文档树中显现出来，避免浏览器渲染和占用资源。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enodeType 值为 5 \u003c/li\u003e\n    \u003cli\u003enodeName 值为 \"#document-fragment\" \u003c/li\u003e\n    \u003cli\u003enodeValue 值为 null\u003c/li\u003e\n    \u003cli\u003eparentNode 值为 null \u003c/li\u003e\n    \u003cli\u003e子节点可以是 Element、ProcessingInstruction、Comment、Text、CDATASection、EntityReference\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e使用\u003c/h5\u003e\n\u003cp\u003eDocumentFragment 是一个虚拟的节点类型，仅存在于内存中，没有添加到文档树，所以在网页中看不到渲染效果。使用文档树的好处就是避免浏览器渲染占用资源。当文档片段设计完善后，再使用 JavaScript\n    一次性添加到文档树显示出来，这样可以提高效率。\u003c/p\u003e\n\u003cp\u003e主要特征值：nodeType 的值为 11 、nodeName 的值为 \"#document0fragment\"、nodeValue 等于null、parentNode 等于null。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar fragment = document.createDocumentFragment();\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e使用 appendChild() 或 insertBefore() 可以将文档片段添加到文档树。\u003c/p\u003e\n\u003cp\u003e每次使用 JavaScript 操作 DOM ，都会改变页面呈现，并触发整个页面的重新渲染（回流），从而消耗系统资源。为解决这个问题，把所有的新节点都附加到文档片段上，然后再把文档片段一次性添加到文档中，以减少页面的重绘次数。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;ul id=\"ul\"\u0026gt;\u0026lt;/ul\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003evar element\n        = document.getElementById(\"ul\");\u003c/span\u003e\u003cspan class=\"p\"\u003evar fragment =\n        document.createDocumentFragment();\u003c/span\u003e\u003cspan class=\"p\"\u003evar browsers = ['Firefox', 'Chrome', 'Opera',\n        'Safari', 'Internet Explorer'];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ebrowsers.forEach(function(browser) {\u003c/span\u003e\u003cspan class=\"p2\"\u003evar li =\n        document.createElement('li');\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eli.textContent = browser;\u003c/span\u003e\u003cspan class=\"p2\"\u003efragment.appendChild(li);\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e});\u003c/span\u003e\u003cspan class=\"p\"\u003eelement.appendChild(fragment);\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ DOM","title":"文档片段"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","DOM","文档片段"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
