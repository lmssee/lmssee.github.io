                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介\u003c/h5\u003e\n\u003cp\u003eDOM 中的注释通过 Comment 类型表示。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enodeType 等于 8\u003c/li\u003e\n    \u003cli\u003enodeName 值为\"#comment\"\u003c/li\u003e\n    \u003cli\u003enodeValue 值为注释的内容\u003c/li\u003e\n    \u003cli\u003eparentNode 值为 Document 或 Element 对象\u003c/li\u003e\n    \u003cli\u003e不支持子节点\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eComment 类型与 Text 类型继承同一个基类（CharacterData），因此拥有除 splitText()之外 Text 节点所有的字符串操作方法。与 Text 类型相似，注释的实际内容可以通过 nodeValue\n    或 data 属性获得。\n\u003c/p\u003e\n\u003ch5\u003eCDATASection\u003c/h5\u003e\n\u003cp\u003eCDATASection 类型表示 XML 中特有的 CDATA 区块。CDATASection 类型继承 Text 类型，因 此拥有包括 splitText()在内的所有字符串操作方法。CDATASection\n    类型的节点具有以下特征。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enodeType 等于 4\u003c/li\u003e\n    \u003cli\u003enodeName 值为\"#cdata-section\u003c/li\u003e\n    \u003cli\u003enodeValue 值为 CDATA 区块的内容\u003c/li\u003e\n    \u003cli\u003eparentNode 值为 Document 或 Element 对象\u003c/li\u003e\n    \u003cli\u003e不支持子节点\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eCDATA 区块只在 XML 文档中有效，因此某些浏览器比较陈旧的版本会错误地将 CDATA 区块解析 为 Comment 或 Element。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ DOM","title":"Comment"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","DOM","Comment"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
