class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>CSS选择器</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003eW3C制定了如何使用CSS选择符语法功能来访问元素的规范，被称为Selectors API，目前有两个版本：Selectors API Level 1和Selectors API Level\n    2。浏览器普遍支持Selectors APILevel 1，它定义了两个新方法，Document、DocumentFragment和Element对象都可以使用。这两个方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eElement querySelector(selectors);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eNodeList querySelectorAll(selectors);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e参数selectors就是CSS选择符语法，与HTML文档应用CSS选择符的语法格式相同，且支持所有CSS选择符语法。\u003c/p\u003e\n\u003cp\u003e前一个方法获取符合条件的第一个元素，后一个方法则是获取符合条件的所有元素，这些元素组成一个NodeList。\u003c/p\u003e\n\u003cp\u003e使用选择器 querySelectorAll() 方法比使用 getElementsByTagName() 的方法快得多。因此，如果浏览器支持的话，最好使用 querySelectAll()\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e在 Selectors API2 版本的规范中，新增了一个 matchesSelector() 方法。这个方法接受一个参数，即 CSS 选择符，如果调用元素与该选择符匹配，则返回 true ；否则，则返回 false\n        。目前，浏览器的支持不是太好。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e例如存在下面的HTML文档片段：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt;正确的认知是\u0026lt;em\u0026gt;非常\u0026lt;/em\u0026gt;重要的！\u0026lt;/p\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;em\u0026gt;去看看吧！\u0026lt;/em\u0026gt; \u0026lt;/body\u0026gt; 那么下面的CSS代码都可以呈现P元素： \u0026lt;style type=\"text/css\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ep { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e/* 类型选择符 */ \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ebody p { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*\n        派生选择符 */ \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ebody\u0026gt;p { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/* 子选择符 */\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/style\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e于是，使用下面的程序代码就可以获取p元素：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar p = document.querySelector(\"body p\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar p = document.querySelector(\"body \u0026gt; p\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar p = document.querySelector(\"p\");\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e同样，因为下面的CSS代码都可以呈现em元素：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;style type=\"text/css\"\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eem { /* 类型选择符 */ }\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ep em { /* 派生选择符 */ }\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ep \u0026gt; em { /* 子选择符 */ }\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ebody em { /* 派生选择符 */ }\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ebody \u0026gt; em { /* 子选择符 */ }\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/style\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e于是，使用下面的程序代码就可以获取em元素：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar em = document.querySelector(\"em\"); \u003cspan class=\"r\"\u003e// 返回的是第一个em元素\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar em = document.querySelector(\"p em\"); \u003cspan class=\"r\"\u003e// 返回的是第一个em元素\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar em = document.querySelector(\"p \u0026gt; em\"); \u003cspan class=\"r\"\u003e// 返回的是第一个em元素\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar em = document.querySelector(\"body em\"); \u003cspan class=\"r\"\u003e// 返回的是第一个em元素\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar em = document.querySelector(\"body \u0026gt; em\"); \u003cspan class=\"r\"\u003e// 返回的是第二个em元素\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e也可以使用querySelectorAll()方法返回一个NodeList对象：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar nl = document.querySelectorAll(\"em\"); \u003cspan class=\"r\"\u003e// 返回两个em元素\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar nl = document.querySelectorAll(\"p em\"); \u003cspan class=\"r\"\u003e// 返回一个em元素\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar nl = document.querySelectorAll(\"p \u0026gt; em\"); \u003cspan class=\"r\"\u003e// 返回一个em元素\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar nl = document.querySelectorAll(\"body em\"); \u003cspan class=\"r\"\u003e// 返回两个em元素\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar nl = document.querySelectorAll(\"body \u0026gt; em\"); \u003cspan class=\"r\"\u003e// 返回一个em元素\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e然后获取节点列表中的元素：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar len = nl.length;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003efor (var i=0;i\u0026lt;len;i++){\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar aNode = nl[i];\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(aNode);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e也可以处理伪类和伪元素选择符，例如下面的代码获取已经访问过的超链接a元素：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar vlinks = document.querySelectorAll(\":visited\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003efor (var i = 0; i \u0026lt; vlinks.length; i++) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 查看每个a元素的地址可以获取用户的单击\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 将信息传回服务器就可以统计用户的偏好所在\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003epost2server(vlinks[i].href);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e也可以使用群选择符作为参数，例如下面的代码获取第一个符合的p元素或em元素：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar e = document.querySelector(\"p, em\");\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e而下面的代码则意味着可以获取所有p元素或em元素：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar nl = document.querySelectorAll(\"p, em\");\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003ematches()\u003c/h5\u003e\n\u003cp\u003ematches()方法（在规范草案中称为 matchesSelector()）接收一个 CSS 选择符参数，如果元素 匹配则该选择符返回 true，否则返回 false。\u003c/p\u003e\n\u003cp\u003e使用这个方法可以方便地检测某个元素会不会被 querySelector()或 querySelectorAll()方 法返回。\n\u003c/p\u003e\n\u003ch5\u003eClassName\u003c/h5\u003e\n\u003cp\u003eHTML5 通过给所有元素增加 classList 属性为这些操作提供了更简单也更安全的实现方式。 classList 是一个新的集合类型 DOMTokenList 的实例。与其它 DOM\n    集合类型一样，DOMTokenList 也有 length 属性表示自己包含多少项，也可以通过 item()或中括号取得个别的元素。此外， DOMTokenList 还增加了以下方法。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eadd(value)，向类名列表中添加指定的字符串值 value。如果这个值已经存在，则什么也不做\u003c/li\u003e\n    \u003cli\u003econtains(value)，返回布尔值，表示给定的 value 是否存在\u003c/li\u003e\n    \u003cli\u003eremove(value)，从类名列表中删除指定的字符串值 value\u003c/li\u003e\n    \u003cli\u003etoggle(value)，如果类名列表中已经存在指定的 value，则删除；如果不存在，则添加\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e焦点管理\u003c/h5\u003e\n\u003cp\u003eHTML5 增加了辅助 DOM 焦点管理的功能。首先是 document.activeElement，始终包含当前拥 有焦点的 DOM 元素。页面加载时，可以通过用户输入（按 Tab 键或代码中使用 focus()方法）让某个\n    元素自动获得焦点。\n\u003c/p\u003e\n\u003cp\u003e默认情况下，document.activeElement 在页面刚加载完之后会设置为 document.body。而在 页面完全加载之前，document.activeElement 的值为 null。其次是\n    document.hasFocus()方法，该方法返回布尔值，表示文档是否拥有焦点。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003elet button = document.getElementById(\"myButton\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003ebutton.focus();\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(document.hasFocus()); \u003cspan class=\"r\"\u003e// true\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ DOM","title":"CSS选择器"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","DOM","CSS选择器"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
