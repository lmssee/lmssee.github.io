k(\"这里是服务器端的信息\");\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e使用 JSONP\u003c/h5\u003e\n\u003cp\u003eJSONP 就是 JSON with Padding 的简写。它能够通过在客户端文档中生成脚本标记（\u0026lt;script\u0026gt; 标签）来调用跨域脚本时的规定。是一个非官方的协议。\u003c/p\u003e\n\u003cp\u003ecallback 是回调函数的名称，然后在小括号运算符内调用该函数\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ecallback({ \u003c/span\u003e\u003cspan class=\"p4\"\u003e\"title\": \"JSONP Test\", \u003c/span\u003e\u003cspan class=\"p4\"\u003e\"link\":\n        \"https:\u003cspan class=\"r\"\u003e// lmssee.cn/\", \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e\"modified\":\n        \"2016-12-1\", \u003c/span\u003e\u003cspan class=\"p4\"\u003e\"items\": [{ \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\"title\": \"百度\", \u003c/span\u003e\u003cspan class=\"p6\"\u003e\"link\": \"http:\u003cspan class=\"r\"\u003e// www.baidu.com\",\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\"description\": \"百度侧重于中国网民的习惯，搜索结果更加大众化\" \u003c/span\u003e\u003cspan class=\"p4\"\u003e}, {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\"title\": \"google\", \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\"link\": \"http:\u003cspan class=\"r\"\u003e// www.google.cn\", \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\"description\":\n        \"google 搜索更加直观，尤其在搜索问术性文章，结果更加的准确\" \u003c/span\u003e\u003cspan class=\"p4\"\u003e}] \u003c/span\u003e\u003cspan class=\"p2\"\u003e})\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在回调函数中对对象进行组成分析和分解。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction callback(info) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar temp = \"\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i\n        in info) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (typeof info[i] != \"object\") { \u003c/span\u003e\u003cspan class=\"p8\"\u003etemp += i + \" = \\\"\"\n        + info[i] + \"\\\"\u0026lt;br/\u0026gt;\"; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} else if ((typeof info[i] == \"object\") \u0026\u0026 (info[i].constructor == Array)) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003etemp += \"\u0026lt;br/\u0026gt; \" + i + \" = \" + \"\u0026lt;br/\u0026gt;\u0026lt;br/\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p8\"\u003evar a =\n        info[i]; \u003c/span\u003e\u003cspan class=\"p8\"\u003efor (var j = 0; j \u0026lt; a.length; j++) { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003evar o = a[j]; \u003c/span\u003e\u003cspan class=\"p10\"\u003efor (var e in o) { \u003c/span\u003e\u003cspan class=\"p12\"\u003etemp += \"\"\n        + e + \" = \\\" \" + o[e] + \"\\\"\u0026lt;br/\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p10\"\u003etemp +=\n        \"\u0026lt;br/\u0026gt;\" \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003evar div =\n        document.getElementById(\"test\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003ediv.innerHTML = temp; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e结合 JSONP 约定来实现跨域异步信息的交互\u003c/h6\u003e\n\u003cp class=\"p4\"\u003e在客户端调用提供的 JSONP 支持的 URL 服务，获取 JSONP 格式数据\u003c/p\u003e\n\u003cp\u003e所谓的 JSONP 支持的 URL 服务，就是在请求的 URL 中必须添加附加在客户端的回调函数，并约定正确的设置回调函数参数，默认参数名为 json 或 callback 。\u003c/p\u003e\n\u003ch5\u003e设计动态表格\u003c/h5\u003e\n\u003cp\u003e为了方便设计表格，HTML 为 \u0026lt;table\u0026gt;、\u0026lt;tbody\u0026gt;、\u0026lt;tr\u0026gt; 设计了一些属性和方法。\u003c/p\u003e\n\u003cp\u003e为 \u0026lt;table\u0026gt; 设计的属性和方法\u003c/p\u003e\n\u003cul id=\"this_a\"\u003e\u003c/ul\u003e\n\u003cp\u003e为 \u0026lt;tbody\u0026gt; 设计的属性和方法\u003c/p\u003e\n\u003cul id=\"this_b\"\u003e\u003c/ul\u003e\n\u003cp\u003e为 \u0026lt;table\u0026gt; 设计的属性和方法\u003c/p\u003e\n\u003cul id=\"this_c\"\u003e\u003c/ul\u003e\n\u003cscript\u003e\n    var this_a = ['caption: 保存着对\u003ccaption\u003e元素的指针', 'tBodies: 是一个\u003ctbody\u003e的指针', 'tFoot: 保存着\u003ctfoot\u003e的指针', 'tHead: 保存着\u003cthead\u003e的指针', 'rows: 是一个表格所有行的 HTMLCollection', 'createTHead(): 创建\u003cthead\u003e元素，并将其放回表格中，返回引用', 'createTFoot(): 创建\u003ctfoot\u003e元素，并将其放回表格中，返回引用', 'createCaption(): 创建\u003ccaption\u003e元素，并将其放回表格中，返回引用', 'deleteTHead()：删除\u003cthead\u003e元素', 'deleteTFoot()：删除\u003ctfoot\u003e元素', 'deleteCaption：删除 caption 元素', 'deleteRow(pos)：删除指定行的位置', 'insertRow(pos)：向 rows 集合中的指定位置添加一行'];\n    _MiMethod.li(\"this_a\");\n    var this_b = ['rows：保存着\u003ctbody\u003e元素中的行的 HTMLCollection', 'deleteRow(pos)：删除指定位置的行', 'insertRow(pos)：向 rows 集合内指定位置插入一行，返回对新插入行的引用'];\n    _MiMethod.li(\"this_b\");\n    var this_c = ['cells ： 保存着\u003ctr\u003e元素中单元格的 HTMLCollection', 'deleteCell(pos)：删除指定位置的单元格', 'insertCell(pos)：向 cell 集合中的指定位置插入一个单元格，返回对指定的单元格的引用'];\n\u003c/script\u003e\n\u003cp\u003e例 --—— 原始方法\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003etable = document.createElement(\"table\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003etablebody =\n        document.createElement(\"tbody\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var j = 0; j \u0026lt; 2; j++) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ecurrent_row = document.createElement(\"tr\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efor (var i = 0; i \u0026lt; 2; i++) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecurrent_cell =\n        document.createElement(\"td\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003ecurrenttext = document.createTextNode(\"第 \" + j + \" 行，第\n        \" + i + \"列\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003ecurrent_cell.appendChild(currenttext); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ecurrent_row.appendChild(current_cell); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003etablebody.appendChild(current_row); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003etable.appendChild(tablebody); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.body.appendChild(table); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003etable.setAttribute(\"border\", \"1\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003etable.setAttribute(\"width\",\n        \"100%\");\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e例 --—— 新增加方法\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar table = document.createElement('table'); \u003c/span\u003e\u003cspan class=\"p2\"\u003etable.border =\n        1; \u003c/span\u003e\u003cspan class=\"p2\"\u003etable.width = \"100%\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar tbody =\n        document.createElement('tbody'); \u003c/span\u003e\u003cspan class=\"p2\"\u003etable.appendChild(tbody); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003etbody.insertRow(0); \u003c/span\u003e\u003cspan class=\"p2\"\u003etbody.row(0).insertCell(0); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003etbody.row(0).cells(0).appendChild(document.createTextNode(\"第1行，第1列\")); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003etbody.row(0).insertCell(1); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003etbody.row(0).cells(1).appendChild(document.createTextNode(\"第1行，第2列\")); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003etbody.insertRow(1); \u003c/span\u003e\u003cspan class=\"p2\"\u003etbody.row(1).createCell(0); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003etbody.row(1).cells(0).appendChild(document.createTextNode(\"第2行，第1列\")); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003etbody.row(1).createCell(1) \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003etbody.row(1).cells(1).appendChild(document.createTextNode(\"第2行，第2列\")); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.body.appendChild(table);\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e个人觉得，脱裤子放屁\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e链接文字颜色设置\u003c/h5\u003e\n\u003cp\u003e链接文字颜色设置通过使用alinkColor属性、linkColor属性和vlinkColor属性来实现。\u003c/p\u003e\n\u003ch6\u003ealinkColor属性\u003c/h6\u003e\n\u003cp\u003e该属性用来获取或设置当链接获得焦点时显示的颜色。\u003c/p\u003e\n\u003cp\u003e语法格式如下： 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[color=]document.alinkColor[=setColor] \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003esetColor：设置颜色的名称或颜色的RGB值。setColor是可选项。\u003c/p\u003e\n\u003cp\u003ecolor：字符串变量，用来获取颜色值。color是可选项。\u003c/p\u003e\n\u003ch6\u003elinkColor属性\u003c/h6\u003e\n\u003cp\u003e该属性用来获取或设置页面中未单击的链接的颜色。\u003c/p\u003e\n\u003cp\u003e语法格式如下： 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[color=]document.linkColor[=setColor] \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003esetColor：设置颜色的名称或颜色的RGB值。setColor是可选项。\u003c/p\u003e\n\u003cp\u003ecolor：字符串变量，用来获取颜色值。color是可选项。\u003c/p\u003e\n\u003ch6\u003evlinkColor属性\u003c/h6\u003e\n\u003cp\u003e该属性用来获取或设置页面中单击过的链接的颜色。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[color=]document.vlinkColor[=setColor] \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003esetColor：设置颜色的名称或颜色的RGB值。setColor是可选项。\u003c/p\u003e\n\u003cp\u003ecolor：字符串变量，用来获取颜色值。color是可选项。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;a id=\"a1\"\n        href=\"https://lmssee.cn\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003eJavaScript论坛\u0026lt;/a\u0026gt;\u0026lt;/font\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;script language=\"JavaScript\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.vlinkColor = \"#00CCFF\"; \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.linkColor = \"green\";\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.alinkColor = \"000000\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e文档前景色和背景色设置\u003c/h5\u003e\n\u003cp\u003e文档背景色和前景色的设置可以使用bgColor属性和fgColor属性来实现。\u003c/p\u003e\n\u003ch6\u003ebgColor属性\u003c/h6\u003e\n\u003cp\u003e该属性用来获取或设置页面的背景颜色。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[color=]document.bgColor[=setColor]\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003esetColor：设置颜色的名称或颜色的RGB值。setColor是可选项。\u003c/p\u003e\n\u003cp\u003ecolor：字符串变量，用来获取颜色值。color是可选项。\u003c/p\u003e\n\u003ch6\u003efgColor属性\u003c/h6\u003e\n\u003cp\u003e该属性用来获取或设置页面的前景颜色，即页面中文字的颜色。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[color=]document.fgColor[=setColor]\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003esetColor：设置颜色的名称或颜色的RGB值。setColor是可选项。\u003c/p\u003e\n\u003cp\u003ecolor：字符串变量，用来获取颜色值。color是可选项。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e背景自动变色\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\n        \u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar Arraycolor = new Array(\"#00FF66\", \"#FFFF99\",\n        \"#99CCFF\", \"#FFCCFF\", \"#FFCC99\", \"#00FFFF\", \"#FFFF00\", \"#FFCC00\", \"#FF00FF\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar n = 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction turncolors() { \u003c/span\u003e\u003cspan class=\"p6\"\u003en++;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (n == (Arraycolor.length - 1)) n = 0; \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.bgColor =\n        Arraycolor[n]; \u003cspan class=\"r\"\u003e//设置页面的背景颜色\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edocument.fgColor = Arraycolor[n - 1]; \u003cspan class=\"r\"\u003e//设置页面的文字颜色\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003esetTimeout(\"turncolors()\", 1000); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eturncolors();\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e查看文档创建日期、修改日期和文档大小\u003c/h5\u003e\n\u003ch6\u003efileCreatedDate属性\u003c/h6\u003e\n\u003cp\u003e该属性用来获取文档的创建日期。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[date=]fileCreatedDate\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003efileModifiedDate属性\u003c/h6\u003e\n\u003cp\u003e该属性用来获取文档修改的日期。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[date=]fileModifiedDate\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003elastModified属性\u003c/h6\u003e\n\u003cp\u003e该属性用来获取文档修改的时间。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[date=]lastModified\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003efileSize属性\u003c/h6\u003e\n\u003cp\u003e该属性用来获取文档的大小。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[size=]fileSize\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e获取并设置URL\u003c/h5\u003e\n\u003cp\u003e获取并设置URL主要使用URL属性来实现。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[url=]document.URL[=setUrl]\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eurl：字符串表达式，用来存储当前文档的URL。url是可选项。\u003c/p\u003e\n\u003cp\u003esetUrl：字符串变量，用来设置当前文档的URL。setUrl是可选项。\u003c/p\u003e\n\u003ch5\u003e获取对象的当前状态\u003c/h5\u003e\n\u003cp\u003e在文档中获取某个对象的当前状态可以使用readyState属性来实现。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e[state=]obj.readyState\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eobj：需要显示状态的对象，是必选项。\u003c/p\u003e\n\u003cp\u003estate：字符串变量，用来获取当前对象的状态。\u003c/p\u003e\n\u003ctable\u003e\n    \u003ccaption\u003estate的状态值及说明\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e状态值\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eloading\u003c/td\u003e\n        \u003ctd\u003e表示该对象正在载入数据\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003eloaded\u003c/td\u003e\n        \u003ctd\u003e表示该对象数据载入完毕\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003einteractive\u003c/td\u003e\n        \u003ctd\u003e用户可以和该对象进行交互，不管该对象是否已加载完毕\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003ecomplete\u003c/td\u003e\n        \u003ctd\u003e该对象初始化完毕\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e在文档中输出数据\u003c/h5\u003e\n\u003ch6\u003ewrite方法。\u003c/h6\u003e\n\u003cp\u003e该方法用来向HTML文档中输出数据，其数据包括字符串、数字和HTML标记等。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.write(text);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数text表示在HTML文档中输出的内容。\u003c/p\u003e\n\u003ch6\u003ewriteln方法。\u003c/h6\u003e\n\u003cp\u003e该方法与write方法的作用大致相同，唯一的区别在于writeln方法在所输出的内容后添加了一个回车换行符。但回车换行符只有在HTML文档中的\u0026lt;pre\u0026gt;...\u0026lt;/pre\u0026gt;标记（此标记把文档中的空格、回车、换行等表现出来）内才能被识别。\n\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edocument.writeln(text);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数text表示在HTML文档中输出的内容。\u003c/p\u003e\n\u003ch5\u003e动态添加一个HTML标记\u003c/h5\u003e\n\u003cp\u003e动态添加一个HTML标记可以使用createElement方法来实现。\u003c/p\u003e\n\u003cp\u003ecreateElement方法可以根据一个指定的类型来创建一个HTML标记。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003esElement=document.createElement(sName)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003esElement：用来接收该方法返回的一个对象。\u003c/p\u003e\n\u003cp\u003esName：用来设置HTML标记的类型和基本属性。\u003c/p\u003e\n\u003ch5\u003e获取文本框并修改其内容\u003c/h5\u003e\n\u003cp\u003e获取文本框并修改其内容可以使用getElementById方法来实现。\u003c/p\u003e\n\u003cp\u003egetElementById方法可以通过指定的id来获取HTML标记，并将其返回。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003esElement=document.getElementById(id)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003esElement：用来接收该方法返回的一个对象。\u003c/p\u003e\n\u003cp\u003eid：用来设置需要获取HTML标记的id值。\u003c/p\u003e\n\n\u003c!--  \u003cscript\u003e\n        document.write(\"\u003cb\u003e该文档创建日期:＆nbsp;\u003c/b\u003e\" + document.fileCreatedDate + \"\u003cbr\u003e\");\n        document.write(\"\u003cb\u003e该文档修改日期:＆nbsp;\u003c/b\u003e\" + document.fileModifiedDate + \"\u003cbr\u003e\");\n        document.write(\"\u003cb\u003e该文档修改时间:＆nbsp;\u003c/b\u003e\" + document.lastModified + \"\u003cbr\u003e\");\n        document.write(\"\u003cb\u003e该文档大小:＆nbsp;\u003c/b\u003e\" + document.fileSize + \"\u003cbr\u003e\");\u003c/script\u003e--\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ DOM","title":"应用"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","DOM","应用"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
