class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>元素节点</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e元素节点特征：\u003c/p\u003e\n\u003cul id=\"this_a\"\u003e\u003c/ul\u003e\n\u003cp\u003e所有的 HTML 元素都是 HTMLElement 类型或者其子类的实例，HTMLElement 又是Element 或者 EntityReference，在继承 Element 类型时又添加一些新属性。\u003c/p\u003e\n\u003cul id=\"this_b\"\u003e\u003c/ul\u003e\n\u003cscript\u003e\n    var this_a = [\"nodeType 的值为1\", \"nodeName 值为元素的名称，也可以是tagName属性\", \"nodeValue 值为 null\",\n        \"parentNode 是Document 或 Element\", \"子节点可以是Element、Text、Comment、ProcessingInstruction、CDATASection\"\n    ];\n    _MiMethod.li(\"this_a\");\n    var this_b = [\"id 元素在文档中的唯一标识符\", \"title 有关元素的附加说明，一般通过工具提示条显示出来\", \"lang 元素内容的语言编码，很少使用\",\n        \"dir 语言的方向，值为\\\"ltr（从左到右）\\\"、\\\"rtl\\\"（从右到左），很少使用\", \"className 与元素的 class 特性对应，即为元素指定的 css 类样式\"\n    ];\n\u003c/script\u003e\n\u003ch5\u003e访问元素\u003c/h5\u003e\n\u003ch6\u003egetElementById() 方法\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003edocument.getElementById(ID); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 id 为文档中的元素对应的 id 属性值。如果文档中不存在指定元素，则返回 null。该方法只适用于 Document 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;div id=\"box\"\u0026gt;盒子\u0026lt;/div\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar box =\n        document.getElementById(\"box\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar info = \"nodeName: \" + box.nodeName; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003einfo += \"\\rnodeType: \" + box.nodeType; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003einfo += \"\\rparentNode: \" + box.parentElement.nodeName; \u003c/span\u003e\u003cspan class=\"p2\"\u003einfo +=\n        \"\\rchildNode: \" + box.childNodes[0].nodeName; \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(info) \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003egetElementsByTagName() 方法\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003edocument.getElementsByTagName(tagName); \u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e遍历元素\u003c/h5\u003e\n\u003ch6\u003e获取指定元素的第一个元素\u003c/h6\u003e\n\u003cp\u003e使用 parentNode、nextSibling、previousSibling、firstChild、lastChild 属性可以遍历文档树中每一个元素\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction first(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = e.firstChid; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewhile (e\n        \u0026\u0026 e.nodeType != 1) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ee = nextSibling; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn e \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e获取指定元素的最后一个元素\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction last(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = e.lastChild; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewhile (e \u0026\u0026\n        e.nodeType != 1) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ee = e.previousSibling; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ereturn e \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e获取多级父元素\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction parent(e, n) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar n = n || 1; \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i\n        = 0; i \u0026lt; n; i++) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (e.nodeType == 9) break; \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (e != null)\n        e = e.parentNode; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn e \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e获取指定元素的上一个元素\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction pre(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = e.previousSibling; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewhile\n        (e \u0026\u0026 e.nodeType != 1) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ee = e.previousSibling \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ereturn e \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e获取下一个元素\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction next(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = e.nextSibling; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewhile (e\n        \u0026\u0026 　ｅ.nodeType != 1) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ee = e.nextSibling \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn e \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e对于元素间的空格，IE 9 及以前的版本不会返回文本节点，而其它的浏览器都会返回文本节点。则有了下面几个属性：\u003c/p\u003e\n\u003c/div\u003e\n\u003cul\u003e\n    \u003cli\u003echildElementCount 返回子元素的个数，不包括文本节点和注释\u003c/li\u003e\n    \u003cli\u003efirstElementChild 指向第一个子元素\u003c/li\u003e\n    \u003cli\u003elastElementChild 指向最后一个之元素\u003c/li\u003e\n    \u003cli\u003epreviousElementSibling 指向前一个兄弟元素\u003c/li\u003e\n    \u003cli\u003enextElementSibling 指向后一个相邻兄弟元素\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e创建元素\u003c/h5\u003e\n\u003cp\u003ecreateElement() 能够根据参数添加指定的标签名创建一个新的元素，并返回这个元素的引用。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003evar element = document.createElement(\"tagName\"); \u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e复制节点\u003c/h5\u003e\n\u003cp\u003ecloneNode() 可以复制指定节点。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003ecloneNode() 会复制原元素的一切，包括 id ，然而，一个文档只能有一个 id，所以就需要改一个。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e当创建大量相同的节点时，使用节点克隆更有效率。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction tableClonedDOM() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar i, table, thead, tbody, tr,\n        th, td, a, ul, li, oth = document.createElement(\"th\"), \u003c/span\u003e\u003cspan class=\"p6\"\u003eotd =\n        document.createElement(\"td\"), \u003c/span\u003e\u003cspan class=\"p6\"\u003eotr = document.createElement(\"li\"), \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eoul = document.createElement(\"ul\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003etbody =\n        document.createElement(\"tbody\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003efor (var i = 0; i \u0026lt;= 1000; i++) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etr = ort.cloneNode(false); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etd = otd.cloneNode(false); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etd.appendChild(document.createTextNode((i % 2) ? \"yes\" : \"no\")); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etr.appendChild(td); \u003c/span\u003e\u003cspan class=\"p6\"\u003etd = otd.cloneNode(false); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etd.appendChild(document.createTextNode(i)); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etr.appendChild(td); \u003c/span\u003e\u003cspan class=\"p6\"\u003etd = otd.cloneNode(false); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etd.appendChild(document.createTextNode('my name is # ' + i)); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etr.appendChild(td); \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// ... \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// .... \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e插入元素\u003c/h5\u003e\n\u003ch6\u003eappendChild() 方法\u003c/h6\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e将元素添加到文档树之后，浏览器会直接呈现该元素，之后对该元素做的任何修改都会直接在浏览器中显示。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003einsertBefore() 方法\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003einsertBefore(newChild, refChild); \u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e删除元素\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003enodeObject.removeChild(node); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e封装移除节点函数\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction remove(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar _e\n        = e.parentNode.removeChild(e); \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn _e \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ereturn undefined \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e移除某节点下所有节点\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction empty(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewhile (e.firstChild) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ee.removeChild(e.firstChild) \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e替换元素\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003enodeObject.replaceChild(new_note, old_node); \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 new_node 为指定新的节点，old_node 是被替换的旧节点。如果替换成功，则返回被替换的节点，若不成功则返回 null 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;div id=\"box1\"\u0026gt;盒子1 \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div\n        id=\"box2\"\u0026gt;盒子2\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"box3\"\u0026gt;盒子3\u0026lt;/div\u0026gt;\n        \u0026lt;/div\u0026gt;\u0026lt;div id=\"box4\"\u0026gt;盒子4 \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"box5\"\u0026gt;盒子5\u0026lt;/div\u0026gt;\n        \u0026lt;/div\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar box1, box2, box3, box4, array = []; \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i = 0; i \u0026lt; 5; i++)\n        { \u003c/span\u003e\u003cspan class=\"p4\"\u003earray[i] = document.getElementById(\"box\" + (i + 1)); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = array[0].removeChild(array[1]); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(a.innerText); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = array[3].replaceChild(a, array[4]);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(b.innerText); \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e获取焦点元素\u003c/h5\u003e\n\u003cp\u003e在文档中查询哪个元素获得了焦点，以及确认文档是否获得了焦点，对提升 Web 应用的无障碍性非常重要。\u003c/p\u003e\n\u003cp\u003eHTML 5 新增了 document.activeElement 属性可以引用 DOM 中当前获得焦点的元素。元素获取焦点的方式包括：页面载入、用户输入、在脚本调入 focus() 方法。\u003c/p\u003e\n\u003cp\u003e在默认情况下，文档刚加载完成时，document.activeElement 引用的是 document.body 元素，文档加载期间，document.activeElement 的值为 null。\u003c/p\u003e\n\u003ch5\u003e检查包含节点\u003c/h5\u003e\n\u003cp\u003econtains() 是 IE 私有的方法，用来检测某个节点是不是另一个节点的子代。该方法接受一个参数，指定检测的后代节点。\u003c/p\u003e\n\u003cp\u003eDOM Level 3 定义了 compareDocumentPosition() 方法，该方法也能够确定节点间的关系。用法与 contains() 相同，但是返回值不同。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003ecompareDocumentPosition() 方法返回一个整数，用来描述两个节点在文档中的位置。\u003c/p\u003e\n\u003c/div\u003e\n\u003cul\u003e\n    \u003cli\u003e1 没关系，两个节点不在同一文档\u003c/li\u003e\n    \u003cli\u003e2 第一个节点位于第二个节点后\u003c/li\u003e\n    \u003cli\u003e4 第一个节点定位在第二个节点前\u003c/li\u003e\n    \u003cli\u003e8 第一个节点在第二个节点内\u003c/li\u003e\n    \u003cli\u003e16 第二个节点在第一个节点内\u003c/li\u003e\n    \u003cli\u003e32 没有关系，或者说两个节点是同一个节点的两个属性\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction contains(refNode, otherNode) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (typeof\n        refNode.contains === \"function\" \u0026\u0026 (!client.engine.webkit || client.engine.webkit \u0026gt;= 522)) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ereturn refNode.contains(otherNode); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} else if (typeof refNode.compareDocumentPosition === \"function\") { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        !!(refNOde.compareDocumentPosition(otherNode) \u0026 16); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar node = otherNode.parentNode; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edo { \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (node == refNode) { \u003c/span\u003e\u003cspan class=\"p10\"\u003ereturn true\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p10\"\u003enode = node.parentNode; \u003c/span\u003e\u003cspan class=\"p8\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} while (node !== null); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn false \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ DOM","title":"元素节点"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","DOM","元素节点"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
