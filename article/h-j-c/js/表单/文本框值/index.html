\"\u003ethis.select(); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003efield2.onfocus = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.select();\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eHTML5 新增两个属性： selectionStar、 selectionEnd，这两个属性保存文本选取开头和结尾的偏移量。 IE 8 之前的版本不支持该属性，但是在 document.selection\n    对象，其中保存着用户在整个文档内选择的信息。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction getSelectedText(textbox) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (typeof\n        textbox.selectionStar == \"number\") { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        textbox.value.substring(textbox.selectionStar, textbox.selectionEnd); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if\n        (document.selection) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn document.selection.createRange().text; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form action=\"javascript:alert('已成功提交 ')\" id=\"form\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;textarea\n        name=\"\" id=\"\" cols=\"30\" rows=\"10\"\u0026gt;en\u0026lt;/textarea\u0026gt; \u0026lt;/form\u0026gt;\n        \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar form = document.querySelector(\"form\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar field1 = form.elements[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003efield1.onfocus = function() {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(getSelectedText(this)) \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e如果选择部分文本，则使用
