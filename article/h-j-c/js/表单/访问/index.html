                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e访问表单对象\u003c/h5\u003e\n\u003cp\u003e表单通过 \u0026lt;form\u0026gt; 标签定义，在 HTML 中 \u0026lt;form\u0026gt; 每出现一次， form 对象就创建一次。 from 对象属于 HTMLFromElement 类型，继承于 HTMLElement，\n    HTMLFormElement 拥有专有属性。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003efrom 对象属性\u003c/caption\u003e\n\u003c/table\u003e\n\u003cp\u003e另外， form 对象还有两个专用方法。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ereset()：将所有表单域重置为默认值\u003c/li\u003e\n    \u003cli\u003esubmit()：提交表单\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form action=\"\" id=\"form1\"\u0026gt;\u0026lt;/form\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar form =\n        window.document.getElementById(\"form1\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(form.id); \u003cspan class=\"r\"\u003e// \"form1\"\n        \u003c/span\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e还可以利用 HTML 的 document.forms 集合获取， document.forms 表示页面中所有的表单对象的集合，可以通过数字索引或 name 值取得特定表单。注意，同时为表单指定 id 和 name\n    属性，但它们值可以不同。\u003c/p\u003e\n\u003cp\u003e使用 form 对象的 elements 属性。 elements 集合是一个有序列表，包含表单中所有的字段，如 \u0026lt;input\u0026gt;、 \u0026lt;textarea\u0026gt;、 \u0026lt;button\u0026gt;、\n    \u0026lt;select\u0026gt; 和 \u0026lt;fieldset\u0026gt; 。每个表单字段在 elements 集合中的顺序，与它们在表单中的顺序相同。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form action=\"\" id=\"form1\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;h3\u0026gt;反馈表 \u0026lt;/h3\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;fieldset\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;p\u0026gt;姓名： \u0026lt;input type=\"text\"\n        class=\"special\" name=\"name\"\u0026gt;\u0026lt;/p\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;p\u0026gt;性别 \u0026lt;input type=\"radio\" name=\"sex\" id=\"\" value=\"0\"\u0026gt;男\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;input\n        type=\"radio\" name=\"sex\" id=\"\" value=\"1\"\u0026gt;女\u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/p\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;p\u0026gt;邮箱 \u0026lt;input type=\"text\" name=\"email\" id=\"\"\u0026gt;\u0026lt;/p\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;p\u0026gt;网址 \u0026lt;input type=\"text\" name=\"web\" id=\"\"\u0026gt;\u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;p\u0026gt;反馈意见 \u0026lt;textarea name=\"message\" id=\"\" rows=\"10\"\n        cols=\"30\"\u0026gt;\u0026lt;/textarea\u0026gt;\u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;p class=\"submit\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;button type=\"submit\"\u0026gt;提交表单 \u0026lt;/button\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/p\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/fieldset\u0026gt; \u0026lt;/form\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar form =\n        document.getElementById(\"form1\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar field0 = form.elements[0]; \u003cspan class=\"r\"\u003e// fieldset \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        field2 = form.elements[1]; \u003cspan class=\"r\"\u003e// input \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar field3 =\n        form.elements[2]; \u003cspan class=\"r\"\u003e// input[name=\"sex\"][value=0] \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar field4 =\n        form.elements[3]; \u003cspan class=\"r\"\u003e// input[name=\"sex\"][value=1] \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar field5 =\n        form.elements[4]; \u003cspan class=\"r\"\u003e// input[name=\"email\"] \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar field6 =\n        form.elements[5]; \u003cspan class=\"r\"\u003e// input[name=\"web\"] \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar field7 =\n        form.elements[6]; \u003cspan class=\"r\"\u003e// textarea[name=\"message\"] \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar field8 =\n        form.elements[7]; \u003cspan class=\"r\"\u003e// button[type=\"submit\"] \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar field2 =\n        form.elements[\"name\"]; \u003cspan class=\"r\"\u003e// 通过 name 找到姓名文本框\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar filedCount =\n        form.elements.length; \u003cspan class=\"r\"\u003e// 获取表单字段个数\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(form.elements[3] ==\n        form.elements[\"sex\"][1]); \u003cspan class=\"r\"\u003e// true \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e尽量使用 elements ，因为表单属性只是为了兼容早期浏览器而保留的一种过渡形式。\u003c/p\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        [\"acceptCharset\", \"服务器可接受的字符集。等价于\u003cfrom accept-charset=\\\"UTF-8\\\"\u003e\"],\n        [\"action\", \"设置或返回表单的 action 属性 \"],\n        [\"enctype\", \"设置或返回表单用来编码内容的 MIME 类型，及请求的编码类型。等价于\u003cform enctype=\\\"multipart\\/form-data\\\"\u003e\"],\n        [\"id\", \"设置或返回表单的 id 。等价于\u003cform id=\\\"login\\\"\u003e\"],\n        [\"length\", \"返回表单的控制数目 \"],\n        [\"elements\", \"表单中所有控制的集合 \\（ HTMLCollection\\） \"],\n        [\"method\", \"设置或返回将数据发送到服务器的 HTTP 方法，即发送的 HTTP　请求类型。等价于\u003cform method=\\\"get\\\"\u003e\"],\n        [\"name\", \"设置或返回表单的名称。等价于\u003cform name=\\\"login\\\"\u003e\"],\n        [\"target\", \"设置或返回表单提交结果的 frame 或 window 名称，即发送请求和接受响应的窗口名称。等价于\u003cform target=\\\"new\\\"\u003e\"]\n    ];\n    _MiMethod.td(\"Aa\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 表单","title":"访问"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","表单","访问"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
