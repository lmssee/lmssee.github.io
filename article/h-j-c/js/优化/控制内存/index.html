  <script id="__NEXT_DATA__"
    type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003e 在很多基于虚拟机的程序语言中，都有析构方法用来在对象被清除之后显式地进行内存垃圾的回收以清理内存。但 JavaScript 没有析构方法用来显式地清理内存，用于执行 JavaScript\n    程序的解释引擎是自动管理内存的，自动管理内存意味着定期进行内存垃圾的回收。 \u003c/p\u003e\n\u003cp\u003e 虽然解释引擎会定期进行内存垃圾的回收，但用户也应该养成良好的习惯，当一个变量不再使用时，应该为它赋值为 null ，这样将会告诉解释引擎该变量符合垃圾回收条件；或者使用 delete\n    语句删除对象的属性，虽然对象不能被删除，但是使该对象的属性所引用的内存也符合垃圾回收条件，从而可以节省内存。 \u003c/p\u003e\n\u003cp\u003e 解释引擎定期从内存中清除程序中不再引用的所有对象和变量，这种操作称为垃圾回收。垃圾回收的基本原理是，当对象不具有指向它的引用时，即可对其进行垃圾回收，并会在下次执行垃圾回收系统时恢复内存。 \u003c/p\u003e\n\u003ch6\u003e 释放变量引用 \u003c/h6\u003e\n\u003cp\u003e 例如下面的代码创建一个新 Object 对象，并将对该对象的引用分配给变量 o ： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar o = new Object();\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 当为 o 赋值为 null 或另一个值时，该变量与 Object 对象的引用关系被断开，当解释引擎下次执行垃圾回收系统时， Object 对象会被从内存中删除，从而节省了内存，代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eo = null;\u003c/span\u003e\u003cspan class=\"p\"\u003eo = \"$1 意一个值 \";\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e 释放属性引用 \u003c/h6\u003e\n\u003cp\u003e 对象的属性也可以引用另外一个对象，例如下面的代码， o 的属性 birthDay 引用了另外一个 Date 对象： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\" p\"\u003evar o = new Object();\u003c/span\u003e\u003cspan class=\" p\"\u003eo.birthDay = new Date(1980,7,5);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 这时，可以使用 delete 语句删除对象的属性，从而使属性与 Date 对象的引用关系断开，当解释引擎下次执行垃圾回收系统时， Date 对象会被从内存中删除，代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\" p\"\u003edelete o.birthDay;\u003c/span\u003e\u003cspan class=\" p\"\u003edocument.write(o.birthDay); \u003cspan class=\"r\"\u003e//\n            删除后的值为 undefined\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 当然，如果此时将 o 赋值为 null 或另一个值，可以使 Object 和 Date 对象均处于可以被垃圾回收的状态。 \u003c/p\u003e\n\u003ch6\u003e 释放数组元素引用 \u003c/h6\u003e\n\u003cp\u003e 数组元素也可以引用对象，当该元素不再使用时，应该使用 delete 语句将其删除，如果数组不再使用，那么应该将引用数组的变量设置为 null 。 \u003c/p\u003e\n\u003cp\u003e 例如下面的代码，第二个元素引用了一个 Date 对象，当不再使用时，就调用 delete 语句删除该元素，但数组长度不会发生变化： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar tom = new Array(\"male\", new Date(1980,7,5));\u003c/span\u003e\u003cspan class=\"p\"\u003edelete\n        tom[1];\u003c/span\u003e\u003cspan class=\"p\"\u003edocument.write(tom[1]); \u003cspan class=\"r\"\u003e// 输出 undefined\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003edocument.write(tom.length); \u003cspan class=\"r\"\u003e// 输出 2\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 如果数组不再使用，那么： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etom = null;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 对于复合数组，也遵守相同的规则，代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar tom = new Array();\u003c/span\u003e\u003cspan class=\"p\"\u003etom[\"sex\"] = \"male\";\u003c/span\u003e\u003cspan\n        class=\"p\"\u003etom[\"birthday\"] = new Date(1980,7,5);\u003c/span\u003e\u003cspan class=\"p\"\u003e// 如果不再使用 birthday 元素 \u003c/span\u003e\u003cspan\n        class=\"p\"\u003edelete tom[\"birthday\"];\u003c/span\u003e\n    \u003cspan class=\"p\"\u003edocument.write(tom[\"birthday\"]); \u003cspan class=\"r\"\u003e// 输出 undefined\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 如果复合数组不再使用，那么执行： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etom = null;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e 最佳实践。 \u003c/p\u003e\n\u003cp\u003e 在一些文档中也提到：当不再使用时，应该将函数中定义的对象变量也赋值为 null ，以使其符合垃圾回收条件。这是一种错误的提法，因为变量在函数中的生存周期仅限于函数自身，当函数执行结束后，该变量自行消失，无需再将变量赋值为\n    null 。 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 优化","title":"控制内存"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","优化","控制内存"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
