    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e使用函数\u003c/h5\u003e\n\u003cp\u003e函数有两个接口，参数作为接口，接受外部信息，然后返回值，作为出口，与外界实现互动。\u003c/p\u003e\n\u003cp\u003e在 JavaScript 中，共有四种函数调用方式：方法调用模式、函数调用模式、构造器调用模式、apply 调用模式。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e当函数被保存为一个对象的的属性值时，我们叫它方法\u003c/li\u003e\n    \u003cli\u003e函数调用模式，有一个语言设计缺陷\u003c/li\u003e\n    \u003cli\u003e使用 new 构造一个新的对象实例\u003c/li\u003e\n    \u003cli\u003eapply 方法包括两个参数，第一个参数设置绑定给 this 的值，第二个参数包含函数参数的数组\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e接口\u003c/h5\u003e\n\u003cp\u003e函数提供两个接口与外界交互，其中参数作为入口，接收外部信息，然后返回值，作为出口，与外界实现互动。\u003c/p\u003e\n\u003ch6\u003e函数返回值\u003c/h6\u003e\n\u003cp\u003e在函数体内，使用 return 语句可设置函数的返回值，一旦运行 return 语句，它立即停止函数的运行，并把 return 后的表达式运算值返回。如果不包含 return 语句，则执行函数体内每一条语句，最后返回\n    undefined 值。\u003c/p\u003e\n\u003cp\u003e使用\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e函数的简单调用\u003c/li\u003e\n    \u003cli\u003e在事件响应中调用函数\u003c/li\u003e\n    \u003cli\u003e通过链接调用函数\u003c/li\u003e\n    \u003cli\u003e返回值 return\u003c/li\u003e\n    \u003cli\u003e调用函数 （）\u003c/li\u003e\n    \u003cli\u003e函数作用域\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e特殊的调用方式\u003c/h5\u003e\n\u003cp\u003e由于定义在网页中的函数可以看作是全局对象window的方法，所以，也可以使用下面的两种方式调用函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction add(x, y) {\u003c/span\u003e\u003cspan class=\"p2\"\u003evar result = x + y;\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn\n        result;\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e方法一。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar data = window.add(2, 3); \u003cspan class=\"r\"\u003e// 5\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e方法二。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar data = window[\"add\"](2, 3); \u003cspan class=\"r\"\u003e// 5\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e箭头函数\u003c/h5\u003e\n\u003cp\u003e箭头符号（=\u0026gt;）用作一个匿名函数的缩写。这通常称为箭头函数（arrow function）。\u003c/p\u003e\n\u003cp\u003e按照更加通用的方式，箭头函数写成如下所示。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eparam =\u0026gt; statements/expression\u003c/span\u003e\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 函数","title":"使用"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","函数","使用"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
