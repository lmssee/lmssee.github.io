="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>函数对象</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e使用函数对象\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e获取函数形参个数\u003cmark\u003eFunction 对象的 length 属性在函数体内外都可以用\u003c/mark\u003e\u003c/li\u003e\n    \u003cli\u003e自定义属性\u003cmark\u003e函数内定义的属性只能在函数调用后才可用 ,函数外定义的属性随处可用\u003c/mark\u003e\u003c/li\u003e\n    \u003cli\u003e自定义方法\u003cmark\u003e与嵌套函数不同 ,自定义方法可在函数体外使用\u003c/mark\u003e\u003c/li\u003e\n    \u003cli\u003e使用 call ()\u003c/li\u003e\n    \u003cli\u003e使用 apply ()\u003c/li\u003e\n    \u003cli\u003e使用 bind ()\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e获取函数的形参个数\u003c/h6\u003e\n\u003cp\u003e使用 arguments 。\u003c/p\u003e\n\u003ch6\u003e自定义属性\u003c/h6\u003e\n\u003cp\u003e作为对象，可以通过点语法为函数自定义静态属性或方法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction f() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ef.x = 1; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ef.y = 2; \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(f.x + \"\u0026lt;br/\u0026gt;\"); \u003cspan class=\"r\"\u003e//\n            undefined\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(f.y + \"\u0026lt;br/\u0026gt;\"); \u003cspan class=\"r\"\u003e//\n            2\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ef(); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(f.x); \u003cspan class=\"r\"\u003e// 1\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e与嵌套函数不同，函数的方法可以在函数外部调用。\u003c/p\u003e\n\u003ch5\u003e使用 call() 和 apply() \u003c/h5\u003e\n\u003cp\u003ecall() 和 apply() 是 Function 对象的原型方法，它们能够将特定函数当作一个方法绑定到指定对象上并进行调用。具体如下。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction.call(thisObj,args...)\u003c/span\u003e\u003cspan class=\"p\"\u003efunction.apply(thisObj,args)\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e其中参数 thisObj 表示指定的对象，参数 args 表示要传递给调用函数的参数。 call() 方法只能接受多个参数列表，而 apply() 只能接受伪数组或者数组，数组元素将作为参数传递给调用函数。\u003c/p\u003e\n\u003ch6\u003ecall\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efunction.call(thisObj,args...)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003ecall() 是 Function 的原型方法 ,能够将特定的函数当作一个方法绑定到指定的对象上进行调用 .. call()只能接收多个参数列表 。将 Function 函数绑定到 thisObj 上 ,并传入多个参数。\n\u003c/p\u003e\n\u003cp\u003e这种调用是临时的 ,在调用完后会自动销毁。若再次调用，就会显示编译错误。\u003c/p\u003e\n\u003cp\u003e该方法能动态改变 this 指代对象。\u003c/p\u003e\n\u003cp\u003e如果使用 call() 方法，就需要把数组所有的元素全部读出来，然后再逐一传递给 call 方法，显然这种方法不是很方便。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction max(){ \u003cspan class=\"r\"\u003e//求最大值函数\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar m =\n        Number.NEGATIVE_INFINITY; \u003cspan class=\"r\"\u003e//声明一个负无穷大的数值\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efor(var i = 0; i \u0026lt;\n        arguments.length; i++){ \u003cspan class=\"r\"\u003e//遍历所有实参\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif(arguments[i] \u0026gt; m) \u003cspan class=\"r\"\u003e//如果实参值大于 m \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003em =\n        arguments[i]; \u003cspan class=\"r\"\u003e//则把该实参值赋给 m\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn m;\n        \u003cspan class=\"r\"\u003e//返回最大值\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar a = [23 , 45 , 2 ,46 ,45 ,56 ,63]; \u003cspan class=\"r\"\u003e//\n            声明并初始化数组\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003evar m = max.apply(Object, a); \u003cspan class=\"r\"\u003e//动态调用max ，\n            绑定为Object 的方法\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(m); \u003cspan class=\"r\"\u003e//返回63\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003ecall 和 apply 的主要功能\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e调用函数\u003c/li\u003e\n    \u003cli\u003e修改函数体内的this指代对象\u003c/li\u003e\n    \u003cli\u003e为对象绑定方法\u003c/li\u003e\n    \u003cli\u003e跨越限制修改调用不用类型的方法\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar x = \"o\"; \u003cspan class=\"r\"\u003e//定义全局变量 x，初始化为 \"o\"\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003efunction\n        a(){ \u003cspan class=\"r\"\u003e//定义函数类结构 a\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.x = \"a\"; \u003cspan class=\"r\"\u003e//定义函数局部变量 x，初始化为\n            \"a\"\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003efunction b(){ \u003cspan class=\"r\"\u003e//定义函数类结构 b\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.x = \"b\"; \u003cspan\n            class=\"r\"\u003e//定义函数内部局部变量 x，初始化为 \"b\"\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003efunction c(){\n        \u003cspan class=\"r\"\u003e//定义函数类结构 c\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(x); \u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003efunction f() { \u003cspan class=\"r\"\u003e//\n            定义普通函数，提示当前指针所包含的变量\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(this.x);\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan\n        class=\"p\"\u003ef(); \u003cspan class=\"r\"\u003e//返回字符 o，即全局变量 x 的值。this 指向 window 对象\u003c/span\u003e\n        \u003cspan class=\"p\"\u003ef.call(window); \u003cspan class=\"r\"\u003e// 返回字符串 \"o\"\u003c/span\u003e\u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p\"\u003ef.call( new a()); \u003cspan class=\"r\"\u003e// 返回字符 a ，即函数 a 内部局部变量 x 的值\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003ef.call( new b()); \u003cspan class=\"r\"\u003e// 返回字符 b ，即函数 b 内部局部变量 x 的值\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ef.call(c);\u003c/span\u003e\u003cspan class=\"p\"\u003e\u003cspan class=\"r\"\u003e// undefined ，即函数 c 内部的局部变量 x 的值，但是该函数并没有定义 x\n            变量,\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用 call() 和 apply() 可以将一个函数转化为指定对象的方法，变在这个对象上调用该方法。这种行为只是临时的，函数实际上并没有作为对象的方法而存在，当函数被动态调用后，这个对象的临时方法也会注销。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction f() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(122) \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ef.call(Object); \u003c/span\u003e\u003cspan class=\"p2\"\u003eObject.f(); \u003cspan class=\"r\"\u003e// 不会弹出框，控制台报错 Object.f is\n            not a function\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在函数体内， call() 和 apply() 第一个调用的就是函数体内 this 的值。为了更好的理解，下例：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction f() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.a = \"x\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003ethis.b\n        = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\"y\") \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction e() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ef.call(this); \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(a) \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ee();\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上例中，如果在函数体内，使用 call() 和 apply() 方法动态调用外部函数，并把 call() 和 apply() 方法的第一个参数设置为关键字 this ，则当前 e 函数将继承 f\n    函数的所有属性。即，call() 和 apply() 方法能够复制调用函数体内的内部变量给当前函数体。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction r(x) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn x \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction f(x) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ex[0] = x[0] + \"\u0026gt;\" \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        x; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efunction o() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar temp = r; \u003c/span\u003e\u003cspan class=\"p4\"\u003er = function() {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn temp.apply(this, f(arguments)) \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction a() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eo(); \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.write(r(\"=\") + \"\u0026lt;br/\u0026gt;\") \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i = 0; i \u0026lt; 10; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ea() \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上述代码执行结果如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e=\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e=\u0026gt;\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e=\u0026gt;\u0026gt;\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e=\u0026gt;\u0026gt;\u0026gt;\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e=\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e=\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e=\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e=\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e=\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e=\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e该函数的核心在于 o 函数的设计，首先使用一个临时变量储存函数 r 。然后修改函数 r 的结构，在修改的 r 函数结构中，通过调用 apply() 方法修改原来的指针指向当前的对象，同时执行原函数 r ，并把执行函数 f\n    的值传毒给它，从而实现修改函数 r 的 return 语句的后半部分信息，即返回一个增加了 \"=\" 的前缀。这次每调用一次，都会增加一个前缀，从而形成动态的效果。\u003c/p\u003e\n\u003ch5\u003ebind\u003c/h5\u003e\n\u003cp\u003eECMAScript 5 为 Function 增加了一个原型方法 bind （ Function.prototype.bind ）,用来把函数绑定在指定对象上。从本质讲，它允许在其它原型链中执行一个函数。\u003c/p\u003e\n\u003cp\u003e也就是说，对于指定的函数，创建具有与原始函数相同的主体绑定函数，在绑定函数中， this 对象将解析为传入对象。绑定对象具有指定的初始参数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efunction.bind(thisArg[,arg1[,arg2[,argN]]])\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数说明。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003efunction：必须参数，一个函数对象\u003c/li\u003e\n    \u003cli\u003ethisArg： 必须参数，this 关键字可在新函数中引用的对象\u003c/li\u003e\n    \u003cli\u003earg1[,arg2[,argN]]：可选参数，要传递到新函数的参数的列表\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ebind 方法将返回与 function 相同的新函数， thisArg 对象和初始参数除外。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar checkNumericRange = function (value) {\u003c/span\u003e\u003cspan class=\"p2\"\u003eif (typeof value\n        !== \"number\")\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn false;\u003c/span\u003e\u003cspan class=\"p2\"\u003eelse\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        value \u0026gt;= this.minimum \u0026\u0026 value \u0026gt;= this.maximum;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar range = { minimum: 10, maximum: 20};\u003c/span\u003e\u003cspan class=\"p\"\u003evar\n        boundCheckNumericRage = checkNumericRange.bind(range);\u003c/span\u003e\u003cspan class=\"p\"\u003evar result =\n        boundCheckNumericRage(12);\u003c/span\u003e\u003cspan class=\"p\"\u003edocument.write(result); \u003cspan class=\"r\"\u003e//true\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar originalObject = { \u003c/span\u003e\u003cspan class=\"p4\"\u003eminimum = 50, \u003c/span\u003e\u003cspan class=\"p4\"\u003emaximum = 100,\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003echeckNumericRange: function(value) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (typeof value !== 'number')\n    \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ereturn false; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eelse \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn value \u0026gt;= this.minimum \u0026\u0026 value \u0026lt;= this.maximum;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar result =\n        originalObject.checkNumericRange(10); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(result); \u003cspan class=\"r\"\u003e//false\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar range = { \u003c/span\u003e\u003cspan class=\"p4\"\u003eminimum: 10, \u003c/span\u003e\u003cspan class=\"p4\"\u003emaximum: 20\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar boundObjectWithRange =\n        originalObject.checkNumericRange.bind(range); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(result); \u003cspan class=\"r\"\u003e//true\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eECMAScript 5 新为 String 增加了 trim 方法，该方法可以从字符串中移除前导空格、尾随空格和终止符。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eStringObj.trim();\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 StringObj 表示 String 对象或字符串。trim 方法不修改该字符串，返回值为已移除前导空格、尾随空格和终止符的原始字符串。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar message = \" abc def \\r\\n \"; \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(\"[\" +\n        message.trim() + \"]\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(\"\u0026lt;br\u0026gt;\");\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(\"length: \" + message.trim().length); \u003cspan class=\"r\"\u003e// 7\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003elength\u003c/h5\u003e\n\u003cp\u003e使用 arguments 对象的 length 属性可以获得函数的实参个数。arguments 对象只能在函数体内可见，因此，arguments.length 只能在函数体内使用。\u003c/p\u003e\n\u003cp\u003e使用函数对象的length 属性可以获取函数的形参个数该属性为只读属性。在函数体内、体外都可以使用。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction checkArg(a){ \u003cspan class=\"r\"\u003e//检测函数实参与形参是否一致\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eif(a.length !=\n        a.callee.length) \u003cspan class=\"r\"\u003e//如果实参与形参个数不同，则抛出错误\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ethrow new\n        Error(\"实参和形参不一致\");\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003efunction f(a,b){ \u003cspan class=\"r\"\u003e//求两个数的平均数\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003echeckArg(arguments);\n        \u003cspan class=\"r\"\u003e//根据arguments 来检测函数实参和形参是否一致\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn ((a * 1 ? a :0) + (b * 1 ?\n        b : 0)) \u003cspan class=\"r\"\u003e//返回平均数\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(f(6)); \u003cspan class=\"r\"\u003e//抛出异常，调用函数 f ，传入 1 个实参\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e绑定函数\u003c/h5\u003e\n\u003cp\u003e函数绑定就是为了纠正函数的执行上下文，特别是函数中带有 this 关键字时，这点尤其重要，稍微不小心，就会使函数执行上下文发生跟预期不同的改变，导致执行错误。函数绑定具有三个特征：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e函数绑定要创建一个函数，可以在特定的环境中以指定的参数调用另一个函数\u003c/li\u003e\n    \u003cli\u003e一个简单的 bind() 函数接受一个函数和一个环境，返回给另一个给定环境中调用给特定函数的函数，并且将所有的参数原封不动的传递过去\u003c/li\u003e\n    \u003cli\u003e被绑定函数与普通函数相比由更多的开销，它们需要更多的内存，同时也因为函数的调用而稍微慢一点，所以最好只在必要时使用\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction bind(fn, content) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn fn.apply(content, arguments); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e创建多个闭包会导致代码难于理解和调试，所以很多 JavaScript 库实现了一个可以将函数绑定到特定环境的函数 bind()。\u003c/p\u003e\n\u003cp\u003ebind() 函数的功能是提供一个可选的执行上下文传递给函数，并且 bind() 函数内部返回一个函数，以纠正在函数调用时出现的执行上下文的变化。最容易出现的错误就是回调函数和事件处理程序的一起使用。一个简单的 bind()\n    函数接受一个函数和环境，返回一个给定环境中调用给定函数的函数，并且将所有的参数原封不动的传递过去。\u003c/p\u003e\n\u003cp\u003e在 bind() 中产生一个闭包，该闭包使用 apply 调用传入的参数，并为 apply 传递 context 对象和参数。\u003c/p\u003e\n\u003cp\u003e注意，这里的 arguments 对象是内部函数的，为非 bind() 的。在调用返回的函数时，会给定的环境中执行被传入函数并给出所有的参数。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 函数","title":"函数对象"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","函数","函数对象"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
