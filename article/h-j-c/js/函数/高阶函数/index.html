="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>高阶函数</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e高阶函数\u003c/h5\u003e\n\u003cp\u003e高阶函数也称算子（运算符）或泛函。作为函数式编程的最显著的特点，是对函数运算进一步的抽象。高阶函数有以下条件：\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e函数可以作为参数传入，也称回调函数，如函数合成运算\u003c/li\u003e\n    \u003cli\u003e可以返回函数作为输出，如函数柯里化运算\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e回调函数\u003c/h5\u003e\n\u003cp\u003e把函数作为值传入另一个函数，达能传入函数时，就成称为回调函数，即异步调用已绑定的函数。\u003c/p\u003e\n\u003ch5\u003e链式函数\u003c/h5\u003e\n\u003cp\u003ejQuery 最大的亮点就是它的链式语法。在 JavaScript 中，很多方法没有返回值，一些设置或修改对象的某个状态却不返回任何值的方法就是最典型的例子。如果让这些方法返回 this ，而不是 undefined\n    ，那么就要启用级联功能，即所谓的链式语法。在一个级联中，单独语句可以连续调用同一个对象的很多方法。\u003c/p\u003e\n\u003cp\u003e链式语法可以产生出具备很强的表现力接口，以打造出试图一次做很多事的接口。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eFunction.prototype.method = function(name, func) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (!this.prototype[name]) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.prototype[name] = func; \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn\n        this; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eString.method('trim', function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        this.replace(/^\\s+|\\s$/g, ''); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}) \u003c/span\u003e\u003cspan class=\"p2\"\u003eString.method('writeln',\n        function() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003edocument.writeln(this); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn this; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003eString.method('alert',\n        function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.alert(this); \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn this; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}) \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar str = \"abc\"; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003estr.trim().writeln().alert();\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e函数节流\u003c/h5\u003e\n\u003cp\u003e函数节流的设计思想就是让某些代码能够再间断情况下重复执行。实现的方法就是使用定时器对函数进行节流。\u003c/p\u003e\n\u003cp\u003e函数节流是降低函数被调用的频率，主要针对DOM 事件暴露的问题，提出的一种解决的方案。\u003c/p\u003e\n\u003cp\u003e例如，使用\n    resize、mousemove、mouseover、mouseout、keydown、keyup等事件，都会频繁的触发事件，如果这些事件的处理函数包含大量的耗时操作，如Ajax请求、数据库查询、DOM遍历等，如此高频耗时的操作会让浏览器崩溃。\n\u003c/p\u003e\n\u003cp\u003e而已使用计时器避除。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eoTrigger.onmouseover = function(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eoContainer.autoTimeoutId\n        \u0026\u0026 clearInterval(oContainer.autoTimeoutId); \u003c/span\u003e\u003cspan class=\"p4\"\u003ee = e || window.event; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar target = e.target || e.srcElement; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif ((/li$/i).test(target.nodeName)) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eoContainer.autoTimeoutId =\n        setTimeout(function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003eaddTweenForContainer(oContainer, oTrigger, target);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e}, 300) \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 函数节流封装代码，参数method表示要执行的函数，delay表示要延迟时间，单位毫秒 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efunction throttle(method, delay) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar timer = null; \u003cspan class=\"r\"\u003e//\n            定时器句柄 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn function() { \u003cspan class=\"r\"\u003e// 返回节流函数 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar context = this, \u003c/span\u003e\u003cspan class=\"p8\"\u003eargs = arguments; \u003cspan class=\"r\"\u003e// 上下文环境和参数对象\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003eclearTimeout(timer); \u003cspan class=\"r\"\u003e// 先清理未执行的函数 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etimer = setTimeout(function() { \u003cspan class=\"r\"\u003e// 重新定义定时器，记录新的定时器句柄 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003emethod.apply(context, args); \u003cspan class=\"r\"\u003e// 执行预设的函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e},\n        delay); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e分支函数\u003c/h5\u003e\n\u003cp\u003e分支函数主要解决问题：浏览器之间兼容的重复判断。解决浏览器之间兼容性的一般方法是使用 if\n    语句进行检测能力检测，根据浏览器不同的实现来实现功能上的兼容，这样做的问题是：每执行一次代码，可能都需要进行一次代码检测，这是没必要的。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar XHR = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar standard = { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecreateXHR:\n        function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn new ActionXObject(\"Msxm12.XMLHTTP\");\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar oldActionXObject = { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecreateXHR: function() { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ereturn new ActionXObject(\"Microsoft.XMLHTTP\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (standard.createXHR()) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn standard \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003etry { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003enewActionXObject.createXHR(); \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn newActionXObject; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e} catch (o) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eoldActionXObject.createXHR(); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ereturn oldActionXObject; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e从代码可以看出，分支的设计原理：先声明几个不同名称的对象，但是这些对象都声明一个名称相同的方法（很关键）。针对这些来自于不同的对象，但是拥有相同的方法，根据不同的浏览器设计各自的目的，接着开始一次浏览器检测，并且由经过浏览器检测的结果来决定返回哪一个对象，这样无论返回哪一个对象，最后名称相同的方法都作为对外一致的接口。\n\u003c/p\u003e\n\u003cp\u003e这种方法再 JavaScript 运行期间进行动态监测，将检测结果返回赋值给其它对象，并且提供相同的接口，这样储存的对象就可以使用相同的接口了。其实，惰性载入函数跟分支在原理上是非常接近的，只是在代码实现方法有差异而已。\n\u003c/p\u003e\n\u003ch5\u003e惰性载入函数\u003c/h5\u003e\n\u003cp\u003e惰性载入函数主要解决的也是兼容性问题。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar addEvent = function(el, type, handle) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eaddEvent\n        = el.addEventListener ? function(el, type, handle) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eel.addEventListener(type, handle,\n        false); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} : function(el, type, handle) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eel.attachEvent(\"On\" + type, handle);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eaddEvent(el, type, handle) \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e从代码来看，惰性载入函数也是在函数内部改变自身的一种方式，这样在重复执行的时候就不用再进行兼容性方面的检测。\u003c/p\u003e\n\u003cp\u003e惰性载入表示函数执行的分支进会发生一次，即第一次调用时。在第一次调用过程中，该函数会被覆盖给另一个适合执行的函数，这样任何对原函数的调用都可以不再经过执行的分支了。其优点是：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e要执行的适当代码只有在实际调用函数时才进行\u003c/li\u003e\n    \u003cli\u003e尽管第一次调用该函数会额外的第二个函数调用而慢一点，但后续的调用都会很快，因为避免了多重条件\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e由于浏览器的行为差异，多数 JavaScript 代码包含了大量的 if 语句，将执行引导到正确的代码中。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e惰性载入表示函数执行的分支会发生一次，即函数第一次调用\u003c/li\u003e\n    \u003cli\u003e在第一次函数调用的过程中该函数会覆盖另一个按合适执行的函数。这样任何函数调用都不用在经过执行的分支了\u003c/li\u003e\n    \u003cli\u003e在下面惰性载入的 createXHR() 中，if 语句的多个分支都会为 createXHR() 变量赋值，有效覆盖了原函数，最后一步调用了新赋值函数\u003c/li\u003e\n    \u003cli\u003e下次调用 createXHR() 时候，都会直接调用被分配的函数，这样就不会再执行 if 语句\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction createXHR() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (typeof XMLHttpRequest != 'undefined') {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn new XMLHttpRequest(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (typeof ActiveXObject !=\n        'undefined') { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (typeof arguments.callee.ActiveXString != 'string') { \u003c/span\u003e\u003cspan class=\"p8\"\u003eversions =\n        [\"MSXML2.XMLHttp\", \"MSXML2.XMLHttp.3.0\", \"MSXML2.XMLHttp.6.0\"]; \u003c/span\u003e\u003cspan class=\"p8\"\u003efor (var i = 0, len\n        = versions.length; i \u0026lt; len; i++) { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003etry { \u003c/span\u003e\u003cspan class=\"p12\"\u003evar xhr = new ActiveXObject(versions[i]); \u003c/span\u003e\u003cspan\n        class=\"p12\"\u003earguments.callee.ActiveXString = versions[i]; \u003c/span\u003e\u003cspan class=\"p12\"\u003ereturn xhr; \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003e} catch (ex) { \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003e// 跳过\u003c/span\u003e\n    \u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn new\n        ActiveXObject(arguments.callee.ActiveXString); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethrow\n        new Error(\"No XHR object available.\") \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e第一次调用 createXHR() 函数时都要经过浏览器所支持的能力检测，这意味着每次调用都会调用 createXHR() 的时都会经过相同的检测，重复的检测及没必要了。减少 if\n    的使用使其不必每一次都运行，代码就会运行的快一些。解决方案就是惰性载入的技巧。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction createXHR() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (typeof XMLHttpRequest !=\n        'undefined') { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecreateXHR = function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn new\n        XMLHttpRequest(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} else if (typeof ActiveXObject != 'undefined') { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecreateXHR =\n        function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (typeof arguments.callee.ActiveXString != 'string') { \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003eversions = [\"MSXML2.XMLHttp\", \"MSXML2.XMLHttp.3.0\", \"MSXML2.XMLHttp.6.0\"]; \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003efor (var i = 0, len = versions.length; i \u0026lt; len; i++) { \u003c/span\u003e\u003cspan class=\"p12\"\u003etry {\n    \u003c/span\u003e\u003cspan class=\"p14\"\u003evar xhr = new ActiveXObject(versions[i]); \u003c/span\u003e\u003cspan\n        class=\"p14\"\u003earguments.callee.ActiveXString = versions[i]; \u003c/span\u003e\n    \u003cspan class=\"p14\"\u003ereturn xhr; \u003c/span\u003e\u003cspan class=\"p12\"\u003e} catch (ex) { \u003c/span\u003e\u003cspan class=\"p14\"\u003e// 跳过\u003c/span\u003e\u003cspan\n        class=\"p12\"\u003e} \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn new\n        ActiveXObject(arguments.callee.ActiveXString); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p8\"\u003ethrow new Error(\"No XHR object available.\") \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn createXHR() \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eif 的每一个分支都会为 createXHR 变量赋值，有效覆盖了原函数。最后一步便调用了新赋值的函数。下次调用 createXHR() 函数时就会直接调用被分配的函数，这样就不会再次执行 if 语句了。\u003c/p\u003e\n\u003ch5\u003e惰性求值\u003c/h5\u003e\n\u003cp\u003e在 JavaScript 中，使用函数式编程风格，应该对表达式有深刻的理解，并能够主动使用表达式的连续运算来组织代码。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e在运算元中，除了 JavaScript 默认的数据类型之外，函数也可以作为一个重要的运算元参与运算\u003c/li\u003e\n    \u003cli\u003e在运算符中，除了 JavaScript 的大量预制运算符外，函数也可以作为一个重要的运算符进行计算和组织代码\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e函数作为运算符参加运算，具有非惰性求值特性。非惰性求值值行为会行为自然会对整个程序产生一定的负面影响。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar a = 2; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction f(x) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn x;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(f(a, a = a * a)); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(f(a));\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e两次调用同意函数并传递同一变量，说返回值不相同。在第一次调用函数时，向函数传递两个参数，第二个参数是表达式，该表达式对变量 a 进行重新计算和赋值。也就是说，当调用函数时，第二个参数虽然没用，但是也被计算了。这就是\n    JavaScript 的非惰性求值特性。就是不管表达式是否被利用，只要在执行代码中，都会被计算。\u003c/p\u003e\n\u003cp\u003e如果在第一个函数参数中添加了几个表达式，虽然不会对函数的运算结果产生影响，但是由于表达式的执行，就会对整个程序产生负面影响。\u003c/p\u003e\n\u003cp\u003e在惰性求值语言中，如果参数不会调用，那么无论参数直接量，还是某个表达式，都不会占用系统资源。但是，由于 JavaScript 的非惰性求值，问题就变得特殊了。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efunction f(){}; \u003c/span\u003e\u003cspan class=\"p\"\u003ef(function(){while(true)}())\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e在上面的示例中，虽然函数 f 没有参数，但是在调用时会执行传递给它的参数表达式，该表达式是一个死循环的数值，将导致系统崩溃。\u003c/p\u003e\n\u003cp\u003e惰性韩式模式是一种将对函数或请求的处理延迟到真正需要结果进行的通用概念。很多应用程序都采用了这种概念，从惰性编程的思想来看，可以帮助消除代码不必要的计算。\u003c/p\u003e\n\u003ch5\u003e分时函数\u003c/h5\u003e\n\u003cp\u003e分时函数和节流函数的设计思路相同，但应用的场景略不相同。当批量操作影响页面性能时，如一次向页面添加大量的DOM节点，显然给浏览器的渲染带来了影响。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar n = 0; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar timeChunk = function(ary, fn, count) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar t; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar start = function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (var\n        i = 0; i \u0026lt; Math.min(count || 1, ary.length); i++) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar obj = ary.shift(); \u003c/span\u003e\u003cspan class=\"p8\"\u003efn(obj); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003et = setInterval(function()\n        { \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (ary.length === 0) { \u003cspan class=\"r\"\u003e// 如果全部节点都已经被创建好 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p10\"\u003ereturn clearInterval(t); \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003estart();\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e}, 200); \u003cspan class=\"r\"\u003e// 分批执行的时间间隔，也可以用参数的形式传入 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e偏函数\u003c/h5\u003e\n\u003cp\u003e偏函数是柯里化运算的一种特定场景。它是把一个函数的某些参数先固化，也就是说设置为默认值，返回一个新的函数，在新的函数继续接受剩余的参数，这样的调用这个新的函数会更简单。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction wrap(tag){\u003c/span\u003e\u003cspan class=\"p2\"\u003evar stag = '\u0026lt;' + tag +\n        '\u0026gt;';\u003c/span\u003e\u003cspan class=\"p2\"\u003evar etag = '\u0026lt;/' + tag.replace(/s.*/,'') + ' \u0026gt;';\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ereturn function(x){\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn stag + x + etag;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar b = wrap('b');\u003c/span\u003e\u003cspan\n        class=\"p\"\u003edocument.write(b('粗体字'))；\u003c/span\u003e\u003cspan class=\"p\"\u003evar i = wrap('i');\u003c/span\u003e\u003cspan\n        class=\"p\"\u003edocument.write(i('斜体字'))；\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e泛型函数\u003c/h5\u003e\n\u003cp\u003eJavaScript 具有动态类型语言的部分特点，如用户不用关心一个对象是否拥有某个方法，一个对象也不必只是用自己的方法，使用 call 和apply 可以动态调用，可以使用别人的方法，这样该方法中的 this\n    就不再局限与原对象，而是被泛化，从而得到更广泛的使用。\u003c/p\u003e\n\u003cp\u003e泛型函数（uncurry）的设计目的，将泛化 this 的过程提取出来，将 fn.call 或 fn.apply 抽象成通用的函数。\u003c/p\u003e\n\u003cp\u003e实现。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction.prototype.uncurry = function(){ \u003c/span\u003e\u003cspan class=\"p2\"\u003evar self =\n        this;\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn function() {\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        Function.prototype.apply.apply(self,arguments);\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e记忆\u003c/h5\u003e\n\u003cp\u003e函数可以利用对象去记住先前的操作，从而避免了无畏的运算。这种优化称之为记忆。JavaScript 的对象和数组要实现这种优化是很方便的。\u003c/p\u003e\n\u003cp\u003e下面是一个常规函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar fibonacci = function(n) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn n \u0026lt; 2 ? n :\n        fibonacci(n - 1) + fibonacci(n - 2); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i = o; i\n        \u0026lt;= 10; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.writeln('\u0026lt;br\u0026gt;' + i + ': ' + fibonacci(n)); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e该段代码中 fibonacci 函数被调用 435 次，其中循环调用11 次，它自身调用 442 次，去计算可能已经计算过的结果。如果该值具备记忆功能，就可以显著减少运算次数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar fibonacci = (function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar memo = [0, 1]; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        fib = function(n) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar result = memo[n]; \u003c/span\u003e\u003cspan class=\"p6\"\u003eif\n        (typeof result !== 'number') { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eresult = fib(n - 1) + fib(n - 2); \u003c/span\u003e\u003cspan class=\"p8\"\u003ememo[n] = result \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn result \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        fib \u003c/span\u003e\u003cspan class=\"p2\"\u003e}()); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efor (var i = 0; i \u0026lt;= 10; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.writeln('\u0026lt;br\u0026gt;' + i +\n        ': ' + fibonacci(i)); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e同样的计算结果，但是下面这个只被调用了 29 次，其中循环调用 11次，它自身调用 了 18 次，去取得之前的结果。\u003c/p\u003e\n\u003cp\u003e当然，我们抽象化之后，以构造带记忆功能的函数。memoizer 函数将取得一个初始的 memo 数组和 fundamental 函数。memoizer 函数返回一个管理 memo 储存在需要时调用fundamental\n    函数。memoizer 函数传递这个 shell 函数和该函数的参数给 fundamental 函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar memoizer = function(mome, formula) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar recur =\n        function(n) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (typeof result !== 'number') { \u003c/span\u003e\u003cspan class=\"p8\"\u003eresult =\n        formula(recur, n); \u003c/span\u003e\u003cspan class=\"p8\"\u003ememo[n] = result; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn result \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        recur \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这样就可以使用 memoizer 来定义 fundamental 函数，提供初始的 memo 数组和 fundamental 函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar fibonacci = memoizer([0, 1], function(recur, n) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        recur(n - 1) + recur(n - 2) \u003c/span\u003e\u003cspan class=\"p2\"\u003e})\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这种设计能产生其它函数的函数，可以极大减少不必要的工作。例如，产生一个可记忆的阶乘函数，只需提供一个基础的阶乘公司即可。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar factorial = memoizer([1, 1], function(recur, n) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        n * recur(n - 1) \u003c/span\u003e\u003cspan class=\"p2\"\u003e})\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 函数","title":"高阶函数"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","函数","高阶函数"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
