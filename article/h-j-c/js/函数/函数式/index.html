                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e函数式编程\u003c/h5\u003e\n\u003cp\u003e函数式编程有两种基本模式：compose (函数合成) 和 curry（柯里化）。\u003c/p\u003e\n\u003ch6\u003e函数合成\u003c/h6\u003e\n\u003cp\u003e在函数式编程中，经常见到这样的表表达式：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ea(b(c(x)));\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e这种包菜式的多层函数调用，不是很优雅。于是，需要函数合成。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar f = compose(a,b,c); \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e f(x);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用时需注意：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ecompose的参数式函数，返回的也是一个函数\u003c/li\u003e\n    \u003cli\u003e出了初始函数，其它函数接收参数是上一函数的返回值，所以，初始函数的参数是多元化的，而其它函数的接受值是一元的\u003c/li\u003e\n    \u003cli\u003ecompose 函数可接受任何参数，所有的参数都是函数，且执行的方向自右向左，初始函数一定放在参数的最右侧\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 函数合成，从右到左合成函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar compose =\n        function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar _arguments = arguments; \u003cspan class=\"r\"\u003e// 缓存外层参数\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003evar length = _arguments.length; \u003cspan class=\"r\"\u003e// 缓存长度 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar index = length; \u003cspan class=\"r\"\u003e// 定义游标变量 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e//\n            检测参数，如果存在非函数参数，则抛出异常 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ewhile (index--) { \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (typeof\n        _arguments[index] !== 'function') { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003ethrow new TypeError('参数必须为函数!'); \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003evar index = length - 1; \u003cspan class=\"r\"\u003e//\n            定位到最后一个参数下标 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u003cspan class=\"r\"\u003e// 如果存在2个及以上参数，则调用最后一个参数函数，并传入内层参数； \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003e\u003cspan\n            class=\"r\"\u003e// 否则直接返回第1个参数函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003evar result = length ?\n        _arguments[index].apply(this, arguments) : arguments[0]; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u003cspan class=\"r\"\u003e// 迭代参数函数 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ewhile (index--) { \u003c/span\u003e\u003cspan class=\"p10\"\u003e\u003cspan class=\"r\"\u003e// 把右侧函数的执行结果作为参数传给左侧参数函数，并调用\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p10\"\u003eresult = _arguments[index].call(this, result); \u003c/span\u003e\u003cspan class=\"p8\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn result; \u003cspan class=\"r\"\u003e// 返回最左侧参数函数的执行结果 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 反向函数合成，即从左到右合成函数\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar composeLeft = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        compose.apply(null, [].reverse.call(arguments)); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar add = function(x) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn x + 5;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003cspan class=\"r\"\u003e// 加法运算 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar mul = function(x) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn x * 5; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003cspan class=\"r\"\u003e// 乘法运算 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar sub = function(x) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ereturn x - 5; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003cspan class=\"r\"\u003e// 减法运算 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        div = function(x) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn x / 5; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003cspan class=\"r\"\u003e// 除法运算 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        fn = compose(add, mul, sub, div); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(fn(50)); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar fn =\n        compose(add, compose(mul, sub, div)); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(fn(50)); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar fn = compose(compose(add, mul), sub, div);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(fn(50));\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e函数柯里化\u003c/h5\u003e\n\u003cp\u003e函数合成是把多个单一参数的函数合成一个多参数函数的运算。而柯里化，就是把一个多参数的函数，合成为单一参数的函数。\u003c/p\u003e\n\u003ch6\u003e实现\u003c/h6\u003e\n\u003cp\u003e先用传递给函数第一部分参数调用它，让它返回一个函数，然后去处理剩下的参数，也就是说，把多参数的函数分解成多部进行操作的元素，以实现每次调用函数时，仅需要传递一个参数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar add = function(x,y){\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn x + y;\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e柯里化之后。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar add = function(x){\u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn function (y) {\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn x\n        + y;\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(add(2)(6)); \u003cspan\n            class=\"r\"\u003e//连续调用\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar add1 = add(100);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.log(add1(1)); \u003cspan class=\"r\"\u003e//分步调用\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 柯里化函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction curry(fn) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar _argLen = fn.length; \u003cspan class=\"r\"\u003e// 记录原始函数的形参个数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        _args = [].slice.call(arguments, 1); \u003cspan class=\"r\"\u003e// 把传入的第2个及以后参数转换为数组 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// curry函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003efunction wrap() { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// 把当前参数转换为数组，与前面参数进行合并 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e_args =\n        _args.concat([].slice.call(arguments)); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// 参数处理函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003efunction act() { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e\u003cspan class=\"r\"\u003e// 把当前参数转换为数组，与前面参数进行合并 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003e_args =\n        _args.concat([].slice.call(arguments)); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u003cspan class=\"r\"\u003e// 如果传入参数总和大于等于原始参数的个数，触发执行条件 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003eif ((_argLen == 0\n        \u0026\u0026 arguments.length == 0) || (_argLen \u0026gt; 0 \u0026\u0026 _args.length \u0026gt;= _argLen)) { \u003c/span\u003e\u003cspan class=\"p10\"\u003e\u003cspan\n            class=\"r\"\u003e// 执行原始函数，并把每次传入参数传入进去，返回执行结果，停止curry \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p10\"\u003ereturn fn.apply(null, _args); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn arguments.callee; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u003cspan class=\"r\"\u003e// 如果传入参数大于等于原始函数的参数个数，即触发了执行条件 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003eif ((_argLen == 0\n        \u0026\u0026 arguments.length == 0) || (_argLen \u0026gt; 0 \u0026\u0026 _args.length \u0026gt;= _argLen)) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u003cspan class=\"r\"\u003e// 执行原始函数，并把每次传入参数传入进去，返回执行结果，停止curry \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn\n        fn.apply(null, _args); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u003cspan class=\"r\"\u003e//\n            定义处理函数的字符串表示为原始函数的字符串表示 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eact.toString = function() { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ereturn fn.toString(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn act; \u003cspan\n            class=\"r\"\u003e// 返回处理函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn wrap; \u003cspan class=\"r\"\u003e//\n            返回curry函数 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 函数","title":"函数式"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","函数","函数式"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
