="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>闭包</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e使用闭包\u003c/h5\u003e\n\u003cp\u003e闭包（\n    closure）是一个函数，通常也被称为闭包函数或绑定函数，该函数运行在一个特定的环境中，该环境中定义了一些本地变量，当该函数被调用时，仍可以使用这些本地变量。内部函数可以访问外部函数的私有成员。若内部函数引用了外部函数的私有成员，同时内部函数又被传给了外界，或对外界开放，那么闭包就形成了。\n\u003c/p\u003e\n\u003cp\u003e认知闭包函数 ,就是嵌套结构的函数 ,在一个函数内定义的一个函数 . 作为闭包的必要函数 , 内部函数应该访问外部函数中声明的私有变量、参数、其它内部函数。闭包步骤说明： 。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e预编译，开始解析，创建执行环境，创建调用对象，把参数和局部变量、内部的函数转换为对象属性\u003c/li\u003e\n    \u003cli\u003e执行函数体内代码\u003c/li\u003e\n    \u003cli\u003e外部函数把内部函数返回给全局变量，实现内部函数的定义。此时，被赋值 完全继承了内部函数 的所有结构和数据\u003c/li\u003e\n    \u003cli\u003e外部函数返回，自动销毁，内部的结构、标识符和数据也随之丢失\u003c/li\u003e\n    \u003cli\u003e执行代码程序\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e函数实际只是一代代吗，是静态文本，在调用前，仅是词法意思上的结构，没有实际的价值。包括在预编译函数时，也仅是简单的分析函数的词法、语法结构，并根据函数标识符占据内存空间，其内部结构和逻辑并没有被执行。而闭包是动态的。\n    \u003c/p\u003e\n\u003c/div\u003e\n\u003ctable\u003e\n    \u003ccaption\u003e函数和闭包的比较\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e\u003c/th\u003e\n        \u003cth\u003e函数\u003c/th\u003e\n        \u003cth\u003e闭包\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e功能\u003c/td\u003e\n        \u003ctd\u003e设计逻辑结构\u003c/td\u003e\n        \u003ctd\u003e储存和传输数据\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e状态\u003c/td\u003e\n        \u003ctd\u003e静态词法域\u003c/td\u003e\n        \u003ctd\u003e动态环境\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e时间\u003c/td\u003e\n        \u003ctd\u003e即时性（调用返回后即消失）\u003c/td\u003e\n        \u003ctd\u003e延迟性（在函数返回后，还能使用）\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n        \u003ctd\u003e作用域\u003c/td\u003e\n        \u003ctd\u003e根据词法作用域，可以事先确定作用域关系\u003c/td\u003e\n        \u003ctd\u003e动态作用域，只在具体的环境中调用函数时，才能确定其作用域\u003c/td\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e如果简单描述，闭包可以说是函数的数据包，储存数据。这个数据在函数执行的过程中始终处于激活状态。当函数调用返回之后，闭包保持着与函数关联的变量的动态关系。\u003c/p\u003e\n\u003ch5\u003e理解 JavaScript中的闭包\u003c/h5\u003e\n\u003cp\u003e例如，以下代码会输出 5次，结果都是 5，如何输出 0、 1、 2、 3、 4？。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efor(var i = 0; i \u0026lt; 5; i++) {\u003c/span\u003e\u003cspan class=\"p2\"\u003esetTimeout(function()\n        {\u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(i);\u003c/span\u003e\u003cspan class=\"p2\"\u003e}, 1000);\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e利用闭包的原理实现，代码如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efor(var i = 0; i \u0026lt; 5; i++) {\u003c/span\u003e\u003cspan class=\"p2\"\u003e(function(e) {\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003esetTimeout(function() {\u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log(e);\u003c/span\u003e\u003cspan class=\"p4\"\u003e},\n        1000);\u003c/span\u003e\u003cspan class=\"p2\"\u003e})(i);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e作为值从函数返回的函数是闭包函数\u003c/h5\u003e\n\u003cp\u003e例如下面的代码，闭包函数 A()位于一个特定的环境中（被嵌套在另一个函数 B()中），并作为值从函数 B()返回：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction B()\u003c/span\u003e\u003cspan class=\"p2\"\u003e{\u003c/span\u003e\u003cspan class=\"p4\"\u003evar temp = \"abc\"; //\n        这是一个本地变量\u003c/span\u003e\u003cspan class=\"p4\"\u003efunction A() \u003cspan class=\"r\"\u003e// 定义一个闭包函数，将使用本地变量\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e{\u003c/span\u003e\u003cspan class=\"p8\"\u003ealert(\"闭包函数处理本地变量 temp的值 : \" + temp);\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e}\u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn A; // 返回闭包函数\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar\n        myFunc = B(); \u003cspan class=\"r\"\u003e// 调用函数 B()，返回的是闭包函数 a()\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003emyFunc(); \u003cspan class=\"r\"\u003e//\n            调用闭包函数 a()\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e注意， myFunc()调用是在函数 B()外边，按照常理，它不应该再访问到本地变量 temp，但实际上仍可以访问，这就是闭包函数。\u003c/p\u003e\n\u003ch5\u003e利用变量作用范围也可以形成闭包函数\u003c/h5\u003e\n\u003cp\u003e一般来说，作为参数传递给函数的函数或作为值从函数返回的函数都是闭包函数，但是，利用变量作用范围也可以形成闭包函数，例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar F; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction B() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        temp = \"abc\"; // 这是一个本地变量\u003c/span\u003e\u003cspan class=\"p4\"\u003eF = function() \u003cspan class=\"r\"\u003e//\n            定义一个闭包函数，将使用本地变量\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003e{ \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ealert(\"闭包函数处理本地变量 temp的值 : \" + temp); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eB(); \u003cspan class=\"r\"\u003e// 调用函数 B()为变量\n            F赋值\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eF(); \u003cspan class=\"r\"\u003e// 调用闭包函数 F()\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e可以看到，闭包函数 F()的调用虽不在函数 B()的局部作用范围内，但仍可以使用函数 B()中定义的私有变量 temp，这就是闭包。\u003c/p\u003e\n\u003cp\u003e闭包的核心乃是函数无论在哪里调用，仍可以访问它所处环境的变量，而这个变量在函数被调用的环境中是被其它程序访问不到的。\u003c/p\u003e\n\u003cp\u003e匿名自执行函数是非常好的利用闭包原理来实现的功能应用，使用 get和 set存取器方法定义属性也是一个很好的闭包原理应用。\u003c/p\u003e\n\u003ch5\u003e闭包函数常用的环境\u003c/h5\u003e\n\u003cp\u003e一个比较常见的应用是在执行函数之前就向函数传递参数，例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction outer(param) { \u003c/span\u003e\u003cspan class=\"p4\"\u003e//\n        返回一个匿名函数\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn (function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(param); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e}); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 调用外部函数，返回对匿名函数的引用\u003c/span\u003e\u003cspan class=\"p2\"\u003evar functRef = outer(\"abc\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e//\n        每隔 1000毫秒就执行一次匿名函数\u003c/span\u003e\u003cspan class=\"p2\"\u003esetTimeout(functRef, 1000);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e注意，每隔 1000毫秒执行一次内部的匿名函数，但是却没有向匿名函数传递新的参数。因为作为值从函数返回的函数都是闭包函数，因此，每次都能输出外部函数的参数 param的值。\u003c/p\u003e\n\u003ch5\u003e易犯的错误\u003c/h5\u003e\n\u003cp\u003e例如下面的代码，一般会认为返回 1~9这 10个数字，但是实际会输出 10次数字 10，因为匿名函数中的 i实际是在一个闭包环境下，当执行第一个 setTimeout之前， for循环肯定已经完成了， i的值现在是\n    10，因此所有的 alert(i)都会是 alert(10)：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efor (var i = 0; i \u0026lt; 10; i++) {\u003c/span\u003e\u003cspan class=\"p2\"\u003esetTimeout(function()\n        {\u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(i);\u003c/span\u003e\u003cspan class=\"p2\"\u003e}, 1000);\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e用户可以使用下面的代码解决这个问题，每次向外部的匿名函数传递一个值，实际是执行了 10个匿名函数，每一个匿名函数是一个作用范围，而 setTimeout包含在每一个匿名函数内，因此，现在会返回 1~9这 10个数字：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efor (var i = 0; i \u0026lt; 10; i++) {\u003c/span\u003e\u003cspan class=\"p2\"\u003e(function(e) {\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003esetTimeout(function() {\u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(e);\u003c/span\u003e\u003cspan class=\"p4\"\u003e},\n        1000);\u003c/span\u003e\u003cspan class=\"p2\"\u003e})(i);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e还可以使用下面的代码实现相同的功能，当 for循环执行时，实际 setTimeout的第一个参数已经执行，第一个参数的值是内嵌的一个匿名函数，这样当延迟执行时，实际上是执行的内嵌的匿名函数，此时该匿名函数内的变量\n    e实际在每次循环时已经赋值了：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efor (var i = 0; i \u0026lt; 10; i++) {\u003c/span\u003e\u003cspan class=\"p2\"\u003esetTimeout((function(e)\n        {\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn function() {\u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(e);\u003c/span\u003e\u003cspan class=\"p4\"\u003e};\n        \u003cspan class=\"r\"\u003e// 返回一个匿名函数\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e})(i), 1000)\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e如果为内嵌的函数增加一个参数：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efor (var i = 0; i \u0026lt;10; i++) {\u003c/span\u003e\u003cspan class=\"p2\"\u003esetTimeout((function(e)\n        {\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn function(e) {\u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(e);\u003c/span\u003e\u003cspan class=\"p4\"\u003e};\n        \u003cspan class=\"r\"\u003e// 返回一个匿名函数\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e})(i), 1000)\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e那么这实际会形成 10行如下的程序：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003esetTimeout(function(e){alert(e);}, 1000)\u003c/span\u003e\u003cspan class=\"p\"\u003e...\u003c/span\u003e\u003cspan\n        class=\"p\"\u003esetTimeout(function(e){alert(e);}, 1000)\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e由于没有向函数调用传递参数，所以会输出 undefined，即参数未定义。\u003c/p\u003e\n\u003ch5\u003e内存泄漏\u003c/h5\u003e\n\u003cp\u003eJavaScript的解释器都具备垃圾回收机制，一般采用的是引用计数的形式。如果一个对象的引用计数为零，则垃圾回收机制会将其回收，这个过程是自动的。但是，有了闭包的概念之后，这个过程就变得复杂起来了，在闭包中，因为局部的变量可能在将来的某些时刻需要被使用，因此垃圾回收机制不会处理这些被外部引用到的局部变量，而如果出现循环引用，即对象\n    A引用 B， B引用 C，而 C又引用到 A，这样的情况使得垃圾回收机制得出其引用计数不为零的结论，从而造成内存泄漏。\u003c/p\u003e\n\u003cp\u003e解决内存泄漏最简单的方法就是阻断内部函数对外部函数的变量引用，这样就形不成闭包。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 函数","title":"闭包"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","函数","闭包"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
