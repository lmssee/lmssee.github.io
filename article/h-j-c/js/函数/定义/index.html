="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>定义</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e函数de定义\u003c/h5\u003e\n\u003cp\u003eJavaScript 中使用 function 语句、使用Function（）构造函数、定义函数直接量。无论是哪种定义函数，都是 Function 的实例，并将继承 Function 原型的方法。\u003c/p\u003e\n\u003ch5\u003e分类\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003efunction f(){}\u003c/li\u003e\n    \u003cli\u003evar funName = new Function( p1, p2, p3 , , , , pn, body)\u003c/li\u003e\n    \u003cli\u003e函数直接量就是构造固定的函数体，匿名函数，仅包含function关键字、参数、函数体\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e声明函数\u003c/h6\u003e\n\u003cp\u003e在 JavaScript 中，使用 function 来声明函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction funName([args]){ \u003c/span\u003e\u003cspan class=\"p2\"\u003estatements\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在函数体结构中，大括号是必不可少的，若是没有大括号，则会报错。\u003c/p\u003e\n\u003cp\u003e与其它结构不同，function 结构是静态的，不会直接执行，需要调用才能运行。因此，常把函数单独放在顶部或尾部，很少在分子结构或循环结构中定义函数。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003evar 语句和 function 语句都是变量声明语句，它们声明变量在 JavaScript 预编译时被解析。在预编译期， JavaScript 编译器会把代码中的 function\n        语句定义成一个函数变量，同时解析函数内部，把函数体内所有的参数、私有变量、嵌套函数作为属性注册到函数调用对象上，以便在执行期上调用函数能够快速执行。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e构造函数\u003c/h6\u003e\n\u003cp\u003e使用 Function() 构造器可以快速生成函数：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar funName = new Function(p1 ,p2 ,... ,pn ,body );\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e构造器 Function 的参数都是字符串，p1 ~ pn 表示所创建函数的参数名称列表， body 表示所创建的函数的函数结构体语句，在 body 语句之间通过分号分隔。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eFunction() 构造器不是常用，因为一个函数体通常包含许多语句代码，如果讲这些代码以一行字符串的形式进行传递，代码的可读性会差。\u003c/p\u003e\n\u003c/div\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e使用 Function 构造器可以动态的创建函数，它不会把用户限制在 function() 语句预声明函数体中。使用 Function\n        构造器，能够将函数当作表达式使用，而不是当作一个结构，因此使用起来非常的灵活。其缺点就是，Function 构造函数是在执行期被编译，执行效率较低。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003eJavaScript 构造函数（constructor）也称构造器、类型函数，功能类似于对象模板，一个构造函数可生成任意多个实例，实例对象具有相同的属性、行为特征、但不相等。\u003c/p\u003e\n\u003ch5\u003e定义构造器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction 类型名称（配置参数）\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.属性1 = 属性名；\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.属性2 =\n        属性名；\u003c/span\u003e\u003cspan class=\"p2\"\u003e...\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.方法1 =\n        function(){\u003c/span\u003e\u003cspan class=\"p4\"\u003e//处理函数\u003c/span\u003e\u003cspan class=\"p2\"\u003e};\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e...\u003c/span\u003e\u003cspan class=\"p4\"\u003e其它代码，可以包含return语句\u003c/span\u003e\u003cspan class=\"p\"\u003e}；\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e建议构造函数的名称大写，好与普通的函数区分。\u003c/p\u003e\n\u003cp\u003e构造函数有以下两个明显的特点。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e函数体内使用 this，引用将要生成的实例对象\u003c/li\u003e\n    \u003cli\u003e必须使用 new 命令调用函数，生成实例对象\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Point(x,y){\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.x = x;\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.y\n        = y;\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.sum = function() {\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn this.x +\n        this.y;\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e调用构造函数\u003c/p\u003e\n\u003cp\u003e使用 new 命令可以调用构造函数，创建实例，并返回这个对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Point(x,y){\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.x = x;\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.y\n        = y;\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.sum = function() {\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn this.x +\n        this.y;\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar p1 = new Point(100,200);\u003c/span\u003e\u003cspan class=\"p\"\u003evar p2 = new Point(300,400);\u003c/span\u003e\u003cspan\n        class=\"p\"\u003econsole.log(p1.x);\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(p2.x);\u003c/span\u003e\u003cspan\n        class=\"p\"\u003econsole.log(p1.sum());\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(p2.sum());\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e如果不使用 new 命令，直接使用小括号调用构造函数，这时构造函数就是普通函数，不会生成实例对象，this 就代表调用函数的对象，在客户端指代全局对象 window。\u003c/p\u003e\n\u003cp\u003e为避免错误，最有效的是在函数中其中严格模式。这样调用构造函数时，必须使用 new 命令，否则会抛出异常。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Point(x,y){\u003c/span\u003e\u003cspan class=\"p2\"\u003e'use strict'\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.x =\n        x;\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.y = y;\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.sum = function()\n        {\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn this.x + this.y;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e或者使用 if 检测，如果 this 不是实例对象，则强迫返回实例对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Point(x,y){\u003c/span\u003e\u003cspan class=\"p2\"\u003eif(!(this instanceof Point)) return new\n        Point(x,y);\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.x = x;\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.y = y;\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ethis.sum = function() {\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn this.x + this.y;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e构造函数返回值\u003c/p\u003e\n\u003cp\u003e构造函数允许使用 return 语句，如果返回值为简单值，这被忽略，直接返回 this 指代的实力对象；如果返回是对象，则覆盖 this 指代的实例，返回 return 后面跟随的对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Point(x,y){\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.x = x;\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.y\n        = y;\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn {x : true , y : false};\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar\n        p1 = new Point(100,200);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.log(p1.x); \u003cspan class=\"r\"\u003e//返回 true\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(p1.y);\n        \u003cspan class=\"r\"\u003e//返回 false\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e引用构造函数\u003c/p\u003e\n\u003cp\u003e在普通函数内，使用 arguments.callee 可以引用函数自身。如果在严格模式下，是不允许使用 arguments.callee 引用函数，这时需要使用 new.target 来访问构造函数。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction Point(x,y){\u003c/span\u003e\u003cspan class=\"p2\"\u003e'use strict'\u003c/span\u003e\u003cspan class=\"p2\"\u003eif(!(this\n        instanceof new.target)) return new new.target(x,y);\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.x =\n        x;\u003c/span\u003e\u003cspan class=\"p2\"\u003ethis.y = y;\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar p1 = new Point(100,200)\u003c/span\u003e\u003cspan class=\"p\"\u003econsole.log(p1.x);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e函数直接量\u003c/h6\u003e\n\u003cp\u003e函数直接量就是结构固定的函数体。被称为匿名函数，也就是说函数没有函数名，仅包含 function 关键字、参数、函数体。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction([args]) { \u003c/span\u003e\u003cspan class=\"p4\"\u003estatements \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e使用let和const\u003c/h5\u003e\n\u003cp\u003elet加以弥补，这个关键字允许你定义具有严格的块级作用域的一个变量。\u003c/p\u003e\n\u003cp\u003econst声明创建了一个常量。\u003c/p\u003e\n\u003ch5\u003e嵌套函数\u003c/h5\u003e\n\u003cp\u003e函数可以嵌套，因此定义复杂的嵌套结构函数。\u003c/p\u003e\n\u003cp\u003e嵌套函数只能在函数内部可见，函数外是不允许直接调用的。\u003c/p\u003e\n\u003ch5\u003e三种定义方式的比较\u003c/h5\u003e\n\u003ctable id=\"this_td\"\u003e\n    \u003ccaption\u003e函数定义的方法\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e\u003c/th\u003e\n        \u003cth\u003e使用 function 语句\u003c/th\u003e\n        \u003cth\u003e使用 Function 构造函数\u003c/th\u003e\n        \u003cth\u003e使用函数直接量\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_td = [\n        [\"兼容\", \"完全\", \"JavaScript1.1及以上\", \"JavaScript1.2以上\"],\n        [\"形式\", \"语句\", \"表达式\", \"表达式\"],\n        [\"名称\", \"有名\", \"匿名\", \"匿名\"],\n        [\"主体\", \"标准语法\", \"字符串\", \"标准语法\"],\n        [\"性质\", \"静态\", \"动态\", \"静态\"],\n        [\"解析\", \"以命令的形式构造一个函数\", \"解析函数体，能够动态创建一个新的函数对象\", \"表达式形式构造一个函数对象\"],\n        [\"具有函数作用域\", \"顶级函数。，具有顶级作用域\", \"具有函数作用域\", \"作用域\"]\n    ];\n    _MiMethod.td(\"this_td\");\n\u003c/script\u003e\n\u003cul\u003e\n    \u003cli\u003e与其它结构不同，函数是静态的，需要调用才能运行\u003c/li\u003e\n    \u003cli\u003e一般，放在顶部或底部，很少在分子结构或循环结构中定义函数\u003c/li\u003e\n    \u003cli\u003eFunction() 构造函数很少使用\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"p4\"\u003e函数作用域\u003c/p\u003e\n\u003cp\u003e变量的作用范围（作用域）由声明它的位置决定，声明一个变量的同时也就指明了变量的作用范围。在一个确定的范围中，变量名应该是唯一的。\u003c/p\u003e\n\u003cp\u003e函数内部声明的变量只存在于函数内部。\u003c/p\u003e\n\u003cp\u003e我们把函数内部定义的变量称为\"局部\"变量，也就是属于函数这个\"局部\"的。函数之外声明的变量称为\"全局\"变量。全局变量和局部变量可以使用相同的名称，但仍然是不同的变量。\u003c/p\u003e\n\u003cp\u003e如果在函数中声明变量，则只有该函数中的代码可以访问或更改变量值，此时变量具有局部作用范围并被称为函数级变量。在函数中声明的变量具有局部范围，因此也被称为局部变量，每次执行函数时创建和消除此变量，并且无法从函数外部访问此变量。\n\u003c/p\u003e\n\u003cp\u003e如果在函数之外的代码声明构造块内声明变量，则该变量可以被脚本中所有函数所识别，称为Script级变量，具有脚本级作用范围。这些变量具有全局范围，因此也称为全局变量，HTML网页中的任何JavaScript脚本代码都可以访问和修改此变量值。\n\u003c/p\u003e\n\u003cp\u003e变量存在的时间称为存活期。全局变量的存活期从被声明的那一刻起，直到程序运行结束。对于函数级变量，其存活期仅是该函数运行的时间，该函数结束后，变量随之消失。在执行函数时，局部变量是理想的临时存储空间，可以在不同函数中使用同名的局部变量，这是因为每个局部变量只被声明它的函数识别。\n\u003c/p\u003e\n\u003cp\u003e在JavaScript的程序执行时，系统会在内存中保留一块全局变量的区域。实际运用时，只需直接引用就可以将需要的变量取出。因为JavaScript类没有析构方法，因此应当慎用全局变量。\u003c/p\u003e\n\u003cp\u003e在函数中，如果不使用var关键字声明变量，而是直接为变量赋值，这样的变量具有全局作用范围，因为它实际上是在使用全局变量。\u003c/p\u003e\n\u003cp\u003eFunction（）构造器创建的函数具有全局作用域，而 function（）和直接量定义的函数都有局部作用域。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar n = 1; //\n        全局变量\u003c/span\u003e\u003cspan class=\"p4\"\u003efunction f() { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar n = 2; // 局部变量\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003efunction e() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn n; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn e; // 返回函数\u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ealert(f()()) \u003cspan class=\"r\"\u003e// 返回 2 ，调用函数 f 返回函数 e \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar n = 1; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction f() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar n = 2;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = new Function(\"return n;\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn e; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(f() + \"\u0026lt;br/\u0026gt;\"); \u003cspan class=\"r\"\u003e// function\n            anonymous( ) { return n; }\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(f()()) \u003cspan class=\"r\"\u003e// 1 全局变量\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e解析方式\u003c/p\u003e\n\u003cp\u003e使用function语句和函数直接量定义的函数一般是先解析后执行，而使用 Function构造器函数不是提前解析，在运行时动态解析和执行，所以，导致 Function 定义的函数在使用时效率微低于 function 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar a = new Date(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar x = a.getTime(); \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i\n        = 0; i \u0026lt; 100000; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003e( \u003c/span\u003e\u003cspan class=\"p6\"\u003efunction() {}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e)(); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = new Date(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar y = b.getTime();\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write((y - x) + \"\u0026lt;br/\u0026gt;\"); \u003cspan class=\"r\"\u003e// 返回 10\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003evar a = new Date(); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar x = a.getTime(); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efor (var i = 0; i \u0026lt; 100000; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003enew Function(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b = new Date(); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar y = b.getTime();\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write((y - x) + \"\u0026lt;br/\u0026gt;\"); \u003cspan class=\"r\"\u003e// 返回 84\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e可用性\u003c/p\u003e\n\u003cp\u003eFunction 和函数直接量定义的函数，有很大的灵活性，当函数仅用一次时，非常适合使用。但 Function 不如函数直接量。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 函数","title":"定义"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","函数","定义"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
