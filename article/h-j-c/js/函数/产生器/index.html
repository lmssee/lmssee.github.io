    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e迭代器\u003c/h5\u003e\n\u003cp\u003e包含yield语句而不包含return语句的函数称为产生器。虽然不使用return语句，但是yield语句会将输出值保存在产生器并返回，返回值同时是一个迭代器，用户可以使用迭代方法遍历输出的所有值。\u003c/p\u003e\n\u003cp\u003e语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction myfunc(arg_1, arg_2,..., arg_n) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 执行一些语句...\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eyield (object);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 执行一些语句...但不能包含return语句返回值\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eclose()方法用于关闭产生器，一旦关闭，将会产生以下结果：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e产生器函数内的任何finally语句都将终止\u003c/li\u003e\n    \u003cli\u003e如果finally语句抛出一个异常，而不是StopIteration，那么该异常将会被传播给close()方法的调用者\u003c/li\u003e\n    \u003cli\u003e产生器终止\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eclose()方法的语法格式如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003egen.close();\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e其中，gen是一个产生器。\u003c/p\u003e\n\u003cp\u003e例如下面的代码：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction generator() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        i = 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewhile (i \u0026lt; 10) { \u003c/span\u003e\u003cspan class=\"p6\"\u003e//\n        产生输出\u003c/span\u003e\u003cspan class=\"p6\"\u003eyield i; \u003c/span\u003e\u003cspan class=\"p6\"\u003ei++; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 获取产生器\u003c/span\u003e\u003cspan class=\"p2\"\u003evar g =\n        generator(); \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 迭代\u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var j = 0; j \u0026lt; 10; j++) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.write(\"值为：\" + g.next() + \"\u0026lt;br\u0026gt; \"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (j \u0026gt; 5) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eg.close(); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e注意这段代码，当j大于5时（也就是j=6时）关闭产生器，此时已经迭代了0~6，这时关闭了产生器，for循环也会终止。\u003c/p\u003e\n\u003cp\u003e\u003cmark\u003e目前，仅Firefox浏览器支持产生器\u003c/mark\u003e。\u003c/p\u003e\n\u003ch5\u003e生成器\u003c/h5\u003e\n\u003cp\u003e生成器的形式是一个函数，函数名称前面加一个星号（*）表示它是一个生成器。只要是可以定义 函数的地方，就可以定义生成器。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e数的地方， 就可以定义生成器\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 生成器函数声明\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efunction* generatorFn() {} \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 生成器函数表达式\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003elet generatorFn = function*() {} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 作为对象字面量方法的生成器函数\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003elet foo = { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e* generatorFn() {} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n            作为类实例方法的生成器函数\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eclass Foo { * \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003egeneratorFn() {} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e//\n            作为类静态方法的生成器函数\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003eclass Bar { \u003c/span\u003e\u003cspan class=\"p4\"\u003estatic * generatorFn()\n        {} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e调用生成器函数会产生一个生成器对象。生成器对象一开始处于暂停执行（suspended）的状态。\u003c/p\u003e\n\u003cp\u003e生成器对象也实现了 Iterator 接口，因此具有 next()方法。调用这个方法会让生成器 开始或恢复执行。\n\u003c/p\u003e\n\u003cp\u003enext()方法的返回值类似于迭代器，有一个 done 属性和一个 value 属性。函数体为空的生成器 函数中间不会停留，调用一次 next()就会让生成器到达 done: true 状态。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction* generatorFn() {} \u003c/span\u003e\u003cspan class=\"p2\"\u003elet generatorObject =\n        generatorFn(); \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(generatorObject); \u003cspan class=\"r\"\u003e// generatorFn\n            {\u0026lt;suspended\u0026gt;} \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(generatorObject.next()); \u003cspan class=\"r\"\u003e// {\n            done: true, value: undefined } \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e通过 yield 中断执行\u003c/h6\u003e\n\u003cp\u003eyield 关键字可以让生成器停止和开始执行，也是生成器最有用的地方。生成器函数在遇到 yield 关键字之前会正常执行。遇到这个关键字后，执行会停止，函数作用域的状态会被保留。停止执行的生 成器函数只能通过在生成器对象上调用\n    next()方法来恢复执行。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction* generatorFn() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eyield; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003elet generatorObject = generatorFn(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(generatorObject.next()); \u003cspan class=\"r\"\u003e// { done: false, value: undefined }\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(generatorObject.next()); \u003cspan class=\"r\"\u003e// { done: true, value: undefined }\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e此时的yield 关键字有点像函数的中间返回语句，它生成的值会出现在 next()方法返回的对象里。 通过 yield 关键字退出的生成器函数会处在 done: false 状态；通过 return 关键字退出的生成器函\n    数会处于 done: true 状态。\u003c/p\u003e\n\u003cp\u003eyield 关键字只能在生成器函数内部使用，用在其它地方会抛出错误。类似函数的 return 关键字， yield 关键字必须直接位于生成器函数定义中，出现在嵌套的非生成器函数中会抛出语法错误。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction* generatorFn(initial) { \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(initial);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(yield); \u003c/span\u003e\u003cspan class=\"p4\"\u003econsole.log(yield); \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003elet generatorObject = generatorFn('foo'); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003egeneratorObject.next('bar'); \u003cspan class=\"r\"\u003e// foo \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003egeneratorObject.next('baz'); \u003cspan class=\"r\"\u003e// baz \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003egeneratorObject.next('qux'); \u003cspan class=\"r\"\u003e// qux \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction* generatorFn() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn yield 'foo'; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003elet generatorObject = generatorFn(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003econsole.log(generatorObject.next()); \u003cspan class=\"r\"\u003e// { done: false, value: 'foo' }\n        \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(generatorObject.next('bar')); \u003cspan class=\"r\"\u003e// { done: true, value: 'bar' }\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction* range(start, end) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewhile (end \u0026gt; start) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eyield start++; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efor (const x of range(4, 7)) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log(x); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 4\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 5 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 6\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction* zeroes(n) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ewhile (n--) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eyield 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003econsole.log(Array.from(zeroes(8))); \u003cspan class=\"r\"\u003e// [0, 0, 0, 0, 0,\n            0, 0, 0] \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e产生可迭代对象\u003c/h6\u003e\n\u003cp\u003e可以使用星号增强 yield 的行为，让它能够迭代一个可迭代对象，从而一次产出一个值。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction* generatorFn() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eyield*[1, 2]; \u003c/span\u003e\u003cspan class=\"p4\"\u003eyield*[3,\n        4]; \u003c/span\u003e\u003cspan class=\"p4\"\u003eyield*[5, 6]; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (const x of\n        generatorFn()) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log(x); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 1\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 2 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 3\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 4 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 5 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 6 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e使用 yield*实现递归算法\u003c/h6\u003e\n\u003cp\u003e生成器可以产生自身\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction* nTimes(n) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (n \u0026gt; 0) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eyield*\n        nTimes(n - 1); \u003c/span\u003e\u003cspan class=\"p6\"\u003eyield n - 1; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (const x of nTimes(3)) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econsole.log(x); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 0\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 1 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// 2\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e每个生成器首先都会从新创建的生成器对象产出每个值，然后再产出一个整数。结 果就是生成器函数会递归地减少计数器值，并实例化另一个生成器对象。从最顶层来看，这就相当于创 建一个可迭代对象并返回递增的整数。 使用递归生成器结构和\n    yield*可以优雅地表达递归算法。\u003c/p\u003e\n\u003ch6\u003e提前终止生成器\u003c/h6\u003e\n\u003cp\u003ereturn()和 throw()方法都可以用于强制生成器进入关闭状态。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 函数","title":"产生器"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","函数","产生器"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
