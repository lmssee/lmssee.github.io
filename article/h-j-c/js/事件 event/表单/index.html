    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e获得焦点与失去焦点事件 \u003c/h5\u003e\n\u003cp\u003e获得焦点事件（ onfocus）是当某个元素获得焦点时触发事件处理程序。失去焦点事件（ onblur）是当前元素失去焦点时触发事件处理程序。在一般情况下，这两个事件是同时使用的。 \u003c/p\u003e\n\u003cp\u003e如果是隐藏字段（ \u0026lt;input type=\"hidden\"\u0026gt;），或者使用 CSS 的 display 和 visibility 隐藏字段显示，设置其获得焦点，将会引发异常。 \u003c/p\u003e\n\u003ch5\u003e失去焦点修改事件 \u003c/h5\u003e\n\u003cp\u003e失去焦点修改事件（ onchange）是当前元素失去焦点并且元素的内容发生改变时触发事件处理程序。该事件一般在下拉文本框中使用。 \u003c/p\u003e\n\u003ch5\u003e选择文本 \u003c/h5\u003e\n\u003cp\u003e当在文本框或文本区域内选择文本时，将会触发 select 事件。通过该事件，用户可以设计选择操作的交互行为。在调用 select() 方法时，也会触发 select 事件。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;input type=\"text\" value=\"请选择字符串 \" id=\"a\"\u0026gt; \u0026lt;input type=\"text\" id=\"b\"\u0026gt;\n        \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = document.getElementsByTagName(\"input\")[0]; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003evar b = document.getElementsByTagName(\"input\")[1]; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ea.onselect = function() { \u003cspan class=\"r\"\u003e// 为第一个文本绑定 select 事件处理函数 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eif (document.selection) { \u003cspan class=\"r\"\u003e// 兼容 IE \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003eo =\n        document.selection.createRange(); \u003cspan class=\"r\"\u003e// 创建一片区域 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (o.text.length \u0026gt; 0) b.value = o.text; \u003cspan class=\"r\"\u003e// 如果区域内文本存在 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} else { \u003cspan class=\"r\"\u003e// 兼容 DOM \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p6\"\u003ep1 = a.selectionStart; \u003cspan\n            class=\"r\"\u003e// 文本框中选择起始位置 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ep2 = a.selectionEnd; \u003cspan class=\"r\"\u003e// 文本框中结束位置 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eb.value = a.value.substring(p1, p2); \u003cspan class=\"r\"\u003e// 赋值 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e字段值变化监测 \u003c/h5\u003e\n\u003cp\u003echange 事件类型是在表单元素的值发生变化时触发，它主要用于 input、 select 和 textarea 元素。对于 input 和 textarea 来说，当它们失去焦点且 value 值改变时触发；对于\n    select 元素，在其选择改变时触发，也就是说不失去焦点，也会触发 change 事件。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;input type=\"text\" id=\"a\"\u0026gt; \u0026lt;input type=\"text\" id=\"b\"\u0026gt; \u0026lt;script\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = document.getElementsByTagName(\"input\")[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar b =\n        document.getElementsByTagName(\"input\")[1]; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ea.onchange = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eb.value = this.value; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n        \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e关于 select 的 change 事件。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;select\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;option value=\"https:\u003cspan class=\"r\"\u003e//\n            lmssee.cn\"\u0026gt;本站 \u0026lt;/option\u0026gt; \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;option value=\"https:\u003cspan class=\"r\"\u003e//\n            lmssee.art.blog\"\u0026gt;个人微博 \u0026lt;/option\u0026gt; \u003c/span\u003e\u0026lt;/select\u0026gt;\n        \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = document.getElementsByTagName(\"select\")[0]; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ea.onchange = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.open(this.value, \"\") \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在其它元素的 change 事件。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;input type=\"radio\" name=\"r\" id=\"\" value=\"1\" checked=\"checked\"\u0026gt; \u0026lt;input\n        type=\"radio\" name=\"r\" id=\"\" value=\"2\"\u0026gt; \u0026lt;input type=\"radio\" name=\"r\" id=\"\" value=\"3\"\u0026gt; \u0026lt;script\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = document.getElementsByTagName(\"input\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efor (var i = 0; i \u0026lt; a.length; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ea[i].onchange = function() {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003econsole.log(this.value); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n        \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e对于 input 来说，由于 change 是在失去焦点时触发，会显得略有迟钝。为了更好的用户体验，很多时候，使用按键离开或是鼠标点击更为快速。 \u003c/p\u003e\n\u003cp\u003efocus、 blue 和 change 事件常常配合使用。一般在 focus 和 blur 事件来以某种方式改变用户界面，或是向界面添加额外的功能。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form action=\"javascript:alert(123)\" id=\"my\" method=\"post\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;p\u0026gt;\u0026lt;label for=\"txtNumbers\"\u0026gt;请输入文字： \u0026lt;/label\u0026gt;\u0026lt;br\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;input type=\"text\" name=\"numbers\" id=\"txtNumbers\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/p\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p\u0026gt;\u0026lt;input type=\"submit\" value=\"提交表单 \"\n        id=\"submit-btn\"\u0026gt;\u0026lt;/p\u0026gt; \u0026lt;/form\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar form =\n        document.getElementById(\"my\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar numbers = form.elements[\"numbers\"]; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003enumbers.onfocus = function(event) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = event || window.event;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar t = e.target || e.srcElement; \u003c/span\u003e\u003cspan class=\"p4\"\u003et.style.backgroundColor =\n        \"#ff0\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003enumbers.onblur = function(event) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ee = event || window.event;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar target = e.target || e.srcElement; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (/[^\\d]/.test(target.value)) { \u003c/span\u003e\u003cspan class=\"p6\"\u003etarget.style.backgroundColor = \"#f00\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003etarget.style.backgroundColor = \"\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003enumbers.onchange = function(event) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e\n        = event || window.event; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar t = e.target || e.srcElement; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (/[^\\d]/.test(target.value)) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003etarget.style.backgroundColor = \"#f00\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etarget.style.backgroundColor = \"\" \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003enumbers.focus(); \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e表单提交与重置事件 \u003c/h5\u003e\n\u003cp\u003e表单提交事件（ onsubmit）是在用户提交表单时（通常使用 \"提交 \"按钮，也就是将按钮的 type属性设为 submit），在表单提交之前被触发，因此，该事件的处理程序通过返回\n    false值来阻止表单的提交。该事件可以用来验证表单输入项的正确性。\n\u003c/p\u003e\n\u003cp\u003e表单重置事件（ onreset）与表单提交事件的处理过程相同，该事件只是将表单中的各元素的值设置为原始值，一般用于清空表单中的文本框。 \u003c/p\u003e\n\u003cp\u003e下面给出这两个事件的使用格式： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;form name=\"formName\" onReset=\"return FunName\" onsubmit=\"return\n        FunName\"\u0026gt;\u0026lt;/form\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eformName：表单名称。 \u003c/p\u003e\n\u003cp\u003eFunName：函数名或执行语句。如果是函数名，在该函数中必须有布尔型的返回值。 \u003c/p\u003e\n\u003cp\u003e注意　如果在 onsubmit和 onreset事件中调用的是自定义函数名，那么，必须在函数名的前面加 return语句；否则，不论在函数中返回的是 true，还是 false，当前事件所返回的值一律是 true值。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form action=\"\" id=\"a\" name=\"a\" method=\"post\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input\n        type=\"text\" name=\"t\" id=\"t\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input type=\"submit\"\n        name=\"\"\u0026gt; \u0026lt;/form\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar t =\n        document.getElementsByTagName(\"input\")[0]; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u003cspan class=\"r\"\u003e// t = document.querySelector(\"input\"); \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar f =\n        document.getElementsByTagName(\"form\")[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003ef.onsubmit = function(e) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ealert(t.value); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn false; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e阻止默认动作 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form action=\"\" id=\"a\" name=\"a\" method=\"post\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input\n        type=\"text\" name=\"t\" id=\"t\"\u0026gt; \u0026lt;/form\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar t =\n        document.querySelector(\"input\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar f = document.querySelector(\"form\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ef.onsubmit = function(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (t.value.length \u0026lt; 1) { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003evar e = e || window.event; \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (e.preventDefault) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ee.preventDefault(); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} else { \u003cspan class=\"r\"\u003e// 兼容 IE \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003ee.returnValue = false;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e禁止回车提交 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar t = document.querySelector(\"input\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003et.onkeypress =\n        function(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = e || window.event; \u003cspan class=\"r\"\u003e//\n            标准化事件对象 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn e.keyCode != 13; \u003cspan class=\"r\"\u003e// 按下回车时，设置返回值为\n            false，禁止默认键盘行为 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003esubmit() 方法也可以触发表单提交，但是不会触发提交事件。因此在此之前应当先进行验证输入。 \u003c/p\u003e\n\u003ch5\u003e重置表单 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form action=\"\" id=\"a\" name=\"a\" method=\"post\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input\n        type=\"text\" name=\"t\" id=\"t\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input type=\"reset\"\n        name=\"t\"\u0026gt; \u0026lt;/form\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar t = document.querySelector(\"input\");\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar f = document.querySelector(\"form\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003ef.onreset = function(e) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(t.value) \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e也可以加入其它动作。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form action=\"\" id=\"a\" name=\"a\" method=\"post\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input\n        type=\"text\" name=\"t\" id=\"t\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input type=\"reset\"\n        name=\"t\"\u0026gt; \u0026lt;/form\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar t = document.querySelector(\"input\");\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar f = document.querySelector(\"form\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003ef.onreset = function(e) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (t.value.length \u0026gt; 10) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar e = e || window.event;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (e.preventDefault) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ee.preventDefault(); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} else { \u003cspan class=\"r\"\u003e// 兼容 IE\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003ee.returnValue = false; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e同样，用户可以使用 reset() 方法进行表单重置。 \u003c/p\u003e\n\u003ch5\u003e剪切板数据 \u003c/h5\u003e\n\u003cul id=\"li_a\"\u003e\u003c/ul\u003e\n\u003cscript\u003e\n    var li_a = [\"beforecopy：在复制发生之前触发 \", \"copy：在复制时触发 \", \"beforecut：在发生剪切动作时触发 \", \"cut：在发生剪切时触发 \", \"beforepaste：在发生粘贴时触发 \", \"paste：在粘贴时触发 \"];\n    _MiMethod.li(\"li_a\");\n\u003c/script\u003e\n\u003cp\u003ecopy、 cut、 paste 事件，只是在上下文菜单中选择了相应选项，或者使用了相应的键盘键组合键，所有浏览器都会触发它们。在实际的事件发生之前，通过 beforecopy、 beforecut、 beforepaste\n    事件可以向剪切板发送数据，或者从剪切板取得之前修改数据。 \u003c/p\u003e\n\u003cp\u003e使用 clipboard 对象可以访问剪切板数据。在 IE 中，可以在任何情况下使用 window.clipboardData 访问剪切板；而在 Firefox 4.0+ 、 Safari、 Chrome\n    中，可以通过事件对象的\n    clipboardData 属性访问剪切板，且只有在处理剪切板事件期间， clipboardData 才有效。 \u003c/p\u003e\n\u003cp\u003eclipboardData 定义了三个方法： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003egetData()：从剪切板获得数据。包含 1 个参数，设置取得数据的格式。 IE 提供两总数据模式： text 和 URL ； Firefox、 Safari、 Chrome 中定义了 MIME 类型，可以用\n        text 代替\n    \u003c/li\u003e\n    \u003cli\u003esetData()：设置剪切板数据。包含两个参数，其中一个是设置数据的格式，第二个是要放到剪切板的文本。对于第一个参数， IE 只支持 \"text\" 和 \"URL\" ，而 Safari 、 Chrome 都仍支持\n        MIME\n        类型，但是不识别 \"text\" 类型。在成功将文本放回到剪切板后，都会返回 true ；否则，将返回 false\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar getClipboardText = function(event) { \u003c/span\u003e\u003cspan class=\"p2\"\u003evar clipboardData =\n        (event.clipboardData || window.clipboardData); \u003c/span\u003e\u003cspan class=\"p2\"\u003ereturn clipboardData.getData(\"text\");\n        } var setClipboardDataText = function(event, value) { \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eif (event.clipboardData) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eevent.clipboard.setData(\"text/plain\",\n        value); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else if (window.clipboardData) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ewindow.clipboardData.setData(\"text\", value); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} }\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e例子 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;form action=\"#\" id=\"a\" method=\"post\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input\n        type=\"text\" size=\"25\" maxlength=\"50\" value=\"123456\"\u0026gt;\u0026lt;/form\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        form = document.querySelector(\"form\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar fi = form.elements[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar getClipboardText = function(event) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar clipboardData = (event.clipboardData || window.clipboardData); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ereturn clipboardData.getData(\"text\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar setClipboardDataText = function(event, value) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eif (event.clipboardData) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eevent.clipboard.setData(\"text/plain\", value);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if (window.clipboardData) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ewindow.clipboardData.setData(\"text\", value); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar addHandler = function(element, type, handler) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (element.addEventListener) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eelement.addEventListener(type, handler, false); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if\n        (element.attachEvent) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eelement.attachEvent(\"on\" + type, handler) \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003eelement[\"on\" + type] = handler; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003eaddHandler(fi, \"paste\", function(event) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eevent = event || window.event; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar text =\n        getClipboardText(event); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (!/^\\d*$/.test(text)) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (event.preventDefault) { \u003c/span\u003e\u003cspan class=\"p8\"\u003eevent.preventDefault(); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p8\"\u003eevent.returnValue = false \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}) \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 事件 event","title":"表单"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","事件 event","表单"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
