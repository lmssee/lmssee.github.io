class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>事件对象</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e对象 \u003c/h5\u003e\n\u003cp\u003eevent对象用来描述在浏览器窗口中发生的事件，一旦事件发生，便会生成 event对象。 \u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eIE 事件模型和 DOM 事件模型对于 event 的处理方式不同： IE 将 event 作为 window 对象的一个属性，而 DOM 将 event\n        作为事件的默认参数。所以，在处理事件时，应当判断解析环境，如果当前浏览器支持，则使用 event ，若不支持，则使用 window.event 获取 event 对象。 \u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003eevent.srcElement 是当前事件的源，即响应事件的当前对象，这是 IE 模式。但是， DOM 事件模型不支持该属性，需要使用 event 对象的 target\n    属性，它是一个符合标准的源属性。为了能够兼容事件的不同浏览器，需要判断。 \u003c/p\u003e\n\u003cp\u003e尽管所有事件属性都可以通过 event对象访问，但是在某些事件中某些属性可能无意义。例如， fromElement和 toElement属性仅当处理 onmouseover和 onmouseout事件时才有意义。 \u003c/p\u003e\n\u003cp\u003e另外，还要注意不同浏览器之间事件对象的差异。在低版本 IE中，如果函数被一个事件调用，它可以通过 window.event访问 event对象，但是，其它浏览器把\n    event对象传递给事件处理函数，作为事件处理函数的参数。因此，要实现跨浏览器兼容，在定义事件触发时必须用参数把事件对象传递到函数中。\n\u003c/p\u003e\n\u003cp\u003e跨浏览器兼容的事件处理代码可以写成这样： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;div id=\"myDiv\" onclick=\"javascript:handleEvent(event);\"\u0026gt;单击 \u0026lt;/div\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efunction handleEvent(evt){\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar myEvent = window.event ? window.event : evt;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上述代码会判断 window.event属性是否存在，如果存在，就使用 window.event；否则，就使用传递过来的参数 evt。 \u003c/p\u003e\n\u003cp\u003eW3C与低版本 IE中，事件属性和函数的名字通常是不一样的，并且有很多不能互通的属性，但属性名可能不同，在实现跨浏览器时应该注意在判断浏览器类型的基础之上使用，一般使用 navigator对象来判断。 \u003c/p\u003e\n\u003cp\u003e例如下面的鼠标跟随效果，可以实现跨浏览器兼容： \u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e例 \u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body onmousemove=\"javascript:canmove(event);\"\u0026gt; \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e\u0026lt;!– 文字就显示在这个元素中 ,1000像素宽， 700像素高 – \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"myDiv\"\n            style=\"position:relative;width:1000px;height:700px;\"\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e我就跟着你！！ \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003evar x, y; // 声明存放当前鼠标位置坐标的变量 \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 获取 div元素的引用 \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003evar oDiv = document.getElementById(\"myDiv\"); \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e// 控制能否移动的函数 \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction canmove(evt) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar\n            myEvent = window.event ? window.event : evt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 获取当前鼠标位置的 x坐标 \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003ex = document.body.scrollLeft + myEvent.clientX; \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003e// 获取当前鼠标位置的 y坐标 \u003c/span\u003e\u003cspan class=\"p6\"\u003ey = document.body.scrollTop + myEvent.clientY;\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003eoDiv.style.left = x + \"px\"; // 设置图层位置的 x坐标 \u003c/span\u003e\u003cspan class=\"p6\"\u003eoDiv.style.top =\n            y\n            + \"px\"; // 设置图层位置的 y坐标 \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n    \u003c/code\u003e\n    \u003cp\u003e在该范例中，实际是使 div元素的位置跟随鼠标的位置，这是通过样式属性 left和 top来实现的，注意 div元素是相对定位。 \u003c/p\u003e\n\u003c/details\u003e\n\u003ctable id=\"this_a\"\u003e\n    \u003ccaption\u003eDOM 事件模型中 Event 对象属性 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性 \u003c/th\u003e\n        \u003cth\u003e说明 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ctable id=\"this_b\"\u003e\n    \u003ccaption\u003eDOM 事件模型中的 event 对象的方法 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e方法 \u003c/th\u003e\n        \u003cth\u003e描述 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003eIE 7 及以前的版本，以及 IE 的怪异模式不支持标准的 DOM 事件模型，并且 IE 的 event 对象定义了一组完全不同的属性。 \u003c/p\u003e\n\u003ctable id=\"this_c\"\u003e\n    \u003ccaption\u003eIE 事件模型中 event 对象属性 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性 \u003c/th\u003e\n        \u003cth\u003e描述 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_a = [\n        [\"bubbles\", \"返回布尔值，指示事件是否冒泡类型。如果事件是冒泡类型，则返回  true ，否则返回  false\"],\n        [\"cancelable\", \"返回布尔值，指示事件是否取消默认动作。如果是  preventDefault() 方法可以取消与事件相关的默认动作，则返回值为  true，  否则为  false。 \"],\n        [\"currentTarget\", \"返回触发事件的当前节点，即当前处理该事件的元素、文档、窗口。在捕获和冒泡阶段，该属性非常有用，因为这两个阶段，它们不同于  target\"],\n        [\"eventPhase\", \"返回事件传播的当前阶段，包括：捕获阶段（ 1）、目标时间阶段（ 2）、冒泡阶段（ 3） \"],\n        [\"target\", \"返回事件的目标节点（触发该事件的节点），如生成事件的元素、文档、窗口 \"],\n        [\"timeStamp\", \"返回事件生成的日期和时间 \"],\n        [\"type\", '返回当事件对象的名称，如 \"submit \"、 \"load \"、 \"click \"']\n    ];\n    var this_b = [\n        [\"initEvent()\", \"初始化新创建的  event 对象的属性 \"],\n        [\"preventDefault()\", \"通知浏览器不要执行与事件关联的默认动作 \"],\n        [\"stopPropagation()\", \"终止事件传播的过程的捕获、目标处理、冒泡阶段进一步传播。调用该方法后，该节点上处理该事件的处理函数被调用，但事件不会再分配到其它的节点 \"]\n    ];\n    var this_c = [\n        [\"cancelBubble\", \"如果想在事件监听函数中阻止事件传播到上级包含目标，必须把该属性设置为  true\"],\n        [\"formElement\", \"对于  onmouseover 和  onmouseout 事件， formElement 引用移出光标的活动 \"],\n        [\"keyCode\", \"对于  keyPress 事件，该属性声明了被敲击的键生成的  Unicode 字符码。对于  keydown 和  keyup 事件，它指定了被敲击的虚拟键盘码，虚拟键盘码可能与键盘的布局有关 \"],\n        [\"offsetX 、  offsetY\", \"发生事件的地点在事件源对象元素的坐标系统的  x 坐标和  y 坐标 \"],\n        [\"returnValue\", \"如果设置了该属性，它的值比事件监听函数的返回值优先级高。把这个属性设置为  false ，可以取消发生事件的源元素的默认动作 \"],\n        [\"srcElement\", \"对于生成事件的  window 对象、 document 对象、  element 对象的引用 \"],\n        [\"toElement\", \"对于  mouseover 和  mouseout 事件，该属性引入光标的元素 \"],\n        [\"x、 y\", \"事件发生的位置  的  x 坐标和  y 坐标，它们相对于  CSS 定位的最内层包含元素 \"]\n    ];\n    _MiMethod.td(\"this_a\")\n    _MiMethod.td(\"this_b\")\n    _MiMethod.td(\"this_c\")\n\u003c/script\u003e\n\u003ch5\u003e事件委托 \u003c/h5\u003e\n\u003cp\u003e事件委托（ delegate）也称事件托管或事件代理，简单描述就是把目标节点的事件绑定到祖先节点上。这种简单而优雅的事件注册方式基于 : 事件传播过程中，逐层冒泡总能被祖先节点捕获。 \u003c/p\u003e\n\u003cp\u003e这样做的好处是：优化代码，提高性能，真正把 HTML 和 JavaScript 分离，也能防止在动态添加或删除节点时，注册的事件丢失。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;button id=\"btn\"\u0026gt;添加列表项目 \u0026lt;/button\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;ul\n        id=\"list\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;li\u0026gt;列表项目 1\u0026lt;/li\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;li\u0026gt;列表项目\n        2\u0026lt;/li\u0026gt;\u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;li\u0026gt;列表项目 3\u0026lt;/li\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/ul\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003evar ul =\n        document.getElementById('list');\u003c/span\u003e\u003cspan class=\"p\"\u003eul.addEventListener('click', function(e)\n        {\u003c/span\u003e\u003cspan class=\"p2\"\u003evar e = e || window.event;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar target = e.target || e.srcElement;\u003c/span\u003e\u003cspan class=\"p2\"\u003eif (e.target \u0026\u0026\n        e.target.nodeName.toUpperCase() == \"LI\") {\u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(e.target.innerHTML);\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e}, false);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003evar i = 4;\u003c/span\u003e\u003cspan class=\"p\"\u003evar btn = document.getElementById(\"btn\");\u003c/span\u003e\u003cspan\n        class=\"p\"\u003ebtn.addEventListener('click', function() {\u003c/span\u003e\u003cspan class=\"p2\"\u003evar li =\n        document.createElement(\"li\");\u003c/span\u003e\u003cspan class=\"p2\"\u003eli.innerHTML = \"列表项目 \" + i++;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eul.appendChild(li);\u003c/span\u003e\u003cspan class=\"p\"\u003e})\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e当页面存在大量的元素，并且每个元素注册了一个或多个事件时，可能会影响性能，访问和修改更多的 DOM 节点，程序就会变慢，特别是连接过程都发生在 load （或 DOMContentReady\n    ）事件时，对任何一个丰富交互页面来说，这都是一个繁忙的时间段。另外，浏览器需要保存每一个事件句柄的记录，也会占用很多的资源 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 事件 event","title":"事件对象"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","事件 event","事件对象"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
