    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e可用的基本交互事件 \u003c/h5\u003e\n\u003ctable id=\"this_a\"\u003e\n    \u003ccaption\u003e可用的基本交互事件 \u003c/caption\u003e\n    \u003ctbody\u003e\n        \u003ctr\u003e\n            \u003cth width=\"30%\"\u003e属性 \u003c/th\u003e\n            \u003cth\u003e描述 \u003c/th\u003e\n        \u003c/tr\u003e\n    \u003c/tbody\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_a = [\n        [\"abort\", \"当元素内容被取消加载时触发 \"],\n        [\"blur\", \"元素失去焦点时触发 \"],\n        [\"canplay\", \"当元素进行回放时触发，但还是会要求缓冲 \"],\n        [\"canplaythrough\", \"当能够进行不间断回放时触发，即不要求缓冲就可以播放完 \"],\n        [\"change \", \"当元素的值发生变化时触发  \"],\n        [\"click \", \"当定位设备（  如鼠标指针）  在一个元素上单击时触发  \"],\n        [\"contextmenu \", \"当鼠标右键单击该元素打开右键菜单时触发  \"],\n        [\"dblclick\", \"当定位设备（如鼠标指针）在一个元素上双击时触发 \"],\n        [\"drag\", \"当元素被拖曳时触发 \"],\n        [\"dragend\", \"当元素从拖曳状态结束时，即释放时被触发 \"],\n        [\"dragenter\", \"当另一个被拖曳的元素进入当前元素时被触发 \"],\n        [\"dragleave\", \"当另一个被拖曳的元素离开当前元素时被触发 \"],\n        [\"dragover\", \"当另一个被拖曳的元素经过当前元素时（位于元素上）被触发 \"],\n        [\"dragstart\", \"当一个对象被放置到当前元素时触发 \"],\n        [\"drop\", \"当元素从拖曳状态结束时，即释放时被触发 \"],\n        [\"durationchange\", \"当 duration属性发生改变时触发 \"],\n        [\"empied\", \"当 media元素恢复到初始状态时触发 \"],\n        [\"ended\", \"当播放到结尾时触发 \"],\n        [\"error\", \"当与此元素相关联的对象有错误发生时触发 \"],\n        [\"focus\", \"当元素获取焦点时触发 \"],\n        [\"formChange\", \"当表单改变时触发 \"],\n        [\"formInput\", \"当表单获得用户输入时触发 \"],\n        [\"input\", \"当元素获得用户输入时触发 \"],\n        [\"invalid\", \"当元素无效时触发 \"],\n        [\"keydown\", \"当元素处于焦点状态下按某个键盘键时触发 \"],\n        [\"keypress\", \"当元素处于焦点状态下按某个键盘键并释放时触发 \"],\n        [\"keyup\", \"当元素处于焦点状态下释放某个按着的键盘键时触发 \"],\n        [\"load\", \"在元素的内容完成加载后触发 \"],\n        [\"loadeddata\", \"当元素失去鼠标指针捕捉时触发 \"],\n        [\"loadedmetadata\", \"当 media元素的 duration 属性和元素加载完成时触发，此时可以读取这些数据 \"],\n        [\"loadstart\", \"当开始查找要加载的 media数据时触发 \"],\n        [\"mousedown\", \"当元素处于焦点状态下在其上单击鼠标时触发 \"],\n        [\"mousemove\", \"当鼠标指针在该元素上移动时触发 \"],\n        [\"mouseout\", \"当鼠标指针离开该元素时触发 \"],\n        [\"mouseover\", \"当鼠标指针进入该元素时触发 \"],\n        [\"mouseup\", \"当元素处于焦点状态下在其上释放鼠标按键时触发 \"],\n        [\"mousewheel\", \"当元素处于焦点状态下在其上滚动鼠标滚轮时触发 \"],\n        [\"pause\", \"当视频或音频中止播放时触发 \"],\n        [\"play\", \"当调用 play（）方法开始播放时触发 \"],\n        [\"playing\", \"当视频或音频正在播放时触发 \"],\n        [\"progress\", \"当 media数据的播放速率改变时触发 \"],\n        [\"ratechange\", \"当浏览器正在从服务器接收数据时触发 \"],\n        [\"readystatechange\", \"当元素的准备状态发生变化时触发 \"],\n        [\"reset\", \"当表单被重置时触发 \"],\n        [\"scroll\", \"当用户滚动该元素内容时触发 \"],\n        [\"seeked\", \"当 media元素的 seeking属性不再为真且定位已结束时触发 \"],\n        [\"seeking\", \"当 media元素的 seeking属性为真且定位已开始时触发 \"],\n        [\"select\", \"当元素被选定时触发 \"],\n        [\"show\", \"当 menu元素被显示为上下文菜单时触发 \"],\n        [\"stalled\", \"当取回 media数据过程中（延迟）存在错误时触发 \"],\n        [\"submit\", \"当数据被提交时触发 \"],\n        [\"suspend\", \"当已经在获取 media数据，但在取回整个 media数据之前中止时触发 \"],\n        [\"timeupdate\", \"当 media改变音量或当音量被设置为静音时触发 \"],\n        [\"volumechange\", \"当 media 改变其播放位置时触发 \"],\n        [\"waiting\", \"当 media已停止播放但打算继续播放时触发 \"]\n    ];\n    _MiMethod.td(\"this_a\");\n\u003c/script\u003e\n\u003cp\u003eJavaScript是基于对象（ object-based）的语言。它的一个最基本的特征就是采用事件驱动。它可以使在图形界面环境下的一切操作变得简单化。通常，鼠标或热键的动作称为事件（\n    event）。由鼠标或热键引发的一连串程序动作，称为事件驱动（ event\n    driver）。而对事件进行处理的程序或函数，称为事件处理程序（ event handler）。 \u003c/p\u003e\n\u003cp\u003e事件处理是对象化编程的一个很重要的环节。它可以使程序的逻辑结构更加清晰，使程序更具有灵活性，提高程序的开发效率。事件处理的过程分为三步：①发生事件；②启动事件处理程序；③事件处理程序做出反应。其中，要使事件处理程序能够启动，必须通过指定的对象来调用相应的事件，然后通过该事件调用事件处理程序。事件处理程序可以是任意\n    JavaScript语句，但是我们一般用特定的自定义函数来对事件进行处理。\n\u003c/p\u003e\n\u003ch5\u003e事件的类型 \u003c/h5\u003e\n\u003cp\u003e绝大多数事件的命名都是描述性的，很容易理解。如 click、 submit、 mouseover等，通过名称就可以猜测其含义。但也有少数事件的名称不易理解，如 blur（英文的字面意思为 \"模糊\n    \"），表示一个域或者一个表单失去焦点。通常，事件处理器的命名原则是，在事件名称前加上前缀 on。例如，对于 click事件，其处理器名为 onClick。\n\u003c/p\u003e\n\u003cp\u003eDOM 0 级定义了以下的事件类型： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e鼠标事件： 可以详细分为两种：跟踪鼠标当前定位事件和跟踪鼠标单击事件 \u003c/li\u003e\n    \u003cli\u003e键盘事件： 包括追踪键盘敲击及其上下文 \u003c/li\u003e\n    \u003cli\u003e页面事件： 页面本身的加载或卸载 \u003c/li\u003e\n    \u003cli\u003eUI 事件： 最终用户在页面的各种行为。例如，监听用户在表单输入 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e再零级事件模型中， javascript 支持两种绑定事件的方式。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e静态绑定：在 HTML 结构中把 javascript 代码直接赋值给事件对象 \u003c/li\u003e\n    \u003cli\u003e动态绑定：在 javascript 脚本中把事件对象直接赋值给 DOM 对象的事件属性 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;form\u0026gt; id=\"form\" name=\"form\" action=\"https://lmssee.cn/\" method=\"post\"\n        onsubmit=\"if(this.elements[0].value.length==0) return false;\"\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ename: \u0026lt;input type=\"text\" name=\"user\" id=\"user\"\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;input type=\"submit\" value=\"submit\" id=\"btn\" name=\"btn\"\u0026gt;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/form\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 在处理 event 事件时，应该先判断 event 在当前解析环境中的状态，如果当前浏览器支持，则使用 event （ DOM事件模型）；如果不支持，则使用 window.event获取 event 对象。\n        event.srcElement 表示当前事件的源，即响应事件的当前事件，这是 IE 模型用法，但是 DOM 事件模型不支持该属性，需要使用 event 对象的 target 属性，它符合一个标准的源属性。\n    \u003c/p\u003e\n\u003c/div\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 事件 event","title":"基础"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","事件 event","基础"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
