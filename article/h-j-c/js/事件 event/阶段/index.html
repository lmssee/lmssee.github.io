    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e事件流 \u003c/h5\u003e\n\u003cp\u003eDOM（文档对象模型）结构是一个树型结构。当一个 HTML元素产生一个事件时，该事件会在元素节点与根节点之间的路径传播，路径所经过的节点都会收到该事件，这个传播过程可称为 DOM事件流。 \u003c/p\u003e\n\u003cp\u003e捕获型事件（ Capturing）： Netscape Navigator的实现，与冒泡型刚好相反，由 DOM树最顶层元素一直到最精确的元素。\n\u003c/p\u003e\n\u003cp\u003e 冒泡型事件（ Bubbling）：从 DOM树型结构上理解，就是事件由叶子节点沿祖先节点一直向上传递直到根节点；从浏览器界面视图\n    HTML元素排列层次上理解，就是事件由具有从属关系的最确定的目标元素一直传递到最不确定的目标元素。\n\u003c/p\u003e\n\u003cp\u003eDOM标准事件模型由于两个不同的模型都有其优点和解释， DOM标准支持捕获型与冒泡型，可以说是它们两者的结合体。它可以在一个 DOM元素上绑定多个事件处理器，并且在处理函数内部， this关键字仍然指向被绑定的\n    DOM元素，另外，处理函数参数列表的第一个位置传递事件 Event对象。\n\u003c/p\u003e\n\u003cp\u003e首先是捕获式传递事件，接着是冒泡式传递。所以，如果一个处理函数既注册了捕获型事件的监听，又注册了冒泡型事件监听，那么在 DOM事件模型中它就会被调用两次。 \u003c/p\u003e\n\u003ch5\u003e阶段 \u003c/h5\u003e\n\u003cp\u003eW3C对 DOM事件定义了 3个阶段：捕获阶段、目标阶段和冒泡阶段。 \u003c/p\u003e\n\u003cp\u003e每当事件被触发时，事件从 DOM最外层的元素（在 DOM树型结构最顶端的元素，这里就是 body元素）开始，然后沿着最短的路径向 target（目标节点）遍历，这就是捕获阶段。 \u003c/p\u003e\n\u003cp\u003e当到达目标节点后，事件就转到目标节点阶段。然后沿着 DOM树上溯到最外层的节点，这个过程就是冒泡（ bubbling）。 \u003c/p\u003e\n\u003cp\u003e可以定义如下代码来检测（注意，这里又定义了一个 div元素用于显示检测的输出结果）： \u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e例 \u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;div id=\"showResult\" style=\"width:700px;text-align:left;\"\u0026gt; \u003c/span\u003e\u003cspan\n            class=\"p\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e//\n            获取 div元素的引用 \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oBody = document.body; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003evar oDivParent = document.getElementById(\"divParent\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n            oDivChildA = document.getElementById(\"divChildA\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oResult =\n            document.getElementById(\"showResult\"); \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e// 检测事件所处阶段 \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003efunction checkPhase(evt) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar phase; \u003c/span\u003e\u003cspan class=\"p4\"\u003e//\n            使用 eventPhase属性可以获取事件所处阶段的信息 \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 低版本 IE没有定义该属性 \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n            (evt.eventPhase == 1) { \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003ephase = \"捕获阶段 \"; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e} else if (evt.eventPhase == 2) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ephase = \"目标阶段 \"; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003e} else if (evt.eventPhase == 3) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ephase = \"冒泡阶段 \"; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn phase; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oBodyClick = function(evt) { \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003eoResult.innerHTML += \" === === == [body] === \" + checkPhase(evt) + \" === === == \u0026lt;br/\u0026gt;\n            \"; \u003c/span\u003e\u003cspan class=\"p4\"\u003eoResult.innerHTML += \"[evt.currentTarget] = \" + evt.currentTarget.id + \"\n            \u0026lt;br/\u0026gt; \"; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003eoResult.innerHTML += \"[evt.target] = \" + evt.target.id + \" \u0026lt;br/\u0026gt; \"; \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oDivParentClick = function(evt) { \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003eoResult.innerHTML += \" === === == [divParent] === \" + checkPhase(evt) + \" === === ==\n            \u0026lt;br/\u0026gt; \"; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003eoResult.innerHTML += \"[evt.currentTarget] = \" + evt.currentTarget.id + \" \u0026lt;br/\u0026gt; \";\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003eoResult.innerHTML += \"[evt.target] = \" + evt.target.id + \" \u0026lt;br/\u0026gt; \";\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003evar oDivChildAClick = function(evt) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eoResult.innerHTML += \" ===\n            === == [divChildA] === \" + checkPhase(evt) + \" === === == \u0026lt;br/\u0026gt; \"; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003eoResult.innerHTML += \"[evt.currentTarget] = \" + evt.currentTarget.id + \" \u0026lt;br/\u0026gt; \";\n        \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003eoResult.innerHTML += \"[evt.target] = \" + evt.target.id + \" \u0026lt;br/\u0026gt; \"; \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eoDivChildA.addEventListener(\"click\", oDivChildAClick, true);\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003eoDivParent.addEventListener(\"click\", oDivParentClick, true); \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eoBody.addEventListener(\"click\", oBodyClick, true); \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/details\u003e\n\u003ch5\u003e捕获阶段（ capturing phase） \u003c/h5\u003e\n\u003cp\u003e当鼠标在 divChildA上触发单击事件时，首先捕捉到该事件的是根节点，也就是 body元素，然后事件逐层向下传递，先到 divParent，再到 divChildA，这是捕获阶段。 \u003c/p\u003e\n\u003cp\u003e当鼠标在 divChildB上触发单击事件时，首先捕捉到该事件的也是根节点，也就是 body元素，然后事件逐层向下传递，先到 divParent，再到 divChildB这也是捕获阶段。 \u003c/p\u003e\n\u003cp\u003e注意事件的触发顺序，并且还要注意 currentTarget和 target属性的区别： target属性的值始终是 divChildA，而 currentTarget属性则有所变化（ body元素因为没有定义\n    id属性，所以是空值）。\n\u003c/p\u003e\n\u003ch6\u003e冒泡型 \u003c/h6\u003e\n\u003cp\u003e从特定目标向不特定的目标（ document 对象）一次触发事件，也就是说从下向上进行响应，这个过程被形象的称为 \"冒泡 \"。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;冒个泡泡 \u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003ediv\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 20px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eborder: solid 1px blue;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-size: 20px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction bubble()\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar div = document.getElementsByTagName(\"div\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar show =\n        document.getElementById(\"show\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003efor (var i = 0; i \u0026lt; div.length; i++) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ediv[i].onclick = (function(i)\n        { \u003c/span\u003e\u003cspan class=\"p10\"\u003ereturn function() { \u003c/span\u003e\u003cspan class=\"p12\"\u003ediv[i].style.border = '1px dashed\n        #f00'; \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003eshow.innerHTML += div[i].className + \" \u0026gt; \"; \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e})(i) \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.onload = bubble \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div class=\"div-1\"\u0026gt; div-1 \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;div class=\"div-2\"\u0026gt; div-2 \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;div class=\"div-3\"\u0026gt; div-3\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;div class=\"div-4\"\u0026gt; div-4 \u003c/span\u003e\u003cspan class=\"p10\"\u003e\u0026lt;div class=\"div-5\"\u0026gt; div-5\n        \u0026lt;/div\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/div\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p id=\"show\"\u0026gt;\u0026lt;/p\u0026gt;\n        \u0026lt;/body\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e捕获型 \u003c/h6\u003e\n\u003cp\u003e事件从不特定的目标（ document 对象）开始触发，最后向特定的目标。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;冒个泡泡 \u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003ediv\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 20px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eborder: solid 1px blue;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-size: 20px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction bubble()\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar div = document.getElementsByTagName(\"div\"); \u003c/span\u003e\u003cspan class=\"p6\"\u003evar show =\n        document.getElementById(\"show\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003efor (var i = 0; i \u0026lt; div.length; i++) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ediv[i].addEventListener(\"click\",\n        (function(i) { \u003c/span\u003e\u003cspan class=\"p10\"\u003ereturn function() {\n    \u003c/span\u003e\u003cspan class=\"p12\"\u003ediv[i].style.border = '1px dashed #f00'; \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003eshow.innerHTML += div[i].className + \" \u0026gt; \"; \u003c/span\u003e\u003cspan class=\"p10\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e})(i), true); \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ewindow.onload = bubble \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u0026lt;/head\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;div class=\"div-1\"\u0026gt; div-1 \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div class=\"div-2\"\u0026gt; div-2\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;div class=\"div-3\"\u0026gt; div-3 \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;div class=\"div-4\"\u0026gt; div-4\n    \u003c/span\u003e\u003cspan class=\"p10\"\u003e\u0026lt;div class=\"div-5\"\u0026gt; div-5 \u0026lt;/div\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/div\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p id=\"show\"\u0026gt;\u0026lt;/p\u0026gt;\n        \u0026lt;/body\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eW3C 的 DOM 支持捕获型和冒泡型两种事件流，但是捕获型事件流会先发生，然后才是冒泡型事件流。两种事件流会触及 DOM 中的所有层级对象，从 document 对象开始，最后返回 document\n    对象结束。其中，分为三个阶段：捕获阶段、目标阶段、冒泡阶段。 \u003c/p\u003e\n\u003ch5\u003e目标阶段（ targeting phase） \u003c/h5\u003e\n\u003cp\u003e从前面的范例可以看到，对于 divChildB，经过捕捉阶段进入目标阶段就停止了，当鼠标在 divChildA上单击时，由于定义了事件监听函数，在目标阶段会触发事件，而\n    divChildB没有定义监听函数，所以，当单击时不会有响应。\n\u003c/p\u003e\n\u003ch5\u003e冒泡阶段（ bubbling phase） \u003c/h5\u003e\n\u003cp\u003e在处理了目标阶段的事件后就进入了冒泡阶段，之所以称之为冒泡，是因为它沿着原来的路径回溯。先到父节点 divParent，直到根节点为止，这个过程就像是冒泡。 \u003c/p\u003e\n\u003cp\u003e要触发冒泡阶段的事件，就必须设置 addEventListener()方法注册事件监听时参数 useCapture为 false，这也是低版本 IE所支持的方式： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eoDivChildA.addEventListener(\"click\", oDivChildAClick, false);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eoDivParent.addEventListener(\"click\", oDivParentClick, false);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eoBody.addEventListener(\"click\",oBodyClick,false);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e使用下面的代码可以检测旧版 IE的工作情况： \u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e例 \u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;div id=\"showResult\" style=\"width:700px;text-align:left;\"\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e//获取\n            div元素的引用 \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003evar oBody = document.body; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oDivParent =\n            document.getElementById(\"divParent\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oDivChildA =\n            document.getElementById(\"divChildA\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oResult =\n            document.getElementById(\"showResult\"); \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003evar oBodyClick = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar evt = window.event; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003eoResult.innerHTML += \" === === [body] === === \u0026lt; br / \u0026gt; \"; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003eoResult.innerHTML += \"[evt.srcElement] = \"+evt.srcElement.id + \" \u0026lt; br / \u0026gt; \"; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oDivParentClick = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n            evt = window.event; \u003c/span\u003e\u003cspan class=\"p4\"\u003eoResult.innerHTML += \" === === [divParent] === === \u0026lt; br /\n            \u0026gt; \"; \u003c/span\u003e\u003cspan class=\"p4\"\u003eoResult.innerHTML += \"[evt.srcElement] = \"+evt.srcElement.id + \" \u0026lt; br\n            / \u0026gt; \"; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oDivChildAClick = function() { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n            evt = window.event; \u003c/span\u003e\u003cspan class=\"p4\"\u003eoResult.innerHTML += \" === === [divChildA] === === \u0026lt; br /\n            \u0026gt; \"; \u003c/span\u003e\u003cspan class=\"p4\"\u003eoResult.innerHTML += \"[evt.srcElement] = \"+evt.srcElement.id + \" \u0026lt; br\n            / \u0026gt; \"; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e}; \u003c/span\u003e\u003cspan class=\"p2\"\u003eoDivChildA.attachEvent(\"onclick\", oDivChildAClick); \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003eoDivParent.attachEvent(\"onclick\", oDivParentClick); \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003eoBody.attachEvent(\"onclick\", oBodyClick); \u003c/span\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/details\u003e\n\u003cp\u003e注意事件触发的顺序是一个冒泡过程。也可以使用 cancelBubble属性取消冒泡阶段，该属性要在注册事件监听程序后定义： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eoDivChildA.attachEvent(\"onclick\",oDivChildAClick);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewindow.event.cancelBubble = true;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eoDivParent.attachEvent(\"onclick\",oDivParentClick);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eoBody.attachEvent(\"onclick\",oBodyClick);\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eW3C DOM使用 stopPropagation()方法实现取消冒泡阶段： \u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewindow.event.stopPropagation();\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e事件撤销 \u003c/h5\u003e\n\u003cp\u003e取消浏览器的事件传递。 \u003c/p\u003e\n\u003cp\u003e取消事件传递是指停止捕获型事件或冒泡型事件的进一步传递。例如，上面的冒泡型事件传递中，在 body处理停止事件传递后，位于上层的 document的事件监听器就不再收到通知，不再被处理。 \u003c/p\u003e\n\u003cp\u003e在 IE下，通过设置 Event对象的 cancelBubble为 true即可。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction someHandle(){\u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.event.cancelBubble=true;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在 DOM标准下，通过调用 Event对象的 stopPropagation方法即可。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction someHandle(event){\u003c/span\u003e\u003cspan class=\"p2\"\u003eevent.stopPropagation();\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e因此，跨浏览器的取消事件传递的方法是： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction someHandle(event){\u003c/span\u003e\u003cspan class=\"p2\"\u003eevent=event||window.event;\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eif(event.stopPropagation)\u003c/span\u003e\u003cspan class=\"p2\"\u003eevent.stopPropagation();\u003c/span\u003e\u003cspan class=\"p2\"\u003eelse\n        event.cancelBubble=true;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e取消事件传递后的默认处理。 \u003c/h6\u003e\n\u003cp\u003e事件传递后的默认处理是指，通常浏览器在事件传递并处理完后会执行与该事件关联的默认动作（如果存在这样的动作）。 \u003c/p\u003e\n\u003cp\u003e在 IE下，通过设置 Event对象的 returnValue为 false即可。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction someHandle(){\u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.event.returnValue=false;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在 DOM标准下，通过调用 Event对象的 preventDefault方法即可。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction someHandle(event){\u003c/span\u003e\u003cspan class=\"p2\"\u003eevent.preventDefault();\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e因此，跨浏览器的取消事件传递后的默认处理的方法是： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction someHandle(event){\u003c/span\u003e\u003cspan class=\"p2\"\u003eevent=event||window.event;\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eif(event.preventDefault)\u003c/span\u003e\u003cspan class=\"p2\"\u003eevent.preventDefault();\u003c/span\u003e\u003cspan class=\"p2\"\u003eelse\n        event.returnValue=false;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 事件 event","title":"阶段"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","事件 event","阶段"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
