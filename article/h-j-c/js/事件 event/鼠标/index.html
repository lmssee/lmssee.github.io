="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>鼠标</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介 \u003c/h5\u003e\n\u003ctable id=\"this_a\"\u003e\n    \u003ccaption\u003e鼠标事件类型 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e事件类型 \u003c/th\u003e\n        \u003cth\u003e说明 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_a = [\n        [\"click\", \"单击鼠标左键时发生，若右键同时按下则不发生；当用户的焦点在按钮上，且按了回车，同样会发生 \"],\n        [\"dblclick\", \"双击鼠标会发生，如果右键也按下则不会发生 \"],\n        [\"mousedown\", \"单击任意一个鼠标按钮时发生 \"],\n        [\"mouseout\", \"鼠标指针位于某个元素上，且要移除元素的边界时 \"],\n        [\"mouseover\", \"鼠标指针移出某个元素，到另一个元素上时发生 \"],\n        [\"mouseup\", \"松开任意一个鼠标按钮时发生 \"],\n        [\"mousemove\", \"鼠标在某个元素上时发生 \"]\n    ];\n    _MiMethod.td(\"this_a\");\n\u003c/script\u003e\n\u003ch5\u003e鼠标的单击事件 \u003c/h5\u003e\n\u003cp\u003e鼠标单击事件一般包括 4 个： click、 dblclick、 mousedown、 mouseup。其中， click 比较常用，而 mousedown 和 mouseup\n    事件类型常用在鼠标拖拽和拉伸操作中。当这些事件处理函数的返回值为 false 时，则会禁止对象的默认行为。 \u003c/p\u003e\n\u003cp\u003e单击事件一般应用于 Button对象、 Checkbox对象、 Image对象、 Link对象、 Radio对象、 Reset对象和 Submit对象。 Button对象一般只会用到\n    onclick事件处理程序，因为该对象不能从用户那里得到任何信息，如果没有 onclick事件处理程序，按钮对象将不会有任何作用。\n\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e在使用对象的单击事件时，如果在对象上按下鼠标键，然后移动鼠标到对象外再松开鼠标，单击事件无效。单击事件必须在对象上按下松开后，才会执行单击事件的处理程序 。 \u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a = document.getElementsByTagName(\"a\");\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i = 0; i \u0026lt; a.length; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif ((new\n        RegExp(window.location.href)).test(a[i].href)) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ea[i].onclick = function() { \u003c/span\u003e\u003cspan class=\"p8\"\u003ereturn false \u003c/span\u003e\u003cspan class=\"p6\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e鼠标的按下和松开事件 \u003c/h5\u003e\n\u003cp\u003e鼠标的按下和松开事件分别是 onmousedown和 onmouseup事件。其中， onmousedown事件用于在鼠标按下时触发事件处理程序，\n    onmouseup事件用于在鼠标松开时触发事件处理程序。在用鼠标单击对象时，可以用这两个事件实现其动态效果。\n\u003c/p\u003e\n\u003ch5\u003e鼠标的移入和移出事件 \u003c/h5\u003e\n\u003cp\u003e鼠标的移入和移出事件分别是 onmouseover和 onmouseout事件。其中， onmouseover事件在鼠标移动到对象上方时触发事件处理程序，\n    onmouseout事件在鼠标移出对象上方时触发事件处理程序。可以用这两个事件在指定的对象上移动鼠标时，实现其对象的动态效果。\n\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e例—— --鼠标移入移出 \u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n            charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n            content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n            initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;Document\u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 30px auto; \u003c/span\u003e\u003cspan class=\"p6\"\u003epadding: 20px;\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003eborder: 3px dotted #0f0; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u0026lt;/head\u0026gt;\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e\u0026lt;div\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;div\u0026gt;盒子\n            \u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar div =\n            document.getElementsByTagName(\"div\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i = 0; i \u0026lt; div.length; i++) {\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003ediv[i].onmouseover = function(e) { \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003ethis.style.border = \"solid #00f\" \u003c/span\u003e\u003cspan class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003ediv[i].onmouseout = function(e) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ethis.style.border = \"solid #f00\"\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n    \u003c/div\u003e\n\u003c/details\u003e\n\u003ch5\u003e鼠标的移动事件 \u003c/h5\u003e\n\u003cp\u003e鼠标移动事件（ onmousemove）是鼠标在页面上进行移动时触发事件处理程序，可以在该事件中用 Document对象实时读取鼠标在页面中的位置。每次至少移动一格像素。 \u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e例 —— -- 鼠标移动 div\u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n            charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n            content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n            initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;Document\u0026lt;/title\u0026gt; \u0026lt;/head\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div\n            id=\"box\"\u0026gt;\u0026lt;/div\u0026gt; \u0026lt;/body\u0026gt;\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar a =\n            document.getElementById(\"box\"); \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ea.style.position = \"absolute\"; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ea.style.width = \"160px\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003ea.style.height = \"120px\"; \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003ea.style.backgroundColor = \"#f00\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar ax, ay, bx, by; \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003efunction t(event) { \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003eif (!event) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eevent = window.event; \u003c/span\u003e\u003cspan\n            class=\"p6\"\u003eevent.target = event.srcElement; \u003c/span\u003e\u003cspan class=\"p6\"\u003eevent.layerX = event.offsetX;\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003eevent.layerY = event.offsetY; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eevent.ax = event.pagX || event.clientX +\n            document.body.scrollLeft; \u003c/span\u003e\u003cspan class=\"p4\"\u003eevent.ay = event.pageY || event.clientY +\n            document.body.scrollTop; \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn event \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.onmousedown = function(event) { \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003eevent = t(event); \u003c/span\u003e\u003cspan class=\"p4\"\u003eb = event.target; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebx =\n            parseInt(b.offsetLeft); \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003eby = parseInt(b.offsetTop); \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003eax = event.ax; \u003c/span\u003e\u003cspan class=\"p4\"\u003eay = event.ay; \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003edocument.onmousemove = move; \u003c/span\u003e\u003cspan class=\"p4\"\u003edocument.onmouseup = stop; \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction move(event) { \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003eevent = t(event); \u003c/span\u003e\u003cspan class=\"p4\"\u003eb.style.left = bx + event.ax - ax + \"px\";\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003eb.style.top = by + event.ay - ay + \"px\" \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003efunction stop(event) { \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003eevent = t(event); \u003c/span\u003e\u003cspan class=\"p4\"\u003ebx = parseInt(b.offsetLeft); \u003c/span\u003e\u003cspan\n            class=\"p4\"\u003eby = parseInt(b.offsetTop); \u003c/span\u003e\u003cspan class=\"p4\"\u003eax = event.ax; \u003c/span\u003e\u003cspan class=\"p4\"\u003eay\n            = event.ay; \u003c/span\u003e\n        \u003cspan class=\"p4\"\u003eb = document.onmousemove = document.onmouseup = null; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n            \u0026lt;/script\u0026gt;\u0026lt;/html\u0026gt;\u003c/span\u003e\n        \u003c/code\u003e\n\u003c/details\u003e\n\u003ch5\u003e鼠标来源 \u003c/h5\u003e\n\u003cp\u003e当一个事件发生后，可以使用事件对象的 target 属性获取事件的元素节点。如果在 IE 中，可以使用 srcElement 属性。 \u003c/p\u003e\n\u003cp\u003e另外，在 DOM 中，还定义了 currentTarget 属性，当事件在传播过程中（如捕获或冒泡），该属性值与 target 值不同。因此，在处理事件的函数中，应该使用该属性而不是 this 关键词获取但前对象。 \u003c/p\u003e\n\u003cp\u003e除此之外，如果想获取鼠标移动哪个元素，在 DOM 事件模型中，可以使用 relatedTarget 属性获取当前事件对象的相关节点元素；而在 IE 事件模型中，使用 formElement 获取 mouseover\n    事件中鼠标移到过哪些元素，使用 toElement 属性获取在 mouseout 事件中鼠标移到过的文档元素。 \u003c/p\u003e\n\u003ch5\u003e鼠标定位 \u003c/h5\u003e\n\u003ctable id=\"this_d\"\u003e\n    \u003ccaption\u003e属性及兼容属性 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"25%\"\u003e属性 \u003c/th\u003e\n        \u003cth\u003e说明 \u003c/th\u003e\n        \u003cth width=\"20%\"\u003e兼容性 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch6\u003escreenX \u0026\u0026 screenY\u003c/h6\u003e\n\u003cp\u003e先来看看 screenX 和 screenY\n    属性。这两个属性获得了所有的浏览器支持，应该说是最优选择使用属性但是它们的定位是计算机屏幕，也就是说，是以计算机左上角定位原点。这对于以浏览器窗口为活动的空间网页来说，没有价值。因为不同分辨率的屏幕，不同的浏览器窗口大小和位置都使在网页中定位鼠标成为一件困难的事。\n\u003c/p\u003e\n\u003ch6\u003epageX \u0026\u0026 pageY || clientX \u0026\u0026 clientY\u003c/h6\u003e\n\u003cp\u003e其次，如果以 document 对象为坐标系，则考虑 pageX 和 pageY 两个属性，实现在浏览器窗口中进行定位。在 mousemove 事件处理函数中把 pageX 和 pageY 属性值传递给绝对定位的 top 和\n    left 样式属性即可。 \u003c/p\u003e\n\u003cp\u003e但是， IE 不支持上面的属性，为此还必须兼容 IE 。 clientX 和 clientY 属性是以 window 对象为坐标系，且 IE 支持它们。但考虑到 window 等对象可能会出现滚动条偏移量，所以，还需要加上\n    window 对象的页面的滚动偏移量。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p4\"\u003evar posX = 0, \u003c/span\u003e\u003cspan class=\"p6\"\u003eposY = 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar event =\n        event || window.event; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (event.pageX || event.pageY) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eposX =\n        event.pageX; \u003c/span\u003e\u003cspan class=\"p6\"\u003eposY = event.pageY \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} else if (event.clientX || event.clientY) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eposX = event.clientX +\n        document.documentElement.scrollLeft + document.body.scrollLeft; \u003c/span\u003e\u003cspan class=\"p6\"\u003eposY = event.clientY\n        + document.documentElement.scrollTop + document.body.scrollTop; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e封装成一个鼠标跟随的小栗子： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar pos = function(o, x, y, event) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar posX = 0, \u003c/span\u003e\u003cspan class=\"p6\"\u003eposY = 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar event =\n        event || window.event; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (event.pageX || event.pageY) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eposX = event.pageX; \u003c/span\u003e\u003cspan class=\"p6\"\u003eposY = event.pageY \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else\n        if (event.clientX || event.clientY) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eposX = event.clientX +\n        document.documentElement.scrollLeft + document.body.scrollLeft; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eposY = event.clientY + document.documentElement.scrollTop + document.body.scrollTop;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eo.style.position = \"absolute\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003eo.style.top\n        = (posY + y) + \"px\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eo.style.left = (posX + x) + \"px\" \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt; \u0026lt;div id=\"a\"\u0026gt;鼠标跟随 \u0026lt;/div\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        a = document.getElementById(\"a\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.onmousemove = function(event) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003epos(a, 20, 20, event); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eoffsetX \u0026\u0026 offsetY || layerX \u0026\u0026 layerY\u003c/h6\u003e\n\u003cp\u003e使用 offsetX 和 offsetY 可以获取元素自身为参照的鼠标指针定位，但是 Mozilla 不支持。不过可以使用 layerX 和 layerY 来兼容 Mozilla。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar event = event || window.event; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (event.offsetX ||\n        event.offsetY) { \u003cspan class=\"r\"\u003e// 适用非 Mozilla \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ex = event.offsetX;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ey = event.offsetY \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} else if (event.layerX || event.layerY) { \u003cspan class=\"r\"\u003e// 兼容 Mozilla \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ex = event.layerX; \u003c/span\u003e\u003cspan class=\"p4\"\u003ey = event.layerY \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e但是， layerX 和 layerY 是以父元素进行的定位。，而非自身元素。所以在设计时，就需要通过脚本或者手动添加的方式，设计在元素外包围一个绝对定位的父元素。考虑到元素之间的距离造成的误差，可以适当减去 1\n    个像素或是更多。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;input type=\"text\" id=\"text\"\u0026gt; \u0026lt;span style=\"position:absolute\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"div\" style=\"width: 200px;height: 160px;border: 1px #f00\n        dotted;\"\u0026gt;鼠标跟随 \u0026lt;/div\u0026gt; \u0026lt;/span\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar t = document.getElementById(\"text\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar div =\n        document.getElementById(\"div\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003ediv.onmousemove = function(event) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar event = event || window.event; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (event.offsetX || event.offsetY) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003et.value = event.offsetX + \"_ _\" + event.offsetY; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else if\n        (event.layerX || event.layerY) { \u003c/span\u003e\u003cspan class=\"p6\"\u003et.value = (event.layerX - 1) + \"_ _\" +\n        (event.layerY - 1); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e鼠标的按键 \u003c/h5\u003e\n\u003ctable id=\"this_b\"\u003e\n    \u003ccaption\u003e鼠标事件的 button 属性 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e单击 \u003c/th\u003e\n        \u003cth\u003eIE 事件模型 \u003c/th\u003e\n        \u003cth\u003eDOM 事件模型 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var this_b = [\n        [\"左键 \", \"1\", \"0\"],\n        [\"右键 \", \"2\", \"2\"],\n        [\"中键 \", \"4\", \"1\"]\n    ];\n    var this_d = [\n        [\"clientX\", \"以浏览器窗口左上顶角为原点，定位  x 轴坐标 \", \"所有浏览器，不兼容  Safari\"],\n        [\"clientY\", \"以浏览器窗口左上顶角为原点，定位  y 轴坐标 \", \"所有浏览器，不兼容  Safari\"],\n        [\"offsetX\", \"以当前事件的目标对象左上顶角为原点，定位  x 轴坐标 \", \"所有浏览器，不兼容  Mozilla\"],\n        [\"offsetY\", \"以当前事件的目标对象左上顶角为原点，定位  Y 轴坐标 \", \"所有浏览器，不兼容  Mozilla\"],\n        [\"pageX\", \"以  document 对象 (即文档窗口 )左上顶角为原点，定位  x 轴坐标 \", \"所有浏览器 ,不兼容 IE\"],\n        [\"pageY\", \"以  document 对象 (即文档窗口 )左上顶角为原点，定位  Y 轴坐标 \", \"所有浏览器 ,不兼容 IE\"],\n        [\"screenX\", \"计算机屏幕左上顶角为原点，定位  x 轴坐标 \", \"所有浏览器 \"],\n        [\"screenY\", \"计算机屏幕左上顶角为原点，定位  Y 轴坐标 \", \"所有浏览器 \"],\n        [\"layerX\", \"最近的绝对定位的父元素（如果没有，则为  document 对象）左上顶角为原点，定位  x 轴坐标 \", \"Mozilla 、  Safari\"],\n        [\"layerY\", \"最近的绝对定位的父元素（如果没有，则为  document 对象）左上顶角为原点，定位  Y 轴坐标 \", \"Mozilla 、  Safari\"]\n    ];\n    _MiMethod.td(\"this_b\");\n    _MiMethod.td(\"this_d\");\n\u003c/script\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e在鼠标点击时，会触发很多事件： mousedown、 mouseup、 click 、 dblclick 。顺序为 \u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003emousedown -\u0026lt; mouseup -\u0026lt; click -\u0026lt; mousedown -\u0026lt; mouseup -\u0026lt; click -\u0026lt;\n        dblclick\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 事件 event","title":"鼠标"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","事件 event","鼠标"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
