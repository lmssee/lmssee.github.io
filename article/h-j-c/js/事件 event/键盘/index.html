="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>键盘</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cp\u003eJavaScript可以响应键盘事件，例如键按下和键弹起： keydown、 keypress和 keyup。例如下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;textarea name=\"\" id=\"key\" cols=\"30\" rows=\"10\"\u0026gt;\u0026lt;/textarea\u0026gt;\n        \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar key = document.getElementById(\"key\"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ekey.onkeydown = f; \u003cspan class=\"r\"\u003e// 注册 keydown 事件处理函数 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ekey.onkeyup = f; \u003cspan class=\"r\"\u003e// 注册 keyup 事件处理函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ekey.onkeypress =\n        f; \u003cspan class=\"r\"\u003e// 注册 keypress 事件处理函数 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        f(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = e || window.event; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar s = e.type + \"_ _\" + e.keyCode; \u003c/span\u003e\u003cspan class=\"p4\"\u003ekey.value = s; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ekeydown：在键盘上按下某个键时触发。如果一直按着，则一直持续触发该事件。但是 Opera 不支持这种操作。该事件处理函数返回 false 时，默认动作将被取消 \u003c/li\u003e\n    \u003cli\u003ekeypress：按下某个键并释放时会触发。如果一直按着这个键，会不断触发。该事件处理返回 false 时，默认动作将被取消 \u003c/li\u003e\n    \u003cli\u003ekeyup：释放某个键盘键时触发。该事件仅在松开时触发一次，不是一个连续触发的 \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e要注意按键事件触发的顺序，先是按下而后是弹起。 \u003c/p\u003e\n\u003ch5\u003e键盘事件属性 \u003c/h5\u003e\n\u003cp\u003e键盘事件一般只在键盘相关事件发生时才会存在于事件对象中，但是 ctrlKey 和 shiftKey 属性除外，因为它们也会在鼠标事件中存在。 \u003c/p\u003e\n\u003ctable id=\"td_a\"\u003e\n    \u003ccaption\u003e键盘事件定义的属性 \u003c/caption\u003e\n    \u003ccolgroup width=\"25%\"\u003e\u003c/colgroup\u003e\n    \u003ccolgroup\u003e\u003c/colgroup\u003e\n\u003c/table\u003e\n\u003cp\u003ekeyCode 和 charCode 属性比较复杂，但是它们在实际开发中比较有用，故比较这两个属性在不同的浏览器中的表现是很有必要的。 \u003c/p\u003e\n\u003ctable id=\"td_d\"\u003e\n    \u003ccaption\u003ekeyCode 和 charCode 属性值 \u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth width=\"20%\"\u003e属性 \u003c/th\u003e\n        \u003cth\u003eIE 事件模型 \u003c/th\u003e\n        \u003cth\u003eDOM 事件模型 \u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var td_a = [\n        [\"keyCode\", \"该属性包含键盘中对应键位的键值 \"],\n        [\"charCode\", \"该属性包括键盘中键位对应的  Unicode 编码，仅  DOM 支持 \"],\n        [\"target\", \"发生事件的节点（包含元素），仅  DOM 支持 \"],\n        [\"srcElement\", \"发生事件的元素，仅  IE 支持 \"],\n        [\"shiftKey\", \"是否按下【 shiftKey】键，如果按下返回  true ，否则为  false \"],\n        [\"ctrlKey\", \"是否按下【 ctrlKey】键，如果按下返回  true ，否则返回  false \"],\n        [\"altKey\", \"是否按下【 altKey】键，如果按下则返回  true，否则返回  false \"],\n        [\"metaKey\", \"是否按下【 metaKey】键，如果按下则返回  true，否则返回  false \"]\n    ];\n    var td_d = [\n        [\"keyCode(keypress)\", \"返回所有字符键的正确值，区分大写状态（ 65-90）和小写状态（ 97-122） \", \"功能键返回正确值，而【 shift】、【 Ctrl】、【 Alt】、【 PrintScreen】、【 ScrollLock】无返回值，其它所有键都返回  0\"],\n        [\"kryCode(keydown)\", \"返回所有键值（除【 printScreen】键），字母键都以大写状态返回键值（ 65-90） \", \"返回所有键值（除【 PrintScreen】键），字母键都以大写形式返回（ 65-90） \"],\n        [\"kryCode(keyup)\", \"返回所有键值（除【 printScreen】键），字母键都以大写状态返回键值（ 65-90） \", \"返回所有键值（除【 PrintScreen】键），字母键都以大写形式返回（ 65-90） \"],\n        [\"charCode(keypress)\", \"不支持该属性 \", \"返回字符键，区分大写状态（ 65-90）和小写状态（ 97-122），而【 shift】、【 Ctrl】、【 Alt】、【 PrintScreen】、【 ScrollLock】  无返回值，其它所有键都返回  0\"],\n        [\"charCode(keydown)\", \"不支持该属性 \", \"所有键值为  0\"],\n        [\"charCode(keyup)\", \"不支持该属性 \", \"所有键值为  0\"]\n    ];\n    _MiMethod.td(\"td_a\");\n    _MiMethod.td(\"td_d\")\n\u003c/script\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;div id=\"box\"\u0026gt;\u0026lt;/div\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar box =\n        document.getElementById(\"box\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003ebox.style.position = \"absolute\"; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ebox.style.width = \"20px\"; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebox.style.height = \"20px\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003ebox.style.backgroundColor = \"#f00\";\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.onkeydown = keyDown; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction keyDown(event) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = event || window.event; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eswitch (event.keyCode) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecase 37: \u003c/span\u003e\u003cspan class=\"p8\"\u003ebox.style.left =\n        box.offsetLeft - 5 + \"px\"; \u003c/span\u003e\u003cspan class=\"p8\"\u003ebreak; \u003c/span\u003e\u003cspan class=\"p6\"\u003ecase 39: \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ebox.style.left = box.offsetLeft + 5 + \"px\"; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ebreak; \u003c/span\u003e\u003cspan class=\"p6\"\u003ecase 38: \u003c/span\u003e\u003cspan class=\"p8\"\u003ebox.style.top = box.offsetTop -\n        5 + \"px\"; \u003c/span\u003e\u003cspan class=\"p8\"\u003ebreak; \u003c/span\u003e\u003cspan class=\"p6\"\u003ecase 40: \u003c/span\u003e\u003cspan class=\"p8\"\u003ebox.style.top\n        = box.offsetTop + 5 + \"px\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn false \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e获取按键 \u003c/h5\u003e\n\u003cp\u003e有时我们也需要了解用户按的是哪一个键，这可以通过事件对象的属性实现。例如下面的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction keyDownHandler(evt) {\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(\"按下键的字符代码 : \" +\n        String.fromCharCode(evt.keyCode));\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(\"按下键的键控代码 : \" + evt.keyCode);\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(\"alt键状态 : \" + evt.altKey);\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(\"ctrl键状态 : \" + evt.ctrlKey);\u003c/span\u003e\u003cspan class=\"p2\"\u003ealert(\"shift键状态 : \" +\n        evt.shiftKey);\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003efunction keyUpHandler(evt) {\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(\"弹起键的字符代码 : \" + String.fromCharCode(evt.keyCode));\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ealert(\"弹起键的键控代码 : \" + evt.keyCode);\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan\n        class=\"p\"\u003edocument.body.addEventListener(\"keydown\", keyDownHandler);\u003c/span\u003e\u003cspan\n        class=\"p\"\u003edocument.body.addEventListener(\"keyup\", keyUpHandler);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e下面是这些属性的详细解释： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ealtKey属性设置或获取 Alt键的状态，该键当前状态适用的值包括 true（按下）和 false（没按下） \u003c/li\u003e\n    \u003cli\u003ekeyCode表示按下或释放的键的键控代码值，键控代码是标识所按之键的数值。使用\n        String.fromCharCode()方法可将字符代码转换成字符串。键控代码值与字符值之间的主要区别是键控代码值表示键盘上的特定键（数字小键盘上的 1与最上面一排键中的 1不同，但生成 1的键与生成\n        !的键是相同的），而字符值表示特定字符（ R与 r字符是不同的）\n    \u003c/li\u003e\n    \u003cli\u003ectrlKey指示 Ctrl键是处于活动状态（ true）还是非活动状态（ false） \u003c/li\u003e\n    \u003cli\u003eshiftKey指示 Shift功能键是处于活动状态（ true）还是非活动状态（ false） \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e例如在下面的脚本代码中，每按一次向右方向键就使当前 div元素右移 10个像素： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction keyDownHandler(evt) {\u003c/span\u003e\u003cspan class=\"p2\"\u003eif (evt.keyCode == 39)\n        {\u003c/span\u003e\u003cspan class=\"p4\"\u003eevt.currentTarget.pageX = evt.currentTarget.pageX+10;\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003evar oDiv =\n        document.getElementById(\"divParent\");\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eoDiv.addEventListener(\"keydown\", keyDownHandler);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e键盘响应顺序 \u003c/h5\u003e\n\u003cp\u003e当按下键盘时，会连续触发很多事件，它们依次触发。 \u003c/p\u003e\n\u003cp\u003e对于字符键，按照； keydown -\u0026lt; keypress -\u0026lt; keyup 响应。如果按下字符键不放，则 keydown 和 keypress 一直响应，直至松开手。 \u003c/p\u003e\n\u003cp\u003e对于非字符键，按照； keydown -\u0026lt; keyup 响应。如果按下功能键不放，只有 keydown 一直响应。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;textarea name=\"\" id=\"key\" cols=\"30\" rows=\"10\"\u0026gt;\u0026lt;/textarea\u0026gt;\n        \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar key = document.getElementById(\"key\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        n = 1; \u003c/span\u003e\u003cspan class=\"p2\"\u003ekey.onkeydown = f; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ekey.onkeyup = f; \u003c/span\u003e\u003cspan class=\"p2\"\u003ekey.onkeypress = f; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction\n        f(e) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar e = e || window.event; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar s = e.type + \"_ _\" +\n        e.keyCode; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ekey.value += (n++) + \"=\" + e.type + \" (keyCode=\" + e.keyCode + \")\\n\"; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e响应组合键事件 \u003c/h5\u003e\n\u003cp\u003e组合键的操作方式有很多种，最常见的是先按一个键，保持该键处于按下状态，然后再按另一个键或更多的键。这种情况下，往往是使用 Ctrl、 Alt、 Shift键和另外的键相组合；还有一种比较常见的方式是同时按下两个或三个键。在\n    Windows操作系统上和在 Macintosh操作系统上键盘事件不尽相同，这里所提及的都是在 Windows操作系统上的组合键事件。\n\u003c/p\u003e\n\u003cp\u003e了解了组合键事件模型的过程，下面用组合键事件的范例来说明一下如何应用组合键事件，例如下面是 Shift+O触发组合键事件的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction keyDownHandler(evt) {\u003c/span\u003e\u003cspan class=\"p2\"\u003eif (evt.shiftKey \u0026\u0026\n        evt.keyCode==79) {\u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"组合键触发 \");\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e}\u003c/span\u003e\u003cspan class=\"p\"\u003edocument.body.addEventListener(\"keydown\", keyDownHandler);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e要注意浏览器的快捷键。例如在上面的范例中，使用了 Shift+O而不是 Ctrl+O就是出于这个考虑。 \u003c/p\u003e\n\u003ch6\u003e技巧与提示 \u003c/h6\u003e\n\u003cp\u003ekeypress、 keydown和 keyup这 3个事件都是只有事件源获得焦点的情况下才会被触发，但是三者还是略有区别： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ekeypress只能捕获单个字符， keydown和 keyup可以捕获组合键 \u003c/li\u003e\n    \u003cli\u003ekeypress主要用来接收字母、数字等 ANSI字符， keydown和 keyup可以捕获键盘除 PrintScreen键外的所有按键 \u003c/li\u003e\n    \u003cli\u003ekeypress不显示键盘的物理状态，而只是传递一个字符，它将每个字符的大小写形式作为不同的键代码解释，即作为两种不同的字符。 keydown和 keyup不能判断键值字母的大小 \u003c/li\u003e\n    \u003cli\u003ekeypress不区分数字小键盘和主键盘的数字字符，而 keydown和 keyup区分 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e键盘事件的使用 \u003c/h5\u003e\n\u003cp\u003e键盘事件包含 onkeypress、 onkeydown和 onkeyup事件。其中， onkeypress事件是在键盘上的某个键被按下并且释放时触发此事件的处理程序，一般用于键盘上的单键操作；\n    onkeydown事件是在键盘上的某个键被按下时触发此事件的处理程序，一般用于组合键的操作； onkeyup事件是在键盘上的某个键被按下后松开时触发此事件的处理程序，一般用于组合键的操作。\n\u003c/p\u003e\n\u003ctable id=\"td_b\"\u003e\n    \u003ccaption\u003e键盘上字母和数字键的键码值 \u003c/caption\u003e\n\u003c/table\u003e\n\u003ctable id=\"td_c\"\u003e\n    \u003ccaption\u003e数字 \u003c/caption\u003e\n\u003c/table\u003e\n\u003ctable id=\"td_e\"\u003e\n    \u003ccaption\u003e数字键盘 \u003c/caption\u003e\n\u003c/table\u003e\n\u003ctable id=\"td_f\"\u003e\n    \u003ccaption\u003e键盘上控制键的键码值 \u003c/caption\u003e\n\u003c/table\u003e\n\u003cscript\u003e\n    var td_b = [\n        [\"A a\", \"65\", \"B b\", \"66\", \"C c\", \"67\"],\n        [\"D d\", \"68\", \"E e\", \"69\", \"F f\", \"70\"],\n        [\"G g\", \"71\", \"H h\", \"72\", \"I i\", \"73\"],\n        [\"J j\", \"74\", \"K k\", \"75\", \"L l\", \"76\"],\n        [\"M m\", \"77\", \"N n\", \"78\", \"O o\", \"79\"],\n        [\"P p\", \"80\", \"Q q\", \"81\", \"R r\", \"82\"],\n        [\"S s\", \"83\", \"T t\", \"84\", \"U u\", \"85\"],\n        [\"V v\", \"86\", \"W w\", \"87\", \"X x\", \"88\"],\n        [\"Y y\", \"89\", \"Z z\", \"90\", \"\", \"\"]\n    ];\n    var td_c = [\n        [\"1\", \"49\", \"2\", \"50\", \"3\", \"51\"],\n        [\"4\", \"52\", \"5\", \"53\", \"6\", \"54\"],\n        [\"7\", \"55\", \"8\", \"56\", \"9\", \"57\"],\n        [\"0\", \"48\"]\n    ];\n    var td_e = [\n        [\"0\", \"96\", \"1\", \"97\", \"2\", \"98\"],\n        [\"3\", \"99\", \"4\", \"100\", \"5\", \"101\"],\n        [\"6\", \"102\", \"7\", \"103\", \"8\", \"104\"],\n        [\"9\", \"105\", \"\"],\n        [\"*\", \"106\", \"+\", \"107\", \"Enter\", \"108\"],\n        [\"-\", \"109\", \".\", \"110\", \"\\/\", \"111\"],\n        [\"F1\", \"112\", \"F2\", \"113\", \"F3\", \"114\"],\n        [\"F4\", \"115\", \"F5\", \"116\", \"F6\", \"117\"],\n        [\"F7\", \"118\", \"F8\", \"119\", \"F9\", \"120\"],\n        [\"F10\", \"121\", \"F11\", \"122\", \"F12\", \"123\"]\n    ];\n    var td_f = [\n        [\"Back space\", \"8\", \"Tab\", \"9\", \"Clear\", \"12\"],\n        [\"Enter\", \"13\", \"Shift\", \"16\", \"Control\", \"17\"],\n        [\"Alt\", \"18\", \"Cape Lock\", \"20\", \"Esc\", \"27\"],\n        [\"SpaceBar\", \"32\", \"Page Up\", \"34\", \"End\", \"35\"],\n        [\"Home\", \"36\", \"Left Arrow\", \"37\", \"Up Arrow\", \"38\"],\n        [\"Right Arrow\", \"39\", \"Down Arrow\", \"40\", \"Insert\", \"45\"],\n        [\"Delete\", \"46\", \"Num Lock\", \"144\", \"\\; \\:\", \"186\"],\n        [\"\\= \\+\", \"187\", \"\\, \u0026lt;\", \"188\", \"\\- \\_\", \"189\"],\n        [\"\\. \u0026gt;\", \"190\", \"\\/ \\?\", \"191\", \"\\` \\~\", \"192\"],\n        [\"\\[ \\{\", \"219\", \"\\\\  \\|\", \"220\", \"\\] \\}\", \"221\"],\n        [\"\\' \\\"\", \"222\"]\n    ];\n    _MiMethod.td(\"td_b\");\n    _MiMethod.td(\"td_c\");\n    // _MiMethod.td(\"td_d\");\n    _MiMethod.td(\"td_e\");\n    _MiMethod.td(\"td_f\");\n\u003c/script\u003e\n\u003cp\u003e\u003csmall\u003e以上键码值只有在文本框中才完全有效。如果在页面中使用（也就是在 \u0026lt;body\u0026gt;标记中使用），则只有字母键、数字键和部分控制键可用，其字母键和数字键的键值与 ASCII值相同。 \u003c/small\u003e。\n\u003c/p\u003e\n\u003cp\u003e如果想要在 JavaScript中使用组合键，可以分别利用 event.ctrlKey、 event.shiftKey、 event.altKey判断是否按下了 Ctrl键、 Shift键以及 Alt键。 \u003c/p\u003e\n\u003ch5\u003e检测 Shift、 Alt、 Ctrl键 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e//以下是浏览器内置的检测方法 \u003c/span\u003e\n    \u003cspan class=\"p\"\u003eevent.shiftKey; \u003cspan class=\"r\"\u003e//检测 Shift\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eevent.altKey; \u003cspan class=\"r\"\u003e//检测 Alt\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eevent.ctrlKey; \u003cspan class=\"r\"\u003e//检测 Ctrl\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e获取屏幕分辨率的宽、高 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow.screen.height; \u003cspan class=\"r\"\u003e//获取屏幕的高 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ewindow.screen.width; //获取屏幕的宽 \u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e脚本永不出错的方式 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ewindow.onerror = function(m, f, l){\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ereturn true;\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e};\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e让 JavaScript处理字符与 ASCII码之间的转换 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econsole.log(\"a\".charCodeAt(0)); \u003cspan class=\"r\"\u003e//97\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003econsole.log(String.fromCharCode(75)); \u003cspan class=\"r\"\u003e//K\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003echarCodeAt()返回指定位置字符的 Unicode编码； fromCharCode()接收一个指定的 Unicode值，然后返回一个字符串 \u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e捕捉 Ctrl+Enter按键 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eif (event.ctrlKey \u0026amp;\u0026amp; event.keyCode == 13) {\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econsole.log(\"You pressed the Ctrl + Enter\")\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003eevent.ctrlKey检测 Ctrl键， event.keyCode == 13检测 Enter键 \u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 事件 event","title":"键盘"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","事件 event","键盘"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
