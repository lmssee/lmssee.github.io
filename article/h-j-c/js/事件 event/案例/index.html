    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e滚动播出效果（ marquee） \u003c/h5\u003e\n\u003cp\u003e一种常用的动态效果是滚动播出一段文字或者图片，经常用于新闻、广告中，可分为竖直滚动方式和水平滚动方式。 \u003c/p\u003e\n\u003cp\u003eIE可以使用 marquee元素来实现该功能，但是其它浏览器不能使用该元素，因此，兼容性的实现一般都是使用 DHTML来完成。 \u003c/p\u003e\n\u003cp\u003e与滚动播出效果关联的实现都是利用了 CSS的溢出隐藏功能，也就是设置 CSS样式表 overflow:hidden。 \u003c/p\u003e\n\u003ch6\u003e竖直滚动的文本行 \u003c/h6\u003e\n\u003cp\u003e每个文本行就是一个链接，当用户鼠标指针移动到文本上时就停止滚动，并可以单击链接打开网页；当鼠标指针离开滚动区域时文本继续滚动。 \u003c/p\u003e\n\u003cp\u003e滚动的文本行效果对于网页布局内有大量信息需要传递时特别有用，而且可以增加用户的体验。 \u003c/p\u003e\n\u003cp\u003e竖直滚动文本行的实现过程如下。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e首先使用 HTML代码和 CSS样式表创建网页的布局以及定义要呈现的内容，代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;html\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"utf-8″ \u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;JavaScript Sample\u0026lt;/title\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;!– body { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003efont-size: 12px; \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-family: 'Microsoft YaHei', '微软雅黑 ', 'SimSun', '宋体\n        ';\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground: #FFFFFF; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003emargin: 0px; \u003c/span\u003e\u003cspan class=\"p6\"\u003epadding: 0px; \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-align: center;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #000000; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ea { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ecolor: #666666; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etext-decoration: none; \u003c/span\u003e\u003cspan class=\"p6\"\u003edisplay: block; \u003c/span\u003e\u003cspan class=\"p6\"\u003e/*\n        显示为块级元素 */ \u003c/span\u003e\u003cspan class=\"p6\"\u003eline-height: 1.5em; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ea:hover\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #CC0000; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etext-decoration: none; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ediv.news_root {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 255px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 134px; \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-align:\n        left; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003emargin: 0 auto; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ebackground: url(images/bg_news.gif); \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground-repeat: no-repeat;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ediv.news_header { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 243px;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 16px; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evertical-align: top; \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-align: left; \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-size:\n        14px; \u003c/span\u003e\u003cspan class=\"p6\"\u003epadding: 6px; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e#scrollContainer {\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ewidth: 245px; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 2px 5px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eoverflow:\n        hidden; \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* 注意，核心就在于这里，它把溢出的内容隐藏起来 */ \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-align: left;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e– \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div class=\"news_root\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div class=\"news_header\"\u0026gt;Headliner\u0026lt;/div\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;div id=\"scrollContainer\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;div id=\"scrollContent\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;!– 字幕的内容 – \u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;a href=\"连接地址 \"\u0026gt;W3C has released\n        HTML5.\u0026lt;/a\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;a href=\"连接地址 \"\u0026gt;W3C has released CSS3.\u0026lt;/a\u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;a\n        href=\"连接地址 \"\u0026gt;ECMA has released ECMAScript5.\u0026lt;/a\u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;a href=\"连接地址 \"\u0026gt;Book:\n        HTML5 + RIA released.\u0026lt;/a\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;a href=\"连接地址 \"\u0026gt;Book: HTML5 + CSS3 released.\u0026lt;/a\u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;a\n        href=\"连接地址 \"\u0026gt;Book: ECMAScript5 + HTML5BOM + HTML5DOM released.\u0026lt;/a\u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;a\n        href=\"连接地址 \"\u0026gt;Book: WebPages for Mobiles released.\u0026lt;/a\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e了解要滚动的内容和基本的布局，然后编写 JavaScript代码来实现滚动效果，下面的代码位于字幕的内容之后： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar stopscroll = false;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar scrollContHeight = 95; \u003cspan class=\"r\"\u003e// 滚动区域的高度 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        scrollContWidth = 230; \u003cspan class=\"r\"\u003e// 滚动区域的宽度 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar scrollSpeed = 25; \u003cspan class=\"r\"\u003e// 该参数用来确定滚动速度，数值越小滚动速度越快 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003e//\n        获取 scrollContainer \u003c/span\u003e\u003cspan class=\"p2\"\u003evar scrollContainer =\n        document.getElementById(\"scrollContainer\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 获取 scrollContent \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar scrollContent = document.getElementById(\"scrollContent\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e//\n        多次复制原内容到 scrollContainer，直到 scrollContainer的高度大于内容区高度 \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 这样做是为了避免内容的高度较小\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 使用 do while可以强制复制一次，这样可以保证滚动看起来更连续 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edo { \u003c/span\u003e\u003cspan class=\"p4\"\u003escrollContainer.appendChild(scrollContent.cloneNode(true));\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} while (scrollContainer.offsetHeight \u0026lt; scrollContHeight); \u003c/span\u003e\u003cspan class=\"p2\"\u003e//\n        下面对 scrollContainer进行设置，主要就是宽度和高度，以及换行 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003escrollContainer.style.width = scrollContWidth + \"px\"; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003escrollContainer.style.height = scrollContHeight + \"px\"; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003escrollContainer.noWrap = true; \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 下面是两个事件：鼠标经过，停止滚动；鼠标离开，开始滚动 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003escrollContainer.onmouseover = new Function(\"stopscroll = true;\"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003escrollContainer.onmouseout = new Function(\"stopscroll = false;\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003e//\n        进行初始化 \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction init() { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003escrollContainer.scrollTop = 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 按时间间隔不断执行函数 scrollUp() \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003esetInterval(scrollUp(), scrollSpeed); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003einit();\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 下面就是改变滚动位置，如果滚出区域，则判断当前位置进行初始化调整 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar currTop = 0; \u003c/span\u003e\u003cspan class=\"p2\"\u003efunction scrollUp() { \u003c/span\u003e\u003cspan class=\"p4\"\u003e//\n        如果变量 \"stopscroll\"为真，则停止滚动 \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (stopscroll == true) return; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ecurrTop = scrollContainer.scrollTop; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003escrollContainer.scrollTop += 1; // 每次上移一个像素 \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (currTop ==\n        scrollContainer.scrollTop) { \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 如果滚动到顶就初始化 \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003escrollContainer.scrollTop = 0; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003escrollContainer.scrollTop += 1; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这段代码主要是利用 setInterval()方法不断执行 scrollUp()函数以实现内容上移，每次上移一个像素，上移到最顶端时就重新定位，恢复原位置后，继续上移滚动。 \u003c/p\u003e\n\u003cp\u003e使用变量 scrollContHeight和 scrollContWidth，可以定义滚动区域的高度和宽度，当然应该和背景以及环境协调起来；使用变量\n    scrollSpeed，可以定义滚动速度，应该在不同机器上测试，因为不同的处理器对运行速度可能有影响，要设法找出一个合理的滚动速度，如设置该变量为 25，则意味着每 25毫秒就向上移动一个像素。\n\u003c/p\u003e\n\u003ch6\u003e竖直滚动的图片 \u003c/h6\u003e\n\u003cp\u003e使用同样一段 JavaScript代码，也可以实现竖直滚动的图片效果，只需更换滚动的内容即可，新的 HTML代码和样式表如下（改动的部分使用粗体突出显示）： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;!–\n        body { \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-size: 12px; \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-family:\n        'Microsoft YaHei', '微软雅黑 ', 'SimSun', '宋体 '; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ebackground: #FFFFFF; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 0px; \u003c/span\u003e\u003cspan class=\"p6\"\u003epadding: 0px;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-align: center; \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #000000; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003eimg { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003edisplay: block; \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 220px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 35px;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 5px 0px; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ediv.news_root {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 255px; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eheight: 134px; \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-align: left; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 0\n        auto; \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground: url(images/bg_news.gif); \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground-repeat:\n        no-repeat; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ediv.news_header { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 243px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 16px;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evertical-align: top; \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-align: left; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003efont-size: 14px; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003epadding: 6px; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e#scrollContainer { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ewidth: 245px; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 2px 5px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eoverflow: hidden;\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e/* 注意，核心就在于这里，它把溢出的内容隐藏起来 */ \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etext-align: left; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e– \u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;div class=\"news_root\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div\n        class=\"news_header\"\u0026gt;Headliner\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div id=\"scrollContainer\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;div id=\"scrollContent\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;!– 字幕的内容 – \u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;img src=\"images/blog.png\" alt=\"访问我的 BLOG\"/\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;img src=\"images/author.png\" alt=\"www.zhang-yafei.com\"/\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e\u0026lt;img src=\"images/google.png\" alt=\"访问我的 BLOG\"/\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;img src=\"images/msn.png\" alt=\"www.zhang-yafei.com\"/\u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;img\n        src=\"images/yahoo.png\" alt=\"访问我的 BLOG\"/\u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;img src=\"images/blogline.png\"\n        alt=\"www.zhang-yafei.com\"/\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e水平滚动的图片 \u003c/h6\u003e\n\u003cp\u003e有了对基本原理的了解，就可以很轻松地创建水平滚动的图片效果了，这经常被用来作为广告条。实现的代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"utf-8″ \u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;JavaScript Sample\u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style\n        type=\"text/css\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;!– body { \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-size: 12px; \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-family:\n        'Microsoft YaHei', '微软雅黑 ', 'SimSun', '宋体 '; \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground: #FFFFFF; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003emargin: 0px; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003epadding: 0px; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etext-align: center; \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #000000; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003eimg { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 67px; \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* 只需定义宽度和高度即可 */\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 96px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ediv.news_root { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 255px; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eheight: 134px; \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-align: left; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 0 auto;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground: url(images/bg_news.gif); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ebackground-repeat: no-repeat; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003ediv.news_header\n        { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 243px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 16px; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003evertical-align: top; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etext-align: left; \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-size: 14px; \u003c/span\u003e\u003cspan class=\"p6\"\u003epadding:\n        6px; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e#scrollContainer { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth:\n        245px; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003emargin: 2px 5px; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eoverflow: hidden; \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* 注意，核心就在于这里，它把溢出的内容隐藏起来 */ \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etext-align: left; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e– \u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;div class=\"news_root\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div\n        class=\"news_header\"\u0026gt;Headliner\u0026lt;/div\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;div id=\"scrollContainer\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;div id=\"scrollContent\"\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;!– 字幕的内容 – \u0026gt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e\u0026lt;table border=\"0″ \u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003e\u0026lt;tr align=\"middle\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003e\u0026lt;td id=\"firstCol\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p14\"\u003e\u0026lt;table border=\"0″ \u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p16\"\u003e\u0026lt;tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p16\"\u003e\u0026lt;td\u0026gt;\u0026lt;img src=\"images/bill_001.jpg\"\n        alt=\"访问我的 BLOG\"\u0026gt;\u0026lt;/td\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p16\"\u003e\u0026lt;td\u0026gt;\u0026lt;img src=\"images/bill_002.jpg\" alt=\"www.zhang-yafei.com\"\u0026gt; \u0026lt;/td\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p16\"\u003e\u0026lt;td\u0026gt;\u0026lt;img src=\"images/bill_003.jpg\" alt=\"访问我的 BLOG\"\u0026gt;\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p16\"\u003e\u0026lt;td\u0026gt;\u0026lt;img src=\"images/bill_004.jpg\" alt=\"www.zhang-yafei.com\"\u0026gt; \u0026lt;/td\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p16\"\u003e\u0026lt;td\u0026gt;\u0026lt;img src=\"images/bill_005.jpg\" alt=\"访问我的 BLOG\"\u0026gt;\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p16\"\u003e\u0026lt;td\u0026gt;\u0026lt;img src=\"images/bill_006.jpg\" alt=\"www.zhang-yafei.com\"\u0026gt; \u0026lt;/td\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p16\"\u003e\u0026lt;td\u0026gt;\u0026lt;img src=\"images/bill_007.jpg\" alt=\"访问我的 BLOG\"\u0026gt;\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p16\"\u003e\u0026lt;td\u0026gt;\u0026lt;img src=\"images/bill_008.jpg\" alt=\"www.zhang-yafei.com\"\u0026gt; \u0026lt;/td\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p16\"\u003e\u0026lt;/tr\u0026gt; \u003c/span\u003e\u003cspan class=\"p14\"\u003e\u0026lt;/table\u0026gt; \u003c/span\u003e\u003cspan class=\"p12\"\u003e\u0026lt;/td\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p12\"\u003e\u0026lt;td id=\"lastCol\"\u0026gt;\u0026lt;/td\u0026gt; \u003c/span\u003e\u003cspan class=\"p10\"\u003e\u0026lt;/tr\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e\u0026lt;/table\u0026gt; \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/div\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        stopscroll = false; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar scrollContHeight = 95; \u003cspan class=\"r\"\u003e// 滚动区域的高度 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar\n        scrollContWidth = 230; \u003cspan class=\"r\"\u003e// 滚动区域的宽度 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar scrollSpeed = 25; \u003cspan\n            class=\"r\"\u003e// 该参数用来确定滚动速度，数值越小滚动速度越快 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// 获取 scrollContainer \u003c/span\u003e\u003cspan class=\"p4\"\u003evar scrollContainer =\n        document.getElementById(\"scrollContainer\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 获取 scrollContent \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar scrollContent = document.getElementById(\"scrollContent\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar firstCol = document.getElementById(\"firstCol\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar lastCol =\n        document.getElementById(\"lastCol\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 注意这里，将第一列的内容复制到第二列，这样可以保证滚动看起来更连续 \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003elastCol.innerHTML = firstCol.innerHTML; \u003c/span\u003e\u003cspan class=\"p4\"\u003e//\n        下面对 scrollContainer进行设置，主要就是宽度和高度，以及换行 \u003c/span\u003e\u003cspan class=\"p4\"\u003escrollContainer.style.width = scrollContWidth\n        +\n        \"px\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003escrollContainer.style.height = scrollContHeight + \"px\"; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003escrollContainer.noWrap = true; \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 下面是两个事件：鼠标经过，停止滚动；鼠标离开，开始滚动 \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003escrollContainer.onmouseover = new Function(\"stopscroll = true;\"); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003escrollContainer.onmouseout = new Function(\"stopscroll = false;\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// 进行初始化 \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction init() { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003escrollContainer.scrollLeft = 0; \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 按时间间隔不断执行函数 scrollLeft() \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003esetInterval(\"scrollLeft()\", scrollSpeed); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003einit();\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 下面就是改变滚动位置，如果滚出区域，则判断当前位置进行初始化调整 \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar currLeft = 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction scrollLeft() { \u003c/span\u003e\u003cspan class=\"p6\"\u003e//\n        如果变量 stopscroll为真，则停止滚动 \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (stopscroll == true) return; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ecurrLeft = scrollContainer.scrollLeft; \u003c/span\u003e\u003cspan class=\"p6\"\u003escrollContainer.scrollLeft += 1;\n        // 每次左移 1个像素 \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (currLeft == scrollContainer.scrollLeft) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e// 如果滚动到最左侧就初始化 \u003c/span\u003e\u003cspan class=\"p8\"\u003escrollContainer.scrollLeft = 0; \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003escrollContainer.scrollLeft += 1; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在这个实现中，使用了一个单行两列的表格来作为内容区域，用来实现图片的水平布局，之所以选用表格，主要是因为表格可以实现水平强制扩展。 \u003c/p\u003e\n\u003cp\u003e然后，只需修改 JavaScript代码中控制滚动方向的属性就可以实现水平滚动。垂直方向的滚动通过 scrollTop属性来控制，而水平的滚动则使用 scrollLeft来实现，这是代码变化的核心。 \u003c/p\u003e\n\u003ch5\u003e常用的广告效果 \u003c/h5\u003e\n\u003ch6\u003e广告的随机滚动出现 \u003c/h6\u003e\n\u003cp\u003e一个网站往往会接很多广告订单，一个网页可能无法同时容纳所有的广告，这时就必须建立一种机制，让广告能够随机出现，用户刷新网页可能会看到不同的广告。其实现过程如下。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e\n    首先创建几个图片用于测试，将它们保存在 images文件夹下，分别命名为 image1.jpg、 image2.jpg、 image3.jpg、 image4.jpg、 image5.jpg、 image6.jpg和\n    image7.jpg\n\u003c/p\u003e\n\u003cp class=\"p4\"\u003e在网页上定义一个放置广告的布局元素（这是一个 div元素）并为其定义样式表，主要就是定义宽度和高度，以及进行溢出的设置，代码如下： \u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e例 \u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;!– #adContainer { \u003c/span\u003e\u003cspan class=\"p6\"\u003eborder: 1px #A5ACB2 solid;\n        \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 300px; \u003c/span\u003e\n        \u003cspan class=\"p6\"\u003eheight: 70px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eoverflow: hidden; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n        \u003c/span\u003e\u003cspan class=\"p8\"\u003e– \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt;\n        \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003e\u0026lt;div id=\"adContainer\"\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/details\u003e\n\u003cp\u003e其中 id属性为 adContainer的 div元素将用来放置广告图片。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e\n    编写 JavaScript程序随机获得一个图片的 URL地址，并将该图片显示在 div元素中在此之前应该先了解权重算法的基本原理。一个基本原理就是产生一个在\n    0~n范围内的随机数，然后根据权重来确定每个记录所对应的范围，例如， 3个权重分别是 1、 2、 3，则分成 6份，那么产生 0~6范围内的一个随机数，然后对应权重的范围。\n\u003c/p\u003e\n\u003cp\u003e下面来看一段代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 定义一个基准 URL地址 \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003evar baseURL = \" \u0026lt; a href = \"http://myhost/ads/\"\" \u003c/span\u003e\u003cspan class=\"p2\"\u003erel = \"nofollow\" \u0026gt;\n        http: //myhost/ads/\"\u0026lt;/a\u0026gt;;; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// 使用一个二维数组来放置所有的广告图片，格式是： [\"URL\",权重 ] \u003c/span\u003e\u003cspan class=\"p4\"\u003evar ads = new Array([\"images /\n        image1.jpg\", 20], [\"images / image4.jpg\", 10], [\"images / image2.jpg\", 20], [\"images / image3.jpg\", 40]);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 根据权重来重新排列数组元素，权重越大，越位于后面 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar sortFn = function(a, b) { \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (a[1] \u0026lt; b[1]) return -1;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (a[1] \u0026gt; b[1]) return 1; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (a[1] == b[1]) return 0;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eads.sort(sortFn); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 获得权重总数，以变量 allWeight标示 \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 然后根据总数产生一个 0~allWeight之间的随机数 \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003evar allWeight = 0; \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i = 0; i \u0026lt; ads.length; i++) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eallWeight += ads[i][1]; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 变量 currWeight便是当前的随机数 \u003c/span\u003e\u003cspan class=\"p2\"\u003evar currWeight =\n        Math.round(Math.random() * (allWeight + 1) + 1); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar currURL; \u003c/span\u003e\u003cspan class=\"p2\"\u003e//\n        下面为每个广告图片定义一个权重的范围 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 改变权重的值，让其等于范围的结束数量 \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 那么开始数量便是前一个权重轻的广告图片的范围的结束数量 \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003evar minR = 0; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar maxR = 0; \u003c/span\u003e\u003cspan class=\"p2\"\u003efor (var i = 0; i\n        \u0026lt; ads.length; i++) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eminR = maxR; \u003c/span\u003e\u003cspan class=\"p4\"\u003emaxR += ads[i][1]; \u003c/span\u003e\u003cspan class=\"p4\"\u003eads[i][1] =\n        maxR; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 然后将当前随机数与权重范围进行匹配，获得一个广告图片的 URL \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efor (var i = 0; i \u0026lt; ads.length; i++) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// 当前随机数为 allWeight时是一个特例，要单独计算 \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (currWeight == allWeight) {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ecurrURL = ads[ads.length - 1][0]; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (i != 0) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (currWeight \u0026gt;= ads[i - 1][1] \u0026amp; \u0026amp; currWeight \u0026lt; ads[i][1]) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ecurrURL = ads[i][0]; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e// 权重最低的第一个广告是一个特例，要单独计算 \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (currWeight \u0026gt;= 0 \u0026amp; \u0026amp; currWeight \u0026lt; ads[0][1]) { \u003c/span\u003e\u003cspan class=\"p8\"\u003ecurrURL\n        = ads[0][0]; \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e// 获取广告图片要放置的 div元素，然后为其赋值 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar oAdContainer = document.getElementById(\"adContainer\"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eoAdContainer.innerHTML = ' \u0026lt; img src = \"'+currURL + '\"/\u0026gt;'; \u003c/span\u003e\u003cspan class=\"p4\"\u003e//\n        在最终发布时记得加上基准 URL \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// oAdContainer.innerHTML = '\u0026lt;img src=\"' + baseURL + currURL + '\" /\u0026gt;'; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e对联广告 \u003c/h6\u003e\n\u003cp\u003e对联广告是常用的广告形式之一，顾名思义，这种广告分列在网页的左右两侧，就像是一副对联。使用 JavaScript可以轻松地实现这种功能。 \u003c/p\u003e\n\u003cp\u003e该对联广告由 4部分组成：两个广告图片和两个顶部关闭按钮，单击 \"关闭 \"按钮，可以使广告图片和 \"关闭 \"按钮一起消失。下面是实现的代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar AD_left, AD_right;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 设置 div元素的基本 CSS样式 \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003efunction initAD() { \u003c/span\u003e\u003cspan class=\"p4\"\u003eAD_left = document.getElementById(\"AD_left\");\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eAD_right = document.getElementById(\"AD_right\"); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eAD_left.style.visibility = \"visible\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eAD_left.style.position = \"absolute\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eAD_left.style.zIndex = 1; \u003c/span\u003e\u003cspan class=\"p4\"\u003eAD_right.style.visibility = \"visible\";\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eAD_right.style.position = \"absolute\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003eAD_right.style.zIndex = 1;\n    \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// 通过间隔不断执行 moveAD()函数，我们可以将两个 div元素定位在网页两侧 \u003c/span\u003e\u003cspan class=\"p4\"\u003esetTimeout(\"moveAD(AD_left)\",\n        20); \u003c/span\u003e\u003cspan class=\"p4\"\u003esetTimeout(\"moveAD(AD_right)\", 20); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efunction moveAD(ADName) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar x = 5; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar y = 340; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar diff =\n        (document.body.scrollTop + y - ADName.style.posTop) * .30; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar y =\n        document.body.scrollTop + y - diff; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eADName.style.top = y + \"px\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eif (ADName == AD_left) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eADName.style.left = x + \"px\"; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003eif (ADName == AD_right) { \u003c/span\u003e\u003cspan class=\"p6\"\u003eADName.style.right =\n        x + \"px\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 关闭广告，其实就是隐藏 div元素 \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efunction closeAD(ADName) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eADName.parentNode.style.visibility = 'hidden'; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 首先写出来这 4个部分，其实分为左、右两个 div元素 \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(\"\u0026lt;div id = 'AD_left' \u0026gt; \"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\"\u0026lt;img src = 'images / close.gif' width = '134′ onclick = 'javascript:\n        closeAD(this); void(0);' style = 'display: block;' / \u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(\"\u0026lt;img\n        src = 'images / ad_left.jpg' / \u0026gt; \"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\"\u0026lt;/div\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(\"\u0026lt;div id = 'AD_right'\n        style = 'display: block; right: 0 px' \u0026gt; \"); \u003c/span\u003e\u003cspan class=\"p2\"\u003edocument.write(\"\u0026lt;img src = 'images\n        / close.gif' width = '134′ onclick = 'javascript: closeAD(this); void(0);' style = 'display:block;' / \u0026gt;\n        \"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003edocument.write(\"\u0026lt;img src = 'images / ad_right.jpg' / \u0026gt; \"); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003edocument.write(\"\u0026lt;/div\u0026gt;\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003einitAD(); \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e该功能分为 4个部分来实现，其核心就是将广告模块放在两个 div元素中，然后调整 div元素的 CSS样式属性，主要是定位和可视性属性，从而实现对联广告的创建。 \u003c/p\u003e\n\u003ch5\u003e导航菜单和选项卡面板 \u003c/h5\u003e\n\u003ch6\u003e二级分层式导航菜单 \u003c/h6\u003e\n\u003cp class=\"p4\"\u003e首先准备两个图片，用于主菜单项背景图片的交换 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e定义主菜单项和子菜单项，这里使用 CSS样式表和 div元素来完成，代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;html\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta charset=\"utf-8\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;title\u0026gt;JavaScript Sample\u0026lt;/title\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;!– #mainNav { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eposition: absolute; \u003c/span\u003e\u003cspan class=\"p6\"\u003etop: 2px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 30px;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 800px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e.mainItem { \u003c/span\u003e\u003cspan class=\"p6\"\u003eposition: absolute; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etop: 3px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 27px; \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 74px; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003epadding: 10px 0px; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003emargin: 0px; \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-align: center; \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-size:\n        13px; \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground-image: url(images/tab1.gif); \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground-repeat:\n        no-repeat; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e.subItemNav { \u003c/span\u003e\u003cspan class=\"p6\"\u003eposition: absolute; \u003c/span\u003e\u003cspan class=\"p6\"\u003etop: 30px;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eleft: 0px; \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 100%; \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 20px;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003epadding: 2px 0px 0px 100px; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evisibility: hidden; \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground-color: #61B38B; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e.subItemNav a:link, \u003c/span\u003e\u003cspan class=\"p4\"\u003e.subItemNav a:visited {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-size: 80%; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ecolor: #ffffff; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e.subItemNav a:hover {\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #cccccc; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body onmousemove=\"closeAllSubItem(event);\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;div id=\"headerNav\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div id=\"mainNav\"\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e\u0026lt;div id=\"mainItem1\" class=\"mainItem\" onmouseover=\"displaySubItem(this);\"\u0026gt;开发王 \u0026lt;/div\u0026gt;\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;div id=\"mainItem2\" class=\"mainItem\" onmouseover=\"displaySubItem(this);\"\u0026gt;最佳拍档\n        \u0026lt;/div\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;div id=\"mainItem3\" class=\"mainItem\"\n        onmouseover=\"displaySubItem(this);\"\u0026gt;Flash\u0026lt;/div\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;div id=\"mainItem4\" class=\"mainItem\" onmouseover=\"displaySubItem(this);\"\u0026gt;简体中文\n        \u0026lt;/div\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e\u0026lt;div id=\"mainItem5\" class=\"mainItem\"\n        onmouseover=\"displaySubItem(this);\"\u0026gt;繁体中文 \u0026lt;/div\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;div id=\"mainItem6\" class=\"mainItem\" onmouseover=\"displaySubItem(this);\"\u0026gt;其它语言\n        \u0026lt;/div\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div id=\"subMenu1\" class=\"subItemNav\"\u0026gt;\n    \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e\u0026lt;a href=\"#\"\u0026gt;HTML\u0026lt;/a\u0026gt; | \u003c/span\u003e\u003cspan class= n class=\"p4\"\u003efor (var i = 1; i \u0026lt;= totalItems; i++) { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar oSubItem =\n        document.getElementById(\"subMenu\" + i); \u003c/span\u003e\u003cspan class=\"p6\"\u003eoSubItem.style.visibility = \"hidden\";\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003evar oMainItem = document.getElementById(\"mainItem\" + i); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eoMainItem.style.backgroundImage = \"url(images / tab1.gif)\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003evar mainItemIndex = \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etheobj.getAttribute(\"id\").toString().substring(8); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar oSubItem = document.getElementById(\"subMenu\" + mainItemIndex); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eoSubItem.style.visibility = \"visible\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003etheobj.style.backgroundImage =\n        \"url(images / tab2.gif)\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e// 鼠标指针移动时，触发该函数 \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 注意对象变量 scopeY用于定义垂直方向上的范围，这里是从 5~60 \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e// 表示主菜单项和子菜单项的范围 \u003c/span\u003e\u003cspan class=\"p2\"\u003e// 该函数检查鼠标指针是否超出这个范围，从而重新设置子菜单项 \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efunction closeAllSubItem(event) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar scopeY = { \u003c/span\u003e\u003cspan class=\"p6\"\u003etop: 5, \u003c/span\u003e\u003cspan class=\"p6\"\u003ebot: 60 \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e}; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.status = event.clientY; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        ((event.clientY \u0026lt; scopeY.top) || (event.clientY \u0026gt; scopeY.bot)) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003efor (var i = 03e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在上述代码中，需注意的就是 CSS布局，这里还是使用绝对定位，但是 subItem完全固定，只需向其中填写内容即可，更加简便。 \u003c/p\u003e\n\u003ch5\u003e处理表单 \u003c/h5\u003e\n\u003ch6\u003e表单复选框全选 \u003c/h6\u003e\n\u003cp\u003e该功能的实现代码如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003efunction selectAll() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e// 获取表单 form元素的引用 \u003c/span\u003e\u003cspan class=\"p6\"\u003evar mailForm = document.getElementById(\"mailForm\");\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 获取选择所有邮件的复选框控件的引用 \u003c/span\u003e\u003cspan class=\"p6\"\u003evar selectAllMails =\n        document.getElementById(\"selectAllMails\"); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e// 检查 form元素是否有子节点，从而确定邮箱中当前页是否存在邮件 \u003c/span\u003e\u003cspan class=\"p6\"\u003e// 如果不存在就退出，否则，执行 else \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eif (!mailForm.hasChildNodes()) { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ereturn; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 获取 form元素所有子节点，然后遍历这些子节点 \u003c/span\u003e\u003cspan class=\"p8\"\u003evar\n        rootNodeList = mailForm.childNodes; \u003c/span\u003e\u003cspan class=\"p8\"\u003efor (var i = 0; i \u0026lt; rootNodeList.length; i++)\n        { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003evar rootNode = rootNodeList[i]; \u003c/span\u003e\u003cspan class=\"p10\"\u003e//\n        注意这里仅仅获取元素名为 input、 type属性为 checkbox的节点 \u003c/span\u003e\u003cspan class=\"p10\"\u003e// 也就是仅仅获取复选框节点 \u003c/span\u003e\u003cspan class=\"p10\"\u003eif\n        (rootNode.nodeName.toLowerCase() == \"input\" \u0026amp; \u0026amp; rootNode.getAttribute(\"type\").toLowerCase() ==\n        \"checkbox\") { \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003erootNode.checked = selectAllMails.checked; \u003c/span\u003e\u003cspan class=\"p12\"\u003e/* 注意这里没有使用 W3C\n        DOM接口，归于除 IE之外其它浏览器的 BUG \u003c/span\u003e\u003cspan class=\"p12\"\u003evar checked = selectAllMails.getAttribute(\"checked\");\n    \u003c/span\u003e\u003cspan class=\"p12\"\u003eif(checked==\"checked\"||checked){ \u003c/span\u003e\n    \u003cspan class=\"p12\"\u003esetAttribute(\"checked\",\"checked\"); \u003c/span\u003e\u003cspan class=\"p12\"\u003e}else{ \u003c/span\u003e\u003cspan\n        class=\"p12\"\u003eremoveAttribute(\"checked\"); \u003c/span\u003e\u003cspan class=\"p12\"\u003e} \u003c/span\u003e\u003cspan class=\"p12\"\u003e*/ \u003c/span\u003e\u003cspan\n        class=\"p10\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;form name=\"mailForm\" id=\"mailForm\" action=\"\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;input\n        type=\"checkbox\" name=\"selectMail\" value=\"1″ /\u0026gt;第 1封邮件 \u0026lt;br /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;input type=\"checkbox\" name=\"selectMail\" value=\"2″ /\u0026gt;第 2封邮件 \u0026lt;br /\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u0026lt;input type=\"checkbox\" name=\"selectMail\" value=\"3″ /\u0026gt;第 3封邮件 \u0026lt;br /\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/form\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!– 注意这里，这个复选框控件不在表单内 – \u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!– 当单击这个控件时执行 selectAll()函数 – \u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input type=\"checkbox\" id=\"selectAllMails\" onclick=\"javascript:selectAll();\"\n        /\u0026gt;全选 \u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e表单的验证 \u003c/h6\u003e\n\u003cp\u003e实现验证的程序。 \u003c/p\u003e\n\u003cp\u003e实验验证的程序包括以下两个步骤。 \u003c/p\u003e\n\u003cp class=\"p4\"\u003e编写 JavaScript代码，将它保存在一个名为 checkForm.js的文件内，这也是一个通用的表单数据合法性检测代码，如下所示： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efunction checkForm(myForm) { \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 检查两次密码输入是否匹配 \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*\n        if(myForm.user_password.value!=myForm.user_repassword.value){ \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"密码不匹配！请检查 \");\n    \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ereturn false; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 遍历表单控件 \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e// 检查 form元素是否有子节点，从而确定邮箱中当前页是否存在邮件 \u003c/span\u003e\u003cspan class=\"p4\"\u003e// 如果不存在就退出，否则，执行 else \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eif (!myForm.hasChildNodes()) { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ereturn; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p6\"\u003evar myControls =\n        myForm.childNodes; \u003c/span\u003e\u003cspan class=\"p6\"\u003efor (var i = 0; i \u0026lt; myControls.length; i++) { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e// 检查控件是否存在 checkIt属性，也就是是否需要验证 \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eif (myControls[i].nodeName.toLowerCase() != \"input\") { \u003c/span\u003e\u003cspan class=\"p10\"\u003econtinue;\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e}; \u003c/span\u003e\u003cspan class=\"p8\"\u003evar type = myControls[i].getAttribute(\"type\").toLowerCase();\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (type == \"submit\") { \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003econtinue; \u003c/span\u003e\u003cspan class=\"p8\"\u003e}; \u003cspan class=\"r\"\u003e// 对提交按钮和重置按钮不做验证 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p8\"\u003eif (type == \"reset\") { \u003c/span\u003e\u003cspan class=\"p10\"\u003econtinue; \u003c/span\u003e\u003cspan class=\"p8\"\u003e}; \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003evar checkIt = myControls[i].getAttribute(\"checkIt\"); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003eif (checkIt == null) { \u003c/span\u003e\u003cspan class=\"p10\"\u003econtinue; \u003c/span\u003e\u003cspan class=\"p8\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (checkIt == \"\") { \u003c/span\u003e\u003cspan class=\"p10\"\u003econtinue; \u003c/span\u003e\u003cspan class=\"p8\"\u003e};\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 取得验证的正则字符串 \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar strReg = checkIt; \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 取得表单的值，注意这里不能使用 getAttribute获取值 \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003evar strVal = myControls[i].value; \u003c/span\u003e\u003cspan class=\"p8\"\u003e// 使用正则字符串定义一个 RegExp对象，匹配时不区分大小写\n    \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003evar reg = new RegExp(strReg, \"i\"); \u003c/span\u003e\u003cspan class=\"p8\"\u003eif (!reg.test(strVal)) {\n    \u003c/span\u003e\u003cspan class=\"p10\"\u003e// 验证不通过，就弹出提示 \u003c/span\u003e\u003cspan class=\"p10\"\u003ealert(myControls[i].getAttribute(\"tips\"));\n    \u003c/span\u003e\n    \u003cspan class=\"p10\"\u003e// 返回，并且该表单控件取得焦点 \u003c/span\u003e\u003cspan class=\"p10\"\u003emyControls[i].focus(); \u003c/span\u003e\u003cspan class=\"p10\"\u003ereturn\n        false; \u003c/span\u003e\u003cspan class=\"p8\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在表单所在网页内引用如下 JavaScript代码： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;a href=\"http://checkForm.js\"\u0026gt;http://checkForm.js\u0026lt;/a*gt;\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e定义表单的方式。 \u003c/h6\u003e\n\u003cp\u003e下面是一个表单的范例，借此可以进行测试，也可以了解常用的正则表达式的写法： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;form name=\"addUser\" id=\"addUser\" action=\"\"\n        onsubmit=\"javascript:return checkForm(this);\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;label id=\"normal\"\n        for=\"username\"\u0026gt;用户名： \u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input name=\"user_id\" id=\"user_id\"\n        type=\"text\" checkIt=\"^[a-zA-Z] {1}([a-zA-Z0-9]|[._]) {5,7}$\" tips=\"只能包 含字母、数字、下划线 (_)，长度为 6-8，开头必须是字母 \"/\u0026gt;\n    \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;br /\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;label id=\"normal\"\n        for=\"user_password\"\u0026gt;密码： \u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input name=\"user_password\"\n        id=\"user_password\" type=\"password\" checkIt=\"\\S{5,7}\" tips=\"长度为 6-8″ /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;br /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;label id=\"normal\" for=\"user_repassword\"\u0026gt;确认密码： \u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;input name=\"user_repassword\" id=\"user_repassword\" type=\"password\" /\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;br /\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;label id=\"normal\"\n        for=\"user_truename\"\u0026gt;真实姓名： \u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;input name=\"user_truename\" id=\"user_truename\" type=\"text\" checkIt=\"^[\\u4e00-\\u9fa5\\\n        uf900-\\ufa2d]{1,11}$\" tips=\"必须中文，长度小于 12，大于 2″ /\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;br /\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;label id=\"normal\" for=\"user_email\"\u0026gt;电子邮件： \u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;input name=\"user_email\" id=\"user_email\" type=\"text\" checkIt=\"^[a-zA-Z0-9]{1}[\\.\n        a-zA-Z0-9_-]*[a-zA-Z0-9]{1}@[a-zA-Z0-9]+[-]{0,1}[a-zA-Z0-9]+[\\.]{1}[a-zA-Z]+[\\.]{0,1}[a-zA-Z]+$\" tips=\"请检查您的\n        信箱地址填写是否有误！ \" /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;br /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;label id=\"normal\" for=\"user_telephone\"\u0026gt;电话： \u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input\n        name=\"user_telephone\" id=\"user_telephone\" type=\"text\" checkIt=\"^\\d+$\"\n        tips=\"电话号码含有非法字符 \"/\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;br /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;label id=\"normal\" for=\"user_fax\"\u0026gt;传真： \u0026lt;/label\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;input\n        name=\"user_fax\" id=\"user_fax\" type=\"text\" checkIt=\"^\\d+$\" tips=\"传真号码含有非法字符 \"/\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;br\n        /\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;label id=\"normal\" for=\"user_date_of_birth\"\u0026gt;出生日期： \u0026lt;/label\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;input name=\"user_date_of_birth\" id=\"user_date_of_birth\" type=\"text\" checkIt=\"^\\d{4}\\-\\d\n        {1,2}-\\d{1,2}$\" tips=\"日期格式： 2005-05-25″ /\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;br /\u0026gt; \u003c/span\u003e\u003cspan\n        cla
