class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>页面事件</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介 \u003c/h5\u003e\n\u003cp\u003e所有的页面事件都明确的处理整个页面的函数和状态。主要包括页面的加载和卸载。 \u003c/p\u003e\n\u003ch5\u003e页面的初始化 \u003c/h5\u003e\n\u003cp\u003eload 事件是在页面完全加载完毕后触发。该事件包含所有的图形文件、外部文件的加载，也就是说，在页面所有内容全部加载之前，任何 DOM 操作都不会发生。为 window 对象加载 load 事件有两种。 \u003c/p\u003e\n\u003ch6\u003e直接为 window对象注册页面初始化事件的处理函数。 \u003c/h6\u003e\n\u003ch6\u003e在页面的 \u0026lt;body\u0026gt; 标签中定义 onload 事件处理属性。 \u003c/h6\u003e\n\u003cp\u003eJavaScript 解释器在编译时，如果发现同时使用两种方式定义 load 事件类型，会通过 window 对象注册处理函数覆盖掉 body 元素定义的页面初始化函数。 \u003c/p\u003e\n\u003cp\u003e在实际开发中， load 事件类型经常需要调用附带参数的函数，但是 load 事件类型不能够直接带参数，要解决这个问题，可以通过在 \u0026lt;body\u0026gt; 中通过事件属性的形式调用函数、或是通过嵌套函数或闭包来实现。\n\u003c/p\u003e\n\u003ch5\u003e结构初始化 \u003c/h5\u003e\n\u003cp\u003e在传统事件中， load 是最早触发的事件。不过当使用 load 事件来初始化页面时可能会存在一个问题，那就是，当页面中包含较大的文件时， load 事件事件需要等到所有的图片都加载完毕后才能触发。 \u003c/p\u003e\n\u003cp\u003e这时可以考虑使用 DOMContentLoaded 事件类型。作为 DOM 的标准类型，它在 DOM 文档结构加载完毕后触发，因此要比 load 加载要早。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!DOCTYPE html\u0026gt; \u0026lt;html lang=\"en\"\u0026gt;\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n        charset=\"UTF-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta http-equiv=\"X-UA-Compatible\"\n        content=\"IE=edge\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width,\n        initial-scale=1.0\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;Document\u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efunction f1() { \u003c/span\u003e\u003cspan class=\"p6\"\u003ealert(\"页面初始化完毕 \") \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efunction f() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ealert(\"我提前了 \") \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003ewindow.onload = f1; \u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (document.addEventListener) { \u003c/span\u003e\u003cspan class=\"p6\"\u003edocument.addEventListener(\"DOMContentLoaded\", f,\n        false); \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u0026lt;/head\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;img src=\"image/2020-12-13.png\" /\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;/html\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e为兼容 IE 支持。则使用一个小技巧： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (window.ActiveXObject) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edocument.write(\"\u0026lt;script id=\\\"ie_onload\\\" defer\n        src=\\\"javascript:void(0)\\\"\u0026gt;\u0026lt;\\/script\u0026gt;\"); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003edocument.getElementById(\"ie_onload\").onreadystatechange = function() { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eif (this.readyState == \"complete\") { \u003cspan class=\"r\"\u003e// 如果状态完成，这说明事件已加载完毕 \u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ethis.onreadystatechange = null \u003cspan class=\"r\"\u003e// 清空当前方法 \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p8\"\u003ef();\n        \u003cspan class=\"r\"\u003e// 调用预先执行的回调函数 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e针对 Safari 浏览器，需要用 setInterval() 函数周期性检查 document 对象的 readyState 属性，随时监控文档是否加载完毕，如果加载完毕则完成回调函数。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eif (/WibKit/i.test(navigator.userAgent)) { \u003c/span\u003e\u003cspan class=\"p4\"\u003evar _timer =\n        setInterval(function() { \u003c/span\u003e\u003cspan class=\"p6\"\u003eif (/onload|complete/.test(document.readyState)) {\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003eclearInterval(_timer); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003ef() \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e}, 10) \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e页面卸载 \u003c/h5\u003e\n\u003cp\u003eunload 是卸载的意思，这个事件在从页面窗口内移动文档的位置时触发。也就是说，通过超链接、前进或后退等方式从一个页面去向另一个页面时，或者关闭浏览器窗口时。 \u003c/p\u003e\n\u003cp\u003e在 unload 中，无法阻止有效的默认行为。因为该事件后，页面不再存在。使用该事件类型的最佳方式就是取消页面的对象的引用。 \u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003ebeforeunload 事件类型比 unload 更加人性化。如果 beforeunload 事件处理函数返回字符串信息，那么字符串信息一定显示在对话框中，询问用户是否离开页面。但，如果 beforeunload\n        没有返回值，那么就不会弹出对话框，功能和 unload 就相同了。 \u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e窗口重置 \u003c/h5\u003e\n\u003cp\u003eresize 事件类型在浏览器窗口被重置时触发。 \u003c/p\u003e\n\u003ch5\u003e页面滚动 \u003c/h5\u003e\n\u003cp\u003escroll 事件类型是用于浏览器窗口内移动文档时触发的。如通过键盘箭头键、翻页键和空格键移动文档位置，或者通过滚动条滚动时触发。 \u003c/p\u003e\n\u003ch5\u003e错误处理 \u003c/h5\u003e\n\u003cp\u003eerror 事件类型是在 JavaScript 代码发生错误时触发，利用该事件可以捕获并处理错误信息。 error 事件类型与 try/catch 功能类似，都是用来捕获页面的错误信息。不过 error\n    无需传递事件对象，且可以包含已经发生的错误信息。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ewindow.onerror = function(message) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(\"错误原因： \" +\n        arguments[0] + \"\\n 错误的 URL： \" + arguments[1] + \"\\n 错误的行号： \" + arguments[2]); \u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n        false; \u003cspan class=\"r\"\u003e// 禁止浏览器显示默认出错信息 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003ea.innerHTML = \"\"\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在 error 事件处理函数中，默认包含 3 个参数，其中第 1 个参数表示错误信息，第 2 个参数表示出错文件的 URL ，第三个参数显示文件中出错的位置的行含。 \u003c/p\u003e\n\u003cp\u003eerror 事件处理函数的返回值是可以决定浏览器是否显示默认错误信息。如果返回值为 false ，则返回默认返回信息；若返回值为 true，则不返回标准错误信息。 \u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ js ✈︎✈︎ 事件 event","title":"页面事件"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","js","事件 event","页面事件"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
