                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e过渡\u003c/h5\u003e\n\u003cp\u003etransition 属性是一个复合属性，可以同时定义 transition-property、 transition-duration、 transition-timing-function、\n    transition-delay、 transition-property、 transition-duration、 transition-timing-function和 transition-delay子属性值。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003etransition:[\u0026lt;'transition-property'\u0026gt; \u003cspan class=\"r\"\u003e // 定义过渡 \u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e|| \u0026lt;'transition-duration'\u0026gt; \u003cspan class=\"r\"\u003e // 定义过渡时间 \u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e||\u0026lt;'transition-timing-function'\u0026gt; \u003cspan class=\"r\"\u003e // 定义效果 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e||\n        \u0026lt;'transition-delay'\u0026gt; \u003cspan class=\"r\"\u003e // 定义延迟 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e[,\n        [\u0026lt;'transition-property'\u0026gt; \u003cspan class=\"r\"\u003e//第二名称\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e||\n        \u0026lt;'transition-duration'\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e||\u0026lt;'transition-timing-function'\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e|| \u0026lt;'transition-delay'\u0026gt;]]*\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e可以使用 transition 属性来代替以上 4 个属性，中间用空格隔开\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003etransition： transition-property \u0026nbsp;\u0026nbsp;transition-duration\u0026nbsp;\n        \u0026nbsp;transition-delay \u0026nbsp;\u0026nbsp;transition-timing-function\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e定义过渡\u003c/h6\u003e\n\u003cp\u003etransition-property 属性用来定义过渡动画的 css 属性，如 background 属性\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etransition-property: none | all | [\u0026lt;IDENT\u0026gt;] [','\u0026lt;IDENT\u0026gt;]*;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enone\u003c/li\u003e\n    \u003cli\u003eall\u003c/li\u003e\n    \u003cli\u003eIDENT : 几乎所有色彩、大小、位置等相关的属性，都可以应用过渡动画\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e过渡时间\u003c/h6\u003e\n\u003cp\u003etransition-duration 定义变幻动画的时间\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etransition-duration: \u0026lt;time\u0026gt; [,\u0026lt;time\u0026gt;]+;\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e定义延迟\u003c/h6\u003e\n\u003cp\u003etransition-delay 被用来定义过渡动画的延迟\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etransition-delay: \u0026lt;time\u0026gt; [,\u0026lt;time\u0026gt;]+;\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e定义效果\u003c/h6\u003e\n\u003cp\u003etransition-timing-function 被用来定义过渡动画的效果：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003esase：平滑过渡，等同于 cubic-bezier(0.25,0.1,0.25,1.0) 函数，即立方贝塞尔\u003c/li\u003e\n    \u003cli\u003elinear： 线性过渡，等同于 cubic-bezier(0.0,0.0,1.0,1.0) 函数\u003c/li\u003e\n    \u003cli\u003eease-in：由慢到快，等同于 cubic-bezier(0.42,0,1.0,1.0) 函数\u003c/li\u003e\n    \u003cli\u003eease-out： 由快到慢，等同于 cubic-bezier(0,0,0.58,1.0) 函数\u003c/li\u003e\n    \u003cli\u003eease-in-out： 由慢到快再到慢，等同于 cubic-bezier(0.42,0,0.58,1.0)函数\u003c/li\u003e\n    \u003cli\u003ecubic-bezier: 特殊的立方贝塞尔 曲线效果\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e触发时机\u003c/h5\u003e\n\u003cp\u003eCSS 3 动画一般经过鼠标事件或定义动画，如 CSS 伪类 和 Javascript 事件：\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eCSS 动态定义\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e动态伪类\u003c/th\u003e\n        \u003cth\u003e作用元素\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003eJavascript 事件包括 click、focus、mousemove、mouseover、mouseout\u003c/p\u003e\n\n\u003cscript\u003e\n    let Aa = [\n        [':link', '只有链接', '未访问的链接'],\n        [':visited', '只有链接', '访问过的链接'],\n        [':hover', '所有元素', '光标经过'],\n        [':active', '所有元素', '鼠标单击元素'],\n        [':focus', '所有可被选中的元素', '元素被选中'],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 变幻和贞","title":"过渡"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","变幻和贞","过渡"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
