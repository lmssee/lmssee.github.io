    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e3D\u003c/h5\u003e\n\u003cp\u003e09 年 3 月 W3C 正式发布了 3D 变形标准草案（\u003ca href=\"http://www.w3.org/TR/css3-3d-transforms/\" target=\"_blank\"\n        rel=\"noopener noreferrer\"\u003ehttp://www.w3.org/TR/css3-3d-transforms/\u003c/a\u003e）。目前，CSS 3 D 的支持情况，呵呵了。。。\u003c/p\u003e\n\u003cp\u003e与 2 哥变形的相同属性： \u003c/p\u003e\n\u003ch5\u003e透视图\u003c/h5\u003e\n\u003cp\u003e一般来讲，透视图（ perspective）是以一种特定的方式绘制 2D对象的过程，用以提供当从特定点（没影点 [vanishing point]）查看时它们彼此之间的高度、宽度和深度的正确表示。\u003c/p\u003e\n\u003cp\u003e3 弟 较 2 哥变形要麻烦些，需要先定义 3 维空间，才可以完美展现。在其爷级元素上定义视距 perspective： length ,然后在其父级元素上定义变幻风格 transform-style:\n    preserve-3d; ，之后就可以定义 3 弟变幻了。\u003c/p\u003e\n\u003ch6\u003e观察者视距 perspective （爷爷元素）\u003c/h6\u003e\n\u003cp\u003e定义视距：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eperspective： length;\u003c/span\u003e \u003c/code\u003e\n\u003ch6\u003e3D 元素观察者基点位置 perspective-origin （爷爷元素）\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003eperspective-origin: x-axis y-axis;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e取值包括：left、right、center、length、%\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e该属性必须和 perspective 属性一起使用。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e创建舞台 transform-style （父亲元素）\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etransform-style: preserve-3d;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003etransform-style 是否保留其子元素的 3D 转换。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003etransform-style: flat|preserve-3d;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eflat： 子元素将不保留其 3D 转换\u003c/li\u003e\n    \u003cli\u003epreserve-3D：子元素将保留其 3D 转换\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e定义 3 D 变形 transform （目标元素）\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etransform: translate3d(x,y,z) ;\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e3D 位移\u003c/h5\u003e\n\u003ch6\u003etranslate3d() 函数\u003c/h6\u003e\n\u003cdiv style=\"perspective: 1200px;\"\u003e\n    \u003cdiv class=\"c\" style=\"transform-style: preserve-3d;\"\u003e\u003cspan class=\"p\"\n            style=\"transform: translate3d(30px,-10px,200px);\"\u003etranslate3d(tx ,ty ,tz);\u003c/span\u003e\u003c/div\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p4\"\u003e.stage { \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 300px; \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight:\n        300px; \u003c/span\u003e\u003cspan class=\"p6\"\u003efloat: left; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin: 15px; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eposition: relative; \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground: #93FB40; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e-webkit-perspective: 1200px; \u003c/span\u003e\u003cspan class=\"p6\"\u003e-moz-perspective: 1200px; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e-ms-perspective: 1200px; \u003c/span\u003e\u003cspan class=\"p6\"\u003e-o-perspective: 1200px; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eperspective: 1200px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e .container { \u003c/span\u003e\u003cspan class=\"p6\"\u003eposition: absolute; \u003c/span\u003e\u003cspan class=\"p6\"\u003etop: 50%;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eleft: 50%; \u003c/span\u003e\u003cspan class=\"p6\"\u003e-webkit-transform-style: preserve-3d;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e-moz-transform-style: preserve-3d; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e-ms-transform-style: preserve-3d; \u003c/span\u003e\u003cspan class=\"p6\"\u003e-o-transform-style: preserve-3d;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003etransform-style: preserve-3d; \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e\n        .container img { \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003eposition: absolute; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003emargin-left: -80px; \u003c/span\u003e\u003cspan class=\"p6\"\u003emargin-top: -100px; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p8\"\u003e .container img:nth-child(1) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ez-index: 1; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003eopacity: .6; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e .s1 img:nth-child(2) { \u003c/span\u003e\u003cspan class=\"p6\"\u003ez-index: 2;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eopacity: .6; \u003c/span\u003e\u003cspan class=\"p6\"\u003e-webkit-transform: translateZ(200px);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e-moz-transform: translateZ(200px); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e-ms-transform: translateZ(200px); \u003c/span\u003e\u003cspan class=\"p6\"\u003e-o-transform: translateZ(200px);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003etransform: translateZ(200px); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003etranslateZ() 函数\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003etranslateZ(t);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003etranslateZ() 函数仅让元素在 Z 轴进行位移，当值越大时，元素离浏览者越近，在视觉上元素越大，反之元素越小。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003etranslateZ() 函数在实际应用中效果等于 translate3d(0,0,tz)。仅从视觉效果来看，translateZ() 和 translate3d(0,0,tz) 函数功能类似于二维\n        的scale() 函数，但实际上完全不同。translateZ() 和 translate3d(0,0,tz) 变形是发生在 z 轴，而不是 X 轴和 Y 轴。当使用 3D变形，能够在 -Z-\n        轴移动一个确实很大的好处，比如说建立一个 3D 的盒子时。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e3D 缩放\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003escale3d(sx,sy,sz);\u003c/span\u003e\u003cspan class=\"p\"\u003escaleZ(s);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003escaleZ(-1) 定义了一个原点在 Z 轴的对称点（按照元素的变换原点）。\u003c/p\u003e\n\u003cp\u003escaleZ() 和 scale3d() 函数单独使用时没有任何效果，需要配合其他的变形函数才会有效果。\u003c/p\u003e\n\u003ch5\u003e3 D 旋转\u003c/h5\u003e\n\u003cp\u003eCSS 3 新增了 3 个 旋转函数：rotateX()、rotateY()、rotateZ()。\u003c/p\u003e\n\u003ch6\u003erotateX()\u003c/h6\u003e\n\u003cp\u003erotateX() 函数指定一个元素围绕 X 轴旋转，旋转的量别定为指定的角度；如果值为正值，元素围绕 X 轴顺时针旋转；反之，如果是负值，元素围绕 X 轴逆时针旋转。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003erotateX(a);\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003erotateY()\u003c/h6\u003e\n\u003cp\u003erotateY() 函数指定一个元素围绕 Y 轴旋转，旋转的量别定为指定的角度；如果值为正值，元素围绕 Y 轴顺时针旋转；反之，如果是负值，元素围绕 Y 轴逆时针旋转。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003erotateY(a);\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003erotateZ()\u003c/h6\u003e\n\u003cp\u003erotateZ() 函数指定一个元素围绕 Z 轴旋转，旋转的量别定为指定的角度；如果值为正值，元素围绕 Z 轴顺时针旋转；反之，如果是负值，元素围绕 Z 轴逆时针旋转。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003erotateZ(a);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003erotateZ() 函数指定元素围绕 Z 轴旋转，如果仅在视觉上来看，rotateZ() 函数让元素顺时针或逆时针旋转，与 rotate() 效果相同，但他不能在 2 D 平面旋转。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e在三维里，除了 rotateX()、rotateY()、rotateZ() 函数可以让一个元素在三维空间中旋转之外，还有一个就是 rotate3D() 函数。在 3D 空间，旋转由一个 [x,y,z,a]\n        向量并经过元素原点定义。\u003c/p\u003e\n    \u003cp\u003erotate3d() 中取值说明如下：\u003c/p\u003e\n    \u003cul\u003e\n        \u003cli\u003ex ： 一个 0~1 之间的值，主要用来描述围绕 X 轴旋转的矢量值\u003c/li\u003e\n        \u003cli\u003ey ： 一个 0~1 之间的值，主要用来描述围绕 Y 轴旋转的矢量值\u003c/li\u003e\n        \u003cli\u003ez ： 一个 0~1 之间的值，主要用来描述围绕 Z 轴旋转的矢量值\u003c/li\u003e\n        \u003cli\u003ea ： 一个角度值，主要用来指定元素在 3D 空间的旋转的角度。如果是正值，这说明 顺时针旋转，如果是负值，这说明逆时针旋转\u003c/li\u003e\n    \u003c/ul\u003e\n    \u003cul\u003e\n        \u003cli\u003erotateX(a) 函数功能等同于 rotate3d(1,0,0,a)\u003c/li\u003e\n        \u003cli\u003erotateY(a) 函数功能等同于 rotate3d(0,1,0,a)\u003c/li\u003e\n        \u003cli\u003erotateZ(a) 函数功能等同于 rotate3d(0,0,1,a)\u003c/li\u003e\n    \u003c/ul\u003e\n\u003c/div\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 变幻和贞","title":"三弟"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","变幻和贞","三弟"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
