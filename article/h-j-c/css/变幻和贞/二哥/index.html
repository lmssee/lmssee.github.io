="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>二哥</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e2D\u003c/h5\u003e\n\u003cp\u003e09 年 12 月 W3C 在 3D 草案的基础上，发布了 2D 的变形标准草案（\u003ca href=\"http://www.w3.org/TR/css3-2d-transforms/\" target=\"_blank\"\n        rel=\"noopener noreferrer\"\u003ehttp://www.w3.org/TR/css3-2d-transforms/\u003c/a\u003e）。目前， 2 D 得到了各主流浏览器的支持。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003etransform: none | \u0026lt;transform-function\u0026gt; | [\u0026lt;transform-function\u0026gt;]* ;\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e对于早期的版本的浏览器，WebKit 引擎支持 -WebKit-transform 私有属性，Mozilla Gecko 引擎支持 -moz-transform 私有属性，Presto 引擎支持\n        -o-transform 私有属性， IE 9 支持 -ms-transform 私有属性，目前大部分浏览器支持 transform 标准属性。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003erotate（）\u003c/h6\u003e\n\u003cp\u003e旋转元素，元素对象可以是内联元素也可以是块级元素：\u003c/p\u003e\n\u003cdiv class=\"c\" style=\"transform: rotate(3.12rad);transform-origin: 50% 50%;\"\u003e\u003cspan class=\"p\"\u003erotate\n        (\u0026lt;angle\u0026gt;)\u003c/span\u003e\u003cspan class=\"r\"\u003e//transform: rotate(.1rad);transform-origin: 50% 50%;\u003c/span\u003e\u003c/div\u003e\n\u003cul\u003e\n    \u003cli\u003edeg 角度值，一圈 360\u003c/li\u003e\n    \u003cli\u003egrad 梯度值，一圈 400\u003c/li\u003e\n    \u003cli\u003erad 弧度，一圈 2Π\u003c/li\u003e\n    \u003cli\u003eturn 圈，一圈就是 1 turn\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ediv:hover { \u003c/span\u003e\u003cspan class=\"p6\"\u003e/*定义动画的状态 */ \u003c/span\u003e\u003cspan class=\"p6\"\u003e-webkit-transform:\n        rotate(-90deg); \u003c/span\u003e\u003cspan class=\"p6\"\u003e-moz-transform: rotate(-90deg);\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e-o-transform: rotate(-90deg); \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003etransform: rotate(-90deg); \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* 兼容早期 IE */ \u003c/span\u003e\u003cspan class=\"p6\"\u003efilter:\n        progid: DXImageTransform.Microsoft.BasicImage(rotation=3); \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eIE 在怪异模式下不支持 filter 属性，应该使用 IE 的私有属性定义，即 -ms-filter，而不是 filter ：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p \"\u003e-ms-filter: progid: DXImageTransform.Microsoft.BasicImage(rotation=3); \u003c/span\u003e\n    \u003c/div\u003e\n\u003c/code\u003e\n    \u003ch6\u003escale（）\u003c/h6\u003e\n    \u003cp\u003e 缩放元素，包含两个参数，分别用来定义宽和高缩放比例：\u003c/p\u003e\n    \u003cdiv class=\"c\" style=\"transform: scale(1.5,0.8);\"\u003e\u003cspan class=\"p\"\u003escale (\u0026lt;number\u0026gt; [,\u0026lt;number\u0026gt;])\u003c/span\u003e\n    \u003c/div\u003e\n    \u003cp\u003enumber 可以是正数、负数、小数。正数值基于指定的宽和高缩放元素；负数值不会缩小元素，而是翻转元素（如 \u003cspan\n            style=\"transform: scale(-1,1);display: inline-block;background-color:#aaa;color: aqua;\"\u003e这几个\u003c/span\u003e\u003cspan\n            style=\"display: inline-block;transform: scale(1,-1);background-color: #000;color: #ff0;\"\u003e文字\u003c/span\u003e\n        \u003cspan\n            style=\"color:#0f0;background-color:#066;display:inline-block;transform:scale(-1,-1);\"\u003e被反转\u003c/span\u003e），然后再缩放元素。使用小于\n        1 的数，则为缩小，若第二个参数省略，则第 2 个参数与第 1 个参数相同。\n    \u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e.test a:hover { \u003c/span\u003e\u003cspan class=\"p6\"\u003ecolor: #FFF; \u003c/span\u003e\u003cspan class=\"p6\"\u003efont-weight: bold;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003etext-decoration: none; \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground:\n        url(images/icon2.jpg) #F00 no-repeat 5px 12px; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e/*设置a元素在鼠标经过时放大2倍尺寸进行显示*/ \u003c/span\u003e\u003cspan class=\"p6\"\u003e-webkit-transform: scale(1.2); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e-moz-transform: scale(1.2); \u003c/span\u003e\u003cspan class=\"p6\"\u003e-o-transform: scale(1.2); \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003etransform: scale(1.2); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n    \u003ch6\u003etranslate() \u003c/h6\u003e\n    \u003cp\u003e移动元素 ,基于 X 和 Y 坐标的重新定位元素：\u003c/p\u003e\n    \u003cdiv class=\"c\" style=\"transform: translate(3rem,-2rem);\"\u003e\u003cspan\n            class=\"p\"\u003etranslate(\u0026lt;translation-value)[,\u0026lt;translation-value]\u003c/span\u003e\u003c/div\u003e\n    \u003cp\u003e\u0026lt;translation-value\u0026gt; 参数表示坐标值，第 1 个参数表示相对于原位置的 x 轴的偏移位置，第 2 个参数表示相对于原位置 y 轴偏移距离。如果省略了第 2 个参数\u003c/p\u003e\n    \u003ch6\u003eskew（） \u003c/h6\u003e\n    \u003cp\u003e倾斜元素，基于 X 轴和 Y 轴的倾斜\u003c/p\u003e\n    \u003cdiv class=\"c\" style=\"transform: skew(6deg,3deg);\"\u003e\u003cspan class=\"p\"\u003eskew(\u0026lt;angle\u0026gt;[,\u0026lt;angle\u0026gt;]);\u003c/span\u003e\n    \u003c/div\u003e\n    \u003ch6\u003ematrix()\u003c/h6\u003e\n    \u003cp\u003e矩阵变换，基于 X 和 Y 坐标重新定位元素位置\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p4\"\u003e\n        matrix(\u0026lt;number\u0026gt;,\u0026lt;number\u0026gt;,\u0026lt;number\u0026gt;,\u0026lt;number\u0026gt;,\u0026lt;number\u0026gt;,\u0026lt;number\u0026gt;)\u003c/span\u003e\n\u003c/code\u003e\n    \u003cul\u003e\n        \u003cli\u003e第一个参数控制 X 轴缩放 scaleX()\u003c/li\u003e\n        \u003cli\u003e第二个参数控制 X 轴倾斜 skewX()\u003c/li\u003e\n        \u003cli\u003e第三个参数控制 Y 轴倾斜 skewY()\u003c/li\u003e\n        \u003cli\u003e第四个参数控制 Y 轴缩放 scaleY()\u003c/li\u003e\n        \u003cli\u003e第五个参数控制 X 轴移动 translateX()\u003c/li\u003e\n        \u003cli\u003e第六个参数控制 Y 轴移动 translateY()\u003c/li\u003e\n    \u003c/ul\u003e\n    \u003ch6\u003e变幻原点\u003c/h6\u003e\n    \u003cp\u003e变形原点通过 transform-origin 来设置:\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003etransform-origin: [[\u0026lt;percentage\u0026gt; | \u0026lt;length\u0026gt; | left | center | right ]\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e [\u0026lt;percentage\u0026gt; | \u0026lt;length\u0026gt; |top | center | bottom ] | \u003c/span\u003e\u003cspan class=\"p\"\u003e[[\n        left | center | right ] || [top | center | bottom ]]\u003c/span\u003e\n\u003c/code\u003e\n    \u003cp\u003e初始值为 50% 50% 。可接受任何有效方向数据，可以是百分比、 em、 px，也可以是 left、 right、 center、 top、 middle、 bottom\u003c/p\u003e\n    \u003ch5\u003ebackface-visibility\u003c/h5\u003e\n    \u003cp\u003ebackface-visibility 属性规定元素不面向屏幕时是否可见\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003ebackface-visibility: visible | hidden;\u003c/span\u003e\u003c/code\u003e\n    \u003cul\u003e\n        \u003cli\u003evisible ： 背面可见\u003c/li\u003e\n        \u003cli\u003ehidden ： 背面不可见\u003c/li\u003e\n    \u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 变幻和贞","title":"二哥"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","变幻和贞","二哥"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
