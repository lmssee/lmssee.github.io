                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003ewebkit 渐变\u003c/h5\u003e\n\u003cp\u003eWebKit是第一家支持渐变的引擎。\u003c/p\u003e\n\u003cdiv class=\"c\" style=\"background-image: linear-gradient(to left,#000,#666);\"\u003e\u003cspan\n        class=\"p\"\u003e-WebKit-gradient(\u0026lt;type\u0026gt;, \u0026lt;point\u0026gt; [,\n        \u0026lt;radius\u0026gt;]?,\u0026lt;point\u0026gt;[,\u0026lt;radius\u0026gt;]?[,\u0026lt;stop\u0026gt;]* )\n    \u003c/span\u003e\u003c/div\u003e\n\u003cul\u003e\n    \u003cli\u003etype: 渐变类型，包括 linear 和 radial\u003c/li\u003e\n    \u003cli\u003epoint：起始点和结束点\u003c/li\u003e\n    \u003cli\u003eradius：当定义径向（ radial）时，设置长度\u003c/li\u003e\n    \u003cli\u003estop：渐变色 和步长\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"c\"\n    style=\"   border: 2px solid #FCF; background: -webkit-gradient(linear, left top, left bottom, from(blue), to(red));  -webkit-background-origin: padding-box; -webkit-background-clip: content-box;   \"\u003e\n    \u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 400px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 200px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 2px solid #FCF; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding: 4px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ebackground: -webkit-gradient(linear, left top, left bottom, from(blue), to(red)); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-background-origin: padding-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-background-clip:\n        content-box; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003c/span\u003e\n\u003c/div\u003e\n\u003ch6\u003e使用 to() 函数\u003c/h6\u003e\n\u003cdiv class=\"c\"\n    style=\"   border: 2px solid #FCF;  background: -webkit-gradient(linear, left top, left bottom, from(blue),   to(red), color-stop(50%, green)); -webkit-background-origin: padding-box; -webkit-background-clip: content-box; \"\u003e\n    \u003cspan class=\"p2\"\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 400px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eheight: 200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 2px solid #FCF; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding:\n        4px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground: -webkit-gradient(linear, left top, left bottom, from(blue),\n        to(red), color-stop(50%, green)); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-background-origin: padding-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-background-clip:\n        content-box; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003c/span\u003e\n\u003c/div\u003e\n\u003ch6\u003e二重渐变\u003c/h6\u003e\n\u003cdiv class=\"c\"\n    style=\"  background: -webkit-gradient(linear, left top, left bottom, from(blue),to(red), color-stop(0.5, #fff), color-stop(0.5, #000));         -webkit-background-origin: padding-box; -webkit-background-clip:content-box;  \"\u003e\n    \u003cspan class=\"p2\"\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 400px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eheight: 200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 2px solid #FCF; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding:\n        4px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground: -webkit-gradient(linear, left top, left bottom, from(blue),\n        to(red), color-stop(0.5, #fff), color-stop(0.5, #000)); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-background-origin: padding-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-background-clip:\n        content-box; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/div\u003e\n\u003ch5\u003eGecko 渐变\u003c/h5\u003e\n\u003ch6\u003e线性渐变\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e-moz-linear-gradient([\u0026lt;point\u0026gt; ||\n        \u0026lt;angle\u0026gt;,]?\u0026lt;stop\u0026gt;,\u0026lt;stop\u0026gt;[,\u0026lt;stop\u0026gt;]* )\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003epoint： 设置起始点\u003c/li\u003e\n    \u003cli\u003eangle：线性渐变的角度，包括 deg、 grad（梯度，一圈为 90 度为 100grad）、 rad（弧度，一圈等于 2*PI）\u003c/li\u003e\n    \u003cli\u003estop： 颜色与步长\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 400px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 200px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 2px solid #FCF; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding: 4px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ebackground: -moz-linear-gradient(red, blue); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 400px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eheight: 200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 2px solid #FCF; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding:\n        4px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground: -moz-linear-gradient(top left, red, rgba(255, 0, 0, 0)); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 400px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 200px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 2px solid #FCF; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding: 4px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ebackground: -moz-linear-gradient(left, red, orange, yellow, green, blue, indigo, violet); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e径向渐变\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan\n        class=\"p\"\u003e-moz-radial-gradient([\u0026lt;position\u0026gt;||\u0026lt;angle\u0026gt;,]?[\u0026lt;shape\u0026gt;||\u0026lt;size\u0026gt;,]?\u0026lt;stop\u0026gt;,\u0026lt;stop\u0026gt;[,\u0026lt;stop\u0026gt;]*)\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003epoint：\u003c/li\u003e\n    \u003cli\u003eangle：\u003c/li\u003e\n    \u003cli\u003eshape：径向形状，包括 circle （⚪）和 ellipse（椭圆），默认值为 ellipse\u003c/li\u003e\n    \u003cli\u003esize：\u003c/li\u003e\n    \u003cli\u003estop：渐变色\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 400px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eheight: 200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 2px solid #FCF; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding:\n        4px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground: -moz-radial-gradient(bottom left, red, yellow, blue 80%); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eGecko 重复性渐变\u003c/h6\u003e\n\u003cp\u003eGecko 定义了 -moz-repeating-linear-gradient 为重复性线性渐变，定义了 -moz-repeating-radial-gradient\u003c/p\u003e\n\u003ch5\u003eIE 渐变\u003c/h5\u003e\n\u003cp\u003eIE 不支持 CSS 渐变，但提供了渐变滤镜，可以简单的渐变效果。IE 浏览器渐变滤镜的效果：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan\n        class=\"p\"\u003efilter:progid:DXImageTransform.Microsoft.Gradient(enabled=bEnabled,startColorStr=iWidth,endColorStr=iWidth);\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eenabled ： 设置或检索滤镜是否被激活。可选布尔值，包括 true 和 false ；默认值为 true ，即激活状态\u003c/li\u003e\n    \u003cli\u003estartColorStr ： 设置或检索色彩渐变的开始颜色和透明度。可选项，其格式为 #AARRGGBB \u003c/li\u003e\n    \u003cli\u003eEndColorStr ： 设置或检索色彩渐变的结束颜色和透明度。默认值为 #FF000000，即不透明黑色\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003ebody { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*让渐变背景填满整个页面*/ \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003epadding: 1em; \u003c/span\u003e\u003cspan class=\"p4\"\u003emargin: 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*为网页设计垂直渐变背景*/\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003efilter: progid: DXImageTransform.Microsoft.Gradient(gradientType=0,\n        startColorStr=#9999FF, endColorStr=#ffffff); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/* 定义标题样式 */ \u003c/span\u003e\u003cspan class=\"p4\"\u003e h1 { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor:\n        white; \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-size: 18px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 45px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding-left: 3em; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eline-height: 65px; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/* 控制文本显示位置 */ \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder-bottom:\n        solid 2px #c72223; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*为标题插入一个装饰图标*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground:\n        url(images/icon4.png) no-repeat left center; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e .box { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground: url(images/bg5.png)\n        no-repeat right bottom; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/* 设计插画背景 */ \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e\n        p { \u003c/span\u003e\u003cspan class=\"p4\"\u003etext-indent: 2em; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e标准渐变\u003c/h5\u003e\n\u003cp\u003eW3C 于 21010 年 11月份才正式发布了渐变工作的工作草案，不过渐变设计并没有单独列为一个模块，而是作为图像值和图像被替换的一部分。该标准草案沿袭了 Gecko 引擎的渐变设计方法，语法和用法也基本相同。\u003c/p\u003e\n\u003ch6\u003e线性渐变\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003elinear-gradient([\u0026lt;angle\u0026gt;|to\n        \u0026lt;side-or-corner\u0026gt;,]?\u0026lt;color-stop\u0026gt;[,\u0026lt;color-stop\u0026gt;]+)\u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 400px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eheight: 200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 2px solid #FCF; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding:\n        4px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-image: linear-gradient(to bottom, yellow, blue 30%, red); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e重复性渐变\u003c/h6\u003e\n\u003cp\u003erepeating-linear-gradient()函数可以定义重复性渐变，用法与 linear-gradient() 语法相同。\u003c/p\u003e\n\u003ch6\u003e径向渐变\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eradial-gradient([[\u0026lt;shape\u0026gt;||\u0026lt;size\u0026gt;][at \u0026lt;position\u0026gt;]?,| at\n        \u0026lt;position\u0026gt;,]?\u0026lt;color-stop\u0026gt;[,\u0026lt;color-stop\u0026gt;]+)\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eshape 用来指定渐变的类型，包括 circle（⚪）和 ellipse（椭圆）两种\u003c/li\u003e\n    \u003cli\u003esize 如果是 circle，则指定一个圆的半径；如果是 ellipse ，指定两个值分别设置椭圆的 x 轴和 y 轴 的半径，取值包括长度、百分比、关键字。关键字为以下\n        \u003cul\u003e\n            \u003cli\u003eclosest-side：可渐变到离渐变起点最近的一条边\u003c/li\u003e\n            \u003cli\u003efarthest-side：可渐变到离渐变起点最远的一条边\u003c/li\u003e\n            \u003cli\u003eclosest-corner：可渐变到离渐变起点最近的一个角\u003c/li\u003e\n            \u003cli\u003efarthest-corner：可渐变到离渐变起点最远的一个角\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003eposition 用来指定圆心的位置。如果是两个参数，则第一个代表 x 轴坐标，第二个代表 y 轴坐标。如果提供一个字，第二个值默认为 50%，即 center\u003c/li\u003e\n    \u003cli\u003ecolor-stop 用于指定渐变的色点。包括一个颜色值和一个起点值，颜色值与起点值以空格隔开，起点位置为一个具体的长度值（不可以是负值），也可以是一个百分值\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e position 值位于 shape 和 size 的后面。 \u003c/p\u003e\n\u003c/div\u003e\n\n\u003ch6\u003e重复径向渐变\u003c/h6\u003e\n\u003cp\u003erepeating-radial-gradient()函数可定义重复性渐变。\u003c/p\u003e\n\u003cdiv\u003e\n    \u003cdiv class=\"patterns pt1\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt2\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt3\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt4\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt5\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt6\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt7\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt8\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt9\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt10\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt11\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt12\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt13\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt14\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt15\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt16\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt17\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt18\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt19\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"patterns pt20\"\u003e\u003c/div\u003e\n\u003c/div\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 变幻和贞","title":"渐变"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","变幻和贞","渐变"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
