    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简述\u003c/h5\u003e\n\u003cp\u003eAnimations功能与 Transitions功能相同，都是通过改变元素的属性值来实现动画效果的。二者的区别在于，使用\n    Transitions功能时只能通过指定属性的开始值与结束值，然后以在这两个属性值之间进行平滑过渡的方式来实现动画效果，因此不能实现比较复杂的动画效果，而\n    Animations则通过定义多个关键帧以及定义每个关键帧中元素的属性值来实现更为复杂的动画效果。\u003c/p\u003e\n\u003cp\u003eanimation 是一个复合属性 ,包含 animation-name、 animation-duration、 animation-timing-function、 animation-delay、\n    animation-iteration-count、 animation-direction 的子属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eanimation: [\u0026lt;animation-name\u0026gt; \u003cspan class=\"r\"\u003e // 关键帧名称 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e||\n        \u0026lt;animation-duration\u0026gt; \u003cspan class=\"r\"\u003e // 定义播放时间 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e||\n        \u0026lt;animation-timing-function\u0026gt; \u003cspan class=\"r\"\u003e // 定义播放方式 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e||\n        \u0026lt;animation-delay\u0026gt; \u003cspan class=\"r\"\u003e // 定义播放延迟 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e||\n        \u0026lt;animation--iteration-count\u0026gt; \u003cspan class=\"r\"\u003e // 定义播放次数 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e||\n        \u0026lt;animation-direction\u0026gt;] \u003cspan class=\"r\"\u003e // 定义播放方向 \u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e[,[\u0026lt;animation-name\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e|| \u0026lt;animation-duration\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e|| \u0026lt;animation-timing-function\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e|| \u0026lt;animation-delay\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e|| \u0026lt;animation--iteration-count\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e|| \u0026lt;animation-direction\u0026gt;]*]\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eanimation：名称 单次时间 播放方式 播放延迟 播放次数 播放方向 。\u003c/p\u003e\n\u003ch5\u003e定义关键帧 @keyframes\u003c/h5\u003e\n\u003cp\u003e@keyframes 规则可创建动画，原理是，将一套 CSS 样式逐渐转化为另一套。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e@keyframes animationname {keyframes-selector { css-styles； }}\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e定义动画名称 animation-name\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eanimation-name: none | IDENT | [, none |IDENT]*;\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e定义播放时间 animation-duration\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eanimation-duration： \u0026lt;time\u0026gt;[,\u0026lt;time\u0026gt;]*\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e定义播放方式 animation-timing-function\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eanimation-timing-function： ease | linear | ease-in | ease-out | ease-in-out |\n        cubicbezier（ \u0026lt;number\u0026gt;， \u0026lt;number\u0026gt;， \u0026lt;number\u0026gt;， \u0026lt;number\u0026gt;） [,ease | linear | ease-in |\n        ease-out | ease-in-out | cubicbezier（ \u0026lt;number\u0026gt;， \u0026lt;number\u0026gt;， \u0026lt;number\u0026gt;， \u0026lt;number\u0026gt;）\n        ]*\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e默认值为 ease。\u003c/p\u003e\n\u003ch6\u003esteps（）函数\u003c/h6\u003e\n\u003cp\u003esteps()函数有两个参数，第一个参数指定了间隔数量，能将两个关键帧之间分隔成大小相等的间隔。接下来还是以刚刚底色切换的动画为例，该动画只有两帧，从蓝色变为红色\u003c/p\u003e\n\u003cp\u003esteps（）函数的第二个参数是可选的，这个参数有两个关键字： start和 end（默认值），用于指定每个间隔发生跳跃变化时的状态。如果为\n    start，那么跳跃会发生在间隔的起点，动画的起点处就是首帧，会被跳过，直接不显示；如果为 end，那么跳跃会发生在间隔的终点，动画最终会跳到末帧，但同时动画结束，就会立刻发生跳跃，末帧被跳过，直接不显示。\u003c/p\u003e\n\u003ch5\u003e定义播放延迟 animation-delay\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eanimation-delay： \u0026lt;time\u0026gt;[,\u0026lt;time\u0026gt;]*\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e定义播放次数 animation-iteration-count\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eanimation-iteration-count: infinite | \u0026lt;number\u0026gt; [, infinite |\n        \u0026lt;number\u0026gt;]*\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e初始值为 1 ， infinite 为无限次播放。\u003c/p\u003e\n\u003ch5\u003e播放方向 animation-direction\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eanimation-direction： normal | alternate [,normal | alternate]*\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e初始值为 normal ，每次播放都向前播放。值为 alternate 时，弟偶次正向，第奇次方向播放。\u003c/p\u003e\n\u003ch5\u003e定义播放状态 animation-play-state\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eanimation-play-state： paused | running \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e该属性默认值为 running ，其中 paused 定义动画 已暂停， running 定义动画正在播放。\n\u003c/p\u003e\n\u003cp\u003e 该属性可在 JavaScript 中使用 :\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eobject.style.animationPlayState=\"paused\"\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e定义播放外状态 animation-fill-mode\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eanimation-fill-mode： none | forwards | backwards | both [,none | forwards | backwards\n        | both ]* \u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enone:不设置动画外状态\u003c/li\u003e\n    \u003cli\u003eforwards：设置对状态为结束时状态\u003c/li\u003e\n    \u003cli\u003ebackwards：设置状态为动画开始时状态\u003c/li\u003e\n    \u003cli\u003eboth：设置状态为结束或开始时状态\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eanimation-fill-mode 属性初始值为 none，适用于所有的元素，包含元素的 :after 和 :before 。如果提供多个属性值，以逗号进行分割。对应的脚本属性为 animationFillMode 。\n\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e一般情况下屏幕频率为 60Hz，也就是每秒刷新 60次，合理的时间间隔就是 16.7ms: 1000/60=16.7ms\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e@-webkit-keyframes spin { \u003c/span\u003e\u003cspan class=\"p6\"\u003e0% { \u003c/span\u003e\u003cspan class=\"p8\"\u003e-webkit-transform:\n        rotateY(0deg); \u003c/span\u003e\u003cspan class=\"p8\"\u003etransform: rotateY(0deg) \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e100% { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e-webkit-transform: rotateY(360deg); \u003c/span\u003e\u003cspan class=\"p8\"\u003etransform: rotateY(360deg)\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan class=\"p8\"\u003e @-moz-keyframes spin { \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e0% { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e-moz-transform: rotateY(0deg); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003etransform: rotateY(0deg) \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p6\"\u003e100% { \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e-moz-transform: rotateY(360deg); \u003c/span\u003e\u003cspan class=\"p8\"\u003etransform: rotateY(360deg) \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e @-ms-keyframes spin { \u003c/span\u003e\u003cspan class=\"p6\"\u003e0% { \u003c/span\u003e\u003cspan class=\"p8\"\u003e-ms-transform:\n        rotateY(0deg); \u003c/span\u003e\u003cspan class=\"p8\"\u003etransform: rotateY(0deg) \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e100% { \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003e-ms-transform: rotateY(360deg); \u003c/span\u003e\n    \u003cspan class=\"p8\"\u003etransform: rotateY(360deg) \u003c/span\u003e\u003cspan class=\"p6\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p8\"\u003e @-o-keyframes spin { \u003c/span\u003e\u003cspan class=\"p6\"\u003e0% { \u003c/span\u003e\u003cspan class=\"p8\"\u003e-o-transform:\
