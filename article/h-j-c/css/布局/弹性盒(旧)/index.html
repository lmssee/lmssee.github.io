class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>弹性盒(旧)</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003cul\u003e\n    \u003cli\u003e2009 年版本（老版本）：display:box;\u003c/li\u003e\n    \u003cli\u003e2011 年版本（过渡版本）： display:flexbox;\u003c/li\u003e\n    \u003cli\u003e2012 年版本（最新稳定版本）： display:flex;\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e盒布局模型\u003c/h5\u003e\n\u003cp\u003eCSS 3 引入新的布局模型--Box 布局，用于定义一个盒子在其他盒子中的分布式方式以及如何处理可用的空间。使用该模型可以很轻松的创建自适应浏览器窗口的流动布局或自适应字体大小的弹性布局。\u003c/p\u003e\n\u003cp\u003e启动盒布局，只需在拥有子元素的盒子的 display 属性值为 box （或 inline-box ）即可：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edisplay ： box ;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e盒布局由两部分构成：父容器和子容器。父容器通过 display:box 启动盒布局模型功能，并使用如下定义子容器的显示功能；子容器通过 box-flex 属性定义布局宽度，指定如何分配父容器的宽度：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ebox-orient ： 定义父容器中子容器的排列方式，是水平还是垂直，取值包括 horizontal、vertical、inline-axis、block-axis、inherit\u003c/li\u003e\n    \u003cli\u003ebox-direction ： 定义父容器中子容器的排列方式，取自包括 normal、reverse、inherit\u003c/li\u003e\n    \u003cli\u003ebox-align ： 父容器中子容器的垂直对齐方式，取值包括 start、end、center、baseline、stretch\u003c/li\u003e\n    \u003cli\u003ebox-pack ： 父容器中子容器的水平对齐方式，取值包括 start、end、center、justify\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e定义宽度 （容器内盒子）\u003c/h5\u003e\n\u003cp\u003e使用盒布局时只需要使用 box-flex （子元素配置）属性，就可以把默认的布局变成盒布局了。WebKit 支持 -webKit-box-flex 私有属性，Mozilla Gecko 支持 -moz-box-flex\n    私有属性，Presto 引擎支持 box 属性。IE 浏览器不支持该属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ebox-flex: ; \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e默认情况下，盒子不具有弹性。设置为盒子后具有弹性，且属性值至小为 1 ，如不具有弹性，则尽可能地宽，使内容可见，且没有任何溢出，其大小由 width、height 属性值，或者\n    min-height、min-width、max-height、max-width 属性值来决定。\u003c/p\u003e\n\u003cp\u003e若为弹性，则计算公式为：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e具有大小声明（ width 、 height 、 min-width 、 min-height 、 max-width 、 max-height ）\u003c/li\u003e\n    \u003cli\u003e父盒子大小和剩余可利用空间\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e即子盒子大小等于父盒子大小乘以其 box-flex 在所有盒子 box-flex 总和中的百分比。用公式 :\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e（子盒子大小） =（ 父盒子大小 ）*（ 子盒子的 box-flex） / （所有盒子的 box-flex 之和）\u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e#container { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*定义弹性盒布局样式*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay:\n        -moz-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay: -webkit-box; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e\n        #left-sidebar { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 200px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003epadding: 20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: orange; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e #contents { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*定义中间列宽度为自适应显示*/ \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e-moz-box-flex: 1; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-box-flex: 1; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003epadding: 20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: yellow; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e #right-sidebar { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding:\n        20px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ebackground-color: limegreen; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e #left-sidebar, \u003c/span\u003e\u003cspan class=\"p2\"\u003e#contents, \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e#right-sidebar { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*定义盒样式*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-sizing:\n        border-box; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-box-sizing: border-box; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003ebox-direction\u003c/h5\u003e\n\u003cp\u003e属性用于设置或检索弹性盒模型对象的子元素的排列顺序是否反转。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ebox-direction ： normal | reverse | inherit\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e「默认情况下， box-direction 属性的值为 normal 。如下对 box-direction 属性的常用取值进行了说明。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003enormal ：设置弹性盒模型对象的子元素按正常顺序排列。如果盒子元素的 box-orient 属性值为 horizontal ，则其包含的子元素按照从左到右的顺序显示；如果盒子元素的 box-orient 属性值为\n        vertical ，则其包含的子元素按照从上到下的顺序显示\u003c/li\u003e\n    \u003cli\u003ereverse ：反转弹性盒模型对象的子元素的排列顺序\u003c/li\u003e\n    \u003cli\u003einherit ：继承上级元素的顺序\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch5\u003e定义顺序 （容器内盒子）\u003c/h5\u003e\n\u003cp\u003ebox-direction 属性可以改变盒子内部元素的流动顺序，而 box-ordinal-group 属性能够设置或者检索弹性盒模型对象的每个子元素在盒子中的显示位置。 box-ordinal-group\n    属性的基本语法如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ebox-ordinal-group ： \u0026lt;integer\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e在 box-ordinal-group 属性的语法中， integer 是一个自然数，从 1 开始，用来定义子元素的显示顺序。子元素的分布将根据这个属性值从小到大进行排列，即数值较小的元素显示在数值较大的元素前面。\u003c/p\u003e\n\u003cp\u003e默认情况下，子元素将根据元素的位置进行排列。如果没有指定 box-ordinal-group 属性值的子元素，则其序号默认都为 1\n    ，并且序号相同的元素将按照它们在文档中加载的顺序进行排列。另外，相同数值的元素，它们的显示顺序取决于它们的代码顺序。\u003c/p\u003e\n\u003cp\u003e定义顺序，使用 box-ordinal-group 改变个元素的顺序，该属性使用一个表示序号的整数数值，浏览器在显示时按顺序加载。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eWebKit 支持 -webKit-box-ordinal-group 私有属性，Mozilla Gecko 支持 -moz-box-ordinal-group 私有属性，Presto 引擎支持标准 box 属性。IE\n        浏览器不支持该属性。\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e#container { \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay: -moz-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay:\n        -webkit-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay: box; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e #left-sidebar { \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-ordinal-group: 3; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-box-ordinal-group: 3; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebox-ordinal-group: 3; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ewidth: 200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding: 20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color:\n        orange; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e #contents { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-moz-box-ordinal-group: 1; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-box-ordinal-group: 1; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ebox-ordinal-group: 1; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-flex: 1; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e-webkit-box-flex: 1; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ebox-flex: 1; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003epadding: 20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: yellow; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e #right-sidebar { \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-ordinal-group: 2; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e-webkit-box-ordinal-group: 2; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ebox-ordinal-group: 2; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding:\n        20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: limegreen; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e\n        #left-sidebar, \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e#contents, \u003c/span\u003e\u003cspan class=\"p2\"\u003e#right-sidebar { \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-sizing:\n        border-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-box-sizing: border-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebox-sizing:\n        border-box; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e定义方向 （容器）\u003c/h5\u003e\n\u003cp\u003e伸缩盒（ Flexible Box\n    ）能让普通容器（通常是块级元素）变为伸缩容器，使其有能力改变子元素的尺寸、顺序和对齐方式。当容器大小发生变化时，子元素的大小会被自动调整，原先占据的空间会按比例缩放，以最优的方式填充可用空间。伸缩盒是 CSS3\n    引入的一种全新布局模式，用它可以轻松解决移动端屏幕尺寸带来的布局问题，还能实现一些棘手的视觉效果，例如多列等高、垂直居中等。有一点需要注意，那就是伸缩容器中的子元素不能再使用 float 和 vertical-align\n    属性。\u003c/p\u003e\n\u003cp\u003ebox-orient 属性用于设置或者检索弹性盒模型对象的子元素的排列方式，但是使用弹性盒子模型时，用户需要先把父容器的 display 属性设置为 box 或者 inline-box 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ebox-orient: horizontal | vertical | inline-axis | block-axis\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e如下对 box-orient 属性的简单取值进行了说明。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003ehorizontal ：设置弹性盒模型对象的子元素为水平排列，即盒子元素从左到右在一条水平线上显示它的子元素\u003c/li\u003e\n    \u003cli\u003evertical ：设置弹性盒模型对象的子元素为纵向排列，即盒子元素从上到下在一条垂直线上显示它的子元素\u003c/li\u003e\n    \u003cli\u003einline-axis ：盒子元素沿着内联轴显示它的子元素\u003c/li\u003e\n    \u003cli\u003eblock-axis ：盒子元素沿着块轴显示它的子元素\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003einline-axis 属性和 block-axis 属性是根据书写模式来决定的。例如，在英文关键字中包括垂直、水平和地图模式，因此内联轴和块轴也会不同。一般情况下， horizontal 和 vertical 属性最为常用。\n\u003c/p\u003e\n\u003cp\u003e使用 box-orient 来指定多个元素的排列方向，加入 属性后，定义属性值为 vertical ，则顺序按照垂直方向排列。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eWebKit 支持 -webKit-box-orient 私有属性，Mozilla Gecko 支持 -moz-box-orient 私有属性，Presto 引擎支持标准 box 属性。IE 浏览器不支持该属性。\n    \u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e#container { \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay: -moz-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay:\n        -webkit-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-orient: vertical; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-box-orient:\n        vertical; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e #left-sidebar { \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-ordinal-group: 3; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e-webkit-box-ordinal-group: 3; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding:\n        20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: orange; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e #contents { \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-ordinal-group: 1;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-box-ordinal-group: 1; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-flex: 1; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e-webkit-box-flex: 1; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003epadding: 20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: yellow; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e #right-sidebar { \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-ordinal-group: 2; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e-webkit-box-ordinal-group: 2; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ewidth: 200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding: 20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color:\n        limegreen; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e #left-sidebar, \u003c/span\u003e\u003cspan class=\"p2\"\u003e#contents,\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e#right-sidebar { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-moz-box-sizing: border-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-box-sizing: border-box;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e自适应\u003c/h6\u003e\n\u003cp\u003e配置容器的 box-orient: horizontal 即可使子元素自适应\u003c/p\u003e\n\u003cp\u003e使用盒模型时，元素大小（包括宽和高）具有自适应性，即元素的宽度和高度可以根据排列的方向改变而改变。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e#container { \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay: -moz-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay:\n        -webkit-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: solid 1px red; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-orient: vertical;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-box-orient: vertical; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ewidth: 800px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 500px; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e #text-a { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: orange; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e #text-b { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ebackground-color: yellow; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e #text-c { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: limegreen;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e #text-a, \u003c/span\u003e\u003cspan class=\"p2\"\u003e#text-b, \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e#text-c { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-moz-box-sizing: border-box; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-box-sizing: border-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-size: 1.5em; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efont-weight: bold; \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 150px; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n        \u0026lt;/style\u0026gt; \u0026lt;/head\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;div id=\"container\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div id=\"text-a\"\u0026gt;列1\u0026lt;/div\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div id=\"text-b\"\u0026gt;列2\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;div\n        id=\"text-c\"\u0026gt;列3\u0026lt;/div\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;/div\u0026gt; \u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e消除空白\u003c/h6\u003e\n\u003cp\u003e将盒子中 div 的 box-flex 设置就可以改变原始宽高，使盒子自适应。\u003c/p\u003e\n\u003ch5\u003e定义对齐方式（定义在容器上）\u003c/h5\u003e\n\u003cp\u003e在盒布局中，可以使用 box-pack 属性及 box-align 属性来指定元素中的文字、图像及子元素水平方向或垂直方向的对齐方式。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eWebKit 支持 -webKit-pack 和 -WebKit-align 私有属性，Mozilla Gecko 支持 -moz-box-pack 和 -moz-box-align 私有属性，Presto\n        引擎支持标准属性。IE 浏览器不支持该属性。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003ebox-pack 和 box-align 属性值说明：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003estart : 排列方式 horizontal 。针对 box-pack 属性，表示左对齐，文字、图像或子元素被放置在元素的最左边显示；针对 box-align\n        属性，表示顶部对齐，文字、图像或子元素被放置在元素最顶部显示\u003c/li\u003e\n    \u003cli\u003ecenter : 排列方式 horizontal 。针对 box-pack 属性，表示中对齐，文字、图像或子元素被放置在元素的中部显示；针对 box-align\n        属性，表示中部对齐，文字、图像或子元素被放置在元素中部显示\u003c/li\u003e\n    \u003cli\u003eend : 排列方式 horizontal 。针对 box-pack 属性，表示右对齐，文字、图像或子元素被放置在元素的最右边显示；针对 box-align\n        属性，表示底部对齐，文字、图像或子元素被放置在元素最底部显示\u003c/li\u003e\n    \u003cli\u003estart : 排列方式 vertical 。针对 box-align 属性，表示左对齐，文字、图像或子元素被放置在元素的最左边显示；针对 box-pack\n        属性，表示顶部对齐，文字、图像或子元素被放置在元素最顶部显示\u003c/li\u003e\n    \u003cli\u003ecenter : 排列方式 vertical 。针对 box-align 属性，表示中对齐，文字、图像或子元素被放置在元素的中部显示；针对 box-pack 属性，表示中部对齐，文字、图像或子元素被放置在元素中部显示\n    \u003c/li\u003e\n    \u003cli\u003eend : 排列方式 vertical 。针对 box-align 属性，表示右对齐，文字、图像或子元素被放置在元素的最右边显示；针对 box-pack 属性，表示底部对齐，文字、图像或子元素被放置在元素最底部显示\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e在 CSS 3 之前的版本，只要使用 text-align 属性就可以了；如果是想要文字垂直居中，由于 div 元素不能使用 vertical-align 属性的，所以很难办到。在 CSS 3 中，只要让 DIV 元素使用\n    box-align 属性（排列方向默认为 horizontal ），文字就可以垂直居中了。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ediv#container { \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay: -moz-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay:\n        -webkit-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-align: center; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-box-align: center;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-pack: center; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-box-pack: center; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 300px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight:\n        200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: pink; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e\n        #text-a { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ebackground-color: orange; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e #text-b { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: yellow;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e #text-c { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color:\n        limegreen; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 布局","title":"弹性盒(旧)"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","布局","弹性盒(旧)"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
