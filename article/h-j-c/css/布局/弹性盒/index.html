="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>弹性盒</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定义弹性盒\u003c/h5\u003e\n\u003cp\u003eFlex-box 由伸缩盒和伸缩项目组成。通过设置元素的 display 属性为 flex 或 inline-flex ，可以得到一个伸缩容器。设置 flex 的容器被渲染成一个块级元素，而设置 inline-flex\n    的容器则渲染为一个行内元素。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003edisplay: flex | inline-flex ;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e其子元素将变成 flex 文档流，被称为伸缩项目。此时，CSS 的 columns 属性在伸缩容器上么有任何效果，同时 float、clear、vertical-align 属性在伸缩项目没有效果。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e伸缩项目中的每一个子元素都是一个伸缩项目，伸缩项目可以是任意数量的，伸缩容器外和伸缩项目内的一切元素都不受影响。伸缩项目沿着伸缩容器内的一个伸缩行定位，通常每一个伸缩容器只有一个伸缩行。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e定义成弹性盒后， css 的 columns 属性在伸缩盒上没效果，同时 float 、 clear 和 vertical-align 在伸缩项目无效果。\u003c/p\u003e\n\u003ch6\u003eW3C 解释\u003c/h6\u003e\n\u003cp\u003e常规布局是基于块和文本流方向，而 flex 布局是基于 flex-flow 流。\u003c/p\u003e\n\u003cp\u003e基本上，伸缩项目是沿着主轴（main axis），从主轴起点（main-start）到主轴终点（main-end）；或者沿着侧轴（cross axis\n    ），从侧轴起点（cross-start）侧轴终点（cross-end）排列：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e主轴（main axis）: 伸缩容器的主轴，伸缩项目主要沿着这个轴进行排布。注意，他不一定是水平的，这主要取决于 justify-content 属性设置\u003c/li\u003e\n    \u003cli\u003e主轴起点（main-start）和主轴终点（main-end）：伸缩项目放置在伸缩容器内从主轴起点（main-start）向主轴终点（main-end）方向\u003c/li\u003e\n    \u003cli\u003e主轴尺寸（main size）：伸缩项目在主轴方向的宽度和高度就是主轴尺寸。伸缩项目主要的大小属性要么是宽度，要么是高度，由哪一个对着主轴方向决定\u003c/li\u003e\n    \u003cli\u003e侧轴（cross axis）: 垂直于主轴，其方向主要取决于主轴\u003c/li\u003e\n    \u003cli\u003e侧轴起点（cross-start）和 侧轴终点（cross-end）：伸缩项目的配置从容器的侧轴起点开始，在侧轴的终点结束\u003c/li\u003e\n    \u003cli\u003e侧轴尺寸（cross-size）: 伸缩项目在侧轴方向的宽度和高度就是侧轴的长度。伸缩项目的侧轴长度属性是 width 或 height 属性，由哪一个对着侧轴方向决定\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e定义伸缩方向（容器设置）\u003c/h5\u003e\n\u003cp\u003e使用 flex-direction 属性来定义伸缩方向。语法如下\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eflex-direction: row | row-reverse |column | column-reverse \u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003erow: 默认值，在 ltr 排版左到右，在 rtl 排版右到左\u003c/li\u003e\n    \u003cli\u003erow-reverse: 与 row 相反 ，在 ltr 排版 右到左，在 rtl 左到右\u003c/li\u003e\n    \u003cli\u003ecolumn ：类似 row ，不过是从上到下\u003c/li\u003e\n    \u003cli\u003ecolumn-reverse: 类似 row-reverse ，不过是上到下\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"flexBox\"\u003e\n    \u003cdiv\u003e\n        \u003cdiv\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-direction: row\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-direction: row-reverse;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-direction: row-reverse\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-direction: column;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-direction: column;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-direction: column-reverse;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-direction: column-reverse;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n\u003ch5\u003e定义行数（容器）\u003c/h5\u003e\n\u003cp\u003e使用 flex-wrap 定义多行显示，侧轴方向决定了新型堆放方向。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eflex-wrap : nowrap | wrap | wrap-reverse \u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enowrap ： 默认值，伸缩器单行显示。在 ltr 排版左到右，在 rtl 排版右到左\u003c/li\u003e\n    \u003cli\u003ewrap ： 伸缩器多行显示，在 ltr 排版左到右，在 rtl 排版右到左\u003c/li\u003e\n    \u003cli\u003ewrap-reverse ： 伸缩器多行显示，与 wrap 相反\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"flexBox\"\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-wrap: nowrap;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv\u003e4\u003c/div\u003e\n            \u003cdiv\u003e5\u003c/div\u003e\n            \u003cdiv\u003e6\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-wrap: nowrap\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-wrap:wrap\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv\u003e4\u003c/div\u003e\n            \u003cdiv\u003e5\u003c/div\u003e\n            \u003cdiv\u003e6\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-wrap: wrap\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-wrap: wrap-reverse;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv\u003e4\u003c/div\u003e\n            \u003cdiv\u003e5\u003c/div\u003e\n            \u003cdiv\u003e6\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-wrap: wrap-reverse\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eflex-flow 属性是 flex-direction 和 flex-wrap 属性的复合属性，适用于伸缩容器。该属性可以同时定义伸缩容器的主轴和侧轴，其默认值为 row nowrap 。具体如下：\n    \u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eflex-flow: \u0026lt;'flex-direction'\u0026gt; || \u0026lt;'flex-wrap'\u0026gt;\u003c/span\u003e \u003c/code\u003e\n\u003c/div\u003e\n\u003cdiv class=\"flexBox\"\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-flow:row  wrap;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv\u003e4\u003c/div\u003e\n            \u003cdiv\u003e5\u003c/div\u003e\n            \u003cdiv\u003e6\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-flow:row wrap;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-flow:column  wrap-reverse\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv\u003e4\u003c/div\u003e\n            \u003cdiv\u003e5\u003c/div\u003e\n            \u003cdiv\u003e6\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-flow:column wrap-reverse\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n\u003ch5\u003e对齐方式（容器设置）\u003c/h5\u003e\n\u003ch6\u003ejustify-items\u003c/h6\u003e\n\u003cp\u003e为盒中每一个项目定义了默认的 justify-self ，使这些项目默认沿着轴线对齐到盒子。\u003c/p\u003e\n\u003ch6\u003e主轴对齐\u003c/h6\u003e\n\u003cp\u003ejustify-content\n    属性用来定义伸缩项目沿着主轴的对齐方式。该属性适用于伸缩容器，当一行上的所有伸缩项目都不能伸缩或是达到其最大长度时，这一属性才会对多余的空间进行分配。到项目溢出某一行时，这一属性也会在对齐上加以控制：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ejustify-content: flex-start | flex-end |center | space-between | space-around \u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eflex-start: 默认值，伸缩项目向一行的起始位置靠齐\u003c/li\u003e\n    \u003cli\u003eflex-end: 伸缩项目向一行的结束位置靠齐\u003c/li\u003e\n    \u003cli\u003ecenter ： 伸缩项目向一行的中间位置靠齐\u003c/li\u003e\n    \u003cli\u003espace-between ：两端对齐式分布\u003c/li\u003e\n    \u003cli\u003espace-around ：环绕式对齐，两端保留空间\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"flexBox\"\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"justify-content: flex-start;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ejustify-content: flex-start;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"justify-content: flex-end;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ejustify-content: flex-end;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"justify-content: center;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ejustify-content: center;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"justify-content: space-between;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ejustify-content: space-between;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"justify-content:space-around;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ejustify-content: space-around;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n\u003ch6\u003e侧轴对齐\u003c/h6\u003e\n\u003cp\u003ealign-items 属性用来定义伸缩项目在伸缩容器中当前行的侧轴上对齐方式。类似于侧轴的 justify-content 属性。语法如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ealign-items: flex-start | flex-end |center |baseline | stretch \u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eflex-start: 伸缩项目在侧轴起点的外侧边距紧靠该行起始边\u003c/li\u003e\n    \u003cli\u003eflex-end: 伸缩项目在侧轴起点的外侧边距紧靠该行终止边\u003c/li\u003e\n    \u003cli\u003ecenter: 伸缩项目在侧轴起点的外侧边距紧靠该行居中位置\u003c/li\u003e\n    \u003cli\u003ebaseline ： 基线对齐\u003c/li\u003e\n    \u003cli\u003estretch ：默认值，伸缩项目填充整个项目。此值会在项目的外边距盒的尺寸再遵照 min/max-width/height 属性的限制下尽可能的接近行的尺寸\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"flexBox\"\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"align-items: flex-start;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-items: flex-start;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"align-items: flex-end;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-items: flex-end;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"align-items: center;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-items: center;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"align-items: baseline;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-items: baseline;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"align-items:stretch;\"\u003e\n            \u003cdiv style=\"height: unset\"\u003e1\u003c/div\u003e\n            \u003cdiv style=\"height:unset\"\u003e子项不能设置高度\u003c/div\u003e\n            \u003cdiv style=\"height:unset\"\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-items: stretch;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n\u003ch6\u003e伸缩行对齐\u003c/h6\u003e\n\u003cp\u003ealign-center 被用来调整伸缩行在伸缩容器内的对齐方式，本属性在只有一行的伸缩容器上没有效果。语法如下： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ealign-center ： flex-start | flex-end |center | space-between | space-around | stretch\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eflex-start: 各行向伸缩项目起点靠齐\u003c/li\u003e\n    \u003cli\u003eflex-end: 伸缩项目向各行的结束位置靠齐\u003c/li\u003e\n    \u003cli\u003ecenter ： 伸缩项目向各行的中间位置靠齐\u003c/li\u003e\n    \u003cli\u003espace-between ：各行在伸缩容器内自由分布\u003c/li\u003e\n    \u003cli\u003espace-around ：各行环绕式对齐，两端保留空间\u003c/li\u003e\n    \u003cli\u003estretch ：各行伸缩以占剩余空间\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"flexBox\" style=\"flex-wrap: wrap;\"\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"align-content: flex-start;flex-wrap: wrap;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv\u003e4\u003c/div\u003e\n            \u003cdiv\u003e5\u003c/div\u003e\n            \u003cdiv\u003e6\u003c/div\u003e\n            \u003cdiv\u003e7\u003c/div\u003e\n            \u003cdiv\u003e8\u003c/div\u003e\n            \u003cdiv\u003e9\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-content: flex-start;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"align-content: flex-end;flex-wrap: wrap;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv\u003e4\u003c/div\u003e\n            \u003cdiv\u003e5\u003c/div\u003e\n            \u003cdiv\u003e6\u003c/div\u003e\n            \u003cdiv\u003e7\u003c/div\u003e\n            \u003cdiv\u003e8\u003c/div\u003e\n            \u003cdiv\u003e9\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-content: flex-end;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"align-content: flex-center;flex-wrap: wrap;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv\u003e4\u003c/div\u003e\n            \u003cdiv\u003e5\u003c/div\u003e\n            \u003cdiv\u003e6\u003c/div\u003e\n            \u003cdiv\u003e7\u003c/div\u003e\n            \u003cdiv\u003e8\u003c/div\u003e\n            \u003cdiv\u003e9\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-content: flex-center;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"align-content: space-between;flex-wrap: wrap;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv\u003e4\u003c/div\u003e\n            \u003cdiv\u003e5\u003c/div\u003e\n            \u003cdiv\u003e6\u003c/div\u003e\n            \u003cdiv\u003e7\u003c/div\u003e\n            \u003cdiv\u003e8\u003c/div\u003e\n            \u003cdiv\u003e9\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-content: space-between;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"align-content:space-around;flex-wrap: wrap;\"\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv\u003e4\u003c/div\u003e\n            \u003cdiv\u003e5\u003c/div\u003e\n            \u003cdiv\u003e6\u003c/div\u003e\n            \u003cdiv\u003e7\u003c/div\u003e\n            \u003cdiv\u003e8\u003c/div\u003e\n            \u003cdiv\u003e9\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-content:space-around;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"align-content: stretch;flex-wrap: wrap;\"\u003e\n            \u003cdiv style=\"height:unset\"\u003e子\u003c/div\u003e\n            \u003cdiv style=\"height:unset\"\u003e项\u003c/div\u003e\n            \u003cdiv style=\"height:unset\"\u003e不\u003c/div\u003e\n            \u003cdiv style=\"height:unset\"\u003e能\u003c/div\u003e\n            \u003cdiv style=\"height:unset\"\u003e设\u003c/div\u003e\n            \u003cdiv style=\"height:unset\"\u003e置\u003c/div\u003e\n            \u003cdiv style=\"height:unset\"\u003e高\u003c/div\u003e\n            \u003cdiv style=\"height:unset\"\u003e度\u003c/div\u003e\n            \u003cdiv style=\"height:unset\"\u003e呀\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-content: stretch;\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n\u003c/div\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 布局","title":"弹性盒"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","布局","弹性盒"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
