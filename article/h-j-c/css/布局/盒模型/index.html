    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定义显示模式\u003c/h5\u003e\n\u003cp\u003e现代浏览器都支持两种显示方式：怪异模式和标准模式。在怪异模式下， border 和 padding 都在 width 和 height 之中；在标准模式下， border 、 padding 、 width 和 height\n    都有自己独立的区域。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ebox-sizing: content-box | border-box\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003econtent-box 标准盒模型。 padding 和 border 不包含在 width 和 height 中，元素的实际宽度 = width + padding + margin\u003c/li\u003e\n    \u003cli\u003eborder-box 怪异盒模型。 padding 和 border 包含在 width 和 height 中，即元素实际宽度 = width \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIE 模式虽然不符合 W3C 的规范，但是这种解析有它的好处：无论如何改动元素的边框或者补白的大小，都不会影响元素的总尺寸发生变化，也就不会打乱页面的整体布局。而在标准模式下，如果改变下 padding 和 border\n    的值，就不得不重新计算元素的尺寸大小，从而影响整个页面的布局。虽然 IE 怪异模式不符合标准，但是这种方法还是值得学习。\u003c/p\u003e\n\u003ch5\u003e调整大小\u003c/h5\u003e\n\u003cp\u003eresize 属性可以允许用户自己调整元素的尺寸。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eresize ： both | horizontal | vertical\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enone 默认值，不允许用户调整\u003c/li\u003e\n    \u003cli\u003eboth 宽和高都可以调整\u003c/li\u003e\n    \u003cli\u003ehorizontal 可调宽度\u003c/li\u003e\n    \u003cli\u003evertical 可调高度\u003c/li\u003e\n    \u003cli\u003einherit ：默认继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e#resize { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*以背景方式显示图像，这样可以更轻松的控制缩放操作*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground:\n        url(iamges/1.jpg) no-repeat center; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*设计背景图像仅在内容区域显示，留出补白区域*/\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-background-clip: content; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-background-clip: content; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-clip: content;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*设计元素最小和最大显示尺寸，用户也只能够在该范围内自由调整*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 200px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eheight: 120px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003emax-width: 800px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003emax-height: 600px; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding: 6px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 1px\n        solid red; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*必须同时定义overflow和resize，否则resize属性声明无效，元素默认溢出显示为visible*/ \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eresize: both; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eoverflow: auto; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e缩放大小\u003c/h5\u003e\n\u003cp\u003ezoom 是 IE 专有属性，用于设置对象的缩放比例。另外，它还会出发 IE 的 haslayout 属性（布局属性），清除浮动，清除 margin 重叠，常用这个属性解决 IE 浏览器的存在的布局 BUG 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ezoom: normal | \u0026lt;number\u0026gt; | \u0026lt;percentage\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e文本溢出\u003c/h5\u003e\n\u003cp\u003etext-overflow 属性用于设置文本的溢出显示方式。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etext-overflow ： clip | ellipsis\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eclip 溢出部分裁剪，默认值\u003c/li\u003e\n    \u003cli\u003eellipsis 溢出替换成 ...\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e内容溢出\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoverflow： visible | hidden | scroll | auto | no-display | no-content\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003evisible : 不剪切内容，也不添加滚动条。该属性是默认值，元素被裁减为包含对象的窗口大小，且 clip 属性设置失效\u003c/li\u003e\n    \u003cli\u003eauto ： 在需要的时剪切内容并添加滚动条。该属性是 body 和 textarea 元素的默认值\u003c/li\u003e\n    \u003cli\u003ehidden ： 不显示超出的尺寸\u003c/li\u003e\n    \u003cli\u003escroll ：当元素超出了尺寸，则显示滚动条\u003c/li\u003e\n    \u003cli\u003eno-display ：当内容显示超出了元素尺寸，则不显示元素，此时类似于添加了 display : none 声明。该属性是新增的，仅作交流\u003c/li\u003e\n    \u003cli\u003eno-content ： 当内容超出元素尺寸，这不显示内容，此时类似于添加了 visibility: hidden 声明。该属性值是新增的，仅做技术交流\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003e#cont1 div, \u003c/span\u003e\u003cspan class=\"p2\"\u003e#cont3 div,\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e#cont5 div { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 300px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight:\n        200px; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e #cont2 div, \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e#cont4 div, \u003c/span\u003e\u003cspan class=\"p2\"\u003e#cont6 div { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 100px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 50px; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e .cont { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efloat: left; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003emargin: 4px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eoverflow-y: visible; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding: 10px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth:\n        200px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 100px; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e .cont,\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e.cont div { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eborder: solid 2px red; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e定义轮廓\u003c/h5\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eoutline属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性\u003c/th\u003e\n        \u003cth\u003e属性值\u003c/th\u003e\n        \u003cth\u003e描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eoutline：[outline-color] || [outline-style] || [outline-width] ||\n        [outline-offset(偏移位置)] || inherit \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e轮廓是不占空间，仅在获得焦点时显示:\u003c/p\u003e\n\u003ch6\u003eoutline-width \u003c/h6\u003e\n\u003cul style=\"list-style-type: circle;\"\u003e\n    \u003cli\u003e\u003c/li\u003e\n    \u003cli\u003ethin: 细\u003c/li\u003e\n    \u003cli\u003emedium: 中等\u003c/li\u003e\n    \u003cli\u003ethick：粗\u003c/li\u003e\n    \u003cli\u003e\u0026lt;length\u0026gt;\u003c/li\u003e\n    \u003cli\u003einherit\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003eoutline-style\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoutline-style: auto | \u0026lt;border-style\u0026gt; | inherit ;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eauto\u003c/li\u003e\n    \u003cli\u003e\u0026lt;border-style\u0026gt;: none、dotted、dashed、solid、double、groove、ridge、inset、outset\u003c/li\u003e\n    \u003cli\u003einherit\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003eoutline-color\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoutline-color : \u0026lt;color\u0026gt; | invert | inherit ;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003e\u0026lt;color\u0026gt; : 可用颜色名\u003c/li\u003e\n    \u003cli\u003einvert :　全部实行反转\u003c/li\u003e\n    \u003cli\u003einherit ： 全部继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003eoutline-offset:偏移\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoutline-offset : \u0026lt;length\u0026gt; | inherit ;\u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ebody { \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-family: \"Lucida Grande\", \"Lucida Sans Unicode\",\n        Verdana, Arial, Helvetica, sans-serif; \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-size: 12px; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*清除常用元素的边界、补白、边框默认样式*/ \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e p, \u003c/span\u003e\u003cspan class=\"p2\"\u003eh1, \u003c/span\u003e\u003cspan class=\"p2\"\u003eform, \u003c/span\u003e\u003cspan class=\"p2\"\u003ebutton {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003emargin: 0; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding: 0;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e/*定义一个强制换行显示类*/ \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e .spacer { \u003c/span\u003e\u003cspan class=\"p4\"\u003eclear: both; \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 1px;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*定义表单外框样式*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e .myform { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003emargin: 0 auto; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ewidth: 400px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003epadding: 14px; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*定制当前表单样式*/ \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e #stylized { \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: solid 2px #b7ddf2; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground:\n        #ebf4fb; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e/*设计表单内div和p通用样式效果*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e #stylized h1 { \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-size:\n        14px; \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-weight: bold; \u003c/span\u003e\u003cspan class=\"p4\"\u003emargin-bottom: 8px; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e #stylized p { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efont-size: 11px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor: #666666; \u003c/span\u003e\u003cspan class=\"p4\"\u003emargin-bottom:\n        20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder-bottom: solid 1px #b7ddf2; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding-bottom:\n        10px; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e #stylized label { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*定义表单标签样式*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay: block;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-weight: bold; \u003c/span\u003e\u003cspan class=\"p4\"\u003etext-align: right; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth:\n        140px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efloat: left; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*定义小字体样式类*/ \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e #stylized .small { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor: #666666; \u003c/span\u003e\u003cspan class=\"p4\"\u003edisplay:\n        block; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efont-size: 11px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efont-weight: normal; \u003c/span\u003e\u003cspan class=\"p4\"\u003etext-align: right; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth:\n        140px; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*统一输入文本框样式*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e #stylized\n        input { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efloat: left; \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-size: 12px; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding: 4px 2px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: solid 1px #aacfe4; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 200px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003emargin: 2px 0 20px 10px; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*定义图形化按钮样式*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e #stylized button {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eclear: both; \u003c/span\u003e\u003cspan class=\"p4\"\u003emargin-left: 150px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth:\n        125px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eheight: 31px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground: #666666 url(images/button.png) no-repeat;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003etext-align: center; \u003c/span\u003e\u003cspan class=\"p4\"\u003eline-height: 31px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ecolor: #FFFFFF; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efont-size: 11px; \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-weight: bold; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*设计表单内文本框和按钮在被激活和获取焦点状态下时，轮廓线的宽、样式和颜色*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e input:focus, \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebutton:focus { \u003c/span\u003e\u003cspan class=\"p4\"\u003eoutline: thick solid #b7ddf2 \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e input:active, \u003c/span\u003e\u003cspan class=\"p2\"\u003ebutton:active { \u003c/span\u003e\u003cspan class=\"p4\"\u003eoutline:\n        thick solid #aaa \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e\u003c/h5\u003e\n\u003cul id=\"Ba\"\u003e\n\u003c/ul\u003e\n\u003ch5\u003ecalc 方法\u003c/h5\u003e\n\u003cp\u003e通过使用该方法来自动计算元素的宽度、高度等数值类型的样式属性值。\u003c/p\u003e\n\u003cp\u003ecalc （）方法的另一个妙用是可以用来对各种不同的计数单位进行混合运算。\u003c/p\u003e\n\u003ch5\u003e滤镜\u003c/h5\u003e\n\u003cp\u003e滤镜特效是指在页面被渲染之后在页面中某个局部呈现的一些特殊的视觉效果。滤镜特效来源于 SVG （ Scalable Vector Graphics ，可缩放矢量图形）标准。在 SVG\n    标准中，滤镜特效被用于对一个矢量图形图像应用一些基于像素的图像特效。\u003c/p\u003e\n\u003ch6\u003egrayscale 滤镜（灰度滤镜）\u003c/h6\u003e\n\u003cp\u003e该滤镜将彩色图像转换为灰度图像。样式属性值中使用一个数值或数值百分比作为参数，该参数用于控制图像灰度。如果值为 100 ％，则图像变为黑白图像，如果该值为 0 ％，则图像不做任何修改，仍然为彩色图像。可以使用浮点数作为属性值，\n    0 代表 0 ％， 1 代表 100 ％。\u003c/p\u003e\n\u003ch6\u003esepia 滤镜\u003c/h6\u003e\n\u003cp\u003e该滤镜为彩色图像添加一层棕褐色色调，使其呈现出老照片的效果。样式属性中使用一个数值或数值百分比作为参数，该参数用于控制棕褐色调的浓度。如果值为 100 ％，则图像呈现出黑白色老照片的效果，如果该值为 0\n    ％，则图像不做任何修改，仍然为彩色图像。可以使用浮点数作为属性值， 0 代表 0 ％， 1 代表 100 ％。\u003c/p\u003e\n\u003ch6\u003esaturate 滤镜（饱和度滤镜）\u003c/h6\u003e\n\u003cp\u003e该滤镜用于增强彩色图像的饱和度，使色彩变得更加鲜明。该滤镜可以使照片呈现海报或卡通效果。样式属性中可以使用一个大于 100 ％的百分比作为参数来增强色彩的饱和度，也可以使用一个小于 100\n    ％的百分比作为参数来削弱色彩的饱和度。\u003c/p\u003e\n\u003ch6\u003ehue-rotate 滤镜\u003c/h6\u003e\n\u003cp\u003e该滤镜是一个非常特殊的滤镜，可以用于产生特殊的视觉效果。请将颜色光谱设想为一个从红色到紫色的一个颜色环（在光学中，为对光的色学性质研究方便，将所有可见颜色光谱围成一个圆环，称之为颜色环），该滤镜将图像中的所有颜色沿光环旋转一个角度。样式属性中使用一个角度值（例如\n    90deg ）为参数，参数值代表图像颜色沿颜色环旋转的角度。\u003c/p\u003e\n\u003ch6\u003einvert 滤镜（颜色翻转滤镜）\u003c/h6\u003e\n\u003cp\u003e该滤镜将图像颜色翻转，样式属性使用一个百分比数值作为参数，用于定义图像颜色的翻转程度，当参数值为 100 ％时的作用相当于为一幅照片进行反相处理。\u003c/p\u003e\n\u003ch6\u003eopacity 滤镜（透明度滤镜）\u003c/h6\u003e\n\u003cp\u003e该滤镜为图像产生透明或半透明效果。样式属性使用一个百分比数值或浮点数作为参数，用于定义图像的透明度，当参数值为 100\n    ％时图像为完全不透明，即不对图像进行修改。当参数值越小时透明度越高，这当然意味着被使用滤镜的元素叠放在其它元素上时其它元素将变得越来越清晰。当参数值降为 0\n    时被使用滤镜的元素变为完全透明（即完全消失），但仍可捕捉到该元素的诸如被鼠标单击等事件。因此，该滤镜的作用与 opacity 样式属性的作用相同。但是 opacity 属性不具有硬件加速特性，而在某些浏览器中当使用\n    opacity 滤镜时将利用硬件加速特性，因而拥有更高的页面性能。\u003c/p\u003e\n\u003ch6\u003econtrast 滤镜（对比度滤镜）\u003c/h6\u003e\n\u003cp\u003e就像控制电视机上的亮度一样，该滤镜可以在全黑与原图像亮度之间调整图像的对比度。样式属性使用一个百分比数值或浮点数作为参数，用于定义图像的对比度，当参数值为 0 ％时图像为全黑效果，当参数值在 0 ％增长到 100\n    ％的过程中，图像对比度将变得越来越强，当参数值为 100 ％时图像对比度变为原图像对比度。该参数值可以大于 100 ％，当参数值为 200 ％时图像对比度为原图像对比度的 2 倍。\u003c/p\u003e\n\u003ch6\u003eblur 滤镜（模糊滤镜）\u003c/h6\u003e\n\u003cp\u003e该滤镜的作用类似于在图像上添加一层玻璃遮罩，使图像具有一种烟雾效果。样式属性使用一个带有像素值单位的整数值，用于指定图像的模糊度。参数值为 0 时图像不发生变化。\u003c/p\u003e\n\u003ch6\u003edrop-shadow 滤镜（阴影滤镜）\u003c/h6\u003e\n\u003cp\u003e该滤镜的作用是为图像添加一层阴影效果，就好像太阳照在图像上使其产生一个影子一样。该滤镜为原图像产生一个快照，使其颜色单一化并将之模糊，然后将模糊结果进行偏离，使其看起来就像原图像的一个阴影。样式属性中使用多个可选参数，分别用于指定阴影的横方向偏移距离、纵方向偏移距离、阴影的模糊半径以及阴影的颜色。\n\u003c/p\u003e\n\n\n\u003cscript\u003e\n    let Aa = [\n        ['outline', '声明同时设置个属性，属性之间加空格：outline-color,outline-style,outline-width', '简写属性，可以设置全部或部分，或设置全部取消 '],\n        ['outline', 'none', '简写属性，可以设置全部或部分，或设置全部取消 '],\n        ['outline', 'inherit', '简写属性，可以设置全部或部分，或设置全部取消 '],\n        ['outline-color', '取值和 border-color类似', '设置轮廓颜色，只有在outline-style不为 none 时有效，默认transparent'],\n        ['outline-style', '取值与 border-style 类似', '轮廓风格，默认为 none '],\n        ['outline-width', '取值和border-width类似', '设置轮廓宽度，默认为 medium ,只有当 outline-style 不为 none时有效'],\n    ];\n    _MiMethod.td('Aa', Aa);\n    let Ba = [\n        ' box-align：定义子元素在盒子内垂直方向上的空间分配方式', 'box-direction：定义盒子的显示顺序', 'box-flex：定义子元素在盒子内的自适用尺寸',\n        'box-flex-group：定义自适应子元素群组', 'box-lines：定义子元素分列显示', 'box-ordinal-group：定义子元素在盒子内的显示位置',\n        'box-orient：定义盒子分布的坐标轴', 'box-pack：定义子元素在盒子内水平方向的空间分配方式',\n    ];\n    _MiMethod.li('Ba', Ba);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 布局","title":"盒模型"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","布局","盒模型"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
