    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e边界\u003c/h5\u003e\n\u003cp\u003ecss 用 margin 定义边界。语法如下：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003emargin: length | percentage | auto\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eauto 默认值，自动计算。在默认模式下， margin-top/margin-bottom 计算值为 0，margin-left/margin-right 的值取决于可用空间\u003c/li\u003e\n    \u003cli\u003elength 长度定义值，可为负值\u003c/li\u003e\n    \u003cli\u003epercentage 百分比。可为负值\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e设置技巧\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e设置四个值，则按 上、右、下、左\u003c/li\u003e\n    \u003cli\u003e如果只提供一个值，则应用于四边\u003c/li\u003e\n    \u003cli\u003e如果设置两个数，则第一个数为上下、第二个值为左右\u003c/li\u003e\n    \u003cli\u003e如果提供三个，则第一个为上，第二个为左、右，第三个为下\u003c/li\u003e\n    \u003cli\u003e如果是行内元素，只能设置左右\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003emargin 特性\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e外边距透明\u003c/li\u003e\n    \u003cli\u003e相邻的 margin 可能会折叠\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003emargin 折叠说明\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003emargin 折叠只发生在相邻的块元素\u003c/li\u003e\n    \u003cli\u003e浮动元素不与任何 margin 重叠\u003c/li\u003e\n    \u003cli\u003e设置了 overflow 属性，且取值不为 visible 的块元素，将不与它的子元素发生 margin 重叠\u003c/li\u003e\n    \u003cli\u003e绝对元素的 margin 不与任何 margin 重叠\u003c/li\u003e\n    \u003cli\u003e根元素的 margin 不与其它的 margin 重叠\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003emargin 子属性\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003emargin-top\u003c/li\u003e\n    \u003cli\u003emargin-right\u003c/li\u003e\n    \u003cli\u003emargin-bottom\u003c/li\u003e\n    \u003cli\u003emargin-left\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e补白\u003c/h5\u003e\n\u003cp\u003ecss 用 padding 定义补白:\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003epadding: length | percentage;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e设计技巧及子属性类似于 margin。\u003c/p\u003e\n\u003cp\u003epadding 会显示背景且不会重叠。\u003c/p\u003e\n\u003ch5\u003e边框\u003c/h5\u003e\n\u003cp\u003ecss 使用 border 定义边框。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eborder : line-width || line-style || color\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eline-width 宽度\u003c/li\u003e\n    \u003cli\u003eline-style 样式\u003c/li\u003e\n    \u003cli\u003ecolor 颜色\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e子属性\u003c/h6\u003e\n\u003cp\u003e分属性:\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e样式 border-style\u003c/li\u003e\n    \u003cli\u003e颜色 border-color\u003c/li\u003e\n    \u003cli\u003e宽度 border-width\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e四边子属性与 margin/padding 相同。\u003c/p\u003e\n\u003cp\u003e最重要的是 border-style 属性。\u003c/p\u003e\n\u003cspan class=\"p\"\u003eborder-style: none | hidden | dotted | dashed | solid | double | groove | ridge | inset |\n    outset\u003c/span\u003e\n\u003cul\u003e\n    \u003cli\u003enone 无轮廓\u003c/li\u003e\n    \u003cli\u003ehidden 隐藏边框\u003c/li\u003e\n    \u003cli\u003edotted 点状轮廓\u003c/li\u003e\n    \u003cli\u003esolid 实线轮廓\u003c/li\u003e\n    \u003cli\u003edouble 双线轮廓\u003c/li\u003e\n    \u003cli\u003edashed 虚线轮廓\u003c/li\u003e\n    \u003cli\u003egroove 3D凹槽轮廓\u003c/li\u003e\n    \u003cli\u003eridge 3D凸槽轮廓\u003c/li\u003e\n    \u003cli\u003einset 3D凹边轮廓\u003c/li\u003e\n    \u003cli\u003eoutset 3D凸边轮廓\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e尺寸\u003c/h5\u003e\n\u003cp\u003ecss 用 width 和 height 定义尺寸。\u003c/p\u003e\n\u003cspan class=\"p\"\u003ewidth: length | percentage |auto\u003c/span\u003e\u003cspan class=\"p\"\u003eheight: length | percentage | auto\u003c/span\u003e\n\u003cul\u003e\n    \u003cli\u003eauto 默认值，无特定宽度和高度\u003c/li\u003e\n    \u003cli\u003elength 用长度表示，不允许负\u003c/li\u003e\n    \u003cli\u003epercentage 百分比表示，不允许负\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e多列类布局属性\u003c/h5\u003e\n\u003cul id=\"Bb\"\u003e \u003c/ul\u003e\n\u003cp\u003e用户界面属性这些属性就是用来定义与界面有关的内容的。例如，可以定义轮廓显示的样式，也可以定义缩放区域，还可以设置当前元素在文档中的导航序列号等。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eresize：使元素的区域可缩放，调节元素尺寸大小。适用于任意获得overflow条件的容器\u003c/li\u003e\n    \u003cli\u003eoutline：可以设置元素周围的轮廓线，轮廓线不会占据空间，也不一定是矩形\u003c/li\u003e\n    \u003cli\u003eoutline-width：设置元素整个轮廓的宽度，只有当轮廓样式不是none时才会起作用。如果样式为none，宽度会重置为0。该属性的值不允许设置为负数\u003c/li\u003e\n    \u003cli\u003eoutline-style：用于设置一个元素的整个轮廓的样式\u003c/li\u003e\n    \u003cli\u003eoutline-offset：让轮廓偏离容器边缘，即可以调整外框与容器边缘的距离\u003c/li\u003e\n    \u003cli\u003eoutline-color：设置一个元素整个轮廓中可见部分的颜色。如果轮廓的样式值是none，则轮廓不会出现\u003c/li\u003e\n    \u003cli\u003enav-index：取代了HTML 4中的tabindex属性，为当前元素指定了其在当前文档中导航的序列号\u003c/li\u003e\n    \u003cli\u003ebox-sizing：改变容器的盒模型组成方式\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003enav-index属性为当前元素指定了其在当前文档中导航的序列号。导航的序列号指定了页面中元素通过键盘操作或获得焦点的顺序，该属性可以存在于嵌套的页面元素中。\u003c/p\u003e\n\u003cp\u003e除了nav-index属性外，还可以通过nav-up、nav-down、nav-left或nav-right属性设置HTML文档顺序控制元素的焦点切换。为了更好的用户体验，User\n    Agent提供了自定义切换焦点的控制顺序方向。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e该元素支持nav-index属性，而被赋予正整数属性值的元素将会被优先导航。User\n        Agent将按照nav-index属性值从小到大进行导航。属性值无须按次序，也无须以特定的值开始。拥有同一nav-index属性值的元素将以它们在字符流中出现的顺序进行导航\u003c/li\u003e\n    \u003cli\u003e对那些不支持nav-index属性或者nav-index属性值为auto的元素将以它们在字符流中出现的顺序进行导航\u003c/li\u003e\n    \u003cli\u003e对那些禁用的元素，将不参与导航的排序\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e盒子阴影\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e-webkit-box-reflect: below 5px;\u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ebox-shadow: none | \u0026lt;shadow\u0026gt; [,\u0026lt;shadow\u0026gt;]+;\u003c/span\u003e\u003c/code\u003e\n\u003cdiv style=\"width: 100px;height: 100px;position: relative;left: 40%;background: #0f0;box-shadow: 5px -5px #00f;\"\u003e\n\u003c/div\u003e\n\u003cp\u003eWebKit 支持 -webKit-box-shadow 私有属性，Mozilla Gecko 支持 -moz-box-shadow 私有属性，Presto 和IE 9+ 引擎支持 box-shadow 标准属性。IE 8\n    之前浏览器不支持 box-shadow 属性。\u003c/p\u003e\n\u003cp style=\"box-shadow: inset 1px 1px 5px    #0f0,inset -1px -1px 5px   #0ff;\"\u003e如果不设置阴影类型，默认为投影模式；当设置为 inset 时，则阴影为内阴影。\n    X 轴位移和 Y 轴位移定义阴影的偏移位置。阴影大小、阴影扩散和阴影颜色是可选值，默认为黑色实影。box-shadow 必须有位移值，否则无效果。\u003c/p\u003e\n\n\u003cscript\u003e\n    _MiMethod.li('Bb',\n        [\n            ' columns：可以同时定义多栏的数目和每栏宽度', 'column-width：可以定义每栏的宽度', 'column-span：定义元素可以在栏目上定位显示',\n            'column-rule：定义每栏之间边框的宽度、样式和颜色', 'column-rule-color：定义每栏之间边框的颜色', 'column-rule-width：定义每栏之间边框的宽度',\n            'column-rule-style：定义每栏之间边框的样式', 'column-gap：定义两栏之间的间距距离', 'column-fill：定义栏目的高度是否统一',\n            'column-count：可以定义栏目的数目', 'column-break-before：定义元素之前是否断行', 'column-break-after：定义元素之后是否断行',\n        ]\n    );\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 布局","title":"盒"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","布局","盒"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
