class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>显示</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介\u003c/h5\u003e\n\u003cp\u003edisplay 属性依赖于称为相对定位（ relative positioning ）的概念，它意味着元素将相对于页面上的其它元素进行定位。 CSS 还支持绝对定位（ absolute positioning\n    ），它允许独立于其它元素把一个元素放在页面上的精确位置。\u003c/p\u003e\n\u003cp\u003edisplay 用来定义元素的显示类型。其中，第二行为列表项目或是表格类项目，在网页设计中不常用:\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003edisplay ： none | inline | block | inline-block \u003c/li\u003e\n    \u003cli\u003edisplay ： list-item | table | inline-table | table-caption | table-cell | table-row | table-row-group |\n        table-colum-group | table-colum | table-footer-group| table-header-group \u003c/li\u003e\n    \u003cli\u003edisplay ： run-in | box | inline-box | flexbox | inline-flexbox | flex | inline-flex\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e第三行为 css 3 新增属性。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003einline 行内元素\u003c/li\u003e\n    \u003cli\u003eblock 块级元素\u003c/li\u003e\n    \u003cli\u003einline-block 行内块\n        \u003cdetails\u003e\n            \u003csummary\u003e去除 inline-block 元素间距\u003c/summary\u003e\n            \u003cp\u003e父元素 {font-size:0;} 。\u003c/p\u003e\n            \u003cp\u003e由于 img 元素也是 inline-block 元素，因此我们也能使用\" font-size:0 \"来去除图片之间的间距。\u003c/p\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003enone 隐藏\n        \u003cdetails\u003e\n            \u003csummary\u003e\" display:none \"和\" visibility:hidden \"的区别\u003c/summary\u003e\n            \u003cul\u003e\n                \u003cli\u003e\" display:none \"的元素被隐藏之后，不占据原来的位置。也就是说彻底地消失了，看不见也摸不着\u003c/li\u003e\n                \u003cli\u003e\" visibility:hidden \"的元素被隐藏之后，依然占据原来的位置。也就是说并没有彻底消失，看不见但摸得着\u003c/li\u003e\n            \u003c/ul\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n    \u003cli\u003etable 表\u003c/li\u003e\n    \u003cli\u003etable-caption 表头\u003c/li\u003e\n    \u003cli\u003etable-row 表行\u003c/li\u003e\n    \u003cli\u003etable-cell 表格\n        \u003cdetails\u003e\n            \u003csummary\u003e\" display:table-cell \"非常强大\u003c/summary\u003e\n            \u003cul\u003e\n                \u003cli\u003e图片垂直居中于元素\u003c/li\u003e\n                \u003cli\u003e等高布局\u003c/li\u003e\n                \u003cli\u003e自动平均划分元素，并且在一行显示\u003c/li\u003e\n            \u003c/ul\u003e\n        \u003c/details\u003e\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003erun-in\u003c/h6\u003e\n\u003cp\u003e将 CSS 属性 display 定义为 run-in 后，会根据周围元素来决定盒子类型，它有以下三个特点。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e如果定义为 run-in 的元素包含一个块级元素，那么它也可被理解为块级元素\u003c/li\u003e\n    \u003cli\u003e定义为 run-in 的元素的相邻兄弟元素（位于元素后面的兄弟元素）如果是块级元素，那么这个兄弟元素会变成行内元素\u003c/li\u003e\n    \u003cli\u003e如果是其它情况，那么 run-in 元素可理解为块级元素\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e块级元素和内联元素\u003c/h5\u003e\n\u003cp\u003e块元素具有如下特点\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e独占一行，排斥其它元素跟其位于同一行，包括块元素和行内元素\u003c/li\u003e\n    \u003cli\u003e块元素内部可以容纳其它块元素或行元素\u003c/li\u003e\n    \u003cli\u003e可以定义高度（ height ），也可以定义宽度（ width ）\u003c/li\u003e\n    \u003cli\u003e可以定义四个方向的 margin 属性\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e行内元素具有如下特点\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e可以与其它行内元素位于同一行\u003c/li\u003e\n    \u003cli\u003e行内内部可以容纳其它行内元素，但不可以容纳块元素，不然会出现无法预知的效果\u003c/li\u003e\n    \u003cli\u003e无法定义高度（ height ），也无法定义宽度（ width\u003c/li\u003e\n    \u003cli\u003e可以定义 margin-left 和 margin-right ，无法定义 margin-top 和 margin-bottom\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch5\u003e浮动\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efloat ： none | left | right \u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003e浮动空间\n        \u003cul\u003e\n            \u003cli\u003e元素定义了宽高，则以设置的值显示\u003c/li\u003e\n            \u003cli\u003e包含其它对象，则紧紧包裹对象或内容区\u003c/li\u003e\n            \u003cli\u003e如果未设置且不包含，则缩为一个点\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e浮动位置\n        \u003cul\u003e\n            \u003cli\u003eleft\u003c/li\u003e\n            \u003cli\u003eright\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e浮动环绕\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e浮动影响\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e如果一个元素设置了浮动，则不管这个元素是什么类型，都会转化为块元素，也就是 display 属性值为 block\u003c/li\u003e\n    \u003cli\u003e如果一个元素设置了浮动，它会脱离正常文档流。如果浮动元素的高度 height 大于父元素的高度 height ，或者父元素没有定义高度 height ，此时浮动元素会脱离父元素。这就是我们常见的\"父元素高度塌陷\"\n    \u003c/li\u003e\n    \u003cli\u003e当一个浮动元素碰到同一个方向的兄弟元素时，这些元素会从左到右、从上到下，一个接着一个紧挨着排列\u003c/li\u003e\n    \u003cli\u003e当一个浮动元素碰到同一个方向的兄弟元素时，这两个元素会移向两边（如果父元素宽度足够的话）\u003c/li\u003e\n    \u003cli\u003e在实际开发中我们使用了浮动之后，尽量清除浮动，不然会有预想不到的后果\u003c/li\u003e\n    \u003cli\u003e当父元素同时也是一个浮动元素的时候，这个父元素会自适应地包含该子元素\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e浮动的负作用\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e父元素高度塌陷，从而导致边框不能撑开，背景色无法显示。\u003c/li\u003e\n    \u003cli\u003e页面布局错乱\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e清除浮动\u003c/h5\u003e\n\u003cp\u003e常见的清除浮动的方法有三种。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eclear:both\u003c/li\u003e\n    \u003cli\u003eoverflow:hidden\u003c/li\u003e\n    \u003cli\u003e::after 伪元素 使用\" ::after 伪元素\"结合\" clear:both \"来实现\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eclear ： none | left | right | both \u003c/span\u003e\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e清除不是清除别的元素浮动，而是清除自己。如果左右两侧存在浮动元素，则把当前元素清除到下一行显示，而不是将前面的浮动元素清走，或者上一行显示。根据 HTML 解析规则，当前元素前面的对象不会受后面的影响\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e浮动嵌套\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e浮动包含框\u003c/li\u003e\n    \u003cli\u003e包含浮动对象\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 布局","title":"显示"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","布局","显示"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
