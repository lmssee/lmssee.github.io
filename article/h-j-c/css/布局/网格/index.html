class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>网格</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e？\u003c/h5\u003e\n\u003cp\u003e使用 display:grid; 定义为网格布局。\u003c/p\u003e\n\u003cp\u003egrid 属性是以下属性的简写属性：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003egrid-template-rows\u003c/li\u003e\n    \u003cli\u003egrid-template-columns\u003c/li\u003e\n    \u003cli\u003egrid-template-areas\u003c/li\u003e\n    \u003cli\u003egrid-auto-rows\u003c/li\u003e\n    \u003cli\u003egrid-auto-columns\u003c/li\u003e\n    \u003cli\u003egrid-aut-flow\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003egrid: none | \u003cspan class=\"r\"\u003e // 默认值，不定义行或列的尺寸 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003egrid-template-rows\n        /grid-template-columns | \u003cspan class=\"r\"\u003e // 规定列和行的尺寸 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003egrid-template-areas |\n        \u003cspan class=\"r\"\u003e // 规定使用命名项目的网格布局 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003egrid-template-rows / [grid-auto-flow]\n        grid-auto-columns | \u003cspan class=\"r\"\u003e // 规定行的尺寸（高度），以及列的自动尺寸\n        \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e[grid-auto-flow] grid-auto-rows / grid-template-columns | \u003cspan class=\"r\"\u003e\n            //\n            规定行的自动尺寸，并设置 grid-template-columns 属性 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003egrid-template-rows /\n        grid-auto-flow grid-auto-columns | \u003cspan class=\"r\"\u003e // 规定行的尺寸（高度），以及如何设置自动就位的项目，和列的自动尺寸 \u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003egrid-auto-flow grid-auto-rows/grid-template-columns | \u003cspan class=\"r\"\u003e //\n            规定如何放置自动就位的项目，和行的自动尺寸，以及设置 grid-template-columns 属性 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003einitial |\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003einherit; \u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e网格列\u003c/h6\u003e\n\u003cp\u003egrid Columns 网格线中的垂直线\u003c/p\u003e\n\u003ch6\u003e网格行\u003c/h6\u003e\n\u003cp\u003egrid rows 网格项中水平线\u003c/p\u003e\n\u003ch5\u003e网格间隙\u003c/h5\u003e\n\u003cp\u003e每列/行之间的间隔称之为间隙。可通过 grid-colum-gap 、 grid-row-gap 、 grid-gap 调整。\u003c/p\u003e\n\u003cp\u003e其中，grid-rap 是 grid-colum-gap 和 grid-row-gap 的混合属性，可以分别设置，也可以为此两个属性设置相同的值。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003egrid-rap : grid-colum-rap grid-row-gap;\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e网格线\u003c/h5\u003e\n\u003cp\u003e列之间的线称为列线（column lines），行之间的线被称为行线（row lines）。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e当把网格项目放进网格容器时，需使用引号。\u003c/p\u003e\n\u003c/div\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e.a { \u003c/span\u003e\u003cspan class=\"p6\"\u003egrid-column-start: 1; \u003c/span\u003e\u003cspan class=\"p6\"\u003egrid-column-end: 3;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e网格容器\u003c/h5\u003e\n\u003ch6\u003e列宽 grid-template-columns \u003c/h6\u003e\n\u003cp\u003egrid-template-columns 属性规定网格布局中二点列数（和宽度）：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003egrid-template-columns:\n        none | auto | max-content | min-content | length | initial | inherit;\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enone ： 默认值，在需要时创建列\u003c/li\u003e\n    \u003cli\u003eauto ： 列的尺寸取决于容器的大小以及列中项目内容的大小\u003c/li\u003e\n    \u003cli\u003emax-content\u003c/li\u003e\n    \u003cli\u003emin-content\u003c/li\u003e\n    \u003cli\u003elength\u003c/li\u003e\n    \u003cli\u003einitial\u003c/li\u003e\n    \u003cli\u003einherit\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e列高 grid-template-rows\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003egrid-template-rows: none | auto | max-content | min-content | length | initial |\n        inherit;\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enone ： 默认值，在需要时创建列\u003c/li\u003e\n    \u003cli\u003eauto ： 列的尺寸取决于容器的大小以及列中项目内容的大小\u003c/li\u003e\n    \u003cli\u003emax-content\u003c/li\u003e\n    \u003cli\u003emin-content\u003c/li\u003e\n    \u003cli\u003elength\u003c/li\u003e\n    \u003cli\u003einitial\u003c/li\u003e\n    \u003cli\u003einherit\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e可以使用 justify-content 来调节容器内对齐整个网鸽。其取值在《弹性盒》 \u003c/p\u003e\n    \u003cp\u003e同样，可使用 align-content 来调节整个网格内部的垂直排列方式。其取值见《弹性盒》\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e网格项目\u003c/h5\u003e\n\u003ch6\u003e定义项目放置列 grid-column\u003c/h6\u003e\n\u003cp\u003egrid-column 属性规定设置网格项目中的尺寸以及在网络布局中的位置，它是以下属性的简写属性：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003egrid-column-start\u003c/li\u003e\n    \u003cli\u003egrid-column-end\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003egrid-column: grid-column-start / grid-column-end;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003egrid-column-start ： 规定从哪一列开始项目\u003c/li\u003e\n    \u003cli\u003egrid-column-end ： 规定从哪一条列线（column-line）上停止项目，或跨越多少列\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e例如，从第 1 列（包括）到第 5 列（不包括）：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003egrid-column: 1/ 5;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e例如，从第 1 列开始，跨越 4 列：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003egrid-column: 1/span 4;\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e定义项目放置行 grid-row\u003c/h6\u003e\n\u003cp\u003egrid-row 规定网格布局的尺寸以及在网格布局中的位置，它是以下属性的简写：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003egrid-row-start\u003c/li\u003e\n    \u003cli\u003egrid-row-end\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003egrid-row: grid-row-start / grid-row-end;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e用法类似上述 grid-column 。\u003c/p\u003e\n\u003ch6\u003e绝对位置 grid-area\u003c/h6\u003e\n\u003cp\u003egrid-area 属性网格项目的尺寸以及在网格布局中的 位置，它是以下属性的简写属性:\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003egrid-row-start\u003c/li\u003e\n    \u003cli\u003egrid-column-start\u003c/li\u003e\n    \u003cli\u003egrid-row-end\u003c/li\u003e\n    \u003cli\u003egrid-column-end\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003egrid-area 属性还可以用于为网格项分配名称。然后，可以通过网格容器的 grid-template-areas 属性引用命名的网格项目。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003egrid-area: grid-row-start / grid-column-start / grid-row-end / grid-column-end |\n        itemName;\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003egrid-row-start ： 规定从哪一行开始显示项目\u003c/li\u003e\n    \u003cli\u003egrid-column-start ： 规定从哪一列开始显示项目\u003c/li\u003e\n    \u003cli\u003egrid-row-end ： 指定从哪行线停止显示项目，或者跨列多少行\u003c/li\u003e\n    \u003cli\u003egrid-column-end ： 指定在哪条线停止显示项目，或跨越多少列\u003c/li\u003e\n    \u003cli\u003eitemName : 规定网格中的项目的项目\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003egrid-area 可以用以限定位置，也可以提供一个项目分配名称，供 grid-template-areas 使用。\u003c/p\u003e\n\u003cp\u003e每一行由 \" ' ' \" 来定义，每行中的列项在撇号内定义，并以空格分割，\".\" 表示未命名的网格项目。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ep { \u003c/span\u003e\u003cspan class=\"p2\"\u003egrid-area: p; } div { \u003c/span\u003e\u003cspan class=\"p2\"\u003edisplay:\n        grid; \u003c/span\u003e\u003cspan class=\"p2\"\u003egrid-template-areas: ' p p p ...''p p ....'; }\u003c/span\u003e\n\u003c/code\u003e\n\u003cp class=\"p4\"\u003e例：定义大方局\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e.item1 { grid-area: header; } \u003c/span\u003e\u003cspan class=\"p4\"\u003e.item2 { grid-area: menu; }\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e.item3 { grid-area: main; } \u003c/span\u003e\u003cspan class=\"p4\"\u003e.item4 { grid-area: right; }\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e.item5 { grid-area: footer; } \u003c/span\u003e\u003cspan class=\"p8\"\u003e .grid-container { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e grid-template-areas: \u003c/span\u003e\u003cspan class=\"p6\"\u003e'header header header header header header'\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e'menu main main main right right' \u003c/span\u003e\u003cspan class=\"p6\"\u003e'menu footer footer footer\n        footer footer'; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e为网格布局内的每一个项目都使用 grid-area 限定位置，即更改了出场顺序。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003egrid-template\u003c/h5\u003e\n\u003cp\u003egrid-template 属性是以下属性的简写属性：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003egrid-template-rows\u003c/li\u003e\n    \u003cli\u003egrid-template-columns\u003c/li\u003e\n    \u003cli\u003egrid-template-areas\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003egrid-template: none | grid-template-rows /\n        grid-template-columns | grid-template-areas | initial | inherit;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003egrid-template-areas\u003c/h6\u003e\n\u003cp\u003egrid-template-areas 属性在网格布局中规定区域：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003egrid-template-areas: none | itemNames;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enone ： 默认值。未命名网络名称\u003c/li\u003e\n    \u003cli\u003eitemNames ： 规定每行每列如何显示的序列\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003egrid-auto-columns \u003c/h5\u003e\n\u003cp\u003egrid-auto-columns 属性设置网格容器中列的尺寸：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003egrid-auto-columns: auto | max-content | min-content | length;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eauto ： 默认值。由容器尺寸决定列的尺寸\u003c/li\u003e\n    \u003cli\u003efit-content()\u003c/li\u003e\n    \u003cli\u003emax-content ： 根据列中最大的项目设置每列的尺寸\u003c/li\u003e\n    \u003cli\u003emin-content ： 根据列中最小的项目设置每列的尺寸\u003c/li\u003e\n    \u003cli\u003eminmax(min.max) ： 设置大小等于 min 且小于等于 max 的尺寸范围\u003c/li\u003e\n    \u003cli\u003elength ： 设置列的尺寸，通过合法的长度值\u003c/li\u003e\n    \u003cli\u003e% ：设置列的尺寸，通过使用百分比值\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003egrid-auto-flow\u003c/h5\u003e\n\u003cp\u003egrid-auto-flow 属性控制自动放置的项目如何插入网络中：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003egrid-auto-flow: row | column | dense | row dense | column dense;\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003egrid-auto-rows\u003c/h5\u003e\n\u003cp\u003egrid-auto-rows 属性设置为网络中的行设置尺寸，该属性只会影响俄日设置尺寸的行：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003egrid-auto-rows: auto | max-content | min-content | length;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eauto ： 默认值，由行中的最大项目的尺寸决定\u003c/li\u003e\n    \u003cli\u003emax-content ：　根据行中最大项目设置每行的尺寸\u003c/li\u003e\n    \u003cli\u003emin-content ： 根据行中的最小项目设置每行中尺寸\u003c/li\u003e\n    \u003cli\u003elength ： 设置行的尺寸\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 布局","title":"网格"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","布局","网格"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
