="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>多列布局</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e多列布局\u003c/h5\u003e\n\u003cp\u003eCSS 3 的 Multiple Columns（\u003ca href=\"http://www.w3.org/TR/css3-multicol\" target=\"_blank\"\n        rel=\"noopener noreferrer\"\u003ehttp://www.w3.org/TR/css3-multicol\u003c/a\u003e）可以设计多列布局，将内容指定为指定的列数排列，适合纯文本版本设计。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ecolumns: column-width || column-count\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ecolumn-width 每列的宽度\u003c/li\u003e\n    \u003cli\u003ecolumn-count 列数\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003ewebkit 引擎支持 -webkit-columns 私有属性， Mozilla Gecko 引擎支持 -moz-columns 私有属性。\u003c/p\u003e\n\u003ch5\u003e设置列宽 column-width\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ecolumn-width: length | auto\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eWebKit 支持 -webKit-column-width 私有属性，Mozilla Gecko 支持 -moz-column-width 私有属性，Presto 引擎和 IE 浏览器支持标准属性。\u003c/p\u003e\n\u003cp\u003ecolum-width 可以和其他属性一起配合使用，设计指定的固定列数、列宽的布局效果；也可以单独使用，限制模块的单列宽度、当超出宽度时，则会自动多列显示。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ebody { \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-width: 300px; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e-moz-column-width: 300px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolumn-width: 300px; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e设置列数 column-count\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ecolumn-count: integer | auto\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eWebKit 支持 -webKit-column-count 私有属性，Mozilla Gecko 支持 -moz-column-count 私有属性，Presto 引擎和最新的 IE 浏览器支持标准属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ebody { \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-count: 3; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-count:\n        3; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolumn-count: 3; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e定义列间距 column-gap\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ecolumn-gap:normal | length\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eWebKit 支持 -webKit-column-gap 私有属性，Mozilla Gecko 支持 -moz-column-gap 私有属性，Presto 引擎和最新 IE 浏览器支持标准属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ebody { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*定义页面内容显示为三列*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-count: 3;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-count: 3; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolumn-count: 3; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e/*定义列间距为3em，默认为1em*/ \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-column-gap: 3em; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-gap: 3em; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ecolumn-gap: 3em; \u003c/span\u003e\u003cspan class=\"p4\"\u003eline-height: 2.5em; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/* 定义页面文本行高\n        */ \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e定义列边框 column-rule\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ecolumn-rule: length | style | color | transparent\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003ecolumn-rule 属性值根据个别属性而定，适用于多列布局元素。\u003c/p\u003e\n\u003cp\u003eWebKit 支持 -webKit-column-rule 私有属性，Mozilla Gecko 支持 -moz-column-rule 私有属性，Presto 引擎和最新 IE 浏览器支持标准 column-rule 属性\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ebody { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*定义页面内容显示为三列*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-count: 3;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-count: 3; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolumn-count: 3; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e/*定义列间距为3em，默认为1em*/ \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-column-gap: 3em; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-gap: 3em; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ecolumn-gap: 3em; \u003c/span\u003e\u003cspan class=\"p4\"\u003eline-height: 2.5em; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e/*定义列边框为2像素宽的灰色虚线*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-rule: dashed 2px gray; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-moz-column-rule: dashed 2px gray; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolumn-rule: dashed 2px gray;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003ecolumn-rule-color\u003c/h6\u003e\n\u003cp\u003ecolumn-rule-color 属性规定列之间的颜色规则\u003c/p\u003e\n\u003ch6\u003ecolumn-rule-style\u003c/h6\u003e\n\u003cp\u003ecolumn-rule-style 规定列之间的样式规则\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enone ： 无\u003c/li\u003e\n    \u003cli\u003ehidden ： 隐藏\u003c/li\u003e\n    \u003cli\u003edotted ： 点状\u003c/li\u003e\n    \u003cli\u003edashed ： 虚线\u003c/li\u003e\n    \u003cli\u003esolid ：实线\u003c/li\u003e\n    \u003cli\u003edouble ： 双线\u003c/li\u003e\n    \u003cli\u003egroove ： 3D 规则\u003c/li\u003e\n    \u003cli\u003einset ： 同上\u003c/li\u003e\n    \u003cli\u003eoutset ： 同上\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003ecolumn-rule-width\u003c/h6\u003e\n\u003cp\u003ecolumn-rule-width 属性规定列之间的宽的规则。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003ecolumn-rule-width: thin|medium|thick|length;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ethin ： 纤细\u003c/li\u003e\n    \u003cli\u003emedium ： 中等规则\u003c/li\u003e\n    \u003cli\u003ethick ： 宽厚\u003c/li\u003e\n    \u003cli\u003elength ： 宽度\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e定于跨列显示 column-span\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ecolumn-span: none | all \u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ebody { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*定义页面内容显示为三列*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-count: 3;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-count: 3; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolumn-count: 3; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e/*定义列间距为3em，默认为1em*/ \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-column-gap: 3em; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-gap: 3em; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ecolumn-gap: 3em; \u003c/span\u003e\u003cspan class=\"p4\"\u003eline-height: 2.5em; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e/*定义列边框为2像素宽的灰色虚线*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-rule: dashed 2px gray; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-moz-column-rule: dashed 2px gray; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolumn-rule: dashed 2px gray;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*设置一级标题跨越所有列显示*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e h1 { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ecolor: #333333; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003efont-size: 20px; \u003c/span\u003e\u003cspan class=\"p4\"\u003etext-align: center; \u003c/span\u003e\u003cspan class=\"p4\"\u003epadding:\n        12px; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-span: all; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-span: all;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolumn-span: all; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*设置二级标题跨越所有列显示*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e h2 { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efont-size: 16px; \u003c/span\u003e\u003cspan class=\"p4\"\u003etext-align: center; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e-webkit-column-span: all; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-span: all; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ecolumn-span: all; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e定义列高度 column-fill\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ecolumn-fill: auto | balance \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003ecolumn-fill 的初始值为 balance ，适用于多列布局属性。取值很简单：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eauto ：各列的高度随其内容变化而变化\u003c/li\u003e\n    \u003cli\u003ebalance ：各列的高度会根据内容最多的那一列进行高度的统一\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWebKit 支持 -webKit-column-fill 私有属性，Mozilla Gecko 、Presto 引擎和最新的 IE 浏览器支持标准 column-fill 属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ebody { \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*定义页面内容显示为三列*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-count: 3;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-count: 3; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolumn-count: 3; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e/*定义列间距为3em，默认为1em*/ \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-webkit-column-gap: 3em; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-gap: 3em; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ecolumn-gap: 3em; \u003c/span\u003e\u003cspan class=\"p4\"\u003eline-height: 2.5em; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e/*定义列边框为2像素宽的灰色虚线*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-rule: dashed 2px gray; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e-moz-column-rule: dashed 2px gray; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolumn-rule: dashed 2px gray;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*设置各列高度自动调整*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-fill: auto; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e-moz-column-fill: auto; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ecolumn-fill: auto; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*设置一级标题跨越所有列显示*/\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e h1 { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor: #333333; \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-size: 20px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003etext-align: center; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003epadding: 12px; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-span: all; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e-moz-column-span: all; \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolumn-span: all; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*设置二级标题跨越所有列显示*/ \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e h2 { \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-size: 16px; \u003c/span\u003e\u003cspan class=\"p4\"\u003etext-align: center;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-column-span: all; \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-column-span: all; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ecolumn-span: all; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 布局","title":"多列布局"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","布局","多列布局"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
