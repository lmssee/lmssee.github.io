="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>伸缩项目</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定义伸缩项目\u003c/h5\u003e\n\u003cp\u003e一个伸缩项目就是一个伸缩容器的子元素，伸缩容器内的文本也被当作伸缩项目。伸缩项目中的内容和普通的文本流一样。\u003c/p\u003e\n\u003cp\u003e伸缩项目都有一个主轴长度（Main Size）和一个侧轴长度（Cross Size）。主轴长度是伸缩项目在主轴上的尺寸，侧轴长度是伸缩项目在侧轴上的尺寸。一个伸缩项目的宽和高取决于伸缩容器的轴，可能就是它的主轴长度和侧轴长度。\n\u003c/p\u003e\n\u003ch6\u003e显示位置\u003c/h6\u003e\n\u003cp\u003e默认情况下，伸缩项目是按照文档流出现的先后顺序进行排列的。然后， order 属性可以来指定申诉项目在伸缩容器的出现的顺序：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eorder ： \u0026lt;integer\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003cdiv class=\"flexBox\"\u003e\n    \u003cdiv\u003e\n        \u003cdiv\u003e\n            \u003cdiv style=\"order: 1\"\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv\u003e4\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eorder: 1 ; /** 用在第 1 个 */\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv\u003e\n            \u003cdiv\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n            \u003cdiv style=\"order:-1\"\u003e4\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eorder: -1 ; /** 用在第 4 个 */\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n\u003ch5\u003e扩展空间\u003c/h5\u003e\n\u003cp\u003e扩展空间由 flex-grow 指定，子属性 flex-grow 的值是数字，如果容器中所有子元素的 flex-grow 是 1 ，那么每个子元素将占据相同的空间。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eflex-grow: \u0026lt;number\u0026gt; ;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003e默认值为 0 ，负值时也为默认值；\u003c/li\u003e\n    \u003cli\u003e为 1 时，每个伸缩项目大小相等\u003c/li\u003e\n    \u003cli\u003e为 2 时，该伸缩项目是所剩其他伸缩项目的 2 倍\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"flexBox\"\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-wrap: wrap;justify-items: center;\"\u003e\n            \u003cdiv style=\"flex-grow: 0;\"\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-grow: 0; /** 用在第 1 个 */\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-wrap: wrap;justify-items: center;\"\u003e\n            \u003cdiv style=\"flex-grow: 1;\"\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-grow: 1; /** 用在第 1 个 */\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-wrap: wrap;justify-items: center;\"\u003e\n            \u003cdiv style=\"flex-grow: 2;\"\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n            \u003cdiv\u003e3\u003c/div\u003e\n\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-grow: 2; /** 用在第 1 个 */\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n    \u003cdiv\u003e\n        \u003cdiv style=\"flex-wrap: wrap;justify-items: center;\"\u003e\n            \u003cdiv style=\"flex-grow: 2;\"\u003e1\u003c/div\u003e\n            \u003cdiv\u003e2\u003c/div\u003e\n\n        \u003c/div\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003eflex-grow: 2; /** 用在第 1 个 */\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n\u003ch5\u003e收缩空间\u003c/h5\u003e\n\u003cp\u003e收缩空间由 flex-shrink 定义。与 flex-grow 类似。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eflex-shrink : \u0026lt;number\u0026gt; ;\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e伸缩比率\u003c/h6\u003e\n\u003cp\u003e伸缩比率由 flex-basis 设置伸缩基准值，剩余空间按比率伸缩。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eflex-basis : \u0026lt;length\u0026gt; | auto ;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eauto 为默认值，负值不合法。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003eflex 是 flex-grow、flex-shrink、flex-basis 3 个属性的复合属性，该属性适用于伸缩项目。其中第 2 个和第 3\n        个参数（flex-shrink、flex-basis）是可选参数。默认值为 \"0 1 auto\"。具体如下：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003eflex : none | [\u0026lt;'flex-grow'\u0026gt; \u0026lt;flex-shrink'\u0026gt; ? || \u0026lt;'flex-basis'\u0026gt;\n            ]\u003c/span\u003e\n    \u003c/div\u003e\n\u003c/code\u003e\n    \u003ch5\u003e垂直对齐方式\u003c/h5\u003e\n    \u003cp\u003e对齐方式由 align-self 定义，语法如下\u003c/p\u003e\n    \u003ccode\n        class=\"c\"\u003e\u003cspan class=\"p\"\u003ealign-self: auto | flex-start | flex-end | center | baseline | stretch \u003c/span\u003e\u003c/code\u003e\n    \u003cul\u003e\n        \u003cli\u003eflex-start: 伸缩项目在侧轴起点的外侧边距紧靠该行起始边\u003c/li\u003e\n        \u003cli\u003eflex-end: 伸缩项目在侧轴起点的外侧边距紧靠该行终止边\u003c/li\u003e\n        \u003cli\u003ecenter: 伸缩项目在侧轴起点的外侧边距紧靠该行居中位置\u003c/li\u003e\n        \u003cli\u003ebaseline ： 基线对齐\u003c/li\u003e\n        \u003cli\u003estretch ：默认值，伸缩项目填充整个项目。此值会在项目的外边距盒的尺寸再遵照 min/max-width/height 属性的限制下尽可能的接近行的尺寸\u003c/li\u003e\n    \u003c/ul\u003e\n    \u003cdiv class=\"note\"\u003e\n        \u003cp\u003emargin : auto 在伸缩盒中具有强大的功能，一个 \"auto\" 的 margin 会和合并剩余的空间，把伸缩项目挤到其他位置。\u003c/p\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"flexBox\"\u003e\n        \u003cdiv\u003e\n            \u003cdiv style=\"flex-wrap: wrap;justify-items: center;\"\u003e\n                \u003cdiv style=\"align-self:flex-start\"\u003euni\u003c/div\u003e\n                \u003cdiv\u003e2\u003c/div\u003e\n                \u003cdiv\u003e3\u003c/div\u003e\n                \u003cdiv\u003e4\u003c/div\u003e\n                \u003cdiv\u003e5\u003c/div\u003e\n            \u003c/div\u003e\n            \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-self:flex-start;\u003c/span\u003e\n        \u003c/code\u003e\n        \u003c/div\u003e\n        \u003cdiv\u003e\n            \u003cdiv style=\"flex-wrap: wrap;justify-items: center;\"\u003e\n                \u003cdiv style=\"align-self:flex-end\"\u003euni\u003c/div\u003e\n                \u003cdiv\u003e2\u003c/div\u003e\n                \u003cdiv\u003e3\u003c/div\u003e\n                \u003cdiv\u003e4\u003c/div\u003e\n                \u003cdiv\u003e5\u003c/div\u003e\n            \u003c/div\u003e\n            \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-self:flex-end;\u003c/span\u003e\n        \u003c/code\u003e\n        \u003c/div\u003e\n        \u003cdiv\u003e\n            \u003cdiv style=\"flex-wrap: wrap;justify-items: center;\"\u003e\n                \u003cdiv style=\"align-self:center\"\u003euni\u003c/div\u003e\n                \u003cdiv\u003e2\u003c/div\u003e\n                \u003cdiv\u003e3\u003c/div\u003e\n                \u003cdiv\u003e4\u003c/div\u003e\n                \u003cdiv\u003e5\u003c/div\u003e\n            \u003c/div\u003e\n            \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-self:center;\u003c/span\u003e\n        \u003c/code\u003e\n        \u003c/div\u003e\n        \u003cdiv\u003e\n            \u003cdiv style=\"flex-wrap: wrap;justify-items: center;\"\u003e\n                \u003cdiv style=\"align-self:baseline\"\u003euni\u003c/div\u003e\n                \u003cdiv\u003e2\u003c/div\u003e\n                \u003cdiv\u003e3\u003c/div\u003e\n                \u003cdiv\u003e4\u003c/div\u003e\n                \u003cdiv\u003e5\u003c/div\u003e\n            \u003c/div\u003e\n            \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-self:baseline;\u003c/span\u003e\n        \u003c/code\u003e\n        \u003c/div\u003e\n        \u003cdiv\u003e\n            \u003cdiv style=\"flex-wrap: wrap;justify-items: center;\"\u003e\n                \u003cdiv style=\"align-self:stretch;height: unset;\"\u003euni\u003c/div\u003e\n                \u003cdiv\u003e2\u003c/div\u003e\n                \u003cdiv\u003e3\u003c/div\u003e\n                \u003cdiv\u003e4\u003c/div\u003e\n                \u003cdiv\u003e5\u003c/div\u003e\n            \u003c/div\u003e\n            \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-self:stretch;/**未设置高*/\u003c/span\u003e\n        \u003c/code\u003e\n        \u003c/div\u003e\n        \u003cdiv\u003e\n            \u003cdiv style=\"flex-wrap: wrap;justify-items: center;\"\u003e\n                \u003cdiv style=\"align-self:auto;\"\u003euni\u003c/div\u003e\n                \u003cdiv\u003e2\u003c/div\u003e\n                \u003cdiv\u003e3\u003c/div\u003e\n                \u003cdiv\u003e4\u003c/div\u003e\n                \u003cdiv\u003e5\u003c/div\u003e\n            \u003c/div\u003e\n            \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-self:auto;/**设置高度*/\u003c/span\u003e\n        \u003c/code\u003e\n        \u003c/div\u003e\n        \u003cdiv\u003e\n            \u003cdiv style=\"flex-wrap: wrap;justify-items: center;\"\u003e\n                \u003cdiv style=\"align-self:auto;height:unset\"\u003euni\u003c/div\u003e\n                \u003cdiv\u003e2\u003c/div\u003e\n                \u003cdiv\u003e3\u003c/div\u003e\n                \u003cdiv\u003e4\u003c/div\u003e\n                \u003cdiv\u003e5\u003c/div\u003e\n            \u003c/div\u003e\n            \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003ealign-self:auto;/**未设置高*/\u003c/span\u003e\n        \u003c/code\u003e\n        \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cdetails\u003e\n        \u003csummary\u003e\n            新旧版本属性对照\n        \u003c/summary\u003e\n\n        \u003cp\u003e旧版本中的属性 box-orient 和 box-direction 分别控制着子元素的排列方式和排列顺序，排列方式可以是从左向右（ horizontal ）或从上到下（ vertical ），排列顺序可以是正序（\n            normal ）或反序（ reverse ），结合两个属性，就能达到新版本中 flex-direction 属性的效果，例如水平排列加反序，相当于新属性的 row-reverse 。\u003c/p\u003e\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p2\"\u003e\u0026lt;!doctype html\u0026gt; \u0026lt;html\u0026gt; \u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;meta\n                charset=\"utf-8\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;title\u0026gt;\u0026lt;/title\u0026gt; \u003c/span\u003e\u003cspan\n                class=\"p2\"\u003e\u0026lt;style\n                type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e.page-wrap { \u003c/span\u003e\n            \u003cspan class=\"p6\"\u003edisplay: -webkit-box; \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* 2009版 - iOS 6-, Safari 3.1-6 */\n            \u003c/span\u003e\u003cspan class=\"p6\"\u003edisplay: -moz-box; \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* 2009版 - Firefox 19- (存在缺陷) */\n            \u003c/span\u003e\u003cspan class=\"p6\"\u003edisplay: -ms-flexbox; \u003c/span\u003e\n            \u003cspan class=\"p6\"\u003e/* 2011版 - IE 10 */ \u003c/span\u003e\n            \u003cspan class=\"p6\"\u003edisplay: -webkit-flex; \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* 最新版 - Chrome */ \u003c/span\u003e\u003cspan\n                class=\"p6\"\u003edisplay:\n                flex; \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* 最新版 - Opera 12.1, Firefox 20+ */ \u003c/span\u003e\u003cspan class=\"p4\"\u003e} \u003c/span\u003e\u003cspan\n                class=\"p8\"\u003e .main-content { \u003c/span\u003e\n            \u003cspan class=\"p6\"\u003e-webkit-box-ordinal-group: 2; \u003c/span\u003e\u003cspan class=\"p6\"\u003e/* 2009版 - iOS 6-, Safari 3.1-6 */\n            \u00
