    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e认识媒体查询\u003c/h5\u003e\n\u003cp\u003eCSS 2.1 中定义了各种媒体类型，包括显示器、便携设备、电视机等。CSS 3 增加了 Media Queries 模块，该模块允许添加指定的媒体查询表达式，用以指定媒体类型，然后根据媒体类型来选择样式。\u003c/p\u003e\n\u003ch6\u003e设置外部样式表时 \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;link rel=\"stylesheet\" type=\"text/css\" href=\"style.css\"\n        media=\"handheld\"\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e内部样式表时 \u003c/h6\u003e\n\u003cdiv class=\"c \"\u003e\u003cspan class=\"p\"\u003e\u0026lt;style type=\"text/css\" media=\"screen\"\u0026gt;\u003cbr\u003e...\u003cbr\u003e\u0026lt;/style\u0026gt;\u003c/span\u003e\u003c/div\u003e\n\u003ctable id=\"Ab\"\u003e\n    \u003ccaption\u003eCSS 设备\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e类型\u003c/th\u003e\n        \u003cth\u003e支持的浏览器\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003eW3C 于 2010 年 7 月推出 Media Query 标准模块，媒体查询比 CSS 2 的 Media Type 更加实用，它可以帮助我们获取以下数据：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e浏览器窗口的宽和高\u003c/li\u003e\n    \u003cli\u003e设备的宽和高\u003c/li\u003e\n    \u003cli\u003e设备的手持方向\u003c/li\u003e\n    \u003cli\u003e分辨率\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eMedia Query 允许添加表达式用以确定媒体的情况，以此来应用不同的样式表。它允许不改变内容的情况下，该百年也买你的布局以适应不同的设备。这种设计灵感来源于 IE 的条件语句，不过 Media Query 的功能更强大。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;!--[if IE]\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003ecss 样式、 JavaScript 脚本、 HTML\n        内容\u003cbr\u003e\u0026lt;![endif]\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e使用 媒体查询\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e@media [only | not]? media_type [and expression ]* expression [and expression ]*{ /*\n        CSS 样式表 */ }\u003c/span\u003e\n\u003c/code\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eMedia Queries 媒体特性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e媒体特性\u003c/th\u003e\n        \u003cth\u003e说明\u003c/th\u003e\n        \u003cth\u003e值\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e媒体共 13 种，类似于 CSS 属性的集合，但是与 CSS 属性不同的是，媒体特性只接受单个的逻辑表达式作为其值，或者没有值；并且其中的大部分接受 min/max 的前缀，用来表达大于等于/小于等于的逻辑。\u003c/p\u003e\n\u003ch6\u003eorientation\u003c/h6\u003e\n\u003cp\u003eorientation 适用于移动端的屏幕旋转，有两个可选值： landscape （横屏）和 portrait （竖屏）\u003c/p\u003e\n\u003cp\u003e代码的开头必须书写 @media ，然后指定设备特性。例如：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e@media screen and (max-width:900px) { \u003c/span\u003e\u003cspan class=\"p\"\u003e.navDiv {\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ewidth: 18%; \u003c/span\u003e\u003cspan class=\"p2\"\u003eborder: none; \u003c/span\u003e\u003cspan class=\"p\"\u003e} \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e.navDiv nav ul li { \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003emin-height: 3rem; \u003c/span\u003e\u003cspan class=\"p2\"\u003epadding: 0; \u003c/span\u003e\u003cspan class=\"p2\"\u003efont-size:\n        0.28rem; \u003c/span\u003e\u003cspan class=\"p\"\u003e} \u003c/span\u003e\u003cspan class=\"p\"\u003e.navDiv nav ul li:hover { \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eline-height: 3rem; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ewhite-space: nowrap; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eoverflow: hidden; \u003c/span\u003e\u003cspan class=\"p2\"\u003etext-overflow: ellipsis; \u003c/span\u003e\u003cspan class=\"p2\"\u003epadding:\n        auto; \u003c/span\u003e\u003cspan class=\"p\"\u003e} \u003c/span\u003e\u003cspan class=\"p\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e\u003cstrong\u003e媒体查询也可以被用作在 @import 规则和 \u0026lt;link\u0026gt; 标签中\u003c/strong\u003e例如：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e@media url(example.css) screen and (width:800px)\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;link rel=\"stylesheet\" type=\"text/css\" href=\"style.css\" media=\"screen and (width:\n        800px)\"\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e禁止浏览器缩放\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" \u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eIE8 或更早的浏览器不支持 Media Query ，可使用 media-queries.js 或 respond.js 来为 IE 添加支持。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;!-- css3-mediaquerise.js for IE8 or older--\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;!-- [if lt IE 9]\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;script\n        src=\"https://css3-mediaqueries-js.googlecode.com/svn/trunk/css3-media queries.js\"\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;![endif]--\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\n\u003ch5\u003e操作符\u003c/h5\u003e\n\u003cp\u003e在一条媒体查询中，有可能包含一些操作符，例如逗号（,）、and等。\u003c/p\u003e\n\u003ch6\u003e逗号\u003c/h6\u003e\n\u003cp\u003e多个媒体类型可以用逗号分隔，只要其中任何一个为真，整条媒体语句就为真，相当于逻辑或运算。有一点要注意，在and之后的部分，只会应用于紧挨着它的媒体类型。\u003c/p\u003e\n\u003ch6\u003eand\u003c/h6\u003e\n\u003cp\u003eand操作符用来连接媒体类型和媒体特性表达式 ，将它们组合成一条媒体查询，只有当每个部分都为真的时候，才会执行里面的样式。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e@media screen and (max-width:900px) and (orientation:landscape)\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003eonly\u003c/h6\u003e\n\u003cp\u003e使用only操作符后，必须指定媒体类型 。only作为媒体查询的开头，可以对不支持媒体查询，但支持媒体类型的设备隐藏样式，在这些设备中only会被认为是某个媒体类型。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e@media only screen and (max-width:600px)\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003enot\u003c/h6\u003e\n\u003cp\u003e使用not操作符后，也必须指定媒体类型 。not用来否定整条媒体查询，不能否定查询中的某个部分。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e@media not screen and (max-width:600px)\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e支持度\u003c/h5\u003e\n\u003cp\u003e如果要在移动设备中使用媒体查询，那么需要做些额外的处理后才能正确执行。对于不支持媒体查询的古老浏览器，可以通过引入第三方插件来实现媒体查询。\u003c/p\u003e\n\u003ch6\u003e移动端\u003c/h6\u003e\n\u003cp\u003e为了使媒体查询能正确执行，需要在HTML文档中添加一个meta（元数据）元素，用它来控制视口的尺寸和缩放级别。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e在 iPhone 和 iPad touch 中使用的 Safari 浏览器也对 CSS 3 的媒体查询表达式进行了支持。iPhone 的分辨率是 320px * 460px 。\u003c/p\u003e\n    \u003cp\u003e但，浏览器在渲染的时候，会将页面宽度作为 980px 进行显示。\u003c/p\u003e\n    \u003cp\u003e可以在 \u0026lt;meta\u0026gt; 标签中指定 Safari 浏览器在处理页面时按照多少像素来处理：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e\u0026lt;meta name=\"viewport\" content=\"width=600px\" /\u0026gt;\u003c/span\u003e\u003c/code\u003e\n\u003c/div\u003e\n\u003ch6\u003e古老的浏览器\u003c/h6\u003e\n\u003cp\u003e古老的IE8及以下版本的浏览器不支持CSS3的媒体查询，如果要在这几个浏览器中执行媒体查询，需要引入第三方插件respond.js（https://github.com/scottjehl/Respond）\u003c/p\u003e\n\u003ch6\u003e响应式设计\u003c/h6\u003e\n\u003cp\u003e响应式设计（Responsive Web\n    Design）可根据不同设备的可视区域改变网页布局，展现不同设计风格，力求在当前设备中达到最完美的效果，减少用户浏览网页的额外操作（例如缩放、平移或滚动等）。举个简单的例子，同一张网页，在打印的时候尽量用白底黑色、为链接增加下画线、禁止背景图像；在移动端移除不支持的CSS伪类（例如:hover、:focus等），少用耗性能的特效，考虑横屏和竖屏之间的变化；在屏幕阅读器中确保CSS插入的内容仅仅是装饰，过渡、转换和动画也仅仅是装饰，而不是关键功能。响应式设计是流式网格、自适应图像和媒体查询的结合体，具体如下所列。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e流式网格要求元素使用相对单位或百分比控制尺寸大小\u003c/li\u003e\n    \u003cli\u003e自适应图像是指不给图像设置固定尺寸，根据流体网格进行缩放，最大到100%\u003c/li\u003e\n    \u003cli\u003e创建不同的媒体查询，根据设备的尺寸和特点，设置适合的样式\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e早期的 IE 浏览器不支持 Media Query 。可以使用 media-queries.js 或者 respond.js 来为 IE 添加 Media Query 支持。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;!-- css3-mediaqueries.js for IE8 or older --\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;!--\n        [if lt Ie 9]\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;script\n        src=\"http://css3-mediaqueries-js.goolecoe.com/svn/trunk/css3-media query.js\"\u0026gt;\u0026lt;/script\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u0026lt;![end if] --\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['any-hover', '任何可用的输入机制可以将鼠标悬停在元素上：', '\u003cul\u003e\u003cli\u003enone 没有可用的输入机制\u003c/li\u003e\u003cli\u003ehover 拥有一个或多个可以方便悬停在元素上\u003c/li\u003e\u003c/ul\u003e'],\n        ['any-pointer', '测试任意拥有定点装置，并验证精确度的', '\u003cul\u003e\u003cli\u003enone 没有特定的定点设备\u003c/li\u003e\u003cli\u003ecoarse 拥有精度有限的定点装置\u003c/li\u003e\u003cli\u003efine 拥有一个精度高的定点装置\u003c/li\u003e\u003c/ul\u003e'],\n        ['aspect-ratio', '测试 viewport 的宽高比', '比值'],\n        ['color', '测试输出设备的每个颜色分量', ''],\n        ['color-gamut', '色域', '\u003cul\u003e\u003cli\u003esrgb 颜色值\u003c/li\u003e\u003cli\u003ep3\u003c/li\u003e\u003cli\u003erec2020\u003c/li\u003e\u003c/ul\u003e'],\n        ['color-index', '颜色索引', ''],\n        ['display-mode', '测试显示的显示模式', '\u003cul\u003e\u003cli\u003efullscreen 可用显示区域\u003c/li\u003e\u003cli\u003estandalone\u003c/li\u003e\u003cli\u003eminimal-ui 独立的程序\u003c/li\u003e\u003cli\u003ebrowser \u003c/li\u003e\u003cli\u003ewindow-control-overlay\u003c/li\u003e\u003c/ul\u003e'],\n        ['dynamic-range', '测试用户代理和输出设备支持的亮度、对比度和颜色深度的组合', '\u003cul\u003e\u003cli\u003estandard\u003c/li\u003e\u003cli\u003ehigh\u003c/li\u003e\u003c/ul\u003e'],\n        ['forced-colors', '理是否启用了强制颜色模式', '\u003cul\u003e\u003cli\u003enone\u003c/li\u003e\u003cli\u003eactive\u003c/li\u003e\u003c/ul\u003e'],\n        ['grid', '测试输出设备是否使用基于网格的屏幕', ''],\n        ['height', '页面高度', ''],\n        ['hover', '测试用户的主要输入机制是否可以将鼠标悬停在元素上', '\u003cul\u003e\u003cli\u003enone 没有可用的输入机制\u003c/li\u003e\u003cli\u003ehover 拥有一个或多个可以方便悬停在元素上\u003c/li\u003e\u003c/ul\u003e'],\n        ['inverted-colors', '反转颜色', '\u003cul\u003e\u003cli\u003enone 颜色正常\u003c/li\u003e\u003cli\u003einverted  反转\u003c/li\u003e\u003c/ul\u003e'],\n        ['monochrome', '测试输出设备的单色帧缓冲区中每像素的位数', ''],\n        ['orientation', '测试窗口的方向', '\u003cul\u003e\u003cli\u003eportrait 纵向\u003c/li\u003e\u003cli\u003elandscape 横向\u003c/li\u003e\u003c/ul\u003e'],\n        ['overflow-block', '测试输出设备如何处理沿块轴溢出初始包含块的内容', '\u003cul\u003e\u003cli\u003enone 不会显示溢出块的内容\u003c/li\u003e\u003cli\u003escroll 溢出块轴的内容可以滚动到轴来查看\u003c/li\u003e\u003cli\u003eoptional-paged 溢出块轴的内容可以通过滚动\u003c/li\u003e\u003cli\u003epaged 内容被分解为离散的页面；在快轴中溢出一页内容显示在下一页\u003c/li\u003e\u003c/ul\u003e'],\n        ['overflow-inline', '可用于测试输出设备如何处理沿行向轴溢出初始包含区块的内容', '\u003cul\u003e\u003cli\u003enone 不会显示溢出块的内容\u003c/li\u003e\u003cli\u003escroll 溢出块轴的内容可以滚动到轴来查看\u003c/li\u003e\u003c/ul\u003e'],\n        ['point', '测试拥有定点装置，并验证精确度的', '\u003cul\u003e\u003cli\u003enone 没有特定的定点设备\u003c/li\u003e\u003cli\u003ecoarse 拥有精度有限的定点装置\u003c/li\u003e\u003cli\u003efine 拥有一个精度高的定点装置\u003c/li\u003e\u003c/ul\u003e'],\n        ['prefers-color-scheme', '检测用户是否请求了浅色或深色主题', '\u003cul\u003e\u003cli\u003elight 亮\u003c/li\u003e\u003cli\u003edark 黑\u003c/li\u003e\u003c/ul\u003e'],\n        ['prefers-contrast', '检测用户是否请求以较低或较高的对比度呈现 Web 内容', '\u003cul\u003e\u003cli\u003eno-preference 没有任何首选项\u003c/li\u003e\u003cli\u003emore 对比度高\u003c/li\u003e\u003cli\u003eless  对比度更低\u003c/li\u003e\u003cli\u003ecustom  用户自定义了调色板的匹配\u003c/li\u003e\u003c/ul\u003e'],\n        ['resolution', '分辨率', '值，单位 dpi'],\n        ['scripting', '脚本', '\u003cul\u003e\u003cli\u003enone 脚本不可用\u003c/li\u003e\u003cli\u003einitial-only  脚本在初识时加载，但之后不会\u003c/li\u003e\u003cli\u003eenabled 当前文档支持并激活脚本\u003c/li\u003e\u003c/ul\u003e'],\n        ['update', '测试输出设备在呈现后能够修改内容外观的频率', '\u003cul\u003e\u003cli\u003enone 渲染后，无法更新布局\u003c/li\u003e\u003cli\u003eslow  布局更改，但是输出设备无法满足快速更改\u003c/li\u003e\u003cli\u003efast 正常设备\u003c/li\u003e\u003c/ul\u003e'],\n        ['video-dynamic-range', '测试用户代理和输出设备的视频平面支持的亮度、对比度和颜色深度的组合', '\u003cul\u003e\u003cli\u003estandard  任何可视设备\u003c/li\u003e\u003cli\u003ehigh 支持高峰值亮度、高对比度设备\u003c/li\u003e\u003c/ul\u003e'],\n        ['width', '视口大小', '数值，单位：px、rem'],\n    ];\n    _MiMethod.td('Aa', Aa);\n    let Ab = [\n        ['all', '所有浏览器', ' 所有媒体设备'],\n        ['aural', 'Opera', '用于语音合成器 (CSS 3 不推荐使用)'],\n        ['braille', 'Opera', '用于盲人触觉反馈设备'],\n        ['embossed', 'Opera', '用于凸点式盲人打印机设备'],\n        ['handheld', 'Chrome、Safari、Opera', '用于屏幕大小和带宽均有限的手持式设备'],\n        ['print', '所有浏览器', ' 打印'],\n        ['projection', 'Opera', '用于放映的演示文稿'],\n        ['screen', '所有浏览器', ' 计算机显示器'],\n        ['speech', 'Opera', '用于语音'],\n        ['tty', 'Opera', '用于使用固定字宽的字符网格的设备（比如终端、电传打字机或者显示屏大小有限的手持式设备）'],\n        ['tv', 'Opera', '用于电视类型的设备，它们通常具有较低的分辨率并且是彩色的，同时具有有限的滚动能力'],\n    ];\n    _MiMethod.td('Ab', Ab);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ css 3","title":"媒体查询"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","css 3","媒体查询"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
