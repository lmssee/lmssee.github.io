er box 作用为引用框\u003c/li\u003e\n    \u003cli\u003epadding-box ： 使用 padding box 作为引用框\u003c/li\u003e\n    \u003cli\u003econtent-box ： 使用 content box 作为引用框\u003c/li\u003e\n    \u003cli\u003efill-box ： 利用对象边界 （object bounding box）作为引用框\u003c/li\u003e\n    \u003cli\u003estoke-box ： 使用笔触界框（stroke bounding box ）作为引用框\u003c/li\u003e\n    \u003cli\u003eview-box ： 使用 SVG 视口作为引用框\u003c/li\u003e\n    \u003cli\u003enone ： 默认值\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ css 3","title":"clip-path"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","css 3","clip-path"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
