    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eCSS Hack\u003c/h5\u003e\n\u003cp\u003eCSS Hack 是一种编程技巧，它的作用是让 CSS 代码能兼容各个浏览器，尽量让页面取得想要的效果，避免出现错误的布局。不同厂商的浏览器（例如 Chrome 、 Firefox 等）或相同厂商不同版本的浏览器（例如 IE6\n    、 IE7 等）对 CSS 的解析能力有差异，并且各自还会存在特有的 BUG ， CSS Hack 就会利用这些特点来执行或忽略相应地 CSS 样式。虽然 CSS Hack\n    能提升兼容性，但还是尽量少用，这是因为每次都要多写几段额外的兼容样式，这会带来巨大的维护成本，并且在浏览器升级后，浏览器支持了更多的\n    CSS 特性或修正了 BUG ，原先的写法可能就会失效。众所周知， IE 浏览器一向特立独行，很多 CSS Hack 的出现，就是为了填补 IE 中的坑。下面的所有 CSS Hack 默认都运行在标准渲染模式中。\u003c/p\u003e\n\u003ch5\u003e特定厂商的属性和前缀\u003c/h5\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eCSS 3 厂商的前缀\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e浏览器\u003c/th\u003e\n        \u003cth\u003e系统前缀\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch6\u003e条件注释\u003c/h6\u003e\n\u003cp\u003e条件注释是 IE 浏览器的私有语法，存在于 HTML 文档中，可以指定某个版本的 IE ，解析对应的内容，语法如下。有一点需要注意， IE10 之后已经把条件注释移除了。\u003c/p\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['Android', '-webkit -'],\n        ['Chrome', '-webkit -'],\n        ['Firefox', '-moz -'],\n        ['Internet Explorer / Microsoft Edge( 现在这货跟谷歌了 )', '-ms -'],\n        ['iOS', '-webkit -'],\n        ['Opera', '-o -'],\n        ['Safari', '-webkit -'],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ css 3","title":"hack"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","css 3","hack"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
