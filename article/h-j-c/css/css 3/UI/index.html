    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e改变盒模型组成方式\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ebox-sizing:content-box | border-box | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003econtent-box ：该属性值将维持 CSS 2.1 盒模型的组成模式，即元素 width/height=border+ padding+content\u003c/li\u003e\n    \u003cli\u003eborder-box ：该属性值将重新定义 CSS 2.1 盒模型组成模式，即元素 width/height=content 。此时浏览器对盒模型的解释与 IE6 解析相同\u003c/li\u003e\n    \u003cli\u003einherit ：默认继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e调节元素尺寸\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eresize:none | both | horizontal | vertical | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enone ：浏览器不提供尺寸调整机制，用户不能操纵机制调节元素的尺寸\u003c/li\u003e\n    \u003cli\u003eboth ：浏览器提供双向尺寸调整机制，允许用户调节元素的宽度和高度\u003c/li\u003e\n    \u003cli\u003ehorizontal ：浏览器提供单向水平尺寸调整机制，允许用户调节元素的宽度\u003c/li\u003e\n    \u003cli\u003evertical ：浏览器提供单向垂直尺寸的调整机制，允许用户调节元素的高度\u003c/li\u003e\n    \u003cli\u003einherit ：默认继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e轮廓\u003c/h5\u003e\n\u003cp\u003eoutline 属性可以定义块元素的外轮廓线，该属性在 CSS 2.1 规范中已被明确定义，但是并未得到各主流浏览器的广泛支持， CSS3 增强了该特性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eoutline:[outline-color] || [outline-style] || [outline-width] || [outline-offset]|\n        inherit\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003e\u0026lt;outline-color\u0026gt;: 定义轮廓边框颜色\u003c/li\u003e\n    \u003cli\u003e\u0026lt;outline-style\u0026gt;: 定义轮廓边框轮廓\u003c/li\u003e\n    \u003cli\u003e\u0026lt;outline-width\u0026gt;: 定义轮廓边框宽度\u003c/li\u003e\n    \u003cli\u003e\u0026lt;outline-offset\u0026gt;: 定义轮廓边框偏移位置的数值\u003c/li\u003e\n    \u003cli\u003einherit ：默认继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003cul\u003e\n    \u003cli\u003eoutline-color ：定义轮廓边框颜色。 outline-color 属性接受所有的颜色，还包括关键字 invert 。 invert\n        应该在屏幕上对像素点颜色进行一次反转。这个技巧保证焦点框可见，而不管背景颜色是什么\u003c/li\u003e\n    \u003cli\u003eoutline-style ：定义轮廓边框轮廓。 outline-style 属性与 border-style 属性接受值和用法相同，如 none 、 dotted 、 dashed 、 solid 、 double\n        、 groove 、 ridge 、 inset 和 outset 。但是， hidden 属性值并不是一个合法的外轮廓样式\u003c/li\u003e\n    \u003cli\u003eoutline-width ：定义轮廓边框宽度。 outline-width 属性与 border-width 属性接受值和用法相同\u003c/li\u003e\n    \u003cli\u003eoutline-offset ：定义轮廓边框偏移位置的数值\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eoutline 属性是个复合属性，可以设置 outline-style 、 outline-width 和 outline-color 属性值。注意，外轮廓线在各边都是一样的，这与边框不同，没有 outline-top 或\n    outline-left 属性。 CSS 不支持定义多个互相覆盖的外轮廓线，也没有定义如何定义因在其它元素之后而有部分不可见的框的外轮廓线。\u003c/p\u003e\n\u003ch6\u003e定义轮廓线宽度\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoutline-width:thin | medium | thick | lt;length\u0026gt; | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e定义轮廓线样式\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoutline-style:auto | \u0026lt;border-style\u0026gt; | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eauto ：根据浏览器自动设置\u003c/li\u003e\n    \u003cli\u003e\u0026lt;border-style\u0026gt;: 沿用边框样式。包括 none 、 dotted 、 dashed 、 solid 、 double 、 groove 、 ridge 、 inset 和 outset\n        。详细说明请参阅 CSS 2.1 中有关 border-style 属性值内容部分\u003c/li\u003e\n    \u003cli\u003einherit ：默认继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e定义轮廓线颜色\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoutline-color: \u0026lt;color\u0026gt; | invert | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003e\u0026lt;color\u0026gt;: 可以是颜色名，如 red ；函数值，如 rgb(255,0,0) ；或者十六进制值，如 #ff0000\u003c/li\u003e\n    \u003cli\u003einvert ：执行颜色反转（逆向的颜色）。这样可以确保外轮廓线在不同的背景颜色中都是可见的\u003c/li\u003e\n    \u003cli\u003einherit ：默认继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e定义轮廓线位移\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eoutline-offset:\u0026lt;length\u0026gt; | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e设计导航\u003c/h5\u003e\n\u003cp\u003eHTML 为表单标签定义 tab-index 属性，这个属性为当前元素指定了其在当前文档中导航的序列号。导航的序列号可以修改页面中元素通过键盘操作获得焦点的顺序。该属性可以存在于嵌套的页面元素当中。\u003c/p\u003e\n\u003cp\u003eCSS3 新增加了 nav-index 属性，用来代替标签属性 tab-index 。为了使浏览器能按顺序获取焦点，页面元素需要遵循如下规则：\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e该元素支持 nav-index 属性，而被赋予正整数属性值的元素将会被优先导航。浏览器将按照 nav-index 属性值从小到大的顺序进行导航。属性值无须按次序，也无须以特定的值开始。拥有同一 nav-index\n        属性值的元素将以它们在文档流中出现的顺序进行导航\u003c/li\u003e\n    \u003cli\u003e对于那些不支持 nav-index 属性，或者 nav-index 属性值为 auto 的元素，将以它们在文档流中出现的顺序进行导航\u003c/li\u003e\n    \u003cli\u003e对那些禁用的元素，将不参与导航的排序\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003enav-index: auto | \u0026lt;number\u0026gt; | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eauto ：浏览器默认的顺序\u003c/li\u003e\n    \u003cli\u003e\u0026lt;number\u0026gt;: 必须是正整数，该数字指定了元素的导航顺序。 1 意味着最先被导航。当若干个元素的 nav-index 值相同时，则按照文档的先后顺序进行导航\u003c/li\u003e\n    \u003cli\u003einherit ：默认继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e定义方向键控制顺序\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003enav-up ：控制向上方向键\u003c/li\u003e\n    \u003cli\u003enav-right ：控制向右方向键\u003c/li\u003e\n    \u003cli\u003enav-down ：控制向下方向键\u003c/li\u003e\n    \u003cli\u003enav-left ：控制向左方向键\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003enav-up:auto | \u0026lt;id\u0026gt;[ current | root | \u0026lt;target-name\u0026gt;]? | inherit;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003enav- right:auto | \u0026lt;id\u0026gt;[ current | root | \u0026lt;target-name\u0026gt;]? | inherit;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003enav- down:auto | \u0026lt;id\u0026gt;[ current | root | \u0026lt;target-name\u0026gt;]? | inherit; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003enav- left:auto | \u0026lt;id\u0026gt;[ current | root | \u0026lt;target-name\u0026gt;]? | inherit;\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003e\n        inherit ：继承\u003c/li\u003e\n    \u003cli\u003eauto ：根据浏览器默认的顺序\u003c/li\u003e\n    \u003cli\u003e\u0026lt;id\u0026gt;: 要切换元素的 id 命名\u003c/li\u003e\n    \u003cli\u003eroot | \u0026lt;target-name\u0026gt;: 该参数不能以\" _ \"命名，指出 frameset\n        目标页面之间的元素焦点切换。如果指定的目标页面不存在，则被视为当前页面的焦点，意味着完全依赖框架页。该属性是以关键节点\" root \"标示，浏览器将把整个 frameset 框架页定为目标\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e添加显示内容\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003econtent: normal | string | attr() | uri() | counter() | none;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enormal ：默认值\u003c/li\u003e\n    \u003cli\u003estring ：插入文本内容\u003c/li\u003e\n    \u003cli\u003eattr() ：插入元素的属性值\u003c/li\u003e\n    \u003cli\u003euri() ：插入一个外部资源，如图像、音频、视频或浏览器支持的其它任何资源\u003c/li\u003e\n    \u003cli\u003ecounter() ：计数器，用于插入排序标识\u003c/li\u003e\n    \u003cli\u003enone ：无任何内容\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e恢复默认样式\u003c/h5\u003e\n\u003cp\u003e取消元素样式 CSS3 中新增了一个 initial 属性值，使用这个 initial 属性值可以直接取消对某个元素的样式指定。\u003c/p\u003e\n\u003ch5\u003e图文\u003c/h5\u003e\n\u003ch6\u003e以图换字方法一：把文字标签的高度设置为 0 ， padding-top 的值设置为与背景图片高度一致，以显示背景，同时设置文字溢出隐藏。\u003c/h6\u003e\n\u003col\u003e\n    \u003cli\u003e\n        \u003cul\u003e\n            \u003cli\u003e需要进行以图换字的标签高度必须设置为 0 ，如果不设置高度为 0 ，标签的高度将由内容撑开\u003c/li\u003e\n            \u003cli\u003e使用 padding-top 属性来显示背景图片， padding-top 的属性值是背景图片的高度\u003c/li\u003e\n            \u003cli\u003e必须有 overflow:hidden ， overflow:hidden 用于隐藏溢出。一开始，我们给标签设置了高度为 0 ，那么标签内的文本就会在高度以外显示，使用 overflow:hidden\n                能将溢出的文本隐藏起来\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n\u003c/ol\u003e\n\u003ch6\u003e以图换字方法二：超大行高配合溢出隐藏。\u003c/h6\u003e\n\u003cp\u003e文字的超大行高可以调整文本行基线间的垂直距离，即文字在文本行之间的位置 。\u003c/p\u003e\n\u003cp\u003etext-indent 用于设置首行缩进，可以支持负数，设置为负数时代表文字向左偏移 2000 像素。这种方式看似将文字隐藏了，但是当用户强制缩小页面（ Ctrl+ 滚轮滚动可强制缩小页面）时，文字可能就会被看见。所以，使用\n    text-indent 设置超大负值这种方式是不推荐的，因为这种方式很耗性能且不能保证任何时候的效果完全一致。\u003c/p\u003e\n\u003ch6\u003e以图换字方法四：给文字标签添加 display:none 样式\u003c/h6\u003e\n\u003ch5\u003e精灵图\u003c/h5\u003e\n\u003cp\u003eCSS 精灵图是网页制作中最常见的图片处理方式，它有以下 4 个优点。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e使图片变小，把每个小图片的大小相加后与精灵图的大小做对比，就会发现精灵图减少了图片所占的字节数\u003c/li\u003e\n    \u003cli\u003e减少了网页 http 请求，从而大大提高了页面的性能\u003c/li\u003e\n    \u003cli\u003e解决了单个图片命名的烦恼，只需要对集合图片命名即可\u003c/li\u003e\n    \u003cli\u003e操作以及维护起来更方便，如果想改变图片颜色或者其它样式，只需要在一张图片上修改即可\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eCSS 精灵图的优点很多，但并不代表 CSS 精灵图就完美无缺， CSS 精灵图还是有一些缺点是需要注意的：\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e在合并图片时，要把多张图片有序合理地合并成一张图片，还要留好足够的空间\u003c/li\u003e\n    \u003cli\u003e需要考虑在宽屏浏览器或高分辨率的浏览器下图片宽度是否合适，如果不合适，那么背景图就会出现裂痕等问题\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch5\u003econtent\u003c/h5\u003e\n\u003cp\u003e使用 before 选择器在元素前面插入内容，使用 after 选择器在元素后面插入内容，在选择器的 content 属性中定义要插入的内容。\u003c/p\u003e\n\u003cp\u003e使用 before 选择器或 after 选择器，除了可以在元素的前面或后面插入文字之外，还可以插入图像文件。插入图像时，需要使用 url 属性值来指定图像文件的路径。\u003c/p\u003e\n\u003cp\u003e如果在 content 属性中通过\" attr （属性名）\"这种形式来指定 attr 属性值，可以将某个属性的属性值显示出来。\u003c/p\u003e\n\u003cp\u003e在 content 属性中使用 counter 属性值来针对多个项目追加连续编号，使用计数器来计算编号，计数器可任意命名。\u003c/p\u003e\n\u003cp\u003e另外，还需要在元素的样式中追加对元素的 counter-increment 属性的指定，为了使用连续编号，需要将 counter-increment 属性的属性值设定为 before 选择器或 after 选择器的\n    counter 属性值中所指定的计数器名。\u003c/p\u003e\n\u003cp\u003e可以使用 list-style-type 属性的值来指定编号的种类， list-style-type 为指定列表编号时所用的属性。\u003c/p\u003e\n\u003cp\u003e可以在大编号中嵌套中编号，在中编号中嵌套小编号。\u003c/p\u003e\n\u003cp\u003e如果要将第二个大标题里的中标题重新开始编号的话，需要在大标题中使用 counter-reset 属性将中编号进行重置。\u003c/p\u003e\n\u003cp\u003e可以使用 content 属性的 open-quote 属性值与 close-quote 属性值在字符串两边添加诸如括号、单引号、双引号之类的嵌套文字符号。 open-quote 属性值用于添加开始的嵌套文字符号，\n    close-quote 属性值用于添加结尾的嵌套文字符号。\u003c/p\u003e\n\u003cp\u003e另外，在元素的样式中使用 quotes 属性来指定使用什么嵌套文字符号。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ css 3","title":"UI"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","css 3","UI"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
