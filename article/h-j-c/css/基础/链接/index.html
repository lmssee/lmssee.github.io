                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e超链接\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003ea:link\u003c/li\u003e\n    \u003cli\u003ea:visited\u003c/li\u003e\n    \u003cli\u003ea:hover\u003c/li\u003e\n    \u003cli\u003ea:active\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e滚动平滑\u003c/h5\u003e\n\u003cp\u003escroll-behavior 属性用以显示单击可滚动框中链接时，是否平滑（具有动画特效的）滚动位置，为不是直接跳转。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003escroll-behavior: auto|smooth|initial|inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eauto：默认值，允许在滚动框内直接跳转至目标\u003c/li\u003e\n    \u003cli\u003esmooth：允许滚动框内的元素间平滑的“滚动”\u003c/li\u003e\n    \u003cli\u003einitial：默认值\u003c/li\u003e\n    \u003cli\u003einherit：继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003epointer-events \u003c/h5\u003e\n\u003cp\u003epointer-events 属性定义元素是否对指针做出反应：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003epointer-events: auto|none;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eauto：默认值，元素对指针事件作出反应，比如 :hover 和 click\u003c/li\u003e\n    \u003cli\u003enone：元素不对指针事件作出反应\u003c/li\u003e\n    \u003cli\u003einitial：默认值\u003c/li\u003e\n    \u003cli\u003einherit：继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e光标\u003c/h5\u003e\n\u003cp\u003ecursor 是 css 2.0 的属性 \u003c/p\u003e\n\u003ch6\u003e标准\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ecursor: auto | crosshair | default | hand | move | help | pointer | text |\n        vertical-text | wait | *-resize | wait\u003c/span\u003e\n\u003c/code\u003e\n\n\u003cul\u003e\n    \u003cli\u003eauto： 默认值，浏览器自动\u003c/li\u003e\n    \u003cli\u003ecrosshair： 简单的十字线光标\u003c/li\u003e\n    \u003cli\u003edefault：客户端默认样式\u003c/li\u003e\n    \u003cli\u003ehand： 手\u003c/li\u003e\n    \u003cli\u003emove： 十字箭头光标，意思为光标所在位置元素可拖动\u003c/li\u003e\n    \u003cli\u003ehelp： 问号\u003c/li\u003e\n    \u003cli\u003epointer： 和手型类似，竖起一只手指的手型\u003c/li\u003e\n    \u003cli\u003etext： 可编辑文本，显示为 'I'\u003c/li\u003e\n    \u003cli\u003evertical-text：可编辑垂直文本，显示为反转 90度 的 ' I'\u003c/li\u003e\n    \u003cli\u003e*-resize： 用于标识对象的可改变尺寸的箭头形状\u003c/li\u003e\n    \u003cli\u003ewait：用户很忙。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003eIE6专用\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ecursor : url(url) | all-scroll | col-resize | no-drop | not-allowed | progress |\n        row-resize\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eurl（ url）：用户自定义，后缀为 .cur 或 .ani\u003c/li\u003e\n    \u003cli\u003eall-scroll: 有一个上下左右四个箭头、中间有一个原点的光标，用于标示页面可以上下左右滚动\u003c/li\u003e\n    \u003cli\u003ecol-scroll: 有一个左右的箭头、中间由竖线分割开来的光标，用于标示项目可以水平改变尺寸\u003c/li\u003e\n    \u003cli\u003eno-drop： 被斜线贯穿的圆圈的手型光标，用于表示被拖起对象不允许在此处放下\u003c/li\u003e\n    \u003cli\u003enot-allow： 禁止标记（被斜线贯穿的圆圈）光标，用于标示请求的操作不允许\u003c/li\u003e\n    \u003cli\u003eprogress： 带沙漏标识的箭头，标识进程正后台运行\u003c/li\u003e\n    \u003cli\u003erow-resize： 有上下两个箭头，中间由横线分开，用于表示项目或标题可以垂直改变尺寸\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eTooltip 工具\u003c/h5\u003e\n\u003cp\u003e通过 javaScript 设置。\u003c/p\u003e\n\u003ch5\u003ecss 精灵图\u003c/h5\u003e\n\u003cp\u003e将多张图合成为一张大图片。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 基础","title":"链接"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","基础","链接"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
