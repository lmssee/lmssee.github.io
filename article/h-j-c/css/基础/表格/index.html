    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e表格边框 \u003c/h5\u003e\n\u003cp\u003e表格的 css 的 border 属性 ,用法和图片边框一样 ,但要注意单元格边框的特殊性。 \u003c/p\u003e\n\u003cp\u003e单元格边框之间会有空隙 ,可以使用 css 的 border-collapse 属性去掉。 \u003c/p\u003e\n\u003ch5\u003eborder-collapse\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eborder-collapse : separate | collapse\u003c/span\u003e\u003c/code\u003e\n\n\u003cp\u003eseparate 表示边框独立 , collapse 表示相邻边框将被合并 。 \u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e该属性作用于 table ,而不是 th 或 td\u003c/p\u003e\n\u003c/div\u003e\n\u003ch5\u003e单元格边距 \u003c/h5\u003e\n\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eborder-spacing: length\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e只有当边框的 border-collapse 属性设置为 separate 时才能使用该属性 。\u003csmall\u003e当然 ,作为块级元素 ,单元格可使用 padding 设置内边距 \u003c/small\u003e。 \u003c/p\u003e\n\u003ch5\u003e标题的位置 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ecaption-side : top | bottom\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e使用该属性为表格 ( table )的标题 ( caption )设置位置 ,可在上边 ,也可在底部。 \u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e Firefox 还支持 right 和 left 两个怪异属性 \u003c/p\u003e\n\u003c/div\u003e\n\n\u003ch5\u003e隐藏单元格 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eempty-cells : hide | show\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ehide 是当单元格无内容时 ,隐藏单元格 \u003c/li\u003e\n    \u003cli\u003eshow 是当单元格无内容时显示边框 \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e设置表格布局计算算法\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etable-layout: automatic || fixed || inherit\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eautomatic： 默认，列宽由单元格内容设定\u003c/li\u003e\n    \u003cli\u003efixed： 列宽由表格宽度和列宽设定\u003c/li\u003e\n    \u003cli\u003einherit： 继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e分页\u003c/h5\u003e\n\u003cp\u003e在打印时显示是否分页，即便提供这样的功能，但是，尽量避免使用分页属性，避免在表格、浮动元素、带有边框的块元素中使用分页属性\u003c/p\u003e\n\u003ch6\u003epage-break-after\u003c/h6\u003e\n\u003ch6\u003epage-break-before\u003c/h6\u003e\n\u003ch6\u003epage-break-inside\u003c/h6\u003e\n\u003ch5\u003e分页\u003c/h5\u003e\n\u003ch6\u003ebreak-after\u003c/h6\u003e\n\u003cp\u003ebreak-after 属性规定了在指定的元素之后是否应该发生分页（page-break）、分列（column-break）、分区（region-break）。\u003c/p\u003e\n\u003cp\u003ebreak-after 属性扩展了 CSS2 的 page-break-after 属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ebreak-after: auto|\u003cspan class=\"r\"\u003e // 默认，在元素后自动进行分页、分列、分区 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003eall|\u003cspan\n            class=\"r\"\u003e // 始终在主体框之后插入分页符 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003ealways|\u003cspan class=\"r\"\u003e //\n            始终在元素之后插入分页符 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003eavoid|\u003cspan class=\"r\"\u003e // 避免在元素之后出现页、列、区域中断 \u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eavoid-column|\u003cspan class=\"r\"\u003e // 避免在元素之后分列 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003eavoid-page|\n        \u003cspan class=\"r\"\u003e // 避免在元素后分页 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003eavoid-region|\u003cspan class=\"r\"\u003e // 避免在元素之后分区\n        \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003ecolumn| \u003cspan class=\"r\"\u003e // 始终在元素之后插入分裂符 \u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eleft|\u003cspan class=\"r\"\u003e // 在元素之后插入一个或两个分页符，以便在下一页格式化为左页 \u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003epage|\u003cspan class=\"r\"\u003e // 始终在元素之后插入分页 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003erecto|\u003cspan class=\"r\"\u003e //\n            在主体框之后插入一个或两个分页符，以便下一页格式化为 recto 页 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003eregion|\u003cspan class=\"r\"\u003e //\n            始终在元素之后插入分区符 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003eright|\u003cspan class=\"r\"\u003e//在元素之后插入一个或两个分页符，以便格式为右页 \u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003everso|\u003cspan class=\"r\"\u003e // 在主体框后插入一个或两个分页符，以便将下一页格式化为 verso 页 \u003c/span\u003e \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003einitial|\u003cspan class=\"r\"\u003e // 默认 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003einherit;\u003cspan class=\"r\"\u003e // 继承\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003ebreak-before\u003c/h6\u003e\n\u003ch6\u003ebreak-inside\u003c/h6\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 基础","title":"表格"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","基础","表格"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
