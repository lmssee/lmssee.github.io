    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介\u003c/h5\u003e\n\u003cp\u003e选择器是 CSS中一个重要的内容。使用它可以大幅度提高开发人员书写或修改样式表时的工作效率。在样式表中，一般会书写大量的代码，在大型网站中，样式表中的代码可能会达到几千行。麻烦的是，当整个网站或整个\n    Web应用程序全部书写好之后，需要针对样式表进行修改的时候，在洋洋洒洒一大篇 CSS代码之中，并没有说明什么样式服务于什么元素，只是使用了 class属性，然后在页面中指定了元素的 class属性。\u003c/p\u003e\n\u003cp\u003e使用元素的 class属性有两个缺点 :\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e第一， class属性本身没有语义，它纯粹是用来为 CSS样式服务的，属于多余属性\u003c/li\u003e\n    \u003cli\u003e第二，使用 class属性，并没有把样式与元素绑定起来，针对同一个 class属性，文本框也可以使用，下拉框也可以使用，甚至按钮也可以使用，这样是非常混乱的，修改样式的时候也很不方便\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e在 CSS3中，提倡使用选择器将样式与元素直接绑定起来，这样在样式表中什么样式与什么元素相匹配变得一目了然，修改起来也很方便。不仅如此，通过选择器还可以实现各种复杂的指定，同时也能大量减少样式表的代码书写量，最终书写出来的样式表也会变得简洁明了。为此，\n    CSS3增加并完善了选择器的功能，以便更灵活地匹配页面元素。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eID选择器的特殊性为 100\u003c/li\u003e\n    \u003cli\u003e类选择器、属性选择器和伪类选择器的特殊性为 10\u003c/li\u003e\n    \u003cli\u003e类型选择器和伪元素选择器的特殊性为 1\u003c/li\u003e\n    \u003cli\u003e关系选择器中的分隔符（如 +、 \u0026gt;、 ~、 ''）和通配选择器的特殊性为 0，虽然为 0，但还是会比无特殊性要强\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e分类\u003c/h5\u003e\n\u003cp\u003ecss 选择器分为 5 大类\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e基本选择器\u003c/li\u003e\n    \u003cli\u003e复合选择器\n        \u003cul\u003e\n            \u003cli\u003e子选择器\u003c/li\u003e\n            \u003cli\u003e相邻选择器\u003c/li\u003e\n            \u003cli\u003e兄弟选择器\u003c/li\u003e\n            \u003cli\u003e包含选择器\u003c/li\u003e\n            \u003cli\u003e分组选择器\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e伪类选择器\n        \u003cul\u003e\n            \u003cli\u003e动态伪类选择器\u003c/li\u003e\n            \u003cli\u003e目标伪类选择器\u003c/li\u003e\n            \u003cli\u003e语言伪类\u003c/li\u003e\n            \u003cli\u003eUI 元素状态伪类选择器\u003c/li\u003e\n            \u003cli\u003e结构伪类选择器\u003c/li\u003e\n            \u003cli\u003e否定伪类选择器\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e伪元素\u003c/li\u003e\n    \u003cli\u003e属性选择器\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e标签选择器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eh1{...}\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003eID 选择器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e#divNav{...}\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e类选择器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e.topDiv{...}\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e指定选择器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ediv.topDiv{...} \u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ediv#divNav{...}\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e包含选择器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ediv p{...}\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e子选择器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ediv\u0026gt;p{...}\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e相邻选择器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eh1 + p {...}\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e兄弟选择器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eh1 ~ p {...}\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e分组选择器\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eh1,h2,h3,h4,h5,h6{...}\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e伪选择器\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e:link{...} 链接\u003c/li\u003e\n    \u003cli\u003e:visited{...} 访问\u003c/li\u003e\n    \u003cli\u003eE:hover选择器\u003c/li\u003e\n    \u003cli\u003eE:active选择器\u003c/li\u003e\n    \u003cli\u003eE:focus选择器\u003c/li\u003e\n    \u003cli\u003eE:enabled选择器\u003c/li\u003e\n    \u003cli\u003eE:disabled选择器\u003c/li\u003e\n    \u003cli\u003eE:read-only选择器\u003c/li\u003e\n    \u003cli\u003eE:read-write选择器\u003c/li\u003e\n    \u003cli\u003eE:checked选择器\u003c/li\u003e\n    \u003cli\u003eE:default选择器\u003c/li\u003e\n    \u003cli\u003eE:indeterminate选择器\u003c/li\u003e\n    \u003cli\u003eE::selection选择器\u003c/li\u003e\n    \u003cli\u003eE:invalid选择器\u003c/li\u003e\n    \u003cli\u003eE:valid选择器\u003c/li\u003e\n    \u003cli\u003eE:required选择器\u003c/li\u003e\n    \u003cli\u003eE:optional选择器\u003c/li\u003e\n    \u003cli\u003eE:in-range选择器\u003c/li\u003e\n    \u003cli\u003eE:out-of-range选择器\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e如果采用如下所示的 [att$=val]属性选择器，并且将 val指定为\" -1\"，则页面中 id为\" subsection1-1\"、\" subsection2-1\"的 div元素的背景色都变为黄色，因为这些元素的\n    id属性的结尾字符都为\" -1\"字符。另外请注意该属性选择器中在指定匹配字符前必须加上\" \\\"这个 escape字符。\u003c/p\u003e\n\u003cp\u003eE:indeterminate伪类选择器用来指定当页面打开时，一组单选框中没有任何一个单选框被设定为选取状态时整组单选框的样式，如果用户选取了其中任何一个单选框，则该样式被取消指定。到目前为止，只有\n    Opera浏览器对这个选择器提供支持。\u003c/p\u003e\n\u003cp\u003e·E:invalid伪类选择器用来指定，当元素内容不能通过 HTML 5通过使用元素的诸如 required、 pattern等属性所指定的检查或元素内容不符合元素的规定格式（例如通过使用 type属性值为 Email的\n    input元素来限定元素内容必须为有效的 Email格式）时的样式。\u003c/p\u003e\n\u003cp\u003e·E:valid伪类选择器用来指定，当元素内容通过 HTML 5通过使用元素的诸如 required、 pattern等属性所指定的检查或元素内容符合元素的规定格式（例如通过使用 type属性值为 Email的\n    input元素来限定元素内容必须为有效的 Email格式）时的样式。\u003c/p\u003e\n\u003cp\u003eE:default选择器用来指定当页面打开时默认处于选取状态的单选框或复选框控件的样式。需要注意的是，即使用户将该单选框或复选框控件的选取状态设定为非选取状态， E:default选择器中指定的样式仍然有效。\u003c/p\u003e\n\u003cp\u003eE:checked伪类选择器用来指定当表单中的 radio单选框或 checkbox复选框处于选取状态时的样式。\u003c/p\u003e\n\u003cp\u003e·E:read-only伪类选择器用来指定当元素处于只读状态时的样式。\u003c/p\u003e\n\u003cp\u003e·E:read-write伪类选择器用来指定当元素处于非只读状态时的样式。\u003c/p\u003e\n\u003cp\u003eE:enabled伪类选择器用来指定当元素处于可用状态时的样式。\u003c/p\u003e\n\u003cp\u003e·E:disabled伪类选择器用来指定当元素处于不可用状态时的样式。\u003c/p\u003e\n\u003ch5\u003e结构伪类选择器\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003eE:root 选择匹配 E所在文档的根元素。在（ X） HTML文档中，根元素就是 html元素，此时该选择器与 html类型选择器匹配内容相同\u003c/li\u003e\n    \u003cli\u003eE:nth-child(n) 选择所有在其父元素中第 n个位置的匹配 E的子元素。\n        \u003cul\u003e\n            \u003cli\u003etr:nth-child(3)匹配所有表格里排第 3行的 tr元素\u003c/li\u003e\n            \u003cli\u003etr:nth-child(2n+1)匹配所有表格的奇数行\u003c/li\u003e\n            \u003cli\u003etr:nth-child(2n)匹配所有表格的偶数行\u003c/li\u003e\n            \u003cli\u003etr:nth-child(odd)匹配所有表格的奇数行\u003c/li\u003e\n            \u003cli\u003etr:nth-child(even)匹配所有表格的偶数行\u003c/li\u003e\n        \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003eE:nth-last-child(n) 选择所有在其父元素中倒数第 n个位置的匹配 E的子元素\u003c/li\u003e\n    \u003cli\u003eE:nth-of-type(n) 选择所有在其父元素中同类型第 n个位置的匹配 E的子元素\u003c/li\u003e\n    \u003cli\u003eE:first-child 匹配第一个元素\u003c/li\u003e\n    \u003cli\u003eE:last-child 选择位于其父元素中最后一个位置，且匹配 E的子元素\u003c/li\u003e\n    \u003cli\u003e:nth-of-type() 在同类型中匹配特定的子元素\u003c/li\u003e\n    \u003cli\u003e:nth-last-of-type() 按倒序在同类型中匹配特定的子元素\u003c/li\u003e\n    \u003cli\u003eE:last-of-type() 选择在其父元素中匹配 E的最后一个同类型的子元\u003c/li\u003e\n    \u003cli\u003eE:only-child 选择其父元素只包含一个子元素，且该子元素匹配 E\u003c/li\u003e\n    \u003cli\u003eE:only-of-type 选择其父元素只包含一个同类型子元素，且该子元素匹配 E\u003c/li\u003e\n    \u003cli\u003eE:empty 选择匹配 E的元素，且该元素不包含子节点\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e属性选择器\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e匹配属性名 [class]{color: #f00;}\u003c/li\u003e\n    \u003cli\u003e匹配属性值 div[id][title=\"ok\"]{color: #0ff;}\u003c/li\u003e\n    \u003cli\u003eE[foo~=\" bar\" ]:选择匹配 E的元素，且该元素定义了 foo属性， foo属性值是一个以空格符分隔的列表，其中一个列表值为\" bar\"。例如， a[title~=\" bar1″ ]匹配 \u0026lt;a\n        title=\" bar1 bar2bar3″ \u0026gt;\u0026lt;/a\u0026gt;，而不匹配 \u0026lt;a title=\" bar2 bar3 bar4″ \u0026gt;\u0026lt;/a\u0026gt;\u003c/li\u003e\n    \u003cli\u003eE[foo|=\" en\" ]:选择匹配 E的元素，且该元素定义了 foo属性， foo属性值是一个以连字符（ -）分隔的列表，值开头的字符为\" en\"。例如， [lang|=\" en\" ]匹配 \u0026lt;body\n        lang=\" en-us\" \u0026gt;\u0026lt;body\u0026gt;，而不匹配 \u0026lt;body lang=\" fr-argot\" \u0026gt;\u0026lt;body\u0026gt;\u003c/li\u003e\n    \u003cli\u003e\u003c/li\u003e\n    \u003cli\u003e前缀匹配 [class^=\"My\"]{color: #00f;}\u003c/li\u003e\n    \u003cli\u003e后缀匹配 [class$=\"test\"]{color: #0f0;}\u003c/li\u003e\n    \u003cli\u003e模糊匹配 [class*=\"est\"]{color: #ff0;}\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e通用匹配符\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e \u003cspan class=\"p\"\u003e*{...}\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e其它选择器\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003eE:not(s) 否定伪类选择器类型。选择匹配 E的所有元素，且过滤掉匹配 s选择符的任意元素。 s是一个简单结构的选择器，不能够使用复合选择器。 E:not(s)选择器相当于二次过滤，适合精确选择元素\u003c/li\u003e\n    \u003cli\u003eE:target 目标伪类选择器类型。选择匹配 E的所有元素，且匹配元素被相关 URL指向。该选择器是动态选择器，只有当存在 URL指向该匹配元素时，样式效果才能够有效\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eUI伪类选择器\u003c/h5\u003e\n\u003cp\u003eUI元素状态伪类是 CSS3新设计的选择器，其中 UI是 User Interface（用户界面）的简写， UI元素的状态一般包括可用、不可用、选中、未选中、获取焦点、失去焦点、锁定和待机等。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eE:enabled 选择匹配 E的所有可用 UI元素。在网页中， UI元素一般是指包含在 form元素内的表单元素\u003c/li\u003e\n    \u003cli\u003eE:disabled 选择匹配 E的所有不可用 UI元素\u003c/li\u003e\n    \u003cli\u003eE:checked 选择匹配 E的所有可用 UI元素\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e伪对象选择器\u003c/h5\u003e\n\u003ch6\u003e:before\u003c/h6\u003e\n\u003cp\u003e在某元素之前。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 基础","title":"选择器"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","基础","选择器"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
