                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e图片边框\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003eborder-style： none | hidden | dotted | dashed | solid | double | groove | ridge | inset | outset \u003c/li\u003e\n    \u003cli\u003eborder-color: color\u003c/li\u003e\n    \u003cli\u003eborder-width: length | thin | medium | thick\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e图片大小\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003ewidth : length | percentage | auto\u003c/li\u003e\n    \u003cli\u003eheight: length | percentage | auto\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e图片对齐\u003c/h5\u003e\n\u003cp\u003e采用 文本的 对齐方式。\u003c/p\u003e\n\u003ch5\u003e半透明图片\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eopacity： length \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e取值在 0 ~ 1 之间\u003c/p\u003e\n\u003ch5\u003efilter\u003c/h5\u003e\n\u003cp\u003efilter 属性通常定义 img 的视觉效果（如饱和度和模糊度）\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efilter: none | \u003cspan class=\"r\"\u003e // 默认值 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003eblur() |\n        \u003cspan class=\"r\"\u003e // 对图像应用模糊效果，值越大越模糊 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003ebrightness() | \u003cspan class=\"r\"\u003e //\n            调整图像的亮度，0%是黑 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003econtrast() | \u003cspan class=\"r\"\u003e // 调整图像的对比度，0%是全黑 \u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003edrop-shadow() | \u003cspan class=\"r\"\u003e // 对图像应用阴影效果 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003egrayscale() |\n        \u003cspan class=\"r\"\u003e // 将图像转换为灰阶 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003ehue-rotate() | \u003cspan class=\"r\"\u003e //\n            在图像上应用色相旋转（0·360deg） \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003einvert() |\u003cspan class=\"r\"\u003e //\n            反转图像中的样本（0%·100%） \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003eopacity() |\u003cspan class=\"r\"\u003e // 设置图像不透明度 \u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003esaturate() |\u003cspan class=\"r\"\u003e // 设置图像的饱和度 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003esepia() |\u003cspan\n            class=\"r\"\u003e // 将图像转为棕褐色 \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003eurl();\u003cspan class=\"r\"\u003e // 接受规定 SVG 滤镜的 XML 文件的位置\n        \u003c/span\u003e \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-filter: none | \u003cspan class=\"r\"\u003e // 默认值 blur() |; \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e圆角图片\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eborder-radius： none | length \u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e阴影图片\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eborder-shadow： none | shadow \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003ebox-shadow 的使用比较灵活，可同时设置多效果叠加。\u003c/p\u003e\n\u003ch5\u003estretch\u003c/h5\u003e\n\u003cp\u003e将显示方法指定为 stretch时，图像将以拉伸的方式进行显示。\u003c/p\u003e\n\u003ch5\u003erepeat+stretch\u003c/h5\u003e\n\u003cp\u003e可以将上下两条边中图像的显示方式指定为平铺显示，左右两条边中图像的显示方式指定为拉伸显示，或者将上下两条边中图像的显示方式指定为拉伸显示，左右两条边中图像的显示方式指定为平铺显示。使用第一种指定方式时，中央图像在水平方向为平铺显示，垂直方向为拉伸显示；使用第二种指定方式时，中央图像在水平方向为拉伸显示，垂直方向为平铺显示。\n\u003c/p\u003e\n\u003ch5\u003eobject-fit 属性\u003c/h5\u003e\n\u003cp\u003eobject-fit 属性用以规定应如何调整 \u0026lt;img\u0026gt; 和 \u0026lt;video\u0026gt; 的大小以适应容器\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003eobject-fit: fill|contain|cover|scale-down|none|initial|inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003efill ： 默认值，调整替换内容的大小以填充元素的内容框。如有必要，对象被拉伸或挤压\u003c/li\u003e\n    \u003cli\u003econtain ：缩放被替换内容以保持其宽高比，同时适合元素的内容框\u003c/li\u003e\n    \u003cli\u003ecover ： 调整被替换内容，以在填充元素的整个内容框时保持其长宽比。该对象将会被裁剪\u003c/li\u003e\n    \u003cli\u003enone ： 替换内容不会调整大小\u003c/li\u003e\n    \u003cli\u003escale-down ： 内容的尺寸与 none 或 contain 中的一个一致，取决于他们两个之间谁的对象尺寸更小一些\u003c/li\u003e\n    \u003cli\u003einitial ： 默认\u003c/li\u003e\n    \u003cli\u003einherit ： 继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eobject-position \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003eobject-position: position|initial|inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e调整元素的位置，以适应包含框\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 基础","title":"图片"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","基础","图片"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
