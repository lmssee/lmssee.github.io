    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003ergb ? a !\u003c/h5\u003e\n\u003cp\u003eRGBA 色彩模式是 RGB 色彩模式的扩展，他在红、绿、蓝三原色的通道上增加了不透明度\u003c/p\u003e\n\u003ch5\u003e色字头上一把刀\u003c/h5\u003e\n\u003cp\u003e设计者使用 RGB可以设置颜色， CSS 3中新增了另外一种设置颜色的方式： HSL。 HSL色彩模式是工业界的一种颜色标准，是通过对色调（ H）、饱和度（ S）和亮度（\n    L）三个颜色通道的变化以及相互之间的叠加得到各式各样的颜色。\u003c/p\u003e\n\u003cp\u003eHSL代表了色调、饱和度和亮度三个通道的颜色，这个标准几乎包括人类视力所感知的所有颜色，也是目前运用最为广泛的颜色系统之一。如下所示为 HSL的语法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ehsl(hue, saturation, lightness);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e使用 HSL时，需要向 hsl()中添加三个参数，说明如下:\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e hue：表示色调， 0或者 360表示红色， 120表示绿色， 240表示蓝色，也可以设置其它值确定其它的颜色。当值大于 360时，实际值等于该值除以 360之后的余数，例如色调设置为 600，则实际值是\n        600%360=240。\u003c/li\u003e\n    \u003cli\u003e saturation：饱和度的百分比，用于指定颜色被使用了多少，即颜色的深浅和鲜艳程度。它的取值在 0%~100%之间，其中， 0%表示没有颜色（使用灰度）， 100%表示饱和度最高（颜色最鲜艳）。\u003c/li\u003e\n    \u003cli\u003e lightness：高度的百分比，取值范围在 0%~100%之间。其中， 0%表示最暗，显示为黑色； 100%表示最亮，显示为白色。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003ehsl\u003c/h5\u003e\n\u003cp\u003ehsl，其中 色调（ H）、饱和度（ S）、亮度（ L） 3种颜色通道变化叠加，语法如下:\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ehsl(\u0026lt;length\u0026gt;,\u0026lt;percentage\u0026gt;,\u0026lt;percentage\u0026gt;)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e其中，色调 (HUE)衍生于色盘，取值为任意值。其中 0（ 360、 -360）表示红色、 60表示黄色、 120代表绿色、 180代表青色、 240代表蓝色、 300代表洋红。\u003c/p\u003e\n\u003cp\u003e饱和度表示色彩被使用了多少，或者说颜色的深浅程度、鲜艳程度。取值在 0% ~ 100% 之间。 0%显示灰色，即没有该颜色； 100%饱和度最高，颜色最艳。\u003c/p\u003e\n\u003cp\u003e亮度取值在 0% ~ 100% 之间。 0% 最暗 ，显示为黑色， 50% 为均衡， 100% 显示为白色。\u003c/p\u003e\n\u003cp\u003eHSL的使用方法与 RGB和 RGBA一样非常简单，只需要在 hsl()中指定各个参数的值即可。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ebackground: #FFFFFF; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*设置边框阴影效果*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003ebox-shadow:\n        rgba(0, 0, 0, 0.1) 0px 0px 8px; \u003c/span\u003e\u003cspan class=\"p4\"\u003e/*兼容Mozilla类型浏览器，如FF*/\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003e-moz-box-shadow: rgba(0, 0, 0, 0.1) 0px 0px 8px; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e/*兼容Webkit引擎，如Chorme和Safari等*/ \u003c/span\u003e\u003cspan class=\"p4\"\u003e-webkit-box-shadow: rgba(0, 0, 0, 0.1)\n        0px 0px 8px;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eW3C标准列出了 17种颜色：浅绿色、黑色、蓝色、紫红色、灰色、绿色、石灰色、茶色、深蓝色、橄榄色、橙色、紫色、红色、银色、凫蓝色、白色和黄色。\u003c/p\u003e\n\u003cp\u003e色轮（ color wheel）是一张图表，以圆形方式显示了颜色的组织。它的显示方法是尝试帮助你形象地表示主色、辅色与补色之间的关系。配色方案是通过操作色轮开发的，理解配色方案有助于确定要在整个\n    Web站点中一致地使用的调色板。例如，知道一些关于颜色关系的知识将有希望使你能够避免在淡蓝色背景上使用橙色文本，或者在棕褐色背景上使用翠蓝色文本。\u003c/p\u003e\n\u003cp\u003eWeb设计中的一些常见的配色方案如下。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e类似色：使用色轮上彼此相邻的颜色，比如黄色和绿色。其中一种颜色是主色，其相似的邻近颜色可以丰富显示效果\u003c/li\u003e\n    \u003cli\u003e补色：使用色轮上彼此相对的颜色，比如暖色（红色）和冷色（绿色）\u003c/li\u003e\n    \u003cli\u003e三色：使用在色轮上间隔相等的 3种颜色。三色方案可以提供平衡感，同时仍然允许使用丰富的颜色\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e十六进制\u003c/h5\u003e\n\u003cp\u003e十六进制的颜色格式是 #RrGgBb，其中 rr、 gg和 bb是 2位数字的十六进制值，分别用于颜色中的红色（ rr）、绿色（ gg）和蓝色（ bb）成分。\u003c/p\u003e\n\u003ch5\u003ergba\u003c/h5\u003e\n\u003cp\u003e以 十进制转化 十六进制 ,a 表示 透明度 ,取值 0-1。\u003c/p\u003e\n\u003ch5\u003eHSLA\u003c/h5\u003e\n\u003cp style=\"clear: both;\"\u003eHSLA，在 hsl 的基础上添加了 透明度，取值在 0 ~ 1 之间。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eli:nth-child(1) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground: hsla(120, 50%, 50%, 0.1);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e li:nth-child(2) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground:\n        hsla(120, 50%, 50%, 0.2); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e li:nth-child(3) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground: hsla(120, 50%, 50%, 0.3); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e li:nth-child(4) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground: hsla(120, 50%,\n        50%, 0.4); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e li:nth-child(5) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground: hsla(120, 50%, 50%, 0.5); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eWeb安全色\u003c/h5\u003e\n\u003cp\u003e在过去，显示器性能比较落后，最多支持 256种颜色，其中 40种颜色被操作系统作为保留色，剩下的 216种就是 Web安全色。\n    Web安全色是指在各种平台下显示效果与预期一致，如果不是安全色，操作系统可能会在处理颜色的时候产生抖动（抖动就是混合几种颜色，模拟出系统没有的颜色），这样形成的颜色在不同平台中会有色差，例如在 Mac中显示为深绿，而在\n    Thinkpad 中却显示为淡绿。\u003c/p\u003e\n\u003cp\u003e用 rgb()函数表示 Web安全色，三个参数值需要是能被 20%或 51整除的数，也可以是 0%或 0。\u003c/p\u003e\n\u003cp\u003e用十六进制标记法表示 Web安全色，需要用 00、 33、 66、 99、 CC或 FF组合的值。在这 6对数中，选 3对，正好有 216种（即 6的三次方）组合方式，并且所有的安全色都可用简写。\u003c/p\u003e\n\u003ch5\u003e透明度\u003c/h5\u003e\n\u003cp\u003eopacity，设置任何元素的不透明度。方法：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eopacity： \u0026lt;alpha value\u0026gt; | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e使用 alpha 通道对元素设置不透明度时，可以单独针对元素的背景色和文字颜色进行设置，而 opacity只能对指定整个元素进行设置。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e \u003c/span\u003e\u003cspan class=\"p2\"\u003e.bg { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 100%; \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight:\n        100%; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground: #000; \u003c/span\u003e\u003cspan class=\"p4\"\u003eopacity: 0.7;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003efilter: alpha(opacity=70); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e定义 transparent颜色值\u003c/h5\u003e\n\u003cp\u003e如果将颜色值指定为 transparent，则会将背景、文字或边框等的颜色设定为完全透明，相当于使用了值为 0的 alpha通道。在 CSS1中，只能在 background-color属性中指定 transparent值。在\n    CSS2中，可以在 background-color及 border-color属性中指定 transparent值。在 CSS3中，可以在一切指定颜色值的属性中指定 transparent值。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 基础","title":"颜色"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","基础","颜色"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
