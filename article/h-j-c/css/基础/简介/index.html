    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介\u003c/h5\u003e\n\u003cp\u003eCSS3是CSS技术的最新升级版本，它是由Adobe Systems、Apple、Google、HP、IBM、Microsoft、Mozilla、Opera、Sun等许多Web界的巨头联合组成的一个名为CSS Working\n    Group的组织共同协商策划的。2010年在HTML5成为IT界人士关注的焦点的同时，CSS3也开始慢慢地普及开来。\u003c/p\u003e\n\u003cp\u003e目前，对B/S（Browser/Server，浏览器/服务器模式）结构的Web服务，CSS是不可缺少的技术。在DIV+CSS技术时代，CSS显得格外重要。CSS可以将Web前端的HTML代码与页面布局、美化，以及添加的一些特殊效果的代码分隔开来。这样不仅提高了Web前端开发的效率，更好地优化了前端设计，并且在修改网页样式时也非常轻松。\n\u003c/p\u003e\n\u003cp\u003e对使用过DIV+CSS技术的用户来说，CSS并不陌生。它可以对网页页面进行布局设计，如文本链接样式、鼠标样式和文本显示样式等，还可以统一地控制HTML中各标记的显示属性，并且扩充精确指定网页元素位置、外观以及创建特殊效果的功能。\n\u003c/p\u003e\n\u003cp\u003e：CSS预处理器（CSS\n    Preprocessor）为CSS增加编程特性，通过编译器将使用新语法的文件输出为一个普通的CSS文件，解决CSS难以复用、代码冗余、可维护性低的问题，对CSS来说不是锦上添花而是雪中送炭。常用的预处理器有Less、Sass和Stylus。\n\u003c/p\u003e\n\u003ch5\u003eCSS 1.0\u003c/h5\u003e\n\u003ch6\u003e选择器\u003c/h6\u003e\n\u003cp\u003e要使用CSS对HTML页面中的元素实现一对一，一对多或者多对一的控制，就需要用到CSS选择器。CSS选择器大致分为派生选择器、ID选择器和类选择器几种，用来定义希望应用样式的HTML元素或者标签。\u003c/p\u003e\n\u003ch6\u003e样式属性\u003c/h6\u003e\n\u003cp\u003e该属性主要包括Font字体、Text文本、Background背景、Position定位、Dimensions尺寸、Layout布局、Margins外边框、Border边框、Padding内边框、List列表、Table表格和Scrollbar滚动条等，用于定义网页的一些样式变化。每个属性都有一个值，属性和值被冒号分开并由花括号包围，这样就组成了一个完整的样式声明。\n\u003c/p\u003e\n\u003ch6\u003e伪类属性\u003c/h6\u003e\n\u003cp\u003e一般情况下，样式的应用都需要用户指定应用样式的HTML节点，然后动态地指定节点（也就是说节点的样式需要动态变化），这就需要用伪类来完成。在CSS\n    1.0中主要定义了针对锚对象a的link、hover、active、visited和针对节点的first-letter、first-child、first-line等几个伪类属性。\u003c/p\u003e\n\u003ch6\u003e保存方式\u003c/h6\u003e\n\u003cp\u003e通过CSS所编写的样式代码，用户可以直接存储在HTML网页中，也可以将CSS样式代码存储为独立的样式表文件。不管以哪种方式保存，样式表都包含将样式应用于特定元素类型的样式规则。在外部使用时，样式表规则放在外部样式表文档中，文件扩展名为.css。\n\u003c/p\u003e\n\u003ch5\u003eCSS 2.0/CSS 2.1版本\u003c/h5\u003e\n\u003cp\u003e1998年W3C发布了CSS的第二个版本，即CSS 2.0版本。CSS2规范是基于CSS1设计的，其中包含了CSS1所有的功能，并扩充和改进了很多更加强大的属性。\u003c/p\u003e\n\u003ch6\u003e选择器\u003c/h6\u003e\n\u003cp\u003eCSS2提供了更多强大的选择器，用来定位HTML节点或者标记 * \u0026gt; \"; \"; +。\u003c/p\u003e\n\u003ch6\u003e位置模型\u003c/h6\u003e\n\u003cp\u003e虽然在CSS1中已经定义了一些关于位置（Positioning）的属性，但在CSS2中进一步增强了这部分功能，如增加了relative、absolute和fixed等几个值。\u003c/p\u003e\n\u003ch6\u003e布局、表格样式\u003c/h6\u003e\n\u003cp\u003edisplay属性用来规定元素应该生成的框架类型，但在CSS1中只有少数几个属性。CSS2\n    对该属性进行了许多扩充，用户可以用该属性指定元素是否会显示以及如何显示，也可以使用该属性配合位置和浮动进行页面的布局。另外，用户还可以将一个非表格的结构化文档显示为一个表格样式。\u003c/p\u003e\n\u003ch6\u003e媒体类型\u003c/h6\u003e\n\u003cp\u003eCSS2 引入了媒体类型，用于对不同的媒体类型定义不同的样式。\u003c/p\u003e\n\u003ch6\u003e伪类\u003c/h6\u003e\n\u003cp\u003e在CSS2中，不但增加了:focus（将样式添加到被选中的元素）、:first-child（将特殊的样式添加到元素的第一个子元素）、:lang（允许创作者来定义指定的元素中使用的语言）等几个新的伪类，同时还扩充了伪类的使用范围，使得伪类不但可以和原来一样应用于a锚标记，还可以应用到一个类和标签上，如:link:hover、myClass:hover等。\n\u003c/p\u003e\n\u003ch6\u003e光标样式\u003c/h6\u003e\n\u003cp\u003eCSS2的另一大亮点就是增加了cursor属性，用于指定设备应该显示怎样的光标类型。\u003c/p\u003e\n\u003cp\u003eSS2规范中，除了上述一些属性的增强外，还包含了一些其它属性，此处就不再一一列出了。这些新功能极大地增强了CSS和HTML的表现能力。总的来说，CSS的优势及作用是显而易见的，主要体现在以下几方面：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e提高页面浏览速度\u003c/li\u003e\n    \u003cli\u003e易于维护和改版\u003c/li\u003e\n    \u003cli\u003e使用CSS布局更符合现在的W3C标准\u003c/li\u003e\n    \u003cli\u003e表现和内容相分离\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003estyle\u003c/h5\u003e\n\u003cp\u003estyle元素除了拥有全局属性外，还包含4个特殊的属性，分别是type、media、title和scoped。\u003c/p\u003e\n\u003ch5\u003eCSS与DIV标记之缘\u003c/h5\u003e\n\u003cp\u003eDIV+CSS\"这种叫法其实是一种错误的叫法，而标准的叫法应该是XHTML+CSS。因为DIV与Table都是XHTML或HTML语言中的一个标记，而CSS只是一种样式表现。DIV+CSS布局与传统Table相比，具有以下特点：\n\u003c/p\u003e\n\u003ch6\u003e使页面载入得更快。\u003c/h6\u003e\n\u003cp\u003e由于将大部分美化页面的代码都写在CSS文件中，使得页面体积容量变得更小。相对于表格嵌套的方式，将页面分隔成独立的更多的区域，在打开页面的时候逐层加载，而不是像表格嵌套那样将整个页面圈在一个大表格里，使得加载速度很慢。\u003c/p\u003e\n\u003ch6\u003e降低流量费用。\u003c/h6\u003e\n\u003cp\u003e页面体积变小，浏览速度变快，这对于某些控制主机流量的网站来说是最大的优势了。\u003c/p\u003e\n\u003ch6\u003e修改设计时更有效率。\u003c/h6\u003e\n\u003cp\u003eDIV+CSS已经将内容与表现分隔开来，所以修改网页时只需对指定内容修改即可。例如，用户想修改页面的表现力，可以直接修改CSS代码，这样不会影响数据内容。而修改数据内容，则不会影响显示效果。\u003c/p\u003e\n\u003ch6\u003e保持视觉的一致性。\u003c/h6\u003e\n\u003cp\u003e以往表格嵌套的制作方法，会使得页面与页面或者区域与区域之间的显示效果有所偏差，或者表格之间出现间隙。而使用DIV+CSS的制作方法，将所有页面或所有区域统一用CSS文件控制，就避免了不同区域或不同页面出现效果偏差。\u003c/p\u003e\n\u003ch6\u003e更好地被搜索引擎收录。\u003c/h6\u003e\n\u003cp\u003e因为很多代码被写入到CSS中，网页页面中的大部分内容将被突出，而这恰好可以被搜索引擎采集收录，方便浏览用户对网端的搜索。\u003c/p\u003e\n\u003ch6\u003e对浏览者和浏览器更具亲和力。\u003c/h6\u003e\n\u003cp\u003e由于CSS富含丰富的样式，使页面更具灵活性。它可以根据不同的浏览器或者版本，体现出不同的效果，也可以根据地区、时间、人物等不同条件，显示出不同的效果。\u003c/p\u003e\n\u003ch5\u003eCSS编码规范\u003c/h5\u003e\n\u003cp\u003e基本的CSS代码书写规范如下：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e尽量不缩写，除非一看就明白的单词\u003c/li\u003e\n    \u003cli\u003e尽量统一用英文、英文简写或者统一使用拼音\u003c/li\u003e\n    \u003cli\u003e在对CSS代码进行注释时，可以使用/**/（斜杠和星号）或者使用\u0026lt;!- -\u0026gt;进行注释。其中，/**/（斜杠和星号）进行多行注释时使用，而\u0026lt;!- -\u0026gt;用于进行单行注释\u003c/li\u003e\n    \u003cli\u003e浏览器不同或者版本不同，则CSS代码的要求不同，一定要符合浏览器兼容标准\u003c/li\u003e\n    \u003cli\u003e全部小写，且每一项CSS定义写成一行\u003c/li\u003e\n    \u003cli\u003e一般不允许将样式的定义写在标签中（如style=\"font-color:red;\";）\u003c/li\u003e\n    \u003cli\u003e所有装饰性的图片（如背景图），要定义在CSS中\u003c/li\u003e\n    \u003cli\u003eID必须是唯一的，且用在结构的定义中\u003c/li\u003e\n    \u003cli\u003eCSS代码命名不建议使用中杠连接符\u003c/li\u003e\n    \u003cli\u003e建议单位使用相对长度单位。如em和%\u003c/li\u003e\n    \u003cli\u003eCSS中谨慎使用expression，尽量不要使用\u003c/li\u003e\n    \u003cli\u003eCSS中尽量不要使用滤镜，因为滤镜会影响代码读取速度和兼容性\u003c/li\u003e\n\u003c/ul\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003eCSS常见命令规则\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e名称\u003c/th\u003e\n        \u003cth\u003e含义\u003c/th\u003e\n        \u003cth\u003e名称\u003c/th\u003e\n        \u003cth\u003e含义\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003ch5\u003e规范\u003c/h5\u003e\n\u003col\u003e\n    \u003cli\u003e命名规范\u003c/li\u003e\n    \u003cli\u003e书写规范\u003c/li\u003e\n    \u003cli\u003e注释规范\u003c/li\u003e\n    \u003cli\u003eCSS reset\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch5\u003e命名规范\u003c/h5\u003e\n\u003cp\u003e对于命名规范，主要有两个方面：CSS文件命名、id和class命名。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ereset.css用于去除元素的默认样式，使得页面在所有浏览器中有统一的外观\u003c/li\u003e\n    \u003cli\u003eglobal.css用于定义公共模块样式以及基础样式。常见的公共模块包括导航、底部信息栏等。基础样式包括全局字体、文字颜色等\u003c/li\u003e\n    \u003cli\u003ethemes.css 主题样式，用于换肤\u003c/li\u003e\n    \u003cli\u003emodule.css模块样式，用于模块\u003c/li\u003e\n    \u003cli\u003emaster.css母版样式\u003c/li\u003e\n    \u003cli\u003ecolumns.css专栏样式\u003c/li\u003e\n    \u003cli\u003eforms.css表单样式\u003c/li\u003e\n    \u003cli\u003emend.css补丁样式\u003c/li\u003e\n    \u003cli\u003eprint.css打印样式\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e事实上，把样式文件划分为多个文件，这是\"开发阶段\"的做法！按照功能模块划分CSS文件，那是为了方便在开发阶段进行开发和修改。在整站发布的时候，我们会使用工具将多个CSS文件压缩合并成一个文件。\u003c/p\u003e\n\u003ch6\u003eid和class命名\u003c/h6\u003e\n\u003cp\u003e好的命名有很多优点，不仅方便阅读、方便维护，而且对搜索引擎优化也是相当重要的。搜索引擎识别一个页面，很大一部分是根据元素id或class命名来判断。\u003c/p\u003e\n\u003cp\u003eid和class命名，比较常见的有三种方法。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e骆驼峰命名法，例如topMain、subLeftMenu\u003c/li\u003e\n    \u003cli\u003e中划线命名法，例如top-main、sub-left-menu\u003c/li\u003e\n    \u003cli\u003e下划线命名法，例如top_main、sub_left_menu\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e在CSS中，对于元素id和class的命名的几点建议。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e使用英文命名而非中文命名。例如页面头部应该命名为header，而不是toubu\u003c/li\u003e\n    \u003cli\u003e尽量不缩写，除非是一看就明白的单词，例如nav\u003c/li\u003e\n    \u003cli\u003e命名统一规范，尽量不要出现一个用中划线命名，而另外一个用下划线命名的情况。虽然下划线和中划线都可以，但是建议使用中划线，可参见各大型网站\u003c/li\u003e\n    \u003cli\u003e为了避免class命名的重复，命名时一般取父元素的class名作为前缀\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e网页主体部分命名\u003c/h6\u003e\n\u003ch5\u003e书写规范\u003c/h5\u003e\n\u003cp\u003e把影响元素页面布局的样式（如float、margin、padding、height、width等）排到前面，而把不影响布局的样式（如background、color、font等）排到后面。这种主次分明的排列方式，极大地提高了代码的可阅读性和可维护性。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e顶部注释 文件的基本信息，一般包括文件说明、文件版本（更新）、作者以及版权声明等\u003c/li\u003e\n    \u003cli\u003e模块注释 各个模块（如导航、底部信息栏等）的注释说明，模块注释建议要说明\"开始\"和\"结束\"，以便一目了然。简单注释\u003c/li\u003e\n    \u003cli\u003e简单注释 一般用于注释某些关键代码，如功能代码\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eCSS reset\u003c/h5\u003e\n\u003cp\u003ereset就是\"重置\"的意思，CSS reset指的就是重置样式。所谓的重置样式，最简单的说法就是：去除元素在浏览器的默认样式。\u003c/p\u003e\n\u003cp\u003e我们可以通过去除元素在浏览器的默认样式，使得HTML元素具有相同的初始样式，然后再对元素进行统一定义，就可以让页面在不同的浏览器中产生相同的显示效果。\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e默认样式\u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003ehtml, \u003c/span\u003e\u003cspan class=\"p2\"\u003ebody, \u003c/span\u003e\u003cspan class=\"p2\"\u003ediv,\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003espan, \u003c/span\u003e\u003cspan class=\"p2\"\u003eapplet, \u003c/span\u003e\u003cspan class=\"p2\"\u003eobject, \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003eiframe, \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eh1, \u003c/span\u003e\u003cspan class=\"p2\"\u003eh2, \u003c/span\u003e\u003cspan class=\"p2\"\u003eh3, \u003c/span\u003e\u003cspan class=\"p2\"\u003eh4,\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003eh5, \u003c/span\u003e\u003cspan class=\"p2\"\u003eh6, \u003c/span\u003e\u003cspan class=\"p2\"\u003ep, \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003eblockquote, \u003c/span\u003e\u003cspan class=\"p2\"\u003epre, \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003ea, \u003c/span\u003e\u003cspan class=\"p2\"\u003eabbr, \u003c/span\u003e\u003cspan class=\"p2\"\u003eacronym, \u003c/span\u003e\u003cspan\n            class=\"p2\"\u003eaddress, \u003c/span\u003e\u003cspan class=\"p2\"\u003ebig, \u003c/span\u003e\u003cspan class=\"p2\"\u003ecite, \u003c/span\u003e\u003cspan class=\"p2\"\u003ecode,\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003edel, \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003edfn, \u003c/span\u003e\n        \u003cspan class=\"p2\"\u003eem, \u003c/span\u003e\u003cspan class=\"p2\"\u003eimg, \u003c/span\u003e\u003cspan class=\"p2\"\u003eins, \u003c/span\u003e\u003cspan class=\"p2\"\u003ekbd,\n        \u003c/span\u003e\u003cspan class=\"p2\"\u003eq, \u003c/span\u003e\u003cspan class=\"p2\"\u003es, \u003c/span\u003e\u003cspan class=\"p2\"\u003esamp, \u003c/span\u0 ng和margin。因此，我们应该重新审视并修订这段代码再拿来用\u003c/li\u003e\n    \u003cli\u003e目前优秀互联网企业的网站使用CSS reset越来越少，国外也有些优秀的网页设计师已经开始表达自己\"不使用CSS reset\"的观点。对于真正的实战开发来说，CSS\n        reset也可以说是可有可无的。因此，对于是否使用CSS reset也应该根据实际开发需求来决定\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        ['header', '页头', 'content/container', '内容'],\n        ['footer', '页脚', 'nav', '导航'],\n        ['sidebar', '侧栏', 'column', '栏目'],\n        ['wrapper或wrap', '页面外围控制整体布局宽度', 'left', '左侧'],\n        ['right', '右侧', 'center', '中间'],\n        ['loginbar', '登录条', 'logo', '标志'],\n        ['banner', '广告', 'main', '页面主体'],\n        ['hot', '热点', 'news', '新闻'],\n        ['download', '下载', 'menu', '菜单'],\n        ['subnav', '子导航', 'submenu', '子菜单'],\n        ['search', '搜索', 'friendlink', '友情链接'],\n        ['copyright', '版权', 'scroll', '滚动'],\n        ['content', '内容', 'tab', '标签页'],\n        ['list', '文章列表', 'msg', '提示信息'],\n        ['title', '栏目标题', 'joinus', '加入'],\n        ['guild', '指南', 'service', '服务'],\n        ['regsiter', '注册', 'status', '状态'],\n        ['vote', '投票', 'partner', '合作伙伴'],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 基础","title":"简介"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","基础","简介"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
