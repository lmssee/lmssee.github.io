    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003ecolor\u003c/h5\u003e\n\u003cp style=\"hanging-punctuation: allow-end;\"\u003e字体颜色\u003c/p\u003e\n\u003ch5\u003efont\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efont: [font-style] [font-weight] font-size/line-height font-family;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e语法说明： font的各个属性值的描述参见前面各个属性的介绍。定义样式时，各个属性值之间使用空格分隔，同时必须按照如上的排列顺序出现。需要注意的是，要使简写定义有效，必须至少提供 font-size 和 font-family\n    这两个属性值，其它忽略的属性值将使用它们对应的默认值。另外， font-size和 line-height必须通过\"斜杠 /\"组成一个值，不能分开写。\u003c/p\u003e\n\u003ch5\u003efont-family\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efont-family: tahoma,\"Times New Roman\",\"Microsoft YaHei\",\"SimSun\", \"SimHei\",\n        sans-serif;\u003c/span\u003e \u003cspan class=\"p\"\u003efont-family: tahoma,\"Times New Roman\",\"Microsoft\n        YaHei\",\"\\5b8b\\4f53\",\"SimHei\",sans-serif;\u003c/span\u003e \u003cspan class=\"p\"\u003efont-family: \"Times New\n        Roman\",tahoma,arial,\"SimSun\",\"Microsoft YaHei\",\"SimHei\", sans-serif;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e大多数浏览器的默认行高大约是当前字体大小的 110% 到 120%，这个行高有时不一定符合界面设计要求。\u003c/p\u003e\n\u003cp\u003e文本行之间的间距指上面文本的底线和下面文本的顶线之间的距离，行距由行高和字体尺寸决定，其值等于行高减去字体尺寸。\u003c/p\u003e\n\u003cp\u003e也可以用 font 复合类型设置 ,方法如下 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efont: font-style || font-variant || font-weight || font-size || line-height ||\n        font-family \u003c/span\u003e\u003cspan class=\"p\"\u003efont: caption | icon | menu | message-box | small-caption |\n        statue-bar\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003ecss 提供 5 种通用字体 ,通用字体是一种备用机制 ,当指定的字体不可用时 ,将在用户的系统中找了一个类似的字体代替 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eserif : 衬线字体 ,通常变宽 ,字体明显的显示粗细笔画 ,在字体的头部和尾部附带显示的装饰细线\u003c/li\u003e\n    \u003cli\u003esans-serif : 无衬线字体 ,无突变、交叉笔划或其它装饰线。通常是变宽，字体粗细笔划变化不明显\u003c/li\u003e\n    \u003cli\u003ecursive ： 草体，表现为斜字型、联笔或其它草体。看起来像是用毛笔或刷子写的，不像打印体\u003c/li\u003e\n    \u003cli\u003efantasy ： 奇异字体，主要是装饰性（艺术体）\u003c/li\u003e\n    \u003cli\u003emonospace ： 等宽字体，唯一标准就是所有的字型宽度都一样\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003efont-feature-setting\u003c/h5\u003e\n\u003cp\u003efont-feature-setting 属性允许空值 OpenType 字体的高级印刷特性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003efont-feature-settings: normal|feature-value;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enormal ： 默认值，使用默认设置来布置文本\u003c/li\u003e\n    \u003cli\u003efeature-value ： 格式 string[1|0|on|off]，字符串始终是 4 个 ASCII 字符\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003efont-kerning\u003c/h5\u003e\n\u003cp\u003efont-kerning 属性控制字体中储存的字距信息的使用。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003efont-kerning: auto|normal|none; \u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003efont-size\u003c/h5\u003e\n\u003cp\u003e字体大小。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efont-size： length\u003c/span\u003e \u003cspan class=\"p\"\u003efont-size： xx-small | x-small | small |\n        medium | large | x-large | xx-large\u003c/span\u003e \u003cspan class=\"p\"\u003efont-size： larger | smaller \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e\u003csmall\u003e绝对单位所定义的字体大小是固定的，大小效果不会受到所处环境的影响。如： in、 cm、 mm、 pt、 pc等。此外， xx-small、 x-small、 medium、 large、 x-large、\n        xx-large也是绝对单位\u003c/small\u003e。\u003c/p\u003e\n\u003cp\u003e\u003csmall\u003e相对单位多定义的为 字体大小一般不固定。如： px、 em、 ex、 % 、 larger 、 smaller \u003c/small\u003e。\u003c/p\u003e\n\u003ch5\u003efont-size-adjust\u003c/h5\u003e\n\u003cp\u003efont-size-adjust 属性为某一个元素规定一个 aspect 值，这样就可以保持首选字体的 x-height\u003c/p\u003e\n\u003ch5\u003efont-stretch\u003c/h5\u003e\n\u003cp\u003efont-stretch 属性可对当前的 font-family 进行伸缩变形\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enormal ： 默认值，把伸缩比例设置为标准\u003c/li\u003e\n    \u003cli\u003ewider ： 把伸缩比例设置为更进一步的伸缩值\u003c/li\u003e\n    \u003cli\u003enarrower ： 把收缩比例设置为更进一步的收缩值\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003efont-variant\u003c/h5\u003e\n\u003cp\u003e字体大小写，仅支持拉丁字符 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efont-variant： normal | small-caps\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enormal ： 默认值，浏览器会显示一个标准的字体\u003c/li\u003e\n    \u003cli\u003esmall-spas ： 浏览器显示小型大写字母的字体\u003c/li\u003e\n    \u003cli\u003einherit ： 继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003efont-variant-caps\u003c/h5\u003e\n\u003cp\u003efont-variant-caps 属性控制大写字母的替代字形的使用: \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003efont-variant-caps:\n        normal | small-caps | all-small-caps | petite-caps | all-petite-caps | unicase | titling-caps | initial |\n        inherit | unset;\u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enormal ： 停用备用字形的使用\u003c/li\u003e\n    \u003cli\u003esmall-caps ： 显示小型大写字母\u003c/li\u003e\n    \u003cli\u003eall-small-caps ： 把大写和小写字母都显示为小型大写字母\u003c/li\u003e\n    \u003cli\u003epetite-caps ： 显示特小大写字母\u003c/li\u003e\n    \u003cli\u003eall-petite-caps ： 把大写和小写字母都显示为特小型大写字母\u003c/li\u003e\n    \u003cli\u003eunicase ： 允许见大写字母转化为小型大写字母与普通小写字母的混用\u003c/li\u003e\n    \u003cli\u003etitling-caps ： 显示首字母大写\u003c/li\u003e\n    \u003cli\u003einitial ： 默认值\u003c/li\u003e\n    \u003cli\u003einherit ： 继承\u003c/li\u003e\n    \u003cli\u003eunset ： 不设置\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003efont-weight\u003c/h5\u003e\n\u003cp\u003e字体粗细 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efont-weight： normal | bold\u003c/span\u003e \u003cspan class=\"p\"\u003efont-weight： bolder |\n        lighter\u003c/span\u003e \u003cspan class=\"p\"\u003efont-weight： 100 | 200 | 300 | 400 | 500 | 600 | 700 | 800 | 900\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e其中， normal 代表 400 ， border 相当于 700 或 \u0026lt;b\u0026gt; 的效果。\u003c/p\u003e\n\u003ch5\u003efont-style\u003c/h5\u003e\n\u003cp\u003e斜体显示 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003efont-style： normal | italic | oblique \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003enormal 显示为正常的字体， italic 显示为斜体， oblique 显示为 倾斜的字体，只在拉丁文中有效。\u003c/p\u003e\n\u003ch5\u003ehanging-punctuation \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ehanging-punctuation: none || first || last || allow-end || force-end \u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e是否悬挂一个标点符号： start、 end、 end-edge。\u003c/p\u003e\n\u003ch5\u003ehyphens \u003c/h5\u003e\n\u003cp\u003ehyphens 属性定义允许在一行文本内用连字符常见更多的自动换行的机会：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003ehyphens: none | manual | auto | initial | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enone ： 单词不用连字符（不换行）\u003c/li\u003e\n    \u003cli\u003emanual ： 默认，单词只在 \u0026amp;hyphen;（\u0026hyphen;） 或 \u0026amp;shy;(\u0026shy;) 处有连字符（如果需要）\u003c/li\u003e\n    \u003cli\u003eauto ： 在算法确定的位置插入单词连字符（如果需要）\u003c/li\u003e\n    \u003cli\u003einitial ： 默认值\u003c/li\u003e\n    \u003cli\u003einherit ：继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eletter-spacing: normal; \u003c/h5\u003e\n\u003cp\u003e对象中字符的间距。词间距以空格作为调整，默认值同上为 normal 。\u003c/p\u003e\n\u003ch5\u003eline-height\u003c/h5\u003e\n\u003cp\u003e在 CSS中， line-height还有一个更加准确的定义：两行文字基线之间的距离。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e \u003cspan class=\"p\"\u003eline-height： normal | length\u003c/span\u003e \u003c/code\u003e\n\u003cp\u003evertical-align属性中的 top、 middle、 baseline、 bottom这四个属性值分别对应的就是：顶线、中线、基线、底线。\u003c/p\u003e\n\u003ch5\u003epunctuation-trim: none;\u003c/h5\u003e\n\u003cp\u003e标点符号的修剪： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enone\u003c/li\u003e\n    \u003cli\u003estart\u003c/li\u003e\n    \u003cli\u003eend\u003c/li\u003e\n    \u003cli\u003eadjacent（根据相邻的标点符号，修剪另一半标点符号）\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003equotes\u003c/h5\u003e\n\u003cp\u003equotes 属性定义嵌套引用（embedded quotation）的引号类型\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enone： 规定 “content” 属性的 “open-quote” 和 “close-quote” 的值不会产生任何引号\u003c/li\u003e\n    \u003cli\u003estring string string string ： 定义使用的引号。前两个值是第一级嵌套，后两个值是下一级的嵌套\u003c/li\u003e\n    \u003cli\u003einherit：继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003estring 的取值可能：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e\u0026#34; (\u0026amp;#34;) ： double quote\u003c/li\u003e\n    \u003cli\u003e\u0026#39 (\u0026amp;#39;) ： single quote\u003c/li\u003e\n    \u003cli\u003e\u0026#8249; (\u0026amp;#8249;) ： single ,left angle quote\u003c/li\u003e\n    \u003cli\u003e\u002638250; (\u0026amp;#8250;) ： single ,right angle quote\u003c/li\u003e\n    \u003cli\u003e\u0026#171; (\u0026amp;#171;) ： double ,left angle quote\u003c/li\u003e\n    \u003cli\u003e\u0026#187; (\u0026amp;#187;) ： double ,right angle quote\u003c/li\u003e\n    \u003cli\u003e\u0026#8216; (\u0026amp;#8216;) ： left quote(single high-6)\u003c/li\u003e\n    \u003cli\u003e\u0026#8217; (\u0026amp;#8217;) ： right quote(single high-9)\u003c/li\u003e\n    \u003cli\u003e\u0026#8220; (\u0026amp;#8220;) ： left quote(double high-6)\u003c/li\u003e\n    \u003cli\u003e\u0026#8221; (\u0026amp;#8221;) ： right quote(double high-9)\u003c/li\u003e\n    \u003cli\u003e\u0026#8222; (\u0026amp;#8222;) ： double quote (double low-9)\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003etab-size\u003c/h5\u003e\n\u003cp\u003e设置制表符的宽度，通常都是单个空格，除了某些元素外（比如 \u0026lt;textarea\u0026gt; 和 \u0026lt;pre\u0026gt; ）并且 tab-size 只对可见的元素有效。默认为 8 个空格。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003etab-size: number | length | initial | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enumber：默认值是 8\u003c/li\u003e\n    \u003cli\u003elength： 制表符长度。主流浏览器都不支持\u003c/li\u003e\n    \u003cli\u003einitial： 默认值\u003c/li\u003e\n    \u003cli\u003einherit： 继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003etext-align: start; \u003c/h5\u003e\n\u003cp\u003e文本对齐方式： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003estart：行内元素\u003c/li\u003e\n    \u003cli\u003eend：行内元素\u003c/li\u003e\n    \u003cli\u003eleft、 right、 center、 justify、 \u0026lt;string\u0026gt;\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\" text-align:center\"与\" margin:0 auto \"的区别\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e\" text-align:center; \"实现的是文字、 inline 元素以及 inline-block 元素的水平居中。\u003c/li\u003e\n    \u003cli\u003e\" margin:0 auto;\"实现的是块元素的水平居中\u003c/li\u003e\n    \u003cli\u003e\" text-align:center;\"在父元素中定义，\" margin:0 auto; \"在当前元素中定义\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003etext-align-last: auto; \u003c/h5\u003e\n\u003cp\u003e文本最后一行的对齐方式，取值同 text-align。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003estart：行内元素\u003c/li\u003e\n    \u003cli\u003eend：行内元素\u003c/li\u003e\n    \u003cli\u003eleft、 right、 center、 justify、 \u0026lt;string\u0026gt;\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003etext-decoration 装饰线\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003etext-decoration： none || underline || overline || line-through || blink\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003etext-decoration 是符合属性，分属性为:\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003etext-decoration-line： none、 overline、 line-through、 blink\u003c/li\u003e\n    \u003cli\u003etext-decoration-color： [color]\u003c/li\u003e\n    \u003cli\u003etext-decoration-style: solid、 double、 dotted、 dashed、 wavy\u003c/li\u003e\n    \u003cli\u003etext-decoration-skip： 定义装饰线的忽视位置\u003c/li\u003e\n    \u003cli\u003etext-underline-position： auto、 under、 left、 right\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003etext-emphasis: none; \u003c/h5\u003e\n\u003cp\u003e重点文本样式： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enone\u003c/li\u003e\n    \u003cli\u003eaccent：马克笔\u003c/li\u003e\n    \u003cli\u003edot：点标记\u003c/li\u003e\n    \u003cli\u003ecircle：空心圆标记\u003c/li\u003e\n    \u003cli\u003edisc：实心圆标记\u003c/li\u003e\n    \u003cli\u003ebefore：顶部或右侧标记\u003c/li\u003e\n    \u003cli\u003eafter：底部或左侧\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003etext-indent: none; \u003c/h5\u003e\n\u003cp\u003e文本缩进。\u003c/p\u003e\n\u003ch5\u003etext-justify: auto; \u003c/h5\u003e\n\u003cp\u003e对象内调整文本使用的对齐方式，只有在 text-align 设置为 justify时才可用： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eauto\u003c/li\u003e\n    \u003cli\u003einter-word（两端对齐，不涉及最后一行 )\u003c/li\u003e\n    \u003cli\u003einter-ideograph（两端对齐 )\u003c/li\u003e\n    \u003cli\u003einter-cluster（两端对齐，优化亚洲无空格文档）\u003c/li\u003e\n    \u003cli\u003edistribute（两端对齐，优化拉丁文字母，适用东亚，尤其是泰国）\u003c/li\u003e\n    \u003cli\u003ekashida（优化阿拉伯语使用）\u003c/li\u003e\n    \u003cli\u003etibetan（两端对齐，同 distribute）\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003etext-outline: 0;\u003c/h5\u003e\n\u003cp\u003e文本外形轮廓： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enone \u003c/li\u003e\n    \u003cli\u003e[\u0026lt;color\u0026gt;\u0026lt;length\u0026gt;\u0026lt;length\u0026gt;?]\u003c/li\u003e\n    \u003cli\u003e[\u0026lt;length\u0026gt;\u0026lt;length\u0026gt;?\u0026lt;color\u0026gt;]\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003etext-overflow: unset;\u003c/h5\u003e\n\u003cp\u003e超出文本显示：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eclip: 不显示省略（ ...），简单裁剪\u003c/li\u003e\n    \u003cli\u003eellipsis：裁剪，尾部最后一字符添加（ ...）\u003c/li\u003e\n    \u003cli\u003eellipsis-word: 裁 剪，尾部最后一词添加（ ...）\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e定义时可同时定义 white-space： nowrap 和 overflow： hidden\u003c/p\u003e\n\u003ch5\u003etext-shadow: none;\u003c/h5\u003e\n\u003cp\u003e文字阴影。\u003c/p\u003e\n\u003ch5\u003etext-transform\u003c/h5\u003e\n\u003cp\u003e单词文本的大小写 。none为默认，无变化、 capitalize 为每一个单词首字母大写。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etext-transform ： none | capitalize | uppercase | lowercase \u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003etext-wrap: normal; \u003c/h5\u003e\n\u003cp\u003e对象内文本换行模式： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enormal：自动换行\u003c/li\u003e\n    \u003cli\u003enone：不换行\u003c/li\u003e\n    \u003cli\u003eunrestricted：无限制\u003c/li\u003e\n    \u003cli\u003esuppress：压制模式\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eunicode-bidi\u003c/h5\u003e\n\u003cp\u003e重写文本，与 direction 属性一起使用，设置或返回是否应重写文本以支持同一文档中的多种语言。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003eunicode-bidi: normal | embed | bidi-override | initial | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003enormal： 默认值，元素不会打开额外的嵌入级别\u003c/li\u003e\n    \u003cli\u003eembed： 对于行内元素，此值将额外打开的嵌入级别\u003c/li\u003e\n    \u003cli\u003ebidi-override ：对于行内元素，此值会创建一个覆盖\u003cbr\u003e对于块级容器元素，该值将为不在另一个块级元素内的行内元素的级别的后代创建一个覆盖\u003c/li\u003e\n    \u003cli\u003eisolate：该元素将隔离兄弟元素\u003c/li\u003e\n    \u003cli\u003einitial：恢复默认值\u003c/li\u003e\n    \u003cli\u003einherit：继承\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003e div { direction: rtl; unicode-bidi: bidi-override; }\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003euser-select\u003c/h5\u003e\n\u003cp\u003e禁止文本被选取\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p2\"\u003e-webkit-user-select: none; \u003c/span\u003e\u003cspan class=\"p2\"\u003e/*\n        Safari */ \u003c/span\u003e\u003cspan class=\"p2\"\u003e-ms-user-select: none; \u003c/span\u003e\u003cspan class=\"p2\"\u003e/* IE 10+ and Edge */\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003euser-select: none; \u003c/span\u003e\u003cspan class=\"p2\"\u003e/* Standard syntax */ } \u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003evertical-align\u003c/h5\u003e\n\u003cp\u003eW3C官方对 vertical-align属性的定义有四个方面。 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003evertical-align属性用于定义\"周围的文字、 inline元素以及 inline-block元素\"相对于该元素基线的垂直对齐方式。这里的\"该元素\"指的是被定义了 vertical-align属性的元素\n    \u003c/li\u003e\n    \u003cli\u003e在表格单元格中， vertical-align属性可以定义单元格 td元素中内容的对齐方式。 td元素是 table-cell元素，也就是说 vertical-align属性对 table-cell类型元素有效\n    \u003c/li\u003e\n    \u003cli\u003evertical-align属性对 inline元素、 inline-block元素和 table-cell元素有效， 对块元素无效\u003c/li\u003e\n    \u003cli\u003evertical-align属性允许指定负长度值（如 -2px）和百分比值（如 50%）\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e文本垂直对齐:\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evertical-align： auto || length \u003c/span\u003e\u003cspan class=\"p\"\u003evertical-align： baseline | sub\n        | super | top | text-top | middle | bottom | text-bottom\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eword-break: initial;\u003c/h5\u003e\n\u003cp\u003e设置或检索对象内文本的换行行为\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enormal\u003c/li\u003e\n    \u003cli\u003ekeep-all（中日韩字符不允许断开）\u003c/li\u003e\n    \u003cli\u003eloose（中日韩字符可任意断开）\u003c/li\u003e\n    \u003cli\u003ebreak-strict（非中日韩字符可任意断开）\u003c/li\u003e\n    \u003cli\u003ebreak-all（除了中日韩字符其它遵守 loose）\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003ewhite-space: nowrap;\u003c/h5\u003e\n\u003cp\u003e设置和检索对象内空字符的处理方式 \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enormal\u003c/li\u003e\n    \u003cli\u003epre\u003c/li\u003e\n    \u003cli\u003enowrap\u003c/li\u003e\n    \u003cli\u003epre-wrap\u003c/li\u003e\n    \u003cli\u003epre-line\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003ewhite-space-collapse\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ewhite-space-collapse: preserve | collapse | preserve-breaks | discard\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003ewhite-space-collapse 初始值为 collapse ，使用所有元素。该属性设置或检索如果处理对象内的空格，对应 css 2.1 版本中的 white-escape 属性\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eCollapse ： 使用一个单一的字符串序列呈现空白（或在某些情况下，没有字符）\u003c/li\u003e\n    \u003cli\u003epreserve ： 可以呈现所有的空白，换行符将被保留\u003c/li\u003e\n    \u003cli\u003epreserve-breaks : 抛弃呈现的空白，但保留换行符\u003c/li\u003e\n    \u003cli\u003ediscard : 抛弃所有呈现空白\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eword-spacing: normal; \u003c/h5\u003e\n\u003cp\u003e在单词间插入空格： \u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enormal\u003c/li\u003e\n    \u003cli\u003e\u0026lt;length\u0026gt;\u003c/li\u003e\n    \u003cli\u003e\u0026lt;percentage\u0026gt;宽度由字符（ U+0020）标准\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eword-wrap\u003c/h5\u003e\n\u003cp\u003e该属性针对换行符问题进行处理，设置或检索当前超过容器的指定边界是否断开换行。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003enormal\u003c/li\u003e\n    \u003cli\u003ebreak-word\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e在 IE 浏览器下，使用 word-wrap:break-word 不会有\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 基础","title":"文本"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","基础","文本"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
