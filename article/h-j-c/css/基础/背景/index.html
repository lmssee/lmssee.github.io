="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>背景</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简述\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ebackground-image、 background-color、 background-origin、 background-clip、\n        background-repeat、 background-size、 background-position、 background-attachment\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e背景\u003c/h5\u003e\n\u003cp\u003ebackground属性与 CSS2中的用法基本相同，不过 CSS3允许在该属性中添加多个背景图像组，背景图像之间通过逗号进行分隔。其中 \u0026lt;bg-layer\u0026gt;表示一个背景图像层。每个背景图像层都可以包含下面的值：\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e [background-image] | [background-color] | [background-origin] | [background-clip] |\n        [background-repeat] | [background-size] | [background-position]\n        | [background-attachment]\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e为了方便定义背景图像， background属性又派生了 8个子属性。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003ebackground-image：定义背景图像\u003c/li\u003e\n    \u003cli\u003ebackground-color：定义背景颜色\u003c/li\u003e\n    \u003cli\u003ebackground-origin：指定背景的显示区域\u003c/li\u003e\n    \u003cli\u003ebackground-clip：指定背景的裁剪区域\u003c/li\u003e\n    \u003cli\u003ebackground-repeat：设置背景图像是否及如何重复铺排\u003c/li\u003e\n    \u003cli\u003ebackground-size：定义背景图片的大小\u003c/li\u003e\n    \u003cli\u003ebackground-position：设置背景图像位置\u003c/li\u003e\n    \u003cli\u003ebackground-attachment：定义背景图像的显示方式\u003c/li\u003e\n    \u003cli\u003emix-blend-mode：定义元素与父元素的背景混合方式\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e背景色\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ebackground-color: 颜色英文单词 | 颜色的十六进制数 | 颜色的 rgb值 | transparent | inherit;\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e背景定位\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ebackground-position： percentage | length \u003c/span\u003e\n    \u003cspan class=\"p\"\u003ebackground-position: left | right | center | top | bottom\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e定位参考\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ebackground-origin: border-box | padding-box | content-box\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eWebKit 支持 -webKit-background-origin 私有属性，Mozilla Gecko 支持 -moz-background-origin 私有属性，Presto 引擎和 IE 浏览器支持标准属性。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 600px; \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 416px;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eborder: solid 1px red; \u003c/span\u003e\u003cspan class=\"p6\"\u003epadding: 120px 4em 0; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ebackground: url(images/p3.jpg) no-repeat; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e-moz-background-origin: border-box; \u003c/span\u003e\u003cspan class=\"p6\"\u003e-webkit-background-origin:\n        border-box; \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground-origin: border-box; \u003c/span\u003e\u003cspan class=\"p6\"\u003e-moz-background-size:\n        cover; \u003c/span\u003e\u003cspan class=\"p6\"\u003e-webkit-background-size: cover; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003ebackground-size: cover; \u003c/span\u003e\u003cspan class=\"p6\"\u003eoverflow: hidden; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e固定背景\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ebackground-attachment： fixed | scroll | local \u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e定义裁剪区域\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ebackground-clip： border-box | padding-box | content-box | text\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eborder-box : 从边框区域向外裁剪背影\u003c/li\u003e\n    \u003cli\u003epadding-box :　从补白向外裁剪背景\u003c/li\u003e\n    \u003cli\u003econtent-box ： 从内容区域向外裁剪背景\u003c/li\u003e\n    \u003cli\u003etext ：从前景内容（如文字）区域向外裁剪背景\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWebKit 支持 -webKit-background-clip 私有属性，Mozilla Gecko 支持 -moz-background-clip 私有属性，Presto 引擎和 IE\n    浏览器支持该属性部分取值，Firefox 不支持 text。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p6\"\u003eheight: 50px; \u003c/span\u003e\u003cspan class=\"p6\"\u003ewidth: 200px;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003eborder: solid 50px gray; \u003c/span\u003e\u003cspan class=\"p6\"\u003epadding: 50px; \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003ebackground: url(images/bg2.jpg) no-repeat; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e-moz-background-size: cover; \u003c/span\u003e\u003cspan class=\"p6\"\u003e-webkit-background-size: cover;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground-size: cover; \u003c/span\u003e\u003cspan class=\"p6\"\u003e-moz-background-clip: content-box;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003e-webkit-background-clip: content-box; \u003c/span\u003e\n    \u003cspan class=\"p6\"\u003e-o-background-clip: content-box; \u003c/span\u003e\u003cspan class=\"p6\"\u003e-khtml-background-clip: content-box;\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003ebackground-clip: content-box; \u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e定义大小\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ebackground-size: [\u0026lt;length\u0026gt; | \u0026lt;percentage\u0026gt; | auto ]{1,2} | cover | contain\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003ebackground-size 属性值初始值为 auto，适用于所有的元素。\u003c/p\u003e\n\u003cp\u003eWebKit 支持 -webKit-backgroundsize 私有属性，Mozilla Gecko 支持 -moz-background-size 私有属性，Presto 引擎、IE 浏览器支持标准属性\u003c/p\u003e\n\u003ch5\u003e背景平铺\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ebackground-repeat： repeat-x | repeat-y | repeat | no-repeat | space | round \u003c/span\u003e\n\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003espace 背景图像以相同间距平铺且填满整个容器\u003c/li\u003e\n    \u003cli\u003eround 背景图像自动缩放到适应且填充满整个容器\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eCSS Sprite是一种图像处理技术，将零散的小图标整合在一起，形成一张大图 ，这张图可称为雪碧图或精灵图。当用这张大图做背景图像时，可以利用\n    background-position属性进行背景定位，找到想要的小图标。这么处理图像，不但可以解决命名困扰，还能减少\n    HTTP请求数和图像字节数，提升网页性能。但制作和维护这张雪碧图比较烦琐，当加一个小图标的时候，必须修改原图，还不能破坏原先图标的位置。\u003c/p\u003e\n\u003ch5\u003emix-blend-mode\u003c/h5\u003e\n\u003cp\u003emix-blend-mode 属性规定元素的内容应如何与其直接父背景混合。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003emix-blend-mode:\n        normal | multiply | screen | overlay | darken | \u003c/span\u003e \u003cspan class=\"p11\"\u003e\n        lighten | color-dodge | color-burn | difference |\n    \u003c/span\u003e\u003cspan class=\"p11\"\u003e exclusion | hue | saturation | color | luminosity;\u003c/span\u003e\n\u003c/code\u003e\n\u003cul style=\"background-color: #363;\"\u003e\n    \u003cli style=\"mix-blend-mode:normal ;margin-top: 1rem\"\u003enormal ： 默认值，混合成普通\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode: multiply;margin-top: 1rem\"\u003emultiply ：\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode:screen ;margin-top: 1rem\"\u003escreen\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode: overlay;margin-top: 1rem\"\u003eoverlay\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode: darken;margin-top: 1rem\"\u003edarken\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode: lighten;margin-top: 1rem\"\u003elighten\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode: color-dodge;margin-top: 1rem\"\u003ecolor-dodge\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode:color-burn ;margin-top: 1rem\"\u003ecolor-burn\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode: difference;margin-top: 1rem\"\u003edifference\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode: exclusion;margin-top: 1rem\"\u003eexclusion\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode: hue;margin-top: 1rem\"\u003ehue\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode: saturation;margin-top: 1rem\"\u003esaturation\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode: color;margin-top: 1rem\"\u003ecolor\u003c/li\u003e\n    \u003cli style=\"mix-blend-mode: luminosity;margin-top: 1rem\"\u003eluminosity\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eisolation 属性\u003c/h5\u003e\n\u003cp\u003eisolation 属性定义元素是否创建新的堆叠上下文。与 background-blend-mode 和 mix-blend-mode 一起使用时，isolation 属性很有用。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003eisolation: auto|isolate|initial|inherit;\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eauto 默认，只在应用于元素的属性之一需要的它时，才创建新的堆叠上下文\u003c/li\u003e\n    \u003cli\u003eisolate 必须创建新的堆叠上下文\u003c/li\u003e\n    \u003cli\u003einitial 将此属性设置为默认值\u003c/li\u003e\n    \u003cli\u003einherit 继承\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 基础","title":"背景"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","基础","背景"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
