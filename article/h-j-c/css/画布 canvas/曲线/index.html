="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>曲线</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                             td{

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e绘制弧形和圆形\u003c/h5\u003e\n\u003cp\u003ebeginPath 方法用于开始绘制路径， closePath 方法用于结束绘制路径 , 在这两个语句中间的 arc 方法用于绘制圆形。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003earc(x, y, radius, startAngle, endAngle, bAntiClockwise)\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ex,y ：是 arc 的中心点\u003c/li\u003e\n    \u003cli\u003eradius ：是半径长度\u003c/li\u003e\n    \u003cli\u003estartAngle ：是以 starAngle 开始（弧度）\u003c/li\u003e\n    \u003cli\u003eendAngle ：是以 endAngle 结束（弧度）\u003c/li\u003e\n    \u003cli\u003ebAntiClockwise ：是否是逆时针，设置为 true 则为逆时针 , 设置为 false 则为顺时针\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003earc() 方法不仅可以绘制圆弧，还可以绘制圆形 ,arcTo() 方法的参数中包括两个点，而且这两个点中并没有表示圆心的点，只是最后的参数表示圆的半径。\u003c/p\u003e\n\u003cp\u003efill() 填充当前的路径，默认为黑色。可以使用 fillStyle 属性重设为填充色或是渐变。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003econtext.fill()\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003estroke （） 绘制已定义的路径。默认为黑色，可以使用 strokeStyle 属性重设为另一种颜色或渐变 。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003econtext.stroke()\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e绘制图形，需要使用路径。在开始绘制前，需要取得上下文，然后执行。\u003c/p\u003e\n\u003col\u003e\n    \u003cli\u003e使用 beginPath() 方法，开始创建路径\u003c/li\u003e\n    \u003cli\u003e创建图形的路径，如使用 arc() 方法\u003c/li\u003e\n    \u003cli\u003e路径创建完成后，使用 closePath() 方法关闭路径。本步可选\u003c/li\u003e\n    \u003cli\u003e设定绘制样式\u003c/li\u003e\n    \u003cli\u003e调用绘制方法，绘制路径，如使用 fill() 和 stroke （）\u003c/li\u003e\n\u003c/ol\u003e\n\u003ccanvas id=\"this_l_c3\" style=\"border:1px solid;\" width=\"300\" height=\"150\"\u003e\u003c/canvas\u003e\n\u003ccanvas id=\"l_c4\" style=\"border:1px solid;\" width=\"300\" height=\"150\"\u003e\u003c/canvas\u003e\n\u003ch5\u003e绘制曲线\u003c/h5\u003e\n\u003cp\u003e使用 arcTo() 方法可以绘制曲线，该方法是 lineTo() 的曲线版，它能够创建两个切线之间的弧或曲线。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003econtext.arcTo(x1,y1,x2,y2);\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e绘制二次方贝塞尔曲线\u003c/h5\u003e\n\u003cp\u003equadraticCurveTo 方法用于绘制二次方贝塞尔曲线， context.quadraticCurveTo(cp1x, cp1y, x, y) \u003csmall\u003e其中参数 cp1x 和 cp1y 是控制点的坐标， x 和\n        y 是终点坐标\u003c/small\u003e。\u003c/p\u003e\n\u003ccanvas id=\"l_7\" style=\"border:1px solid;\" width=\"300\" height=\"200\"\u003e\u003c/canvas\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar c =\n        document.getElementById(\"l_7\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar context = c.getContext(\"2d\"); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 下面开始绘制二次方贝塞尔曲线\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econtext.strokeStyle = \"dark\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.beginPath(); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econtext.moveTo(0, 200); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.quadraticCurveTo(75, 50, 300, 200);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.stroke(); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econtext.globalCompositeOperation = \"source-over\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n            下面绘制的直线用于表示上面曲线的控制点和控制线，控制点坐标即两直线的交点（ 75,50 ）\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.strokeStyle =\n        \"#ff00ff\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.beginPath(); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econtext.moveTo(75, 50); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econtext.lineTo(0, 200); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.moveTo(75, 50); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econtext.lineTo(300, 200); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.stroke(); \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e绘制三次方贝塞尔曲线\u003c/h5\u003e\n\u003cp\u003ebezierCurveTo 方法用于绘制三次方贝塞尔曲线 context.bezierCurveTo(cp1x,cp1y,cp2x,cp2y, x, y) 其中参数 cp1x 和 cp1y 是第一个控制点的坐标， cp2x 和\n    cp2y 是第二个控制点的坐标， x 和 y 是终点坐标。\u003c/p\u003e\n\u003ccanvas id=\"l_8\" style=\"border:1px solid;\" width=\"300\" height=\"200\"\u003e\u003c/canvas\u003e\n\u003ccanvas id=\"myCanvas\" width=\"400px\" height=\"300px\"\u003e\u003c/canvas\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar c =\n        document.getElementById(\"l_8\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar context = c.getContext(\"2d\"); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 下面开始绘制三次方贝塞尔曲线\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econtext.strokeStyle = \"dark\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.beginPath(); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econtext.moveTo(0, 200); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.bezierCurveTo(25, 50, 75, 50, 300, 200);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.stroke(); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econtext.globalCompositeOperation = \"source-over\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n            下面绘制的直线用于表示上面曲线的控制点和控制线，控制点坐标为（ 25,50 ）和（ 75,50 ）\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.strokeStyle =\n        \"#ff00ff\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.beginPath(); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econtext.moveTo(25, 50); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econtext.lineTo(0, 200); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.moveTo(75, 50); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econtext.lineTo(300, 200); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.stroke(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\n\u003cscript\u003e\n    var c = document.getElementById(\"this_l_c3\");\n    var context = c.getContext(\"2d\");\n    for (var i = 0; i \u003c 15; i++) {\n        context.strokeStyle = \"#FF00FF\";\n        context.beginPath();\n        context.arc(0, 150, i * 10, 0, Math.PI * 3 / 2, true);\n        context.stroke();\n    }\n    var c = document.getElementById(\"l_c4\");\n    var context = c.getContext(\"2d\");\n    for (var i = 0; i \u003c 15; i++) {\n        context.strokeStyle = \"#FF00FF\";\n        context.beginPath();\n        context.arc(0, 150, i * 10, 0, Math.PI * 3 / 2, true);\n        context.closePath();\n        context.stroke();\n    }\n    var canvas = document.getElementById(\"myCanvas\");\n    var context = null;\n    var context = canvas.getContext(\"2d\");\n    DrawBranches(canvas.width / 2, canvas.height, 50, 0); function DrawBranches(startX, startY, trunkWidth, level) {\n        if (level \u003c 12) {\n            var changeX = 100 / (level + 1);\n            var changeY = 200 / (level + 1);\n            var topRightX = startX + Math.random() * changeX;\n            var topRightY = startY - Math.random() * changeY;\n            var topLeftX = startX - Math.random() * changeX;\n            var topLeftY = startY - Math.random() * changeY;\n            context.beginPath(); // 绘制右侧分枝\n            context.moveTo(startX + trunkWidth / 4, startY); // 定位坐标\n            context.quadraticCurveTo(startX + trunkWidth / 4, startY - trunkWidth, topRightX, topRightY);\n            context.lineWidth = trunkWidth; // 指定线条宽度\n            context.lineCap = \"round\"; // 指定线条末端的样式\n            context.stroke(); // 开始绘制右侧分枝\n            context.beginPath(); // 绘制左侧分枝\n            context.moveTo(startX - trunkWidth / 4, startY); // 定位坐标\n            context.quadraticCurveTo(startX - trunkWidth / 4, startY - trunkWidth, topLeftX, topLeftY);\n            context.lineWidth = trunkWidth; // 指定线条宽度\n            context.lineCap = \"round\"; // 指定线条末端的样式\n            context.stroke(); // 开始绘制左侧分枝\n            // drawBranches(topRightX, topRightY, trunkWidth * 0.7, level + 1);\n            // drawBranches(topLeftX, topLeftY, trunkWidth * 0.7, level + 1);\n        }\n    }\n    var c = document.getElementById(\"l_7\");\n    var context = c.getContext(\"2d\");\n    // 下面开始绘制二次方贝塞尔曲线\n    context.strokeStyle = \"dark\";\n    context.beginPath();\n    context.moveTo(0, 200);\n    context.quadraticCurveTo(75, 50, 300, 200);\n    context.stroke();\n    context.globalCompositeOperation = \"source-over\";\n    // 下面绘制的直线用于表示上面曲线的控制点和控制线，控制点坐标即两直线的交点（ 75,50 ）\n    context.strokeStyle = \"#ff00ff\";\n    context.beginPath();\n    context.moveTo(75, 50);\n    context.lineTo(0, 200);\n    context.moveTo(75, 50);\n    context.lineTo(300, 200);\n    context.stroke();\n    var c = document.getElementById(\"l_8\");\n    var context = c.getContext(\"2d\");\n    // 下面开始绘制三次方贝塞尔曲线\n    context.strokeStyle = \"#0f0\";\n    context.beginPath();\n    context.moveTo(0, 200);\n    context.bezierCurveTo(25, 50, 75, 50, 300, 200);\n    context.stroke();\n    context.globalCompositeOperation = \"source-over\";\n    // 下面绘制的直线用于表示上面曲线的控制点和控制线，控制点坐标为（ 25,50 ）和（ 75,50 ）\n    context.strokeStyle = \"#ff00ff\";\n    context.beginPath();\n    context.moveTo(25, 50);\n    context.lineTo(0, 200);\n    context.moveTo(75, 50);\n    context.lineTo(300, 200);\n    context.stroke();\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 画布 canvas","title":"曲线"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","画布 canvas","曲线"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
