    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e使用路径和坐标\u003c/h5\u003e\n\u003cp\u003e路径，简单来说就是一系列的点以及连接这些点的线。任何 canvas 上下文只会有一个\"当前路径\"。\u003c/p\u003e\n\u003cp\u003e绘制线条最基本的路径操作由反复调用 moveTo() 和 lineTo() 命令组成。\u003c/p\u003e\n\u003ch5\u003e绘制直线\u003c/h5\u003e\n\u003cp\u003e绘制直线可以调用 3 个方法： moveTo 、 lineTo 和 stroke 。\u003c/p\u003e\n\u003cp\u003emoveTo 方法用于建立新的子路径，并规定其起始点为（ x,y ）。\u003c/p\u003e\n\u003cp\u003elineTo 方法用于从 moveTo 方法规定的起始点开始绘制一条到规定坐标的直线，如果前面没有用 moveTo 方法规定子路径的起始点，则 lineTo 方法等同于 moveTo 方法。\u003c/p\u003e\n\u003cp\u003estroke 方法用于沿开始、结束绘制一条直线。\u003c/p\u003e\n\u003ccanvas id=\"myCanvas\" width=\"400px\" height=\"200px\"\u003e\u003c/canvas\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar c = document.getElementById(\"myCanvas\"); \u003cspan class=\"r\"\u003e// 获取 canvas\n            对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar ctx = c.getContext(\"2d\"); \u003cspan class=\"r\"\u003e//\n            获取上下文对象\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.beginPath();\u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.moveTo(120,\n        120);\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ectx.lineTo(150, 120);\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ectx.stroke();\u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.moveTo(140, 100);\u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.lineTo(120,\n        150);\u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.stroke();\u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.moveTo(135,\n        120);\u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.lineTo(160, 150);\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ectx.stroke();\u003c/span\u003e\n\u003c/code\u003e\n\u003ccanvas id=\"canvas1\" width=\"300px\" height=\"400px\"\u003e\u003c/canvas\u003e\n\u003ch5\u003e绘制矩形\u003c/h5\u003e\n\u003cp\u003e使用 canvas 元素绘图时候，有两种方式：填充（ fill ）和绘制边框（ stroke ）。填充是指填满图形内部绘制边框是指不填满图形内部，只绘制图形外框。\u003c/p\u003e\n\u003cp\u003e绘图的基本步骤就是：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e先要设定好绘图的样式（ style ），默认填充和描边都是黑色\u003c/li\u003e\n    \u003cli\u003e调用有关方法进行图形的绘制\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e绘制矩形时有 3 个常用的方法： fillRect() 方法、 strokeRect() 方法和 clearRect() 方法。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003econtext.fillRect(x,y,width,height); \u003cspan class=\"r\"\u003e// 绘制矩形，以当前的 fillStyle 来填充\n        \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.strokeRect(x,y,width,height);\u003cspan class=\"r\"\u003e// 绘制矩形，以当前的 strokeStyle\n            来填充\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.clearRect(x,y,width,height);\u003cspan class=\"r\"\u003e//\n            清除指定区域的像素\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003efillRect() 方法、 strokeRect() 方法和 clearRect() 方法的参数完全相同，前两个参数 x 和 y 分别表示绘制矩形时的起点横坐标和纵坐标；后两个参数分别表示要绘制矩形的宽度和高度。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar canvas = document.getElementById(\"canvas\");\u003c/span\u003e\u003cspan class=\"p4\"\u003eif (canvas ==\n        null) \u003c/span\u003e\u003cspan class=\"p6\"\u003ereturn false;\u003c/span\u003e\u003cspan class=\"p4\"\u003eif (canvas.getContext) { \u003cspan class=\"r\"\u003e//\n            浏览器支持 canvas 元素\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003evar context = canvas.getContext(\"2d\");\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econtext.fillStyle = \"#EEEEFF\"; \u003cspan class=\"r\"\u003e// 设置填充颜色\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003econtext.fillRect(0, 0, 300, 100); \u003cspan class=\"r\"\u003e// 绘制一个矩形\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003econtext.fillStyle = \"#ffb244\"; \u003cspan class=\"r\"\u003e// 绘制填充颜色\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econtext.strokeStyle = \"#bb1508\"; \u003cspan class=\"r\"\u003e// 绘制边框颜色\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\" p6 \"\u003econtext.lineWidth = 10; \u003cspan class=\"r\"\u003e// 指定边框宽度\u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p6\"\u003econtext.fillRect(40, 20, 220, 60); \u003cspan class=\"r\"\u003e// 设置填充矩形\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003econtext.strokeRect(40, 20, 220, 60);\u003c/span\u003e\u003cspan class=\"p6\"\u003econtext.clearRect(100, 35, 30, 30);\n        \u003cspan class=\"r\"\u003e// 清除指定的区域\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p6\"\u003econtext.fillStyle = \"lightblue\"; \u003c/span\u003e\u003cspan class=\"p6\"\u003econtext.fillRect(100, 35, 30,\n        30);\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003ccanvas id=\"canvas2\" width=\"300\" height=\"100\"\u003e\u003c/canvas\u003e\n\u003ch5\u003e绘制三角形\u003c/h5\u003e\n\u003ccanvas id=\"l_6\" style=\"border:1px solid;\" width=\"200\" height=\"200\"\u003e\u003c/canvas\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar c = document.getElementById(\"l_6\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar context\n        = c.getContext(\"2d\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.fillStyle = \"#ffff00\";\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.beginPath(); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econtext.moveTo(25, 25); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.lineTo(150, 25); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econtext.lineTo(25, 150); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.fill();\u003c/span\u003e\n\u003c/code\u003e\n\u003cbr\u003e\n\u003ccanvas id=\"l_5\" style=\"border:1px solid;\" width=\"200\" height=\"200\"\u003e\u003c/canvas\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar c = document.getElementById(\"l_5\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar context\n        = c.getContext(\"2d\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.strokeStyle = \"#00ff66\";\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.beginPath(); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003econtext.moveTo(25, 25); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.lineTo(150, 25); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econtext.lineTo(25, 150); \u003c/span\u003e\u003cspan class=\"p4\"\u003econtext.closePath(); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003econtext.stroke();\u003c/span\u003e\n\u003c/code\u003e\n\n\u003cscript\u003e\n    var c = document.getElementById(\"myCanvas\"); // 获取 canvas 对象\n    var ctx = c.getContext(\"2d\"); // 获取上下文对象\n    ctx.beginPath();\n    ctx.moveTo(120, 120);\n    ctx.lineTo(150, 120);\n    ctx.lineTo(150, 135);\n    ctx.lineTo(120, 135);\n    ctx.lineTo(120, 150);\n    ctx.lineTo(120, 150);\n    ctx.lineTo(150, 150);\n    ctx.lineTo(150, 180);\n    ctx.lineTo(135, 175);\n    // ctx.stroke();\n    ctx.moveTo(165, 120);\n    ctx.lineTo(165, 180);\n    ctx.lineTo(175, 175);\n    // ctx.stroke();\n    ctx.moveTo(152, 142);\n    ctx.lineTo(192, 142);\n    ctx.stroke();\n    ctx.moveTo(165, 142);\n    ctx.lineTo(180, 127);\n    // ctx.stroke();\n    ctx.moveTo(165, 142);\n    ctx.lineTo(170, 157);\n    // ctx.arcTo(170, 180, 180, 180, 26);\n    ctx.quadraticCurveTo(180, 175, 190, 174)\n    // ctx.closePath();\n    ctx.stroke();\n    var canvas = document.getElementById(\"canvas1\"); // 获取 canvas 对象\n    var ctx = canvas.getContext(\"2d\"); // 获取上下文对象\n    var width = canvas.width; // 获取 canvas 元素的宽度\n    var height = canvas.height; // 获取 canvas 元素的高度\n    ctx.beginPath(); // 开始绘制路径\n    ctx.moveTo(0, 0); // 当前光标\n    ctx.lineTo(width, 0);\n    ctx.lineTo(width, height);\n    ctx.lineTo(0, height);\n    ctx.lineTo(0, 0);\n    ctx.lineWidth = 3; // 直线的粗细程度\n    ctx.lineCap = \"round\";\n    ctx.stroke();\n    canvas.onclick = function (event) {\n        ctx.moveTo(event.pageX, event.pageY);\n        ctx.lineTo(0, 0);\n        ctx.stroke();\n    };\n    function Draw() {\n        var canvas = document.getElementById(\"canvas2\");\n        // if (canvas == null) return false;\n        var context = canvas.getContext(\"2d\");\n        context.fillStyle = \"#EEEEFF\"; // 设置填充颜色 \n        context.fillRect(0, 0, 300, 100); // 绘制一个矩形 \n        context.fillStyle = \"#ffb244\"; // 绘制填充颜色 \n        context.strokeStyle = \"#bb1508\"; // 绘制边框颜色 \n        context.lineWidth = 10; // 指定边框宽度 \n        context.fillRect(40, 20, 220, 60); // 设置填充矩形 \n        context.strokeRect(40, 20, 220, 60);\n        context.clearRect(100, 35, 30, 30); // 清除指定的区域 \n        context.fillStyle = \"lightblue\";\n        context.fillRect(100, 35, 30, 30);\n    };\n    Draw();\n    var c = document.getElementById(\"l_6\");\n    var context = c.getContext(\"2d\");\n    context.fillStyle = \"#ffff00\";\n    context.beginPath();\n    context.moveTo(25, 25);\n    context.lineTo(150, 25);\n    context.lineTo(25, 150);\n    context.fill();\n    var c = document.getElementById(\"l_5\");\n    var context = c.getContext(\"2d\");\n    context.strokeStyle = \"#00ff66\";\n    context.beginPath();\n    context.moveTo(25, 25);\n    context.lineTo(150, 25);\n    context.lineTo(25, 150);\n    context.closePath();\n    context.stroke();\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 画布 canvas","title":"简单"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","画布 canvas","简单"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
