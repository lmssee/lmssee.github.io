  <script id="__NEXT_DATA__"
    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e用纯色填充图形\u003c/h5\u003e\n\u003cp\u003e使用 fillStyle 设置填充样式 , ctx.fillStyle = ' 颜色 '; 默认的填充样式是不透明的黑色 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e ctx.fillRect(x, y, width, height)\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e使用渐变色填充\u003c/h5\u003e\n\u003cp\u003e创建线性渐变是\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ecreateLinearGradient(), createLinearGradient(x1, y1, x2, y2)\u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eaddColorStop(position, color)\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003eaddColorStop 的位置参数， 是介于 0 - 1 之间的数字， 可以是两位小数， 表示百分比 其中参数 position 为渐变中色标的相对位置（或称\"偏移值\"），必须是一个从 0~1 的浮点值。渐变起点的偏移值为\n    0 ，终点的偏移值为 1 。如果 position 值为 0.5 ，则表示色标会出现在渐变的正中间。\u003c/p\u003e\n\u003cp\u003efillRect 与 strokeRect 画出的都是独立的路径。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;canvas id=\"this_101\" style=\"border: 1px\n        solid;\" width=\"300\" height=\"300\"\u0026gt;\u0026lt;/canvas\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        canvas = document.querySelector(\"#this_101\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar ctx = canvas.getContext('2d'); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar o = ctx.createLinearGradient(0,\n        0, 0, 200); \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.addColorStop(0, '#ff0000'); \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.addColorStop(1 /\n        7, '#ff9900'); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eo.addColorStop(2 / 7, '#ffff00'); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eo.addColorStop(3 / 7, '#00ff00'); \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.addColorStop(4 / 7, '#00ffff');\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.addColorStop(5 / 7, '#0000ff'); \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.addColorStop(6 / 7,\n        '#ff00ff'); \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.addColorStop(1, '#ff0000'); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ectx.fillStyle = o; \u003c/span\u003e\u003cspan class=\"p2\"\u003ectx.strokeStyle = o; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ectx.fillRect(10, 10, 200, 200); \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e绘制径向渐变\u003c/h5\u003e\n\u003cp\u003e如果要绘制径向渐变，则首先需要使用 createRadialGradient 方法创建 canvasGradient 对象，然后使用 addColorStop 方法进行上色。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003econtext.createRadialGradient(x1,y1,r1,x2,y2,r2);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e其中参数 x1 、 y1 、 r1 定义一个以（ x1,y1 ）为原点、半径为 r1 的圆， x2 、 y2 、 r2 定义一个以（ x2,y2 ）为原点、半径为 r2 的圆。例如，可以像下面这样来创建一个\n    canvasGradient 对象用于绘制径向渐变。然后即可使用 addColorStop 方法定义色标的位置并进行上色。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;canvas id=\"this_101\" style=\"border: 1px\n        solid;\" width=\"300\" height=\"300\"\u0026gt;\u0026lt;/canvas\u0026gt; \u0026lt;/body\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        canvas = document.querySelector(\"#this_101\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar ctx = canvas.getContext('2d'); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar o = ctx.createRadialGradient(55,\n        55, 20, 100, 100, 90); \u003c/span\u003e\u003cspan class=\"p2\"\u003eo.addColorStop(0, '#ffffff'); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eo.addColorStop(0.75, '#333333'); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eo.addColorStop(1, '#000000'); \u003c/span\u003e\u003cspan class=\"p2\"\u003ectx.fillStyle = o; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ectx.fillRect(10, 10, 200, 200); \u0026lt;/script\u0026gt; \u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e绘制图案\u003c/h5\u003e\n\u003cp\u003ecreatePattern 方法用来实现图案效果，使用起来非常方便\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003econtext.createPattern(image,\"repeat|repeat-x|repeat-y|no-repeat\");\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e设置图形的透明度\u003c/h5\u003e\n\u003cp\u003e使用 globalAlpha 全局属性可以设置绘图图形的不透明度，另外也可以使用色彩的不透明参数来设置。\u003c/p\u003e\n\u003ch5\u003e创建阴影\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003econtext.shadowOffsetX 用于设置或返回阴影形状的水平距离\u003c/li\u003e\n    \u003cli\u003econtext.shadowOffsetY 用于设置或返回阴影形状的垂直距离\u003c/li\u003e\n    \u003cli\u003econtext.shadowBlur 设置或返回用于阴影的模糊级别\u003c/li\u003e\n    \u003cli\u003econtext.shadowColor 设置或返回用于阴影的颜色\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e其中， shadowOffsetX 为阴影的水平偏移， shadowOffsetY 为阴影的垂直偏移，默认值都是 0 ，正值表示向下或向右延伸，负值表示向上或向左延伸。 shadowBlur 为阴影羽化的程度，默认值为 0\n    ，其数值与像素数量无关，也不受矩阵变换的影响。 shadowColor 为阴影的颜色，可以指定为一个 CSS 字符串或 Web 样式字符串，并且可以包含一个 alpha 部分来表示透明度，默认值是黑色。\u003c/p\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 画布 canvas","title":"填充"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","画布 canvas","填充"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
