="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>Path2D</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eCanvas 2D API 新功能\u003c/h5\u003e\n\u003ch6\u003e新增 Path2D 对象\u003c/h6\u003e\n\u003cp\u003e允许用户储存路径，简化了 canvas 绘制代码，并提升了速度。可以有三种方式创建 Path2D 对象：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003enew Path2D(); \u003cspan class=\"r\"\u003e// 空的 Path2D \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003enew\n        Path2D(path); \u003cspan class=\"r\"\u003e// 复制的 Path2D \u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p2\"\u003enew Path2D(d);\u003cspan class=\"r\"\u003e//\n            通过 SVG path 字符串创建 Path2D \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在 Path2D 中可以使用 Canvas 创建样式。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar circle = new Path2D(); \u003c/span\u003e\u003cspan class=\"p2\"\u003ecircle.arc(50, 50, 50, 0, 2 *\n        Math.PI); \u003c/span\u003e\u003cspan class=\"p2\"\u003ectx.stroke(circle);\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e在 canvas 实际绘制路径时，提供一个可选的 Path2D 路径\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003ectx.fill(path); \u003c/span\u003e\u003cspan class=\"p2\"\u003ectx.stroke(path); \u003c/span\u003e\u003cspan class=\"p2\"\u003ectx.clip(path);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003ectx.isPointInPath(path); \u003c/span\u003e\u003cspan class=\"p2\"\u003ectx.isPointInStroke(path);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e点击区域\u003c/h6\u003e\n\u003cp\u003e点击区域（hit regions ）需要设置 canvas.hitregions.enabled=true 来进行测试。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003eCanvasRenderingContext2D.addHitRegion(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eCanvasRenderingContext2D.removeHitRegion(); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003eCanvasRenderingContext2D.clearHitRegions();\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003eaddHitRegion() 方法在现有的一个路径中或是一个 2D 路径中天界一个点击区域。MouseEvent 接口有一个扩展的 region 属性，用户可以用来检查鼠标是否点击了该区域。\u003c/p\u003e\n\u003ch6\u003e焦点环\u003c/h6\u003e\n\u003cp\u003edrawFocusNeed(element) 可以无需属性切换自动支持。如果在 \u0026lt;canvas\u0026gt; 元素中提供的回退元素获得焦点，用户可以使用这个 API 在 canvas 中心绘制一个焦点环。\u003c/p\u003e\n\u003cp\u003e如果回退元素获得焦点（如切换到一个包含 canvas 的页面），该元素在 canvas 中的像素表示/形成可以绘制一个焦点环来代替当前焦点。\u003c/p\u003e\n\u003ch6\u003eCSS/SVG 过滤器可用于 Canvas \u003c/h6\u003e\n\u003ch5\u003e使用 Path2D 对象\u003c/h5\u003e\n\u003cp\u003e使用 Path2D 可以绘制直线、矩形、圆形、椭圆以及曲线。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003ePath2D 对象的方法\u003c/caption\u003e\n\u003c/table\u003e\n\u003cp\u003e可以使用图形上下文对象的 fill() 方法填充使用 Path2D 对象绘制的路径所形成的图形，或者使用图形上下文对象的 stroke() 方法绘制使用 Path2D() 对象绘制的路径所形成的图形轮廓：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003econtext.fill(path); \u003c/span\u003e\u003cspan class=\"p2\"\u003econtext.stroke(path);\u003c/span\u003e\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;canvas id=\"canvas\" width=\"600\"\n        height=\"400\"\u0026gt;\u0026lt;/canvas\u0026gt;\u0026lt;/body\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar c =\n        document.querySelector('#canvas'); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar t = c.getContext('2d'); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003et.fillStyle = '#eef'; \u003c/span\u003e\u003cspan class=\"p2\"\u003et.fillRect(0, 0, 600, 400); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003efor (let i = n = 0; i \u0026lt; 10; i++) { \u003c/span\u003e\u003cspan class=\"p4\"\u003elet p = new Path2D(); \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ep.arc(i * 25, i * 25, i * 10, 0, Math.PI * 2, true); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ep.closePath(); \u003c/span\u003e\u003cspan class=\"p4\"\u003et.fillStyle = '#f004'; \u003c/span\u003e\u003cspan class=\"p4\"\u003et.fill(p);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e可以使用 Path2D 对象的 addPath() 方法将一个 Path2D 对象代表的路径添加到另一个 Path2D 对象所代表的路径。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003epath2.addPath(path1);\u003c/span\u003e\u003c/code\u003e\n\n\u003cscript\u003e\n    let Aa = [\n        ['path.moveTo(x,y)', '将光标移动到指定坐标点'],\n        ['path.lineTo(x,y)', '在当前坐标与参数中指定的直线终点之间绘制一条直线'],\n        ['path.rect(x,y,height)', '绘制矩形'],\n        ['path.arc(x,y,startAngle,EndAngle,anticlockwise)', '绘制圆形货弧形'],\n        ['path.ellipse(x,y,radiusX,radiusY,rotation,startAngle,endAngle,anticlockwise)', '绘制椭圆或椭圆形圆弧'],\n        ['path.arcTo(x1,y1,x2,y2,radius)', '绘制圆形曲线或圆弧曲线'],\n        ['path.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,x,y)', '绘制北维塞曲线'],\n        ['path.quadraticCurveTo(cpx,cpy,x,y)', '绘制二次样条曲线'],\n        ['path.closPath()', '关闭路径'],\n    ];\n    _MiMethod.td('Aa', Aa);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 画布 canvas","title":"Path2D"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","画布 canvas","Path2D"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
