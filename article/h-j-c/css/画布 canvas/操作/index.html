    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e保存与恢复 Canvas 状态\u003c/h5\u003e\n\u003cp\u003ecanvas 状态是指当前画面的所有样式、变形、裁切的一个快照，以堆（ stack ）的方式保存。使用 save() 和 restore() 方法可以保存和恢复 canvas 状态。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003esave() 方法。该方法用于将当前 canvas 中的所有状态信息保存入堆中\u003c/li\u003e\n    \u003cli\u003erestore() 方法。该方法用于弹出并开始使用堆最上面保存的状态信息\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e使用状态保存与恢复的目的是防止绘制代码过于膨胀，例如，可以在创建画布的 Context 对象时就把初始状态保存下来，这样，在每次重画时都可以直接恢复成初始的状态，而不用每次都使用 clearRect() 方法擦除。\u003c/p\u003e\n\u003ccanvas id=\"l_9\" style=\"border:1px solid;\" width=\"300\" height=\"200\"\u003e\u003c/canvas\u003e\n\u003ccanvas id=\"l_10\" style=\"border:1px solid;\" width=\"300\" height=\"200\"\u003e\u003c/canvas\u003e\n\u003cp\u003e上两个图形中，第一个绘制完第一个方块，绘制完成后保存状态，并在第二个之后恢复。而第二个未保存，所以在绘制完成后，依旧采用第二个方块的样式。\u003c/p\u003e\n\u003ch5\u003e清除绘图\u003c/h5\u003e\n\u003cp\u003e使用 clearRect(x,y,width,height) 方法清除指定区域内绘制的图形，\u003c/p\u003e\n\u003ch5\u003e移动坐标空间\u003c/h5\u003e\n\u003cp\u003e画布的坐标空间默认以画布左上角（ 0,0 ）为原点， x 轴水平向右为正向， y 轴垂直向下为正向，该坐标空间的单位通常为像素。在绘制图形时，可以使用 translate\n    方法移动坐标空间，使画布的变换矩阵发生水平和垂直方向的偏移。\u003c/p\u003e\n\u003ccanvas id=\"l_11\" width=\"700\" height=\"300\"\u003e\u003c/canvas\u003e\n\u003ch5\u003e旋转坐标空间\u003c/h5\u003e\n\u003cp\u003erotate 方法用于以原点为中心旋转 Canvas ，实质仍是旋转 Canvas 上下文对象的坐标空间。\u003c/p\u003e\n\u003ccanvas id=\"l_12\" width=\"700\" height=\"300\"\u003e\u003c/canvas\u003e\n\u003ch5\u003e缩放\u003c/h5\u003e\n\u003cp\u003e使用 scale(x,y) 方法可以缩放当前所绘图形， x 为横轴缩放因子， y 为纵轴缩放因子。\u003c/p\u003e\n\u003ccanvas id=\"l_13\" width=\"700\" height=\"300\"\u003e\u003c/canvas\u003e\n\u003ch5\u003e矩阵变换\u003c/h5\u003e\n\u003cp\u003etransform 方法用于直接对变形矩阵作修改，即进行矩阵变换。矩阵变换常用于坐标变换不能达到预期效果的情况，能够实现比普通的坐标变换更为复杂的变形。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003etransform(a,b,c,d,e,f);\u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003ea ：水平缩放绘图\u003c/li\u003e\n    \u003cli\u003eb ：水平倾斜绘图\u003c/li\u003e\n    \u003cli\u003ec ：垂直倾斜绘图\u003c/li\u003e\n    \u003cli\u003ed ：垂直缩放绘图\u003c/li\u003e\n    \u003cli\u003ee ：水平移动绘图\u003c/li\u003e\n    \u003cli\u003ef ：垂直移动绘图\u003c/li\u003e\n\u003c/ul\u003e\n\u003cul\u003e\n    \u003cli\u003etranslate(x,y) 可以用 transform 方法来代替 context.transform(0,1,1,0,dx,dy); 或 context.transform(1,0,0,1,dx,dy);\n    \u003c/li\u003e\n    \u003cli\u003escale(x,y) 可以用下面的 transform 方法来代替 context.transform(m11,0,0,m22,0,0); 或 context.transform(0,m12,m21,0,0,0);\n    \u003c/li\u003e\n    \u003cli\u003erotate(angle) 比较复杂一些，需要用到三角函数的知识，可以用下面的 transform 方法来代替 context.transform(cos θ ,sin θ ,- sin θ , cos θ\n        ,0,0);\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e裁切路径\u003c/h5\u003e\n\u003cp\u003eclip 方法用于裁切路径，其原理与绘制普通 Canvas 图形类似，只不过 clip 的作用是形成一个蒙版，没有被蒙版的区域会被隐藏。\u003c/p\u003e\n\n\u003cscript\u003e\n    function l_1_drawTop(ctx, fillStyle) {\n        ctx.fillStyle = fillStyle;\n        ctx.beginPath();\n        ctx.arc(0, 0, 30, 0, Math.PI, true);\n        ctx.closePath();\n        ctx.fill();\n    } function l_1_drawGrip(ctx) {\n        // ctx.save();\n        ctx.fillStyle = \"blue\";\n        ctx.fillRect(-1.5, 0, 1.5, 40);\n        ctx.beginPath();\n        ctx.strokeStyle = \"blue\";\n        ctx.arc(-5, 40, 4, Math.PI, Math.PI * 2, true);\n        ctx.stroke();\n        ctx.closePath();\n        // ctx.restore();\n    }\n    // function l_1_draw() {\n    var ctx = document.getElementById('l_11').getContext(\"2d\");\n    // 注意：所有的移动都是基于这一上下文\n    ctx.translate(100, 80);\n    for (var i = 1; i \u003c 10; i++) {\n        ctx.save();\n        ctx.translate(60 * i, 0);\n        l_1_drawTop(ctx, \"rgb(\" + (10 * i) + \",\" + (255 - 40 * i) + \",125)\");\n        l_1_drawGrip(ctx);\n        ctx.restore();\n    } function l_2_drawTop(ctx, fillStyle) {\n        ctx.fillStyle = fillStyle;\n        ctx.beginPath();\n        ctx.arc(0, 0, 30, 0, Math.PI, true);\n        ctx.closePath();\n        ctx.fill();\n    } function l_2_drawGrip(ctx) {\n        ctx.save();\n        ctx.fillStyle = \"blue\";\n        ctx.fillRect(-1.5, 0, 1.5, 40);\n        ctx.beginPath();\n        ctx.strokeStyle = \"blue\";\n        ctx.arc(-5, 40, 4, Math.PI, Math.PI * 2, true);\n        ctx.stroke();\n        ctx.closePath();\n        ctx.restore();\n    }\n    var ctx = document.getElementById('l_12').getContext(\"2d\");\n    ctx.translate(150, 150);\n    for (var i = 1; i \u003c 9; i++) {\n        ctx.save();\n        ctx.rotate(Math.PI * (2 / 4 + i / 4));\n        ctx.translate(0, -100);\n        l_2_drawTop(ctx, \"rgb(\" + (20 * i) + \",\" + (255 - 40 * i) + \",125)\");\n        l_2_drawGrip(ctx);\n        ctx.restore();\n    }\n    var ctx = document.getElementById('l_13').getContext(\"2d\");\n    ctx.translate(200, 20);\n    for (var i = 1; i \u003c 90; i++) {\n        ctx.save();\n        ctx.transform(0.95, 0, 0, 0.95, 30, 30);\n        ctx.rotate(Math.PI / 12);\n        ctx.beginPath();\n        ctx.fillStyle = \"#00aaaa\";\n        ctx.globalAlpha = \"0.4\";\n        ctx.arc(0, 0, 50, 0, Math.PI * 2, true);\n        ctx.closePath();\n        ctx.fill();\n    }\n    ctx.setTransform(1, 0, 0, 1, 10, 10);\n    ctx.fillStyle = \"blue\";\n    ctx.fillRect(0, 0, 50, 50);\n    ctx.fill();\n    var c = document.getElementById(\"l_9\");\n    var context = c.getContext(\"2d\");\n    // 开始绘制矩形\n    context.fillStyle = \"#ff00ff\";\n    context.strokeStyle = \"blue\";\n    context.fillRect(20, 20, 100, 100);\n    context.strokeRect(20, 20, 100, 100);\n    context.fill();\n    context.stroke();\n    // 保存当前 Canvas 状态\n    context.save();\n    // 绘制另外一个矩形\n    context.fillStyle = \"#ff0000\";\n    context.strokeStyle = \"#ffff00\";\n    context.fillRect(140, 20, 100, 100);\n    context.strokeRect(140, 20, 100, 100);\n    context.fill();\n    context.stroke();\n    // 恢复第一个矩形的状态\n    context.restore();\n    // 绘制两个矩形\n    context.fillRect(20, 140, 50, 50);\n    context.strokeRect(80, 140, 50, 50);\n    var c = document.getElementById(\"l_10\");\n    var context = c.getContext(\"2d\");\n    // 开始绘制矩形\n    context.fillStyle = \"#ff00ff\";\n    context.strokeStyle = \"blue\";\n    context.fillRect(20, 20, 100, 100);\n    context.strokeRect(20, 20, 100, 100);\n    context.fill();\n    context.stroke();\n    // 保存当前 Canvas 状态\n    context.save();\n    // 绘制另外一个矩形\n    context.fillStyle = \"#ff0000\";\n    context.strokeStyle = \"#ffff00\";\n    context.fillRect(140, 20, 100, 100);\n    context.strokeRect(140, 20, 100, 100);\n    context.fill();\n    context.stroke();\n    // 恢复第一个矩形的状态\n    // context.restore();\n    // 绘制两个矩形\n    context.fillRect(20, 140, 50, 50);\n    context.strokeRect(80, 140, 50, 50);\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 画布 canvas","title":"操作"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","画布 canvas","操作"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
