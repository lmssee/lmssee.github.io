  <script id="__NEXT_DATA__"
    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e在画布中绘制文本\u003c/h5\u003e\n\u003ctable id=\"Aa\"\u003e\n    \u003ccaption\u003e绘制文本所需方法\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性或方法\u003c/th\u003e\n        \u003cth\u003e基本描述\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\u003cp\u003e在 canvas中可以使用两种方式来绘制文本文字， 一种是使用 fillText() 与 fillStyle组合来绘制填充文字； 一种是使用 strokeText() + strokeStyle绘制非填充（ 空心） 的文字。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar c = document.getElementById(\"myCanvas\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar ctx =\n        c.getContext(\"2d\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.font = \"20px Georgia\"; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ectx.fillText(\"Hello World!\", 10, 50); \u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.font = \"30px Verdana\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 创建渐变\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar gradient =\n        ctx.createLinearGradient(0, 0, c.width, 0); \u003c/span\u003e\u003cspan class=\"p4\"\u003egradient.addColorStop(\"0\", \"magenta\");\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003egradient.addColorStop(\"0.5\", \"blue\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003egradient.addColorStop(\"1.0\", \"red\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n            用渐变填色\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.fillStyle = gradient; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ectx.fillText(\"HTML5+CSS3\", 10, 90);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e设置文字属性\u003c/h5\u003e\n\u003cp\u003e绘制上下文对象中提供了设置文字样式的属性以及绘制文字的方法，常用的文字设置属性有三个： font、 textAlign和 textBaseline。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003efont属性：获取或设置文字字体大小\u003c/li\u003e\n    \u003cli\u003etextAlign属性：获取或者设置文字对齐方式，其值包含 start（默认值）、 end、 left、 right和 center\u003c/li\u003e\n    \u003cli\u003etextBaseline属性：获取或设置文字对齐基线，其值包含 alphabetic（默认值）、 top、 bottom、 middle、 hanging以及 ideographic\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e绘制轮廓文字\u003c/h5\u003e\n\u003cp\u003e使用 strokeText() 方法可以在画布上绘制无填充色的文本。文本的默认颜色是黑色，类似于 fillStyle ，可以使用 strokeStyle 来改其它颜色或者渐变。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar c = document.getElementById(\"myCanvas\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003evar ctx =\n        c.getContext(\"2d\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.font = \"20px Georgia\"; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ectx.strokeText(\"Hello World!\", 10, 50); \u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.font = \"30px Verdana\";\n    \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e// 创建渐变\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003evar gradient =\n        ctx.createLinearGradient(0, 0, c.width, 0); \u003c/span\u003e\u003cspan class=\"p4\"\u003egradient.addColorStop(\"0\", \"magenta\");\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003egradient.addColorStop(\"0.5\", \"blue\"); \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003egradient.addColorStop(\"1.0\", \"red\"); \u003c/span\u003e\u003cspan class=\"p4\"\u003e\u003cspan class=\"r\"\u003e//\n            用渐变填色\u003c/span\u003e\u003c/span\u003e\u003cspan class=\"p4\"\u003ectx.strokeStyle = gradient; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ectx.strokeText(\"HTML5+CSS3\", 10, 90);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e测量文字宽度\u003c/h5\u003e\n\u003cp\u003e使用 measureText方法可以测量当前所绘制文字中指定文字的宽度，该方法会返回一个 TextMetrics对象，使用该对象的 width属性可以得到指定文字参数后所绘制文字的总宽度。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003emetrics=context. measureText(text);\u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e阴影特效\u003c/h5\u003e\n\u003cp\u003ecanvas API提供了与阴影有关的 4个全局属性，这些属性影响与绘制有关的操作。\u003c/p\u003e\n\u003ctable id=\"Ab\"\u003e\n    \u003ccaption\u003e与阴影有关的属性\u003c/caption\u003e\n    \u003ctr\u003e\n        \u003cth\u003e属性\u003c/th\u003e\n        \u003cth\u003e额\u003c/th\u003e\n    \u003c/tr\u003e\n\u003c/table\u003e\n\n\u003cscript\u003e\n    var Aa = [\n        [\"fillStyle\", \"用于设置画笔填充路径内部的颜色、  渐变和模式。  该属性的值可以是表示 CSS颜色值的字符串。  如果绘制需求比较复杂，  该属性的值还可以是一个 CanvasGradient对象或者 CanvasPattern对象 \"],\n        [\"fillText(string text，  int x，  int y[， int maxWidth])\", \"从指定坐标点位置开始绘制填充的文本文字。  参数 maxWidth是可选的，  如果文本内容宽度超过该参数设置，  则会自动按比例缩小字体以适应宽度。  与本方法对应的样式设置属性为 fillStyle\"],\n        [\"font\", \"设置绘制文字所使用的字体，  例如 20px宋体，  默认值为 10px sans - serif。  该属性的用法与 CSS的 font属性一致，  例如 italic bold 14 px / 30 px Arial，  宋体 \"],\n        [\"strokeStyle\", \"用于设置画笔绘制路径的颜色、  渐变和模式。  该属性的值可以是一个表示 CSS颜色值的字符串。  如果绘制需求比较复杂，  该属性的值还可以是一个 CanvasGradient对象或者 CanvasPattern对象 \"],\n        [\"strokeText(string text，  int x，  int y[， int maxWidth])\", \"从指定坐标点位置开始绘制非填充的文本文字（  文字内部是空心的）。  参数 maxWidth是可选的，  如果文本内容宽度超过该参数设置，  则会自动按比例缩小字体以适应宽度。  该方法与 fillText() 用法一致，  不过 strokeText() 绘制的文字内部是非填充（  空心）  的，  fillText() 绘制的文字是内部填充（  实心）  的。  与本方法对应的样式设置属性为 strokeStyle\"],\n    ];\n    _MiMethod.td(\"Aa\");\n    var Ab = [\n        [\"shadowBlur\", \"返回或者设置阴影模糊等级，非大于等于 0的值被忽略 \"],\n        [\"shadowColor\", \"返回或者设置阴影颜色 \"],\n        [\"shadowOffsetX\", \"返回或者设置阴影的横向偏移量 \"],\n        [\"shadowOffsetY\", \"返回或者设置阴影的纵向偏移量 \"],\n    ];\n    _MiMethod.td(\"Ab\");\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 画布 canvas","title":"文本"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","画布 canvas","文本"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
