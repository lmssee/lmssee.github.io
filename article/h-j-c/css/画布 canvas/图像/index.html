="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>图像</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e将画布输出为 PNG 图片文件\u003c/h5\u003e\n\u003cp\u003e2D 绘图环境对图像操作有一些内置的支持，如果要将读取磁盘或者网络中的图像绘制在画布上，可以调用 drawImage() 方法。\u003c/p\u003e\n\u003cp\u003ecanvas API 提供了一个 toDataURL() 方法，该方法返回一幅使用 canvas 绘制的图像，其返回值必须符合 data:URL 格式。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003eurl = canvas.toDataURL([type, … ]);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e如果没有指定返回图像类型时，返回的格式必须是 PNG 类型。如果 canvas 没有任何的像素，则返回值为\" data:, \"这是最短的 data:URL ，在 text/plain 资源中表现为空字符串。 type\n    的值可以在 image/png 、 images/jpeg 、 images/svg+xml 等 MIME 类型中选择。如果是 images/jpeg ，可以有两个参数，如果第二个参数的值在 0 ～ 1 之间，则表示\n    JPEG 的质量等级，否则使用浏览器内置默认质量等级。\u003c/p\u003e\n\u003ch5\u003e向 Canvas 中引入图像\u003c/h5\u003e\n\u003cp\u003e如果要向 Canvas 中引入图像，需要经过两个步骤：第一步是确定图像来源，第二步是使用 drawImage 方法将图像绘制到 Canvas 中。\u003c/p\u003e\n\u003cp\u003eHTML 5 中 Image 对象对应着一幅图像，如果要获取一个图像的对象，通常有 4 种方法。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e通过 document.images 集合、 document.getElementsByTagName() 方法或者 document.getElementById() 方法获取网页内已经存在的图像对象\u003c/li\u003e\n    \u003cli\u003e通过 document.getElementsByTagName() 方法或者 document.getElementById() 方法获取另一个 canvas 对象，将这个 canvas 对象作为一个图像对象\n    \u003c/li\u003e\n    \u003cli\u003e创建一个新的空的 Image 对象，然后再为该对象添加一个图像的超链接，这种方法最为常用\u003c/li\u003e\n    \u003cli\u003e通过 data:url 方式嵌入图像， data urls 允许用一串 Base 64 编码的字符串的方式来定义一幅图像。它的优点就是图像内容即时可用，无须再到服务器兜一圈；可以将 CSS 、 JavaScript\n        、 HTML 和图像全部封装在一起，迁移起来非常方便。但是，它也存在着缺点，如图像没有缓存，如果图像大的话内嵌的 url 数据会相当的长\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e根据通常所需要的结果，绘制图像时常用的 drawImage() 函数有三种形式 。\u003c/p\u003e\n\u003cp class=\"p4\"\u003e直接传入\u003c/p\u003e\n\u003cp\u003e最简单的一种形式就是传入一个 image 对象、目标 x 坐标和 y 坐标，可以在指定位置绘制图像\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003econtext.drawImage(image, dx, dy);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e调用 drawImage() 方法绘制图像时，如果第一个参数不是指定的元素类型，则会抛出一个 TYPE_MISMATCH_ERR 的异常错误；如果图像不能进行解码，则抛出 INVALID_STATE_ERR\n    异常；如果第二个参数不是允许的值，则抛出 SYNTAX_ERR 异常\u003c/p\u003e\n\u003cp class=\"p4\"\u003e改变大小\u003c/p\u003e\n\u003cp\u003e可以在上一种形式的基础上添加两个参数改变绘制图像的方法，这两个参数 dw 和 dh 分别表示绘制图像时的宽度和高度。它能缩放图像而不会影响变换矩阵\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003econtext.drawImage(image,dx,dy,dw,dh);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e更改上面的代码，在页面中执行\" context.drawImage(image, 10, 10, 20, 30) \"时，图像被缩放成了 20px 宽度和 30px 高度\u003c/p\u003e\n\u003cp class=\"p4\"\u003e剪切图像\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003econtext.drawImage(image,sx,sy,sw,sh,dx,dy,dw,dh);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e的 drawImage() 方法表示在画布中绘制图像的全部或者将图像的一部分复制到画布中的另一个位置。语法中的 9 个参数依次表示：要绘制的图像、源图像的 X 坐标、源图像的 Y 坐标、源图像的宽、源图像的高、目标图像的 X\n    坐标、目标图像的 Y 坐标、目标图像的宽、目标图像的高 如果没有指定 dw 和 dh 的值，则默认等于 sw 和 sh ，如果 sx 、 sy 、 sw 、 sh 都没有提供，则默认 sx 和 sy 的值都为 0,sw 和\n    sh 为图像的像素宽度和高度。\u003c/p\u003e\n\u003ch5\u003e图像平铺\u003c/h5\u003e\n\u003cp\u003e使用 createPatter() 方法，比较省事。\u003c/p\u003e\n\u003ch5\u003e像素处理\u003c/h5\u003e\n\u003cp\u003e使用图像的 getImageData() 方法可以获取像素。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003evar imagedata = context.getImageData(sx,sy,sw,sh);\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e参数 sx 和 sy 表示所获得区域的起点坐标，参数 sw 和 sh 表示获得区域的宽度和高度。\u003c/p\u003e\n\u003cp\u003eimageData 变量是一个 CanvasPixelArray 对象，具有 height 、 width 、 data 属性。 data 属性是一个保存像素点数据的数组，内容类似于\n    [r1,g1,b1,a1,r2,b2,g2,a2...] \u003c/p\u003e\n\u003ch6\u003e利用像素绘制\u003c/h6\u003e\n\u003cp\u003e使用 putImageData() 方法可以将像素组绘制在 canvas 上。\u003c/p\u003e\n\u003ch5\u003ecanvas 动画\u003c/h5\u003e\n\u003cp\u003e结合 setInterval() 方法，不断地擦除重绘。但是 canvas 动画有从影。可以利用 CSS3 和 JavaScript 绘制更好的动态效果。\u003c/p\u003e\n\u003ccanvas id=\"myCanvas\" width=\"500\" height=\"240\" style=\"border:solid 1px #93FB40;\"\u003e\u003c/canvas\u003e\n\u003ch5\u003e保存绘图\u003c/h5\u003e\n\u003cp\u003e使用 canvas API 将推行保存在文件中。实现原理：把当前绘画状态输出到一个 Data URL 地址所指向数据的过程。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e所谓的 Data URL ，是指目前大多数浏览器能识别的一种 base64 编码的 URL ，主要是体型小、可以在网页中直接嵌入，而不需要外部文件嵌入的数据。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003eCanvas API 使用 toDataURL() 方法把绘画状态输出到一个 URL \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar canvas = document.getElementById(\"myCanvas\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        context = canvas.getContext('2d'); \u003c/span\u003e\u003cspan class=\"p2\"\u003econtext.fillStyle = \"rgb(0, 0, 255)\";\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003econtext.fillRect(0, 0, canvas.width, canvas.height); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003econtext.fillStyle = \"rgb(255, 255, 0)\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003econtext.fillRect(10, 20, 50,\n        50); \u003c/span\u003e\u003cspan class=\"p2\"\u003ewindow.location = canvas.toDataURL(\"image/jpeg\");\u003c/span\u003e\n\u003c/code\u003e\n\n\u003cscript\u003e\n    var globalId;\n    var i = 0;\n    var op = new Array(\"source-atop\", \"source-in\", \"source-out\", \"source-over\", \"destination-atop\", \"destination-in\", \"destination-out\", \"destination-over\", \"lighter\", \"copy\", \"xor\");\n    var canvas = document.getElementById(\"myCanvas\");\n    var context = canvas.getContext('2d'); function draw() {\n        Composite();\n        setInterval(Composite, 3000);\n    } function Composite() {\n        i++;\n        if (i \u003e 10) i = 0;\n        context.clearRect(0, 0, canvas.width, canvas.height);\n        context.save();\n        context.font = \"30px Georgia\";\n        context.fillText(op[i], 240, 130);\n        context.fillStyle = \"blue\";\n        context.fillRect(0, 0, 100, 100);\n        context.globalCompositeOperation = op[i];\n        context.beginPath();\n        context.fillStyle = \"red\";\n        context.arc(100, 100, 100, 0, Math.PI * 2, false);\n        context.fill();\n        context.restore();\n    }\n    draw()\n\u003c/script\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ 画布 canvas","title":"图像"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","画布 canvas","图像"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
