    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e处理style和link元素定义的样式表\u003c/h5\u003e\n\u003cp\u003e当使用link元素链入外部样式表或者使用style元素来定义嵌入式样式表时，可以使用document的styleSheets属性获取文档中所有的link和style元素，而后通过访问列表中的元素获取每个元素对象，每个元素对象（style元素或者link元素）被描述为一个styleSheet对象，每个styleSheet对象中包含很多的规则，进而可以获取规则中的样式数据。\n\u003c/p\u003e\n\u003cp\u003e例如下面的代码定义了一个嵌入式样式表，又定义了link元素链入一个外部样式表：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;link href=\"myStyle.css\" rel=\"stylesheet\"\n        type=\"text/css\" /\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;style type=\"text/css\"\u0026gt;\u003c/span\u003e\u003cspan class=\"p\"\u003ediv {\n        color:#FF0000;font-weight:bold; }\u003c/span\u003e\n    \u003cspan class=\"p\"\u003ep { color:#FFFFFF;font-size:14px; }\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/style\u0026gt;\u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/head\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e那么，通过以下3个步骤即可以处理其中定义的样式信息：\u003c/p\u003e\n\u003ch6\u003e首先使用document.styleSheets属性获取外部和嵌入式样式表。该列表返回的是一个数组对象，使用数组语法可以访问其中的样式表：\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003edocument.styleSheets[0] \u003cspan class=\"r\"\u003e// link元素链入的外部样式表\u003c/span\u003e\u003c/span\u003e\u003cspan\n        class=\"p\"\u003edocument.styleSheets[1] \u003cspan class=\"r\"\u003e// style元素定义的嵌入式样式表\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003edocument.styleSheets[0]和document.styleSheets[1]都是styleSheet对象，其中包含了规则的定义，也包含了@import指令导入的样式表。\u003c/p\u003e\n\u003ch6\u003e使用styleSheet.rules属性获取规则，该属性返回一个数组对象，数组中的每个元素就是一条规则，使用数组语法可以访问这些规则。例如下面的代码访问style元素中定义的第2条规则：\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003evar oStyleSheet = document.styleSheets[1];\u003c/span\u003e\u003cspan class=\"p\"\u003evar oRule =\n        oStyleSheet.rules[1];\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e即：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003ep { color:#FFFFFF;font-size:14px; }\u003c/span\u003e\u003c/code\u003e\n\u003ch6\u003e获得规则（这是一个rule对象）后，使用rule对象的style属性返回一个style对象（rule.style），该对象代表了这个规则中定义的所有样式。例如下面的代码：\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor: #FF0000;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-weight: bold; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e p { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003ecolor: #FF0000; \u003c/span\u003e\u003cspan class=\"p4\"\u003efont-size: 14px;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/style\u0026gt; \u0026lt;div id=\"oDiv\"\u0026gt;请点击\u0026lt;a\n        href=\"page.html\"\u0026gt;网站链接\u0026lt;/a\u0026gt;\u0026lt;/div\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oStyleSheet =\n        document.styleSheets[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar oRule = oStyleSheet.rules[0]; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(oRule.style.color); /* 访问规则中定义的样式属性 color */ \u003c/span\u003e\u003cspan class=\"p2\"\u003eoRule.style.color =\n        \"green\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003eoRule.style.fontSize = \"13 px\"; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(oRule.style.color); \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e处理导入的样式表\u003c/h5\u003e\n\u003cp\u003e对于使用@import指令导入的样式表，可以使用styleSheet.imports属性获取每个@import指令导入的样式表，这些样式表构成了一个列表。该列表中每个元素就是一个styleSheet对象。然后，就可以使用styleSheet.rules属性获取其中定义的规则，进而获取每条规则定义的style对象，从而访问该规则定义的样式。\n\u003c/p\u003e\n\u003cp\u003e例如下面的代码，定义了一个名为myStyle.css的样式表，该样式表中包含了两条规则：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003ediv { color:#FF0000;font-weight:bold; }\u003c/span\u003e\u003cspan class=\"p\"\u003ep {\n        color:#00FF00;font-size:14px; }\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e然后在网页文档中使用@import指令导入该样式表，并访问其中的规则：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e@import\n        myStyle.css; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;div id=\"oDiv\"\u0026gt;请点击\u0026lt;a href=\"page.html\"\u0026gt;网站链接\u0026lt;/a\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003evar oStyleSheet = document.styleSheets[0]; \u003cspan class=\"r\"\u003e//\n            获取style元素定义的样式表\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar oImport = oStyleSheet.imports[0]; \u003cspan class=\"r\"\u003e// 获取其中第一个@import指令\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\" p4 \"\u003eoRule = oImport.rules[0]; \u003cspan class=\"r\"\u003e// 获取样式表中的第一个规则\u003c/span\u003e\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(oRule.style.color); // 下面就是访问规则\u003c/span\u003e\u003cspan class=\"p4\"\u003eoRule.style.color =\n        \"green\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003eoRule.style.fontSize = \"13 px\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ealert(oRule.style.color); \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e可以看到这与前面范例有相同的效果。\u003c/p\u003e\n\u003cp\u003e另一种可能的情况是导入的样式表中也定义有@import指令，例如下面的名为anotherStyle.css的样式表，其中定义了@import指令导入myStyle.css样式表：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003e@import myStyle.css;\u003c/span\u003e\u003c/code\u003e\n\u003cp\u003e然后，在网页文档中导入这个anotherStyle.css样式表：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;head\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;style type=\"text/css\"\u0026gt; \u003c/span\u003e\u003cspan class=\"p4\"\u003e@import\n        anotherStyle.css; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;/style\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/head\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p\"\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003e\u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;div id=\"oDiv\"\u0026gt;请点击\u0026lt;a\n        href=\"page.html\"\u0026gt;网站链接\u0026lt;/a\u0026gt;\u0026lt;/div\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003evar oStyleSheet = document.styleSheets[0]; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003evar oImport = oStyleSheet.imports[0]; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003e// 获取anotherStyle中第一个@import指令\u003c/span\u003e\u003cspan class=\"p4\"\u003evar oImport2 = oImport.imports[0];\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eoRule = oImport2.rules[0]; \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(oRule.style.color);\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eoRule.style.color = \"green\"; \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eoRule.style.fontSize = \"13 px\"; \u003c/span\u003e\u003cspan class=\"p4\"\u003ealert(oRule.style.color); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e\u0026lt;/script\u0026gt; \u003c/span\u003e\u003cspan class=\"p\"\u003e\u0026lt;/body\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e这时，要访问样式信息，就必须首先获得对anotherStyle.css样式表的引用，这是一个styleSheet对象，然后通过该styleSheet对象的imports属性获取对myStyle.css样式表的引用，从而访问其中的规则，进而访问样式。\n\u003c/p\u003e\n\u003cp\u003eDOM样式（DOM Style）规范也是由W3C制定的，目前包含两个部分：DOM StyleSheets和DOM CSS。IE8及以前的版本不支持DOM Style规范，IE9支持该规范。\u003c/p\u003e\n\u003cp\u003e为兼容主流浏览器，在使用前应该先检测用户了浏览器的类型，以便调用不同的对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar cssRule = document.styleSheet[0].cssRules || document.styleSheets[0].rules;\n    \u003c/span\u003e\n\u003c/code\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e#box { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 700px;\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003eheight: 500px; \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: #0ff; \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eborder: 2px dotted #00f; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u0026lt;/style\u0026gt; \u0026lt;div id=\"box\"\u0026gt;\u0026lt;/div\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        box = document.querySelector(\"#box\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003evar cssRules =\n        document.styleSheets[0].cssRules || document.styleSheets[0].rules; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebox.innerHTML = \"\u0026lt;h3\u0026gt;盒子样式\u0026lt;/h3\u0026gt;\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003ebox.innerHTML +=\n        \"\u0026lt;br\u0026gt;宽度：\" + cssRules[0].style.width; \u003c/span\u003e\u003cspan class=\"p2\"\u003ebox.innerHTML += \"\u0026lt;br\u0026gt;高度：\" +\n        cssRules[0].style.height; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebox.innerHTML += \"\u0026lt;br\u0026gt;边框：\" + cssRules[0].style.border; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebox.innerHTML += \"\u0026lt;br\u0026gt;背景颜色：\" + cssRules[0].style.backgroundColor; \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003estylesheets 包括文档所有的样式表，每个数组元素代表一个样式表，数组的索引位置根据样式在文档中的位置决定的。\u003c/p\u003e\n\u003cp\u003estyleSheet[1] 代表文档中第二个 style 元素内容。而 cssRules[0] 就代表了该样式表中的第一条规则。cssRules[0].style.color 就代表该规则下的颜色设置。\u003c/p\u003e\n\u003ch5\u003eselectorText 对象\u003c/h5\u003e\n\u003cp\u003e使用 styleSheets 和 cssRules 可以获取文档样式表中的任意样式。另外，每个 CSS 样式包含 selectorText 属性，使用该属性可以获取样式的选择符。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003ediv { \u003c/span\u003e\u003cspan class=\"p4\"\u003ewidth: 700px;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e.d { \u003c/span\u003e\u003cspan class=\"p4\"\u003ebackground-color: #0ff;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e#box { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003eheight: 500px; \u003c/span\u003e\u003cspan class=\"p4\"\u003eborder: 2px dotted #00f; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n        \u0026lt;/style\u0026gt; \u0026lt;div id=\"box\" class=\"d\"\u0026gt;\u0026lt;/div\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar box =\n        document.querySelector(\"#box\"); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003evar cssRules = document.styleSheets[0].cssRules || document.styleSheets[0].rules; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003ebox.innerHTML = \"第一个样式表中的第三个样式选择符 = \" + cssRules[2].selectorText; \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e编辑样式\u003c/h5\u003e\n\u003cp\u003ecssRules 不仅可以访问属性，还可以设置属性值。\u003c/p\u003e\n\u003cp class=\"no\"\u003e上述方法修改样式表中的类样式，会影响其它对象或其它文档样式对当前表的引用，因此在使用时应当谨慎。\u003c/p\u003e\n\u003ch5\u003e添加样式\u003c/h5\u003e\n\u003cp\u003e使用 addRule() 可以为样式表增加一个样式。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003estylesheet.addRule(selector, style [,index]); \u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003eselector : 表示样式选择符，以字符串的形式传递\u003c/li\u003e\n    \u003cli\u003estyle ： 表示具体的声明，以字符串的形式传递\u003c/li\u003e\n    \u003cli\u003eindex ： 一个索引值，表示添加样式表中的索引位置，默认为 -1 ，即位于样式表中的末尾，可以不设置\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eFirefox 浏览器不支持 addRule() 方法，但是支持 insertRule()　方法添加样式。insertRule() 方法添加样式。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p2\"\u003estyleSheet.inertRule(rule[, index]); \u003c/span\u003e\u003c/code\u003e\n\u003cul\u003e\n    \u003cli\u003erule : 表示一个完整的样式字符串\u003c/li\u003e\n    \u003cli\u003eindex ： 与 addRule() 方法中的 index 参数相同，但默认为 0 ， 放置在样式表的末尾\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e#box { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor: #088;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e.red { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor: #f00; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p4\"\u003e.blue { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003ecolor: #00f; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/style\u0026gt; \u0026lt;p\u0026gt;一段废话\u0026lt;/p\u0026gt; \u0026lt;script\u0026gt;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003evar styleSheets = document.styleSheets[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar index =\n        styleSheets.length; \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003eif (styleSheets.insertRule) { \u003c/span\u003e\n    \u003cspan class=\"p4\"\u003estyleSheets.insertRule(\"p{background-color:#f00;color:#f0f;padding:1rem;}\", index);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003estyleSheets.addRule(\"P\",\n        \"background-color:#f00;color:#f0f;padding:1rem\", index); \u003c/span\u003e\n    \u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e访问计算样式\u003c/h5\u003e\n\u003cp\u003eCSS 样式能够重叠，这会导致当一个对象被定义许多样式后，显示的效果未必都是某个样式所设计的效果。\u003c/p\u003e\n\u003ch6\u003eIE 浏览器\u003c/h6\u003e\n\u003cp\u003eIE 浏览器定义了一个 currentStyle 对象，该对象是一个只读对象。 currentStyle 对象包含了文档所有的 style 对象定义的属性，以及未被覆盖的 CSS 规则的 style 属性。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003evar styleSheets = document.styleSheets[0]; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar index =\n        styleSheets.length; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (styleSheets.insertRule) { \u003c/span\u003e\u003cspan\n        class=\"p4\"\u003estyleSheets.insertRule(\"p{background-color:#f00;color:#f0f;padding:1rem;}\", index); \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003estyleSheets.addRule(\"P\",\n        \"background-color:#f00;color:#f0f;padding:1rem\", index); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar p\n        = document.querySelector(\"p\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003ep.innerHTML = \"背景色:\" +\n        p.currentStyle.backgroundColor + \"\u0026lt;br\u0026gt;字体颜色:\" + p.currentStyle.color; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003ealert(p);\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e非 IE 浏览器\u003c/h6\u003e\n\u003cp\u003eDOM 中定义了一个 getComputedStyle() 方法，该方法可以获取目标对象的样式，但是它需要使用 document.defaultView 对象进行访问。\u003c/p\u003e\n\u003cp\u003egetComputedStyle() 方法包含两个参数：第 1 个参数表示元素，用来获取样式的对象；第 2 个参数表示伪类字符串，定义显示的位置，一般可省略。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p2\"\u003e\u0026lt;style\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e#p { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor: #fff;\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e .red { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor: #f00; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003e .blue { \u003c/span\u003e\u003cspan class=\"p4\"\u003ecolor: #00f; \u003c/span\u003e\u003cspan class=\"p2\"\u003e}\n        \u0026lt;/style\u0026gt; \u0026lt;body\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003e\u0026lt;p class=\" blue red\" id=\"p\"\u0026gt;一段废话\u0026lt;/p\u0026gt;\n        \u0026lt;/body\u0026gt; \u0026lt;script\u0026gt; \u003c/span\u003e\u003cspan class=\"p2\"\u003evar styleSheets = document.styleSheets[0]; \u003c/span\u003e\u003cspan\n        class=\"p2\"\u003evar index = styleSheets.length; \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (styleSheets.insertRule) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003estyleSheets.insertRule(\"p{background-color:#a008;color:#0ff;padding:1rem;}\", index);\n    \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003estyleSheets.addRule(\"P\",\n        \"background-color:#a008;color:#0ff;padding:1rem\", index); \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u003c/span\u003e\u003cspan class=\"p2\"\u003evar\n        p = document.querySelector(\"p\"); \u003c/span\u003e\u003cspan class=\"p2\"\u003eif (document.defaultView \u0026\u0026\n        document.defaultView.getComputedStyle) { \u003c/span\u003e\u003cspan class=\"p4\"\u003ep.innerHTML = \"背景色:\" +\n        document.defaultView.getComputedStyle(p, null).backgroundColor + \"\u0026lt;br\u0026gt;字体颜色:\" + document \u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e.defaultView.getComputedStyle(p, null).color \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else if (p.currentStyle) {\n    \u003c/span\u003e\u003cspan class=\"p4\"\u003ep.innerHTML = \"背景色:\" + document.currentStyle.backgroundColor + \"\u0026lt;br\u0026gt;字体颜色:\" +\n        document.currentStyle.color; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} else { \u003c/span\u003e\u003cspan class=\"p4\"\u003ep.innerHTML =\n        \"当前浏览器无法获取最终样式\"; \u003c/span\u003e\u003cspan class=\"p2\"\u003e} \u0026lt;/script\u0026gt;\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"h-j-c ✈︎✈︎ css ✈︎✈︎ js","title":"DOM样式表"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["h-j-c","css","js","DOM样式表"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
