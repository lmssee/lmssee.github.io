    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eIP\u003c/h5\u003e\n\u003cp\u003eInternet 的网络地址是指连入Internet 网络的计算机地址编号，它类似电话号码。在Internet 网络中，网络地址唯一标识一台计算机。在Internet\n    中将用户信息的数据包从一处移到另一处的是网间协议（IP），因此，Internet 中计算机的地址编号就称为IP 地址。\u003c/p\u003e\n\u003cp\u003eIP 地址由网络地址和主机地址两部分组成。网络地址（网络号）标识Internet 上的一个物理网络。主机地址标识该物理网络中的一台主机，每个主机地址对本网络而言必须唯一。路由器连接两个或多个物理网络，因此它有两个或多个IP\n    地址，每个IP 地址的网络号与其连接的物理网络的网络号相同。\u003c/p\u003e\n\u003ch5\u003e子网编址与屏蔽码\u003c/h5\u003e\n\u003cp\u003e有时，需要多个物理网络合用同一个网络号。例如，某单位申请到一个B 类地址网络号，可以有65534\n    个主机地址，为了便于管理和扩展，常常按该单位的组织结构或地域分布划分为若干子网，每个子网包含适量的主机。这些子网具有相同的网络号。现将该单位申请到的B 类地址中主机地址（16 位）分成两部分，其中前8 位作为子网地址，后8\n    位作为主机地址。用部分主机地址划分子网只限于该单位内部使用，对于外部（即Internet）是感觉不到子网存在的\u003c/p\u003e\n\u003cp\u003e每个 IP 地址都对应一个屏蔽码，屏蔽码也称作子网屏蔽码或子网掩码（subnet mask），它屏蔽IP 地址中的网络号（包括子网地址）。其作用在于指示IP 地址的哪些位是网络号（包括子网地址），哪些位是主机地址。\u003c/p\u003e\n\u003ch5\u003e域名系统\u003c/h5\u003e\n\u003cp\u003e因特网国际特别委员会把顶级域名分为国际顶级域名与国家顶级域名两类。域名的构成有两类比较特殊的部分：一类由3\n    个字母组成，它表示机构的类型；另一类由两个字母组成，它表示国家或地区的名称代码。一般来说，域名的格式为：商标名（或企业名）.企业性质代码.国家代码（各部分用小数点隔开），如中央电视台的域名为\u003ca\n        href=\"https://cctv.cn\" target=\"_blank\"\u003ecctv.cn\u003c/a\u003e ，其中cctv\n    是中央电视台的名称，cn 代表的是中国。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 互联网","title":"网络地址"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","互联网","网络地址"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
