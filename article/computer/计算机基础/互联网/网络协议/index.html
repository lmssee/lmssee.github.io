  <script id="__NEXT_DATA__"
    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定义\u003c/h5\u003e\n\u003cp\u003e网络体系结构是层和协议的集合。网络系统按层的方式来组织，各层的名字和承担的任务都不相同，层与层之间通过接口传递信息与数据。网络间的通信按一定的规则和约定进行，这些规则和约定称为协议（protocol）。\u003c/p\u003e\n\u003ch5\u003e协议内容\u003c/h5\u003e\n\u003cp\u003e在计算机网络中任何一种协议都必须解决语法、语义、定时这3 个主要问题。\u003c/p\u003e\n\u003ch6\u003e协议的语法\u003c/h6\u003e\n\u003cp\u003e在协议中对通信双方采用的数据格式、编码方式等进行定义。如报文内容的组织形式、内容的顺序等\u003c/p\u003e\n\u003ch6\u003e协议的语义\u003c/h6\u003e\n\u003cp\u003e在协议中对通信的内容做出解释。如对于报文，它由什么部分组成，哪些部分用于控制数据，哪些部分是真正的通信内容\u003c/p\u003e\n\u003ch6\u003e协议的定时\u003c/h6\u003e\n\u003cp\u003e定时也称时序，在协议中对通信内容中先讲什么、后讲什么以及讲的速度进行了定义。如通信中采用同步还是异步传输等。\u003c/p\u003e\n\u003ch5\u003e协议的功能\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e分割与重组：协议的分割功能，可以将较大的数据单元分割成较小的数据单元，其反过程为重组。\u003c/li\u003e\n    \u003cli\u003e寻址：寻址功能使网络上设备彼此识别，同时可以进行路径选择。\u003c/li\u003e\n    \u003cli\u003e封装与拆封：协议的封装功能是在数据单元的始端或者末端增加控制信息，其相反的过程是拆封。\u003c/li\u003e\n    \u003cli\u003e排序：协议的排序功能是指报文发送与接收顺序的控制。\u003c/li\u003e\n    \u003cli\u003e流量控制：协议的流量控制功能是指在信息流过大时所采取的一系列措施。\u003c/li\u003e\n    \u003cli\u003e差错控制：差错控制功能使得数据按照误码率要求的指标，在通信线路中正确地传输。\u003c/li\u003e\n    \u003cli\u003e同步：协议的同步功能可以保证收发双方在数据传输时的一致性。\u003c/li\u003e\n    \u003cli\u003e干路传输：协议的干路传输功能可以使多个用户信息共用干路。\u003c/li\u003e\n    \u003cli\u003e连接控制：协议的连接控制功能是控制通信实体之间建立和终止链路的过程。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e协议的种类\u003c/h5\u003e\n\u003cp\u003e协议按其不同的特性可分为以下3 种:\u003c/p\u003e\n\u003cul\u003e\n\n    \u003cli\u003e标准或非标准协议：标准协议涉及各类的通用环境；而非标准协议只涉及专用环境。\u003c/li\u003e\n    \u003cli\u003e直接通信或间接通信协议：设备之间可以通过专线进行连接，也可以通过公用通信网络相连接。网络设备直接进行通信时，需要一种直接通信协议；而网络设备之间间接通信时，则需要一种间接通信协议。\u003c/li\u003e\n    \u003cli\u003e整体或分层结构化协议：整体协议是一个协议，也就是一整套规则；分层结构化协议分为多个层次实施，这样的协议由多个层次复合而成。\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 互联网","title":"网络协议"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","互联网","网络协议"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
