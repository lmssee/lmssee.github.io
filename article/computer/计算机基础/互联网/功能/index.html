="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>功能</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e计算机网络的组成\u003c/h5\u003e\n\u003ch6\u003e主机（host）\u003c/h6\u003e\n\u003cp\u003e主要用于科学计算与数据处理的计算机系统。\u003c/p\u003e\n\u003ch6\u003e节点（node）\u003c/h6\u003e\n\u003cp\u003e是在通信线路和主机之间设置的通信线路控制处理机，主要分担数据通信、数据处理的控制处理功能。\u003c/p\u003e\n\u003ch6\u003e通信线路：\u003c/h6\u003e\n\u003cp\u003e主要包括连接各个节点的高速通信线路、电缆、双绞线或通信卫星等。\u003c/p\u003e\n\u003ch6\u003e调制解调器（modem）\u003c/h6\u003e\n\u003cp\u003e在传送数据时，以原封不动的形式把来自终端的信息送入线路称为基带传输，这种方式适合于近距离传送。在远距离传送时，为防止信号畸变，一般采用频带传输，即将数字信号变换成便于在通信线路中传输的交流信号进行传输。此时，在发送端由直流变成交流称为调制，在接收端由交流变成直流称为解调。兼有这两种功能的装置称为调制解调器。\n\u003c/p\u003e\n\u003ch5\u003e功能\u003c/h5\u003e\n\u003ch6\u003e 数据通信\u003c/h6\u003e\n\u003cp\u003e这是计算机网络最基本的功能之一。计算机网络提供的通信服务包括传真、电子邮件、电子数据交换（EDI）、电子公告牌（BBS）、远程登录和信息浏览等。\u003c/p\u003e\n\u003ch6\u003e资源共享\u003c/h6\u003e\n\u003cp\u003e这是计算机网络最本质的功能。所谓“资源”是指计算机系统的软件、硬件和数据。所谓“共享”是指网内用户均能享受网络中各个计算机系统的全部或部分资源。\u003c/p\u003e\n\u003ch6\u003e提高计算机的可靠性和可用性\u003c/h6\u003e\n\u003cp\u003e这是计算机网络的另一个十分重要的功能。网络中的每台计算机都可通过网络相互成为后备机。一旦某台计算机出现故障，它的任务就可由其他计算机代为完成。这样可避免单机情况下，因一台计算机出现故障引起整个系统瘫痪的现象，从而提高了系统的可靠性。而当网络中某台计算机负担过重时，网络又可以将新的任务交给网中较空闲的计算机完成，均衡负荷，从而提高了每台计算机的可用性。\n\u003c/p\u003e\n\u003ch6\u003e分布式处理\u003c/h6\u003e\n\u003cp\u003e这是近年来计算机应用研究的重点课题之一。通过算法将大型的综合性问题，交给不同的计算机分别同时进行处理。用户可以根据需要，合理选择网络资源，就近快速地进行处理。另外，利用网络技术将多台计算机连成具有高性能的计算机系统来解决大型问题，也比用同样性能的大中型计算机节省费用。\n\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 互联网","title":"功能"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","互联网","功能"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
