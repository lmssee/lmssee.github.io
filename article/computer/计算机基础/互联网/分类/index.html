="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>分类</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e覆盖区域分\u003c/h5\u003e\n\u003cp\u003e依据网络的覆盖，分为局域网、广域网、城域网。\u003c/p\u003e\n\u003ch5\u003e拓扑图结构分\u003c/h5\u003e\n\u003cp\u003e拓扑结构是网络的物理连接形式，如果不考虑实际网络的地理位置，把网络中的计算机看作一个节点，把通信线路看作一根连线，这就抽象出计算机网络的拓扑结构。常见的计算机网络拓扑结构主要有总线形结构、星形结构、环形结构、树形结构和网状结构5\n    种。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e总线形、星形、环形拓扑结构常用于局域网的连接，网状拓扑结构常用于广域网的连接。不同网络拓扑结构对网络性能的影响也是不同的。\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e总线形拓扑结构\u003c/h6\u003e\n\u003cp\u003e这种结构的所有节点都直接连到一条主干电缆上，这条主干电缆称为总线。该类结构没有关键性节点，任何一个节点都可以通过主干电缆与连接到总线上的所有节点通信。\n\u003c/p\u003e\n\u003cp\u003e这种结构的优点是电缆长度短、布线容易、结构简单、可靠性高。增加新节点时，只需在总线的任何点接入，易于扩充。\u003c/p\u003e\n\u003cp\u003e总线结构的缺点是故障检测需要在各个节点进行，故障诊断困难，隔离也困难，尤其是总线故障会引起整个网络的瘫痪。\u003c/p\u003e\n\u003ch6\u003e星形拓扑结构\u003c/h6\u003e\n\u003cp\u003e这种结构以一台设备作为中央节点，其他外围节点都单独连接在中央节点上。各外围节点之间不能直接通信，必须通过中央节点进行通信。中央节点可以是文件服务器或专门的接线设备，负责接收某个外围节点的信息，再转发给另外一个外围节点。\n\u003c/p\u003e\n\u003cp\u003e这种结构的优点是结构简单，服务方便，建网容易，故障诊断与隔离比较简便，并且便于管理。\u003c/p\u003e\n\u003cp\u003e缺点是需要的电缆长、安装费用多。网络运行依赖于中央节点，因而可靠性低。若要增加新的节点，就必须增加中央节点的连接，扩充比较困难。\u003c/p\u003e\n\u003ch6\u003e环形拓扑结构\u003c/h6\u003e\n\u003cp\u003e这种结构各节点形成闭合的环，信息在环中作单向流动，可实现环上任意两节点间的通信。\u003c/p\u003e\n\u003cp\u003e环形结构的优点是电缆长度短、成本低。\u003c/p\u003e\n\u003cp\u003e该结构的缺点是某一节点出现故障会引起全网故障，且故障诊断涉及每一个节点，故障诊断困难。若要扩充环的配置，就需要关掉部分已接入网中的节点，重新配置困难。\u003c/p\u003e\n\u003ch6\u003e树形拓扑结构\u003c/h6\u003e\n\u003cp\u003e在树形结构中，节点按照层次进行连接。信息交换主要在上下节点间进行，相邻或同层之间节点一般不进行数据交换。\u003c/p\u003e\n\u003cp\u003e树形结构的优点是通信线路连接简单，网络管理软件也不复杂，维护方便。\u003c/p\u003e\n\u003cp\u003e缺点是资源共享能力差，可靠性低。\u003c/p\u003e\n\u003ch6\u003e网状拓扑结构\u003c/h6\u003e\n\u003cp\u003e在这种结构中，各工作站互联成一个网状结构，没有主控机来管理，也不分层次，通信功能分散在组成网络的各个工作站中，是一种分布式的控制结构。\u003c/p\u003e\n\u003cp\u003e网状拓扑结构具有可靠性高，资源共享方便等优点。\u003c/p\u003e\n\u003cp\u003e缺点是线路复杂，网络的管理比较困难。\u003c/p\u003e\n\u003ch5\u003e按传输介质分类\u003c/h5\u003e\n\u003cp\u003e传输介质就是指用于网络连接的通信线路。目前常用的传输介质有同轴电缆、双绞线、光纤、卫星和微波等有线或无线传输介质，相应地可将网络分为同轴电缆网、双绞线网、光纤网、卫星网和无线网等。\u003c/p\u003e\n\u003ch5\u003e按带宽速率分类\u003c/h5\u003e\n\u003cp\u003e带宽速率指的是“网络带宽”和“传输速率”两个概念。传输速率是指每秒钟传送的二进制位数，通常使用的计量单位为bit/s、kbit/s、Mbit/s。按网络带宽可以分为基带网（窄带网）和宽带网。按传输速率可以分为低速网、中速网和高速网。一般来讲，高速网是宽带网，低速网是窄带网。\n\u003c/p\u003e\n\u003ch5\u003e按通信协议分类\u003c/h5\u003e\n\u003cp\u003e通信协议是指网络中的计算机进行通信所共同遵守的规则或约定。在不同的计算机网络中采用不同的通信协议。在局域网中，以太网采用CSMA 协议，令牌环网采用令牌环协议，广域网中的报文分组交换网采用x.25 协议，Internet\n    网采用TCP/IP 协议，采用不同协议的网络可以称为“×××协议网”。\u003c/p\u003e\n\u003ch5\u003e按通信传播方式分类\u003c/h5\u003e\n\u003cp\u003e按通信传播方式可以分为广播式网络和点到点网络。广播式网络中的计算机共享一条通信信道，当一台计算机发送报文分组时，所有其他计算机都会收到这个分组，然后各计算机都要检查分组中的地址字段，看分组是否是发给自己的，如果是就处理分组，否则就丢弃该分组。点到点网络中每条物理线路连接一对计算机，这样要从源节点到达目的节点，可能存在一条或多条路经，由于线路结构的复杂，选择合理的路径就变得十分重要了。一般情况下，局域网多数是广播式网络，而广域网多数是点到点网络。\n\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 互联网","title":"分类"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","互联网","分类"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
