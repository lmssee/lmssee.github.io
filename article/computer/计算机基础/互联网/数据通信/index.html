  <script id="_next_DATA__"
    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e概念\u003c/h5\u003e\n\u003cp\u003e数据通信是指数字计算机或其他数字终端设备之间通过通信信道进行的数据交换。计算机中处理、交换和传输的信息都是二进制数据，为区别于电话网中的语音通信，将计算机间的通信称作数据通信。数据通信已经发展成一门独立的学科，它与计算机技术的发展密切相关并相互影响。\n\u003c/p\u003e\n\u003cp\u003e 数据通信的质量有两个最主要的指标：一是数据传输速率，用“比特/秒”（bit/s）来表示；二是误码率，它表示一段时间内接收到的错误比特数与传输的总比特数之比。\u003c/p\u003e\n\u003ch5\u003e数字通信与模拟通信\u003c/h5\u003e\n\u003cp\u003e计算机内部处理的数据都是二进制数，是离散的，即所谓数字的数据。但通信传输系统中经常涉及连续的模拟信号，因而在通信过程中经常要进行信号转换。\u003c/p\u003e\n\u003cp\u003e在日常生活中，经常使用一些在时间轴上连续的数据，如温度和压力、声音和视频等，这些在某个区间上产生连续值的数据，称之为模拟数据。相反，在某个区间上产生的是不连续（离散）值的数据，称之为数字数据，例如文本信息、整数等。\u003c/p\u003e\n\n\u003cp\u003e在通信系统中，利用电信号把数据从一个结点传到另一个结点。这时候，模拟信号是一种连续变化的电磁波，这种电磁波可以按照不同的频率在各种传输介质上传输；数字信号是一系列的电压脉冲，用恒定的正电压来表示1，负电压来表示0。数字信号具有较强的抗干扰能力、易加密处理等优点，但容易衰减，因而较适合于近距离传输（光纤介质例外）。模拟信号具有衰减较少的优点，但抗干扰能力较差，多用于远距离传输。\n\u003c/p\u003e\n\u003cp\u003e\n    数据通信可以通过模拟信道实现，也可以通过数字信道来实现。数据通信利用模拟信道来实现时，数据终端设备（DTE）产生的数字信号首先要转换成模拟信号在信道中传输，这个转换过程称为调制。执行调制功能的变换器称为调制器（Modulator）。通过信道传送到接收端的模拟电信号又要经过一个称为解调器（Demodulator）的反变换器转换成数字终端设备所能接收的数字信号。大多数情况下，通信是双向的，调制器和解调器合在一个装置中，这就是调制解调器（Modem）。\n\u003c/p\u003e\n\u003ch5\u003e多路复用\u003c/h5\u003e\n\u003cp\u003e多路复用技术是利用一条传输线路传送多路信号的技术。由于线路的传输能力往往大于传输一路信号的能力，因此采用多路复用技术把多路信号组合在一条信道上传输可以提高传输效率。\u003c/p\u003e\n\u003cp\u003e频分多路复用 FDM（按频率划分不同的信道）和时分多路复用技术TDM（按时间划分不同的信道）是两种最基本的复用技术。\u003c/p\u003e\n\u003ch6\u003e频分多路复用\u003c/h6\u003e\n\u003cp\u003e在模拟通信中，当传输介质的带宽超过单一信号的带宽时，可将若干路信号调制在不同的频率上，使它们互不干扰地在同一条传输介质上同时转输，到接收端再将它们分离出来，这就是频分多路复用\u003c/p\u003e\n\u003ch6\u003e时分多路复用\u003c/h6\u003e\n\u003cp\u003e在数字传输中，如果传输介质所能传输的数据速率大大超过一路信号的传输速率，就会使线路上传输的有效信号的时间没有充分被利用。因此可以将多路的信号按时间先后顺序排队轮流使用同一传输信道，在时间上将信道分割成若干个小的时间片，每路信号占用一个时间片。这样可在时间上交叉发送每一路信号，实现一条线路传送多路信号的目的。\n\u003c/p\u003e\n\u003ch5\u003e数据交换技术\u003c/h5\u003e\n\u003cp\u003e 在数据通信系统中，网络中的两个设备之间直接连接进行数据通信是较少见的，通常都需要经过中间节点转发数据。这些中间节点提供一种交换功能，使数据从一个节点传到另一个节点，我们把中间节点参与的通信称为交换。\u003c/p\u003e\n\u003cp\u003e计算机通信采用的交换技术主要是电路交换（circuit switching）和分组交换（packet switching）。\u003c/p\u003e\n\u003ch6\u003e电路交换\u003c/h6\u003e\n\u003cp\u003e电路交换方式与电话交换方式的工作过程很类似，两个站点之间进行数据交换之前，首先要在通信子网中建立一个实际的物理连接，在通信过程中，该物理连接为此次通信专用，不得被其他站点使用，在两个站点数据转输完成之后释放该连接。电路交换的通信一般要经历3\n    个阶段：建立电路阶段、传输数据阶段和电路拆除阶段。\u003c/p\u003e\n\u003cp\u003e电路交换的优点是：通信实时性强，适用于交互式会话类通信，比较适用于成批数据的传送。\u003c/p\u003e\n\u003cp\u003e缺点是：一旦建立连接后，即使两个站点间没有数据要传输，网络资源也没法供其他用户使用；此外，建立线路的时间比较长，如果传递的信息很短，则线路的利用率很低。\u003c/p\u003e\n\u003ch6\u003e分组交换\u003c/h6\u003e\n\u003cp\u003e在数据通信中，端系统之间交换的数据往往是随机和突发的，如果这时使用电路交换，就会带来信道容量和有效时间的浪费。目前计算机通信网都采用分组交换方式，分组交换是一种“存储—转发”式的交换，数据以短的分组形式转送。\u003c/p\u003e\n\u003cp\u003e计算机通信时传送的是报文（Message），报文是指由被传递的数据、源地址、目的地址和其他控制信息组成的数据块。把一个长的报文拆分成若干个小的段落称为分组。分组交换不需要事先建立物理通路，只要前方线路空闲，就以分组为单位发送，中间节点接收到一个分组后可以直接转发，而不必等到所有的分组都收到以后再转发，提高了交换速度。接收端收到所有分组后，再按原来的顺序“组装”成原来的报文。分组交换还有一个优点是有限长度的分组可以直接存放在节点的内存中，而不必设置缓存，提高了交换速度。\n\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 互联网","title":"数据通信"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","互联网","数据通信"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
