    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e特点\u003c/h5\u003e\n\u003ch6\u003e开放性\u003c/h6\u003e\n\u003cp\u003e Internet 不属于任何一个国家、部门、单位或个人，并没有一个专门的管理机构对整个网络进行维护。任何用户或计算机只要遵守TCP/IP 协议都可进入Internet。\u003c/p\u003e\n\u003ch6\u003e资源的丰富性\u003c/h6\u003e\n\u003cp\u003e Internet 上有数以千万计的计算机，形成了一个巨大的计算机资源，可以为全球用户提供极其丰富的信息资源。\u003c/p\u003e\n\u003ch6\u003e技术的先进性\u003c/h6\u003e\n\u003cp\u003e Internet\n    是现代化通信技术和信息处理技术的融合。它使用了各种现代通信技术，充分利用了各种通信网，如电话网、数据网、综合通信网。这些通信网遍布全球，并促进了通信技术的发展，如电子邮件、网络视频电话、网络传真、网络视频会议等，增加了人类交流的途径，加快了交流速度，缩短了全世界范围内人与人之间的距离。\n\u003c/p\u003e\n\u003ch6\u003e共享性\u003c/h6\u003e\n\u003cp\u003e Internet 用户在网络上可以随时查阅共享的信息和资料。如果网络上的主机提供共享型数据库，则可供查询的信息会更多。\u003c/p\u003e\n\u003ch6\u003e平等性\u003c/h6\u003e\n\u003cp\u003e Internet 是“不分等级”的，个人、企业、政府、组织之间是平等的、无等级的。\u003c/p\u003e\n\u003ch6\u003e交互性\u003c/h6\u003e\n\u003cp\u003e Internet 可以作为平等、自由的信息沟通平台，信息的流动和交互是双向的，信息沟通双方可以平等地进行交互，及时获得所需信息。\u003c/p\u003e\n\u003ch6\u003e低廉性\u003c/h6\u003e\n\u003cp\u003e Internet\n    是从学术信息交流开始，人们已经习惯于免费使用。进入商业化之后，网络服务供应商（ISP）一般采用低价策略占领市场，使用户支付的通信费和网络使用费等大为降低，增加了网络的吸引力。目前，在Internet\n    上的许多信息和资源都是免费的。\u003c/p\u003e\n\u003cp\u003e 另外，Internet 还具有合作性、虚拟性、个性化和全球性的特点。\u003c/p\u003e\n\u003ch5\u003e接入方式\u003c/h5\u003e\n\u003cp\u003e接入网更通俗地讲就是接入方式，即用户如何把自己的单机或局域网连接到主干网的一种技术，常见的Internet 接入方式有：拨号网络（PSTN+Modem）、ISDN、DDN 专线、ADSL、无线接入技术等。\u003c/p\u003e\n\u003ch6\u003e拨号网络\u003c/h6\u003e\n\u003cp\u003e拨号网络是一种传统的接入技术，使用时一般是利用Modem 通过公用电话网（简称为PSTN+Modem），采用PPP（一种通信协议）方式上网，理论上可获得最高56 kbit/s\n    的接入速率。速度慢是拨号网络最主要的缺点，主要适用于业务量较小的单位和个人。因为电信局的电话线已遍布家庭、企事业单位，而Modem 和接入服务器安装简单、成本低廉，所以，开通非常方便，但在稳定性和速度方面有局限。\u003c/p\u003e\n\u003ch6\u003eISDN\u003c/h6\u003e\n\u003cp\u003eISDN（Integrated Service Digital\n    Network）是综合业务数字网的简称。它采用数字传输和数字交换技术，将电话、传真、数据、图像等多种业务综合在一个统一的数字网络中进行传输和处理。用户利用一条ISDN\n    用户线路，可以在上网的同时拨打电话、收发传真，就像两条电话线一样。\u003c/p\u003e\n\u003cp\u003eISDN 基本速率接口有两条64 kbit/s 的信息通路和一条16 kbit/s 的信令通路，简称2B+D，当有电话拨入时，它会自动释放一个B 信道来进行电话接听。\u003c/p\u003e\n\u003cp\u003eISDN 方式接入Internet 的优势有：ISDN 为端到端的全程数字信号传输，业务质量更高，安全可靠性远高于模拟方式（PSTN+Modem）；ISDN 适用于传输综合图像、数据、语音等多媒体信息。\u003c/p\u003e\n\u003ch6\u003e专线方式\u003c/h6\u003e\n\u003cp\u003eDDN（Digital Data Network，数字数据网）是常用的专线方式接入方式，DDN 的通信速率可根据用户需要在N×64 kbit/s（N=1～32）（即从64 kbit/s 到2\n    Mbit/s）之间进行选择，当然速度越快，租用费用也越高。DDN 可以向用户提供点对点、点对多点透明传输的数据专线出租电路，为用户传输数据、图像、声音等信息。\u003c/p\u003e\n\u003cp\u003eDDN 的基本业务是向用户提供N×64 kbit/s（N=1～32）速率的全透明的专用电路，替代模拟专线网或电话网上开放的数据业务。此外还可提供点到多点通信业务，帧中继业务，语音、G3传真业务，虚拟专用网功能（VPN）业务等。\n\u003c/p\u003e\n\u003cp\u003e专线接入方式的特点是高速、稳定、误码率低、不用拨号、7×24 小时永久连接。适用于大业务量的网络用户，一般是企业单位使用。使用专线方式入网后，用户网上的所有工作站和终端可以同时享用Internet 的网上业务。\u003c/p\u003e\n\u003ch6\u003eADSL\u003c/h6\u003e\n\u003cp\u003eADSL，即非对称数字用户线，它允许在电话线上在不影响现有的PSTN 电话业务的情况下进行非对称性高速数据传输。其上行速率为224 kbit/s～640 kbit/s；下行速率为1.544 Mbit/s～9.2\n    Mbit/s；传输距离为2.7 km～5.5 km。\u003c/p\u003e\n\u003cp\u003eADSL 这种非对称传输的特性与我们现在使用因特网的特点相符，因为我们上网时经常下载资料，而很少上传资料。\u003c/p\u003e\n\u003cp\u003eADSL 是在电话用户线上采用分离器（Splitter）的方法将模拟话音通道与数字调制解调器分开，即使ADSL 连接失败也不会影响话音服务。ADSL 技术的主要特点是充分利用现有铜缆网络（电话线网络），在线路两端加装ADSL\n    设备为用户提供高带宽服务。ADSL 的另外一个优点在于和普通电话共存于一条电话线上，接听、拨打电话的同时进行ADSL 传输。但由于有一定距离的限制，使得离电话交换局较远的地区不能使用\u003c/p\u003e\n\n\u003ch6\u003e无线接入技术\u003c/h6\u003e\n\u003cp\u003e无线接入技术分为两种：一种为固定接入方式，包括微波、激光、卫星；另一种为移动接入方式，包括CDPD（蜂窝数字分组数据）、电路交换蜂窝、专用分组无线电传输。最近开始兴起的WAP（无线应用协议）是无线技术实用化的一个典型代表。\n\u003c/p\u003e\n\u003ch6\u003e通过局域网接入\u003c/h6\u003e\n\u003cp\u003e 通过局域网接入是借助与Internet 连接的网络连接到Internet 上。实际上是将计算机与局域网中的服务器连接，再通过服务器上网。\n    这种上网方式需要网卡和专线，还要配置TCP/IP 的属性。可在TCP/IP 的属性里进行设置，包括：本机的IP 地址、子网掩码、网关的IP 地址和DNS 服务器的IP 地址。机关、学校、企业和小区都采用这种上网方式。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 互联网","title":"互联网"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","互联网","互联网"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
