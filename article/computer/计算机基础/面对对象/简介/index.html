                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e简介\u003c/h5\u003e\n\u003cp\u003e面向对象的开发方法完全不同于传统开发方法，它是20世纪90年代的主流开发方法。面向对象方法的基本指导思想是：在进行软件系统开发时，尽可能按人类的思维方式，从现实世界的客观现状出发，去考虑软件开发的方法。在这一思想方法的指导下，面向对象的方法将客观世界刻画成各种各样的对象，并以此为核心分析问题和解决问题。每一个对象都有其特定的属性和行为，对象是通过一组属性或方法被操纵，并通过消息协议进行相互通信。\n\u003c/p\u003e\n\u003cp\u003e面向对象的方法和技术包括面向对象分析、面向对象设计和面向对象的编程3 个部分。面向对象开发方法有Booch 方法、Coad 方法和OMT\n    方法等。为了统一各种面向对象方法的术语、概念和模型，1997年推出了统一建模语言，即UML（Unifiied Modeling\n    Language）语言。它是面向对象的标准建模语言，通过统一的语义和符号表示，把各种方法的建模过程和表示统一起来，将成为面向对象建模的工业标准。\u003c/p\u003e\n\u003cp\u003e面向对象的方法起源于面向对象的程序设计语言。1967年挪威科学家研制的 Simula 语言首次引入面向对象概念，到了20世纪90年代随着面向对象技术的广泛使用，逐渐成为各软件设计专业人员的首选方法。\u003c/p\u003e\n\u003cp\u003e面向对象的方法是以数据为中心，将数据和处理相结合的一种方法。它把对象看做是一个由数据及可以施加的操作构成的统一体。对象与数据有着本质的区别。传统的数据是被动的，它等待着外界对它施加操作。而对象是处理的主体，要想使对象实施某一操作，必须发消息给对象，请求对象主动地执行该操作，外界是不能直接对对象施加操作的。\n\u003c/p\u003e\n\u003cp\u003e面向对象的方法是用一种新的思维方法，它不是把程序看做工作在数据上的一系列过程或函数的集合，而是把程序看作是相互协作而又彼此独立的对象的集合。每个对象就是一个微型程序，有自己的数据、操作、功能和目的。\u003c/p\u003e\n\u003cp\u003e用面向对象方法开发软件的过程如下：首先是分析用户需求，从实际问题中抽取对象模型；然后将模型细化，设计对象类，包括类的属性和类之间的相互关系，同时考虑是否有可以直接引用的已有的类或部件；而后选定一种面向对象的编程语言，用具体编码实现类的设计；最后进行测试，实现整个软件系统的设计。\n\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 面对对象","title":"简介"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","面对对象","简介"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
