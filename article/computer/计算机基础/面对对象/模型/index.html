    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e面向对象分析\u003c/h5\u003e\n\u003cp\u003e 面向对象分析就是抽取和整理用户需求并建立问题域精确模型的过程。在这个阶段的主要工作就是通过对用户的需求分析，建立3 种模型，它们是对象模型、动态模型和功能模型。\u003c/p\u003e\n\u003ch6\u003e对象模型\u003c/h6\u003e\n\u003cp\u003e对象模型用专门的图形工具描述了客观世界实体对象以及对象之间的联系。它是系统的静态结构。它描述了对象的结构、属性和操作以及对象之间的关联关系。\u003c/p\u003e\n\u003ch6\u003e动态模型\u003c/h6\u003e\n\u003cp\u003e动态模型描述了系统的控制结构。它表示了瞬时的、行为化的系统控制性质，它关心的是系统的控制、操作的执行顺序，它从对象的事件和状态角度出发，表现了对象的相互行为。它在开发交互式系统时非常重要。\u003c/p\u003e\n\u003ch6\u003e功能模型\u003c/h6\u003e\n\u003cp\u003e功能模型描述了系统中数据之间的依赖关系以及有关的数据处理功能，它由一组数据流图组成。\n    面向对象分析的过程从分析陈述用户需求的文件开始，经系统分析员和用户的反复交流确定，再由系统分析员充分理解、抽象，最终用精确的模型表示出来。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 面对对象","title":"模型"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","面对对象","模型"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
