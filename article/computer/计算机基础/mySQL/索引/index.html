    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e为了效率\u003c/h5\u003e\n\u003cp\u003e表的类型不同，索引的存放位置不同。对于 MyISAM\n    表，数据行放在数据文件里，索引值放在索引文件里，一个表可以有多个索引，这些索引都放在一个索引里，一个索引其实就是一个排好序的键值数组，正是通过这些键值才可以实现对数据文件的快速定位访问。对于 InnoDB\n    表，它的索引也是排好序的数组，但它的数据行与索引值是存放在同一个文件里的，存放在同一个表空间里面。\n\u003c/p\u003e\n\u003ch6\u003e缺点\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e索引需要使用更多的磁盘空间，索引越多，占用的磁盘空间越大\u003c/li\u003e\n    \u003cli\u003e索引在加快检查速度的同时，降低了插入、更新、删除的操作速度\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e创建\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003ecreate index \u003cspan class=\"dust\"\u003emain_id\u003c/span\u003e   on \u003cspan class=\"dust\"\u003emain\u003c/span\u003e \n\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e创建\u003c/h6\u003e\n\u003cp\u003e使用 alter 修改表结构：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003ealter table \u003cspan class=\"dust\"\u003emain\u003c/span\u003e add index \u003cspan class=\"dust\"\u003emain_id\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e创建\u003c/h6\u003e\n\u003cp\u003e创建表的时候指定。\u003c/p\u003e\n\u003ch5\u003e删除索引\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003edrop  index \u003cspan class=\"dust\"\u003emain_id\u003c/span\u003e on \u003cspan class=\"dust\"\u003emain\u003c/span\u003e;\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e唯一索引\u003c/h5\u003e\n\u003ch6\u003e创建\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003ecreate unique index \u003cspan class=\"dust\"\u003emain_id\u003c/span\u003e   on \u003cspan class=\"dust\"\u003emain\u003c/span\u003e \n\u003c/span\u003e\n\u003ch6\u003e创建\u003c/h6\u003e\n\u003cp\u003e使用 alter 修改表结构：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n\u003cspan class=\"p\"\u003ealter table \u003cspan class=\"dust\"\u003emain\u003c/span\u003e add unique \u003cspan class=\"dust\"\u003emain_id\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e创建\u003c/h6\u003e\n\u003cp\u003e创建表的时候指定。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ mySQL","title":"索引"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","mySQL","索引"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
