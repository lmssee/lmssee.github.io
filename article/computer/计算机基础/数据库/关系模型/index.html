class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>关系模型</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e概念\u003c/h5\u003e\n\u003ch6\u003e关系模型\u003c/h6\u003e\n\u003cp\u003e用二维表格结构来表示实体及实体间的联系的模型称为“关系模型”。\u003c/p\u003e\n\u003ch6\u003e属性和值域\u003c/h6\u003e\n\u003cp\u003e在二维表格中的列（字段、数据项）称为属性，列值称为属性值，属性值的取值范围称为值域。\u003c/p\u003e\n\u003ch6\u003e关系模式\u003c/h6\u003e\n\u003cp\u003e在二维表格中，表名及表中行结构定义（记录的型）的集合称为关系模式。它包括关系名、属性名、值域、初始值等的定义。一般可表示为R（A1，A2，…，An），其中R 为关系名，A1，A2，…，An 为属性名；或者表示为R（U），U\n    是属性的集合。\u003c/p\u003e\n\u003ch6\u003e元组与关系\u003c/h6\u003e\n\u003cp\u003e在二维表中的行（记录的值）称为元组，元组的集合称为关系，关系模式通常也称为关系。\u003c/p\u003e\n\u003ch6\u003e关键字或码\u003c/h6\u003e\n\u003cp\u003e在关系的属性中，能够用来唯一标识一个元组的属性（或属性组合）称为关键字或码（Key）。\u003c/p\u003e\n\u003ch6\u003e候选关键字或候选码\u003c/h6\u003e\n\u003cp\u003e如果一个关系中，存在着多个属性（或属性组合）都能用来唯一标识该关系的元组，这些属性或属性的组合都称为该关系的候选关键字或候选码。\u003c/p\u003e\n\u003ch6\u003e主关键字或主码\u003c/h6\u003e\n\u003cp\u003e在一个关系中的若干候选码中指定为关键字的属性（或属性组合）称为该关系的主关键字或主码。\u003c/p\u003e\n\u003ch6\u003e外部关键字或外键\u003c/h6\u003e\n\u003cp\u003e当关系中的某个属性或属性组合虽不是该关系的关键字或只是关键字的一部分，但却是另一个关系的关键字时，称该属性或属性的组合为这个关系的外部关键字或外键。\u003c/p\u003e\n\u003ch6\u003e非主属性或非码属性\u003c/h6\u003e\n\u003cp\u003e关系中不组成码的属性均为非主属性或非码属性。\u003c/p\u003e\n\u003ch6\u003e关系模型的性质\u003c/h6\u003e\n\u003cp\u003e每一列中的分量是类型相同的数据；列的顺序可以是任意的；行的顺序可以是任意的；表中的分量是不可再分割的最小数据项，即表中不允许有子表；表中的任意两行不能完全相同。\u003c/p\u003e\n\u003ch5\u003e关系的完整性\u003c/h5\u003e\n\u003cp\u003e数据完整性是指关系模型中数据的正确性与一致性。关系模型允许定义3\n    类完整性约束：实体完整性、参照完整性和用户自定义的完整性约束。关系数据库系统提供了对实体完整性、参照完整性约束的自动支持，就是在插入、修改、删除操作时，数据库系统自动保证数据的正确性与一致性。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e实体完整性规则（Entity Integrity Rule）。这条规则要求关系中的元组在组成主键的属性上不能为空\u003c/li\u003e\n    \u003cli\u003e参照完整性规则（Reference Integrity Rule）。首先如果在一个关系中定义有外键F，则我们把这个表称为被参照表，而把外键F 所在的另一个表（也可为本表，F\n        为表的主码或主码的一部分）称为参照表。参照完整性规则要求参照表中F 的属性值或者为空，或者等于被参照表中某个元组F\n        属性列的值\u003c/li\u003e\n    \u003cli\u003e用户自定义的完整性规则。用户自定义的完整性规则是应用领域需要遵守的约束条件，体现了具体应用领域的语义约束\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e运算\u003c/h5\u003e\n\u003cp\u003e关系在数学上表示的是序对的集合，所以关系运算的特点是集合运算，即运算的对象和结果都是集合。关系的主要运算有选择（Select）、投影（Project）、连接（Join）、并（Union）、交（Intersection）、差（\n    Difference）、广义笛卡儿积（Extended Cartesion\n    Product）、除（Divide）等，其中选择、投影、连接运算是关系的主要特征。关系运算可以用关系代数来表达，也可以用元组关系演算或域关系演算表达，它们表达了抽象的查询语言，这些抽象的语言与具体的DBMS\n    中实现语言并不完全一致，但却是DBMS 中实现语言的基础。\u003c/p\u003e\n\u003ch6\u003e并\u003c/h6\u003e\n\u003cp\u003e设关系R 和关系S 具有相同的目n（即R 和S 有n 个属性），且相应的属性取自同一个域，关系R 和关系S 的并记做：RUS，由属于R 或属于S 的元组组成，结果仍为n 目关系。\u003c/p\u003e\n\u003ch6\u003e差\u003c/h6\u003e\n\u003cp\u003e设关系R 和关系S 具有相同的目n（即R 和S 有n 个属性），且相应的属性取自同一个域，关系R 和关系S 的差记做：R-S，由属于R 而不属于S 的元组组成，结果仍为n 目关系\u003c/p\u003e\n\u003ch6\u003e广义笛卡儿积\u003c/h6\u003e\n\u003cp\u003e两个分别为n 目和m 目的关系R 和S 的广义笛卡儿积R×S 是一个（n+m）列的元组的集合。元组的前n 列是关系R 的一个元组，后m 列是关系S 的一个元组。若R 有kl 个元组，S 有k2 个元组，则R×S 有kl×k2\n    个元组。\u003c/p\u003e\n\u003ch6\u003e选择\u003c/h6\u003e\n\u003cp\u003e选择运算是一个单目运算，是从关系R 中选取满足一定条件的元组子集。\u003c/p\u003e\n\u003ch6\u003e投影\u003c/h6\u003e\n\u003cp\u003e投影运算也是一个单目运算，是从关系 R 中选取所需的列组成一个新关系\u003c/p\u003e\n\u003ch6\u003e连接\u003c/h6\u003e\n\u003cp\u003e连接运算是从两个关系的笛卡儿积中选取属性间满足一定连接条件的元组集合。自然连接是一种特殊的最有用的连接运算，参加连接的两个关系具有部分同名的属性，则两个关系中同名属性值相等的连接称为自然连接，连接结果要把重复的属性去掉，即重复的列只保留一个。\n\u003c/p\u003e\n\u003ch5\u003e关系数据库的规范化理论\u003c/h5\u003e\n\u003cp\u003e\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据库","title":"关系模型"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据库","关系模型"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
