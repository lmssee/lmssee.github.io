="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>系统结构</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e数据库系统结构\u003c/h5\u003e\n\u003cp\u003e数据库系统具有三级模式结构和二级映象功能，这保证了数据库的物理独立性和逻辑独立性。\u003c/p\u003e\n\u003ch5\u003e三级模式结构\u003c/h5\u003e\n\u003cp\u003e数据库的三级模式结构。在数据模型中有“型”（type）和“值”（value）的概念。型是指对某一类数据的结构和属性的说明；值是型的一个具体赋值。型就好比是装书的书架，值是书架中装的图书，书架一般是不变的，而书架中的图书则会经常发生变化。数据库中的模式即是型，例如，学生档案表（学号，姓名，性别，年龄，系别，籍贯）就是记录模式，而某一个学生的具体数据（20221123，张某某，男，0，高分子材料，哈尔滨）则是该记录模式的一个值。模式的一个具体值称为模式的一个实例（instance），同一个模式可以有多个实例。模式是相对稳定的，而实例则是相对变动的。模式反映的是数据的结构及其关系；而实例反映的则是数据库某一时刻的状态。数据库系统的三级模式为模式、外模式和内模式。\n\u003c/p\u003e\n\u003ch6\u003e模式\u003c/h6\u003e\n\u003cp\u003e是数据库中全体数据的逻辑结构和特征的描述，是所有用户的公共数据视图。它是数据库系统模式结构的中间层，不涉及存储结构、访问技术细节和硬件环境，也不涉及具体的应用程序以及开发工具。它以某一个数据模型为基础，综合地考虑全体用户的需求定义而成。它不但要描述记录的内部结构，还要描述记录之间的联系、所允许的操作、完整性约束等要求。\n    模式也称为概念模式或逻辑模式，一个数据库只有一个模式。\u003c/p\u003e\n\u003ch6\u003e外模式\u003c/h6\u003e\n\u003cp\u003e数据库用户（包括程序员和最终用户）能够看见和使用的局部数据结构和特征的描述，是用户的数据视图，是与某一应用有关的数据的逻辑表示。\n    一个数据库可以有多个外模式。这是因为数据库是面向全体用户建立的，而用户在应用需求、看待数据的方式、对数据保密的要求等方面存在差异，因此他们的外模式描述就是不同的。外模式是应用户的需求而建立的，一个应用程序可以对应一个或多个外模式。使用外模式可以有效地保证数据库的安全。\n    外模式是概念模式的逻辑子集，也称子模式或用户模式。\u003c/p\u003e\n\u003ch6\u003e内模式\u003c/h6\u003e\n\u003cp\u003e数据物理结构和存储结构的描述，是数据在数据库内部的表示方式。例如，记录的存储方式，索引按何种方式组织，数据是否压缩存储、是否加密，数据的存储记录格式有何规定等。一个数据库只有一个内模式，它仍独立于具体的存储设备。内模式也称存储模式。\n\u003c/p\u003e\n\u003cp\u003e模式是三级模式结构中的中心与关键，独立于其他模式，因此在设计数据库模式时，应首先设计数据库的模式。\u003c/p\u003e\n\u003cp\u003e数据库系统的三级模式是对数据的3 个抽象级别，是数据库系统为用户提供的一种方便使用环境，数据库系统的三级模式由系统设计人员、数据库管理员及DBMS 负责定义和管理，用户不必关心系统内部的变化，这极大地减少了应用程序的负担。\n\u003c/p\u003e\n\u003ch5\u003e二级映像功能\u003c/h5\u003e\n\u003ch6\u003e模式/内模式映像\u003c/h6\u003e\n\u003cp\u003e数据库只有一个模式，也只有一个内模式，所以模式/内模式映象是唯一的。这个映象实现了模式到内模式间的转换。该映象一般放在内模式中描述。\n    当数据库的内模式修改时，我们只需修改模式/内模式映象，而模式保持不变，从而用户的应用程序也不变，这就是数据库的物理独立性。\u003c/p\u003e\n\u003ch6\u003e外模式/模式映象\u003c/h6\u003e\n\u003cp\u003e数据库只有一个模式，但可以有多个外模式，所以数据库有多个外模式/模式映象，每一个外模式对应一个，它实现了模式到外模式之间的转换。这些映象定义通常包含在各自的外模式描述中。\n    当数据库的整体逻辑结构（即模式）修改时，我们只需修改外模式/模式映象，而外模式保持不变，从而用户的应用程序也不变，这就是数据库的逻辑独立性。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据库","title":"系统结构"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据库","系统结构"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
