class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>数据模型</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e概念模型\u003c/h5\u003e\n\u003cp\u003e概念模型也称为信息模型，是抽象地描述现实世界中的各种客观事物及其相互关系的一种模型。在进行数据库设计时，人们总是先把现实世界转换为概念模型，然后再把概念模型转换为某一种数据模型。所以它是数据库设计人员进行数据库设计的有力工具，也是数据库设计人员和用户之间进行交流的语言。\n    概念模型的表示方法很多，其中最为著名的是P.P.S.Chen 于1976年提出的实体-联系方法（Entity-Relationship Approach）。用该方法建立的模型也称为E-R 模型。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e实体：客观存在并且可以相互区别的事物称为实体\u003c/li\u003e\n    \u003cli\u003e属性：对实体特征的描述称为属性\u003c/li\u003e\n    \u003cli\u003e码：唯一标识实体的属性集称为码\u003c/li\u003e\n    \u003cli\u003e域：属性的取值范围称为该属性的域\u003c/li\u003e\n    \u003cli\u003e实体型和实体集：实体型就是所有属性的集合，表示一种类型。同类型的实体的集合构成了实体集\u003c/li\u003e\n    \u003cli\u003e联系：实体之间的对应关系称为联系，它反映事物之间的相互关系。联系有3 种，即一对一联系、一对多联系和多对多联系\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e三要素\u003c/h5\u003e\n\u003cp\u003e数据模型是抽象地描述现实世界中数据的内部结构及其相互关系的一系列严格定义的概念的集合。这些概念精确地描述了数据的静态特性、动态特性和完整性约束条件。因此数据模型通常由数据结构、数据操作和完整性约束3 个要素组成。\u003c/p\u003e\n\u003ch6\u003e数据结构\u003c/h6\u003e\n\u003cp\u003e数据结构用于描述系统的静态特性，是所研究的对象类型的集合。它们包括两类：一类是与实体结构有关的对象；一类是与实体之间联系有关的对象。\n    数据结构是一个数据模型性质最重要的方面。因此在数据库系统中，人们通常按照其数据结构的类型来命名数据模型。例如层次结构、网状结构和关系结构的数据模型分别命名为层次模型、网状模型和关系模型。\u003c/p\u003e\n\u003ch6\u003e数据操作\u003c/h6\u003e\n\u003cp\u003e数据操作用于描述系统的动态特性，是对数据库中各种对象类型的实例所允许执行操作的集合，并包括各种操作的规则。数据库基本操作主要是查询、插入、删除、修改等操作。数据模型要定义这些操作的确切含义、操作规则及实现操作的语言。\u003c/p\u003e\n\u003ch6\u003e数据的完整性约束条件\u003c/h6\u003e\n\u003cp\u003e数据的完整性约束条件给出数据模型中的数据及其联系所具有的制约和依赖规则，这些规则用于限定数据库的状态及状态的变化，以保证数据库中数据的正确、有效和相容。\u003c/p\u003e\n\u003ch5\u003e层次模型\u003c/h5\u003e\n\u003cp\u003e像极了二叉树结构，但是可以有多子节点。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e有且仅有一个节点无父节点，该节点为跟节点\u003c/li\u003e\n    \u003cli\u003e其他节点均只有一个父节点\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e特点\u003c/h6\u003e\n\u003cp\u003e任何一个记录值只有按其路径查看时，才能显示出它全部的意义，没有一个子女记录能够脱离双亲记录值而独立存在。\u003c/p\u003e\n\u003ch6\u003e优点\u003c/h6\u003e\n\u003cp\u003e结构简单；对于实体联系固定的系统，其性能优于关系模型，不低于网状模型；能提供良好的完整性支持。\u003c/p\u003e\n\u003ch6\u003e缺点\u003c/h6\u003e\n\u003cp\u003e只能表示l∶m 联系，虽有多种辅助手段实现m∶n 联系，但较复杂不易掌握；此外，由于层次顺序严格，数据的查询、插入、删除也复杂，因此应用程序的编写比较复杂。\u003c/p\u003e\n\u003ch5\u003e网状模型\u003c/h5\u003e\n\u003cp\u003e网状结构是一个网络。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e允许一个以上节点无父节点\u003c/li\u003e\n    \u003cli\u003e一个节点可以有多于一个父节点\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e特点\u003c/h6\u003e\n\u003cp\u003e允许多个结点没有双亲结点；允许结点有多个双亲结点；同时还允许两个结点间有多种联系。\u003c/p\u003e\n\u003ch6\u003e优点\u003c/h6\u003e\n\u003cp\u003e可以直接表示现实世界；具有良好的性能，存取效率较高。\u003c/p\u003e\n\u003ch6\u003e缺点\u003c/h6\u003e\n\u003cp\u003e结构复杂，不宜使用。\u003c/p\u003e\n\u003ch5\u003e关系模型\u003c/h5\u003e\n\u003cp\u003e关系模型中数据的逻辑结构是一张二维表，称之为关系。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据库","title":"数据模型"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据库","数据模型"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
