    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e攻击方法\u003c/h5\u003e\n\u003ch6\u003e获取口令\u003c/h6\u003e\n\u003cp\u003e 获取口令的方法有3 种：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e通过网络监听非法得到用户口令，这类方法有一定的局限性，但危害性极大，监听者往往能够获得其所在网段的所有用户账号和口令，对局域网安全威胁巨大\u003c/li\u003e\n    \u003cli\u003e在知道用户的账号后利用一些专用软件强行破解用户口令，这种方法不受网段限制，但黑客要有足够的耐心和时间\u003c/li\u003e\n    \u003cli\u003e在获得一个服务器上的用户口令文件后，用暴力破解程序破解用户口令，该方法的使用前提是黑客获得口令的Shadow 文件，此方法在所有方法中危害最大\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e放置特洛伊木马程序\u003c/h6\u003e\n\u003cp\u003e特洛伊木马程序可以直接侵入用户的电脑并进行破坏，它常被伪装成工具程序或者游戏等诱使用户打开带有特洛伊木马程序的邮件附件或从网上直接下载，一旦用户打开了这些邮件的附件或者执行了这些程序之后，它们就会像古特洛伊人在敌人城外留下的藏满士兵的木马一样留在自己的电脑中，并在自己的计算机系统中隐藏一个可以在Windows\n    启动时悄悄执行的程序。当连接到因特网上时，这个程序就会通知黑客，报告IP\n    地址以及预先设定的端口。黑客在收到这些信息后，再利用这个潜伏在其中的程序，就可以任意地修改您的计算机的参数设定、复制文件、窥视你整个硬盘中的内容等，从而达到控制你的计算机的目的。 \u003c/p\u003e\n\u003ch6\u003eWWW 的欺骗技术\u003c/h6\u003e\n\u003cp\u003e在网上用户可以利用IE 等浏览器进行各种各样的Web\n    站点的访问，如阅读新闻组、咨询产品价格、订阅报纸、电子商务等。然而一般的用户恐怕不会想到有这些问题存在：正在访问的网页已经被黑客篡改过，网页上的信息是虚假的!例如黑客将用户要浏览的网页的URL\n    改写为指向黑客自己的服务器，当用户浏览目标网页时，实际上是向黑客服务器发出请求，那么黑客就可以达到欺骗的目的了。 \u003c/p\u003e\n\u003ch6\u003e电子邮件攻击\u003c/h6\u003e\n\u003cp\u003e电子邮件攻击主要表现为两种方式：一种是电子邮件轰炸和电子邮件“滚雪球”，也就是通常所说的邮件炸弹，指的是用伪造的IP\n    地址和电子邮件地址向同一信箱发送数以千计、万计甚至无穷多次的内容相同的垃圾邮件，致使受害人邮箱被“炸”，严重者可能会给电子邮件服务器操作系统带来危险，甚至瘫痪；另一种是电子邮件欺骗，攻击者佯称自己为系统管理员（邮件地址和系统管理员完全相同），给用户发送邮件要求用户修改口令（口令可能为指定字符串）或在类似正常的附件中加载病毒或其他木马程序（据笔者所知，某些单位的网络管理员有定期给用户免费发送防火墙升级程序的义务，这为黑客成功地利用该方法提供了可乘之机），这类欺骗只要用户提高警惕，一般危害性不是太大。\n\u003c/p\u003e\n\u003ch6\u003e通过一个节点来攻击其他节点\u003c/h6\u003e\n\u003cp\u003e黑客在突破一台主机后，往往以此主机作为根据地，攻击其他主机（以隐蔽其入侵路径，避免留下蛛丝马迹）。他们可以使用网络监听方法，尝试攻破同一网络内的其他主机；也可以通过IP\n    欺骗和主机信任关系，攻击其他主机。这类攻击很狡猾，但由于某些技术很难掌握，如IP 欺骗，因此较少被黑客使用。 \u003c/p\u003e\n\u003ch6\u003e网络监听\u003c/h6\u003e\n\u003cp\u003e网络监听是主机的一种工作模式，在这种模式下，主机可以接收到本网段在同一条物理通道上传输的所有信息，而不管这些信息的发送方和接收方是谁。此时，如果两台主机进行通信的信息没有加密，只要使用某些网络监听工具，例如NetXray\n    for Windows 95/98/NT，Sniffit for Linux/Solaries\n    等就可以轻而易举地截取包括口令和账号在内的信息资料。虽然网络监听获得的用户账号和口令具有一定的局限性，但监听者往往能够获得其所在网段的所有用户账号及口令。 \u003c/p\u003e\n\u003ch6\u003e寻找系统漏洞\u003c/h6\u003e\n\u003cp\u003e许多系统都有这样那样的安全漏洞（Bugs），其中有些是操作系统或应用软件本身具有的，还有一些漏洞是由于系统管理员配置错误引起的，如在网络文件系统中，将目录和文件以可写的方式调出，将未加Shadow\n    的用户密码文件以明码方式存放在某一目录下，这都会给黑客带来可乘之机，应及时加以改正。 \u003c/p\u003e\n\u003ch6\u003e利用账号进行攻击\u003c/h6\u003e\n\u003cp\u003e有的黑客会利用操作系统提供的默认账户和密码进行攻击，例如许多UNIX 主机都有FTP 和Guest 等默认账户（其密码和账户名同名），有的甚至没有口令。黑客用UNIX\n    操作系统提供的命令如Finger 和Ruser\n    等收集信息，不断提高自己的攻击能力。这类攻击只要系统管理员提高警惕，将系统提供的默认账户关掉或提醒无口令用户增加口令，一般都能克服。\u003c/p\u003e\n\u003ch5\u003e防范\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e经常做telnet、FTP\n        等需要传送口令的重要机密信息应用的主机应该单独设立一个网段，以避免某一台个人机器被攻破，被攻击者装上sniffer，造成整个网段通信全部暴露。有条件的情况下，重要主机装在交换机上，这样可以避免sniffer\n        偷听密码。 \u003c/li\u003e\n    \u003cli\u003e专用主机只开专用功能，如运行网管、数据库重要进程的主机上不应该运行如send mail 这种bug 比较多的程序。网管网段路由器中的访问控制应该限制在最小限度，研究清楚各进程必需的进程端口号，关闭不必要的端口。\n    \u003c/li\u003e\n    \u003cli\u003e对用户开放的各个主机的日志文件全部定向到一个syslogd server 上，集中管理。该服务器可以由一台拥有大容量存储设备的UNIX 或NT 主机承当。定期检查备份日志主机上的数据。 \u003c/li\u003e\n    \u003cli\u003e网管不得访问Internet，并建议设立专门机器使用FTP 或WWW 下载工具和资料。 \u003c/li\u003e\n    \u003cli\u003e提供电子邮件、WWW、DNS 的主机不安装任何开发工具，避免攻击者编译攻击程序。 \u003c/li\u003e\n    \u003cli\u003e网络配置原则是“用户权限最小化”，例如关闭不必要或者不了解的网络服务，不用电子邮件寄送密码。 \u003c/li\u003e\n    \u003cli\u003e下载安装最新的操作系统及其他应用软件的安全和升级补丁，安装几种必要的安全加强工具，限制对主机的访问，加强日志记录，对系统进行完整性检查，定期检查用户的脆弱口令，并通知用户尽快修改。重要用户的口令应该定期修改（不长于3\n        个月），不同主机使用不同的口令。 \u003c/li\u003e\n    \u003cli\u003e定期检查系统日志文件，在备份设备上及时备份。制定完整的系统备份计划，并严格实施。 \u003c/li\u003e\n    \u003cli\u003e定期检查关键配置文件（最长不超过1 个月）。 \u003c/li\u003e\n    \u003cli\u003e制定详尽的入侵应急措施以及汇报制度。发现入侵迹象，立即打开进程记录功能，同时保存内存中的进程列表以及网络连接状态，保护当前的重要日志文件，如果有条件，立即打开网段上另外一台主机监听网络流量，尽量定位入侵者的位置。如有必要，断开网络连接。在服务主机不能继续服务的情况下，应该有能力从备份磁带中恢复服务到备份主机上。\n    \u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 信息安全","title":"网络攻击"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","信息安全","网络攻击"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
