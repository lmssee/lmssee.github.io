                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定义\u003c/h5\u003e\n\u003cp\u003e计算机网络安全是指网络系统的硬件、软件及其系统中的数据受到保护，避免因偶然的或者恶意的原因而遭到破坏、更改、泄露，保证系统能连续、可靠、正常地运行。其特征是针对网络本身可能存在的安全问题，实施网络安全方案，以保证计算机网络自身的安全性为目标。网络安全本质上就是网络信息的安全问题。从广义上讲，凡是涉及网络信息的保密性、完整性、可用性、真实性和可控性的相关技术和理论都是网络安全的研究领域，而且因各主体所处的角度不同，对网络安全也有不同的理解。\n\u003c/p\u003e\n\u003cp\u003e计算机网络是计算机系统的一个特例，一方面它具有信息安全的特点，另一方面又与主机系统式的计算机系统不同。计算机网络必须增加对通信过程的控制，加强网络环境下的身份认证，由统一的网络操作系统贯彻其安全策略，提高网络上各节点的整体安全性。根据这些特性，网络安全应包括以下几个方面：物理安全、人员安全、符合瞬时电磁脉冲辐射标准（TEMPEST）、信息安全、操作安全、通信安全、计算机安全和工业安全。\n\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 信息安全","title":"定义"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","信息安全","定义"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
