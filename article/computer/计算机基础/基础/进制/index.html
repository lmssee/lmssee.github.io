    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e分类\u003c/h5\u003e\n\u003cp\u003e进位计算制是为了方便机器和人而生，分为二进制、八进制、十六进制、十进制等。\u003c/p\u003e\n\u003cp\u003e数值的基数用来标识是哪种进制，在数的后面添加大写字母，例如：B 代表二进制、O 代表八进制、D 代表十进制（或不带）、H 代表十六进制。\u003c/p\u003e\n\u003cp\u003e在进位计算制中，每一位数值都会有其权重。\u003c/p\u003e\n\u003ch5\u003e转换\u003c/h5\u003e\n\u003cp\u003e根据权重和基数进行转换。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e100 = 1100100B\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e数据表示\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e字节：计算机内部以字节为单位进行储存，一个字节由八位二进制组成\u003c/li\u003e\n    \u003cli\u003e字长：同一类型数据占用字节\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e数值表示\u003c/h5\u003e\n\u003ch6\u003e定点表示发\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e定点整数：最前一位表示符号，最后一位表示小数点位置\u003c/li\u003e\n    \u003cli\u003e定点小数：前一位表示符号，之后均为小数部分\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch6\u003e浮点表示法\u003c/h6\u003e\n\u003cp\u003e小数点是浮动的：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eN = M * R\u003csup\u003eE\u003c/sup\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e其中 N 是 R 进制数，M 是尾数，E 是阶码，R 是基数。\u003c/p\u003e\n\u003cp\u003e计算机规定，浮点数 M 的绝对值小于 1 位二进制小数。\u003c/p\u003e\n\u003ch6\u003e有符号数的原码、反码和补码\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e原码：最高位表示符号，其它正常显示\u003c/li\u003e\n    \u003cli\u003e反码：最高位表示符号，正数与原码相同，负数除符号位，其它取反\u003c/li\u003e\n    \u003cli\u003e补码：最高位表示符号，正数与原码相同，负数，反码加 1\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003e非数值表示\u003c/h5\u003e\n\u003ch6\u003e西文字符\u003c/h6\u003e\n\u003cp\u003eASCII（American Standard Code for Information Interchange）：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e每个字符占 1 个字节，最高位为 0，用字节的后 7 编码\u003c/li\u003e\n    \u003cli\u003e表内有33 种各类控制字符，十进制编码为0～31 和127（即NUL～US\n        和DEL）称为非图形字符（又称为控制字符），位于表的左边两列和右下角位置上。这些字符主要用于打印或显示时的格式控制；对外部设备的操作控制；进行信息分隔；在数据通信时进行传输控制等。\u003c/li\u003e\n    \u003cli\u003e其余95 个字符称为图形字符（又称为普通字符），为可打印或可显示字符，包括英文大小写字母共52 个，0～9 的数字共10 个和其他标点符号、运算符号等共33 个。在这些字符中，0～9、A～Z 与a～z\n        都是顺序排列的，且小写比大写字母码值大32。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e汉字\u003c/h6\u003e\n\u003cp\u003e\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 基础","title":"进制"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","基础","进制"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
