    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e插入排序\u003c/h5\u003e\n\u003cp\u003e给定的一组数据，初识时假设第一个记录自有一个序列，其余的无序。从第二个开始，按照大小依次进行处理插入到有序序列中，直至最后一个有序的为止。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003efunction insertSort(arr) { let tem;\u003c/span\u003e\u003cspan class=\"p4\"\u003efor (let i = 1, length =\n                arr.length; i \u0026lt; length; i++) {\u003c/span\u003e\u003cspan class=\"p6\"\u003etmp = arr[i];\u003c/span\u003e\u003cspan class=\"p6\"\u003efor (let j\n                = i -\n                1; j \u0026gt;= 0; j--) {\u003c/span\u003e\u003cspan class=\"p8\"\u003eif (tmp \u0026lt; arr[j])\u003c/span\u003e\u003cspan class=\"p9\"\u003e arr[j + 1] =\n                [arr[j],\n                arr[j] = tmp][0];\u003c/span\u003e\u003cspan class=\"p8\"\u003eelse break;\u003c/span\u003e\u003cspan class=\"p6\"\u003e}\u003c/span\u003e\u003cspan\n                class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn arr;\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e书上说用下面的二分法更简便，经测试下面循环次数更多：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003efunction insertSort(arr) { let key, left, right, middle, int = 0;\u003c/span\u003e\u003cspan class=\"p4\"\u003efor\n                (let i = 1, length = arr.length; i \u0026lt; length; i++) {\u003c/span\u003e\u003cspan class=\"p6\"\u003ekey =\n                arr[i];\u003c/span\u003e\u003cspan class=\"p6\"\u003eleft = 0;\u003c/span\u003e\u003cspan class=\"p6\"\u003eright = i - 1;\u003c/span\u003e\u003cspan\n                class=\"p6\"\u003ewhile\n                (left \u0026lt;= right) {\u003c/span\u003e\u003cspan class=\"p8\"\u003emiddle = Math.floor((left + right) / 2);\u003c/span\u003e\u003cspan\n                class=\"p8\"\u003eif\n                (key \u0026lt; arr[middle]) right = middle - 1;\u003c/span\u003e\u003cspan class=\"p8\"\u003eelse left = middle + 1;\u003c/span\u003e\u003cspan\n                class=\"p6\"\u003e}\u003c/span\u003e\u003cspan class=\"p6\"\u003efor (let j = i - 1; j \u0026gt;= left; j--)\u003c/span\u003e\u003cspan class=\"p8\"\u003earr[j\n                + 1] =\n                arr[j];\u003c/span\u003e\u003cspan class=\"p6\"\u003earr[left] = key;\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn\n                arr;\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e最佳情况：T(n) = O(n)；最坏情况：T(n) = O(n*n)；平均：T(n) = O(n*n)。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"插入排序"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","插入排序"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
