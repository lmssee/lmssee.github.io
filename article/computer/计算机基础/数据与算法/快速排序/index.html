                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e快速排序\u003c/h5\u003e\n\u003cp\u003e快速排序是非常高效的排序算法，采用分而治之。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e分解：将序列分为两个非空的子序列，使左边的任一项都比右边小。\u003c/li\u003e\n    \u003cli\u003e递归求解：通过递归快速排序\u003c/li\u003e\n    \u003cli\u003e合并：直接合并\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction quickSort(arr) { let length = arr.length;\u003c/span\u003e\u003cspan class=\"p4\"\u003eif (!length)\n        return arr;\u003c/span\u003e\u003cspan class=\"p4\"\u003elet base_num = arr[0], left_array = [], right_array = [];\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efor (let i = 1; i \u0026lt; length; i++) {\u003c/span\u003e\u003cspan class=\"p6\"\u003eif (base_num \u0026gt; arr[i])\n        left_array.push(arr[i]);\u003c/span\u003e\u003cspan class=\"p6\"\u003eelse right_array.push(arr[i]);\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p4\"\u003eleft_array = quickSort(left_array);\u003c/span\u003e\u003cspan class=\"p4\"\u003eright_array =\n        quickSort(right_array);\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn left_array.concat([base_num], right_array);\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e快速算法是通过分治递归来实现的，其效率在很大程度上取决于参考元素的选择，可以选择数组的中间元素，也可以随机得到三个元素，然后选择中间的那个元素（三数中值法）。另外还有一点，就是当我们在分割时，如果分割出来的子序列的长度很小的话（小于20），通常递归的排序效率就没有诸如插入排序或希尔排序那么快了。因此可以先判断数组的长度，如果小于10的话，直接用插入排序，而不是递归调用快速排序。\n    \u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e最佳情况：T(n) = O(nlogn)；最差情况：T(n) = O(n*n)；平均：T(n) = O(nlogn)。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"快速排序"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","快速排序"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"
