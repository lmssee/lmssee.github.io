                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e堆排序\u003c/h5\u003e\n\u003cp\u003e堆排序是一种树形数据结构，其每节点都有一个值。堆指的是完全的二叉树，根结点的值小于（或大于）两个子节点的值，同时，根结点的两棵树分别是一个堆。\n\u003c/p\u003e\n\u003cp\u003e堆排序是一种树形选择排序，利用完全二叉树中双亲节点和节点之间的关系选择最小的元素\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction heapSort(arr) { let length = arr.length;\u003c/span\u003e\u003cspan class=\"p4\"\u003e/** 建堆\n        */\u003c/span\u003e\u003cspan class=\"p4\"\u003efor (let i = Math.floor(length / 2) - 1; i \u0026gt;= 0; i--)\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e__heap(arr, i, length);\u003c/span\u003e\u003cspan class=\"p4\"\u003e/** 堆排序\n        */\u003c/span\u003e\u003cspan class=\"p4\"\u003efor (let j = length - 1; j \u0026gt;= 1; j--) {\u003c/span\u003e\u003cspan class=\"p6\"\u003e// [arr[j], arr[0]]\n        = [arr[0], arr[j]];\u003c/span\u003e\u003cspan class=\"p6\"\u003earr[j] = [arr[0], arr[0] = arr[j]][0];\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e__heap(arr, 0, --length);\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn arr;\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction __heap(arr, x, len) {\u003c/span\u003e\u003cspan class=\"p4\"\u003elet l = 2 * x + 1, r =\n        l + 1, largest = x;\u003c/span\u003e\u003cspan class=\"p4\"\u003eif (l \u0026lt; len \u0026\u0026 arr[l] \u0026gt; arr[largest]) largest = 1;\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003eif (r \u0026lt; len \u0026\u0026 arr[r] \u0026gt; arr[largest]) largest = r;\u003c/span\u003e\u003cspan class=\"p4\"\u003eif (largest != x)\n        {\u003c/span\u003e\u003cspan class=\"p6\"\u003e// [arr[x], arr[largest]] = [arr[largest], arr[x]];\u003c/span\u003e\u003cspan class=\"p6\"\u003earr[x] =\n        [arr[largest], arr[largest] = arr[x]][0];\u003c/span\u003e\u003cspan class=\"p6\"\u003e__heap(arr, largest, len);\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e居然排出来不是正确的顺序！！也不知道哪写错了\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e最佳情况：T(n) = O(nlogn)；最差情况：T(n) = O(nlogn)；平均：T(n) = O(nlogn)。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"堆排序"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","堆排序"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
