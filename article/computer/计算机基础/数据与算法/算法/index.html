class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>算法</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e算法\u003c/h5\u003e\n\u003cp\u003e算法是解决给定问题的一种方法和步骤。对于给定问题算法不是唯一的。算法具有鲜明的客观环境属性，用不同的工具和方法解决问题，算法是不同的。利用计算机解决问题的算法可以参考人工解决该问题的算法，因为计算机是模仿人的脑力劳动而设计出来的一种工具。算法的执行效率与数据结构的优劣有很大的关系。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e可行性：算法的每一步操作都必须是可行的、有效的;\u003c/li\u003e\n    \u003cli\u003e确定性：算法中的每一步骤都必须有明确定义，不允许有模棱两可的解释，也不允许有多义性;\u003c/li\u003e\n    \u003cli\u003e有穷性：算法必须能在有限的时间内做完，即算法必须能在执行有限个步骤之后终止;\u003c/li\u003e\n    \u003cli\u003e拥有足够的情报：一个算法有n（n≥0）个初始数据的输入，有一个或多个有效信息的输出;\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e算法可以用自然语言、计算机语言、流程图或专门为描述算法而设计的语言描述。\u003c/p\u003e\n\u003ch6\u003e算法设计准则\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e正确性：首先，算法必须是正确的，不含语法、数据的错误;\u003c/li\u003e\n    \u003cli\u003e可读性：算法要易于理解，易于编码，易于调试;\u003c/li\u003e\n    \u003cli\u003e健壮性：当输入非法数据时，算法也能有所反应;\u003c/li\u003e\n    \u003cli\u003e时空效率：高效率及低存储量。算法的执行时间要短，占用的存储空间要小\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e算法的复杂度\u003c/h6\u003e\n\u003cp\u003e算法优劣的主要标准是算法的执行效率与存储需求。算法的执行效率指的是时间复杂度（time complexity），存储需求指的是空间复杂度（space complexity）。\u003c/p\u003e\n\u003cp\u003e算法中基本操作重复执行的次数是问题规模为n 的某个函数f（n），算法的时间复杂度记作：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eT(n) = O(f(n))\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e一般只要分析影响一个算法时间复杂度的主要部分即可，且如果f（n）为多项式时，只取f（n）的n 的最高次幂。算法的时间复杂度通常具有O（1），O（n），O（n2），O（log2n），O（n×\n    log2n）等形式，其中O（1）表示算法的时间复杂度为常量。因此，时间复杂度指的是在给定的问题规模n 下，算法中语句重复执行次数的数量级。\u003c/p\u003e\n\u003cp\u003e算法的空间复杂度是在给定的问题规模n 下，算法执行时所需临时占用存储空间的量度，记作：S（n）=O（f（n）），其中n 为问题的规模（或大小），空间复杂度f（n）也是问题规模n\n    的函数，也是用算法需占用临时存储空间的数量级来描述。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"算法"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","算法"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
