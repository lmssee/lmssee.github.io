                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e归并排序\u003c/h5\u003e\n\u003cp\u003e归并排序的归是递归的意思，并是将分化的半数组并在一起。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction mergeSort(arr) { let length = arr.length;\u003c/span\u003e\u003cspan class=\"p4\"\u003eif (length \u0026lt;\n        2) return arr;\u003c/span\u003e\u003cspan class=\"p4\"\u003elet middle = Math.floor(length / 2), left = arr.slice(0, middle), right =\n        arr.slice(middle);\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn __merge(mergeSort(left), mergeSort(right));\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\u003cspan class=\"p2\"\u003efunction __merge(left, right) {\u003c/span\u003e\u003cspan class=\"p4\"\u003elet result =\n        [];\u003c/span\u003e\u003cspan class=\"p4\"\u003ewhile (left.length \u0026\u0026 right.length) {\u003c/span\u003e\u003cspan class=\"p6\"\u003eif (left[0] \u0026lt;=\n        right[0]) result.push(left.shift());\u003c/span\u003e\u003cspan class=\"p6\"\u003eelse result.push(right.shift());\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p4\"\u003ewhile (left.length) result.push(left.shift());\u003c/span\u003e\u003cspan class=\"p4\"\u003ewhile\n        (right.length) result.push(right.shift());\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn result;\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e看了半天才大概看懂。。。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e最佳情况：T(n) = O(n)；最差情况：T(n) = O(nlogn)；平均：T(n) = O(nlogn)。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"归并排序"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","归并排序"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</scrip
