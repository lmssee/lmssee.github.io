    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e选择排序\u003c/h5\u003e\n\u003cp\u003e选择排序是一种简单直观的排序算法，它的基本原理如下：对于给定的一组记录，经过第一轮比较后得到最小的记录，然后将该记录与第一个记录的位置进行交换；接着对不包括第一个记录以外的其他记录进行第二轮比较，得到最小的记录并与第二个记录进行位置交换；重复该过程，直到进行比较的记录只有一个时为止。\n\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction selectSort(arr) { let length = arr.length, p;\u003c/span\u003e\u003cspan class=\"p4\"\u003efor (let i\n        = 0; i \u0026lt; length - 1; i++) {\u003c/span\u003e\u003cspan class=\"p6\"\u003ep = i;\u003c/span\u003e\u003cspan class=\"p6\"\u003efor (let j = i + 1; j \u0026lt;\n        length; j++) {\u003c/span\u003e\u003cspan class=\"p8\"\u003eif (arr[p] \u0026gt; arr[j])\u003c/span\u003e\u003cspan class=\"p9\"\u003e p = j;\u003c/span\u003e\u003cspan\n        class=\"p6\"\u003e}\u003c/span\u003e\u003cspan class=\"p6\"\u003eif (p != i)\u003c/span\u003e\u003cspan class=\"p8\"\u003earr[i] = [arr[p], arr[p] =\n        arr[i]][0];\u003c/span\u003e\u003cspan class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn arr;\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e效率比较低下\u003c/p\u003e\n\u003c/div\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"选择排序"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","选择排序"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
