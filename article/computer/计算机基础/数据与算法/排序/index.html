class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>排序</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定义\u003c/h5\u003e\n\u003cp\u003e排序（Sort）是计算机程序设计中的一种重要运算，它是将一个无序序列整理成按关键字递增（或递减）的有序序列的处理过程。由于在计算机中对数据进行分类的算法与排序算法一致，所以排序运算应用极其广泛，至今人们已经研究出很多种排序方法，常见的有交换类排序、插入类排序和选择类排序方法。\n\u003c/p\u003e\n\u003ch5\u003e直接插入排序\u003c/h5\u003e\n\u003cp\u003e直接插入排序（Insertion Sort）是最简单直观的排序方法。其基本方法是：每次将一个待排序的数据元素按其关键字值大小插入到前面已经排好序的子文件中的适当位置上，反复进行，直到全部记录插入完成为止。\u003c/p\u003e\n\u003cp\u003e在最坏情况下，直接插入排序需要n（n - 1）/2次比较。直接插入排序法的平均时间复杂度为O（n\u003csup\u003e2\u003c/sup\u003e）。插入排序法属于插入类排序方法。\u003c/p\u003e\n\u003ch5\u003e选择排序法\u003c/h5\u003e\n\u003cp\u003e选择排序法的基本思想是：扫描整个线性表，从中选出最小的元素，将它交换到表的最前面（这是它应有的位置）；然后对剩下的子表采用同样的方法，直到子表空为止。扫描线性表，从中选出最小元素的过程是：选取表中第一个位置的元素，用它依次和后面的元素进行比较，如果有元素比它小，则交换它们的位置，并继续用第一个位置的元素和后面未比较过的元素进行比较，直到最后一个元素为止。\n\u003c/p\u003e\n\u003cp\u003e对于长度为n 的线性表，在最坏情况下需要比较n（n – 1）/2 次。选择排序法的平均时间复杂度为O（n\u003csup\u003e2\u003c/sup\u003e）。选择排序法属于选择类排序方法。\u003c/p\u003e\n\u003ch5\u003e冒泡排序法\u003c/h5\u003e\n\u003cp\u003e冒泡排序法的基本思想是：通过相邻数据元素的比较和交换，将元素中最大的挤到最后，然后对剩下的子表采用同样的方法，直到子表空为止。相邻数据元素比较和交换，将元素中最大的挤到最后的过程是：首先从第一个元素开始，对相邻数据元素进行比较，如果前面的元素大于后面的元素，则交换它们的位置，并继续进行比较，直到最后一个元素比较完为止。对于长度为n\n    的线性表，在最坏情况下，需要的比较次数为n（n – 1 ）/2，但这个工作量不是必需的，一般情况下要小于这个工作量。冒泡排序法的平均时间复杂度为O（n\u003csup\u003e2\u003c/sup\u003e）。\u003c/p\u003e\n\u003ch5\u003e快速排序法\u003c/h5\u003e\n\u003cp\u003e快速排序法基本思想是：首先选取一个元素，通过与它前后元素的比较和交换，最终找到它最后的位置，即它前面的元素都比它小，它后面的元素都比它大，然后把它前后的元素分成两个子表，继续采用同样的方法操作，直到子表空为止，若其中一个表为空，则只对另一个操作即可。找到一个元素的最后位置的过程如下：假设线性表有n\n    个元素，位置为 k 的元素表示为a[k]，令变量 i = 1 ， j = n，选取表中第一个元素a[1]，现表示为a[i]。\u003c/p\u003e\n\u003cp\u003e对n个记录的文件进行快速排序，在最坏的情况下执行时间为O（n\u003csup\u003e2\u003c/sup\u003e），与冒泡排序相当。然而快速排序的平均执行时间为O（nlog\u003csub\u003e2\u003c/sub\u003en），显然优于冒泡排序和前面介绍的直接插入排序、选择排序。需要指出的是：快速排序需要O（nlog\u003csub\u003e2\u003c/sub\u003en）的附加存储开销，这是因为快速排序算法的实现过程中需用到大小为O（nlog\u003csub\u003e2\u003c/sub\u003en）的栈空间。快速排序法属于交换类排序方法。\n\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"排序"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","排序"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
