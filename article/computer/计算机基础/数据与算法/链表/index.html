="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>链表</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e链表\u003c/h5\u003e\n\u003cp\u003e链式储存结构称之为链表，又称线性链表，分为：单链表、双向链表、循环链表。可以用任意一组储存单元来储存链表的数据元素（储存单元可以是不连续的）。除了储存每一个元素外，还必须初春指示其直接后继元素的信息。这两部分称之为节点，多个节点组成了链表。\n\u003c/p\u003e\n\u003ch6\u003e单链表\u003c/h6\u003e\n\u003cp\u003e链表中每一个结点是用一个数据域和一个指针域来描述，数据域存储数据元素，指针域存储后继结点的地址。线性链表的最后一个结点无后继结点，它的指针域为空（记为NULL 或∧）。另外，还要设置表头指针head，指向线性链表的第一个结点。\n\u003c/p\u003e\n\u003cp\u003e链表与顺序表不同，它通常采用动态分配内存的方法，链表中的每个结点占用的存储空间不是预先分配的，而是运行时系统根据需要临时生成的。链表的一个重要特征是插入、删除运算灵活方便，无需移动结点，只要改变结点中指针域的值即可\u003c/p\u003e\n\u003ch6\u003e双向链表\u003c/h6\u003e\n\u003cp\u003e链表中每一个结点是用一个数据域和两个指针域来描述，数据域存储数据元素，指针域一个存储前驱结点的地址，一个存储后继结点的地址。线性链表的第一个结点无前驱结点，它的前驱指针为空，最后一个结点无后继结点，它的后继指针为空。另外，还要设置表头指针head，指向线性链表的第一个结点。\n\u003c/p\u003e\n\u003ch6\u003e循环链表\u003c/h6\u003e\n\u003cp\u003e把单链表中最后一个结点的指针域的值改为第一个结点的地址，即构成循环链表。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e顺序表和链表的区别：\u003c/p\u003e\n    \u003cul\u003e\n        \u003cli\u003e 顺序表只存放数据，不存放逻辑关系，所以顺序表存储密度大，节省空间，而链表除了要存储数据外，还要存储数据的逻辑关系，占用空间较大\u003c/li\u003e\n        \u003cli\u003e顺序表按地址顺序存放数据，有一定规律，所以存取、查询等速度快。而链表不按顺序存储，数据存放地址无规律可循，查找数据需从表头开始，所以存取、查询等速度慢\u003c/li\u003e\n        \u003cli\u003e顺序表插入和删除数据需移动数据位置，而链表无需移动，所以顺序表插入和删除操作麻烦，而链表插入和删除操作方便\u003c/li\u003e\n    \u003c/ul\u003e\n\u003c/div\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"链表"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","链表"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
