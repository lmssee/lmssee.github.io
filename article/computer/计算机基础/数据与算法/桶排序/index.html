                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e桶排序\u003c/h5\u003e\n\u003cp\u003e假设输入数据均匀分布，将数据分到有限数量的桶中，每一个桶在分别排序（使用别的排序算法或递归排序）后继续使用桶排序。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e设定一个数组当作空桶\u003c/li\u003e\n    \u003cli\u003e便利数据，并且把数据一个一个放到对象的桶中去\u003c/li\u003e\n    \u003cli\u003e对每个不是空的桶进行排序\u003c/li\u003e\n    \u003cli\u003e从不是空的桶里吧排好的序合并起来\u003c/li\u003e\n\u003c/ul\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction countingSort(arr, num) { let length = arr.length;\u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (length \u0026lt; 2) return arr;\u003c/span\u003e\u003cspan class=\"p4\"\u003elet buckets = [0], result = [], min = Math.min.apply(null,\n        arr), max = Math.max.apply(num, arr), space = Math.ceil((max - min + 1) / num), k, index;\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003efor (let j = 0; j \u0026lt; length; j++) {\u003c/span\u003e\u003cspan class=\"p6\"\u003eindex = Math.floor((arr[j] - min) /\n        space);\u003c/span\u003e\u003cspan class=\"p6\"\u003eif (buckets[index]) {\u003c/span\u003e\u003cspan class=\"p8\"\u003ek = buckets[index].length -\n        1;\u003c/span\u003e\u003cspan class=\"p8\"\u003ewhile (k \u0026\u0026 buckets[index][k] \u0026gt; arr[j]) {\u003c/span\u003e\u003cspan class=\"p9\"\u003e buckets[index][k\n        + 1] = buckets[index][k];\u003c/span\u003e\u003cspan class=\"p9\"\u003e k--;\u003c/span\u003e\u003cspan class=\"p8\"\u003e}\u003c/span\u003e\u003cspan\n        class=\"p8\"\u003ebuckets[index][k + 1] = arr[j];\u003c/span\u003e\u003cspan class=\"p6\"\u003e} else {\u003c/span\u003e\u003cspan class=\"p8\"\u003ebuckets[index]\n        = [];\u003c/span\u003e\u003cspan class=\"p8\"\u003ebuckets[index].push(arr[j]);\u003c/span\u003e\u003cspan class=\"p6\"\u003e}\u003c/span\u003e\u003cspan class=\"p6\"\u003elet n\n        = 0;\u003c/span\u003e\u003cspan class=\"p6\"\u003ewhile (n \u0026lt; num) {\u003c/span\u003e\u003cspan class=\"p8\"\u003eresult =\n        result.concat(buckets[n]);\u003c/span\u003e\u003cspan class=\"p8\"\u003en++;\u003c/span\u003e\u003cspan class=\"p6\"\u003e}\u003c/span\u003e\u003cspan\n        class=\"p4\"\u003e}\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn result;\u003c/span\u003e\u003cspan class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e最后结果是一个空数组。。。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e最佳情况：T(n) = O(n + k)；最差情况：T(n) = O(n + k)；平均：T(n) = O(n + k)。\u003c/p\u003e\n\n\u003cscript\u003e\n    function copy(arr) {\n        const newArr = [];\n        for (let i in arr)\n            newArr[i] = arr[i];\n        return newArr;\n    }\n    let int = 0;\n    function countingSort(arr, num) {\n        let length = arr.length;\n        if (length \u003c 2) return arr;\n        let buckets = [0], result = [], min = Math.min.apply(null, arr), max = Math.max.apply(num, arr), space = Math.ceil((max - min + 1) / num), k, index;\n        for (let j = 0; j \u003c length; j++) {\n            index = Math.floor((arr[j] - min) / space);\n            if (buckets[index]) {\n                k = buckets[index].length - 1;\n                while (k \u0026\u0026 buckets[index][k] \u003e arr[j]) {\n                    buckets[index][k + 1] = buckets[index][k];\n                    k--;\n                }\n                buckets[index][k + 1] = arr[j];\n            } else {\n                buckets[index] = [];\n                buckets[index].push(arr[j]);\n            }\n            let n = 0;\n            while (n \u003c num) {\n                result = result.concat(buckets[n]);\n                n++;\n            }\n        }\n        return result;\n    }\n\n\n    let a = [10, 12, 16, 1, 9, 3, 9, 1, 7, 0, 69, 4, 8, 69, 35, 2, 45, 1];\n    // maoPao(a);\n    // console.log(maoPao(a));\n    console.log(countingSort(a));\n    console.log(int);\n    // maoPao2(a);\n\u003c/script\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"桶排序"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","桶排序"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
