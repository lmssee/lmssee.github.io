                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e计数排序\u003c/h5\u003e\n\u003cp\u003e计数排序是一种稳定的排序算法，计算排序需要一个额外的数组 CountArr ，其中第 i 个元素是待排序数组 arr 中值等于 i 的元素个数。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e仅用于非负整数排序\u003c/p\u003e\n\u003c/div\u003e\n\u003col\u003e\n    \u003cli\u003e找出待排序的数组中最大和最小的元素\u003c/li\u003e\n    \u003cli\u003e统计数组中每一个元素出现的次数，存入数组 countArr 的第 i 项\u003c/li\u003e\n    \u003cli\u003e从待排序列 arr 的第一个元素开始，将 arr[i] \u003c/li\u003e\n\u003c/ol\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003efunction countingSort(arr) { let length = arr.length, countArr = [];\u003c/span\u003e\u003cspan class=\"p4\"\u003eif\n        (length \u0026lt; 2) return arr;\u003c/span\u003e\u003cspan class=\"p4\"\u003efor (let i in arr)\u003c/span\u003e\u003cspan class=\"p6\"\u003ecountArr[arr[i]] ?\n        countArr[arr[i]]++ : (countArr[arr[i]] = 1);\u003c/span\u003e\u003cspan class=\"p4\"\u003earr =\n        [];\u003c/span\u003e\u003cspan class=\"p4\"\u003ecountArr.forEach((value, key) =\u0026gt; {\u003c/span\u003e\u003cspan class=\"p6\"\u003efor (let i = 0; i \u0026lt;\n        value; i++)arr.push(key);\u003c/span\u003e\u003cspan class=\"p4\"\u003e});\u003c/span\u003e\u003cspan class=\"p4\"\u003ereturn arr;\u003c/span\u003e\u003cspan\n        class=\"p2\"\u003e}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e运行时间是 O(n + k)。计算排序不是比较排序，所以排序的速度快于任何比较排序\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e最佳情况：T(n) = O(n + k)；最差情况：T(n) = O(n + k)；平均：T(n) = O(n + k)。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"计数排序"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","计数排序"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
