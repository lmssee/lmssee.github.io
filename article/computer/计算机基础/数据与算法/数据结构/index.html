  <script id="_next_DATA__"
    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e数据结构\u003c/h5\u003e\n\u003ch6\u003e数据与数据的结构\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e数据（Data）：数据是用于描述客观事物的各种物理符号，包括数值、文字、图形、图像、声音等。数据是信息的载体，它能够被计算机识别、存储和加工处理;\u003c/li\u003e\n    \u003cli\u003e数据项（Data Item）：数据项是数据不可分割的最小单位。例如学号、姓名、单价等;\u003c/li\u003e\n    \u003cli\u003e数据元素（Data\n        Element）：数据元素是数据的基本单位，即数据集合中的个体。有时它是数组中的一个元素；有时一个数据元素由若干个数据项组成，这时，称数据元素为记录。例如，一张学生情况汇总表，表中每个学生的信息就是一个数据元素（或称作记录），而其中的每一项（如学号、姓名、性别等）均为数据项。在数据结构中，通常把数据元素简称为数据;\n    \u003c/li\u003e\n    \u003cli\u003e结构（Structure）：由计算机来处理的数据元素之间都不会是孤立的，它们彼此间存在着某种关系，将数据元素间的这种关系称为结构;\u003c/li\u003e\n    \u003cli\u003e数据结构（Data\n        Structure）：数据结构是数据元素及其相互之间关系的集合。数据结构包括数据的逻辑结构和数据的存储结构（或称物理结构）。数据的逻辑结构可以看做是从具体问题抽象出来的数学模型，数据的存储结构是数据结构在计算机中的表示;\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e数据的逻辑结构\u003c/h6\u003e\n\u003cp\u003e数据集合中各元素之间抽象化的逻辑关系即数据的逻辑结构。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e 集合结构：该结构中的数据元素之间的关系是同属于一个集合\u003c/li\u003e\n    \u003cli\u003e线性结构：该结构中的数据元素之间存在一个对一个的关系\u003c/li\u003e\n    \u003cli\u003e树形结构：该结构中的数据元素之间存在一个对多个的关系\u003c/li\u003e\n    \u003cli\u003e图形结构：该结构中的数据元素之间存在多个对多个的关系;\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e数据的储存结构\u003c/h6\u003e\n\u003cp\u003e 数据的存储结构是数据的逻辑结构在计算机中的表示。它分为顺序存储和链式存储两种基本结构。顺序存储结构是用数据元素在存储器中的相对位置来表示数据元素之间的逻辑关系；链式存储结构是用指示数据元素存储地址的指针表示数据元素之间的逻辑关系。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e顺序存储结构。顺序存储结构是把逻辑上相邻的数据元素存储在物理位置相邻的存储单元中。它只存放数据元素的值，数据元素之间的逻辑关系用存放数据元素的位置关系来表示。这种存储方式适合于线性结构;\u003c/li\u003e\n    \u003cli\u003e链式存储结构。链式存储结构不仅存储数据元素的值，而且存储数据元素之间的逻辑关系。它利用存储结点（简称结点）附加的指针域，存储其前驱或后继结点的地址。各数据元素的存储空间可以不连续，存储顺序（即存储空间位置）与数据元素之间的逻辑关系可以不一致;\n    \u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e链式存储结构中结点由两部分组成：一部分存储结点本身的值，称为数据域；另一部分存储该结点的前驱或后继结点的存储单元地址，称为指针域。\n\u003c/p\u003e\n\u003ch6\u003e数据的运算\u003c/h6\u003e\n\u003cp\u003e数据的运算是定义在数据的逻辑结构上的操作，但运算的具体实现要在存储结构上进行。数据的各种逻辑结构有相应的各种运算，每种逻辑结构都有一个运算的集合。数据的运算对数据结构非常重要。\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e插入：向数据结构里增加新的结点;\u003c/li\u003e\n    \u003cli\u003e删除：把指定的结点从数据结构里去掉;\u003c/li\u003e\n    \u003cli\u003e查找：在数据结构里查找满足一定条件的结点;\u003c/li\u003e\n    \u003cli\u003e替换：改变指定结点的一个或多个域的值;\u003c/li\u003e\n    \u003cli\u003e排序：保持线性结构的结点序列里结点数不变，把结点按某种指定的顺序重新排列;\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"数据结构"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","数据结构"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
