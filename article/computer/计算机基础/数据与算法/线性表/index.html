                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定义\u003c/h5\u003e\n\u003cp\u003e线性表（Linear list）是具有相同数据类型的n（n≥0）个数据元素（a1，a2，...，an）的有限序列。它只有一个开始结点a1\n    和一个终端结点an，其余的结点ai（1＜i＜n）都有且仅有一个前驱结点ai-1和一个后继结点ai+1。a1 称为表头，an 称为表尾，n 是表的长度。\u003c/p\u003e\n\u003cp\u003e线性表中数据元素的长度通常是相同的，在程序设计时常用数组实现。线性表常见的运算有存取、查找、插入、删除、更改、排序、合并、分解和求长度等。\u003c/p\u003e\n\u003ch5\u003e顺序表\u003c/h5\u003e\n\u003cp\u003e用顺序存储结构存储的线性表称作顺序表。对于数据元素长度相同的顺序表，可以对任意元素进行随机存取。设线性表为A=（a1,a2,...,an），a1 的地址为Loc（a1），元素的长度为d，则线性表中任意元素ai的地址：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eLoc(a\u003csub\u003ei\u003c/sub\u003e) = Loc(a\u003csub\u003ei\u003c/sub\u003e) + ( i - l ) * d \u003cspan class=\"r\"\u003e// l \u0026lt;= i \u0026lt;= n\n        \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e只要知道顺序表的首地址和每个数据元素所占单元的字节个数就可以求出第i 个元素的地址，这就是顺序表随机存取的原理和特点。\u003c/p\u003e\n\u003ch6\u003e插入\u003c/h6\u003e\n\u003cp\u003e在某一任意处添加一个元素，则需要将位置之后的所有的元素进行后移，然后插入数据，最后长度加一。\u003c/p\u003e\n\u003cp\u003e最理想插入的就是插到最后面，最不理想的就是插到最前面，平均 n + 1。算法的时间复杂度为 O(n)。\u003c/p\u003e\n\u003ch6\u003e删除\u003c/h6\u003e\n\u003cp\u003e与添加相同，需要挪动删除后的每一个元素，算法的复杂度为 O(n)。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 数据与算法","title":"线性表"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","数据与算法","线性表"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
