    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e定义\u003c/h5\u003e\n\u003cp\u003e结构化方法（Structured\n    methods）也称为软件生命周期法，是一种传统的软件开发方法，它运用系统和工程科学的原理和方法，把软件的开发过程分为若干个阶段，每个阶段都规定相应的工作任务和管理标准，前一阶段工作的结束是下一阶段工作的开始，前一阶段产生的文档资料是下一阶段工作的重要依据。由于在软件的开发过程中分别采用了结构化分析法、结构化设计法和结构化编程法，所以把这种方法称为结构化方法。\n    结构化方法一般把软件开发过程分为3 个阶段：软件计划（问题定义、可行性分析、需求分析），软件开发（概要设计、详细设计、程序编码、软件测试）和软件运行与维护。\u003c/p\u003e\n\u003ch5\u003e软件计划阶段\u003c/h5\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e未完待续\u003c/p\u003e\n\u003c/div\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 软件工程","title":"结构化方法"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","软件工程","结构化方法"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
