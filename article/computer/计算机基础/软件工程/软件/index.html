    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e软件\u003c/h5\u003e\n\u003cp\u003e软件是指在计算机上运行的各种各样的程序、数据及相关文档的集合。程序是为实现预期目的而组成的一个计算机命令序列，它一般用某一种计算机语言描述；数据是在实际应用问题中抽象出来的，可被计算机处理的数据结构信息集合；文档是软件开发及应用过程中各种相关资料的集合。\n\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e软件是一种逻辑实体，而不是物理实体，具有抽象性\u003c/li\u003e\n    \u003cli\u003e软件的生产与硬件不同，它没有明显的制作过程\u003c/li\u003e\n    \u003cli\u003e软件在运行、使用期间不存在磨损、老化问题\u003c/li\u003e\n    \u003cli\u003e软件的开发、运行对计算机系统具有依赖性，受计算机系统的限制，这导致了软件移植的问题\u003c/li\u003e\n    \u003cli\u003e软件复杂性高，成本昂贵\u003c/li\u003e\n    \u003cli\u003e软件开发涉及诸多的社会因素\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"computer ✈︎✈︎ 计算机基础 ✈︎✈︎ 软件工程","title":"软件"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","计算机基础","软件工程","软件"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
