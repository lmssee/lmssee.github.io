                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e管道命令\u003c/h5\u003e\n\u003cp\u003e git 的核心是一个对象数据库。该数据库可用来存储文本或二进制数据，例如对于某文件的内容。可通过带 -w 选项（写入）的 hash-object 命令将其作为一条记录插入到该对象数据库中。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit hash-object -w \"文件名\"\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e每当存储了这样一个对象，git就会返回一个40个字符的代码，这是被存储对象的键值。之后需要用该键值配合带 -p 选项（打印）的 cat-file 命令来访问这个对象。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e git cat-file -p \"键值\"\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"computer ✈︎✈︎ some ✈︎✈︎ git","title":"管道"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","some","git","管道"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
