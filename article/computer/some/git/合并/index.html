="noScript" class="jsx-a4447eaa0ca7cb3f"> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/> <br class="jsx-a4447eaa0ca7cb3f"/><p class="jsx-a4447eaa0ca7cb3f">Hello，能看到这个界面是缘分呀</p><p class="jsx-a4447eaa0ca7cb3f">可能是浏览器的版本太低 ,或者是 js 被无情的禁用了。</p><p class="jsx-a4447eaa0ca7cb3f">推荐靠谱浏览器</p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.microsoft.com/en-us/edge" class="jsx-a4447eaa0ca7cb3f">edge</a> </p><p class="jsx-a4447eaa0ca7cb3f"><a href="https://www.google.com/intl/zh-CN/chrome/dev/" class="jsx-a4447eaa0ca7cb3f">chrome</a></p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p><p class="jsx-a4447eaa0ca7cb3f">.</p></div></noscript><div class="PageLayout_tabBar__qHep4" style="height:3rem"><div class="articleTitle"><div>合并</div><div>双击页面可关闭</div></div> </div><div class="PageLayout_container__2kHHl" style="height:calc(100% - 5rem)"><div><style>

                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e 合并分支 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit merge origin/{合并到分支}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit merge -s ours origin/{合并到分支} \u003cspan class=\"r\"\u003e// 使用 ours 策略合并到当前分支\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit merge --no-commit origin/{合并到分支} \u003cspan class=\"r\"\u003e// 不自动提交合并\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\n\u003c!-- \u003cp\u003e通过git merge master命令来合并这些修改，然后再用 rebase 命令理顺其历史纪录。该命令需要一个参数，以说明要将活动分支上的最新修改纳入哪一个分支。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e git rebase master \u003c/span\u003e\n    \u003c/code\u003e\n    \u003cp\u003e但如果rebase命令在执行过程中遇到冲突情况，该命令进程就会被打断，相关文件中也会出现冲突标志。需要先手动或通过合并工具对文件进行清理，并重新将它们添加到暂存区中。然后再执行rebase命令加--continue选项，从该点继续之前的进程。\n    \u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003e git rebase --continue\u003c/span\u003e\n    \u003c/code\u003e\n    \u003cp\u003e也可以用--abort选项取消这次的rebase命令，或者用--skip选项跳过引起冲突的提交。这样该次提交就被直接忽略，其中的修改将不会出现在新分支上。\u003c/p\u003e --\u003e\n\u003ch6\u003e解决冲突\u003c/h6\u003e\n\u003cp\u003egit mergetool 命令用于合并冲突解决工具并解决冲突，通常在合并后使用：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit mergetool\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e查看冲突版本\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit diff\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e手动解决\u003c/h5\u003e\n\u003cp\u003e在编辑器内进行解决是最好的办法。\u003c/p\u003e\n\n\u003ch5\u003e取消合并\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit reset --merge\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e或：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit reset --hard HEAD\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e上述命令将还原到 git merge 之前。\u003c/p\u003e\n\u003cp\u003e如果想在中止或在它已经结束后放弃：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit reset --hard ORIG_HEAD\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003egit cherry-pick\u003c/h5\u003e\n\u003cp\u003egit cherry-pick 提交命令会将当前分支应用到给定提交的变更，这将创建一个新的提交。\u003c/p\u003e\n\u003cp\u003e常用于维护分支和的提交移植到开发版本：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit cherry-pick {另一个分支}~{哪次提交}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e之前，git cherry-pick 命令一次只能应用于一个提交，而现在可以应用于一个提交范围：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit cherry-pick M..P\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003egit revert\u003c/h5\u003e\n\u003cp\u003egit revert提交命令跟git cherry-pick 提交命令大致是相同的，但有一个重要区别：它应用给定提交的逆过程。因此，此命令用于引入一个新提交来抵消给定提交的影响。\n    跟git cherry-pick命令一样，revert命令不修改版本库的现存历史记录。相反它往历史记录中添加新提交。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit revert {}~{}\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"computer ✈︎✈︎ some ✈︎✈︎ git","title":"合并"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","some","git","合并"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
