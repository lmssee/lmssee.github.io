    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eremote\u003c/h5\u003e\n\u003cp\u003egit remote 用于管理跟踪的储存库。\u003c/p\u003e\n\u003ch6\u003e查看\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit remote \u003cspan class=\"r\"\u003e// origin\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit remote -v\u003cspan class=\"r\"\u003e// 查看的会携带详细的地址\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e添加一个远程仓库\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit remote add origin {仓库别名} {远程地址}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit remote add -f origin {仓库别名} {远程地址}\u003cspan class=\"r\"\u003e// 立即 fetch\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e删除远程仓库\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit remote rm origin\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e\u003c/h6\u003e\n\u003ch6\u003e更新仓库状态\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit remote upodate\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 远程版本库中可能已经有分支被其他开发人员删除了（即使这些分支的副本可能还遗留在你的版本库中）。git remote prune命令可以用来删除你的本地版本库中那些陈旧的（相对于实际的远程版本库）远程追踪分支。\u003c/p\u003e\n\u003cp\u003e为了与上游远程版本库更加同步，使用git remote upodate--prune remote命令首先从远程版本库获得更新，然后一步删除陈旧的追踪分支。\u003c/p\u003e\n\u003cp\u003e要重命名一个远程版本库及其所有引用，可以使用“git remote rename 旧名 新名”命令。\u003c/p\u003e\n\u003ch6\u003e删除远程分支\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push origin --delete {远程分支名}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e等同于：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push origin :{远程分支名} \u003cspan class=\"r\"\u003e// 推送空的分支到远程，即删除\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003egitee\u003c/h5\u003e\n\u003ch5\u003e 添加密钥 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003essh-keygen -t rsa -C \"email\"\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 在 gitee 上配置密钥 \u003c/h6\u003e\n\u003cp\u003e...\u003c/p\u003e\n\u003ch6\u003e 链接 \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit remote add origin \"path\"\u003c/span\u003e\n\u003c/code\u003e\n\n\u003ch5\u003egithub\u003c/h5\u003e\n\u003ch5\u003e 添加新的远程仓库 \u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit remote add [shortname] [url]\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e 生成密钥 \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003essh-keygen -t rsa -C \"email of gihub\"\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e复制 ssh\u003c/h5\u003e\n\u003ch6\u003emac\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003epbcopy \u0026lt; ~/.ssh/id_rsa.pub \u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003ewindow\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003eclip \u0026lt; ~/.ssh/id_rsa.pub\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003elinux\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003esudo apt-get install xclip \u003cspan class=\"r\"\u003e// 安装 xclip\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003esclip -sel clip \u0026lt; ~/.ssh/id_rsa.pub\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e检测 git 连接\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit -T git@github.com\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e 同时连接 gitHub 和 gitee \u003c/h5\u003e\n\u003cp\u003e 链接不同的远程库时使用不同的库名： \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit remote rm origin\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit remote add github git@github.com:lmssee/lmssee.github.io.git\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit remote add gitee git@gitee.com:lmssee/io.git\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e 此时就拥有了两个远程仓库 \u003c/p\u003e\n\u003ch6\u003epush\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push github master\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit push gitee master\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003elinux 上使用 github\u003c/h5\u003e\n\u003ch6\u003e安装\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003esudo dnf install gh \u003cspan class=\"r\"\u003e// 从社区安装 gh \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003esudo dnf upodate gh \u003cspan class=\"r\"\u003e// 升级 gh \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"computer ✈︎✈︎ some ✈︎✈︎ git","title":"远程库"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","some","git","远程库"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
