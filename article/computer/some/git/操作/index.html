    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e暂存\u003c/h5\u003e\n\u003cp\u003e运行 git stash 可将当前代码提交到暂存。改命令保存本地修改，并恢复工作目录以匹配 HEAD 提交。\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003egit stash 的参数们\u003c/summary\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003egit stash save\u003cspan class=\"r\"\u003e// 等同于没有参数的 git stash\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit stash pop \u003cspan class=\"r\"\u003e// 取出本地暂存内容\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit stash list [{}]\u003cspan class=\"r\"\u003e// 列出所储存列表\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit stash show [{}]\u003cspan class=\"r\"\u003e// 展示提交索引和变更记录\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit stash apply [{}]\u003cspan class=\"r\"\u003e// 恢复\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit stash drop \u003cspan class=\"r\"\u003e// \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit stash branch\u003cspan class=\"r\"\u003e// \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit stash clear\u003cspan class=\"r\"\u003e// \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit stash create\u003cspan class=\"r\"\u003e// \u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit stash store\u003cspan class=\"r\"\u003e// \u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n    \u003cp\u003esave 命令可以添加一段字符串进行说明，这样的话，就可以在查看时了解暂存内容的详细。\u003c/p\u003e\n\u003c/details\u003e\n\u003cp\u003e拉取代码时有时候不想直接覆盖本地代码，可以先将本地代码进行暂存：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit stash \u003cspan class=\"r\"\u003e// 暂存本地\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit stash pop \u003cspan class=\"r\"\u003e// 取出本地暂存内容\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit stash list \u003cspan class=\"r\"\u003e// 参看本地暂存的修改列表\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit stash pop stash@{} \u003cspan class=\"r\"\u003e// 恢复之前的本地暂存的修改\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e可以使用 refs/stash 来进行查看：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit show-branch stash\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e移动文件或文件夹\u003c/h5\u003e\n\u003cp\u003e将目录或是文件移动到另一个位置：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit mv {移动目标} {目标位置}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e重命名\u003c/h5\u003e\n\u003cp\u003e将文件改名字：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit mv {要改目标名称} {改后目标名称}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e删除文件\u003c/h5\u003e\n\u003cp\u003egit rm 为在工作区或索引中删除某文件，该操作删除文件并将删除记录保留下来：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit rm {要删除目标}\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit rm -f {要删除目标} \u003cspan class=\"r\"\u003e// 强制删除\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e使用 git rm --cached 可以将文件移除缓存区：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003egit rm --cached {待移除文件名} \u003cspan class=\"r\"\u003e// 仅删除索引不删除文件\u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/div\u003e\n\u003ch5\u003e恢复删除\u003c/h5\u003e\n\u003cp\u003egit checkout 用于恢复文件/文件夹使用：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit checkout HEAD -- {待恢复的删除的文件} \u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e也可以 使用：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003egit reset HEAD {待恢复文件（文件夹）名} \u003cspan class=\"r\"\u003e// 重置 HEAD\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit checkout {待恢复文件（文件夹）名}\u003cspan class=\"r\"\u003e// 使用库中版本代替工作区版本\u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/div\u003e\n\u003ch5\u003e标签\u003c/h5\u003e\n\u003cp\u003e在 refs/tags 中添加标签引用，或带参数 -d 删除、-l 列出、 -v 验证；除非指定了 -f ，否则不能创建已经存在的标签；如果传递了 -a、-s、-u ，则必须携带标签信息。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit tag -a \"\"\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 带参数 -a 时会为标签打上备注。 \u003c/p\u003e\n    \u003cp\u003e 带参数版本号可以给已发布的版本追加标签。 \u003c/p\u003e\n    \u003cp\u003e 不待任何参数为查看所有的便签 \u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003e 指定标签信息 \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit tag -a \u0026lt;tagname\u0026gt; -m \" 标签内容 \"\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e创建标签\u003c/h6\u003e\n\u003cp\u003e使用 git tag 来给当前 HEAD 指针做标签：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit tag -a {标签名称} -m {标签的消息} \u003cspan class=\"r\"\u003e// 推送时可 git push origin tag {}\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e查看标签\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit tag -l\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e删除标签\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit tag -d {}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003edescribe\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit describe \u003cspan class=\"r\"\u003e// 显示当前提交最近的标签\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e补丁\u003c/h5\u003e\n\u003cp\u003e补丁类似于 git diff 之类的东西：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit am \u003cspan class=\"r\"\u003e// 修改文件并创建提交\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit apply \u003cspan class=\"r\"\u003e// 修改文件而不创建提交 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"computer ✈︎✈︎ some ✈︎✈︎ git","title":"操作"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","some","git","操作"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
