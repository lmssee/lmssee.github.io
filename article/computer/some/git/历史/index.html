                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003elog\u003c/h5\u003e\n\u003ch6\u003e 查看 log\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit log\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit log -s -1 \u003cspan class=\"r\"\u003e// 仅展示最近的\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit log --online \u003cspan class=\"r\"\u003e// 一行查看\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit log -n 3 \u003cspan class=\"r\"\u003e// 查看最近三次\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit log --stat \u003cspan class=\"r\"\u003e// 展示被修改的文件\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit log --dirstat \u003cspan class=\"r\"\u003e//显示被修改的目录\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit log --shortstat \u003cspan class=\"r\"\u003e// 展示多少文件被修改\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit log --graph \u003cspan class=\"r\"\u003e// 展示各个提交之间的关系\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit log --format=fuller \u003cspan class=\"r\"\u003e// 展示更多的细节\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit log --author \u003cspan class=\"r\"\u003e// 指定用户\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit log --since | --before | --until | --after \u003cspan class=\"r\"\u003e//指定日期\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e首先需要将重点放在信息收集上，以便了解目标分支上目前所发生的事。在这里，在 log 命令中使用 .. 这符号可能会很有帮助。\u003c/p\u003e\n\u003cp\u003e例如，a..b 可用来表示来自于分支 b，但不属于分支a的提交。它可以显示出在当前分支上做了哪些事，而这些事应该不会被提交到其他分支中。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit log MERGE_HEAD..HEAD\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit log HEAD..MERGE_HEAD\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e分支的图形化表示也会很有用:\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e git log --graph --oneline --decorate HEAD..MERGE_HEAD\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e也可以在 log 命令中使用 --merge 选项，限制其只输出合并提交：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e git log --merge\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e需要以合并操作为基础，即该版本必须在合并操作中是这些分支共同的祖辈提交：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit merge-base HEAD MERGE_HEAD\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003eshortlog\u003c/h5\u003e\n\u003cp\u003e该命令用于汇总 git 日志输出。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ some ✈︎✈︎ git","title":"历史"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","some","git","历史"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
