                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e版本控制\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e文件（ blob ）：文本及二进制的数据\u003c/li\u003e\n    \u003cli\u003e目录（ tree ）：目录中包含内容或其他的目录\u003c/li\u003e\n    \u003cli\u003e版本（ commit ）：每一个版本所定义的都是响应目录的某个可恢复的状态\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003egit 将文件分为已追踪的（ Tracked ）、已被忽略的（ Ignored ）、未被追踪的（ Untracked ）。\u003c/p\u003e\n\u003cp\u003e已被追踪的文件始终处于已提交（ committed ）、已修改（ modified ）、已暂存（ staged ）。\u003c/p\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e\n        状态查看\n    \u003c/summary\u003e\n    \u003cp\u003e在任何时刻都可以执行 git status 查看 git 状态，也可以执行 git log 参看日志。\u003c/p\u003e\n    \u003cp\u003egit status 可以用于查看工作目录和暂存区的状态。git status 不会显示已经 commit 到项目历史的信息，要向下看就需要使用 git log 命令。\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003egit status \u003cspan class=\"r\"\u003e// 参看当前状态\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit status --short\u003cspan class=\"r\"\u003e// 参看当前状态的简短显示\u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/details\u003e\n\u003ch5\u003e优点\u003c/h5\u003e\n\u003cul\u003e\n    \u003cli\u003e高性能\u003c/li\u003e\n    \u003cli\u003e冗余度\u003c/li\u003e\n    \u003cli\u003e分布式版本号\u003c/li\u003e\n    \u003cli\u003e版本库间的高效同步\u003c/li\u003e\n    \u003cli\u003e数据完整性\u003c/li\u003e\n    \u003cli\u003e自动重名名检测\u003c/li\u003e\n\u003c/ul\u003e","pageTitle":"computer ✈︎✈︎ some ✈︎✈︎ git","title":"基础"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","some","git","基础"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
