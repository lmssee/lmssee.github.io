    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e引用\u003c/h5\u003e\n\u003cp\u003e引用（ ref ）是一个 SHA1 散列值，指向 Git 对象库中的对象。虽然一个引用可以指向任何 Git 对象，但是它通常指向提交对象。符号引用（ symbolic\n    reference ），或称为 symref ，间接指向 Git 对象。它仍然只是一个引用。\n\u003c/p\u003e\n\u003cp\u003e 本地特性分支名称、远程跟踪分支名称和标签名都是引用。\u003c/p\u003e\n\u003cp\u003e\n    每一个符号引用都有一个以ref/开始的明确全称，并且都分层存储在版本库的 .git/refs/ 目录中。目录中基本上有三种不同的命名空间代表不同的引用： refs/heads/ref 代表本地分支，\n    refs/remotes/ref 代表远程跟踪分支， refs/tags/ref代表标签。\n\u003c/p\u003e\n\u003ch6\u003eHEAD\u003c/h6\u003e\n\u003cp\u003e HEAD始终指向当前分支的最近提交。当切换分支时，HEAD会更新为指向新分支的最近提交。\u003c/p\u003e\n\u003ch6\u003eORIG_HEAD\u003c/h6\u003e\n\u003cp\u003e某些操作，例如合并（merge）和复位（reset），会把调整为新值之前的先前版本的HEAD记录到ORIG_HEAD中。可以使用ORIG_HEAD来恢复或回滚到之前的状态或者做一个比较。\u003c/p\u003e\n\u003ch6\u003eFETCH_HEAD\u003c/h6\u003e\n\u003cp\u003e当使用远程库时，git\n    fetch命令将所有抓取分支的头记录到.git/FETCH_HEAD中。FETCH_HEAD是最近抓取（fetch）的分支HEAD的简写，并且仅在刚刚抓取操作之后才有效。使用这个符号引用，哪怕是一个对没有指定分支名的匿名抓取操作，都可以也在git\n    fetch时找到提交的HEAD。\u003c/p\u003e\n\u003ch6\u003eMERGE_HEAD\u003c/h6\u003e\n\u003cp\u003e当一个合并操作正在进行时，其他分支的头暂时记录在MERGE_HEAD中。换言之，MERGE_HEAD是正在合并进HEAD的提交。\n    所有这些符号引用都可以用底层命令git symbolic-ref进行管理。\u003c/p\u003e\n\n\n\n\u003ch5\u003e提交\u003c/h5\u003e\n\u003col\u003e\n    \u003cli\u003e使用 add 命令来确定提交哪些文件（提交到缓存区 buffer ）到索引。\n    \u003c/li\u003e\n    \u003cli\u003e再使用 commit 命令将参数传送到版本库，并赋予一个散列值以标识这次新提交。提交会将当前内容和描述用户和日志消息一起储存在新的提交上。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cdetails\u003e\n    \u003csummary\u003egit add 的参数们\u003c/summary\u003e\n    \u003ctable id=\"Aa\"\u003e\u003c/table\u003e\n\u003c/details\u003e\n\u003cscript\u003e\n    _MiMethod.td(\"Aa\", [\n        ['参数', '缩写形式', '可加前缀', '含义'],\n        ['--verbose', '-v', '', ''],\n        ['--dry-run', '-r', '', ''],\n        ['--force', '-f', '', ''],\n        ['--interactive', '-i', '', '查看被修改或已删除的文件但没有提交的文件，通过 revert 子命令查看，同时进入一个子命令系统'],\n        ['--path', '-p', '', ''],\n        ['--edit', '-e', '', ''],\n        ['--all', '', '--no-all', '提交所有'],\n        ['--ignore-removal', '', '--no-ignore-removal', ''],\n        ['--upodate', '-u', '', '将所有跟踪的文件修改添加到索引库，不理会未跟踪的'],\n        ['--intent-to-add', '-N', '', ''],\n        ['--refresh', '', '', ''],\n        ['--ignore-errors', '', '', ''],\n        ['--ignore-missing', '', '', ''],\n    ]);\n\u003c/script\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit add {提交的地址} \u003cspan class=\"r\"\u003e// 可以是文件名或文件夹名， . 提交所有\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit commit -m {本次提交的注释} \u003cspan class=\"r\"\u003e// 提交暂存\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit commit --message {本次提交的注释} \u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit commit -a -m {提交的注释} \u003cspan class=\"r\"\u003e// 使用 -a 配置可省略 add 过程\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e 在 Linux 系统中， commit 信息使用单引号 ' ， Windows 系统， commit 信息使用双引号 \" 。所以在 git bash 中 git commit -m '提交说明'\n        这样是可以的，在Windows 命令行中就要使用双引号 git commit -m \" 提交说明 \" 。 \u003c/p\u003e\n\u003c/div\u003e\n\u003cdetails\u003e\n    \u003csummary\u003egit commit 的参数们\u003c/summary\u003e\n    \u003ctable id=\"gitCommit\"\u003e\u003c/table\u003e\n\u003c/details\u003e\n\u003cscript\u003e\n    let gitCommit = [\n        ['', '', '', ''],\n        ['', '', '', ''],\n        ['', '', '', ''],\n        ['', '', '', ''],\n    ];\n    _MiMethod.td('gitCommit', gitCommit);\n\u003c/script\u003e\n\u003ch5\u003e撤销\u003c/h5\u003e\n\u003cp\u003e有些撤销是不可逆的：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit commit --amend\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e重做\u003c/h5\u003e\n\u003cp\u003e使用 git reset 移除缓存区（使用 git add 提交的内容）的内容：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit reset HEAD {要剔除的文件名}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e\n        git diff 检测\n    \u003c/summary\u003e\n    \u003cp\u003e检测 diff 命令用于展示提交和工作树等之间的更改，也就是当前目录中当前文件和暂存区快照之间的差异：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003egit diff *** {文件名}\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit diff {提交 id1} {提交 id2} \u003cspan class=\"r\"\u003e// 比较两次提交的差异\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit diff {分支名 1} {分支名 2} \u003cspan class=\"r\"\u003e// 比较两次分支的差异\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit diff --staged \u003cspan class=\"r\"\u003e// 显示版本和缓存区不同\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit diff --cached \u003cspan class=\"r\"\u003e// 比较暂存区和版本库差异（已经 add ，没有 commit）\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit diff --stat \u003cspan class=\"r\"\u003e// 仅仅比较统计信息\u003c/span\u003e\u003c/span\u003e\n        \u003cspan class=\"p\"\u003egit diff HEAD \u003cspan class=\"r\"\u003e// 上次提交以来的更改\u003c/span\u003e\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/details\u003e\n\u003ch5\u003e推送修改\u003c/h5\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push {远程主机名} {本地分支名}:{远程分支名}\u003cspan class=\"r\"\u003e// git push origin newMain:newMain\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e指令的参数要求与pull命令相同，我们需要指定目标版本库的路径及其分支。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e提交代码时要做到先拉后推\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003e当 push 无参数时：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push clone \"\" \u003cspan class=\"r\"\u003e// 推送某一分支\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit checkout \"\" \u003cspan class=\"r\"\u003e// 提交检测，若指定的字符较少，可能会报错\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit pull \u003cspan class=\"r\"\u003e// 拉取代码\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit mergetool \u003cspan class=\"r\"\u003e// 冲突分析工具\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit push clone \"\" \u003cspan class=\"r\"\u003e// 推送另一分支\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e删除\u003c/h6\u003e\n\u003cp\u003e当省略本地分支名，即推送空的内容到远程指定分支，即删除分支：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push origin :{待删除的远程分支}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e最简\u003c/h6\u003e\n\u003cp\u003e如果存在追踪关系，则会有省略本地分支名及远程分支名：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e如果当前分支与多个分支存在追踪关系，则可使用 -u 指定一个默认主机：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003egit push -u origin newMain\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/div\u003e\n\u003cp\u003e不带参数的推送，默认只推送当前分支（simple），另一种既是推送所有（matching）的分支。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit config --global push.default matching/simple \u003cspan class=\"r\"\u003e// 切换默认设置\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e当然，也可以使用参数强制全部推送：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push -all origin\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e先拉后推\u003c/h5\u003e\n\u003cp\u003e默认下先拉后退比较好，但是也可以使用 --force 命令强制推送：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push --force origin \u003cspan class=\"r\"\u003e// 不建议这么用\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e推送标签\u003c/h6\u003e\n\u003cp\u003e默认情况下 git push 不会推送标签，使用 --tags 可推送标签：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push origin --tags\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e同名推送\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push origin HEAD \u003cspan class=\"r\"\u003e// 推送到远端同名分支\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e本地分支覆盖远程\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push -f origin {本地分支名}:{远程分支名}\u003c/span\u003e\n\u003c/code\u003e\n\u003c!-- \u003ch6\u003e查看 push 结果\u003c/h6\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003egit rbranch-1\u003c/span\u003e\n    \u003c/code\u003e --\u003e\n\u003ch6\u003e推送标签\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push origin {标签名}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e删除远程标签\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit push origin :{标签名}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch5\u003e修改最近一次提交\u003c/h5\u003e\n\u003cp\u003e使用 git commit --amend 可以将最近一次提交做某些修改。它是一个新的提交，但，又像是没有上次提交，即使用该命令提交后并没有增加提交的次数。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ some ✈︎✈︎ git","title":"提交"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","some","git","提交"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
