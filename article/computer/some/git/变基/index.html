                            </style><div></div></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e变基提交\u003c/h5\u003e\n\u003cp\u003egit rebase 命令是用来改变一串提交以什么为基础的。此命令至少需要提交将迁往的分支名。默认情况下，不在目标分支中的当前分支提交会变基。\n\u003c/p\u003e\n\u003cp\u003e git rebase 的一个常见用途是保持你正在开发的一系列提交相对于另一个分支是最新的，那通常是master分支或者来自另一个版本库的追踪分支。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e使用git rebase命令通常称为向前移植（forward porting）。\u003c/p\u003e\n\u003c/div\u003e\n\u003cp\u003egit rebase命令也可以用--onto选项把一条分支上的开发线整个移植到完全不同的分支上。\u003c/p\u003e\n\u003cp\u003egit rebase 可添加 --onto 选项把一条分支移到完全不同的分支上：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit rebase --onto {目标分支} {挪动主分支} {挪动分支的分支}\u003c/span\u003e\n\u003c/code\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e如果有冲突，解决完毕之后，使用 git rebase --continue 命令恢复变基操作。\u003c/p\u003e\n    \u003cp\u003e如果发现冲突没有必要保留，使用 git rebase --skip 跳过这个提交。\u003c/p\u003e\n    \u003cp\u003e如果发现变基操作不应该，则使用 git rebase --abort 来撤销变基。\u003c/p\u003e\n\u003c/div\u003e","pageTitle":"computer ✈︎✈︎ some ✈︎✈︎ git","title":"变基"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","some","git","变基"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
