    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e裸版本库\u003c/h5\u003e\n\u003cp\u003e裸（ bare ）版本库可以使用 git clone --bare 创建。这个用于发布版本和保存版本用。\u003c/p\u003e\n\u003ch5\u003e当前版本\u003c/h5\u003e\n\u003cp\u003e版本跟进是 git 的优势。在 git 中，当前版本用 HEAD 标识，上一个版本用 HEAD^ 标识，上上个版本就是 HEAD^^ ，n 多版本就是 HEAD~n。\u003c/p\u003e\n\u003ch5\u003e回退\u003c/h5\u003e\n\u003cp\u003e使用 git reset 命令，可以撤销之前的一些操作（add、commit...）：\u003c/p\u003e\n\u003cp\u003egit reset 命令主要有三个选项： --soft 、 --mixed 、 --hard。\u003c/p\u003e\n\u003ch6\u003egit reset --soft\u003c/h6\u003e\n\u003cp\u003e--soft 会将 HEAD 引用指向给定的提交。索引和工作目录保持不变，这个版本的命令是“最小”的影响，只改变一个符号引用使其指向一个新提交。\u003c/p\u003e\n\u003ch6\u003egit reset --mixed\u003c/h6\u003e\n\u003cp\u003e--mixed 会将 HEAD 指向给定的索引。索引内容也跟着改变以适应提交的树结构，但是工作目录的内容保持不变。这个版本的命令将索引变成刚刚暂存提交全部变化时的状态，他会显示目录中什么修改。\u003c/p\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e--mixed 为默认的 git reset 模式\u003c/p\u003e\n\u003c/div\u003e\n\u003ch6\u003egit reset --hard\u003c/h6\u003e\n\u003cp\u003e该命令将直接将 HEAD 引用指向给定的提交。索引的内容也会改变以适应给定的树结构。此外，工作目录的内容也会随之改变以适应提交表示树的状态。\u003c/p\u003e\n\u003cp\u003e当改变工作目录时，整个目录会改变成给定提交的样子。修改会丢失，新文件会丢失，删除的文件会恢复。\u003c/p\u003e\n\u003ctable id=\"Aa\"\u003e\u003c/table\u003e\n\u003cscript\u003e\n    _MiMethod.td('Aa', [\n        ['选项', 'HEAD', '索引', '工作目录'],\n        ['--soft', '是', '否', '否'],\n        ['--mixed', '是', '是', '否'],\n        ['--hard', '是', '是', '是'],\n    ]);\n\u003c/script\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit reset\u003cspan class=\"r\"\u003e// 可能是会退上一个 add\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit reset --soft HEAD^ \u003cspan class=\"r\"\u003e// 回到上一提交\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit reset --hard HEAD^ \u003cspan class=\"r\"\u003e// 回到上一版本\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit reset --hard ORIG_HEAD \u003cspan class=\"r\"\u003e// 撤销 git pull，但是会清空工作区 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit reset --merge ORIG_HEAD \u003cspan class=\"r\"\u003e// 撤销 git pull，不会清空工作区 \u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit reset -- {文件名} \u003cspan class=\"r\"\u003e// 移除索引中的某文件 \u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\n\u003ch5\u003e反回退\u003c/h5\u003e\n\u003cp\u003e可以通过 commit-id 找回。使用 git reflog 命令。\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ some ✈︎✈︎ git","title":"版本"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","some","git","版本"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
