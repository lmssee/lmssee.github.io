    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eclone\u003c/h5\u003e\n\u003ch6\u003e 克隆 \u003c/h6\u003e\n\u003cp\u003e 克隆项目不需要提前在本地上进行目录创建， copy 下来项目后，会根据项目名生成文件夹，将项目文件放进该文件内，并 git 初始化 。 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003egit clone {远端地址或本地其他文件夹地址} \u003c/span\u003e\u003c/code\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e\n        git clone 的参数们\n    \u003c/summary\u003e\n    \u003ctable id=\"Aa\"\u003e\u003c/table\u003e\n\u003c/details\u003e\n\u003cscript\u003e\n    let Aa = [\n        ['参数', '是否含前缀', '含义'],\n        ['--template={}', '', ''],\n        ['-l', '', ''],\n        ['-s', '', ''],\n        ['--no-hardlinks', '', ''],\n        ['-q', '', ''],\n        ['-n', '', ''],\n        ['--bare', '', ''],\n        ['--mirror', '', ''],\n        ['-o {名字}', '', ''],\n        ['-b {名字}', '', ''],\n        ['-u {upload-pack}', '', ''],\n        ['--reference {repository}', '', ''],\n        ['--dissociate', '', ''],\n        ['--separate-git-dir {git dir}', '', ''],\n        ['--recurse-submodules', '', ''],\n        ['--shallow-submodules', '--no-shallow-submodules', ''],\n        ['--jobs {n}', '', ''],\n    ];\n    _MiMethod.td('Aa', Aa); \n\u003c/script\u003e\n\u003cp\u003e\u003c/p\u003e\n\u003ch6\u003e 克隆到指定位置： \u003c/h6\u003e\n\u003cp\u003e 如果不想以项目名作为目录名，可以在命令后以参数形式更改目录名 \u003c/p\u003e\n\u003ccode class=\"c\"\u003e\u003cspan class=\"p\"\u003egit clone {目标地址} {本地仓库名} \u003c/span\u003e\u003c/code\u003e\n\u003ch5\u003e命名\u003c/h5\u003e\n\u003cp\u003e如果经常需要访问某个版本库，为了访问起来容易，可以给它一个名字。例如，你可以通过remote add命令给它一个这样的昵称。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit remote add {名称} {地址}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e当某个版本库被克隆时，Git 会自动将原版本库路径的路径存储为它的源版本库(origin)。如果这时我们调用带--verbose选项的remote命令，Git就会列出一些链接，以显示那些可被用于获取或推送提交的路径。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e git remote --verbose\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e最后，也可以通过 remote rm 命令来删除这些昵称：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit remote rm {名称}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e fetch 命令可用于从另一个版本库中获取提交，这种获取操作会将其他版本库中所有分支中尚未在本地版本库中存在的提交。\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit fetch {名称}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003e通过带 -r 选项的 branch 命令来显示这些远程跟踪分支：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003e git branch -r\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"computer ✈︎✈︎ some ✈︎✈︎ git","title":"克隆"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","some","git","克隆"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
