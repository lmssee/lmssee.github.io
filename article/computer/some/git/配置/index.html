    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003e安装\u003c/h5\u003e\n\u003ch6\u003ewindow\u003c/h6\u003e\n\u003cp\u003ewindow 可以直接 \u003ca href=\"https://git-scm.com/\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e下载 git 软件\u003c/a\u003e 进行下载。\u003c/p\u003e\n\u003ch6\u003eLinux \u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003esudo yum install git\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003eMac\u003c/h6\u003e\n\u003cp\u003e在 Mac 上，如果安装了 Xcode ，会默认安装了 git。\u003c/p\u003e\n\u003cp\u003e可适用 git --version 查看版本来校验是否安装成功。\u003c/p\u003e\n\u003ch5\u003econfig\u003c/h5\u003e\n\u003cp\u003e在安装完 git 后，第一件事就是设置名称和邮箱地址\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e/etc/gitconfig 文件：系统中对所有用户都普遍适用的配置。若使用 git config 时用 --system 选项，读写的就是这个文件 \u003c/li\u003e\n    \u003cli\u003e~/.gitconfig 文件：用户目录下的配置文件只适用于该用户。若使用 git config 时用 --global 选项，读写的就是这个文件 \u003c/li\u003e\n    \u003cli\u003e 当前项目的 Git 目录中的配置文件（也就是工作目录中的 .git/config 文件）：这里的配置仅仅针对当前项目有效。每一个级别的配置都会覆盖上层的相同配置，所以 .git/config 里的配置会覆盖\n        /etc/gitconfig 中的同名变量。 \u003c/li\u003e\n    \u003cli\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e配置问价储存位置\u003c/h6\u003e\n\u003cul\u003e\n    \u003cli\u003e/ect/gitconfig 包含了适用系统的用户和所有库的值。\n        \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003egit config --system \u003cspan class=\"r\"\u003e// 明确读写该文件\u003c/span\u003e\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/li\u003e\n    \u003cli\u003e～/.gitconfig 文件，用户定义的特定文件 \u003ccode class=\"c\"\u003e\n            \u003cspan class=\"p\"\u003egit config --global\u003c/span\u003e\n        \u003c/code\u003e\n    \u003c/li\u003e\n    \u003cli\u003e./gitconfig 当前库的配置\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch6\u003e用户信息\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit config --global user.name \"lmssee\" \u003cspan class=\"r\"\u003e// 设置姓名\u003c/span\u003e\u003c/span\u003e\n    \u003cspan class=\"p\"\u003egit config --global user.email \"lmssee@outlook.com\" \u003cspan class=\"r\"\u003e// 设置 email\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e重置\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit config --unset --global user.email \u003cspan class=\"r\"\u003e// 使用 unset 命令重置已设置项\u003c/span\u003e\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e编辑器\u003c/h6\u003e\n\u003cp\u003e默认编辑器时 Vim，若想使用其他的编辑器，可以：\u003c/p\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit config --global core.editor {编辑器的名字}\u003c/span\u003e\n\u003c/code\u003e\n\u003cp\u003egit 接受 kdiff3、tkdiff、xxdiff、emerge、vimdiff、gvimdiff、ecmerge、opendiff 等有效的合并工具，也可以接受一个客户端的工具。\u003c/p\u003e\n\u003ch6\u003e分析工具\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit config --global merge.tool {分析工具的名字}\u003c/span\u003e\n\u003c/code\u003e\n\u003ch6\u003e配置列表\u003c/h6\u003e\n\u003ccode class=\"c\"\u003e\n    \u003cspan class=\"p\"\u003egit config --list\u003c/span\u003e\n\u003c/code\u003e","pageTitle":"computer ✈︎✈︎ some ✈︎✈︎ git","title":"配置"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","some","git","配置"]},"buildId":"GLOTieeQaYuedObUaoYz6","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
