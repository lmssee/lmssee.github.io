    type="application/json">{"props":{"pageProps":{"data":"\u003ch5\u003eps 命令\u003c/h5\u003e\n\u003cp\u003eps 是 Process Status 缩写，显示单亲系统运行的进程。\u003c/p\u003e\n\u003cp\u003e进程状态:\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003eD 不可中断\u003c/li\u003e\n    \u003cli\u003eR 运行\u003c/li\u003e\n    \u003cli\u003eS 中断\u003c/li\u003e\n    \u003cli\u003eT 停止\u003c/li\u003e\n    \u003cli\u003eZ 僵死\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdetails\u003e\n    \u003csummary\u003e命令参数：\u003c/summary\u003e\n    \u003cul\u003e\n        \u003cli\u003e\u003cspan\u003ea\u003c/span\u003e 显示所有进程\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e-a\u003c/span\u003e 显示同一终端下的所有程序\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e-A\u003c/span\u003e 显示所有进程\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003ec\u003c/span\u003e 显示进程的真实名称\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e-N\u003c/span\u003e 反向选择\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e-e\u003c/span\u003e 等于“-A”\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003ee\u003c/span\u003e 显示环境变量\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003ef\u003c/span\u003e 显示程序间的关系\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e-H\u003c/span\u003e 显示树状结构\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e-l\u003c/span\u003e 显示目前登陆属于自己 pid \u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003er\u003c/span\u003e 显示当前终端的进程\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003eT\u003c/span\u003e 显示当前终端的所有程序\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003eu\u003c/span\u003e 指定用户的所有进程\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e-axjf\u003c/span\u003e 列出类似树状程序显示\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e-au\u003c/span\u003e 显示较详细的资讯\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e-aux\u003c/span\u003e 显示所有包含其他使用者的行程 \u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e-C\u003c/span\u003e\u0026lt;命令\u0026gt; 列出指定命令的状况\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e--lines\u003c/span\u003e\u0026lt;行数\u0026gt; 每页显示的行数\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e--width\u003c/span\u003e\u0026lt;字符数\u0026gt; 每页显示的字符数\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e--help\u003c/span\u003e 显示帮助信息\u003c/li\u003e\n        \u003cli\u003e\u003cspan\u003e--version\u003c/span\u003e 显示版本显示\u003c/li\u003e\n    \u003c/ul\u003e\n\u003c/details\u003e\n\u003cdiv class=\"note\"\u003e\n    \u003cp\u003e经常配合 grep 查找特定进程：\u003c/p\u003e\n    \u003ccode class=\"c\"\u003e\n        \u003cspan class=\"p\"\u003eps -ef |grep ssh\u003c/span\u003e\n    \u003c/code\u003e\n\u003c/div\u003e\n\u003ch5\u003ewatch\u003c/h5\u003e\n\u003cp\u003ewatch 帮助监测一个命令的结果，生的手动运行。命令参数：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e-n / --interval 缺省每 2 秒运行下一个程序\u003c/li\u003e\n    \u003cli\u003e-d / --differences 高亮变化区域\u003c/li\u003e\n    \u003cli\u003e-t / -no-title 关闭时间输出\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003eat\u003c/h5\u003e\n\u003cp\u003e自动执行。在一个时间执行一个指定的任务，需要开启 atd 进程（ps -ef｜grep atd）参看。命令参数：\u003c/p\u003e\n\u003cul\u003e\n    \u003cli\u003e\u003ccode\u003e-m\u003c/code\u003e 当指定的任务被完成之后，将给用户发送邮件，即使没有标准输出\u003c/li\u003e\n    \u003cli\u003e\u003ccode\u003e-I\u003c/code\u003e atq的别名\u003c/li\u003e\n    \u003cli\u003e\u003ccode\u003e-d\u003c/code\u003e atrm的别名\u003c/li\u003e\n    \u003cli\u003e\u003ccode\u003e-v\u003c/code\u003e 显示任务将被执行的时间\u003c/li\u003e\n    \u003cli\u003e\u003ccode\u003e-c\u003c/code\u003e 打印任务的内容到标准输出\u003c/li\u003e\n    \u003cli\u003e\u003ccode\u003e-V\u003c/code\u003e 显示版本信息\u003c/li\u003e\n    \u003cli\u003e\u003ccode\u003e-q\u003c/code\u003e\u0026lt;列队\u0026gt; 使用指定的列队\u003c/li\u003e\n    \u003cli\u003e\u003ccode\u003e-f\u003c/code\u003e\u0026lt;文件\u0026gt; 从指定文件读入任务而不是从标准输入读入\u003c/li\u003e\n    \u003cli\u003e\u003ccode\u003e-t\u003c/code\u003e\u0026lt;时间参数\u0026gt; \u003c/li\u003e\n\u003c/ul\u003e\n\u003ch5\u003ecrontab\u003c/h5\u003e\n\u003cp\u003e控制\u003c/p\u003e","pageTitle":"computer ✈︎✈︎ linux ✈︎✈︎ 基础","title":"进程命令"},"__N_SSG":true},"page":"/article/[[...id]]","query":{"id":["computer","linux","基础","进程命令"]},"buildId":"iIKERKMchG9u86_BU6FBa","isFallback":false,"gsp":true,"scriptLoader":[]}</script>
